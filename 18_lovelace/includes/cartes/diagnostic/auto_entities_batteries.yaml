type: custom:auto-entities
filter:
  include:
    - group: group.batteries
sort:
  method: state
  numeric: true
  reverse: false
card:
  type: custom:bar-card
  unit_of_measurement: "%"
  show_header_toggle: false
  entity_row: true
  severity:
    - from: 0
      to: 25
      color: "rgba(244, 67, 54, 0.2)"     # 🔴 critique
    - from: 26
      to: 50
      color: "rgba(255, 152, 0, 0.2)"    # 🟠 bas
    - from: 51
      to: 75
      color: "rgba(255, 235, 59, 0.2)"   # 🟡 moyen
    - from: 76
      to: 100
      color: "rgba(76, 175, 80, 0.2)"     # 🟢 OK
  tap_action:
    action: none
  hold_action:
    action: none
  double_tap_action:
    action: none
  style: |
    ha-card {
      border-radius: 12px;
      box-shadow: var(--ha-card-box-shadow);
      padding: 8px;
      /* Vue diagnostic en lecture seule : barres non cliquables */
      pointer-events: none;
      cursor: default;
    }