# ==========================================================
# 📡 ARSENAL — CARTE DIAGNOSTIC
#     Wi-Fi ponts (RSSI dBm) — hors score Netatmo
# ----------------------------------------------------------
# Les ponts (Rain Bird…) remontent un RSSI Wi-Fi en dBm, sur
# une échelle radicalement différente du score Netatmo 1–4
# affiché par barres_netatmo_wifi.yaml. Ils sont donc isolés
# ici sur leur propre échelle dBm (mêmes seuils couleur que
# le Bluetooth) pour rester lisibles.
# Lecture seule : aucune commande, aucune logique métier.
# ==========================================================
type: custom:auto-entities
filter:
  include:
    - entity_id: "sensor.rain_bird_*_bridge_wifi_rssi"
      state: "< 0"
sort:
  method: state
  numeric: true
  reverse: false
card:
  type: custom:bar-card
  unit_of_measurement: ""
  show_header_toggle: false
  entity_row: true
  min: -100
  max: -30
  severity:
    - from: -100
      to: -91
      color: "rgba(244, 67, 54, 0.2)"      # 🔴 lien faible
    - from: -90
      to: -81
      color: "rgba(255, 152, 0, 0.2)"     # 🟠 médiocre
    - from: -80
      to: -71
      color: "rgba(255, 235, 59, 0.2)"    # 🟡 correct
    - from: -70
      to: -30
      color: "rgba(76, 175, 80, 0.2)"      # 🟢 bon / excellent
  style: |
    ha-card {
      border-radius: 12px;
      box-shadow: var(--ha-card-box-shadow);
      padding: 8px;
    }
