type: markdown
content: |
  ### 🔍 Dernier cycle ECS

  {% set resume = states('input_text.ecs_resume_dernier_cycle_fige') %}
  {% if resume in ['unknown','unavailable','none','', None] %}
  _Aucun cycle enregistré._
  {% else %}

  {% set parts = resume.split('|') %}
  {% set have = parts | length %}

  {% set date = parts[0] if have > 0 else '—' %}
  {% set mode = parts[1] | title if have > 1 else 'Inconnu' %}
  {% set consigne = parts[2] | float(0) if have > 2 else 0 %}
  {% set t0 = parts[3] | float(0) if have > 3 else 0 %}
  {% set boost = parts[4] if have > 4 else 'non' %}
  {% set valide = parts[5] if have > 5 else '—' %}

  {% set tmax = states('input_number.ecs_temperature_max_reelle_figee') | float(0) %}
  {% set duree = states('input_number.ecs_duree_dernier_cycle_figee') | float(0) %}
  {% set delta = (tmax - consigne) | round(1) %}

  **Début** : {{ date }}  
  **Mode** : {{ mode }}  
  **Consigne** : {{ consigne }} °C  
  **Température max** : {{ tmax }} °C  
  **Durée réelle** : {{ duree | round(1) }} min  

  {% if t0 >= consigne %}
  ⚪ Cycle annulé (cuve déjà chaude)

  {% else %}

    {% if delta >= -0.3 and delta <= 0.3 %}
    🟢 Conforme  
    Écart final : {{ delta }} °C

    {% elif delta > 0.3 %}
    🟠 Trop haut  
    Écart final : +{{ delta }} °C

    {% else %}
    🟠 Insuffisant  
    Écart final : {{ delta }} °C

    {% endif %}

  {% endif %}

  **Cycle validé** : {{ valide | upper }}

  {% endif %}