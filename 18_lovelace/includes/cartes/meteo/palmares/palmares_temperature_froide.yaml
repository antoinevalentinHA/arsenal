type: markdown
content: |
  {% set ns = namespace(records=[]) %}

  {% for i in range(1, 11) %}
    {% set p = '%02d' | format(i) %}
    {% set valeur = state_attr('sensor.palmares_temperature_journalier_froid', 'rang_' ~ p ~ '_valeur') %}
    {% set date = state_attr('sensor.palmares_temperature_journalier_froid', 'rang_' ~ p ~ '_date') %}

    {% if valeur is not none
          and valeur != 999
          and date not in [none, '', 'unknown', 'unavailable'] %}
      {% set ns.records = ns.records + [dict(rang=i, date=date, valeur=valeur)] %}
    {% endif %}
  {% endfor %}

  {% if ns.records | count == 0 %}
  _Aucun record enregistré._
  {% else %}
  {% for item in ns.records %}
  {% if item.rang == 1 %}🥇{% elif item.rang == 2 %}🥈{% elif item.rang == 3 %}🥉{% else %}{{ item.rang }}️⃣{% endif %} {{ item.date }} — **{{ item.valeur }} °C**
  {% endfor %}

  {% set total = ns.records | count %}
  {% set ampli = (ns.records[0].valeur | float - ns.records[-1].valeur | float) | abs %}
  {% set rns = namespace(maxts=0) %}
  {% for it in ns.records %}
    {% set its = as_timestamp(strptime(it.date, '%Y-%m-%d'), 0) %}
    {% if its > rns.maxts %}{% set rns.maxts = its %}{% endif %}
  {% endfor %}
  {% set seuil = states('input_number.palmares_meteo_fraicheur_jours') | float(2) %}
  {% set recent = rns.maxts > 0 and (as_timestamp(now()) - rns.maxts) / 86400 < seuil %}
  📊 {{ total }}/10{% if total >= 2 %} · écart {{ ampli | round(1) }} °C{% endif %}{% if recent %} · 🔥 récent{% endif %}
  {% endif %}