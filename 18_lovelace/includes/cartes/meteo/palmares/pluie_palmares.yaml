type: markdown
content: |
  {% set r = state_attr('sensor.palmares_pluie_journalier', 'records') or [] %}

  {% if r | count == 0 %}
  _Aucun record enregistré._
  {% else %}
  {% for item in r %}
  {% if loop.index == 1 %}🥇{% elif loop.index == 2 %}🥈{% elif loop.index == 3 %}🥉{% elif loop.index == 10 %}🔟{% else %}{{ loop.index }}️⃣{% endif %} {{ item.date_affichage }} — **{{ item.valeur }} mm**
  {% endfor %}

  {% set total = r | count %}
  {% set ampli = (r[0].valeur | float - r[-1].valeur | float) | abs %}
  {% set rns = namespace(maxts=0) %}
  {% for it in r %}
    {% set its = as_timestamp(strptime(it.date, '%Y-%m-%d'), 0) %}
    {% if its > rns.maxts %}{% set rns.maxts = its %}{% endif %}
  {% endfor %}
  {% set seuil = states('input_number.palmares_meteo_fraicheur_jours') | float(2) %}
  {% set recent = rns.maxts > 0 and (as_timestamp(now()) - rns.maxts) / 86400 < seuil %}
  📊 {{ total }}/10{% if total >= 2 %} · écart {{ ampli | round(1) }} mm{% endif %}{% if recent %} · 🔥 récent{% endif %}
  {% endif %}