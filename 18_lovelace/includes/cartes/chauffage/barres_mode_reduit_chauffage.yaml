type: custom:bar-card
columns: 1
entities:
  - entity: sensor.pourcentage_consigne_eco_24h_proxy
    name: "24h"
    icon: mdi:leaf
  - entity: sensor.pourcentage_consigne_eco_7j_proxy
    name: "7j"
    icon: mdi:leaf
unit_of_measurement: "%"
max: 100
direction: right
height: 36px
positions:
  icon: outside
  name: outside
  value: inside
animation:
  state: 'off'
  speed: 2
tap_action:
  action: none
hold_action:
  action: none
double_tap_action:
  action: none
card_mod:
  style: |
    ha-card {
      border-radius: 16px;
      box-shadow: var(--ha-card-box-shadow);
      padding: 8px 10px;
      /* Barres indicatrices en lecture seule : non cliquables */
      pointer-events: none;
      cursor: default;
    }

    /* 🔵 Barre remplie = BLEU info canon */
    bar-card-currentbar {
      background-color: rgba(33, 150, 243, 0.2) !important;
      border-radius: 999px;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.08);
    }

    /* ⚪ Fond de barre = GRIS neutre canon */
    bar-card-backgroundbar {
      background-color: rgba(158, 158, 158, 0.2) !important;
      border-radius: 999px;
    }

    /* Compact : espace entre les 2 barres */
    bar-card-card { margin-top: 6px; }
    bar-card-card:first-child { margin-top: 0px; }

    /* -----------------------------
       ✅ Outside FIXÉ = pas de “déséquilibre”, pas de changement d’échelle
       ----------------------------- */
    bar-card-icon  { width: 26px; }
    bar-card-name  { width: 42px; }

    bar-card-icon,
    bar-card-name {
      color: var(--primary-text-color);
      font-weight: 700;
    }

    /* Valeur inside : lisible sur toute longueur sans pastille moche */
    bar-card-value {
      font-weight: 800;
      color: var(--primary-text-color);
      text-shadow: 0 1px 0 rgba(255,255,255,0.80), 0 0 2px rgba(0,0,0,0.20);
    }

    /* Icône */
    ha-icon { color: var(--primary-text-color); }