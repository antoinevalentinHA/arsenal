type: custom:layout-card
layout_type: custom:grid-layout
layout:
  grid-template-columns: 1fr repeat(3, 50px) 1fr
  justify-items: center
  align-items: center
cards:

  - type: custom:button-card
    view_layout:
      grid-column: 2
    template: bouton_navigation_badge_carre
    name: Aperçu
    icon: mdi:car
    tap_action:
      action: navigate
      navigation_path: /audi-dashboard/audi_a3_e-tron
    styles:
      icon:
        - color: '#1565C0'

  - type: custom:button-card
    view_layout:
      grid-column: 3
    template: bouton_navigation_badge_carre
    name: Sécurité
    icon: mdi:shield
    tap_action:
      action: navigate
      navigation_path: /audi-securite-dashboard
    styles:
      icon:
        - color: '#B71C1C'

  - type: custom:button-card
    view_layout:
      grid-column: 4
    template: bouton_navigation_badge_carre
    name: Batterie
    icon: mdi:battery
    tap_action:
      action: navigate
      navigation_path: /audi-batterie-dashboard/statistiques
    styles:
      icon:
        - color: '#2E7D32'