type: custom:layout-card
layout_type: custom:grid-layout
layout:
  grid-template-columns: 1fr repeat(2, 50px) 1fr
  justify-items: center
  align-items: center
cards:

  # sauvegarde
  - type: custom:button-card
    view_layout:
      grid-column: 2
    template: bouton_navigation_badge_carre
    icon: mdi:content-save
    tap_action:
      action: call-service
      service: script.ecs_sauvegarde_planning
      confirmation:
        text: "Confirmer la sauvegarde du planning ECS ?"
    styles:
      icon:
        - color: '#2E7D32'

  # restauration
  - type: custom:button-card
    view_layout:
      grid-column: 3
    template: bouton_navigation_badge_carre
    icon: mdi:backup-restore
    tap_action:
      action: call-service
      service: script.ecs_restore_planning
      confirmation:
        text: "⚠️ Confirmer la RESTAURATION du planning ECS ?"
    styles:
      icon:
        - color: '#B71C1C'