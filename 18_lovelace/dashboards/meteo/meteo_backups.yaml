button_card_templates: !include_dir_merge_named /config/19_button_card_templates

views:
  - badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

      - type: custom:button-card
        template: bouton_parametres_badge_carre
        tap_action:
          action: navigate
          navigation_path: /reglages-meteo-dashboard/reglages-meteo

    # ======================================================
    # 🌦️ CONTENU PRINCIPAL — FLUX VERTICAL CANON ARSENAL
    # ------------------------------------------------------
    # badges
    #   ↓
    # vertical-stack racine
    # ======================================================
    cards:
      - type: vertical-stack
        cards:
          # ======================================================
          # 🌿 JARDIN
          # ======================================================
          - type: vertical-stack
            cards:
              - !include ../../includes/section_headers/jardin.yaml

              - square: false
                type: grid
                columns: 3
                cards:
                  - type: custom:button-card
                    template: temperature
                    entity: sensor.temperature_jardin_1
                    name: Netatmo 1

                  - type: custom:button-card
                    template: temperature
                    entity: sensor.temperature_jardin_2
                    name: Netatmo 2

                  - type: custom:button-card
                    template: temperature
                    entity: sensor.temperature_jardin_3
                    name: Switchbot

              - square: false
                type: grid
                columns: 3
                cards:
                  - type: custom:button-card
                    template: humidite
                    entity: sensor.humidite_relative_jardin_1
                    name: Netatmo 1

                  - type: custom:button-card
                    template: humidite
                    entity: sensor.humidite_relative_jardin_2
                    name: Netatmo 2

                  - type: custom:button-card
                    template: humidite
                    entity: sensor.humidite_relative_jardin_3
                    name: Switchbot

          # ======================================================
          # 🚪 ENTRÉE
          # ======================================================
          - type: vertical-stack
            cards:
              - !include ../../includes/section_headers/entree.yaml

              - square: false
                type: grid
                columns: 2
                cards:
                  - type: custom:button-card
                    template: temperature
                    entity: sensor.temperature_entree_1
                    name: Netatmo

                  - type: custom:button-card
