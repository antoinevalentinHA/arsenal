button_card_templates: !include_dir_merge_named /config/19_button_card_templates

views:
  - badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

    # ======================================================
    # 🌡️ CONTENU PRINCIPAL — FLUX VERTICAL CANON ARSENAL
    # ------------------------------------------------------
    # badges
    #   ↓
    # vertical-stack racine
    # ======================================================
    cards:
      - type: vertical-stack
        cards:
          # ------------------------------------------------------
          # 🧭 Navigation météo
          # ------------------------------------------------------
          - !include ../../includes/navigation/meteo.yaml

          # ======================================================
          # 🌿 JARDIN
          # ======================================================
          - !include ../../includes/section_headers/jardin.yaml

          - square: false
            type: grid
            columns: 1
            cards:
              - type: custom:button-card
                template: socle_kpi
                entity: sensor.temperature_minmax_jour_jardin
                name: Température
                icon: mdi:thermometer

          # ======================================================
          # 🏡 RDC
          # ======================================================
          - !include ../../includes/section_headers/rdc.yaml

          - square: false
            type: grid
            columns: 2
            cards:
              - type: custom:button-card
                template: socle_kpi
                entity: sensor.temperature_minmax_jour_entree
                name: Entrée
                icon: mdi:thermometer

              - type: custom:button-card
                template: socle_kpi
                entity: sensor.temperature_minmax_jour_sejour
                name: Séjour
                icon: mdi:thermometer

          # ======================================================
          # 🪜 ÉTAGE
          # ======================================================
          - !include ../../includes/section_headers/etage.yaml

          - square: false
            type: grid
            columns: 2
            cards:
              - type: custom:button-card
                template: socle_kpi
                entity: sensor.temperature_minmax_jour_salle_de_jeux
                name: Salle de Jeux
                icon: mdi:thermometer

              - type: custom:button-card
                template: socle_kpi
                entity: sensor.temperature_minmax_jour_palier
                name: Palier
                icon: mdi:thermometer

          # ======================================================
          # 🛏️ CHAMBRES
          # ======================================================
          - !include ../../includes/section_headers/chambres.yaml

          - square: false
            type: grid
            columns: 2
            cards:
              - type: custom:button-card
                template: socle_kpi
                entity: sensor.temperature_minmax_jour_chambre_parents
                name: Parents
                icon: mdi:thermometer

              - type: custom:button-card
                template: socle_kpi
                entity: sensor.temperature_minmax_jour_chambre_enfants
                name: Enfants
                icon: mdi:thermometer

          # ======================================================
          # 🚿 SALLES DE BAIN
          # ======================================================
          - !include ../../includes/section_headers/salles_de_bain.yaml

          - square: false
            type: grid
            columns: 2
            cards:
              - type: custom:button-card
                template: socle_kpi
                entity: sensor.temperature_minmax_jour_sdb_parents
                name: Parents
                icon: mdi:thermometer

              - type: custom:button-card
                template: socle_kpi
                entity: sensor.temperature_minmax_jour_sdb_enfants
                name: Enfants
                icon: mdi:thermometer

          # ======================================================
          # 🏘️ DÉPENDANCES
          # ======================================================
          - !include ../../includes/section_headers/dependances.yaml

          - square: false
            type: grid
            columns: 3
            cards:
              - type: custom:button-card
                template: socle_kpi
                entity: sensor.temperature_minmax_jour_petite_maison
                name: Petite Maison
                icon: mdi:thermometer

              - type: custom:button-card
                template: socle_kpi
                entity: sensor.temperature_minmax_jour_garage
                name: Garage
                icon: mdi:thermometer

              - type: custom:button-card
                template: socle_kpi
                entity: sensor.temperature_minmax_jour_cave
                name: Cave
                icon: mdi:thermometer