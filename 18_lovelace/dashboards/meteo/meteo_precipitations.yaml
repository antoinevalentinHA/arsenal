button_card_templates: !include_dir_merge_named /config/19_button_card_templates

views:
  - badges: !include ../../includes/badges/base.yaml

    # ======================================================
    # 🌧️ CONTENU PRINCIPAL — FLUX VERTICAL CANON ARSENAL
    # ------------------------------------------------------
    # badges
    #   ↓
    # vertical-stack racine
    # ======================================================
    cards:
      - type: vertical-stack
        cards:
          # ------------------------------------------------------
          # 🧭 Navigation météo
          # ------------------------------------------------------
          - !include ../../includes/navigation/meteo.yaml

          # ======================================================
          # 🌦️ SECTION : Précipitations
          # ======================================================
          - type: custom:button-card
            template: section_header
            name: 🌦️ Précipitations

          # ------------------------------------------------------
          # 🧮 Indicateurs instantanés
          # ------------------------------------------------------
          - square: false
            type: grid
            columns: 3
            cards:
              - type: custom:button-card
                template: carte_precipitations_seuils_variables
                entity: sensor.pluviometre_precipitation_last_hour
                name: Préc. 1h
                variables:
                  seuil_faible: 0.2
                  seuil_modere: 1.0
                  seuil_forte: 5.0

              - type: custom:button-card
                template: carte_precipitations_seuils_variables
                entity: sensor.pluie_journaliere
                name: Aujourd’hui
                variables:
                  seuil_faible: 1
                  seuil_modere: 5
                  seuil_forte: 20

              - type: custom:button-card
                template: carte_precipitations_seuils_variables_tap
                entity: sensor.pluviometre_precipitation
                name: Intensité
                variables:
                  seuil_faible: 0.1
                  seuil_modere: 0.5
                  seuil_forte: 2.0

          # ------------------------------------------------------
          # 📈 Historique 7 jours
          # ------------------------------------------------------
          - !include ../../includes/cartes/graph_precipitations_semaine.yaml

          # ------------------------------------------------------
          # 📊 Pluie hebdomadaire — 52 semaines
          # ------------------------------------------------------
          - !include ../../includes/cartes/graph_precipitations_annee.yaml

          # ------------------------------------------------------
          # 🏆 Palmarès historique
          # ------------------------------------------------------
          - !include ../../includes/cartes/pluie_palmares.yaml

          # ------------------------------------------------------
          # 🚨 Détection pluie Zigbee (24h)
          # ------------------------------------------------------
          - type: history-graph
            entities:
              - entity: binary_sensor.zigbee_pluie_water_leak
            logarithmic_scale: true
            hours_to_show: 24
