button_card_templates: !include_dir_merge_named /config/19_button_card_templates

views:
  - badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre
        icon: mdi:alert
        tap_action:
          action: navigate
          navigation_path: /meteo-min-max-temperature-dashboard
        styles:
          icon:
            - color: "#B71C1C"

      - type: custom:button-card
        template: bouton_parametres_badge_carre
        tap_action:
          action: navigate
          navigation_path: /reglages-meteo-dashboard

      - type: custom:button-card
        template: bouton_diagnostics_badge_carre
        tap_action:
          action: navigate
          navigation_path: /meteo-backups-dashboard

    # ======================================================
    # 🌡️ CONTENU PRINCIPAL — FLUX VERTICAL CANON ARSENAL
    # ------------------------------------------------------
    # badges
    #   ↓
    # vertical-stack racine
    # ======================================================
    cards:
      - type: vertical-stack
        cards:
          # ------------------------------------------------------
          # 🧭 Navigation météo
          # ------------------------------------------------------
          - !include ../../includes/navigation/meteo.yaml

          # ======================================================
          # 🌿 JARDIN
          # ======================================================
          - !include ../../includes/section_headers/jardin.yaml

          - square: false
            type: grid
            columns: 1
            cards:
              - type: custom:button-card
                template: socle_kpi
                entity: sensor.temperature_jardin
                name: Température
                icon: mdi:thermometer
                tap_action:
                  action: more-info
                triggers_update:
                  - sensor.couleur_temperature_jardin

          # ======================================================
          # 🏡 RDC
          # ======================================================
          - !include ../../includes/section_headers/rdc.yaml

          - square: false
            type: grid
            columns: 2
            cards:
              - type: custom:button-card
                template: socle_kpi
                entity: sensor.temperature_entree
                name: Entrée
                icon: mdi:thermometer
                triggers_update:
                  - sensor.couleur_temperature_entree

              - type: custom:button-card
                template: socle_kpi
                entity: sensor.temperature_sejour
                name: Séjour
                icon: mdi:thermometer
                triggers_update:
                  - sensor.couleur_temperature_sejour

          # ======================================================
          # 🪜 ÉTAGE
          # ======================================================
          - !include ../../includes/section_headers/etage.yaml

          - square: false
            type: grid
            columns: 2
            cards:
              - type: custom:button-card
                template: socle_kpi
                entity: sensor.temperature_salle_de_jeux
                name: Salle de Jeux
                icon: mdi:thermometer
                triggers_update:
                  - sensor.couleur_temperature_salle_de_jeux

              - type: custom:button-card
                template: socle_kpi
                entity: sensor.temperature_palier
                name: Palier
                icon: mdi:thermometer
                triggers_update:
                  - sensor.couleur_temperature_palier

          # ======================================================
          # 🛏️ CHAMBRES
          # ======================================================
          - !include ../../includes/section_headers/chambres.yaml

          - square: false
            type: grid
            columns: 2
            cards:
              - type: custom:button-card
                template: socle_kpi
                entity: sensor.temperature_chambre_enfants
                name: Enfants
                icon: mdi:thermometer
                triggers_update:
                  - sensor.couleur_temperature_chambre_enfants

              - type: custom:button-card
                template: socle_kpi
                entity: sensor.temperature_chambre_parents
                name: Parents
                icon: mdi:thermometer
                triggers_update:
                  - sensor.couleur_temperature_chambre_parents

          # ======================================================
          # 🚿 SALLES DE BAIN
          # ======================================================
          - !include ../../includes/section_headers/salles_de_bain.yaml

          - square: false
            type: grid
            columns: 2
            cards:
              - type: custom:button-card
                template: socle_kpi
                entity: sensor.temperature_sdb_parents
                name: Parents
                icon: mdi:thermometer
                triggers_update:
                  - sensor.couleur_temperature_sdb_parents

              - type: custom:button-card
                template: socle_kpi
                entity: sensor.temperature_sdb_enfants
                name: Enfants
                icon: mdi:thermometer
                triggers_update:
                  - sensor.couleur_temperature_sdb_enfants

          # ======================================================
          # 🏘️ DÉPENDANCES
          # ======================================================
          - !include ../../includes/section_headers/dependances.yaml

          - square: false
            type: grid
            columns: 3
            cards:
              - type: custom:button-card
                template: socle_kpi
                entity: sensor.temperature_petite_maison
                name: Petite Maison
                icon: mdi:thermometer
                triggers_update:
                  - sensor.couleur_temperature_petite_maison

              - type: custom:button-card
                template: socle_kpi
                entity: sensor.temperature_garage
                name: Garage
                icon: mdi:thermometer
                triggers_update:
                  - sensor.couleur_temperature_garage

              - type: custom:button-card
                template: socle_kpi
                entity: sensor.temperature_cave
                name: Cave
                icon: mdi:thermometer
                triggers_update:
                  - sensor.couleur_temperature_cave
