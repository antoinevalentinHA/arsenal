button_card_templates: !include_dir_merge_named /config/19_button_card_templates

views:
  - badges: !include ../../includes/badges/base.yaml

    # ======================================================
    # 🏆 CONTENU PRINCIPAL — FLUX VERTICAL CANON ARSENAL
    # ------------------------------------------------------
    # badges
    #   ↓
    # vertical-stack racine
    #   ↓
    # résumé global compact (records n°1 des 4 palmarès)
    #   ↓
    # sélecteur de consultation (contexte d'interface)
    #   ↓
    # détail conditionnel (top-10 du palmarès choisi)
    # ======================================================
    cards:
      - type: vertical-stack
        cards:
          # ==================================================
          # 🏆 RÉSUMÉ GLOBAL — CONSULTATION / ARCHIVE
          # --------------------------------------------------
          # Carte markdown compacte : record n°1 des quatre
          # palmarès (rang 1 exposé par chaque capteur).
          # Écran de consultation : le signal « record récent »
          # reste porté UNIQUEMENT par le dashboard Navigation
          # (icône « Rec. météo »). Aucun bandeau de fraîcheur
          # ici, aucun calcul de fraîcheur.
          # ==================================================
          - type: custom:button-card
            template: section_header
            name: 🏆 Palmarès météo

          - type: markdown
            content: |
              {% set UNAV = [none, '', 'unknown', 'unavailable'] %}
              {% set cv = state_attr('sensor.palmares_temperature_journalier_chaud', 'rang_01_valeur') %}
              {% set cd = state_attr('sensor.palmares_temperature_journalier_chaud', 'rang_01_date') %}
              {% set cda = state_attr('sensor.palmares_temperature_journalier_chaud', 'rang_01_date_affichage') %}
              {% set fv = state_attr('sensor.palmares_temperature_journalier_froid', 'rang_01_valeur') %}
              {% set fd = state_attr('sensor.palmares_temperature_journalier_froid', 'rang_01_date') %}
              {% set fda = state_attr('sensor.palmares_temperature_journalier_froid', 'rang_01_date_affichage') %}
              {% set nv = state_attr('sensor.palmares_temperature_min_journaliere_haute', 'rang_01_valeur') %}
              {% set nd = state_attr('sensor.palmares_temperature_min_journaliere_haute', 'rang_01_date') %}
              {% set nda = state_attr('sensor.palmares_temperature_min_journaliere_haute', 'rang_01_date_affichage') %}
              {% set r = state_attr('sensor.palmares_pluie_journalier', 'records') or [] %}
              {% set c_ok = cv is not none and cd not in UNAV %}
              {% set f_ok = fv is not none and fv != 999 and fd not in UNAV %}
              {% set n_ok = nv is not none and nv != -999 and nd not in UNAV %}
              {% set p_ok = r | count > 0 %}
              {% set cval = (cv ~ ' °C') if c_ok else '—' %}
              {% set fval = (fv ~ ' °C') if f_ok else '—' %}
              {% set nval = (nv ~ ' °C') if n_ok else '—' %}
              {% set pval = (r[0].valeur ~ ' mm') if p_ok else '—' %}
              {% set cdt = cda if c_ok else '—' %}
              {% set fdt = fda if f_ok else '—' %}
              {% set ndt = nda if n_ok else '—' %}
              {% set pdt = r[0].date_affichage if p_ok else '—' %}
              ```text
              {{ "%-12s"|format('Chaleur') }}{{ "%8s"|format(cval) }}  {{ "%-10s"|format(cdt) }}  🔥
              {{ "%-12s"|format('Froid') }}{{ "%8s"|format(fval) }}  {{ "%-10s"|format(fdt) }}  ❄️
              {{ "%-12s"|format('Nuit chaude') }}{{ "%8s"|format(nval) }}  {{ "%-10s"|format(ndt) }}  🌙
              {{ "%-12s"|format('Pluie') }}{{ "%8s"|format(pval) }}  {{ "%-10s"|format(pdt) }}  🌧️
              ```

          # ==================================================
          # 🔎 SÉLECTEUR DE CONSULTATION (sobre — modèle Clim)
          # --------------------------------------------------
          # input_select.palmares_meteo_affichage = contexte
          # d'interface (ne pilote rien, ne décide rien).
          # ==================================================
          - type: custom:button-card
            template: section_header
            name: 🔎 Palmarès affiché

          - type: tile
            entity: input_select.palmares_meteo_affichage
            name: Palmarès affiché
            features_position: bottom
            features:
              - type: select-options

          # ==================================================
          # 📋 DÉTAIL CONDITIONNEL — TOP 10 DU PALMARÈS CHOISI
          # --------------------------------------------------
          # Cartes réutilisées verbatim (aucune entité ni
          # capteur modifié). Le badge « 🔥 récent » propre à
          # chaque carte reste inchangé.
          # ==================================================
          - type: conditional
            conditions:
              - entity: input_select.palmares_meteo_affichage
                state: Chaleur
            card:
              type: vertical-stack
              cards:
                - type: custom:button-card
                  template: section_header
                  name: 🌡️ Records de chaleur
                - !include ../../includes/cartes/meteo/palmares/palmares_temperature_chaude.yaml

          - type: conditional
            conditions:
              - entity: input_select.palmares_meteo_affichage
                state: Froid
            card:
              type: vertical-stack
              cards:
                - type: custom:button-card
                  template: section_header
                  name: ❄️ Records de froid
                - !include ../../includes/cartes/meteo/palmares/palmares_temperature_froide.yaml

          - type: conditional
            conditions:
              - entity: input_select.palmares_meteo_affichage
                state: Nuits chaudes
            card:
              type: vertical-stack
              cards:
                - type: custom:button-card
                  template: section_header
                  name: 🌙 Records de nuits chaudes
                - !include ../../includes/cartes/meteo/palmares/palmares_temperature_min_haute.yaml

          - type: conditional
            conditions:
              - entity: input_select.palmares_meteo_affichage
                state: Précipitations
            card:
              type: vertical-stack
              cards:
                - type: custom:button-card
                  template: section_header
                  name: 🌧️ Records de précipitations
                - !include ../../includes/cartes/meteo/palmares/pluie_palmares.yaml
