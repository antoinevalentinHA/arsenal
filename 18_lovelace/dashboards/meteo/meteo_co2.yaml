button_card_templates: !include_dir_merge_named /config/19_button_card_templates

views:
  - badges: !include ../../includes/badges/base.yaml

    # ======================================================
    # 🫁 CONTENU PRINCIPAL — FLUX VERTICAL CANON ARSENAL
    # ------------------------------------------------------
    # badges
    #   ↓
    # vertical-stack racine
    # ======================================================
    cards:
      - type: vertical-stack
        cards:
          # ------------------------------------------------------
          # 🧭 Navigation météo / qualité air
          # ------------------------------------------------------
          - !include ../../includes/navigation/meteo.yaml

          # ======================================================
          # 🏠 RDC
          # ======================================================
          - !include ../../includes/section_headers/rdc.yaml

          - square: false
            type: grid
            columns: 2
            cards:
              - type: custom:button-card
                template: socle_kpi
                entity: sensor.co2_entree
                name: Entrée
                icon: mdi:molecule-co2
                variables:
                  ui_profile: arsenal
                triggers_update:
                  - sensor.couleur_co2_entree

              - type: custom:button-card
                template: socle_kpi
                entity: sensor.co2_sejour
                name: Séjour
                icon: mdi:molecule-co2
                variables:
                  ui_profile: arsenal
                triggers_update:
                  - sensor.couleur_co2_sejour

          # ======================================================
          # 🛏️ CHAMBRES
          # ======================================================
          - !include ../../includes/section_headers/chambres.yaml

          - square: false
            type: grid
            columns: 3
            cards:
              - type: custom:button-card
                template: socle_kpi
                entity: sensor.co2_chambre_enfants
                name: Enfants
                icon: mdi:molecule-co2
                variables:
                  ui_profile: arsenal
                triggers_update:
                  - sensor.couleur_co2_chambre_enfants

              - type: custom:button-card
                template: socle_kpi
                entity: sensor.co2_chambre_matthieu
                name: Matthieu
                icon: mdi:molecule-co2
                variables:
                  ui_profile: arsenal
                triggers_update:
                  - sensor.couleur_co2_chambre_matthieu

              - type: custom:button-card
                template: socle_kpi
                entity: sensor.co2_chambre_parents
                name: Parents
                icon: mdi:molecule-co2
                variables:
                  ui_profile: arsenal
                triggers_update:
                  - sensor.couleur_co2_chambre_parents

          # ======================================================
          # 🛏️ PETITE MAISON
          # ======================================================

          - !include ../../includes/section_headers/petite_maison.yaml

          - type: custom:button-card
            template: socle_kpi
            entity: sensor.co2_petite_maison
            name: Petite Maison
            icon: mdi:molecule-co2
            variables:
              ui_profile: arsenal
            triggers_update:
              - sensor.couleur_co2_petite_maison
