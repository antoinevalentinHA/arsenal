button_card_templates: !include_dir_merge_named /config/19_button_card_templates

views:
  - badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

    cards:
      - type: vertical-stack
        cards:
          # ======================================================
          # 🟦 BARRE DE NAVIGATION MÉTÉO
          # ======================================================
          - !include ../../includes/navigation/meteo.yaml

          # ✅ Bandeau de validité (conditionnel)
          - !include ../../includes/alerte_configuration_invalide.yaml

          # ======================================================
          # 🌡️ CALIBRATION ZIGBEE
          # ======================================================
          - type: custom:button-card
            template: section_header
            name: 🌡️ Calibration Zigbee

          - type: custom:button-card
            template: carte_action_standard_warning
            entity: script.calibration_capteurs_zigbee
            name: Calibration Zigbee
            icon: mdi:axis-z-rotate-clockwise
            variables:
              confirmation: "⚠️ Lancer la calibration des capteurs Zigbee ?"

          - type: custom:button-card
            template: carte_action_standard_warning
            entity: script.reset_calibration_capteurs_zigbee
            name: Reset Calibration Zigbee
            icon: mdi:restart-alert
            variables:
              confirmation: "⚠️ Réinitialiser la calibration des capteurs Zigbee ?"
