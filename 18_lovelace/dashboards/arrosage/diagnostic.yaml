button_card_templates: !include_dir_merge_named /config/19_button_card_templates

# ==========================================================
# 🩺 ARROSAGE — DIAGNOSTIC (explication du raisonnement du domaine)
# ----------------------------------------------------------
# Vue 100 % LECTURE. Répond à « pourquoi le domaine Arrosage
# arrive-t-il à ce verdict ? ». Lecture par DOMAINE (précipitations,
# sol, climat, exécution) ; à l'intérieur de chaque domaine la
# micro-causalité est conservée : faits observés → conclusion métier.
# Le canal climatique (ET₀/VPD) est en OBSERVATION À BLANC :
# il ne participe pas encore à la décision (entrera via C11).
#
# Cadrage : audits/02_conception/arrosage/cadrage_dashboard_diagnostic_arrosage.md
# Réutilisation exclusive des socles/templates/cartes existants ;
# aucune logique métier/graphique ici (le runtime décide, l'UI
# explique) ; seul lien de navigation : santé du pont (Système).
# ==========================================================

views:
  - badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

      - type: custom:button-card
        template: bouton_retour_badge_carre
        tap_action:
          action: navigate
          navigation_path: /arrosage-dashboard

    cards:
      - type: vertical-stack
        cards:
          # =========================================================
          # Le VERDICT (intention + raison) vit sur le cockpit
          # /arrosage-dashboard. Ce Diagnostic explique le POURQUOI,
          # rangé PAR DOMAINE ; dans chaque domaine : faits → conclusion.
          # =========================================================
          # 🌧️ Précipitations — faits pluie → conclusion (suspension)
          # =========================================================
          - type: custom:button-card
            template: section_header
            name: 🌧️ Précipitations

          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:button-card
                template: carte_kpi_bleu
                entity: sensor.pluie_cumul_24h
                name: Cumul 24 h
                icon: mdi:weather-rainy

              - type: custom:button-card
                template: carte_kpi_bleu
                entity: sensor.pluie_cumul_48h
                name: Cumul 48 h
                icon: mdi:weather-rainy

              - type: custom:button-card
                template: carte_kpi_bleu
                entity: sensor.pluie_cumul_72h
                name: Cumul 72 h
                icon: mdi:weather-rainy

              - type: custom:button-card
                template: carte_kpi_bleu
                entity: sensor.pluie_prevue
                name: Pluie prévue
                icon: mdi:weather-pouring

          # Conclusion métier du domaine précipitations.
          - type: custom:button-card
            template: carte_arrosage_pluie_raison
            entity: binary_sensor.arrosage_suspension_pluie

          # =========================================================
          # 🌱 Sol — faits réservoir lent → conclusion (besoin sol)
          # =========================================================
          - type: custom:button-card
            template: section_header
            name: 🌱 Sol

          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:button-card
                template: carte_etat_interprete
                entity: sensor.jardin_reservoir_sol_etat
                name: État réservoir sol
                icon: mdi:cup-water
                variables:
                  couleurs:
                    complet: 'rgba(76, 175, 80, 0.2)'
                    degrade: 'rgba(255, 235, 59, 0.2)'
                    insuffisant: 'rgba(255, 152, 0, 0.2)'
                    indisponible: 'rgba(158, 158, 158, 0.1)'

              - type: custom:button-card
                template: carte_kpi_bleu
                entity: sensor.jardin_humidite_sol_points_frais
                name: Points frais
                icon: mdi:check-decagram

          # Conclusion métier du domaine sol.
          - type: custom:button-card
            template: carte_mode_binaire_interprete
            entity: binary_sensor.arrosage_besoin_sol
            name: Besoin sol
            icon: mdi:sprout
            variables:
              label_on: Besoin détecté
              label_off: Sol suffisant
              color_on: 'rgba(255, 152, 0, 0.2)'
              color_off: 'rgba(76, 175, 80, 0.2)'

          # =========================================================
          # 🌡️ Climat (observation à blanc, hors décision V1)
          # =========================================================
          - type: custom:button-card
            template: section_header
            name: 🌡️ Climat

          - type: markdown
            content: >-
              **Observation à blanc.** Ce canal (ET₀ / VPD) est observé mais **ne
              participe pas encore à la décision d'arrosage**. Il entrera dans le
              raisonnement avec **C11** (modulation de durée).

          # Tendances d'observation — mêmes réglages que « Humidité du sol »
          # du cockpit principal. ET₀ et VPD tracés SÉPARÉMENT : unités et
          # dynamiques distinctes (mm/j lente vs kPa instantané), jamais
          # fondus en un axe partagé (contrat 16 §5).
          - type: custom:mini-graph-card
            name: 🌞 ET₀ journalière
            icon: mdi:sun-thermometer-outline
            entities:
              - entity: sensor.arrosage_demande_climatique_et0
                name: ET₀
            hours_to_show: 72
            points_per_hour: 4
            line_width: 3
            animate: true
            smoothing: true
            show:
              labels: true
              legend: false
              extrema: true
              fill: fade
              icon: false
            font_size: 75
            height: 160
            align_state: center
            decimals: 2
            tap_action:
              action: more-info

          - type: custom:mini-graph-card
            name: 💧 VPD courant
            icon: mdi:water-opacity
            entities:
              - entity: sensor.arrosage_demande_climatique_vpd
                name: VPD
            hours_to_show: 72
            points_per_hour: 4
            line_width: 3
            animate: true
            smoothing: true
            show:
              labels: true
              legend: false
              extrema: true
              fill: fade
              icon: false
            font_size: 75
            height: 160
            align_state: center
            decimals: 2
            tap_action:
              action: more-info

          - type: custom:button-card
            template: carte_etat_interprete
            entity: sensor.arrosage_demande_climatique_etat
            name: État du canal climatique
            icon: mdi:weather-partly-cloudy
            variables:
              couleurs:
                complet: 'rgba(76, 175, 80, 0.2)'
                degrade: 'rgba(255, 235, 59, 0.2)'
                indisponible: 'rgba(158, 158, 158, 0.1)'

          # =========================================================
          # 🛠️ Exécution — l'acte et sa preuve
          # =========================================================
          - type: custom:button-card
            template: section_header
            name: 🛠️ Exécution

          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:button-card
                template: status_72_on_off
                entity: switch.rain_bird_bat_bt_2_e9a3_station_1
                name: Station 1 active
                icon: mdi:sprinkler-variant

              - type: custom:button-card
                template: socle_info_72
                entity: sensor.arrosage_dernier_effectif
                name: Dernier arrosage prouvé
                icon: mdi:history
