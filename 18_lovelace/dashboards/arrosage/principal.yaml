button_card_templates: !include_dir_merge_named /config/19_button_card_templates

views:
  - badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

      - type: custom:button-card
        template: bouton_parametres_badge_carre
        tap_action:
          action: navigate
          navigation_path: /reglages-arrosage-dashboard

    # ==========================================================
    # 💧 ARROSAGE — VUE MÉTIER & COMMANDE MANUELLE
    # ----------------------------------------------------------
    # 1) Contexte pluie et suspension : observation seule.
    # 2) Commande manuelle supervisée de la station 1 (Run / Stop) :
    #    chaque action sous confirmation, envoyée uniquement via les
    #    scripts supervisés (gardes runtime incluses). Les seuils et la
    #    durée modifiables vivent dans /reglages-arrosage-dashboard.
    # ==========================================================
    cards:
      - type: vertical-stack
        cards:
          # =========================================================
          # 🌧️ Pluie observée & prévue
          # =========================================================
          - type: custom:button-card
            template: section_header
            name: 🌧️ Pluie observée & prévue

          - type: custom:button-card
            template: carte_arrosage_pluie_raison
            entity: binary_sensor.arrosage_suspension_pluie
          # =========================================================
          # 🌱 Humidité du sol (réservoir lent)
          # =========================================================
          - type: custom:button-card
            template: section_header
            name: 🌱 Humidité du sol

          - type: custom:mini-graph-card
            name: 🌱 Humidité du sol
            icon: mdi:water-percent
            entities:
              - entity: sensor.jardin_humidite_sol_mediane
                name: Médiane
            hours_to_show: 72
            points_per_hour: 4
            line_width: 3
            animate: true
            smoothing: true
            show:
              labels: true
              legend: false
              extrema: true
              fill: fade
              icon: false
            font_size: 75
            height: 160
            align_state: center
            decimals: 1
            tap_action:
              action: more-info

          # =========================================================
          # 🤖 État de l'automatisme (lecture)
          # =========================================================
          # Lecture seule de la chaîne de décision V1 : intention, besoin sol,
          # dernier arrosage effectif. Le maître (input_boolean.arrosage_
          # automatique_actif) reste réglable dans /reglages-arrosage-dashboard
          # et n'est PAS exposé ici. Le verdict d'intention et sa raison sont
          # groupés en grille 2 colonnes ; besoin sol et dernier arrosage
          # restent pleine largeur dessous.
          - type: custom:button-card
            template: section_header
            name: 🤖 État de l'automatisme

          # Verdict d'intention + sa raison lisible (catégorie + motif dominant,
          # déjà calculés par le runtime ; traduction portée par la carte),
          # côte à côte en grille 2 colonnes.
          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:button-card
                template: carte_mode_binaire_interprete
                entity: binary_sensor.arrosage_intention
                name: Intention
                icon: mdi:water-sync
                variables:
                  label_on: Arrosage souhaité
                  label_off: Aucun arrosage souhaité
                  color_on: 'rgba(33, 150, 243, 0.2)'
                  color_off: 'rgba(158, 158, 158, 0.2)'

              - type: custom:button-card
                template: carte_arrosage_intention_raison
                entity: binary_sensor.arrosage_intention

          - type: custom:button-card
            template: carte_mode_binaire_interprete
            entity: binary_sensor.arrosage_besoin_sol
            name: Besoin sol
            icon: mdi:sprout
            variables:
              label_on: Besoin détecté
              label_off: Sol suffisant
              color_on: 'rgba(255, 152, 0, 0.2)'
              color_off: 'rgba(76, 175, 80, 0.2)'

          - type: tile
            entity: sensor.arrosage_dernier_effectif
            name: Dernier arrosage
            icon: mdi:history
            tap_action:
              action: more-info

          # =========================================================
          # 💧 Commande manuelle supervisée (station 1)
          # =========================================================
          - type: custom:button-card
            template: section_header
            name: 💧 Commande manuelle supervisée

          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:button-card
                template: carte_action_arrosage_script
                entity: script.arrosage_rain_bird_station_1_courte_supervisee
                name: Démarrer station 1
                icon: mdi:sprinkler-variant
                variables:
                  confirmation: "Démarrer l'arrosage supervisé de la station 1 ?"

              - type: custom:button-card
                template: carte_action_arrosage_script
                entity: script.arrosage_rain_bird_stop_supervise
                name: Arrêter station 1
                icon: mdi:stop
                variables:
                  confirmation: "Arrêter l'arrosage Rain Bird en cours ?"
