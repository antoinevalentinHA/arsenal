button_card_templates: !include_dir_merge_named /config/19_button_card_templates

views:
  - badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

      - type: custom:button-card
        template: bouton_parametres_badge_carre
        tap_action:
          action: navigate
          navigation_path: /reglages-arrosage-dashboard

    # ==========================================================
    # 💧 ARROSAGE — VUE MÉTIER & COMMANDE MANUELLE
    # ----------------------------------------------------------
    # 1) Contexte pluie et suspension : observation seule.
    # 2) Commande manuelle supervisée de la station 1 (Run / Stop) :
    #    chaque action sous confirmation, envoyée uniquement via les
    #    scripts supervisés (gardes runtime incluses). Les seuils et la
    #    durée modifiables vivent dans /reglages-arrosage-dashboard.
    # ==========================================================
    cards:
      - type: vertical-stack
        cards:
          # =========================================================
          # 🌧️ Pluie observée & prévue
          # =========================================================
          - type: custom:button-card
            template: section_header
            name: 🌧️ Pluie observée & prévue

          - type: grid
            columns: 3
            square: false
            cards:
              - type: custom:button-card
                template: carte_kpi_bleu
                entity: sensor.pluie_cumul_24h
                name: Cumul 24 h
                icon: mdi:weather-rainy

              - type: custom:button-card
                template: carte_kpi_bleu
                entity: sensor.pluie_cumul_48h
                name: Cumul 48 h
                icon: mdi:weather-rainy

              - type: custom:button-card
                template: carte_kpi_bleu
                entity: sensor.pluie_cumul_72h
                name: Cumul 72 h
                icon: mdi:weather-pouring

          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:button-card
                template: carte_kpi_bleu
                entity: sensor.pluie_prevue
                name: Pluie prévue
                icon: mdi:weather-cloudy-clock

              - type: custom:button-card
                template: carte_etat_binaire_interprete_inverse
                entity: binary_sensor.arrosage_suspension_pluie
                name: Suspension pluie
                icon: mdi:water-off
                variables:
                  label_on: Suspension pluie
                  label_off: Pas de suspension
                  color_on: 'rgba(33, 150, 243, 0.2)'
                  color_off: 'rgba(158, 158, 158, 0.2)'
                tap_action:
                  action: none
                hold_action:
                  action: none
                double_tap_action:
                  action: none

          - type: markdown
            content: >
              <div style="font-size: 13px; line-height: 1.6;">
              <b>Diagnostic suspension pluie :</b><br>
              • Motif : {{ state_attr('binary_sensor.arrosage_suspension_pluie', 'motif') or '—' }}<br>
              • Fiabilité : {{ state_attr('binary_sensor.arrosage_suspension_pluie', 'fiabilite') or '—' }}
              </div>
            text_only: true

          # =========================================================
          # 💧 Commande manuelle supervisée (station 1)
          # =========================================================
          - type: custom:button-card
            template: section_header
            name: 💧 Commande manuelle supervisée

          - type: markdown
            content: >
              <div style="font-size: 13px; line-height: 1.45;">
              Commandes <b>supervisées</b> de la station 1 Rain Bird. Chaque
              action demande une <b>confirmation</b> et n'envoie la commande
              native qu'à travers son script (gardes runtime incluses).
              La durée se règle dans <i>/reglages-arrosage-dashboard</i>.
              </div>

          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:button-card
                template: carte_action_standard_warning
                entity: script.arrosage_rain_bird_station_1_courte_supervisee
                name: Arroser station 1
                icon: mdi:sprinkler-variant
                variables:
                  confirmation: "⚠️ Lancer l'arrosage supervisé de la station 1 ?"
                  service: script.turn_on
                  data:
                    entity_id: script.arrosage_rain_bird_station_1_courte_supervisee

              - type: custom:button-card
                template: carte_action_standard
                entity: script.arrosage_rain_bird_stop_supervise
                name: "Arrêter l'arrosage"
                icon: mdi:stop
                variables:
                  confirmation: "Arrêter l'arrosage Rain Bird en cours ?"
                  service: script.turn_on
                  data:
                    entity_id: script.arrosage_rain_bird_stop_supervise
