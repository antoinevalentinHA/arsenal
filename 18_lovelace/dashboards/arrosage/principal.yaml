button_card_templates: !include_dir_merge_named /config/19_button_card_templates

views:
  - badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

      - type: custom:button-card
        template: bouton_parametres_badge_carre
        tap_action:
          action: navigate
          navigation_path: /reglages-arrosage-dashboard

    # ==========================================================
    # 💧 ARROSAGE — VUE MÉTIER & COMMANDE MANUELLE
    # ----------------------------------------------------------
    # 1) Contexte pluie et suspension : observation seule.
    # 2) Commande manuelle supervisée de la station 1 (Run / Stop) :
    #    chaque action sous confirmation, envoyée uniquement via les
    #    scripts supervisés (gardes runtime incluses). Les seuils et la
    #    durée modifiables vivent dans /reglages-arrosage-dashboard.
    # ==========================================================
    cards:
      - type: vertical-stack
        cards:
          # =========================================================
          # 🌧️ Pluie observée & prévue
          # =========================================================
          - type: custom:button-card
            template: section_header
            name: 🌧️ Pluie observée & prévue

          - type: grid
            columns: 3
            square: false
            cards:
              - type: custom:button-card
                template: carte_kpi_bleu
                entity: sensor.pluie_cumul_24h
                name: Cumul 24 h
                icon: mdi:weather-rainy

              - type: custom:button-card
                template: carte_kpi_bleu
                entity: sensor.pluie_cumul_48h
                name: Cumul 48 h
                icon: mdi:weather-rainy

              - type: custom:button-card
                template: carte_kpi_bleu
                entity: sensor.pluie_cumul_72h
                name: Cumul 72 h
                icon: mdi:weather-pouring

          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:button-card
                template: carte_kpi_bleu
                entity: sensor.pluie_prevue
                name: Pluie prévue
                icon: mdi:weather-cloudy-clock

              - type: custom:button-card
                template: carte_arrosage_pluie_raison
                entity: binary_sensor.arrosage_suspension_pluie
          # =========================================================
          # 🌱 Humidité du sol (réservoir lent)
          # =========================================================
          - type: custom:button-card
            template: section_header
            name: 🌱 Humidité du sol

          - type: custom:mini-graph-card
            name: 🌱 Humidité du sol
            icon: mdi:water-percent
            entities:
              - entity: sensor.jardin_humidite_sol_mediane
                name: Médiane
              - entity: sensor.jardin_humidite_sol_minimum
                name: Minimum
              - entity: input_number.arrosage_seuil_humidite_declenchement
                name: Seuil
                color: rgba(158, 158, 158, 0.2)
                show_state: true
                show_fill: false
            hours_to_show: 72
            points_per_hour: 4
            line_width: 3
            animate: true
            smoothing: true
            show:
              labels: true
              legend: true
              extrema: true
              fill: fade
              icon: false
            font_size: 75
            height: 160
            align_state: center
            decimals: 1
            tap_action:
              action: more-info

          # =========================================================
          # 💧 Commande manuelle supervisée (station 1)
          # =========================================================
          - type: custom:button-card
            template: section_header
            name: 💧 Commande manuelle supervisée

          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:button-card
                template: carte_action_arrosage_script
                entity: script.arrosage_rain_bird_station_1_courte_supervisee
                name: Démarrer station 1
                icon: mdi:sprinkler-variant
                variables:
                  confirmation: "Démarrer l'arrosage supervisé de la station 1 ?"

              - type: custom:button-card
                template: carte_action_arrosage_script
                entity: script.arrosage_rain_bird_stop_supervise
                name: Arrêter station 1
                icon: mdi:stop
                variables:
                  confirmation: "Arrêter l'arrosage Rain Bird en cours ?"
