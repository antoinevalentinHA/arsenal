button_card_templates: !include_dir_merge_named /config/19_button_card_templates

views:
  - badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

      - type: custom:button-card
        template: bouton_parametres_badge_carre
        tap_action:
          action: navigate
          navigation_path: /reglages-arrosage-dashboard

      - type: custom:button-card
        template: bouton_diagnostics_badge_carre
        tap_action:
          action: navigate
          navigation_path: /diagnostics-arrosage-dashboard

    # ==========================================================
    # 💧 ARROSAGE — COCKPIT D'USAGE (verdict + commande)
    # ----------------------------------------------------------
    # Répond à « que fait le système ? » (verdict d'intention + raison)
    # et « quelle action ? » (Run / Stop supervisés, sous confirmation).
    # Le « POURQUOI » détaillé (observations pluie/sol, pont, ET₀/VPD,
    # exécution) vit sur /diagnostics-arrosage-dashboard ; les réglages
    # sur /reglages-arrosage-dashboard. Aucun recouvrement voulu.
    # ==========================================================
    cards:
      - type: vertical-stack
        cards:
          # =========================================================
          # ⚖️ Décision (intention + raison)
          # =========================================================
          # Décision d'intention + sa raison lisible (catégorie + motif dominant,
          # déjà calculés par le runtime ; traduction portée par la carte),
          # EMPILÉES pleine largeur : la grille 2 colonnes tronquait le libellé
          # d'intention sur mobile et créait des hauteurs disparates depuis que
          # la raison porte deux lignes de contexte. Le « pourquoi » détaillé
          # (besoin, suspension, sol, pont, exécution, ET₀/VPD) vit sur le
          # Diagnostic. En-tête via l'include partagé (idiome Arsenal).
          - !include ../../includes/section_headers/decision.yaml
          - type: custom:button-card
            template: carte_mode_binaire_interprete
            entity: binary_sensor.arrosage_intention
            name: Intention
            icon: mdi:water-sync
            variables:
              label_on: Arrosage souhaité
              label_off: Pas de déclenchement maintenant
              color_on: 'rgba(33, 150, 243, 0.2)'
              color_off: 'rgba(158, 158, 158, 0.2)'

          - type: custom:button-card
            template: carte_arrosage_intention_raison
            entity: binary_sensor.arrosage_intention

          # =========================================================
          # 🌱 Humidité du sol (tendance 72 h) — repère d'usage
          # =========================================================
          - type: custom:button-card
            template: section_header
            name: 🌱 Humidité du sol

          - type: custom:mini-graph-card
            name: 🌱 Humidité du sol
            icon: mdi:water-percent
            entities:
              - entity: sensor.jardin_humidite_sol_mediane
                name: Médiane
            hours_to_show: 72
            points_per_hour: 4
            line_width: 3
            animate: true
            smoothing: true
            show:
              labels: true
              legend: false
              extrema: true
              fill: fade
              icon: false
            font_size: 75
            height: 160
            align_state: center
            decimals: 1
            tap_action:
              action: more-info

          # =========================================================
          # 💧 Commande manuelle supervisée (station 1)
          # =========================================================
          - type: custom:button-card
            template: section_header
            name: 💧 Commande manuelle supervisée

          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:button-card
                template: carte_action_arrosage_script
                entity: script.arrosage_rain_bird_station_1_courte_supervisee
                name: Démarrer station 1
                icon: mdi:sprinkler-variant
                variables:
                  confirmation: "Démarrer l'arrosage supervisé de la station 1 ?"

              - type: custom:button-card
                template: carte_action_arrosage_script
                entity: script.arrosage_rain_bird_stop_supervise
                name: Arrêter station 1
                icon: mdi:stop
                variables:
                  confirmation: "Arrêter l'arrosage Rain Bird en cours ?"
