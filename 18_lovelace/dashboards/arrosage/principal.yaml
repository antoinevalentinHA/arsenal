button_card_templates: !include_dir_merge_named /config/19_button_card_templates

views:
  - badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

      - type: custom:button-card
        template: bouton_parametres_badge_carre
        tap_action:
          action: navigate
          navigation_path: /reglages-arrosage-dashboard

    # ==========================================================
    # 💧 ARROSAGE — VUE MÉTIER (lecture seule)
    # ----------------------------------------------------------
    # Contexte pluie et suspension. Observation seule : aucune
    # carte n'est actionnable, aucun paramétrage ici. Les seuils
    # modifiables vivent dans /reglages-arrosage-dashboard.
    # ==========================================================
    cards:
      - type: vertical-stack
        cards:
          # =========================================================
          # 🌧️ Pluie observée & prévue
          # =========================================================
          - type: custom:button-card
            template: section_header
            name: 🌧️ Pluie observée & prévue

          - type: grid
            columns: 3
            square: false
            cards:
              - type: custom:button-card
                template: carte_kpi_bleu
                entity: sensor.pluie_cumul_24h
                name: Cumul 24 h
                icon: mdi:weather-rainy

              - type: custom:button-card
                template: carte_kpi_bleu
                entity: sensor.pluie_cumul_48h
                name: Cumul 48 h
                icon: mdi:weather-rainy

              - type: custom:button-card
                template: carte_kpi_bleu
                entity: sensor.pluie_cumul_72h
                name: Cumul 72 h
                icon: mdi:weather-pouring

          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:button-card
                template: carte_kpi_bleu
                entity: sensor.pluie_prevue
                name: Pluie prévue
                icon: mdi:weather-cloudy-clock

              - type: custom:button-card
                template: carte_etat_binaire_interprete_inverse
                entity: binary_sensor.arrosage_suspension_pluie
                name: Suspension pluie
                icon: mdi:water-off
                variables:
                  label_on: Suspension pluie
                  label_off: Pas de suspension
                  color_on: 'rgba(33, 150, 243, 0.2)'
                  color_off: 'rgba(158, 158, 158, 0.2)'
                tap_action:
                  action: none
                hold_action:
                  action: none
                double_tap_action:
                  action: none

          - type: markdown
            content: >
              <div style="font-size: 13px; line-height: 1.6;">
              <b>Diagnostic suspension pluie :</b><br>
              • Motif : {{ state_attr('binary_sensor.arrosage_suspension_pluie', 'motif') or '—' }}<br>
              • Fiabilité : {{ state_attr('binary_sensor.arrosage_suspension_pluie', 'fiabilite') or '—' }}
              </div>
            text_only: true
