button_card_templates: !include_dir_merge_named /config/19_button_card_templates

views:
  - badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

      - type: custom:button-card
        template: bouton_parametres_badge_carre
        tap_action:
          action: navigate
          navigation_path: /reglages-ecs-petite-maison-dashboard

    cards:
      - type: vertical-stack
        cards:
          ########################################################
          # 🔥 ÉTAT DU CUMULUS
          ########################################################

          - type: custom:button-card
            template: section_header
            name: 🔥 État du cumulus

          - type: custom:button-card
            template: carte_ecs_petite_maison_chauffe

          - type: grid
            square: false
            columns: 2
            cards:
              - type: custom:button-card
                template: carte_ecs_petite_maison_etat_cumulus
                entity: sensor.ecs_petite_maison_temperature_eau_locale
                name: Eau chaude
                icon: mdi:water-thermometer

              - type: custom:button-card
                template: carte_kpi_bleu
                entity: sensor.ecs_petite_maison_nombre_douches_restant_local
                name: Douches
                icon: mdi:shower

          ########################################################
          # ⚙️ FONCTIONNEMENT
          ########################################################

          - type: custom:button-card
            template: section_header
            name: ⚙️ Fonctionnement

          - type: custom:button-card
            template: carte_ecs_petite_maison_mode

          ########################################################
          # 📈 HISTORIQUE
          ########################################################

          - !include ../includes/section_headers/historique.yaml

          - !include ../includes/cartes/ecs/graph_temperature_ecs_petite_maison.yaml

          - type: history-graph
            entities:
              - entity: sensor.ecs_petite_maison_chauffe_en_cours_locale
            logarithmic_scale: true
