button_card_templates: !include_dir_merge_named /config/19_button_card_templates

views:
  - badges: !include ../includes/badges/diagnostics_systeme.yaml

    ########################################################
    # 📐 VERTICAL STACK PRINCIPAL
    ########################################################
    cards:
      - type: vertical-stack
        cards:
          ####################################################
          # 🆔 AIDE A LA NUMEROTATION DES AUTOMATISATIONS
          ####################################################
          - type: custom:button-card
            template: section_header
            name: 🆔 ID Automatisations

          - type: tile
            entity: input_select.prefix_id_select
            name: Domaine d'automatisations
            features_position: bottom
            features:
              - type: select-options

          - type: custom:button-card
            template: socle_action_simple
            name: Générer prochain ID
            icon: mdi:calculator
            tap_action:
              action: call-service
              service: script.generate_next_id_from_prefix

          - type: tile
            entity: input_text.next_id_result
            name: Prochain ID disponible
