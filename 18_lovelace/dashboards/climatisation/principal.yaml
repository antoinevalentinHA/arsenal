button_card_templates: !include_dir_merge_named /config/19_button_card_templates

views:
  - badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

      - type: custom:button-card
        template: bouton_parametres_badge_carre
        tap_action:
          action: navigate
          navigation_path: /reglages-climatisation-dashboard

      - type: custom:button-card
        template: bouton_diagnostics_badge_carre
        tap_action:
          action: navigate
          navigation_path: /diagnostics-climatisation-dashboard

    cards:
      - type: vertical-stack
        cards:
          # ==================================================
          # ❄️ CLIMATISEUR — SYNTHÈSE & OPTIONS
          # ==================================================
          - type: grid
            square: false
            columns: 1
            cards:
              - type: custom:button-card
                template: section_header
                name: ❄️ Climatiseur

              - type: custom:button-card
                template: carte_clim_synthese

              # Mode de ventilation réellement appliqué (statut passif)
              - type: custom:button-card
                template: carte_clim_ventilation

          # ==================================================
          # 🧠 DÉCISION
          # ==================================================
          - !include ../../includes/section_headers/decision.yaml

          - type: custom:button-card
            template: carte_clim_decision
            entity: sensor.clim_action_en_cours

          # ==================================================
          # ⚖️ CONDITIONS — MODE AFFICHÉ
          # ==================================================
          - type: grid
            square: false
            columns: 1
            cards:
              - !include ../../includes/section_headers/conditions.yaml

              - type: tile
                entity: input_select.clim_conditions_mode
                name: Mode affiché
                features_position: bottom
                features:
                  - type: select-options

          # ==================================================
          # 🩺 DIAGNOSTICS PAR MODE — BLOCS CONDITIONNELS
          # --------------------------------------------------
          # Un seul `type: conditional` par mode, portant le
          # verdict ET sa grille de diagnostics dans un
          # `vertical-stack`. Forme unique sur tout Arsenal
          # (modèle Palmarès météo).
          #
          # Auparavant : COOL utilisait `visibility:` sur chaque
          # carte, DRY et HEAT deux blocs `conditional`
          # consécutifs répétant la même condition — trois
          # écritures pour un seul comportement.
          #
          # input_select.clim_conditions_mode = contexte
          # d'interface (ne pilote rien, ne décide rien).
          # ==================================================
          - type: conditional
            conditions:
              - entity: input_select.clim_conditions_mode
                state: Cool
            card:
              type: vertical-stack
              cards:
                - type: custom:button-card
                  template: carte_clim_verdict_mode
                  entity: sensor.clim_verdict_cool
                  name: Verdict COOL

                - type: grid
                  square: false
                  columns: 2
                  cards:
                    - type: custom:button-card
                      template: carte_clim_diagnostic_temperature_exterieure
                      name: Température extérieure

                    - type: custom:button-card
                      template: carte_clim_diagnostic_aeration_etage
                      name: Aération préférable
                      icon: mdi:weather-windy

                    - type: custom:button-card
                      template: carte_clim_diagnostic_temperature_max_chambres
                      name: Chambre la plus chaude

                    - type: custom:button-card
                      template: carte_clim_diagnostic_extinction_temperature_min_chambres
                      name: Chambre la plus froide

          - type: conditional
            conditions:
              - entity: input_select.clim_conditions_mode
                state: Dry
            card:
              type: vertical-stack
              cards:
                - type: custom:button-card
                  template: carte_clim_verdict_mode
                  entity: sensor.clim_verdict_dry
                  name: Verdict DRY

                - type: grid
                  square: false
                  columns: 2
                  cards:
                    - type: custom:button-card
                      template: carte_clim_diagnostic_humidex_max_chambres
                      name: Humidex max chambres

                    - type: custom:button-card
                      template: carte_clim_diagnostic_fenetres_maison
                      name: Fenêtres maison
                      icon: mdi:window-closed-variant

                    - type: custom:button-card
                      template: carte_clim_diagnostic_presence_babysitting
                      name: Présence / Babysitting
                      icon: mdi:account-group

                    - type: custom:button-card
                      template: carte_clim_diagnostic_aeration_etage
                      name: Aération préférable
                      icon: mdi:weather-windy

          - type: conditional
            conditions:
              - entity: input_select.clim_conditions_mode
                state: Heat
            card:
              type: vertical-stack
              cards:
                - type: custom:button-card
                  template: carte_clim_verdict_mode
                  entity: sensor.clim_verdict_heat
                  name: Verdict HEAT

                - type: grid
                  square: false
                  columns: 2
                  cards:
                    - type: custom:button-card
                      template: carte_diagnostic_besoin_chauffe_temperature_min_chambres
                      name: Chambre la plus froide
                      icon: mdi:thermometer

                    - type: custom:button-card
                      template: carte_clim_diagnostic_temperature_exterieure_hiver
                      name: T° extérieure
                      icon: mdi:thermometer-lines

                    - type: custom:button-card
                      template: carte_clim_diagnostic_presence_babysitting
                      name: Présence / Babysitting

                    - type: custom:button-card
                      template: carte_clim_diagnostic_fenetres_maison
                      name: Fenêtres maison
                      icon: mdi:window-closed-variant

                    - type: custom:button-card
                      template: carte_clim_diagnostic_chauffage_hiver_actif
                      name: Chauffage clim hiver

                    - type: custom:button-card
                      template: carte_diagnostic_chauffage_blocage_aeration
                      name: Blocage post-aération

          # ==================================================
          # 📜 HISTORIQUE
          # ==================================================
          - type: grid
            square: false
            columns: 1
            cards:
              - !include ../../includes/section_headers/historique.yaml

              - type: history-graph
                entities:
                  - entity: switch.clim_power
                logarithmic_scale: true
