button_card_templates: !include_dir_merge_named /config/19_button_card_templates

views:
  - badges: !include ../includes/badges/base.yaml

    ########################################################
    # 🧱 VERTICAL STACK PRINCIPAL
    ########################################################
    cards:
      - type: vertical-stack
        cards:
          - type: custom:button-card
            template: section_header
            name: ⚙️ Infrastructure

          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:button-card
                template: prise_template
                entity: switch.prise_box
                name: Box
                icon: mdi:router-wireless
                tap_action:
                  action: toggle
                  confirmation:
                    text: Basculer l'état de la prise ?
                  entity: switch.prise_box

              - type: custom:button-card
                template: prise_template
                entity: switch.prise_onduleur
                name: Onduleur
                icon: mdi:car-battery
                tap_action:
                  action: toggle
                  confirmation:
                    text: Basculer l'état de la prise ?
                  entity: switch.prise_onduleur

          - type: grid
            columns: 3
            square: false
            cards:
              - type: custom:button-card
                template: prise_secteur_template
                entity: switch.prise_chambre_arnaud
                name: Netatmo Arnaud
                icon: mdi:thermometer
