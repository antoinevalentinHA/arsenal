button_card_templates: !include_dir_merge_named /config/19_button_card_templates

views:
  - badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

      - type: custom:button-card
        template: bouton_retour_badge_carre
        tap_action:
          action: navigate
          navigation_path: /ecs-dashboard

    ########################################################
    # 🔧 VERTICAL STACK PRINCIPAL
    ########################################################
    cards:
      - type: vertical-stack
        cards:
          ########################################################
          # 🔗 SECTION : Capacité d'exécution — Boiler Bridge
          ########################################################
          - type: custom:button-card
            template: section_header
            name: 🔗 Capacité d'exécution

          - type: custom:button-card
            template: boiler_status_health
            entity: sensor.boiler_bridge_sante
            name: Boiler Bridge
            icon: mdi:lan-connect

          - type: horizontal-stack
            cards:
              - type: custom:button-card
                template: boiler_kpi_consigne
                entity: sensor.boiler_dhw_setpoint
                name: Consigne ECS

              - type: custom:button-card
                template: boiler_decision_ack
                entity: sensor.boiler_ack_dhw_set_setpoint_status
                name: ACK ECS

              - type: custom:button-card
                template: boiler_status_burner
                entity: binary_sensor.boiler_burner_on
                name: Brûleur

          ########################################################
          # 🚿 SECTION : ECS – Données internes
          ########################################################
          - type: custom:button-card
            template: section_header
            name: 🚿 Données internes

          - type: custom:button-card
            template: ecs_chauffe_planifiee_status

          - !include ../../includes/cartes/ecs_dernier_cycle.yaml

          ########################################################
          # 🧠 SECTION : ECS – Apprentissage des offsets (ECS-OFF-1)
          ########################################################
          - type: custom:button-card
            template: section_header
            name: 🔁 Apprentissage des offsets

          - !include ../../includes/cartes/ecs_apprentissage_offsets.yaml

          - !include ../../includes/cartes/ecs_apprentissage_courbes.yaml
