button_card_templates: !include_dir_merge_named /config/19_button_card_templates

views:
  - badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

      - type: custom:button-card
        template: bouton_retour_badge_carre
        tap_action:
          action: navigate
          navigation_path: /chauffage-dashboard/chauffage

      - type: custom:button-card
        template: bouton_navigation_badge_carre
        name: Vannes thermostatiques
        icon: mdi:radiator
        tap_action:
          action: navigate
          navigation_path: /diagnostics-vannes-dashboard/diagnostics-vannes

      - type: custom:button-card
        template: bouton_navigation_badge_carre
        name: Diagnostics thermiques
        icon: mdi:magnify
        tap_action:
          action: navigate
          navigation_path: /diagnostics-thermiques-dashboard/diagnostics-thermiques

    ########################################################
    # ♨️ VERTICAL STACK PRINCIPAL
    ########################################################

    cards:
      - type: vertical-stack
        cards:
          ########################################################
          # 📊 1) Performances chauffage
          ########################################################

          - type: custom:button-card
            template: section_header
            name: 🍃 Mode économique

          - !include ../../includes/cartes/barres_mode_reduit_chauffage.yaml

          ########################################################
          # 🧩 2) Diagnostic local
          ########################################################

          - type: custom:button-card
            template: section_header
            name: 🔥 État global

          - type: custom:button-card
            template: chauffage_diagnostic_global_compact

          ########################################################
          # 🔒 2bis) Contexte météo
          ########################################################

          - type: custom:button-card
            template: section_header
            name: 🌤 Météo

          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:button-card
                template: meteo_chauffage_actuelle_72

              - type: custom:button-card
                template: meteo_favorable_chauffage_72

          ########################################################
          # 🪵 2ter) Poele (diagnostic thermique)
          ########################################################

          - type: custom:button-card
            template: section_header
            name: 🪵 Poele

          - type: custom:button-card
            template: poele_en_fonction_72

          ########################################################
          # 🔒 2quater) Verrou aération / post-aération (diagnostic)
          ########################################################

          - type: custom:button-card
            template: section_header
            name: 🪟 Aération

          - !include ../../includes/cartes/aeration_timers_chauffage.yaml

          ########################################################
          # 🎯 3) Consignes & Écarts
          ########################################################

          - type: custom:button-card
            template: section_header
            name: 📐 Réglage thermique

          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:button-card
                template: chauffage_reglage_courbe_diag_72
                name: Réglages
                variables:
                  kind: global

              - type: custom:button-card
                template: chauffage_reglage_courbe_diag_72
                name: Tendance 24h
                variables:
                  kind: tendance_24h

          - type: custom:button-card
            template: section_header
            name: 🔁 Auto-ajustement courbe de chauffe

          - type: custom:button-card
            template: chauffage_auto_courbe_status_72
            name: Dernier ajustement
            variables:
              kind: last
