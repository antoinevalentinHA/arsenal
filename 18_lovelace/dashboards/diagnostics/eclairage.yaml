button_card_templates: !include_dir_merge_named /config/19_button_card_templates

views:
  - badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

      - type: custom:button-card
        template: bouton_retour_badge_carre
        tap_action:
          action: navigate
          navigation_path: /eclairage-dashboard

    ########################################################
    # 🌟 VERTICAL STACK PRINCIPAL
    ########################################################
    cards:
      - type: vertical-stack
        cards:
          # 🛠️ Paramètres globaux
          - type: custom:button-card
            template: section_header
            name: 🛠️ Activation

          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:button-card
                template: status_72_on_off
                entity: input_boolean.activation_simulation_presence_vacances
                name: Simulation activée
                icon: mdi:home-switch

              - type: custom:button-card
                template: status_72_on_off
                entity: input_boolean.test_simulation_presence
                name: Test activé
                icon: mdi:test-tube

          # 🔍 Autorisation
          - type: custom:button-card
            template: status_72_on_off
            entity: binary_sensor.simulation_presence_autorisee
            name: Autorisation
            icon: mdi:lightbulb-auto

          # 🏠 Zone : Entrée
          - !include ../../includes/section_headers/entree.yaml

          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:button-card
                template: socle_info_72
                entity: input_text.horaires_simulation_presence_matin_entree
                name: Horaires matin
                icon: mdi:weather-sunset-up

              - type: custom:button-card
                template: socle_info_72
                entity: input_text.horaires_simulation_presence_soir_entree
                name: Horaires soir
                icon: mdi:weather-sunset-down

          # 🛏️ Zone : Parents
          - !include ../../includes/section_headers/chambre_parents.yaml

          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:button-card
                template: socle_info_72
                entity: input_text.horaires_simulation_presence_matin_chambre_parents
                name: Horaires matin
                icon: mdi:weather-sunset-up

              - type: custom:button-card
                template: socle_info_72
                entity: input_text.horaires_simulation_presence_soir_chambre_parents
                name: Horaires soir
                icon: mdi:weather-sunset-down

          # 🏠 Zone : Garage
          - !include ../../includes/section_headers/garage.yaml

          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:button-card
                template: socle_info_72
                entity: input_text.horaires_simulation_presence_matin_garage
                name: Horaires matin
                icon: mdi:weather-sunset-up

              - type: custom:button-card
                template: socle_info_72
                entity: input_text.horaires_simulation_presence_soir_garage
                name: Horaires soir
                icon: mdi:weather-sunset-down
