button_card_templates: !include_dir_merge_named /config/19_button_card_templates

views:
  - badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

      - type: custom:button-card
        template: bouton_retour_badge_carre
        tap_action:
          action: navigate
          navigation_path: /mouvements-dashboard/mouvements

    ########################################################
    # 🔧 VERTICAL STACK PRINCIPAL
    ########################################################
    cards:
      - type: vertical-stack
        cards:
          ###################################################
          # 🌍 GLOBAL
          ###################################################
          - type: custom:button-card
            template: carte_mouvement
            entity: binary_sensor.mouvement_maison
            name: Mouvement maison

          ###################################################
          # 🏠 ZONES
          ###################################################
          - type: custom:button-card
            template: section_header
            name: 🏠 Zones

          - type: custom:button-card
            template: carte_mouvement
            entity: binary_sensor.mouvement_entree
            name: Entrée

          - type: custom:button-card
            template: carte_mouvement
            entity: binary_sensor.mouvement_sejour
            name: Séjour

          - type: custom:button-card
            template: carte_mouvement
            entity: binary_sensor.mouvement_garage
            name: Garage
