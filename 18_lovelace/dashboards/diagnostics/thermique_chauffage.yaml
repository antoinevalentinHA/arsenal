button_card_templates: !include_dir_merge_named /config/19_button_card_templates

views:
  - badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

      - type: custom:button-card
        template: bouton_retour_badge_carre
        tap_action:
          action: navigate
          navigation_path: /diagnostics-chauffage-dashboard/diagnostics-chauffage

    cards:
      - type: vertical-stack
        cards:
          - type: custom:button-card
            template: section_header
            name: 🧪 Interprétation

          - !include ../../includes/cartes/diagnostic_thermique_interpretation.yaml

          - type: custom:button-card
            template: section_header
            name: 🧾 Contexte

          - !include ../../includes/cartes/diagnostic_thermique_contexte.yaml

          - type: custom:button-card
            template: section_header
            name: 🔥 Dynamiques Présence — Reprise / Arrêt

          - !include ../../includes/cartes/diagnostic_thermique_reprise.yaml

          - type: custom:button-card
            template: section_header
            name: 🔄 Stabilité — Oscillateur thermique

          - !include ../../includes/cartes/diagnostic_thermique_oscillateur.yaml

          - type: custom:button-card
            template: section_header
            name: 🌙 Absence — Inertie passive

          - !include ../../includes/cartes/diagnostic_thermique_inertie.yaml
