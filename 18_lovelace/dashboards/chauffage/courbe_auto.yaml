button_card_templates: !include_dir_merge_named /config/19_button_card_templates

# ==========================================================
# 🧠 ARSENAL — DASHBOARD :
#     Chauffage – Diagnostics – Auto-ajustement courbe (SUPERVISION)
# ----------------------------------------------------------
# 🎯 RÔLE
#   Vue de SUPERVISION (lecture seule) de l'auto-ajustement de
#   la courbe de chauffe. Assemble les 8 réponses opposables du
#   contrat 76 (§3 Q1–Q8) à partir des grandeurs déjà dérivées
#   (lots L1–L6). Sous-diagnostic rattaché au hub Diagnostics
#   Chauffage (scénario B de l'audit d'implantation UI).
#
# 🧱 GRAMMAIRE UI ARSENAL (diagnostics)
#   - États catégoriels : `carte_etat_interprete` (couleurs palette
#     au site d'appel, gris indispo prioritaire, tap désactivé).
#   - Valeurs : `carte_kpi_bleu` (socle_kpi_72 — tap désactivé).
#   - Dernière décision / statut auto : `chauffage_auto_courbe_status_72`.
#   - En-têtes : `section_header` / `sub_section_header` (emoji).
#   AUCUNE tile native, markdown réduit au strict nécessaire.
#
# 🚫 SUPERVISION UNIQUEMENT (INV-1)
#   Aucune action, aucun service, aucun toggle, aucun contrôle.
#   Toutes les cartes ont l'interaction désactivée : aucun helper
#   commandable (input_number / input_select / input_text / counter)
#   n'est modifiable via more-info. Le pilotage reste dans Réglages
#   Chauffage ; l'état courant reste au hub.
#
# 🧭 GARANTIES
#   - Ne crée aucune grandeur : présente L1–L6 (INV-7).
#   - Effet borné (INV-4) : corrélation de fenêtre régime, jamais
#     causale ; `indetermine` visible (gris indispo), confiance
#     affichée. Persistance rendue « à surveiller » (jaune vigilance),
#     jamais « anomalie » (ni rouge, ni orange).
# ==========================================================

views:
  - badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

      - type: custom:button-card
        template: bouton_retour_badge_carre
        tap_action:
          action: navigate
          navigation_path: /diagnostics-chauffage-dashboard

    cards:
      - type: vertical-stack
        cards:

          ########################################################
          # 📋 Bandeau — Complétude & apprentissage (Q7)
          ########################################################

          - type: custom:button-card
            template: section_header
            name: 📋 Complétude & apprentissage

          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:button-card
                template: carte_etat_interprete
                entity: sensor.chauffage_courbe_completude
                name: Complétude
                variables:
                  couleurs:
                    a_jour: 'rgba(76, 175, 80, 0.2)'
                    trou_detecte: 'rgba(255, 152, 0, 0.2)'
                    inconnu: 'rgba(158, 158, 158, 0.2)'
                  libelles:
                    a_jour: À jour
                    trou_detecte: Trou détecté
                    inconnu: Inconnu

              - type: custom:button-card
                template: carte_etat_interprete
                entity: input_select.chauffage_courbe_apprentissage_statut
                name: Apprentissage
                variables:
                  couleurs:
                    apprenant: 'rgba(76, 175, 80, 0.2)'
                    gel: 'rgba(158, 158, 158, 0.2)'
                    inconnu: 'rgba(158, 158, 158, 0.2)'
                  libelles:
                    apprenant: Apprenant
                    gel: Gelé
                    inconnu: Inconnu

              - type: custom:button-card
                template: carte_kpi_bleu
                entity: sensor.chauffage_courbe_taux_jours_apprenants
                name: Jours apprenants

              - type: custom:button-card
                template: carte_etat_interprete
                entity: input_text.chauffage_courbe_gel_cause
                name: Cause de gel
                variables:
                  couleurs:
                    "-": 'rgba(158, 158, 158, 0.2)'
                    non_representatif: 'rgba(33, 150, 243, 0.2)'
                    auto_desactive: 'rgba(33, 150, 243, 0.2)'
                    hors_mode_normal: 'rgba(33, 150, 243, 0.2)'
                  libelles:
                    "-": "—"
                    non_representatif: Non représentatif
                    auto_desactive: Auto désactivé
                    hors_mode_normal: Hors mode normal

          ########################################################
          # 🎯 Proposé & décidé (Q1 · Q2 · Q3)
          ########################################################

          - type: custom:button-card
            template: section_header
            name: 🎯 Proposé & décidé

          - type: custom:button-card
            template: chauffage_auto_courbe_status_72
            name: Auto-ajustement
            variables:
              kind: auto

          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:button-card
                template: carte_kpi_bleu
                entity: sensor.chauffage_pente_suggeree
                name: Pente suggérée

              - type: custom:button-card
                template: carte_kpi_bleu
                entity: sensor.chauffage_parallele_suggeree
                name: Parallèle suggéré

          # Pleine largeur (évite une carte isolée en grille 2 colonnes)
          - type: custom:button-card
            template: carte_kpi_bleu
            entity: sensor.ecart_consigne_instantane
            name: Écart (erreur)

          - type: custom:button-card
            template: chauffage_auto_courbe_status_72
            name: Dernière décision
            variables:
              kind: last

          ########################################################
          # 🔧 Appliqué & confirmé (Q4)
          ########################################################

          - type: custom:button-card
            template: section_header
            name: 🔧 Appliqué & confirmé

          - type: custom:button-card
            template: sub_section_header
            name: ℹ️ Intentionnel-confirmé — changement externe boiler invisible

          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:button-card
                template: carte_kpi_bleu
                entity: input_number.chauffage_pente_consigne
                name: Pente appliquée

              - type: custom:button-card
                template: carte_kpi_bleu
                entity: input_number.chauffage_parallele_consigne
                name: Parallèle appliqué

          ########################################################
          # 📈 Trajectoire & oscillation (Q6)
          ########################################################

          - type: custom:button-card
            template: section_header
            name: 📈 Trajectoire & oscillation

          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:button-card
                template: carte_kpi_bleu
                entity: sensor.chauffage_courbe_derive_pente
                name: Dérive pente

              - type: custom:button-card
                template: carte_kpi_bleu
                entity: sensor.chauffage_courbe_derive_parallele
                name: Dérive parallèle

          # Pleine largeur sous les deux dérives (évite une carte isolée)
          - type: custom:button-card
            template: carte_kpi_bleu
            entity: counter.chauffage_courbe_reversions
            name: Réversions

          ########################################################
          # 👁 À surveiller — persistance (Q8)
          ########################################################

          - type: custom:button-card
            template: section_header
            name: 👁 À surveiller — persistance

          # Réserve de lecture doctrinale (pas un sous-titre) : markdown justifié.
          - type: markdown
            content: >
              ⚠️ À surveiller, pas une anomalie. La persistance signale un état
              nominal durable (`gel_persistant` ou `refus_recurrent`) ; elle ne
              requalifie pas le cycle en anomalie.

          - type: custom:button-card
            template: carte_etat_interprete
            entity: sensor.chauffage_courbe_persistance
            name: Persistance
            variables:
              couleurs:
                ras: 'rgba(76, 175, 80, 0.2)'
                gel_persistant: 'rgba(255, 235, 59, 0.2)'
                refus_recurrent: 'rgba(255, 235, 59, 0.2)'
              libelles:
                ras: RAS
                gel_persistant: Gel persistant
                refus_recurrent: Refus récurrent

          - type: custom:button-card
            template: carte_kpi_bleu
            entity: counter.chauffage_courbe_refus_consecutifs
            name: Refus consécutifs

          ########################################################
          # 🧪 Effet — corrélation de fenêtre régime (Q5)
          ########################################################

          - type: custom:button-card
            template: section_header
            name: 🧪 Effet — corrélation de fenêtre régime (jamais causal)

          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:button-card
                template: carte_etat_interprete
                entity: sensor.chauffage_courbe_effet_pente
                name: Effet pente (froid)
                variables:
                  couleurs:
                    amelioration: 'rgba(76, 175, 80, 0.2)'
                    degradation: 'rgba(255, 152, 0, 0.2)'
                    indetermine: 'rgba(158, 158, 158, 0.1)'
                  libelles:
                    amelioration: Amélioration
                    degradation: Dégradation
                    indetermine: Indéterminé

              - type: custom:button-card
                template: carte_etat_interprete
                entity: sensor.chauffage_courbe_effet_parallele
                name: Effet parallèle (global)
                variables:
                  couleurs:
                    amelioration: 'rgba(76, 175, 80, 0.2)'
                    degradation: 'rgba(255, 152, 0, 0.2)'
                    indetermine: 'rgba(158, 158, 158, 0.1)'
                  libelles:
                    amelioration: Amélioration
                    degradation: Dégradation
                    indetermine: Indéterminé

          # Markdown STRICT NÉCESSAIRE : attributs dynamiques (confiance /
          # conditions d'indétermination) non portables par une carte
          # structurée générique.
          - type: markdown
            content: >
              Confiance — pente : {{ state_attr('sensor.chauffage_courbe_effet_pente', 'confiance') }},
              parallèle : {{ state_attr('sensor.chauffage_courbe_effet_parallele', 'confiance') }}.
              `indetermine` tant que le signal est indisponible, la fenêtre non
              stabilisée, l'écart déjà proche de zéro, ou la variation dans le bruit.
