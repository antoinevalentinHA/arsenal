button_card_templates: !include_dir_merge_named /config/19_button_card_templates

views:
  - badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

      - type: custom:button-card
        template: bouton_retour_badge_carre
        tap_action:
          action: navigate
          navigation_path: /chauffage-dashboard

    ########################################################
    # ♨️ VERTICAL STACK PRINCIPAL
    ########################################################

    cards:
      - type: vertical-stack
        cards:
          ########################################################
          # 🔗 0) Capacité d'exécution — Boiler Bridge
          ########################################################

          - type: custom:button-card
            template: section_header
            name: 🔗 Capacité d'exécution

          - type: custom:button-card
            template: boiler_status_health
            entity: sensor.boiler_bridge_sante
            name: Boiler Bridge
            icon: mdi:lan-connect

          - type: horizontal-stack
            cards:
              - type: custom:button-card
                template: boiler_kpi_consigne
                entity: sensor.boiler_heating_setpoint
                name: Consigne Chauffage

              - type: custom:button-card
                template: boiler_status_burner
                entity: binary_sensor.boiler_burner_on
                name: Brûleur

          ########################################################
          # 📊 1) Performances chauffage
          ########################################################

          - type: custom:button-card
            template: section_header
            name: 🍃 Mode économique

          - !include ../../includes/cartes/chauffage/barres_mode_reduit_chauffage.yaml

          ########################################################
          # 🧩 2) Diagnostic local
          ########################################################

          - type: custom:button-card
            template: section_header
            name: 🔥 État global

          - type: custom:button-card
            template: chauffage_diagnostic_global_compact

          ########################################################
          # 🔒 2bis) Contexte météo
          ########################################################

          - type: custom:button-card
            template: section_header
            name: 🌤 Météo

          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:button-card
                template: meteo_chauffage_actuelle_72

              - type: custom:button-card
                template: meteo_favorable_chauffage_72

          ########################################################
          # 🪵 2ter) Poele (diagnostic thermique)
          ########################################################

          - type: custom:button-card
            template: section_header
            name: 🪵 Poele

          - type: custom:button-card
            template: poele_en_fonction_72

          ########################################################
          # 🔒 2quater) Verrou aération / post-aération (diagnostic)
          ########################################################

          - type: custom:button-card
            template: section_header
            name: 🪟 Aération

          - !include ../../includes/cartes/chauffage/aeration_timers_chauffage.yaml

          ########################################################
          # 🎯 3) Consignes & Écarts
          ########################################################

          - type: custom:button-card
            template: section_header
            name: 📐 Réglage thermique

          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:button-card
                template: chauffage_reglage_courbe_diag_72
                name: Réglages
                variables:
                  kind: global

              - type: custom:button-card
                template: chauffage_reglage_courbe_diag_72
                name: Tendance 24h
                variables:
                  kind: tendance_24h

          - type: custom:button-card
            template: section_header
            name: 🌡️ Vannes thermostatiques

          # Teaser compact (stabilité globale + accès) — le diagnostic
          # complet par pièce (sélecteur, plateaux, reset) vit dans le
          # sous-dashboard dédié. Amorce calquée sur l'auto-ajustement
          # courbe : coup d'œil au hub, détail par pièce sur la page.
          # Le verdict global est décidé au backend
          # (sensor.vannes_thermostatiques_stabilite_globale) ; l'UI traduit.
          - type: custom:button-card
            template: carte_etat_interprete
            entity: sensor.vannes_thermostatiques_stabilite_globale
            name: Stabilité 12h — toutes pièces
            variables:
              couleurs:
                tres_stable: 'rgba(76, 175, 80, 0.2)'
                a_surveiller: 'rgba(255, 152, 0, 0.2)'
                instable: 'rgba(244, 67, 54, 0.2)'
                # Gris INDISPO (0.1), pas gris neutre (0.2) : « indisponible »
                # = variance non exploitable → cas donnée indisponible de la
                # charte (02_palette.md), qui prime sur toute autre couleur.
                indisponible: 'rgba(158, 158, 158, 0.1)'
              libelles:
                tres_stable: Très stable
                a_surveiller: À surveiller
                instable: Instable
                indisponible: Indisponible

          - type: custom:button-card
            template: bouton_navigation
            name: Ouvrir le diagnostic
            icon: mdi:radiator
            tap_action:
              action: navigate
              navigation_path: /diagnostics-vannes-dashboard

          - type: custom:button-card
            template: section_header
            name: 🧪 Diagnostics thermiques

          # Teaser compact (qualité thermique globale + accès) — le détail
          # par axe (régulation / reprise / inertie / stabilité) vit dans le
          # sous-dashboard dédié. Amorce calquée sur vannes / courbe : coup
          # d'œil au hub, détail sur la page. Le verdict de tête est décidé
          # au backend (sensor.diagnostic_chauffage_thermique_synthese) ;
          # l'UI traduit. Distinct de « État global » (raison courante).
          - type: custom:button-card
            template: carte_etat_interprete
            entity: sensor.diagnostic_chauffage_thermique_synthese
            name: Qualité thermique — synthèse
            variables:
              couleurs:
                nominal: 'rgba(76, 175, 80, 0.2)'
                correct: 'rgba(33, 150, 243, 0.2)'
                a_surveiller: 'rgba(255, 152, 0, 0.2)'
                # Gris INDISPO (0.1) : aucun axe exploitable → cas donnée
                # indisponible de la charte (02_palette.md), prioritaire.
                indisponible: 'rgba(158, 158, 158, 0.1)'
              libelles:
                nominal: Nominal
                correct: Correct
                a_surveiller: À surveiller
                indisponible: Indisponible

          - type: custom:button-card
            template: bouton_navigation
            name: Ouvrir le diagnostic
            icon: mdi:magnify
            tap_action:
              action: navigate
              navigation_path: /diagnostics-thermiques-dashboard

          - type: custom:button-card
            template: section_header
            name: 🔁 Auto-ajustement courbe de chauffe

          # Teaser compact (statut + complétude + accès) — la SUPERVISION
          # complète (Q1–Q8) vit dans le sous-dashboard dédié. Ne pas
          # enrichir ici : éviter une seconde supervision / double maintenance.
          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:button-card
                template: carte_etat_interprete
                entity: input_select.chauffage_courbe_apprentissage_statut
                name: Apprentissage
                variables:
                  couleurs:
                    apprenant: 'rgba(76, 175, 80, 0.2)'
                    gel: 'rgba(158, 158, 158, 0.2)'
                    inconnu: 'rgba(158, 158, 158, 0.2)'
                  libelles:
                    apprenant: Apprenant
                    gel: Gelé
                    inconnu: Inconnu
              - type: custom:button-card
                template: carte_etat_interprete
                entity: sensor.chauffage_courbe_completude
                name: Complétude
                variables:
                  couleurs:
                    a_jour: 'rgba(76, 175, 80, 0.2)'
                    trou_detecte: 'rgba(255, 152, 0, 0.2)'
                    inconnu: 'rgba(158, 158, 158, 0.2)'
                  libelles:
                    a_jour: À jour
                    trou_detecte: Trou détecté
                    inconnu: Inconnu

          - type: custom:button-card
            template: bouton_navigation
            name: Ouvrir la supervision
            icon: mdi:chart-bell-curve-cumulative
            tap_action:
              action: navigate
              navigation_path: /diagnostics-courbe-dashboard
