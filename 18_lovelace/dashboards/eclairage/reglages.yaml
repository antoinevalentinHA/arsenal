button_card_templates: !include_dir_merge_named /config/19_button_card_templates

views:
  - badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

      - type: custom:button-card
        template: bouton_retour_badge_carre
        tap_action:
          action: navigate
          navigation_path: /eclairage-dashboard

    # ======================================================
    # 💡 CONTENU PRINCIPAL — FLUX VERTICAL CANON ARSENAL
    # ------------------------------------------------------
    # badges
    #   ↓
    # vertical-stack racine
    #   ↓
    # bandeau de validité + mode astronomie (toujours visibles)
    #   ↓
    # sélecteur de consultation (contexte d'interface)
    #   ↓
    # détail conditionnel (section de réglages choisie)
    # ======================================================
    cards:
      - type: vertical-stack
        cards:
          # ✅ Bandeau de validité (conditionnel)
          - !include ../../includes/alerte_configuration_invalide.yaml

          # ==================================================
          # 🔭 TOUJOURS VISIBLE — MODE ASTRONOMIE
          # --------------------------------------------------
          # Bascule unique, hors sélecteur : elle conditionne
          # l'ensemble des automatismes d'éclairage et doit
          # rester lisible quelle que soit la section affichée.
          # ==================================================
          - type: custom:button-card
            template: section_header
            name: 🔭 Mode astronomie

          - type: tile
            entity: input_boolean.mode_astronomie
            name: Mode astronomie

          # ==================================================
          # 🔎 SÉLECTEUR DE CONSULTATION (modèle Palmarès)
          # --------------------------------------------------
          # input_select.eclairage_reglages_affichage = contexte
          # d'interface (ne pilote rien, ne décide rien).
          # ==================================================
          - type: custom:button-card
            template: section_header
            name: 🔎 Réglages affichés

          - type: tile
            entity: input_select.eclairage_reglages_affichage
            name: Réglages affichés
            features_position: bottom
            features:
              - type: select-options

          # ==================================================
          # 📋 DÉTAIL CONDITIONNEL — SECTION CHOISIE
          # --------------------------------------------------
          # Cartes reprises verbatim (aucune entité, aucun
          # libellé ni alias modifié).
          #
          # 🪜 HIÉRARCHIE DES EN-TÊTES
          # Le sélecteur porte le titre de la section : aucun
          # `section_header` ne le répète à l'intérieur du bloc
          # conditionnel. Le niveau immédiatement inférieur est
          # donc promu `section_header`, et `sub_section_header`
          # reste réservé au niveau encore en dessous.
          # Les libellés sont inchangés : seuls les includes
          # `sub_section_headers/` ↔ `section_headers/` sont
          # permutés (même `name`, template différent).
          # ==================================================
          - type: conditional
            conditions:
              - entity: input_select.eclairage_reglages_affichage
                state: Éclairage auto
            card:
              type: vertical-stack
              cards:
                - !include ../../includes/section_headers/garage.yaml

                - type: tile
                  entity: input_boolean.garage_auto_light
                  name: Mode auto

                - type: tile
                  entity: input_number.duree_absence_garage
                  name: Délai extinction garage
                  features_position: inline
                  features:
                    - type: numeric-input
                      style: buttons

                - type: tile
                  entity: input_number.garage_seuil_luminosite_allumage_auto
                  name: Luminosité max
                  features_position: inline
                  features:
                    - type: numeric-input
                      style: buttons

                - !include ../../includes/section_headers/entree.yaml

                - type: tile
                  entity: input_boolean.entree_auto_light
                  name: Mode auto

                - type: tile
                  entity: input_number.duree_absence_entree
                  name: Délai extinction entrée
                  features_position: inline
                  features:
                    - type: numeric-input
                      style: buttons

                - !include ../../includes/section_headers/sejour.yaml

                - type: tile
                  entity: input_boolean.sejour_auto_light
                  name: Mode auto

                - type: tile
                  entity: input_number.duree_absence_sejour
                  name: Délai extinction séjour
                  features_position: inline
                  features:
                    - type: numeric-input
                      style: buttons

                - type: tile
                  entity: input_number.sejour_seuil_luminosite_extinction_auto
                  # Libellé de 217 px pour une zone `inline` plafonnée à
                  # 192 px : rendu en `bottom` pour éviter la troncature.
                  name: Luminosité extinction (lx) — 0 = off
                  features_position: bottom
                  features:
                    - type: numeric-input
                      style: buttons

                - type: tile
                  entity: binary_sensor.sejour_extinction_luminosite_autorisee
                  name: Extinction luminosité autorisée

                - type: custom:button-card
                  template: section_header
                  name: Sapin 🎄

                - type: tile
                  entity: input_boolean.prise_baies_vitrees_auto
                  name: Mode auto

                - type: tile
                  entity: input_number.duree_absence_guirlande
                  name: Délai extinction sapin
                  features_position: inline
                  features:
                    - type: numeric-input
                      style: buttons

          - type: conditional
            conditions:
              - entity: input_select.eclairage_reglages_affichage
                state: Jardin
            card:
              type: vertical-stack
              cards:
                - type: custom:button-card
                  template: section_header
                  name: 🔘 Activation des automatismes

                - type: grid
                  square: false
                  columns: 2
                  cards:
                    - type: tile
                      entity: input_boolean.auto_lumiere_jardin_matin
                      name: Matin

                    - type: tile
                      entity: input_boolean.auto_lumiere_jardin_soir
                      name: Soir

                - type: custom:button-card
                  template: section_header
                  name: 🌅 Matin

                - type: tile
                  entity: input_datetime.heure_allumage_jardin_matin
                  name: Heure d’allumage

                - type: tile
                  entity: input_number.delai_extinction_jardin_matin
                  name: Délai après lever du jour (min)
                  features_position: bottom
                  features:
                    - type: numeric-input
                      style: buttons

                - type: tile
                  entity: input_datetime.heure_extinction_jardin_matin_fixe
                  name: Heure d’extinction fixe

                - type: custom:button-card
                  template: section_header
                  name: 🌇 Soir

                - type: tile
                  entity: input_number.delai_allumage_jardin_soir
                  # Libellé de 217 px pour une zone `inline` plafonnée à
                  # 192 px : rendu en `bottom` pour éviter la troncature.
                  name: Délai après coucher du soleil (min)
                  features_position: bottom
                  features:
                    - type: numeric-input
                      style: buttons

                - type: tile
                  entity: input_number.duree_lumiere_jardin_soir
                  name: Durée de l’éclairage
                  features_position: inline
                  features:
                    - type: numeric-input
                      style: buttons

          - type: conditional
            conditions:
              - entity: input_select.eclairage_reglages_affichage
                state: Simulation de présence
            card:
              type: vertical-stack
              cards:
                # Réglages transverses de la simulation. Le titre
                # « Simulation de présence » est porté par le
                # sélecteur ; cet en-tête ne couvre donc que les
                # réglages généraux, avant le détail par pièce.
                - type: custom:button-card
                  template: section_header
                  name: ⚙️ Général

                - type: tile
                  entity: input_boolean.activation_simulation_presence_vacances
                  name: Activer en vacances

                - type: tile
                  entity: input_boolean.test_simulation_presence
                  name: Activer le mode test

                # ⏱️ Durée
                - type: custom:button-card
                  template: sub_section_header
                  name: ⏱️ Durée (min)

                - type: grid
                  square: false
                  columns: 2
                  cards:
                    - type: tile
                      entity: input_number.duree_min_cycle_simulation_presence
                      name: min
                      features_position: inline
                      features:
                        - type: numeric-input
                          style: buttons

                    - type: tile
                      entity: input_number.duree_max_cycle_simulation_presence
                      name: max
                      features_position: inline
                      features:
                        - type: numeric-input
                          style: buttons

                - !include ../../includes/section_headers/entree.yaml

                # 🌅 Réglages matin - Entrée
                - type: custom:button-card
                  template: sub_section_header
                  name: 🌅 Matin

                - type: grid
                  square: false
                  columns: 2
                  cards:
                    - type: tile
                      entity: input_datetime.debut_cycle_simulation_presence_matin_entree
                      name: "de"

                    - type: tile
                      entity: input_datetime.fin_cycle_simulation_presence_matin_entree
                      name: "à"

                - type: tile
                  entity: input_number.nb_cycles_simulation_presence_matin_entree
                  name: Cycles
                  features_position: inline
                  features:
                    - type: numeric-input
                      style: buttons

                # 🌇 Réglages soir - Entrée
                - type: custom:button-card
                  template: sub_section_header
                  name: 🌇 Soir

                - type: grid
                  square: false
                  columns: 2
                  cards:
                    - type: tile
                      entity: input_datetime.debut_cycle_simulation_presence_soir_entree
                      name: "de"

                    - type: tile
                      entity: input_datetime.fin_cycle_simulation_presence_soir_entree
                      name: "à"

                - type: tile
                  entity: input_number.nb_cycles_simulation_presence_soir_entree
                  name: Cycles
                  features_position: inline
                  features:
                    - type: numeric-input
                      style: buttons

                - !include ../../includes/section_headers/chambre_parents.yaml

                # 🌅 Réglages matin - Parents
                - type: custom:button-card
                  template: sub_section_header
                  name: 🌅 Matin

                - type: grid
                  square: false
                  columns: 2
                  cards:
                    - type: tile
                      entity: input_datetime.debut_cycle_simulation_presence_matin_chambre_parents
                      name: "de"

                    - type: tile
                      entity: input_datetime.fin_cycle_simulation_presence_matin_chambre_parents
                      name: "à"

                - type: tile
                  entity: input_number.nb_cycles_simulation_presence_matin_chambre_parents
                  name: Cycles
                  features_position: inline
                  features:
                    - type: numeric-input
                      style: buttons

                # 🌇 Réglages soir - Parents
                - type: custom:button-card
                  template: sub_section_header
                  name: 🌇 Soir

                - type: grid
                  square: false
                  columns: 2
                  cards:
                    - type: tile
                      entity: input_datetime.debut_cycle_simulation_presence_soir_chambre_parents
                      name: "de"

                    - type: tile
                      entity: input_datetime.fin_cycle_simulation_presence_soir_chambre_parents
                      name: "à"

                - type: tile
                  entity: input_number.nb_cycles_simulation_presence_soir_chambre_parents
                  name: Cycles
                  features_position: inline
                  features:
                    - type: numeric-input
                      style: buttons

                # 🏠 Garage
                - !include ../../includes/section_headers/garage.yaml

                # 🌅 Réglages matin - Garage
                - type: custom:button-card
                  template: sub_section_header
                  name: 🌅 Matin

                - type: grid
                  square: false
                  columns: 2
                  cards:
                    - type: tile
                      entity: input_datetime.debut_cycle_simulation_presence_matin_garage
                      name: "de"

                    - type: tile
                      entity: input_datetime.fin_cycle_simulation_presence_matin_garage
                      name: "à"

                - type: tile
                  entity: input_number.nb_cycles_simulation_presence_matin_garage
                  name: Cycles
                  features_position: inline
                  features:
                    - type: numeric-input
                      style: buttons

                # 🌇 Réglages soir - Garage
                - type: custom:button-card
                  template: sub_section_header
                  name: 🌇 Soir

                - type: grid
                  square: false
                  columns: 2
                  cards:
                    - type: tile
                      entity: input_datetime.debut_cycle_simulation_presence_soir_garage
                      name: "de"

                    - type: tile
                      entity: input_datetime.fin_cycle_simulation_presence_soir_garage
                      name: "à"

                - type: tile
                  entity: input_number.nb_cycles_simulation_presence_soir_garage
                  name: Cycles
                  features_position: inline
                  features:
                    - type: numeric-input
                      style: buttons
