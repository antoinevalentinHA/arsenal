button_card_templates: !include_dir_merge_named /config/19_button_card_templates

views:
  - badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

      - type: custom:button-card
        template: bouton_parametres_badge_carre
        tap_action:
          action: navigate
          navigation_path: /reglages-volets-dashboard

      - type: custom:button-card
        template: bouton_diagnostics_badge_carre
        tap_action:
          action: navigate
          navigation_path: /diagnostics-volets-dashboard

    ########################################################
    # 🧩 VERTICAL STACK PRINCIPAL
    #
    #  Volets Bubendorff : pas de STOP (supported_features = 7),
    #  mais positions natives → préréglages 100 / 75 / 25 / 0 %.
    #  Couleurs : Exception 9 (position de commande, catégoriel).
    ########################################################
    cards:
      - type: vertical-stack
        cards:
          ##################################################
          # 🏠 TOUS
          ##################################################
          - type: custom:button-card
            template: section_header
            name: 🏠 Tous

          - type: grid
            columns: 4
            square: false
            cards:
              - type: custom:button-card
                template: shutter_position
                variables:
                  cible:
                    - cover.sejour_gauche
                    - cover.sejour_droit
                    - cover.chambre_arnaud
                    - cover.chambre_matthieu
                  position: 100
                  confirm: Confirmez-vous l’ouverture de tous les volets ?
              - type: custom:button-card
                template: shutter_position
                variables:
                  cible:
                    - cover.sejour_gauche
                    - cover.sejour_droit
                    - cover.chambre_arnaud
                    - cover.chambre_matthieu
                  position: 75
              - type: custom:button-card
                template: shutter_position
                variables:
                  cible:
                    - cover.sejour_gauche
                    - cover.sejour_droit
                    - cover.chambre_arnaud
                    - cover.chambre_matthieu
                  position: 25
              - type: custom:button-card
                template: shutter_position
                variables:
                  cible:
                    - cover.sejour_gauche
                    - cover.sejour_droit
                    - cover.chambre_arnaud
                    - cover.chambre_matthieu
                  position: 0
                  confirm: Confirmez-vous la fermeture de tous les volets ?

          ##################################################
          # 🛋️ SÉJOUR
          ##################################################
          - type: custom:button-card
            template: section_header
            name: 🛋️ Séjour

          - type: custom:button-card
            template: sub_section_header
            name: ⬅️ Gauche

          - type: grid
            columns: 4
            square: false
            cards:
              - type: custom:button-card
                template: shutter_position
                variables:
                  cible: [cover.sejour_gauche]
                  position: 100
                  confirm: Confirmez-vous l’ouverture du volet séjour gauche ?
              - type: custom:button-card
                template: shutter_position
                variables:
                  cible: [cover.sejour_gauche]
                  position: 75
              - type: custom:button-card
                template: shutter_position
                variables:
                  cible: [cover.sejour_gauche]
                  position: 25
              - type: custom:button-card
                template: shutter_position
                variables:
                  cible: [cover.sejour_gauche]
                  position: 0
                  confirm: Confirmez-vous la fermeture du volet séjour gauche ?

          - type: custom:button-card
            template: sub_section_header
            name: ➡️ Droit

          - type: grid
            columns: 4
            square: false
            cards:
              - type: custom:button-card
                template: shutter_position
                variables:
                  cible: [cover.sejour_droit]
                  position: 100
                  confirm: Confirmez-vous l’ouverture du volet séjour droit ?
              - type: custom:button-card
                template: shutter_position
                variables:
                  cible: [cover.sejour_droit]
                  position: 75
              - type: custom:button-card
                template: shutter_position
                variables:
                  cible: [cover.sejour_droit]
                  position: 25
              - type: custom:button-card
                template: shutter_position
                variables:
                  cible: [cover.sejour_droit]
                  position: 0
                  confirm: Confirmez-vous la fermeture du volet séjour droit ?

          - type: custom:button-card
            template: sub_section_header
            name: 🛋️ Global

          - type: grid
            columns: 4
            square: false
            cards:
              - type: custom:button-card
                template: shutter_position
                variables:
                  cible: [cover.sejour_gauche, cover.sejour_droit]
                  position: 100
                  confirm: Confirmez-vous l’ouverture des volets du séjour ?
              - type: custom:button-card
                template: shutter_position
                variables:
                  cible: [cover.sejour_gauche, cover.sejour_droit]
                  position: 75
              - type: custom:button-card
                template: shutter_position
                variables:
                  cible: [cover.sejour_gauche, cover.sejour_droit]
                  position: 25
              - type: custom:button-card
                template: shutter_position
                variables:
                  cible: [cover.sejour_gauche, cover.sejour_droit]
                  position: 0
                  confirm: Confirmez-vous la fermeture des volets du séjour ?

          ######################################################
          # 🛏️ CHAMBRES
          ######################################################
          - type: custom:button-card
            template: section_header
            name: 🛏️ Chambres

          - type: custom:button-card
            template: sub_section_header
            name: 🛏️ Arnaud

          - type: grid
            columns: 4
            square: false
            cards:
              - type: custom:button-card
                template: shutter_position
                variables:
                  cible: [cover.chambre_arnaud]
                  position: 100
                  confirm: Confirmez-vous l’ouverture du volet de la chambre d’Arnaud ?
              - type: custom:button-card
                template: shutter_position
                variables:
                  cible: [cover.chambre_arnaud]
                  position: 75
              - type: custom:button-card
                template: shutter_position
                variables:
                  cible: [cover.chambre_arnaud]
                  position: 25
              - type: custom:button-card
                template: shutter_position
                variables:
                  cible: [cover.chambre_arnaud]
                  position: 0
                  confirm: Confirmez-vous la fermeture du volet de la chambre d’Arnaud ?

          - type: custom:button-card
            template: sub_section_header
            name: 🛏️ Matthieu

          - type: grid
            columns: 4
            square: false
            cards:
              - type: custom:button-card
                template: shutter_position
                variables:
                  cible: [cover.chambre_matthieu]
                  position: 100
                  confirm: Confirmez-vous l’ouverture du volet de la chambre de Matthieu ?
              - type: custom:button-card
                template: shutter_position
                variables:
                  cible: [cover.chambre_matthieu]
                  position: 75
              - type: custom:button-card
                template: shutter_position
                variables:
                  cible: [cover.chambre_matthieu]
                  position: 25
              - type: custom:button-card
                template: shutter_position
                variables:
                  cible: [cover.chambre_matthieu]
                  position: 0
                  confirm: Confirmez-vous la fermeture du volet de la chambre de Matthieu ?

          - type: custom:button-card
            template: sub_section_header
            name: 🛏 Global

          - type: grid
            columns: 4
            square: false
            cards:
              - type: custom:button-card
                template: shutter_position
                variables:
                  cible: [cover.chambre_arnaud, cover.chambre_matthieu]
                  position: 100
                  confirm: Confirmez-vous l’ouverture des volets des chambres ?
              - type: custom:button-card
                template: shutter_position
                variables:
                  cible: [cover.chambre_arnaud, cover.chambre_matthieu]
                  position: 75
              - type: custom:button-card
                template: shutter_position
                variables:
                  cible: [cover.chambre_arnaud, cover.chambre_matthieu]
                  position: 25
              - type: custom:button-card
                template: shutter_position
                variables:
                  cible: [cover.chambre_arnaud, cover.chambre_matthieu]
                  position: 0
                  confirm: Confirmez-vous la fermeture des volets des chambres ?
