button_card_templates: !include_dir_merge_named /config/19_button_card_templates

views:
  - badges: !include ../../includes/badges/diagnostics_systeme.yaml

    # ==========================================================
    # 🛰️ PONT RAIN BIRD — COCKPIT D'ÉTAT (lecture seule)
    # ----------------------------------------------------------
    # Observabilité seule, façon Boiler Bridge : button-card
    # compacts, 1 valeur = 1 carte, aucun markdown permanent.
    # Aucune commande Rain Bird, aucune entité native d'action,
    # aucun tap_action vers une commande. L'UI montre, elle ne
    # décide pas. La santé reflète honnêtement 'degrade'.
    # ==========================================================
    cards:
      - type: vertical-stack
        cards:

          # =========================================================
          # 🛰️ État pont
          # =========================================================
          - type: custom:button-card
            template: section_header
            name: 🛰️ État pont

          - type: grid
            columns: 3
            square: false
            cards:
              - type: custom:button-card
                template: rain_bird_status_health_72
                entity: sensor.rain_bird_pont_sante
                name: Santé
                icon: mdi:heart-pulse

              - type: custom:button-card
                template: status_72_on_off
                entity: binary_sensor.rain_bird_pont_donnees_disponibles
                name: Disponibles
                icon: mdi:database-check

              - type: custom:button-card
                template: status_72_on_off
                entity: binary_sensor.rain_bird_pont_donnees_fraiches
                name: Fraîches
                icon: mdi:clock-check-outline

          # =========================================================
          # 📶 Liens & alimentation (une seule carte par valeur)
          # =========================================================
          - type: custom:button-card
            template: section_header
            name: 📶 Liens & alimentation

          - type: grid
            columns: 3
            square: false
            cards:
              - type: custom:button-card
                template: carte_kpi_bleu
                entity: sensor.rain_bird_bat_bt_2_e9a3_bridge_wifi_rssi
                name: Wi-Fi RSSI
                icon: mdi:wifi

              - type: custom:button-card
                template: carte_kpi_bleu
                entity: sensor.rain_bird_bat_bt_2_e9a3_ble_rssi
                name: BLE RSSI
                icon: mdi:bluetooth

              - type: custom:button-card
                template: carte_kpi_bleu
                entity: sensor.rain_bird_bat_bt_2_e9a3_battery_level
                name: Batterie
                icon: mdi:battery

          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:button-card
                template: socle_info_72
                entity: sensor.rain_bird_bat_bt_2_e9a3_bridge_heartbeat
                name: Heartbeat
                icon: mdi:heart-flash

              - type: custom:button-card
                template: socle_info_72
                entity: sensor.rain_bird_bat_bt_2_e9a3_active_station
                name: Station active
                icon: mdi:sprinkler-variant

          # =========================================================
          # 🔒 Préconditions
          # =========================================================
          - type: custom:button-card
            template: section_header
            name: 🔒 Préconditions

          - type: custom:button-card
            template: status_72_on_off
            entity: binary_sensor.arrosage_rain_bird_preconditions_runtime
            name: Préconditions runtime
            icon: mdi:check-decagram

          # Détail des critères : conditionnel (uniquement si non satisfaites)
          - type: conditional
            conditions:
              - entity: binary_sensor.arrosage_rain_bird_preconditions_runtime
                state: "off"
            card:
              type: markdown
              content: >
                <div style="font-size: 13px; line-height: 1.6;">
                <b>Critères non satisfaits :</b><br>
                • BLE exploitable : {{ '✅' if state_attr('binary_sensor.arrosage_rain_bird_preconditions_runtime', 'ble_ok') else '⛔' }}<br>
                • Batterie connue : {{ '✅' if state_attr('binary_sensor.arrosage_rain_bird_preconditions_runtime', 'batterie_ok') else '⛔' }}<br>
                • Wi-Fi exploitable : {{ '✅' if state_attr('binary_sensor.arrosage_rain_bird_preconditions_runtime', 'wifi_ok') else '⛔' }}<br>
                • Test station courte : {{ '✅' if state_attr('binary_sensor.arrosage_rain_bird_preconditions_runtime', 'station_courte_validee') else '⛔' }}<br>
                • Test Stop All : {{ '✅' if state_attr('binary_sensor.arrosage_rain_bird_preconditions_runtime', 'stop_all_valide') else '⛔' }}<br>
                • Emplacement physique : {{ '✅' if state_attr('binary_sensor.arrosage_rain_bird_preconditions_runtime', 'emplacement_valide') else '⛔' }}<br>
                • Wi-Fi qualifié : {{ '✅' if state_attr('binary_sensor.arrosage_rain_bird_preconditions_runtime', 'wifi_qualifie') else '⛔' }}
                </div>

          # =========================================================
          # 🧪 Validation / détails (secondaire)
          # =========================================================
          - type: custom:button-card
            template: section_header
            name: 🧪 Validation / détails

          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:button-card
                template: socle_toggle
                entity: input_boolean.arrosage_rainbird_test_station_courte_valide
                name: Test station courte
                icon: mdi:water

              - type: custom:button-card
                template: socle_toggle
                entity: input_boolean.arrosage_rainbird_test_stop_all_valide
                name: Test Stop All
                icon: mdi:stop-circle-outline

              - type: custom:button-card
                template: socle_toggle
                entity: input_boolean.arrosage_rainbird_emplacement_physique_valide
                name: Emplacement physique
                icon: mdi:map-marker-check

              - type: custom:button-card
                template: socle_toggle
                entity: input_boolean.arrosage_rainbird_wifi_qualifie
                name: Wi-Fi qualifié
                icon: mdi:wifi-check

          - type: grid
            columns: 3
            square: false
            cards:
              - type: custom:button-card
                template: socle_info_72
                entity: sensor.rain_bird_bat_bt_2_e9a3_bridge_version
                name: Version pont
                icon: mdi:tag

              - type: custom:button-card
                template: socle_info_72
                entity: sensor.rain_bird_bat_bt_2_e9a3_bridge_uptime
                name: Uptime
                icon: mdi:timer-outline

              - type: custom:button-card
                template: socle_info_72
                entity: sensor.rain_bird_bat_bt_2_e9a3_bridge_free_heap
                name: Mémoire libre
                icon: mdi:memory
