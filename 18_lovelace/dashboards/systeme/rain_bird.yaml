button_card_templates: !include_dir_merge_named /config/19_button_card_templates

views:
  - badges: !include ../../includes/badges/diagnostics_systeme.yaml

    # ==========================================================
    # 🛰️ PONT RAIN BIRD — COCKPIT D'ÉTAT (lecture seule)
    # ----------------------------------------------------------
    # Observabilité seule, façon Boiler Bridge : button-card
    # compacts, 1 valeur = 1 carte, aucun markdown permanent.
    # Aucune commande Rain Bird, aucune entité native d'action,
    # aucun tap_action vers une commande. L'UI montre, elle ne
    # décide pas. La santé reflète honnêtement 'degrade'.
    # ==========================================================
    cards:
      - type: vertical-stack
        cards:

          # =========================================================
          # 🛰️ État pont
          # =========================================================
          - type: custom:button-card
            template: section_header
            name: 🛰️ État pont

          - type: grid
            columns: 3
            square: false
            cards:
              - type: custom:button-card
                template: rain_bird_status_health_72
                entity: sensor.rain_bird_pont_sante
                name: Santé
                icon: mdi:heart-pulse

              - type: custom:button-card
                template: status_72_on_off
                entity: binary_sensor.rain_bird_pont_donnees_disponibles
                name: Données
                icon: mdi:database-check

              - type: custom:button-card
                template: status_72_on_off
                entity: binary_sensor.rain_bird_pont_donnees_fraiches
                name: Fraîcheur
                icon: mdi:clock-check-outline

          # =========================================================
          # 📶 Liens & alimentation (une seule carte par valeur)
          # =========================================================
          - type: custom:button-card
            template: section_header
            name: 📶 Liens & alimentation

          - type: grid
            columns: 3
            square: false
            cards:
              - type: custom:button-card
                template: carte_kpi_bleu
                entity: sensor.rain_bird_bat_bt_2_e9a3_bridge_wifi_rssi
                name: Wi-Fi RSSI
                icon: mdi:wifi

              - type: custom:button-card
                template: carte_kpi_bleu
                entity: sensor.rain_bird_bat_bt_2_e9a3_ble_rssi
                name: BLE RSSI
                icon: mdi:bluetooth

              - type: custom:button-card
                template: carte_kpi_bleu
                entity: sensor.rain_bird_bat_bt_2_e9a3_battery_level
                name: Batterie
                icon: mdi:battery

          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:button-card
                template: socle_info_72
                entity: sensor.rain_bird_bat_bt_2_e9a3_bridge_heartbeat
                name: Heartbeat
                icon: mdi:heart-flash

              - type: custom:button-card
                template: socle_info_72
                entity: sensor.rain_bird_bat_bt_2_e9a3_active_station
                name: Station active
                icon: mdi:sprinkler-variant

          # =========================================================
          # ℹ️ Informations pont
          # =========================================================
          - type: custom:button-card
            template: section_header
            name: ℹ️ Informations pont

          - type: grid
            columns: 3
            square: false
            cards:
              - type: custom:button-card
                template: socle_info_72
                entity: sensor.rain_bird_bat_bt_2_e9a3_bridge_version
                name: Version pont
                icon: mdi:tag

              - type: custom:button-card
                template: socle_info_72
                entity: sensor.rain_bird_bat_bt_2_e9a3_bridge_uptime
                name: Uptime
                icon: mdi:timer-outline

              - type: custom:button-card
                template: socle_info_72
                entity: sensor.rain_bird_bat_bt_2_e9a3_bridge_free_heap
                name: Mémoire libre
                icon: mdi:memory
