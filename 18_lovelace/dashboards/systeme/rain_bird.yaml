button_card_templates: !include_dir_merge_named /config/19_button_card_templates

views:
  - badges: !include ../../includes/badges/diagnostics_systeme.yaml

    # ==========================================================
    # 🛰️ PONT RAIN BIRD — COCKPIT D'ÉTAT (lecture seule)
    # ----------------------------------------------------------
    # Observabilité seule, façon Boiler Bridge : button-card
    # compacts, 1 valeur = 1 carte, aucun markdown permanent.
    # Aucune commande Rain Bird, aucune entité native d'action,
    # aucun tap_action vers une commande. L'UI montre, elle ne
    # décide pas. La santé reflète honnêtement 'degrade'.
    # ==========================================================
    cards:
      - type: vertical-stack
        cards:

          # =========================================================
          # 🛰️ État pont
          # =========================================================
          - type: custom:button-card
            template: section_header
            name: 🛰️ État pont

          - type: grid
            columns: 3
            square: false
            cards:
              - type: custom:button-card
                template: rain_bird_status_health_72
                entity: sensor.rain_bird_pont_sante
                name: Santé
                icon: mdi:heart-pulse

              - type: custom:button-card
                template: status_72_on_off
                entity: binary_sensor.rain_bird_pont_donnees_disponibles
                name: Données
                icon: mdi:database-check

              - type: custom:button-card
                template: status_72_on_off
                entity: binary_sensor.rain_bird_pont_donnees_fraiches
                name: Fraîcheur
                icon: mdi:clock-check-outline

          # =========================================================
          # 🔐 Préconditions runtime (garde lue par le Run arrosage)
          # =========================================================
          # Surface la garde binaire ET ses trois sous-verdicts
          # (attributs ble_ok / wifi_ok / batterie_ok du capteur —
          # aucune logique recalculée ici). Répond à « pourquoi le
          # motif d'intention affiche préconditions non remplies ? ».
          # Les valeurs BRUTES (RSSI, batterie) sont juste dessous
          # (📶 Liens & alimentation). Plancher radio : -90 dBm
          # (contrat 10, porté par le capteur — pas par l'UI).
          - type: custom:button-card
            template: section_header
            name: 🔐 Préconditions runtime

          - type: custom:button-card
            template: carte_mode_binaire_interprete
            entity: binary_sensor.arrosage_rain_bird_preconditions_runtime
            name: Garde runtime arrosage
            icon: mdi:lock-open-check
            variables:
              label_on: Pont exploitable
              label_off: Précondition manquante
              color_on: 'rgba(76, 175, 80, 0.2)'
              color_off: 'rgba(255, 152, 0, 0.2)'

          - type: grid
            columns: 3
            square: false
            cards:
              - type: custom:button-card
                template: carte_attribut_binaire_interprete
                entity: binary_sensor.arrosage_rain_bird_preconditions_runtime
                name: BLE ≥ -90 dBm
                icon: mdi:bluetooth
                variables:
                  attribut: ble_ok
                  label_ok: Exploitable
                  label_ko: Hors plancher

              - type: custom:button-card
                template: carte_attribut_binaire_interprete
                entity: binary_sensor.arrosage_rain_bird_preconditions_runtime
                name: Wi-Fi ≥ -90 dBm
                icon: mdi:wifi
                variables:
                  attribut: wifi_ok
                  label_ok: Exploitable
                  label_ko: Hors plancher

              - type: custom:button-card
                template: carte_attribut_binaire_interprete
                entity: binary_sensor.arrosage_rain_bird_preconditions_runtime
                name: Batterie connue
                icon: mdi:battery-check
                variables:
                  attribut: batterie_ok
                  label_ok: Connue
                  label_ko: Inconnue

          # =========================================================
          # 📶 Liens & alimentation (une seule carte par valeur)
          # =========================================================
          - type: custom:button-card
            template: section_header
            name: 📶 Liens & alimentation

          - type: grid
            columns: 3
            square: false
            cards:
              - type: custom:button-card
                template: carte_kpi_bleu
                entity: sensor.rain_bird_bat_bt_2_e9a3_bridge_wifi_rssi
                name: Wi-Fi RSSI
                icon: mdi:wifi

              - type: custom:button-card
                template: carte_kpi_bleu
                entity: sensor.rain_bird_bat_bt_2_e9a3_ble_rssi
                name: BLE RSSI
                icon: mdi:bluetooth

              - type: custom:button-card
                template: carte_kpi_bleu
                entity: sensor.rain_bird_bat_bt_2_e9a3_battery_level
                name: Batterie
                icon: mdi:battery

          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:button-card
                template: socle_info_72
                entity: sensor.rain_bird_bat_bt_2_e9a3_bridge_heartbeat
                name: Heartbeat
                icon: mdi:heart-flash

              - type: custom:button-card
                template: socle_info_72
                entity: sensor.rain_bird_bat_bt_2_e9a3_active_station
                name: Station active
                icon: mdi:sprinkler-variant

          # =========================================================
          # ℹ️ Informations pont
          # =========================================================
          - type: custom:button-card
            template: section_header
            name: ℹ️ Informations pont

          - type: grid
            columns: 3
            square: false
            cards:
              - type: custom:button-card
                template: socle_info_72
                entity: sensor.rain_bird_bat_bt_2_e9a3_bridge_version
                name: Version pont
                icon: mdi:tag

              - type: custom:button-card
                template: socle_info_72
                entity: sensor.rain_bird_bat_bt_2_e9a3_bridge_uptime
                name: Uptime
                icon: mdi:timer-outline

              - type: custom:button-card
                template: socle_info_72
                entity: sensor.rain_bird_bat_bt_2_e9a3_bridge_free_heap
                name: Mémoire libre
                icon: mdi:memory
