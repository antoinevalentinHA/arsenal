button_card_templates: !include_dir_merge_named /config/19_button_card_templates

views:
  - badges: !include ../../includes/badges/base.yaml

    cards:
      - type: vertical-stack
        cards:
          # ==================================================
          # 🖥️ ÉTAT GÉNÉRAL
          # ==================================================
          - type: grid
            square: false
            columns: 1
            cards:
              - type: custom:button-card
                template: section_header
                name: 🖥️ État général

              - type: grid
                square: false
                columns: 2
                cards:
                  - type: custom:button-card
                    template: carte_info_systeme
                    entity: sensor.nas_valentin_dernier_demarrage
                    name: Dernier démarrage
                    icon: mdi:clock-outline

                  - type: custom:button-card
                    template: carte_etat_securite
                    entity: binary_sensor.nas_valentin_etat_de_securite
                    name: État de sécurité
                    icon: mdi:shield-check

          # ==================================================
          # 📊 RESSOURCES SYSTÈME
          # ==================================================
          - type: grid
            square: false
            columns: 1
            cards:
              - type: custom:button-card
                template: section_header
                name: 📊 Ressources système

              - type: grid
                square: false
                columns: 4
                cards:
                  - type: custom:button-card
                    template: carte_capteur_seuils
                    entity: sensor.nas_valentin_temperature
                    name: Température
                    icon: mdi:server
                    variables:
                      disable_actions: true
                      unit: "°C"
                      seuil_warn: 50
                      seuil_crit: 60

                  - type: custom:button-card
                    template: carte_capteur_seuils
                    entity: sensor.nas_valentin_utilisation_de_la_memoire_reelle
                    name: Mém. utilisée
                    icon: mdi:memory
                    variables:
                      disable_actions: true
                      unit: "%"
                      seuil_warn: 80
                      seuil_crit: 90

                  - type: custom:button-card
                    template: carte_capteur_seuils
                    entity: sensor.nas_valentin_utilisation_du_processeur_autre
                    name: CPU
                    icon: mdi:chip
                    variables:
                      disable_actions: true
                      unit: "%"
                      seuil_warn: 50
                      seuil_crit: 75

                  - type: custom:button-card
                    template: carte_capteur_seuils
                    entity: sensor.nas_valentin_charge_moyenne_du_processeur_15_min
                    name: Charge CPU
                    icon: mdi:cpu-64-bit
                    variables:
                      disable_actions: true
                      unit: ""
                      seuil_warn: 1.0
                      seuil_crit: 2.0

          # ==================================================
          # 📦 VOLUME 1
          # ==================================================
          - type: grid
            square: false
            columns: 1
            cards:
              - type: custom:button-card
                template: section_header
                name: 📦 Volume 1

              - type: grid
                square: false
                columns: 4
                cards:
                  - type: custom:button-card
                    template: carte_capteur_etat_textuel
                    entity: sensor.nas_valentin_volume_1_etat
                    name: État
                    icon: mdi:database

                  - type: custom:button-card
                    template: carte_capteur_seuils
                    entity: sensor.nas_valentin_volume_1_volume_utilise
                    name: Utilisation (%)
                    icon: mdi:chart-pie
                    variables:
                      disable_actions: true
                      unit: "%"
                      seuil_warn: 80
                      seuil_crit: 90

                  - type: custom:button-card
                    template: carte_capteur_seuils
                    entity: sensor.nas_valentin_volume_1_temperature_moyenne_du_disque
                    name: T° moy.
                    icon: mdi:thermometer
                    variables:
                      disable_actions: true
                      unit: "°C"
                      seuil_warn: 45
                      seuil_crit: 55

                  - type: custom:button-card
                    template: carte_capteur_seuils
                    entity: sensor.nas_valentin_volume_1_temperature_maximale_du_disque
                    name: T° max.
                    icon: mdi:thermometer-alert
                    variables:
                      disable_actions: true
                      unit: "°C"
                      seuil_warn: 45
                      seuil_crit: 55

          # ==================================================
          # 💾 DISQUE 1
          # ==================================================
          - type: grid
            square: false
            columns: 1
            cards:
              - type: custom:button-card
                template: section_header
                name: 💾 Disque 1

              - type: grid
                square: false
                columns: 3
                cards:
                  - type: custom:button-card
                    template: carte_capteur_seuils
                    entity: sensor.nas_valentin_drive_1_temperature
                    name: Température
                    icon: mdi:thermometer
                    variables:
                      disable_actions: true
                      unit: "°C"
                      seuil_warn: 45
                      seuil_crit: 55

                  - type: custom:button-card
                    template: carte_capteur_etat_textuel
                    entity: sensor.nas_valentin_drive_1_etat_intelligent
                    name: SMART
                    icon: mdi:check-decagram

                  - type: custom:button-card
                    template: carte_capteur_etat_textuel
                    entity: sensor.nas_valentin_drive_1_etat
                    name: État
                    icon: mdi:harddisk

              - type: grid
                square: false
                columns: 2
                cards:
                  - type: conditional
                    conditions:
                      - entity: binary_sensor.nas_valentin_drive_2_en_dessous_de_la_duree_de_vie_restante_minimale
                        state: "on"
                    card:
                      type: custom:button-card
                      template: carte_alerte_binaire_critique
                      entity: binary_sensor.nas_valentin_drive_2_en_dessous_de_la_duree_de_vie_restante_minimale
                      name: Durée de vie restante
                      icon: mdi:timer-alert

                  - type: conditional
                    conditions:
                      - entity: binary_sensor.nas_valentin_drive_2_depassement_du_nombre_maximal_de_secteurs_defectueux
                        state: "on"
                    card:
                      type: custom:button-card
                      template: carte_alerte_binaire_critique
                      entity: binary_sensor.nas_valentin_drive_2_depassement_du_nombre_maximal_de_secteurs_defectueux
                      name: Secteurs défectueux
                      icon: mdi:alert-octagram

          # ==================================================
          # 💾 DISQUE 2
          # ==================================================
          - type: grid
            square: false
            columns: 1
            cards:
              - type: custom:button-card
                template: section_header
                name: 💾 Disque 2

              - type: grid
                square: false
                columns: 3
                cards:
                  - type: custom:button-card
                    template: carte_nas_temperature_disque
                    entity: sensor.nas_valentin_drive_2_temperature
                    name: Température
                    icon: mdi:thermometer

                  - type: custom:button-card
                    template: carte_nas_smart_etat
                    entity: sensor.nas_valentin_drive_2_etat_intelligent
                    name: SMART
                    icon: mdi:check-decagram

                  - type: custom:button-card
                    template: carte_nas_drive_etat
                    entity: sensor.nas_valentin_drive_2_etat
                    name: État
                    icon: mdi:harddisk

              - type: grid
                square: false
                columns: 2
                cards:
                  - type: conditional
                    conditions:
                      - entity: binary_sensor.nas_valentin_drive_2_en_dessous_de_la_duree_de_vie_restante_minimale
                        state: "on"
                    card:
                      type: custom:button-card
                      template: carte_alerte_binaire_critique
                      entity: binary_sensor.nas_valentin_drive_2_en_dessous_de_la_duree_de_vie_restante_minimale
                      name: Durée de vie restante
                      icon: mdi:timer-alert

                  - type: conditional
                    conditions:
                      - entity: binary_sensor.nas_valentin_drive_2_depassement_du_nombre_maximal_de_secteurs_defectueux
                        state: "on"
                    card:
                      type: custom:button-card
                      template: carte_alerte_binaire_critique
                      entity: binary_sensor.nas_valentin_drive_2_depassement_du_nombre_maximal_de_secteurs_defectueux
                      name: Secteurs défectueux
                      icon: mdi:alert-octagram

          # ==================================================
          # ⚙️ COMMANDES SYSTÈME
          # ==================================================
          - type: grid
            square: false
            columns: 1
            cards:
              - type: custom:button-card
                template: section_header
                name: ⚙️ Commandes système

              - type: grid
                square: false
                columns: 2
                cards:
                  - type: custom:button-card
                    template: carte_action_critique
                    entity: button.nas_valentin_reboot
                    name: Redémarrer NAS
                    icon: mdi:nas
                    variables:
                      confirmation: Êtes-vous sûr de vouloir redémarrer le NAS ?

                  - type: custom:button-card
                    template: carte_action_critique
                    entity: button.nas_valentin_shutdown
                    name: Éteindre NAS
                    icon: mdi:power
                    variables:
                      confirmation: Êtes-vous sûr de vouloir éteindre le NAS ?
