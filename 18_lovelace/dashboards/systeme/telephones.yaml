button_card_templates: !include_dir_merge_named /config/19_button_card_templates

views:
  - badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

      - type: custom:button-card
        template: bouton_retour_badge_carre
        tap_action:
          action: navigate
          navigation_path: /system-dashboard

    ########################################################
    # ♨️ VERTICAL STACK PRINCIPAL
    ########################################################
    cards:
      - type: vertical-stack
        cards:
          # ✅ Bandeau de validité (conditionnel)
          - !include ../../includes/alerte_configuration_invalide.yaml

          ####################################################
          # 📱 TELEPHONES
          ####################################################
          - type: custom:button-card
            template: section_header
            name: 📱 Téléphones

          - type: tile
            entity: input_text.telephone_parent_1
            name: Téléphone Parent 1

          - type: tile
            entity: input_text.telephone_parent_2
            name: Téléphone Parent 2
