# ==========================================================
# 🚘 DASHBOARD : Audi A3 e-tron – Sécurité
# ----------------------------------------------------------
# 🧠 Rôle :
#   Affiche en détail l’état de verrouillage et d’ouverture
#   de chaque portière du véhicule Audi A3 e-tron.
#
# 💡 Objectif :
#   - Vérifier visuellement chaque capteur de porte
#   - Identifier rapidement toute anomalie d’ouverture
#   - Couleur, icône et état unifiés avec le thème Arsenal
#
# 🎨 Couleurs :
#   - 🟩 Vert → Portière verrouillée (off)
#   - 🟥 Rouge → Portière ouverte (on)
#   - ⚪ Gris → Capteur indisponible
#
# ✅ Compatible : Lovelace / button-card / HA 2024.8+
# ==========================================================
button_card_templates: !include_dir_merge_named /config/19_button_card_templates

views:
  - badges: !include ../../includes/badges/base.yaml

    # ======================================================
    # 🚘 CONTENU PRINCIPAL — FLUX VERTICAL CANON ARSENAL
    # ------------------------------------------------------
    # badges
    #   ↓
    # vertical-stack racine
    # ======================================================
    cards:
      - type: vertical-stack
        cards:
          # ------------------------------------------------------
          # 🧭 Navigation voiture
          # ------------------------------------------------------
          - !include ../../includes/navigation/voiture.yaml

          # ======================================================
          # 🚪 SECTION : Portières
          # ======================================================
          - type: custom:button-card
            template: section_header
            name: 🚪 Portières

          - square: false
            type: grid
            columns: 2
            cards:
              - type: custom:button-card
                template: audi_etat_capteur
                entity: binary_sensor.audi_e_tron_porte_avant_gauche_local
                name: Avant gauche
                icon: mdi:car-door-lock
                tap_action: none

              - type: custom:button-card
                template: audi_etat_capteur
                entity: binary_sensor.audi_e_tron_porte_avant_droite_local
                name: Avant droite
                icon: mdi:car-door-lock
                tap_action: none

              - type: custom:button-card
                template: audi_etat_capteur
                entity: binary_sensor.audi_e_tron_porte_arriere_gauche_local
                name: Arrière gauche
                icon: mdi:car-door-lock
                tap_action: none

              - type: custom:button-card
                template: audi_etat_capteur
                entity: binary_sensor.audi_e_tron_porte_arriere_droite_local
                name: Arrière droite
                icon: mdi:car-door-lock
                tap_action: none

          # ======================================================
          # 🧳 SECTION : Coffre
          # ======================================================
          - square: false
            type: grid
            columns: 1
            cards:
              - type: custom:button-card
                template: audi_etat_capteur
                entity: binary_sensor.audi_e_tron_coffre_verrouille_local
                name: Coffre
                icon: mdi:car-back
                tap_action: none

          # ======================================================
          # 🪟 SECTION : Fenêtres
          # ======================================================
          - type: custom:button-card
            template: section_header
            name: 🪟 Fenêtres

          - square: false
            type: grid
            columns: 2
            cards:
              - type: custom:button-card
                template: audi_etat_capteur
                entity: binary_sensor.audi_e_tron_fenetre_avant_gauche_local
                name: Avant gauche
                icon: mdi:window-closed
                tap_action: none

              - type: custom:button-card
                template: audi_etat_capteur
                entity: binary_sensor.audi_e_tron_fenetre_avant_droite_local
                name: Avant droite
                icon: mdi:window-closed
                tap_action: none

              - type: custom:button-card
                template: audi_etat_capteur
                entity: binary_sensor.audi_e_tron_fenetre_arriere_gauche_local
                name: Arrière gauche
                icon: mdi:window-closed
                tap_action: none

              - type: custom:button-card
                template: audi_etat_capteur
                entity: binary_sensor.audi_e_tron_fenetre_arriere_droite_local
                name: Arrière droite
                icon: mdi:window-closed
                tap_action: none

          # ======================================================
          # 🌤️ SECTION : Toit ouvrant
          # ======================================================
          - square: false
            type: grid
            columns: 1
            cards:
              - type: custom:button-card
                template: audi_etat_capteur
                entity: binary_sensor.audi_e_tron_toit_ouvrant_local
                name: Toit ouvrant
                icon: mdi:window-closed
                tap_action: none
