# ==========================================================
# ⚙️ DASHBOARD : Audi A3 e-tron – Statistiques batterie
# ----------------------------------------------------------
# 🧠 Rôle :
#   Fournir un suivi complet de l’autonomie en pleine charge
#   du véhicule Audi A3 e-tron, sur 30 jours glissants.
#
# 💡 Objectif :
#   - Visualiser l’évolution quotidienne et mensuelle
#   - Estimer la santé de la batterie via les moyennes
#   - Calculer la perte d’autonomie depuis le pic historique
#
# 📊 Structure :
#   1️⃣ Historique des mesures (graphique brut)
#   2️⃣ Moyennes glissantes (statistics-graph)
#   3️⃣ Analyse textuelle (markdown)
#
# ✅ Compatible : Lovelace / HA 2024.8+
# ==========================================================

button_card_templates: !include_dir_merge_named /config/19_button_card_templates

views:
  - badges: !include ../../includes/badges/base.yaml

    # ======================================================
    # 📊 CONTENU PRINCIPAL — FLUX VERTICAL CANON ARSENAL
    # ------------------------------------------------------
    # badges
    #   ↓
    # vertical-stack racine
    # ======================================================
    cards:
      - type: vertical-stack
        cards:
          # ------------------------------------------------------
          # 🧭 Navigation voiture
          # ------------------------------------------------------
          - !include ../../includes/navigation/voiture.yaml

          # ------------------------------------------------------
          # 🏷️ En-tête de section
          # ------------------------------------------------------
          - type: custom:button-card
            template: section_header
            name: 🔋 Autonomie pleine charge

          # ------------------------------------------------------
          # 📊 Graphique statistique (moyennes glissantes)
          # ------------------------------------------------------
          - type: statistics-graph
            chart_type: line
            period: week
            days_to_show: 365
            entities:
              - entity: sensor.autonomie_audi_e_tron_mensuelle
                name: Moyenne hebdomadaire (km)
                stat_types:
                  - mean

          # ------------------------------------------------------
          # 📊 Co-visualisation autonomie / température snapshot
          # ------------------------------------------------------
          - type: custom:apexcharts-card

            header:
              show: true
              title: Tendance autonomie / température

            graph_span: 365d

            apex_config:
              chart:
                height: 260
                animations:
                  enabled: true

              stroke:
                curve: smooth

              grid:
                borderColor: rgba(0,0,0,0.08)

              tooltip:
                shared: true

              xaxis:
                labels:
                  datetimeUTC: false

              legend:
                show: true

            yaxis:
              - id: autonomie
                min: 20
                max: 40

              - id: temperature
                opposite: true
                min: -10
                max: 40

            series:
              - entity: sensor.autonomie_audi_e_tron_mensuelle
                name: Autonomie moyenne
                yaxis_id: autonomie
                type: line
                color: "rgba(76, 175, 80, 0.9)"
                stroke_width: 3
                group_by:
                  duration: 1w
                  func: avg

              - entity: sensor.audi_temperature_charge_mensuelle
                name: Température moyenne charge
                yaxis_id: temperature
                type: line
                color: "rgba(144, 202, 249, 0.9)"
                stroke_width: 3
                group_by:
                  duration: 1w
                  func: avg

          # ------------------------------------------------------
          # 🧮 Analyse textuelle complète (bilan mensuel)
          # ------------------------------------------------------
          - type: markdown
            content: >
              <div style="line-height: 1.5; margin-bottom: 6px;">
              {% set actuel = (states('sensor.autonomie_audi_e_tron_mensuelle') | float(0)) | round(1) %}
              {% set historique = states('input_text.historique_autonomie_audi_etron') %}
              {% set lignes = historique.split('\n') if historique else [] %}
              {% set valeurs = [] %}
              {% for ligne in lignes %}
                {% set match = ligne | regex_search('([0-9]+\\.?[0-9]*)') %}
                {% if match %}
                  {% set valeurs = valeurs + [match | float] %}
                {% endif %}
              {% endfor %}
              {% if valeurs|length > 0 %}
                {% set maxv = valeurs|max %}
                {% set perte = ((maxv - actuel) / maxv * 100) | round(1) %}
              {% else %}
                {% set maxv = None %}
                {% set perte = None %}
              {% endif %}

              {% if actuel > 0 %}
              <b>Moyenne du mois en cours :</b> {{ actuel }} km<br>
              {% else %}
              <b>Moyenne du mois en cours :</b> <i>en attente de données</i><br>
              {% endif %}

              {% if perte is not none and actuel > 0 %}
              📉 <b>Perte depuis le pic :</b> {{ perte }} %<br>
              {% endif %}

              {% if historique and historique != 'unknown' %}
              <br>
              🗓️ <b>Historique (5 derniers mois) :</b><br>
              <pre style="margin: 4px 0 0 0;">{{ historique }}</pre>
              {% else %}
              <br>
              🗓️ <b>Historique (5 derniers mois) :</b><br>
              <i>Aucun historique disponible</i>
              {% endif %}
              </div>
