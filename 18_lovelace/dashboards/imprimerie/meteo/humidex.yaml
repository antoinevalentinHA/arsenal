button_card_templates: !include_dir_merge_named /config/19_button_card_templates

views:
  - badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

    cards:
      - type: vertical-stack
        cards:
          - !include ../../../includes/navigation/imprimerie.yaml

          # ======================================================
          # 🌳 EXTÉRIEUR
          # ======================================================
          - type: custom:button-card
            template: section_header
            name: 🌳 Extérieur

          - square: false
            type: grid
            columns: 1
            cards:
              - type: custom:button-card
                template: socle_kpi
                entity: sensor.humidex_exterieur
                name: Humidex
                icon: mdi:thermometer-water
                triggers_update:
                  - sensor.couleur_humidex_exterieur

          # ======================================================
          # 🖥️ BUREAUX
          # ======================================================
          - type: custom:button-card
            template: section_header
            name: 🖥️ Bureaux

          - type: custom:button-card
            template: socle_kpi
            entity: sensor.humidex_direction
            name: Direction
            icon: mdi:thermometer-water
            triggers_update:
              - sensor.couleur_humidex_direction

          - square: false
            type: grid
            columns: 2
            cards:
              - type: custom:button-card
                template: socle_kpi
                entity: sensor.humidex_compta
                name: Compta
                icon: mdi:thermometer-water
                triggers_update:
                  - sensor.couleur_humidex_compta

              - type: custom:button-card
                template: socle_kpi
                entity: sensor.humidex_qualite
                name: Qualité
                icon: mdi:thermometer-water
                triggers_update:
                  - sensor.couleur_humidex_qualite

              - type: custom:button-card
                template: socle_kpi
                entity: sensor.humidex_devis
                name: Devis
                icon: mdi:thermometer-water
                triggers_update:
                  - sensor.couleur_humidex_devis

              - type: custom:button-card
                template: socle_kpi
                entity: sensor.humidex_commercial
                name: Commercial
                icon: mdi:thermometer-water
                triggers_update:
                  - sensor.couleur_humidex_commercial

          # ======================================================
          # 🏢 ATELIER
          # ======================================================
          - !include ../../../includes/section_headers/atelier.yaml

          - square: false
            type: grid
            columns: 3
            cards:
              - type: custom:button-card
                template: socle_kpi
                entity: sensor.humidex_komori
                name: Komori
                icon: mdi:thermometer-water
                triggers_update:
                  - sensor.couleur_humidex_komori

              - type: custom:button-card
                template: socle_kpi
                entity: sensor.humidex_bobst
                name: Bobst
                icon: mdi:thermometer-water
                triggers_update:
                  - sensor.couleur_humidex_bobst

              - type: custom:button-card
                template: socle_kpi
                entity: sensor.humidex_media
                name: Media
                icon: mdi:thermometer-water
                triggers_update:
                  - sensor.couleur_humidex_media
