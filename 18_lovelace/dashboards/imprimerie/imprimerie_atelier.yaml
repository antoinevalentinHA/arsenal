button_card_templates: !include_dir_merge_named /config/19_button_card_templates

views:
  - badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

    ########################################################
    # 🧩 VERTICAL STACK PRINCIPAL
    ########################################################
    cards:
      - !include ../../includes/navigation/imprimerie.yaml

      - type: vertical-stack
        cards:
          - !include ../../includes/section_headers/conditions_actuelles.yaml

          - !include ../../includes/cartes/imprimerie_conditions_atelier.yaml

          - !include ../../includes/section_headers/min_max_semaine.yaml

          - !include ../../includes/cartes/imprimerie_en_cours_atelier.yaml

          - !include ../../includes/section_headers/historique_4_semaines.yaml

          - !include ../../includes/cartes/imprimerie_historique_atelier.yaml

          - type: horizontal-stack
            cards:
              - type: custom:button-card
                template: badge_action_confirmee
                icon: mdi:delete-outline
                variables:
                  action_service: script.reset_atelier_historique
                  confirm: 🗑️ Réinitialiser l’historique hebdo de l’atelier ?
                  bg_color: rgba(244, 67, 54, 0.2)
                  icon_color: "#B71C1C"

              - type: custom:button-card
                template: badge_action_confirmee
                icon: mdi:playlist-edit
                variables:
                  action_service: automation.trigger
                  action_data:
                    entity_id: automation.imprimerie_atelier_archivage_hebdo
                  confirm: 📋 Forcer l’archivage hebdo des conditions atelier ?
                  bg_color: rgba(33, 150, 243, 0.2)
                  icon_color: "#1565C0"
