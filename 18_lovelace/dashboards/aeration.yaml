button_card_templates: !include_dir_merge_named /config/19_button_card_templates

views:
  - badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

      - type: custom:button-card
        template: bouton_parametres_badge_carre
        tap_action:
          action: navigate
          navigation_path: /reglages-aeration-dashboard/aeration

      - type: custom:button-card
        template: bouton_diagnostics_badge_carre
        tap_action:
          action: navigate
          navigation_path: /diagnostics-aeration-dashboard/diagnostics-aeration

    cards:
      - type: vertical-stack
        cards:
          # ==================================================
          # 🪟 AÉRATION RDC
          # ==================================================
          - type: grid
            square: false
            columns: 1
            cards:
              - type: custom:button-card
                template: section_header
                name: 🪟 Aération RDC

              - type: custom:button-card
                template: carte_aeration_preferable
                entity: binary_sensor.aeration_preferable_rdc
                name: Aération RDC

              - !include ../includes/sub_section_headers/criteres.yaml

              # Trio DeltaHA / DeltaT / Pluie
              - type: grid
                square: false
                columns: 3
                cards:
                  - type: custom:button-card
                    template: carte_delta_ha
                    entity: binary_sensor.aeration_preferable_rdc
                    name: Δ Humidité absolue

                  - type: custom:button-card
                    template: carte_delta_t
                    entity: binary_sensor.aeration_preferable_rdc
                    name: Δ Température

                  - !include ../includes/cartes/aeration_pluie.yaml

              # Duo Fenêtre / Durée
              - type: grid
                square: false
                columns: 2
                cards:
                  - type: custom:button-card
                    template: carte_mode_binaire_interprete
                    entity: binary_sensor.fenetre_ouverte_rdc
                    name: RDC
                    icon: mdi:door-open
                    tap_action: none

                  - type: custom:button-card
                    template: carte_duree_aeration
                    entity: input_number.duree_aeration_rdc_stock
                    name: Durée RDC

          # ==================================================
          # 🪟 AÉRATION ÉTAGE
          # ==================================================
          - type: grid
            square: false
            columns: 1
            cards:
              - type: custom:button-card
                template: section_header
                name: 🪟 Aération Étage

              - type: custom:button-card
                template: carte_aeration_preferable
                entity: binary_sensor.aeration_preferable_etage
                name: Aération Étage

              - !include ../includes/sub_section_headers/criteres.yaml

              # Trio DeltaHA / DeltaT / Pluie
              - type: grid
                square: false
                columns: 3
                cards:
                  - type: custom:button-card
                    template: carte_delta_ha
                    entity: binary_sensor.aeration_preferable_etage
                    name: Δ Humidité absolue

                  - type: custom:button-card
                    template: carte_delta_t
                    entity: binary_sensor.aeration_preferable_etage
                    name: Δ Température

                  - !include ../includes/cartes/aeration_pluie.yaml

              # Duo Fenêtre / Durée
              - type: grid
                square: false
                columns: 2
                cards:
                  - type: custom:button-card
                    template: carte_mode_binaire_interprete
                    entity: binary_sensor.fenetre_ouverte_etage
                    name: Étage
                    icon: mdi:door-open
                    tap_action: none

                  - type: custom:button-card
                    template: carte_duree_aeration
                    entity: input_number.duree_aeration_etage_stock
                    name: Durée Étage
