button_card_templates: !include_dir_merge_named /config/19_button_card_templates

views:
  - badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

      - type: custom:button-card
        entity: input_boolean.navigation_menu
        template: bouton_retour_badge_carre
        tap_action:
          action: navigate
          navigation_path: /alarme-dashboard

    cards:
      - type: vertical-stack
        cards:
          - type: custom:button-card
            template: section_header
            name: 🔐 Modes

          - type: tile
            entity: input_boolean.mode_test_alarme
            name: Mode test

          - type: tile
            entity: input_select.mode_alarme
            name: Mode d’armement
            features_position: bottom
            features:
              - type: select-options

          - type: custom:button-card
            template: section_header
            name: 🌍 Zone sécurité

          - type: tile
            entity: input_number.zone_securite_radius
            name: Zone sécurité (m)
            features_position: inline
            features:
              - type: numeric-input
                style: buttons

          - type: custom:button-card
            template: section_header
            name: ⌛ Délais (s)

          - type: tile
            entity: input_number.alarme_delai_entree
            name: 📡 Delai d'entrée
            icon: mdi:timer-outline
            features_position: inline
            features:
              - type: numeric-input
                style: buttons

          - type: tile
            entity: number.sirene_max_duration
            name: 🚨 Durée max sirène
            icon: mdi:timer-alert
            features_position: inline
            features:
              - type: numeric-input
                style: buttons
