button_card_templates: !include_dir_merge_named /config/19_button_card_templates

views:
  - badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

      - type: custom:button-card
        entity: input_boolean.navigation_menu
        template: bouton_retour_badge_carre
        tap_action:
          action: navigate
          navigation_path: /alarme-dashboard

    cards:
      - type: vertical-stack
        cards:
          # ======================================================
          # ✅ BANDEAU DE VALIDITÉ (conditionnel)
          # ======================================================
          - !include ../../includes/alerte_configuration_invalide.yaml

          # ======================================================
          # 🛡️ SÉCURITÉ — RÉGLAGES SENSIBLES
          # ======================================================
          - type: custom:button-card
            template: section_header
            name: 🛡️ Sécurité — réglages sensibles

          - type: markdown
            content: >
              Ces réglages modifient le comportement de protection.
              Vérifier l’effet avant toute modification.

          - type: custom:button-card
            template: sub_section_header
            name: 🔐 Mode d’armement

          - type: tile
            entity: input_select.mode_alarme
            name: Mode d’armement
            features_position: bottom
            features:
              - type: select-options

          - type: markdown
            content: >
              « Désactivé » interdit tout armement, manuel comme automatique.

          - type: custom:button-card
            template: sub_section_header
            name: 🌍 Zone de sécurité

          - type: tile
            entity: input_number.zone_securite_radius
            name: Zone sécurité (m)
            features_position: inline
            features:
              - type: numeric-input
                style: buttons

          - type: markdown
            content: >
              Rayon de la zone de géolocalisation utilisée par la logique de
              présence / sécurité.

          - type: custom:button-card
            template: sub_section_header
            name: ⌛ Délai d’entrée (s)

          - type: tile
            entity: input_number.alarme_delai_entree
            name: 📡 Delai d'entrée
            icon: mdi:timer-outline
            features_position: inline
            features:
              - type: numeric-input
                style: buttons

          - type: markdown
            content: >
              Temps accordé pour désarmer après ouverture d’un accès protégé ;
              un délai court laisse moins de temps pour réagir.

          # ======================================================
          # 🚨 SIRÈNE
          # ======================================================
          - type: custom:button-card
            template: section_header
            name: 🚨 Sirène

          - type: tile
            entity: number.sirene_max_duration
            name: 🚨 Durée max sirène
            icon: mdi:timer-alert
            features_position: inline
            features:
              - type: numeric-input
                style: buttons

          # ======================================================
          # 🧪 TEST / MAINTENANCE
          # ======================================================
          - type: custom:button-card
            template: section_header
            name: 🧪 Test / Maintenance

          - type: markdown
            content: >
              Neutralise temporairement la protection, à des fins de test
              uniquement.

          - type: custom:button-card
            template: socle_toggle_confirme
            entity: input_boolean.mode_test_alarme
            name: Mode test
            icon: mdi:shield-off
