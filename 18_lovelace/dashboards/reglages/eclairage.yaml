button_card_templates: !include_dir_merge_named /config/19_button_card_templates

views:
  - badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

      - type: custom:button-card
        template: bouton_retour_badge_carre
        tap_action:
          action: navigate
          navigation_path: /eclairage-dashboard/home

    cards:
      - type: vertical-stack
        cards:
          - type: custom:button-card
            template: section_header
            name: 💡 Éclairage auto

          - !include ../../includes/sub_section_headers/garage.yaml

          - type: tile
            entity: input_boolean.garage_auto_light
            name: Mode auto

          - type: tile
            entity: input_number.duree_absence_garage
            name: Délai extinction garage (min)
            features_position: inline
            features:
              - type: numeric-input
                style: buttons

          - type: tile
            entity: input_number.garage_seuil_luminosite_allumage_auto
            name: Luminosité max
            features_position: inline
            features:
              - type: numeric-input
                style: buttons

          - !include ../../includes/sub_section_headers/entree.yaml

          - type: tile
            entity: input_boolean.entree_auto_light
            name: Mode auto

          - type: tile
            entity: input_number.duree_absence_entree
            name: Délai extinction entrée (s)
            features_position: inline
            features:
              - type: numeric-input
                style: buttons

          - !include ../../includes/sub_section_headers/sejour.yaml

          - type: tile
            entity: input_boolean.sejour_auto_light
            name: Mode auto

          - type: tile
            entity: input_number.duree_absence_sejour
            name: Délai extinction séjour (min)
            features_position: inline
            features:
              - type: numeric-input
                style: buttons

          - type: custom:button-card
            template: sub_section_header
            name: Sapin 🎄

          - type: tile
            entity: input_boolean.prise_baies_vitrees_auto
            name: Mode auto

          - type: tile
            entity: input_number.duree_absence_guirlande
            name: Délai extinction sapin (min)
            features_position: inline
            features:
              - type: numeric-input
                style: buttons

          - !include ../../includes/section_headers/jardin.yaml

          - type: custom:button-card
            template: sub_section_header
            name: 🔘 Activation des automatismes

          - type: grid
            square: false
            columns: 2
            cards:
              - type: tile
                entity: input_boolean.auto_lumiere_jardin_matin
                name: Matin

              - type: tile
                entity: input_boolean.auto_lumiere_jardin_soir
                name: Soir

          - type: custom:button-card
            template: sub_section_header
            name: 🌅 Matin

          - type: tile
            entity: input_datetime.heure_allumage_jardin_matin
            name: Heure d’allumage

          - type: tile
            entity: input_number.delai_extinction_jardin_matin
            name: Délai après lever du jour (min)
            features_position: inline
            features:
              - type: numeric-input
                style: buttons

          - type: tile
            entity: input_datetime.heure_extinction_jardin_matin_fixe
            name: Heure d’extinction fixe

          - type: custom:button-card
            template: sub_section_header
            name: 🌇 Soir

          - type: tile
            entity: input_number.delai_allumage_jardin_soir
            name: Délai après coucher du soleil (min)
            features_position: inline
            features:
              - type: numeric-input
                style: buttons

          - type: tile
            entity: input_number.duree_lumiere_jardin_soir
            name: Durée de l’éclairage
            features_position: inline
            features:
              - type: numeric-input
                style: buttons

          - type: custom:button-card
            template: section_header
            name: 🛏️ Simulation de présence

          - type: tile
            entity: input_boolean.activation_simulation_presence_vacances
            name: Activer en vacances

          - type: tile
            entity: input_boolean.test_simulation_presence
            name: Activer le mode test

          # ⏱️ Durée
          - type: custom:button-card
            template: sub_section_header
            name: ⏱️ Durée (min)

          - type: grid
            square: false
            columns: 2
            cards:
              - type: tile
                entity: input_number.duree_min_cycle_simulation_presence
                name: min
                features_position: inline
                features:
                  - type: numeric-input
                    style: buttons

              - type: tile
                entity: input_number.duree_max_cycle_simulation_presence
                name: max
                features_position: inline
                features:
                  - type: numeric-input
                    style: buttons

          - !include ../../includes/section_headers/entree.yaml

          # 🌅 Réglages matin - Entrée
          - type: custom:button-card
            template: sub_section_header
            name: 🌅 Matin

          - type: grid
            square: false
            columns: 2
            cards:
              - type: tile
                entity: input_datetime.debut_cycle_simulation_presence_matin_entree
                name: "de"

              - type: tile
                entity: input_datetime.fin_cycle_simulation_presence_matin_entree
                name: "à"

          - type: tile
            entity: input_number.nb_cycles_simulation_presence_matin_entree
            name: Cycles
            features_position: inline
            features:
              - type: numeric-input
                style: buttons

          # 🌇 Réglages soir - Entrée
          - type: custom:button-card
            template: sub_section_header
            name: 🌇 Soir

          - type: grid
            square: false
            columns: 2
            cards:
              - type: tile
                entity: input_datetime.debut_cycle_simulation_presence_soir_entree
                name: "de"

              - type: tile
                entity: input_datetime.fin_cycle_simulation_presence_soir_entree
                name: "à"

          - type: tile
            entity: input_number.nb_cycles_simulation_presence_soir_entree
            name: Cycles
            features_position: inline
            features:
              - type: numeric-input
                style: buttons

          - !include ../../includes/section_headers/chambre_parents.yaml

          # 🌅 Réglages matin - Parents
          - type: custom:button-card
            template: sub_section_header
            name: 🌅 Matin

          - type: grid
            square: false
            columns: 2
            cards:
              - type: tile
                entity: input_datetime.debut_cycle_simulation_presence_matin_chambre_parents
                name: "de"

              - type: tile
                entity: input_datetime.fin_cycle_simulation_presence_matin_chambre_parents
                name: "à"

          - type: tile
            entity: input_number.nb_cycles_simulation_presence_matin_chambre_parents
            name: Cycles
            features_position: inline
            features:
              - type: numeric-input
                style: buttons

          # 🌇 Réglages soir - Parents
          - type: custom:button-card
            template: sub_section_header
            name: 🌇 Soir

          - type: grid
            square: false
            columns: 2
            cards:
              - type: tile
                entity: input_datetime.debut_cycle_simulation_presence_soir_chambre_parents
                name: "de"

              - type: tile
                entity: input_datetime.fin_cycle_simulation_presence_soir_chambre_parents
                name: "à"

          - type: tile
            entity: input_number.nb_cycles_simulation_presence_soir_chambre_parents
            name: Cycles
            features_position: inline
            features:
              - type: numeric-input
                style: buttons

          # 🏠 Garage
          - !include ../../includes/section_headers/garage.yaml

          # 🌅 Réglages matin - Garage
          - type: custom:button-card
            template: sub_section_header
            name: 🌅 Matin

          - type: grid
            square: false
            columns: 2
            cards:
              - type: tile
                entity: input_datetime.debut_cycle_simulation_presence_matin_garage
                name: "de"

              - type: tile
                entity: input_datetime.fin_cycle_simulation_presence_matin_garage
                name: "à"

          - type: tile
            entity: input_number.nb_cycles_simulation_presence_matin_garage
            name: Cycles
            features_position: inline
            features:
              - type: numeric-input
                style: buttons

          # 🌇 Réglages soir - Garage
          - type: custom:button-card
            template: sub_section_header
            name: 🌇 Soir

          - type: grid
            square: false
            columns: 2
            cards:
              - type: tile
                entity: input_datetime.debut_cycle_simulation_presence_soir_garage
                name: "de"

              - type: tile
                entity: input_datetime.fin_cycle_simulation_presence_soir_garage
                name: "à"

          - type: tile
            entity: input_number.nb_cycles_simulation_presence_soir_garage
            name: Cycles
            features_position: inline
            features:
              - type: numeric-input
                style: buttons
