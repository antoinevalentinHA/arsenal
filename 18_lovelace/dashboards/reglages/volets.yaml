button_card_templates: !include_dir_merge_named /config/19_button_card_templates

views:
  - badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

      - type: custom:button-card
        template: bouton_retour_badge_carre
        tap_action:
          action: navigate
          navigation_path: /volets-dashboard/general

    cards:
      - type: vertical-stack
        cards:
          # === Volets automatiques pluie ===
          - type: custom:button-card
            template: section_header
            name: 🌧️ Volets automatiques

          - type: tile
            entity: input_boolean.fermeture_volets_pluie
            name: Activer la fermeture automatique

          - type: tile
            entity: input_number.seuil_pluie_fermeture_volets
            name: Seuil de déclenchement (mm)
            features_position: inline
            features:
              - type: numeric-input
                style: buttons

          - type: tile
            entity: input_select.activation_volets_pluie
            name: Condition de déclenchement
            features_position: bottom
            features:
              - type: select-options
