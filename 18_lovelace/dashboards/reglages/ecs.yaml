button_card_templates: !include_dir_merge_named /config/19_button_card_templates

views:
  - badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

      - type: custom:button-card
        template: bouton_retour_badge_carre
        tap_action:
          action: navigate
          navigation_path: /ecs-dashboard

    cards:
      - type: vertical-stack
        cards:
          # ✅ Bandeau de validité (conditionnel)
          - !include ../../includes/alerte_configuration_invalide.yaml

          # === ECS Maison ===
          - type: custom:button-card
            template: section_header
            name: 🚿 ECS Maison

          - type: horizontal-stack
            cards:
              - type: custom:button-card
                template: socle_toggle
                entity: input_boolean.ecs_blocage_planifiee
                name: "Chauffe planifiée"
                icon: mdi:water-boiler
                show_state: true
                state_display: >
                  [[[ return entity.state === 'on' ? 'Désactivée' : 'Activée' ]]]
                styles:
                  card:
                    - background-color: >
                        [[[ return entity.state === 'on'
                          ? 'rgba(244, 67, 54, 0.2)'   // 🔴 désactivée
                          : 'rgba(76, 175, 80, 0.2)';  // 🟢 activée
                        ]]]

              - type: custom:button-card
                template: bouton_navigation
                name: Réglages Planning
                icon: mdi:calendar-clock
                tap_action:
                  action: navigate
                  navigation_path: /reglages-ecs-planning-dashboard

          # === Bouclage automatique ===
          - type: custom:button-card
            template: section_header
            name: 🔁 Bouclage automatique

          - type: tile
            entity: input_boolean.bouclage_auto_active
            name: Activé

          - type: grid
            square: false
            columns: 2
            cards:
              # Seuil ON
              - type: tile
                entity: input_number.bouclage_ecs_seuil_on
                name: Activation
                features_position: inline
                features:
                  - type: numeric-input
                    style: buttons

              # Seuil OFF
              - type: tile
                entity: input_number.bouclage_ecs_seuil_off
                name: Extinction
                features_position: inline
                features:
                  - type: numeric-input
                    style: buttons

          - type: custom:button-card
            template: section_header
            name: 📋 Modes

          - type: grid
            square: false
            columns: 2
            cards:
              - type: tile
                entity: input_boolean.mode_enfants
                name: Bains

              - type: tile
                entity: input_boolean.mode_vaisselle
                name: Vaisselle

          - type: custom:button-card
            template: section_header
            name: 📏 Consignes

          - type: grid
            square: false
            columns: 2
            cards:
              - type: tile
                entity: input_number.ecs_consigne_temperature
                name: Normal
                features_position: inline
                features:
                  - type: numeric-input
                    style: buttons

              - type: tile
                entity: input_number.ecs_consigne_vaisselle
                name: Vaisselle
                features_position: inline
                features:
                  - type: numeric-input
                    style: buttons

          - type: custom:button-card
            template: section_header
            name: 🧼 Désinfection

          - type: tile
            entity: input_boolean.ecs_desinfection_active
            name: Activation

          - type: tile
            entity: input_number.ecs_temperature_desinfection
            name: Consigne
            features_position: inline
            features:
              - type: numeric-input
                style: buttons

          - type: tile
            entity: input_select.ecs_desinfection_jour
            name: Jour
            features_position: bottom
            features:
              - type: select-options

          - type: tile
            entity: input_datetime.ecs_desinfection_heure
            name: Heure

          # === Réglages avancés ===
          - type: custom:button-card
            template: section_header
            name: ⚙️ Réglages avancés

          - type: custom:button-card
            template: sub_section_header
            name: 🎯 Offsets anticipés (consigne − X)

          - type: grid
            square: false
            columns: 2
            cards:
              - type: tile
                entity: input_number.ecs_off_tiny
                name: Tiny ΔT
                features_position: inline
                features:
                  - type: numeric-input
                    style: buttons

              - type: tile
                entity: input_number.ecs_off_medium
                name: Medium ΔT
                features_position: inline
                features:
                  - type: numeric-input
                    style: buttons

              - type: tile
                entity: input_number.ecs_off_normal
                name: Normal ΔT
                features_position: inline
                features:
                  - type: numeric-input
                    style: buttons

              - type: tile
                entity: input_number.ecs_off_desinfection
                name: Désinfection
                features_position: inline
                features:
                  - type: numeric-input
                    style: buttons

          - type: custom:button-card
            template: sub_section_header
            name: 🔁 Amorçage & seuils d’arrêt

          - type: tile
            entity: input_number.ecs_trigger_ceiling_tiny_medium
            name: Plafond amorçage tiny/medium
            features_position: inline
            features:
              - type: numeric-input
                style: buttons

          - type: grid
            square: false
            columns: 2
            cards:
              - type: tile
                entity: input_number.ecs_eps_ponctuel
                name: Epsilon ponctuel
                features_position: inline
                features:
                  - type: numeric-input
                    style: buttons

              - type: tile
                entity: input_number.ecs_eps_desinfection
                name: Epsilon désinfection
                features_position: inline
                features:
                  - type: numeric-input
                    style: buttons

          # === Sauvegarde & restauration ===
          - type: custom:button-card
            template: sub_section_header
            name: 💾 Sauvegarde / restauration réglages

          - !include ../../includes/badges/ecs_reglages_sauvegarde_restore.yaml

          # === Auto-ajustement Offsets ===
          - type: custom:button-card
            template: sub_section_header
            name: 🔁 Auto-ajustement des offsets

          - type: tile
            entity: input_boolean.ecs_autocorrect_active
            name: Auto-ajustement
