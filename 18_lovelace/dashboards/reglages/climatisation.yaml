button_card_templates: !include_dir_merge_named /config/19_button_card_templates

views:
  - badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

      - type: custom:button-card
        template: bouton_retour_badge_carre
        tap_action:
          action: navigate
          navigation_path: /clim-dashboard/climatisation

    cards:
      - type: vertical-stack
        cards:
          - type: custom:button-card
            template: section_header
            name: ❄️ Mode Cool

          - type: tile
            entity: input_number.clim_seuil_temperature_exterieure_minimum
            name: Seuil mini extérieur
            features_position: inline
            features:
              - type: numeric-input
                style: buttons

          - type: custom:button-card
            template: sub_section_header
            name: 📋 Consignes

          - type: grid
            square: false
            columns: 2
            cards:
              - type: tile
                entity: input_number.clim_consigne_presence
                name: Présence
                features_position: inline
                features:
                  - type: numeric-input
                    style: buttons

              - type: tile
                entity: input_number.clim_consigne_absence
                name: Absence
                features_position: inline
                features:
                  - type: numeric-input
                    style: buttons

          - type: custom:button-card
            template: sub_section_header
            name: Seuils de déclenchement

          - type: grid
            square: false
            columns: 2
            cards:
              - type: tile
                entity: input_number.clim_seuil_declenchement_presence
                name: Présence
                features_position: inline
                features:
                  - type: numeric-input
                    style: buttons

              - type: tile
                entity: input_number.clim_seuil_declenchement_absence
                name: Absence
                features_position: inline
                features:
                  - type: numeric-input
                    style: buttons

          - type: custom:button-card
            template: sub_section_header
            name: Seuils d'extinction

          - type: grid
            square: false
            columns: 2
            cards:
              - type: tile
                entity: input_number.clim_seuil_extinction_presence
                name: Présence
                features_position: inline
                features:
                  - type: numeric-input
                    style: buttons

              - type: tile
                entity: input_number.clim_seuil_extinction_absence
                name: Absence
                features_position: inline
                features:
                  - type: numeric-input
                    style: buttons

          - type: markdown
            content: |
              {% set presence = is_state('binary_sensor.presence_famille_unifiee', 'on') %}

              {% if presence %}
                {% set seuil_on = states('input_number.clim_seuil_declenchement_presence') | float %}
                {% set seuil_off = states('input_number.clim_seuil_extinction_presence') | float %}
              {% else %}
                {% set seuil_on = states('input_number.clim_seuil_declenchement_absence') | float %}
                {% set seuil_off = states('input_number.clim_seuil_extinction_absence') | float %}
              {% endif %}

              🔎 Seuils actifs (mode {{ 'présence' if presence else 'absence' }})

              - Allumage  : ≥ {{ seuil_on | round(1) }} °C  
              - Extinction : ≤ {{ seuil_off | round(1) }} °C

          - type: custom:button-card
            template: section_header
            name: 🔥 Mode HEAT

          - type: tile
            entity: input_boolean.chauffage_clim_active_en_hiver
            name: Activer le chauffage par clim

          - type: tile
            entity: input_number.clim_hiver_seuil_temperature_exterieure
            name: Seuil mini extérieur
            features_position: inline
            features:
              - type: numeric-input
                style: buttons

          - type: tile
            entity: input_number.consigne_heat_clim
            name: Consigne
            features_position: inline
            features:
              - type: numeric-input
                style: buttons

          - type: custom:button-card
            template: sub_section_header
            name: Offsets

          - type: grid
            square: false
            columns: 2
            cards:
              - type: tile
                entity: input_number.clim_offset_on
                name: "ON"
                features_position: inline
                features:
                  - type: numeric-input
                    style: buttons

              - type: tile
                entity: input_number.clim_offset_off
                name: "OFF"
                features_position: inline
                features:
                  - type: numeric-input
                    style: buttons

          - type: markdown
            content: |
              {% set programme = states('input_select.programme_chauffage') %}
              {% if programme != 'Eco' %}

              {% set consigne = states('input_number.chauffage_consigne_confort') | float %}
              {% set offset_on = states('input_number.clim_offset_on') | float %}
              {% set offset_off = states('input_number.clim_offset_off') | float %}

              {% set seuil_on = consigne - offset_on %}
              {% set seuil_off = consigne - offset_off %}

              🔎 Seuils d’autorisation chauffage

              - Autorisation chauffage : < {{ seuil_on | round(1) }} °C  
              - Interdiction chauffage : ≥ {{ seuil_off | round(1) }} °C

              {% endif %}

          - type: custom:button-card
            template: section_header
            name: 💦️ Déshumidification

          - type: grid
            square: false
            columns: 2
            cards:
              - type: tile
                entity: input_boolean.auto_deshumidification_active
                name: Activer déshumidification auto

              - type: tile
                entity: input_number.seuil_humidex_deshumidification
                name: Seuil On (Humidex)
                features_position: inline
                features:
                  - type: numeric-input
                    style: buttons

          - type: custom:button-card
            template: section_header
            name: 🤫 Mode silencieux

          - type: grid
            square: false
            columns: 2
            cards:
              - type: tile
                entity: input_datetime.clim_heure_silencieux_on
                name: de

              - type: tile
                entity: input_datetime.clim_heure_silencieux_off
                name: à

          - type: custom:button-card
            template: section_header
            name: ⏱️ Arrêt programmé

          - type: tile
            entity: input_boolean.clim_blocage_horaire_actif
            name: Blocage actif

          - type: grid
            square: false
            columns: 2
            cards:
              - type: tile
                entity: input_datetime.clim_heure_blocage_autom_on
                name: de

              - type: tile
                entity: input_datetime.clim_heure_blocage_autom_off
                name: à
