button_card_templates: !include_dir_merge_named /config/19_button_card_templates

views:
  - badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

      - type: custom:button-card
        template: bouton_retour_badge_carre
        tap_action:
          action: navigate
          navigation_path: /ouvertures-dashboard/portes_et_fenetres

    cards:
      - type: vertical-stack
        cards:
          # === Ouvertures avec délais ===
          - type: custom:button-card
            template: section_header
            name: ⏱️ Délais d'ouverture temporisés

          - type: tile
            entity: input_number.delai_ouverture_sejour
            name: "Séjour"
            features_position: inline
            features:
              - type: numeric-input
                style: buttons

          - type: tile
            entity: input_number.delai_ouverture_chambre_parents
            name: "Chambre parents"
            features_position: inline
            features:
              - type: numeric-input
                style: buttons
