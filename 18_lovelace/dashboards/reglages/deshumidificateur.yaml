button_card_templates: !include_dir_merge_named /config/19_button_card_templates

views:
  - badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

      - type: custom:button-card
        template: bouton_retour_badge_carre
        tap_action:
          action: navigate
          navigation_path: /deshumidificateur-dashboard/cave

    cards:
      - type: vertical-stack
        cards:
          - type: custom:button-card
            template: section_header
            name: 💧 Humidité relative

          - type: tile
            entity: input_number.cave_rh_cible_on
            name: Cible ON
            features_position: inline
            features:
              - type: numeric-input
                style: buttons

          - type: tile
            entity: input_number.cave_rh_cible_off
            name: Cible OFF
            features_position: inline
            features:
              - type: numeric-input
                style: buttons

          - type: custom:button-card
            template: section_header
            name: ⏱️ Cycle minimal

          - type: tile
            entity: input_number.deshumidificateur_duree_mini_cycle
            name: Durée mini cycle
            features_position: inline
            features:
              - type: numeric-input
                style: buttons

          - type: custom:button-card
            template: section_header
            name: 🔁 Blocage redemarrage

          - type: tile
            entity: input_number.deshumidificateur_delai_min_redemarrage
            name: Delai min redemarrage
            features_position: inline
            features:
              - type: numeric-input
                style: buttons
