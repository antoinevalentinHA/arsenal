button_card_templates: !include_dir_merge_named /config/19_button_card_templates

views:
  - badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

      - type: custom:button-card
        template: bouton_diagnostics_badge_carre
        tap_action:
          action: navigate
          navigation_path: /diagnostics-mouvements-dashboard/diagnostics-mouvements

    cards:
      - type: vertical-stack
        cards:
          # ===========================================================
          # 🚗 GARAGE — 3 CAPTEURS
          # ===========================================================
          - type: grid
            square: false
            columns: 1
            cards:
              - !include ../includes/section_headers/garage.yaml

              - type: grid
                square: false
                columns: 3
                cards:
                  - type: custom:button-card
                    template: carte_mouvement
                    show_name: false
                    tap_action: none
                    entity: binary_sensor.mouvement_garage_3

                  - type: custom:button-card
                    template: carte_mouvement
                    show_name: false
                    tap_action: none
                    entity: binary_sensor.mouvement_garage_1

                  - type: custom:button-card
                    template: carte_mouvement
                    show_name: false
                    tap_action: none
                    entity: binary_sensor.mouvement_garage_2

          # ===========================================================
          # 🏠 ENTRÉE
          # ===========================================================
          - type: grid
            square: false
            columns: 1
            cards:
              - !include ../includes/section_headers/entree.yaml

              - type: custom:button-card
                template: carte_mouvement
                show_name: false
                tap_action: none
                entity: binary_sensor.mouvement_entree_1

          # ===========================================================
          # 🛋️ SÉJOUR — 2 CAPTEURS
          # ===========================================================
          - type: grid
            square: false
            columns: 1
            cards:
              - !include ../includes/section_headers/sejour.yaml

              - type: grid
                square: false
                columns: 2
                cards:
                  - type: custom:button-card
                    template: carte_mouvement
                    show_name: false
                    tap_action: none
                    entity: binary_sensor.mouvement_sejour_2

                  - type: custom:button-card
                    template: carte_mouvement
                    show_name: false
                    tap_action: none
                    entity: binary_sensor.mouvement_sejour_1
