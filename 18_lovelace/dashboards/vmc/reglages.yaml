button_card_templates: !include_dir_merge_named /config/19_button_card_templates

views:
  - badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

      - type: custom:button-card
        template: bouton_retour_badge_carre
        tap_action:
          action: navigate
          navigation_path: /vmc-dashboard

    cards:
      - type: vertical-stack
        cards:
          # ✅ Bandeau de validité (conditionnel)
          - !include ../../includes/alerte_configuration_invalide.yaml

          # ==================================================
          # 🚿 SALLE DE BAIN PARENTS
          # ==================================================
          - type: custom:button-card
            template: section_header
            name: 🚿 Salle de bain parents

          - type: custom:button-card
            template: sub_section_header
            name: 💧 Déclenchement

          - type: grid
            square: false
            columns: 3
            cards:
              - type: tile
                entity: input_number.vmc_seuil_on_sdb_parents
                name: Niveau
                features_position: inline
                features:
                  - type: numeric-input
                    style: buttons

              - type: tile
                entity: input_number.vmc_fenetre_sdb_parents
                name: Fenêtre
                features_position: inline
                features:
                  - type: numeric-input
                    style: buttons

              - type: tile
                entity: input_number.vmc_evolution_sdb_parents
                name: Évolution
                features_position: inline
                features:
                  - type: numeric-input
                    style: buttons

          - type: custom:button-card
            template: sub_section_header
            name: 🌡️ Bornes de la frontière d'arrêt

          - type: grid
            square: false
            columns: 2
            cards:
              - type: tile
                entity: input_number.vmc_borne_basse_sdb_parents
                name: Borne basse
                features_position: inline
                features:
                  - type: numeric-input
                    style: buttons

              - type: tile
                entity: input_number.vmc_borne_haute_sdb_parents
                name: Borne haute
                features_position: inline
                features:
                  - type: numeric-input
                    style: buttons

          - type: tile
            entity: sensor.vmc_frontiere_liberation_sdb_parents
            name: Frontière d'arrêt actuelle

          # ==================================================
          # 🚿 SALLE DE DOUCHE ENFANTS
          # ==================================================
          - type: custom:button-card
            template: section_header
            name: 🚿 Salle de douche enfants

          - type: custom:button-card
            template: sub_section_header
            name: 💧 Déclenchement

          - type: grid
            square: false
            columns: 3
            cards:
              - type: tile
                entity: input_number.vmc_seuil_on_sdb_enfants
                name: Niveau
                features_position: inline
                features:
                  - type: numeric-input
                    style: buttons

              - type: tile
                entity: input_number.vmc_fenetre_sdb_enfants
                name: Fenêtre
                features_position: inline
                features:
                  - type: numeric-input
                    style: buttons

              - type: tile
                entity: input_number.vmc_evolution_sdb_enfants
                name: Évolution
                features_position: inline
                features:
                  - type: numeric-input
                    style: buttons

          - type: custom:button-card
            template: sub_section_header
            name: 🌡️ Bornes de la frontière d'arrêt

          - type: grid
            square: false
            columns: 2
            cards:
              - type: tile
                entity: input_number.vmc_borne_basse_sdb_enfants
                name: Borne basse
                features_position: inline
                features:
                  - type: numeric-input
                    style: buttons

              - type: tile
                entity: input_number.vmc_borne_haute_sdb_enfants
                name: Borne haute
                features_position: inline
                features:
                  - type: numeric-input
                    style: buttons

          - type: tile
            entity: sensor.vmc_frontiere_liberation_sdb_enfants
            name: Frontière d'arrêt actuelle

          # ==================================================
          # 🫁 CO₂ SÉJOUR
          # ==================================================
          - type: custom:button-card
            template: section_header
            name: 🫁 CO₂ séjour

          - type: grid
            square: false
            columns: 2
            cards:
              - type: tile
                entity: input_number.vmc_co2_seuil_on
                name: Déclenchement
                features_position: inline
                features:
                  - type: numeric-input
                    style: buttons

              - type: tile
                entity: input_number.vmc_co2_seuil_off
                name: Arrêt
                features_position: inline
                features:
                  - type: numeric-input
                    style: buttons

          # ==================================================
          # ⏱️ DURÉE MINIMALE
          # ==================================================
          - type: custom:button-card
            template: section_header
            name: ⏱️ Durée minimale

          - type: tile
            entity: input_number.vmc_duree_min_haute
            name: Durée
            features_position: inline
            features:
              - type: numeric-input
                style: buttons

          # ==================================================
          # 📖 CE QUE LE SYSTÈME FAIT RÉELLEMENT
          # ==================================================
          - !include ../../includes/vmc/explication_reglages.yaml
