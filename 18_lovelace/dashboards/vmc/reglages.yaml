button_card_templates: !include_dir_merge_named /config/19_button_card_templates

views:
  - badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

      - type: custom:button-card
        template: bouton_retour_badge_carre
        tap_action:
          action: navigate
          navigation_path: /vmc-dashboard

    cards:
      - type: vertical-stack
        cards:
          # ✅ Bandeau de validité (conditionnel)
          - !include ../../includes/alerte_configuration_invalide.yaml

          - type: custom:button-card
            template: section_header
            name: 🎯 Seuils

          - type: custom:button-card
            template: sub_section_header
            name: 💧 Humidité relative

          - type: grid
            square: false
            columns: 2
            cards:
              - type: tile
                entity: input_number.vmc_seuil_on
                name: "on"
                features_position: inline
                features:
                  - type: numeric-input
                    style: buttons

              - type: tile
                entity: input_number.vmc_seuil_off
                name: "off"
                features_position: inline
                features:
                  - type: numeric-input
                    style: buttons

          - type: custom:button-card
            template: sub_section_header
            name: 🫁 CO₂

          - type: grid
            square: false
            columns: 2
            cards:
              - type: tile
                entity: input_number.vmc_co2_seuil_on
                name: "on"
                features_position: inline
                features:
                  - type: numeric-input
                    style: buttons

              - type: tile
                entity: input_number.vmc_co2_seuil_off
                name: "off"
                features_position: inline
                features:
                  - type: numeric-input
                    style: buttons

          - type: markdown
            content: >
              Pour l’humidité comme pour le CO₂ : passage en haute vitesse
              au-dessus du seuil de déclenchement, retour sous le seuil d’arrêt.

          - type: custom:button-card
            template: section_header
            name: ⏱️ Durée minimale

          - type: tile
            entity: input_number.vmc_duree_min_haute
            name: Durée
            features_position: inline
            features:
              - type: numeric-input
                style: buttons
