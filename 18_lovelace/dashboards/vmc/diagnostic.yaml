button_card_templates: !include_dir_merge_named /config/19_button_card_templates

views:
  - badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

      - type: custom:button-card
        template: bouton_retour_badge_carre
        tap_action:
          action: navigate
          navigation_path: /vmc-dashboard

    cards:
      - type: vertical-stack
        cards:
          - type: custom:button-card
            template: section_header
            name: ⚖️ Décision du système

          - type: custom:button-card
            template: carte_vmc_haute_vitesse_requise
            entity: binary_sensor.vmc_haute_vitesse_requise

          - type: custom:button-card
            template: carte_vmc_intention
            entity: sensor.vmc_intention

          - type: custom:button-card
            template: section_header
            name: 🧩 Besoins par pièce et par voie

          - type: custom:button-card
            template: sub_section_header
            name: 🚿 SdB parents

          - type: grid
            square: false
            columns: 2
            cards:
              - type: custom:button-card
                template: carte_etat_interprete
                entity: binary_sensor.vmc_besoin_humidite_sdb_parents
                name: État
                icon: mdi:shower-head
                variables:
                  libelles:
                    'on': Besoin actif
                    'off': Aucun besoin
                  couleurs:
                    'on': rgba(244, 67, 54, 0.2)
                    'off': rgba(76, 175, 80, 0.2)

              - type: custom:button-card
                template: carte_attribut_categoriel_interprete
                entity: binary_sensor.vmc_besoin_humidite_sdb_parents
                name: Entrée
                icon: mdi:login
                variables:
                  attribut: condition_entree

          - type: conditional
            conditions:
              - entity: binary_sensor.vmc_besoin_humidite_sdb_parents
                state: 'on'
            card:
              type: vertical-stack
              cards:
                - type: grid
                  square: false
                  columns: 2
                  cards:
                    - type: custom:button-card
                      template: carte_attribut_categoriel_interprete
                      entity: binary_sensor.vmc_besoin_humidite_sdb_parents
                      name: Maintien
                      icon: mdi:pause-circle
                      variables:
                        attribut: condition_maintien

                    - type: custom:button-card
                      template: carte_attribut_categoriel_interprete
                      entity: binary_sensor.vmc_besoin_humidite_sdb_parents
                      name: Libération
                      icon: mdi:logout
                      variables:
                        attribut: condition_liberation

          - type: custom:button-card
            template: sub_section_header
            name: 🚿 SdB enfants

          - type: grid
            square: false
            columns: 2
            cards:
              - type: custom:button-card
                template: carte_etat_interprete
                entity: binary_sensor.vmc_besoin_humidite_sdb_enfants
                name: État
                icon: mdi:shower-head
                variables:
                  libelles:
                    'on': Besoin actif
                    'off': Aucun besoin
                  couleurs:
                    'on': rgba(244, 67, 54, 0.2)
                    'off': rgba(76, 175, 80, 0.2)

              - type: custom:button-card
                template: carte_attribut_categoriel_interprete
                entity: binary_sensor.vmc_besoin_humidite_sdb_enfants
                name: Entrée
                icon: mdi:login
                variables:
                  attribut: condition_entree

          - type: conditional
            conditions:
              - entity: binary_sensor.vmc_besoin_humidite_sdb_enfants
                state: 'on'
            card:
              type: vertical-stack
              cards:
                - type: grid
                  square: false
                  columns: 2
                  cards:
                    - type: custom:button-card
                      template: carte_attribut_categoriel_interprete
                      entity: binary_sensor.vmc_besoin_humidite_sdb_enfants
                      name: Maintien
                      icon: mdi:pause-circle
                      variables:
                        attribut: condition_maintien

                    - type: custom:button-card
                      template: carte_attribut_categoriel_interprete
                      entity: binary_sensor.vmc_besoin_humidite_sdb_enfants
                      name: Libération
                      icon: mdi:logout
                      variables:
                        attribut: condition_liberation

          - type: custom:button-card
            template: sub_section_header
            name: 🫁 CO₂ séjour

          - type: grid
            square: false
            columns: 2
            cards:
              - type: custom:button-card
                template: carte_etat_interprete
                entity: binary_sensor.vmc_besoin_co2_sejour
                name: État
                icon: mdi:molecule-co2
                variables:
                  libelles:
                    'on': Besoin actif
                    'off': Aucun besoin
                  couleurs:
                    'on': rgba(244, 67, 54, 0.2)
                    'off': rgba(76, 175, 80, 0.2)

              - type: custom:button-card
                template: carte_attribut_categoriel_interprete
                entity: binary_sensor.vmc_besoin_co2_sejour
                name: Entrée
                icon: mdi:login
                variables:
                  attribut: condition_entree

          - type: conditional
            conditions:
              - entity: binary_sensor.vmc_besoin_co2_sejour
                state: 'on'
            card:
              type: vertical-stack
              cards:
                - type: grid
                  square: false
                  columns: 2
                  cards:
                    - type: custom:button-card
                      template: carte_attribut_categoriel_interprete
                      entity: binary_sensor.vmc_besoin_co2_sejour
                      name: Maintien
                      icon: mdi:pause-circle
                      variables:
                        attribut: condition_maintien

                    - type: custom:button-card
                      template: carte_attribut_categoriel_interprete
                      entity: binary_sensor.vmc_besoin_co2_sejour
                      name: Libération
                      icon: mdi:logout
                      variables:
                        attribut: condition_liberation

          - type: custom:button-card
            template: section_header
            name: 🌡️ Frontières de libération modulées

          - type: grid
            square: false
            columns: 2
            cards:
              - type: custom:button-card
                template: socle_kpi_label_72
                entity: sensor.vmc_frontiere_liberation_sdb_parents
                name: SdB parents
                icon: mdi:arrow-collapse-horizontal
                label: |
                  [[[
                    const p = entity?.attributes?.plancher_evolution;
                    return (p === null || p === undefined || p === 'None')
                      ? 'Plancher : —'
                      : `Plancher : ${p} %`;
                  ]]]

              - type: custom:button-card
                template: socle_kpi_label_72
                entity: sensor.vmc_frontiere_liberation_sdb_enfants
                name: SdB enfants
                icon: mdi:arrow-collapse-horizontal
                label: |
                  [[[
                    const p = entity?.attributes?.plancher_evolution;
                    return (p === null || p === undefined || p === 'None')
                      ? 'Plancher : —'
                      : `Plancher : ${p} %`;
                  ]]]

          - type: grid
            square: false
            columns: 2
            cards:
              - type: custom:button-card
                template: socle_info_72
                entity: sensor.temperature_jardin
                name: Grandeur modulante
                icon: mdi:thermometer

              - type: custom:button-card
                template: carte_capteur_etat_textuel
                entity: sensor.temperature_jardin_statut
                name: Statut de l'axe
                icon: mdi:check-decagram-outline

          - type: custom:button-card
            template: section_header
            name: 🧪 Intégrité des paramètres

          - type: grid
            square: false
            columns: 2
            cards:
              - type: custom:button-card
                template: carte_etat_interprete
                entity: binary_sensor.parametres_invalides_vmc
                name: Paramètres
                icon: mdi:tune-variant
                variables:
                  libelles:
                    'on': Invalides
                    'off': Cohérents
                  couleurs:
                    'on': rgba(244, 67, 54, 0.2)
                    'off': rgba(76, 175, 80, 0.2)

              - type: custom:button-card
                template: carte_attribut_categoriel_interprete
                entity: binary_sensor.parametres_invalides_vmc
                name: Cause
                icon: mdi:help-circle-outline
                variables:
                  attribut: cause

          - type: custom:button-card
            template: socle_info_72
            entity: binary_sensor.parametres_invalides_vmc
            name: Bande morte de la voie de niveau
            icon: mdi:arrow-expand-horizontal
            state_display: |
              [[[
                const v = entity?.attributes?.bande_morte_niveau;
                return v ? v : '—';
              ]]]

          - type: custom:button-card
            template: section_header
            name: ⚙️ Exécution physique

          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:button-card
                template: socle_toggle_confirme_indispo
                entity: switch.vmc_l1
                name: Relais L1
                icon: mdi:electric-switch

              - type: custom:button-card
                template: socle_toggle_confirme_indispo
                entity: switch.vmc_l2
                name: Relais L2
                icon: mdi:electric-switch

          - type: custom:button-card
            template: section_header
            name: 🛡️ Cohérence & conformité

          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:button-card
                template: carte_vmc_coherence_physique
                entity: binary_sensor.vmc_coherence_physique

              - type: custom:button-card
                template: carte_vmc_conformite_decision
                entity: binary_sensor.vmc_conformite_decision

          - type: custom:button-card
            template: section_header
            name: 🔁 Reflets UI

          - type: custom:button-card
            template: carte_vmc_reflet_haute_vitesse
            entity: input_boolean.vmc_haute_vitesse
