button_card_templates: !include_dir_merge_named /config/19_button_card_templates

views:
  - badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

      - type: custom:button-card
        template: bouton_retour_badge_carre
        tap_action:
          action: navigate
          navigation_path: /vmc-dashboard

    cards:
      - type: vertical-stack
        cards:
          - type: custom:button-card
            template: section_header
            name: ⚖️ Décision du système

          - type: custom:button-card
            template: carte_vmc_haute_vitesse_requise
            entity: binary_sensor.vmc_haute_vitesse_requise

          - type: custom:button-card
            template: carte_vmc_intention
            entity: sensor.vmc_intention

          - type: custom:button-card
            template: section_header
            name: 🧩 Besoins par pièce et par voie

          - type: entities
            entities:
              - entity: binary_sensor.vmc_besoin_humidite_sdb_parents
                name: SdB parents
              - type: attribute
                entity: binary_sensor.vmc_besoin_humidite_sdb_parents
                attribute: condition_entree
                name: "— entrée"
              - type: attribute
                entity: binary_sensor.vmc_besoin_humidite_sdb_parents
                attribute: condition_liberation
                name: "— libération"
              - type: attribute
                entity: binary_sensor.vmc_besoin_humidite_sdb_parents
                attribute: maintenu_faute_de_mesure
                name: "— maintenu faute de mesure"
              - type: attribute
                entity: binary_sensor.vmc_besoin_humidite_sdb_parents
                attribute: maintenu_faute_de_frontiere
                name: "— maintenu faute de frontière"

              - entity: binary_sensor.vmc_besoin_humidite_sdb_enfants
                name: SdB enfants
              - type: attribute
                entity: binary_sensor.vmc_besoin_humidite_sdb_enfants
                attribute: condition_entree
                name: "— entrée"
              - type: attribute
                entity: binary_sensor.vmc_besoin_humidite_sdb_enfants
                attribute: condition_liberation
                name: "— libération"
              - type: attribute
                entity: binary_sensor.vmc_besoin_humidite_sdb_enfants
                attribute: maintenu_faute_de_mesure
                name: "— maintenu faute de mesure"
              - type: attribute
                entity: binary_sensor.vmc_besoin_humidite_sdb_enfants
                attribute: maintenu_faute_de_frontiere
                name: "— maintenu faute de frontière"

              - entity: binary_sensor.vmc_besoin_co2_sejour
                name: CO₂ séjour
              - type: attribute
                entity: binary_sensor.vmc_besoin_co2_sejour
                attribute: condition_entree
                name: "— entrée"
              - type: attribute
                entity: binary_sensor.vmc_besoin_co2_sejour
                attribute: condition_liberation
                name: "— libération"
              - type: attribute
                entity: binary_sensor.vmc_besoin_co2_sejour
                attribute: maintenu_faute_de_mesure
                name: "— maintenu faute de mesure"
              - type: attribute
                entity: binary_sensor.vmc_besoin_co2_sejour
                attribute: maintenu_faute_de_frontiere
                name: "— maintenu faute de frontière"

          - type: custom:button-card
            template: section_header
            name: 🌡️ Frontières de libération modulées

          - type: entities
            entities:
              - entity: sensor.vmc_frontiere_liberation_sdb_parents
                name: SdB parents
              - type: attribute
                entity: sensor.vmc_frontiere_liberation_sdb_parents
                attribute: plancher_evolution
                name: "— plancher d'évolution"
              - type: attribute
                entity: sensor.vmc_frontiere_liberation_sdb_parents
                attribute: cause_non_calculable
                name: "— cause de non-calculabilité"

              - entity: sensor.vmc_frontiere_liberation_sdb_enfants
                name: SdB enfants
              - type: attribute
                entity: sensor.vmc_frontiere_liberation_sdb_enfants
                attribute: plancher_evolution
                name: "— plancher d'évolution"
              - type: attribute
                entity: sensor.vmc_frontiere_liberation_sdb_enfants
                attribute: cause_non_calculable
                name: "— cause de non-calculabilité"

              - entity: sensor.temperature_jardin
                name: Grandeur modulante
              - entity: sensor.temperature_jardin_statut
                name: "— statut de l'axe"

          - type: custom:button-card
            template: section_header
            name: 🧪 Intégrité des paramètres

          - type: entities
            entities:
              - entity: binary_sensor.parametres_invalides_vmc
                name: Paramètres invalides
              - type: attribute
                entity: binary_sensor.parametres_invalides_vmc
                attribute: cause
                name: "— cause"
              - type: attribute
                entity: binary_sensor.parametres_invalides_vmc
                attribute: bande_morte_niveau
                name: "— bande morte de la voie de niveau"
              - type: attribute
                entity: binary_sensor.parametres_invalides_vmc
                attribute: parametres_indisponibles
                name: "— paramètres indisponibles"
          - type: custom:button-card
            template: section_header
            name: ⚙️ Exécution physique

          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:button-card
                template: socle_toggle_confirme_indispo
                entity: switch.vmc_l1
                name: Relais L1
                icon: mdi:electric-switch

              - type: custom:button-card
                template: socle_toggle_confirme_indispo
                entity: switch.vmc_l2
                name: Relais L2
                icon: mdi:electric-switch

          - type: custom:button-card
            template: section_header
            name: 🛡️ Cohérence & conformité

          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:button-card
                template: carte_vmc_coherence_physique
                entity: binary_sensor.vmc_coherence_physique

              - type: custom:button-card
                template: carte_vmc_conformite_decision
                entity: binary_sensor.vmc_conformite_decision

          - type: custom:button-card
            template: section_header
            name: 🔁 Reflets UI

          - type: custom:button-card
            template: carte_vmc_reflet_haute_vitesse
            entity: input_boolean.vmc_haute_vitesse
