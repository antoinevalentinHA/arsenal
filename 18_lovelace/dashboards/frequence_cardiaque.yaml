button_card_templates: !include_dir_merge_named /config/19_button_card_templates

views:
  - badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

      - type: custom:button-card
        template: bouton_retour_badge_carre
        tap_action:
          action: navigate
          navigation_path: /sante-dashboard/sante

    # ======================================================
    # 🔊 CONTENU PRINCIPAL — FLUX VERTICAL CANON ARSENAL
    # ------------------------------------------------------
    # badges
    #   ↓
    # vertical-stack racine
    # ======================================================
    cards:
      - type: vertical-stack
        cards:
          - type: custom:button-card
            template: section_header
            name: 🫀 Synthèse

          - type: grid
            columns: 3
            square: false
            cards:
              - type: custom:button-card
                template: carte_cardio_nuit_etat
                entity: sensor.cardio_nuit_etat
                name: État
                icon: mdi:heart-pulse

              - type: custom:button-card
                template: carte_cardio_nuit_delta
                entity: sensor.cardio_nuit_delta_baseline
                name: Delta
                icon: mdi:chart-line

              - type: custom:button-card
                template: carte_cardio_nuit_anomalie
                entity: binary_sensor.cardio_anomalie
                name: Anomalie

          - type: custom:button-card
            template: section_header
            name: 📈 Historique

          - !include ../includes/cartes/graph_cardio_nuit.yaml
