button_card_templates: !include_dir_merge_named /config/19_button_card_templates

views:
  - badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

      - type: custom:button-card
        template: bouton_parametres_badge_carre
        tap_action:
          action: navigate
          navigation_path: /reglages-alarme-dashboard

      - type: custom:button-card
        template: bouton_diagnostics_badge_carre
        tap_action:
          action: navigate
          navigation_path: /diagnostics-alarme-dashboard

    cards:
      - type: vertical-stack
        cards:
          # ==================================================
          # 🧠 DÉCISION / INTENTION
          # ==================================================
          - type: grid
            square: false
            columns: 1
            cards:
              - !include ../../includes/section_headers/decision.yaml

              - type: custom:button-card
                entity: input_text.alarme_etat_cible
                template: carte_alarme_intention

              - type: custom:button-card
                entity: alarm_control_panel.alarme_maison
                template: carte_alarme_decision
                name: Alarme Maison

          # ==================================================
          # 🚨 SIRÈNE
          # ==================================================
          - type: grid
            square: false
            columns: 1
            cards:
              - type: custom:button-card
                template: section_header
                name: 🚨 Sirène

              - type: grid
                square: false
                columns: 1
                cards:
                  - type: custom:button-card
                    template: carte_action_arret_sirene
                    name: Stop
                    icon: mdi:alarm-off

          # ==================================================
          # 📜 HISTORIQUE
          # ==================================================
          - type: grid
            square: false
            columns: 1
            cards:
              - !include ../../includes/section_headers/historique.yaml

              - type: history-graph
                entities:
                  - entity: alarm_control_panel.alarme_maison
                    name: Alarme Maison
                  - entity: binary_sensor.presence_famille_securite
                hours_to_show: 0
                logarithmic_scale: true
