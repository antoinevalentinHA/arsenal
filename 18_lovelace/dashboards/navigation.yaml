button_card_templates: !include_dir_merge_named /config/19_button_card_templates

views:
  - badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

    cards:
      - type: vertical-stack
        cards:
          # ==================================================
          # 🌤️ MÉTÉO — NAVIGATION DOMAINE
          # ==================================================
          - !include ../includes/navigation/meteo.yaml

          # ==========================================================
          # 🚨 ALERTE CRITIQUE — INTÉGRITÉ PARAMÈTRES
          # ==========================================================
          - !include ../includes/alerte_configuration_invalide.yaml

          # ==================================================
          # ☰ NAVIGATION PRINCIPALE
          # ==================================================
          - type: grid
            square: false
            columns: 1
            cards:
              - type: custom:button-card
                template: section_header
                name: ☰ Navigation

              - type: grid
                square: false
                columns: 4
                cards:
                  - type: custom:button-card
                    template: bouton_navigation_dynamique
                    variables:
                      etat_dashboard: sensor.etat_modes_dashboard
                    name: Modes
                    icon: mdi:home
                    tap_action:
                      action: navigate
                      navigation_path: /modes-dashboard

                  - type: custom:button-card
                    template: bouton_navigation_dynamique
                    variables:
                      etat_dashboard: sensor.etat_chauffage_dashboard
                    name: Chauffage
                    icon: mdi:fire
                    tap_action:
                      action: navigate
                      navigation_path: /chauffage-dashboard

                  - type: custom:button-card
                    template: bouton_navigation_dynamique
                    variables:
                      etat_dashboard: sensor.etat_clim_dashboard
                    name: Clim
                    icon: mdi:air-conditioner
                    tap_action:
                      action: navigate
                      navigation_path: /clim-dashboard

                  - type: custom:button-card
                    template: bouton_navigation_dynamique
                    variables:
                      etat_dashboard: sensor.etat_ecs_dashboard
                    name: Eau Chaude
                    icon: mdi:water-pump
                    tap_action:
                      action: navigate
                      navigation_path: /ecs-dashboard

                  - type: custom:button-card
                    template: bouton_navigation_dynamique
                    variables:
                      etat_dashboard: sensor.etat_vmc_dashboard
                    name: VMC
                    icon: mdi:fan
                    tap_action:
                      action: navigate
                      navigation_path: /vmc-dashboard

                  - type: custom:button-card
                    template: bouton_navigation_dynamique
                    variables:
                      etat_dashboard: sensor.etat_aeration_dashboard
                    name: Aération
                    icon: mdi:air-filter
                    tap_action:
                      action: navigate
                      navigation_path: /aeration-dashboard

                  - type: custom:button-card
                    template: bouton_navigation_dynamique
                    variables:
                      etat_dashboard: sensor.etat_deshumidificateur_dashboard
                    name: Désh. Cave
                    icon: mdi:water-percent
                    tap_action:
                      action: navigate
                      navigation_path: /deshumidificateur-dashboard

                  - type: custom:button-card
                    template: bouton_navigation_dynamique
                    variables:
                      etat_dashboard: sensor.etat_arrosage_dashboard
                    name: Arrosage
                    icon: mdi:sprinkler-variant
                    tap_action:
                      action: navigate
                      navigation_path: /arrosage-dashboard

                  - type: custom:button-card
                    template: bouton_navigation_dynamique
                    variables:
                      etat_dashboard: sensor.etat_meteo_palmares_dashboard
                    name: Rec. météo
                    icon: mdi:trophy
                    tap_action:
                      action: navigate
                      navigation_path: /meteo-palmares-dashboard

                  - type: custom:button-card
                    template: bouton_navigation_dynamique
                    variables:
                      etat_dashboard: sensor.etat_alarme_dashboard
                    name: Alarme
                    icon: mdi:shield-home
                    tap_action:
                      action: navigate
                      navigation_path: /alarme-dashboard

                  - type: custom:button-card
                    template: bouton_navigation_dynamique
                    variables:
                      etat_dashboard: sensor.etat_ouvertures_dashboard
                    name: Ouvertures
                    icon: mdi:door-open
                    tap_action:
                      action: navigate
                      navigation_path: /ouvertures-dashboard

                  - type: custom:button-card
                    template: bouton_navigation_dynamique
                    variables:
                      etat_dashboard: sensor.etat_mouvements_dashboard
                    name: Mouvements
                    icon: mdi:motion-sensor
                    tap_action:
                      action: navigate
                      navigation_path: /mouvements-dashboard

                  - type: custom:button-card
                    template: bouton_navigation_dynamique
                    variables:
                      etat_dashboard: sensor.etat_volets_dashboard
                    name: Volets
                    icon: mdi:window-shutter
                    tap_action:
                      action: navigate
                      navigation_path: /volets-dashboard

                  - type: custom:button-card
                    template: bouton_navigation_dynamique
                    variables:
                      etat_dashboard: sensor.etat_eclairage_dashboard
                    name: Éclairage
                    icon: mdi:lightbulb
                    tap_action:
                      action: navigate
                      navigation_path: /eclairage-dashboard

                  - type: custom:button-card
                    template: bouton_navigation
                    name: Prises
                    icon: mdi:power-plug
                    tap_action:
                      action: navigate
                      navigation_path: /prises-dashboard
                    styles:
                      icon:
                        - color: "rgb(158, 158, 158)"

                  - type: custom:button-card
                    template: bouton_navigation
                    name: Santé
                    icon: mdi:heart-pulse
                    tap_action:
                      action: navigate
                      navigation_path: /sante-dashboard
                    styles:
                      icon:
                        - color: "rgb(158, 158, 158)"

                  - type: custom:button-card
                    template: bouton_navigation_dynamique
                    variables:
                      etat_dashboard: sensor.etat_voiture_dashboard
                    name: Audi
                    icon: mdi:car
                    tap_action:
                      action: navigate
                      navigation_path: /audi-dashboard

                  - type: custom:button-card
                    template: bouton_navigation_dynamique
                    variables:
                      etat_dashboard: sensor.etat_imprimerie_dashboard
                    name: Imprimerie
                    icon: mdi:factory
                    tap_action:
                      action: navigate
                      navigation_path: /imprimerie-dashboard

                  - type: custom:button-card
                    template: bouton_navigation_dynamique
                    variables:
                      etat_dashboard: sensor.etat_nas_dashboard
                    name: NAS
                    icon: mdi:nas
                    tap_action:
                      action: navigate
                      navigation_path: /nas-dashboard

                  - type: custom:button-card
                    template: bouton_navigation
                    name: Énergie
                    icon: mdi:flash
                    tap_action:
                      action: navigate
                      navigation_path: /energy
                    styles:
                      icon:
                        - color: "rgb(158, 158, 158)"

              - type: custom:button-card
                template: bouton_navigation_dynamique
                variables:
                  etat_dashboard: sensor.etat_systeme_dashboard
                name: Système
                icon: mdi:monitor-dashboard
                tap_action:
                  action: navigate
                  navigation_path: /system-dashboard

          # ==================================================
          # ⚙️ SYSTÈME — OUTILS & ADMINISTRATION
          # ==================================================
          - type: grid
            square: false
            columns: 1
            cards:
              - type: custom:button-card
                template: section_header
                name: ⚙️ Système

              - type: grid
                square: false
                columns: 3
                cards:
                  # ── Ligne 1 : administration ──
                  # Paramètres = hub /config (contient Intégrations + Entités)
                  - type: custom:button-card
                    template: bouton_navigation
                    name: Paramètres
                    icon: mdi:cog
                    styles:
                      icon:
                        - color: "rgb(158, 158, 158)"
                    tap_action:
                      action: navigate
                      navigation_path: /config/dashboard

                  - type: custom:button-card
                    template: bouton_navigation
                    name: Sauvegardes
                    icon: mdi:backup-restore
                    styles:
                      icon:
                        - color: "rgb(158, 158, 158)"
                    tap_action:
                      action: navigate
                      navigation_path: /config/backup/overview

                  # Outils Dev = États + Templates + YAML factorisés
                  # (onglets States / Template / YAML sur la même page)
                  - type: custom:button-card
                    template: bouton_navigation
                    name: Outils Dev
                    icon: mdi:tools
                    styles:
                      icon:
                        - color: "rgb(158, 158, 158)"
                    tap_action:
                      action: navigate
                      navigation_path: /developer-tools/state

                  # ── Ligne 2 : observation ──
                  - type: custom:button-card
                    template: bouton_navigation
                    name: Logs HA
                    icon: mdi:clipboard-text
                    styles:
                      icon:
                        - color: "rgb(158, 158, 158)"
                    tap_action:
                      action: navigate
                      navigation_path: /config/logs

                  - type: custom:button-card
                    template: bouton_navigation
                    name: Journal
                    icon: mdi:book-open-variant
                    styles:
                      icon:
                        - color: "rgb(158, 158, 158)"
                    tap_action:
                      action: navigate
                      navigation_path: /logbook

                  - type: custom:button-card
                    template: bouton_navigation
                    name: Historique
                    icon: mdi:chart-line
                    styles:
                      icon:
                        - color: "rgb(158, 158, 158)"
                    tap_action:
                      action: navigate
                      navigation_path: /history

              - type: custom:button-card
                template: bouton_navigation
                name: Reboot HA
                icon: mdi:restart
                styles:
                  icon:
                    - color: "#F57C00"
                tap_action:
                  action: call-service
                  service: homeassistant.restart
                confirmation:
                  text: ❓ Redémarrer Home Assistant maintenant ?
