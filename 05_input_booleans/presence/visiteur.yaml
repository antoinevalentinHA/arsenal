#   - Sera piloté par le mode Visiteur (automatisations)
#   - Sera intégré dans les capteurs de présence famille
#
# 📊 Type : Helper (Input Boolean)
# 📍 Entité : input_boolean.presence_visiteur
# ==========================================================

presence_visiteur:
  name: "Presence visiteur"
  icon: mdi:account-tie
