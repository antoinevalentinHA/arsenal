# ==========================================================
# 🧍 INPUT BOOLEAN — Présence visiteur
# ----------------------------------------------------------
# 💡 Objectif :
#   Représenter la présence d’un visiteur dans la maison,
#   afin qu’il ait le même effet qu’un membre de la famille
#   sur le chauffage, la climatisation et l’alarme.
#
# ⚙️ Fonctionnement :
