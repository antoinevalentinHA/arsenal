# ==========================================================
# 🧠 ARSENAL — INPUT BOOLEAN
# ----------------------------------------------------------
# 🚿 ECS : Bouclage pendant visite
#
# 🎯 Rôle :
#   Indiquer si le bouclage d’ECS doit être activé
#   automatiquement lorsqu’une visite est en cours.
#
# 🧱 Principe Arsenal :
#   - Activé → autorise le bouclage ECS pendant le mode “Visite”
#   - Désactivé → empêche toute activation automatique
#   - Ne pilote rien directement, sert uniquement de verrou métier
#
# 🔌 Dépendances :
#   - Automatisations ECS : bouclage visite
#   - Mode “Visite” : présence_visiteur
#
# ⚠️ Important :
#   - Ce boolean est un indicateur de permission
#     pour le déclenchement automatique, pas un actionneur
#
# 📍 Entité : input_boolean.bouclage_visiteur
# ==========================================================


bouclage_visiteur:
  name: Bouclage ECS pendant visite
  icon: mdi:water-pump
