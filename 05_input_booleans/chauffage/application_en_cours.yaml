# ==========================================================
# 🧠 ARSENAL — HELPER D’APPLICATION
#     Chauffage — Verrou d’application matérielle ViCare
# ----------------------------------------------------------
# Rôle :
#   Marqueur transactionnel indiquant qu’une écriture
#   matérielle vers ViCare est en cours.
#
#   Cette entité ne représente :
#     - ni une intention thermique
#     - ni un mode chauffage
#     - ni un état métier
#
#   Elle matérialise exclusivement une PHASE D’APPLICATION
#   active, afin de :
#     - protéger contre les effets yo-yo
#     - empêcher toute correction concurrente
#     - garantir l’atomicité des écritures ViCare.
#
# Sémantique :
#   - ON  → une transaction d’application est en cours
#   - OFF → aucune écriture matérielle active
#
# Règles normatives :
#   - Écrite exclusivement par :
#       • script.chauffage_consigne_confort
#       • script.chauffage_consigne_reduite
#
#   - Interdite à :
#       • la Décision Centrale
#       • l’automation de réalignement
#       • toute automation métier
#       • toute écriture depuis l’UI
#
#   - Toute automation de garde DOIT refuser d’agir
#     si cet état est à ON.
#
# Nature :
#   - Verrou transactionnel d’application matérielle
#   - Aucun rôle décisionnel
#   - Aucun rôle thermique
#
# ==========================================================

chauffage_application_en_cours:
  name: Chauffage — Application en cours
  icon: mdi:sync