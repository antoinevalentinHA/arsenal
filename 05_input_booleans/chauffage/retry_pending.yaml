# ==========================================================
# 🧠 ARSENAL — INPUT_BOOLEAN : Chauffage retry pending
# ----------------------------------------------------------
# 🎯 Rôle :
#   Indiquer qu’un retry chauffage est en attente
#   (timer arme ou retour bridge attendu).
#
# 🧱 Nature :
#   - Helper technique d’orchestration
#   - true  = retry en attente
#   - false = aucun retry en attente
#
# ⚠️ Regle :
#   Toute nouvelle execution amont doit remettre ce helper
#   a false et annuler le timer actif.
# ==========================================================

chauffage_retry_pending:
  name: Chauffage retry pending
  icon: mdi:reload-alert