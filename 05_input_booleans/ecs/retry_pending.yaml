# ==========================================================
# 🧠 ARSENAL — INPUT_BOOLEAN : ECS retry pending
# ----------------------------------------------------------
# 🎯 Rôle :
#   Indiquer qu’un retry ECS est en attente
#   (timer arme ou retour bridge attendu).
#
# 🧱 Nature :
#   - Helper technique d’orchestration
