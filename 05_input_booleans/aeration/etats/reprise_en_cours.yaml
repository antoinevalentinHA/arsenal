# ==========================================================
#  INPUT_BOOLEAN : Reprise thermique – En cours
# ----------------------------------------------------------
#  🧠 Rôle :
#     Marqueur transitoire indiquant que le système
#     se trouve dans la phase de sortie d’aération,
#     avant un éventuel retour à un régime thermique normal.
#
#  🧱 Nature :
#     - État technique de séquence
#     - Verrou logique temporaire
#
#  🔄 Cycle de vie :
#     - ON  : positionné lors de l’entrée
#             en phase de reprise thermique
#     - OFF : réinitialisé à la fin de la séquence
