#
#  📥 N’effectue PAS :
#     - aucune commande de chauffage
#     - aucune relance thermique effective
#     - aucune décision de mode ou de consigne
#
#  📤 Utilisation :
#     - Lue exclusivement par les automatisations
#       de sortie d’aération / blocage chauffage
#     - Sert à éviter les ré-entrées de séquence
#       ou les enchaînements incohérents
#
#  🧠 Principe Arsenal :
#     - Les transitions sont explicites
#     - Une phase ≠ une action
# ==========================================================


