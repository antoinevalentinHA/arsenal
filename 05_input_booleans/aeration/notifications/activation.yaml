# ==========================================================
#  INPUT_BOOLEAN : Notifications aération – Actives
# ----------------------------------------------------------
#  🧠 Rôle :
#     Commutateur global autorisant ou interdisant
#     l’envoi de toute notification liée à l’aération
#     (RDC et étage).
#
#  🧱 Nature :
#     - Paramètre utilisateur
#     - Autorisation globale (ON / OFF)
#
#  🔄 Fonctionnement :
#     - ON  : les automatisations d’aération sont
#             autorisées à envoyer des notifications
#     - OFF : aucune notification d’aération n’est
#             envoyée, quelle que soit la zone
#
#  📥 N’effectue PAS :
#     - aucune évaluation des conditions d’aération
#     - aucune décision de notification
#     - aucun envoi de message
#
#  📤 Utilisation :
#     - Lue par les automatisations de notifications
#       d’aération (ouverture / fermeture)
#     - Sert de verrou global au-dessus des
#       booléens par zone (RDC / étage)
#
#  🧠 Principe Arsenal :
#     - L’utilisateur peut neutraliser un service
#       sans modifier la logique métier
# ==========================================================


notifications_aeration_actives:
  name: Notifications aération actives
  icon: mdi:email-alert
