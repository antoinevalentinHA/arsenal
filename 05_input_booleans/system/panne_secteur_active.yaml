#
# ----------------------------------------------------------
# 🧱 NATURE
#
#    - Etat systeme derive
#    - Support d'idempotence
#    - Memoire explicite d'episode de panne
#
# ----------------------------------------------------------
# ⚙️ PRINCIPE
#
#    - OFF :
#        aucun episode de panne actif
#
#    - ON :
#        episode de panne actif deja qualifie
