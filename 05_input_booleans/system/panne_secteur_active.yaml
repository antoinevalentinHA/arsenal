#      en mode panne tant que l'episode reste actif
#
# ----------------------------------------------------------
# 🔁 CYCLE DE VIE
#
#    - Passe a ON :
#        uniquement lors de l'entree validee
#        en mode panne secteur
#
#    - Passe a OFF :
#        uniquement lors de la sortie validee
#        du mode panne secteur
#
# ----------------------------------------------------------
# 🚫 NE FAIT PAS
#
#    - Ne confirme pas la panne
#    - Ne qualifie pas la fin de panne
