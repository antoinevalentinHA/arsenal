# ==========================================================
# 🧠 ARSENAL — MQTT BINARY_SENSOR
#     Boiler / Bridge — Disponibilité passerelle (LWT)
# ----------------------------------------------------------
# 🎯 RÔLE
#   Exposer en transport passif l'état de connectivité de
#   la passerelle chaudière, dérivé du Last Will Testament
#   MQTT et de l'arrêt propre publié par la passerelle.
#
# 🧩 PÉRIMÈTRE
#   - Projection booléenne de transport passif uniquement
#   - Mapping direct topic → état
#   - Aucune transformation locale
#   - Aucune logique métier
#
# 🔖 NATURE
#   disponibilite_systeme | connectivite_mqtt
#
# 🆔 UNIQUE_ID
#   boiler_bridge_online
#
# 📋 TRANSPORT
#   state_topic  : boiler/bridge/online
#   namespace    : boiler/bridge/...
#   payload_on   : online
#   payload_off  : offline
#   device_class : connectivity
#   sémantique   : payload_off émis par le LWT broker
#                  sur déconnexion anormale ; émis aussi
#                  par la passerelle avant DISCONNECT propre
#
# 🔗 DÉPENDANCES
#   Lit : passerelle chaudière + LWT broker MQTT
#   Réf : 06_decision_3_last_will_testament.md,
#         07_decision_4_heartbeat.md
#
# 🚫 INTERDITS
#   - Introduire un template Jinja
#   - Introduire une logique métier
#   - Recalculer ou dériver un état localement
#   - Constituer une autorité décisionnelle
#   - Remplacer un diagnostic Arsenal dédié
#   - Laisser payload_on / payload_off implicites
#
# 🏷️ STATUT
#   Transport — Arsenal v14.x
# ==========================================================

- name: "Boiler bridge online"
  unique_id: boiler_bridge_online
  default_entity_id: boiler_bridge_online
  state_topic: "boiler/bridge/online"
  payload_on: "online"
  payload_off: "offline"
  device_class: connectivity
  icon: mdi:lan-connect
  # LWT broker : payload_off publié sur déconnexion anormale
  # Arrêt propre : passerelle publie payload_off avant DISCONNECT
  # Voir : 06_decision_3_last_will_testament.md
