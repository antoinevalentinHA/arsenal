# ==========================================================
# 🧠 ARSENAL — MQTT BINARY_SENSOR
#     Boiler / Telemetry — Activité brûleur
# ----------------------------------------------------------
# 🎯 RÔLE
#   Exposer en transport passif l'état booléen d'activité
#   du brûleur publié par le bridge chaudière.
#
# 🧩 PÉRIMÈTRE
#   - Projection booléenne de transport passif uniquement
#   - Mapping direct topic → état
#   - Aucune transformation locale
#   - Aucune logique métier
#
# 🔖 NATURE
#   telemetrie_booleenne | etat_technique_externe
#
# 🆔 UNIQUE_ID
#   boiler_burner_on
#
# 📋 TRANSPORT
#   state_topic  : boiler/telemetry/burner/state
#   namespace    : boiler/telemetry/...
#   payload_on   : on
#   payload_off  : off
#   device_class : running
#
# 🔗 DÉPENDANCES
#   Lit : bridge chaudière via broker MQTT
#   Réf : 03_namespace_canonique.md §3.2
#
# 🚫 INTERDITS
#   - Introduire un template Jinja
#   - Introduire une logique métier
#   - Recalculer ou dériver un état localement
#   - Constituer une autorité décisionnelle
#   - Remplacer un diagnostic Arsenal dédié
#   - Laisser payload_on / payload_off implicites
#
# 🏷️ STATUT
#   Transport — Arsenal v14.x
# ==========================================================

- name: "Boiler burner on"
  unique_id: boiler_burner_on
  default_entity_id: boiler_burner_on
  state_topic: "boiler/telemetry/burner/state"
  payload_on: "on"
  payload_off: "off"
  device_class: running
  icon: mdi:fire
