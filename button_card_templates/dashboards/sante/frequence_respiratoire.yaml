#################################################################
# 🫁 CARTE FRÉQUENCE RESPIRATOIRE — UI
#################################################################

carte_frequence_respiratoire_qualitative:
  template: socle_kpi

  show_state: true
  show_icon: true

  variables:
    ui_profile: arsenal
    couleur: sensor.couleur_sante_frequence_respiratoire

  triggers_update:
    - sensor.couleur_sante_frequence_respiratoire

  state_display: |
    [[[
      const rpm = parseFloat(entity?.state);
      if (isNaN(rpm)) return "—";
      return `${Math.round(rpm)} rpm`;
    ]]]
