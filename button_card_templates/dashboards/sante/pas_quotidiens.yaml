#################################################################
# 🚶 CARTE ACTIVITÉ — PAS QUOTIDIENS
# ---------------------------------------------------------------
# Carte qualitative d’affichage du nombre de pas journaliers.
#
# Interprétation visuelle :
#   - Très faible → Rouge
#   - Faible → Orange
#   - Moyen → Jaune
#   - Bon → Vert
#   - Très bon → Bleu
#
# Principe Arsenal :
#   - Lecture seule
#   - Aucune logique métier
#   - Seuils purement UI
#################################################################

carte_activite_pas_quotidiens:
  template: carte_base

  show_state: true
  show_icon: true

  styles:
    card:
      - background-color: |
          [[[
            const steps = parseFloat(entity?.state);

            if (isNaN(steps))      return "rgba(158, 158, 158, 0.2)";   // ⚪ inconnu
            if (steps < 4000)      return "rgba(244, 67, 54, 0.2)";     // 🔴 très faible
            if (steps < 7000)      return "rgba(255, 152, 0, 0.2)";    // 🟠 faible
            if (steps < 9000)      return "rgba(255, 235, 59, 0.2)";   // 🟡 moyen
            if (steps < 12000)     return "rgba(76, 175, 80, 0.2)";     // 🟢 bon
            return "rgba(144, 202, 249, 0.25)";                          // 🔵 excellent
          ]]]
    state:
      - font-size: 18px
      - font-weight: bold
      - color: '#111'
    name:
      - font-size: 13px
      - font-weight: 500
      - color: '#111'