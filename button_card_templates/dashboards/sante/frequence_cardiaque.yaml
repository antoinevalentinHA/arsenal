#################################################################
# ❤️ CARTE FRÉQUENCE CARDIAQUE — UI
#################################################################

carte_frequence_cardiaque_qualitative:
  template: socle_kpi

  show_state: true
  show_icon: true

  variables:
    ui_profile: arsenal
    couleur: sensor.couleur_sante_frequence_cardiaque

  triggers_update:
    - sensor.couleur_sante_frequence_cardiaque

  state_display: |
    [[[
      const bpm = parseFloat(entity?.state);
      if (isNaN(bpm)) return "—";
      return `${Math.round(bpm)} bpm`;
    ]]]
