#################################################################
# 💤 CARTE SCORE QUALITATIF — UI
#################################################################

carte_score_qualitatif:
  template: socle_kpi

  show_state: true
  show_icon: true

  variables:
    ui_profile: arsenal
    couleur: sensor.couleur_sante_score_sommeil

  triggers_update:
    - sensor.couleur_sante_score_sommeil

  state_display: |
    [[[
      const v = parseFloat(entity?.state);
      if (isNaN(v)) return "—";
      return `${Math.round(v)} / 100`;
    ]]]
