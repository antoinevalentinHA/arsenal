#################################################################
# 💤 CARTE SCORE QUALITATIF — UI
#################################################################

carte_score_qualitatif:
  template: socle_kpi_72

  show_state: true
  show_icon: true

  state_display: |
    [[[
      const v = parseFloat(entity?.state);
      if (isNaN(v)) return "—";
      return `${Math.round(v)} / 100`;
    ]]]

  styles:
    card:
      - background-color: |
          [[[
            const v = parseFloat(entity?.state);

            // Indisponible (charte)
            if (isNaN(v)) return "rgba(224, 224, 224, 0.2)";

            if (v < 70) return "rgba(244, 67, 54, 0.2)";        // 🔴 très mauvais
            if (v < 76) return "rgba(255, 152, 0, 0.2)";        // 🟠 mauvais
            if (v < 81) return "rgba(255, 235, 59, 0.2)";       // 🟡 moyen
            if (v < 86) return "rgba(76, 175, 80, 0.2)";        // 🟢 bon
            return "rgba(144, 202, 249, 0.25)";                 // 🔵 excellent
          ]]]