#################################################################
# 🗺️ CARTE ACTIVITÉ — DISTANCE QUOTIDIENNE
#################################################################

carte_activite_distance_quotidienne:
  template: socle_kpi_72

  show_state: true
  show_icon: true

  state_display: |
    [[[
      const val = parseFloat(entity?.state);
      if (isNaN(val)) return "—";
      return `${Math.round(val)} m`;
    ]]]

  styles:
    card:
      - background-color: |
          [[[
            const dist = parseFloat(entity?.state);

            // Indisponible (charte Arsenal)
            if (isNaN(dist))   return "rgba(224, 224, 224, 0.2)";

            if (dist < 2500)   return "rgba(244, 67, 54, 0.2)";     // 🔴 très faible
            if (dist < 5000)   return "rgba(255, 152, 0, 0.2)";     // 🟠 faible
            if (dist < 7000)   return "rgba(255, 235, 59, 0.2)";    // 🟡 moyen
            if (dist < 9000)   return "rgba(76, 175, 80, 0.2)";     // 🟢 bon
            return "rgba(144, 202, 249, 0.25)";                      // 🔵 excellent
          ]]]