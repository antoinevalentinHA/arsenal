#################################################################
# 🗺️ CARTE ACTIVITÉ — DISTANCE QUOTIDIENNE
#################################################################

carte_activite_distance_quotidienne:
  template: socle_kpi

  show_state: true
  show_icon: true

  variables:
    ui_profile: arsenal
    couleur: sensor.couleur_sante_distance_quotidienne

  triggers_update:
    - sensor.couleur_sante_distance_quotidienne

  state_display: |
    [[[
      const val = parseFloat(entity?.state);
      if (isNaN(val)) return "—";
      return `${Math.round(val)} m`;
    ]]]
