#################################################################
# 🌫️ CARTE CO₂ — SEUILS VARIABLES
#################################################################

carte_co2_seuils_variables:
  template: socle_kpi_72

  icon: mdi:molecule-co2

  show_state: true

  tap_action:
    action: more-info
  hold_action:
    action: none
  double_tap_action:
    action: none

  state_display: |
    [[[
      const v = parseFloat(entity.state);
      return isNaN(v) ? '—' : `${Math.round(v)} ppm`;
    ]]]

  styles:
    card:
      - background-color: |
          [[[
            const v = parseFloat(entity.state);
            const ok   = variables?.seuil_ok;
            const warn = variables?.seuil_warn;
            const crit = variables?.seuil_crit;

            if (isNaN(v)) return 'rgba(158, 158, 158, 0.1)';
            if (crit !== undefined && v > crit) return 'rgba(244, 67, 54, 0.2)';
            if (warn !== undefined && v >= warn) return 'rgba(33, 150, 243, 0.2)';
            return 'rgba(76, 175, 80, 0.2)';
          ]]]