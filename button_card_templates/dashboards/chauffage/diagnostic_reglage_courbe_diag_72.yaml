# ==========================================================
# 🧠 ARSENAL — TEMPLATE METIER (UI)
#     chauffage_reglage_courbe_diag_72
# ----------------------------------------------------------
# 🎯 ROLE
#   Tuile diagnostic (72px) pour réglage courbe :
#   - Tendance 24h
#   - Diagnostic global (pente/parallele)
#   - Focus froid
#
# 🧩 VARIABLES
#   - kind: "tendance_24h" | "global" | "froid"
# ==========================================================
chauffage_reglage_courbe_diag_72:
  template: socle_status_label_72

  show_state: false
  show_name: true
  show_label: true
  show_icon: true
  color_type: card

  variables:
    diag: |
      [[[
        const UNAV = ['unknown','unavailable',undefined,null,'none',''];

        const num = (id) => {
          const s = states[id]?.state;
          if (UNAV.includes(s)) return null;
          const v = parseFloat(s);
          return Number.isNaN(v) ? null : v;
        };

        const e24   = num('sensor.ecart_consigne_moyenne_24h');
        const ef    = num('sensor.ecart_consigne_moyenne_froid');
        const ed    = num('sensor.ecart_consigne_moyenne_doux');

        if (e24 === null || ef === null || ed === null) {
          return { ok: false };
        }

        const r1 = (v, d=1) => (Math.round(v * (10**d)) / (10**d)).toFixed(d);

        const kind = variables.kind;

        if (kind === 'tendance_24h') {
          if (e24 > 0.4)  return { ok: true, kind, label: `${r1(e24)}°C  •  Trop chaud  •  Parallèle −1`, level: 'warn' };
          if (e24 < -0.4) return { ok: true, kind, label: `${r1(e24)}°C  •  Trop froid  •  Parallèle +1`, level: 'warn' };
          return { ok: true, kind, label: `${r1(e24)}°C  •  Satisfaisant`, level: 'ok' };
        }

        if (kind === 'global') {
          if (ef > 0.4 && ed > 0.4)   return { ok: true, kind, label: "Trop chaud  •  Parallèle −1", level: 'warn' };
          if (ef < -0.4 && ed < -0.4) return { ok: true, kind, label: "Trop froid  •  Parallèle +1", level: 'warn' };

          if (ef < -0.5 && ed > 0.5)  return { ok: true, kind, label: "Déséquilibre  •  Pente +0.1", level: 'warn' };
          if (ef > 0.5 && ed < -0.5)  return { ok: true, kind, label: "Déséquilibre  •  Pente −0.1", level: 'warn' };

          return { ok: true, kind, label: "Cohérent", level: 'ok' };
        }

        // kind === 'froid'
        if (ef < -0.5) return { ok: true, kind, label: `Écart: ${r1(ef,2)}°C  •  Sous-chauffe`, level: 'warn' };
        if (ef > 0.5)  return { ok: true, kind, label: `Écart: ${r1(ef,2)}°C  •  Sur-chauffe`, level: 'warn' };
        return { ok: true, kind, label: `Écart: ${r1(ef,2)}°C  •  Équilibré`, level: 'ok' };
      ]]]

  icon: |
    [[[
      const kind = variables.kind;
      if (kind === 'tendance_24h') return 'mdi:chart-line';
      if (kind === 'global') return 'mdi:tune-variant';
      if (kind === 'froid') return 'mdi:snowflake-thermometer';
      return 'mdi:chart-line';
    ]]]

  label: |
    [[[
      const d = variables.diag;
      if (!d?.ok) return "Indisponible";
      return d.label || "Indisponible";
    ]]]

  styles:
    card:
      - background-color: |
          [[[
            const d = variables.diag;

            // Indisponible (charte)
            if (!d?.ok) return "rgba(158, 158, 158, 0.1)";

            // Orange (charte)
            if (d.level === 'warn') return "rgba(255, 152, 0, 0.2)";

            // Vert OK (charte)
            return "rgba(76, 175, 80, 0.2)";
          ]]]
