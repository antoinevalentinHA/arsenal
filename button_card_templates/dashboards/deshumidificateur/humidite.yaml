#################################################################
# 📊 Carte — Capteur humidité déshumidificateur
# ---------------------------------------------------------------
# Carte générique utilisée pour :
#   - humidité relative (%)
#   - humidité absolue (g/m³)
#
# Le type est déduit dynamiquement depuis l’entity_id.
#################################################################

deshumidificateur_capteur:
  template: carte_base
  show_icon: true
  show_name: true
  show_state: true
  show_label: true
  styles:
    card:

      # Couleur PUREMENT VISUELLE :
      # - dépend de l’humidité mesurée
      # - des seuils ON / OFF
      # - et de l’état actif du déshumidificateur
      # ⚠️ Ne pilote aucune action

      - background-color: |
          [[[
            const id = entity?.entity_id || "";
            const actif = hass.states["binary_sensor.deshumidificateur_actif"]?.state === "on";

            const isHA = id.includes("_ha_") || id.includes("_absolue");
            const valeur = parseFloat(hass.states[isHA
              ? "sensor.humidite_absolue_cave"
              : "sensor.humidite_relative_cave"]?.state);

            const seuilOn  = parseFloat(hass.states[isHA
              ? "sensor.humidite_absolue_cible_on_cave"
              : "input_number.cave_rh_cible_on"]?.state);
            const seuilOff = parseFloat(hass.states[isHA
              ? "sensor.humidite_absolue_cible_off_cave"
              : "input_number.cave_rh_cible_off"]?.state);

            if (isNaN(valeur) || isNaN(seuilOn) || isNaN(seuilOff))
              return "rgba(158,158,158,0.2)";

            if (actif) {
              return valeur > seuilOff
                ? "rgba(244,67,54,0.2)"   // rouge = toujours humide
                : "rgba(76,175,80,0.2)";  // vert = descendu sous seuil off
            } else {
              return valeur >= seuilOn
                ? "rgba(244,67,54,0.2)"   // rouge = humidité haute
                : "rgba(76,175,80,0.2)";  // vert = sec
            }
          ]]]
    icon:
      - color: '#111'
    name:
      - font-size: 14px
      - font-weight: 500
      - color: '#111'
    state:
      - font-size: 16px
      - font-weight: 600
      - color: '#111'
    label:
      - font-size: 13px
      - color: '#111'
  state_display: |
    [[[
      const id = entity?.entity_id || "";
      const isHA = id.includes("_ha_") || id.includes("_absolue");
      const valeur = hass.states[isHA
        ? "sensor.humidite_absolue_cave"
        : "sensor.humidite_relative_cave"]?.state;
      return valeur && valeur !== "unknown"
        ? `${valeur} ${isHA ? "g/m³" : "%"}` 
        : "—";
    ]]]
  label: |
    [[[
      const id = entity?.entity_id || "";
      const isHA = id.includes("_ha_") || id.includes("_absolue");
      const seuilOn  = hass.states[isHA
        ? "sensor.humidite_absolue_cible_on_cave"
        : "input_number.cave_rh_cible_on"]?.state;
      const seuilOff = hass.states[isHA
        ? "sensor.humidite_absolue_cible_off_cave"
        : "input_number.cave_rh_cible_off"]?.state;
      const actif = hass.states["binary_sensor.deshumidificateur_actif"]?.state === "on";
      if (!seuilOn || !seuilOff) return "Seuils : —";
      return actif
        ? `Seuil Off : ${parseFloat(seuilOff).toFixed(1)} ${isHA ? "g/m³" : "%"}` 
        : `Seuil On : ${parseFloat(seuilOn).toFixed(1)} ${isHA ? "g/m³" : "%"}`;
    ]]]