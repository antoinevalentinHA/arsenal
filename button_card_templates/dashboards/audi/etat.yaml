#################################################################
# ℹ️ Carte — Informations Audi
# ---------------------------------------------------------------
# Utilisée pour les entités non binaires et informatives.
#################################################################

audi_etat_info:
  template: carte_base
  show_state: true
  show_icon: true

  styles:
    card:
      - height: 72px
      - border-radius: 12px
      - padding: 8px
      - box-shadow: var(--ha-card-box-shadow)
      - background-color: |
          [[[
            const s = entity?.state;

            // ⚪ Donnée indisponible
            if (s === undefined || s === null || s === "unknown" || s === "unavailable") {
              return "rgba(158, 158, 158, 0.1)";
            }

            // 🔵 Information valide
            return "rgba(33, 150, 243, 0.2)";
          ]]]

    name:
      - font-size: 13px
      - font-weight: 500
      - color: "#111"

    state:
      - font-size: 14px
      - font-weight: 400
      - color: "#111"

    icon:
      - color: "#111"