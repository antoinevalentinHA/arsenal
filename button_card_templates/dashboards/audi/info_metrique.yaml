#################################################################
# 🚗 CARTE INFO — MÉTRIQUE MOBILITÉ
# ---------------------------------------------------------------
# Affiche une métrique de mobilité en lecture directe :
#   - odomètre
#   - distance mensuelle
#   - distance annuelle
#   - autres indicateurs analytiques véhicule
#
# Sémantique UI :
#   - 🔵 Bleu  : information analytique valide
#   - ⚪ Gris  : donnée indisponible / non initialisée
#   - Aucune notion de seuil, alerte ou gravité
#
# Principe Arsenal :
#   - Carte strictement informationnelle
#   - Aucune logique métier
#   - Aucune interprétation qualitative
#   - Utilisée pour données longues durées et statistiques
#   - Couleur = nature de la donnée, jamais jugement
#################################################################

audi_info_metrique:
  template: carte_base

  show_state: true
  show_icon: true

  tap_action:
    action: none
  hold_action:
    action: none
  double_tap_action:
    action: none

  styles:
    card:
      - height: 72px
      - background-color: |
          [[[
            const s = entity?.state;

            // ⚪ Donnée indisponible
            if (s === undefined || s === null || s === "unknown" || s === "unavailable") {
              return "rgba(158, 158, 158, 0.1)";
            }

            // 🔵 Information analytique
            return "rgba(33, 150, 243, 0.2)";
          ]]]

    name:
      - font-size: 13px
      - font-weight: 500
      - color: "#111"

    state:
      - font-size: 14px
      - font-weight: 400
      - color: "#111"

    icon:
      - width: 26px
      - height: 26px
      - color: "#111"
