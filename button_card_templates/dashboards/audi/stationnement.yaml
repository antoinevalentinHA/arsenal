#################################################################
# 🚗 CARTE DURÉE — STATIONNEMENT
# ---------------------------------------------------------------
# Affiche une durée de stationnement avec code couleur simple.
#
# Principe Arsenal :
#   - Carte purement informationnelle
#   - Tolérante aux états unknown / unavailable
#   - Lisible immédiatement
#   - Aucun pilotage
#################################################################

carte_duree_stationnement:
  template: carte_base

  show_state: true

  tap_action:
    action: none
  hold_action:
    action: none
  double_tap_action:
    action: none

  styles:
    card:
      - height: 72px
      - background-color: |
          [[[
            const s = entity.state;

            if (s === 'unknown' || s === 'unavailable')
              return 'rgba(158, 158, 158, 0.1)';   // ⚪ donnée absente

            return 'rgba(33, 150, 243, 0.2)';    // 🔵 info neutre
          ]]]

    name:
      - font-size: 13px
      - font-weight: 500
      - color: '#111'

    state:
      - font-size: 14px
      - font-weight: 400
      - color: '#111'

    icon:
      - width: 26px
      - height: 26px
      - color: '#111'