#################################################################
# 🚗 CARTE DURÉE — STATIONNEMENT
# ---------------------------------------------------------------
# Affiche une durée de stationnement avec code couleur simple.
#
# Principe Arsenal :
#   - Carte purement informationnelle
#   - Tolérante aux états unknown / unavailable
#   - Lisible immédiatement
#   - Aucun pilotage
#################################################################

carte_duree_stationnement:
  template: socle_status

  tap_action:
    action: none
  hold_action:
    action: none
  double_tap_action:
    action: none

  styles:
    card:
      - background-color: |
          [[[
            const s = entity?.state;

            if (["unknown","unavailable",null].includes(s))
              return "rgba(158, 158, 158, 0.1)";   // ⚪ indispo

            return "rgba(33, 150, 243, 0.2)";     // 🔵 info
          ]]]
