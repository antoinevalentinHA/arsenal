#################################################################
# 🔐 Carte — Capteurs binaires Audi
# ---------------------------------------------------------------
# Utilisée pour tous les états ON / OFF du véhicule.
#################################################################

audi_etat_capteur:
  template: carte_base
  variables:
    couleur_vert: "rgba(76, 175, 80, 0.2)"
    couleur_rouge: "rgba(244, 67, 54, 0.2)"
    couleur_gris: "rgba(224, 224, 224, 0.2)"
  show_state: true
  show_icon: true
  styles:
    card:
      - height: 72px
      - border-radius: 12px
      - padding: 8px
      - box-shadow: var(--ha-card-box-shadow)
      - background-color: >
          [[[ 
            const s = entity?.state;
            if (["unknown","unavailable",null].includes(s)) return variables.couleur_gris;
            if (s === "off") return variables.couleur_vert;
            return variables.couleur_rouge;
          ]]]
    name:
      - font-size: 13px
      - font-weight: 500
      - color: '#111'
    state:
      - font-size: 14px
      - font-weight: 400
      - color: '#111'
    icon:
      - color: '#111'