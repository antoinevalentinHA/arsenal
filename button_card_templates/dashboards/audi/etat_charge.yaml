#################################################################
# 🚗 CARTE ÉTAT CHARGE VÉHICULE — UI
# ---------------------------------------------------------------
# Indique si un véhicule électrique est en charge.
#
# États attendus (texte) :
#   - charging → 🟢 En charge
#   - autre     → ⚪ Non en charge
#
# Principe Arsenal :
#   - Carte purement informationnelle
#   - Lecture immédiate
#   - Aucune logique métier
#################################################################

carte_etat_charge_vehicule:
  template: socle_status

  show_state: false
  show_icon: true

  tap_action:
    action: none
  hold_action:
    action: none
  double_tap_action:
    action: none

  styles:
    card:
      - background-color: |
          [[[
            const s = (entity?.state || '').toLowerCase();

            if (["unknown","unavailable",null].includes(s)) {
              return "rgba(158, 158, 158, 0.1)";   // ⚪ indispo
            }

            return s === "charging"
              ? "rgba(76, 175, 80, 0.2)"          // 🟢 en charge
              : "rgba(158, 158, 158, 0.2)";       // ⚪ arrêt
          ]]]
