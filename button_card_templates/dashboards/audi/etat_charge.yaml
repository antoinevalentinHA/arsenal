#################################################################
# 🚗 CARTE ÉTAT CHARGE VÉHICULE — UI
# ---------------------------------------------------------------
# Indique si un véhicule électrique est en charge.
#
# États attendus (texte) :
#   - charging → 🟢 En charge
#   - autre     → ⚪ Non en charge
#
# Principe Arsenal :
#   - Carte purement informationnelle
#   - Lecture immédiate
#   - Aucune logique métier
#################################################################

carte_etat_charge_vehicule:
  template: carte_base

  show_state: false

  tap_action:
    action: none
  hold_action:
    action: none
  double_tap_action:
    action: none

  styles:
    card:
      - height: 72px
      - background-color: |
          [[[
            const s = (entity?.state || '').toLowerCase();
            return s === 'charging'
              ? 'rgba(76, 175, 80, 0.2)'    // 🟢 en charge
              : 'rgba(158, 158, 158, 0.2)'; // ⚪ pas en charge
          ]]]

    name:
      - font-size: 13px
      - font-weight: 400
      - color: '#111'

    icon:
      - width: 26px
      - height: 26px
      - color: '#111'