#################################################################
# 🔄 CARTE DURÉE — DERNIÈRE MISE À JOUR
# ---------------------------------------------------------------
# Affiche la date/heure de dernière mise à jour d’une donnée.
#
# Principe Arsenal :
#   - Carte purement informationnelle
#   - Tolérante aux états unknown / unavailable
#   - Couleur neutre (fraîcheur ≠ qualité)
#   - Aucun pilotage
#################################################################

carte_derniere_mise_a_jour:
  template: carte_base

  show_state: true

  tap_action:
    action: none
  hold_action:
    action: none
  double_tap_action:
    action: none

  styles:
    card:
      - height: 72px
      - background-color: |
          [[[
            const s = entity.state;

            if (s === 'unknown' || s === 'unavailable')
              return 'rgba(158, 158, 158, 0.1)';   // ⚪ donnée absente

            return 'rgba(33, 150, 243, 0.2)';    // 🔵 info fraîcheur
          ]]]

    name:
      - font-size: 13px
      - font-weight: 500
      - color: '#111'

    state:
      - font-size: 14px
      - font-weight: 400
      - color: '#111'

    icon:
      - width: 26px
      - height: 26px
      - color: '#111'