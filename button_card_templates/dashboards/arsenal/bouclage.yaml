#################################################################
# 🔁 CARTE ACTION ECS — BOUCLAGE
#################################################################

carte_action_ecs_bouclage:
  template: socle_action_label_compact

  show_icon: true
  show_state: false
  show_name: true
  show_label: true

  icon: mdi:water-boiler

  label: |
    [[[
      const etat = states['switch.prise_bouclage']?.state;
      const timer = states['timer.bouclage_ecs_5_minutes'];

      if (etat === 'on') {
        if (timer && timer.state === 'active') return 'Actif (5 min)';
        return 'Actif';
      }
      return 'Veille';
    ]]]

  tap_action:
    action: call-service
    service: script.bouclage_ecs_5_minutes
    confirmation:
      text: Lancer le bouclage ECS pour 5 minutes ?

  hold_action:
    action: none
  double_tap_action:
    action: none

  triggers_update:
    - switch.prise_bouclage
    - timer.bouclage_ecs_5_minutes

  styles:
    card:
      - background-color: |
          [[[
            const etat = states['switch.prise_bouclage']?.state;
            return etat === 'on'
              ? 'rgba(76, 175, 80, 0.2)'
              : 'rgba(158, 158, 158, 0.2)';
          ]]]