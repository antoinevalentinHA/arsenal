#################################################################
# 👶 CARTE MODE BABYSITTING — UI
# ---------------------------------------------------------------
# Carte d’activation du mode Babysitting.
#
# Rôle :
#   - Activer / désactiver le mode Babysitting
#   - Demande de confirmation explicite
#   - Accès aux réglages associés
#
# Principe Arsenal :
#   - UI uniquement
#   - Aucune logique métier
#   - Traduction visuelle directe de l’état exposé
#################################################################

carte_mode_babysitting:
  template: socle_toggle

  tap_action:
    action: toggle
    confirmation:
      text: |
        [[[
          return entity?.state === 'on'
            ? "Désactiver le mode Babysitting ?"
            : "Activer le mode Babysitting ?";
        ]]]

  hold_action:
    action: navigate
    navigation_path: /reglages-dashboard/maison

  double_tap_action:
    action: none

  state:
    - value: 'on'
      styles:
        card:
          - background-color: rgba(76, 175, 80, 0.2)

    - value: 'off'
      styles:
        card:
          - background-color: rgba(158, 158, 158, 0.2)
