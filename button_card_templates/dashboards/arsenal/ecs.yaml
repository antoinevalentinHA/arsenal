#################################################################
# 🚿 CARTE ECS — ÉTAT BALLON
# ---------------------------------------------------------------
# Affichage de la température sécurisée du ballon ECS
# avec indication visuelle de l’état thermique et
# possibilité de lancer un cycle ponctuel.
#
# Principe Arsenal :
#   - Carte d’état réel
#   - Aucune décision métier
#   - Action utilisateur explicite et confirmée
#################################################################

carte_ecs_etat_ballon:
  template: carte_base

  show_state: true

  state_display: |
    [[[
      const st = entity.state;
      if (st === 'unavailable' || st === 'unknown' || st === 'none') return 'Indisponible';
      const t = parseFloat(st);
      if (isNaN(t)) return '—';
      return `${t.toFixed(1)} °C`;
    ]]]

  tap_action:
    action: navigate
    navigation_path: /ecs-dashboard/home

  hold_action:
    action: call-service
    service: script.chauffage_ecs_cycle
    data:
      mode: ponctuel
    confirmation:
      text: Lancer un cycle de chauffage ECS ponctuel ?

  state:
    # 🔶 Chauffe en cours → ORANGE
    - operator: template
      value: |
        [[[
          return states['binary_sensor.bruleur_mode_ecs']?.state === 'on';
        ]]]
      styles:
        card:
          - background-color: rgba(255, 152, 0, 0.2)

    # 🟦 Température basse → à chauffer
    - operator: template
      value: |
        [[[
          const t = parseFloat(entity.state);
          return !isNaN(t) && t < 39;
        ]]]
      styles:
        card:
          - background-color: rgba(144, 202, 249, 0.25)

    # 🔴 Température suffisante → ballon chaud
    - operator: template
      value: |
        [[[
          const t = parseFloat(entity.state);
          return !isNaN(t) && t >= 39;
        ]]]
      styles:
        card:
          - background-color: rgba(244, 67, 54, 0.2)

    # ⚪ Valeur invalide
    - operator: template
      value: |
        [[[
          const st = entity.state;
          return st !== 'unavailable'
            && st !== 'unknown'
            && st !== 'none'
            && isNaN(parseFloat(st));
        ]]]
      styles:
        card:
          - background-color: rgba(158, 158, 158, 0.2)

    # 💤 Cas par défaut
    - operator: default
      styles:
        card:
          - background-color: rgba(158, 158, 158, 0.2)

  styles:
    name:
      - color: var(--primary-text-color)
      - font-weight: 500
      - font-size: 13px
    state:
      - font-size: 14px
      - font-weight: 400
      - color: var(--primary-text-color)
      - justify-self: center
      - align-self: center