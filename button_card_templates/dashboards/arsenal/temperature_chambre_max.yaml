#################################################################
# 🔥 CARTE TEMPÉRATURE — MAXIMUM CHAMBRES
# ---------------------------------------------------------------
# Orientation : CLIMATISATION
#
# Règles :
#   - Rouge : temp_max > (consigne clim cool + offset clim)
#   - Vert  : zone clim autorisée
#   - Bleu  : temp_max < (consigne chauffage confort - offset chauffage)
#################################################################

carte_temperature_max_chambres:
  template: carte_temperature_confort

  styles:
    card:
      - background-color: |
          [[[
            const get = (id) => {
              const s = states[id];
              const v = parseFloat(s?.state);
              return Number.isFinite(v) ? v : null;
            };

            const temp_max      = get('sensor.temperature_max_chambres');
            const cons_clim     = get('input_number.clim_consigne_presence');
            const off_clim      = get('input_number.clim_offset_on');
            const cons_chauff   = get('input_number.chauffage_consigne_confort');
            const off_chauff    = get('input_number.chauffage_offset_on');

            const RED   = 'rgba(244, 67, 54, 0.2)';
            const GREEN = 'rgba(76, 175, 80, 0.2)';
            const BLUE  = 'rgba(144, 202, 249, 0.25)';
            const GREY  = 'rgba(158, 158, 158, 0.2)';

            if (
              temp_max === null ||
              cons_clim === null ||
              off_clim === null ||
              cons_chauff === null ||
              off_chauff === null
            ) {
              return GREY;
            }

            const seuil_clim_on   = cons_clim + off_clim;
            const seuil_chauff_on = cons_chauff - off_chauff;

            if (temp_max > seuil_clim_on)   return RED;
            if (temp_max < seuil_chauff_on) return BLUE;
            return GREEN;
          ]]]

  label: |
    [[[
      return states['sensor.temperature_max_chambres']
        ?.attributes
        ?.chambre_la_plus_chaude
        || 'Inconnue';
    ]]]