#################################################################
# 🧠 ARSENAL — TEMPLATE MÉTIER
#     Volets / Pluie — Exposition (Résumé ouvertures)
#
# Rôle :
#   Synthèse d'exposition : "Aucune" => OK, sinon alerte.
#
# Couleurs :
#   - Aucune / 0 / vide -> Vert OK
#   - Sinon            -> Rouge KO
#   - unknown/unavail  -> Gris indispo
#################################################################

pluie_exposition_resume_72:
  template: socle_diagnostic_compact
  styles:
    card:
      - background-color: >
          [[[
            const s = entity?.state;

            if (!s || s === "unknown" || s === "unavailable") return "rgba(224, 224, 224, 0.2)";

            const v = String(s).trim().toLowerCase();
            const ok = (v === "aucune" || v === "0" || v === "none" || v === "");

            return ok ? "rgba(76, 175, 80, 0.2)" : "rgba(244, 67, 54, 0.2)";
          ]]]