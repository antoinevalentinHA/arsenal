#################################################################
# 🪟 VOLETS — TEMPLATES UI (ACTIONS 72 CANON)
#################################################################
#
# 🧠 Rôle :
#   Tuiles d’action volets 72px sans retour d’état.
#
# 🎯 Objectifs :
#   - UI canonique 72px
#   - Couleurs Arsenal strictes
#   - Aucune logique métier
#
#################################################################

# =============================================================
# 🧱 BASE FONCTIONNELLE (hérite du socle KPI 72)
# =============================================================
shutter_action_base:
  template: socle_kpi_72

  show_state: false
  show_label: false

  tap_action:
    action: call-service
    service: |
      [[[ return variables.service || null; ]]]
    service_data: |
      [[[
        const data = {};
        if (variables.data) Object.assign(data, variables.data);

        if (variables.target) {
          if (variables.service?.startsWith("cover.stop_cover")) {
            if (variables.target.entity_id) data.entity_id = variables.target.entity_id;
          } else {
            data.target = variables.target;
          }
        }

        return data;
      ]]]
    confirmation:
      text: |
        [[[ return variables.confirm || null; ]]]

  hold_action:
    action: none
  double_tap_action:
    action: none

  name: |
    [[[ return variables.name || ''; ]]]
  icon: |
    [[[ return variables.icon || 'mdi:window-shutter'; ]]]

  styles:
    card:
      - background-color: "rgba(158, 158, 158, 0.2)"