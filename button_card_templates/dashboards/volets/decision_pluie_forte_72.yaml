#################################################################
# 🧠 ARSENAL — TEMPLATE MÉTIER
#     Volets / Pluie — Décision — Pluie forte (72)
#
# Rôle :
#   Tuile décisionnelle : pluie forte (ON/OFF) + couleur métier.
#
# Couleurs :
#   - ON  -> Rouge KO
#   - OFF -> Gris neutre
#   - unknown/unavailable -> Gris indispo
#################################################################

decision_pluie_forte_72:
  template: socle_decision_72
  show_icon: true
  icon: >
    [[[
      const s = entity?.state;
      if (s === "on") return "mdi:weather-pouring";
      if (s === "off") return "mdi:weather-pouring-off";
      return "mdi:help-circle-outline";
    ]]]
  styles:
    card:
      - background-color: >
          [[[
            const s = entity?.state;

            if (s === undefined || s === null) return "rgba(158, 158, 158, 0.1)";
            if (s === "unknown" || s === "unavailable") return "rgba(158, 158, 158, 0.1)";

            if (s === "on") return "rgba(244, 67, 54, 0.2)";
            return "rgba(158, 158, 158, 0.2)";
          ]]]