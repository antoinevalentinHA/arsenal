# ==========================================================
# 🧠 ARSENAL — TEMPLATE METIER (UI)
#     aeration_episode_status_72
# ----------------------------------------------------------
# 🎯 ROLE
#   Synthese "aeration / ouverture qualifiee" backend-driven.
#   Source de verite unique :
#     - binary_sensor.fenetre_ouverte_maison_avec_delai
#
#   Optionnel :
#     - si ouverture brute detectee mais non qualifiee -> jaune "delai"
#
# 🛡️ INVARIANTS
#   - Aucun calcul temporel UI
#   - Aucun jugement non fonde (pas de "qualifiee" sans le capteur qualifie)
#   - Indisponibilite prioritaire (gris 0.1)
# ==========================================================

aeration_episode_status_72:
  template: socle_status_label_72

  show_state: false
  show_name: true
  show_label: true
  show_icon: true
  color_type: card

  triggers_update:
    - binary_sensor.fenetre_ouverte_maison_avec_delai
    - binary_sensor.fenetre_ouverte_maison

  icon: |
    [[[
      const UNAV = ['unknown','unavailable',undefined,null,'none',''];
      const qual = states['binary_sensor.fenetre_ouverte_maison_avec_delai']?.state;
      const brut = states['binary_sensor.fenetre_ouverte_maison']?.state;

      if (UNAV.includes(qual) || UNAV.includes(brut))
        return 'mdi:help-circle-outline';

      if (qual === 'on')
        return 'mdi:window-open-variant';

      if (brut === 'on')
        return 'mdi:timer-sand';

      return 'mdi:window-closed-variant';
    ]]]

  label: |
    [[[
      const UNAV = ['unknown','unavailable',undefined,null,'none',''];
      const qual = states['binary_sensor.fenetre_ouverte_maison_avec_delai']?.state;
      const brut = states['binary_sensor.fenetre_ouverte_maison']?.state;

      if (UNAV.includes(qual) || UNAV.includes(brut))
        return "Indisponible";

      if (qual === 'on')
        return "Ouverture qualifiée";

      if (brut === 'on')
        return "Ouverture • délai";

      return "Au repos";
    ]]]

  styles:
    card:
      - background-color: |
          [[[
            const UNAV = ['unknown','unavailable',undefined,null,'none',''];
            const qual = states['binary_sensor.fenetre_ouverte_maison_avec_delai']?.state;
            const brut = states['binary_sensor.fenetre_ouverte_maison']?.state;

            if (UNAV.includes(qual) || UNAV.includes(brut))
              return "rgba(158, 158, 158, 0.1)";

            if (qual === 'on')
              return "rgba(33, 150, 243, 0.2)";

            if (brut === 'on')
              return "rgba(255, 235, 59, 0.2)";

            return "rgba(158, 158, 158, 0.2)";
          ]]]