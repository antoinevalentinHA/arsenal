# ==========================================================
# 🧠 ARSENAL — TEMPLATE METIER (UI)
#     aeration_episode_status_72
# ----------------------------------------------------------
# 🎯 ROLE
#   Synthese episode d'aeration.
#   Aucun calcul temporel UI.
#   100% backend-driven.
# ==========================================================

aeration_episode_status_72:
  template: socle_status_label_72

  show_state: false
  show_name: true
  show_label: true
  show_icon: true
  color_type: card

  triggers_update:
    - input_boolean.aeration_episode_en_cours
    - binary_sensor.tentative_aeration_en_grace

  icon: |
    [[[
      const UNAV = ['unknown','unavailable',undefined,null,'none',''];
      const episode = states['input_boolean.aeration_episode_en_cours']?.state;
      const tentative = states['binary_sensor.tentative_aeration_en_grace']?.state;

      if (UNAV.includes(episode) || UNAV.includes(tentative))
        return 'mdi:help-circle-outline';

      if (episode === 'on')
        return 'mdi:window-open-variant';

      if (tentative === 'on')
        return 'mdi:timer-sand';

      return 'mdi:window-closed-variant';
    ]]]

  label: |
    [[[
      const UNAV = ['unknown','unavailable',undefined,null,'none',''];
      const episode = states['input_boolean.aeration_episode_en_cours']?.state;
      const tentative = states['binary_sensor.tentative_aeration_en_grace']?.state;

      if (UNAV.includes(episode) || UNAV.includes(tentative))
        return "Indisponible";

      if (episode === 'on')
        return "Épisode • ouverture qualifiée";

      if (tentative === 'on')
        return "Tentative • délai de grâce";

      return "Au repos";
    ]]]

  styles:
    card:
      - background-color: |
          [[[
            const UNAV = ['unknown','unavailable',undefined,null,'none',''];
            const episode = states['input_boolean.aeration_episode_en_cours']?.state;
            const tentative = states['binary_sensor.tentative_aeration_en_grace']?.state;

            if (UNAV.includes(episode) || UNAV.includes(tentative))
              return "rgba(158, 158, 158, 0.1)";

            if (episode === 'on')
              return "rgba(33, 150, 243, 0.2)";

            if (tentative === 'on')
              return "rgba(255, 152, 0, 0.2)";

            return "rgba(158, 158, 158, 0.2)";
          ]]]
