# ==========================================================
# 🧠 ARSENAL — TEMPLATE METIER (UI)
#     aeration_deltat_chute_72
# ----------------------------------------------------------
# 🎯 ROLE
#   Indiquer si une chute thermique significative a été observée
#   via aeration_delta_t_utilise (monotone max épisode).
# ==========================================================
aeration_deltat_chute_72:
  template: socle_status_label_72

  show_state: false
  show_name: true
  show_label: true
  show_icon: true
  color_type: card

  triggers_update:
    - input_number.aeration_delta_t_utilise
    - input_boolean.aeration_episode_en_cours
    - input_boolean.chauffage_blocage_aeration
    - timer.aeration_analyse_delta_t

  icon: mdi:thermometer-chevron-down

  label: |
    [[[
      const UNAV = ['unknown','unavailable',undefined,null,'none',''];

      const episode = states['input_boolean.aeration_episode_en_cours']?.state;
      const blocage = states['input_boolean.chauffage_blocage_aeration']?.state;
      const tstate  = states['timer.aeration_analyse_delta_t']?.state;

      if ([episode, blocage, tstate].some(v => UNAV.includes(v))) return "Indisponible";

      const actif = (episode === 'on') || (blocage === 'on');
      if (!actif) return "—";

      if (tstate === 'active') {
        return `Analyse ΔT en attente`;
      }

      const s = states['input_number.aeration_delta_t_utilise']?.state;
      if (UNAV.includes(s)) return "Indisponible";

      const v = parseFloat(s);
      if (Number.isNaN(v)) return "Indisponible";

      if (v === 0) return "Aucune chute";
      if (v < 0.8) return `Chute faible • ${v.toFixed(2)} °C`;
      if (v < 1.2) return `Chute modérée • ${v.toFixed(2)} °C`;

      return `Chute importante • ${v.toFixed(2)} °C`;
    ]]]

  styles:
    card:
      - background-color: |
          [[[
            const UNAV = ['unknown','unavailable',undefined,null,'none',''];

            const episode = states['input_boolean.aeration_episode_en_cours']?.state;
            const blocage = states['input_boolean.chauffage_blocage_aeration']?.state;
            const tstate  = states['timer.aeration_analyse_delta_t']?.state;

            if ([episode, blocage, tstate].some(v => UNAV.includes(v)))
              return "rgba(158, 158, 158, 0.1)";

            const actif = (episode === 'on') || (blocage === 'on');
            if (!actif)
              return "rgba(158, 158, 158, 0.2)";

            if (tstate === 'active')
              return "rgba(33, 150, 243, 0.2)";

            const s = states['input_number.aeration_delta_t_utilise']?.state;
            if (UNAV.includes(s))
              return "rgba(158, 158, 158, 0.1)";

            const v = parseFloat(s);
            if (Number.isNaN(v))
              return "rgba(158, 158, 158, 0.1)";

            if (v === 0)
              return "rgba(76, 175, 80, 0.2)";

            if (v < 0.8)
              return "rgba(255, 235, 59, 0.2)";

            if (v < 1.2)
              return "rgba(255, 152, 0, 0.2)";

            return "rgba(244, 67, 54, 0.2)";
          ]]]