# ==========================================================
# 🧠 ARSENAL — TEMPLATE METIER (UI)
#     aeration_reference_thermique_72
# ----------------------------------------------------------
# 🎯 ROLE
#   Afficher :
#   - Référence thermique utilisée (snapshot M1)
#   - ΔT utilisé (monotone max épisode)
#   Carte purement informative (bleu INFO).
# ==========================================================

aeration_reference_thermique_72:
  template: socle_info_72

  show_state: false
  show_name: true
  show_label: true
  show_icon: true

  triggers_update:
    - input_number.aeration_reference_thermique_utilisee
    - input_number.aeration_delta_t_utilise
    - input_boolean.aeration_episode_en_cours
    - input_boolean.chauffage_blocage_aeration
    - timer.aeration_analyse_delta_t

  icon: mdi:thermometer

  label: |
    [[[
      const UNAV = ['unknown','unavailable',undefined,null,'none',''];

      const episode = states['input_boolean.aeration_episode_en_cours']?.state;
      const blocage = states['input_boolean.chauffage_blocage_aeration']?.state;
      const tstate  = states['timer.aeration_analyse_delta_t']?.state;

      if ([episode, blocage, tstate].some(v => UNAV.includes(v))) return "Indisponible";

      const actif = (episode === 'on') || (blocage === 'on');
      if (!actif) return "—";

      if (tstate === 'active') {
        return `Référence/ΔT en attente`;
      }

      const num = (id) => {
        const s = states[id]?.state;
        if (UNAV.includes(s)) return null;
        const v = parseFloat(s);
        return Number.isNaN(v) ? null : v;
      };

      const ref = num('input_number.aeration_reference_thermique_utilisee');
      const deltaT = num('input_number.aeration_delta_t_utilise');

      if (ref === null || deltaT === null) return "Indisponible";

      return `Réf ${ref.toFixed(2)} °C  •  ΔT ${deltaT.toFixed(2)} °C`;
    ]]]
