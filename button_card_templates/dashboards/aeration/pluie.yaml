#################################################################
# 🌧️ Carte — Pluie (sources Zigbee + Netatmo)
#################################################################

carte_pluie:
  template: socle_status

  show_label: false

  tap_action:
    action: none
  hold_action:
    action: none
  double_tap_action:
    action: none

  state_display: |
    [[[
      return entity.state === "on" ? "Oui" : "Non";
    ]]]

  state:
    - value: "on"
      styles:
        card:
          - background-color: rgba(158, 158, 158, 0.2)

    - value: "off"
      styles:
        card:
          - background-color: rgba(76, 175, 80, 0.2)
