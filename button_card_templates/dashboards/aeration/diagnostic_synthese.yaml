# ==========================================================
# 🧠 ARSENAL — TEMPLATE METIER (UI)
#     aeration_synthese_72
# ----------------------------------------------------------
# 🎯 ROLE
#   Phrase synthese priorisee :
#   blocage > episode > nominal
# ==========================================================

aeration_synthese_72:
  template: socle_status_label_72

  show_state: false
  show_name: true
  show_label: true
  show_icon: true
  color_type: card

  icon: mdi:window-open-variant

  label: |
    [[[
      const st = (id) => states[id]?.state;
      const UNAV = ['unknown','unavailable',undefined,null,'none',''];

      const blocage = st('input_boolean.chauffage_blocage_aeration');
      const episode = st('input_boolean.aeration_episode_en_cours');

      if ([blocage, episode].some(v => UNAV.includes(v)))
        return "Indisponible";

      if (blocage === 'on')
        return "Chauffage bloqué (post-aération)";

      if (episode === 'on')
        return "Aération en cours";

      return "Situation nominale";
    ]]]

  styles:
    card:
      - background-color: |
          [[[
            const st = (id) => states[id]?.state;
            const UNAV = ['unknown','unavailable',undefined,null,'none',''];

            const blocage = st('input_boolean.chauffage_blocage_aeration');
            const episode = st('input_boolean.aeration_episode_en_cours');

            if ([blocage, episode].some(v => UNAV.includes(v)))
              return "rgba(224, 224, 224, 0.2)";

            if (blocage === 'on')
              return "rgba(244, 67, 54, 0.2)";

            if (episode === 'on')
              return "rgba(144, 202, 249, 0.25)";

            return "rgba(76, 175, 80, 0.2)";
          ]]]