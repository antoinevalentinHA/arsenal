# ==========================================================
# 🧠 ARSENAL — TEMPLATE METIER (UI)
#     chauffage_blocage_aeration_xl
# ----------------------------------------------------------
# 🎯 ROLE
#   Synthese verrou chauffage lie a l'aeration.
#   Remplace markdown narratif par carte canon XL.
# ==========================================================

chauffage_blocage_aeration_xl:
  template: socle_status_label_xl

  icon: mdi:lock-alert

  state_display: |
    [[[
      const st = (id) => states[id]?.state;
      const UNAV = ['unknown','unavailable',undefined,null,'none',''];

      const blocage = st('input_boolean.chauffage_blocage_aeration');
      const episode = st('input_boolean.aeration_episode_en_cours');
      const override = st('input_boolean.mode_confort_chauffage');

      if ([blocage, episode, override].some(v => UNAV.includes(v)))
        return "Chauffage";

      if (blocage === 'on' && episode === 'on') return "Suspendu";
      if (blocage === 'on') return "Stabilisation";
      if (override === 'on') return "Override";
      return "Aucun verrou";
    ]]]

  label: |
    [[[
      const st = (id) => states[id]?.state;
      const UNAV = ['unknown','unavailable',undefined,null,'none',''];

      const blocage = st('input_boolean.chauffage_blocage_aeration');
      const episode = st('input_boolean.aeration_episode_en_cours');
      const override = st('input_boolean.mode_confort_chauffage');

      const d_bloc = st('input_datetime.chauffage_fin_blocage_aeration');
      const d_ana  = st('input_datetime.analyse_deltat_disponible');

      const fmt = (s) => {
        if (UNAV.includes(s)) return "—";
        const t = Date.parse(s);
        if (Number.isNaN(t)) return "—";
        const d = new Date(t);
        const dd = String(d.getDate()).padStart(2,'0');
        const mm = String(d.getMonth()+1).padStart(2,'0');
        const hh = String(d.getHours()).padStart(2,'0');
        const mi = String(d.getMinutes()).padStart(2,'0');
        return `${dd}/${mm} ${hh}:${mi}`;
      };

      if ([blocage, episode, override].some(v => UNAV.includes(v)))
        return "Indisponible";

      if (blocage === 'on' && episode === 'on') {
        return `Aération en cours\nFin: ${fmt(d_bloc)}  •  ΔT: ${fmt(d_ana)}`;
      }

      if (blocage === 'on') {
        return `Post-aération\nFin: ${fmt(d_bloc)}  •  ΔT: ${fmt(d_ana)}`;
      }

      if (override === 'on') {
        return "Confort forcé opérateur";
      }

      return "Système nominal";
    ]]]

  styles:
    card:
      - background-color: |
          [[[
            const st = (id) => states[id]?.state;
            const UNAV = ['unknown','unavailable',undefined,null,'none',''];

            const blocage = st('input_boolean.chauffage_blocage_aeration');
            const episode = st('input_boolean.aeration_episode_en_cours');
            const override = st('input_boolean.mode_confort_chauffage');

            if ([blocage, episode, override].some(v => UNAV.includes(v)))
              return "rgba(158, 158, 158, 0.1)";

            if (blocage === 'on' && episode === 'on')
              return "rgba(244, 67, 54, 0.2)";

            if (blocage === 'on')
              return "rgba(255, 152, 0, 0.2)";

            if (override === 'on')
              return "rgba(33, 150, 243, 0.2)";

            return "rgba(76, 175, 80, 0.2)";
          ]]]
