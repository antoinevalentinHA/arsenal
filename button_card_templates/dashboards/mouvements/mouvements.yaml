# ==============================================================
# 🎛️ TEMPLATE : carte_mouvement
# ==============================================================

carte_mouvement:
  template: socle_status

  icon: mdi:motion-sensor
  show_state: false
  show_label: false
  show_name: true
  show_icon: true

  tap_action:
    action: none
  hold_action:
    action: none
  double_tap_action:
    action: none

  styles:
    card:
      - background-color: |
          [[[
            const rouge = "rgba(244, 67, 54, 0.2)";   // mouvement
            const vert  = "rgba(76, 175, 80, 0.2)";  // calme
            const indispo = "rgba(158, 158, 158, 0.1)";

            if (!entity || entity.state === "unknown" || entity.state === "unavailable")
              return indispo;

            return entity.state === "on" ? rouge : vert;
          ]]]