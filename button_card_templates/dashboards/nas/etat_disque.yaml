#################################################################
# 🧠 CARTE NAS — ÉTAT DISQUE
# ---------------------------------------------------------------
# Affiche l’état global d’un disque NAS (DSM).
#
# États interprétés :
#   - Normal / OK        → 🟢
#   - Avertissement      → 🟠
#   - Critique           → 🔴
#
# Principe Arsenal :
#   - Carte de diagnostic
#   - Lecture immédiate
#   - Aucune logique métier
#################################################################

carte_nas_drive_etat:
  template: carte_base

  show_state: true

  styles:
    card:
      - background-color: |
          [[[
            const v = (entity.state || '').toLowerCase();

            if (v.includes('critique'))
              return 'rgba(244, 67, 54, 0.2)';   // 🔴 critique

            if (v.includes('avert') || v.includes('warning'))
              return 'rgba(255, 152, 0, 0.2)';   // 🟠 avertissement

            if (v.includes('normal') || v.includes('ok'))
              return 'rgba(76, 175, 80, 0.2)';   // 🟢 normal

            return 'rgba(224, 224, 224, 0.2)';   // ⚪ inconnu
          ]]]

    name:
      - font-size: 13px
      - font-weight: 500
      - color: '#111'

    state:
      - font-size: 14px
      - font-weight: 400
      - color: '#111'

    icon:
      - color: '#111'