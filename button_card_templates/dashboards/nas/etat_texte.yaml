#################################################################
# 🗂️ CARTE CAPTEUR — ÉTAT TEXTUEL (INTERPRÉTÉ)
# ---------------------------------------------------------------
# Carte générique pour entités exposant un état texte :
#   OK / Normal / Attention / Warning / Critique / Fail / Erreur…
#
# Principe Arsenal :
#   - Carte de diagnostic
#   - Lecture seule
#   - Interprétation UI (mapping texte → couleur)
#   - Typo / layout pilotés par le socle
#################################################################

carte_capteur_etat_textuel:
  template: socle_status_72

  show_state: true

  styles:
    card:
      - background-color: |
          [[[
            const v = (entity.state || '').toLowerCase();

            // 🔴 Critique / Erreur / Échec
            if (
              v.includes('critique') ||
              v.includes('critical') ||
              v.includes('erreur') ||
              v.includes('error') ||
              v.includes('échec') ||
              v.includes('echec') ||
              v.includes('fail')
            ) return 'rgba(244, 67, 54, 0.2)';

            // 🟠 Avertissement / Attention
            if (
              v.includes('avert') ||
              v.includes('warning') ||
              v.includes('attention') ||
              v.includes('warn')
            ) return 'rgba(255, 152, 0, 0.2)';

            // 🟢 OK / Normal
            if (
              v.includes('ok') ||
              v.includes('normal')
            ) return 'rgba(76, 175, 80, 0.2)';

            // ⚪ Inconnu / fallback (charte)
            return 'rgba(158, 158, 158, 0.1)';
          ]]]