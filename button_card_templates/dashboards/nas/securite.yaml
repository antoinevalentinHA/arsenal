#################################################################
# 🛡️ CARTE ÉTAT DE SÉCURITÉ — UI
# ---------------------------------------------------------------
# Carte d’affichage d’un état de sécurité binaire.
#
# Rôle :
#   - Indiquer visuellement un état sain ou dégradé
#   - Alerter sans ambiguïté
#
# Principe Arsenal :
#   - Carte purement informationnelle
#   - Aucune interaction
#   - Couleur = sémantique forte
#################################################################

carte_etat_securite:
  template: carte_base

  show_state: true

  tap_action:
    action: none
  hold_action:
    action: none
  double_tap_action:
    action: none

  styles:
    card:
      - background-color: |
          [[[ 
            return entity.state === "off"
              ? "rgba(76, 175, 80, 0.2)"   // 🟢 Sécurité OK
              : "rgba(244, 67, 54, 0.2)"; // 🔴 Problème détecté
          ]]]
    name:
      - font-size: 13px
      - font-weight: 500
      - color: '#111'
    state:
      - font-size: 14px
      - font-weight: 400
      - color: '#111'
    icon:
      - color: '#111'