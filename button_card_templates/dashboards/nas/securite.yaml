#################################################################
# 🛡️ CARTE — ÉTAT DE SÉCURITÉ (BINAIRE)
# ---------------------------------------------------------------
# Carte générique pour indicateurs de sécurité :
#   intrusion, panne, défaut, sabotage, alarme, etc.
#
# Principe Arsenal :
#   - Lecture seule
#   - Sémantique binaire claire
#   - UI = restitution fidèle
#################################################################

carte_etat_securite:
  template: socle_status_72

  show_state: true

  styles:
    card:
      - background-color: |
          [[[
            const st = entity.state;

            // 🟢 OK
            if (st === 'off') {
              return 'rgba(76, 175, 80, 0.2)';
            }

            // 🔴 Défaut / alerte / intrusion
            if (st === 'on') {
              return 'rgba(244, 67, 54, 0.2)';
            }

            // ⚪ Inconnu / indispo
            return 'rgba(158, 158, 158, 0.1)';
          ]]]