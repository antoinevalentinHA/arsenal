alarme_diagnostic_autorite_application_compact:
  template: alarme_diagnostic_autorite_compact

  state_display: >
    [[[
      const s = entity.state;
      if (s === "unknown" || s === "unavailable") return "INDISPO";
      if (s === "off") return "DÉSACTIVÉE";
      return "OK";
    ]]]

  state:
    - operator: template
      value: >
        [[[
          return entity.state === "unknown" || entity.state === "unavailable";
        ]]]
      styles:
        card:
          - background-color: rgba(158, 158, 158, 0.1)

    - value: "off"
      styles:
        card:
          - background-color: rgba(244, 67, 54, 0.2)
