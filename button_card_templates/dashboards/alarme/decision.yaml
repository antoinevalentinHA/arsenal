# ==============================================================
# 🎛️ TEMPLATE : carte_alarme_decision
# --------------------------------------------------------------
# Carte décisionnelle de l’alarme — UI Arsenal (lecture seule).
#
# 🧠 Rôle :
#   - Afficher l’état réel du panneau d’alarme
#   - Exposer la décision centrale calculée par le cerveau
#   - Mettre en évidence toute divergence entre :
#       • l’état logique cible
#       • l’état réellement appliqué
#
# 🧩 Principe Arsenal :
#   - Le backend décide (scripts / cerveau V2+)
#   - La carte explique, observe et alerte visuellement
#   - Aucune logique métier, aucun recalcul
#
# 🚫 Ne fait PAS :
#   - Aucun armement / désarmement
#   - Aucune temporisation
#   - Aucune correction automatique
#
# 🎨 Codes couleur :
#   - 🟢 Vert  : état cohérent avec la décision
#   - 🔴 Rouge : divergence (échec ou retard d’application)
#
# ⚙️ Dépendances :
#   - alarm_control_panel.alarme_maison
#   - input_text.alarme_etat_cible
#   - input_text.alarme_raison
#
# 🧪 Robustesse :
#   - Tolérance au NOOP
#   - Affichage sûr post-redémarrage
#
# ✅ Compatible :
#   - UI Arsenal
#   - Cerveau alarme V2 / V3 / V4
# ==============================================================

carte_alarme_decision:
  color_type: card
  show_icon: true
  show_name: true
  show_state: true
  show_label: true

  icon: mdi:shield-home

  state_display: |
    [[[
      const map = {
        'armed_away': 'Armée (Absent)',
        'disarmed': 'Désarmée'
      };
      return map[entity.state] || entity.state;
    ]]]

  label: |
    [[[
      const cible = states['input_text.alarme_etat_cible']?.state || '—';
      const raison = states['input_text.alarme_raison']?.state || '';
      const map = {
        'ARMED_AWAY': 'Décision : Armer',
        'DISARMED': 'Décision : Désarmer',
        'NOOP': 'Décision : Aucune action'
      };
      return `${map[cible] || cible}${raison ? ' — ' + raison : ''}`;
    ]]]

  state:
    # 🟢 Cohérent
    - operator: template
      value: >
        [[[
          const cible = states['input_text.alarme_etat_cible']?.state;
          return (cible === 'ARMED_AWAY' && entity.state === 'armed_away') ||
                 (cible === 'DISARMED'  && entity.state === 'disarmed') ||
                 (cible === 'NOOP');
        ]]]
      styles:
        card:
          - background-color: rgba(76,175,80,0.2)

    # 🔴 Divergence
    - operator: template
      value: >
        [[[
          const cible = states['input_text.alarme_etat_cible']?.state;
          return (cible === 'ARMED_AWAY' && entity.state !== 'armed_away') ||
                 (cible === 'DISARMED'  && entity.state !== 'disarmed');
        ]]]
      styles:
        card:
          - background-color: rgba(244,67,54,0.2)

  tap_action:
    action: none

  styles:
    card:
      - border-radius: 12px
      - padding: 8px
      - height: 88px
      - box-shadow: var(--ha-card-box-shadow)
    name:
      - font-size: 13px
      - font-weight: 500
      - color: '#111'
    state:
      - font-size: 18px
      - font-weight: bold
      - color: '#111'
    label:
      - font-size: 12px
      - color: '#555'