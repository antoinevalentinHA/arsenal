# ==============================================================
# 🧠 TEMPLATE : carte_alarme_intention
# --------------------------------------------------------------
# Intention du cerveau, colorée selon cohérence
# avec l’état réel de l’alarme.
# ==============================================================

carte_alarme_intention:
  template: socle_status

  icon: mdi:brain
  name: Intention système

  show_icon: true
  show_label: false

  tap_action:
    action: none
  hold_action:
    action: none
  double_tap_action:
    action: none

  state_display: |
    [[[ 
      const map = {
        'ARMED_AWAY': 'Armer (Absent)',
        'DISARMED': 'Désarmer',
        'NOOP': 'Aucune action'
      };
      return map[entity.state] || entity.state;
    ]]]

  state:
    # 🟢 COHÉRENT
    - operator: template
      value: >
        [[[
          const cible = entity.state;
          const reel  = states['alarm_control_panel.alarme_maison']?.state;

          return (cible === 'ARMED_AWAY' && reel === 'armed_away') ||
                 (cible === 'DISARMED'  && reel === 'disarmed');
        ]]]
      styles:
        card:
          - background-color: rgba(76,175,80,0.2)

    # 🔴 DIVERGENCE
    - operator: template
      value: >
        [[[
          const cible = entity.state;
          const reel  = states['alarm_control_panel.alarme_maison']?.state;

          return (cible === 'ARMED_AWAY' && reel !== 'armed_away') ||
                 (cible === 'DISARMED'  && reel !== 'disarmed');
        ]]]
      styles:
        card:
          - background-color: rgba(244,67,54,0.2)

    # ⚪ NOOP
    - value: 'NOOP'
      styles:
        card:
          - background-color: rgba(158,158,158,0.2)
