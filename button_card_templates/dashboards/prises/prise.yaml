#################################################################
# 🔌 PRISES — TEMPLATES UI
#################################################################
#
# 🧠 Rôle :
#   Template button-card dédié au pilotage manuel des prises
#   connectées (ON / OFF).
#
# 🎯 Objectifs :
#   - Offrir une commande simple et immédiate
#   - Fournir un retour visuel clair de l’état réel
#
# 🧩 Principe Arsenal :
#   - Action directe autorisée (toggle)
#   - Aucune logique métier
#   - Aucune décision automatique
#
# ⚙️ Comportement :
#   - Tap : bascule ON / OFF
#
# 🎨 Codes couleur :
#   - 🟢 Vert  : prise activée
#   - ⚪ Clair : prise désactivée
#
# 🧪 Robustesse :
#   - Basé uniquement sur l’état réel de la prise
#   - Aucun effet de bord en cas d’indisponibilité
#
#################################################################

prise_template:
  template: socle_toggle_confirme

  tap_action:
    action: toggle
    confirmation:
      text: Basculer la prise ON / OFF ?

  state:
    - value: 'on'
      styles:
        card:
          - background-color: rgba(76, 175, 80, 0.2)

    - value: 'off'
      styles:
        card:
          - background-color: rgba(158, 158, 158, 0.2)

    - operator: template
      value: |
        [[[
          return ['unknown','unavailable','none'].includes(entity?.state);
        ]]]
      styles:
        card:
          - background-color: rgba(224, 224, 224, 0.2)
