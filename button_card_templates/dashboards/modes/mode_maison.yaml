#################################################################
# 🏠 CARTE MODE MAISON — SYNTHÈSE DASHBOARD
# ---------------------------------------------------------------
# Carte de lecture synthétique du mode maison pour dashboard.
#
# Rôle :
#   - Donner une vision immédiate du contexte global
#   - Sans interaction métier directe
#
# Principe Arsenal :
#   - Carte PUREMENT informationnelle
#   - Spécialisée dashboard
#   - Aucune action implicite
#################################################################

carte_mode_maison_synthese:
  template: carte_base

  show_state: true

  tap_action:
    action: more-info

  hold_action:
    action: navigate
    navigation_path: /reglages-dashboard/maison

  styles:
    card:
      - background-color: |
          [[[
            const mode = (entity?.state || '').toLowerCase();
            return mode === 'normal'
              ? 'rgba(76, 175, 80, 0.2)'   // 🟢 Nominal
              : 'rgba(244, 67, 54, 0.2)'; // 🔴 Mode spécial
          ]]]