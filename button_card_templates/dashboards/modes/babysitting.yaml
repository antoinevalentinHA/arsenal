#################################################################
# 👶 CARTE MODE BABYSITTING — SYNTHÈSE DASHBOARD
# ---------------------------------------------------------------
# Carte de commande et de lecture du mode Babysitting
# dédiée aux dashboards de synthèse.
#
# Rôle :
#   - Activer / désactiver le mode Babysitting
#   - Donner un retour visuel immédiat
#   - Accéder aux réglages associés
#
# Principe Arsenal :
#   - Action explicite avec confirmation
#   - Carte spécialisée dashboard
#   - Aucune logique métier
#################################################################

carte_mode_babysitting_synthese:
  template: socle_toggle

  show_state: true

  tap_action:
    action: toggle
    confirmation:
      text: |
        [[[
          return entity.state === 'on'
            ? "Désactiver le mode Babysitting ?"
            : "Activer le mode Babysitting ?";
        ]]]

  hold_action:
    action: navigate
    navigation_path: /reglages-dashboard/maison

  styles:
    card:
      - background-color: |
          [[[
            return entity.state === 'on'
              ? 'rgba(76, 175, 80, 0.2)'
              : 'rgba(158, 158, 158, 0.2)';
          ]]]
