carte_vacances_justification:
  template: carte_base
  show_icon: false
  show_name: true
  show_state: true
  show_label: false

  name: Vacances – Justification

  state_display: |
    [[[ 
      const map = {
        'mode_maison_normal': 'Mode maison ≠ Vacances',
        'presence_famille': 'Présence famille détectée',
        'visite_en_cours': 'Visite en cours',
        'vacances_actives': 'Vacances effectivement actives'
      };
      return map[entity.state] || entity.state;
    ]]]

  tap_action:
    action: none

  styles:
    card:
      - height: 64px
      - border-radius: 12px
      - padding: 8px
      - box-shadow: var(--ha-card-box-shadow)
      - background-color: rgba(33,150,243,0.12)
    name:
      - font-size: 13px
      - font-weight: 500
      - color: '#111'
    state:
      - font-size: 14px
      - font-weight: 500
      - color: '#333'