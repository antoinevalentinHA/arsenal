#################################################################
# ❄️☀️ CARTE CLIM — DIAGNOSTIC TEMPÉRATURE EXTÉRIEURE (HIVER)
#################################################################

carte_clim_diagnostic_temperature_exterieure_hiver:
  template: socle_kpi_label_72

  entity: sensor.temperature_jardin

  label: |
    [[[
      const s = states['input_number.clim_hiver_seuil_temperature_exterieure']
        ? states['input_number.clim_hiver_seuil_temperature_exterieure'].state
        : '—';
      return "Seuil min : " + s;
    ]]]

  styles:
    card:
      - background-color: |
          [[[
            const temp = parseFloat(entity.state);
            const seuil = parseFloat(
              states['input_number.clim_hiver_seuil_temperature_exterieure']?.state || "99"
            );

            if (isNaN(temp) || isNaN(seuil))
              return "rgba(244, 67, 54, 0.2)";

            return temp > seuil
              ? "rgba(76, 175, 80, 0.2)"
              : "rgba(158, 158, 158, 0.2)";
          ]]]