#################################################################
# ❄️ CARTE CLIMATISATION — SYNTHÈSE D’ÉTAT
# ---------------------------------------------------------------
# Carte de lecture consolidée de l’état de la climatisation locale.
#
# Rôle :
#   - Afficher le mode actif
#   - Exposer la consigne appliquée
#   - Fournir une lecture humaine immédiate
#
# Principe Arsenal :
#   - Carte de lecture
#   - Aucune action directe
#   - Aucune décision UI
#   - Restitution fidèle des capteurs métier
#################################################################

carte_clim_synthese:
  template: socle_status_label_xl_interactif

  entity: sensor.clim_mode_local

  tap_action:
    action: navigate
    navigation_path: /clim-dashboard/climatisation

  hold_action:
    action: more-info

  icon: |
    [[[
      const mode = (entity.state || '').toLowerCase();
      if (mode === 'dry')  return 'mdi:water-percent';
      if (mode === 'heat') return 'mdi:fire';
      if (mode === 'off')  return 'mdi:power-standby';
      return 'mdi:snowflake';
    ]]]

  state_display: |
    [[[
      const mode = (entity.state || '').toLowerCase();
      if (mode === 'cool') return 'Actif';
      if (mode === 'dry')  return 'Déshumid.';
      if (mode === 'heat') return 'Chauffage';
      if (mode === 'off')  return 'Veille';
      return mode || 'Inconnu';
    ]]]

  label: |
    [[[
      const consigne = states['sensor.consigne_clim_appliquee_locale']?.state;
      const mode = (entity.state || '').toLowerCase();

      if (mode === 'off') return '';
      if (mode === 'cool')
        return 'Consigne : ' +
          ((!consigne || ['unavailable','unknown'].includes(consigne)) ? '-' : consigne) + '°C';
      if (mode === 'dry')  return 'Déshumidification';
      if (mode === 'heat') return 'Chauffage léger';
      return 'État : ' + (mode || '-');
    ]]]

  state:
    # 🧊 COOL
    - operator: template
      value: |
        [[[
          return (entity.state || '').toLowerCase() === 'cool';
        ]]]
      styles:
        card:
          - background-color: rgba(33, 150, 243, 0.2)

    # ✅ DRY
    - operator: template
      value: |
        [[[
          return (entity.state || '').toLowerCase() === 'dry';
        ]]]
      styles:
        card:
          - background-color: rgba(76,175,80,0.2)

    # 🔥 HEAT
    - operator: template
      value: |
        [[[
          return (entity.state || '').toLowerCase() === 'heat';
        ]]]
      styles:
        card:
          - background-color: rgba(244,67,54,0.2)

    # ⚪ OFF
    - operator: template
      value: |
        [[[
          return (entity.state || '').toLowerCase() === 'off';
        ]]]
      styles:
        card:
          - background-color: rgba(158,158,158,0.2)

    # 💤 Défaut
    - operator: default
      styles:
        card:
          - background-color: rgba(158,158,158,0.2)
