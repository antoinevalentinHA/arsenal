# ==============================================================
# 🧠 TEMPLATE : carte_clim_intention
# --------------------------------------------------------------
# Carte d’intention de la climatisation — UI Arsenal (lecture seule).
#
# 🧠 Rôle :
#   - Afficher la raison logique DOMINANTE
#     du comportement climatique courant
#   - Rendre visible l’intention du système
#
# 🧩 Principe Arsenal :
#   - Le backend décide
#   - La carte reflète uniquement l’intention
#   - Aucune action, aucun recalcul
#
# 📡 Source :
#   - sensor.clim_raison_decision
#
# 🎨 Codes couleur :
#   - 🟢 Vert  : demande active (cool / heat)
#   - ⚪ Gris  : repos / ok
#   - 🔴 Rouge : blocage
# ==============================================================

carte_clim_intention:
  template: carte_base
  show_icon: true
  show_name: true
  show_state: true
  show_label: false

  icon: mdi:brain
  name: Intention clim

  state_display: |
    [[[
      const map = {
        'demande_refroidissement': 'Refroidissement demandé',
        'demande_chauffage': 'Chauffage demandé',
        'blocage_poele': 'Bloquée (poêle)',
        'blocage_horaire': 'Bloquée (horaire)',
        'fenetre_ouverte': 'Bloquée (fenêtre)',
        'ok': 'Repos'
      };
      return map[entity.state] || entity.state;
    ]]]

  state:
    # 🟢 DEMANDE ACTIVE
    - value: demande_refroidissement
      styles:
        card:
          - background-color: rgba(144, 202, 249, 0.25)

    - value: demande_chauffage
      styles:
        card:
          - background-color: rgba(255,152,0,0.2)

    # 🔴 BLOCAGE
    - operator: template
      value: |
        [[[
          return entity.state.startsWith('blocage');
        ]]]
      styles:
        card:
          - background-color: rgba(244,67,54,0.2)

    # ⚪ AUCUNE DEMANDE (repos nominal)
    - value: ok
      styles:
        card:
          - background-color: rgba(158,158,158,0.2)

    # ⚪ PROBLÈME TECHNIQUE / ÉTAT INATTENDU
    - operator: default
      styles:
        card:
          - background-color: rgba(158,158,158,0.2)

  tap_action:
    action: none

  styles:
    card:
      - height: 72px
      - border-radius: 12px
      - padding: 8px
      - box-shadow: var(--ha-card-box-shadow)
    name:
      - font-size: 13px
      - font-weight: 500
      - color: '#111'
    state:
      - font-size: 15px
      - font-weight: 600
      - color: '#111'