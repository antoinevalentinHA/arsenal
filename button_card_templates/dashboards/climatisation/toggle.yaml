#################################################################
# 🔘 Carte — Toggle option climatisation
# ---------------------------------------------------------------
# Bouton générique pour options ON / OFF de la clim.
# Utilisé pour : power, quiet, economy, energy saving, etc.
#################################################################

clim_option_toggle:
  template: carte_base
  show_state: false
  show_label: false
  tap_action:
    action: toggle
  hold_action:
    action: more-info
  styles:
    card:
      - height: 68px
      - border-radius: 12px
      - padding: 8px
      - box-shadow: var(--ha-card-box-shadow)
      - transition: all 0.3s ease
    icon:
      - width: 26px
      - height: 26px
      - color: '#000000'
    name:
      - font-size: 13px
      - font-weight: 500
      - color: '#000000'
  state:
    # ✅ Actif = vert doux
    - value: 'on'
      styles:
        card:
          - background-color: rgba(76, 175, 80, 0.2)
          - transform: scale(1.02)
    # ⚪ Inactif = gris clair
    - value: 'off'
      styles:
        card:
          - background-color: rgba(158, 158, 158, 0.2)
    # ⚠️ Inconnu = gris neutre
    - operator: template
      value: |
        [[[ 
          return ['unknown','unavailable','none'].includes(entity?.state);
        ]]]
      styles:
        card:
          - background-color: rgba(158, 158, 158, 0.2)
          - opacity: 0.6