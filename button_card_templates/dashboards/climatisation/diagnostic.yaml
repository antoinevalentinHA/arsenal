# ==========================================================
# 🧠 ARSENAL — TEMPLATE METIER (UI)
#     clim_synthese_status_72
# ----------------------------------------------------------
# 🎯 ROLE
#   Reproduire le rendu canon socle_status_label_72
#   avec une synthese COOL/HEAT/DRY (statut + couleur).
#
# 🧩 VARIABLES
#   - kind: "cool" | "heat" | "dry"
#   - entity_on:  binary_sensor.*
#   - entity_off: binary_sensor.* (optionnel)
# ==========================================================

clim_synthese_status_72:
  template: socle_status_label_72

  show_state: false
  show_name: true
  show_label: true
  show_icon: true
  color_type: card

  label: |
    [[[
      const st = (id) => states[id]?.state;
      const UNAV = ['unknown','unavailable',undefined,null,'none',''];

      const kind   = variables.kind;
      const id_on  = variables.entity_on;
      const id_off = variables.entity_off;

      const s_on  = st(id_on);
      const s_off = id_off ? st(id_off) : undefined;

      if (UNAV.includes(s_on) || (id_off && UNAV.includes(s_off))) return "Indisponible";

      if (kind === 'dry') {
        return (s_on === 'on') ? "Autorisé" : "Non requis";
      }

      const allumage_ok = (s_on === 'on');
      const maintien_ok = (s_off === 'on');

      if (!maintien_ok) return "Sortie requise";
      return allumage_ok ? "Actif" : "Inactif";
    ]]]

  styles:
    card:
      - background-color: |
          [[[
            const st = (id) => states[id]?.state;
            const UNAV = ['unknown','unavailable',undefined,null,'none',''];

            const kind   = variables.kind;
            const id_on  = variables.entity_on;
            const id_off = variables.entity_off;

            const s_on  = st(id_on);
            const s_off = id_off ? st(id_off) : undefined;

            if (UNAV.includes(s_on) || (id_off && UNAV.includes(s_off)))
              return "rgba(158, 158, 158, 0.1)";

            if (kind === 'dry') {
              return (s_on === 'on')
                ? "rgba(76, 175, 80, 0.2)"
                : "rgba(158, 158, 158, 0.2)";
            }

            const allumage_ok = (s_on === 'on');
            const maintien_ok = (s_off === 'on');

            if (!maintien_ok) return "rgba(244, 67, 54, 0.2)";
            if (allumage_ok)  return "rgba(76, 175, 80, 0.2)";
            return "rgba(158, 158, 158, 0.2)";
          ]]]
