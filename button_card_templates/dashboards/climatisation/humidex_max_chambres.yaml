#################################################################
# 💧 CARTE CLIM — DIAGNOSTIC HUMIDEX MAX CHAMBRES
#################################################################

carte_clim_diagnostic_humidex_max_chambres:
  template: socle_kpi_label_72

  entity: sensor.humidex_max_chambres

  label: |
    [[[
      const s = states['input_number.seuil_humidex_deshumidification']
        ? states['input_number.seuil_humidex_deshumidification'].state
        : '—';
      return "Seuil ON : " + s;
    ]]]

  styles:
    card:
      - background-color: |
          [[[
            const humidex = parseFloat(entity.state);
            const seuil = parseFloat(
              states['input_number.seuil_humidex_deshumidification']?.state || "99"
            );

            if (isNaN(humidex) || isNaN(seuil))
              return "rgba(244, 67, 54, 0.2)";

            return humidex >= seuil
              ? "rgba(76, 175, 80, 0.2)"
              : "rgba(158, 158, 158, 0.2)";
          ]]]