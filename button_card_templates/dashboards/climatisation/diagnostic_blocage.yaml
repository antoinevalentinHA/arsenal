# ==========================================================
# 🧠 ARSENAL — TEMPLATE METIER (UI)
#     clim_blocages_synthese_xl
# ----------------------------------------------------------
# 🎯 ROLE
#   Synthèse XL optimisée :
#   - label only
#   - padding-top léger (structure)
#   - séparateurs compacts (lisibilité)
# ==========================================================

clim_blocages_synthese_xl:
  template: socle_status_label_xl

  show_name: false
  show_state: false
  show_label: true
  show_icon: false

  tap_action:
    action: none
  hold_action:
    action: none
  double_tap_action:
    action: none

  label: |
    [[[
      const st = (id) => states[id]?.state;
      const UNAV = ['unknown','unavailable',undefined,null,'none',''];

      const blocageAuto = st('input_boolean.clim_blocage_horaire_actif');
      const postAeration = st('input_boolean.chauffage_blocage_aeration');
      const hOnRaw = st('input_datetime.clim_heure_blocage_autom_on');
      const hOffRaw = st('input_datetime.clim_heure_blocage_autom_off');

      const finBlocage = st('input_datetime.chauffage_fin_blocage_aeration');
      const reo = st('input_datetime.aeration_reouverture_last');

      const fmt = (v) => {
        if (UNAV.includes(v)) return '—';
        const s = String(v).replace(' ', 'T');
        const dt = new Date(s);
        if (isNaN(dt.getTime())) return '—';
        return dt.toLocaleString('fr-FR', {
          day: '2-digit',
          month: '2-digit',
          hour: '2-digit',
          minute: '2-digit'
        }).replace(',', '');
      };

      if ([blocageAuto, postAeration, hOnRaw, hOffRaw].some(v => UNAV.includes(v))) {
        return "<b>Blocages indéterminés</b><br>" +
               "Données manquantes (unknown/unavailable)";
      }

      const hOn = String(hOnRaw).slice(0,5);
      const hOff = String(hOffRaw).slice(0,5);

      const d = new Date();
      const nowH = String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');

      const inRange = (start, end, t) => {
        if (start < end) return (t >= start && t < end);
        return (t >= start || t < end);
      };

      const blocageHoraire = (blocageAuto === 'on') && inRange(hOn, hOff, nowH);
      const post = (postAeration === 'on');

      if (!blocageHoraire && !post) {
        return "<b>Aucun blocage en cours</b><br>" +
               "Le système est pleinement autorisé à agir.";
      }

      let out = "<b>Blocage(s) actif(s)</b><br>";

      if (blocageHoraire) {
        out += "⏰ Blocage horaire actif<br>";
        out += "Plage : " + hOn + " → " + hOff;
      }

      if (post) {
        if (blocageHoraire) out += "<br>";
        out += "Blocage post-aération actif<br>";
        out += "Fin prévue : " + fmt(finBlocage) + "<br>";
        out += "Dernière réouverture : " + fmt(reo);
      }

      return out;
    ]]]

  styles:
    card:
      - background-color: |
          [[[
            const st = (id) => states[id]?.state;
            const UNAV = ['unknown','unavailable',undefined,null,'none',''];

            const blocageAuto = st('input_boolean.clim_blocage_horaire_actif');
            const postAeration = st('input_boolean.chauffage_blocage_aeration');
            const hOnRaw = st('input_datetime.clim_heure_blocage_autom_on');
            const hOffRaw = st('input_datetime.clim_heure_blocage_autom_off');

            if ([blocageAuto, postAeration, hOnRaw, hOffRaw].some(v => UNAV.includes(v)))
              return 'rgba(158, 158, 158, 0.1)';

            const hOn = String(hOnRaw).slice(0,5);
            const hOff = String(hOffRaw).slice(0,5);

            const d = new Date();
            const nowH = String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');

            const inRange = (start, end, t) => {
              if (start < end) return (t >= start && t < end);
              return (t >= start || t < end);
            };

            const blocageHoraire = (blocageAuto === 'on') && inRange(hOn, hOff, nowH);
            const post = (postAeration === 'on');

            if (!blocageHoraire && !post) return 'rgba(76, 175, 80, 0.2)';
            return 'rgba(244, 67, 54, 0.2)';
          ]]]

    label:
      - white-space: normal
      - line-height: 17px
      - padding-top: 6px