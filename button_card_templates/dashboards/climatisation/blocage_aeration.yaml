#################################################################
# 🔒🔥 DIAGNOSTIC — BLOCAGE CHAUFFAGE POST-AÉRATION
#################################################################

carte_diagnostic_chauffage_blocage_aeration:
  template: socle_status_label_72

  entity: input_boolean.chauffage_blocage_aeration

  show_state: false
  show_name: true
  show_label: true
  show_icon: true
  color_type: card

  icon: mdi:lock-alert

  label: |
    [[[
      return entity.state === "on"
        ? "Actif"
        : "Inactif";
    ]]]

  styles:
    card:
      - background-color: |
          [[[
            return entity.state === "on"
              ? "rgba(244, 67, 54, 0.2)"
              : "rgba(76, 175, 80, 0.2)";
          ]]]