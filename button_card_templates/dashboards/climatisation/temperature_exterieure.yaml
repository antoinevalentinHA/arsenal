#################################################################
# 🌡️ CARTE CLIM — DIAGNOSTIC TEMPÉRATURE EXTÉRIEURE
# ---------------------------------------------------------------
# Indique si la température extérieure autorise le fonctionnement
# de la climatisation, en fonction d’un seuil configuré.
#
# Principe Arsenal :
#   - Carte de diagnostic
#   - Lecture seule
#   - Aucune action directe
#   - Décision portée par les capteurs
#################################################################

carte_clim_diagnostic_temperature_exterieure:
  template: carte_base

  entity: sensor.temperature_jardin

  show_state: true
  show_name: true
  show_label: true
  show_icon: false
  color_type: card

  label: |
    [[[
      const seuil = states['input_number.clim_seuil_temperature_exterieure_minimum']?.state || '—';
      return "Seuil ON : " + seuil;
    ]]]

  styles:
    card:
      - background-color: |
          [[[
            const toNumber = (v) =>
              parseFloat(String(v).replace(',', '.').replace(/[^\d.-]/g, ''));

            const temp = toNumber(entity.state);
            const seuilState = states['input_number.clim_seuil_temperature_exterieure_minimum']?.state;
            const seuil = toNumber(seuilState);

            if (isNaN(temp) || isNaN(seuil))
              return "rgba(244, 67, 54, 0.2)";   // 🔴 incohérence / indéterminé

            return temp >= seuil
              ? "rgba(76, 175, 80, 0.2)"        // 🟢 autorisé
              : "rgba(158, 158, 158, 0.2)";     // ⚪ non autorisé
          ]]]
    name:
      - font-size: 13px
      - font-weight: 500
      - color: '#111'
    state:
      - font-size: 18px
      - font-weight: bold
      - color: '#111'
    label:
      - font-size: 13px
      - color: '#111'