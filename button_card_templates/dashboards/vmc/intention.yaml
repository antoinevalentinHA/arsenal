# ==========================================================
# 🧠 ARSENAL — BUTTON-CARD TEMPLATE :
#     VMC – Carte d’intention
# ----------------------------------------------------------
# 🎯 RÔLE
#
#   Afficher l’intention métier de la VMC ainsi que
#   la cause principale ayant conduit à cette intention.
#
# 🧱 PRINCIPE
#
#   - Carte de LECTURE uniquement
#   - Aucune logique métier
#   - Cause affichée via l’attribut `cause`
#
# 🧠 SOURCE
#
#   - sensor.vmc_intention
#
# ==========================================================

carte_vmc_intention:
  template: socle_status_label

  show_icon: false

  name: Intention VMC

  state_display: |
    [[[
      return entity.state;
    ]]]

  label: |
    [[[
      return entity.attributes.cause || '';
    ]]]

  state:
    - value: Extraction utile demandée
      styles:
        card:
          - background-color: rgba(76, 175, 80, 0.2)

    - value: Fonctionnement nominal demandé
      styles:
        card:
          - background-color: rgba(158,158,158,0.2)

    - operator: default
      styles:
        card:
          - background-color: rgba(158,158,158,0.2)

  styles:
    label:
      - color: '#444'
