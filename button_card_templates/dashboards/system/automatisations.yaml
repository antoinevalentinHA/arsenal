#################################################################
# 🤖 AUTOMATISATIONS — SUPERVISION UI
#################################################################

carte_compteur_alerte:
  template: socle_status_state_bottom_72

  show_icon: true
  show_name: true
  show_state: true
  show_label: false

  icon: mdi:robot
  name: Automat.

  styles:
    card:
      - background-color: |
          [[[
            const v = Number(entity?.state);
            if (isNaN(v)) return 'rgba(158,158,158,0.2)';     // inconnu
            return v === 0
              ? 'rgba(76,175,80,0.2)'                         // 🟢 Normal
              : 'rgba(244,67,54,0.2)';                        // 🔴 Incident
          ]]]
    state:
      - color: |
          [[[
            const v = Number(entity?.state);
            if (isNaN(v)) return '#616161';
            return v === 0 ? '#111' : '#b71c1c';
          ]]]

  state_display: |
    [[[
      const v = Number(entity?.state);
      if (isNaN(v)) return '—';
      return v === 0 ? 'Normal' : 'Incident';
    ]]]