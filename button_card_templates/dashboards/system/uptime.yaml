#################################################################
# ⏱️ CARTE UPTIME SYSTÈME — UI
# ---------------------------------------------------------------
# Affiche l’uptime Home Assistant avec interprétation visuelle
# de la stabilité système.
#
# Principe Arsenal :
#   - Carte d’information interprétée
#   - Aucune logique métier
#   - Lecture immédiate de la stabilité HA
#################################################################

carte_uptime_systeme:
  template: socle_status_72

  show_icon: true
  show_name: true
  show_state: true
  show_label: false

  styles:
    card:
      - background-color: |
          [[[
            const rawState = states["sensor.uptime_jours"]?.state;

            // Gris indispo canon (unknown/unavailable/absent/NaN)
            if (
              rawState === undefined ||
              rawState === null ||
              rawState === "unknown" ||
              rawState === "unavailable"
            ) {
              return "rgba(224, 224, 224, 0.2)";
            }

            const jours = parseFloat(rawState);
            if (isNaN(jours)) return "rgba(224, 224, 224, 0.2)";

            // Gris neutre OFF/Repos canon
            if (jours < 1) return "rgba(158, 158, 158, 0.2)";

            // Bleu info canon
            if (jours < 3) return "rgba(33, 150, 243, 0.2)";

            // Vert OK canon
            return "rgba(76, 175, 80, 0.2)";
          ]]]
