#################################################################
# 🌐 CARTE ÉTAT INTERNET — UI
#################################################################

carte_etat_internet:
  template: socle_status_72

  show_icon: true
  show_name: true
  show_state: true
  show_label: false

  tap_action:
    action: more-info

  hold_action:
    action: call-service
    service: script.redemarrer_box
    confirmation:
      text: Es-tu sûr de vouloir redémarrer la box internet ?

  styles:
    card:
      - background-color: |
          [[[
            const s = entity?.state;
            if (s === "on")  return "rgba(76, 175, 80, 0.2)";   // 🟢 Internet OK
            if (s === "off") return "rgba(244, 67, 54, 0.2)";   // 🔴 Internet KO
            return "rgba(158, 158, 158, 0.2)";                  // ⚪ état inconnu
          ]]]