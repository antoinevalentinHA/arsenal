  label: >
    [[[
      return "Incohérences possibles : stabiliser avant toute analyse.";
    ]]]

  tap_action:
    action: more-info

  state:
    - value: "off"
      styles:
        card:
          - background-color: rgba(244, 67, 54, 0.2)