#################################################################
# 🌐 INTÉGRATIONS CRITIQUES — SUPERVISION UI
#################################################################
#
# 🧠 Rôle :
#   Templates button-card dédiés à la surveillance des
#   intégrations critiques de Home Assistant.
#
# 🎯 Objectifs :
#   - Détecter rapidement les intégrations défaillantes
#   - Visualiser l’état réel ou l’ancienneté des données
#   - Offrir une action manuelle de récupération
#
# 🧩 Principe Arsenal :
#   - Aucune logique métier
#   - Aucune décision automatique
#   - Supervision humaine uniquement
#
# ⚙️ Logique d’affichage :
#   - Intégrations binaires :
#       • ON  → OK
#       • OFF → erreur
#   - Intégrations numériques :
#       • valeur < seuil → OK
#       • valeur ≥ seuil → erreur
#   - États inconnus → neutre / alerte visuelle
#
# 🧪 Seuils UI (indicatifs, non bloquants) :
#   - Netatmo     : 60 min
#   - ViCare      : 300 min
#   - Fujitsu     : 420 min
#   - SwitchBot  : 60 min
#   - Synology   : 360 min
#   - Audi       : 2880 min
#   - Cumulus    : 360 min
#
# 🎨 Codes couleur :
#   - 🟢 Vert  : intégration fonctionnelle
#   - 🔴 Rouge : intégration défaillante ou données obsolètes
#   - ⚪ Gris  : état inconnu / indisponible
#
# 🚫 Ne fait PAS :
#   - Aucun redémarrage automatique
#   - Aucun rechargement implicite
#
#################################################################

carte_integration_critique:
  template: carte_base_v2
  color_type: card

  show_icon: true
  show_name: true
  show_state: true
  show_label: false

  variables:
    action_service: null
    action_data: {}
    confirmation_text: "Confirmer l’action ?"
    seuil_minutes: null

  tap_action:
    action: |
      [[[
        return variables?.action_service ? "call-service" : "none";
      ]]]
    service: |
      [[[
        return variables?.action_service || "";
      ]]]
    service_data: |
      [[[
        return variables?.action_data || {};
      ]]]
    confirmation:
      text: |
        [[[
          return variables?.confirmation_text || "Confirmer l’action ?";
        ]]]

  hold_action:
    action: more-info

  double_tap_action:
    action: none

  styles:
    card:
      - background-color: |
          [[[
            const s = entity?.state ?? "unknown";

            // Seuil (minutes) : paramétrable par carte (fallback 180)
            const seuil = Number.isFinite(parseFloat(variables?.seuil_minutes))
              ? parseFloat(variables.seuil_minutes)
              : 180;

            // Cas indispo
            if (s === "unknown" || s === "unavailable" || s === null || s === undefined) {
              return "rgba(158, 158, 158, 0.1)";
            }

            // Cas binaire
            if (s === "on")  return "rgba(76, 175, 80, 0.2)";
            if (s === "off") return "rgba(244, 67, 54, 0.2)";

            // Cas numérique (âge)
            const val = parseFloat(s);
            if (!isNaN(val)) {
              return val < seuil
                ? "rgba(76, 175, 80, 0.2)"
                : "rgba(244, 67, 54, 0.2)";
            }

            // Fallback
            return "rgba(224, 224, 224, 0.2)";
          ]]]

  state_display: |
    [[[
      const s = entity?.state ?? "unknown";
      const val = parseFloat(s);

      if (s === "on") return "OK";
      if (s === "off") return "OFF";
      if (!isNaN(val)) return `${val.toFixed(0)} min`;
      return "—";
    ]]]
