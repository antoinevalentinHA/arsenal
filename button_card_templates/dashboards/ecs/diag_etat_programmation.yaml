# ==========================================================
# 🧠 ARSENAL — TEMPLATE METIER (UI)
#     ecs_chauffe_planifiee_status
# ----------------------------------------------------------
# 🎯 ROLE
#   Restituer l'état "chauffe planifiée ECS" sous forme
#   de tuile button-card (remplace markdown).
#
# 🧩 ENTITE
#   input_boolean.ecs_blocage_planifiee
#
# 🧠 SEMANTIQUE
#   - ON  => blocage planifié actif (planning ECS désactivé)
#   - OFF => chauffe planifiée active (planning ECS normal)
#
# 🎨 COULEURS (palette canon)
#   - Vert OK  : rgba(76, 175, 80, 0.2)
#   - Rouge KO : rgba(244, 67, 54, 0.2)
#   - Gris indispo : rgba(158, 158, 158, 0.1)
# ==========================================================

ecs_chauffe_planifiee_status:
  template: socle_status_label

  entity: input_boolean.ecs_blocage_planifiee

  show_icon: true
  show_name: false
  show_state: false
  show_label: true

  icon: |
    [[[
      const st = entity?.state;
      const UNAV = ['unknown','unavailable',undefined,null,'none',''];
      if (UNAV.includes(st)) return 'mdi:help-circle-outline';
      return (st === 'on')
        ? 'mdi:calendar-remove'
        : 'mdi:calendar-check';
    ]]]

  state_display: |
    [[[
      const st = entity?.state;
      const UNAV = ['unknown','unavailable',undefined,null,'none',''];
      if (UNAV.includes(st)) return "ECS";
      return (st === 'on')
        ? "Blocage chauffe planifiée actif"
        : "Chauffe planifiée active";
    ]]]

  label: |
    [[[
      const st = entity?.state;
      const UNAV = ['unknown','unavailable',undefined,null,'none',''];
      if (UNAV.includes(st)) return "État indisponible";
      return (st === 'on')
        ? "La programmation ECS est temporairement désactivée"
        : "La programmation ECS suit son planning normal";
    ]]]

  styles:
    card:
      - background-color: |
          [[[
            const st = entity?.state;
            const UNAV = ['unknown','unavailable',undefined,null,'none',''];
            if (UNAV.includes(st)) return 'rgba(158, 158, 158, 0.1)';
            return (st === 'on')
              ? 'rgba(244, 67, 54, 0.2)'
              : 'rgba(76, 175, 80, 0.2)';
          ]]]