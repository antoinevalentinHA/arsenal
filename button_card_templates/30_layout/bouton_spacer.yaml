# ==========================================================
# 🧠 ARSENAL — ÉLÉMENT UI
#     Layout — Spacer
#
# 🧩 NATURE : layout
# ==========================================================
#
# 🎯 RÔLE
#   Crée un espace vide dans une grille ou un alignement
#   de cartes.
#
# ⚙️ COMPORTEMENT
#   - aucune entité
#   - aucun affichage (name masqué)
#   - aucune interaction
#   - dimensions fixes (42x42)
#   - aucun style visuel (fond transparent, sans ombre)
#
# 📐 USAGE
#   - utilisé pour ajuster l’alignement et l’espacement
#   - ne doit jamais porter d’information
#   - ne doit jamais être interactif
# ==========================================================

bouton_spacer:
  entity: none
  show_name: false
  styles:
    card:
      - height: 42px
      - width: 42px
      - box-shadow: none
      - background: none
      - border-radius: 0
      - padding: 0
      - margin: 0