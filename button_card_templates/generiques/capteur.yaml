carte_capteur:
  template: carte_base
  show_state: true
  styles:
    card:
      - border-radius: 12px
      - height: 72px
      - padding: 8px
      - box-shadow: var(--ha-card-box-shadow)
      - background-color: |
          [[[
            const map = {
              blue:   "rgba(144, 202, 249, 0.25)",  // 🔵 info / froid
              green:  "rgba(76, 175, 80, 0.2)",     // 🟢 OK
              yellow: "rgba(255, 193, 7, 0.25)",    // 🟡 attention
              orange: "rgba(255, 152, 0, 0.25)",    // 🟠 avertissement
              red:    "rgba(244, 67, 54, 0.2)",     // 🔴 alerte
              grey:   "rgba(158, 158, 158, 0.2)"    // ⚪ neutre
            };

            if (!entity || !entity.entity_id) return map.grey;

            const colorEntity =
              entity.entity_id.replace(/^sensor\.(.*)/, "sensor.couleur_$1");

            const key = states[colorEntity]?.state || "grey";

            return map[key] || map.grey;
          ]]]
    state:
      - font-size: 18px
      - font-weight: bold
      - color: '#111'
    name:
      - font-size: 13px
      - font-weight: 500
      - color: '#444'
    label:
      - font-size: 13px
      - color: '#111'