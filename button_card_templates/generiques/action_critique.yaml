#################################################################
# 🚨 CARTE ACTION CRITIQUE — UI
# ---------------------------------------------------------------
# Carte d’action manuelle sensible (redémarrage, arrêt, reset…)
#
# Rôle :
#   - Exécuter une action critique
#   - Imposer une confirmation utilisateur
#
# Principe Arsenal :
#   - Action explicite
#   - Aucun état affiché
#   - Couleur rouge systématique
#################################################################

carte_action_critique:
  template: carte_base

  show_state: false
  show_icon: true

  tap_action:
    action: call-service
    service: button.press
    confirmation:
      text: >
        [[[
          return variables?.confirmation
            || "Confirmer l’exécution de cette action ?";
        ]]]
    service_data:
      entity_id: '[[[ return entity.entity_id ]]]'

  styles:
    card:
      - background-color: rgba(244, 67, 54, 0.2)   # 🔴 critique
    name:
      - font-size: 13px
      - font-weight: 500
      - color: '#111'
    icon:
      - color: '#111'