#################################################################
# ⏳ CARTE AERATION — BLOCAGE (TIMER ACTIF)
#################################################################

carte_aeration_blocage_timer:
  template: socle_status_72

  show_icon: true
  show_name: true
  show_state: true
  show_label: false

  styles:
    card:
      - background-color: rgba(255, 152, 0, 0.2)

  state:
    - operator: template
      value: >
        [[[
          return entity.state === "active";
        ]]]
      styles:
        card:
          - background-color: rgba(255, 152, 0, 0.2)

    - operator: template
      value: >
        [[[
          return entity.state === "unknown" || entity.state === "unavailable";
        ]]]
      styles:
        card:
          - background-color: rgba(158, 158, 158, 0.1)


