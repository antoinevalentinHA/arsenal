#################################################################
# 🔁 CARTE ACTION ECS — BOUCLAGE
#################################################################

carte_action_ecs_bouclage:
  template: socle_action_label_compact

  show_icon: true
  show_state: false
  show_name: true
  show_label: true

  icon: mdi:water-boiler

  label: |
    [[[
      const etat = states['switch.prise_bouclage']?.state;
      return (etat === 'on') ? 'Actif' : 'Veille';
    ]]]

  tap_action:
    action: call-service
    service: script.bouclage_ecs_5_minutes
    confirmation:
      text: Lancer le bouclage ECS pour 5 minutes ?

  hold_action:
    action: none
  double_tap_action:
    action: none

  triggers_update:
    - switch.prise_bouclage

  styles:
    card:
      - background-color: |
          [[[
            const etat = states['switch.prise_bouclage']?.state;
            return etat === 'on'
              ? 'rgba(76, 175, 80, 0.2)'
              : 'rgba(158, 158, 158, 0.2)';
          ]]]

#################################################################
# ⏳ CARTE ECS — BOUCLAGE (TIMER EN COURS)
#################################################################

carte_ecs_bouclage_timer:
  template: socle_status_72

  show_icon: true
  show_name: true
  show_state: true
  show_label: false

  icon: mdi:water-boiler

  styles:
    card:
      - background-color: rgba(158, 158, 158, 0.2)

  state:
    # 🟢 Actif (timer active)
    - operator: template
      value: >
        [[[
          return entity.state === "active";
        ]]]
      styles:
        card:
          - background-color: rgba(76, 175, 80, 0.2)

    # ⚪ Indisponible (charte Arsenal)
    - operator: template
      value: >
        [[[
          return entity.state === "unknown" || entity.state === "unavailable";
        ]]]
      styles:
        card:
          - background-color: rgba(224, 224, 224, 0.2)
