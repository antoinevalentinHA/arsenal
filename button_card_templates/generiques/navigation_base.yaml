#################################################################
# 🧭 NAVIGATION — BOUTONS DE BASE
# ---------------------------------------------------------------
# Boutons iconiques utilisés pour la navigation entre vues,
# dashboards ou sections (via tap_action externe).
#################################################################

bouton_navigation_base:
  entity: none
  show_name: false
  styles:
    card:
      - height: 42px
      - width: 42px
      - box-shadow: var(--ha-card-box-shadow)
      - background-color: rgba(0, 0, 0, 0)
      - display: flex
      - align-items: center
      - justify-content: center
      - padding: 0
      - margin: 0
    icon:
      - color: "#111"
      - width: 22px
      - height: 22px