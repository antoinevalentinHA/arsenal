#################################################################
# ⚙️ CARTE ACTION STANDARD — UI
#################################################################

carte_action_standard:
  template: socle_action_simple

  tap_action:
    action: call-service
    service: >
      [[[
        return variables?.service || null;
      ]]]
    data: >
      [[[
        return variables?.data || { entity_id: entity.entity_id };
      ]]]
    confirmation:
      text: >
        [[[
          return variables?.confirmation
            || "Confirmer l’exécution de cette action ?";
        ]]]