#################################################################
# 🚨 CARTE ALERTE BINAIRE CRITIQUE — UI
# ---------------------------------------------------------------
# Affiche une alerte basée sur un binary_sensor critique.
#
# États :
#   - ON  → 🔴 Alerte active
#   - OFF → 🟢 OK
#   - autre → ⚪ Indéterminé
#
# Principe Arsenal :
#   - Carte d’alerte pure
#   - Lecture immédiate
#   - Aucun pilotage
#   - Réutilisable (NAS, secteur, disques, sécurité, etc.)
#################################################################

carte_alerte_binaire_critique:
  template: carte_base

  show_state: true

  tap_action:
    action: more-info

  styles:
    card:
      - background-color: |
          [[[
            if (entity.state === 'on')
              return 'rgba(244, 67, 54, 0.2)';   // 🔴 alerte

            if (entity.state === 'off')
              return 'rgba(76, 175, 80, 0.2)';   // 🟢 ok

            return 'rgba(158, 158, 158, 0.1)';   // ⚪ inconnu
          ]]]

    name:
      - font-size: 13px
      - font-weight: 500
      - color: '#111'

    state:
      - font-size: 14px
      - font-weight: 400
      - color: '#111'

    icon:
      - color: '#111'