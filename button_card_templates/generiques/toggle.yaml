#################################################################
# 🔘 CARTES TOGGLE
# ---------------------------------------------------------------
# Cartes de commande simples ON / OFF.
# Interaction directe autorisée (toggle + more-info).
#################################################################

carte_toggle:
  show_icon: true
  show_state: true
  show_name: true
  color_type: card

  tap_action:
    action: toggle
  hold_action:
    action: more-info

  state:
    - value: 'on'
      color: rgba(76, 175, 80, 0.2)
    - value: 'off'
      color: rgba(158, 158, 158, 0.2)

  styles:
    card:
      - border-radius: 12px
      - height: 72px
      - padding: 8px
      - box-shadow: var(--ha-card-box-shadow)
    icon:
      - width: 26px
      - height: 26px
      - color: '#111'
    name:
      - font-size: 13px
      - font-weight: 500
      - color: '#111'
      - justify-self: center
      - text-align: center
    state:
      - font-size: 13px
      - font-weight: 400
      - color: '#111'
      - justify-self: center
      - text-align: center