#################################################################
# 🌙 CARTE COMPTEUR — SEUILS VARIABLES
# ---------------------------------------------------------------
# Affiche un compteur (entier) avec code couleur paramétrable.
#
# Variables attendues :
#   - seuil_1 : valeur normale (vert)
#   - seuil_2 : vigilance (jaune)
#   - seuil_3 : alerte (orange)
#   - seuil_4 : critique (rouge)
#
# Principe Arsenal :
#   - Carte purement informationnelle
#   - Seuils définis par le contexte (enfant, usage)
#   - Aucune logique métier
#################################################################

carte_compteur_seuils_variables:
  template: carte_base

  show_state: true

  tap_action:
    action: none
  hold_action:
    action: none
  double_tap_action:
    action: none

  state_display: |
    [[[
      const v = parseInt(entity.state);
      return isNaN(v) ? '—' : v;
    ]]]

  styles:
    card:
      - height: 72px
      - background-color: |
          [[[
            const v = parseInt(entity.state);

            const s1 = variables?.seuil_1;
            const s2 = variables?.seuil_2;
            const s3 = variables?.seuil_3;
            const s4 = variables?.seuil_4;

            if (isNaN(v)) return 'rgba(224,224,224,0.2)';
            if (s4 !== undefined && v >= s4) return 'rgba(244, 67, 54, 0.2)';   // 🔴 critique
            if (s3 !== undefined && v >= s3) return 'rgba(255, 152, 0, 0.2)';   // 🟠 alerte
            if (s2 !== undefined && v >= s2) return 'rgba(255, 235, 59, 0.2)';  // 🟡 vigilance
            return 'rgba(76, 175, 80, 0.2)';                                     // 🟢 normal
          ]]]

    name:
      - font-size: 13px
      - font-weight: 500
      - color: '#111'

    state:
      - font-size: 18px
      - font-weight: bold
      - color: '#111'

    icon:
      - width: 26px
      - height: 26px
      - color: '#111'