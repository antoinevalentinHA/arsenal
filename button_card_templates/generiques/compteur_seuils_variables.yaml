#################################################################
# 🌙 CARTE COMPTEUR — SEUILS VARIABLES
#################################################################

carte_compteur_seuils_variables:
  template: socle_diagnostic

  show_state: true

  tap_action:
    action: none
  hold_action:
    action: none
  double_tap_action:
    action: none

  state_display: |
    [[[
      const v = parseInt(entity.state);
      return isNaN(v) ? '—' : v;
    ]]]

  styles:
    card:
      - background-color: |
          [[[
            const v = parseInt(entity.state);

            const s1 = variables?.seuil_1;
            const s2 = variables?.seuil_2;
            const s3 = variables?.seuil_3;
            const s4 = variables?.seuil_4;

            // ⚪ Indisponible (charte)
            if (isNaN(v)) return 'rgba(158, 158, 158, 0.1)';

            // 🔴 Critique
            if (s4 !== undefined && v >= s4) return 'rgba(244, 67, 54, 0.2)';

            // 🟠 Alerte
            if (s3 !== undefined && v >= s3) return 'rgba(255, 152, 0, 0.2)';

            // 🟡 Vigilance (conservé volontairement)
            if (s2 !== undefined && v >= s2) return 'rgba(255, 235, 59, 0.2)';

            // 🟢 Normal
            return 'rgba(76, 175, 80, 0.2)';
          ]]]