# ==========================================================
# 🧠 ARSENAL — SOCLE KPI + LABEL (72)
#     socle_kpi_label_72
# ----------------------------------------------------------
# KPI compact :
# - height 72px
# - icon 26px
# - name 13/500
# - state 18/700
# - label 13/400
# - textes noirs (pilotables ici)
# ==========================================================

socle_kpi_label_72_sans_icone:
  template: carte_base_v2

  show_icon: false
  show_name: true
  show_state: true
  show_label: true
  color_type: card

  tap_action:
    action: none
  hold_action:
    action: none
  double_tap_action:
    action: none

  styles:
    card:
      - height: 72px

    icon:
      - width: 26px
      - height: 26px
      - color: '#111'

    name:
      - font-size: 13px
      - font-weight: 500
      - color: '#111'

    state:
      - font-size: 18px
      - font-weight: 700
      - color: '#111'

    label:
      - font-size: 13px
      - font-weight: 400
      - color: '#111'