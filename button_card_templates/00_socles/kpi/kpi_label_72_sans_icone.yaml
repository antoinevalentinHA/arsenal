# ==========================================================
# 🧠 ARSENAL — SOCLE KPI + LABEL / SANS ICÔNE 
#     socle_kpi_label
# ----------------------------------------------------------
# 🎯 RÔLE
#   KPI (state 18/700) + label (ligne 2) sans logique métier.
#   Hérite de la couleur observée (socle_kpi).
