# ==========================================================
# 🧠 ARSENAL — SOCLE UI
#     Status — Label XL avec icône, interactif (80px)
#
# 🧩 NATURE : socle
# 🧱 TYPE UI : pure
# ==========================================================
#
# 🎯 RÔLE
#   Variante interactive de socle_status_label_xl.
#   Active l'accès au détail de l'entité par tap.
#
# ⚙️ COMPORTEMENT
#   - hérite de socle_status_label_xl
#   - tap → more-info
#
# 📡 SOURCE
#   - entity de la carte dérivée
#
# 📐 USAGE
#   - destiné aux cartes nécessitant un accès rapide au détail
#   - ne doit pas embarquer de logique métier locale
# ==========================================================

socle_status_label_xl_interactif:
  template: socle_status_label_xl

  tap_action:
    action: more-info
  hold_action:
    action: none
  double_tap_action:
    action: none