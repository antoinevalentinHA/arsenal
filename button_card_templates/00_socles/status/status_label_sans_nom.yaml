# ==========================================================
# 🧠 ARSENAL — SOCLE STATUS + LABEL / SANS NOM
#     socle_status_label  (TPL-05 variante)
# ----------------------------------------------------------
# 🎯 RÔLE
#   Tuile de statut enrichie :
#   - state + label
#   - label typographié et discret
#   - non interactive par défaut
#
# 🚫 INTERDIT
#   - aucune logique métier
#   - pas de background-color dynamique
# ==========================================================

socle_status_label_sans_nom:
  template: carte_base_v2

  show_icon: true
  show_name: false
  show_state: true
  show_label: true
  color_type: card

  tap_action:
    action: none
  hold_action:
    action: none
  double_tap_action:
    action: none

  styles:
    name:
      - color: '#111'

    state:
      - font-size: 15px
      - font-weight: 600
      - color: '#111'

    label:
      - font-size: 12px
      - font-weight: 400
      - color: '#111'
      - opacity: 0.85
