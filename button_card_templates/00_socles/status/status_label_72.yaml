# ==========================================================
# 🧱 ARSENAL — SOCLE STATUS + LABEL (72)
#     socle_status_label_72
# ----------------------------------------------------------
# 🎯 RÔLE
#   Carte diagnostic compacte (72px) :
#   - icon + name + label
#   - lecture seule
#   - textes noirs strict (#111)
# ==========================================================

socle_status_label_72:
  template: carte_base_v2

  show_icon: true
  show_name: true
  show_state: false
  show_label: true
  color_type: card

  tap_action:
    action: none
  hold_action:
    action: none
  double_tap_action:
    action: none

  styles:
    card:
      - height: 72px

    icon:
      - width: 26px
      - height: 26px
      - color: '#111'

    name:
      - font-size: 13px
      - font-weight: 500
      - color: '#111'

    label:
      - font-size: 13px
      - font-weight: 400
      - color: '#111'