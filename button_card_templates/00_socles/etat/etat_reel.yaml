# ==========================================================
# 🧠 ARSENAL — SOCLE ETAT REEL (V1)
#     socle_etat_reel
# ----------------------------------------------------------
# RÔLE
#   Carte standard "état réel" équipement :
#   - icon + name + state
#   - label optionnel (2e ligne)
#   - typo/metrics strictement uniformisées
# ==========================================================

socle_etat_reel:
  template: carte_base_v2

  show_icon: true
  show_name: true
  show_state: true
  show_label: false
  color_type: card

  tap_action:
    action: more-info
  hold_action:
    action: none
  double_tap_action:
    action: none

  styles:
    name:
      - color: '#111'

    state:
      - font-size: 14px
      - font-weight: 400
      - color: '#111'

    label:
      - font-size: 12px
      - font-weight: 400
      - color: '#111'
      - opacity: 0.85
