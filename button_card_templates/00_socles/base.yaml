# ==========================================================
# 🧠 ARSENAL — SOCLE UI (V1)
#     carte_base_v2
# ----------------------------------------------------------
# 🎯 RÔLE
#   Socle UI canonique (typo + métriques) pour les templates
#   button-card Arsenal.
#
# 🧩 PÉRIMÈTRE
#   - Géométrie : height / padding / radius / shadow
#   - Typo : icon / name / state / label
#   - Actions UI sûres par défaut
#
# 🚫 INTERDIT
#   - Aucune logique métier (seuils, mapping état, couleurs)
#   - Aucun background-color dynamique
# ==========================================================

carte_base_v2:
  color_type: card

  tap_action:
    action: more-info
  hold_action:
    action: none
  double_tap_action:
    action: none

  styles:
    card:
      - border-radius: 12px
      - height: 72px
      - padding: 8px
      - box-shadow: var(--ha-card-box-shadow)

    icon:
      - width: 26px
      - height: 26px
      - color: '#111'

    name:
      - font-size: 13px
      - font-weight: 500
      - color: '#111'

    state:
      - font-size: 14px
      - font-weight: 400
      - color: '#111'

    label:
      - font-size: 12px
      - font-weight: 400
      - color: '#111'
      - opacity: 0.85