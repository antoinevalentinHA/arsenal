socle_header_base:
  show_icon: false
  show_name: true
  show_state: false
  show_label: false

  tap_action:
    action: none
  hold_action:
    action: none
  double_tap_action:
    action: none

  styles:
    card:
      - background: none
      - box-shadow: none
    name:
      - color: var(--primary-text-color)
      - text-align: left