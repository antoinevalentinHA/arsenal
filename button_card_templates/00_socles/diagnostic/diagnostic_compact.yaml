# ==========================================================
# 🧠 ARSENAL — SOCLE DIAGNOSTIC COMPACT (72px)
#     socle_diagnostic_compact
# ----------------------------------------------------------
# 🎯 RÔLE
#   Socle 72px pour cartes capteurs avec label :
#   - name + state + label
#   - typo capteur : state 16/700, label 13/400
#
# 🧩 PÉRIMÈTRE
#   - UI uniquement (typo/métriques)
#   - Ne fixe pas les actions (la carte appelante peut surcharger)
# ==========================================================

socle_diagnostic_compact:
  template: carte_base_v2

  show_icon: true
  show_name: true
  show_state: true
  show_label: true

  styles:
    state:
      - font-size: 16px
      - font-weight: 700

    label:
      - font-size: 13px
      - font-weight: 400