# ==========================================================
# 🧠 ARSENAL — SOCLE UI
#     Action — Label Compact (72px)
#
# 🧩 NATURE : socle
# 🧱 TYPE UI : action
# ==========================================================
#
# 🎯 RÔLE
#   Fournit un socle compact (72px) pour cartes d’action
#   avec retour d’information via le label.
#
# ⚙️ COMPORTEMENT
#   - affiche : icon + name + label
#   - label lisible (14px, font-weight 400, line-height 1.3)
#   - état masqué
#
# 📐 USAGE
#   - destiné aux cartes d’action avec feedback texte
#   - l’action (tap/hold) doit être définie par la carte métier
#   - peut être utilisé directement si l’action est explicitement définie
# ==========================================================

socle_action_label_compact:
  template: carte_base_v2

  show_icon: true
  show_name: true
  show_state: false
  show_label: true

  styles:
    label:
      - font-size: 14px
      - font-weight: 400
      - color: '#111'
      - line-height: 1.3
