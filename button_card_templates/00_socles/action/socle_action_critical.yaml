# ==========================================================
# 🧠 ARSENAL — SOCLE UI
#     Action — Critical
#
# 🧩 NATURE : socle
# 🧱 TYPE UI : action
# ==========================================================
#
# 🎯 RÔLE
#   Fournit un socle visuel sécurisé pour les actions critiques.
#   Aucune interaction n’est active par défaut.
#
# ⚙️ COMPORTEMENT
#   - tap/hold/double_tap désactivés
#   - fond neutre (gris OFF)
#   - nom visible, état masqué
#
# 📐 USAGE
#   - doit être dérivé par une carte métier
#   - l’action doit être explicitement définie en surcharge
#   - ne doit jamais être utilisé directement
# ==========================================================

socle_action_critical:
  template: carte_base_v2

  show_icon: true
  show_name: true
  show_state: false
  show_label: false
  color_type: card

  tap_action:
    action: none
  hold_action:
    action: none
  double_tap_action:
    action: none

  styles:
    card:
      - background-color: rgba(158, 158, 158, 0.2)
    name:
      - font-weight: 600