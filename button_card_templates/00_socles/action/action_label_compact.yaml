# ==========================================================
# 🧠 ARSENAL — SOCLE ACTION + LABEL COMPACT (V1)
#     socle_action_label_compact  (72px)
# ----------------------------------------------------------
# 🎯 RÔLE
#   Socle 72px pour cartes d’action avec feedback en label :
#   - name + label
#   - label lisible (13/400, line-height 1.3)
#
# 🧩 PÉRIMÈTRE
#   - UI uniquement : métriques + typo
#   - ne fixe pas l’action (tap/hold override carte métier)
# ==========================================================

socle_action_label_compact:
  template: carte_base_v2

  show_icon: true
  show_name: true
  show_state: false
  show_label: true

  styles:
    label:
      - font-size: 14px
      - font-weight: 400
      - color: '#111'
      - line-height: 1.3
