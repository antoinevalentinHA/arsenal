#################################################################
# 🚨 CARTE ALERTE BINAIRE CRITIQUE — UI
#################################################################

carte_alerte_binaire_critique:
  template: carte_base_v2

  show_state: true

  tap_action:
    action: more-info

  styles:
    card:
      - background-color: |
          [[[
            if (entity.state === 'on')
              return 'rgba(244, 67, 54, 0.2)';

            if (entity.state === 'off')
              return 'rgba(76, 175, 80, 0.2)';

            return 'rgba(158, 158, 158, 0.1)';
          ]]]