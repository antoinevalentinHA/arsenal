# ==========================================================
# 🧱 ARSENAL — SOCLE KPI (72) NEUTRE
#     socle_kpi_72
# ----------------------------------------------------------
# 🎯 RÔLE
#   KPI compact 72px :
#   - icon + name + state
#   - typo canon KPI (state 18/700)
#   - textes noirs strict (#111)
#   - NE GÈRE PAS les couleurs
# ==========================================================

socle_kpi_72:
  template: carte_base_v2

  show_icon: true
  show_name: true
  show_state: true
  show_label: false
  color_type: card

  tap_action:
    action: none
  hold_action:
    action: none
  double_tap_action:
    action: none

  styles:
    card:
      - height: 72px

    icon:
      - width: 26px
      - height: 26px
      - color: '#111'

    name:
      - font-size: 13px
      - font-weight: 500
      - color: '#111'

    state:
      - font-size: 18px
      - font-weight: 700
      - color: '#111'