# ==========================================================
# 🧠 ARSENAL — SOCLE STATUS COMPACT (V1)
#     socle_status_compact  (TPL-05 variante)
# ----------------------------------------------------------
# 🎯 RÔLE
#   Tuile statut compacte (dashboard / synthèse) :
#   - name + state
#   - non interactive par défaut
#   - height 64px
#
# 🚫 INTERDIT
#   - aucune logique métier
#   - pas de background-color dynamique
# ==========================================================

socle_status_compact:
  template: carte_base_v2

  show_icon: false
  show_name: true
  show_state: true
  show_label: false
  color_type: card

  tap_action:
    action: none
  hold_action:
    action: none
  double_tap_action:
    action: none

  styles:
    card:
      - height: 64px

    state:
      - font-size: 14px
      - font-weight: 400
      - color: '#111'

    name:
      - color: '#111'
