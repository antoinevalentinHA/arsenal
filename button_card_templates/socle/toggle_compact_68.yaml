#################################################################
# 🧱 SOCLE — TOGGLE COMPACT 68 (CLIM OPTIONS)
# ---------------------------------------------------------------
# Socle UI pour toggles d’options clim (power, quiet, economy…)
#
# Contrat :
#   - toggle (tap)
#   - more-info (hold)
#   - format compact 68px
#   - couleurs strictement Arsenal
#   - unknown/unavailable -> gris indispo
#################################################################

socle_toggle_compact_68:
  template: carte_base_v2

  show_state: false
  show_label: false
  show_icon: true
  color_type: card

  tap_action:
    action: toggle
  hold_action:
    action: more-info
  double_tap_action:
    action: none

  styles:
    card:
      - height: 68px

  state:
    - value: 'on'
      styles:
        card:
          - background-color: rgba(76, 175, 80, 0.2)

    - value: 'off'
      styles:
        card:
          - background-color: rgba(158, 158, 158, 0.2)

    - operator: template
      value: |
        [[[
          return ['unknown','unavailable','none'].includes(entity?.state);
        ]]]
      styles:
        card:
          - background-color: rgba(158, 158, 158, 0.1)