# ==========================================================
# 🧠 ARSENAL — SOCLE STATUS + LABEL XL (V1)
#     socle_status_label_xl  (TPL-05 variante synthèse)
# ----------------------------------------------------------
# 🎯 RÔLE
#   Carte synthèse non interactive (format XL) :
#   - height 80px
#   - icon 28px
#   - state 15/600
#   - label 13/400
#   - textes noirs (#111)
# ==========================================================

socle_status_label_xl:
  template: carte_base_v2

  show_icon: true
  show_name: false
  show_state: true
  show_label: true
  color_type: card

  tap_action:
    action: none
  hold_action:
    action: none
  double_tap_action:
    action: none

  styles:
    card:
      - height: 80px

    icon:
      - width: 28px
      - height: 28px
      - color: '#111'

    state:
      - font-size: 15px
      - font-weight: 600
      - color: '#111'

    label:
      - font-size: 13px
      - font-weight: 400
      - color: '#111'
