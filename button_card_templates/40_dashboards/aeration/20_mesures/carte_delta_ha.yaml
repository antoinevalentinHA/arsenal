# ==========================================================
# 🧠 ARSENAL — TEMPLATE UI METIER
#     Aeration — Delta humidite absolue (ΔHA)
# ==========================================================
#
# 📌 STATUT
#     TEMPLATE UI METIER
#
# 🎯 ROLE
#     Afficher la valeur du delta d'humidite absolue (ΔHA)
#     ainsi que son evaluation par rapport a un seuil
#     dynamique applique.
#
# 🧱 NATURE
#     - Template button-card
#     - Specialisation de socle_status_label
#     - UI uniquement (aucune decision)
#
# 🎨 SEMANTIQUE
#     - valeur inconnue / non numerique -> gris indispo
#     - valeur >= seuil -> vert (condition favorable)
#     - valeur < seuil -> gris neutre (condition non atteinte)
#
# 🔗 DEPENDANCES
#     - entity: capteur exposant les attributs suivants
#     - attributes:
#         - delta_humidite_absolue
#         - seuils_utilises (optionnel, JSON ou objet)
#             - ha_min_applique
#     - helpers externes:
#         - input_select.saison
#         - input_number.aeration_delta_ha_min_hiver
#         - input_number.aeration_delta_ha_min_ete
#         - input_number.aeration_delta_ha_min_inter
#
# ⚠️ CONTRAINTES
#     - Le calcul du seuil est tolerent (fallback saison)
#       mais reste une logique UI derivee, non autoritaire.
#     - Ce template ne doit pas etre utilise pour piloter
#       une decision systeme.
#     - Les conversions (string → float) sont defensives
#       pour tolerer des formats non normalises.
#
# 🧩 USAGE
#     Exemple :
#       type: custom:button-card
#       template: carte_delta_ha
#       entity: sensor.aeration_etage
#       name: Delta HA
#
# ==========================================================

carte_delta_ha:
  template: socle_status_label

  show_icon: false

  tap_action:
    action: none
  hold_action:
    action: none
  double_tap_action:
    action: none

  state_display: |
    [[[
      const toNumber = (v) => {
        if (v === null || v === undefined) return NaN;
        return parseFloat(String(v).replace(',', '.').replace(/[^\d.-]/g, ''));
      };
      const v = toNumber(entity.attributes?.delta_humidite_absolue);
      if (isNaN(v)) return "—";
      return v.toFixed(2) + " g/m³";
    ]]]

  label: |
    [[[
      const toObj = (v) => {
        if (!v) return {};
        if (typeof v === 'object') return v;
        try { return JSON.parse(v); } catch { return {}; }
      };
      const attrs  = entity.attributes || {};
      const seuils = toObj(attrs.seuils_utilises);
      let seuil = parseFloat(seuils.ha_min_applique);

      if (!Number.isFinite(seuil)) {
        const saison = states['input_select.saison']?.state || '';
        if (saison === 'Hiver')
          seuil = parseFloat(states['input_number.aeration_delta_ha_min_hiver']?.state) || 2.0;
        else if (saison === 'Été')
          seuil = parseFloat(states['input_number.aeration_delta_ha_min_ete']?.state) || 1.0;
        else if (['Printemps','Automne'].includes(saison))
          seuil = parseFloat(states['input_number.aeration_delta_ha_min_inter']?.state) || 1.5;
        else
          seuil = 1.0;
      }

      return "Seuil : " + seuil.toFixed(1) + " g/m³";
    ]]]

  styles:
    card:
      - background-color: |
          [[[
            const toNumber = (v) => {
              if (v === null || v === undefined) return NaN;
              return parseFloat(String(v).replace(',', '.').replace(/[^\d.-]/g, ''));
            };
            const toObj = (v) => {
              if (!v) return {};
              if (typeof v === 'object') return v;
              try { return JSON.parse(v); } catch { return {}; }
            };
            const v = toNumber(entity.attributes?.delta_humidite_absolue);
            const attrs = entity.attributes || {};
            const seuils = toObj(attrs.seuils_utilises);
            let seuil = parseFloat(seuils.ha_min_applique);

            if (!Number.isFinite(seuil)) {
              const saison = states['input_select.saison']?.state || '';
              if (saison === 'Hiver')
                seuil = parseFloat(states['input_number.aeration_delta_ha_min_hiver']?.state) || 2.0;
              else if (saison === 'Été')
                seuil = parseFloat(states['input_number.aeration_delta_ha_min_ete']?.state) || 1.0;
              else if (['Printemps','Automne'].includes(saison))
                seuil = parseFloat(states['input_number.aeration_delta_ha_min_inter']?.state) || 1.5;
              else
                seuil = 1.0;
            }

            if (isNaN(v)) return "rgba(158, 158, 158, 0.1)";
            return v >= seuil
              ? "rgba(76, 175, 80, 0.2)"
              : "rgba(158, 158, 158, 0.2)";
          ]]]
