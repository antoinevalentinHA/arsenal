# ==========================================================
# 🧠 ARSENAL — CARTE UI
#     Météo — Pluie
#
# 🗂️ COUCHE : etat
# 🧱 TYPE UI : statut simple
# 🔍 NIVEAU DE CONFIANCE : eleve
# ==========================================================
#
# 🎯 RÔLE
#   Afficher la présence ou l'absence de pluie à partir
#   d'un capteur binaire agrégé.
#
# 📡 SOURCE
#   - entity.state
#
# ⚙️ LOGIQUE UI
#   - Affiche un statut binaire :
#       - on  → "Oui" → fond gris neutre
#       - off → "Non" → fond vert
#   - Aucun label
#   - Carte purement informative
#   - Aucune action utilisateur
#
# ----------------------------------------------------------
# 🔒 STRUCTURE
#   SATELLITE et PIVOT sont mutuellement exclusifs
# ----------------------------------------------------------
#
# 🔗 SATELLITE DE : socle_status
#
# ==========================================================

carte_pluie:
  template: socle_status

  show_label: false

  tap_action:
    action: none
  hold_action:
    action: none
  double_tap_action:
    action: none

  state_display: |
    [[[
      return entity.state === "on" ? "Oui" : "Non";
    ]]]

  state:
    - value: "on"
      styles:
        card:
          - background-color: rgba(158, 158, 158, 0.2)

    - value: "off"
      styles:
        card:
          - background-color: rgba(76, 175, 80, 0.2)
