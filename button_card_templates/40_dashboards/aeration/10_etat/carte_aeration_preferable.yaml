# ==========================================================
# 🧠 ARSENAL — CARTE UI
#     Aération — Aération préférable
#
# 🗂️ COUCHE : etat
# 🧱 TYPE UI : statut explicatif
# 🔍 NIVEAU DE CONFIANCE : eleve
# ==========================================================
#
# 🎯 RÔLE
#   Afficher si l'aeration est conseillee ou deconseillee,
#   avec le motif decisionnel associe.
#
# 📡 SOURCE
#   - entity.state
#   - entity.attributes.decision
#
# ⚙️ LOGIQUE UI
#   - Affiche un statut binaire :
#       - on  -> "Conseillee"
#       - off -> "Deconseillee"
#   - Affiche un label de justification a partir de
#     l'attribut `decision`
#   - Traduit les codes decisionnels en motif lisible
#   - Carte purement informative
#   - Aucune action utilisateur
#
# ----------------------------------------------------------
# 🔒 STRUCTURE
#   SATELLITE et PIVOT sont mutuellement exclusifs
# ----------------------------------------------------------
#
# 🔗 SATELLITE DE : socle_status_label
#
# ==========================================================

carte_aeration_preferable:
  template: socle_status_label

  show_icon: false

  state_display: |
    [[[
      return entity.state === 'on' ? 'Conseillée' : 'Déconseillée';
    ]]]

  label: |
    [[[
      const d = entity.attributes?.decision || '';
      const map = {
        'co2_priorite': 'Motif : CO₂ prioritaire',
        'pluie_recente': 'Motif : Pluie récente',
        'canicule': 'Motif : Canicule (jour)',
        'aeration_ok': 'Motif : Seuils atteints',
        'seuil_ha_non_atteint': 'Motif : ΔHA insuffisant',
        'seuil_dt_non_atteint': 'Motif : ΔT insuffisant',
        'inconnue': 'Motif : Données indisponibles'
      };
      return map[d] || 'Motif : Analyse en cours';
    ]]]

  state:
    - value: 'on'
      styles:
        card:
          - background-color: rgba(76, 175, 80, 0.2)

    - value: 'off'
      styles:
        card:
          - background-color: rgba(158, 158, 158, 0.2)

  tap_action:
    action: none
  hold_action:
    action: none
  double_tap_action:
    action: none
