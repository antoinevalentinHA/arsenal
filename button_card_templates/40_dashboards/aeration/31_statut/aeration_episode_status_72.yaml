# ==========================================================
# 🧠 ARSENAL — TEMPLATE UI METIER
#     Aeration — Episode status 72
# ==========================================================
#
# 📌 STATUT
#     TEMPLATE UI METIER
#
# 🎯 ROLE
#     Afficher une synthese compacte de l'etat d'ouverture
#     utile au domaine Aeration, a partir d'une source
#     qualifiee backend et d'indices contextuels de grace.
#
# 🧱 NATURE
#     - Template button-card
#     - Specialisation de socle_status_label_72
#     - UI uniquement (aucune decision)
#
# 🎨 SEMANTIQUE
#     - indisponible -> gris indispo
#     - ouverture qualifiee -> bleu
#     - ouverture brute avec grace active -> jaune
#     - ouverture brute non qualifiee -> orange
#     - repos -> gris neutre
#
# 🔗 DEPENDANCES
#     - binary_sensor.fenetre_ouverte_maison_avec_delai
#     - binary_sensor.contact_fenetres_maison
#     - timer.fenetre_sejour_ouverte_grace
#     - timer.fenetre_chambre_parents_grace
#
# ⚠️ CONTRAINTES
#     - Ce template ne calcule aucun delai.
#     - La qualification d'ouverture doit provenir du backend.
#     - L'UI ne doit jamais presenter une ouverture comme
#       "qualifiee" sans le capteur qualifie correspondant.
#     - Ce template est reserve au domaine Aeration.
#
# 🧩 USAGE
#     Exemple :
#       type: custom:button-card
#       template: aeration_episode_status_72
#       name: Episode
#
# ==========================================================

aeration_episode_status_72:
  template: socle_status_label_72

  show_state: false
  show_name: true
  show_label: true
  show_icon: true
  color_type: card

  triggers_update:
    - binary_sensor.fenetre_ouverte_maison_avec_delai
    - binary_sensor.contact_fenetres_maison
    - timer.fenetre_sejour_ouverte_grace
    - timer.fenetre_chambre_parents_grace

  icon: |
    [[[
      const UNAV = ['unknown','unavailable',undefined,null,'none',''];
      const qual = states['binary_sensor.fenetre_ouverte_maison_avec_delai']?.state;
      const brut = states['binary_sensor.contact_fenetres_maison']?.state;

      const tSej = states['timer.fenetre_sejour_ouverte_grace']?.state;
      const tPar = states['timer.fenetre_chambre_parents_grace']?.state;
      const grace = (tSej === 'active') || (tPar === 'active');

      if (UNAV.includes(qual) || UNAV.includes(brut) || UNAV.includes(tSej) || UNAV.includes(tPar))
        return 'mdi:help-circle-outline';

      if (qual === 'on')
        return 'mdi:window-open-variant';

      if (brut === 'on' && grace)
        return 'mdi:timer-sand';

      if (brut === 'on')
        return 'mdi:window-open-variant';

      return 'mdi:window-closed-variant';
    ]]]

  label: |
    [[[
      const UNAV = ['unknown','unavailable',undefined,null,'none',''];
      const qual = states['binary_sensor.fenetre_ouverte_maison_avec_delai']?.state;
      const brut = states['binary_sensor.contact_fenetres_maison']?.state;

      const tSej = states['timer.fenetre_sejour_ouverte_grace']?.state;
      const tPar = states['timer.fenetre_chambre_parents_grace']?.state;
      const grace = (tSej === 'active') || (tPar === 'active');

      if (UNAV.includes(qual) || UNAV.includes(brut) || UNAV.includes(tSej) || UNAV.includes(tPar))
        return "Indisponible";

      if (qual === 'on')
        return "Ouverture qualifiée";

      if (brut === 'on' && grace)
        return "Ouverture • grâce en cours";

      if (brut === 'on')
        return "Ouverture • non qualifiée";

      return "Au repos";
    ]]]

  styles:
    card:
      - background-color: |
          [[[
            const UNAV = ['unknown','unavailable',undefined,null,'none',''];
            const qual = states['binary_sensor.fenetre_ouverte_maison_avec_delai']?.state;
            const brut = states['binary_sensor.contact_fenetres_maison']?.state;

            const tSej = states['timer.fenetre_sejour_ouverte_grace']?.state;
            const tPar = states['timer.fenetre_chambre_parents_grace']?.state;
            const grace = (tSej === 'active') || (tPar === 'active');

            if (UNAV.includes(qual) || UNAV.includes(brut) || UNAV.includes(tSej) || UNAV.includes(tPar))
              return "rgba(158, 158, 158, 0.1)";

            if (qual === 'on')
              return "rgba(33, 150, 243, 0.2)";

            if (brut === 'on' && grace)
              return "rgba(255, 235, 59, 0.2)";

            if (brut === 'on')
              return "rgba(255, 152, 0, 0.2)";

            return "rgba(158, 158, 158, 0.2)";
          ]]]