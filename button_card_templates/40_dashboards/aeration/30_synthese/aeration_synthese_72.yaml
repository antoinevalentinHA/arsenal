# ==========================================================
# 🧠 ARSENAL — TEMPLATE UI METIER
#     Aération — Synthèse 72
# ==========================================================
#
# 📌 STATUT
#     TEMPLATE UI METIER
#
# 🎯 ROLE
#     Afficher une phrase de synthèse priorisée de l'état
#     d'aération : blocage, épisode en cours ou nominal.
#
# 🧱 NATURE
#     - Template button-card
#     - Specialisation de socle_status_label_72
#     - UI uniquement (aucune decision)
#
# 🎨 SEMANTIQUE
#     - blocage = on -> "Chauffage bloqué (post-aération)" + rouge
#     - episode = on -> "Aération en cours" + bleu
#     - aucun état actif -> "Situation nominale" + vert
#     - donnée indisponible -> "Indisponible" + gris indispo
#
# 🔗 DEPENDANCES
#     - entity: aucune entité principale portée par la carte
#     - attributes: aucune
#     - helpers externes:
#         - input_boolean.chauffage_blocage_aeration
#         - input_boolean.aeration_episode_en_cours
#
# ⚠️ CONTRAINTES
#     - Priorité stricte : blocage > episode > nominal
#     - Ce template ne doit pas calculer la logique métier
#       d'aération ; il traduit uniquement des états backend.
#
# 🧩 USAGE
#     Exemple minimal :
#       type: custom:button-card
#       template: aeration_synthese_72
#       name: Synthèse
#
# ==========================================================

aeration_synthese_72:
  template: socle_status_label_72

  show_state: false
  show_name: true
  show_label: true
  show_icon: true
  color_type: card

  icon: mdi:window-open-variant

  label: |
    [[[
      const st = (id) => states[id]?.state;
      const UNAV = ['unknown','unavailable',undefined,null,'none',''];

      const blocage = st('input_boolean.chauffage_blocage_aeration');
      const episode = st('input_boolean.aeration_episode_en_cours');

      if ([blocage, episode].some(v => UNAV.includes(v)))
        return "Indisponible";

      if (blocage === 'on')
        return "Chauffage bloqué (post-aération)";

      if (episode === 'on')
        return "Aération en cours";

      return "Situation nominale";
    ]]]

  styles:
    card:
      - background-color: |
          [[[
            const st = (id) => states[id]?.state;
            const UNAV = ['unknown','unavailable',undefined,null,'none',''];

            const blocage = st('input_boolean.chauffage_blocage_aeration');
            const episode = st('input_boolean.aeration_episode_en_cours');

            if ([blocage, episode].some(v => UNAV.includes(v)))
              return "rgba(158, 158, 158, 0.1)";

            if (blocage === 'on')
              return "rgba(244, 67, 54, 0.2)";

            if (episode === 'on')
              return "rgba(33, 150, 243, 0.2)";

            return "rgba(76, 175, 80, 0.2)";
          ]]]