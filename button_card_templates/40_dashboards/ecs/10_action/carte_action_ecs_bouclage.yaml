# ==========================================================
# 🧠 ARSENAL — TEMPLATE UI METIER
#     ECS — Action bouclage (5 minutes)
# ==========================================================
#
# 📌 STATUT
#     TEMPLATE UI METIER
#
# 🎯 ROLE
#     Affiche l'état du bouclage ECS et permet de déclencher
#     un cycle de bouclage de 5 minutes via script avec
#     confirmation obligatoire.
#
# 🧱 NATURE
#     - Template button-card
#     - Spécialisation de socle_action_label_compact
#     - UI uniquement (aucune décision)
#
# 🎨 SEMANTIQUE
#     - switch.prise_bouclage = on  -> 🟢 vert "Actif"  (bouclage en cours)
#     - switch.prise_bouclage = off -> ⚪ gris "Veille" (bouclage inactif)
#
# 🔗 DEPENDANCES
#     - switch.prise_bouclage        : état courant du bouclage (affichage + couleur)
#     - script.bouclage_ecs_5_minutes : script déclenché au tap
#
# ⚠️ CONTRAINTES
#     - Confirmation modale obligatoire avant déclenchement
#     - L'entity de la carte n'est pas déclarée — couleur et label
#       lus via states[switch.prise_bouclage] (triggers_update requis)
#     - hold et double_tap désactivés explicitement
#     - Durée du cycle (5 min) codée dans le nom du script — non paramétrable
#
# 🧩 USAGE
#     type: custom:button-card
#     template: carte_action_ecs_bouclage
#     # aucune entity requise — état lu via switch.prise_bouclage
#
# ==========================================================

carte_action_ecs_bouclage:
  template: socle_action_label_compact

  show_icon: true
  show_state: false
  show_name: true
  show_label: true

  label: |
    [[[
      const etat = states['switch.prise_bouclage']?.state;
      return (etat === 'on') ? 'Actif' : 'Veille';
    ]]]

  tap_action:
    action: call-service
    service: script.bouclage_ecs_5_minutes
    confirmation:
      text: Lancer le bouclage ECS pour 5 minutes ?

  hold_action:
    action: none
  double_tap_action:
    action: none

  triggers_update:
    - switch.prise_bouclage

  styles:
    card:
      - background-color: |
          [[[
            const etat = states['switch.prise_bouclage']?.state;
            return etat === 'on'
              ? 'rgba(76, 175, 80, 0.2)'
              : 'rgba(158, 158, 158, 0.2)';
          ]]]