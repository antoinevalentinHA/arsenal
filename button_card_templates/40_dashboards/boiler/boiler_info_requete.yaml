# ==========================================================
# 🧠 ARSENAL — TEMPLATE UI METIER
#     Boiler — Info requete
# ==========================================================
#
# 📌 STATUT
#     TEMPLATE UI METIER — REUTILISABLE
#
# 🎯 ROLE
#     Specialiser le socle information canonique pour
#     l'affichage d'une requete emise par Home Assistant
#     vers le sous-systeme boiler.
#
# 🧱 NATURE
#     - Template button-card derive d'un socle information
#     - Porte la semantique couleur metier de commande emise
#     - Reutilisable sur les input_text.boiler_req_*
#
# 🎨 SEMANTIQUE COULEUR
#     - unknown / unavailable / vide -> gris indispo
#     - valeur presente -> bleu info
#
# ⚠️ CONTRAINTE
#     Une requete emise n'est ni un succes, ni un echec,
#     ni un KPI. Elle releve exclusivement d'une semantique
#     d'information technique.
#
# 🧩 USAGE
#     Exemple :
#       type: custom:button-card
#       template: boiler_info_requete
#       entity: input_text.boiler_req_dhw_set_setpoint
#       name: Requete
#
# ==========================================================

boiler_info_requete:
  template:
    - socle_info_72

  styles:
    card:
      - background-color: >
          [[[
            const state = entity ? entity.state : null;

            if (
              state === null ||
              state === undefined ||
              state === '' ||
              state === 'unknown' ||
              state === 'unavailable'
            ) {
              return 'rgba(158, 158, 158, 0.1)';
            }

            return 'rgba(33, 150, 243, 0.2)';
          ]]]