# ==========================================================
# 🧠 ARSENAL — TEMPLATE UI METIER
#     Boiler — Decision ACK
# ==========================================================
#
# 📌 STATUT
#     TEMPLATE UI METIER — REUTILISABLE
#
# 🎯 ROLE
#     Specialiser un socle status canonique pour l'affichage
#     du statut transactionnel d'un ACK boiler.
#
# 🧱 NATURE
#     - Template button-card derive d'un socle status
#     - Porte la semantique couleur metier transactionnelle
#     - Reutilisable sur tous les statuts ACK du bridge
#
# 🎨 SEMANTIQUE COULEUR
#     - unknown / unavailable -> gris indispo
#     - applied -> vert
#     - accepted -> jaune
#     - rejected -> rouge
#     - timeout -> rouge
#     - autre valeur non reconnue -> orange
#
# ⚠️ CONTRAINTE
#     accepted n'est pas un succes final.
#     Seul applied represente un succes applique.
#
# ==========================================================

boiler_decision_ack:
  template:
    - socle_status_72

  icon: >
    [[[
      const state = entity ? String(entity.state).toLowerCase() : null;

      if (state === null || state === undefined || state === 'unknown' || state === 'unavailable') {
        return 'mdi:help-circle-outline';
      }

      if (state === 'applied') {
        return 'mdi:check-circle-outline';
      }

      if (state === 'accepted') {
        return 'mdi:clock-outline';
      }

      if (state === 'rejected') {
        return 'mdi:close-circle-outline';
      }

      if (state === 'timeout') {
        return 'mdi:timer-alert-outline';
      }

      return 'mdi:alert-circle-outline';
    ]]]

  state_display: >
    [[[
      const state = entity ? String(entity.state).toLowerCase() : null;

      if (state === null || state === undefined || state === 'unknown' || state === 'unavailable') {
        return 'Inconnu';
      }

      if (state === 'applied') {
        return 'Applique';
      }

      if (state === 'accepted') {
        return 'Accepte';
      }

      if (state === 'rejected') {
        return 'Rejete';
      }

      if (state === 'timeout') {
        return 'Timeout';
      }

      return 'Anormal';
    ]]]

  styles:
    card:
      - background-color: >
          [[[
            const state = entity ? entity.state : null;

            if (state === null || state === undefined || state === 'unknown' || state === 'unavailable') {
              return 'rgba(158, 158, 158, 0.1)';
            }

            const normalized = String(state).toLowerCase();

            if (normalized === 'applied') {
              return 'rgba(76, 175, 80, 0.2)';
            }

            if (normalized === 'accepted') {
              return 'rgba(255, 235, 59, 0.2)';
            }

            if (normalized === 'rejected' || normalized === 'timeout') {
              return 'rgba(244, 67, 54, 0.2)';
            }

            return 'rgba(255, 152, 0, 0.2)';
          ]]]