# ==========================================================
# 🧠 ARSENAL — CARTE UI
#     Véhicule — Durée de stationnement
#
# 🗂️ COUCHE : etat
# 🧱 TYPE UI : info brute non binaire
# 🔍 NIVEAU DE CONFIANCE : eleve
# ==========================================================
#
# 🎯 RÔLE
#   Afficher une durée de stationnement en lecture seule.
#   Couleur fixe informationnelle — aucune sémantique
#   d'alerte, aucun seuil.
#
# 📡 SOURCE
#   - entity.state (durée formatée ou numérique)
#
# ⚙️ LOGIQUE UI
#   - valeur disponible   → fond bleu informatif
#   - valeur indisponible → fond gris indispo
#   - Aucun seuil, aucune logique d'alerte
#   - Aucune action utilisateur
#
# ----------------------------------------------------------
# 🔒 STRUCTURE
#   SATELLITE et PIVOT sont mutuellement exclusifs
# ----------------------------------------------------------
#
# 🔗 SATELLITE DE : socle_status
#
# ==========================================================

carte_duree_stationnement:
  template: socle_status

  tap_action:
    action: none
  hold_action:
    action: none
  double_tap_action:
    action: none

  styles:
    card:
      - background-color: |
          [[[
            const s = entity?.state;

            if (["unknown","unavailable",null].includes(s))
              return "rgba(158, 158, 158, 0.1)";   // ⚪ indispo

            return "rgba(33, 150, 243, 0.2)";     // 🔵 info
          ]]]
          