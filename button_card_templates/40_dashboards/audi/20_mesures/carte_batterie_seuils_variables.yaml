# ==========================================================
# 🧠 ARSENAL — CARTE UI
#     Système — Batterie seuils variables
#
# 🗂️ COUCHE : mesures
# 🧱 TYPE UI : valeur + seuils variables
# 🔍 NIVEAU DE CONFIANCE : eleve
# ==========================================================
#
# 🎯 RÔLE
#   Afficher le niveau de batterie avec une évaluation
#   dynamique basée sur des seuils fournis en variables.
#
# 📡 SOURCE
#   - entity.state (valeur en %)
#   - variables.s_crit (seuil critique %, optionnel)
#   - variables.s_low  (seuil faible %, optionnel)
#   - variables.s_mid  (seuil limité %, optionnel)
#
# ⚙️ LOGIQUE UI
#   - Seuils évalués en cascade (s_crit < s_low < s_mid) :
#       v < s_crit           → fond rouge   (critique)
#       s_crit <= v < s_low  → fond orange  (faible)
#       s_low  <= v < s_mid  → fond jaune   (limité)
#       v >= s_mid           → fond vert    (nominal)
#       valeur non numérique → fond gris indispo
#   - Seuil absent → silencieusement ignoré
#   - Affichage arrondi à l'entier (Math.round)
#   - Aucune action utilisateur
#
# ----------------------------------------------------------
# 🔒 STRUCTURE
#   SATELLITE et PIVOT sont mutuellement exclusifs
# ----------------------------------------------------------
#
# 🔗 SATELLITE DE : socle_diagnostic_compact
#
# ==========================================================

carte_batterie_seuils_variables:
  template: socle_diagnostic_compact

  show_state: true
  show_label: false

  tap_action:
    action: none
  hold_action:
    action: none
  double_tap_action:
    action: none

  state_display: |
    [[[
      const v = parseFloat(entity.state);
      return isNaN(v) ? '—' : `${Math.round(v)} %`;
    ]]]

  styles:
    card:
      - background-color: |
          [[[
            const v = parseFloat(entity.state);

            const s_crit = variables?.s_crit;
            const s_low  = variables?.s_low;
            const s_mid  = variables?.s_mid;

            if (isNaN(v)) return 'rgba(158, 158, 158, 0.1)';

            if (s_crit !== undefined && v < s_crit)
              return 'rgba(244, 67, 54, 0.2)';

            if (s_low !== undefined && v < s_low)
              return 'rgba(255, 152, 0, 0.2)';

            if (s_mid !== undefined && v < s_mid)
              return 'rgba(255, 193, 7, 0.25)';

            return 'rgba(76, 175, 80, 0.2)';
          ]]]