# ==========================================================
# 🧠 ARSENAL — CARTE UI
#     Maison — Mode maison courant
#
# 🗂️ COUCHE : état
# 🧱 TYPE UI : statut synthétique de mode
# 🔍 NIVEAU DE CONFIANCE : élevé
# ==========================================================
#
# 🎯 RÔLE
#   Afficher le mode maison courant et donner accès au
#   dashboard des modes, avec une lecture visuelle simple
#   entre état nominal et état dégradé.
#
# 📡 SOURCE
#   - entity.state
#
# ⚙️ LOGIQUE UI
#   - Lit le mode maison porté par l'entité
#   - Applique une lecture binaire du mode :
#       - normal → état nominal
#       - tout autre état → état dégradé
#   - Code visuel :
#       - normal → vert
#       - autre → rouge
#   - Navigation vers le dashboard des modes sur appui
#   - Aucune action d'écriture
#   - Aucun calcul de décision
#
# ----------------------------------------------------------
# 🔒 STRUCTURE
#   SATELLITE et PIVOT sont mutuellement exclusifs
# ----------------------------------------------------------
#
# 🔗 SATELLITE DE : socle_toggle
#
# ==========================================================

carte_mode_maison:
  template: socle_toggle

  tap_action:
    action: navigate
    navigation_path: /modes-dashboard/home

  styles:
    card:
      - background-color: |
          [[[
            const mode = (entity?.state || '').toLowerCase();
            return mode === 'normal'
              ? 'rgba(76, 175, 80, 0.2)'
              : 'rgba(244, 67, 54, 0.2)';
          ]]]
