# ==========================================================
# 🧠 ARSENAL — CARTE UI
#     Maison — Mode maison courant
#
# 🗂️ COUCHE : état
# 🧱 TYPE UI : statut synthétique de mode
# 🔍 NIVEAU DE CONFIANCE : élevé
# ==========================================================
#
# 🎯 RÔLE
#   Afficher le mode maison courant (Normal / Vacances)
#   à partir de la référence canonique, avec navigation
#   vers le dashboard des modes.

#
# 📡 SOURCE
#   - entity.state
#
# ⚙️ LOGIQUE UI
#   - Lit la référence canonique des vacances
#   - Traduit l'état binaire en libellé utilisateur :
#       - off → Normal
#       - on  → Vacances
#   - Code visuel :
#       - Normal   → vert
#       - Vacances → rouge
#   - Navigation vers le dashboard des modes sur appui
#   - Aucune action d'écriture
#   - Aucun comportement de type toggle
#   - Aucun calcul de décision
#
# ----------------------------------------------------------
# 🔒 STRUCTURE
#   SATELLITE et PIVOT sont mutuellement exclusifs
# ----------------------------------------------------------
#
# 🔗 SATELLITE DE : socle_status
#
# ==========================================================

carte_mode_maison:
  template: socle_status

  tap_action:
    action: navigate
    navigation_path: /modes-dashboard/home

  state_display: |
    [[[
      const vacances = entity?.state === 'on';
      return vacances ? 'Vacances' : 'Normal';
    ]]]

  styles:
    card:
      - background-color: |
          [[[
            const vacances = entity?.state === 'on';
            return vacances
              ? 'rgba(244, 67, 54, 0.2)'
              : 'rgba(76, 175, 80, 0.2)';
          ]]]