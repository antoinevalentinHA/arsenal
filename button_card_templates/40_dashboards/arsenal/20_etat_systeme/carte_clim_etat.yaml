# ==========================================================
# 🧠 ARSENAL — TEMPLATE UI METIER
#     Climatisation — État réel
# ==========================================================
#
# 📌 STATUT
#     TEMPLATE UI METIER
#
# 🎯 ROLE
#     Afficher l'état réel de la climatisation ainsi que
#     la consigne appliquée lorsque disponible.
#
# 🧱 NATURE
#     - Template button-card
#     - Specialisation de socle_action_label_compact
#     - UI uniquement (aucune decision)
#
# 🎨 SEMANTIQUE
#     - mode = cool -> consigne affichée + bleu
#     - mode = dry -> "Mode Dry actif" + vert
#     - mode = heat -> "Mode Chauffage actif" + rouge
#     - mode = off -> "Veille" + gris neutre
#
# 🔗 DEPENDANCES
#     - entity: climate.clim ou entite equivalente
#     - attributes: aucune
#     - helpers externes:
#         - sensor.consigne_clim_appliquee_locale
#
# ⚠️ CONTRAINTES
#     - Ce template ne calcule pas le mode cible
#     - Il affiche uniquement l'etat reel expose par le systeme
#     - Navigation vers le dashboard climatisation sur tap_action
#
# 🧩 USAGE
#     Exemple minimal :
#       type: custom:button-card
#       template: carte_clim_etat
#       entity: climate.clim
#
# ==========================================================

carte_clim_etat:
  template: socle_action_label_compact

  show_label: true
  show_state: false

  label: |
    [[[
      const mode = (entity.state || '').toLowerCase();
      const consigne = states['sensor.consigne_clim_appliquee_locale']?.state;

      if (mode === 'cool')
        return 'Consigne : ' +
          ((!consigne || ['unavailable','unknown'].includes(consigne)) ? '-' : consigne) + '°C';

      if (mode === 'dry')  return 'Mode Dry actif';
      if (mode === 'heat') return 'Mode Chauffage actif';
      if (mode === 'off')  return 'Veille';

      return 'État : ' + (mode || '-');
    ]]]

  tap_action:
    action: navigate
    navigation_path: /clim-dashboard/climatisation

  hold_action:
    action: more-info

  styles:
    card:
      - background-color: |
          [[[
            const mode = (entity.state || '').toLowerCase();
            if (mode === 'cool') return 'rgba(33, 150, 243, 0.2)';
            if (mode === 'dry')  return 'rgba(76, 175, 80, 0.2)';
            if (mode === 'heat') return 'rgba(244, 67, 54, 0.2)';
            return 'rgba(158, 158, 158, 0.2)';
          ]]]