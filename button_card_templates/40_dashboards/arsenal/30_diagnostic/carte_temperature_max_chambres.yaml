# ==========================================================
# 🧠 ARSENAL — TEMPLATE UI METIER
#     Climatisation — Température maximum des chambres
# ==========================================================
#
# 📌 STATUT
#     TEMPLATE UI METIER
#
# 🎯 ROLE
#     Affiche la température maximale parmi les chambres et
#     positionne cette valeur dans la plage de confort arbitrée
#     entre les consignes chauffage et climatisation, offsets
#     inclus. Indique aussi la chambre la plus chaude en label.
#
# 🧱 NATURE
#     - Template button-card
#     - Spécialisation de carte_temperature_confort
#     - UI uniquement (aucune décision)
#
# 🎨 SEMANTIQUE
#     - temp_max > (cons_clim + off_clim)         -> 🔴 rouge (surchauffe, clim requise)
#     - temp_max < (cons_chauff - off_chauff)      -> 🔵 bleu  (trop froid pour les chambres)
#     - entre les deux seuils                      -> 🟢 vert  (zone de confort)
#     - une valeur manquante / unavailable         -> ⚪ gris  (données insuffisantes)
#
# 🔗 DEPENDANCES
#     - entity                              : (héritée de carte_temperature_confort)
#     - sensor.temperature_max_chambres     : temp max + attribut chambre_la_plus_chaude
#     - input_number.clim_consigne_presence : consigne climatisation (cool)
#     - input_number.clim_offset_on         : offset déclenchement clim
#     - input_number.chauffage_consigne_confort : consigne chauffage confort
#     - input_number.chauffage_offset_on    : offset déclenchement chauffage
#
# ⚠️ CONTRAINTES
#     - Les 5 valeurs numériques sont toutes requises — une seule absence bascule en gris
#     - La logique de seuil est purement visuelle — aucune action déclenchée
#     - Spécialisation de carte_temperature_confort : ne pas dupliquer les styles de base
#     - Le label "chambre la plus chaude" dépend de l'attribut upstream — non garanti
#
# 🧩 USAGE
#     type: custom:button-card
#     template: carte_temperature_max_chambres
#     entity: sensor.temperature_max_chambres
#
# ==========================================================

carte_temperature_max_chambres:
  template: carte_temperature_confort

  styles:
    card:
      - background-color: |
          [[[
            const get = (id) => {
              const s = states[id];
              const v = parseFloat(s?.state);
              return Number.isFinite(v) ? v : null;
            };

            const temp_max      = get('sensor.temperature_max_chambres');
            const cons_clim     = get('input_number.clim_consigne_presence');
            const off_clim      = get('input_number.clim_offset_on');
            const cons_chauff   = get('input_number.chauffage_consigne_confort');
            const off_chauff    = get('input_number.chauffage_offset_on');

            const RED   = 'rgba(244, 67, 54, 0.2)';
            const GREEN = 'rgba(76, 175, 80, 0.2)';
            const BLUE  = 'rgba(33, 150, 243, 0.2)';
            const GREY  = 'rgba(158, 158, 158, 0.2)';

            if (
              temp_max === null ||
              cons_clim === null ||
              off_clim === null ||
              cons_chauff === null ||
              off_chauff === null
            ) {
              return GREY;
            }

            const seuil_clim_on   = cons_clim + off_clim;
            const seuil_chauff_on = cons_chauff - off_chauff;

            if (temp_max > seuil_clim_on)   return RED;
            if (temp_max < seuil_chauff_on) return BLUE;
            return GREEN;
          ]]]

  label: |
    [[[
      return states['sensor.temperature_max_chambres']
        ?.attributes
        ?.chambre_la_plus_chaude
        || 'Inconnue';
    ]]]