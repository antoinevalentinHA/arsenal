# ==========================================================
# 🧠 ARSENAL — CARTE UI
#     Ouvertures — Diagnostic global portes et fenêtres
#
# 🗂️ COUCHE : diagnostic
# 🧱 TYPE UI : diagnostic synthétique contextualisé
# 🔍 NIVEAU DE CONFIANCE : élevé
# ==========================================================
#
# 🎯 RÔLE
#   Afficher l'état global du groupe d'ouvertures
#   (portes + fenêtres) avec un libellé contextuel
#   précisant la nature des ouvertures détectées,
#   et donner accès au dashboard dédié.
#
# 📡 SOURCE
#   - binary_sensor.ouvertures_maison
#   - entity.attributes.entity_id
#   - states[membre]
#
# ⚙️ LOGIQUE UI
#   - Lit l'état global du groupe d'ouvertures
#   - Si tout est fermé :
#       - affiche « Fermé »
#       - code visuel vert
#   - Si au moins une ouverture est détectée :
#       - code visuel rouge
#       - analyse les membres ouverts du groupe
#       - si seules des fenêtres sont ouvertes :
#           - affiche un libellé quantifié
#       - sinon :
#           - affiche « Ouvert »
#   - Navigation vers le dashboard Ouvertures sur appui
#   - More-info sur maintien
#   - Carte strictement informative
#   - Aucun calcul métier de sécurité
#
# ----------------------------------------------------------
# 🔒 STRUCTURE
#   SATELLITE et PIVOT sont mutuellement exclusifs
# ----------------------------------------------------------
#
# ⚠️ CARTE PIVOT
#   Traverse :
#     - intention
#     - état réel
#     - diagnostic
# ==========================================================

carte_ouvertures_diagnostic:
  template: socle_action_label_compact

  entity: binary_sensor.ouvertures_maison

  show_icon: true
  show_state: false
  show_name: true
  show_label: true
  color_type: card

  tap_action:
    action: navigate
    navigation_path: /ouvertures-dashboard/portes_et_fenetres

  hold_action:
    action: more-info

  state:
    - value: 'on'
      color: rgba(244, 67, 54, 0.2)
    - value: 'off'
      color: rgba(76, 175, 80, 0.2)

  label: |
    [[[
      if (entity.state === "off") return "Fermé";

      const ouvertures = entity.attributes?.entity_id || [];
      const ouvertes = ouvertures.filter(e => states[e]?.state === "on");

      if (ouvertes.length === 0) return "Ouvert";

      const fenetres = ouvertes.filter(e => e.includes("fenetre"));

      if (fenetres.length === ouvertes.length) {
        return fenetres.length > 1
          ? `${fenetres.length} fenêtre(s) ouvertes`
          : "1 fenêtre ouverte";
      }

      return "Ouvert";
    ]]]