# ==========================================================
# 🧠 ARSENAL — TEMPLATE UI METIER
#     Ouvertures — Diagnostic global portes et fenêtres
# ==========================================================
#
# 📌 STATUT
#     TEMPLATE UI METIER
#
# 🎯 ROLE
#     Affiche l'état global du groupe d'ouvertures (portes +
#     fenêtres) avec un label contextuel précisant le nombre
#     et la nature des ouvertures détectées. Donne accès au
#     dashboard ouvertures via tap.
#
# 🧱 NATURE
#     - Template button-card
#     - Spécialisation de socle_action_label_compact
#     - UI uniquement (aucune décision)
#
# 🎨 SEMANTIQUE
#     - state = 'on'  -> 🔴 rouge  (au moins une ouverture détectée)
#     - state = 'off' -> 🟢 vert   (tout fermé)
#
# 🔗 DEPENDANCES
#     - entity                        : binary_sensor.ouvertures_maison (groupe)
#     - entity.attributes.entity_id   : liste des capteurs membres du groupe
#     - states[membre]                : état individuel de chaque ouverture
#
# ⚠️ CONTRAINTES
#     - Entité fixée dans le template (binary_sensor.ouvertures_maison) — non paramétrable
#     - Le label fenêtre est détecté par inclusion de "fenetre" dans l'entity_id
#       (convention de nommage Arsenal requise)
#     - Le label ne distingue pas les portes ouvertes (retourne "Ouvert" sans détail)
#     - Requiert que le groupe expose entity_id dans ses attributs
#
# 🧩 USAGE
#     type: custom:button-card
#     template: carte_ouvertures_diagnostic
#     # entity déjà fixée dans le template
#
# ==========================================================

carte_ouvertures_diagnostic:
  template: socle_action_label_compact

  entity: binary_sensor.ouvertures_maison

  show_icon: true
  show_state: false
  show_name: true
  show_label: true
  color_type: card

  tap_action:
    action: navigate
    navigation_path: /ouvertures-dashboard/portes_et_fenetres

  hold_action:
    action: more-info

  state:
    - value: 'on'
      color: rgba(244, 67, 54, 0.2)
    - value: 'off'
      color: rgba(76, 175, 80, 0.2)

  label: |
    [[[
      if (entity.state === "off") return "Fermé";

      const ouvertures = entity.attributes?.entity_id || [];
      const ouvertes = ouvertures.filter(e => states[e]?.state === "on");

      if (ouvertes.length === 0) return "Ouvert";

      const fenetres = ouvertes.filter(e => e.includes("fenetre"));

      if (fenetres.length === ouvertes.length) {
        return fenetres.length > 1
          ? `${fenetres.length} fenêtre(s) ouvertes`
          : "1 fenêtre ouverte";
      }

      return "Ouvert";
    ]]]