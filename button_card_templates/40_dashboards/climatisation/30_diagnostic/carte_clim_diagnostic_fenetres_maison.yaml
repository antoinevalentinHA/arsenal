# ==========================================================
# 🧠 ARSENAL — TEMPLATE UI METIER
#     Climatisation — Diagnostic fenêtres maison
# ==========================================================
#
# 📌 STATUT
#     TEMPLATE UI METIER
#
# 🎯 ROLE
#     Indique si au moins une fenêtre de la maison est ouverte,
#     ce qui conditionne l'autorisation clim. Diagnostic pur,
#     aucune interaction.
#
# 🧱 NATURE
#     - Template button-card
#     - Spécialisation de socle_status_label_72
#     - UI uniquement (aucune décision)
#
# 🎨 SEMANTIQUE
#     - state = off -> 🟢 vert "Fermées"              (clim autorisée)
#     - state = on  -> ⚪ gris "Au moins une ouverte" (blocage clim possible)
#
# 🔗 DEPENDANCES
#     - entity : binary_sensor.fenetre_ouverte_maison (groupe ou réconcilié)
#
# ⚠️ CONTRAINTES
#     - Sémantique inversée : ON = état dégradé (gris), OFF = nominal (vert)
#     - Pas de rouge — une fenêtre ouverte est une contrainte de confort,
#       pas une alerte critique (même pattern que carte_clim_diagnostic_aeration_etage)
#     - Aucune action définie
#
# 🧩 USAGE
#     type: custom:button-card
#     template: carte_clim_diagnostic_fenetres_maison
#     entity: binary_sensor.fenetre_ouverte_maison
#
# ==========================================================

carte_clim_diagnostic_fenetres_maison:
  template: socle_status_label_72

  entity: binary_sensor.fenetre_ouverte_maison

  show_state: false
  show_name: true
  show_label: true
  color_type: card

  label: |
    [[[
      return entity.state === "off"
        ? "Fermées"
        : "Au moins une ouverte";
    ]]]

  styles:
    card:
      - background-color: |
          [[[
            return entity.state === "off"
              ? "rgba(76, 175, 80, 0.2)"
              : "rgba(158, 158, 158, 0.2)";
          ]]]