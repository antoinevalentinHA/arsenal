# ==========================================================
# 🧠 ARSENAL — TEMPLATE UI METIER
#     Climatisation — Intention calculée
# ==========================================================
#
# 📌 STATUT
#     TEMPLATE UI METIER
#
# 🎯 ROLE
#     Affiche l'intention du moteur de décision climatisation
#     avec un libellé humain. Distingue demandes actives,
#     blocages et repos. Lecture seule.
#
# 🧱 NATURE
#     - Template button-card
#     - Spécialisation de socle_decision_72
#     - UI uniquement (aucune décision)
#
# 🎨 SEMANTIQUE
#     - demande_refroidissement -> 🔵 bleu  "Refroidissement demandé"
#     - demande_chauffage       -> 🔴 rouge "Chauffage demandé"
#     - blocage_* (tout état commençant par 'blocage')
#                               -> 🔴 rouge "Bloquée (cause)"
#     - ok                      -> ⚪ gris  "Repos"
#     - état inconnu            -> ⚪ gris  (état brut affiché)
#
# 🔗 DEPENDANCES
#     - entity : sensor exposant l'intention clim
#       (demande_refroidissement | demande_chauffage | blocage_* | ok)
#
# ⚠️ CONTRAINTES
#     - Les blocages sont détectés par préfixe 'blocage' — toute nouvelle
#       valeur de blocage est couverte sans modification du template
#     - blocage_poele, blocage_horaire et fenetre_ouverte ont des libellés
#       explicites ; tout autre blocage affiche l'état brut
#     - demande_chauffage et blocage_* partagent la même couleur rouge —
#       distinction uniquement par le libellé
#     - Symétrique de carte_chauffage_intention — même pattern, domaine clim
#
# 🧩 USAGE
#     type: custom:button-card
#     template: carte_clim_intention
#     entity: sensor.clim_intention
#
# ==========================================================

carte_clim_intention:
  template: socle_decision_72

  icon: mdi:brain
  name: Intention clim

  show_icon: true

  state_display: |
    [[[
      const map = {
        'demande_refroidissement': 'Refroidissement demandé',
        'demande_chauffage': 'Chauffage demandé',
        'blocage_poele': 'Bloquée (poêle)',
        'blocage_horaire': 'Bloquée (horaire)',
        'fenetre_ouverte': 'Bloquée (fenêtre)',
        'ok': 'Repos'
      };
      return map[entity.state] || entity.state;
    ]]]

  state:
    - value: demande_refroidissement
      styles:
        card:
          - background-color: rgba(33, 150, 243, 0.2)

    - value: demande_chauffage
      styles:
        card:
          - background-color: rgba(244, 67, 54, 0.2)

    - operator: template
      value: |
        [[[
          return entity.state.startsWith('blocage');
        ]]]
      styles:
        card:
          - background-color: rgba(244,67,54,0.2)

    - value: ok
      styles:
        card:
          - background-color: rgba(158,158,158,0.2)

    - operator: default
      styles:
        card:
          - background-color: rgba(158,158,158,0.2)

  tap_action:
    action: none