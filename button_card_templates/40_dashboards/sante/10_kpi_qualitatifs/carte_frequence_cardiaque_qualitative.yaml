# ==========================================================
# 🧠 ARSENAL — TEMPLATE UI METIER
#     Santé — Fréquence cardiaque qualitative
# ==========================================================
#
# 📌 STATUT
#     TEMPLATE UI METIER
#
# 🎯 ROLE
#     Afficher la fréquence cardiaque sous forme de KPI
#     avec une interprétation qualitative portée par la couleur.
#
# 🧱 NATURE
#     - Template button-card
#     - Specialisation de socle_kpi
#     - UI uniquement (aucune decision)
#
# 🎨 SEMANTIQUE
#     - valeur disponible -> affichage en bpm
#     - valeur indisponible -> "—"
#     - couleur fournie par le backend (etat qualitatif)
#
# 🔗 DEPENDANCES
#     - entity: capteur de fréquence cardiaque
#     - attributes: aucune
#     - helpers externes:
#         - sensor.couleur_sante_frequence_cardiaque
#     - variables:
#         - ui_profile
#         - couleur
#
# ⚠️ CONTRAINTES
#     - Ce template ne calcule pas l'état de santé
#     - Il consomme une couleur déjà déterminée en backend
#     - Aucune logique métier embarquée
#
# 🧩 USAGE
#     Exemple minimal :
#       type: custom:button-card
#       template: carte_frequence_cardiaque_qualitative
#       entity: sensor.frequence_cardiaque
#
# ==========================================================

carte_frequence_cardiaque_qualitative:
  template: socle_kpi

  show_state: true
  show_icon: true

  variables:
    ui_profile: arsenal
    couleur: sensor.couleur_sante_frequence_cardiaque

  triggers_update:
    - sensor.couleur_sante_frequence_cardiaque

  state_display: |
    [[[
      const bpm = parseFloat(entity?.state);
      if (isNaN(bpm)) return "—";
      return `${Math.round(bpm)} bpm`;
    ]]]

