# ==========================================================
# 🧠 ARSENAL — TEMPLATE UI METIER
#     Santé — Durée sommeil qualitative (KPI)
# ==========================================================
#
# 📌 STATUT
#     TEMPLATE UI METIER
#
# 🎯 ROLE
#     Affiche une durée de sommeil numérique en heures sous
#     forme de KPI.
#
# 🧱 NATURE
#     - Template button-card
#     - Spécialisation de socle_kpi
#     - UI uniquement
#     - Aucune décision métier
#
# 🎨 SEMANTIQUE
#     - Couleur déléguée à sensor.couleur_sante_duree_sommeil
#     - Rendu délégué au profil ui_profile: arsenal du socle_kpi
#
# 🔗 DEPENDANCES
#     - entity                               : durée sommeil numérique en heures
#     - sensor.couleur_sante_duree_sommeil   : clé couleur upstream
#
# ⚠️ CONTRAINTES
#     - Ne pas utiliser avec input_text
#     - Etat attendu : nombre décimal en heures
#     - Exemple : 3.87 => 3.9 h
#     - Valeur invalide, unknown ou unavailable => —
#
# 🧩 USAGE
#     type: custom:button-card
#     template: carte_duree_qualitative
#     entity: input_number.sommeil_derniere_nuit_total
#
# ==========================================================

carte_duree_qualitative:
  template: socle_kpi

  show_state: true
  show_icon: true

  variables:
    ui_profile: arsenal
    couleur: sensor.couleur_sante_duree_sommeil

  triggers_update:
    - sensor.couleur_sante_duree_sommeil

  state_display: |
    [[[
      const raw = entity?.state;

      if (
        raw === undefined ||
        raw === null ||
        raw === "" ||
        raw === "unknown" ||
        raw === "unavailable"
      ) {
        return "—";
      }

      // --- Cas 1 : déjà un nombre (sécurité)
      const numeric = Number(raw);
      if (Number.isFinite(numeric)) {
        return `${numeric.toFixed(1)} h`;
      }

      // --- Cas 2 : format texte type "3h52" / "3 h 52"
      const match = raw.match(/(\d+)\s*h\s*(\d+)?/i);

      if (match) {
        const hours = parseInt(match[1], 10);
        const minutes = match[2] ? parseInt(match[2], 10) : 0;

        const total = hours + minutes / 60;
        return `${total.toFixed(1)} h`;
      }

      // --- Cas fallback : afficher brut
      return raw;
    ]]]