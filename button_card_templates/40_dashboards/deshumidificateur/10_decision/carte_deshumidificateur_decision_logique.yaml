# ==========================================================
# 🧠 ARSENAL — TEMPLATE UI METIER
#     Déshumidificateur — Décision logique (cave)
# ==========================================================
#
# 📌 STATUT
#     TEMPLATE UI METIER
#
# 🎯 ROLE
#     Affiche la recommandation de démarrage du déshumidificateur
#     cave issue du moteur de décision. Lecture directe du binaire
#     de recommandation — aucune interaction.
#
# 🧱 NATURE
#     - Template button-card
#     - Spécialisation de socle_status_72
#     - UI uniquement (aucune décision)
#
# 🎨 SEMANTIQUE
#     - state = on               -> 🟢 vert  "Recommandé"
#     - state = off              -> ⚪ gris  "Non recommandé"
#     - unknown / unavailable    -> ⚪ gris clair "Indisponible"
#
# 🔗 DEPENDANCES
#     - entity : binary_sensor.deshumidificateur_cave_demarrage_recommande
#
# ⚠️ CONTRAINTES
#     - Lecture du résultat décisionnel upstream uniquement — pas de logique propre
#     - L'ordre des states est critique : template (unavailable) évalué en dernier
#       — si on/off ne matchent pas, le fallback unavailable s'applique
#     - Aucune action définie
#
# 🧩 USAGE
#     type: custom:button-card
#     template: carte_deshumidificateur_decision_logique
#     entity: binary_sensor.deshumidificateur_cave_demarrage_recommande
#
# ==========================================================

carte_deshumidificateur_decision_logique:
  template: socle_status_72

  entity: binary_sensor.deshumidificateur_cave_demarrage_recommande

  icon: mdi:play-circle

  state:
    - value: 'on'
      state_display: Recommandé
      styles:
        card:
          - background-color: rgba(76, 175, 80, 0.2)

    - value: 'off'
      state_display: Non recommandé
      styles:
        card:
          - background-color: rgba(158, 158, 158, 0.2)

    - operator: template
      value: |
        [[[
          return ['unknown','unavailable','none'].includes(entity?.state);
        ]]]
      state_display: Indisponible
      styles:
        card:
          - background-color: rgba(158, 158, 158, 0.1)