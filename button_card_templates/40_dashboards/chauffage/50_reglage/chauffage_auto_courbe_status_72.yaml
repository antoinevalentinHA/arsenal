# ==========================================================
# 🧠 ARSENAL — TEMPLATE UI METIER
#     Chauffage — Auto courbe status 72
# ==========================================================
#
# 📌 STATUT
#     TEMPLATE UI METIER
#
# 🎯 ROLE
#     Afficher une synthese compacte du statut de
#     l'auto-ajustement de courbe ou du dernier ajustement
#     selon la variable kind.
#
# 🧱 NATURE
#     - Template button-card
#     - Specialisation de socle_status_label_72
#     - UI uniquement (aucune decision)
#
# 🎨 SEMANTIQUE
#     - kind = auto :
#         - indisponible -> gris indispo
#         - inactif -> gris neutre
#         - simulation -> bleu
#         - applique -> vert
#     - kind = last :
#         - indisponible -> gris indispo
#         - vide -> gris neutre
#         - valeur presente -> bleu
#
# 🔗 DEPENDANCES
#     - entity: aucune entite principale portee par la carte
#     - attributes: aucune
#     - helpers externes:
#         - input_boolean.chauffage_reglages_auto
#         - input_boolean.courbe_auto_simulation
#         - input_text.chauffage_last_adjustment
#     - variables:
#         - kind: "auto" | "last"
#
# ⚠️ CONTRAINTES
#     - Ce template ne calcule pas l'ajustement de courbe
#     - Il affiche uniquement un statut backend ou un
#       historique deja produit
#     - La variable kind doit etre fournie explicitement
#
# 🧩 USAGE
#     Exemple minimal :
#       type: custom:button-card
#       template: chauffage_auto_courbe_status_72
#       variables:
#         kind: auto
#
# ==========================================================

chauffage_auto_courbe_status_72:
  template: socle_status_label_72

  show_state: false
  show_name: true
  show_label: true
  show_icon: true
  color_type: card

  icon: |
    [[[
      const kind = variables.kind;
      if (kind === 'auto') return 'mdi:autorenew';
      if (kind === 'last') return 'mdi:note-text-outline';
      return 'mdi:autorenew';
    ]]]

  label: |
    [[[
      const UNAV = ['unknown','unavailable',undefined,null,'none',''];
      const kind = variables.kind;

      if (kind === 'auto') {
        const auto = states['input_boolean.chauffage_reglages_auto']?.state;
        const simu = states['input_boolean.courbe_auto_simulation']?.state;

        if (UNAV.includes(auto)) return "Indisponible";

        if (auto !== 'on') return "Inactif";
        if (UNAV.includes(simu)) return "Actif";
        return (simu === 'on') ? "Simulation" : "Appliqué";
      }

      // kind === 'last'
      const last = states['input_text.chauffage_last_adjustment']?.state;
      if (UNAV.includes(last) || last === '') return "Aucun";
      return last;
    ]]]

  styles:
    card:
      - background-color: |
          [[[
            const UNAV = ['unknown','unavailable',undefined,null,'none',''];
            const kind = variables.kind;

            if (kind === 'auto') {
              const auto = states['input_boolean.chauffage_reglages_auto']?.state;
              const simu = states['input_boolean.courbe_auto_simulation']?.state;

              // Indispo
              if (UNAV.includes(auto)) return "rgba(158, 158, 158, 0.1)";

              // Inactif → fonction non utilisée
              if (auto !== 'on') return "rgba(158, 158, 158, 0.2)";

              // Actif
              if (UNAV.includes(simu)) return "rgba(76, 175, 80, 0.2)";

              // Simulation = bleu / Appliqué = vert
              return (simu === 'on')
                ? "rgba(33, 150, 243, 0.2)"
                : "rgba(76, 175, 80, 0.2)";
            }

            // kind === 'last'
            const last = states['input_text.chauffage_last_adjustment']?.state;

            // Historique : unknown/unavailable => gris indispo
            if (UNAV.includes(last)) return "rgba(158, 158, 158, 0.1)";

            // Vide => gris neutre
            if (last === '') return "rgba(158, 158, 158, 0.2)";

            // Valeur => bleu info
            return "rgba(33, 150, 243, 0.2)";
          ]]]
