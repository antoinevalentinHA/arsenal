# ==========================================================
# 🧠 ARSENAL — TEMPLATE UI METIER
#     Chauffage — Reglage courbe diagnostic 72
# ==========================================================
#
# 📌 STATUT
#     TEMPLATE UI METIER
#
# 🎯 ROLE
#     Afficher un diagnostic compact du reglage de courbe
#     de chauffage selon un angle d'analyse (24h, global, froid).
#
# 🧱 NATURE
#     - Template button-card
#     - Specialisation de socle_status_label_72
#     - UI uniquement (aucune decision)
#
# 🎨 SEMANTIQUE
#     - indisponible -> gris indispo
#     - ecart hors tolerance -> warn (orange)
#     - ecart dans tolerance -> ok (vert)
#
# 🔗 DEPENDANCES
#     - entity: aucune entite principale portee par la carte
#     - attributes: aucune
#     - helpers externes:
#         - sensor.ecart_consigne_moyenne_24h
#         - sensor.ecart_consigne_moyenne_froid
#         - sensor.ecart_consigne_moyenne_doux
#     - variables:
#         - kind: "tendance_24h" | "global" | "froid"
#
# ⚠️ CONTRAINTES
#     - Ce template ne calcule aucun ecart
#     - Les seuils sont fixes dans le template (UI)
#     - La variable kind doit etre fournie explicitement
#     - Aucune logique metier ni ajustement automatique
#
# 🧩 USAGE
#     Exemple minimal :
#       type: custom:button-card
#       template: chauffage_reglage_courbe_diag_72
#       variables:
#         kind: tendance_24h
#
# ==========================================================

chauffage_reglage_courbe_diag_72:
  template: socle_status_label_72

  show_state: false
  show_name: true
  show_label: true
  show_icon: true
  color_type: card

  icon: |
    [[[
      const kind = String(variables.kind ?? '').trim().toLowerCase();
      if (kind === 'tendance_24h') return 'mdi:chart-line';
      if (kind === 'global') return 'mdi:tune-variant';
      if (kind === 'froid') return 'mdi:snowflake-thermometer';
      return 'mdi:help-circle-outline';
    ]]]

  label: |
    [[[
      const UNAV = ['unknown','unavailable',undefined,null,'none',''];
      const kind = String(variables.kind ?? '').trim().toLowerCase();

      const num = (id) => {
        const s = states[id]?.state;
        if (UNAV.includes(s)) return null;
        const v = parseFloat(s);
        return Number.isNaN(v) ? null : v;
      };

      const r = (v, d=1) => (Math.round(v * (10**d)) / (10**d)).toFixed(d);

      const e24 = num('sensor.ecart_consigne_moyenne_24h');
      const ef  = num('sensor.ecart_consigne_moyenne_froid');
      const ed  = num('sensor.ecart_consigne_moyenne_doux');

      if (kind === 'tendance_24h') {
        if (e24 === null) return "Indisponible";
        const status =
          (e24 > 0.4) ? 'Trop chaud' :
          (e24 < -0.4) ? 'Trop froid' :
          'Satisfaisant';
        return `${r(e24)}°C • ${status}`;
      }

      if (kind === 'global') {
        if (ef === null || ed === null) return "Indisponible";

        const imbalance =
          (ef < -0.5 && ed > 0.5) || (ef > 0.5 && ed < -0.5);
        const bothHot  = (ef > 0.4 && ed > 0.4);
        const bothCold = (ef < -0.4 && ed < -0.4);

        const status =
          imbalance ? 'Déséquilibre' :
          (bothHot ? 'Trop chaud' :
           bothCold ? 'Trop froid' :
           'Cohérent');

        return `${status} • Froid ${r(ef)}°C • Doux ${r(ed)}°C`;
      }

      if (kind === 'froid') {
        if (ef === null) return "Indisponible";
        const status =
          (ef < -0.5) ? 'Sous-chauffe' :
          (ef > 0.5) ? 'Sur-chauffe' :
          'Équilibré';
        return `${r(ef,2)}°C • ${status}`;
      }

      return "Indisponible";
    ]]]

  styles:
    card:
      - background-color: |
          [[[
            const UNAV = ['unknown','unavailable',undefined,null,'none',''];
            const kind = String(variables.kind ?? '').trim().toLowerCase();

            const num = (id) => {
              const s = states[id]?.state;
              if (UNAV.includes(s)) return null;
              const v = parseFloat(s);
              return Number.isNaN(v) ? null : v;
            };

            const e24 = num('sensor.ecart_consigne_moyenne_24h');
            const ef  = num('sensor.ecart_consigne_moyenne_froid');
            const ed  = num('sensor.ecart_consigne_moyenne_doux');

            const indispo = "rgba(158, 158, 158, 0.1)";
            const warn    = "rgba(255, 152, 0, 0.2)";
            const ok      = "rgba(76, 175, 80, 0.2)";

            if (kind === 'tendance_24h') {
              if (e24 === null) return indispo;
              if (e24 > 0.4 || e24 < -0.4) return warn;
              return ok;
            }

            if (kind === 'global') {
              if (ef === null || ed === null) return indispo;

              const imbalance =
                (ef < -0.5 && ed > 0.5) || (ef > 0.5 && ed < -0.5);
              const bothHot  = (ef > 0.4 && ed > 0.4);
              const bothCold = (ef < -0.4 && ed < -0.4);

              if (imbalance || bothHot || bothCold) return warn;
              return ok;
            }

            if (kind === 'froid') {
              if (ef === null) return indispo;
              if (ef > 0.5 || ef < -0.5) return warn;
              return ok;
            }

            return indispo;
          ]]]
