# ==========================================================
# 🧠 ARSENAL — TEMPLATE UI METIER
#     Chauffage — Synthèse blocage aération (XL)
# ==========================================================
#
# 📌 STATUT
#     TEMPLATE UI METIER
#
# 🎯 ROLE
#     Affiche une synthèse de l'état du verrou post-aération
#     chauffage : épisode en cours, stabilisation post-aération,
#     override opérateur, ou nominal. Inclut les temps restants
#     des timers actifs en label.
#
# 🧱 NATURE
#     - Template button-card
#     - Spécialisation de socle_status_label_xl
#     - UI uniquement (aucune décision)
#
# 🎨 SEMANTIQUE
#     - blocage + épisode en cours   -> 🔴 rouge   (aération active, chauffage suspendu)
#     - blocage + épisode terminé    -> 🟠 orange  (post-aération, stabilisation ΔT)
#     - override opérateur actif     -> 🔵 bleu    (confort forcé, hors logique aération)
#     - aucun verrou                 -> 🟢 vert    (nominal)
#     - données manquantes           -> ⚪ gris    (unavailable / unknown)
#
# 🔗 DEPENDANCES
#     - input_boolean.chauffage_blocage_aeration   : verrou chauffage actif
#     - input_boolean.aeration_episode_en_cours    : épisode d'aération en cours
#     - input_boolean.mode_confort_chauffage       : override opérateur
#     - timer.aeration_blocage                     : durée restante du blocage
#     - timer.aeration_analyse_delta_t             : durée restante analyse ΔT
#
# ⚠️ CONTRAINTES
#     - Les 3 booléens sont tous requis — un seul unavailable bascule en gris
#     - Les timers sont optionnels visuellement (affichent "—" si inactifs)
#     - La variable `diagnostic` est un objet calculé inline — ne pas surcharger
#     - Priorité : blocage_episode > blocage_post > override > ok
#
# 🧩 USAGE
#     type: custom:button-card
#     template: chauffage_synthese_blocage_aeration_xl
#     # aucune entity requise — toutes les entrées sont lues via states[]
#
# ==========================================================

chauffage_synthese_blocage_aeration_xl:
  template: socle_status_label_xl

  icon: mdi:lock-alert

  variables:
    diagnostic: |
      [[[
        const st = (id) => states[id]?.state;
        const attr = (id, a) => states[id]?.attributes?.[a];
        const UNAV = ['unknown','unavailable',undefined,null,'none',''];

        const b = st('input_boolean.chauffage_blocage_aeration');
        const e = st('input_boolean.aeration_episode_en_cours');
        const o = st('input_boolean.mode_confort_chauffage');

        const t_bloc_state = st('timer.aeration_blocage');
        const t_ana_state  = st('timer.aeration_analyse_delta_t');

        const rem_bloc = attr('timer.aeration_blocage', 'remaining');
        const rem_ana  = attr('timer.aeration_analyse_delta_t', 'remaining');

        if (UNAV.includes(b) || UNAV.includes(e) || UNAV.includes(o)) {
          return {
            type: 'indisponible',
            b, e, o,
            t_bloc_state, t_ana_state,
            rem_bloc, rem_ana
          };
        }

        const blocage  = (b === 'on');
        const episode  = (e === 'on');
        const override = (o === 'on');

        const fmt_rem = (timer_state, remaining) => {
          if (UNAV.includes(timer_state)) return "—";
          if (timer_state !== 'active') return "—";
          if (UNAV.includes(remaining)) return "—";
          return String(remaining);
        };

        const txt_bloc = fmt_rem(t_bloc_state, rem_bloc);
        const txt_ana  = fmt_rem(t_ana_state,  rem_ana);

        if (blocage && episode) {
          return {
            type: 'blocage_episode',
            state: "Suspendu",
            label: `Aération en cours\nReste: ${txt_bloc}  •  ΔT: ${txt_ana}`
          };
        }

        if (blocage && !episode) {
          return {
            type: 'blocage_post',
            state: "Stabilisation",
            label: `Post-aération\nReste: ${txt_bloc}  •  ΔT: ${txt_ana}`
          };
        }

        if (override) {
          return {
            type: 'override',
            state: "Override",
            label: "Confort forcé opérateur"
          };
        }

        return {
          type: 'ok',
          state: "OK",
          label: "Aucun verrou actif"
        };
      ]]]

  state_display: |
    [[[
      const d = variables.diagnostic;

      if (d.type === 'indisponible') return "Chauffage";
      return d.state || "Chauffage";
    ]]]

  label: |
    [[[
      const d = variables.diagnostic;

      if (d.type === 'indisponible') return "Indisponible";
      return d.label || "Indisponible";
    ]]]

  styles:
    card:
      - background-color: |
          [[[
            const d = variables.diagnostic;

            if (d.type === 'indisponible')
              return "rgba(158, 158, 158, 0.1)";

            if (d.type === 'blocage_episode')
              return "rgba(244, 67, 54, 0.2)";

            if (d.type === 'blocage_post')
              return "rgba(255, 152, 0, 0.2)";

            if (d.type === 'override')
              return "rgba(33, 150, 243, 0.2)";

            return "rgba(76, 175, 80, 0.2)";
          ]]]