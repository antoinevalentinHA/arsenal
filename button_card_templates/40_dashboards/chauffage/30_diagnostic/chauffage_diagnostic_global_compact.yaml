# ==========================================================
# 🧠 ARSENAL — TEMPLATE UI METIER
#     Chauffage — Diagnostic global compact
# ==========================================================
#
# 📌 STATUT
#     TEMPLATE UI METIER
#
# 🎯 ROLE
#     Tuile de synthèse diagnostic du chauffage : agrège programme,
#     intention calculée, raison active et état des blocages pour
#     produire un état global classifié avec icône, label et
#     couleur adaptés. Remplace un affichage markdown.
#
# 🧱 NATURE
#     - Template button-card
#     - Spécialisation de socle_diagnostic_compact
#     - UI uniquement (aucune décision)
#
# 🎨 SEMANTIQUE
#     - indisponible          -> ⚪ gris    (données absentes)
#     - blocage               -> 🔴 rouge   (verrou thermique actif)
#     - absence_protection    -> 🟠 orange  (protection thermique absence)
#     - override              -> 🔵 bleu    (confort forcé opérateur)
#     - standby               -> 🔵 bleu    (action inhibée)
#     - absence               -> 🔵 bleu    (surveillance absence)
#     - attente               -> 🔵 bleu    (attente confort, dérive surveillée)
#     - anticipation          -> 🔵 bleu    (confort différé météo)
#     - confort_ok / stable   -> 🟢 vert    (nominal)
#
# 🔗 DEPENDANCES
#     - sensor.programme_chauffage
#     - sensor.chauffage_mode_calcule
#     - sensor.chauffage_raison_calculee
#     - input_boolean.blocage_geofencing
#     - input_boolean.chauffage_inhibition_geofencing
#     - input_boolean.chauffage_standby_force
#     - input_boolean.blocage_chauffage_poele
#     - input_boolean.chauffage_blocage_aeration
#
# ⚠️ CONTRAINTES
#     - Les 3 sensors principaux sont requis — un seul unavailable bascule en gris
#     - Les booléens de blocage sont lus en complément de la raison calculée
#     - Priorité de classification : override > blocage > absence_protection
#       > standby > absence > anticipation > confort_ok > attente > stable
#     - triggers_update déclaré explicitement sur les 8 entités sources
#     - Aucune action (tap, hold désactivés)
#     - La variable `diagnostic` est un objet calculé inline — ne pas surcharger
#
# 🧩 USAGE
#     type: custom:button-card
#     template: chauffage_diagnostic_global_compact
#     # aucune entity requise — toutes les sources lues via states[]
#
# ==========================================================

chauffage_diagnostic_global_compact:
  template: socle_diagnostic_compact

  show_icon: true
  show_name: false
  show_state: true
  show_label: true
  color_type: card

  tap_action:
    action: none
  hold_action:
    action: none

  triggers_update:
    - sensor.programme_chauffage
    - sensor.chauffage_mode_calcule
    - sensor.chauffage_raison_calculee
    - input_boolean.blocage_geofencing
    - input_boolean.chauffage_inhibition_geofencing
    - input_boolean.chauffage_standby_force
    - input_boolean.blocage_chauffage_poele
    - input_boolean.chauffage_blocage_aeration

  variables:
    diagnostic: |
      [[[
        const st = (id) => states[id]?.state;
        const UNAV = ['unknown','unavailable',undefined,null,'none',''];

        const programme = st('sensor.programme_chauffage');
        const intention = st('sensor.chauffage_mode_calcule');
        const raison    = st('sensor.chauffage_raison_calculee');

        if ([programme,intention,raison].some(v => UNAV.includes(v))) {
          return { type: 'indisponible' };
        }

        const geo_arme  = st('input_boolean.blocage_geofencing') === 'on';
        const inhib     = st('input_boolean.chauffage_inhibition_geofencing') === 'on';
        const standby_b = st('input_boolean.chauffage_standby_force') === 'on';
        const poele     = st('input_boolean.blocage_chauffage_poele') === 'on';
        const aeration  = st('input_boolean.chauffage_blocage_aeration') === 'on';

        const r = raison;

        const override = (r === 'confort_force');

        const blocages_raison = [
          'blocage_poele',
          'blocage_aeration',
          'aeration_en_cours',
          'fenetre_ouverte',
          'mode_maison_vacances'
        ];

        const is_blocage_raison = blocages_raison.includes(r);
        const is_blocage = poele || aeration || is_blocage_raison;

        const is_absence_protection = (r === 'absence_protection_thermique');
        const is_standby = standby_b || (r === 'standby_force') || (r === 'autorisation_en_attente');
        const is_anticipation = (r === 'anticipation_meteo');

        if (override) {
          return { type: 'override' };
        }

        if (is_blocage) {
          return { type: 'blocage', r };
        }

        if (is_absence_protection) {
          return { type: 'absence_protection', geo_arme, inhib };
        }

        if (is_standby) {
          return { type: 'standby' };
        }

        if (r === 'absence') {
          return { type: 'absence', geo_arme, inhib };
        }

        const prog_l = (programme || '').toLowerCase();
        const intention_l = (intention || '').toLowerCase();

        if (intention_l === 'neutre' && prog_l === 'confort') {
          return { type: 'confort_ok' };
        }

        if (is_anticipation) {
          return { type: 'anticipation' };
        }

        if (intention_l === 'neutre') {
          return { type: 'attente' };
        }

        return { type: 'stable' };
      ]]]

  icon: |
    [[[
      const d = variables.diagnostic;

      if (d.type === 'override') return 'mdi:account-alert';
      if (d.type === 'blocage') return 'mdi:lock-alert';
      if (d.type === 'absence_protection') return 'mdi:shield-home';
      if (d.type === 'standby') return 'mdi:pause-circle';
      if (d.type === 'absence') return 'mdi:home-export-outline';
      if (d.type === 'anticipation') return 'mdi:weather-sunny';
      if (d.type === 'confort_ok') return 'mdi:shield-check';
      if (d.type === 'indisponible') return 'mdi:shield-off';
      return 'mdi:shield-check';
    ]]]

  state_display: |
    [[[
      const d = variables.diagnostic;

      switch (d.type) {
        case 'indisponible': return "Chauffage";
        case 'override': return "Override";
        case 'blocage': return "Bloqué";
        case 'absence_protection': return "Protection";
        case 'standby': return "Standby";
        case 'absence': return "Absence";
        case 'anticipation': return "Anticipation";
        case 'confort_ok': return "Confort OK";
        case 'attente': return "Attente";
        default: return "Stable";
      }
    ]]]

  label: |
    [[[
      const d = variables.diagnostic;

      if (d.type === 'indisponible')
        return "Données indisponibles";

      if (d.type === 'override')
        return "Confort forcé • Priorité opérateur";

      if (d.type === 'blocage')
        return "Blocage thermique • Cause active";

      if (d.type === 'absence_protection')
        return "Protection absence • Thermique";

      if (d.type === 'standby')
        return "Standby • Action inhibée";

      if (d.type === 'absence')
        return "Protection absence • Surveillance";

      if (d.type === 'anticipation')
        return "Confort différé • Météo favorable";

      if (d.type === 'confort_ok')
        return "Confort satisfait • Au repos";

      if (d.type === 'attente')
        return "Attente confort • Surveillance dérive";

      return "Cohérent contrat • Aucune action requise";
    ]]]

  styles:
    card:
      - background-color: |
          [[[
            const d = variables.diagnostic;

            // Indisponible
            // Arsenal : gris indispo unknown/unavailable
            if (d.type === 'indisponible')
              return "rgba(158, 158, 158, 0.1)";

            // Blocage / critique
            if (d.type === 'blocage')
              return "rgba(244, 67, 54, 0.2)";

            // Avertissement / dégradé
            if (d.type === 'absence_protection')
              return "rgba(255, 152, 0, 0.2)";

            // Information / technique
            if (d.type === 'override'
                || d.type === 'standby'
                || d.type === 'absence'
                || d.type === 'attente'
                || d.type === 'anticipation')
              return "rgba(33, 150, 243, 0.2)";

            // OK / nominal
            return "rgba(76, 175, 80, 0.2)";
          ]]]
