# ==========================================================
# 💧 TEMPLATE SENSORS — Humidité Relative “Seuil Bas”
# ----------------------------------------------------------
# 🎯 Objectif :
#   Déterminer le **seuil bas de confort en humidité relative (%)**
#   pour chaque zone du bâtiment, afin de détecter les conditions 
#   d’air trop sec (inconfort, irritation, électricité statique, etc.).  
#   Ce seuil est **automatiquement ajusté selon la saison et la période
#   météorologique** du moment.
#
# ⚙️ Fonctionnement :
#   - Dépend de la **période météo active** (`sensor.periode_meteo`) :
#       → `aube`, `matin`, `jour`, `crepuscule`, `nuit`
#   - Récupère la moyenne courante issue du capteur filtré :
#       → `sensor.humidite_relative_filtre_<periode>_moyenne_<zone>`
#   - Applique un **offset saisonnier adaptatif**, selon le mois :
#       - Décembre, Janvier, Février → -5 %  (air plus sec, seuil plus bas)  
#       - Mars, Avril, Octobre, Novembre → -4 %  
#       - Mai à Septembre → -3 %
#   - Calcule le seuil bas :
#       → `seuil_bas = moyenne - offset`
#
# 🧮 Logique :
#   1️⃣ Identifier la période météo active (jour, nuit, etc.).  
#   2️⃣ Récupérer la moyenne d’humidité relative correspondante.  
#   3️⃣ Déterminer l’offset saisonnier selon le mois.  
#   4️⃣ Appliquer le calcul et arrondir à 0,1 %.  
#
# 🧩 Capteurs / Zones concernées :
#   ▪️ Résidentiel :
#      - Chambre Arnaud  
#      - Chambre Matthieu  
#      - Chambre Parents  
#      - Entrée  
#      - Séjour  
#      - Cave  
#      - Garage  
#      - Petite Maison  
#      - SDB Enfants  
#      - SDB Parents  
#      - Jardin  
#      - Extérieur  
#
#   ▪️ Professionnel / Technique :
#      - Direction  
#      - Compta  
#      - Qualité  
#      - Devis  
#      - Commercial  
#      - Stock Carton  
#      - Stock PF  
#      - Komori  
#      - Bobst  
#      - Media
#
# 💡 Interprétation :
#   - Si humidité relative < Seuil Bas :
#       → Risque d’air trop sec, inconfort, besoin d’humidification.  
#   - Si humidité relative ≈ Seuil Bas :
#       → Zone de confort limite, attention à la dérive hygrométrique.  
#   - Si humidité relative > Seuil Bas :
#       → Conditions de confort acceptables.
#
# ⚠️ Remarques :
#   - L’ajustement automatique rend les seuils cohérents sur toute l’année :
#       → plus exigeant en hiver (où l’air intérieur est naturellement sec),  
#       → plus permissif en été.  
#   - Ces seuils sont essentiels pour la **gestion du confort intérieur** 
#     et la **prévention des déséquilibres hygrométriques**.  
#   - Associés aux capteurs “Humidité Relative Seuil Haut”, ils définissent 
#     un **cadre dynamique de confort hygrométrique complet**.
#
# 📊 Type : Template Sensor  
# 💧 Domaine : Hygrométrie / Confort / Santé intérieure  
# ==========================================================

- sensor:
    - name: "Humidité relative Seuil Bas Chambre Arnaud"
      unique_id: humidite_relative_seuil_bas_chambre_arnaud
      state: &humidite_relative_seuil_bas_logic >
        {% set periode = states('sensor.periode_meteo') %}
        {% set suffixe = this.entity_id | replace('sensor.humidite_relative_seuil_bas_', '') %}
        {% set moyenne = states('sensor.humidite_relative_filtre_' ~ periode ~ '_moyenne_' ~ suffixe) | float(0) %}
        {% set mois = now().month %}

        {# Offset saisonnier : plus strict en hiver #}
        {% set offset =
          5 if mois in [12, 1, 2] else
          4 if mois in [3, 4, 10, 11] else
          3 %}
        {{ (moyenne - offset) | round(1) }}

- sensor:
    - name: "Humidité relative Seuil Bas Entrée"
      unique_id: humidite_relative_seuil_bas_entree
      state: *humidite_relative_seuil_bas_logic

