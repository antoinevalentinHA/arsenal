# ==========================================================
# 🧠 ARSENAL — BINARY SENSOR (CLIM)
# ----------------------------------------------------------
# 📛 Nom :
#   Clim – Seuil extinction HEAT atteint
#
# 🎯 Rôle :
#   Indiquer si la température minimale des chambres
#   a atteint ou dépassé le seuil d'extinction HEAT
#   appliqué par le système.
#
# 🧱 Principe Arsenal :
#   - Lecture PURE
#   - Aucune temporisation
#   - Aucune action
#   - Seuil déjà calculé ailleurs
#
# 🔌 Consommé par :
#   - binary_sensor.besoin_clim_heat
#
# ⚠️ IMPORTANT :
#   - Strictement équivalent à la condition :
#       temperature_min_chambres >= seuil_extinction_chauffage_clim
# ==========================================================

- binary_sensor:
    - name: "Clim – Seuil extinction HEAT atteint"
      unique_id: clim_seuil_extinction_heat_atteint
      default_entity_id: binary_sensor.clim_seuil_extinction_heat_atteint
      state: >
        {% set consigne = states('sensor.temperature_consigne_appliquee_locale') | float(20) %}
        {% set offset_off = states('input_number.clim_offset_off') | float(0.5) %}
        {{ (consigne - offset_off) | round(1) }}