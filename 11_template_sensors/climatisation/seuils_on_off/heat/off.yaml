# ==========================================================
# 🌡️ TEMPLATE SENSOR — Seuil extinction chauffage clim
# ----------------------------------------------------------
# 💡 Objectif :
#   Calculer le seuil de température à partir duquel le chauffage
#   (mode HEAT de la climatisation) doit s’éteindre.
#
# ⚙️ Fonctionnement :
#   - Base : sensor.temperature_de_consigne_appliquee_locale
#   - Ajustement : ajout de input_number.clim_offset_off
#   - Résultat : consigne + offset_off
#
# 🧠 Détails techniques :
#   - Unité : °C
#   - Icône : mdi:thermometer-chevron-up
# ==========================================================

- sensor:
    - name: "Seuil extinction chauffage clim"
      unique_id: seuil_extinction_chauffage_clim
      unit_of_measurement: "°C"
      icon: mdi:thermometer-chevron-up
      state: >
        {% set consigne = states('sensor.temperature_de_consigne_appliquee_locale') | float(20) %}
        {% set offset_off = states('input_number.clim_offset_off') | float(0.5) %}
        {{ (consigne + offset_off) | round(1) }}
