# ==========================================================
# 🧠 ARSENAL — BINARY SENSOR (CLIM)
# ----------------------------------------------------------
# 📛 Nom :
#   Clim — Blocage horaire réel
#
# 🎯 Rôle :
#   Exprimer la vérité métier du blocage horaire
#   à l'instant T, à partir des réglages opérateur.
#
# 🧱 Principe Arsenal :
#   - Synthèse PURE de réglages amont
#   - Calculé en continu
#   - Aucun état persistant
#   - Aucune action
#
# 🔌 Dépendances STRICTES :
#   - input_boolean.clim_blocage_horaire_actif  (activation)
#   - input_datetime.clim_heure_blocage_autom_on
#   - input_datetime.clim_heure_blocage_autom_off
#
# 🧠 Logique :
#   - ON  si blocage activé ET heure courante dans la plage
#   - OFF sinon
#
# 📤 Consommé par :
#   - binary_sensor.autorisation_clim_cool
#   - binary_sensor.autorisation_clim_dry
#   - binary_sensor.autorisation_clim_heat
# ==========================================================

- binary_sensor:
    - name: "Clim blocage horaire réel"
      unique_id: clim_blocage_horaire_reel
      default_entity_id: binary_sensor.clim_blocage_horaire_reel
      state: >
        {% set blocage_active =
             is_state('input_boolean.clim_blocage_horaire_actif', 'on') %}
        {% set h_on  = states('input_datetime.clim_heure_blocage_autom_on')[:5] %}
        {% set h_off = states('input_datetime.clim_heure_blocage_autom_off')[:5] %}
        {% set now_h = now().strftime('%H:%M') %}

        {% if blocage_active and h_on and h_off %}
          {{ (h_on <= now_h < h_off)
             if (h_on < h_off)
             else (now_h >= h_on or now_h < h_off) }}
        {% else %}
          false
        {% endif %}
      icon: >
        mdi:clock-lock-outline