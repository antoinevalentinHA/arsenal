# ==========================================================
# ❄️ TEMPLATE SENSOR — Fujitsu Airstage “Âge des Données” (local)
# ----------------------------------------------------------
# 🎯 Objectif :
#   Mesurer l’ancienneté des données **locales** de la climatisation
#   Fujitsu Airstage, afin de détecter toute interruption de mise à jour
#   ou perte de communication locale (Zigbee / intégration Airstage).
#
# ⚙️ Fonctionnement :
#   - Source principale :
#       → `sensor.clim_mode_local`
#
#   - Principe :
#       1️⃣ Récupère `last_updated` du capteur maître.  
#       2️⃣ Calcule le temps écoulé (minutes) depuis cette mise à jour.  
#       3️⃣ Plafonne à **300 minutes** max.  
#       4️⃣ Si indisponible → conserve la dernière valeur connue (fallback = 999).
#
# 💡 Interprétation :
#   - 0 à 10 min  → ✅ Données récentes, communication active  
#   - 10 à 60 min → ⚠️ Données vieillissantes  
#   - > 60 min    → 🔴 Données figées ou perte de lien local
#
# 📊 Type : Template Sensor  
# ⏱️ Unité : Minutes  
# 🌬️ Domaine : Climatisation / Diagnostic local  
# ==========================================================

- sensor:
    - name: "Fujitsu Age Donnees"
      unique_id: fujitsu_age_donnees
      unit_of_measurement: "min"
      icon: mdi:air-conditioner

      state: >
        {% set ent = 'sensor.clim_mode_local' %}
        {% if states(ent) not in ['unknown', 'unavailable'] %}
          {% set age = (now() - states[ent].last_updated).total_seconds() / 60 %}
          {{ [age, 300] | min | round(0) }}
        {% else %}
          {{ states(this.entity_id) | float(999) }}
        {% endif %}
