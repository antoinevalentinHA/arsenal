# ==========================================================
# 🕒 TEMPLATE SENSOR — ViCare : Âge des données
# ----------------------------------------------------------
# 💡 Objectif :
#   Mesurer l’ancienneté (en minutes) des dernières données
#   issues des capteurs du groupe `group.vicare_capteurs`.
#
# ⚙️ Fonctionnement :
#   - Récupère toutes les entités du groupe ViCare.
#   - Ignore les états `unknown` ou `unavailable`.
#   - Identifie la dernière mise à jour valide (`last_updated`).
#   - Calcule le temps écoulé depuis cette mise à jour (en minutes).
#   - La valeur est plafonnée à 300 minutes maximum.
#   - Si aucun capteur valide n’est disponible :
#       → conserve la dernière valeur connue (fallback = 999).
#
# 🧠 Détails techniques :
#   - Unité : minutes
#   - Domaine : Template Sensor
#   - Source : group.vicare_capteurs
#   - Ce capteur est utilisé par le binaire `vicare_api_disponible`
#     mais n’intervient pas directement dans les automatismes.
#
# 📊 Type : Template Sensor
# 📍 Entité : sensor.vicare_age_donnees
# ==========================================================

- sensor:
    - name: "ViCare Age donnees"
      unique_id: vicare_age_donnees
      unit_of_measurement: "min"
      device_class: duration
      state: >
        {% set grp = expand('group.vicare_capteurs') %}
        {% if grp | count > 0 %}
          {% set entites = grp
              | rejectattr('state', 'in', ['unknown', 'unavailable'])
              | selectattr('last_updated', 'defined')
              | list %}
          {% if entites | count > 0 %}
            {% set last = entites | map(attribute='last_updated') | map('as_timestamp') | max %}
            {% set age = ((now().timestamp() - last) / 60) | round(0) %}
            {{ [age, 300] | min }}
          {% else %}
            {{ this.state | float(999) }}
          {% endif %}
        {% else %}
          {{ this.state | float(999) }}
        {% endif %}
      icon: >
        {% set age = states('sensor.vicare_age_donnees') | float(999) %}
        {% if age < 15 %} mdi:clock-check
        {% elif age < 60 %} mdi:clock-time-four-outline
        {% elif age < 180 %} mdi:clock-alert-outline
        {% else %} mdi:clock-alert
        {% endif %}
