# ==========================================================
# 🚗 TEMPLATE SENSOR — Audi “Âge des Données” (local)
# ----------------------------------------------------------
# 🎯 Objectif :
#   Mesurer en temps réel **l’ancienneté des données locales Audi e-tron**,
#   afin de vérifier la fraîcheur de la télémétrie et détecter toute
#   interruption de mise à jour (désynchronisation locale, bug d’intégration, etc.).
#
# ⚙️ Fonctionnement :
#   - Source unique :
#       → `sensor.audi_e_tron_derniere_mise_a_jour_local`
#
#   - Principe :
#       1️⃣ Récupère la propriété `last_updated` du capteur maître.  
#       2️⃣ Calcule la durée écoulée en minutes depuis cette mise à jour.  
#       3️⃣ Valeur plafonnée à **300 minutes (5h)** pour éviter les dérives.  
#       4️⃣ Si la donnée source est indisponible → conserve la dernière valeur connue (fallback = 999).
#
# 💡 Interprétation :
#   - 0 à 15 min  → ✅ Données récentes, télémétrie active  
#   - 15 à 60 min → ⚠️ Données vieillissantes  
#   - > 60 min    → 🔴 Données figées ou perte de communication locale
#
# 📊 Type : Template Sensor  
# ⏱️ Unité : Minutes  
# 🚘 Domaine : Télémétrie / Diagnostic / Connectivité véhicule  
# ==========================================================

- sensor:
    - name: "Audi Age Donnees"
      unique_id: audi_age_donnees
      unit_of_measurement: "min"
      icon: mdi:car-clock

      state: >
        {% set ent = 'sensor.audi_e_tron_derniere_mise_a_jour_local' %}
        {% if states(ent) not in ['unknown', 'unavailable'] %}
          {% set age = (now() - states[ent].last_updated).total_seconds() / 60 %}
          {{ [age, 300] | min | round(0) }}
        {% else %}
          {{ states(this.entity_id) | float(999) }}
        {% endif %}
