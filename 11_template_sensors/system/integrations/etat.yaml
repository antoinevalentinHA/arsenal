      state: >
        {{ (states('sensor.petite_maison_cumulus_age_donnees') | int(999)) >= 90 }}

    - name: "Retour OK — Overkiz"
      unique_id: retour_ok_overkiz
      default_entity_id: binary_sensor.retour_ok_overkiz
      delay_on: *age_ok_delay
      state: >
        {{
          is_state('binary_sensor.recovery_en_cours_overkiz', 'on')
