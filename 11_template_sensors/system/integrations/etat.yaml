# ==========================================================
#  🧠 ARSENAL — TEMPLATE BINARY SENSORS
#     Age des donnees — ETATS METIER (gel / retour ok)
# ----------------------------------------------------------
#  🎯 ROLE
#     Stabiliser les triggers des automations de resilience :
#       - gel_avere       : incident confirme (debounce)
#       - recovery_en_cours : contexte incident (timer backoff actif)
#       - retour_ok       : retour donnees fraiches, uniquement si recovery_en_cours
#
#  ✅ PRINCIPE
#     - Les automations ne doivent plus declencher sur numeric_state + for
#       mais sur transition d'etat (off -> on) de ces binary_sensors.
#
#  🧱 NOTE
#     - Fichier monolithique requis si usage d'ancres YAML.
# ==========================================================

- binary_sensor:

    # -------------------------
    # Constantes (ancres)
    # -------------------------
    - name: "_internal_dummy_anchor_holder"
      unique_id: age_donnees_internal_dummy_anchor_holder
      state: >
        {{ false }}
      attributes:
        _age_ok_delay: &age_ok_delay "00:02:00"
        _age_gel_delay_5: &age_gel_delay_5 "00:05:00"
        _age_gel_delay_10: &age_gel_delay_10 "00:10:00"

    # ==========================================================
    # AUDI
    # ==========================================================

    - name: "Recovery en cours — Audi"
      unique_id: recovery_en_cours_audi
      default_entity_id: binary_sensor.recovery_en_cours_audi
      state: >
        {{ is_state('timer.audi_reload_backoff', 'active') }}

    - name: "Gel avéré — Audi"
      unique_id: gel_avere_audi
      default_entity_id: binary_sensor.gel_avere_audi
      delay_on: *age_gel_delay_10
      state: >
        {{ (states('sensor.audi_age_donnees') | int(999)) >= 120 }}

    - name: "Retour OK — Audi"
      unique_id: retour_ok_audi
      default_entity_id: binary_sensor.retour_ok_audi
      delay_on: *age_ok_delay
      state: >
        {{
          is_state('binary_sensor.recovery_en_cours_audi', 'on')
          and (states('sensor.audi_age_donnees') | int(999)) < 10
        }}

    # ==========================================================
    # OVERKIZ (PETITE MAISON — CUMULUS)
    # ==========================================================

    - name: "Recovery en cours — Overkiz"
