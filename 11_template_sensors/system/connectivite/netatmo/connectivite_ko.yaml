# ==========================================================
# 📡 ARSENAL — BINARY SENSOR (triggered)
#     Netatmo — Connectivite KO
# ----------------------------------------------------------
# 🧠 Rôle :
#   Détecter si au moins un equipement Netatmo n'est plus
#   joignable.
#
# 🎯 Critère :
#   - reachability = False
#
# 📐 Doctrine :
#   - True         → OK
#   - False        → KO
#   - unknown      → neutre (boot)
#   - unavailable  → KO
# ==========================================================
- trigger:
    - platform: state
      entity_id: input_boolean.systeme_stable
      to: "on"
    - platform: state
      entity_id:
        - sensor.chambre_arnaud_reachability
        - sensor.chambre_matthieu_reachability
        - sensor.pluviometre_reachability
        - sensor.bobst_102_reachability
        - sensor.bobst_102_exterieur_so_reachability
        - sensor.komori_reachability
        - sensor.komori_exterieur_no_reachability
        - sensor.media_reachability
        - sensor.chambre_parents_reachability
        - sensor.entree_reachability
        - sensor.jardin_2_reachability
        - sensor.jardin_1_reachability
        - sensor.petite_maison_reachability
        - sensor.sejour_reachability

  binary_sensor:
    - name: "Netatmo – Connectivite KO"
      unique_id: netatmo_connectivite_ko

      state: >
        {% set entites = state_attr('group.netatmo_reachability_all', 'entity_id') or [] %}
        {% set ns = namespace(ko=false) %}

        {% for e in entites %}
          {% set s = states(e) %}
          {% if s == 'false' or s == 'False' or s == 'unavailable' %}
            {% set ns.ko = true %}
          {% endif %}
        {% endfor %}

        {{ ns.ko }}

      attributes:
        ko: >
          {% set entites = state_attr('group.netatmo_reachability_all', 'entity_id') or [] %}
          {% set ns = namespace(items=[]) %}

          {% for e in entites %}
            {% set s = states(e) %}
            {% if s == 'false' or s == 'False' or s == 'unavailable' %}
              {% set ns.items = ns.items + [e ~ ' -> ' ~ s] %}
            {% endif %}
          {% endfor %}

          {{ ns.items }}