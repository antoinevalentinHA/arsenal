# ==========================================================
#  Arsenal — SENSOR : Diagnostic Netatmo
# ----------------------------------------------------------
#  Rôle :
#    Diagnostiquer l'état global de chaque station Netatmo
#    pour décision éventuelle d'action lourde.
#
#  États possibles :
#    ok          → au moins une preuve de vie numérique
#    ko_homekit  → aucune preuve de vie, mais ping station OK
#    ko_reseau   → aucune preuve de vie, ping station KO
#
#  Règles contractuelles :
#    - toute preuve de vie numérique suffit
#    - le jardin reste une sonde rapide documentaire
#      sans aucun poids logique spécifique
#    - le ping n'intervient qu'en second niveau
#      après échec de toutes les preuves de vie
#    - sélection positive uniquement :
#      une preuve de vie est valide si son état
#      est numériquement interprétable
#
#  Contraintes :
#    - seules des entités sensor à état numérique
#      continu figurent dans les preuves de vie
#    - aucun binary_sensor, input_boolean ou état
#      textuel discret ne doit être ajouté à cette liste
#      sans révision explicite du contrat
# ==========================================================

- sensor:
    - name: "diagnostic_netatmo_arnaud"
      unique_id: diagnostic_netatmo_arnaud
      state: >
        {% set preuve_de_vie =
             states('sensor.temperature_chambre_arnaud_1') | float(default=none) is not none
             or states('sensor.temperature_chambre_parents_1') | float(default=none) is not none
             or states('sensor.temperature_jardin_1') | float(default=none) is not none
             or states('sensor.temperature_petite_maison') | float(default=none) is not none
             or states('sensor.temperature_sejour_1') | float(default=none) is not none
             or states('sensor.humidite_relative_chambre_arnaud_1') | float(default=none) is not none
             or states('sensor.humidite_relative_chambre_parents_1') | float(default=none) is not none
             or states('sensor.humidite_relative_jardin_1') | float(default=none) is not none
             or states('sensor.humidite_relative_petite_maison') | float(default=none) is not none
             or states('sensor.humidite_relative_sejour_1') | float(default=none) is not none
             or states('sensor.co2_chambre_arnaud') | float(default=none) is not none
             or states('sensor.co2_chambre_parents') | float(default=none) is not none
             or states('sensor.co2_petite_maison') | float(default=none) is not none
             or states('sensor.co2_sejour') | float(default=none) is not none
             or states('sensor.bruit_chambre_arnaud') | float(default=none) is not none %}
        {% if preuve_de_vie %}
        ok
        {% elif is_state('binary_sensor.station_meteo_netatmo_1', 'on') %}
        ko_homekit
        {% else %}
        ko_reseau
        {% endif %}

    - name: "diagnostic_netatmo_matthieu"
      unique_id: diagnostic_netatmo_matthieu
      state: >
        {% set preuve_de_vie =
             states('sensor.temperature_chambre_matthieu_1') | float(default=none) is not none
             or states('sensor.temperature_entree_1') | float(default=none) is not none
             or states('sensor.temperature_jardin_2') | float(default=none) is not none
             or states('sensor.humidite_relative_chambre_matthieu_1') | float(default=none) is not none
             or states('sensor.humidite_relative_entree_1') | float(default=none) is not none
             or states('sensor.humidite_relative_jardin_2') | float(default=none) is not none
             or states('sensor.co2_chambre_matthieu') | float(default=none) is not none
             or states('sensor.co2_entree') | float(default=none) is not none
             or states('sensor.bruit_chambre_matthieu') | float(default=none) is not none %}
        {% if preuve_de_vie %}
        ok
        {% elif is_state('binary_sensor.station_meteo_netatmo_2', 'on') %}
        ko_homekit
        {% else %}
        ko_reseau
        {% endif %}