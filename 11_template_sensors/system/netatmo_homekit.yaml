# ==========================================================
#  Arsenal — SENSOR : Diagnostic Netatmo
# ----------------------------------------------------------
#  États possibles :
#    ok          → température numérique reçue
#    ko_reseau   → station injoignable (ping != 'on')
#    ko_homekit  → ping ok mais pas de température
#
#  Logique :
#    - availability gate sur température uniquement
#      (fail-safe : ping peut rester unavailable plus longtemps)
#    - ping == 'on' est la seule preuve réseau OK
#      (tout autre état → ko_reseau)
#
#  Sources :
#    Arnaud   : sensor.temperature_jardin_1
#               binary_sensor.station_meteo_netatmo_1
#    Matthieu : sensor.temperature_jardin_2
#               binary_sensor.station_meteo_netatmo_2
# ==========================================================

- sensor:
    - name: "diagnostic_netatmo_arnaud"
      unique_id: diagnostic_netatmo_arnaud
      state: >
        {% set temperature_ok = states('sensor.temperature_jardin_1') | float(default=none) is not none %}
        {% set reseau_ok = is_state('binary_sensor.station_meteo_netatmo_1', 'on') %}
        {% if temperature_ok %}
          ok
        {% elif reseau_ok %}
          ko_homekit
        {% else %}
          ko_reseau
        {% endif %}

    - name: "diagnostic_netatmo_matthieu"
      unique_id: diagnostic_netatmo_matthieu
      state: >
        {% set temperature_ok = states('sensor.temperature_jardin_2') | float(default=none) is not none %}
        {% set reseau_ok = is_state('binary_sensor.station_meteo_netatmo_2', 'on') %}
        {% if temperature_ok %}
          ok
        {% elif reseau_ok %}
          ko_homekit
        {% else %}
          ko_reseau
        {% endif %}