# ==========================================================
# 🧠 ARSENAL — BINARY SENSOR
#     Intégrité paramètres — ECS
# ==========================================================

- binary_sensor:
    - name: "ECS — Paramètres invalides"
      unique_id: parametres_invalides_ecs
      default_entity_id: binary_sensor.parametres_invalides_ecs
      state: >
        {{
          not (
            states('input_datetime.heure_fin_bouclage_ecs') not in ['unknown', 'unavailable', 'none', '']
            and states('input_datetime.heure_debut_bouclage_ecs') not in ['unknown', 'unavailable', 'none', '']
            and states('input_datetime.heure_fin_bouclage_ecs')[0:5]
              > states('input_datetime.heure_debut_bouclage_ecs')[0:5]
          )
        }}
      icon: >
        mdi:alert-circle-outline
      attributes:

        incoherence_horaire_bouclage: >
          {{
            not (
              states('input_datetime.heure_fin_bouclage_ecs') not in ['unknown', 'unavailable', 'none', '']
              and states('input_datetime.heure_debut_bouclage_ecs') not in ['unknown', 'unavailable', 'none', '']
              and states('input_datetime.heure_fin_bouclage_ecs')[0:5]
                > states('input_datetime.heure_debut_bouclage_ecs')[0:5]
            )
          }}