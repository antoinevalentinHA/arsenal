# ==========================================================
# 🧠 ARSENAL — BINARY SENSOR
#     Intégrité paramètres — Alarme
# ==========================================================

- binary_sensor:
    - name: "Alarme — Paramètres invalides"
      unique_id: parametres_invalides_alarme
      default_entity_id: binary_sensor.parametres_invalides_alarme
      state: >
        {{
          not (
            states('input_datetime.visiteur_start')
              < states('input_datetime.visiteur_end')
          )
        }}
      icon: >
        mdi:alert-circle-outline
      attributes:

        plage_visiteur_invalide: >
          {{
            not (
              states('input_datetime.visiteur_start')
                < states('input_datetime.visiteur_end')
            )
          }}