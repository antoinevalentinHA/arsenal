# ==========================================================
# 🧠 ARSENAL — BINARY SENSOR
#     Intégrité paramètres — Éclairage
# ----------------------------------------------------------
# 🎯 ROLE
#   Signaler qu'au moins un paramètre temporel d'éclairage
#   est invalide.
#
# ----------------------------------------------------------
# 🧱 PRINCIPE
#
#   Le capteur passe à on si au moins une fenêtre horaire
#   configurée est incohérente :
#
#     - heure debut >= heure fin
#
#   Le détail des incohérences est exposé dans les attributs.
#
# ----------------------------------------------------------
# 📍 ENTITE
#   binary_sensor.parametres_invalides_eclairage
# ==========================================================

- binary_sensor:
    - name: "Éclairage — Paramètres invalides"
      unique_id: parametres_invalides_eclairage
      default_entity_id: binary_sensor.parametres_invalides_eclairage

      state: >
        {{
          not (
            states('input_datetime.heure_allumage_jardin_matin')
              < states('input_datetime.heure_extinction_jardin_matin_fixe')
          and
            states('input_datetime.debut_cycle_simulation_presence_matin_chambre_parents')
              < states('input_datetime.fin_cycle_simulation_presence_matin_chambre_parents')
          and
            states('input_datetime.debut_cycle_simulation_presence_soir_chambre_parents')
              < states('input_datetime.fin_cycle_simulation_presence_soir_chambre_parents')
          and
            states('input_datetime.debut_cycle_simulation_presence_matin_garage')
              < states('input_datetime.fin_cycle_simulation_presence_matin_garage')
          and
            states('input_datetime.debut_cycle_simulation_presence_soir_garage')
              < states('input_datetime.fin_cycle_simulation_presence_soir_garage')
          and
            states('input_datetime.debut_cycle_simulation_presence_matin_entree')
              < states('input_datetime.fin_cycle_simulation_presence_matin_entree')
          and
            states('input_datetime.debut_cycle_simulation_presence_soir_entree')
              < states('input_datetime.fin_cycle_simulation_presence_soir_entree')
          )
        }}

      icon: >
        mdi:alert-circle-outline

      attributes:
        jardin_matin_invalide: >
          {{
            not (
              states('input_datetime.heure_allumage_jardin_matin')
                < states('input_datetime.heure_extinction_jardin_matin_fixe')
            )
          }}

        simulation_presence_matin_chambre_parents_invalide: >
          {{
            not (
              states('input_datetime.debut_cycle_simulation_presence_matin_chambre_parents')
                < states('input_datetime.fin_cycle_simulation_presence_matin_chambre_parents')
            )
          }}

        simulation_presence_soir_chambre_parents_invalide: >
          {{
            not (
              states('input_datetime.debut_cycle_simulation_presence_soir_chambre_parents')
                < states('input_datetime.fin_cycle_simulation_presence_soir_chambre_parents')
            )
          }}

        simulation_presence_matin_garage_invalide: >
          {{
            not (
              states('input_datetime.debut_cycle_simulation_presence_matin_garage')
                < states('input_datetime.fin_cycle_simulation_presence_matin_garage')
            )
          }}

        simulation_presence_soir_garage_invalide: >
          {{
            not (
              states('input_datetime.debut_cycle_simulation_presence_soir_garage')
                < states('input_datetime.fin_cycle_simulation_presence_soir_garage')
            )
          }}

        simulation_presence_matin_entree_invalide: >
          {{
            not (
              states('input_datetime.debut_cycle_simulation_presence_matin_entree')
                < states('input_datetime.fin_cycle_simulation_presence_matin_entree')
            )
          }}

        simulation_presence_soir_entree_invalide: >
          {{
            not (
              states('input_datetime.debut_cycle_simulation_presence_soir_entree')
                < states('input_datetime.fin_cycle_simulation_presence_soir_entree')
            )
          }}