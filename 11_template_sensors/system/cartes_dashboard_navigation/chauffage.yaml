# ==========================================================
#  TEMPLATE SENSOR : État Dashboard – Chauffage
# ----------------------------------------------------------
#  🧠 Rôle :
#     Fournir un état visuel unique destiné aux dashboards.
#
#  🎯 États possibles :
#     - alert    → brûleur actif
#     - confort  → programme Confort
#     - eco      → programme Eco
#     - off      → programme Off ou état non qualifié
# ==========================================================

- sensor:

    - name: "etat_chauffage_dashboard"
      unique_id: etat_chauffage_dashboard
      state: >
        {% set bruleur = states('binary_sensor.bruleur_chauffage_actif') %}
        {% set prog = states('sensor.programme_chauffage') %}

        {% if bruleur == 'on' %}
          alert
        {% elif prog == 'Confort' %}
          confort
        {% elif prog in ['Eco', 'Éco'] %}
          eco
        {% elif prog == 'Off' %}
          off
        {% else %}
          off
        {% endif %}