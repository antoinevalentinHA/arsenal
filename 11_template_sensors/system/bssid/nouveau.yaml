# ==========================================================
# 📶 ARSENAL — TEMPLATE BINARY SENSOR
#     Wi-Fi — Nouveau BSSID maison détecté
# ----------------------------------------------------------
# 🎯 ROLE
#
#     Détecter les BSSID Wi-Fi inconnus du référentiel maison,
#     uniquement depuis les sources individuellement éligibles.
#
# 🧩 PRINCIPE CONTRACTUEL
#
#     Cohérence source ↔ personne :
#     - téléphone Antoine  → person.valentin
#     - téléphone Constance → person.constance
#
#     Aucun BSSID ne peut être candidat si la personne couplée
#     à sa source n'est pas dans 'Maison securite'.
#
# 🚫 NE FAIT PAS
#
#     - Ne modifie pas le référentiel
#     - Ne décide pas de la présence maison
#     - Ne fusionne jamais avant filtrage source/personne
#
# 📐 CONTRAT
#
#     CONTRAT_BSSID_MAISON.md
#
# ==========================================================

- binary_sensor:

    - name: "Wi-Fi nouveau BSSID"
      unique_id: wifi_nouveau_bssid

      state: >
        {% set raw_maison = states('input_text.bssid_maison') | string %}
        {% set ns = namespace(maison=[], candidats=[]) %}

        {% for item in raw_maison.split(',') %}
          {% set b = item | trim | lower | replace(':', '') | replace('-', '') %}
          {% if b | length == 12 and b | regex_match('^[0-9a-f]{12}$') %}
            {% set ns.maison = ns.maison + [b] %}
          {% endif %}
        {% endfor %}

        {% if states('person.valentin') == 'Maison securite' %}
          {% set b = states('sensor.telephone_antoine_bssid_dynamic') | string | trim | lower | replace(':', '') | replace('-', '') %}
          {% if b | length == 12 and b | regex_match('^[0-9a-f]{12}$') and b not in ns.maison %}
            {% set ns.candidats = ns.candidats + [b] %}
          {% endif %}
        {% endif %}

        {% if states('person.constance') == 'Maison securite' %}
          {% set b = states('sensor.telephone_constance_bssid_dynamic') | string | trim | lower | replace(':', '') | replace('-', '') %}
          {% if b | length == 12 and b | regex_match('^[0-9a-f]{12}$') and b not in ns.maison and b not in ns.candidats %}
            {% set ns.candidats = ns.candidats + [b] %}
          {% endif %}
        {% endif %}

        {{ ns.candidats | length > 0 }}

      attributes:

        candidats: >
          {% set raw_maison = states('input_text.bssid_maison') | string %}
          {% set ns = namespace(maison=[], candidats=[]) %}

          {% for item in raw_maison.split(',') %}
            {% set b = item | trim | lower | replace(':', '') | replace('-', '') %}
            {% if b | length == 12 and b | regex_match('^[0-9a-f]{12}$') %}
              {% set ns.maison = ns.maison + [b] %}
            {% endif %}
          {% endfor %}

          {% if states('person.valentin') == 'Maison securite' %}
            {% set b = states('sensor.telephone_antoine_bssid_dynamic') | string | trim | lower | replace(':', '') | replace('-', '') %}
            {% if b | length == 12 and b | regex_match('^[0-9a-f]{12}$') and b not in ns.maison %}
              {% set ns.candidats = ns.candidats + [b] %}
            {% endif %}
          {% endif %}

          {% if states('person.constance') == 'Maison securite' %}
            {% set b = states('sensor.telephone_constance_bssid_dynamic') | string | trim | lower | replace(':', '') | replace('-', '') %}
            {% if b | length == 12 and b | regex_match('^[0-9a-f]{12}$') and b not in ns.maison and b not in ns.candidats %}
              {% set ns.candidats = ns.candidats + [b] %}
            {% endif %}
          {% endif %}

          {{ ns.candidats | sort | join(', ') }}

        candidats_antoine: >
          {% set raw_maison = states('input_text.bssid_maison') | string %}
          {% set ns = namespace(maison=[], candidats=[]) %}

          {% for item in raw_maison.split(',') %}
            {% set b = item | trim | lower | replace(':', '') | replace('-', '') %}
            {% if b | length == 12 and b | regex_match('^[0-9a-f]{12}$') %}
              {% set ns.maison = ns.maison + [b] %}
            {% endif %}
          {% endfor %}

          {% if states('person.valentin') == 'Maison securite' %}
            {% set b = states('sensor.telephone_antoine_bssid_dynamic') | string | trim | lower | replace(':', '') | replace('-', '') %}
            {% if b | length == 12 and b | regex_match('^[0-9a-f]{12}$') and b not in ns.maison %}
              {% set ns.candidats = ns.candidats + [b] %}
            {% endif %}
          {% endif %}

          {{ ns.candidats | sort | join(', ') }}

        candidats_constance: >
          {% set raw_maison = states('input_text.bssid_maison') | string %}
          {% set ns = namespace(maison=[], candidats=[]) %}

          {% for item in raw_maison.split(',') %}
            {% set b = item | trim | lower | replace(':', '') | replace('-', '') %}
            {% if b | length == 12 and b | regex_match('^[0-9a-f]{12}$') %}
              {% set ns.maison = ns.maison + [b] %}
            {% endif %}
          {% endfor %}

          {% if states('person.constance') == 'Maison securite' %}
            {% set b = states('sensor.telephone_constance_bssid_dynamic') | string | trim | lower | replace(':', '') | replace('-', '') %}
            {% if b | length == 12 and b | regex_match('^[0-9a-f]{12}$') and b not in ns.maison %}
              {% set ns.candidats = ns.candidats + [b] %}
            {% endif %}
          {% endif %}

          {{ ns.candidats | sort | join(', ') }}

        sources_eligibles: >
          {% set ns = namespace(sources=[]) %}

          {% if states('person.valentin') == 'Maison securite' %}
            {% set ns.sources = ns.sources + ['antoine'] %}
          {% endif %}

          {% if states('person.constance') == 'Maison securite' %}
            {% set ns.sources = ns.sources + ['constance'] %}
          {% endif %}

          {{ ns.sources | sort | join(', ') }}

        sources_inertes: >
          {% set ns = namespace(sources=[]) %}

          {% if states('person.valentin') != 'Maison securite' %}
            {% set ns.sources = ns.sources + ['antoine'] %}
          {% endif %}

          {% if states('person.constance') != 'Maison securite' %}
            {% set ns.sources = ns.sources + ['constance'] %}
          {% endif %}

          {{ ns.sources | sort | join(', ') }}