# ==========================================================
# 📶 TEMPLATE BINARY SENSOR — Nouveau BSSID Wi-Fi détecté
#
# ----------------------------------------------------------
#  🎯 RÔLE
#
#     Détecter si un téléphone est connecté à un BSSID
#     non présent dans le référentiel maison.
#
#     Expose les BSSID inconnus comme candidats
#     à l'apprentissage, en format canonique CSV (§6).
#
#  🚫 NE FAIT PAS
#     - N'évalue pas la présence sécurité
#     - Ne modifie pas le référentiel
#     - Ne prend aucune décision de sécurité
#
#  🧩 PRINCIPE
#     - Normalisation canonique des BSSID observés (§6)
#     - Comparaison avec input_text.bssid_maison
#     - state : on  → au moins un BSSID inconnu observé
#     - state : off → tous les BSSID observés sont connus
#
#  📤 ATTRIBUT
#     candidats : chaîne CSV des BSSID inconnus, format canonique
#                 ex. "3460f9386080, a1b2c3d4e5f6"
#                 chaîne vide si aucun candidat
#
#  📐 CONTRAT
#     CONTRAT_BSSID_MAISON.md
#
# ==========================================================

- binary_sensor:

    - name: "Wi-Fi nouveau BSSID"
      unique_id: wifi_nouveau_bssid

      state: >
        {# --- Référentiel maison — normalisation canonique (§6) --- #}
        {% set raw_maison = states('input_text.bssid_maison') | string %}
        {% set ns = namespace(maison=[]) %}
        {% for item in raw_maison.split(',') %}
          {% set b = item | trim | lower | replace(':', '') | replace('-', '') %}
          {% if b | length == 12 and b | regex_match('^[0-9a-f]{12}$') %}
            {% set ns.maison = ns.maison + [b] %}
          {% endif %}
        {% endfor %}

        {# --- BSSID observés — normalisation canonique (§6) --- #}
        {% set raw_antoine   = states('sensor.telephone_antoine_bssid_dynamic')   | trim | lower | replace(':', '') | replace('-', '') %}
        {% set raw_constance = states('sensor.telephone_constance_bssid_dynamic') | trim | lower | replace(':', '') | replace('-', '') %}

        {# --- Candidats : BSSID valides et inconnus du référentiel --- #}
        {% set ns2 = namespace(candidats=[]) %}
        {% for b in [raw_antoine, raw_constance] %}
          {% if b | length == 12 and b | regex_match('^[0-9a-f]{12}$') %}
            {% if b not in ns.maison and b not in ns2.candidats %}
              {% set ns2.candidats = ns2.candidats + [b] %}
            {% endif %}
          {% endif %}
        {% endfor %}

        {{ ns2.candidats | length > 0 }}

      attributes:
        candidats: >
          {# --- Même logique que state — recalcul nécessaire (§6) --- #}
          {# HA n'offre pas de partage de variables entre state et attributes #}
          {% set raw_maison = states('input_text.bssid_maison') | string %}
          {% set ns = namespace(maison=[]) %}
          {% for item in raw_maison.split(',') %}
            {% set b = item | trim | lower | replace(':', '') | replace('-', '') %}
            {% if b | length == 12 and b | regex_match('^[0-9a-f]{12}$') %}
              {% set ns.maison = ns.maison + [b] %}
            {% endif %}
          {% endfor %}

          {% set raw_antoine   = states('sensor.telephone_antoine_bssid_dynamic')   | trim | lower | replace(':', '') | replace('-', '') %}
          {% set raw_constance = states('sensor.telephone_constance_bssid_dynamic') | trim | lower | replace(':', '') | replace('-', '') %}

          {% set ns2 = namespace(candidats=[]) %}
          {% for b in [raw_antoine, raw_constance] %}
            {% if b | length == 12 and b | regex_match('^[0-9a-f]{12}$') %}
              {% if b not in ns.maison and b not in ns2.candidats %}
                {% set ns2.candidats = ns2.candidats + [b] %}
              {% endif %}
            {% endif %}
          {% endfor %}

          {{ ns2.candidats | sort | join(', ') }}