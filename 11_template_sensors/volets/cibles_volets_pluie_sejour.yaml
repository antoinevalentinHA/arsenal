# ==========================================================
# 🧠 ARSENAL — TEMPLATE SENSOR (moteur moderne)
#     Cibles volets pluie Séjour
# ----------------------------------------------------------
# 🎯 RÔLE
#   Exposer la liste des covers séjour à fermer.
#   Protection globale : indépendant de l'état des fenêtres séjour.
#
# 🧱 ARCHITECTURE
#   - Décision uniquement (stateless, recalculable)
#   - Aucune action, aucune notification
#
# 🚫 NE FAIT PAS
#   - aucun service
#   - aucune temporisation active
#   - aucune dépendance aux contacts séjour
#
# 📐 CONTRAT
#   CONTRAT_PLUIE_VOLETS.md v2.2.1 — sections 4.2, 5.3
#   Invariant séjour : entrées = intention_pluie_forte + autorisation uniquement
# ==========================================================
- sensor:
    - name: "Cibles volets pluie Séjour"
      unique_id: cibles_volets_pluie_sejour
      icon: mdi:window-shutter
      state: >
        {% set autorise = is_state('binary_sensor.autorisation_fermeture_volets_pluie_sejour','on') %}
        {% set pluie_forte = is_state('binary_sensor.intention_pluie_forte','on') %}
        {% if autorise and pluie_forte %}
          {{ ['cover.volet_sejour_gauche', 'cover.volet_sejour_droit'] | length }}
        {% else %}
          0
        {% endif %}
      attributes:
        entity_ids: >
          {% set autorise = is_state('binary_sensor.autorisation_fermeture_volets_pluie_sejour','on') %}
          {% set pluie_forte = is_state('binary_sensor.intention_pluie_forte','on') %}
          {% if autorise and pluie_forte %}
            {{ ['cover.volet_sejour_gauche', 'cover.volet_sejour_droit'] }}
          {% else %}
            {{ [] }}
          {% endif %}
        autorisation: "{{ states('binary_sensor.autorisation_fermeture_volets_pluie_sejour') }}"
        pluie_forte: "{{ states('binary_sensor.intention_pluie_forte') }}"
