# ==========================================================
# 🧠 ARSENAL — TRIGGERED BINARY SENSOR :
#     Bouclage visiteur — Cohérence (robuste reload)
# ----------------------------------------------------------
# 🎯 RÔLE
#   Détecter une incohérence : pendant une visite, si le
#   bouclage est demandé, la prise doit être ON.
#
# ✅ Etat:
#   - ON  : cohérent
#   - OFF : incohérent (bouclage requis mais prise OFF)
#
# 🛡️ Robustesse:
#   - Si une donnée source est unknown/unavailable :
#       -> conserve l’état précédent (fallback)
# ==========================================================

- trigger:
    - platform: state
      entity_id:
        - input_boolean.visite_en_cours
        - input_boolean.bouclage_visiteur
        - switch.prise_bouclage
    - platform: homeassistant
      event: start

  binary_sensor:
    - name: "Bouclage visiteur coherent"
      unique_id: bouclage_visiteur_coherent
      icon: >
        {% set required = is_state('input_boolean.visite_en_cours','on')
            and is_state('input_boolean.bouclage_visiteur','on') %}
        {% if required and is_state('switch.prise_bouclage','off') %}
          mdi:alert-circle
        {% else %}
          mdi:check-circle
        {% endif %}

      state: >
        {% set UNAV = ['unknown','unavailable','none',''] %}
        {% set v = states('input_boolean.visite_en_cours') %}
        {% set b = states('input_boolean.bouclage_visiteur') %}
        {% set p = states('switch.prise_bouclage') %}

        {# Si une source est indispo -> on garde la valeur précédente #}
        {% if v in UNAV or b in UNAV or p in UNAV %}
          {{ this.state | default(true) }}
        {% else %}
          {% set required = (v == 'on') and (b == 'on') %}
          {% if required %}
            {{ p == 'on' }}
          {% else %}
            true
          {% endif %}
        {% endif %}

      attributes:
        bouclage_requis: >
          {{ is_state('input_boolean.visite_en_cours','on')
             and is_state('input_boolean.bouclage_visiteur','on') }}
        prise_bouclage: "{{ states('switch.prise_bouclage') }}"
        visite_en_cours: "{{ states('input_boolean.visite_en_cours') }}"
        bouclage_visiteur: "{{ states('input_boolean.bouclage_visiteur') }}"