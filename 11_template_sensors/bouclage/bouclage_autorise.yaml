# ==========================================================
# 🧠 ARSENAL — TEMPLATE BINARY SENSOR
#     Bouclage ECS — Autorisation AUTO opportuniste
# ----------------------------------------------------------
# 🎯 RÔLE
#
#     Exposer l'autorisation logique du bouclage ECS AUTO
#     selon l'activation utilisateur de l'automatisme,
#     la disponibilité thermique réelle du ballon et
#     la présence famille unifiée.
#
# 🧩 PÉRIMÈTRE
#
#     - Automatisme AUTO activé par l'utilisateur
#     - Disponibilité thermique ECS requise
#     - Présence famille requise
#     - Aucune plage horaire
#     - Aucun pilotage matériel
#
# 🔗 DÉPENDANCES
#
#     - input_boolean.bouclage_auto_active
#     - binary_sensor.ecs_disponible
#     - binary_sensor.presence_famille_unifiee
#
# 🚫 INTERDITS
#
#     - Aucun pilotage matériel
#     - Aucune logique horaire
#     - Aucune écriture dans un actionneur
#     - Aucune décision thermique ECS
#
# 🧠 STATUT
#
#     Capteur logique — Autorisation AUTO v2
# ==========================================================

- binary_sensor:
    - name: "Autorisation Bouclage ECS"
      unique_id: bouclage_autorise
      default_entity_id: binary_sensor.bouclage_autorise
      state: >
        {% set auto_active = states('input_boolean.bouclage_auto_active') %}
        {% set ecs_disponible = states('binary_sensor.ecs_disponible') %}
        {% set presence = states('binary_sensor.presence_famille_unifiee') %}
        {{ auto_active == 'on'
           and ecs_disponible == 'on'
           and presence == 'on' }}