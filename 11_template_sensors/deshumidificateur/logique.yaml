# ==========================================================
# 💧 TEMPLATE BINARY SENSOR — Démarrage recommandé du déshumidificateur (Cave)
# ----------------------------------------------------------
# 💡 Objectif :
#   Indiquer si les conditions actuelles (humidité absolue et relative)
#   rendent le démarrage du déshumidificateur **recommandé**.
#
# ⚙️ Fonctionnement :
#   - Mesures utilisées :
#       • sensor.humidite_absolue_cave
#       • sensor.humidite_relative_cave
#   - Seuils dynamiques :
#       • HA ON / OFF → sensors.humidite_absolue_cible_on_cave / off_cave
#       • RH ON / OFF → input_number.cave_rh_cible_on / off
#
# 🧠 Logique à hystérésis et mémoire d’état :
#   - ON  → si (HA ≥ HA_ON) ou (RH ≥ RH_ON)
#   - OFF → si (HA ≤ HA_OFF) ou (RH ≤ RH_OFF)
#   - Sinon → conserve l’état actuel (évite oscillations)
#
# 📊 Type : Template Binary Sensor
# 📍 Entité générée : binary_sensor.deshumidificateur_cave_demarrage_recommande
# ==========================================================

- binary_sensor:
    - name: "Deshumidificateur cave demarrage recommande"
      unique_id: deshumidificateur_cave_demarrage_recommande
      default_entity_id: binary_sensor.deshumidificateur_cave_demarrage_recommande
      device_class: running

      # --------------------------------------------------
      # 🧮 Double critère HA / RH avec hystérésis et mémoire
      # --------------------------------------------------
      state: >
        {# --- Lecture des valeurs absolues et relatives --- #}
        {% set AH     = states('sensor.humidite_absolue_cave') | float(0) %}
        {% set AH_on  = states('sensor.humidite_absolue_cible_on_cave')  | float(999) %}
        {% set AH_off = states('sensor.humidite_absolue_cible_off_cave') | float(-1) %}

        {% set RH     = states('sensor.humidite_relative_cave') | float(0) %}
        {% set RH_on  = states('input_number.cave_rh_cible_on')  | float(78) %}
        {% set RH_off = states('input_number.cave_rh_cible_off') | float(70) %}

        {# --- Mémoire d’état existante --- #}
        {% set current = is_state(this.entity_id, 'on') %}

        {# --- Conditions ON / OFF --- #}
        {% set need_on  = (AH >= AH_on) or (RH >= RH_on) %}
        {% set need_off = (AH <= AH_off) or (RH <= RH_off) %}

        {# --- Hystérésis + mémoire --- #}
        {% if need_on %}
          true
        {% elif need_off %}
          false
        {% else %}
          {{ current }}
        {% endif %}
