# ==========================================================
# 💧 TEMPLATE BINARY SENSOR — Critère de déshumidification HA Cave (avec hystérésis)
# ----------------------------------------------------------
# 💡 Objectif :
#   Indiquer si l’humidité absolue de la cave justifie
#   l’activation du déshumidificateur.
#   Ce capteur applique une logique à hystérésis :
#     • Activation quand HA ≥ seuil ON
#     • Désactivation quand HA ≤ seuil OFF
#
# ⚙️ Fonctionnement :
#   - Mesure : sensor.humidite_absolue_cave
#   - Seuils :
#       • sensor.humidite_absolue_cible_on_cave
#       • sensor.humidite_absolue_cible_off_cave
#   - L’état actuel du capteur influence la comparaison
#     (permet d’éviter les oscillations rapides ON/OFF).
#   - En cas d’indisponibilité d’une entrée, l’état courant
#     est conservé
#
# 📊 Type : Template Binary Sensor
# 📍 Entité générée : binary_sensor.critere_deshumidification_ha_cave
# ==========================================================

- binary_sensor:

    # ------------------------------------------------------
    # 💨 Critère d’activation du déshumidificateur de cave
    # ------------------------------------------------------
    - name: "Critère déshumidification HA cave"
      unique_id: critere_deshumidification_ha_cave
      device_class: moisture

      # --------------------------------------------------
      # 🧮 Hystérésis basée sur l’humidité absolue
      # --------------------------------------------------
      state: >
        {% set ha_raw = states('sensor.humidite_absolue_cave') %}
        {% set seuil_on_raw = states('sensor.humidite_absolue_cible_on_cave') %}
        {% set seuil_off_raw = states('sensor.humidite_absolue_cible_off_cave') %}

        {% set invalides = ['unknown', 'unavailable', 'none', ''] %}

        {% if ha_raw in invalides or seuil_on_raw in invalides or seuil_off_raw in invalides %}
          {{ is_state(this.entity_id, 'on') }}
        {% else %}
          {% set ha = ha_raw | float %}
          {% set seuil_on = seuil_on_raw | float %}
          {% set seuil_off = seuil_off_raw | float %}
          {% set current_on = is_state(this.entity_id, 'on') %}

          {% if current_on %}
            {{ ha > seuil_off }}
          {% else %}
            {{ ha >= seuil_on }}
          {% endif %}
        {% endif %}