# ==========================================================
# 💡 ARSENAL — BINARY SENSOR
#     Jardin (soir) – Extinction autorisée
# ----------------------------------------------------------
# 🎯 RÔLE
#
#     Capteur binaire de DÉCISION MÉTIER DE CONFORT.
#
#     Il indique si, à l’instant courant, l’extinction
#     automatique de l’éclairage du jardin le soir
#     peut être effectuée SANS rupture brutale
#     de confort pour les occupants.
#
# ----------------------------------------------------------
# 🧠 PRINCIPE
#
#     L’extinction du jardin le soir est considérée
#     comme AUTORISÉE si :
#
#       • une durée suffisante s’est écoulée
#         depuis l’allumage effectif du jardin
#
#       • aucune activité n’a été détectée
#         dans le séjour depuis un délai donné
#
#     Cette décision exprime une règle de confort humain.
#
# ----------------------------------------------------------
# 🧱 STATUT ARCHITECTURAL
#
#     - Capteur de vérité métier
#     - Déterministe
#     - Stateless
#     - Tolérant aux redémarrages Home Assistant
#
#     Ce capteur :
#       - ne déclenche aucune action
#       - ne dépend pas de l’état matériel ON/OFF
#       - est irréversible pour le cycle du soir en cours
#
# ----------------------------------------------------------
# 🧠 PORTÉE
#
#     Ce capteur :
#       - ne décide PAS de l’existence du cycle soir
#       - ne gère PAS l’arbitrage matin / soir
#       - ne définit AUCUNE priorité globale
#
#     Il exprime uniquement une autorisation
#     locale d’extinction liée au confort.
#
# ----------------------------------------------------------
# 📍 ENTITÉ
#
#     binary_sensor.lumiere_jardin_soir_extinction_autorisee
# ==========================================================

- binary_sensor:
    - name: "Lumiere jardin soir - Extinction autorisee"
      unique_id: lumiere_jardin_soir_extinction_autorisee
      default_entity_id: binary_sensor.lumiere_jardin_soir_extinction_autorisee

      icon: >
        {% if is_state(this.entity_id, 'on') %}
          mdi:lightbulb-off-outline
        {% else %}
          mdi:lightbulb-on-outline
        {% endif %}

      state: >
        {% if not is_state('input_boolean.auto_lumiere_jardin_soir', 'on') %}
          false

        {% else %}
          {# Référence temporelle fiable : ouverture du cycle soir #}
          {% set offset = states('input_number.lumiere_jardin_soir_offset_minutes') | int(0) %}
          {% set nuit = is_state('sun.sun', 'below_horizon') %}
          {% set ls = state_attr('sun.sun', 'last_setting') %}
          {% set ns = state_attr('sun.sun', 'next_setting') %}

          {% if nuit and ls is not none %}
            {% set coucher = as_local(as_datetime(ls)) %}
          {% elif ns is not none %}
            {% set coucher = as_local(as_datetime(ns)) %}
          {% else %}
            {% set coucher = none %}
          {% endif %}

          {% if coucher is none %}
            false
          {% else %}
            {% set debut_cycle = coucher + timedelta(minutes=offset) %}
            {% set duree = states('input_number.duree_lumiere_jardin_soir') | float(0) * 60 %}

            {# Activité séjour (blindée) #}
            {% set m1 = states.binary_sensor.capteur_mouvements_sejour_1_occupancy.last_changed %}
            {% set m2 = states.binary_sensor.capteur_mouvements_sejour_2_occupancy.last_changed %}
            {% set motions = [m1, m2] | select('defined') | list %}

            {% if motions | length == 0 %}
              {% set last_motion = none %}
            {% else %}
              {% set last_motion = as_local(motions | max) %}
            {% endif %}

            {% set inactivity_ok =
                 last_motion is not none
                 and (now() - last_motion).total_seconds() > 3600 %}

            {{
              now() >= (debut_cycle + timedelta(seconds=duree))
              and inactivity_ok
            }}
          {% endif %}
        {% endif %}