# ==========================================================
# 🌇 TEMPLATE SENSOR — Heure d’allumage du jardin (soir) estimée
# ----------------------------------------------------------
# 💡 Objectif :
#   Calculer dynamiquement l’heure estimée d’allumage des
#   lumières du jardin en soirée, en fonction du coucher du soleil
#   et d’un délai paramétrable par l’utilisateur.
#
# ⚙️ Fonctionnement :
#   - Source principale :
#       • sun.sun → attribut `next_setting` (prochaine heure de coucher)
#   - Paramètre utilisateur :
#       • input_number.delai_allumage_jardin_soir → décalage en minutes
#
# 🧮 Calcul :
#   Heure d’allumage estimée = coucher du soleil + délai configuré
#
# ⚠️ Gestion des erreurs :
#   - Si la valeur du coucher du soleil est indisponible ou inconnue,
#     conserve la dernière valeur connue.
#   - Si aucune valeur antérieure n’existe, renvoie "unavailable".
#
# 📈 Détails techniques :
#   - Conversion automatique en heure locale (as_local)
#   - Format de sortie : horodatage ISO 8601 (compatible `device_class: timestamp`)
#
# 📊 Type : Template Sensor
# 📍 Nom de l’entité : heure_allumage_jardin_soir_estimee
# ==========================================================

- sensor:
    - name: "Heure allumage jardin soir estimée"
      unique_id: heure_allumage_jardin_soir_estimee
      device_class: timestamp
      state: >
        {% set sunset = state_attr('sun.sun', 'next_setting') %}
        {% set delay = states('input_number.delai_allumage_jardin_soir') | float(0) %}
        {% set last = states(this.entity_id) %}
        {% if sunset not in [None, 'unknown', 'unavailable'] %}
          {{ (as_local(as_datetime(sunset)) + timedelta(minutes=delay)).isoformat() }}
        {% elif last not in ['unknown', 'unavailable', 'none', ''] %}
          {{ last }}
        {% else %}
          {{ '' }}
        {% endif %}
