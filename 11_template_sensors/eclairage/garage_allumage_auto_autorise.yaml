# ==========================================================
# 🧠 ARSENAL — TEMPLATE BINARY SENSOR
#     Garage — Allumage automatique autorise (luminosite)
# ----------------------------------------------------------
# 🎯 ROLE
#   Autorite logique unique indiquant si l’allumage
#   automatique du garage est autorise selon la
#   luminosite mesuree dans le garage.
#
#   Ce capteur :
#     - ne pilote rien
#     - sert uniquement d’autorisation pour les
#       automatisations d’eclairage du garage
#
# 📌 ENTITE
#   - binary_sensor.garage_allumage_auto_autorise
#
# 🔗 DEPENDANCES
#   - sensor.luminosite_garage_illuminance
#   - input_number.garage_seuil_luminosite_allumage_auto
#
# 🧠 PRINCIPE
#   L’allumage automatique est autorise lorsque :
#
#     luminosite_garage < seuil_reglage
#
#   Le seuil est reglable dynamiquement via l’UI.
#
# ⚠️ IMPORTANT
#   Ce capteur ne prend aucune decision temporelle
#   (jour / nuit / saison). Il repose uniquement
#   sur la luminosite physique locale.
# ==========================================================

- binary_sensor:
    - name: "Garage — Allumage auto autorise"
      unique_id: "garage_allumage_auto_autorise"

      icon: >
        {% if is_state('binary_sensor.garage_allumage_auto_autorise', 'on') %}
          mdi:lightbulb-auto
        {% else %}
          mdi:lightbulb-auto-outline
        {% endif %}

      availability: >
        {{ states('sensor.luminosite_garage_illuminance') not in ['unknown','unavailable','none','']
           and states('input_number.garage_seuil_luminosite_allumage_auto') not in ['unknown','unavailable','none',''] }}

      attributes:
        illuminance: >
          {{ states('sensor.luminosite_garage_illuminance') }}
        seuil_luminosite: >
          {{ states('input_number.garage_seuil_luminosite_allumage_auto') }}

      state: >
        {% set lux = states('sensor.luminosite_garage_illuminance') %}
        {% set seuil = states('input_number.garage_seuil_luminosite_allumage_auto') %}
        {{ lux not in ['unknown','unavailable','none','']
           and seuil not in ['unknown','unavailable','none','']
           and lux | float(9999) < seuil | float(0) }}