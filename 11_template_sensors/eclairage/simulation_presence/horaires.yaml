# ==========================================================
# 💡 TEMPLATE SENSOR — Horaires de simulation de présence
# ----------------------------------------------------------
# 🎯 Objectif :
#   Fournir une vue unifiée des horaires d’allumage utilisés
#   pour la **simulation de présence** (éclairage automatique
#   pour donner l’illusion d’une habitation occupée).
#
# ⚙️ Fonctionnement :
#   - Source des données :
#       • input_text.horaires_simulation_presence_matin
#       • input_text.horaires_simulation_presence_soir
#   - Ces champs contiennent une liste d’horaires séparés par des virgules.
#
# 🧮 Traitement :
#   - Combine les horaires du matin et du soir dans un seul attribut.
#   - Ignore les valeurs invalides :
#       (‘unknown’, ‘unavailable’, vide, ou ‘Aucun’)
#   - Si aucun horaire n’est valide → renvoie « Aucun horaire ».
#
# 🧠 Détails techniques :
#   - Utilise une variable temporaire (`namespace`) pour accumuler les valeurs.
#   - Retourne le résultat dans un attribut nommé `allumage`.
#   - L’état du capteur est fixe à `"ok"`, car l’information utile
#     réside dans les attributs.
#
# 📊 Type : Template Sensor
# 📍 Nom de l’entité : horaires_simulation_presence
# ==========================================================

- sensor:
    - name: "Horaires simulation présence"
      unique_id: horaires_simulation_presence
      state: "ok"
      attributes:
        allumage: >
          {% set matin = states('input_text.horaires_simulation_presence_matin') %}
          {% set soir = states('input_text.horaires_simulation_presence_soir') %}
          {% set ns = namespace(result=[]) %}

          {% if matin not in ['unknown', 'unavailable', '', 'Aucun'] %}
            {% for h in matin.split(', ') %}
              {% set ns.result = ns.result + [h] %}
            {% endfor %}
          {% endif %}

          {% if soir not in ['unknown', 'unavailable', '', 'Aucun'] %}
            {% for h in soir.split(', ') %}
              {% set ns.result = ns.result + [h] %}
            {% endfor %}
          {% endif %}

          {{ ns.result | join(', ') if ns.result else 'Aucun horaire' }}
