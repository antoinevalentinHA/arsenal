# ==========================================================
# 🧠 ARSENAL — TEMPLATE TRIGGERED SENSOR — DIAGNOSTIC CHAUFFAGE : INERTIE
#     Synthèse indicative — Refroidissement réel (présence)
# ----------------------------------------------------------
# Domaine : Chauffage / Diagnostic thermique / Synthèses
# Couche  : Diagnostic (texte) — UI
# Statut  : DIAGNOSTIC — LECTURE UNIQUEMENT
#
# 🎯 Rôle :
#   Publier un état textuel indicatif d’inertie / isolation
#   à partir de la vitesse réelle de refroidissement en présence (°C/h).
#
# 🔗 Dépendances (lecture) :
#   - sensor.vitesse_refroidissement_presence_chambres   (valeur POSITIVE en °C/h)
#
# 🧩 Principe :
#   - Seuils en POSITIF :
#       • v >= 0.50  → bâtiment très dissipatif (refroidit vite)
#       • v >= 0.25  → dissipation normale
#       • v  < 0.25  → très bonne inertie / isolation
#
# 🚫 Interdits :
#   - Aucun service, aucune action, aucune écriture d’entité
#   - Aucune autorisation, aucun blocage, aucune décision centrale
# ==========================================================

- trigger:
    - platform: state
      entity_id: sensor.vitesse_refroidissement_presence_chambres

  sensor:
    - name: "Diagnostic chauffage inertie"
      unique_id: diagnostic_chauffage_inertie

      state: >
        {% set v = states('sensor.vitesse_refroidissement_presence_chambres') | float(none) %}

        {% if v is none %}
          {{ none }}
        {% elif v >= 0.50 %}
          Bâtiment très dissipatif
        {% elif v >= 0.25 %}
          Dissipation normale
        {% else %}
          Très bonne inertie / isolation
        {% endif %}

      attributes:
        source_entity: "sensor.vitesse_refroidissement_presence_chambres"
        unit_hint: "°C/h"
        arsenal_threshold_fast: 0.50
        arsenal_threshold_normal: 0.25