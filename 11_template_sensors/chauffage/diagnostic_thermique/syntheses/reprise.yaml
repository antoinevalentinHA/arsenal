# ==========================================================
# 🧠 ARSENAL — TEMPLATE TRIGGERED SENSOR — DIAGNOSTIC CHAUFFAGE : REPRISE
#     Synthèse indicative — Vitesse de reprise (présence)
# ----------------------------------------------------------
# Domaine : Chauffage / Diagnostic thermique / Synthèses
# Couche  : Diagnostic (texte) — UI
# Statut  : DIAGNOSTIC — LECTURE UNIQUEMENT
#
# 🎯 Rôle :
#   Publier un état textuel indicatif de dynamique de reprise
#   à partir de la vitesse réelle de reprise en présence (°C/h).
#
# 🔗 Dépendances :
#   - sensor.vitesse_reprise_presence_chambres
#
# 🧩 Seuils :
#   - v > 1.50  → Reprise rapide
#   - v > 0.80  → Reprise modérée
#   - v ≤ 0.80  → Reprise lente
#
# 🚫 Interdits :
#   - Aucun service
#   - Aucune décision
#   - Aucune écriture
# ==========================================================

- trigger:
    - platform: state
      entity_id: sensor.vitesse_reprise_presence_chambres

  sensor:
    - name: "Diagnostic chauffage reprise"
      unique_id: diagnostic_chauffage_reprise

      state: >
        {% set v = states('sensor.vitesse_reprise_presence_chambres') | float(none) %}

        {% if v is none %}
          {{ none }}
        {% elif v > 1.50 %}
          Reprise rapide (bonne puissance / émetteurs efficaces)
        {% elif v > 0.80 %}
          Reprise modérée
        {% else %}
          Reprise lente (inertie forte ou puissance limitée)
        {% endif %}

      attributes:
        source_entity: "sensor.vitesse_reprise_presence_chambres"
        unit_hint: "°C/h"
        arsenal_threshold_fast: 1.50
        arsenal_threshold_moderate: 0.80