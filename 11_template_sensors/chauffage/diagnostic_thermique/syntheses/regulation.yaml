# ==========================================================
# 🧠 ARSENAL — TEMPLATE SENSOR — DIAGNOSTIC CHAUFFAGE : RÉGULATION
#     Synthèse indicative — Stabilité d’oscillation (présence)
# ----------------------------------------------------------
# Domaine : Chauffage / Diagnostic thermique / Synthèses
# Couche  : Diagnostic (texte) — UI
# Statut  : DIAGNOSTIC — LECTURE UNIQUEMENT
#
# 🎯 Rôle :
#   Publier un état textuel indicatif de stabilité de régulation
#   à partir de l’amplitude d’oscillation de cycle en présence.
#
# 🔗 Dépendances (lecture) :
#   - sensor.amplitude_oscillation_cycle_presence_chambres
#
# 🚫 Interdits :
#   - Aucun service, aucune action, aucune écriture d’entité
#   - Aucune autorisation, aucun blocage, aucune décision centrale
#
# ==========================================================

- sensor:
    - name: Diagnostic chauffage regulation
      unique_id: diagnostic_chauffage_regulation
      state: >-
        {%- set osc = states('sensor.amplitude_oscillation_cycle_presence_chambres') | float(none) -%}
        {%- set txt = none -%}
        {%- if osc is not none -%}
          {%- if osc < 0.3 -%}{%- set txt = 'Régulation très stable' -%}
          {%- elif osc < 0.6 -%}{%- set txt = 'Régulation correcte' -%}
          {%- else -%}{%- set txt = 'Régulation instable (oscillation élevée)' -%}
          {%- endif -%}
        {%- endif -%}
        {{- txt if txt is not none else '' -}}
