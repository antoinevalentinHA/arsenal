# ==========================================================
# 🌡️ ARSENAL — TEMPLATE TRIGGERED SENSOR
#     Chauffage : Vitesse reprise Présence Chambres
# ----------------------------------------------------------
# 🎯 RÔLE
#   Mesurer la vitesse réelle de remontée thermique après une reprise A1
#   (reduced → comfort), exprimée en °C/h, jusqu’à la première non-hausse
#   observée (plateau ou baisse).
#
# 🔒 PROPRIÉTÉS
#   - Trigger A1 canonique : changement de l’attribut t_reprise
#   - Références figées à A1 : t0_ref / T0_ref
#   - Calcul uniquement tant que T_cur augmente strictement
#   - Figement à la première non-hausse (T_cur <= T_prev)
#   - Neutralisation stricte pendant aération_pipeline_arme :
#       • aucune mise à jour
#       • state figé typé (float) si possible
#   - Aucun "0 fantôme" hors reset A1 valide : state = none hors cycle
# ==========================================================

- trigger:

    # Nouvelle reprise chauffage (A1) — canonique : changement t_reprise uniquement
    - platform: state
      entity_id: sensor.temperature_reprise_presence_chambres
      attribute: t_reprise

    # Variation thermique Chambres
    - platform: state
      entity_id: sensor.temperature_min_chambres


  sensor:
    - name: "Vitesse reprise Présence Chambres"
      unique_id: vitesse_reprise_presence_chambres
      unit_of_measurement: "°C/h"
      icon: mdi:speedometer


      state: >
        {% set last = this.state | float(none) %}

        {% if states('input_boolean.aeration_pipeline_arme') == 'on' %}
          {{ last }}
        {% else %}

          {% set reprise_valide = (state_attr('sensor.temperature_reprise_presence_chambres', 'reprise_valide') | string | lower) == 'true' %}

          {% set t0 = this.attributes.get('t0_ref') | float(none) %}
          {% set T0 = this.attributes.get('T0_ref') | float(none) %}
          {% set finished = (this.attributes.get('reprise_finished') | int(0)) == 1 %}

          {% set T_cur = states('sensor.temperature_min_chambres') | float(none) %}
          {% set T_prev = this.attributes.get('T_prev') | float(none) %}

          {# Reset uniquement sur A1 valide #}
          {% if trigger.entity_id == 'sensor.temperature_reprise_presence_chambres' %}
            {% if reprise_valide %}
              0
            {% else %}
              {{ none }}
            {% endif %}

          {# Hors cycle / invalide #}
          {% elif not reprise_valide %}
            {{ none }}
          {% elif t0 is none or T0 is none %}
            {{ none }}
          {% elif T_cur is none %}
            {{ last }}
          {% elif finished %}
            {{ last }}

          {% else %}
            {# Calcul uniquement tant que le signal monte strictement (T_cur > T_prev) ou première mesure (T_prev none) #}
            {% if T_prev is none or T_cur > T_prev %}

              {% set dt_h = (now().timestamp() - t0) / 3600 %}
              {% if dt_h > 0 %}
                {{ ((T_cur - T0) / dt_h) | round(3) }}
              {% else %}
                {{ last }}
              {% endif %}

            {% else %}
              {# Plateau / baisse : figer #}
              {{ last }}
            {% endif %}
          {% endif %}

        {% endif %}


      attributes:

        # --------------------------------------------------
        # Cast strict (diagnostic)
        # --------------------------------------------------
        reprise_valide_cast: >
          {{ ((state_attr('sensor.temperature_reprise_presence_chambres', 'reprise_valide') | string | lower) == 'true') }}

        # --------------------------------------------------
        # Références A1 (figées)
        # --------------------------------------------------
        t0_ref: >
          {% set prev = this.attributes.get('t0_ref') %}
          {% set reprise_valide = (state_attr('sensor.temperature_reprise_presence_chambres', 'reprise_valide') | string | lower) == 'true' %}

          {% if states('input_boolean.aeration_pipeline_arme') == 'on' %}
            {{ prev }}
          {% elif trigger.entity_id == 'sensor.temperature_reprise_presence_chambres' and reprise_valide and trigger.to_state is not none %}
            {{ as_timestamp(trigger.to_state.last_changed) }}
          {% else %}
            {{ prev }}
          {% endif %}

        T0_ref: >
          {% set prev = this.attributes.get('T0_ref') %}
          {% set reprise_valide = (state_attr('sensor.temperature_reprise_presence_chambres', 'reprise_valide') | string | lower) == 'true' %}
          {% set T_cur = states('sensor.temperature_min_chambres') | float(none) %}

          {% if states('input_boolean.aeration_pipeline_arme') == 'on' %}
            {{ prev }}
          {% elif trigger.entity_id == 'sensor.temperature_reprise_presence_chambres' and reprise_valide %}
            {{ T_cur if T_cur is not none else prev }}
          {% else %}
            {{ prev }}
          {% endif %}

        # --------------------------------------------------
        # Dernier échantillon (anti race-condition)
        # --------------------------------------------------
        T_prev: >
          {% set prev = this.attributes.get('T_prev') %}
          {% set T_cur = states('sensor.temperature_min_chambres') | float(none) %}
          {% set finished = (this.attributes.get('reprise_finished') | int(0)) == 1 %}

          {% if states('input_boolean.aeration_pipeline_arme') == 'on' %}
            {{ prev }}
          {% elif trigger.entity_id == 'sensor.temperature_reprise_presence_chambres' %}
            {{ T_cur }}
          {% elif finished %}
            {{ prev }}
          {% elif trigger.entity_id == 'sensor.temperature_min_chambres' and T_cur is not none %}
            {{ T_cur }}
          {% else %}
            {{ prev }}
          {% endif %}

        # --------------------------------------------------
        # Maximum atteint pendant la montée (observabilité)
        # --------------------------------------------------
        T_max_ref: >
          {% set prev = this.attributes.get('T_max_ref') | float(none) %}
          {% set T_cur = states('sensor.temperature_min_chambres') | float(none) %}
          {% set finished = (this.attributes.get('reprise_finished') | int(0)) == 1 %}

          {% if states('input_boolean.aeration_pipeline_arme') == 'on' %}
            {{ prev }}
          {% elif trigger.entity_id == 'sensor.temperature_reprise_presence_chambres' %}
            {{ T_cur }}
          {% elif finished %}
            {{ prev }}
          {% elif trigger.entity_id == 'sensor.temperature_min_chambres' and T_cur is not none %}
            {% if prev is none %}
              {{ T_cur }}
            {% else %}
              {{ [prev, T_cur] | max }}
            {% endif %}
          {% else %}
            {{ prev }}
          {% endif %}

        # --------------------------------------------------
        # Fin de reprise : première non-hausse (plateau/baisse)
        # --------------------------------------------------
        reprise_finished: >
          {% set finished = (this.attributes.get('reprise_finished') | int(0)) == 1 %}
          {% set reprise_valide = (state_attr('sensor.temperature_reprise_presence_chambres', 'reprise_valide') | string | lower) == 'true' %}
          {% set t0 = this.attributes.get('t0_ref') | float(none) %}
          {% set T_prev = this.attributes.get('T_prev') | float(none) %}
          {% set T_cur = states('sensor.temperature_min_chambres') | float(none) %}

          {% if states('input_boolean.aeration_pipeline_arme') == 'on' %}
            {{ 1 if finished else 0 }}

          {% elif trigger.entity_id == 'sensor.temperature_reprise_presence_chambres' %}
            0

          {% elif not reprise_valide or t0 is none %}
            0

          {% elif finished %}
            1

          {% elif trigger.entity_id == 'sensor.temperature_min_chambres'
                and T_prev is not none
                and T_cur is not none
                and T_cur <= T_prev %}
            1

          {% else %}
            0
          {% endif %}

        # --------------------------------------------------
        # Statut / invalidation (diagnostic)
        # --------------------------------------------------
        arsenal_status: >
          {% set aeration = states('input_boolean.aeration_pipeline_arme') %}
          {% set reprise_valide = (state_attr('sensor.temperature_reprise_presence_chambres', 'reprise_valide') | string | lower) == 'true' %}
          {% set t0 = this.attributes.get('t0_ref') | float(none) %}
          {% set finished = (this.attributes.get('reprise_finished') | int(0)) == 1 %}

          {% if aeration == 'on' %}
            inhibited_aeration
          {% elif not reprise_valide %}
            reprise_invalide
          {% elif t0 is none %}
            no_cycle
          {% elif finished %}
            finished
          {% else %}
            tracking
          {% endif %}

        raison_invalidation: >
          {% set aeration = states('input_boolean.aeration_pipeline_arme') %}
          {% set reprise_valide = (state_attr('sensor.temperature_reprise_presence_chambres', 'reprise_valide') | string | lower) == 'true' %}
          {% set t0 = this.attributes.get('t0_ref') | float(none) %}
          {% set T_cur = states('sensor.temperature_min_chambres') | float(none) %}

          {% if aeration == 'on' %}
            aeration
          {% elif not reprise_valide %}
            reprise_invalide
          {% elif t0 is none %}
            t0_none
          {% elif T_cur is none %}
            T_cur_none
          {% else %}
            ok
          {% endif %}

        # --------------------------------------------------
        # Sources
        # --------------------------------------------------
        source_reprise_entity: "sensor.temperature_reprise_presence_chambres"
        source_temp_entity: "sensor.temperature_min_chambres"