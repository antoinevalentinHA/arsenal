# ==========================================================
# 🌡️ ARSENAL — TEMPLATE TRIGGERED SENSOR
#     Chauffage : Vitesse refroidissement Présence Chambres
# ----------------------------------------------------------
# 🎯 RÔLE
#   Mesurer la vitesse moyenne de refroidissement après un arrêt B0 :
#   (T0_ref - T_cur) / Δt, en °C/h, jusqu’à la première non-baisse
#   observée (plateau ou remontée).
#
# 🔒 PROPRIÉTÉS
#   - Trigger B0 canonique : changement de l’attribut t_arret
#   - t0 événementiel : last_changed du trigger B0 (Option A time)
#   - Aucune valeur fantôme : state = none hors cycle ; 0 seulement sur B0 valide
#   - Détection fin robuste : comparaison T_cur vs T_prev (anti race-condition)
#   - Neutralisation stricte pendant aération_pipeline_arme :
#       • aucune mise à jour
#       • state figé (float) si possible
# ==========================================================

- trigger:

    # Nouvel arrêt chauffage (B0) — canonique : changement t_arret uniquement
    - platform: state
      entity_id: sensor.temperature_arret_presence_chambres
      attribute: t_arret

    # Variation thermique Chambres
    - platform: state
      entity_id: sensor.temperature_min_chambres


  sensor:
    - name: "Vitesse refroidissement Présence Chambres"
      unique_id: vitesse_refroidissement_presence_chambres
      unit_of_measurement: "°C/h"
      icon: mdi:snowflake-thermometer


      state: >
        {% set last = this.state | float(none) %}

        {% if states('input_boolean.aeration_pipeline_arme') == 'on' %}
          {{ last }}
        {% else %}

          {% set arret_valide = (state_attr('sensor.temperature_arret_presence_chambres', 'arret_valide') | string | lower) == 'true' %}

          {% set t0 = this.attributes.get('t0_ref') | float(none) %}
          {% set T0 = this.attributes.get('T0_ref') | float(none) %}
          {% set finished = (this.attributes.get('refroidissement_finished') | int(0)) == 1 %}

          {% set T_cur = states('sensor.temperature_min_chambres') | float(none) %}
          {% set T_prev = this.attributes.get('T_prev') | float(none) %}

          {# Reset uniquement sur B0 valide #}
          {% if trigger.entity_id == 'sensor.temperature_arret_presence_chambres' %}
            {% if arret_valide %}
              0
            {% else %}
              {{ none }}
            {% endif %}

          {# Hors cycle / invalide #}
          {% elif not arret_valide %}
            {{ none }}
          {% elif t0 is none or T0 is none %}
            {{ none }}
          {% elif T_cur is none %}
            {{ last }}
          {% elif finished %}
            {{ last }}

          {% else %}
            {# Calcul uniquement tant que le signal refroidit (T_cur < T_prev) ou première mesure (T_prev none) #}
            {% if T_prev is none or T_cur < T_prev %}

              {% set dt_h = (now().timestamp() - t0) / 3600 %}
              {% if dt_h > 0 %}
                {{ ((T0 - T_cur) / dt_h) | round(3) }}
              {% else %}
                {{ last }}
              {% endif %}

            {% else %}
              {# Plateau / remontée : figer #}
              {{ last }}
            {% endif %}
          {% endif %}

        {% endif %}


      attributes:

        # --------------------------------------------------
        # Cast strict (diagnostic)
        # --------------------------------------------------
        arret_valide_cast: >
          {{ ((state_attr('sensor.temperature_arret_presence_chambres', 'arret_valide') | string | lower) == 'true') }}

        # --------------------------------------------------
        # Références B0 (figées)
        # --------------------------------------------------
        t0_ref: >
          {% set prev = this.attributes.get('t0_ref') %}
          {% set arret_valide = (state_attr('sensor.temperature_arret_presence_chambres', 'arret_valide') | string | lower) == 'true' %}

          {% if states('input_boolean.aeration_pipeline_arme') == 'on' %}
            {{ prev }}
          {% elif trigger.entity_id == 'sensor.temperature_arret_presence_chambres' and arret_valide and trigger.to_state is not none %}
            {{ as_timestamp(trigger.to_state.last_changed) }}
          {% else %}
            {{ prev }}
          {% endif %}

        T0_ref: >
          {% set prev = this.attributes.get('T0_ref') %}
          {% set arret_valide = (state_attr('sensor.temperature_arret_presence_chambres', 'arret_valide') | string | lower) == 'true' %}
          {% set T_cur = states('sensor.temperature_min_chambres') | float(none) %}

          {% if states('input_boolean.aeration_pipeline_arme') == 'on' %}
            {{ prev }}
          {% elif trigger.entity_id == 'sensor.temperature_arret_presence_chambres' and arret_valide %}
            {{ T_cur if T_cur is not none else prev }}
          {% else %}
            {{ prev }}
          {% endif %}

        # --------------------------------------------------
        # Dernier échantillon (anti race-condition)
        # --------------------------------------------------
        T_prev: >
          {% set prev = this.attributes.get('T_prev') %}
          {% set T_cur = states('sensor.temperature_min_chambres') | float(none) %}
          {% set finished = (this.attributes.get('refroidissement_finished') | int(0)) == 1 %}

          {% if states('input_boolean.aeration_pipeline_arme') == 'on' %}
            {{ prev }}
          {% elif trigger.entity_id == 'sensor.temperature_arret_presence_chambres' %}
            {{ T_cur }}
          {% elif finished %}
            {{ prev }}
          {% elif trigger.entity_id == 'sensor.temperature_min_chambres' and T_cur is not none %}
            {{ T_cur }}
          {% else %}
            {{ prev }}
          {% endif %}

        # --------------------------------------------------
        # Minimum atteint pendant refroidissement (observabilité)
        # --------------------------------------------------
        T_min_ref: >
          {% set prev = this.attributes.get('T_min_ref') | float(none) %}
          {% set T_cur = states('sensor.temperature_min_chambres') | float(none) %}
          {% set finished = (this.attributes.get('refroidissement_finished') | int(0)) == 1 %}

          {% if states('input_boolean.aeration_pipeline_arme') == 'on' %}
            {{ prev }}
          {% elif trigger.entity_id == 'sensor.temperature_arret_presence_chambres' %}
            {{ T_cur }}
          {% elif finished %}
            {{ prev }}
          {% elif trigger.entity_id == 'sensor.temperature_min_chambres' and T_cur is not none %}
            {% if prev is none %}
              {{ T_cur }}
            {% else %}
              {{ [prev, T_cur] | min }}
            {% endif %}
          {% else %}
            {{ prev }}
          {% endif %}

        # --------------------------------------------------
        # Fin de refroidissement : première non-baisse (plateau/remontée)
        # --------------------------------------------------
        refroidissement_finished: >
          {% set finished = (this.attributes.get('refroidissement_finished') | int(0)) == 1 %}
          {% set arret_valide = (state_attr('sensor.temperature_arret_presence_chambres', 'arret_valide') | string | lower) == 'true' %}
          {% set t0 = this.attributes.get('t0_ref') | float(none) %}
          {% set T_prev = this.attributes.get('T_prev') | float(none) %}
          {% set T_cur = states('sensor.temperature_min_chambres') | float(none) %}

          {% if states('input_boolean.aeration_pipeline_arme') == 'on' %}
            {{ 1 if finished else 0 }}

          {% elif trigger.entity_id == 'sensor.temperature_arret_presence_chambres' %}
            0

          {% elif not arret_valide or t0 is none %}
            0

          {% elif finished %}
            1

          {% elif trigger.entity_id == 'sensor.temperature_min_chambres'
                and T_prev is not none
                and T_cur is not none
                and T_cur >= T_prev %}
            1

          {% else %}
            0
          {% endif %}

        # --------------------------------------------------
        # Statut / invalidation (diagnostic)
        # --------------------------------------------------
        arsenal_status: >
          {% set aeration = states('input_boolean.aeration_pipeline_arme') %}
          {% set arret_valide = (state_attr('sensor.temperature_arret_presence_chambres', 'arret_valide') | string | lower) == 'true' %}
          {% set t0 = this.attributes.get('t0_ref') | float(none) %}
          {% set finished = (this.attributes.get('refroidissement_finished') | int(0)) == 1 %}

          {% if aeration == 'on' %}
            inhibited_aeration
          {% elif not arret_valide %}
            arret_invalide
          {% elif t0 is none %}
            no_cycle
          {% elif finished %}
            finished
          {% else %}
            tracking
          {% endif %}

        raison_invalidation: >
          {% set aeration = states('input_boolean.aeration_pipeline_arme') %}
          {% set arret_valide = (state_attr('sensor.temperature_arret_presence_chambres', 'arret_valide') | string | lower) == 'true' %}
          {% set t0 = this.attributes.get('t0_ref') | float(none) %}
          {% set T_cur = states('sensor.temperature_min_chambres') | float(none) %}

          {% if aeration == 'on' %}
            aeration
          {% elif not arret_valide %}
            arret_invalide
          {% elif t0 is none %}
            t0_none
          {% elif T_cur is none %}
            T_cur_none
          {% else %}
            ok
          {% endif %}

        # --------------------------------------------------
        # Sources
        # --------------------------------------------------
        source_arret_entity: "sensor.temperature_arret_presence_chambres"
        source_temp_entity: "sensor.temperature_min_chambres"