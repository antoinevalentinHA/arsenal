# ==========================================================
# 🌡️ ARSENAL — TEMPLATE TRIGGERED SENSOR
#     Chauffage : Amplitude oscillation cycle Présence Chambres
#
#  ✅ Version renforcée (cast bool strict, anti "false truthy")
#  ✅ Cycle piloté par événements A1 (reprise) → B0 (arrêt)
#  ✅ Min/Max suivis pendant le cycle, figés à B0
#  ✅ Neutralisation stricte pendant aération_pipeline_arme
#  ✅ Aucune "valeur mensongère" : state = none tant que cycle incomplet
# ==========================================================

- trigger:

    # Reprise chauffage (A1)
    - platform: state
      entity_id: sensor.temperature_reprise_presence_chambres

    # Arrêt chauffage (B0) → fin de cycle
    - platform: state
      entity_id: sensor.temperature_arret_presence_chambres

    # Variation thermique Chambres pendant cycle
    - platform: state
      entity_id: sensor.temperature_min_chambres


  sensor:
    - name: "Amplitude oscillation cycle Présence Chambres"
      unique_id: amplitude_oscillation_cycle_presence_chambres
      unit_of_measurement: "°C"
      device_class: temperature
      icon: mdi:chart-bell-curve


      state: >
        {% if states('input_boolean.aeration_pipeline_arme') == 'on' %}
          {{ none }}
        {% else %}

          {% set reprise_valide = (state_attr('sensor.temperature_reprise_presence_chambres', 'reprise_valide') | string | lower) == 'true' %}
          {% set arret_valide = (state_attr('sensor.temperature_arret_presence_chambres', 'arret_valide') | string | lower) == 'true' %}

          {% set Tmin = state_attr(this.entity_id, 'Tmin') | float(none) %}
          {% set Tmax = state_attr(this.entity_id, 'Tmax') | float(none) %}

          {% if not reprise_valide or not arret_valide or Tmin is none or Tmax is none or Tmax < Tmin %}
            {{ none }}
          {% else %}
            {{ (Tmax - Tmin) | round(2) }}
          {% endif %}

        {% endif %}


      attributes:

        # --------------------------------------------------
        # Température minimale atteinte pendant le cycle
        # --------------------------------------------------
        Tmin: >
          {% set reprise_valide = (state_attr('sensor.temperature_reprise_presence_chambres', 'reprise_valide') | string | lower) == 'true' %}
          {% set arret_valide = (state_attr('sensor.temperature_arret_presence_chambres', 'arret_valide') | string | lower) == 'true' %}

          {% set last = state_attr(this.entity_id, 'Tmin') | float(none) %}
          {% set T = states('sensor.temperature_min_chambres') | float(none) %}

          {% if states('input_boolean.aeration_pipeline_arme') == 'on' %}
            {{ state_attr(this.entity_id, 'Tmin') }}

          {% elif trigger.entity_id == 'sensor.temperature_reprise_presence_chambres' and reprise_valide %}
            {{ T }}

          {% elif arret_valide %}
            {{ last }}

          {% elif last is none %}
            {{ T }}

          {% elif T is none %}
            {{ last }}

          {% else %}
            {{ [last, T] | min }}
          {% endif %}


        # --------------------------------------------------
        # Température maximale atteinte pendant le cycle
        # --------------------------------------------------
        Tmax: >
          {% set reprise_valide = (state_attr('sensor.temperature_reprise_presence_chambres', 'reprise_valide') | string | lower) == 'true' %}
          {% set arret_valide = (state_attr('sensor.temperature_arret_presence_chambres', 'arret_valide') | string | lower) == 'true' %}

          {% set last = state_attr(this.entity_id, 'Tmax') | float(none) %}
          {% set T = states('sensor.temperature_min_chambres') | float(none) %}

          {% if states('input_boolean.aeration_pipeline_arme') == 'on' %}
            {{ state_attr(this.entity_id, 'Tmax') }}

          {% elif trigger.entity_id == 'sensor.temperature_reprise_presence_chambres' and reprise_valide %}
            {{ T }}

          {% elif arret_valide %}
            {{ last }}

          {% elif last is none %}
            {{ T }}

          {% elif T is none %}
            {{ last }}

          {% else %}
            {{ [last, T] | max }}
          {% endif %}