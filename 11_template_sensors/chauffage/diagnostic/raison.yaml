# ==========================================================
# 🧠 ARSENAL — TEMPLATE SENSOR :
#     Chauffage – Raison de la décision (canonique)
# ----------------------------------------------------------
# 🎯 RÔLE FONDAMENTAL
#
#   Exposer la CAUSE DOMINANTE qui motive la décision
#   thermique, ou l’abstention volontaire de décision.
#
#   Ce capteur ne décrit PAS l’état réel du chauffage,
#   mais la RAISON MÉTIER ayant conduit à la décision
#   Comfort / Eco / Neutre.
#
# ----------------------------------------------------------
# 🧱 STATUT ARCHITECTURAL
#
#   - Capteur explicatif canonique
#   - Strict miroir de la hiérarchie décisionnelle
#   - Référence unique pour :
#       • notifications
#       • dashboards de diagnostic
#       • audits et traçabilité
#
# ----------------------------------------------------------
# 🧠 HIÉRARCHIE DES CAUSES (ORDRE STRICT)
#
#   0. Override opérateur
#   1. Chauffage non autorisé système
#   2. Aération en cours et confirmée
#   3. Blocage aération
#   4. Fenêtre ouverte
#   5. Vacances
#      - Pré-confort actif
#      - Sinon mode vacances
#   6. Poêle actif
#   7. Présence / autorisation cible
#   8. Absence avec protection thermique
#   9. Absence nominale
#
# ----------------------------------------------------------
# 🛑 GARANTIES
#
#   - Aucune logique décisionnelle autonome
#   - Aucune action
#   - Aucun effet de bord
#   - Calcul déterministe et lisible
#
# ----------------------------------------------------------
# ❌ NE FAIT PAS
#
#   - Ne pilote aucun équipement
#   - Ne reflète pas l’état réel du chauffage
#   - Ne modifie aucun contexte
#
# ----------------------------------------------------------
# ✅ SORTIE CANONIQUE
#
#   - Chaîne courte, stable, non localisée
#   - Exploitable par notifications et UI
#
# ----------------------------------------------------------
# ✅ Compatibilité : Home Assistant 2024.8+
# ==========================================================

- sensor:
    - name: "Chauffage raison calculee"
      unique_id: chauffage_raison_calculee
      icon: mdi:comment-text-outline
      state: >

        {# ======================================================
           👤 NIVEAU 0 — OVERRIDE OPÉRATEUR (SOUVERAIN)
           ====================================================== #}
        {% if is_state('input_boolean.mode_confort_chauffage', 'on') %}
          confort_force

        {# ======================================================
           🛑 NIVEAU 1 — INTERDICTIONS SYSTÈME
           ====================================================== #}
        {% elif not is_state('binary_sensor.chauffage_autorise_systeme', 'on') %}
          chauffage_non_autorise

        {# ======================================================
           🧠 NIVEAU 2 — CONTEXTES MAJEURS
           ====================================================== #}
        {% elif is_state('input_boolean.aeration_episode_en_cours', 'on')
               and is_state('input_boolean.aeration_confirmee', 'on') %}
          aeration_en_cours

        {% elif is_state('input_boolean.chauffage_blocage_aeration', 'on') %}
          blocage_aeration_en_cours

        {% elif is_state('binary_sensor.fenetre_ouverte_maison_avec_delai', 'on') %}
          fenetre_ouverte_maison

        {% elif is_state('input_select.mode_maison', 'Vacances') %}
          {% if is_state('input_boolean.pre_confort_actif_calcule', 'on') %}
            pre_confort_vacances
          {% else %}
            mode_maison_vacances
          {% endif %}

        {% elif is_state('input_boolean.blocage_chauffage_poele', 'on') %}
          poele_actif

        {# ======================================================
           🌡️ NIVEAU 3 — PRÉSENCE / AUTORISATION CIBLE
           ====================================================== #}
        {% elif is_state('binary_sensor.presence_famille_unifiee', 'on') %}
          {% set cible = states('sensor.chauffage_autorisation_cible') %}
          {% if cible == 'comfort' %}
            besoin_thermique
          {% elif cible == 'neutre' %}
            presence_on
          {% elif cible == 'reduced' %}
            confort_suffisant
          {% else %}
            presence_on
          {% endif %}

        {# ======================================================
           🟠 NIVEAU 4 — ABSENCE / PROTECTION THERMIQUE
           ====================================================== #}
        {% elif is_state('input_boolean.chauffage_inhibition_geofencing', 'on') %}
          absence_protection_thermique

        {# ======================================================
           ⚪ FALLBACK — ABSENCE NOMINALE
           ====================================================== #}
        {% else %}
          absence
        {% endif %}