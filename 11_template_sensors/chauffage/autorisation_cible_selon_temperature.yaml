# ==========================================================
# 🧠 ARSENAL — CAPTEUR DÉCISIONNEL CANONIQUE
#     Chauffage — Autorisation Cible (V3 PRO)
# ==========================================================
#
# 📌 STATUT :
#   ARTEFACT STRUCTURANT — NIVEAU CRITIQUE
#
# 🔒 AUTORITÉ :
#   Ce capteur est la RÉFÉRENCE UNIQUE de l’INTENTION THERMIQUE
#   produite par la Décision Centrale Chauffage.
#
#   Il est :
#     • lu par la table de décision,
#     • utilisé par les triggers décisionnels,
#     • consommé par les automatismes d’application,
#     • exposé aux capteurs canoniques et à l’UI.
#
#   Il ne lit JAMAIS l’état matériel.
#
# ----------------------------------------------------------
# 🧠 RÔLE FONCTIONNEL
# ----------------------------------------------------------
#
# Ce capteur :
#   - traduit les FAITS thermiques et contextuels
#     en une INTENTION TERNAIRE officielle :
#       • comfort
#       • neutre
#       • reduced
#
#   - constitue :
#       🧠 la SORTIE DIRECTE du cerveau Chauffage,
#       🌡️ la BASE de la table de décision canonique,
#       🔁 le pivot du thermostat logique en présence,
#       🛡️ le garde-fou contre toute chauffe implicite.
#
#   Il représente :
#     • une AUTORISATION thermique,
#     • JAMAIS une décision finale,
#     • JAMAIS une action,
#     • JAMAIS un ordre matériel.
#
# ----------------------------------------------------------
# 🔒 INVARIANTS ABSOLUS
# ----------------------------------------------------------
#
# - Valeurs autorisées STRICTES :
#     • comfort
#     • neutre
#     • reduced
#
# - Il est STRICTEMENT INTERDIT que ce capteur :
#     ❌ produise directement une chauffe,
#     ❌ déclenche un service,
#     ❌ modifie l’état matériel,
#     ❌ intègre une logique d’application,
#     ❌ dépende d’un retour Cloud.
#
# - Toute transition de valeur :
#     • DOIT être couverte par :
#         /contrats/chauffage/20_triggers_decisionnels.md
#     • DOIT rappeler la Décision Centrale si classée CRITIQUE.
#
# ----------------------------------------------------------
# 🧠 HIÉRARCHIE DOCUMENTAIRE
# ----------------------------------------------------------
#
# Ce capteur est subordonné à :
#   - /documentation_arsenal/contrats/chauffage/30_decision_centrale.md
#   - /documentation_arsenal/contrats/chauffage/60_table_decision_canonique.md
#
# Il est gouverné par :
#   - /documentation_arsenal/contrats/chauffage/20_triggers_decisionnels.md
#
# ----------------------------------------------------------
# ⚠️ GOUVERNANCE D’IMPLÉMENTATION
# ----------------------------------------------------------
#
# - Ce fichier :
#     ✅ est structurant pour tout le système Chauffage,
#     ✅ doit rester reload-safe et restart-safe,
#     ✅ doit rester purement décisionnel.
#
# - Toute modification :
#     • modifie le comportement global du chauffage,
#     • nécessite une mise à jour contractuelle préalable,
#     • doit être validée par cohérence documentaire.
#
# ==========================================================

# ==========================================================
# 🧠 ARSENAL — TEMPLATE SENSOR
# ----------------------------------------------------------
# 📛 Nom :
#   Chauffage – Autorisation cible
#
# 🎯 Rôle :
#   Calculer la décision TERNAIRE historique du chauffage
#   (comfort / reduced / neutre) à partir :
#     - de la température extérieure
#     - de la température intérieure la plus froide
#     - des consignes et offsets utilisateur
#     - du mode maison
#     - du blocage poêle
#
# 🧱 Principe Arsenal :
#   - Décision PURE
#   - Aucune action
#   - Aucun verrou
#   - Aucun effet de bord
#
# 🔌 Consommateurs typiques :
#   - Automatisation de verrou logique
#     (input_boolean.chauffage_standby_force)
#   - UI / diagnostic / logbook
#
# ⚠️ IMPORTANT :
#   - Logique STRICTEMENT équivalente
#     à l’ancienne automatisation
#   - Toute modification est une
#     modification MÉTIER
# ==========================================================

- sensor:
    - name: "Chauffage – Autorisation cible"
      unique_id: chauffage_autorisation_cible
      state: >
        {% set UNAV = ['unknown','unavailable','none',''] %}
      
        {% set ext = states('sensor.temperature_jardin') | float(99) %}
        {% set cold = states('sensor.temperature_min_chambres') | float(99) %}
      
        {% set mode_maison = states('input_select.mode_maison') %}
        {% set poele = is_state('input_boolean.blocage_chauffage_poele', 'on') %}
      
        {% set consigne = states('input_number.chauffage_consigne_confort') | float(19) %}
        {% set offset_on = states('input_number.chauffage_offset_on') | float(0.5) %}
        {% set offset_off = states('input_number.chauffage_offset_off') | float(0.5) %}
      
        {% set seuil_on = consigne - offset_on %}
        {% set seuil_off = consigne + offset_off %}
      
        {% set seuil_ext_on = states('input_number.chauffage_seuil_ext_on') | float(15) %}
        {% set seuil_ext_off = states('input_number.chauffage_seuil_ext_off') | float(18) %}
      
        {% set anticipation = is_state('input_boolean.chauffage_anticipation_meteo', 'on') %}
        {% set meteo_fav = is_state('binary_sensor.meteo_favorable_chauffage', 'on') %}
      
        {% set cible = 'unknown' %}
      
        {% if ext == 99 or cold == 99 or mode_maison in UNAV %}
          {% set cible = 'unknown' %}
        {% elif mode_maison == 'Vacances' %}
          {% set cible = 'reduced' %}
        {% elif poele %}
          {% set cible = 'reduced' %}
        {% elif ext >= seuil_ext_off %}
          {% set cible = 'reduced' %}
        {% elif ext < seuil_ext_on %}
          {% if cold < seuil_on %}
            {% set cible = 'comfort' %}
          {% elif cold >= seuil_off %}
            {% set cible = 'reduced' %}
          {% else %}
            {% set cible = 'neutre' %}
          {% endif %}
        {% else %}
          {% if cold >= seuil_off %}
            {% set cible = 'reduced' %}
          {% elif cold < seuil_on %}
            {% set cible = 'comfort' %}
          {% else %}
            {% set cible = 'neutre' %}
          {% endif %}
        {% endif %}
      
        {% if cible == 'comfort' and anticipation and meteo_fav %}
          neutre
        {% else %}
          {{ cible }}
        {% endif %}
