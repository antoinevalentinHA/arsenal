# ==========================================================
# 🧠 ARSENAL — TRIGGERED BINARY SENSOR MÉTIER
#     Chauffage — Incohérence ViCare / Dernier mode décidé
# ----------------------------------------------------------
# 🎯 RÔLE
#
#     Détecter de manière STRICTEMENT DÉTERMINISTE
#     toute divergence effective entre :
#
#       - le programme réel ViCare (sensor.programme_chauffage)
#       - la dernière consigne réellement appliquée par Arsenal
#         (input_select.chauffage_dernier_mode_decide)
#
#     Ce capteur constitue :
#       - la SOURCE UNIQUE DE VÉRITÉ
#         pour le déclenchement de l’automation de réalignement ViCare
#
# 🚫 NE FAIT PAS
#     - Ne déclenche aucune action
#     - Ne modifie aucun état
#     - Ne décide rien
#
# 🔒 ROBUSTESSE
#     - Recalcul uniquement sur changements pertinents
#     - Neutralisé si API indisponible
#     - Neutralisé si application en cours
#     - Ignore Inconnu / unknown / unavailable
#     - Anti-rebond temporel intégré
#
# ==========================================================

- trigger:

    # 🔁 Changement programme ViCare réel
    - platform: state
      entity_id: sensor.programme_chauffage

    # 🔁 Changement mémoire souveraine
    - platform: state
      entity_id: input_select.chauffage_dernier_mode_decide

    # 🔁 Verrou application matérielle
    - platform: state
      entity_id: input_boolean.chauffage_application_en_cours


  binary_sensor:

    - name: "Chauffage — Incohérence ViCare / Décision"
      unique_id: chauffage_incoherence_vicare_decision
      device_class: problem

      # --------------------------------------------------
      # ⏱️ Anti-rebond structurel
      # --------------------------------------------------
      delay_on: "00:00:15"
      delay_off: "00:00:05"

      # --------------------------------------------------
      # 🧠 Logique canonique de divergence
      # --------------------------------------------------
      state: >
        {% set lock = states('input_boolean.chauffage_application_en_cours') == 'on' %}
        {% set decided = states('input_select.chauffage_dernier_mode_decide') %}
        {% set prog = states('sensor.programme_chauffage') %}

        {% if not lock %}
          false
        {% elif prog in ['unknown','unavailable','none','None','Inconnu',''] %}
          false
        {% else %}
          {{
            (decided == 'comfort' and prog == 'Eco')
            or
            (decided == 'reduced' and prog == 'Confort')
          }}
        {% endif %}
