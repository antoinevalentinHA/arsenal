# ==========================================================
# 🌡️ TEMPLATE SENSOR — Chauffage consigne REDUCED (local)
# ----------------------------------------------------------
# 🎯 Objectif :
#   Fournir une lecture locale fiable de la consigne "Reduced"
#   de ViCare, même en cas d’indisponibilité de l’API.
#
# ⚙️ Fonctionnement :
#   - Source principale : number.vscotho1_200_11_reduced_temperature
#   - Valeur utilisée seulement si numérique et valide
#   - Sinon → conserve la dernière valeur connue
#   - Mise à jour immédiate au démarrage HA
#
# 📍 Entité : sensor.chauffage_consigne_reduced_local
# ==========================================================

- trigger:
    - platform: state
      entity_id: input_boolean.systeme_stable
      to: "on"
      id: systeme_stable
    - platform: state
      entity_id: number.vscotho1_200_11_reduced_temperature
  sensor:
    - name: "Chauffage consigne REDUCED (local)"
      unique_id: chauffage_consigne_reduced_local
      unit_of_measurement: "°C"
      state: >
        {% set v = states('number.vscotho1_200_11_reduced_temperature') %}
        {% if v not in ['unknown','unavailable','none',''] and (v | float(0)) > 0 %}
          {{ v | float }}
        {% elif this.state not in ['unknown','unavailable','none'] %}
          {{ this.state | float(0) }}
        {% else %}
          0
        {% endif %}
