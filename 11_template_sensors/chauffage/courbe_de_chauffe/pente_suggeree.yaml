# ==========================================================
# 🌡️ TRIGGERED TEMPLATE SENSOR — Chauffage : Pente suggérée
# ----------------------------------------------------------
# 🧠 Rôle :
#    Proposer, de façon réactive et cohérente, une nouvelle valeur
#    de pente de courbe de chauffe en fonction des écarts froids.
#
# 🔎 Déclencheurs :
#    - sensor.ecart_consigne_stats_froid
#    - input_number.chauffage_pente_consigne
#
# ⚙️ Politique Arsenal d'auto-ajustement :
#    - ecart_froid < -0.5 → pente += 0.1
#    - ecart_froid > 0.5  → pente -= 0.1
#    - sinon pente inchangée
#    - fenêtre auto-ajustement : 1.0 → 2.2
#
# 📌 Note :
#    Proposition purement locale, jamais appliquée automatiquement.
#    Les bornes ci-dessous sont celles de la politique d'auto-ajustement
#    Arsenal, pas les bornes physiques complètes de la chaudière.
#
# ⚠️ Contrainte normative :
#    Si la consigne courante est hors domaine d'auto-ajustement,
#    aucune suggestion n'est produite :
#    le capteur retourne strictement la valeur courante inchangée.
#    Aucun mouvement de retour progressif n'est autorisé.
#
# 🧩 Comportement d'indisponibilité :
#    - si la consigne actuelle est indisponible, le capteur propage
#      cet état natif (`unknown` / `unavailable`)
#    - si seule la grandeur d'écart est indisponible, le capteur
#      retourne la consigne actuelle inchangée
#
#    Cette dissymétrie est intentionnelle :
#    - absence de consigne = absence de base de calcul
#    - absence d'écart = pas de nouvelle suggestion, mais consigne connue
# ==========================================================

- trigger:
    - platform: state
      entity_id:
        - sensor.ecart_consigne_stats_froid
        - input_number.chauffage_pente_consigne

  sensor:
    - name: "chauffage_pente_suggeree"
      unique_id: chauffage_pente_suggeree
      icon: mdi:axis-arrow
      state: >
        {% set ecart_raw = states('sensor.ecart_consigne_stats_froid') %}
        {% set pente_raw = states('input_number.chauffage_pente_consigne') %}
        {% set pente_min = 1.0 %}
        {% set pente_max = 2.2 %}

        {% if pente_raw in ['unknown', 'unavailable', ''] %}
          {{ pente_raw }}
        {% elif ecart_raw in ['unknown', 'unavailable', ''] %}
          {{ (pente_raw | float(0)) | round(1) }}
        {% else %}
          {% set pente_actuelle = (pente_raw | float(0)) | round(1) %}
          {% if pente_actuelle < pente_min or pente_actuelle > pente_max %}
            {{ pente_actuelle }}
          {% else %}
            {% set ecart_froid = ecart_raw | float(0) %}
            {% if ecart_froid < -0.5 %}
              {{ ([pente_actuelle + 0.1, pente_max] | min) | round(1) }}
            {% elif ecart_froid > 0.5 %}
              {{ ([pente_actuelle - 0.1, pente_min] | max) | round(1) }}
            {% else %}
              {{ pente_actuelle }}
            {% endif %}
          {% endif %}
        {% endif %}
      attributes:
        source_ecart_state: "{{ states('sensor.ecart_consigne_stats_froid') }}"
        source_pente_state: "{{ states('input_number.chauffage_pente_consigne') }}"
        ecart_disponible: >
          {{ states('sensor.ecart_consigne_stats_froid') not in ['unknown', 'unavailable', ''] }}
        consigne_disponible: >
          {{ states('input_number.chauffage_pente_consigne') not in ['unknown', 'unavailable', ''] }}
        consigne_dans_domaine_auto_ajustement: >
          {% set pente_raw = states('input_number.chauffage_pente_consigne') %}
          {% if pente_raw in ['unknown', 'unavailable', ''] %}
            false
          {% else %}
            {{ 1.0 <= (pente_raw | float(0)) <= 2.2 }}
          {% endif %}