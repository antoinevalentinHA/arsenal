# ==========================================================
# 🌡️ TRIGGERED TEMPLATE SENSOR — Chauffage : Parallèle suggérée
# ----------------------------------------------------------
# 🧠 Rôle :
#    Proposer, de manière réactive, un nouvel offset (parallèle)
#    de la courbe de chauffe en fonction de l'écart global 24h.
#
# 🔎 Déclencheurs :
#    - sensor.ecart_consigne_moyenne_24h
#    - input_number.chauffage_parallele_consigne
#
# ⚙️ Politique Arsenal d'auto-ajustement :
#    - ecart_global < -0.4 → offset += 1
#    - ecart_global > 0.4  → offset -= 1
#    - sinon offset inchangé
#    - domaine Arsenal d'auto-ajustement : -8 → +8
#
# 📌 Note :
#    Proposition purement locale, jamais appliquée automatiquement.
#    Les bornes ci-dessous sont celles du domaine Arsenal d'auto-ajustement,
#    pas les bornes physiques complètes de la chaudière.
#
# ⚠️ Contrainte normative :
#    Si la consigne courante est hors domaine d'auto-ajustement,
#    aucune suggestion n'est produite :
#    le capteur retourne strictement la valeur courante inchangée.
#    Aucun mouvement de retour progressif n'est autorisé.
#
# 🧩 Comportement d'indisponibilité :
#    - si la consigne actuelle est indisponible → propagation état natif
#    - si seul l'écart est indisponible → consigne actuelle retournée inchangée
#
#    Cette dissymétrie est intentionnelle :
#    - absence de consigne = absence de base de calcul
#    - absence d'écart = pas de nouvelle suggestion, mais consigne connue
#
#    Aucun faux zéro. Aucun fallback ambigu.
# ==========================================================

- trigger:
    - platform: state
      entity_id:
        - sensor.ecart_consigne_moyenne_24h
        - input_number.chauffage_parallele_consigne

  sensor:
    - name: "chauffage_parallele_suggeree"
      unique_id: chauffage_parallele_suggeree
      icon: mdi:axis-arrow
      state: >
        {% set ecart_raw = states('sensor.ecart_consigne_moyenne_24h') %}
        {% set offset_raw = states('input_number.chauffage_parallele_consigne') %}
        {% set offset_min = -8 %}
        {% set offset_max = 8 %}

        {% if offset_raw in ['unknown', 'unavailable', ''] %}
          {{ offset_raw }}
        {% elif ecart_raw in ['unknown', 'unavailable', ''] %}
          {% set v = offset_raw | float(none) %}
          {{ v if v is not none else offset_raw }}
        {% else %}
          {% set offset_actuel = offset_raw | float(none) %}
          {% if offset_actuel is none %}
            {{ offset_raw }}
          {% elif offset_actuel < offset_min or offset_actuel > offset_max %}
            {{ offset_actuel }}
          {% else %}
            {% set ecart_global = ecart_raw | float(none) %}
            {% if ecart_global is none %}
              {{ offset_actuel }}
            {% elif ecart_global < -0.4 %}
              {{ [offset_actuel + 1, offset_max] | min }}
            {% elif ecart_global > 0.4 %}
              {{ [offset_actuel - 1, offset_min] | max }}
            {% else %}
              {{ offset_actuel }}
            {% endif %}
          {% endif %}
        {% endif %}
      attributes:
        source_ecart_state: "{{ states('sensor.ecart_consigne_moyenne_24h') }}"
        source_offset_state: "{{ states('input_number.chauffage_parallele_consigne') }}"
        ecart_disponible: >
          {{ states('sensor.ecart_consigne_moyenne_24h') not in ['unknown', 'unavailable', ''] }}
        consigne_disponible: >
          {{ states('input_number.chauffage_parallele_consigne') not in ['unknown', 'unavailable', ''] }}
        consigne_dans_domaine_auto_ajustement: >
          {% set offset_raw = states('input_number.chauffage_parallele_consigne') %}
          {% if offset_raw in ['unknown', 'unavailable', ''] %}
            false
          {% else %}
            {% set v = offset_raw | float(none) %}
            {{ v is not none and -8 <= v <= 8 }}
          {% endif %}
