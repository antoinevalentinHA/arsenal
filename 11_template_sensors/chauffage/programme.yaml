# ==========================================================
# 🔥 TEMPLATE SENSOR — Programme Chauffage simplifie
# ----------------------------------------------------------
# 🎯 Objectif :
#   Exposer le programme chauffage metier Arsenal :
#     - "Confort" si la reference souveraine vaut comfort
#     - "Eco"     si la reference souveraine vaut reduced
#     - "Inconnu" sinon
#
# ⚙️ Source :
#   input_select.chauffage_dernier_mode_decide
#
# 🧠 Particularites :
#   - Ne depend plus de ViCare
#   - Ne projette que les etats executoires
#   - Les etats neutre / unknown restent non qualifies
#   - Les attributs exposes permettent un diagnostic rapide
#
# 📊 Type : Template Sensor
# 🔥 Domaine : Chauffage / Arsenal
# ==========================================================

- sensor:
    - name: "Programme"
      unique_id: programme_chauffage
      icon: >
        {% set prog = states('input_select.chauffage_dernier_mode_decide') | lower %}
        {% if prog == 'comfort' %}
          mdi:fire
        {% elif prog == 'reduced' %}
          mdi:leaf
        {% else %}
          mdi:help-circle-outline
        {% endif %}
      state: >
        {% set prog = states('input_select.chauffage_dernier_mode_decide') | lower %}
        {% if prog == 'comfort' %}
          Confort
        {% elif prog == 'reduced' %}
          Eco
        {% else %}
          Inconnu
        {% endif %}
      attributes:
        mode_arsenal: >
          {% set v = states('input_select.chauffage_dernier_mode_decide') %}
          {{ v if v not in ['unknown', 'unavailable', ''] else 'Indisponible' }}
        application_en_cours: >
          {% set v = states('input_boolean.chauffage_application_en_cours') %}
          {{ v if v not in ['unknown', 'unavailable', ''] else 'Indisponible' }}
        raison: >
          {% set v = states('input_text.chauffage_raison') %}
          {{ v if v not in ['unknown', 'unavailable', ''] else 'Indisponible' }}