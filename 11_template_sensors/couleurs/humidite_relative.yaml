# ==========================================================
# 💦 TEMPLATE TRIGGERED SENSORS — Couleur Humidité Relative
# ----------------------------------------------------------
# 💡 Objectif :
#   Attribuer une couleur indicative selon la position de la
#   valeur d’humidité relative mesurée par rapport à une
#   zone de confort centrée et configurable.
#
# ⚙️ Principe général :
#   - Chaque zone possède ses propres seuils métier :
#       • sensor.humidite_relative_seuil_bas_<zone>
#       • sensor.humidite_relative_seuil_haut_<zone>
#   - Le centre de confort est calculé localement :
#       centre = (seuil_bas + seuil_haut) / 2
#   - Un helper global définit la demi-largeur de la zone verte :
#       input_number.humidite_relative_couleur_zone_verte
#
# ⚙️ Sources utilisées :
#   - Valeur mesurée :
#       • sensor.humidite_relative_<zone>
#   - Seuils par zone :
#       • sensor.humidite_relative_seuil_bas_<zone>
#       • sensor.humidite_relative_seuil_haut_<zone>
#   - Helper global :
#       • input_number.humidite_relative_couleur_zone_verte
#
# 🎨 Logique de couleurs :
#   blue        → humidité très basse (sous le seuil bas)
#   light_blue  → humidité basse mais proche du seuil
#   light_green → légèrement sous le centre de confort
#   green       → zone idéale (centre ± zone verte)
#   yellow      → légèrement au-dessus du centre
#   red         → humidité trop élevée (au-delà du seuil haut)
#   grey        → valeurs invalides ou seuils incohérents
#
# 🔁 Rafraîchissement :
#   - À chaque changement de valeur, seuil ou helper
#   - Au démarrage de Home Assistant
#
# 🧠 Détails techniques :
#   - Conversion automatique virgule → point
#   - Protection contre unknown / unavailable
#   - Couleur renvoyée sous forme de texte exploitable en UI
#
# 📊 Type :
#   Trigger Template Sensors
#
# 📍 Convention de nommage :
#   - couleur_humidite_relative_<zone>
# ==========================================================

- trigger:
    - platform: state
      entity_id:
        - sensor.humidite_relative_cave
        - sensor.humidite_relative_seuil_bas_cave
        - sensor.humidite_relative_seuil_haut_cave
        - input_number.humidite_relative_couleur_zone_verte
    - platform: homeassistant
      event: start
  sensor:
    - name: "Couleur Humidité relative Cave"
      unique_id: couleur_humidite_relative_cave
      state: &couleur_humidite_relative_logic >
        {% set suffixe = this.entity_id | replace('sensor.couleur_humidite_relative_', '') %}
        {% set src = 'sensor.humidite_relative_' ~ suffixe %}
        {% set src_bas = 'sensor.humidite_relative_seuil_bas_' ~ suffixe %}
        {% set src_haut = 'sensor.humidite_relative_seuil_haut_' ~ suffixe %}

        {% set raw = states(src) %}
        {% set h = raw | replace(',', '.') | float(999) %}
        {% set bas = states(src_bas) | replace(',', '.') | float(0) %}
        {% set haut = states(src_haut) | replace(',', '.') | float(0) %}
        {% set zone = states('input_number.humidite_relative_couleur_zone_verte') | float(2) %}
        {% set centre = (bas + haut) / 2 %}

        {% if raw in ['unknown', 'unavailable', None] or h == 999 %}
          grey
        {% elif bas == 0 or haut == 0 or bas >= haut %}
          grey
        {% elif h < bas %}
          blue
        {% elif h < centre - zone %}
          light_blue
        {% elif h < centre %}
          light_green
        {% elif h <= centre + zone %}
          green
        {% elif h <= haut %}
          yellow
        {% else %}
          red
        {% endif %}

