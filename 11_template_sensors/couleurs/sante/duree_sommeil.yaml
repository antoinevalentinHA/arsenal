- trigger:
    - platform: state
      entity_id:
        - sensor.withings_sommeil_total_texte
    - platform: homeassistant
      event: start
  sensor:
    - name: "Couleur Santé — Durée sommeil"
      unique_id: couleur_sante_duree_sommeil
      state: >
        {% set raw = states('sensor.withings_sommeil_total_texte') %}
        {% set m = raw | regex_findall('[0-9]+(?:[\\.,][0-9]+)?') %}
        {% set num = (m | first) | default('') %}
        {% set h = (num | replace(',', '.') | float(999)) %}

        {% if raw in ['unknown', 'unavailable', None, ''] or h == 999 %}
          unavailable
        {% elif h < 6.0 %}
          red
        {% elif h < 6.75 %}
          orange
        {% elif h < 7.25 %}
          yellow
        {% elif h < 8.0 %}
          green
        {% else %}
          blue
        {% endif %}
