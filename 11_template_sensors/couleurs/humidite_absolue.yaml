# ==========================================================
# 💧 TEMPLATE TRIGGERED SENSORS — Couleur Humidité Absolue
# ----------------------------------------------------------
# 💡 Objectif :
#   Générer, pour chaque zone de la maison, une couleur indicative
#   en fonction de la valeur d’humidité absolue mesurée et de ses seuils
#   personnalisés (bas / haut).
#
# ⚙️ Fonctionnement :
#   - Compare la valeur actuelle (sensor.humidite_absolue_<zone>)
#     à ses seuils :
#       • sensor.humidite_absolue_seuil_bas_<zone>
#       • sensor.humidite_absolue_seuil_haut_<zone>
#   - Calcule une "marge" dynamique (1/5 de l’écart haut-bas)
#   - Détermine une couleur selon la position du niveau mesuré :
#       blue        → très bas
#       light_blue  → bas
#       light_green → légèrement sous seuil
#       green       → optimal
#       yellow      → légèrement au-dessus
#       red         → très élevé
#       grey        → valeurs invalides ou seuils incohérents
#
# 🔁 Rafraîchissement :
#   - Déclenché sur chaque changement d’une valeur surveillée
#   - Réévalué au démarrage de Home Assistant
#
# 🧠 Détails techniques :
#   - Conversion des virgules → points pour compatibilité numérique
#   - Couleur renvoyée sous forme de chaîne texte (non hexadécimale)
#   - Capteurs indépendants pour chaque zone
#
# 📊 Type : Trigger Template Sensors
# 📍 Nom des entités : couleur_humidite_absolue_<zone>
# ==========================================================

- trigger:
    - platform: state
      entity_id:
        - sensor.humidite_absolue_chambre_arnaud
        - sensor.humidite_absolue_seuil_bas_chambre_arnaud
        - sensor.humidite_absolue_seuil_haut_chambre_arnaud
        - input_number.humidite_absolue_couleur_zone_verte
    - platform: homeassistant
      event: start

  sensor:
    - name: "Couleur Humidité absolue Chambre Arnaud"
      unique_id: couleur_humidite_absolue_chambre_arnaud
      state: &couleur_humidite_absolue_logic >
        {% set suffixe = this.entity_id | replace('sensor.couleur_humidite_absolue_', '') %}
        {% set src = 'sensor.humidite_absolue_' ~ suffixe %}
        {% set src_bas = 'sensor.humidite_absolue_seuil_bas_' ~ suffixe %}
        {% set src_haut = 'sensor.humidite_absolue_seuil_haut_' ~ suffixe %}

        {% set raw = states(src) %}
        {% set h = raw | replace(',', '.') | float(999) %}
        {% set bas = states(src_bas) | replace(',', '.') | float(0) %}
        {% set haut = states(src_haut) | replace(',', '.') | float(0) %}
        {% set zone = states('input_number.humidite_absolue_couleur_zone_verte') | float(1.0) %}
        {% set centre = (bas + haut) / 2 %}

        {% if raw in ['unknown', 'unavailable', None] or h == 999 %}
          grey
        {% elif bas == 0 or haut == 0 or bas >= haut %}
          grey
        {% elif h < bas %}
          blue
        {% elif h < centre - zone %}
          light_blue
        {% elif h < centre %}
          light_green
        {% elif h <= centre + zone %}
          green
        {% elif h <= haut %}
          yellow
        {% else %}
          red
        {% endif %}

