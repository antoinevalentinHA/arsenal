# ==========================================================
# 🧠 ARSENAL — TEMPLATE SENSORS
#     Humidite relative — Facade UI (LTS ready)
# ----------------------------------------------------------
# 🎯 ROLE
#   Projection pure des humidites stabilisees vers des
#   entites UI exploitables (LTS compatibles).
#
# 🧱 PRINCIPE
#   - Aucune logique metier
#   - Aucune correction
#   - Aucune memoire
#   - Filtrage UNIQUEMENT via availability
#
# 🔒 GARANTIE
#   - state toujours numerique
#   - pas de pollution LTS
# ==========================================================

- sensor:

    - name: "Humidite relative chambre arnaud"
      unique_id: humidite_relative_chambre_arnaud
      device_class: humidity
      state_class: measurement
      unit_of_measurement: "%"

      availability: >
        {{ states('sensor.humidite_relative_stabilisee_chambre_arnaud') not in ['unknown','unavailable','none'] }}

      state: >
        {{ states('sensor.humidite_relative_stabilisee_chambre_arnaud') | float | round(0) }}

