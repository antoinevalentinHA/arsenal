# ==========================================================
# 💧 TEMPLATE TRIGGERED SENSOR — Point de rosée intérieur (WC - Étage)
# ----------------------------------------------------------
# 🎯 Objectif :
#   Calculer le **point de rosée intérieur** à l’étage, basé sur :
#     • la température maximale observée dans les chambres  
#     • le taux d’humidité relatif de la chambre la plus humide  
#
# ⚙️ Fonctionnement :
#   - Utilise les entités :
#       • `sensor.temperature_max_chambres` → température la plus élevée des chambres  
#       • `sensor.chambre_la_plus_humide` → humidité relative de la chambre la plus humide  
#   - Calcule le **point de rosée (°C)** selon la formule de Magnus-Tetens :
#     ```
#     Td = (b * γ(T, RH)) / (a - γ(T, RH))
#     avec γ = (a*T)/(b+T) + ln(RH/100)
#     ```
#     où a = 17.62 et b = 243.12
#
# 🧠 Détails techniques :
#   - Déclenchement à chaque changement des capteurs de température/humidité
#     ou au démarrage de Home Assistant.
#   - Ignore les valeurs invalides (`unknown`, `unavailable`, `none`, etc.)
#     ou les humidités hors plage (≤0 / >100 %).
#   - En cas d’indisponibilité, conserve la dernière valeur connue.
#
# 📊 Type : Trigger Template Sensor  
# 🌡️ Unité : °C  
# 💧 Icône : mdi:thermometer-water  
# 📍 Entité : sensor.point_de_rosee_interieur_wc  
# ==========================================================

- trigger:
    - platform: state
      entity_id:
        - sensor.temperature_max_chambres
        - sensor.chambre_la_plus_humide
    - platform: homeassistant
      event: start

  sensor:
    - name: "Point de rosée intérieur (wc) – Étage"
      unique_id: point_de_rosee_interieur_wc
      unit_of_measurement: "°C"
      icon: mdi:thermometer-water
      state: >
        {% set t_raw = states('sensor.temperature_max_chambres') %}
        {% set h_raw = states('sensor.chambre_la_plus_humide') %}
        {% set t = t_raw | float(none) %}
        {% set h = h_raw | float(none) %}
        {% if t is not none and h is not none and 0 < h <= 100 %}
          {% set a, b = 17.62, 243.12 %}
          {% set gamma = (a * t) / (b + t) + log(h / 100) %}
          {{ ((b * gamma) / (a - gamma)) | round(1) }}
        {% else %}
          {{ states(this.entity_id) }}
        {% endif %}