# ==========================================================
# 💧 TEMPLATE TRIGGERED SENSOR — Point de rosée intérieur (WC - RDC)
# ----------------------------------------------------------
# 🎯 Objectif :
#   Calculer le **point de rosée intérieur du rez-de-chaussée (RDC)**,
#   basé sur :
#     • la température maximale observée au RDC  
#     • le taux d’humidité relatif de la pièce la plus humide du RDC  
#
# ⚙️ Fonctionnement :
#   - Utilise les entités :
#       • `sensor.temperature_max_rdc` → température la plus élevée (RDC)  
#       • `sensor.piece_rdc_la_plus_humide` → humidité relative max (RDC)  
#   - Calcule le **point de rosée (°C)** selon la formule de Magnus-Tetens :
#     ```
#     Td = (b * γ(T, RH)) / (a - γ(T, RH))
#     avec γ = (a*T)/(b+T) + ln(RH/100)
#     ```
#     où a = 17.62 et b = 243.12
#
# 🧠 Détails techniques :
#   - Déclenchement à chaque variation de température ou d’humidité
#     ou au démarrage de Home Assistant.  
#   - Ignore les valeurs non valides (`unknown`, `unavailable`, `none`, etc.)
#     et les taux d’humidité hors plage (≤0 / >100 %).  
#   - Si aucune donnée exploitable n’est disponible, conserve la dernière valeur connue.  
#
# 📊 Type : Trigger Template Sensor  
# 🌡️ Unité : °C  
# 💧 Icône : mdi:thermometer-water  
# 📍 Entité : sensor.point_de_rosee_interieur_wc_rdc  
# ==========================================================

- trigger:
    - platform: state
      entity_id:
        - sensor.temperature_max_rdc
        - sensor.piece_rdc_la_plus_humide
    - platform: homeassistant
      event: start

  sensor:
    - name: "Point de rosée intérieur (wc) – RDC"
      unique_id: point_de_rosee_interieur_wc_rdc
      unit_of_measurement: "°C"
      icon: mdi:thermometer-water
      state: >
        {% set t_raw = states('sensor.temperature_max_rdc') %}
        {% set h_raw = states('sensor.piece_rdc_la_plus_humide') %}
        {% set t = t_raw | float(none) %}
        {% set h = h_raw | float(none) %}
        {% if t is not none and h is not none and 0 < h <= 100 %}
          {% set a, b = 17.62, 243.12 %}
          {% set gamma = (a * t) / (b + t) + log(h / 100) %}
          {{ ((b * gamma) / (a - gamma)) | round(1) }}
        {% else %}
          {{ states(this.entity_id) }}
        {% endif %}