           and mediane not in ['unknown', 'unavailable'] }}
      state: >
        {% set valeur = states('sensor.temperature_jardin_2_validee') | float(none) %}
        {% set mediane = states('sensor.temperature_jardin_mediane_valide') | float(none) %}
        {{ valeur > (mediane + 1.5) }}
      icon: >
        {% if is_state('binary_sensor.temperature_jardin_2_suspect_chaud', 'on') %}
          mdi:thermometer-alert
        {% else %}
          mdi:thermometer
        {% endif %}

    - name: "Temperature Jardin 3 Suspect Chaud"
      unique_id: temperature_jardin_3_suspect_chaud
      availability: >
        {% set valeur = states('sensor.temperature_jardin_3_validee') %}
        {% set mediane = states('sensor.temperature_jardin_mediane_valide') %}
        {{ valeur not in ['unknown', 'unavailable']
           and mediane not in ['unknown', 'unavailable'] }}
      state: >
        {% set valeur = states('sensor.temperature_jardin_3_validee') | float(none) %}
        {% set mediane = states('sensor.temperature_jardin_mediane_valide') | float(none) %}
        {{ valeur > (mediane + 1.5) }}
      icon: >
        {% if is_state('binary_sensor.temperature_jardin_3_suspect_chaud', 'on') %}
          mdi:thermometer-alert
        {% else %}
          mdi:thermometer
        {% endif %}