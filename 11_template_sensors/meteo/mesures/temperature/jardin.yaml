# ==========================================================
# 🧠 ARSENAL — TEMPLATE TRIGGERED SENSOR
# Température jardin consolidée
# ----------------------------------------------------------
# 🎯 Rôle :
#   Publier la température extérieure canonique selon
#   contrat_axe_temperature_exterieure.md v2.0 :
#     1. 2 sources valides → min()
#     2. 1 source valide   → valeur unique
#     3. 0 source valide   → mémoire de continuité (TTL 30 min)
#     4. TTL expiré        → abstention
#
# 🧱 Contrats appliqués :
#   - contrat_validation.md
#   - contrat_fallback.md
#   - contrat_meteo_gouvernance.md
#   - contrat_axe_temperature_exterieure.md
#
# ⚠️ Contraintes :
#   - consolidation : sensor.temperature_jardin_1 + _2
#   - observation   : sensor.temperature_jardin_3
#   - plage         : -10..50 °C
#   - règle         : min() sur sources valides
#   - niveau 3      : this.state si age ≤ 1800 s
#   - time_pattern  : obligatoire pour expiration TTL
# ==========================================================

- trigger:
    - platform: state
      entity_id:
        - sensor.temperature_jardin_1
        - sensor.temperature_jardin_2
    - platform: time_pattern
      minutes: "/5"
    - platform: homeassistant
      event: start

  sensor:
    - name: "Température Jardin"
      unique_id: temperature_jardin
      device_class: temperature
      state_class: measurement
      unit_of_measurement: "°C"

      state: >
        {% set v1 = states('sensor.temperature_jardin_1') | float(none) %}
        {% set v2 = states('sensor.temperature_jardin_2') | float(none) %}

        {% set v1_valide = v1 is not none and -10 <= v1 <= 50 %}
        {% set v2_valide = v2 is not none and -10 <= v2 <= 50 %}

        {% if v1_valide and v2_valide %}
          {{ [v1, v2] | min | round(1) }}
        {% elif v1_valide %}
          {{ v1 | round(1) }}
        {% elif v2_valide %}
          {{ v2 | round(1) }}
        {% else %}
          {% set last = this.state | float(none) %}
          {% if last is not none %}
            {% set age = (now() | as_timestamp) - (this.last_updated | as_timestamp) %}
            {% if age <= 1800 %}
              {{ last | round(1) }}
            {% else %}
              {{ none }}
            {% endif %}
          {% else %}
            {{ none }}
          {% endif %}
        {% endif %}

      attributes:
        capteur_utilise: >
          {% set v1 = states('sensor.temperature_jardin_1') | float(none) %}
          {% set v2 = states('sensor.temperature_jardin_2') | float(none) %}
          {% set v1_valide = v1 is not none and -10 <= v1 <= 50 %}
          {% set v2_valide = v2 is not none and -10 <= v2 <= 50 %}

          {% if v1_valide and v2_valide %}
            min(jardin_1, jardin_2)
          {% elif v1_valide %}
            sensor.temperature_jardin_1
          {% elif v2_valide %}
            sensor.temperature_jardin_2
          {% else %}
            {% set last = this.state | float(none) %}
            {% if last is not none %}
              {% set age = (now() | as_timestamp) - (this.last_updated | as_timestamp) %}
              {% if age <= 1800 %}
                memoire
              {% else %}
                aucun
              {% endif %}
            {% else %}
              aucun
            {% endif %}
          {% endif %}

        sources_consolidation: >
          sensor.temperature_jardin_1,
          sensor.temperature_jardin_2

        capteurs_observation: "sensor.temperature_jardin_3"

        temperature_jardin_1: "{{ states('sensor.temperature_jardin_1') }}"
        temperature_jardin_2: "{{ states('sensor.temperature_jardin_2') }}"
        temperature_jardin_3: "{{ states('sensor.temperature_jardin_3') }}"