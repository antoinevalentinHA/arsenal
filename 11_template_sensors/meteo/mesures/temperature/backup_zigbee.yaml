# ==========================================================  
# 🧠 ARSENAL — TEMPLATE TRIGGERED SENSORS  
# Températures consolidées intérieures  
# ----------------------------------------------------------  
# 🎯 Rôle :  
#   Publier une température consolidée fiable par zone :  
#     1. source primaire valide  
#     2. source secours valide  
#     3. mémoire de continuité si TTL valide  
#     4. abstention  
#  
# 🧱 Contrats appliqués :  
#   - contrat_validation.md  
#   - contrat_fallback.md  
#   - contrat_meteo.md  
#   - contrat_axe_temperature.md  
#  
# ⚠️ Contraintes d'implémentation :  
#   - validation : numérique + plausibilité 8..40 °C  
#   - niveau 3 autorisé : this.state si age ≤ 1800 s  
#   - time_pattern obligatoire pour expiration effective du TTL  
#   - nommage strict : sensor.temperature_<zone> / _1 / _2  
# ==========================================================  
  
- trigger:  
    - platform: state  
      entity_id:  
        - sensor.temperature_chambre_arnaud_1  
        - sensor.temperature_chambre_arnaud_2  
    - platform: time_pattern  
      minutes: "/5"  
    - platform: homeassistant  
      event: start  
  
  sensor:  
    - name: "Température Chambre Arnaud"  
      unique_id: temperature_chambre_arnaud  
      state_class: measurement  
      device_class: temperature  
      unit_of_measurement: "°C"  
      state: &temperature_consolidee >  
        {% set suffixe = this.entity_id | replace('sensor.temperature_', '') %}  
        {% set src1 = 'sensor.temperature_' ~ suffixe ~ '_1' %}  
        {% set src2 = 'sensor.temperature_' ~ suffixe ~ '_2' %}  
  
        {% set v1 = states(src1) | float(none) %}  
        {% set v2 = states(src2) | float(none) %}  
  
        {% set src1_valide = v1 is not none and 8 <= v1 <= 40 %}  
        {% set src2_valide = v2 is not none and 8 <= v2 <= 40 %}  
  
        {% if src1_valide %}  
          {{ v1 | round(1) }}  
        {% elif src2_valide %}  
          {{ v2 | round(1) }}  
        {% else %}  
          {% set last = this.state | float(none) %}  
          {% if last is not none %}  
            {% set age = (now() | as_timestamp) - (this.last_updated | as_timestamp) %}  
            {% if age <= 1800 %}  
              {{ last | round(1) }}  
            {% else %}  
              {{ none }}  
            {% endif %}  
          {% else %}  
            {{ none }}  
          {% endif %}  
        {% endif %}  
  
