# ==========================================================
# 💧 TEMPLATE SENSOR — ECS durée chauffe réel (pic thermique)
# ----------------------------------------------------------
# 🧠 Principe :
#   Durée = input_datetime.ecs_tmax_timestamp - input_datetime.ecs_dernier_cycle_datetime
#
# 🛡️ Version blindée :
#   - JAMAIS "unknown" (retourne 0 min si info manquante)
#   - Pas de this.state
#   - Pas de dépendance au recorder
#   - Entièrement numérique et stable
# ==========================================================

- sensor:
    - name: "ECS durée chauffe réel"
      unique_id: ecs_duree_chauffe_reel
      icon: mdi:timer-outline
      unit_of_measurement: "min"

      # 🔐 Disponible si les deux timestamps existent et sont non vides
      availability: >
        {{ states('input_datetime.ecs_dernier_cycle_datetime') not in ['unknown','unavailable','', None] and
           states('input_datetime.ecs_tmax_timestamp')       not in ['unknown','unavailable','', None] }}

      # 🧮 Durée calculée, toujours numérique
      state: >
        {% set debut = states('input_datetime.ecs_dernier_cycle_datetime') %}
        {% set fin   = states('input_datetime.ecs_tmax_timestamp') %}

        {% if debut in ['unknown','unavailable','', None] or
              fin   in ['unknown','unavailable','', None] %}
          0
        {% else %}
          {% set t1 = as_timestamp(debut) %}
          {% set t2 = as_timestamp(fin) %}
          {% if t1 and t2 and t2 > t1 %}
            {{ ((t2 - t1) / 60) | round(1) }}
          {% else %}
            0
          {% endif %}
        {% endif %}
