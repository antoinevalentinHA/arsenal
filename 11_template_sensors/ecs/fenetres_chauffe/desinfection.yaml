# ==========================================================
# 🧠 BINARY SENSORS — ECS : créneaux en cours (fenêtre 5 min)
# ----------------------------------------------------------
# 🧱 Rôle :
#   Exposer des états booléens "en cours" pour :
#   - un créneau ponctuel ECS (planning hebdo matin/soir)
#   - un créneau désinfection ECS (jour + heure)
#
# 🎯 Modèle :
#   Chaque horaire programmé représente une micro-plage fixe
#   de 5 minutes : [HH:MM → HH:MM + 5 min)
#
# 🧩 Principe Arsenal :
#   - Calcul pur (stateless)
#   - Tolérant au redémarrage
#   - Aucune action / aucun déclenchement
# ==========================================================

- binary_sensor:
    - name: "ECS créneau désinfection en cours"
      unique_id: ecs_creneau_desinfection_en_cours
      default_entity_id: binary_sensor.ecs_creneau_desinfection_en_cours
      state: >
        {% set now_ts = as_timestamp(now()) %}
        {% set today = now().weekday() %}
        {% set ns = namespace(active=false) %}

        {% set target_time = states('input_datetime.ecs_desinfection_heure')[0:5] %}
        {% set jour_cible = states('input_select.ecs_desinfection_jour') %}
        {% set map = {
          'Lundi': 0,
          'Mardi': 1,
          'Mercredi': 2,
          'Jeudi': 3,
          'Vendredi': 4,
          'Samedi': 5,
          'Dimanche': 6
        } %}
        {% set jour_map = map.get(jour_cible, -1) %}

        {% if target_time not in ['unknown','unavailable','none','']
              and today | int == jour_map | int %}
          {% set start_ts = as_timestamp(today_at(target_time)) %}
          {% set end_ts = start_ts + 300 %}
          {% if start_ts <= now_ts < end_ts %}
            {% set ns.active = true %}
          {% endif %}
        {% endif %}

        {{ ns.active }}
      icon: >
        mdi:shield-bug