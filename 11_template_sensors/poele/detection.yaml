# ==========================================================
# 🔥 TEMPLATE BINARY SENSOR — Poele en fonction (rapide & fiable)
# ----------------------------------------------------------
# Détection très rapide du poêle basée sur :
#   - delta10 : accélération thermique précoce (≥ 0.12)
#   - delta30 : montée durable (≥ 0.15)
# Hysteresis pour éviter les oscillations.
# ==========================================================

- binary_sensor:

    - name: "Poêle en fonction"
      unique_id: poele_en_fonction
      default_entity_id: binary_sensor.poele_en_fonction
      device_class: heat
      icon: "mdi:fire"

      state: >
        {% set d10 = states('sensor.sejour_delta_10min')  | float(0) %}
        {% set d30 = states('sensor.sejour_delta_30min') | float(0) %}

        {# --- Si déjà ALLUMÉ : appliquer l'hystérésis (seuils bas) --- #}
        {% if is_state(this.entity_id, 'on') %}
          {{ d10 >= 0.05 and d30 >= 0.10 }}

        {# --- Détection rapide et fiable (seuils hauts) --- #}
        {% else %}
          {{ d10 >= 0.12 and d30 >= 0.15 }}
        {% endif %}
