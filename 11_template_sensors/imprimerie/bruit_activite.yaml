# ==========================================================
# ARSENAL — TEMPLATE SENSORS
# Domaine : monitoring_imprimerie
# Entites : Bruit Imprimerie Activite
# ----------------------------------------------------------
# Role :
#   Synthetiser le niveau d'activite sonore de l'imprimerie
#   a partir du maximum observe sur les machines principales.
#
# Perimetre :
#   - sensor.bruit_imprimerie_activite
#
# Source :
#   - sensor.bruit_komori
#   - sensor.bruit_bobst
#   - sensor.bruit_media
#
# Regle :
#   - Sources indisponibles ignorees
#   - Calcul maintenu si au moins une source est valide
#   - max < 55 dB       -> repos
#   - 55 <= max < 75    -> activite
#   - max >= 75         -> production
#   - aucune source valide -> indisponible
#
# Ne fait PAS :
#   - aucun pilotage
#   - aucune logique UI
#   - aucune interpretation metier supplementaire
#
# Invariant :
#   - entite toujours disponible
#   - indisponibilite portee par le state
#   - bruit_max = maximum des sources valides
# ==========================================================

- sensor:
    - name: Bruit Imprimerie Activite
      unique_id: bruit_imprimerie_activite

      attributes:
        bruit_max: >
          {% set ns = namespace(values=[]) %}
          {% for item in [
            {'entity': 'sensor.bruit_komori', 'zone': 'Komori'},
            {'entity': 'sensor.bruit_bobst', 'zone': 'Bobst'},
            {'entity': 'sensor.bruit_media', 'zone': 'Media'}
          ] %}
            {% if has_value(item.entity) %}
              {% set ns.values = ns.values + [states(item.entity) | float] %}
            {% endif %}
          {% endfor %}
          {% if ns.values | count > 0 %}
            {{ ns.values | max | round(1) }}
          {% endif %}

        zone_max: >
          {% set ns = namespace(max_value=none, max_zone='') %}
          {% for item in [
            {'entity': 'sensor.bruit_komori', 'zone': 'Komori'},
            {'entity': 'sensor.bruit_bobst', 'zone': 'Bobst'},
            {'entity': 'sensor.bruit_media', 'zone': 'Media'}
          ] %}
            {% if has_value(item.entity) %}
              {% set v = states(item.entity) | float %}
              {% if ns.max_value is none or v > ns.max_value %}
                {% set ns.max_value = v %}
                {% set ns.max_zone = item.zone %}
              {% endif %}
            {% endif %}
          {% endfor %}
          {{ ns.max_zone }}

        nb_sources_ok: >
          {% set ns = namespace(count=0) %}
          {% for entity in [
            'sensor.bruit_komori',
            'sensor.bruit_bobst',
            'sensor.bruit_media'
          ] %}
            {% if has_value(entity) %}
              {% set ns.count = ns.count + 1 %}
            {% endif %}
          {% endfor %}
          {{ ns.count }}

        nb_sources_ko: >
          {% set ns = namespace(count=0) %}
          {% for entity in [
            'sensor.bruit_komori',
            'sensor.bruit_bobst',
            'sensor.bruit_media'
          ] %}
            {% if not has_value(entity) %}
              {% set ns.count = ns.count + 1 %}
            {% endif %}
          {% endfor %}
          {{ ns.count }}

        sources_ko: >
          {% set ns = namespace(items=[]) %}
          {% for item in [
            {'entity': 'sensor.bruit_komori', 'zone': 'Komori'},
            {'entity': 'sensor.bruit_bobst', 'zone': 'Bobst'},
            {'entity': 'sensor.bruit_media', 'zone': 'Media'}
          ] %}
            {% if not has_value(item.entity) %}
              {% set ns.items = ns.items + [item.zone] %}
            {% endif %}
          {% endfor %}
          {{ ns.items | join(', ') }}

        seuil_repos: 55
        seuil_production: 75

      state: >
        {% set ns = namespace(values=[]) %}
        {% for entity in [
          'sensor.bruit_komori',
          'sensor.bruit_bobst',
          'sensor.bruit_media'
        ] %}
          {% if has_value(entity) %}
            {% set ns.values = ns.values + [states(entity) | float] %}
          {% endif %}
        {% endfor %}
        {% if ns.values | count == 0 %}
          indisponible
        {% elif ns.values | max >= 75 %}
          production
        {% elif ns.values | max >= 55 %}
          activite
        {% else %}
          repos
        {% endif %}