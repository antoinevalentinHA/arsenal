# ==========================================================
# 🧠 ARSENAL — TEMPLATE BINARY SENSORS (CONTACTS)
#     OUVERTURES — CAPTEURS REDONDANTS (Aqara + Sonoff)
# ----------------------------------------------------------
# 📌 Fichier
#   homeassistant/11_template_sensors/ouvertures/capteurs_contact_redondants.yaml
#
# 🎯 ROLE
#   - Couche NORMALISATION N1 : binary_sensor.contact_* (canon)
#   - Réconciliation A/B conforme au contrat v2.0
#
# 🧱 PRINCIPE
#   - Dernier événement valide reçu (on/off) = vérité réconciliée
#   - unknown / unavailable ignorés pour la réconciliation
#   - État précédent conservé via this.state
#   - Restauration automatique au redémarrage (trigger-based)
#   - Exposer divergence / degrade en attributs (observabilité)
#
# ⚠️ NOTE HA
#   - Un seul bloc trigger couvrant tous les capteurs sources
#   - Pas d'ancres inter-blocs (fragile dans HA)
#   - Fallback final : unknown (jamais off sans événement valide — contrat I5)
# ==========================================================

- trigger:
    - platform: state
      entity_id:
        # Chambre Parents
        - binary_sensor.contact_chambre_parents_gauche_1
        - binary_sensor.contact_chambre_parents_gauche_2
        - binary_sensor.contact_chambre_parents_milieu_1
        - binary_sensor.contact_chambre_parents_milieu_2
        - binary_sensor.contact_chambre_parents_droite_1
        - binary_sensor.contact_chambre_parents_droite_2
        # Garage
        - binary_sensor.contact_garage_1
        - binary_sensor.contact_garage_2
        # Séjour
        - binary_sensor.contact_sejour_3_1
        - binary_sensor.contact_sejour_3_2
        # Chambres enfants
        - binary_sensor.contact_chambre_arnaud_1
        - binary_sensor.contact_chambre_arnaud_2
        - binary_sensor.contact_chambre_matthieu_1
        - binary_sensor.contact_chambre_matthieu_2
        # Entree
        - binary_sensor.contact_entree_porte_1
        - binary_sensor.contact_entree_porte_2

  binary_sensor:

    # ----------------------------------------------------------
    # PORTE ENTREE
    # ----------------------------------------------------------
    - name: "Contact Entree Porte"
      unique_id: contact_entree_porte
      device_class: door
      state: >
        {% set new_state = trigger.to_state.state %}
        {% if trigger.entity_id in [
            'binary_sensor.contact_entree_porte_1',
            'binary_sensor.contact_entree_porte_2'
          ] and new_state in ['on', 'off'] %}
          {{ new_state }}
        {% else %}
          {{ this.state if this.state in ['on', 'off'] else 'unknown' }}
        {% endif %}
      icon: >
        {{ 'mdi:door-open' if this.state == 'on' else 'mdi:door-closed' }}
      attributes:
        source_entity_a: binary_sensor.contact_entree_porte_1
        source_entity_b: binary_sensor.contact_entree_porte_2
        etat_a: "{{ states('binary_sensor.contact_entree_porte_1') }}"
        etat_b: "{{ states('binary_sensor.contact_entree_porte_2') }}"
        degrade: >
          {{ states('binary_sensor.contact_entree_porte_1') in ['unknown', 'unavailable']
             or states('binary_sensor.contact_entree_porte_2') in ['unknown', 'unavailable'] }}
        divergence: >
          {% set a = states('binary_sensor.contact_entree_porte_1') %}
          {% set b = states('binary_sensor.contact_entree_porte_2') %}
          {{ a in ['on','off'] and b in ['on','off'] and a != b }}

    # ----------------------------------------------------------
    # CHAMBRE PARENTS — GAUCHE
    # ----------------------------------------------------------
