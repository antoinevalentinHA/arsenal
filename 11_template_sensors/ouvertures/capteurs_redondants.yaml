# ==========================================================
# 🧠 ARSENAL — TEMPLATE BINARY SENSORS (CONTACTS)
#     OUVERTURES — CAPTEURS REDONDANTS CRITIQUES
# ----------------------------------------------------------
# 📌 Fichier
#   homeassistant/11_template_sensors/ouvertures/capteurs_redondants.yaml
#
# 🎯 ROLE
#   Exposer les capteurs critiques redondants conformes au
#   contrat v2.2, avec logique template auto-paramétrée.
#
# 🧱 PRINCIPE
#   - Le suffixe est dérivé depuis this.entity_id
#   - Les entités sources et helpers sont reconstruites
#     dynamiquement à partir de ce suffixe
#   - Le moteur de décision vit hors de ce fichier
#   - Ce fichier expose l'état métier final et les attributs
#     d'observabilité
#
# 🧩 FORMAT DU CONTEXTE
#   input_text.contact_reconciliation_context_<suffixe>
#   doit contenir un contexte compact sérialisé :
#
#   reconciliation_status | business_state | pending_source | suspect_event | observed_event
#
#   Exemples :
#     stable|off|||
#     quarantine|off|binary_sensor.contact_garage_1||on
#     divergent|off|binary_sensor.contact_garage_1|on_non_corroborated|on
#     inhibited|off|||on
#
# ⚠️ NOTE
#   - Les unique_id restent strictement alignés sur les noms
#     canoniques des capteurs
#   - Les entity_id finaux restent inchangés
#   - Aucun arbitrage métier v2.2 n'est implémenté ici
# ==========================================================

- trigger:
    - platform: state
      entity_id:
        - input_text.contact_reconciliation_context_entree_porte
        - input_text.contact_reconciliation_context_chambre_parents_gauche
        - input_text.contact_reconciliation_context_chambre_parents_milieu
        - input_text.contact_reconciliation_context_chambre_parents_droite
        - input_text.contact_reconciliation_context_garage
        - input_text.contact_reconciliation_context_sejour_3
        - input_text.contact_reconciliation_context_chambre_arnaud
        - input_text.contact_reconciliation_context_chambre_matthieu

        - input_datetime.contact_last_transition_at_entree_porte
        - input_datetime.contact_last_transition_at_chambre_parents_gauche
        - input_datetime.contact_last_transition_at_chambre_parents_milieu
        - input_datetime.contact_last_transition_at_chambre_parents_droite
        - input_datetime.contact_last_transition_at_garage
        - input_datetime.contact_last_transition_at_sejour_3
        - input_datetime.contact_last_transition_at_chambre_arnaud
        - input_datetime.contact_last_transition_at_chambre_matthieu

        - binary_sensor.contact_entree_porte_1
        - binary_sensor.contact_entree_porte_2
        - binary_sensor.contact_chambre_parents_gauche_1
        - binary_sensor.contact_chambre_parents_gauche_2
        - binary_sensor.contact_chambre_parents_milieu_1
        - binary_sensor.contact_chambre_parents_milieu_2
        - binary_sensor.contact_chambre_parents_droite_1
        - binary_sensor.contact_chambre_parents_droite_2
        - binary_sensor.contact_garage_1
        - binary_sensor.contact_garage_2
        - binary_sensor.contact_sejour_3_1
        - binary_sensor.contact_sejour_3_2
        - binary_sensor.contact_chambre_arnaud_1
        - binary_sensor.contact_chambre_arnaud_2
        - binary_sensor.contact_chambre_matthieu_1
        - binary_sensor.contact_chambre_matthieu_2

        - input_boolean.systeme_stable

  binary_sensor:

    # ----------------------------------------------------------
    # CAPTEUR MODELE
    # ----------------------------------------------------------
    - name: "Contact Entree Porte"
      unique_id: contact_entree_porte
      default_entity_id: binary_sensor.contact_entree_porte
      device_class: door

      icon: &contact_redondant_icon_logic >
        {% set suffix = this.entity_id | replace('binary_sensor.contact_', '') %}
        {% set ctx_entity = 'input_text.contact_reconciliation_context_' ~ suffix %}
        {% set ctx = states(ctx_entity) %}
        {% set parts = ctx.split('|') if ctx not in ['unknown', 'unavailable', '', none] else [] %}
        {% set business_state = parts[1] if parts | count > 1 and parts[1] in ['on', 'off'] else 'off' %}

        {% if suffix == 'garage' %}
          {{ 'mdi:garage-open' if business_state == 'on' else 'mdi:garage' }}
        {% elif suffix == 'entree_porte' %}
          {{ 'mdi:door-open' if business_state == 'on' else 'mdi:door-closed' }}
        {% else %}
          {{ 'mdi:window-open-variant' if business_state == 'on' else 'mdi:window-closed-variant' }}
        {% endif %}

      attributes: &contact_redondant_attributes_logic
        observed_event: >
          {% set suffix = this.entity_id | replace('binary_sensor.contact_', '') %}
          {% set ctx_entity = 'input_text.contact_reconciliation_context_' ~ suffix %}
          {% set ctx = states(ctx_entity) %}
          {% set parts = ctx.split('|') if ctx not in ['unknown', 'unavailable', '', none] else [] %}
          {% set observed = parts[4] if parts | count > 4 and parts[4] in ['on', 'off'] else none %}
          {{ observed }}

        business_state: >
          {% set suffix = this.entity_id | replace('binary_sensor.contact_', '') %}
          {% set ctx_entity = 'input_text.contact_reconciliation_context_' ~ suffix %}
          {% set ctx = states(ctx_entity) %}
          {% set parts = ctx.split('|') if ctx not in ['unknown', 'unavailable', '', none] else [] %}
          {% set business_state = parts[1] if parts | count > 1 and parts[1] in ['on', 'off'] else 'off' %}
          {{ business_state }}

        reconciliation_status: >
          {% set suffix = this.entity_id | replace('binary_sensor.contact_', '') %}
          {% set ctx_entity = 'input_text.contact_reconciliation_context_' ~ suffix %}
          {% set ctx = states(ctx_entity) %}
          {% set parts = ctx.split('|') if ctx not in ['unknown', 'unavailable', '', none] else [] %}
          {% set status = parts[0] if parts | count > 0 and parts[0] not in ['', none] else 'stable' %}
          {{ status }}

        suspect_event: >
          {% set suffix = this.entity_id | replace('binary_sensor.contact_', '') %}
          {% set ctx_entity = 'input_text.contact_reconciliation_context_' ~ suffix %}
          {% set ctx = states(ctx_entity) %}
          {% set parts = ctx.split('|') if ctx not in ['unknown', 'unavailable', '', none] else [] %}
          {% set suspect = parts[3] if parts | count > 3 and parts[3] not in ['', none] else none %}
          {{ suspect }}

        source_en_attente: >
          {% set suffix = this.entity_id | replace('binary_sensor.contact_', '') %}
          {% set ctx_entity = 'input_text.contact_reconciliation_context_' ~ suffix %}
          {% set ctx = states(ctx_entity) %}
          {% set parts = ctx.split('|') if ctx not in ['unknown', 'unavailable', '', none] else [] %}
          {% set source = parts[2] if parts | count > 2 and parts[2] not in ['', none] else none %}
          {{ source }}

        divergence_source: >
          {% set suffix = this.entity_id | replace('binary_sensor.contact_', '') %}
          {% set ctx_entity = 'input_text.contact_reconciliation_context_' ~ suffix %}
          {% set ctx = states(ctx_entity) %}
          {% set parts = ctx.split('|') if ctx not in ['unknown', 'unavailable', '', none] else [] %}
          {% set source = parts[2] if parts | count > 2 and parts[2] not in ['', none] else none %}
          {{ source }}

        last_transition_at: >
          {% set suffix = this.entity_id | replace('binary_sensor.contact_', '') %}
          {% set ts_entity = 'input_datetime.contact_last_transition_at_' ~ suffix %}
          {% set ts = states(ts_entity) %}
          {{ none if ts in ['unknown', 'unavailable', '', none] else ts }}

        etat_a: >
          {% set suffix = this.entity_id | replace('binary_sensor.contact_', '') %}
          {% set entity_a = 'binary_sensor.contact_' ~ suffix ~ '_1' %}
          {{ states(entity_a) }}

        etat_b: >
          {% set suffix = this.entity_id | replace('binary_sensor.contact_', '') %}
          {% set entity_b = 'binary_sensor.contact_' ~ suffix ~ '_2' %}
          {{ states(entity_b) }}

        degrade: >
          {% set suffix = this.entity_id | replace('binary_sensor.contact_', '') %}
          {% set entity_a = 'binary_sensor.contact_' ~ suffix ~ '_1' %}
          {% set entity_b = 'binary_sensor.contact_' ~ suffix ~ '_2' %}
          {{ states(entity_a) in ['unknown', 'unavailable']
             or states(entity_b) in ['unknown', 'unavailable'] }}

        divergence: >
          {% set suffix = this.entity_id | replace('binary_sensor.contact_', '') %}
          {% set entity_a = 'binary_sensor.contact_' ~ suffix ~ '_1' %}
          {% set entity_b = 'binary_sensor.contact_' ~ suffix ~ '_2' %}
          {% set a = states(entity_a) %}
          {% set b = states(entity_b) %}
          {{ a in ['on', 'off'] and b in ['on', 'off'] and a != b }}

        systeme_stable: >
          {{ states('input_boolean.systeme_stable') }}

      state: &contact_redondant_state_logic >
        {% set suffix = this.entity_id | replace('binary_sensor.contact_', '') %}
        {% set ctx_entity = 'input_text.contact_reconciliation_context_' ~ suffix %}
        {% set ctx = states(ctx_entity) %}
        {% set parts = ctx.split('|') if ctx not in ['unknown', 'unavailable', '', none] else [] %}
        {% set business_state = parts[1] if parts | count > 1 and parts[1] in ['on', 'off'] else 'off' %}
        {{ business_state == 'on' }}

    # ----------------------------------------------------------
    # CHAMBRE PARENTS — GAUCHE
    # ----------------------------------------------------------
    - name: "Contact Chambre Parents Gauche"
      unique_id: contact_chambre_parents_gauche
      default_entity_id: binary_sensor.contact_chambre_parents_gauche
      device_class: opening
      icon: *contact_redondant_icon_logic
      attributes: *contact_redondant_attributes_logic
      state: *contact_redondant_state_logic

    # ----------------------------------------------------------
    # CHAMBRE PARENTS — MILIEU
    # ----------------------------------------------------------
    - name: "Contact Chambre Parents Milieu"
      unique_id: contact_chambre_parents_milieu
      default_entity_id: binary_sensor.contact_chambre_parents_milieu
      device_class: opening
      icon: *contact_redondant_icon_logic
      attributes: *contact_redondant_attributes_logic
      state: *contact_redondant_state_logic

    # ----------------------------------------------------------
    # CHAMBRE PARENTS — DROITE
    # ----------------------------------------------------------
    - name: "Contact Chambre Parents Droite"
      unique_id: contact_chambre_parents_droite
      default_entity_id: binary_sensor.contact_chambre_parents_droite
      device_class: opening
      icon: *contact_redondant_icon_logic
      attributes: *contact_redondant_attributes_logic
      state: *contact_redondant_state_logic

    # ----------------------------------------------------------
    # GARAGE
    # ----------------------------------------------------------
    - name: "Contact Garage"
      unique_id: contact_garage
      default_entity_id: binary_sensor.contact_garage
      device_class: garage_door
      icon: *contact_redondant_icon_logic
      attributes: *contact_redondant_attributes_logic
      state: *contact_redondant_state_logic

    # ----------------------------------------------------------
    # SEJOUR 3
    # ----------------------------------------------------------
    - name: "Contact Sejour 3"
      unique_id: contact_sejour_3
      default_entity_id: binary_sensor.contact_sejour_3
      device_class: opening
      icon: *contact_redondant_icon_logic
      attributes: *contact_redondant_attributes_logic
      state: *contact_redondant_state_logic

    # ----------------------------------------------------------
    # CHAMBRE ARNAUD
    # ----------------------------------------------------------
    - name: "Contact Chambre Arnaud"
      unique_id: contact_chambre_arnaud
      default_entity_id: binary_sensor.contact_chambre_arnaud
      device_class: opening
      icon: *contact_redondant_icon_logic
      attributes: *contact_redondant_attributes_logic
      state: *contact_redondant_state_logic

    # ----------------------------------------------------------
    # CHAMBRE MATTHIEU
    # ----------------------------------------------------------
    - name: "Contact Chambre Matthieu"
      unique_id: contact_chambre_matthieu
      default_entity_id: binary_sensor.contact_chambre_matthieu
      device_class: opening
      icon: *contact_redondant_icon_logic
      attributes: *contact_redondant_attributes_logic
      state: *contact_redondant_state_logic