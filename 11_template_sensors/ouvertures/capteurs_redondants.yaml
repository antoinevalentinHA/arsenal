            'binary_sensor.contact_chambre_parents_gauche_2'
          ] and new_state in ['on', 'off'] %}
          {{ new_state }}
        {% else %}
          {{ this.state if this.state in ['on', 'off'] else 'unknown' }}
        {% endif %}
      icon: >
        {{ 'mdi:window-open-variant' if this.state == 'on' else 'mdi:window-closed-variant' }}
      attributes:
        source_entity_a: binary_sensor.contact_chambre_parents_gauche_1
        source_entity_b: binary_sensor.contact_chambre_parents_gauche_2
        etat_a: "{{ states('binary_sensor.contact_chambre_parents_gauche_1') }}"
        etat_b: "{{ states('binary_sensor.contact_chambre_parents_gauche_2') }}"
