# ==========================================================
# 🧠 ARSENAL — TEMPLATE BINARY SENSOR (MODERNE)
#     Fenêtre ouverte (Maison)
# ----------------------------------------------------------
# Rôle :
#   ON si au moins une fenêtre est ouverte (sans délais de grâce).
#
# Préservation :
#   - entity_id historique : binary_sensor.fenetre_ouverte_maison
# ==========================================================

- binary_sensor:
    - name: "Fenêtre ouverte (Maison)"
      unique_id: fenetre_ouverte_maison
      default_entity_id: binary_sensor.fenetre_ouverte_maison
      device_class: opening

      icon: >
        {% if is_state(this.entity_id, 'on') %}
          mdi:window-open-variant
        {% else %}
          mdi:window-closed-variant
        {% endif %}

      state: >
        {% set fenetres = [
          'binary_sensor.contact_chambre_arnaud',
          'binary_sensor.contact_chambre_matthieu',
          'binary_sensor.contact_chambre_parents',
          'binary_sensor.contact_sejour',
          'binary_sensor.contact_entree_fenetre'
        ] %}
        {{ fenetres | select('is_state', 'on') | list | length > 0 }}