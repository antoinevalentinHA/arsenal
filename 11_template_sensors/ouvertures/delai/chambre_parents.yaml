# ==========================================================
# 🪟 TEMPLATE BINARY SENSOR — Chambre parents (grâce)
# ----------------------------------------------------------
# 💡 Logique Arsenal :
#   ON SEULEMENT si :
#     1) une fenêtre parents est ouverte (N1 : contact_*)
#     2) ET timer = idle
#     3) ET timer a changé d’état APRES la dernière ouverture
#
#   Pendant la grâce :
#     - timer devient active puis revient idle
#     - le capteur reste OFF jusqu’au retour idle (condition 3)
# ==========================================================

- binary_sensor:

    - name: "Fenêtre chambre parents (grâce)"
      unique_id: fenetre_chambre_parents_ouverte_avec_delai
      default_entity_id: binary_sensor.fenetre_chambre_parents_ouverte_avec_delai
      device_class: opening

      icon: >
        {% set fenetres = [
          'binary_sensor.contact_chambre_parents_droite',
          'binary_sensor.contact_chambre_parents_gauche',
          'binary_sensor.contact_chambre_parents_milieu'
        ] %}

        {% set open_entities = fenetres | select('is_state','on') | list %}
        {% set any_open = (open_entities | length > 0) %}

        {% set t = 'timer.fenetre_chambre_parents_grace' %}
        {% set t_state = states(t) %}
        {% set t_lc = as_timestamp(states[t].last_changed) if states[t] is not none else 0 %}

        {% set last_open = 0 %}
        {% for e in open_entities %}
          {% set lc = as_timestamp(states[e].last_changed) %}
          {% if lc > last_open %}
            {% set last_open = lc %}
          {% endif %}
        {% endfor %}

        {% set grace_pending = any_open and (t_state == 'active' or (t_state == 'idle' and t_lc <= last_open)) %}

        {% if is_state(this.entity_id, 'on') %}
          mdi:window-open-variant
        {% elif grace_pending %}
          mdi:timer-sand
        {% elif any_open %}
          mdi:window-open-variant
        {% else %}
          mdi:window-closed-variant
        {% endif %}

      state: >
        {% set fenetres = [
          'binary_sensor.contact_chambre_parents_droite',
          'binary_sensor.contact_chambre_parents_gauche',
          'binary_sensor.contact_chambre_parents_milieu'
        ] %}

        {% set open_entities = fenetres | select('is_state','on') | list %}
        {% set any_open = (open_entities | length > 0) %}

        {% set t = 'timer.fenetre_chambre_parents_grace' %}
        {% set t_state = states(t) %}
        {% set t_lc = as_timestamp(states[t].last_changed) if states[t] is not none else 0 %}

        {% set last_open = 0 %}
        {% for e in open_entities %}
          {% set lc = as_timestamp(states[e].last_changed) %}
          {% if lc > last_open %}
            {% set last_open = lc %}
          {% endif %}
        {% endfor %}

        {% set ok = any_open and t_state == 'idle' and t_lc > last_open %}
        {{ 'on' if ok else 'off' }}