# ==========================================================
# 🧠 ARSENAL — TEMPLATE BINARY SENSOR (MODERNE)
#     Fenêtre ouverte (Maison) - Mixte avec délais
# ----------------------------------------------------------
# Combinaisons :
#   • Entrée            → immédiat
#   • Séjour            → après délai (fenetre_sejour_ouverte_avec_delai)
#   • Étage             → mixte (fenetre_ouverte_etage_avec_delai)
#
# Préservation :
#   - entity_id historique : binary_sensor.fenetre_ouverte_maison_avec_delai
#
# 🧱 Invariants :
#   - Aucune dépendance aux capteurs physiques (capteur_*) : N1 uniquement
#   - State explicite on/off (pas de booléen)
# ==========================================================

- binary_sensor:

    - name: "Fenêtre ouverte (Maison) - Mixte avec délais"
      unique_id: fenetre_ouverte_maison_avec_delai
      default_entity_id: binary_sensor.fenetre_ouverte_maison_avec_delai
      device_class: opening

      icon: >
        {% set entree_open = is_state('binary_sensor.contact_entree_fenetre', 'on') %}

        {% set parents_fenetres = [
          'binary_sensor.contact_chambre_parents_droite',
          'binary_sensor.contact_chambre_parents_gauche',
          'binary_sensor.contact_chambre_parents_milieu'
        ] %}
        {% set parents_open = (parents_fenetres | select('is_state', 'on') | list | length > 0) %}
        {% set parents_grace_echue = is_state('input_boolean.chambre_parents_grace_echue', 'on') %}
        {% set parents_timer = states('timer.fenetre_chambre_parents_grace') %}
        {% set grace_etage = parents_open and parents_timer == 'active' and not parents_grace_echue %}

        {% set sejour_fenetres = [
          'binary_sensor.contact_sejour_1',
          'binary_sensor.contact_sejour_2',
          'binary_sensor.contact_sejour_3',
          'binary_sensor.contact_sejour_4'
        ] %}
        {% set sejour_open = (sejour_fenetres | select('is_state', 'on') | list | length > 0) %}
        {% set sejour_grace_echue = is_state('input_boolean.sejour_grace_echue', 'on') %}
        {% set sejour_timer = states('timer.fenetre_sejour_ouverte_grace') %}
        {% set grace_sejour = sejour_open and sejour_timer == 'active' and not sejour_grace_echue %}

        {% if is_state(this.entity_id, 'on') %}
          mdi:window-open-variant
        {% elif entree_open %}
          mdi:window-open-variant
        {% elif grace_etage or grace_sejour %}
          mdi:timer-sand
        {% else %}
          mdi:window-closed-variant
        {% endif %}

      state: >
        {% set entree_open = is_state('binary_sensor.contact_entree_fenetre', 'on') %}
        {% set sejour_ok   = is_state('binary_sensor.fenetre_sejour_ouverte_avec_delai', 'on') %}
        {% set etage_ok    = is_state('binary_sensor.fenetre_ouverte_etage_avec_delai', 'on') %}

        {% set ok = entree_open or sejour_ok or etage_ok %}
        {{ 'on' if ok else 'off' }}