# 🎯 ROLE
#   Fournir des signaux CANONS stables pour l’orchestration :
#   - fermeture stable (anti OFF furtif)
#
# 🧱 PRINCIPE
#   - Dépend UNIQUEMENT de N2 (contact_fenetres_maison)
