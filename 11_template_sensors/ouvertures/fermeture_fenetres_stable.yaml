- binary_sensor:

    - name: "Fenetres Maison — Fermees stable"
      unique_id: fenetres_maison_fermees_stable
      state: >
        {{ is_state('binary_sensor.contact_fenetres_maison', 'off') }}

      delay_on: "00:00:02"

      attributes:
        source_entity: "binary_sensor.contact_fenetres_maison"
        delay_on: "00:00:02"