      attributes: *contact_norm_attr

    - name: "Contact Porte Entree"
      unique_id: contact_porte_entree
      device_class: door
      variables:
        src: binary_sensor.capteur_porte_entree
        kind: door
      state: *contact_norm_state
      icon: *contact_norm_icon
      attributes: *contact_norm_attr

    - name: "Contact Porte Garage"
      unique_id: contact_porte_garage
      device_class: garage_door
      variables:
        src: binary_sensor.capteur_porte_garage
        kind: door
      state: *contact_norm_state
      icon: *contact_norm_icon
      attributes: *contact_norm_attr

    - name: "Contact Sejour 1"
      unique_id: contact_sejour_1
      device_class: opening
      variables:
        src: binary_sensor.capteur_fenetre_sejour_1
        kind: window
      state: *contact_norm_state
      icon: *contact_norm_icon
      attributes: *contact_norm_attr

    - name: "Contact Sejour 2"
      unique_id: contact_sejour_2
      device_class: opening
      variables:
        src: binary_sensor.capteur_fenetre_sejour_2
        kind: window
      state: *contact_norm_state
      icon: *contact_norm_icon
      attributes: *contact_norm_attr

    - name: "Contact Sejour 3"
      unique_id: contact_sejour_3
      device_class: opening
