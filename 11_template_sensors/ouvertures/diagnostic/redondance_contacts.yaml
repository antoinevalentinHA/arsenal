# ==========================================================
# 🧠 ARSENAL — TEMPLATE SENSORS (OUVERTURES / DIAGNOSTIC)
#     Diagnostic redondance contacts
# ----------------------------------------------------------
# 📌 Fichier
#   homeassistant/11_template_sensors/ouvertures/diagnostic/redondance_contacts.yaml
#
# 🎯 ROLE
#   - Exposer l'etat diagnostique synthetique des contacts redondes
#   - Alimenter la restitution UI de diagnostic
#
# 🧱 PRINCIPE
#   - Source : binary_sensor.contact_* reconcilies
#   - Priorite au statut moteur v2.2 :
#       reconciliation_status
#   - Complement par la qualite brute des sources :
#       etat_a, etat_b, divergence, degrade
#
# 📚 ETATS
#   - nominal
#   - divergent
#   - degrade
#   - quarantine
#   - critique
#   - inhibited
#   - unknown
#
# ⚠️ NOTE
#   - Aucun calcul de diagnostic en Lovelace
#   - Aucun role metier
#   - "critique" correspond ici a un moteur en etat divergent
# ==========================================================

- trigger:
    - platform: state
      entity_id:
        - binary_sensor.contact_sejour_3
        - binary_sensor.contact_entree_porte
        - binary_sensor.contact_garage
        - binary_sensor.contact_chambre_parents_gauche
        - binary_sensor.contact_chambre_parents_milieu
        - binary_sensor.contact_chambre_parents_droite
        - binary_sensor.contact_chambre_arnaud
        - binary_sensor.contact_chambre_matthieu
    - platform: homeassistant
      event: start

  sensor:
    - name: "Diagnostic redondance Contact Sejour 3"
      unique_id: diagnostic_redondance_contact_sejour_3

      state: &diagnostic_redondance_logic >
        {% set suffixe = this.entity_id | replace('sensor.diagnostic_redondance_', '') %}
        {% set src = 'binary_sensor.' ~ suffixe %}

        {% set etat = states(src) %}
        {% set reconciliation_status = state_attr(src, 'reconciliation_status') %}
        {% set degrade = state_attr(src, 'degrade') | string | lower == 'true' %}
        {% set divergence = state_attr(src, 'divergence') | string | lower == 'true' %}

        {% if etat in ['unknown', 'unavailable'] %}
          unknown
        {% elif reconciliation_status == 'inhibited' %}
          inhibited
        {% elif reconciliation_status == 'divergent' %}
          critique
        {% elif reconciliation_status == 'quarantine' %}
          quarantine
        {% elif degrade %}
          degrade
        {% elif divergence %}
          divergent
        {% else %}
          nominal
        {% endif %}

      attributes: &diagnostic_redondance_attributes
        source_reconciliee: >
          {% set suffixe = this.entity_id | replace('sensor.diagnostic_redondance_', '') %}
          {{ 'binary_sensor.' ~ suffixe }}

        etat_reconcilie: >
          {% set suffixe = this.entity_id | replace('sensor.diagnostic_redondance_', '') %}
          {% set src = 'binary_sensor.' ~ suffixe %}
          {{ states(src) }}

        business_state: >
          {% set suffixe = this.entity_id | replace('sensor.diagnostic_redondance_', '') %}
          {% set src = 'binary_sensor.' ~ suffixe %}
          {{ state_attr(src, 'business_state') }}

        observed_event: >
          {% set suffixe = this.entity_id | replace('sensor.diagnostic_redondance_', '') %}
          {% set src = 'binary_sensor.' ~ suffixe %}
          {{ state_attr(src, 'observed_event') }}

        reconciliation_status: >
          {% set suffixe = this.entity_id | replace('sensor.diagnostic_redondance_', '') %}
          {% set src = 'binary_sensor.' ~ suffixe %}
          {{ state_attr(src, 'reconciliation_status') }}

        suspect_event: >
          {% set suffixe = this.entity_id | replace('sensor.diagnostic_redondance_', '') %}
          {% set src = 'binary_sensor.' ~ suffixe %}
          {{ state_attr(src, 'suspect_event') }}

        source_en_attente: >
          {% set suffixe = this.entity_id | replace('sensor.diagnostic_redondance_', '') %}
          {% set src = 'binary_sensor.' ~ suffixe %}
          {{ state_attr(src, 'source_en_attente') }}

        last_transition_at: >
          {% set suffixe = this.entity_id | replace('sensor.diagnostic_redondance_', '') %}
          {% set src = 'binary_sensor.' ~ suffixe %}
          {{ state_attr(src, 'last_transition_at') }}

        systeme_stable: >
          {% set suffixe = this.entity_id | replace('sensor.diagnostic_redondance_', '') %}
          {% set src = 'binary_sensor.' ~ suffixe %}
          {{ state_attr(src, 'systeme_stable') }}

        etat_a: >
          {% set suffixe = this.entity_id | replace('sensor.diagnostic_redondance_', '') %}
          {% set src = 'binary_sensor.' ~ suffixe %}
          {{ state_attr(src, 'etat_a') }}

        etat_b: >
          {% set suffixe = this.entity_id | replace('sensor.diagnostic_redondance_', '') %}
          {% set src = 'binary_sensor.' ~ suffixe %}
          {{ state_attr(src, 'etat_b') }}

        degrade: >
          {% set suffixe = this.entity_id | replace('sensor.diagnostic_redondance_', '') %}
          {% set src = 'binary_sensor.' ~ suffixe %}
          {{ state_attr(src, 'degrade') }}

        divergence: >
          {% set suffixe = this.entity_id | replace('sensor.diagnostic_redondance_', '') %}
          {% set src = 'binary_sensor.' ~ suffixe %}
          {{ state_attr(src, 'divergence') }}

    - name: "Diagnostic redondance Contact Garage"
      unique_id: diagnostic_redondance_contact_garage
      state: *diagnostic_redondance_logic
      attributes: *diagnostic_redondance_attributes

    - name: "Diagnostic redondance Contact Entree Porte"
      unique_id: diagnostic_redondance_contact_entree_porte
      state: *diagnostic_redondance_logic
      attributes: *diagnostic_redondance_attributes

    - name: "Diagnostic redondance Contact Chambre Parents Gauche"
      unique_id: diagnostic_redondance_contact_chambre_parents_gauche
      state: *diagnostic_redondance_logic
      attributes: *diagnostic_redondance_attributes

    - name: "Diagnostic redondance Contact Chambre Parents Milieu"
      unique_id: diagnostic_redondance_contact_chambre_parents_milieu
      state: *diagnostic_redondance_logic
      attributes: *diagnostic_redondance_attributes

    - name: "Diagnostic redondance Contact Chambre Parents Droite"
      unique_id: diagnostic_redondance_contact_chambre_parents_droite
      state: *diagnostic_redondance_logic
      attributes: *diagnostic_redondance_attributes

    - name: "Diagnostic redondance Contact Chambre Arnaud"
      unique_id: diagnostic_redondance_contact_chambre_arnaud
      state: *diagnostic_redondance_logic
      attributes: *diagnostic_redondance_attributes

    - name: "Diagnostic redondance Contact Chambre Matthieu"
      unique_id: diagnostic_redondance_contact_chambre_matthieu
      state: *diagnostic_redondance_logic
      attributes: *diagnostic_redondance_attributes