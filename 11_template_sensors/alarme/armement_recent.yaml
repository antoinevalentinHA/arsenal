# ==========================================================
# 🛡️ TEMPLATE BINARY SENSOR — Alarme armée automatiquement (récemment)
# ----------------------------------------------------------
# 💡 Objectif :
#   Indiquer si l’alarme a été armée automatiquement dans les
#   dernières minutes, afin d’éviter un double armement ou de
#   déclencher inutilement des scénarios redondants.
#
# ⚙️ Fonctionnement :
#   - Vérifie la date du dernier déclenchement de l’automatisation :
#       automation.alarme_armement_automatique_en_cas_d_absence
#   - Si cette automatisation a été exécutée il y a moins de 120 secondes,
#     le capteur est actif (true).
#
# 📊 Type : Template Binary Sensor (valeur booléenne)
# 📍 Entité générée : binary_sensor.alarme_armee_auto_recentement
# ==========================================================

- binary_sensor:

    - name: "Alarme armée automatiquement (récemment)"
      unique_id: alarme_armee_auto_recentement
      default_entity_id: binary_sensor.alarme_armee_auto_recentement
      device_class: safety

      state: >
        {% set last = state_attr(
            'automation.alarme_armement_automatique_en_cas_d_absence',
            'last_triggered'
        ) %}

        {% if last is not none %}
          {{ (now() - last).total_seconds() < 120 }}
        {% else %}
          false
        {% endif %}
