# ==========================================================
# 🧠 ARSENAL — BINARY SENSOR : VMC haute vitesse requise
# ----------------------------------------------------------
# 🎯 ROLE
#   Déterminer si une demande instantanée de haute vitesse
#   existe pour la VMC.
#
# 🧱 PRINCIPE
#   - Vérité métier PURE
#   - Aucun timer
#   - Aucune action
#   - Aucune mémoire d'état
#   - Aucun maintien d'hystérésis
#
# 📌 LOGIQUE §5.1
#   ON  → humidité excessive ET aération favorable
#         OU CO₂ excessif si capteur valide
#
#   OFF → aucune demande instantanée de haute vitesse
#
# ⚠️ NOTE
#   Le maintien et la libération de la haute vitesse ne sont
#   pas traités ici. Ils relèvent exclusivement de l'automation
#   d'application VMC.
#
#   Les seuils OFF ne sont pas lus ici :
#   ils relèvent de la libération §5.2 portée par l'automation.
#
# ⚠️ ÉTATS DÉGRADÉS
#   - Capteurs HR indisponibles :
#       interprétés comme non déclenchants pour la demande humidité.
#       Le CO₂ conserve donc seul la capacité de déclencher.
#
#   - CO₂ indisponible :
#       ignoré explicitement via guard co2_valide.
#
#   - Helpers de seuil indisponibles :
#       fallback défensif :
#         • HR ON  = 70 %
#         • CO₂ ON = 1000 ppm
# ==========================================================

- binary_sensor:
    - name: "VMC haute vitesse requise"
      unique_id: vmc_haute_vitesse_requise
      default_entity_id: binary_sensor.vmc_haute_vitesse_requise

      state: >
        {% set seuil_on = states('input_number.vmc_seuil_on') | float(70) %}
        {% set co2_on = states('input_number.vmc_co2_seuil_on') | float(1000) %}

        {% set h_sdb_p = states('sensor.humidite_relative_sdb_parents') | float(0) %}
        {% set h_sdb_e = states('sensor.humidite_relative_sdb_enfants') | float(0) %}
        {% set h_sej = states('sensor.humidite_relative_sejour') | float(0) %}

        {% set co2_state = states('sensor.co2_sejour') %}
        {% set co2_valide = co2_state not in ['unknown', 'unavailable', 'none', ''] %}
        {% set co2 = co2_state | float(0) %}

        {% set aeration_favorable = is_state('binary_sensor.aeration_preferable_etage', 'on') %}

        {% set humidite_haute =
             (h_sdb_p >= seuil_on)
          or (h_sdb_e >= seuil_on)
          or (h_sej >= seuil_on)
        %}

        {% set co2_haut = co2_valide and (co2 >= co2_on) %}

        {{
          (humidite_haute and aeration_favorable)
          or co2_haut
        }}

      icon: >
        {% if is_state(this.entity_id, 'on') %}
          mdi:fan-alert
        {% else %}
          mdi:fan
        {% endif %}