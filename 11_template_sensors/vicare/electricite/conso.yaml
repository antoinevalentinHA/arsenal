# ================================================================
#  TEMPLATE SENSOR : ViCare – Electricité Chaudière (capteurs locaux)
# ---------------------------------------------------------------
#  🧠 Rôle :
#     Fournir des capteurs locaux, robustes et persistants pour
#     la consommation électrique de la chaudière Viessmann.
#
#  🎯 Objectifs :
#     - Découpler complètement des états cloud
#     - Garantir une valeur exploitable pour utility_meter
#     - Assurer un fallback automatique (aucune valeur vide)
#
#  🧩 Sources Viessmann :
#     sensor.vscotho1_200_11_consommation_d_electricite_cette_semaine
#     sensor.vscotho1_200_11_consommation_d_electricite_cette_annee
#
#  💡 Unité :
#     kWh
# ================================================================

- sensor:

    # ==========================================================
    # 🧠 ARSENAL — ANCRE JINJA : ViCare kWh local fallback
    # ----------------------------------------------------------
    # Principe :
    #   - source déterminée par mapping via this.entity_id
    #   - fallback = this.state si source indispo
    # ==========================================================

    - name: "electricite_chaudiere_semaine_local"
      unique_id: electricite_chaudiere_semaine_local
      unit_of_measurement: "kWh"
      icon: mdi:flash
      state: &vicare_kwh_local_fallback >
        {% set map = {
          'sensor.electricite_chaudiere_semaine_local': 'sensor.vscotho1_200_11_consommation_d_electricite_cette_semaine',
          'sensor.electricite_chaudiere_annee_local': 'sensor.vscotho1_200_11_consommation_d_electricite_cette_annee'
        } %}
        {% set src = map.get(this.entity_id) %}
        {% if not src %}
          {{ this.state }}
        {% else %}
          {% set v = states(src) %}
          {% if v in ['unknown','unavailable','none','None',''] %}
            {{ this.state }}
          {% else %}
            {{ v | float }}
          {% endif %}
        {% endif %}

    - name: "electricite_chaudiere_annee_local"
      unique_id: electricite_chaudiere_annee_local
      unit_of_measurement: "kWh"
      icon: mdi:flash
      state: *vicare_kwh_local_fallback
