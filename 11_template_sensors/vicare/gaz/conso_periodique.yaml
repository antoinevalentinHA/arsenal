# ================================================================
#  TEMPLATE SENSOR : ViCare – Gaz (capteurs locaux)
# ---------------------------------------------------------------
#  🧠 Rôle :
#     Fournir des capteurs locaux et persistants pour la
#     consommation de gaz, avec fallback intégral en cas 
#     de perte cloud Viessmann.
#
#  🎯 Objectifs :
#     - Sécuriser les données pour utility_meter
#     - Stabiliser les dashboards
#     - Donner une valeur toujours disponible
#
#  🧩 Sources Viessmann :
#     sensor.vscotho1_200_11_consommation_de_gaz_pour_l_ecs_cette_semaine
#     sensor.vscotho1_200_11_consommation_de_gaz_pour_l_ecs_ce_mois_ci
#     sensor.vscotho1_200_11_consommation_de_gaz_pour_l_ecs_cette_annee
#     sensor.vscotho1_200_11_consommation_de_gaz_de_chauffage_aujourd_hui
#     sensor.vscotho1_200_11_heating_gas_consumption_this_month
#     sensor.vscotho1_200_11_heating_gas_consumption_this_year
#
#  💡 Unités :
#     kWh (PCI)
# ================================================================

- sensor:

    # ------------------------------------------------------------
    # Consommation de gaz – ECS (aujourd’hui)
    # ------------------------------------------------------------
    - name: "gaz_ecs_jour_local"
      unique_id: gaz_ecs_jour_local
      unit_of_measurement: "kWh"
      icon: mdi:water-boiler
      state: &vicare_kwh_local_fallback >
        {% set map = {
          'sensor.gaz_ecs_jour_local': 'sensor.vscotho1_200_11_consommation_de_gaz_pour_l_ecs_aujourd_hui',
          'sensor.gaz_ecs_semaine_local': 'sensor.vscotho1_200_11_consommation_de_gaz_pour_l_ecs_cette_semaine',
          'sensor.gaz_ecs_mois_local': 'sensor.vscotho1_200_11_consommation_de_gaz_pour_l_ecs_ce_mois_ci',
          'sensor.gaz_ecs_annee_local': 'sensor.vscotho1_200_11_consommation_de_gaz_pour_l_ecs_cette_annee',

          'sensor.gaz_chauffage_aujourdhui_local': 'sensor.vscotho1_200_11_consommation_de_gaz_de_chauffage_aujourd_hui',
          'sensor.gaz_chauffage_mois_local': 'sensor.vscotho1_200_11_heating_gas_consumption_this_month',
          'sensor.gaz_chauffage_annee_local': 'sensor.vscotho1_200_11_heating_gas_consumption_this_year',

          'sensor.electricite_chaudiere_semaine_local': 'sensor.vscotho1_200_11_consommation_d_electricite_cette_semaine',
          'sensor.electricite_chaudiere_annee_local': 'sensor.vscotho1_200_11_consommation_d_electricite_cette_annee'
        } %}
        {% set src = map.get(this.entity_id) %}
        {% if not src %}
          {{ this.state }}
        {% else %}
          {% set v = states(src) %}
          {% if v in ['unknown','unavailable','none','None',''] %}
            {{ this.state }}
          {% else %}
            {{ v | float }}
          {% endif %}
        {% endif %}

    # ------------------------------------------------------------
    # Consommation de gaz – ECS (cette semaine)
    # ------------------------------------------------------------
    - name: "gaz_ecs_semaine_local"
      unique_id: gaz_ecs_semaine_local
      unit_of_measurement: "kWh"
      icon: mdi:water-boiler
      state: *vicare_kwh_local_fallback

    # ------------------------------------------------------------
    # Consommation de gaz – ECS (ce mois-ci)
    # ------------------------------------------------------------
    - name: "gaz_ecs_mois_local"
      unique_id: gaz_ecs_mois_local
      unit_of_measurement: "kWh"
      icon: mdi:water-boiler
      state: *vicare_kwh_local_fallback

    # ------------------------------------------------------------
    # Consommation de gaz – ECS (cette année)
    # ------------------------------------------------------------
    - name: "gaz_ecs_annee_local"
      unique_id: gaz_ecs_annee_local
      unit_of_measurement: "kWh"
      icon: mdi:water-boiler
      state: *vicare_kwh_local_fallback

    # ------------------------------------------------------------
    # Consommation de gaz – Chauffage (aujourd’hui)
    # ------------------------------------------------------------
    - name: "gaz_chauffage_aujourdhui_local"
      unique_id: gaz_chauffage_aujourdhui_local
      unit_of_measurement: "kWh"
      icon: mdi:fire
      state: *vicare_kwh_local_fallback

    # ------------------------------------------------------------
    # Consommation de gaz – Chauffage (ce mois-ci)
    # ------------------------------------------------------------
    - name: "gaz_chauffage_mois_local"
      unique_id: gaz_chauffage_mois_local
      unit_of_measurement: "kWh"
      icon: mdi:fire
      state: *vicare_kwh_local_fallback

    # ------------------------------------------------------------
    # Consommation de gaz – Chauffage (cette année)
    # ------------------------------------------------------------
    - name: "gaz_chauffage_annee_local"
      unique_id: gaz_chauffage_annee_local
      unit_of_measurement: "kWh"
      icon: mdi:fire
      state: *vicare_kwh_local_fallback
