# ==========================================================
#  TEMPLATE SENSOR : Gaz Chauffage – Total cumulatif local
# ----------------------------------------------------------
#  Rôle :
#    Exposer le compteur persistant
#    input_number.gaz_chauffage_total_local_store
#    comme un sensor energy compatible statistiques.
# ==========================================================

- sensor:
    - name: "gaz_chauffage_total_local"
      unique_id: gaz_chauffage_total_local
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total
      icon: mdi:fire
      state: >
        {% set v = states('input_number.gaz_chauffage_total_local_store') %}
        {# PROTECTION : tant que l’input_number n’est pas un nombre, on garde l'ancien état #}
        {% if v in ['unknown','unavailable','none','None',''] %}
          {{ states('sensor.gaz_chauffage_total_local') }}
        {% else %}
          {{ v | float(0) }}
        {% endif %}