# ================================================================
#  TEMPLATE SENSOR : ViCare – Gaz Chauffage (capteurs locaux)
# ---------------------------------------------------------------
#  🧠 Rôle :
#     Fournir des capteurs locaux, robustes et persistants,
#     découplés du cloud Viessmann, pour la consommation gaz
#     dédiée au chauffage.
#
#  🎯 Objectifs :
#     - Stabiliser les valeurs pour les utility_meter
#     - Assurer un fallback automatique en cas d'indisponibilité
#     - Garantir une donnée toujours exploitable par HA
#
#  🧩 Sources Viessmann :
#     sensor.vscotho1_200_11_consommation_de_gaz_de_chauffage_aujourd_hui
#     sensor.vscotho1_200_11_heating_gas_consumption_this_month
#     sensor.vscotho1_200_11_heating_gas_consumption_this_year
#
#  💡 Unités :
#     kWh (PCI)
# ================================================================

- sensor:

    # ------------------------------------------------------------
    # Consommation de gaz – Chauffage (aujourd’hui)
    # ------------------------------------------------------------
    - name: "gaz_chauffage_aujourdhui_local"
      unique_id: gaz_chauffage_aujourdhui_local
      unit_of_measurement: "kWh"
      icon: mdi:fire
      state: >
        {% set v = states('sensor.vscotho1_200_11_consommation_de_gaz_de_chauffage_aujourd_hui') %}
        {% if v in ['unknown','unavailable','none','None',''] %}
          {{ states('sensor.gaz_chauffage_aujourdhui_local') }}
        {% else %}
          {{ v | float }}
        {% endif %}

    # ------------------------------------------------------------
    # Consommation de gaz – Chauffage (ce mois-ci)
    # ------------------------------------------------------------
    - name: "gaz_chauffage_mois_local"
      unique_id: gaz_chauffage_mois_local
      unit_of_measurement: "kWh"
      icon: mdi:fire
      state: >
        {% set v = states('sensor.vscotho1_200_11_heating_gas_consumption_this_month') %}
        {% if v in ['unknown','unavailable','none','None',''] %}
          {{ states('sensor.gaz_chauffage_mois_local') }}
        {% else %}
          {{ v | float }}
        {% endif %}

    # ------------------------------------------------------------
    # Consommation de gaz – Chauffage (cette année)
    # ------------------------------------------------------------
    - name: "gaz_chauffage_annee_local"
      unique_id: gaz_chauffage_annee_local
      unit_of_measurement: "kWh"
      icon: mdi:fire
      state: >
        {% set v = states('sensor.vscotho1_200_11_heating_gas_consumption_this_year') %}
        {% if v in ['unknown','unavailable','none','None',''] %}
          {{ states('sensor.gaz_chauffage_annee_local') }}
        {% else %}
          {{ v | float }}
        {% endif %}
