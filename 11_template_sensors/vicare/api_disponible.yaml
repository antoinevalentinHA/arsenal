# ==========================================================
# 🧠 ARSENAL — TEMPLATE BINARY SENSOR (MODERNE)
#     ViCare API disponible
# ----------------------------------------------------------
# 🎯 Rôle :
#   Indiquer si la connexion ViCare (cloud) est considérée comme disponible,
#   sur la base de l'âge des données (sensor.vicare_age_donnees).
#
# 🧱 Principes Arsenal :
#   - Capteur critique (pivot chauffage) : doit être STABLE.
#   - Ne doit pas basculer OFF sur un simple unknown/unavailable (boot/reload).
#   - Si l'âge n'est pas numérique : conserve la dernière valeur connue.
#
# 📍 Entité conservée :
#   - binary_sensor.vicare_api_disponible
# ==========================================================

- binary_sensor:

    - name: "ViCare API disponible"
      unique_id: vicare_api_disponible
      default_entity_id: binary_sensor.vicare_api_disponible
      device_class: connectivity

      state: >
        {% set src = 'sensor.vicare_age_donnees' %}
        {% set s = states(src) %}
        {% set age = s | float(default=none) %}
        {% set seuil_dispo = 45 %}

        {% if age is none %}
          {{ this.state if this.state is not none else false }}
        {% else %}
          {{ age < seuil_dispo }}
        {% endif %}

      attributes:
        age_minutes: >
          {% set src = 'sensor.vicare_age_donnees' %}
          {% set s = states(src) %}
          {% set age = s | float(default=none) %}
          {{ age if age is not none else 'unknown' }}
        status: >
          {% set src = 'sensor.vicare_age_donnees' %}
          {% set s = states(src) %}
          {% set age = s | float(default=none) %}
          {% set seuil_dispo = 45 %}
          {% if age is none %}
            unknown
          {% elif age < 5 %}
            ok
          {% elif age < 15 %}
            degrade
          {% elif age < seuil_dispo %}
            degrade
          {% else %}
            ko
          {% endif %}

      icon: >
        {% set src = 'sensor.vicare_age_donnees' %}
        {% set s = states(src) %}
        {% set age = s | float(default=none) %}
        {% set seuil_dispo = 45 %}

        {% if age is none %}
          mdi:cloud-question
        {% elif age < 5 %}
          mdi:cloud-check
        {% elif age < 15 %}
          mdi:cloud-clock-outline
        {% elif age < seuil_dispo %}
          mdi:cloud-check-outline
        {% else %}
          mdi:cloud-off-outline
        {% endif %}