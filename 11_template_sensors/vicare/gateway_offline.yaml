# ==========================================================
# 🧠 ARSENAL — TEMPLATE BINARY_SENSOR (template: modern)
#     ViCare — Gateway offline
# ----------------------------------------------------------
#  🎯 RÔLE
#     Fait métier stable (diagnostic) :
#       - on  = gateway ViCare probablement offline (>=2 min)
#       - off = gateway ViCare disponible (stable >=2 min)
#
#  🔒 INVARIANT
#     - Aucun diagnostic si système instable
#       (systeme_stable = uptime + délai de stabilisation)
# ==========================================================

- binary_sensor:
    - name: "ViCare — Gateway offline"
      unique_id: vicare_gateway_offline
      device_class: problem
      icon: mdi:router-wireless-off

      availability: >
        {{ is_state('binary_sensor.internet_disponible', 'on')
           and is_state('input_boolean.systeme_stable', 'on') }}

      delay_on: "00:02:00"
      delay_off: "00:02:00"

      state: >
        {{ states('climate.vscotho1_200_11_chauffage') in ['unavailable','unknown'] }}

      attributes:
        climate_state: >
          {{ states('climate.vscotho1_200_11_chauffage') }}
        internet: >
          {{ states('binary_sensor.internet_disponible') }}
        systeme_stable: >
          {{ states('input_boolean.systeme_stable') }}
        climate_last_changed: >
          {% set e = states.climate.vscotho1_200_11_chauffage %}
          {{ e.last_changed if e is not none else none }}