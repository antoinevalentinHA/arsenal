# ==========================================================
# 🧠 ARSENAL — TEMPLATE BINARY SENSOR (BOILER / BRIDGE)
# ----------------------------------------------------------
# 📌 ROLE
#   Exposer un etat degrade de la passerelle chaudiere
#   base sur le heartbeat applicatif.
#
# 🧱 PRINCIPE
#   - Le heartbeat MQTT brut est expose par
#     binary_sensor.boiler_bridge_heartbeat
#   - L'absence de heartbeat pendant 60 s fait passer
#     ce sensor a unavailable
#   - Ce binary_sensor traduit cet etat en probleme lisible
#
# ⚠️ IMPORTANT
#   - online   = connectivite MQTT
#   - degraded = silence applicatif
# ==========================================================

- binary_sensor:
    - name: "Boiler bridge degraded"
      unique_id: boiler_bridge_degraded
      state: >
        {{ states('binary_sensor.boiler_bridge_heartbeat') in ['unavailable', 'unknown'] }}
      device_class: problem
      icon: mdi:heart-broken