# ==========================================================
# 🧠 ARSENAL — TEMPLATE SENSORS (BOILER / COMMAND FEEDBACK)
# ----------------------------------------------------------
# 📌 Fichier
#   11_template_sensors/boiler/boiler_command_feedback.yaml
#
# 🎯 ROLE
#   Exposer une lecture diagnostique simple des acquittements
#   de commande et de la dernière erreur du bus chaudière.
#
# 🧱 PRINCIPE
#   - Lecture des payloads JSON bruts exposés par les
#     sensors MQTT *_raw
#   - Extraction légère des champs utiles au diagnostic :
#     status, reason, domain, action, request_id, ts
#   - Aucune logique métier
#   - status absent → 'unknown' (anomalie protocolaire)
#   - reason absent → 'none' (champ facultatif sauf pour rejected)
#
# 📥 ENTITES SOURCE
#   - sensor.boiler_ack_heating_set_program_raw
#   - sensor.boiler_ack_heating_set_comfort_temperature_raw
#   - sensor.boiler_ack_heating_set_reduced_temperature_raw
#   - sensor.boiler_ack_heating_set_curve_slope_raw
#   - sensor.boiler_ack_heating_set_curve_shift_raw
#   - sensor.boiler_ack_dhw_set_setpoint_raw
#   - sensor.boiler_ack_dhw_oneshot_charge_raw
#   - sensor.boiler_error_last_raw
#
# ⚠️ IMPORTANT
#   - Couche strictement diagnostique légère
#   - Les sensors ack n'exposent ici que :
#       - status
#       - reason
#   - Les champs request_id et ts, bien présents
#     contractuellement dans les payloads ack, ne sont
#     pas exposés à ce stade
#   - Les champs domain et action ne sont pas requis
#     contractuellement pour les ack
#   - accepted n'est PAS un succès métier
#   - seul applied vaut succès d'exécution
#   - ce fichier ne décide rien
#   - il expose uniquement une restitution lisible
# ==========================================================

- sensor:
    # ======================================================
    # ACK — HEATING / SET TEMPERATURE
    # ======================================================

    - name: "Boiler ack heating set temperature status"
      unique_id: boiler_ack_heating_set_temperature_status
      state: >
        {% set raw = states('sensor.boiler_ack_heating_set_temperature_raw') %}
        {% if raw not in ['unknown', 'unavailable', ''] and raw.startswith('{') %}
          {% set payload = raw | from_json %}
          {{ payload.status if payload.status is defined else 'unknown' }}
        {% else %}
          unknown
        {% endif %}
      icon: mdi:list-status

    - name: "Boiler ack heating set temperature reason"
      unique_id: boiler_ack_heating_set_temperature_reason
      state: >
        {% set raw = states('sensor.boiler_ack_heating_set_temperature_raw') %}
        {% if raw not in ['unknown', 'unavailable', ''] and raw.startswith('{') %}
          {% set payload = raw | from_json %}
          {{ payload.reason if payload.reason is defined else 'none' }}
        {% else %}
          none
        {% endif %}
      icon: mdi:message-alert-outline

