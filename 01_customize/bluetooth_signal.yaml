#
# 🔗 Dépendances :
#    - ESPHome / Bluetooth Proxy / intégration BLE
#    - Capteurs physiques Bluetooth
#    - Utilisés par :
#      • dashboards Bluetooth
#      • audits radio
#
# 🚫 Interdits :
#    - Utiliser le RSSI comme condition métier directe
#    - Déclencher une action automatique
#    - Dégrader une logique fonctionnelle
#      en fonction du niveau radio
#
# 🏷️ Statut :
#    - Arsenal v11.x
#    - diagnostic réseau / non décisionnel
# ==========================================================


