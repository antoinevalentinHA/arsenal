# ==========================================================
# 🧠 ARSENAL — CUSTOMIZE : État des batteries (capteurs)
# ----------------------------------------------------------
# 🎯 Rôle :
#    Centraliser l’affichage, le nommage et l’identification
#    de l’ensemble des capteurs de niveau de batterie
#    du système Home Assistant Arsenal.
#
# 🧠 Lecture métier :
#    Les capteurs de batterie sont des INDICATEURS DE SANTÉ
#    du système, pas des capteurs métier.
#    Ils servent à anticiper les défaillances matérielles
#    et à garantir la fiabilité des automatisations.
#
# 🧩 Périmètre :
#    - Définit les friendly_name et icônes
#    - Regroupe tous les capteurs battery (Zigbee, Netatmo,
#      SwitchBot, alarmes, boutons, etc.)
#    - Fournit une lecture claire par zone et par usage
#
# 🔗 Dépendances :
#    - Capteurs battery exposés par les intégrations
#    - Utilisés par :
#      • dashboards de maintenance
#      • alertes batterie faible
#      • audits de fiabilité
#
# 🚫 Interdits :
#    - Prendre une décision métier basée sur ces capteurs
#    - Modifier des seuils ou déclencher des actions ici
#    - Introduire de la logique conditionnelle
#
# 🏷️ Statut :
#    - Arsenal v6.x
#    - maintenance / fiabilité système
# ==========================================================

