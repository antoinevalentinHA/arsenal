# ==========================================================
# 🧠 ARSENAL — CUSTOMIZE : Températures Min / Max 24h
# ----------------------------------------------------------
# 🎯 Rôle :
#    Centraliser l’affichage des températures minimales
#    et maximales observées sur les dernières 24 heures,
#    par zone.
#
# 🧠 Lecture métier :
#    Ces capteurs fournissent une vision RÉTROSPECTIVE
#    du comportement thermique de la maison.
#    Ils sont destinés au diagnostic, à l’analyse
#    et à la compréhension des inerties thermiques.
#
# 🧩 Périmètre :
#    - Définit les friendly_name et icônes
#    - Regroupe les capteurs Min / Max journaliers
#    - Fournit une lecture synthétique par zone
#
# 🔗 Dépendances :
#    - Capteurs de température instantanée
#    - Agrégations temporelles (24h)
#    - Utilisés par :
#      • dashboards de suivi
#      • analyses thermiques
#
# 🚫 Interdits :
#    - Utiliser ces valeurs comme seuils décisionnels
#    - Déclencher une action en temps réel
#    - Corriger ou filtrer les données ici
#
# 🏷️ Statut :
#    - Arsenal v6.x
#    - observation / historique
# ==========================================================


