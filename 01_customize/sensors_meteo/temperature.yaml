# ==========================================================
# 🧠 ARSENAL — CUSTOMIZE : Température (capteurs socle)
# ----------------------------------------------------------
# 🎯 Rôle :
#    Centraliser l’affichage et l’identification des capteurs
#    de température utilisés comme référence thermique
#    dans l’ensemble du système Arsenal.
#
# 🧠 Principe fondamental :
#    La température est la variable MAÎTRESSE du système.
#    Toutes les décisions thermiques (chauffage, climatisation,
#    aération, confort) s’y réfèrent directement ou indirectement.
#
# 🧩 Périmètre :
#    - Définit les friendly_name et icônes
#    - Identifie clairement les capteurs par zone
#    - Ne calcule aucune logique décisionnelle
#
# 🔗 Dépendances :
#    - Capteurs physiques (Zigbee, Netatmo, autres)
#    - Capteurs agrégés (moyennes, extrêmes)
#    - Utilisés par :
#      • chauffage (décision centrale)
#      • climatisation
#      • aération intelligente
#      • diagnostics thermiques
#
# 🚫 Interdits :
#    - Modifier des seuils ou consignes ici
#    - Introduire une logique métier
#    - Appliquer des corrections ou offsets
#
# 🏷️ Statut :
#    - Arsenal v6.x
#    - socle critique / référence absolue
# ==========================================================


