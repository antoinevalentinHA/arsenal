# ==========================================================
# 🧠 ARSENAL — CUSTOMIZE : Point de rosée (capteurs météo)
# ----------------------------------------------------------
# 🎯 Rôle :
#    Centraliser l’affichage des capteurs de point de rosée,
#    indicateur physique de condensation et de risque d’humidité.
#
# 🧠 Lecture métier :
#    Le point de rosée représente la température à laquelle
#    l’air devient saturé en vapeur d’eau.
#    C’est un indicateur DIRECT du risque de condensation
#    (moisissures, parois froides, inconfort).
#
# 🧩 Périmètre :
#    - Définit les friendly_name et icônes
#    - Fournit un diagnostic hygrométrique robuste
#    - Sert de référence croisée avec la température ambiante
#
# 🔗 Dépendances :
#    - Calculé à partir de :
#      • température
#      • humidité relative
#    - Utilisé pour :
#      • diagnostics humidité
#      • analyse de parois froides
#      • compréhension fine du confort
#
# 🚫 Interdits :
#    - Prendre une décision métier isolée
#      sans confrontation à la température réelle
#    - Introduire une logique conditionnelle ici
#
# 🏷️ Statut :
#    - Arsenal v6.x
#    - socle / indicateur physique avancé
# ==========================================================


