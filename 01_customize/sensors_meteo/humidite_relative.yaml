# ==========================================================
# 🧠 ARSENAL — CUSTOMIZE : Humidité relative (capteurs météo)
# ----------------------------------------------------------
# 🎯 Rôle :
#    Centraliser l’affichage des capteurs d’humidité relative
#    à des fins d’observation, de diagnostic et d’interface.
#
# ⚠️ Note métier importante :
#    L’humidité relative est une grandeur DÉPENDANTE
#    de la température.
#    Elle n’est PAS utilisée comme critère décisionnel
#    principal dans Arsenal (aération, chauffage, clim).
#
# 🧩 Périmètre :
#    - Définit les friendly_name et icônes
#    - Fournit une lecture intuitive pour l’utilisateur
#    - N’est PAS une base de décision autonome
#
# 🔗 Dépendances :
#    - Capteurs d’humidité issus des sondes physiques
#    - Complétés / interprétés via :
#      • humidité absolue
#      • humidex
#
# 🚫 Interdits :
#    - Prendre une décision métier basée uniquement
#      sur l’humidité relative
#    - Introduire une logique conditionnelle ici
#
# 🏷️ Statut :
#    - Arsenal v6.x
#    - socle / indicateur contextuel
# ==========================================================


