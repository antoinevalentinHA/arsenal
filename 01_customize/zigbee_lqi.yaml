# ==========================================================
# 🧠 ARSENAL — CUSTOMIZE : Zigbee Link Quality (diagnostic)
# ----------------------------------------------------------
# 🎯 Rôle :
#    Centraliser l’affichage et l’identification des capteurs
#    Zigbee de qualité de liaison (LQI).
#
# 🧠 Lecture métier :
#    Les valeurs de Link Quality représentent l’état de santé
#    du réseau Zigbee (portée, routage, stabilité radio).
#    Elles sont STRICTEMENT diagnostiques.
#
# 🧩 Périmètre :
#    - Définit les friendly_name et icônes
#    - Facilite l’audit du maillage Zigbee
#    - Sert au diagnostic de pertes ou latences
#
# 🔗 Dépendances :
#    - Zigbee2MQTT
#    - Capteurs physiques (boutons, prises, détecteurs)
#    - Utilisés par :
#      • dashboards Zigbee
#      • audits réseau
#
# 🚫 Interdits :
#    - Utiliser le LQI comme condition métier
#    - Déclencher une action automatique
#    - Dégrader une logique fonctionnelle
#      en fonction de la qualité radio
#
# 🏷️ Statut :
#    - Arsenal v6.x
#    - diagnostic réseau / non décisionnel
# ==========================================================


