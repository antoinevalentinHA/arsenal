# 🚫 INTERDITS
#   - Modifier une valeur fonctionnelle
#   - Introduire une logique conditionnelle
#   - Documenter ici le modèle métier du domaine
#
# 🏷️ STATUT
#   Socle — Arsenal v14.x
# ==========================================================

