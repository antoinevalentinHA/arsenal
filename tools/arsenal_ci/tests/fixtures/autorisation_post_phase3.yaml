# FIXTURE CONFORME — standby_force uniquement observe (attributes:)
template:
  - binary_sensor:
      - name: "Chauffage Autorisation Etage 1"
        unique_id: chauffage_autorisation_etage_1
        state: >
          {{ states('sensor.chauffage_perception_etage_1') == 'ok' }}
        attributes:
          standby_force_observe: >
            {{ is_state('input_boolean.standby_force', 'on') }}
          raison: >
            {{ 'standby actif' if is_state('input_boolean.standby_force','on') else 'nominal' }}
