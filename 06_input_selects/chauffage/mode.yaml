# ==========================================================
# 🧠 ARSENAL — INPUT_SELECT : Intention chauffage
# ----------------------------------------------------------
# 🎯 Rôle :
#   Expression explicite de l’INTENTION UTILISATEUR
#   concernant le fonctionnement du chauffage.
#
#   Ce helper indique ce que l’utilisateur AUTORISE
#   ou INTERDIT au système de faire.
#
# 🧩 Nature :
#   Paramètre MÉTIER — intention / autorisation.
#
# ❌ Ne fait PAS :
#   - Ne reflète PAS l’état réel du chauffage
#   - Ne correspond PAS au mode calculé
#   - Ne pilote PAS directement la chaudière
#   - Ne garantit AUCUNE action immédiate
#
# 🔍 Sémantique des valeurs :
#   - Chauffage off :
#       Interdiction explicite de chauffer,
#       quelle que soit la demande thermique.
#   - Chauffage auto :
#       Autorise la décision centrale à choisir
#       le mode (confort / réduit / attente).
#   - Chauffage on :
#       Autorisation forcée du chauffage,
#       sous réserve des sécurités système.
#
# 🔄 Chaîne de responsabilité :
#   input_select.chauffage_mode
#        ↓ (intention)
#   scripts de décision centrale
#        ↓ (arbitrage)
#   sensor.chauffage_mode_calcule
#        ↓ (diagnostic)
#   commandes Viessmann
#
# 🔗 Utilisation :
#   - Dashboards Lovelace :
#       • Sélection utilisateur du cadre chauffage
#   - Scripts de décision chauffage :
#       • Entrée majeure de contexte
#   - Automatisations ViCare :
#       • Déclencheur de recalcul
#
# 🧠 Principe Arsenal associé :
#   - Séparation stricte :
#       • Intention (input_select)
#       • Décision (scripts centraux)
#       • Diagnostic (sensors)
#       • Action (intégration ViCare)
#
# ⚠️ Remarque :
#   Toute modification de ce helper
#   modifie le CADRE de décision,
#   pas le résultat garanti.
# ==========================================================


chauffage_mode:
  name: "Mode chauffage"
  options:
    - "Chauffage off"
    - "Chauffage auto"
    - "Chauffage on"
  #initial: "Chauffage auto"
  icon: mdi:radiator
