# ==========================================================
# 🧠 ARSENAL — INPUT_SELECT : Réglages affichés (Climatisation)
# ----------------------------------------------------------
# 🎯 Rôle :
#   Sélection de la SECTION DE RÉGLAGES AFFICHÉE dans le
#   dashboard « Réglages climatisation » (détail conditionnel).
#
#   Options :
#     • Mode Cool
#     • Mode Heat
#     • Déshumidification et ventilation
#     • Plages horaires et blocages
#
# 🧩 Nature :
#   Contexte d'interface (tolérance visuelle).
#
# ❌ Ne fait PAS :
#   - Ne pilote RIEN
#   - Ne déclenche AUCUNE action
#   - Ne participe à AUCUNE décision
#   - Ne représente PAS un état réel du système
#   - Ne modifie AUCUN réglage de climatisation
#
# 🔗 Utilisation :
#   - Dashboard Lovelace uniquement :
#       18_lovelace/dashboards/climatisation/reglages.yaml
#       (sélecteur → cartes `conditional` de détail)
#
# ⚠️ À ne pas confondre avec `clim_conditions_mode`
#   (`06_input_selects/climatisation/mode_dashboard.yaml`), qui
#   sert le dashboard PRINCIPAL et force l'affichage des
#   conditions par mode. Les deux helpers sont des contextes
#   d'interface distincts, propres à leur page : aucun des deux
#   ne pilote la climatisation, et ils ne se répliquent pas.
#
# ℹ️ Hors sélecteur (toujours visible) :
#   - le bandeau de configuration invalide
#   Aucune information de validité n'est masquée.
#
# 🧠 Principe Arsenal associé :
#   - Séparation stricte UI / Logique / Action
#   - Le backend décide, l'UI observe.
#   - Un helper d'interface n'influence jamais le système.
# ==========================================================

clim_reglages_affichage:
  name: Réglages affichés
  options:
    - Mode Cool
    - Mode Heat
    - Déshumidification et ventilation
    - Plages horaires et blocages
  icon: mdi:tune-vertical
