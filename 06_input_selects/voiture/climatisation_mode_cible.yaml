# ==========================================================
# 🧠 ARSENAL — INPUT_SELECT : Mode de climatisation distante cible (Audi)
# ----------------------------------------------------------
# 🎯 RÔLE
#   Intention utilisateur : mode passé à script.audi_climatisation_distante
#   lors d'une commande manuelle.
#
# 🧩 NATURE
#   Commande utilisateur (helper de réglage). Valeurs = énumération native du
#   service (`comfort` / `economy`) pour rester un passe-plat sans mapping.
#
# ⚠️ RÉSERVE
#   `comfort` est PROUVÉ au terrain (E1). `economy` reste SOUS RÉSERVE tant que
#   l'essai E2 ne l'a pas observé sur ce véhicule (contrat voiture.md, INV-CMD-3).
#
# ❌ NE FAIT PAS
#   - Ne pilote PAS le véhicule directement
#   - Ne décide RIEN
#   - N'est consommé QUE par le bouton de commande → le script
#
# 🏷️ STATUT
#   UI C25 — couche action bornée (amendement A1)
# ==========================================================

audi_climatisation_mode_cible:
  name: "Audi — mode climatisation cible"
  icon: mdi:car-seat-heater
  options:
    - comfort
    - economy
  initial: comfort
