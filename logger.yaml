# ==========================================================
# 🧠 ARSENAL — LOGGER (MODE PRODUCTION MAÎTRISÉ)
# ----------------------------------------------------------
# 🎯 Objectif :
#   - Silence en exploitation normale
#   - Visibilité sur erreurs réelles réseau/API
#   - Pas d’aveuglement sur timeouts critiques
# ==========================================================

# Niveau global par défaut
default: warning

# Règles spécifiques
logs:

  # ── Core / Sensors ──────────────────────────────────────
  homeassistant.components.sensor: error
  homeassistant.helpers.entity: warning

  # ── Réseau / HTTP / UPnP ────────────────────────────────
  async_upnp_client.profiles.profile: error
  aiohttp.client: warning
  aiohttp.connector: error
  urllib3.connectionpool: warning

  # ── Multimédia ──────────────────────────────────────────
  pychromecast.socket_client: critical
  homeassistant.components.media_player: error
  homeassistant.components.samsungtv: error

  # ── UI / Lovelace ───────────────────────────────────────
  homeassistant.components.lovelace: error

  # ── Climatisation Airstage ──────────────────────────────
  custom_components.fujitsu_airstage: error
  custom_components.fujitsu_airstage.sensor: error

  # ── Audi Connect ────────────────────────────────────────
  custom_components.audiconnect: error
  custom_components.audiconnect.audi_api: error

  # ── Robot aspirateur Roborock ───────────────────────────
  roborock: error
  roborock.version_1_apis: error
  roborock.version_1_apis.roborock_mqtt_client_v1: error
  roborock.cloud_api: error

  # ── Intégrations tierces ────────────────────────────────
  homeassistant.components.withings: error
  aiowithings: error
  homeassistant.components.netatmo: warning
  homeassistant.components.vicare: warning
  homeassistant.components.overkiz: warning

  # ── Système / logs externes ─────────────────────────────
  homeassistant.components.system_log.external: warning
  py.warnings: warning