# 🎯 Rôle :
#    Regrouper l’ensemble des capteurs de niveau de batterie
#    afin de fournir une vue centralisée pour le diagnostic,
#    la maintenance et la surveillance humaine.
#
# 🧠 Lecture métier :
#    Ce groupe est un outil de DIAGNOSTIC UI.
#    Il n’est utilisé que pour l’affichage et la supervision
#    des niveaux de batterie des équipements.
#    Il ne participe à aucune logique système ni décisionnelle.
#
# 🧩 Périmètre :
#    - Capteurs de batterie (Zigbee, Netatmo, SwitchBot, etc.)
#    - Équipements maison et atelier
#    - Tous niveaux confondus
#
# 🔗 Dépendances :
#    - Capteurs batterie exposés par les intégrations
#    - Utilisé par :
#      • dashboards diagnostics (batteries)
#
# 🚫 Interdits :
#    - Utiliser ce groupe comme condition métier
#    - Déclencher une automatisation
#    - Servir de source système (fiabilité, âge des données)
#
# 🏷️ Statut :
#    - Arsenal v6.x
#    - diagnostic / maintenance
# ==========================================================


