# ==========================================================
# 🧠 ARSENAL — GROUP
#     Infrastructure — Capteurs Synology
# ----------------------------------------------------------
# 🎯 RÔLE
#   Regrouper l'ensemble cohérent des capteurs issus du
#   NAS Synology sous une référence statique unique.
#
# 🧩 PÉRIMÈTRE
#   - Agrégation statique uniquement
#   - Télémétrie infrastructure Synology uniquement
#   - CPU, mémoire, réseau, stockage et température
#   - Aucune logique métier
#   - Aucun calcul d'état implicite
#   - Aucun comportement dynamique
#
# 🚫 INTERDITS
#   - Introduire une logique conditionnelle
#   - Utiliser le groupe comme autorité décisionnelle
#   - Déclencher une action métier directe
#   - Utiliser le groupe comme condition fonctionnelle
#   - Mélanger des familles fonctionnelles incohérentes
#   - Ajouter des entités non issues de Synology DSM
#   - Référencer un group.* comme entité membre
#   - Utiliser la clé all:
#
# 🏷️ STATUT
#   Socle — Arsenal v14.x
# ==========================================================

synology_capteurs:
  name: "Capteurs Synology"
  entities:

    ########################################################
    # 🧠 CPU & CHARGE
    ########################################################
    - sensor.nas_valentin_utilisation_du_processeur_autre
    - sensor.nas_valentin_utilisation_du_processeur_utilisateur
    - sensor.nas_valentin_utilisation_du_processeur_systeme
    - sensor.nas_valentin_utilisation_du_processeur_totale
    - sensor.nas_valentin_charge_moyenne_du_processeur_1_min


    ########################################################
    # 🧠 MÉMOIRE
    ########################################################
    - sensor.nas_valentin_utilisation_de_la_memoire_reelle
    - sensor.nas_valentin_memoire_disponible_reelle
    - sensor.nas_valentin_memoire_disponible_espace_d_echange


    ########################################################
    # 🌐 RÉSEAU
    ########################################################
    - sensor.nas_valentin_debit_de_transfert
    - sensor.nas_valentin_debit_de_telechargement


    ########################################################
    # 💾 STOCKAGE — VOLUMES
    ########################################################
    - sensor.nas_valentin_volume_1_etat
    - sensor.nas_valentin_volume_1_temperature_moyenne_du_disque
    - sensor.nas_valentin_volume_1_temperature_maximale_du_disque


    ########################################################
    # 💽 STOCKAGE — DISQUES
    ########################################################
    - sensor.nas_valentin_drive_1_etat
    - sensor.nas_valentin_drive_1_temperature
    - sensor.nas_valentin_drive_2_etat
    - sensor.nas_valentin_drive_2_temperature


    ########################################################
    # 🌡️ TEMPÉRATURE GLOBALE
    ########################################################
    - sensor.nas_valentin_temperature