# ==========================================================
# 🧠 ARSENAL — GROUP : Capteurs Homekit
# ----------------------------------------------------------
# 🎯 Rôle :
#    Regrouper l’ensemble des capteurs issus de l’écosystème
#    Homekit afin de fournir une vue cohérente et centralisée
#    des mesures environnementales.
#
# 🧠 Lecture métier :
#    Ce groupe constitue une SOURCE DE MESURE,
#    pas une source de décision.
#    Les capteurs Netatmo alimentent les diagnostics,
#    les templates et les pipelines, mais ne décident jamais.
#
# 🧩 Périmètre :
#    - Capteurs physiques Netatmo uniquement
#    - Température, humidité, CO₂, pression, bruit, pluie
#    - Regroupement logique par zones
#
# 🔗 Dépendances :
#    - Intégration Homekit
#    - Utilisé par :
#      • capteurs système de contrôle de fraîcheur des données
#      • templates d’audit (âge des données Homekit)
#      • dashboards environnement (lecture)
#
# 🚫 Interdits :
#    - Ajouter des capteurs non Homekit
#    - Utiliser ce groupe comme condition directe
#    - Introduire une logique métier ici
#
# 🏷️ Statut :
#    - Arsenal v6.x
#    - socle mesures / interface
# ==========================================================


