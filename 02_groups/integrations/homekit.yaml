# ==========================================================
# 🧠 ARSENAL — GROUP
#     Environnement — Capteurs HomeKit
# ----------------------------------------------------------
# 🎯 RÔLE
#   Regrouper l'ensemble cohérent des capteurs issus de
#   l'intégration HomeKit sous une référence statique unique.
#
# 🧩 PÉRIMÈTRE
#   - Agrégation statique uniquement
#   - Capteurs environnementaux HomeKit uniquement
#   - Température, humidité, CO₂, qualité de l'air, bruit
#   - Aucune logique métier
#   - Aucun calcul d'état implicite
#   - Aucun comportement dynamique
#
# 🚫 INTERDITS
#   - Introduire une logique conditionnelle
#   - Utiliser le groupe comme autorité décisionnelle
#   - Mélanger des familles fonctionnelles incohérentes
#   - Ajouter des entités non issues de HomeKit
#   - Ajouter des entités purement techniques ou métadonnées
#   - Référencer un group.* comme entité membre
#   - Utiliser la clé all:
#
# 🏷️ STATUT
#   Socle — Arsenal v14.x
# ==========================================================

homekit_capteurs:
  name: "Capteurs Homekit"
  entities:

    - sensor.bruit_chambre_enfants
    - sensor.co2_chambre_enfants
    - sensor.humidite_relative_chambre_enfants_1
    - sensor.air_quality_chambre_enfants
    - sensor.temperature_chambre_enfants_1
    - sensor.humidite_relative_chambre_parents_1
    - sensor.co2_chambre_parents
    - sensor.air_quality_chambre_parents
    - sensor.temperature_chambre_parents_1
    - sensor.humidite_relative_jardin_1
    - sensor.temperature_jardin_1
    - sensor.co2_petite_maison
    - sensor.humidite_relative_petite_maison
    - sensor.air_quality_petite_maison
    - sensor.temperature_petite_maison
    - sensor.co2_sejour
    - sensor.humidite_relative_sejour_1
    - sensor.air_quality_sejour
    - sensor.temperature_sejour_1
    - sensor.air_quality_chambre_matthieu
    - sensor.co2_chambre_matthieu
    - sensor.humidite_relative_chambre_matthieu_1
    - sensor.bruit_chambre_matthieu
    - sensor.temperature_chambre_matthieu_1
    - sensor.air_quality_entree
    - sensor.co2_entree
    - sensor.humidite_relative_entree_1
    - sensor.temperature_entree_1
    - sensor.humidite_relative_jardin_2
    - sensor.temperature_jardin_2