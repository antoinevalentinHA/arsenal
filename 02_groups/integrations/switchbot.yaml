# ==========================================================
# 🧠 ARSENAL — GROUP
#     Environnement — Capteurs SwitchBot
# ----------------------------------------------------------
# 🎯 RÔLE
#   Regrouper l'ensemble cohérent des capteurs issus de
#   l'intégration SwitchBot sous une référence statique unique.
#
# 🧩 PÉRIMÈTRE
#   - Agrégation statique uniquement
#   - Capteurs environnementaux SwitchBot uniquement
#   - Température et humidité relative uniquement
#   - Zones résidentielles, techniques et imprimerie
#   - Aucune logique métier
#   - Aucun calcul d'état implicite
#   - Aucun comportement dynamique
#
# 🚫 INTERDITS
#   - Introduire une logique conditionnelle
#   - Utiliser le groupe comme autorité décisionnelle
#   - Utiliser le groupe comme condition métier directe
#   - Déclencher une action directement depuis ce groupe
#   - Mélanger des familles fonctionnelles incohérentes
#   - Ajouter des entités non issues de SwitchBot
#   - Référencer un group.* comme entité membre
#   - Utiliser la clé all:
#
# 🏷️ STATUT
#   Socle — Arsenal v14.x
# ==========================================================

switchbot_capteurs:
  name: "Capteurs SwitchBot"
  entities:

    ########################################################
    # 🚿 SALLES DE BAINS
    ########################################################
    - sensor.temperature_sdb_parents
    - sensor.humidite_relative_sdb_parents
    - sensor.temperature_sdb_enfants
    - sensor.humidite_relative_sdb_enfants


    ########################################################
    # 🌿 EXTÉRIEUR
    ########################################################
    - sensor.temperature_jardin_3
    - sensor.humidite_relative_jardin_3


    ########################################################
    # 🏗️ ZONES TECHNIQUES
    ########################################################
    - sensor.temperature_garage
    - sensor.humidite_relative_garage
    - sensor.temperature_cave
    - sensor.humidite_relative_cave

    ########################################################
    # 🏭️ IMPRIMERIE
    ########################################################
    - sensor.humidite_relative_commercial
    - sensor.temperature_commercial
    - sensor.humidite_relative_compta
    - sensor.temperature_compta
    - sensor.humidite_relative_devis
    - sensor.temperature_devis
    - sensor.humidite_relative_direction
    - sensor.temperature_direction
    - sensor.humidite_relative_qualite
    - sensor.temperature_qualite
    - sensor.humidite_relative_stock_carton
    - sensor.temperature_stock_carton
    - sensor.humidite_relative_stock_pf
    - sensor.temperature_stock_pf