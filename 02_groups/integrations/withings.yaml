# ==========================================================
# 🧠 ARSENAL — GROUP : Capteurs Withings
# ----------------------------------------------------------
# 🎯 Rôle :
#    Regrouper les capteurs Withings locaux utilisés
#    comme source pour les capteurs système de contrôle
#    de fraîcheur des données de santé et d’activité.
#
# 🧠 Lecture métier :
#    Ce groupe représente une SOURCE DE DONNÉES
#    PERSONNELLES synchronisées.
#    Il ne prend aucune décision et n’influence aucun
#    comportement de la maison.
#    Son rôle est strictement limité à la vérification
#    de la validité temporelle des données Withings.
#
# 🧩 Périmètre :
#    - Sommeil (durées, phases, score)
#    - Signes vitaux agrégés
#    - Activité quotidienne
#    - Capteurs locaux uniquement
#
# 🔗 Dépendances :
#    - Intégration Withings (données locales synchronisées)
#    - Utilisé par :
#      • capteurs système de contrôle de fraîcheur des données
#      • templates d’audit Withings (âge des données)
#
# 🚫 Interdits :
#    - Utiliser ces capteurs pour piloter la maison
#    - Déduire une présence ou une absence
#    - Déclencher une action automatique
#
# 🏷️ Statut :
#    - Arsenal v6.x
#    - socle système / données personnelles
# ==========================================================

withings_capteurs:
  name: "Capteurs Withings"
  entities:

    - sensor.scanwatch_2_battery
    - sensor.withings_average_heart_rate
    - sensor.withings_average_respiratory_rate
    - sensor.withings_breathing_disturbances_intensity
    - sensor.withings_distance_travelled_today
    - sensor.withings_frequence_cardiaque_maximale
    - sensor.withings_frequence_cardiaque_minimale
    - sensor.withings_heure_de_dormir
    - sensor.withings_heure_de_reveil
    - sensor.withings_maximum_respiratory_rate
    - sensor.withings_minimum_respiratory_rate
    - sensor.withings_rem_sleep
    - sensor.withings_ronflement
    - sensor.withings_sleep_score
    - sensor.withings_snoring_episode_count
    - sensor.withings_sommeil_leger
    - sensor.withings_sommeil_profond
    - sensor.withings_steps_today
    - sensor.withings_total_calories_burnt_today
    - sensor.withings_wakeup_count
    - sensor.thermo_battery
