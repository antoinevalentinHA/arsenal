# ==========================================================
# 🧠 ARSENAL — GROUP : Capteurs Netatmo
# ----------------------------------------------------------
# 🎯 Rôle :
#    Regrouper l’ensemble des capteurs issus de l’écosystème
#    Netatmo afin de fournir une vue cohérente et centralisée
#    des mesures environnementales.
#
# 🧠 Lecture métier :
#    Ce groupe constitue une SOURCE DE MESURE,
#    pas une source de décision.
#    Les capteurs Netatmo alimentent les diagnostics,
#    les templates et les pipelines, mais ne décident jamais.
#
# 🧩 Périmètre :
#    - Capteurs physiques Netatmo uniquement
#    - Température, humidité, CO₂, pression, bruit, pluie
#    - Regroupement logique par zones
#
# 🔗 Dépendances :
#    - Intégration Netatmo
#    - Utilisé par :
#      • capteurs système de contrôle de fraîcheur des données
#      • templates d’audit (âge des données Netatmo)
#      • dashboards environnement (lecture)
#
# 🚫 Interdits :
#    - Ajouter des capteurs non Netatmo
#    - Utiliser ce groupe comme condition directe
#    - Introduire une logique métier ici
#
# 🏷️ Statut :
#    - Arsenal v6.x
#    - socle mesures / interface
# ==========================================================

netatmo_capteurs:
  name: "Capteurs Netatmo"
  entities:

    - sensor.pression_chambre_arnaud
    - sensor.bruit_bobst
    - sensor.bobst_102_dioxyde_de_carbone
    - sensor.humidite_relative_bobst
    - sensor.bobst_102_pression_atmospherique
    - sensor.temperature_bobst
    - sensor.humidite_relative_exterieur_2
    - sensor.temperature_exterieur_2
    - sensor.bruit_komori
    - sensor.komori_dioxyde_de_carbone
    - sensor.humidite_relative_komori
    - sensor.komori_pression_atmospherique
    - sensor.temperature_komori
    - sensor.humidite_relative_exterieur_1
    - sensor.temperature_exterieur_1
    - sensor.bruit_media
    - sensor.media_dioxyde_de_carbone
    - sensor.humidite_relative_media
    - sensor.media_pression_atmospherique
    - sensor.temperature_media
    - sensor.pluviometre_precipitation
    - sensor.pluviometre_precipitation_aujourd_hui
    - sensor.pluviometre_precipitation_last_hour
