# ==========================================================
# 🧠 ARSENAL — GROUP
#     Environnement — Capteurs Netatmo
# ----------------------------------------------------------
# 🎯 RÔLE
#   Regrouper l'ensemble cohérent des capteurs issus de
#   l'intégration Netatmo sous une référence statique unique.
#
# 🧩 PÉRIMÈTRE
#   - Agrégation statique uniquement
#   - Capteurs environnementaux Netatmo uniquement
#   - Température, humidité, CO₂, pression, bruit, pluie
#   - Aucune logique métier
#   - Aucun calcul d'état implicite
#   - Aucun comportement dynamique
#
# 🚫 INTERDITS
#   - Introduire une logique conditionnelle
#   - Utiliser le groupe comme autorité décisionnelle
#   - Mélanger des familles fonctionnelles incohérentes
#   - Ajouter des entités non issues de Netatmo
#   - Ajouter des entités purement techniques ou métadonnées
#   - Référencer un group.* comme entité membre
#   - Utiliser la clé all:
#
# 🏷️ STATUT
#   Socle — Arsenal v14.x
# ==========================================================

netatmo_capteurs:
  name: "Capteurs Netatmo"
  entities:

    - sensor.pression_chambre_arnaud
    - sensor.bruit_bobst
    - sensor.bobst_102_dioxyde_de_carbone
    - sensor.humidite_relative_bobst
    - sensor.bobst_102_pression_atmospherique
    - sensor.temperature_bobst
    - sensor.humidite_relative_exterieur_2
    - sensor.temperature_exterieur_2
    - sensor.bruit_komori
    - sensor.komori_dioxyde_de_carbone
    - sensor.humidite_relative_komori
    - sensor.komori_pression_atmospherique
    - sensor.temperature_komori
    - sensor.humidite_relative_exterieur_1
    - sensor.temperature_exterieur_1
    - sensor.bruit_media
    - sensor.media_dioxyde_de_carbone
    - sensor.humidite_relative_media
    - sensor.media_pression_atmospherique
    - sensor.temperature_media
    - sensor.pluviometre_precipitation
    - sensor.pluviometre_precipitation_aujourd_hui
    - sensor.pluviometre_precipitation_last_hour