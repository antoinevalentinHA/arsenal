# ==========================================================
# 🧠 ARSENAL — GROUP
#     ECS — Cumulus Petite Maison
# ----------------------------------------------------------
# 🎯 RÔLE
#   Regrouper l'ensemble cohérent des entités liées au
#   cumulus de la Petite Maison sous une référence statique
#   unique.
#
# 🧩 PÉRIMÈTRE
#   - Agrégation statique uniquement
#   - États, paramètres, mesures et actionneur ECS uniquement
#   - Sous-système ECS secondaire complet
#   - Aucune logique métier
#   - Aucun calcul d'état implicite
#   - Aucun comportement dynamique
#
# 🚫 INTERDITS
#   - Introduire une logique conditionnelle
#   - Utiliser le groupe comme autorité décisionnelle
#   - Déclencher une action directement depuis ce groupe
#   - Mélanger des familles fonctionnelles incohérentes
#   - Ajouter des entités non liées au cumulus
#   - Référencer un group.* comme entité membre
#   - Utiliser la clé all:
#
# 🏷️ STATUT
#   Socle — Arsenal v14.x
# ==========================================================

petite_maison_cumulus:
  name: "Cumulus Petite Maison"
  entities:

    ########################################################
    # 🔥 ÉTATS DE FONCTIONNEMENT
    ########################################################
    - binary_sensor.petite_maison_heating_status
    - binary_sensor.petite_maison_absence_mode
    - binary_sensor.petite_maison_boost_mode
    - binary_sensor.petite_maison_manual_mode


    ########################################################
    # 🎛️ PARAMÈTRES & CONSIGNES
    ########################################################
    - number.petite_maison_expected_number_of_shower
    - number.petite_maison_target_temperature
    - number.petite_maison_water_target_temperature


    ########################################################
    # 🌡️ MESURES ECS
    ########################################################
    - sensor.petite_maison_bottom_tank_water_temperature
    - sensor.petite_maison_control_water_target_temperature
    - sensor.petite_maison_expected_number_of_shower
    - sensor.petite_maison_number_of_shower_remaining
    - sensor.petite_maison_warm_water_remaining


    ########################################################
    # ⚡ ÉNERGIE
    ########################################################
    - sensor.petite_maison_electric_power_consumption
    - sensor.petite_maison_modbuslink_1_2_electric_energy_consumption


    ########################################################
    # 🚿 ACTIONNEUR
    ########################################################
    - water_heater.petite_maison