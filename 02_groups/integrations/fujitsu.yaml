# ==========================================================
# 🧠 ARSENAL — GROUP
#     Climatisation — Capteurs Fujitsu locaux
# ----------------------------------------------------------
# 🎯 RÔLE
#   Regrouper les entités Fujitsu locales servant de
#   référence statique pour l'analyse de fraîcheur des
#   données Airstage.
#
# 🧩 PÉRIMÈTRE
#   - Agrégation statique uniquement
#   - Entités locales Fujitsu uniquement
#   - Aucune logique métier
#   - Aucun calcul d'état implicite
#   - Aucun comportement dynamique
#
# 🚫 INTERDITS
#   - Introduire une logique conditionnelle
#   - Utiliser le groupe comme autorité décisionnelle
#   - Mélanger des familles fonctionnelles incohérentes
#   - Ajouter des entités non Fujitsu
#   - Ajouter des entités de métadonnées système
#   - Référencer un group.* comme entité membre
#   - Utiliser la clé all:
#
# 🏷️ STATUT
#   Socle — Arsenal v14.x
# ==========================================================

fujitsu_capteurs:
  name: "Capteurs Fujitsu"
  entities:
    - switch.clim_power
    - climate.clim
    - switch.clim_economy_mode
    - switch.clim_outdoor_unit_low_noise
    - switch.clim_energy_saving_fan
    - switch.clim_quiet_fan
    - sensor.clim_outdoor_temperature
    - sensor.clim_indoor_temperature