# ==========================================================
# 🧠 ARSENAL — AUTOMATION
#     Alarme — Apprentissage contrôlé des BSSID Wi-Fi maison
# ----------------------------------------------------------
# 🆔 ID
#
#     10120000000016
#
# 🎯 ROLE
#
#     Enrichir automatiquement le référentiel canonique des
#     BSSID Wi-Fi maison lorsque de nouveaux BSSID valides sont
#     observés par une source individuellement éligible.
#
# 🧩 PRINCIPE CONTRACTUEL
#
#     Cohérence source ↔ personne :
#     - téléphone Antoine  → person.valentin
#     - téléphone Constance → person.constance
#
#     Un BSSID ne peut être appris que si la personne couplée à
#     sa source est dans 'Maison securite' au moment de l'écriture.
#
# 🚫 NE FAIT PAS
#
#     - Ne pilote pas l'alarme
#     - Ne décide aucun état de sécurité
#     - Ne qualifie pas la présence Wi-Fi maison
#     - Ne lit jamais un candidat global sans garde source/personne
#     - Ne purge jamais automatiquement le référentiel
#
# ⚙️ COMPORTEMENT
#
#     - Déclenchement sur nouveau BSSID détecté
#     - Reprise possible après stabilisation du système
#     - Lecture des candidats séparés par source
#     - Ré-évaluation de la cohérence source ↔ personne à l'écriture
#     - Validation canonique de chaque BSSID
#     - Fusion ensembliste avec le référentiel existant
#     - Sérialisation triée stable
#     - Rejet sans écriture en cas de dépassement de capacité
#     - Écriture uniquement si ajout réel
#
# 📐 CONTRAT
#
#     CONTRAT_BSSID_MAISON.md
#
# ==========================================================

- id: "10120000000016"
  alias: Système - Apprentissage BSSID
  mode: single

  trigger:

    # Signal métier : nouveau BSSID détecté.
    - platform: state
      entity_id: binary_sensor.wifi_nouveau_bssid
      to: "on"

    # Reprise éventuelle après stabilisation du système.
    - platform: state
      entity_id: input_boolean.systeme_stable
      to: "on"

  condition: []

  action:

    - variables:

        # Référentiel actuel — normalisation canonique.
        current_list: >-
          {% set raw = states('input_text.bssid_maison') | string %}
          {% set ns = namespace(result=[]) %}
          {% for item in raw.split(',') %}
            {% set b = item | trim | lower | replace(':', '') | replace('-', '') %}
            {% if b | length == 12 and b | regex_match('^[0-9a-f]{12}$') %}
              {% set ns.result = ns.result + [b] %}
            {% endif %}
          {% endfor %}
          {{ ns.result | unique | sort | list }}

        # Candidats retenus — garde résiduelle source ↔ personne.
        candidats: >-
          {% set ns = namespace(result=[]) %}

          {% if is_state('person.valentin', 'Maison securite') %}
            {% set csv = state_attr('binary_sensor.wifi_nouveau_bssid', 'candidats_antoine') | default('', true) | string %}
            {% for item in csv.split(',') %}
              {% set b = item | trim | lower | replace(':', '') | replace('-', '') %}
              {% if b | length == 12 and b | regex_match('^[0-9a-f]{12}$') %}
                {% set ns.result = ns.result + [b] %}
              {% endif %}
            {% endfor %}
          {% endif %}

          {% if is_state('person.constance', 'Maison securite') %}
            {% set csv = state_attr('binary_sensor.wifi_nouveau_bssid', 'candidats_constance') | default('', true) | string %}
            {% for item in csv.split(',') %}
              {% set b = item | trim | lower | replace(':', '') | replace('-', '') %}
              {% if b | length == 12 and b | regex_match('^[0-9a-f]{12}$') %}
                {% set ns.result = ns.result + [b] %}
              {% endif %}
            {% endfor %}
          {% endif %}

          {{ ns.result | unique | sort | list }}

        # Fusion, déduplication et tri stable.
        merged: >-
          {{ (current_list + candidats) | unique | sort | list }}

        # Delta réel.
        added: >-
          {{ merged | difference(current_list) | list }}

        # Sérialisation finale et contrôle de capacité.
        merged_str: "{{ merged | join(', ') }}"
        merged_len: "{{ merged_str | length }}"

    - choose:

        # Cas overflow : rejet sans écriture.
        - conditions: "{{ merged_len | int > 255 }}"
          sequence:

            - service: system_log.write
              data:
                level: warning
                logger: custom_components.alarme
                message: >
                  [ALARME] BSSID — ajout rejeté (overflow) :
                  longueur projetée={{ merged_len }} > 255.
                  Nouveaux BSSID non intégrés : {{ added | join(', ') }}
                  Référentiel inchangé ({{ current_list | length }}) : {{ current_list | join(', ') }}

        # Cas utile : ajout réel, capacité respectée.
        - conditions: "{{ added | length > 0 }}"
          sequence:

            - service: input_text.set_value
              target:
                entity_id: input_text.bssid_maison
              data:
                value: "{{ merged_str }}"

            - service: system_log.write
              data:
                level: info
                logger: custom_components.alarme
                message: >
                  [ALARME] BSSID ajouté(s) : {{ added | join(', ') }}
                  Référentiel ({{ merged | length }}) : {{ merged_str }}