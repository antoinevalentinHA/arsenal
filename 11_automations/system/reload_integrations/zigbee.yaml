# ==========================================================
#  🧠 ARSENAL — AUTOMATION :
#     Zigbee2MQTT – Relance bridge (auto) sur hors-ligne persistant
#
#  ID : 1012000000010
# ----------------------------------------------------------
#  🎯 RÔLE
#     Surveiller l’état du bridge Zigbee2MQTT et redémarrer
#     automatiquement l’add-on lorsque le bridge est détecté
#     hors-ligne de manière persistante.
#
#  ✅ PRINCIPE
#     - Déclenchement sur hors-ligne avéré :
#         • bridge_state ∈ {off, unavailable} pendant 5 min
#     - Action :
#         • hassio.addon_restart (Zigbee2MQTT)
#     - Vérification post-restart :
#         • attente active du retour ON (wait_template)
#         • timeout 3 min (échec si pas de retour)
#     - Backoff réel (sans horloge) :
#         • timer.zigbee2mqtt_reload_backoff
#         • délai progressif : 10/20/30/40/50/60 min (cap 60)
#     - Plafond :
#         • blocage après 5 tentatives consécutives
#     - Reset automatique :
#         • dès que le bridge repasse ON (2 min stables)
#
#  🧱 GARDE-FOUS
#     - Pas de time_pattern
#     - Exécution uniquement si systeme_stable = on
# ==========================================================

- id: "1012000000010"
  alias: "Système - Relance Zigbee2MQTT"
  description: >
    Redémarre automatiquement l'add-on Zigbee2MQTT si le bridge reste
    OFF/UNAVAILABLE de façon persistante. Backoff via timer, plafond
    5 tentatives, reset automatique dès retour en ligne.

  mode: single
  max_exceeded: silent

  trigger:
    # Hors-ligne avéré (persistant)
    - platform: template
      value_template: >
        {{ states('binary_sensor.zigbee2mqtt_bridge_connection_state') in ['off','unavailable'] }}
      for: "00:05:00"
      id: offline

    # Backoff écoulé -> nouvelle tentative si toujours hors-ligne
    - platform: event
      event_type: timer.finished
      event_data:
        entity_id: timer.zigbee2mqtt_reload_backoff
      id: backoff

    # Retour en ligne stable -> reset
    - platform: state
      entity_id: binary_sensor.zigbee2mqtt_bridge_connection_state
      to: "on"
      for: "00:02:00"
      id: retour_ok

  condition:
    - condition: state
      entity_id: input_boolean.systeme_stable
      state: "on"

  action:
    - variables:
        tentative: "{{ states('input_number.zigbee_reload_tentatives') | int(0) }}"
        plafond: "{{ tentative >= 5 }}"
        delai_min: >
          {% set d = (tentative + 1) * 10 %}
          {{ [d, 60] | min }}

    # ======================================================
    # ✅ Reset auto si retour en ligne stable
    # ======================================================
    - choose:
        - conditions:
            - condition: trigger
              id: retour_ok
          sequence:
            - service: timer.cancel
              target:
                entity_id: timer.zigbee2mqtt_reload_backoff

            - service: input_number.set_value
              target:
                entity_id: input_number.zigbee_reload_tentatives
              data:
                value: 0

            - stop: "Z2M OK — reset"

    # ======================================================
    # 🧠 Gardien : si backoff finit mais bridge déjà OK -> annule et stop
    # ======================================================
    - choose:
        - conditions:
            - condition: trigger
              id: backoff
            - condition: template
              value_template: >
                {{ is_state('binary_sensor.zigbee2mqtt_bridge_connection_state','on') }}
          sequence:
            - service: timer.cancel
              target:
                entity_id: timer.zigbee2mqtt_reload_backoff
            - stop: "Backoff termine mais bridge OK"

    # ======================================================
    # ⛔ Blocage plafond
    # ======================================================
    - choose:
        - conditions: "{{ plafond }}"
          sequence:
            - service: timer.cancel
              target:
                entity_id: timer.zigbee2mqtt_reload_backoff

            - service: script.notification_envoyer
              data:
                cible: input_text.telephone_antoine_notify
                titre: "⛔ Zigbee2MQTT — blocage sécurité"
                message: >
                  {{ now().strftime('%d/%m %H:%M') }}
                  5 tentatives consécutives échouées.
                  Arrêt des relances automatiques.

            - stop: "Plafond atteint"

    # ======================================================
    # Si on vient d’un nouveau offline, on annule un backoff pendu
    # ======================================================
    - choose:
        - conditions:
            - condition: trigger
              id: offline
          sequence:
            - service: timer.cancel
              target:
                entity_id: timer.zigbee2mqtt_reload_backoff

    # ======================================================
    # 📈 Incrément tentatives
    # ======================================================
    - service: input_number.set_value
      target:
        entity_id: input_number.zigbee_reload_tentatives
      data:
        value: "{{ tentative + 1 }}"

    # ======================================================
    # 🔧 Restart add-on Zigbee2MQTT
    # ======================================================
    - service: hassio.addon_restart
      data:
        addon: a0d7b954_zigbee2mqtt

    # ======================================================
    # 🕦 Attendre le retour réel du bridge (max 3 min)
    # ======================================================
    - wait_template: >
        {{ is_state('binary_sensor.zigbee2mqtt_bridge_connection_state','on') }}
      timeout: "00:03:00"
      continue_on_timeout: true

    - choose:
        # ✅ Succès
        - conditions: >
            {{ is_state('binary_sensor.zigbee2mqtt_bridge_connection_state','on') }}
          sequence:
            - service: timer.cancel
              target:
                entity_id: timer.zigbee2mqtt_reload_backoff

            - service: input_number.set_value
              target:
                entity_id: input_number.zigbee_reload_tentatives
              data:
                value: 0

            - service: script.notification_envoyer
              data:
                cible: input_text.telephone_antoine_notify
                titre: "✅ Zigbee2MQTT relancé"
                message: >
                  {{ now().strftime('%d/%m %H:%M') }}
                  Bridge de nouveau en ligne après redémarrage automatique.

      default:
        # ❌ Échec -> backoff + notification
        - service: timer.start
          target:
            entity_id: timer.zigbee2mqtt_reload_backoff
          data:
            duration: >
              {% set m = delai_min | int(10) %}
              {{ '%02d:%02d:%02d' | format((m // 60), (m % 60), 0) }}

        - service: script.notification_envoyer
          data:
            cible: input_text.telephone_antoine_notify
            titre: "🚨 Zigbee2MQTT hors-ligne"
            message: >
              {{ now().strftime('%d/%m %H:%M') }}
              Tentative n°{{ tentative + 1 }} échouée (timeout).
              Prochaine relance autorisée dans {{ delai_min }} min.
