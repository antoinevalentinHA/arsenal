# ==========================================================
# 🧠 ARSENAL — AUTOMATISATION
#     Netatmo – Remédiation station muette (Salle de Jeux)
# ----------------------------------------------------------
# 🎯 RÔLE
#
#     Exécuter une action corrective ciblée sur la station
#     Netatmo de la Salle de Jeux lorsqu'un diagnostic
#     d'observation dédié l'autorise explicitement.
#
#     Deux modes de silence déclenchent le redémarrage :
#     - muet_ping_ko : station muette ET injoignable au ping
#       (boîtier mort / débranché) → redémarrage immédiat.
#     - muet_ping_ok : station muette mais TOUJOURS joignable au
#       ping (service HAP/HomeKit figé, hôte vivant) → redémarrage
#       après temporisation de confirmation (anti-transitoire).
#       C'est le cas d'un pont HomeKit gelé : aucune relance
#       logicielle ne le réveille, seul un power-cycle récupère.
#
#     Cette automation :
#     - consomme un diagnostic externe dédié
#     - vérifie l'absence de campagne de remédiation réseau
#     - exécute un redémarrage électrique ciblé
#     - notifie l'événement par canal mobile
#
# 🧱 CONTRAT
#
#     - aucune décision locale de diagnostic
#     - aucune remédiation secondaire pendant campagne réseau
#     - action uniquement en état réseau nominal
#     - muet_ping_ok temporisé (débounce) ; muet_ping_ko immédiat
#     - aucune boucle ni retry
# ==========================================================

- id: "10160000000008"
  alias: "Météo - Netatmo - Redémarrage Salle de Jeux"
  mode: single

  trigger:
    # Boîtier mort / injoignable : redémarrage immédiat.
    - platform: state
      entity_id: sensor.diagnostic_netatmo_salle_de_jeux
      to: "muet_ping_ko"
      id: ping_ko

    # Service figé mais hôte joignable (pont HomeKit gelé) : on
    # confirme la persistance du silence avant de power-cycler,
    # pour ne pas rebooter sur un simple trou de report transitoire.
    - platform: state
      entity_id: sensor.diagnostic_netatmo_salle_de_jeux
      to: "muet_ping_ok"
      for: "00:20:00"
      id: ping_ok

  condition:
    - condition: state
      entity_id: input_boolean.systeme_stable
      state: "on"

    - condition: state
      entity_id: input_boolean.reboot_box_en_cours
      state: "off"

    - condition: state
      entity_id: binary_sensor.acces_externe
      state: "on"

    # Pendant une panne secteur, la station muette traduit la perte
    # d'alimentation (KO attendu) : power-cycler sa prise (non secourue) est
    # futile. acces_externe peut rester ON en coupure LOCALE (box sur UPS),
    # d'où cette garde explicite. Reporté en sortie de panne.
    - condition: state
      entity_id: binary_sensor.panne_secteur_en_cours
      state: "off"

  action:
    - action: script.reboot_netatmo
      data:
        switch_entity: "switch.prise_salle_de_jeux"

    - action: script.notification_envoyer
      data:
        cible: input_text.telephone_parent_1_notify
        titre: "🔧 Netatmo – Redémarrage"
        message: >
          Station Netatmo Salle de Jeux redémarrée après détection
          {% if trigger.id == 'ping_ok' %}d'une station muette
          joignable (service figé, ping OK){% else %}d'une station
          muette sans ping{% endif %}.