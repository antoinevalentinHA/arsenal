# ==========================================================
# 🧠 ARSENAL — AUTOMATISATION
#     Netatmo – Remédiation station muette sans ping (Arnaud)
# ----------------------------------------------------------
# 🎯 RÔLE
#
#     Exécuter une action corrective ciblée sur la station
#     Netatmo de la chambre Arnaud lorsqu'un diagnostic
#     d'observation dédié l'autorise explicitement.
#
#     Cette automation :
#     - consomme un diagnostic externe dédié
#     - vérifie l'absence de campagne de remédiation réseau
#     - exécute un redémarrage électrique ciblé
#     - notifie l'événement par canal mobile
#
# 🧱 CONTRAT
#
#     - aucune décision locale de diagnostic
#     - aucune remédiation secondaire pendant campagne réseau
#     - action uniquement en état réseau nominal
#     - aucune boucle ni retry
# ==========================================================

- id: "10160000000007"
  alias: "Météo - Netatmo - Redémarrage Arnaud"
  mode: single

  trigger:
    - platform: state
      entity_id: sensor.diagnostic_netatmo_arnaud
      to: "muet_ping_ko"

  condition:
    - condition: state
      entity_id: input_boolean.reboot_box_en_cours
      state: "off"

    - condition: state
      entity_id: binary_sensor.acces_externe
      state: "on"

    # Pendant une panne secteur, la station muette traduit la perte
    # d'alimentation (KO attendu) : power-cycler sa prise (non secourue) est
    # futile. acces_externe peut rester ON en coupure LOCALE (box sur UPS),
    # d'où cette garde explicite. Reporté en sortie de panne.
    - condition: state
      entity_id: input_boolean.panne_secteur_active
      state: "off"
    - condition: state
      entity_id: binary_sensor.coupure_secteur
      state: "off"

  action:
    - action: script.reboot_netatmo
      data:
        switch_entity: "switch.prise_chambre_arnaud"

    - action: script.notification_envoyer
      data:
        cible: input_text.telephone_antoine_notify
        titre: "🔧 Netatmo – Redémarrage"
        message: >
          Station Netatmo chambre Arnaud redémarrée
          après détection d'une station muette sans ping.