# ==========================================================
# 🧠 ARSENAL — AUTOMATION
#     Météo — Palmarès journées froides — Snapshot
# ----------------------------------------------------------
# 🆔 IDENTIFIANT
#   "10160000000030"
#
# 🎯 RÔLE
#   Capturer la température minimale du jour qui se termine à
#   23:59:55, AVANT la clôture (00:00:05) et le reset (00:00:10),
#   dans le snapshot veille. Survit à la séquence minuit pour
#   alimenter l'évaluation à 00:00:30.
#
#   Si la mémoire courante est hors plage métier, écrit 999
#   dans le snapshot. JAMAIS d'abstention silencieuse.
#
# 🧩 PÉRIMÈTRE
#   - Couvre : capture du minimum journalier civil en fin de journée
#   - Exclut : évaluation du palmarès (responsabilité de l'automation
#              d'évaluation)
#
# 🔖 NATURE
#   Snapshot événementiel
#
# 🔗 RÉFÉRENCE
#   CONTRAT_PALMARES_TEMPERATURE_JOURNALIER_FROID.md V1.0.2
#
# ⚙️ MODE
#   single
#   Justification : déclenchement horaire unique, pas de concurrence
#                  possible sur une capture journalière
#
# 📣 DÉCLENCHEURS
#   - time : 23:59:55 (quotidien)
#
# 🔗 DÉPENDANCES
#   Lit     : input_number.temperature_min_jour_courant_jardin
#   Écrit   : input_number.palmares_temperature_journalier_froid_snapshot_veille
#
# 🧠 AUTORITÉ
#   Décide et applique — capture mécanique avec deux branches
#
# ♻️ IDEMPOTENCE
#   Compatible retrigger — écriture idempotente quelle que soit la branche
#
# 🛡️ SOURCE — POURQUOI LA MÉMOIRE COURANTE
#   À 23:59:55, le snapshot DOIT lire la mémoire courante :
#
#     input_number.temperature_min_jour_courant_jardin
#
#   et NON le sensor exposé `sensor.temperature_min_journaliere_jardin`.
#
#   Raison : la mémoire clôturée (temperature_min_journaliere_jardin)
#   est alimentée à 00:00:05 PAR la clôture. À 23:59:55, elle porte
#   donc la valeur de la JOURNÉE PRÉCÉDENTE, pas celle qui se termine.
#
#   Lire le sensor exposé à 23:59:55 produirait un décalage temporel
#   d'un jour : la valeur snapshottée serait celle de J-1, mais
#   l'évaluation à 00:00:30 lui associerait la date_veille = J
#   (la journée qui vient juste de se terminer). C'est exactement
#   le type de « palmarès plausible mais faux » que combat la
#   doctrine Arsenal (cf. contrat §3.5).
#
#   La séquence correcte est :
#     23:59:55  → snapshot du courant (= jour qui se termine)
#     00:00:05  → clôture officielle (courant → journaliere)
#     00:00:10  → reset (courant ← 999)
#     00:00:30  → évaluation (lit le snapshot, calcule date_veille)
#
#   Le snapshot existe précisément pour survivre au reset.
#
#   ASYMÉTRIE ASSUMÉE AVEC LE CHAUD :
#   Le snapshot chaud existant lit `sensor.temperature_max_journaliere_jardin`
#   et porte donc le bug décrit ci-dessus. La correction symétrique
#   côté chaud est différée pour ne pas ouvrir un second chantier.
#   Cf. contrat §14 — différences notables (à étendre lors de la
#   correction chaud).
#
# 🛡️ DOCTRINE — PAS D'ABSTENTION SILENCIEUSE
#   Cette automation N'A PAS de bloc `condition`. C'est délibéré.
#
#   Si la mémoire courante est hors plage métier [-50, 50],
#   l'automation N'EST PAS autorisée à s'abstenir. Elle DOIT écrire
#   999 dans le snapshot pour :
#     1. effacer la valeur snapshottée la veille (sinon stale snapshot)
#     2. faire que l'évaluation à 00:00:30 s'abstienne (snapshot hors plage)
#     3. empêcher l'association d'une ancienne valeur à une nouvelle date_veille
#
#   Règle doctrinale uniforme du pipeline froid :
#     « Toute mémoire intermédiaire consommée plus tard doit être
#       invalidée à 999 si la source du jour est invalide. »
#
#   Cette règle s'applique identiquement à :
#     - la clôture (cf. cloture_temperature_min)
#     - le snapshot (ici)
#
#   L'abstention silencieuse réintroduirait précisément le problème
#   « ancienne valeur valide + nouvelle date = palmarès plausible
#   mais faux » que combat la doctrine §3.5.
#
# 🛡️ GARDE MÉTIER STRICTE
#   Une valeur n'est snapshottée comme métier QUE si elle est
#   dans la plage métier :
#     -50 <= courant_valeur <= 50
#
#   Toute autre situation aboutit à l'écriture de 999 dans le snapshot :
#     - sentinelle 999 héritée d'une journée sans mesure
#     - valeur aberrante (par exemple 500 par manipulation manuelle)
#     - état non numérique (unknown, unavailable)
#
# 🚫 INTERDITS
#   - S'abstenir si courant hors plage métier (doit écrire 999 explicitement)
#   - Bloc `condition:` qui pourrait court-circuiter l'écriture
#   - Évaluer ou modifier les rangs du palmarès
#   - Lire ou écrire les helpers de rang
#   - Lire la mémoire clôturée ou le sensor exposé (bug temporel)
#   - Utiliser une fenêtre glissante comme source
#   - Confondre snapshot et évaluation
#   - Snapshotter une valeur hors de [-50, 50] comme métier
#
# 🏷️ STATUT
#   Socle — Arsenal v14.x
# ==========================================================

- id: "10160000000030"
  alias: "snapshot_temperature_min"
  description: >
    Capture à 23:59:55 le minimum du jour qui se termine depuis la
    mémoire courante. Courant dans [-50, 50] → snapshot ← courant.
    Sinon → snapshot ← 999. Aucune abstention silencieuse.
  mode: single

  trigger:
    - platform: time
      at: "23:59:55"

  variables:
    courant_state: >
      {{ states('input_number.temperature_min_jour_courant_jardin') }}
    courant_numerique: >
      {{ courant_state not in ['unknown', 'unavailable', 'none', '']
         and courant_state | float(999) != 999 }}
    courant_valeur: >
      {{ courant_state | float(999) }}
    courant_dans_plage_metier: >
      {{ courant_numerique and courant_valeur >= -50 and courant_valeur <= 50 }}
    valeur_snapshot: >
      {{ courant_valeur if courant_dans_plage_metier else 999 }}

  action:
    - service: input_number.set_value
      target:
        entity_id: input_number.palmares_temperature_journalier_froid_snapshot_veille
      data:
        value: "{{ valeur_snapshot }}"
