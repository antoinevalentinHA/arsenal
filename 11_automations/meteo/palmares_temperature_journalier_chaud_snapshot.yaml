# ==========================================================
# 🧠 ARSENAL — AUTOMATION
#     Météo — Palmarès journées chaudes — Snapshot
# ----------------------------------------------------------
# 🆔 IDENTIFIANT
#   "10160000000022"
#
# 🎯 RÔLE
#   Capturer la température maximale journalière à 23:59:55
#   dans le snapshot veille, avant la clôture civile de minuit.
#
# 🧩 PÉRIMÈTRE
#   - Couvre : capture du maximum journalier civil en fin de journée
#   - Exclut : évaluation du palmarès (responsabilité de l'automation
#              d'évaluation)
#
# 🔖 NATURE
#   Snapshot événementiel
#
# ⚙️ MODE
#   single
#   Justification : déclenchement horaire unique, pas de concurrence
#                  possible sur une capture journalière
#
# 📣 DÉCLENCHEURS
#   - time : 23:59:55 (quotidien)
#
# 🔗 DÉPENDANCES
#   Lit     : sensor.temperature_max_journaliere_jardin
#   Écrit   : input_number.palmares_temperature_journalier_chaud_snapshot_veille
#
# 🧠 AUTORITÉ
#   Décide et applique — capture mécanique avec garde de validité
#
# ♻️ IDEMPOTENCE
#   Compatible retrigger — écrasement du snapshot par la valeur courante
#   si valide ; abstention si source invalide (snapshot conservé)
#
# 🚫 INTERDITS
#   - Évaluer ou modifier les rangs du palmarès
#   - Lire ou écrire les helpers de rang
#   - Utiliser une fenêtre glissante comme source
#   - Confondre snapshot et évaluation
#   - Écrire une valeur de substitution si la source est invalide
#
# 🏷️ STATUT
#   Socle — Arsenal v14.x
# ==========================================================

- id: "10160000000022"
  alias: "Palmarès température chaud — Snapshot"
  description: >
    Capture la température maximale journalière civile à 23:59:55
    dans le helper snapshot si la source est valide.
    Abstention si source unavailable, unknown ou non numérique.
  mode: single

  trigger:
    - platform: time
      at: "23:59:55"

  variables:
    source_state: >
      {{ states('sensor.temperature_max_journaliere_jardin') }}
    source_valide: >
      {{ source_state not in ['unknown', 'unavailable', 'none', '']
         and source_state | float(-999) != -999 }}
    source_valeur: >
      {{ source_state | float(-999) }}

  condition:
    - condition: template
      value_template: "{{ source_valide }}"

  action:
    - service: input_number.set_value
      target:
        entity_id: input_number.palmares_temperature_journalier_chaud_snapshot_veille
      data:
        value: "{{ source_valeur }}"