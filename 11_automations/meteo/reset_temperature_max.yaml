- id: "10160000000026"
  alias: "Température max jour courant jardin — Reset"
  description: >
    Réinitialise le max courant à -999 à 00:00:10, après clôture.
    Démarre la nouvelle journée civile sans pollution de la veille.
  mode: single

  trigger:
    - platform: time
      at: "00:00:10"

  action:
    - service: input_number.set_value
      target:
        entity_id: input_number.temperature_max_jour_courant_jardin
      data:
        value: -999