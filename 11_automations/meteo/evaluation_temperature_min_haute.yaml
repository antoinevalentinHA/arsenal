# ==========================================================
# 🧠 ARSENAL — AUTOMATION
#     Météo — Palmarès nuits chaudes — Évaluation
#     (minimale journalière la plus haute)
# ----------------------------------------------------------
# 🆔 IDENTIFIANT
#   "10160000000035"
#
# 🎯 RÔLE
#   Évaluer le minimum journalier clôturé de la veille et mettre
#   à jour le palmarès des nuits les plus chaudes si la valeur
#   mérite un rang dans le top 10.
#
# 🧩 PÉRIMÈTRE
#   - Couvre : validation de la source clôturée, tri descendant
#              avec FIFO, insertion, décalage des rangs, horodatage
#              de dernière évaluation
#   - Exclut : capture du minimum (responsabilité du pipeline froid
#              partagé — clôture à 00:00:05)
#
# 🔖 NATURE
#   Application
#
# 🔗 RÉFÉRENCE
#   palmares_min_haute.md V1.0
#
# ⚙️ MODE
#   single
#   Justification : évaluation journalière unique, concurrence
#                  impossible par construction
#
# 📣 DÉCLENCHEURS
#   - time : 00:00:35 (quotidien)
#
# 🛡️ SOURCE — RÉUTILISATION DE LA MÉMOIRE CLÔTURÉE
#   L'évaluation lit la mémoire clôturée partagée :
#
#     input_number.temperature_min_journaliere_jardin
#
#   Cette instance NE CRÉE PAS de chaîne de capture propre
#   (pas de snapshot dédié, cf. contrat §3.2). Le minimum
#   journalier est déjà capturé par le pipeline froid :
#     00:00:05 → clôture → input_number.temperature_min_journaliere_jardin
#
#   Ordonnancée à 00:00:35, soit APRÈS la clôture (00:00:05),
#   l'évaluation lit donc le minimum de la journée qui vient de
#   se terminer, et date_veille = now() - 1 jour lui correspond
#   exactement. L'alignement temporel est garanti.
#
#   La mémoire clôturée s'auto-invalide à 999 lorsque la journée
#   n'a pas produit de mesure valide (cf. cloture_temperature_min).
#   La garde métier ci-dessous écarte cette absence sans abstention
#   silencieuse incohérente.
#
# 🔗 DÉPENDANCES
#   Lit     : input_number.temperature_min_journaliere_jardin
#             input_number.palmares_temperature_min_journaliere_haute_rang_01_valeur … rang_10_valeur
#             input_text.palmares_temperature_min_journaliere_haute_rang_01_date … rang_10_date
#   Écrit   : input_number.palmares_temperature_min_journaliere_haute_rang_01_valeur … rang_10_valeur
#             input_text.palmares_temperature_min_journaliere_haute_rang_01_date … rang_10_date
#             input_datetime.palmares_temperature_min_journaliere_haute_derniere_evaluation
#
# 🧠 AUTORITÉ
#   Décide et applique — algorithme de tri descendant et d'insertion
#
# ♻️ IDEMPOTENCE
#   Compatible retrigger le même jour :
#   la garde date_deja_presente empêche une double insertion
#   de la même journée civile.
#
# 🛡️ GARDE MÉTIER STRICTE
#   La source doit être dans la plage métier [-50, 50] pour être
#   évaluée. La sentinelle d'absence 999, une valeur aberrante, ou
#   un état non numérique provoquent une ABSTENTION : le palmarès
#   et l'horodatage de dernière évaluation ne sont pas modifiés.
#
# 📋 DOCTRINE D'INSERTION (NUITS CHAUDES)
#   - Abstention si source hors plage métier [-50, 50]
#   - Abstention si date_veille déjà présente dans les rangs
#   - Tri DESCENDANT : (valeur desc, index_anteriorite asc)
#     → la minimale la plus HAUTE gagne le rang 1
#     → FIFO sur égalité : l'ancien rang conserve sa position
#   - Filtrage des rangs vides : `dates[i] != ''`
#     (marqueur primaire — valeur -999 est le couplage technique)
#   - Palmarès partiellement rempli : toute source valide entre
#   - Palmarès plein : source doit être STRICTEMENT SUPÉRIEURE
#     au rang 10 (la moins haute du palmarès)
#   - Rangs résiduels après tri : initialisés à (-999, '')
#     conformément à INV-NH-9 et à la convention de rang vide
#
# 🛡️ DOCTRINE JINJA — ACCUMULATION PAR NAMESPACE
#   L'accumulation des paires (valeur, index, date) dans une boucle
#   `{% for %}` DOIT utiliser un `namespace`, JAMAIS un `{% set %}`
#   simple sur une variable locale, dont la portée ne survit pas à
#   l'itération. Un mauvais code détruirait silencieusement le
#   palmarès à chaque évaluation.
#
# 🚫 INTERDITS
#   - Créer un snapshot dédié (mécanisme redondant, cf. contrat §3.2)
#   - Utiliser le Recorder comme source métier
#   - Insérer une date déjà présente dans les rangs
#   - Écrire si source hors plage métier [-50, 50]
#   - Initialiser un rang résiduel à 0 (valeur métier plausible)
#   - Accumuler les paires dans la boucle par `{% set var = var + ... %}`
#     simple : utiliser un `namespace` (cf. doctrine Jinja ci-dessus).
#
# 🏷️ STATUT
#   Socle — Arsenal v14.x
# ==========================================================

- id: "10160000000035"
  alias: "evaluation_temperature_min_haute"
  description: >
    Évalue le minimum journalier clôturé de la veille et met à jour
    le palmarès des nuits les plus chaudes si la valeur mérite un rang.
    Abstention si source hors plage métier, date déjà présente, ou
    valeur insuffisante (FIFO strict, tri descendant).
  mode: single

  trigger:
    - platform: time
      at: "00:00:35"

  variables:
    source_state: >
      {{ states('input_number.temperature_min_journaliere_jardin') }}
    source_numerique: >
      {{ source_state not in ['unknown', 'unavailable', 'none', '']
         and source_state | float(999) != 999 }}
    source: >
      {{ source_state | float(999) }}
    source_dans_plage_metier: >
      {{ source_numerique and source >= -50 and source <= 50 }}

    date_veille: >
      {{ (now() - timedelta(days=1)).strftime('%Y-%m-%d') }}

    rang_01_val: >
      {{ states('input_number.palmares_temperature_min_journaliere_haute_rang_01_valeur') | float(-999) }}
    rang_02_val: >
      {{ states('input_number.palmares_temperature_min_journaliere_haute_rang_02_valeur') | float(-999) }}
    rang_03_val: >
      {{ states('input_number.palmares_temperature_min_journaliere_haute_rang_03_valeur') | float(-999) }}
    rang_04_val: >
      {{ states('input_number.palmares_temperature_min_journaliere_haute_rang_04_valeur') | float(-999) }}
    rang_05_val: >
      {{ states('input_number.palmares_temperature_min_journaliere_haute_rang_05_valeur') | float(-999) }}
    rang_06_val: >
      {{ states('input_number.palmares_temperature_min_journaliere_haute_rang_06_valeur') | float(-999) }}
    rang_07_val: >
      {{ states('input_number.palmares_temperature_min_journaliere_haute_rang_07_valeur') | float(-999) }}
    rang_08_val: >
      {{ states('input_number.palmares_temperature_min_journaliere_haute_rang_08_valeur') | float(-999) }}
    rang_09_val: >
      {{ states('input_number.palmares_temperature_min_journaliere_haute_rang_09_valeur') | float(-999) }}
    rang_10_val: >
      {{ states('input_number.palmares_temperature_min_journaliere_haute_rang_10_valeur') | float(-999) }}
    rang_01_date: >
      {{ states('input_text.palmares_temperature_min_journaliere_haute_rang_01_date') }}
    rang_02_date: >
      {{ states('input_text.palmares_temperature_min_journaliere_haute_rang_02_date') }}
    rang_03_date: >
      {{ states('input_text.palmares_temperature_min_journaliere_haute_rang_03_date') }}
    rang_04_date: >
      {{ states('input_text.palmares_temperature_min_journaliere_haute_rang_04_date') }}
    rang_05_date: >
      {{ states('input_text.palmares_temperature_min_journaliere_haute_rang_05_date') }}
    rang_06_date: >
      {{ states('input_text.palmares_temperature_min_journaliere_haute_rang_06_date') }}
    rang_07_date: >
      {{ states('input_text.palmares_temperature_min_journaliere_haute_rang_07_date') }}
    rang_08_date: >
      {{ states('input_text.palmares_temperature_min_journaliere_haute_rang_08_date') }}
    rang_09_date: >
      {{ states('input_text.palmares_temperature_min_journaliere_haute_rang_09_date') }}
    rang_10_date: >
      {{ states('input_text.palmares_temperature_min_journaliere_haute_rang_10_date') }}

    valeurs: >
      {{ [rang_01_val, rang_02_val, rang_03_val, rang_04_val, rang_05_val,
          rang_06_val, rang_07_val, rang_08_val, rang_09_val, rang_10_val] }}
    dates: >
      {{ [rang_01_date, rang_02_date, rang_03_date, rang_04_date, rang_05_date,
          rang_06_date, rang_07_date, rang_08_date, rang_09_date, rang_10_date] }}

    date_deja_presente: >
      {{ date_veille in dates }}
    palmares_plein: >
      {{ dates | select('ne', '') | list | count == 10 }}
    merite_rang: >
      {{ source_dans_plage_metier
         and not date_deja_presente
         and (not palmares_plein or source > rang_10_val) }}

  condition:
    - condition: template
      value_template: "{{ merite_rang }}"

  action:
    - variables:
        nouveau_palmares: >
          {# Accumulation des rangs existants non vides via namespace.       #}
          {# Le `set` simple ne persiste pas hors boucle for en Jinja —      #}
          {# le namespace est obligatoire pour accumuler correctement.       #}
          {% set ns = namespace(paires=[]) %}
          {% for i in range(10) %}
            {% if dates[i] != '' %}
              {% set ns.paires = ns.paires + [(valeurs[i], i, dates[i])] %}
            {% endif %}
          {% endfor %}
          {% set ns.paires = ns.paires + [(source, 10, date_veille)] %}
          {% set sorted_paires = ns.paires | sort(attribute='1') | sort(attribute='0', reverse=true) %}
          {% set result = namespace(vals=[], dts=[]) %}
          {% for p in sorted_paires[:10] %}
            {% set result.vals = result.vals + [p[0]] %}
            {% set result.dts = result.dts + [p[2]] %}
          {% endfor %}
          {% for i in range(result.vals | count, 10) %}
            {% set result.vals = result.vals + [-999] %}
            {% set result.dts = result.dts + [''] %}
          {% endfor %}
          {{ {'vals': result.vals, 'dts': result.dts} }}

    - service: input_number.set_value
      target:
        entity_id: input_number.palmares_temperature_min_journaliere_haute_rang_01_valeur
      data:
        value: "{{ nouveau_palmares.vals[0] }}"
    - service: input_text.set_value
      target:
        entity_id: input_text.palmares_temperature_min_journaliere_haute_rang_01_date
      data:
        value: "{{ nouveau_palmares.dts[0] }}"

    - service: input_number.set_value
      target:
        entity_id: input_number.palmares_temperature_min_journaliere_haute_rang_02_valeur
      data:
        value: "{{ nouveau_palmares.vals[1] }}"
    - service: input_text.set_value
      target:
        entity_id: input_text.palmares_temperature_min_journaliere_haute_rang_02_date
      data:
        value: "{{ nouveau_palmares.dts[1] }}"

    - service: input_number.set_value
      target:
        entity_id: input_number.palmares_temperature_min_journaliere_haute_rang_03_valeur
      data:
        value: "{{ nouveau_palmares.vals[2] }}"
    - service: input_text.set_value
      target:
        entity_id: input_text.palmares_temperature_min_journaliere_haute_rang_03_date
      data:
        value: "{{ nouveau_palmares.dts[2] }}"

    - service: input_number.set_value
      target:
        entity_id: input_number.palmares_temperature_min_journaliere_haute_rang_04_valeur
      data:
        value: "{{ nouveau_palmares.vals[3] }}"
    - service: input_text.set_value
      target:
        entity_id: input_text.palmares_temperature_min_journaliere_haute_rang_04_date
      data:
        value: "{{ nouveau_palmares.dts[3] }}"

    - service: input_number.set_value
      target:
        entity_id: input_number.palmares_temperature_min_journaliere_haute_rang_05_valeur
      data:
        value: "{{ nouveau_palmares.vals[4] }}"
    - service: input_text.set_value
      target:
        entity_id: input_text.palmares_temperature_min_journaliere_haute_rang_05_date
      data:
        value: "{{ nouveau_palmares.dts[4] }}"

    - service: input_number.set_value
      target:
        entity_id: input_number.palmares_temperature_min_journaliere_haute_rang_06_valeur
      data:
        value: "{{ nouveau_palmares.vals[5] }}"
    - service: input_text.set_value
      target:
        entity_id: input_text.palmares_temperature_min_journaliere_haute_rang_06_date
      data:
        value: "{{ nouveau_palmares.dts[5] }}"

    - service: input_number.set_value
      target:
        entity_id: input_number.palmares_temperature_min_journaliere_haute_rang_07_valeur
      data:
        value: "{{ nouveau_palmares.vals[6] }}"
    - service: input_text.set_value
      target:
        entity_id: input_text.palmares_temperature_min_journaliere_haute_rang_07_date
      data:
        value: "{{ nouveau_palmares.dts[6] }}"

    - service: input_number.set_value
      target:
        entity_id: input_number.palmares_temperature_min_journaliere_haute_rang_08_valeur
      data:
        value: "{{ nouveau_palmares.vals[7] }}"
    - service: input_text.set_value
      target:
        entity_id: input_text.palmares_temperature_min_journaliere_haute_rang_08_date
      data:
        value: "{{ nouveau_palmares.dts[7] }}"

    - service: input_number.set_value
      target:
        entity_id: input_number.palmares_temperature_min_journaliere_haute_rang_09_valeur
      data:
        value: "{{ nouveau_palmares.vals[8] }}"
    - service: input_text.set_value
      target:
        entity_id: input_text.palmares_temperature_min_journaliere_haute_rang_09_date
      data:
        value: "{{ nouveau_palmares.dts[8] }}"

    - service: input_number.set_value
      target:
        entity_id: input_number.palmares_temperature_min_journaliere_haute_rang_10_valeur
      data:
        value: "{{ nouveau_palmares.vals[9] }}"
    - service: input_text.set_value
      target:
