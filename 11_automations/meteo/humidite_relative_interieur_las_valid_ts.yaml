# ==========================================================
# 🧠 ARSENAL — AUTOMATION :
#     Humidite relative — Mise a jour last_valid_ts chambre enfants
#
#  ID : 10160000000014
# ----------------------------------------------------------
#  🎯 ROLE
#
#     Maintenir a jour le helper technique :
#       input_datetime.humidite_relative_last_valid_ts_chambre_enfants
#
#     Ce helper porte le timestamp de derniere evaluation valide
#     de la brute consolidee de la zone.
#
#  🧱 CONTRAT
#
#     Lie a :
#       sensor.humidite_relative_stabilisee_<zone> v1.1
#
#     Cette automation :
#       - ecrit uniquement le timestamp
#       - n'intervient pas dans la logique de stabilisation
#       - ne modifie jamais la brute
#       - ne prend aucune decision metier
#
#  🔒 REGLE
#
#     Mise a jour uniquement si la brute consolidee est valide :
#       - numerique
#       - non unknown / unavailable / none
#       - dans la plage [10 ; 100]
# ==========================================================

- alias: "Météo — HR last_valid_ts chambre enfants"
  id: "10160000000014"
  mode: single

  trigger:
    - platform: state
      entity_id: sensor.humidite_relative_brute_consolidee_chambre_enfants

    - platform: time_pattern
      minutes: "/5"

    - platform: homeassistant
      event: start

  condition:
    - condition: template
      value_template: >
        {% set brute_raw = states('sensor.humidite_relative_brute_consolidee_chambre_enfants') %}
        {% set brute = brute_raw | float(none) %}
        {{ brute_raw not in ['unknown','unavailable','none']
           and brute is not none
           and 10 <= brute <= 100 }}

  action:
    - service: input_datetime.set_datetime
      target:
        entity_id: input_datetime.humidite_relative_last_valid_ts_chambre_enfants
      data:
        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"


