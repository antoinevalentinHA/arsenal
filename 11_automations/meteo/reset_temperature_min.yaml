# ==========================================================
# 🧠 ARSENAL — AUTOMATION
#     Météo — Température min jour courant jardin — Reset
# ----------------------------------------------------------
# 🆔 IDENTIFIANT
#   "10160000000029"
#
# 🎯 RÔLE
#   Réinitialiser le min courant à la sentinelle 999 à 00:00:10,
#   après la clôture journalière, pour démarrer la nouvelle
#   journée civile sans pollution de la veille.
#
# 🧩 PÉRIMÈTRE
#   - Couvre : reset du min courant uniquement
#   - Exclut : clôture journalière (automation dédiée)
#
# 🔖 NATURE
#   Remédiation
#
# 🔗 RÉFÉRENCE
#   CONTRAT_PALMARES_TEMPERATURE_JOURNALIER_FROID.md V1.0.2
#   Pipeline 3 couches (§3.2) — couche 1/3 (mémoire courante)
#
# ⚙️ MODE
#   single
#   Justification : déclenchement horaire unique
#
# 📣 DÉCLENCHEURS
#   - time : 00:00:10 (quotidien)
#
# 🔗 DÉPENDANCES
#   Écrit   : input_number.temperature_min_jour_courant_jardin
#
# 🧠 AUTORITÉ
#   Applique — reset inconditionnel
#
# ♻️ IDEMPOTENCE
#   Compatible retrigger — écriture idempotente de la sentinelle
#
# 🛡️ DOCTRINE SENTINELLE
#   La sentinelle 999 est choisie pour le froid car elle doit être
#   strictement supérieure à toute valeur métier plausible. Au cours
#   de la journée suivante, toute première mesure valide V satisfait
#   V < 999 et remplace la sentinelle (cf. update_temperature_min).
#
#   La symétrie avec le chaud (reset à -999) est délibérément rompue.
#   Cf. contrat §14 — différences notables avec le contrat chaud.
#
# 🚫 INTERDITS
#   - Écrire 0 comme sentinelle (valeur métier plausible côté froid)
#   - Écrire -50 ou +50 comme sentinelle (bornes métier plausibles)
#   - Confondre reset et clôture (la clôture s'exécute 5 secondes plus tôt)
#   - Interagir avec la mémoire journalière clôturée
#
# 🏷️ STATUT
#   Socle — Arsenal v14.x
# ==========================================================

- id: "10160000000029"
  alias: "reset_temperature_min"
  description: >
    Réinitialise le min courant à 999 à 00:00:10, après clôture.
    Démarre la nouvelle journée civile sans pollution de la veille.
  mode: single

  trigger:
    - platform: time
      at: "00:00:10"

  action:
    - service: input_number.set_value
      target:
        entity_id: input_number.temperature_min_jour_courant_jardin
      data:
        value: 999
