# ==========================================================
#  🧠 ARSENAL — AUTOMATION :
#     Pluie – Décision de début d’épisode météo
#
#  ID : 10160000000002
# ----------------------------------------------------------
#  🎯 RÔLE
#
#     Automation de DÉCISION MÉTÉO (entrée d'état).
#
#     Elle active l’état global `pluie_en_cours` dès
#     qu’une évidence de pluie consolidée apparaît, en
#     consommant `binary_sensor.pluie_evidence_active`.
#
#     Elle ne recalcule PLUS les sources : la qualification
#     (Netatmo, SNZB-05 borné, injection Zigbee) est portée
#     par l’évidence consolidée — MÊME point commun que la
#     décision de fin (maj_sensor/off.yaml). Symétrie stricte
#     entrée / sortie (cf. C16).
#
#  🧱 NATURE
#
#     - Décision métier (entrée d’état)
#     - Consommateur de l’évidence consolidée
#     - Latch : n’active que si l’état est inactif
#
#  ⚙️ PRINCIPE
#
#     - Fonctionnement NOMINAL — ÉVÉNEMENTIEL :
#         • `pluie_evidence_active` → on ⇒ début d’épisode
#     - Réconciliation au démarrage :
#         • `systeme_stable` → on, si évidence déjà on
#     - Activation uniquement si `pluie_en_cours` est inactif
#
#  🚫 CE QUE CETTE AUTOMATION NE FAIT PAS
#
#     - Ne détecte pas la fin de la pluie
#     - Ne recalcule pas les sources (délégué à l’évidence)
#     - Ne génère pas l’impulsion Zigbee (impulsion/*)
#     - Ne pilote aucun équipement
#
#  🔗 UTILISATION
#
#     - Autorité unique d’entrée en état pluie
#     - Consommée par les scénarios météo
#       (aération, protections, logiques extérieures)
#
#  ✅ COMPATIBILITÉ
#
#     Home Assistant 2024.8+
# ==========================================================

- id: "10160000000002"
  alias: "Météo - Pluie - Début épisode"
  description: >
    Active le suivi pluie (`pluie_en_cours`) dès qu’une évidence de pluie
    consolidée apparaît (`binary_sensor.pluie_evidence_active`), avec
    réconciliation au démarrage. Ne recalcule pas les sources.

  mode: single
  max_exceeded: silent

  # ======================================================
  # 🔔 Déclencheurs
  # ======================================================
  trigger:
    # Nominal (événementiel) : évidence de pluie apparue
    - platform: state
      id: evidence
      entity_id: binary_sensor.pluie_evidence_active
      to: "on"

    # Réconciliation au démarrage
    - platform: state
      id: demarrage
      entity_id: input_boolean.systeme_stable
      to: "on"

  # ======================================================
  # ✅ Conditions — Évidence active + pas déjà en cours
  # ======================================================
  condition:
    - condition: state
      entity_id: input_boolean.pluie_en_cours
      state: "off"
    - condition: state
      entity_id: binary_sensor.pluie_evidence_active
      state: "on"

  # ======================================================
  # 🔄 Action — Activation du suivi pluie
  # ======================================================
  action:
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.pluie_en_cours
