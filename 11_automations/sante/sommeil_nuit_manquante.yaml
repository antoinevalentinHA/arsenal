# ==========================================================
# 🧠 ARSENAL — AUTOMATION
#     Sommeil — Nuit manquante
#
# ID : 10200000000004
# ----------------------------------------------------------
# 🎯 Rôle
#     Détecter l'absence de consolidation sommeil après la
#     dernière tentative horaire et marquer la nuit comme
#     manquante.
#
# 🧩 Périmètre
#     - Déclenchement après la tentative de consolidation 11:00
#     - Vérification d'absence de snapshot du jour
#     - Marquage explicite de l'anomalie
#
# 🔗 Dépendances
#     - input_datetime.sommeil_derniere_nuit_date
#     - input_boolean.sommeil_nuit_manquante
#
# 🏷️ Label
#     signal:guard
#
# 🚫 Interdits
#     - Ne tente aucune consolidation
#     - Ne corrige aucune donnée
#     - Ne produit aucun fallback
#     - Ne lit aucune source Withings
#
# 🧠 Statut
#     Surveillance défensive — anomalie pipeline sommeil
# ==========================================================

- id: "10200000000004"
  alias: Sommeil — Nuit manquante
  description: Détection absence de consolidation sommeil après dernière tentative
  mode: single

  trigger:
    - platform: time
      at: "11:01:00"

  condition:
    - condition: template
      value_template: >
        {{ states('input_datetime.sommeil_derniere_nuit_date') != now().strftime('%Y-%m-%d') }}

  action:
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.sommeil_nuit_manquante