# ==========================================================
# 🧠 ARSENAL — AUTOMATION
#     Santé — Batterie ScanWatch faible
#
#  ID : 10200000000001
# ----------------------------------------------------------
#  🎯 RÔLE
#
#     Notifier l’utilisateur lorsque l’état de batterie
#     de la ScanWatch devient faible.
#
#     Cette automation :
#       - observe exclusivement un capteur local sécurisé,
#       - ne prend aucune décision métier,
#       - ne modifie aucun état système,
#       - délègue l’envoi à la couche Notifications Arsenal.
#
# ==========================================================

- id: '10200000000001'
  alias: "Santé - Batterie ScanWatch"
  mode: single

  trigger:
    - platform: state
      entity_id: sensor.scanwatch_batterie_local
      to: 'low'

  action:
    - service: script.notification_envoyer
      data:
        cible: input_text.telephone_antoine_notify
        titre: "ScanWatch — Batterie faible"
        message: "La batterie de la ScanWatch est faible."
