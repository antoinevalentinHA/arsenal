# ==========================================================
# 🧠 ARSENAL — AUTOMATION : VMC – Machine besoin SdB enfants
# ----------------------------------------------------------
# 🎯 ROLE
#   Tenir l'etat du besoin humidite de la salle de douche
#   enfants, selon la machine hysteretique du contrat.
#
# ⚠️ PIECE SERVIE PAR LA SEULE VOIE D'EVOLUTION
#   Aucun des 27 episodes du corpus n'atteint la frontiere de
#   niveau. Cette piece etait donc a 0/27 depuis L7.2 ; c'est
#   la voie d'evolution, rendue decisionnelle par ce lot, qui
#   la rend operante.
#
# 📐 MACHINE — §6.2, §6.3, §6.4, §7.4 bis
#
#   entree     : niveau >= S
#                OU ( evolution >= D sur W  ET  niveau >= P )
#   maintien   : ni entree ni liberation satisfaites
#   liberation : niveau <= OFF
#
#   OFF et P sont lus sur `sensor.vmc_frontiere_liberation_sdb_enfants`,
#   seule definition autoritative des constantes A, B et H.
#   Cette automatisation NE RECALCULE AUCUNE FRONTIERE.
#
# 🧱 PRINCIPE
#   - Ecrit UN BOOLEEN, et rien d'autre
#   - Aucune temporisation tenant lieu de condition metier (§8.3)
#   - Aucun pilotage de relais : l'execution reste a
#     l'automatisation de gestion
#
# 🔒 GARDE D'INDISPONIBILITE — §7.4 bis condition 4, §4.4
#   La liberation exige que la frontiere soit CALCULABLE.
#   Frontiere non calculable => aucune liberation, le besoin
#   actif est MAINTENU. `unknown` et `unavailable` ne valent
#   JAMAIS liberation.
#
#   AUCUNE bascule vers une frontiere fixe : ce serait
#   substituer silencieusement un mecanisme dont l'inoperance
#   estivale est demontree et qui echoue le controle du §7.4.
#
#   La voie d'EVOLUTION exige elle aussi le plancher, donc la
#   frontiere : frontiere non calculable => cette voie ne peut
#   pas creer de besoin. La voie de NIVEAU, qui n'en depend
#   pas, demeure operante.
#
# 📌 REDEMARRAGE — §9.1 cas 1 a 3
#   L'etat restaure est IMMEDIATEMENT confronte aux mesures
#   courantes, par un declencheur `homeassistant.start`. Les
#   cas 1 et 2 priment inconditionnellement sur l'etat
#   restaure ; dans la bande morte (cas 3), aucune branche ne
#   s'active et l'etat restaure est conserve.
#
#   Le cas 4 — aucun etat valide restaurable — et son
#   exposition (§10.2 exigence 10) relevent de L7.5.
#
# ✅ RELOAD-SAFE
# ==========================================================

- id: "10190000000008"
  alias: "VMC - Machine besoin SdB enfants"
  description: >
    Tient l'etat du besoin humidite de la salle de douche enfants
    selon la machine hysteretique : entree par niveau ou par
    evolution au-dessus du plancher, liberation sous la
    frontiere modulee.
  mode: queued
  max: 10
  max_exceeded: silent

  trigger:
    - platform: state
      entity_id:
        - sensor.humidite_relative_sdb_enfants
        - sensor.vmc_minimum_glissant_sdb_enfants
        - sensor.vmc_frontiere_liberation_sdb_enfants

    # §9.1 — REEVALUATION AU DEMARRAGE, obligatoire.
    #
    # L'etat est restaure par Home Assistant, puis IMMEDIATEMENT
    # confronte aux mesures courantes. Les trois cas du §9.1 sont
    # servis par la meme machine, sans branche particuliere :
    #
    #   cas 1  mesure au-dessus de la frontiere d'entree
    #          -> la branche ENTREE s'active, l'etat restaure ne
    #             fait pas autorite contre elle ;
    #   cas 2  mesure sous la frontiere de liberation
    #          -> la branche LIBERATION s'active, meme remarque ;
    #   cas 3  mesure dans la bande morte
    #          -> aucune branche, l'etat restaure est CONSERVE.
    #
    # Sans ce declencheur, un etat restaure incoherent avec la
    # mesure subsisterait jusqu'a la publication suivante du
    # capteur — plusieurs minutes en salle de douche enfants.
    #
    # Le cas 4 du §9.1 — aucun etat valide restaurable — releve
    # de L7.5, avec son exposition (§10.2 exigence 10).
    - platform: homeassistant
      event: start

  variables:
    mesure: "{{ states('sensor.humidite_relative_sdb_enfants') | float(none) }}"
    minimum: "{{ states('sensor.vmc_minimum_glissant_sdb_enfants') | float(none) }}"
    seuil: "{{ states('input_number.vmc_seuil_on_sdb_enfants') | float(none) }}"
    evolution_min: "{{ states('input_number.vmc_evolution_sdb_enfants') | float(none) }}"
    off_frontiere: "{{ states('sensor.vmc_frontiere_liberation_sdb_enfants') | float(none) }}"
    plancher: >
      {{ state_attr('sensor.vmc_frontiere_liberation_sdb_enfants',
                    'plancher_evolution') | float(none) }}
    actif: "{{ is_state('input_boolean.vmc_etat_besoin_sdb_enfants', 'on') }}"

    # Voie de NIVEAU : ne depend d'aucune frontiere modulee.
    entree_niveau: >
      {{ mesure is not none and seuil is not none and mesure >= seuil }}

    # PROFONDEUR de l'observation glissante. §9.1 bis : le critere
    # dynamique NE PEUT PAS creer de besoin tant que la fenetre n'est
    # pas suffisamment remplie. §4.4 bis : une profondeur insuffisante
    # n'est ni une mesure indisponible, ni un critere non satisfait.
    #
    # Le seuil de 0,5 reprend a l'identique celui de la simulation de
    # calibration (passe 5) : une demi-fenetre au minimum.
    profondeur: >
      {{ state_attr('sensor.vmc_minimum_glissant_sdb_enfants',
                    'age_coverage_ratio') | float(none) }}

    profondeur_suffisante: >
      {{ profondeur is not none and profondeur >= 0.5 }}

    # Voie d'EVOLUTION : exige la profondeur ET le plancher, donc la
    # frontiere.
    entree_evolution: >
      {{ mesure is not none and minimum is not none
         and evolution_min is not none and plancher is not none
         and profondeur_suffisante
         and (mesure - minimum) >= evolution_min
         and mesure >= plancher }}

    # LIBERATION : exige une frontiere calculable. Sans elle,
    # aucune liberation n'est possible — le besoin est maintenu.
    liberation: >
      {{ mesure is not none and off_frontiere is not none
         and mesure <= off_frontiere }}

  action:
    - choose:

        # ==================================================
        # 🚀 ENTREE
        # ==================================================
        - conditions:
            - condition: template
              value_template: "{{ not actif and (entree_niveau or entree_evolution) }}"
          sequence:
            - action: input_boolean.turn_on
              target:
                entity_id: input_boolean.vmc_etat_besoin_sdb_enfants

        # ==================================================
        # 🔽 LIBERATION
        # ==================================================
        - conditions:
            - condition: template
              value_template: "{{ actif and liberation }}"
          sequence:
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.vmc_etat_besoin_sdb_enfants

      # Hors de ces deux cas : MAINTIEN. Aucune ecriture.
      # C'est notamment le cas lorsque la frontiere n'est pas
      # calculable : le besoin actif demeure actif.
      default: []
