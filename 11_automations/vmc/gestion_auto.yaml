# ==========================================================
# 🧠 ARSENAL — AUTOMATION : VMC – Gestion automatique humidite
# ----------------------------------------------------------
# 🎯 ROLE
#   Appliquer la vitesse de la VMC selon la demande métier
#   instantanée fournie par binary_sensor.vmc_haute_vitesse_requise.
#
# 🧱 PRINCIPE D'ARCHITECTURE
#   - Aucune décision métier locale
#   - Aucun polling
#   - Application stricte de la demande ON
#   - Maintien temporel exécutif sur retour OFF
#
# 🔁 HYSTERESIS TEMPORELLE §6.2
#   - ON  → haute vitesse immédiate
#   - OFF → retour basse vitesse après durée minimale
#
#   Toute nouvelle demande ON pendant le délai annule la descente
#   grâce au mode restart.
#
# ⚙️ GARANTIES
#   - Pas d'oscillation rapide
#   - Maintien exécutif hors capteur décisionnel
#   - Comportement déterministe
#
# ✅ BOOT-SAFE + RELOAD-TEMPLATE-SAFE
# ==========================================================

- id: "10190000000001"
  alias: "VMC - Gestion humidité"
  description: >
    Applique automatiquement la haute ou la basse vitesse de la VMC
    en fonction de la demande métier fournie par
    binary_sensor.vmc_haute_vitesse_requise, en respectant une durée
    minimale de fonctionnement en haute vitesse.
  mode: restart

  trigger:
    - platform: state
      entity_id: binary_sensor.vmc_haute_vitesse_requise
      to:
        - "on"
        - "off"

    - platform: homeassistant
      event: start

  condition:
    - condition: or
      conditions:

        - condition: template
          value_template: >
            {{ trigger.platform == 'homeassistant' }}

        - condition: state
          entity_id: input_boolean.systeme_stable
          state: "on"

  variables:
    # §14.4 — duree minimale EXECUTIVE. Aucun repli silencieux : le
    # helper est le proprietaire de la valeur, et une valeur illisible
    # doit etre traitee comme telle, non remplacee en silence.
    #
    # Le repli `| int(15)` retire ici etait ANTERIEUR au chantier et
    # contraire a la doctrine arretee en passe 5. La valeur de 15 min
    # demeure celle qu'AMORCE L7.0 ; elle n'est plus refabriquee a
    # chaque evaluation.
    duree_min_minutes: >
      {{ states('input_number.vmc_duree_min_haute') | float(none) }}

    # Une duree illisible ne doit ni prolonger indefiniment la haute
    # vitesse, ni la couper sans delai. La descente est donc SUSPENDUE :
    # le systeme demeure dans son etat courant, et
    # `binary_sensor.parametres_invalides_vmc` en expose la cause.
    duree_min_lisible: >
      {{ duree_min_minutes is not none and duree_min_minutes > 0 }}

  action:
    - choose:

        # ==================================================
        # 🚀 HAUTE VITESSE
        # ==================================================
        - conditions:
            - condition: state
              entity_id: binary_sensor.vmc_haute_vitesse_requise
              state: "on"
          sequence:
            - service: script.vmc_haute_vitesse

        # ==================================================
        # 🔽 BASSE VITESSE
        # ==================================================
        - conditions:
            - condition: state
              entity_id: binary_sensor.vmc_haute_vitesse_requise
              state: "off"
          sequence:
            # Duree illisible : aucune descente. Le §12.3 proscrit une
            # mesure inexploitable traitee comme une valeur numerique ;
            # le meme principe vaut pour un parametre executif.
            - condition: template
              value_template: "{{ duree_min_lisible }}"

            - if:
                - condition: template
                  value_template: >
                    {{ trigger.platform != 'homeassistant' }}
              then:
                - delay:
                    seconds: "{{ (duree_min_minutes * 60) | int }}"

            # Réévaluation après délai :
            # si une demande ON est revenue entre-temps, le mode restart
            # aura déjà annulé cette séquence. Cette garde protège aussi
            # contre les cas limites reload / état modifié sans trigger.
            - condition: state
              entity_id: binary_sensor.vmc_haute_vitesse_requise
              state: "off"

            - service: script.vmc_basse_vitesse

      default:
        # État décisionnel indisponible : retour fail-safe basse vitesse.
        - service: script.vmc_basse_vitesse