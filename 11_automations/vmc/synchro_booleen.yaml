# ==========================================================
# 🧠 ARSENAL — AUTOMATION : VMC – Synchronisation booléen
# ----------------------------------------------------------
# 🎯 ROLE
#   Synchroniser le reflet UI input_boolean.vmc_haute_vitesse
#   a partir de l'etat physique reel des deux relais VMC.
#
# 🧱 RESPONSABILITE UNIQUE
#   - Observer switch.vmc_l1 et switch.vmc_l2
#   - Mettre a jour input_boolean.vmc_haute_vitesse
#     uniquement si l'etat physique est valide
#
# 🔁 SECURITE
#   - Aucun effet de bord sur la VMC
#   - Aucun pilotage materiel
#   - Aucun arbitrage
#   - Aucun update si etat invalide
#
# 🧠 NOTE
#   Ce booléen est conserve comme facade de compatibilite UI.
#   Il n'est ni une source de verite metier, ni une source
#   de verite physique.
# ==========================================================

- id: "10190000000004"
  alias: "VMC - Synchronisation booléen"
  description: >
    Synchronise input_boolean.vmc_haute_vitesse a partir de l'etat
    physique reel des relais VMC. Ne fait rien si l'etat physique
    est invalide ou incoherent.
  mode: queued

  trigger:
    - platform: state
      entity_id:
        - switch.vmc_l1
        - switch.vmc_l2

    - platform: homeassistant
      event: start

  action:
    - choose:

        # ==================================================
        # 🚀 HAUTE VITESSE
        # ==================================================
        - conditions:
            - condition: state
              entity_id: switch.vmc_l1
              state: "on"
            - condition: state
              entity_id: switch.vmc_l2
              state: "off"
          sequence:
            - action: input_boolean.turn_on
              target:
                entity_id: input_boolean.vmc_haute_vitesse

        # ==================================================
        # 🔽 BASSE VITESSE
        # ==================================================
        - conditions:
            - condition: state
              entity_id: switch.vmc_l1
              state: "off"
            - condition: state
              entity_id: switch.vmc_l2
              state: "on"
          sequence:
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.vmc_haute_vitesse