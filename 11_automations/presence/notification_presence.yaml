# ==========================================================
# 🧠 ARSENAL — AUTOMATION
#     Présence — Notification persistante
#
#  ID : 10210000000001
# ----------------------------------------------------------
#  🎯 RÔLE
#
#     Projection UI d’un état courant de présence individuelle.
#
#     Cette automation matérialise deux notifications persistantes
#     distinctes, chacune représentant l’état courant de présence
#     d’une personne, strictement alignées sur le Contrat
#     Notifications Arsenal.
#
#     - Une notification pour Antoine
#     - Une notification pour Constance
#
#     Chaque notification :
#       - apparaît si la personne est considérée présente
#       - est disqualifiée dès qu’elle est explicitement absente
#
#     Cette automation ne décide rien.
#     Elle observe exclusivement des états durables.
#
#  🧩 PÉRIMÈTRE
#
#     - Entités observées :
#         • person.valentin
#         • person.constance
#
#     - États interprétés :
#
#         Présent :
#           • tout état ≠ not_home / unknown / unavailable
#
#         Absent :
#           • not_home
#
#     Tout autre état (unknown / unavailable) n’est PAS assimilé
#     implicitement à une absence : la notification est laissée
#     inchangée tant que l’état n’est pas concluant.
#
#  🚫 INTERDITS
#
#     - Aucune notification éphémère
#     - Aucune référence temporelle
#     - Aucune mémoire implicite
#     - Aucune logique métier décisionnelle
#     - Aucune dépendance à l’historique
#
#  🔄 ROBUSTESSE RELOAD
#
#     - Recalculable à partir du seul état courant.
#     - L’action ne dépend PAS de `trigger.from_state` : elle
#       recalcule les deux notifications depuis l’état courant de
#       `person.*` à chaque déclenchement, y compris au démarrage
#       via `input_boolean.systeme_stable → on`.
#     - HA ne restaure pas les notifications persistantes au reboot ;
#       le trigger de stabilisation garantit leur re-création si
#       l’état de présence est encore vrai après un redémarrage.
#     - Notifications indépendantes et disqualifiées explicitement.
#
# ==========================================================

- id: "10210000000001"
  alias: Présence - Notification
  mode: restart

  # ======================================================
  # 🔔 Déclencheurs — Changement de présence ou stabilisation boot
  # ======================================================
  trigger:
    # Présence individuelle : tout changement d’état
    - platform: state
      entity_id: person.valentin

    - platform: state
      entity_id: person.constance

    # Stabilisation post-démarrage : re-projection depuis l’état courant
    - platform: state
      entity_id: input_boolean.systeme_stable
      to: "on"

  condition: []

  # ======================================================
  # 🔄 Actions — Re-projection des deux états depuis l’état courant
  # ======================================================
  action:

    # ---- Antoine (person.valentin) ----
    - choose:
        # Présent → création
        - conditions:
            - condition: template
              value_template: >
                {{ states('person.valentin') not in
                   ['not_home', 'unknown', 'unavailable', 'none'] }}
          sequence:
            - action: persistent_notification.create
              data:
                notification_id: presence_valentin
                title: "👤 Présence Antoine"
                message: >
                  Antoine est présent.

        # Absent explicite → disqualification
        - conditions:
            - condition: state
              entity_id: person.valentin
              state: "not_home"
          sequence:
            - action: persistent_notification.dismiss
              data:
                notification_id: presence_valentin
      default: []

    # ---- Constance (person.constance) ----
    - choose:
        # Présente → création
        - conditions:
            - condition: template
              value_template: >
                {{ states('person.constance') not in
                   ['not_home', 'unknown', 'unavailable', 'none'] }}
          sequence:
            - action: persistent_notification.create
              data:
                notification_id: presence_constance
                title: "👤 Présence Constance"
                message: >
                  Constance est présente.

        # Absente explicite → disqualification
        - conditions:
            - condition: state
              entity_id: person.constance
              state: "not_home"
          sequence:
            - action: persistent_notification.dismiss
              data:
                notification_id: presence_constance
      default: []
