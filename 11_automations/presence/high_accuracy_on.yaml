# ==========================================================
# 🧠 ARSENAL — AUTOMATION :
#     Présence – Activation High Accuracy sur approche sécurité
#
# ID : 10210000000007
# ----------------------------------------------------------
# 🎯 RÔLE
#   Activer le mode High Accuracy lors de l’entrée d’une
#   personne dans la zone d’approche sécurité, uniquement
#   si l’alarme est armée.
#
# 🧩 PRINCIPE
#   - Détection structurelle via trigger de zone (enter)
#   - Filtrage par état alarme
#   - Résolution déterministe de la cible mobile
#   - Activation du High Accuracy
#   - Démarrage du timer de sécurité
#
# ⚙️ GARANTIES
#   - Aucune dépendance à des chaînes UI (friendly_name)
#   - Déclenchement fiable basé sur zone.approche_securite
#   - Mapping explicite trigger.id → cible notify
#   - Aucune pollution whitespace dans les variables
#
# 🛑 NON RESPONSABLE
#   - Ne gère pas les retries ou ACK
#   - Ne vérifie pas le succès de la commande mobile
#   - Ne participe pas à la décision de désarmement
# ==========================================================

- id: "10210000000007"
  alias: "Présence - Activation haute précision"
  description: "Activation High Accuracy à l'entrée dans zone.approche_securite sous alarme armée"

  mode: restart

  trigger:
    - platform: zone
      id: parent_1
      entity_id: person.parent_1
      zone: zone.approche_securite
      event: enter

    - platform: zone
      id: parent_2
      entity_id: person.parent_2
      zone: zone.approche_securite
      event: enter

  condition:
    - condition: state
      entity_id: alarm_control_panel.alarme_maison
      state: "armed_away"

  action:
    - variables:
        cible_notify: >-
          {% if trigger.id == 'parent_1' %}input_text.telephone_parent_1_notify{% elif trigger.id == 'parent_2' %}input_text.telephone_parent_2_notify{% else %}none{% endif %}

    - condition: template
      value_template: "{{ cible_notify != 'none' }}"

    - service: script.mobile_high_accuracy_on
      data:
        cible: "{{ cible_notify }}"

    - service: timer.start
      target:
        entity_id: timer.high_accuracy_securite