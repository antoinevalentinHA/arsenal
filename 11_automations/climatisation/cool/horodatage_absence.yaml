# ==========================================================
# 🧠 ARSENAL — AUTOMATION :
#     Climatisation – Absence – Horodatage et réconciliation
#
#  ID : 10030000000122
# ----------------------------------------------------------
# 🎯 RÔLE
#   Écrivain UNIQUE de input_datetime.clim_debut_absence, ancre
#   de la CONTINUITÉ PHYSIQUE de l'absence longue (contrat 15).
#
#   - Début d'absence (présence off, pas d'ancre valide) → pose now()
#   - Retour de présence (présence on) → remet la sentinelle (aucune absence)
#   - Réconciliation au démarrage : ne remet JAMAIS l'ancre à zéro
#     tant qu'une absence continue est en cours (idempotent).
#
# 🧱 PRINCIPE
#   - Aucun calcul de durée (l'échéance est dérivée par le capteur d'extinction).
#   - Aucun pilotage climatique direct.
#   - Sentinelle : timestamp 0 (1970-01-01) = aucune absence active.
#
# 🔗 Contrat opposable :
#   00_documentation_arsenal/contrats/climatisation/15_absence_vacances_veto_cool.md
# ==========================================================

- id: "10030000000122"
  alias: "Climatisation - Absence - Horodatage et reconciliation"
  description: >
    Écrivain unique de l'horodatage de début d'absence (continuité physique).
    Pose l'ancre au début d'absence, la sentinelle au retour, réconcilie au boot.

  mode: restart

  trigger:
    - platform: state
      entity_id: binary_sensor.presence_famille_unifiee
    - platform: homeassistant
      event: start
    - platform: state
      entity_id: input_boolean.systeme_stable
      to: "on"

  variables:
    ancre_valide: >
      {{ (as_timestamp(states('input_datetime.clim_debut_absence'), default=0) | int(0)) > 0 }}

  action:
    # ⏱️ Stabilisation post-boot / post-bascule de présence
    - delay: "00:00:05"

    - choose:

        # ▶️ Début d'absence : présence off ET aucune ancre valide → pose now()
        - conditions:
            - condition: template
              value_template: >
                {{ states('binary_sensor.presence_famille_unifiee') == 'off'
                   and not ancre_valide }}
          sequence:
            - service: input_datetime.set_datetime
              target:
                entity_id: input_datetime.clim_debut_absence
              data:
                timestamp: "{{ as_timestamp(now()) | int(0) }}"

        # ⏹️ Retour de présence : présence on ET ancre encore posée → sentinelle
        - conditions:
            - condition: template
              value_template: >
                {{ states('binary_sensor.presence_famille_unifiee') == 'on'
                   and ancre_valide }}
          sequence:
            - service: input_datetime.set_datetime
              target:
                entity_id: input_datetime.clim_debut_absence
              data:
                timestamp: 0
