# ==========================================================
# 🧠 ARSENAL — AUTOMATION
#     Climatisation — Synchronisation sélecteur mode ventilation
# ----------------------------------------------------------
# 🆔 IDENTIFIANT
#   "10030000000121"
#
# 🎯 RÔLE
#   Maintenir le sélecteur UI aligné sur l'état réel du mode de
#   ventilation, afin qu'il ne mente jamais durablement.
#
# 🧩 PÉRIMÈTRE
#   - Couvre : sensor.clim_fan_mode_local → input_select.clim_fan_mode_cible
#   - Exclut : tout pilotage de la climatisation, toute décision
#
# 🔖 NATURE
#   Synchronisation
#
# ⚙️ MODE
#   single — Justification : une synchronisation à la fois.
#
# 📣 DÉCLENCHEURS
#   Changement de sensor.clim_fan_mode_local (état réel fan_mode)
#
# 🔗 DÉPENDANCES
#   Lit      : sensor.clim_fan_mode_local, input_select.clim_fan_mode_cible
#   Appelle  : input_select.select_option
#   Écrit    : input_select.clim_fan_mode_cible
#
# 🧠 AUTORITÉ
#   Reflète l'état réel. Ne décide rien, ne pilote rien.
#
# ♻️ IDEMPOTENCE
#   Compatible retrigger : garde qui ne réécrit le sélecteur que s'il
#   est désaligné. Anti-boucle : après alignement, l'automatisation
#   d'application voit choix == réel et s'abstient. Un état réel hors
#   des 5 modes (unavailable) ne réécrit pas le sélecteur.
#
# 🚫 INTERDITS
#   - Appeler un script de pilotage
#   - Embarquer une logique métier
#   - Dupliquer une décision
#
# 🏷️ STATUT
#   Réconciliation — Arsenal (chantier ventilation clim, Lot V4-bis)
# ==========================================================

- id: "10030000000121"
  alias: "Clim - Synchronisation sélecteur mode de ventilation"
  description: >
    Aligne input_select.clim_fan_mode_cible sur l'état réel
    sensor.clim_fan_mode_local lorsqu'il change.
  mode: single

  trigger:
    - platform: state
      entity_id: sensor.clim_fan_mode_local

  variables:
    target_fr: >
      {{ {'quiet': 'Silencieux', 'low': 'Faible', 'medium': 'Moyen',
          'high': 'Fort', 'auto': 'Auto'}.get(
            states('sensor.clim_fan_mode_local')) }}
    current_select: "{{ states('input_select.clim_fan_mode_cible') }}"

  condition:
    # Ne réécrit que si désaligné, et seulement pour un état réel
    # exploitable (les 5 modes ; pas unavailable/unknown).
    - condition: template
      value_template: "{{ target_fr is not none and target_fr != current_select }}"

  action:
    - service: input_select.select_option
      target:
        entity_id: input_select.clim_fan_mode_cible
      data:
        option: "{{ target_fr }}"
