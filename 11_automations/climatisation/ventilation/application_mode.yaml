# ==========================================================
# 🧠 ARSENAL — AUTOMATION
#     Climatisation — Résolution & restauration ventilation (Modèle B)
# ----------------------------------------------------------
# 🆔 IDENTIFIANT
#   "10030000000120"
#
# 🎯 RÔLE
#   Autorité unique de résolution ventilation (contrat 12_ventilation_intention).
#   Résout le mode effectif souhaité (input_select.clim_fan_mode_cible) vers le
#   fan_mode réel lorsque l'override silencieux est inactif :
#     - « Auto Arsenal » → suit la recommandation technique
#       (sensor.clim_fan_mode_recommande : quiet/low/medium/high) ;
#     - niveaux manuels → quiet/low/medium/high.
#   N'émet JAMAIS fan_mode: auto dans la voie normale. Converge sur événements.
#
# 🧩 PÉRIMÈTRE
#   - Couvre : résolution intention → mode effectif → script.clim_set_fan_mode
#   - Exclut : pilotage du quiet (réalisé par switch.clim_quiet_fan via
#              l'automation silence 1003000000020), toute décision thermique,
#              tout allumage de la climatisation
#
# 🔖 NATURE
#   Résolution / restauration (Modèle B)
#
# ⚙️ MODE
#   queued (max 2) — Justification : sérialise les rafales de triggers
#   corrélés (lever du silencieux : toggle + binary + release quiet + reco)
#   au lieu de les rejeter (« Already running »). L'idempotence empêche
#   toute double commande matérielle.
#
# 📣 DÉCLENCHEURS (convergence)
#   - Changement d'intention (input_select.clim_fan_mode_cible)
#   - Changement de recommandation (sensor.clim_fan_mode_recommande : Auto Arsenal)
#   - Changement de l'autorisation silencieux (sortie de plage incluse)
#   - Désactivation du silencieux auto (input_boolean.clim_mode_silencieux_auto_active)
#   - Libération du quiet au niveau matériel (sensor.clim_mode_silencieux_local → off)
#   - Système stabilisé (input_boolean.systeme_stable → on : boot / reload)
#
#   NB : climate.clim n'est PAS un déclencheur (effet matériel de l'action →
#   éviterait une boucle de rétroaction). Il reste lu en variables/conditions
#   pour l'idempotence. Réconciliation hors Arsenal au prochain événement.
#
# 🔗 DÉPENDANCES
#   Lit      : input_select.clim_fan_mode_cible (mode souhaité),
#              sensor.clim_fan_mode_recommande (attr mode_technique, Auto Arsenal),
#              binary_sensor.clim_silencieux_autorise (override),
#              climate.clim (fan_mode réel + fan_modes + état)
#   Appelle  : script.clim_set_fan_mode (data.mode = mode technique résolu)
#   Écrit    : aucun helper — N'ÉCRIT JAMAIS l'intention (single-writer)
#
# 🧠 AUTORITÉ
#   Chemin logique unique vers le fan_mode matériel. Ne décide rien, ne
#   réécrit jamais l'intention, ne pilote jamais le quiet.
#
# ♻️ IDEMPOTENCE
#   N'appelle le script que si le mode mappé est compatible (présent dans
#   fan_modes) et diffère du fan_mode réel. Le script est lui-même idempotent.
#
# 🚫 INTERDITS
#   - Écrire input_select.clim_fan_mode_cible (intention)
#   - Agir pendant l'override silencieux (le quiet prime)
#   - Rallumer la climatisation
#   - Appeler climate.set_fan_mode directement (passe par le script)
#
# 🏷️ STATUT
#   Réactive — Arsenal (chantier ventilation clim, Modèle B)
# ==========================================================

- id: "10030000000120"
  alias: "Clim - Résolution & restauration ventilation"
  description: >
    Autorité unique de résolution ventilation (Modèle B). Restaure le
    mapping de input_select.clim_fan_mode_cible sur le fan_mode réel
    lorsque l'override silencieux est inactif. N'écrit jamais l'intention.
  mode: queued
  max: 2

  trigger:
    # Intention utilisateur
    - platform: state
      entity_id: input_select.clim_fan_mode_cible
    # Recommandation Arsenal (mode « Auto Arsenal » : suit la reco)
    - platform: state
      entity_id: sensor.clim_fan_mode_recommande
    # Autorisation silencieux (sortie de plage = front off)
    - platform: state
      entity_id: binary_sensor.clim_silencieux_autorise
    # Désactivation manuelle du silencieux automatique (toggle utilisateur) :
    # le binary_sensor dérivé peut ne pas transitionner → trigger direct requis.
    - platform: state
      entity_id: input_boolean.clim_mode_silencieux_auto_active
    # Libération du quiet au niveau matériel (override levé) : re-résolution
    # du fan_mode effectif au moment où l'appareil quitte le quiet.
    - platform: state
      entity_id: sensor.clim_mode_silencieux_local
      to: "off"
    # Boot / système stabilisé (reload, redémarrage HA)
    - platform: state
      entity_id: input_boolean.systeme_stable
      to: "on"

  variables:
    # « Auto Arsenal » (et la valeur héritée « Auto » par sécurité) suit la
    # recommandation technique ; les niveaux manuels mappent FR → technique.
    # Aucune branche n'émet « auto » : la voie normale ne délègue jamais à Fujitsu.
    desired: >
      {{ (state_attr('sensor.clim_fan_mode_recommande', 'mode_technique')
          if states('input_select.clim_fan_mode_cible') in ['Auto Arsenal', 'Auto']
          else {'Silencieux': 'quiet', 'Faible': 'low', 'Moyen': 'medium',
                'Fort': 'high'}.get(states('input_select.clim_fan_mode_cible'))) }}
    fan_modes: "{{ state_attr('climate.clim', 'fan_modes') or [] }}"
    # Résolution casse-insensible du mode canonique vers la valeur EXACTE
    # exposée par l'intégration (ex. quiet → « Quiet »). Si absente, conserve
    # la valeur canonique : la garde « target in fan_modes » échoue alors et
    # l'automation s'abstient (jamais d'envoi incompatible).
    target: >
      {{ ((fan_modes | select('match', '(?i)^' ~ (desired | string) ~ '$') | list)
          + [desired]) | first }}
    current: "{{ state_attr('climate.clim', 'fan_mode') }}"
    override_actif: "{{ is_state('binary_sensor.clim_silencieux_autorise', 'on') }}"
    clim_actif: >
      {{ states('climate.clim') not in ['off', 'unknown', 'unavailable'] }}

  condition:
    # Système stable (anti-rejeu au boot avant stabilisation)
    - condition: template
      value_template: "{{ is_state('input_boolean.systeme_stable', 'on') }}"
    # Override OFF : la restauration n'agit jamais pendant le silencieux
    - condition: template
      value_template: "{{ not override_actif }}"
    # Climatisation active : l'intention ne rallume jamais la clim (contrat §7)
    - condition: template
      value_template: "{{ clim_actif }}"
    # Intention exploitable et compatible matériel (contrat §8)
    - condition: template
      value_template: "{{ target is not none and target in fan_modes }}"
    # Écart réel ≠ cible (idempotence, casse-insensible : le device peut
    # renvoyer le fan_mode avec une casse différente de la cible résolue)
    - condition: template
      value_template: "{{ (current | string | lower) != (target | string | lower) }}"

  action:
    - service: script.clim_set_fan_mode
      data:
        mode: "{{ target }}"
