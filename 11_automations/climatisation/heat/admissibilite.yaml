# ==========================================================
# 🧠 ARSENAL — AUTOMATISATION (CLIM / HEAT)
# ----------------------------------------------------------
# 📛 Domaine :
#   Admissibilité décisionnelle du besoin HEAT
#
# 🎯 Rôle :
#   Piloter le verrou d'admissibilité du besoin HEAT
#   selon la doctrine physique Arsenal.
#
# 🧱 Principe Arsenal — Doctrine v2 (deux portes causales) :
#   - Porte 1 : activation sur front montant du besoin
#               sous autorisation active
#   - Porte 2 : requalification sur front montant de
#               l'autorisation stable 5 min, sous besoin actif
#   - Extinction immédiate sur retombée du besoin
#   - Extinction immédiate sur révocation d'autorisation
#   - Réconciliation au démarrage exclue :
#       portée par une automation dédiée afin de ne jamais
#       bloquer les fronts runtime.
#
# 📌 Note d'appoint :
#   HEAT reste un appoint, pas une source primaire.
#   Ce caractère est porté par les conditions d'autorisation HEAT
#   (présence stricte, autorisation explicite hivernale, blocage
#   poêle, blocage post-aération) et par la priorité d'arbitrage
#   cool > dry > heat. Le verrou d'admissibilité ne modifie aucun
#   de ces leviers.
#
# 🔌 Entité support pilotée :
#   - input_boolean.besoin_clim_heat_admissible
#
# 📘 Contrat associé :
#   - 05_decision_candidats.md (v1.4)
#
# 📍 Portée :
#   - HEAT uniquement
# ==========================================================

- id: '10030000000110'
  alias: "Clim - Heat - Admissibilité"
  description: >
    Pilotage runtime de l'admissibilité HEAT :
    activation porte 1, requalification porte 2,
    et extinctions.
  mode: single
  trigger:
    - platform: state
      entity_id: binary_sensor.besoin_clim_heat
      to: 'on'
      id: activation_besoin
    - platform: state
      entity_id: binary_sensor.autorisation_clim_heat
      to: 'on'
      for:
        minutes: 5
      id: requalification_autorisation
    - platform: state
      entity_id: binary_sensor.besoin_clim_heat
      to: 'off'
      id: extinction_besoin
    - platform: state
      entity_id: binary_sensor.autorisation_clim_heat
      to: 'off'
      id: extinction_autorisation

    # --- EXTINCTION BESOIN INDISPONIBLE (C28) : besoin unknown/unavailable ---
    - platform: template
      value_template: >
        {{ states('binary_sensor.besoin_clim_heat') in ['unknown', 'unavailable'] }}
      id: extinction_besoin_indisponible

  condition: []

  action:
    - choose:

        # --- ACTIVATION (porte 1 : front du besoin) ---
        - conditions:
            - condition: trigger
              id: activation_besoin
            - condition: state
              entity_id: binary_sensor.autorisation_clim_heat
              state: 'on'
          sequence:
            - action: input_boolean.turn_on
              target:
                entity_id: input_boolean.besoin_clim_heat_admissible

        # --- REQUALIFICATION (porte 2 : front stable de l'autorisation) ---
        - conditions:
            - condition: trigger
              id: requalification_autorisation
            - condition: state
              entity_id: binary_sensor.besoin_clim_heat
              state: 'on'
          sequence:
            - action: input_boolean.turn_on
              target:
                entity_id: input_boolean.besoin_clim_heat_admissible

        # --- EXTINCTION BESOIN ---
        - conditions:
            - condition: trigger
              id: extinction_besoin
          sequence:
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.besoin_clim_heat_admissible

        # --- EXTINCTION AUTORISATION ---
        - conditions:
            - condition: trigger
              id: extinction_autorisation
          sequence:
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.besoin_clim_heat_admissible

        # --- EXTINCTION BESOIN INDISPONIBLE (C28) ---
        - conditions:
            - condition: trigger
              id: extinction_besoin_indisponible
          sequence:
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.besoin_clim_heat_admissible
