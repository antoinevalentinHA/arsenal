# ==========================================================
# 🧠 ARSENAL — AUTOMATION (11_automations)
#     Clim — UI — Notification persistante mode actif
# ----------------------------------------------------------
# 🎯 RÔLE
#
#   Projection UI STRICTEMENT observable du mode actif reel
#   de la climatisation.
#
#   - Une notification persistante SI la clim est
#     effectivement en mode heat, cool ou dry.
#   - Remplacement explicite lors d’un changement de mode.
#   - Disqualification explicite hors mode actif notifiable.
#
#   Cette automation :
#     - ne decide rien
#     - ne corrige rien
#     - ne memorise rien
#     - ne depend d’aucun script
#
#   Elle est entierement reconstructible a partir
#   du seul etat courant du systeme.
#
# 🚫 NE FAIT PAS
#   - Aucune logique metier
#   - Aucune action sur la clim
#   - Aucune notification lorsque la clim est off
#   - Aucune notification evenementielle
# ==========================================================

- id: "10030000000109"
  alias: "Clim - Notification"
  description: >
    Affiche une notification persistante uniquement lorsque
    la climatisation est effectivement en mode heat, cool ou dry.

  mode: restart

  trigger:
    - platform: state
      entity_id: sensor.clim_mode_local

    - platform: state
      entity_id: input_boolean.systeme_stable
      to: "on"

  condition: []

  variables:
    clim_mode: "{{ states('sensor.clim_mode_local') }}"

  action:
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ clim_mode == 'heat' }}"
          sequence:
            - service: persistent_notification.create
              data:
                notification_id: clim_mode_actif
                title: "🔥 Clim – Mode Heat"
                message: >
                  La climatisation est actuellement en mode Heat.

        - conditions:
            - condition: template
              value_template: "{{ clim_mode == 'cool' }}"
          sequence:
            - service: persistent_notification.create
              data:
                notification_id: clim_mode_actif
                title: "❄️ Clim – Mode Cool"
                message: >
                  La climatisation est actuellement en mode Cool.

        - conditions:
            - condition: template
              value_template: "{{ clim_mode == 'dry' }}"
          sequence:
            - service: persistent_notification.create
              data:
                notification_id: clim_mode_actif
                title: "💧 Clim – Mode Dry"
                message: >
                  La climatisation est actuellement en mode Dry.

      default:
        - service: persistent_notification.dismiss
          data:
            notification_id: clim_mode_actif
