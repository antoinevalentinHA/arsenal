# ==========================================================
#  🧠 ARSENAL — GUARD :
#     CLIM – Invariants de cohérence système
#
#  ID : 10030000000101
# ----------------------------------------------------------
#  🎯 RÔLE
#
#     Garde-fou de cohérence système de la climatisation.
#
#     Ce GUARD impose des invariants stricts portant
#     EXCLUSIVEMENT sur la cohérence interne entre :
#
#         décision centrale  (sensor.clim_target_mode)
#         exécution réelle   (climate.clim)
#         alimentation        (switch.clim_power)
#
#     Il ne raisonne JAMAIS sur le monde.
#     Il raisonne sur la cohérence du système.
#
# ----------------------------------------------------------
#  🛡️ PRINCIPE
#
#     - Déclenchement sur la relation surveillée uniquement :
#         • état réel de la clim
#         • alimentation physique
#         • décision centrale
#         • démarrage Home Assistant
#
#     - Détection de combinaisons INTERDITES entre
#       décision et exécution
#
#     - Correction immédiate et UNILATÉRALE (état sûr)
#
#     Ce GUARD :
#       • NE DÉCIDE PAS d'un mode
#       • NE REMPLACE PAS la décision centrale
#       • NE LIT AUCUNE grandeur du monde
#       • N'INTERPRÈTE AUCUNE logique de confort
#
#     Il s'applique APRÈS la décision,
#     sur l'exécution réelle uniquement.
#
# ----------------------------------------------------------
#  🚫 CE QUE CE GUARD NE FAIT PAS
#
#     - Ne produit AUCUNE décision métier
#     - Ne modifie PAS `sensor.clim_target_mode`
#     - Ne lit NI présence, NI fenêtres, NI météo, NI horaire
#       (ces grandeurs sont absorbées en amont par
#        la couche Admissibilité)
#     - Ne recherche PAS le confort
#
# ----------------------------------------------------------
#  ✅ CE QUE CE GUARD FAIT EXCLUSIVEMENT
#
#     - Impose des INVARIANTS DE COHÉRENCE SYSTÈME
#     - Corrige les divergences décision ↔ exécution
#     - Garantit que l'exécution réelle ne contredit
#       jamais la décision centrale
#
# ----------------------------------------------------------
#  📦 INVARIANTS APPLIQUÉS  (contrat 08_securite.md v1.4)
#
#     Tous conformes au test d'universalité (deux volets) :
#     vrais pour tout mode légal, sans seuil ni délai.
#
#     INV-1  clim active   ET target_mode == off  → INTERDIT
#     INV-2  power actif    ET target_mode == off  → INTERDIT
#     INV-3  clim active    ET power == off          → INTERDIT
#
#     Légitimité (référentielle, source unique) :
#         power actif légitime ⟺ target_mode ≠ off
#
# ----------------------------------------------------------
#  ⚙️ MODE D'EXÉCUTION
#
#     Mode retenu : restart
#
#     Ce Guard est correctif et idempotent.
#
# ----------------------------------------------------------
#  🧠 ARCHITECTURE ARSENAL
#
#     Niveau : GUARD fondamental (post-décision)
#
#     Admissibilité (absorbe le monde)
#         → Décision centrale (sensor.clim_target_mode)
#             → Exécution → État réel
#                 ↑
#             GUARD : cohérence décision ↔ exécution
#
#     Le GUARD corrige l'EXÉCUTION,
#     jamais la DÉCISION.
#
#     Recouvrement assumé avec le Watchdog (INV-1) :
#       Guard    = filet immédiat (état sûr)
#       Watchdog = filet persistant ≥ 60 s (ré-assertion)
# ==========================================================

- id: "10030000000101"
  alias: "Clim – Guard"
  mode: restart

  trigger:
    - platform: state
      entity_id:
        - climate.clim
        - switch.clim_power
        - sensor.clim_target_mode
    - platform: homeassistant
      event: start

  variables:
    target_mode: "{{ states('sensor.clim_target_mode') }}"
    clim_power: "{{ states('switch.clim_power') }}"
    clim_state: "{{ states('climate.clim') }}"

    target_off: "{{ target_mode == 'off' }}"

    clim_active: >
      {{ clim_state not in ['off', 'unavailable', 'unknown'] }}

  condition:
    - condition: state
      entity_id: input_boolean.systeme_stable
      state: "on"

    - condition: template
      value_template: >
        {{
          (clim_active and target_off)
          or
          (clim_power == 'on' and target_off)
          or
          (clim_active and clim_power == 'off')
        }}

  action:
    - service: script.clim_exec_apply_off
