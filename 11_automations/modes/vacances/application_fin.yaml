# ==========================================================
#  🧠 ARSENAL — AUTOMATION :
#     Vacances – Fin application
#
#  ID : 10090000000013
# ----------------------------------------------------------
#  🎯 RÔLE
#
#     Met fin au contexte Vacances lorsque celui-ci n’est
#     plus actif de manière stable, ou lors d’une
#     réconciliation au démarrage.
#
#     Elle consomme la vérité métier finale du domaine
#     Vacances et retire les effets de contexte associés,
#     sans jamais fabriquer elle-même cette vérité.
#
#  🧱 NATURE
#
#     - Fin d’application de contexte global
#     - Retrait de mesures transverses
#     - Consommation d’un état métier déjà calculé
#     - Aucune logique décisionnelle autonome
#
#  ⚙️ PRINCIPE
#
#     - Déclenchement sur `binary_sensor.vacances_actives`
#       à `off` stable
#       ou au démarrage si cet état est déjà faux
#     - Temporisation courte au démarrage pour laisser
#       les entités retrouver un état stable
#     - Retrait de l’adaptation de consigne réduite
#       chauffage via script dédié
#     - Disqualification de la notification persistante
#       associée au contexte Vacances
#
#  🚫 CE QUE CETTE AUTOMATION NE FAIT PAS
#
#     - Ne décide pas si les vacances sont actives
#     - Ne dépend pas de `input_select.mode_maison`
#       comme source de vérité
#     - Ne pilote pas la décision thermique centrale
#     - Ne réagit pas aux états transitoires non stabilisés
#     - Ne remplace aucun moteur métier spécialisé
#
#  ✅ COMPATIBILITÉ
#
#     Home Assistant 2024.8+
# ==========================================================

- id: "10090000000013"
  alias: "Modes - Vacances - Fin application"
  description: >
    Met fin au contexte Vacances lorsque celui-ci n’est
    plus effectivement actif, y compris en réconciliation
    au démarrage.

  mode: single

  trigger:
    - platform: state
      entity_id: binary_sensor.vacances_actives
      to: "off"
      for:
        minutes: 1

    - platform: homeassistant
      event: start

  condition:
    - condition: state
      entity_id: binary_sensor.vacances_actives
      state: "off"

  action:
    - if:
        - condition: template
          value_template: "{{ trigger.platform == 'homeassistant' }}"
      then:
        - delay: "00:00:20"

    - action: script.vacances_retirer_consigne_reduite

    # ----------------------------------------------------------
    # Levée du blocage ECS planifiée posé par le contexte
    # Vacances, sur la transition réelle d'effectivité
    # (vacances_actives -> off). Gardée hors redémarrage
    # (trigger 'state' uniquement) afin de préserver un blocage
    # manuel hors vacances. La réconciliation au boot/sortie
    # reste assurée par normal.yaml (mode_maison -> Normal).
    # ----------------------------------------------------------
    - if:
        - condition: template
          value_template: "{{ trigger.platform == 'state' }}"
      then:
        - action: input_boolean.turn_off
          target:
            entity_id:
              - input_boolean.ecs_blocage_planifiee

    # ----------------------------------------------------------
    # Restauration de la préférence mode_vaisselle :
    # uniquement si une sauvegarde valide (on/off) existe,
    # puis remise de la sauvegarde à la sentinelle vide.
    # Sauvegarde vide ou invalide : abstention (aucune branche).
    # ----------------------------------------------------------
    - choose:
        - conditions:
            - condition: state
              entity_id: input_text.ecs_mode_vaisselle_sauvegarde
              state: "on"
          sequence:
            - action: input_boolean.turn_on
              target:
                entity_id:
                  - input_boolean.mode_vaisselle

            - action: input_text.set_value
              target:
                entity_id: input_text.ecs_mode_vaisselle_sauvegarde
              data:
                value: ""

        - conditions:
            - condition: state
              entity_id: input_text.ecs_mode_vaisselle_sauvegarde
              state: "off"
          sequence:
            - action: input_boolean.turn_off
              target:
                entity_id:
                  - input_boolean.mode_vaisselle

            - action: input_text.set_value
              target:
                entity_id: input_text.ecs_mode_vaisselle_sauvegarde
              data:
                value: ""

    - action: persistent_notification.dismiss
      data:
        notification_id: contexte_vacances