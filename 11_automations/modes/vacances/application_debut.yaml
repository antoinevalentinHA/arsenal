# ==========================================================
#  🧠 ARSENAL — AUTOMATION :
#     Vacances – Application du contexte global
#
#  ID : 1009000000006
# ----------------------------------------------------------
#  🎯 RÔLE
#
#     Automation d’APPLICATION DU CONTEXTE GLOBAL.
#
#     Elle applique les mesures transverses associées aux
#     vacances lorsque celles-ci sont effectivement actives,
#     ou lors d’une réconciliation au démarrage.
#
#     Elle consomme la vérité métier finale du domaine
#     Vacances et applique un contexte global cohérent,
#     sans jamais fabriquer elle-même cette vérité.
#
#  🧱 NATURE
#
#     - Orchestration de contexte global
#     - Application de règles transverses
#     - Consommation d’un état métier déjà calculé
#     - Aucune logique décisionnelle autonome
#
#  ⚙️ PRINCIPE
#
#     - Déclenchement sur activation de
#       `binary_sensor.vacances_actives`
#       ou au démarrage si cet état est déjà vrai
#     - Temporisation courte au démarrage pour laisser
#       les entités retrouver un état stable
#     - Disqualification de la notification persistante
#       de projection devenue redondante
#     - Application séquentielle des mesures de contexte
#     - Adaptation contextuelle de la consigne réduite
#       chauffage via script dédié
#     - Création d’une notification persistante d’état
#
#  🚫 CE QUE CETTE AUTOMATION NE FAIT PAS
#
#     - Ne décide pas si les vacances sont actives
#     - Ne dépend pas de `input_select.mode_maison`
#       comme source de vérité
#     - Ne pilote pas la décision thermique centrale
#     - Ne gère pas la sortie du mode Vacances
#     - Ne remplace aucun moteur métier spécialisé
#
#  ✅ COMPATIBILITÉ
#
#     Home Assistant 2024.8+
# ==========================================================

- id: "1009000000006"
  alias: "Modes - Vacances - Application"
  description: >
    Applique les mesures transverses du contexte Vacances
    lorsque les vacances sont effectivement actives,
    y compris en réconciliation au démarrage.

  mode: single

  trigger:
    - platform: state
      entity_id: binary_sensor.vacances_actives
      to: "on"

    - platform: homeassistant
      event: start

  condition:
    - condition: state
      entity_id: binary_sensor.vacances_actives
      state: "on"

  action:
    - if:
        - condition: template
          value_template: "{{ trigger.platform == 'homeassistant' }}"
      then:
        - delay: "00:00:20"

    - action: persistent_notification.dismiss
      data:
        notification_id: projection_vacances

    - action: script.vacances_adapter_consigne_reduite

    - action: input_boolean.turn_on
      target:
        entity_id:
          - input_boolean.ecs_blocage_planifiee

    - action: input_boolean.turn_off
      target:
        entity_id:
          - input_boolean.mode_vaisselle
          - input_boolean.ecs_desinfection_active
          - input_boolean.bouclage_visiteur

    - action: persistent_notification.create
      data:
        notification_id: contexte_vacances
        title: "✈️ Vacances – Contexte actif"
        message: >
          Le mode Vacances est actif.