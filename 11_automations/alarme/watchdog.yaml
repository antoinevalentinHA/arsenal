# ==========================================================
# 🧠 ARSENAL — AUTOMATION :
#     Alarme – Watchdog cohérence blocage armement
#
# ID : 10020000000034
# ----------------------------------------------------------
# 🎯 RÔLE
#   Corriger toute incohérence structurelle entre :
#     - input_boolean.blocage_armement_auto
#     - timer.blocage_armement_auto
#
# 🧩 PRINCIPE
#   - Surveillance strictement événementielle
#   - Déclenchement uniquement sur anomalie stabilisée
#   - Stabilisation portée par le trigger (500 ms)
#   - Consomme un diagnostic structurel dédié
#   - Corrige de manière minimale et déterministe
#
# 🛡️ STATUT
#   - Mécanisme de sécurité uniquement
#   - Ne constitue pas un chemin nominal
#
# ⚠️ INCOHÉRENCES CORRIGÉES
#   - Blocage ON  + timer idle              → blocage orphelin
#   - Blocage OFF + timer actif ou en pause → timer orphelin
#
# ⚙️ MODE D'EXÉCUTION
#   - mode: single
#   - Une anomalie stabilisée déclenche une unique correction
#   - Aucun restart, aucune file d'attente, aucun backlog
#
# ==========================================================

- id: "10020000000034"
  alias: "Alarme - Watchdog cohérence blocage"
  mode: single

  trigger:
    - platform: state
      entity_id: binary_sensor.blocage_armement_incoherent
      from: "off"
      to: "on"
      for:
        milliseconds: 500

  action:
    - variables:
        blocage: "{{ state_attr('binary_sensor.blocage_armement_incoherent', 'blocage') }}"
        timer_state: "{{ state_attr('binary_sensor.blocage_armement_incoherent', 'timer_state') }}"
        type_anomalie: "{{ state_attr('binary_sensor.blocage_armement_incoherent', 'type_anomalie') }}"

    - choose:
        - conditions:
            - condition: template
              value_template: "{{ type_anomalie == 'blocage_orphelin' }}"
          sequence:
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.blocage_armement_auto

            - action: script.notification_envoyer_avance
              data:
                cible: input_text.telephone_parent_1_notify
                titre: "⚠️ Anomalie blocage alarme"
                message: >-
                  Incohérence détectée — blocage_orphelin.
                  Blocage : {{ blocage }} | Timer : {{ timer_state }}.
                  Correction automatique appliquée.

        - conditions:
            - condition: template
              value_template: "{{ type_anomalie == 'timer_orphelin' }}"
          sequence:
            - action: timer.cancel
              target:
                entity_id: timer.blocage_armement_auto

            - action: script.notification_envoyer_avance
              data:
                cible: input_text.telephone_parent_1_notify
                titre: "⚠️ Anomalie blocage alarme"
                message: >-
                  Incohérence détectée — timer_orphelin.
                  Blocage : {{ blocage }} | Timer : {{ timer_state }}.
                  Correction automatique appliquée.