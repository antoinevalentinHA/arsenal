# ==========================================================
#  🧠 ARSENAL — AUTOMATION :
#     Alarme – Délai d'entrée (fin)
#
#  ID : 10020000000032
# ----------------------------------------------------------
#  🎯 RÔLE
#
#     Automation chargée de déclencher l'alarme
#     lorsque le délai d'entrée expire sans
#     désarmement préalable.
#
#  🧩 PRINCIPE
#
#     - Le timer du délai d'entrée arrive à échéance
#     - Le système est stable (post-reboot safe)
#     - L'alarme est toujours armée
#     - Une intrusion est toujours active
#     - Le déclenchement est exécuté
#
#  🚫 CE QUE CETTE AUTOMATION NE FAIT PAS
#
#     - Ne gère pas le démarrage du délai
#     - Ne décide pas de l'armement
#     - Ne modifie aucun état de présence
#
#  🛡️ ROBUSTESSE
#
#     - Zéro wait
#     - Réaction événementielle (timer.finished)
#     - Garde systeme_stable (post-reboot)
#     - Garde armed_away
#     - L'expiration du délai (timer.finished) vaut preuve d'intrusion
#       (B2/CH-1 : la garde ouverture_qualifiee_maison a été retirée du corps)
#
#  ⚠️  DETTE ARCHITECTURALE DOCUMENTÉE
#
#     Cette automation court-circuite le pipeline canonique
#     Arsenal (Décision → Helpers → Application) : elle appelle
#     alarm_control_panel.alarm_trigger directement, sans passer
#     par script.alarme_decision_centrale ni
#     input_text.alarme_etat_cible.
#
#     Note (C1/CH-1) : l'appel direct à script.sirene_brutale a été
#     retiré ; la sirène est déclenchée par le seul chemin canonique
#     triggered -> script.sirene_forte.
#
#     Refonte cible (§9, hors périmètre actuel) : matérialiser
#     "intrusion confirmée" comme état contractuel persisté, puis
#     déclencher le panneau depuis cet état via le pipeline canonique.
#
#  ✅ Compatibilité : Home Assistant 2024.8+
# ==========================================================

- id: "10020000000032"
  alias: "Alarme - Délai entrée fin"
  mode: single

  trigger:
    - platform: event
      event_type: timer.finished
      event_data:
        entity_id: timer.delai_entree

  condition:
    # Garde post-reboot : système stabilisé
    - condition: state
      entity_id: input_boolean.systeme_stable
      state: "on"

    # Alarme toujours armée
    - condition: state
      entity_id: alarm_control_panel.alarme_maison
      state: "armed_away"

  action:
    # Bifurcation mode test (contrat 50 §I2) :
    #   - hors mode test : déclenchement réel + notification critique
    #   - en mode test   : notification uniquement, aucun déclenchement réel
    - choose:
        - conditions:
            - condition: state
              entity_id: input_boolean.mode_test_alarme
              state: "off"
          sequence:
            # 🚨 Déclenchement de l'alarme
            - action: alarm_control_panel.alarm_trigger
              target:
                entity_id: alarm_control_panel.alarme_maison

            # 📲 Notification critique
            - action: script.notification_envoyer_avance
              data:
                cible: input_text.telephone_parent_1_notify
                titre: "🚨 Alarme déclenchée"
                message: >
                  Aucun désarmement détecté après expiration
                  du délai d'entrée.
                extra:
                  priority: high
                  importance: high

      # 🔕 Mode test : notification uniquement, aucun déclenchement réel
      default:
        - action: script.notification_envoyer_avance
          data:
            cible: input_text.telephone_parent_1_notify
            titre: "🔕 Fin de délai simulée (mode test)"
            message: >
              Délai d'entrée expiré sans désarmement.
              Aucun déclenchement réel : le système est en **mode test**.
            extra:
              priority: high
              importance: high