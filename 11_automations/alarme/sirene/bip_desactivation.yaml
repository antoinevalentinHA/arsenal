# ==========================================================
#  🧠 ARSENAL — AUTOMATION :
#     Sirène – Bip bip à la désactivation de l’alarme
#
#  ID : 1002000000010
# ----------------------------------------------------------
#  🎯 RÔLE
#
#     Automation de retour sonore chargée d’émettre
#     un signal sonore de confirmation de type
#     **bip bip** (double impulsion) via la sirène
#     lors de la désactivation de l’alarme.
#
#  🧩 PRINCIPE
#
#     - Réagit au passage de l’alarme à l’état disarmed
#     - Délègue l’émission du bip bip à un script dédié
#
#  🚫 CE QUE CETTE AUTOMATION NE FAIT PAS
#
#     - Ne décide pas du désarmement
#     - Ne modifie aucun état de sécurité
#     - Ne contient aucune logique conditionnelle
#
#  🧠 PRINCIPES ARSENAL
#
#     - Feedback utilisateur immédiat et explicite
#     - Distinction sonore claire entre états
#     - Séparation stricte événement / exécution
#
#  ✅ Compatibilité : Home Assistant 2024.8+
# ==========================================================

- id: '1002000000010'
  alias: "Alarme - Bip désactivation"
  description: >
    Émet un bip bref de confirmation via la sirène dès que l’alarme est désarmée.

  mode: single

  # ======================================================
  # 🔔 Déclencheur — Alarme désarmée
  # ======================================================
  trigger:
    - platform: state
      entity_id: alarm_control_panel.alarme_maison
      to: disarmed

  # ======================================================
  # ▶️ Action — Bip Bip via script dédié
  # ======================================================
  condition: []

  action:
    - action: script.turn_on
      target:
        entity_id: script.sirene_bip_bip
