# ==========================================================
# 🧠 ARSENAL — AUTOMATION
#     ECS — Bouclage manuel fin timer
# ----------------------------------------------------------
# 🎯 ROLE
#
#     Clore un cycle manuel de bouclage ECS a l'expiration
#     du timer 5 minutes.
#
#     Le flag manuel est toujours eteint.
#     L'actionneur est eteint uniquement si l'AUTO n'est pas autorise.
#
# 🧩 PERIMETRE
#
#     - Fin de timer.bouclage_ecs_5_minutes
#     - Extinction inconditionnelle du flag manuel
#     - Extinction conditionnelle de switch.prise_bouclage
#
# 🔗 DEPENDANCES
#
#     - timer.bouclage_ecs_5_minutes
#     - input_boolean.bouclage_ecs_5_minutes_en_cours
#     - binary_sensor.bouclage_autorise
#     - switch.prise_bouclage
#
# 🚫 INTERDITS
#
#     - Ne jamais laisser le flag manuel a on apres expiration
#     - Ne jamais couper le switch si l'AUTO est autorise
#     - Aucun timer AUTO
#     - Aucune logique horaire
#
# 🧠 STATUT
#
#     Automation d'application — Bouclage ECS fin cycle manuel
# ==========================================================

- id: "10260000000002"
  alias: "ECS - Bouclage - Fin de cycle"
  description: "Clot le cycle manuel ECS a expiration du timer : flag off inconditionnel, switch off seulement hors AUTO."
  mode: single

  trigger:
    - platform: event
      event_type: timer.finished
      event_data:
        entity_id: timer.bouclage_ecs_5_minutes

  action:
    - alias: "Marquer fin du bouclage 5 minutes"
      service: input_boolean.turn_off
      target:
        entity_id: input_boolean.bouclage_ecs_5_minutes_en_cours

    - if:
        - condition: state
          entity_id: binary_sensor.bouclage_autorise
          state: "off"
      then:
        - alias: "Eteindre la prise hors AUTO"
          service: switch.turn_off
          target:
            entity_id: switch.prise_bouclage