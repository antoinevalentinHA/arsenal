# ==========================================================
# 🧠 ARSENAL — AUTOMATION :
#     Babyphone – Détection bruit chambre Arnaud
# ----------------------------------------------------------
# 🎯 RÔLE
#
#     Détecter un dépassement de seuil sonore dans la
#     chambre d’Arnaud et notifier l’utilisateur,
#     lorsque la surveillance babyphone est activée.
#
# 🧱 PRINCIPE
#
#     - Surveillance conditionnelle activable
#       via un booléen dédié
#     - Comparaison du niveau sonore courant
#       à un seuil paramétrable
#     - Déclenchement non temporisé
#
# 📥 ENTRÉES
#
#     - sensor.bruit_chambre_enfants
#     - input_number.seuil_reveil_bruit
#     - input_boolean.babyphone_arnaud
#
# 📤 SORTIE
#
#     - Notification utilisateur (mobile)
#
# 🚫 CE QUE CETTE AUTOMATION NE FAIT PAS
#
#     - Ne confirme pas un réveil réel
#     - Ne pilote aucun état de présence
#     - Ne déclenche aucune action automatique
#
# ✅ ARCHITECTURE
#
#     Arsenal
# ==========================================================

- id: '10110000000005'
  alias: "Réveils - Babyphone Arnaud"
  mode: single

  trigger:
    - platform: template
      value_template: >
        {{ states('sensor.bruit_chambre_enfants') | float(0)
           > states('input_number.seuil_reveil_bruit') | float(0) }}

  condition:
    - condition: state
      entity_id: input_boolean.babyphone_arnaud
      state: 'on'

  action:
    - service: script.notification_envoyer
      data:
        cible: input_text.telephone_antoine_notify
        titre: "👶 Arnaud"
        message: "🌙 Bruit détecté dans sa chambre"
