# ==========================================================
#  🧠 ARSENAL — AUTOMATION :
#     ECS – Watchdog de fin de cycle
#
#  ID : 10250000000008
# ----------------------------------------------------------
#  🎯 ROLE
#     Garantir la remise en securité complète du ballon ECS
#     en fin de cycle, même en cas de défaillance amont.
#
#     Tente un rabaissement à 10 °C puis libère le verrou.
#
#  🧱 PRINCIPE
#     - Un cycle ECS ne doit jamais rester ouvert
#     - La consigne haute ne doit pas persister
#     - Le rabaissement est délégue au script exécutif
#       script.ecs_appliquer_consigne_bridge
#     - Libération du verrou quoi qu'il arrive
#
#  🚫 NE FAIT PAS
#     - Aucun log utilisateur
#     - Aucune notification
#     - Aucun blocage en cas d'échec
#     - Aucune publication MQTT directe
#
#  ✅ CONTRAINTES
#     - Exécution déterministe
#     - Libération du verrou garantie
# ==========================================================

- id: "10250000000008"
  alias: "ECS - Watchdog fin de cycle"
  description: >
    Fin de cycle ECS forcée : tentative de rabaissement à 10 °C
    via script exécutif boiler bridge, puis libération du verrou.
  mode: single

  trigger:
    - platform: event
      event_type: timer.finished
      event_data:
        entity_id: timer.ecs_cycle_watchdog

  action:
    - delay:
        seconds: 3

    - variables:
        retour_temp: 10

    # ======================================================
    # 🔽 Tentative de rabaissement ECS
    # ======================================================
    - service: script.ecs_appliquer_consigne_bridge
      data:
        target_temp: "{{ retour_temp }}"

    # ======================================================
    # 🔓 Libération verrou (toujours)
    # ======================================================
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.ecs_cycle_en_cours