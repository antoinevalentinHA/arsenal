# ==========================================================
#  🧠 ARSENAL — AUTOMATION :
#     ECS – Gardien de réapplication de la consigne après prélèvement
#
#  ID : 10250000000005
# ----------------------------------------------------------
#  🎯 RÔLE
#     Réappliquer automatiquement la consigne ECS
#     de sécurité (10 °C) à l’issue d’un cycle ECS,
#     afin d’éviter tout rebond thermique non souhaité.
#
#     Cette automation agit comme un gardien post-événement,
#     garantissant le retour effectif à l’état nominal.
#
#  🧱 PRINCIPE ARSENAL
#     - La décision ECS est prise ailleurs
#     - Le gardien vérifie et corrige a posteriori
#     - La sécurité prime sur l’optimisation
#     - L’écriture chaudière est déléguée au script
#       script.ecs_appliquer_consigne_bridge
#
#  🚫 NE FAIT PAS
#     - Ne déclenche aucun cycle ECS
#     - Ne modifie pas la stratégie ECS globale
#     - Ne s’exécute pas si un cycle ECS est en cours
#     - N’émet aucune commande MQTT directe
#
#  🧩 UTILISATION
#     - Déclenchement :
#         • fin du timer post-prélèvement ECS
#     - Pré-requis :
#         • aucun cycle ECS actif
#     - Séquence :
#         • temporisation de stabilisation
#         • deux tentatives espacées
#         • vérification du résultat via ACK
#         • notification critique si échec persistant
#
#  ⚠️ IMPORTANT
#     - Cette automation applique une consigne de sécurité
#     - Toute modification de la valeur cible ou de la stratégie
#       doit être réfléchie au niveau système ECS
#
#  ✅ CONTRAINTES
#     - Sécurité prioritaire sur toute autre considération
#     - Vérification basée sur ACK
#     - Aucune sortie silencieuse en cas d’échec
# ==========================================================

- id: "10250000000005"
  alias: "ECS – Gardien post-prélèvement"
  description: >
    Applique et vérifie la consigne 10 °C après un cycle ECS.
    Double tentative via script exécutif boiler bridge.
    Ne s’exécute pas si un cycle ECS est en cours.
  mode: single

  trigger:
    - platform: event
      event_type: timer.finished
      event_data:
        entity_id: timer.ecs_gardien_post_prelevement

  condition:
    - condition: state
      entity_id: input_boolean.ecs_cycle_en_cours
      state: "off"

  action:
    - variables:
        retour_temp: 10

    # ======================================================
    # 🕐 Stabilisation initiale
    # ======================================================
    - delay: "00:00:05"

    # ======================================================
    # 🔁 Tentatives 1 et 2
    # ======================================================
    - repeat:
        count: 2
        sequence:
          - delay: "00:00:05"

          - service: script.ecs_appliquer_consigne_bridge
            data:
              target_temp: "{{ retour_temp }}"

          - choose:
              - conditions:
                  - condition: template
                    value_template: >
                      {{ states('sensor.boiler_ack_dhw_set_setpoint_status') == 'applied' }}
                sequence:
                  - stop: "Consigne ECS de sécurité confirmée par ACK"

    # ======================================================
    # 🚨 Échec persistant après deux tentatives
    # ======================================================
    - service: script.notification_envoyer
      data:
        cible: input_text.telephone_antoine_notify
        titre: "🚨 ECS – Consigne non appliquée"
        message: >
          À {{ now().strftime('%H:%M') }}, après deux tentatives via script exécutif boiler bridge,
          la consigne ECS de sécurité n'a pas été confirmée à {{ retour_temp }} °C.
          Résultat ACK : {{ states('sensor.boiler_ack_dhw_set_setpoint_status') }}.

    - service: input_text.set_value
      target:
        entity_id: input_text.boiler_req_dhw_set_setpoint
      data:
        value: ""