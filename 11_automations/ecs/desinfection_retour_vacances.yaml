# ==========================================================
#  🧠 ARSENAL — AUTOMATION :
#     ECS – Desinfection au retour de Vacances
#  ----------------------------------------------------------
#  🎯 RÔLE :
#     Lancer une désinfection ECS UNIQUE lors d’un retour
#     de vacances, uniquement si ce retour est légitime
#     au regard de la durée d’absence.
#
#  🧱 PRINCIPE :
#     - Déclenchement sur sortie explicite du mode Vacances
#     - Autorisation portée par l'état souverain
#       input_boolean.ecs_desinfection_retour_due (helper:decision)
#     - Réinitialise (OFF) cet état souverain après consommation
#     - Aucun raisonnement temporel interne
#
#  🔗 DÉPENDANCES :
#     Lit     : input_boolean.ecs_desinfection_retour_due
#     Appelle : script.chauffage_ecs_cycle (mode désinfection)
#     Écrit   : input_boolean.ecs_desinfection_retour_due (OFF, consommation)
#
#  🧠 NOTE :
#     binary_sensor.ecs_desinfection_retour_vacances_autorisee
#     est une projection d'observabilité NON décisionnelle.
#
#  ✅ Compatibilité : Home Assistant 2024.8+
# ==========================================================

- id: "10250000000021"
  alias: "ECS - Désinfection fin vacances"
  description: >
    Lance une désinfection ECS unique au retour de vacances,
    uniquement si la durée d’absence le justifie.

  mode: single

  trigger:
    - platform: state
      entity_id: input_select.mode_maison
      from: "Vacances"
      to: "Normal"

  condition:
    # 🧠 Autorisation métier : état souverain (vacances longues menées à terme)
    - condition: state
      entity_id: input_boolean.ecs_desinfection_retour_due
      state: "on"

  action:
    # ⏳ Délai de stabilisation post-retour
    - delay: "00:05:00"

    # 🚀 Lancement du cycle ECS en mode désinfection
    - service: script.chauffage_ecs_cycle
      data:
        mode: "desinfection"

    # 🧾 Journalisation
    - service: logbook.log
      data:
        name: "ECS Désinfection"
        message: "💧 Cycle de désinfection lancé automatiquement au retour de vacances."
        entity_id: script.chauffage_ecs_cycle

    # ♻️ Consommation : réinitialisation de l'état souverain (idempotence)
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.ecs_desinfection_retour_due
