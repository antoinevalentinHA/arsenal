# ==========================================================
#  AUTOMATION : ECS – Reset verrou au demarrage si consigne deja a 10
#  ----------------------------------------------------------
#  🧠 Rôle :
#     Éviter qu’un verrou ECS reste bloqué actif après un
#     redémarrage de Home Assistant si la consigne ECS est déjà abaissée.
#
#  💡 Avantages :
#     - Suppression automatique des états incohérents
#     - L’utilisateur ne reste jamais bloqué hors cycle
#     - Diagnostic clair via notification
#
#  ⚙️ Comportement :
#     - Au démarrage HA :
#       si “cycle en cours” = ON
#       ET que la consigne ECS = 10 °C
#       → remise du verrou à OFF + notification
#
#  ✅ Compatibilité : Home Assistant 2024.8+
# ==========================================================

- id: "10250000000022"
  alias: "ECS - Gardien verrou"
  description: >
    Débloque automatiquement l'input_boolean.ecs_cycle_en_cours si Home Assistant
    redémarre avec la consigne ECS déjà rabaissée (10°C). Évite les blocages fantômes.
  mode: single

  # ======================================================
  # 🔔 Déclencheur — Stabilisation Home Assistant
  # ======================================================
  trigger:
    - platform: state
      entity_id: input_boolean.systeme_stable
      to: "on"

  # ======================================================
  # ✅ Conditions — Verrou actif + consigne basse déjà présente
  # ======================================================
  condition:
    - condition: state
      entity_id: input_boolean.ecs_cycle_en_cours
      state: "on"
    - condition: template
      # Condition thermique de libération (I-SEC-5, contrat
      # sensor_ecs_temperature_ballon_securisee.md §8.3) : évaluable UNIQUEMENT si
      # la température ET la consigne sont réellement numériques. Aucune valeur
      # inconnue/indisponible/vide n'est convertie en faux « froid » (aucun
      # float(0)/int(0)). Une température numérique `provenance: retenue` (dernière
      # mesure réelle non fraîche) reste évaluable — le verrou n'exige pas de
      # mesure fraîche (limite consignée au chantier C24).
      value_template: >
        {% set consigne = states('sensor.ecs_consigne_chaudiere_securisee') %}
        {% set t_cuve = states('sensor.ecs_temperature_ballon_securisee') %}
        {% if (consigne | is_number) and (t_cuve | is_number) %}
          {{ (consigne | float) <= 10 and (t_cuve | float) < 30 }}
        {% else %}
          false
        {% endif %}

  # ======================================================
  # 🔄 Actions — Déblocage immédiat + notification
  # ======================================================
  action:
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.ecs_cycle_en_cours

    # Notification ÉVÉNEMENTIELLE (déblocage ponctuel au démarrage) → canal mobile.
    # Décrit une action passée : ce n'est pas un état durable, donc pas de
    # persistant (audit Notifications, NOTIF-06 — événement déguisé).
    - service: script.notification_envoyer
      data:
        cible: input_text.telephone_antoine_notify
        titre: "🔄 ECS – Verrou cycle levé"
        message: >
          Verrou cycle ECS levé automatiquement au démarrage
          (consigne déjà à 10 °C). Un nouveau cycle est possible.
