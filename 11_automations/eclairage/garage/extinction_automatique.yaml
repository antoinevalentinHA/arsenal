# ==========================================================
# 🧠 ARSENAL — AUTOMATION
#     Éclairage garage — Extinction sur deadline persistante
# ----------------------------------------------------------
# 🆔 IDENTIFIANT
#   '10070000000013'
#
# 🎯 RÔLE
#   Éteindre automatiquement l'éclairage du garage lorsque
#   la deadline persistante d'absence est atteinte.
#
# 🧩 PÉRIMÈTRE
#   - Couvre : extinction matérielle via script souverain,
#              rattrapage post-redémarrage,
#              rattrapage post-rechargement automations
#   - Exclut : calcul de la deadline, allumage, pilotage direct
#
# 🔖 NATURE
#   Application
#
# ⚙️ MODE
#   single
#   Justification : une seule extinction à la fois. Les retriggers
#   sont absorbés par les conditions d'idempotence.
#
# 📣 DÉCLENCHEURS
#   - deadline atteinte
#   - redémarrage Home Assistant
#   - rechargement des automations
#
# 🔗 DÉPENDANCES
#   Lit     : input_datetime.garage_extinction_deadline
#             binary_sensor.mouvement_garage
#             input_boolean.garage_auto_light
#             input_boolean.garage_light_state
#   Appelle : script.garage_toggle
#   Écrit   : via script uniquement
#
# 🧠 AUTORITÉ
#   Applique une décision temporelle persistée.
#   La deadline est écrite par l'automation 10070000000030.
#
# ♻️ IDEMPOTENCE
#   Compatible retrigger.
#   L'extinction n'est appelée que si l'état logique garage est on,
#   le mouvement toujours off et la deadline dépassée.
#
# 🚫 INTERDITS
#   - Calculer la deadline
#   - Utiliser for:
#   - Utiliser last_changed
#   - Piloter directement le matériel
#   - Allumer la lumière
#
# 🏷️ STATUT
#   Réactive — Arsenal v15.5
# ==========================================================

- id: "10070000000013"
  alias: "Éclairage - Garage - Extinction automatique"
  description: >
    Éteint l'éclairage du garage lorsque la deadline persistante
    d'absence est atteinte. Robuste aux redémarrages et aux
    rechargements d'automations.
  mode: single

  trigger:
    - platform: time
      at: input_datetime.garage_extinction_deadline
      id: deadline

    - platform: homeassistant
      event: start
      id: start

    - platform: event
      event_type: automation_reloaded
      id: reload

  action:
    - choose:
        - conditions:
            - condition: trigger
              id: deadline
          sequence:
            - condition: state
              entity_id: binary_sensor.mouvement_garage
              state: "off"

            - condition: state
              entity_id: input_boolean.garage_auto_light
              state: "on"

            - condition: state
              entity_id: input_boolean.garage_light_state
              state: "on"

            - condition: template
              value_template: >
                {% set dl = states('input_datetime.garage_extinction_deadline') %}
                {{ dl not in ('unknown', 'unavailable', 'none', '')
                   and now() >= dl | as_datetime }}

            - alias: "Basculer la lumière via script"
              action: script.garage_toggle

        - conditions:
            - condition: trigger
              id: start
          sequence:
            - delay: "00:01:30"

            - condition: state
              entity_id: binary_sensor.mouvement_garage
              state: "off"

            - condition: state
              entity_id: input_boolean.garage_auto_light
              state: "on"

            - condition: state
              entity_id: input_boolean.garage_light_state
              state: "on"

            - condition: template
              value_template: >
                {% set dl = states('input_datetime.garage_extinction_deadline') %}
                {{ dl not in ('unknown', 'unavailable', 'none', '')
                   and now() >= dl | as_datetime }}

            - alias: "Basculer la lumière via script"
              action: script.garage_toggle

        - conditions:
            - condition: trigger
              id: reload
          sequence:
            - delay: "00:00:10"

            - condition: state
              entity_id: binary_sensor.mouvement_garage
              state: "off"

            - condition: state
              entity_id: input_boolean.garage_auto_light
              state: "on"

            - condition: state
              entity_id: input_boolean.garage_light_state
              state: "on"

            - condition: template
              value_template: >
                {% set dl = states('input_datetime.garage_extinction_deadline') %}
                {{ dl not in ('unknown', 'unavailable', 'none', '')
                   and now() >= dl | as_datetime }}

            - alias: "Basculer la lumière via script"
              action: script.garage_toggle