# ==========================================================
# 🧠 ARSENAL — AUTOMATION
#     Éclairage garage — Écriture deadline extinction
# ----------------------------------------------------------
# 🆔 IDENTIFIANT
#   '10070000000030'
#
# 🎯 RÔLE
#   Écrire une deadline persistante d'extinction lorsque
#   l'absence de mouvement garage commence.
#
# 🧩 PÉRIMÈTRE
#   - Couvre : matérialisation temporelle de l'extinction future
#   - Exclut : extinction matérielle, pilotage direct, allumage
#
# 🔖 NATURE
#   Synchronisation
#
# ⚙️ MODE
#   restart
#   Justification : une nouvelle transition d'absence remplace
#   explicitement la deadline précédente.
#
# 📣 DÉCLENCHEURS
#   - Transition mouvement garage : on → off
#
# 🔗 DÉPENDANCES
#   Lit    : binary_sensor.mouvement_garage
#            input_number.duree_absence_garage
#   Écrit  : input_datetime.garage_extinction_deadline
#
# 🧠 AUTORITÉ
#   Décide et persiste la deadline d'extinction.
#   N'exécute aucune action matérielle.
#
# ♻️ IDEMPOTENCE
#   Compatible retrigger.
#   Chaque absence confirmée remplace la deadline précédente.
#
# 🚫 INTERDITS
#   - Éteindre la lumière
#   - Appeler script.garage_toggle
#   - Utiliser for: comme causalité métier
#   - Dépendre de last_changed
#
# 🏷️ STATUT
#   Réactive — Arsenal v15.5
# ==========================================================

- id: "10070000000030"
  alias: "Éclairage - Garage - Écriture deadline extinction"
  description: >
    Écrit la deadline persistante d'extinction automatique du garage
    lorsque le mouvement consolidé de la zone passe à off.
  mode: restart

  trigger:
    - platform: state
      entity_id: binary_sensor.mouvement_garage
      from: "on"
      to: "off"

  action:
    - alias: "Écrire la deadline persistante d'extinction garage"
      action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.garage_extinction_deadline
      data:
        datetime: >
          {{ (now() + timedelta(minutes=states('input_number.duree_absence_garage') | int(1)))
             .strftime('%Y-%m-%d %H:%M:%S') }}