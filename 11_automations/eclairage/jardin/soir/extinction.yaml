# ==========================================================
# 🧠 ARSENAL — AUTOMATION
#     Éclairage jardin — Extinction soir
# ----------------------------------------------------------
# 🆔 IDENTIFIANT
#   '10070000000004'
#
# 🎯 RÔLE
#   Éteindre automatiquement l'éclairage du jardin le soir,
#   dès que les deux deadlines sont simultanément dépassées :
#   durée du cycle soir et inactivité séjour confirmée.
#   Robuste aux redémarrages complets et aux rechargements
#   d'automations.
#
# 🧩 PÉRIMÈTRE
#   - Couvre : extinction matérielle, rattrapage post-redémarrage,
#              rattrapage post-rechargement automations
#   - Exclut : calcul des deadlines (porté par 10070000000003 et
#              10070000000029), notification persistante
#
# 🔖 NATURE
#   Application
#
# ⚙️ MODE
#   single
#   Justification : une seule extinction par cycle. Les trois
#   triggers convergent vers la même action ; le mode single
#   garantit qu'un seul chemin s'exécute. L'idempotence par
#   condition (switch.prise_jardin state: on) absorbe les
#   déclenchements redondants.
#
# 📣 DÉCLENCHEURS
#   - deadline : platform: time at: jardin_soir_extinction_deadline
#     Déclenche à l'instant exact de la fin du cycle soir.
#   - inactivite : platform: time at: jardin_sejour_inactivite_deadline
#     Déclenche à l'instant exact de confirmation d'inactivité séjour.
#   - start : platform: homeassistant event: start
#     Rattrapage post-redémarrage complet HA.
#     input_boolean.systeme_stable n'est pas utilisé comme trigger :
#     il n'est remis à on qu'après redémarrage complet, cas déjà
#     couvert par start. Il ne cycle pas lors d'un reload.
#   - reload : platform: event event_type: automation_reloaded
#     Rattrapage post-rechargement des automations.
#     Si les deadlines sont dépassées et le jardin allumé au
#     moment du reload, l'extinction est exécutée immédiatement.
#
#   Condition unique vérifiée sur tous les chemins :
#     now() >= jardin_soir_extinction_deadline
#     AND now() >= jardin_sejour_inactivite_deadline
#     AND switch.prise_jardin == on
#
# 🔗 DÉPENDANCES
#   Lit     : input_datetime.jardin_soir_extinction_deadline
#             input_datetime.jardin_sejour_inactivite_deadline
#             switch.prise_jardin
#   Appelle : script.jardin_off
#   Écrit   : rien
#
# 🧠 AUTORITÉ
#   Applique une décision externe.
#   Les deux deadlines sont des faits persistants écrits par
#   d'autres automations. Cette automation est l'exécuteur
#   final, pas l'autorité sur les seuils.
#
# ♻️ IDEMPOTENCE
#   Compatible retrigger.
#   La condition (switch.prise_jardin state: on) garantit
#   qu'un déclenchement redondant n'a aucun effet.
#
# 🧠 ROBUSTESSE — REDÉMARRAGE COMPLET
#   Garantie totale via trigger start.
#   Les helpers input_datetime sont persistants : leurs valeurs
#   sont disponibles immédiatement après redémarrage.
#   Si les deux deadlines sont dépassées et le jardin allumé,
#   l'extinction est exécutée sans attendre aucun front.
#
# 🧠 ROBUSTESSE — RELOAD AUTOMATIONS
#   Garantie via trigger event_type: automation_reloaded.
#   input_boolean.systeme_stable n'est pas utilisé ici :
#   confirmé comme ne cyclant pas lors d'un reload,
#   uniquement lors d'un redémarrage complet (déjà couvert
#   par start). Le trigger reload est indépendant et direct.
#
# 🚫 INTERDITS
#   - Calculer les deadlines
#   - Utiliser un time_pattern
#   - Utiliser for: ou last_changed
#   - Utiliser input_boolean.systeme_stable comme substitut reload
#   - Émettre une notification persistante
#   - Inventer un ID d'automation
#
# 🏷️ STATUT
#   Réactive — Arsenal v14.x
# ==========================================================

- id: '10070000000004'
  alias: "Éclairage - Jardin - Extinction soir"
  description: >
    Éteint l'éclairage du jardin le soir dès que la durée
    du cycle et l'inactivité séjour sont toutes deux confirmées.
    Trois déclencheurs couvrent les cas nominaux, le rattrapage
    post-redémarrage et le rattrapage post-rechargement.
    Aucune notification persistante n'est émise.

  mode: single

  trigger:
    # Deadline fin de cycle soir
    - platform: time
      at: input_datetime.jardin_soir_extinction_deadline
      id: deadline

    # Deadline inactivité séjour
    - platform: time
      at: input_datetime.jardin_sejour_inactivite_deadline
      id: inactivite

    # Rattrapage post-redémarrage complet
    - platform: homeassistant
      event: start
      id: start

    # Rattrapage post-rechargement automations
    - platform: event
      event_type: automation_reloaded
      id: reload

  condition:
    # Idempotence : jardin effectivement allumé
    - condition: state
      entity_id: switch.prise_jardin
      state: 'on'

    # Deadline soir dépassée
    - condition: template
      value_template: >
        {% set d = states('input_datetime.jardin_soir_extinction_deadline') %}
        {% if d in ('unknown', 'unavailable', '') %}
          false
        {% else %}
          {{ now() >= as_local(as_datetime(d)) }}
        {% endif %}

    # Deadline inactivité séjour dépassée
    - condition: template
      value_template: >
        {% set d = states('input_datetime.jardin_sejour_inactivite_deadline') %}
        {% if d in ('unknown', 'unavailable', '') %}
          false
        {% else %}
          {{ now() >= as_local(as_datetime(d)) }}
        {% endif %}

  action:
    - action: script.jardin_off
