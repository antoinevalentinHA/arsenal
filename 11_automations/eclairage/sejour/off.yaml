# ==========================================================
# 🧠 ARSENAL — AUTOMATION
#     Éclairage séjour — Extinction sur deadline persistante
# ----------------------------------------------------------
# 🆔 IDENTIFIANT
#   '10070000000015'
#
# 🎯 RÔLE
#   Éteindre automatiquement la lampe du séjour lorsque
#   la deadline persistante d'absence est atteinte.
#
# 🧩 PÉRIMÈTRE
#   - Couvre : extinction matérielle directe,
#              rattrapage post-redémarrage,
#              rattrapage post-rechargement automations
#   - Exclut : calcul de la deadline, allumage,
#              état logique dupliqué
#
# 🔖 NATURE
#   Application
#
# ⚙️ MODE
#   single
#   Justification : une seule extinction à la fois. Les retriggers
#   sont absorbés par les conditions d'idempotence.
#   max_exceeded: silent — le warning "Already running" est
#   attendu et non bloquant ; supprimé pour ne pas polluer les logs.
#
# 📣 DÉCLENCHEURS
#   - deadline atteinte
#   - redémarrage Home Assistant
#   - rechargement des automations
#
# 🔗 DÉPENDANCES
#   Lit     : input_datetime.sejour_extinction_deadline
#             binary_sensor.mouvement_sejour
#             input_boolean.sejour_auto_light
#             switch.prise_lampe_sejour
#   Action  : switch.turn_off → switch.prise_lampe_sejour
#
# 🧠 AUTORITÉ
#   Applique une décision temporelle persistée.
#   La deadline est écrite par l'automation 10070000000031.
#
# ♻️ IDEMPOTENCE
#   Compatible retrigger.
#   L'extinction n'est appelée que si la lampe est on,
#   le mouvement toujours off et la deadline dépassée.
#
# 🚫 INTERDITS
#   - Calculer la deadline
#   - Utiliser for:
#   - Utiliser last_changed
#   - Créer un état logique parallèle
#   - Allumer la lampe
#
# 🏷️ STATUT
#   Réactive — Arsenal v15.5
# ==========================================================

- id: "10070000000015"
  alias: "Éclairage - Séjour - Extinction automatique"
  description: >
    Éteint la lampe du séjour lorsque la deadline persistante
    d'absence est atteinte. Robuste aux redémarrages et aux
    rechargements d'automations.
  mode: single
  max_exceeded: silent

  trigger:
    - platform: time
      at: input_datetime.sejour_extinction_deadline
      id: deadline

    - platform: homeassistant
      event: start
      id: start

    - platform: event
      event_type: automation_reloaded
      id: reload

  action:
    - choose:
        - conditions:
            - condition: trigger
              id: deadline
          sequence:
            - condition: state
              entity_id: binary_sensor.mouvement_sejour
              state: "off"

            - condition: state
              entity_id: input_boolean.sejour_auto_light
              state: "on"

            - condition: state
              entity_id: switch.prise_lampe_sejour
              state: "on"

            - condition: template
              value_template: >
                {% set dl = states('input_datetime.sejour_extinction_deadline') %}
                {{ dl not in ('unknown', 'unavailable', 'none', '')
                   and now() >= dl | as_datetime | as_local }}

            - alias: "Éteindre la lumière du séjour"
              action: switch.turn_off
              target:
                entity_id: switch.prise_lampe_sejour

        - conditions:
            - condition: trigger
              id: start
          sequence:
            - delay: "00:01:30"

            - condition: state
              entity_id: binary_sensor.mouvement_sejour
              state: "off"

            - condition: state
              entity_id: input_boolean.sejour_auto_light
              state: "on"

            - condition: state
              entity_id: switch.prise_lampe_sejour
              state: "on"

            - condition: template
              value_template: >
                {% set dl = states('input_datetime.sejour_extinction_deadline') %}
                {{ dl not in ('unknown', 'unavailable', 'none', '')
                   and now() >= dl | as_datetime | as_local }}

            - alias: "Éteindre la lumière du séjour"
              action: switch.turn_off
              target:
                entity_id: switch.prise_lampe_sejour

        - conditions:
            - condition: trigger
              id: reload
          sequence:
            - delay: "00:00:10"

            - condition: state
              entity_id: binary_sensor.mouvement_sejour
              state: "off"

            - condition: state
              entity_id: input_boolean.sejour_auto_light
              state: "on"

            - condition: state
              entity_id: switch.prise_lampe_sejour
              state: "on"

            - condition: template
              value_template: >
                {% set dl = states('input_datetime.sejour_extinction_deadline') %}
                {{ dl not in ('unknown', 'unavailable', 'none', '')
                   and now() >= dl | as_datetime | as_local }}

            - alias: "Éteindre la lumière du séjour"
              action: switch.turn_off
              target:
                entity_id: switch.prise_lampe_sejour