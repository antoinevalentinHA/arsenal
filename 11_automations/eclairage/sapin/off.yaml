# ==========================================================
#  🧠 ARSENAL — AUTOMATION :
#     Guirlande / Baies vitrées – Extinction temporisée par absence
#
#  ID : 10070000000019
# ----------------------------------------------------------
#  🎯 RÔLE
#
#     Automation d’extinction conditionnelle par absence.
#
#     Elle coupe l’alimentation de la prise des baies vitrées
#     après une absence de mouvement prolongée dans le sejour,
#     uniquement si l’automatisme est explicitement autorisé.
#
#     Cette automation agit directement sur le matériel.
#
#  🧩 PRINCIPE
#
#     - Déclenchement après absence de mouvement confirmée
#       sur la zone sejour
#     - Temporisation paramétrable par l’utilisateur
#     - Vérification d’une autorisation explicite
#     - Extinction directe de la prise concernée
#
#  🧠 PARAMÈTRE UTILISATEUR
#
#     input_number.duree_absence_guirlande
#
#     → durée d’absence (en minutes) avant extinction
#       automatique de la prise
#
#  🧠 AUTORISATION
#
#     input_boolean.prise_baies_vitrees_auto
#
#     → autorisation globale de l’extinction automatique
#
#  🧠 ACTION DIRECTE
#
#     switch.prise_sejour_baies_vitrees
#
#     → coupure physique de l’alimentation
#
#  🚫 CE QUE CETTE AUTOMATION NE FAIT PAS
#
#     - N’allume JAMAIS la prise
#     - Ne gère AUCUN cycle décoratif
#     - Ne maintient AUCUN état logique
#     - Ne corrige PAS un état incohérent
#
#  🧠 ARCHITECTURE ARSENAL
#
#     Automation de sortie simple :
#     absence prolongée ≠ ambiance ≠ scénario.
#
#     Elle applique une règle d’extinction
#     claire, paramétrable et strictement locale.
# ==========================================================

- id: "10070000000019"
  alias: "Éclairage - Guirlande - Extinction absence"
  mode: single

  trigger:
    - platform: state
      entity_id: binary_sensor.mouvement_sejour
      to: "off"
      for:
        minutes: >
          {{ states('input_number.duree_absence_guirlande') | int(20) }}

  condition:
    - condition: state
      entity_id: input_boolean.prise_baies_vitrees_auto
      state: "on"

  action:
    - service: switch.turn_off
      target:
        entity_id: switch.prise_sejour_baies_vitrees