# ==========================================================
#  🧠 ARSENAL — AUTOMATION :
#     Simulation de présence – Entrée – Matérialisation éclairage
#
#  ID : 10070000000028
# ----------------------------------------------------------
#  🎯 RÔLE
#
#     Automation de matérialisation physique
#     de la simulation de présence (entrée).
#
#     Elle applique réellement l’état ON / OFF de l’éclairage
#     de l’entrée en fonction d’une vérité métier unique
#     exposée par un capteur composite.
#
#     Cette automation ne contient AUCUNE logique
#     temporelle ni décisionnelle.
#
#  🧩 PRINCIPE
#
#     - Écoute exclusive de la vérité métier :
#         binary_sensor.simulation_presence_plage_allumage_entree
#
#     - Réaction stricte aux transitions :
#         • OFF → ON  → éclairage ON + notification
#         • ON  → OFF → éclairage OFF + notification supprimée
#
#     - Réévaluation automatique au redémarrage
#       (via input_boolean.systeme_stable)
#
#  🧠 AUTORISATION D’EXÉCUTION
#
#     L’action réelle n’est autorisée que si :
#       • binary_sensor.simulation_presence_autorisee == on
#
#     En dehors de ce cas, la simulation est inopérante.
#
#  🧠 SOURCE MÉTIER
#
#     binary_sensor.simulation_presence_plage_allumage_entree
#
#     → capteur composite responsable :
#       • du calcul horaire
#       • de la logique de présence simulée
#
#  🧠 ACTION RÉELLE
#
#     switch.lumiere_entree
#
#     → pilotage physique direct de l’éclairage
#
#  📢 NOTIFICATIONS
#
#     - Notification persistante synchronisée
#     - Visible UNIQUEMENT lorsque la simulation est active
#
#  🚫 CE QUE CETTE AUTOMATION NE FAIT PAS
#
#     - Ne calcule PAS les horaires
#     - Ne choisit PAS quand simuler
#     - Ne pilote PAS d’autres pièces
#     - Ne décide PAS de la stratégie de présence
#
#  🧠 ARCHITECTURE ARSENAL
#
#     Automation réactive pure :
#     vérité métier ≠ calcul ≠ action.
#
#     Elle matérialise une simulation décidée ailleurs,
#     sans jamais en être la source.
# ==========================================================

- id: "10070000000028"
  alias: "Éclairage - Simulation présence - Pilotage entrée"
  mode: single

  # ======================================================
  # 🔔 DÉCLENCHEUR — Vérité métier uniquement
  # ======================================================
  trigger:
    - platform: state
      entity_id: binary_sensor.simulation_presence_plage_allumage_entree

    - platform: state
      entity_id: input_boolean.systeme_stable
      to: "on"

  # ======================================================
  # 🔐 CONDITIONS — Autorisation de la simulation
  # ======================================================
  condition:
    - condition: state
      entity_id: binary_sensor.simulation_presence_autorisee
      state: "on"

  # ======================================================
  # 🔄 ACTION — Application réelle + notifications
  # ======================================================
  action:
    - choose:

        # --------------------------------------------------
        # 💡 CAS 1 — Entrée dans une plage de simulation
        # --------------------------------------------------
        - conditions:
            - condition: state
              entity_id: binary_sensor.simulation_presence_plage_allumage_entree
              state: "on"

          sequence:
            - service: switch.turn_on
              target:
                entity_id: switch.lumiere_entree

            - service: persistent_notification.create
              data:
                title: "💡 Simulation de présence – Entrée"
                message: >
                  L’éclairage de l’entrée est allumé
                  dans le cadre de la simulation de présence.
                notification_id: "simulation_presence_entree"

        # --------------------------------------------------
        # 🌑 CAS 2 — Sortie de plage de simulation
        # --------------------------------------------------
        - conditions:
            - condition: state
              entity_id: binary_sensor.simulation_presence_plage_allumage_entree
              state: "off"

          sequence:
            - service: switch.turn_off
              target:
                entity_id: switch.lumiere_entree

            - service: persistent_notification.dismiss
              data:
                notification_id: "simulation_presence_entree"