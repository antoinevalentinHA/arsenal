# ==========================================================
# 🧠 ARSENAL — AUTOMATION
#     Éclairage entrée — Écriture deadline extinction
# ----------------------------------------------------------
# 🆔 IDENTIFIANT
#   '10070000000032'
#
# 🎯 RÔLE
#   Écrire une deadline persistante d'extinction lorsque
#   l'absence de mouvement entrée commence.
#
# 🧩 PÉRIMÈTRE
#   - Couvre : matérialisation temporelle de l'extinction future
#   - Exclut : extinction matérielle, allumage, état logique dupliqué
#
# 🔖 NATURE
#   Synchronisation
#
# ⚙️ MODE
#   restart
#   Justification : une nouvelle transition d'absence remplace
#   explicitement la deadline précédente.
#
# 📣 DÉCLENCHEURS
#   - Transition mouvement entrée : on → off
#
# 🔗 DÉPENDANCES
#   Lit    : binary_sensor.mouvement_entree
#            input_number.duree_absence_entree
#   Écrit  : input_datetime.entree_extinction_deadline
#
# 🧠 AUTORITÉ
#   Décide et persiste la deadline d'extinction.
#   N'exécute aucune action matérielle.
#
# ♻️ IDEMPOTENCE
#   Compatible retrigger.
#   Chaque absence confirmée remplace la deadline précédente.
#
# 🚫 INTERDITS
#   - Éteindre la lumière
#   - Allumer la lumière
#   - Utiliser for: comme causalité métier
#   - Dépendre de last_changed
#   - Consommer N0 ou N1 mouvement
#
# 🏷️ STATUT
#   Réactive — Arsenal v15.5
# ==========================================================

- id: "10070000000032"
  alias: "Éclairage - Entrée - Écriture deadline extinction"
  description: >
    Écrit la deadline persistante d'extinction automatique de l'entrée
    lorsque le mouvement consolidé de la zone passe à off.
  mode: restart

  trigger:
    - platform: state
      entity_id: binary_sensor.mouvement_entree
      from: "on"
      to: "off"

  action:
    - alias: "Écrire la deadline persistante d'extinction entrée"
      action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.entree_extinction_deadline
      data:
        datetime: >
          {{ (now() + timedelta(seconds=states('input_number.duree_absence_entree') | int(60)))
             .strftime('%Y-%m-%d %H:%M:%S') }}