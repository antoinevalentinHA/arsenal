# ==========================================================
# 🧠 ARSENAL — AUTOMATION :
#     Chauffage – Aération – Mini-guard pipeline (anti-zombie)
#
# ID : 10010000000024
# ----------------------------------------------------------
# 🎯 RÔLE
#
#   Empêcher tout état "pipeline zombie" :
#     - pipeline armé alors qu’aucune aération n’est active
#     - aucun blocage chauffage n’est actif
#     - aucune ouverture physique n’est active
#
#   ⚠️ Extension V3 PRO (timers) :
#     - neutralise aussi les timers aération
#       pour éviter des triggers fantômes timer.finished.
#
# ----------------------------------------------------------
# 🧩 PRINCIPE
#
#   - N’initie RIEN.
#   - Ne fait que remettre en cohérence en désarmant
#     et en annulant les timers résiduels.
#
# ----------------------------------------------------------
# ✅ Compatibilité : Home Assistant 2024.8+
# ==========================================================

- id: "10010000000024"
  alias: "Aération - Surveillance pipeline"
  mode: queued

  ##########################################################
  #  TRIGGERS
  ##########################################################

  trigger:

    # État fonctionnel aération
    - platform: state
      entity_id:
        - input_boolean.aeration_episode_en_cours
        - input_boolean.chauffage_blocage_aeration
        - binary_sensor.fenetre_ouverte_maison
        - input_boolean.aeration_pipeline_arme

    # Timers aération (éviter timer.finished fantôme)
    - platform: state
      entity_id:
        - timer.aeration_analyse_delta_t
        - timer.aeration_blocage

    # Post-boot : revalider cohérence dès retour stable
    - platform: state
      entity_id: input_boolean.systeme_stable
      to: "on"

  ##########################################################
  #  CONDITIONS
  ##########################################################

  condition:

    # Pipeline armé = prérequis
    - condition: state
      entity_id: input_boolean.aeration_pipeline_arme
      state: "on"

    # Aucun épisode / blocage / ouverture
    - condition: state
      entity_id: input_boolean.aeration_episode_en_cours
      state: "off"

    - condition: state
      entity_id: input_boolean.chauffage_blocage_aeration
      state: "off"

    - condition: state
      entity_id: binary_sensor.fenetre_ouverte_maison
      state: "off"

  ##########################################################
  #  ACTIONS
  ##########################################################

  action:

    # Annulation timers résiduels (anti triggers fantômes)
    - action: timer.cancel
      target:
        entity_id:
          - timer.aeration_analyse_delta_t
          - timer.aeration_blocage

    # Désarmement pipeline
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.aeration_pipeline_arme

    # Neutraliser datetime fin blocage (trace)
    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.chauffage_fin_blocage_aeration
      data:
        datetime: "{{ now().date().isoformat() ~ ' 00:00:00' }}"

    # Neutraliser datetime analyse ΔT (trace)
    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.analyse_deltat_disponible
      data:
        datetime: "{{ now().date().isoformat() ~ ' 00:00:00' }}"