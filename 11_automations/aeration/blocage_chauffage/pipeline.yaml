# ==========================================================
# 🧠 ARSENAL — AUTOMATION :
#     Chauffage – Aération – Pipeline Maître (V3 PRO)
#
# ID : 10010000000023
# ----------------------------------------------------------
# 🎯 RÔLE NORMATIF
#
#   Orchestrateur décisionnel d’un ÉPISODE D’AÉRATION
#   impactant le chauffage.
#
#   Cette automation :
#     - valide les conditions d’entrée / sortie,
#     - sélectionne l’étape normative M1..M5,
#     - délègue l’exécution atomique aux scripts dédiés.
#
#   ➜ Aucun actionneur thermique n’est piloté ici.
#   ➜ Aucune décision métier n’est exécutée localement.
#
# ----------------------------------------------------------
# 🧱 MODÈLE CONCEPTUEL
#
#   Un épisode d’aération est un cycle borné :
#     ouverture → clôture → blocage → analyse ΔT → fin.
#
#   Les références thermiques (T_REF) sont figées en M1.
#   Le blocage thermique est monotone :
#     - sa date de fin ne peut jamais être avancée,
#     - elle peut uniquement être maintenue ou repoussée.
#
# ----------------------------------------------------------
# 🔁 MACHINE À ÉTATS (ROUTAGE UNIQUEMENT)
#
#   M1 — Début épisode
#        → script.aeration_m1_debut_episode
#
#   M2 — Fin épisode
#        → script.aeration_m2_fin_episode
#
#   M3 — Analyse ΔT différée
#        → script.aeration_m3_analyse_deltat
#
#   M4 — Fin blocage horaire (unique levée autorisée)
#        → script.aeration_m4_fin_blocage_horaire
#
#   M5 — Réouverture pendant blocage (informatif)
#        → script.aeration_m5_reouverture_pendant_blocage
#
# ----------------------------------------------------------
# 🛡️ INVARIANTS STRUCTURELS
#
#   - Séparation stricte décision (automation) / exécution (scripts)
#   - Déclenchements événementiels ou horodatés uniquement
#   - Aucun redémarrage thermique direct
#   - La levée du blocage est exclusivement réalisée en M4
#
# ----------------------------------------------------------
# 🔗 DÉPENDANCES
#
#   Scripts requis :
#     - script.aeration_m1_debut_episode
#     - script.aeration_m2_fin_episode
#     - script.aeration_m3_analyse_deltat
#     - script.aeration_m4_fin_blocage_horaire
#     - script.aeration_m5_reouverture_pendant_blocage
#
#   La reprise thermique relève exclusivement du
#   script "Chauffage – Décision Centrale".
#
# ----------------------------------------------------------
# 📌 ALIGNEMENT CONTRACTUEL
#
#   Conforme au contrat :
#     "AÉRATION — PÉRIMÈTRE STRICT"
#
#   Toute modification structurelle de M1..M5
#   nécessite une mise à jour contractuelle.
#
# ----------------------------------------------------------
# ✅ Compatibilité : Home Assistant 2024.8+
# ==========================================================

- id: "10010000000023"
  alias: "Aération - Pipeline"
  mode: queued

  ##################################################################
  #  TRIGGERS
  ##################################################################

  trigger:

    # --------------------------------------------------------------
    #  M1 - Debut aeration : confirmation (fait métier)
    # --------------------------------------------------------------
    - id: aeration_confirmee_on
      platform: state
      entity_id: input_boolean.aeration_confirmee
      from: "off"
      to: "on"

    # --------------------------------------------------------------
    #  M2/M6 - Fin aeration : fermeture globale (CANON)
    # --------------------------------------------------------------
    - id: fermeture_stable
      platform: state
      entity_id: binary_sensor.fenetres_maison_fermees_stable
      from: "off"
      to: "on"

    # --------------------------------------------------------------
    #  M3 - Analyse DeltaT : timer atteint
    # --------------------------------------------------------------
    - id: analyse_deltat
      platform: event
      event_type: timer.finished
      event_data:
        entity_id: timer.aeration_analyse_delta_t

    # --------------------------------------------------------------
    #  M4 - Fin blocage horaire : timer atteint
    # --------------------------------------------------------------
    - id: fin_blocage_horaire
      platform: event
      event_type: timer.finished
      event_data:
        entity_id: timer.aeration_blocage

    # --------------------------------------------------------------
    #  M5 - Reouverture pendant blocage : ouverture qualifiee
    # --------------------------------------------------------------
    - id: reouverture_pendant_blocage
      platform: state
      entity_id: binary_sensor.ouverture_qualifiee_maison
      from: "off"
      to: "on"

    # --------------------------------------------------------------
    #  RECOVER - Demande de remediation (coherence KO)
    # --------------------------------------------------------------
    - id: recover_requested
      platform: state
      entity_id: input_boolean.aeration_recover_requested
      to: "on"

    # --------------------------------------------------------------
    #  M2 - Reconciliation sur ETAT (anti front consomme / post-boot)
    #
    #  Ces triggers ne sont PAS une preuve de fermeture : ils ne font
    #  que provoquer une re-evaluation de la porte M2 lorsqu'une garde
    #  transitoirement fausse au moment du front "fermeture_stable"
    #  redevient compatible. La preuve fonctionnelle de fermeture vient
    #  exclusivement de l'etat courant de fenetres_maison_fermees_stable
    #  (garde de branche + assertion interne du script M2).
    # --------------------------------------------------------------
    - id: reconciliation_feature_active
      platform: state
      entity_id: input_boolean.blocage_chauffage_aeration_active
      to: "on"

    - id: reconciliation_systeme_stable
      platform: state
      entity_id: input_boolean.systeme_stable
      to: "on"

    - id: reconciliation_pipeline_arme
      platform: state
      entity_id: input_boolean.aeration_pipeline_arme
      to: "on"

    # Post-boot : le template sensor part de unknown/unavailable, jamais de
    # "off" -> le front nominal "fermeture_stable" (from off) est manque.
    - id: reconciliation_fermees_stable_unknown
      platform: state
      entity_id: binary_sensor.fenetres_maison_fermees_stable
      from: "unknown"
      to: "on"

    - id: reconciliation_fermees_stable_unavailable
      platform: state
      entity_id: binary_sensor.fenetres_maison_fermees_stable
      from: "unavailable"
      to: "on"

  ##################################################################
  #  CONDITIONS GLOBALES
  ##################################################################

  condition:

    # Systeme de blocage active ?
    - condition: state
      entity_id: input_boolean.blocage_chauffage_aeration_active
      state: "on"

  ##################################################################
  #  ACTIONS - MACHINE A ETATS INTERNE
  ##################################################################

  action:

    - choose:

        ##################################################################
        #  RECOVER — ROUTAGE UNIQUEMENT
        ##################################################################
        - conditions:

            - condition: template
              value_template: "{{ trigger.id == 'recover_requested' }}"

            - condition: state
              entity_id: input_boolean.systeme_stable
              state: "on"

          sequence:
            - action: script.aeration_m0_recover

        ##################################################################
        #  M1 — DEBUT AERATION
        ##################################################################
        - conditions:

            - condition: template
              value_template: "{{ trigger.id == 'aeration_confirmee_on' }}"

            - condition: state
              entity_id: input_boolean.systeme_stable
              state: "on"

            - condition: state
              entity_id: input_boolean.aeration_episode_en_cours
              state: "off"

            - condition: state
              entity_id: input_boolean.chauffage_blocage_aeration
              state: "off"

            - condition: state
              entity_id: binary_sensor.contact_fenetres_maison
              state: "on"

          sequence:

            - action: script.aeration_m1_debut_episode

        ##################################################################
        #  M2 — FIN AERATION (VERSION SYNCRO DELTA T)
        ##################################################################
        - conditions:

            - condition: state
              entity_id: input_boolean.systeme_stable
              state: "on"

            - condition: template
              value_template: >
                {{
                  states('input_datetime.aeration_debut') not in
                  ['unknown','unavailable','none','None','']
                }}

            # Trigger nominal OU reconciliation sur etat (anti front consomme).
            # Le littéral "trigger.id == 'fermeture_stable'" est conservé.
            - condition: or
              conditions:
                - condition: template
                  value_template: "{{ trigger.id == 'fermeture_stable' }}"
                - condition: template
                  value_template: >
                    {{ trigger.id in [
                         'reconciliation_feature_active',
                         'reconciliation_systeme_stable',
                         'reconciliation_pipeline_arme',
                         'reconciliation_fermees_stable_unknown',
                         'reconciliation_fermees_stable_unavailable'
                       ] }}

            # Preuve fonctionnelle de fermeture = ETAT courant (jamais le trigger).
            - condition: state
              entity_id: binary_sensor.fenetres_maison_fermees_stable
              state: "on"

            - condition: state
              entity_id: input_boolean.aeration_episode_en_cours
              state: "on"

            - condition: state
              entity_id: input_boolean.aeration_pipeline_arme
              state: "on"

            - condition: state
              entity_id: input_boolean.chauffage_blocage_aeration
              state: "off"

          sequence:
            - action: script.aeration_m2_fin_episode

        ##################################################################
        #  M3 — ANALYSE DELTAT
        ##################################################################
        - conditions:
            - condition: template
              value_template: "{{ trigger.id == 'analyse_deltat' }}"

            - condition: state
              entity_id: input_boolean.chauffage_blocage_aeration
              state: "on"

            - condition: state
              entity_id: input_boolean.aeration_pipeline_arme
              state: "on"

            - condition: state
              entity_id: binary_sensor.contact_fenetres_maison
              state: "off"

            # Garde-fou M5 : ne pas analyser trop tôt après une réouverture
            - condition: template
              value_template: >
                {% set last_raw = states('input_datetime.aeration_reouverture_last') %}
                {% set last_ts = as_timestamp(last_raw) %}
                {% set now_ts = as_timestamp(now()) %}
                {% set cap = states('input_number.delai_stabilisation_capteurs') | int(0) %}
                {% if last_ts is none or now_ts is none %}
                  true
                {% else %}
                  {{ (now_ts - last_ts) >= (cap * 60) }}
                {% endif %}

          sequence:
            - action: script.aeration_m3_analyse_deltat

        ##################################################################
        #  M4 — FIN BLOCAGE HORAIRE (VERSION SYNCHRO DELTAT)
        ##################################################################
        - conditions:
            # Déclencheur correct ?
            - condition: template
              value_template: "{{ trigger.id == 'fin_blocage_horaire' }}"

            # Blocage encore actif ?
            - condition: state
              entity_id: input_boolean.chauffage_blocage_aeration
              state: "on"

            - condition: state
              entity_id: input_boolean.aeration_pipeline_arme
              state: "on"

            - condition: state
              entity_id: binary_sensor.contact_fenetres_maison
              state: "off"

            # L'analyse DeltaT ne doit plus être active
            - condition: template
              value_template: >
                {{ states('timer.aeration_analyse_delta_t') != 'active' }}

          sequence:
            - action: script.aeration_m4_fin_blocage_horaire

        ##################################################################
        #  M5 — REOUVERTURE PENDANT BLOCAGE (INFORMATIF)
        ##################################################################
        - conditions:

            - condition: template
              value_template: "{{ trigger.id == 'reouverture_pendant_blocage' }}"

            - condition: state
              entity_id: input_boolean.chauffage_blocage_aeration
              state: "on"

            - condition: state
              entity_id: input_boolean.aeration_pipeline_arme
              state: "on"

            - condition: state
              entity_id: binary_sensor.contact_fenetres_maison
              state: "on"

          sequence:
            - action: script.aeration_m5_reouverture_pendant_blocage

        ##################################################################
        #  M6 — FERMETURE APRÈS RÉOUVERTURE (REPRISE TIMERS)
        ##################################################################
        - conditions:

            - condition: template
              value_template: "{{ trigger.id == 'fermeture_stable' }}"

            - condition: state
              entity_id: input_boolean.chauffage_blocage_aeration
              state: "on"

            - condition: state
              entity_id: input_boolean.aeration_pipeline_arme
              state: "on"

            - condition: state
              entity_id: binary_sensor.contact_fenetres_maison
              state: "off"

            - condition: state
              entity_id: input_boolean.aeration_suspension_active
              state: "on"

          sequence:
            - action: script.aeration_m6_fermeture_post_reouverture

        ##################################################################
        #  DEFAUT
        ##################################################################

      default:
        - stop: "Pipeline aération : aucune branche ne matche"