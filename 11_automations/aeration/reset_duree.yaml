# ==========================================================
#  AUTOMATION : Aeration – Reset journalier durees stockees
# ----------------------------------------------------------
#  🧠 Rôle :
#     Remettre à zéro les durées d’aération persistées
#     (helpers input_number) à la fin de chaque journée.
#
#  🎯 Objectif :
#     - Aligner les stocks persistants avec la logique
#       des capteurs history_stats (fenêtre journalière)
#     - Garantir un redémarrage propre à minuit
#
#  ⚙️ Déclenchement :
#     - Tous les jours à 23:59
#
#  ❌ Ne fait PAS :
#     - Aucun calcul métier
#     - Aucune condition d’état
#     - Aucune décision logique
#
#  ✅ Couche technique – Arsenal
# ==========================================================

- id: "10010000000026"
  alias: "Aération - Reset journalier durées"
  mode: single

  trigger:
    - platform: time
      at: "23:59:00"

  action:
    - service: input_number.set_value
      target:
        entity_id:
          - input_number.duree_aeration_rdc_stock
          - input_number.duree_aeration_etage_stock
      data:
        value: 0
