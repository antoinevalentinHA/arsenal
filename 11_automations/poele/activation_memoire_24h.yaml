# ==========================================================
#  🧠 ARSENAL — AUTOMATION :
#     Poele – Activation memoire de fonctionnement (24 h)
#
#  ID : 10100000000001
# ----------------------------------------------------------
#  🎯 ROLE
#
#     Automation de MEMOIRE METIER TEMPORELLE.
#
#     Elle enregistre le fait qu'une signature thermique
#     compatible poele a ete detectee recemment, en activant
#     un booleen memoire et en relancant un timer
#     de persistance de 24 heures.
#
#     Cette memoire est utilisee comme contexte
#     par d'autres moteurs de decision (chauffage).
#
#  🧱 NATURE
#
#     - Projection d'un evenement ponctuel
#     - Memoire volontairement persistante
#     - Decorrelee de toute action immediate
#
#  ⚙️ PRINCIPE
#
#     - A chaque detection de signature thermique poele :
#         • activation de la memoire `poele_recent`
#         • redemarrage du timer 24 h
#
#     - Toute nouvelle detection prolonge
#       la fenetre memoire (logique glissante)
#
#  🚫 CE QUE CETTE AUTOMATION NE FAIT PAS
#
#     - Ne decide pas du chauffage
#     - Ne bloque aucune action
#     - Ne mesure pas une duree reelle d'usage
#     - Ne declenche aucune consigne thermique
#
#  🔗 UTILISATION
#
#     - Utilisee par l'automatisation
#       "Chauffage – Auto-ajustement courbe"
#
#     - Sert de CONTEXTE DE STABILITE lors du figement
#       des reglages de courbe de chauffe (pente / parallele)
#
#     - Empeche les ajustements a la BAISSE de la courbe
#       tant qu'une pollution thermique recente
#       reste consideree possible
#
#     - N'intervient pas dans la decision thermique instantanee
#       ni dans l'execution du chauffage
#
#  🧠 PRINCIPE ARSENAL
#
#     Un evenement ponctuel peut avoir
#     une portee temporelle volontaire.
#
#     La memoire est explicite, bornee,
#     et consommee ailleurs.
#
#  ✅ COMPATIBILITE
#
#     Home Assistant 2024.8+
# ==========================================================

- id: "10100000000001"
  alias: "Poêle - Mémoire fonctionnement 24h"
  description: >
    Active la memoire poele_recent et redemarre le timer 24h
    a chaque detection de signature thermique poele.

  mode: restart

  trigger:
    - platform: state
      entity_id: binary_sensor.signature_thermique_poele
      to: "on"

  action:

    # ------------------------------------------------------
    # Activer la memoire
    # ------------------------------------------------------
    - alias: "Activer la memoire poele_recent"
      action: input_boolean.turn_on
      target:
        entity_id: input_boolean.poele_recent

    # ------------------------------------------------------
    # Redemarrer le timer 24h
    # ------------------------------------------------------
    - alias: "Relancer le timer 24h"
      action: timer.start
      target:
        entity_id: timer.poele_24h