#
#   - Type   : Mémoire d’hystérésis qualifiée
#   - Statut : Brique subordonnée
#   - Autorité :
#       • binary_sensor.chauffage_inhibition_geofencing_requise (qualification)
#       • Décision Centrale Chauffage (consommation)
