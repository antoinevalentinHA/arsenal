#
#   - Les capteurs MESURENT
#   - Les capteurs QUALIFIENT
#   - Cette automation MÉMORISE un fait
#   - La Décision Centrale CONSOMME ce fait
#
# ----------------------------------------------------------
# 🔁 HYSTÉRÉSIS
#
#   L’hystérésis thermique est intégralement portée par :
#
#     binary_sensor.chauffage_inhibition_geofencing_requise
#
#   Cette automation n’interprète :
