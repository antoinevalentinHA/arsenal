# ==========================================================

- id: "10240000000003"
  alias: "Chauffage – Inhibition geofencing (hysteresis)"
  mode: single

  trigger:
    - platform: state
      entity_id: binary_sensor.chauffage_inhibition_geofencing_requise

  action:
    - choose:

        # 🔴 Activation inhibition
        - conditions:
            - condition: state
              entity_id: binary_sensor.chauffage_inhibition_geofencing_requise
              state: "on"
          sequence:
            - service: input_boolean.turn_on
              target:
                entity_id: input_boolean.chauffage_inhibition_geofencing

        # 🟢 Levée inhibition
        - conditions:
            - condition: state
              entity_id: binary_sensor.chauffage_inhibition_geofencing_requise
              state: "off"
          sequence:
            - service: input_boolean.turn_off
              target:
                entity_id: input_boolean.chauffage_inhibition_geofencing
