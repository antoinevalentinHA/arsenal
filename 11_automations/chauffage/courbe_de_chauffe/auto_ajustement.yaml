# ==========================================================
#  🧠 ARSENAL — AUTOMATION :
#     Chauffage – Décision d’auto-ajustement de la courbe
#
#  ID : 10240000000009
# ----------------------------------------------------------
#  🎯 RÔLE
#     Décider, tracer et figer les ajustements de la courbe
#     de chauffe (pente et parallèle) à partir des suggestions
#     issues des capteurs Arsenal.
#
#     Cette automation matérialise la décision (réelle ou
#     simulée), puis délègue l’exécution aux scripts dédiés.
#
#  🧱 PRINCIPE ARSENAL
#     - Les capteurs suggèrent (calculs en amont)
#     - Les input_number figent la décision
#     - La journalisation est immédiate et non bloquante
#     - Les scripts exécutent sans décider
#
#  🚫 NE FAIT PAS
#     - Ne calcule pas les suggestions (déjà produites ailleurs)
#     - Ne pilote pas directement la chaudière
#     - Ne décide pas en dehors du cadre auto-ajustement autorisé
#
#  🧩 UTILISATION
#     - Déclenchement :
#         • exécution planifiée quotidienne
#     - Pré-requis :
#         • auto-ajustement activé
#         • maison en mode Normal
#         • au moins une correction suggérée
#     - Modes :
#         • simulation : traçage et notification sans écriture
#         • réel : figer → tracer → exécuter via scripts blindés
#
#  ✅ CONTRAINTES
#     - Décision centralisée, exécution découplée
#     - Respect des garde-fous thermiques existants
#     - Comportement déterministe et traçable
# ==========================================================

- id: "10240000000009"
  alias: "Chauffage – Décision auto-ajustement courbe"
  description: >
    Ajuste (ou simule) la pente et le parallèle de la courbe de chauffe
    selon les valeurs suggérées, avec traçabilité immédiate et
    exécution découplée.
  mode: single

  trigger:
    - platform: time
      at: "10:00:00"

  action:

    # ============================================================
    #  🔎 L1 OBSERVABILITÉ — capture lecture seule (additif)
    #  INV-1 : n'écrit aucune entrée lue par la décision
    #  INV-2 : ne réintroduit rien dans la décision
    # ============================================================
    - variables:
        decision_id: "{{ now().isoformat() }}"
        auto_actif: "{{ is_state('input_boolean.chauffage_reglages_auto', 'on') }}"
        mode_maison: "{{ states('input_select.mode_maison') }}"
        representativite: "{{ states('input_select.chauffage_representativite_thermique') }}"
        poele_stable: "{{ states('binary_sensor.poele_en_fonction_stable') }}"
        pente_actuelle_obs: "{{ states('input_number.chauffage_pente_consigne') | float(0) }}"
        parallele_actuel_obs: "{{ states('input_number.chauffage_parallele_consigne') | float(0) }}"
        pente_sug_raw: "{{ states('sensor.chauffage_pente_suggeree') }}"
        para_sug_raw: "{{ states('sensor.chauffage_parallele_suggeree') }}"

        # Helpers booléens (sans float) pour l'ETIQUETTE de raison (observation)
        # c0 = précondition prioritaire §7/§8 : représentativité thermique REPRESENTATIF
        c0: "{{ is_state('input_select.chauffage_representativite_thermique', 'REPRESENTATIF') }}"
        c1: "{{ is_state('input_boolean.chauffage_reglages_auto', 'on') }}"
        c2: "{{ is_state('input_select.mode_maison', 'Normal') }}"
        c3: "{{ states('sensor.chauffage_pente_suggeree') not in ['unknown','unavailable','none',''] and states('sensor.chauffage_parallele_suggeree') not in ['unknown','unavailable','none',''] }}"

        # VERROU DE DÉCISION — prédicats reproduits VERBATIM (bare | float), précédés
        # de la précondition prioritaire §7/§8 (représentativité = REPRESENTATIF) : garde
        # BLOQUANTE — hors REPRESENTATIF, cycle_actionnable est faux → aucune écriture.
        # court-circuit identique au bloc condition d'origine : les | float de C4 ne sont
        # atteints que si C3 (suggestions non-sentinelles) est vrai → jamais d'erreur.
        cycle_actionnable: >
          {{ is_state('input_select.chauffage_representativite_thermique', 'REPRESENTATIF')
             and is_state('input_boolean.chauffage_reglages_auto', 'on')
             and is_state('input_select.mode_maison', 'Normal')
             and states('sensor.chauffage_pente_suggeree') not in ['unknown','unavailable','none','']
             and states('sensor.chauffage_parallele_suggeree') not in ['unknown','unavailable','none','']
             and ( states('sensor.chauffage_pente_suggeree') | float != states('input_number.chauffage_pente_consigne') | float
                   or states('sensor.chauffage_parallele_suggeree') | float != states('input_number.chauffage_parallele_consigne') | float ) }}

        # Copies d'observation (float(0) car évaluées inconditionnellement ; n'alimentent JAMAIS le verrou)
        apply_pente_obs: >
          {{ states('sensor.chauffage_pente_suggeree') | float(0) != states('input_number.chauffage_pente_consigne') | float(0)
             and (states('sensor.chauffage_pente_suggeree') | float(0) > states('input_number.chauffage_pente_consigne') | float(0)
                  or (states('sensor.chauffage_pente_suggeree') | float(0) < states('input_number.chauffage_pente_consigne') | float(0)
                      and is_state('binary_sensor.poele_en_fonction_stable', 'off'))) }}
        apply_parallele_obs: >
          {{ states('sensor.chauffage_parallele_suggeree') | float(0) != states('input_number.chauffage_parallele_consigne') | float(0)
             and (states('sensor.chauffage_parallele_suggeree') | float(0) > states('input_number.chauffage_parallele_consigne') | float(0)
                  or (states('sensor.chauffage_parallele_suggeree') | float(0) < states('input_number.chauffage_parallele_consigne') | float(0)
                      and is_state('binary_sensor.poele_en_fonction_stable', 'off'))) }}

        # Raison de cycle (76 §6) — déduite sans float. c0 (représentativité §7/§8)
        # est la précondition prioritaire : si non REPRESENTATIF ⇒ non_representatif.
        # Sinon, si C1/C2/C3 vrais mais non actionnable ⇒ C4 faux ⇒ suggestion_identique.
        cycle_reason: >-
          {%- if not c0 -%}non_representatif
          {%- elif not c1 -%}auto_desactive
          {%- elif not c2 -%}hors_mode_normal
          {%- elif not c3 -%}suggestion_indisponible
          {%- elif not cycle_actionnable -%}suggestion_identique
          {%- else -%}actionnable
          {%- endif -%}

        pente_issue: >-
          {%- if not cycle_actionnable -%}{{ 'refused' if cycle_reason == 'suggestion_identique' else 'abstained' }}
          {%- elif apply_pente_obs -%}applied
          {%- else -%}refused
          {%- endif -%}
        pente_reason: >-
          {%- if not cycle_actionnable -%}{{ cycle_reason }}
          {%- elif apply_pente_obs -%}applied
          {%- elif states('sensor.chauffage_pente_suggeree') | float(0) == states('input_number.chauffage_pente_consigne') | float(0) -%}suggestion_identique
          {%- else -%}baisse_bloquee_poele
          {%- endif -%}

        parallele_issue: >-
          {%- if not cycle_actionnable -%}{{ 'refused' if cycle_reason == 'suggestion_identique' else 'abstained' }}
          {%- elif apply_parallele_obs -%}applied
          {%- else -%}refused
          {%- endif -%}
        parallele_reason: >-
          {%- if not cycle_actionnable -%}{{ cycle_reason }}
          {%- elif apply_parallele_obs -%}applied
          {%- elif states('sensor.chauffage_parallele_suggeree') | float(0) == states('input_number.chauffage_parallele_consigne') | float(0) -%}suggestion_identique
          {%- else -%}baisse_bloquee_poele
          {%- endif -%}

    # ============================================================
    #  DÉCISION (INCHANGÉE) — corps d'origine déplacé verbatim sous
    #  garde cycle_actionnable. Seul ajout : decision_id additif dans
    #  les event_data de chauffage_adjustment (rattachement parent→enfant).
    # ============================================================
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ cycle_actionnable }}"
          sequence:

            - variables:
                pente_actuelle: "{{ states('input_number.chauffage_pente_consigne') | float }}"
                pente_suggeree: "{{ states('sensor.chauffage_pente_suggeree') | float }}"
                parallele_actuel: "{{ states('input_number.chauffage_parallele_consigne') | float }}"
                parallele_suggeree: "{{ states('sensor.chauffage_parallele_suggeree') | float }}"
                simulation: "{{ is_state('input_boolean.courbe_auto_simulation', 'on') }}"

                apply_pente: >
                  {{ pente_suggeree != pente_actuelle
                     and (pente_suggeree > pente_actuelle
                          or (pente_suggeree < pente_actuelle
                              and is_state('binary_sensor.poele_en_fonction_stable', 'off'))) }}

                apply_parallele: >
                  {{ parallele_suggeree != parallele_actuel
                     and (parallele_suggeree > parallele_actuel
                          or (parallele_suggeree < parallele_actuel
                              and is_state('binary_sensor.poele_en_fonction_stable', 'off'))) }}

            - choose:

                - conditions:
                    - condition: template
                      value_template: "{{ simulation }}"
                  sequence:

                    - service: logbook.log
                      data:
                        name: "Chauffage"
                        message: >
                          🧪 Simulation auto-ajustement :
                          pente {{ pente_actuelle }} → {{ pente_suggeree }},
                          parallèle {{ parallele_actuel }} → {{ parallele_suggeree }}

                    - event: chauffage_adjustment
                      event_data:
                        decision_id: "{{ decision_id }}"
                        mode: "simulation"
                        pente_before: "{{ pente_actuelle }}"
                        pente_after: "{{ pente_suggeree }}"
                        para_before: "{{ parallele_actuel }}"
                        para_after: "{{ parallele_suggeree }}"
                        timestamp: "{{ now().strftime('%d/%m %H:%M') }}"

                    - service: persistent_notification.create
                      data:
                        title: "🤖 Simulation auto-ajustement chauffage"
                        message: >
                          Mode auto actif (simulation).

                          Ajustements proposés :
                          • Pente : {{ pente_actuelle }} → {{ pente_suggeree }}
                          • Parallèle : {{ parallele_actuel }} → {{ parallele_suggeree }}

                          Aucun changement n'a été appliqué.

                - conditions:
                    - condition: template
                      value_template: "{{ not simulation }}"
                  sequence:

                    - choose:
                        - conditions: >
                            {{ apply_pente }}
                          sequence:
                            - service: input_number.set_value
                              target:
                                entity_id: input_number.chauffage_pente_consigne
                              data:
                                value: "{{ pente_suggeree }}"

                    - choose:
                        - conditions: >
                            {{ apply_parallele }}
                          sequence:
                            - service: input_number.set_value
                              target:
                                entity_id: input_number.chauffage_parallele_consigne
                              data:
                                value: "{{ parallele_suggeree }}"

                    - service: logbook.log
                      data:
                        name: "Chauffage"
                        message: >
                          🔧 Auto-ajustement décidé :
                          pente {{ pente_actuelle }} → {{ pente_suggeree }} ({{ 'appliqué' if apply_pente else 'refusé' }}),
                          parallèle {{ parallele_actuel }} → {{ parallele_suggeree }} ({{ 'appliqué' if apply_parallele else 'refusé' }})

                    - event: chauffage_adjustment
                      event_data:
                        decision_id: "{{ decision_id }}"
                        mode: "real"
                        pente_before: "{{ pente_actuelle }}"
                        pente_after: "{{ pente_suggeree }}"
                        para_before: "{{ parallele_actuel }}"
                        para_after: "{{ parallele_suggeree }}"
                        pente_applied: "{{ apply_pente }}"
                        para_applied: "{{ apply_parallele }}"
                        timestamp: "{{ now().strftime('%d/%m %H:%M') }}"
    # ============================================================
    #  🔎 L1 OBSERVABILITÉ — événement de cycle UNIVERSEL (toutes branches)
    # ============================================================
    - event: chauffage_courbe_cycle_evalue
      continue_on_error: true
      event_data:
        decision_id: "{{ decision_id }}"
        mode: "{{ 'simulation' if is_state('input_boolean.courbe_auto_simulation', 'on') else 'real' }}"
        cycle_actionnable: "{{ cycle_actionnable }}"
        cycle_reason: "{{ cycle_reason }}"
        cycle_reason_type: "{{ 'anomal' if cycle_reason in ['suggestion_indisponible','hors_domaine'] else 'nominal' }}"
        pente_before: "{{ pente_actuelle_obs }}"
        pente_suggeree: "{{ pente_sug_raw }}"
        pente_issue: "{{ pente_issue }}"
        pente_reason: "{{ pente_reason }}"
        pente_reason_type: "{{ 'anomal' if pente_reason in ['suggestion_indisponible','hors_domaine'] else 'nominal' }}"
        parallele_before: "{{ parallele_actuel_obs }}"
        parallele_suggeree: "{{ para_sug_raw }}"
        parallele_issue: "{{ parallele_issue }}"
        parallele_reason: "{{ parallele_reason }}"
        parallele_reason_type: "{{ 'anomal' if parallele_reason in ['suggestion_indisponible','hors_domaine'] else 'nominal' }}"
        representativite: "{{ representativite }}"
        poele_stable: "{{ poele_stable }}"
        mode_maison: "{{ mode_maison }}"
        auto_actif: "{{ auto_actif }}"
        timestamp: "{{ now().strftime('%d/%m %H:%M') }}"
