# ==========================================================
# 🧠 ARSENAL — AUTOMATION
#     Chauffage — Pré-confort retour Vacances — Orchestrateur
# ----------------------------------------------------------
# ID : 10240000000020
#
# 🎯 RÔLE
#   Orchestration événementielle du pré-confort retour Vacances.
#
#   - Matérialise la fenêtre :
#       • input_datetime.pre_confort_debut_calcule
#       • input_datetime.pre_confort_fin_calcule
#   - Pilote l’état interne :
#       • input_boolean.pre_confort_actif_calcule
#   - Timers instrumentaux :
#       • timer.pre_confort_jusqua_debut
#       • timer.pre_confort_jusqua_fin
#   - Réconciliation systématique (boot-proof)
#
# 🧱 NATURE
#   - Autorisation temporelle pré-décisionnelle
#   - Orchestrateur événementiel
#   - Aucune décision centrale
#   - Aucun pilotage matériel
#
# 📌 NOTE
#   Cette version durcit :
#   - l’écriture des input_datetime via timestamp canonique
#   - la matérialisation indépendante de la fenêtre
#   - la robustesse face aux timestamps nuls / transitoires
#
# 🔗 COMPLEMENTAIRE
#   La mémoire de cycle (anti-rebond + override) est portée par :
#   - automation 10240000000026
# ==========================================================

- id: "10240000000020"
  alias: "Chauffage — Pré-confort retour Vacances — Orchestrateur"
  description: "Orchestration événementielle du pré-confort (fenêtre + timers + réconciliation)."
  mode: restart

  trigger:
    - platform: homeassistant
      event: start
      id: ha_start

    - platform: state
      entity_id: input_boolean.systeme_stable
      to: "on"
      id: systeme_stable_on

    - platform: state
      entity_id:
        - input_boolean.pre_confort_enable
        - binary_sensor.vacances_actives
        - sensor.pre_confort_debut_ts
        - sensor.pre_confort_fin_ts
        - binary_sensor.pre_confort_fenetre_valide
      id: entree_change

    - platform: event
      event_type: timer.finished
      event_data:
        entity_id: timer.pre_confort_jusqua_debut
      id: timer_debut

    - platform: event
      event_type: timer.finished
      event_data:
        entity_id: timer.pre_confort_jusqua_fin
      id: timer_fin

  condition: []

  action:

    # ==============================
    # 1) Variables — Minimum vital
    # ==============================
    - variables:
        now_ts: "{{ as_timestamp(now()) | int(0) }}"
        debut_ts: "{{ states('sensor.pre_confort_debut_ts') | int(0) }}"
        fin_ts: "{{ states('sensor.pre_confort_fin_ts') | int(0) }}"
        fenetre_valide: >
          {{ is_state('binary_sensor.pre_confort_fenetre_valide', 'on')
             and (states('sensor.pre_confort_debut_ts') | int(0)) > 0
             and (states('sensor.pre_confort_fin_ts') | int(0)) > 0 }}
        eligible: >
          {{ is_state('input_boolean.pre_confort_enable', 'on')
             and is_state('input_boolean.systeme_stable', 'on')
             and is_state('binary_sensor.vacances_actives', 'on')
             and is_state('binary_sensor.pre_confort_fenetre_valide', 'on')
             and (states('sensor.pre_confort_debut_ts') | int(0)) > 0
             and (states('sensor.pre_confort_fin_ts') | int(0)) > 0
             and not is_state('input_boolean.pre_confort_cycle_consomme', 'on')
             and not is_state('input_boolean.pre_confort_cycle_override', 'on') }}

    # ==============================
    # 2) Fenêtre matérialisée (helpers)
    # ==============================
    - choose:
        - conditions: "{{ fenetre_valide }}"
          sequence:
            - service: input_datetime.set_datetime
              target:
                entity_id: input_datetime.pre_confort_debut_calcule
              data:
                timestamp: "{{ debut_ts }}"

            - service: input_datetime.set_datetime
              target:
                entity_id: input_datetime.pre_confort_fin_calcule
              data:
                timestamp: "{{ fin_ts }}"

    # ==============================
    # 3) État calculé + timers (réconciliation)
    # ==============================
    - choose:

        # --------------------------------------------------
        # Cas invalidant : tout couper
        # --------------------------------------------------
        - conditions: "{{ not eligible }}"
          sequence:
            - service: input_boolean.turn_off
              target:
                entity_id: input_boolean.pre_confort_actif_calcule

            - service: timer.cancel
              target:
                entity_id:
                  - timer.pre_confort_jusqua_debut
                  - timer.pre_confort_jusqua_fin

        # --------------------------------------------------
        # Cas avant fenêtre
        # --------------------------------------------------
        - conditions: "{{ eligible and (now_ts < debut_ts) }}"
          sequence:
            - service: input_boolean.turn_off
              target:
                entity_id: input_boolean.pre_confort_actif_calcule

            - service: timer.start
              target:
                entity_id: timer.pre_confort_jusqua_debut
              data:
                duration: "{{ (debut_ts - now_ts) | int(0) }}"

            - service: timer.start
              target:
                entity_id: timer.pre_confort_jusqua_fin
              data:
                duration: "{{ (fin_ts - now_ts) | int(0) }}"

        # --------------------------------------------------
        # Cas dans fenêtre
        # --------------------------------------------------
        - conditions: "{{ eligible and (now_ts >= debut_ts) and (now_ts < fin_ts) }}"
          sequence:
            - service: input_boolean.turn_on
              target:
                entity_id: input_boolean.pre_confort_actif_calcule

            - service: timer.cancel
              target:
                entity_id: timer.pre_confort_jusqua_debut

            - service: timer.start
              target:
                entity_id: timer.pre_confort_jusqua_fin
              data:
                duration: "{{ (fin_ts - now_ts) | int(0) }}"

      default:
        # --------------------------------------------------
        # Cas après fenêtre (ou incohérence résiduelle)
        # --------------------------------------------------
        - service: input_boolean.turn_off
          target:
            entity_id: input_boolean.pre_confort_actif_calcule

        - service: timer.cancel
          target:
            entity_id:
              - timer.pre_confort_jusqua_debut
              - timer.pre_confort_jusqua_fin