# ==========================================================
#  STATISTICS SENSORS — Moyennes mensuelles de température
# ----------------------------------------------------------
#  🧠 Objectif :
#     Calculer la **moyenne glissante sur 30 jours**
#     de la température (°C) dans chaque zone suivie :
#     chambres, pièces de vie, extérieurs, bureaux, ateliers.
#
#  ⚙️ Composant : `platform: statistics`
#     - Calcule des statistiques depuis l’historique des capteurs.
#     - Ici, seule la **moyenne (mean)** est utilisée.
#
#  📅 Fenêtre d’analyse :
#     - Période glissante de 30 jours.
#     - Échantillons conservés : 10 000 max.
#
#  📊 Sortie :
#     - Moyenne mensuelle de température (°C)
#
#  🏡 Zones couvertes :
#     - Habitation principale
#     - Espaces extérieurs
#     - Locaux professionnels et ateliers
# ==========================================================


# ----------------------------------------------------------
# 🏠 Chambres
# ----------------------------------------------------------
- platform: statistics
  name: "Température Chambre Moyenne Chambre Arnaud"
  entity_id: sensor.temperature_chambre_arnaud
  state_characteristic: mean
  max_age: &max_age_30d
    days: 30
  sampling_size: &sampling_size_10000 10000

- platform: statistics
  name: "Température Chambre Moyenne Chambre Matthieu"
  entity_id: sensor.temperature_chambre_matthieu
  state_characteristic: mean
  max_age: *max_age_30d
  sampling_size: *sampling_size_10000

- platform: statistics
  name: "Température Chambre Moyenne Chambre Parents"
  entity_id: sensor.temperature_chambre_parents
  state_characteristic: mean
  max_age: *max_age_30d
  sampling_size: *sampling_size_10000


