# ==========================================================
#  STATISTICS SENSORS — Moyennes mensuelles de température (filtrée après-midi)
# ----------------------------------------------------------
#  🧠 Objectif :
#     Calculer la **moyenne glissante sur 30 jours**
#     de la température mesurée durant l’**après-midi** ☀️,
#     période de température maximale de la journée.
#
#  ⚙️ Composant : `platform: statistics`
#     - Source : capteurs `sensor.temperature_filtre_jour_*`
#     - Métrique : moyenne (`mean`)
#
#  📅 Fenêtre d’analyse :
#     - Période glissante : 30 jours
#     - Taille d’échantillon : 5 000 valeurs
#
#  📊 Sortie :
#     - Moyenne mensuelle de la température (°C) durant l’après-midi
#
#  🏡 Zones couvertes :
#     - Chambres, pièces de vie, extérieurs, zones industrielles,
#       bureaux et locaux techniques.
# ==========================================================

# ----------------------------------------------------------
# 🏠 Chambres
# ----------------------------------------------------------
- platform: statistics
  name: "Température filtre jour Moyenne Chambre Arnaud"
  entity_id: sensor.temperature_filtre_jour_chambre_arnaud
  state_characteristic: mean
  max_age: &max_age_30d
    days: 30
  sampling_size: &sampling_size_5000 5000

- platform: statistics
  name: "Température filtre jour Moyenne Chambre Matthieu"
  entity_id: sensor.temperature_filtre_jour_chambre_matthieu
  state_characteristic: mean
  max_age: *max_age_30d
  sampling_size: *sampling_size_5000

- platform: statistics
  name: "Température filtre jour Moyenne Chambre Parents"
  entity_id: sensor.temperature_filtre_jour_chambre_parents
  state_characteristic: mean
  max_age: *max_age_30d
  sampling_size: *sampling_size_5000

