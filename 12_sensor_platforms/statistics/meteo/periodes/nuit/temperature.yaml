# ==========================================================
#  STATISTICS SENSORS — Moyennes mensuelles de la Température (filtrée sur la période nocturne)
# ----------------------------------------------------------
#  🌡️ Objectif :
#     Calculer la **moyenne glissante sur 30 jours**
#     de la **température mesurée la nuit** (période “filtre nuit”),
#     afin d’évaluer :
#       - le confort thermique nocturne 🌙
#       - la stabilité des températures en période sans ensoleillement ☁️
#       - l’efficacité de l’isolation et de l’inertie thermique du bâtiment 🧱
#
#  ⚙️ Composant : `platform: statistics`
#     - Source : capteurs `sensor.temperature_filtre_nuit_*`
#     - Métrique : `mean` (moyenne)
#
#  📅 Fenêtre d’analyse :
#     - Période glissante : 30 jours
#     - Taille d’échantillon : 5 000 points
#
#  📊 Sortie :
#     - Moyenne mensuelle de la température **nocturne (°C)**
#
#  🏡 Zones couvertes :
#     - Chambres, zones de vie, extérieurs, ateliers, stockage, etc.
# ==========================================================

# ----------------------------------------------------------
# 🏠 Chambres
# ----------------------------------------------------------
- platform: statistics
  name: "Température filtre nuit Moyenne Chambre Arnaud"
  entity_id: sensor.temperature_filtre_nuit_chambre_arnaud
  state_characteristic: mean
  max_age: &max_age_30d
    days: 30
  sampling_size: &sampling_size_5000 5000

- platform: statistics
  name: "Température filtre nuit Moyenne Chambre Matthieu"
  entity_id: sensor.temperature_filtre_nuit_chambre_matthieu
  state_characteristic: mean
  max_age: *max_age_30d
  sampling_size: *sampling_size_5000

- platform: statistics
  name: "Température filtre nuit Moyenne Chambre Parents"
  entity_id: sensor.temperature_filtre_nuit_chambre_parents
  state_characteristic: mean
  max_age: *max_age_30d
  sampling_size: *sampling_size_5000

