# ==========================================================
#  STATISTICS SENSORS — Moyennes mensuelles d’humidité relative (filtrée à l’aube)
# ----------------------------------------------------------
#  🧠 Objectif :
#     Calculer la **moyenne glissante sur 30 jours**
#     de l’humidité relative (%) mesurée « à l’aube »,
#     c’est-à-dire sur la période la plus stable et représentative
#     du niveau d’humidité ambiant avant le réchauffement diurne.
#
#  ⚙️ Composant : `platform: statistics`
#     - Source : capteurs `sensor.humidite_relative_filtre_aube_*`
#     - Mesure agrégée : `mean` (moyenne)
#
#  📅 Fenêtre d’analyse :
#     - Période : 30 jours glissants
#     - Échantillons : 5 000 max
#
#  📊 Sortie :
#     - Moyenne mensuelle de l’humidité relative matinale (%)
#
#  🏡 Zones couvertes :
#     - Chambres, pièces de vie, salles de bains, extérieurs,
#       locaux techniques et zones professionnelles.
# ==========================================================

# ----------------------------------------------------------
# 🏠 Chambres
# ----------------------------------------------------------
- platform: statistics
  name: "Humidité relative filtre aube Moyenne Chambre Arnaud"
  entity_id: sensor.humidite_relative_filtre_aube_chambre_arnaud
  state_characteristic: mean
  max_age: &max_age_30d
    days: 30
  sampling_size: &sampling_size_5000 5000

- platform: statistics
  name: "Humidité relative filtre aube Moyenne Chambre Matthieu"
  entity_id: sensor.humidite_relative_filtre_aube_chambre_matthieu
  state_characteristic: mean
  max_age: *max_age_30d
  sampling_size: *sampling_size_5000

- platform: statistics
