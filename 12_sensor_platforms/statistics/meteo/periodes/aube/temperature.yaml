# ==========================================================
#  STATISTICS SENSORS — Moyennes mensuelles de température (filtrée à l’aube)
# ----------------------------------------------------------
#  🧠 Objectif :
#     Calculer la **moyenne glissante sur 30 jours**
#     de la température (°C) mesurée à l’aube, c’est-à-dire
#     avant le réchauffement du matin, pour chaque pièce
#     et zone du bâtiment.
#
#  ⚙️ Composant : `platform: statistics`
#     - Source : capteurs `sensor.temperature_filtre_aube_*`
#     - Métrique : moyenne (`mean`)
#
#  📅 Fenêtre d’analyse :
#     - Période : 30 jours glissants
#     - Échantillons : 5 000 points maximum
#
#  📊 Sortie :
#     - Moyenne mensuelle des températures matinales (°C)
#
#  🏡 Zones couvertes :
#     - Chambres, pièces à vivre, sanitaires, extérieurs,
#       zones de stockage et locaux professionnels.
# ==========================================================

# ----------------------------------------------------------
# 🏠 Chambres
# ----------------------------------------------------------
- platform: statistics
  name: "Température filtre aube Moyenne Chambre Arnaud"
  entity_id: sensor.temperature_filtre_aube_chambre_arnaud
  state_characteristic: mean
  max_age: &max_age_30d
    days: 30
  sampling_size: &sampling_size_5000 5000

- platform: statistics
  name: "Température filtre aube Moyenne Chambre Matthieu"
  entity_id: sensor.temperature_filtre_aube_chambre_matthieu
  state_characteristic: mean
  max_age: *max_age_30d
  sampling_size: *sampling_size_5000

- platform: statistics
  name: "Température filtre aube Moyenne Chambre Parents"
  entity_id: sensor.temperature_filtre_aube_chambre_parents
  state_characteristic: mean
  max_age: *max_age_30d
  sampling_size: *sampling_size_5000

