###########################################################
#  🌡️ SENSORS : Températures min / max (24 h glissantes)
#  ---------------------------------------------------------
#  Rôle :
#    Pour chaque capteur de température de type :
#        sensor.temperature_<zone>
#    ce fichier génère automatiquement :
#
#      • sensor.temperature_min_jour_<zone>
#      • sensor.temperature_max_jour_<zone>
#
#    → valeurs min/max des 24 dernières heures
#    → utilisées dans les dashboards Arsenal
#
#  IMPORTANT :
#    - Fichier intégré par :
#        sensor: !include_dir_merge_list 12_sensor_platforms/
#    - Aucune clé `sensor:` globale
#    - Chaque entrée doit commencer par `- platform: statistics`
#    - Glissant sur 24h (pas "depuis minuit")
###########################################################


# ==========================================================
#  🌳 Jardin
# ==========================================================
- platform: statistics
  name: temperature_min_jour_jardin
  unique_id: temperature_min_jour_jardin
  entity_id: sensor.temperature_jardin
  state_characteristic: value_min
  max_age: &max_age_24h
    hours: 24
  sampling_size: &sampling_size_5000 5000

- platform: statistics
  name: temperature_max_jour_jardin
  unique_id: temperature_max_jour_jardin
  entity_id: sensor.temperature_jardin
  state_characteristic: value_max
  max_age: *max_age_24h
  sampling_size: *sampling_size_5000

