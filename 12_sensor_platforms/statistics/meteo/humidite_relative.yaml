# ==========================================================
#  STATISTICS SENSORS — Moyennes mensuelles d’humidité relative
# ----------------------------------------------------------
#  🧠 Objectif :
#     Calculer la **moyenne glissante sur 30 jours**
#     de l’humidité relative (%) pour chaque pièce
#     domestique et zone professionnelle.
#
#  ⚙️ Composant : `platform: statistics`
#     - Analyse l’historique des entités cibles
#     - Utilise la caractéristique `mean` (moyenne arithmétique)
#
#  📅 Fenêtre d’analyse :
#     - Durée : 30 jours glissants
#     - Échantillons maximum : 10 000
#
#  📊 Sortie :
#     - Valeur moyenne d’humidité relative sur 30 jours
#
#  🏡 Regroupement :
#     - Zones domestiques : chambres, séjour, SDB, etc.
#     - Zones professionnelles : bureaux, stock, ateliers
# ==========================================================

# ----------------------------------------------------------
# 🏠 Chambres et pièces domestiques
# ----------------------------------------------------------
- platform: statistics
  name: "Humidité relative Moyenne Chambre Arnaud"
  entity_id: sensor.humidite_relative_chambre_arnaud
  state_characteristic: mean
  max_age: &max_age_30d
    days: 30
  sampling_size: &sampling_size_10000 10000

- platform: statistics
  name: "Humidité relative Moyenne Chambre Matthieu"
  entity_id: sensor.humidite_relative_chambre_matthieu
  state_characteristic: mean
