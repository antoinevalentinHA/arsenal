# ==========================================================
# 🧠 ARSENAL — STATISTICS SENSORS
#     Sommeil — Moyennes glissantes
# ----------------------------------------------------------
# 🎯 Rôle
#     Calculer les moyennes mobiles des données de sommeil
#     consolidées par Arsenal.
#
# 🧩 Périmètre
#     - Total sommeil consolidé
#     - Score sommeil consolidé
#     - Fenêtres 7 / 14 / 30 jours
#
# 🚫 Interdits
#     - Ne consomme aucune entité Withings locale
#     - Ne consomme aucune donnée non consolidée
#     - Ne produit aucune décision santé
#
# 🧠 Statut
#     Analyse statistique — consommation exclusive du snapshot
# ==========================================================

- platform: statistics
  name: Sommeil Total Moyenne 7j
  unique_id: sommeil_total_moyenne_7j
  entity_id: input_number.sommeil_derniere_nuit_total
  state_characteristic: mean
  max_age:
    days: 7
  sampling_size: 20

