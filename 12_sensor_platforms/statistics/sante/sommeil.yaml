# ==========================================================
#  STATISTICS SENSORS — Withings : Sommeil
# ----------------------------------------------------------
#  🧠 Rôle :
#     Calculer les moyennes mobiles des indicateurs de sommeil
#     issus des capteurs Withings fiabilisés localement.
#
#  ⚙️ Composant : `platform: statistics`
#     - Agrège les valeurs enregistrées (state_characteristic)
#     - Fournit des tendances 7 / 14 / 30 jours
#
#  🧩 Entrées surveillées :
#     - sensor.withings_sleep_score
#     - sensor.withings_sommeil_total_local
#
#  📊 Objectif :
#     - Suivre l’évolution de la qualité et de la durée du sommeil
#     - Alimenter le futur module "Coach Santé"
#
#  ✅ Périodes : 7 j / 14 j / 30 j
#  ✅ Échantillons : 1000 / 2000 / 4000
# ==========================================================

# ----------------------------------------------------------
# 💤 SCORE DE SOMMEIL — Moyennes glissantes
# ----------------------------------------------------------
- platform: statistics
  name: "Withings Sleep Score Moyenne 7j"
  unique_id: withings_sleep_score_moyenne_7j
  entity_id: sensor.withings_sleep_score_local
  state_characteristic: mean
  max_age:
    days: 7
  sampling_size: 1000

- platform: statistics
  name: "Withings Sleep Score Moyenne 14j"
  unique_id: withings_sleep_score_moyenne_14j
  entity_id: sensor.withings_sleep_score_local
  state_characteristic: mean
  max_age:
    days: 14
  sampling_size: 2000

- platform: statistics
  name: "Withings Sleep Score Moyenne 30j"
  unique_id: withings_sleep_score_moyenne_30j
  entity_id: sensor.withings_sleep_score_local
  state_characteristic: mean
  max_age:
    days: 30
  sampling_size: 4000

# ----------------------------------------------------------
# 🕒 DURÉE TOTALE DU SOMMEIL — Moyennes glissantes
# ----------------------------------------------------------
- platform: statistics
  name: "Withings Sommeil Total Moyenne 7j"
  unique_id: withings_sommeil_total_moyenne_7j
  entity_id: sensor.withings_sommeil_total_local
  state_characteristic: mean
  max_age:
    days: 7
  sampling_size: 1000

- platform: statistics
  name: "Withings Sommeil Total Moyenne 14j"
  unique_id: withings_sommeil_total_moyenne_14j
  entity_id: sensor.withings_sommeil_total_local
  state_characteristic: mean
  max_age:
    days: 14
  sampling_size: 2000

- platform: statistics
  name: "Withings Sommeil Total Moyenne 30j"
  unique_id: withings_sommeil_total_moyenne_30j
  entity_id: sensor.withings_sommeil_total_local
  state_characteristic: mean
  max_age:
    days: 30
  sampling_size: 4000
