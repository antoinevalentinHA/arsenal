# ==========================================================
# 🌡️ TRIGGERED TEMPLATE SENSOR — Écart consigne instantané (mode doux)
# ----------------------------------------------------------
# 💡 Objectif :
#   Calculer l’écart entre la température intérieure minimale
#   et la consigne appliquée uniquement lorsque :
#     • la consigne appliquée = consigne confort
#     • la température extérieure ≥ 10 °C (mode “doux”)
#
# ⚙️ Fonctionnement :
#   - Purement local, sans dépendance cloud
#   - Ignore les autres modes (réduit, vacances, standby)
#   - Conserve la dernière valeur connue en dehors des conditions
#
# 📊 Type : Triggered Template Sensor
# 📍 Entité : sensor.ecart_consigne_instantane_doux
# ==========================================================

- trigger:
    - platform: state
      entity_id:
        - sensor.temperature_min_chambres
        - sensor.temperature_consigne_appliquee_locale
        - input_number.chauffage_consigne_confort
        - sensor.temperature_jardin
  sensor:
    - name: "Ecart consigne instantane doux"
      unique_id: ecart_consigne_instantane_doux
      unit_of_measurement: "°C"
      state: >
        {% set consigne_appliquee = states('sensor.temperature_consigne_appliquee_locale') | float(none) %}
        {% set consigne_confort = states('input_number.chauffage_consigne_confort') | float(none) %}
        {% set t_int = states('sensor.temperature_min_chambres') | float(none) %}
        {% set t_ext = states('sensor.temperature_jardin') | float(none) %}
        {% set previous = this.state | float(none) %}

        {% if consigne_appliquee is not none
              and consigne_confort is not none
              and (consigne_appliquee | round(1)) == (consigne_confort | round(1))
              and t_int is not none
              and t_ext is not none
              and t_ext >= 10 %}
          {{ (t_int - consigne_appliquee) | round(2) }}
        {% else %}
          {{ previous }}
        {% endif %}
