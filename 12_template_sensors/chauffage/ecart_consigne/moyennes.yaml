# ==========================================================
# 🌡️ TEMPLATE SENSOR — Écarts moyens 24 h (chauffage)
# ----------------------------------------------------------
# 💡 Objectif :
#   Exposer la moyenne 24 h des écarts de consigne instantanés
#   pour usage direct dans le dashboard diagnostic.
#
# ⚠️ Politique d'indisponibilité :
#   Si le capteur stats source est unavailable/unknown,
#   le capteur propage l'état natif sans substitution.
#   Aucune rétention de dernière valeur — aucun faux zéro.
#   La chaîne de calibration aval doit traiter explicitement
#   unknown/unavailable comme absence de signal exploitable.
# ==========================================================

- sensor:
    - name: "Ecart consigne moyenne 24h"
      unique_id: ecart_consigne_moyenne_24h
      unit_of_measurement: "°C"
      availability: >
        {{ states('sensor.ecart_consigne_stats_24h') not in ['unknown', 'unavailable', ''] }}
      state: >
        {{ states('sensor.ecart_consigne_stats_24h') | float | round(2) }}

    - name: "Ecart consigne moyenne froid"
      unique_id: ecart_consigne_moyenne_froid
      unit_of_measurement: "°C"
      availability: >
        {{ states('sensor.ecart_consigne_stats_froid') not in ['unknown', 'unavailable', ''] }}
      state: >
        {{ states('sensor.ecart_consigne_stats_froid') | float | round(2) }}

    - name: "Ecart consigne moyenne doux"
      unique_id: ecart_consigne_moyenne_doux
      unit_of_measurement: "°C"
      availability: >
        {{ states('sensor.ecart_consigne_stats_doux') not in ['unknown', 'unavailable', ''] }}
      state: >
        {{ states('sensor.ecart_consigne_stats_doux') | float | round(2) }}