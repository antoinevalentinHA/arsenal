# ==========================================================
# 🧠 ARSENAL — TEMPLATE SENSOR (MODERN)
#     Chauffage — Pré-confort retour Vacances — Raison
# ----------------------------------------------------------
# 🎯 RÔLE
#   Fournir une justification déterministe de l’état du mécanisme
#   de pré-confort retour Vacances.
#
#   Ce capteur :
#   - ne pilote rien
#   - sert à l’observabilité / diagnostic / UI
#   - reflète la priorité stricte des causes de désactivation
#
# 📌 ENTITE
#   - sensor.pre_confort_raison
#
# 🔗 DEPENDANCES
#   - input_boolean.pre_confort_enable
#   - input_boolean.systeme_stable
#   - binary_sensor.vacances_actives
#   - input_datetime.fin_vacances
#   - input_number.duree_prechauffage_retour_vacances
#   - input_datetime.pre_confort_debut_calcule
#   - input_datetime.pre_confort_fin_calcule
#   - input_boolean.pre_confort_actif_calcule
#
# 🧱 INTEGRATION
#   template: !include_dir_merge_list 12_template_sensors/
# ==========================================================

- sensor:
    - name: "Pre-confort — Raison"
      unique_id: pre_confort_raison
      icon: mdi:information-outline

      state: >
        {% set UNAV = ['unknown','unavailable','none','None',''] %}

        {% if is_state('input_boolean.pre_confort_enable', 'off') %}
          disabled

        {% elif not is_state('input_boolean.systeme_stable', 'on') %}
          systeme_instable

        {% elif not is_state('binary_sensor.vacances_actives', 'on') %}
          vacances_inactives

        {% else %}
          {% set fin_raw = states('input_datetime.fin_vacances') %}
          {% set duree_h = states('input_number.duree_prechauffage_retour_vacances') | float(0) %}

          {% if fin_raw in UNAV %}
            fin_vacances_invalide

          {% elif duree_h <= 0 %}
            duree_invalide

          {% elif is_state('input_boolean.pre_confort_cycle_override', 'on') %}
            cycle_override

          {% elif is_state('input_boolean.pre_confort_cycle_consomme', 'on') %}
            cycle_consomme

          {% else %}
            {% set debut_raw = states('input_datetime.pre_confort_debut_calcule') %}
            {% set fin_calc_raw = states('input_datetime.pre_confort_fin_calcule') %}

            {% if debut_raw in UNAV or fin_calc_raw in UNAV %}
              fenetre_invalide
            {% else %}
              {% set now_ts = as_timestamp(now()) %}
              {% set debut_ts = as_timestamp(debut_raw, default=none) %}
              {% set fin_ts = as_timestamp(fin_calc_raw, default=none) %}

              {% if debut_ts is none or fin_ts is none %}
                fenetre_invalide
              {% else %}
                {% if now_ts < debut_ts %}
                  hors_fenetre_avant
                {% elif now_ts >= fin_ts %}
                  hors_fenetre_apres
                {% elif is_state('input_boolean.pre_confort_actif_calcule', 'on') %}
                  actif
                {% else %}
                  eligible
                {% endif %}
              {% endif %}
            {% endif %}
          {% endif %}
        {% endif %}