# ==========================================================
# 🧠 ARSENAL — TEMPLATE TRIGGERED SENSOR
#     Diagnostic thermique — Inertie arrêt (B0)
# ----------------------------------------------------------
# 🧠 RÔLE
#     Figer la température exacte au moment de l’arrêt chauffage
#     (transition comfort → reduced) afin de constituer le point
#     de départ officiel des mesures d’overshoot post-arrêt.
#
# 🎯 FINALITÉ
#     - Infrastructure fondatrice de la famille inertie arrêt
#     - Source unique pour :
#         • amplitude overshoot post-arrêt
#         • durée overshoot post-arrêt
#
# 🧩 PÉRIMÈTRE
#     - Observation brute uniquement
#     - Aucun calcul dérivé
#     - Aucun filtrage de régime
#     - Aucune qualification
#
# 🚫 NE FAIT PAS
#     - Ne lit aucun offset
#     - Ne lit aucune consigne
#     - Ne lit aucun seuil
#     - Ne produit aucune durée
#     - Ne produit aucune vitesse
#     - Ne déclenche aucune action
#
# 🔒 Invalidation stricte :
#   - tout cycle impacté par aération est neutralisé
#   - aucune mise à jour pendant aeration_pipeline_arme
#
# 🔗 DÉPENDANCES
#     - input_select.chauffage_dernier_mode_decide
#     - sensor.temperature_min_chambres
#     - input_boolean.aeration_pipeline_arme
#
# 🧠 STATUT
#     - Diagnostic thermique
#     - Infrastructure fondatrice
#     - Impact système : nul
# ==========================================================

- trigger:
    - platform: state
      entity_id: input_select.chauffage_dernier_mode_decide
      from: "comfort"
      to: "reduced"

    # Invalidation événementielle (évite l'invalidation "au reload")
    - platform: state
      entity_id: input_boolean.aeration_pipeline_arme
      to: "on"

  sensor:
    - name: "Température arrêt Présence Chambres"
      unique_id: temperature_arret_presence_chambres
      unit_of_measurement: "°C"
      device_class: temperature

      state: >
        {% set prev = this.state | float(none) %}
        {% set is_trig = (trigger is defined and trigger is not none) %}

        {# -------------------------------------------------- #}
        {# Snapshot strict : n'écrit QUE sur arrêt canonique   #}
        {# -------------------------------------------------- #}

        {% if states('input_boolean.aeration_pipeline_arme') == 'on' %}
          {{ prev }}

        {% elif is_trig
              and trigger.platform == 'state'
              and trigger.entity_id == 'input_select.chauffage_dernier_mode_decide'
              and trigger.from_state is not none
              and trigger.to_state is not none
              and trigger.from_state.state == 'comfort'
              and trigger.to_state.state == 'reduced' %}

          {% set t = states('sensor.temperature_min_chambres') | float(none) %}
          {% if t is not none %}
            {{ t }}
          {% else %}
            {{ prev }}
          {% endif %}

        {% else %}
          {{ prev }}
        {% endif %}

      attributes:

        # --------------------------------------------------
        # Timestamp canonique d’arrêt (B0) — événementiel
        # --------------------------------------------------
        t_arret: >
          {% set is_trig = (trigger is defined and trigger is not none) %}
          {% if is_trig
                and trigger.platform == 'state'
                and trigger.entity_id == 'input_select.chauffage_dernier_mode_decide'
                and trigger.from_state is not none
                and trigger.to_state is not none
                and trigger.from_state.state == 'comfort'
                and trigger.to_state.state == 'reduced'
                and states('input_boolean.aeration_pipeline_arme') == 'off' %}
            {{ as_timestamp(trigger.to_state.last_changed) }}
          {% else %}
            {{ this.attributes.get('t_arret') }}
          {% endif %}

        # --------------------------------------------------
        # Arrêt valide (événementiel, pas recalculé au reload)
        # --------------------------------------------------
        arret_valide: >
          {% set is_trig = (trigger is defined and trigger is not none) %}
          {% if is_trig
                and trigger.platform == 'state'
                and trigger.entity_id == 'input_select.chauffage_dernier_mode_decide'
                and trigger.from_state is not none
                and trigger.to_state is not none
                and trigger.from_state.state == 'comfort'
                and trigger.to_state.state == 'reduced'
                and states('input_boolean.aeration_pipeline_arme') == 'off' %}
            true
          {% elif is_trig
                and trigger.platform == 'state'
                and trigger.entity_id == 'input_boolean.aeration_pipeline_arme'
                and trigger.to_state is not none
                and trigger.to_state.state == 'on' %}
            false
          {% else %}
            {{ this.attributes.get('arret_valide') }}
          {% endif %}

        # --------------------------------------------------
        # Raison d’invalidation (événementielle)
        # --------------------------------------------------
        raison_invalidation: >
          {% set is_trig = (trigger is defined and trigger is not none) %}
          {% if is_trig
                and trigger.platform == 'state'
                and trigger.entity_id == 'input_select.chauffage_dernier_mode_decide'
                and trigger.from_state is not none
                and trigger.to_state is not none
                and trigger.from_state.state == 'comfort'
                and trigger.to_state.state == 'reduced'
                and states('input_boolean.aeration_pipeline_arme') == 'off' %}
            ok
          {% elif is_trig
                and trigger.platform == 'state'
                and trigger.entity_id == 'input_boolean.aeration_pipeline_arme'
                and trigger.to_state is not none
                and trigger.to_state.state == 'on' %}
            aeration
          {% else %}
            {{ this.attributes.get('raison_invalidation') }}
          {% endif %}

        # --------------------------------------------------
        # Timestamp d'invalidation (métadonnée stable) — événementiel
        # --------------------------------------------------
        t_invalidation: >
          {% set is_trig = (trigger is defined and trigger is not none) %}
          {% if is_trig
                and trigger.platform == 'state'
                and trigger.entity_id == 'input_boolean.aeration_pipeline_arme'
                and trigger.to_state is not none
                and trigger.to_state.state == 'on' %}
            {{ as_timestamp(trigger.to_state.last_changed) }}
          {% else %}
            {{ this.attributes.get('t_invalidation') }}
          {% endif %}