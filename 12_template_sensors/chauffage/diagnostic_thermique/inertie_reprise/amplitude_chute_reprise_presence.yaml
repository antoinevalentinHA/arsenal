# ==========================================================
# 🌡️ ARSENAL — TEMPLATE TRIGGERED SENSOR
#     Chauffage : Amplitude chute reprise Présence Chambres
# ----------------------------------------------------------
# 🎯 RÔLE
#   Mesurer l’amplitude maximale de chute thermique observée après une reprise A1
#   (reduced → comfort), par rapport au point de reprise figé.
#
# 🔒 PROPRIÉTÉS
#   - Trigger A1 canonique : changement de l’attribut t_reprise
#   - Références figées à A1 : t0_ref / T0_ref
#   - Amplitude = max(amplitude, T0_ref - T_cur) si chute > 0
#   - Neutralisation stricte pendant aération_pipeline_arme :
#       • aucune mise à jour
#       • state figé typé (float) si possible
#   - Aucun "0 fantôme" hors reset A1 valide : state = none hors cycle
# ==========================================================

- trigger:

    # Nouvelle reprise chauffage (A1) — canonique : changement t_reprise uniquement
    - platform: state
      entity_id: sensor.temperature_reprise_presence_chambres
      attribute: t_reprise

    # Variation thermique Chambres
    - platform: state
      entity_id: sensor.temperature_min_chambres


  sensor:
    - name: "Amplitude chute reprise Présence Chambres"
      unique_id: amplitude_chute_reprise_presence_chambres
      unit_of_measurement: "°C"
      device_class: temperature
      icon: mdi:arrow-collapse-down


      state: >
        {% set last = this.state | float(none) %}

        {% if states('input_boolean.aeration_pipeline_arme') == 'on' %}
          {{ last }}
        {% else %}

          {% set reprise_valide = (state_attr('sensor.temperature_reprise_presence_chambres', 'reprise_valide') | string | lower) == 'true' %}

          {% set t0 = this.attributes.get('t0_ref') | float(none) %}
          {% set T0 = this.attributes.get('T0_ref') | float(none) %}
          {% set T_cur = states('sensor.temperature_min_chambres') | float(none) %}

          {# Reset uniquement sur A1 valide #}
          {% if trigger.entity_id == 'sensor.temperature_reprise_presence_chambres' %}
            {% if reprise_valide %}
              0
            {% else %}
              {{ none }}
            {% endif %}

          {# Hors cycle / invalide #}
          {% elif not reprise_valide %}
            {{ none }}
          {% elif t0 is none or T0 is none %}
            {{ none }}
          {% elif T_cur is none %}
            {{ last }}

          {% else %}
            {% set chute = (T0 - T_cur) | float %}
            {% if chute <= 0 %}
              {{ last if last is not none else 0 }}
            {% else %}
              {{ ([last, chute] | max) | round(3) if last is not none else (chute | round(3)) }}
            {% endif %}
          {% endif %}

        {% endif %}


      attributes:

        # --------------------------------------------------
        # Cast strict (diagnostic)
        # --------------------------------------------------
        reprise_valide_cast: >
          {{ ((state_attr('sensor.temperature_reprise_presence_chambres', 'reprise_valide') | string | lower) == 'true') }}

        # --------------------------------------------------
        # Références A1 (figées)
        # --------------------------------------------------
        t0_ref: >
          {% set prev = this.attributes.get('t0_ref') %}
          {% set reprise_valide = (state_attr('sensor.temperature_reprise_presence_chambres', 'reprise_valide') | string | lower) == 'true' %}

          {% if states('input_boolean.aeration_pipeline_arme') == 'on' %}
            {{ prev }}
          {% elif trigger.entity_id == 'sensor.temperature_reprise_presence_chambres' and reprise_valide and trigger.to_state is not none %}
            {{ as_timestamp(trigger.to_state.last_changed) }}
          {% else %}
            {{ prev }}
          {% endif %}

        T0_ref: >
          {% set prev = this.attributes.get('T0_ref') %}
          {% set reprise_valide = (state_attr('sensor.temperature_reprise_presence_chambres', 'reprise_valide') | string | lower) == 'true' %}
          {% set T_cur = states('sensor.temperature_min_chambres') | float(none) %}

          {% if states('input_boolean.aeration_pipeline_arme') == 'on' %}
            {{ prev }}
          {% elif trigger.entity_id == 'sensor.temperature_reprise_presence_chambres' and reprise_valide %}
            {{ T_cur if T_cur is not none else prev }}
          {% else %}
            {{ prev }}
          {% endif %}

        # --------------------------------------------------
        # Dernière chute calculée (observabilité)
        # --------------------------------------------------
        chute_last: >
          {% set T0 = this.attributes.get('T0_ref') | float(none) %}
          {% set T_cur = states('sensor.temperature_min_chambres') | float(none) %}

          {% if states('input_boolean.aeration_pipeline_arme') == 'on' %}
            {{ this.attributes.get('chute_last') }}
          {% elif T0 is none or T_cur is none %}
            {{ none }}
          {% else %}
            {{ (T0 - T_cur) | round(3) }}
          {% endif %}

        # --------------------------------------------------
        # Statut / invalidation (diagnostic)
        # --------------------------------------------------
        arsenal_status: >
          {% set aeration = states('input_boolean.aeration_pipeline_arme') %}
          {% set reprise_valide = (state_attr('sensor.temperature_reprise_presence_chambres', 'reprise_valide') | string | lower) == 'true' %}
          {% set t0 = this.attributes.get('t0_ref') | float(none) %}

          {% if aeration == 'on' %}
            inhibited_aeration
          {% elif not reprise_valide %}
            reprise_invalide
          {% elif t0 is none %}
            no_cycle
          {% else %}
            tracking
          {% endif %}

        raison_invalidation: >
          {% set aeration = states('input_boolean.aeration_pipeline_arme') %}
          {% set reprise_valide = (state_attr('sensor.temperature_reprise_presence_chambres', 'reprise_valide') | string | lower) == 'true' %}
          {% set t0 = this.attributes.get('t0_ref') | float(none) %}
          {% set T_cur = states('sensor.temperature_min_chambres') | float(none) %}

          {% if aeration == 'on' %}
            aeration
          {% elif not reprise_valide %}
            reprise_invalide
          {% elif t0 is none %}
            t0_none
          {% elif T_cur is none %}
            T_cur_none
          {% else %}
            ok
          {% endif %}

        # --------------------------------------------------
        # Sources
        # --------------------------------------------------
        source_reprise_entity: "sensor.temperature_reprise_presence_chambres"
        source_temp_entity: "sensor.temperature_min_chambres"