# ==========================================================
# 🧠 ARSENAL — TEMPLATE TRIGGERED SENSOR
#     Chauffage : Durée cycle moyenne Présence Chambres
# ----------------------------------------------------------
# 🎯 RÔLE
#   Mesurer la période propre moyenne réelle du système thermique
#   en régime Présence : Δt entre deux reprises valides successives,
#   consolidée sur une journée civile (reset 00:00:00).
#
# 🧱 FRONTIÈRE D’AUTORITÉ
#   OBSERVABILITÉ — STATISTIQUE JOURNALIÈRE SUR ÉVÉNEMENTS A1
#
# 🔒 PROPRIÉTÉS
#   - Journalier strict (reset à minuit)
#   - Basé uniquement sur reprises valides (A1) et arrêt valide requis (B0 amont)
#   - Périodes = Δt entre deux reprises successives (event time via last_changed)
#   - Moyenne = cumul / count (périodes réelles uniquement)
#   - Neutralisation stricte pendant aération_pipeline_arme :
#       • state = none
#       • accumulateurs figés (pas d’écriture)
#   - Reload-safe / restart-safe / runtime-safe (persistance via this.attributes)
#
# 🧠 NOTE ARCHI (anti désynchro state/attrs)
#   - Le calcul “nouvel état” est dupliqué (state + attributes) mais
#     s’appuie uniquement sur les valeurs persistées PRÉCÉDENTES (this.attributes),
#     et sur le timestamp événementiel du trigger (last_changed).
#   - Aucun attribut n’est lu comme “déjà mis à jour dans le même cycle”.
# ==========================================================

- trigger:

    # Reset journalier (nouvelle journée)
    - platform: time
      at: "00:00:00"

    # Reprise chauffage (A1)
    - platform: state
      entity_id: sensor.temperature_reprise_presence_chambres


  sensor:
    - name: "Durée cycle moyenne Présence Chambres"
      unique_id: duree_cycle_moyenne_presence_chambres
      icon: mdi:timer-outline
      unit_of_measurement: "min"
      state_class: measurement


      state: >
        {% if states('input_boolean.aeration_pipeline_arme') == 'on' %}
          {{ none }}
        {% else %}

          {% set reprise_valide = (state_attr('sensor.temperature_reprise_presence_chambres', 'reprise_valide') | string | lower) == 'true' %}
          {% set arret_valide   = (state_attr('sensor.temperature_arret_presence_chambres',   'arret_valide')   | string | lower) == 'true' %}

          {% if trigger.platform == 'time' %}
            {{ none }}

          {% elif trigger.platform == 'state' and reprise_valide and arret_valide %}
            {% set now_ts = as_timestamp(trigger.to_state.last_changed) %}
            {% set last_ts = this.attributes.get('arsenal_ts_last_reprise', none) %}
            {% set cumul = this.attributes.get('arsenal_cumulated_duration', 0) | float(0) %}
            {% set count = this.attributes.get('arsenal_periods_count', 0) | int(0) %}

            {% if last_ts is none %}
              {{ none }}
            {% else %}
              {% set period = now_ts - last_ts %}
              {% if period > 0 %}
                {% set new_cumul = cumul + period %}
                {% set new_count = count + 1 %}
                {{ (new_cumul / new_count / 60) | round(2) }}
              {% else %}
                {{ none }}
              {% endif %}
            {% endif %}

          {% else %}
            {% if this.state not in ['unknown', 'unavailable', ''] %}
              {{ this.state | float }}
            {% else %}
              {{ none }}
            {% endif %}
          {% endif %}

        {% endif %}


      attributes:

        # --------------------------------------------------
        # Statut de validité Arsenal
        # --------------------------------------------------
        arsenal_valid: >
          {% set count = this.attributes.get('arsenal_periods_count', 0) | int(0) %}
          {{ count >= 1 }}

        arsenal_status: >
          {% set count = this.attributes.get('arsenal_periods_count', 0) | int(0) %}
          {% if count == 0 %}
            no_data
          {% else %}
            valid
          {% endif %}


        # --------------------------------------------------
        # Diagnostic (raison d’inhibition / invalidation)
        # --------------------------------------------------
        raison_invalidation: >
          {% set aeration = states('input_boolean.aeration_pipeline_arme') %}
          {% set reprise_valide = (state_attr('sensor.temperature_reprise_presence_chambres', 'reprise_valide') | string | lower) == 'true' %}
          {% set arret_valide   = (state_attr('sensor.temperature_arret_presence_chambres',   'arret_valide')   | string | lower) == 'true' %}

          {% if aeration == 'on' %}
            aeration
          {% elif trigger.platform == 'time' %}
            reset_journalier
          {% elif trigger.platform == 'state' and not reprise_valide %}
            reprise_invalide
          {% elif trigger.platform == 'state' and not arret_valide %}
            arret_invalide
          {% else %}
            ok
          {% endif %}


        # --------------------------------------------------
        # Horodatages et accumulateurs (journaliers)
        # --------------------------------------------------
        arsenal_ts_last_reset: >
          {% if trigger.platform == 'time' %}
            {{ now().timestamp() }}
          {% else %}
            {{ this.attributes.get('arsenal_ts_last_reset', none) }}
          {% endif %}


        arsenal_ts_last_reprise: >
          {% set reprise_valide = (state_attr('sensor.temperature_reprise_presence_chambres', 'reprise_valide') | string | lower) == 'true' %}
          {% set arret_valide   = (state_attr('sensor.temperature_arret_presence_chambres',   'arret_valide')   | string | lower) == 'true' %}

          {% if trigger.platform == 'time' %}
            {{ none }}

          {% elif trigger.platform == 'state'
                and reprise_valide
                and arret_valide
                and states('input_boolean.aeration_pipeline_arme') != 'on'
                and trigger.to_state is not none %}
            {{ as_timestamp(trigger.to_state.last_changed) }}

          {% else %}
            {{ this.attributes.get('arsenal_ts_last_reprise', none) }}
          {% endif %}


        arsenal_periods_count: >
          {% set reprise_valide = (state_attr('sensor.temperature_reprise_presence_chambres', 'reprise_valide') | string | lower) == 'true' %}
          {% set arret_valide   = (state_attr('sensor.temperature_arret_presence_chambres',   'arret_valide')   | string | lower) == 'true' %}

          {% if trigger.platform == 'time' %}
            0

          {% elif trigger.platform == 'state'
                and reprise_valide
                and arret_valide
                and states('input_boolean.aeration_pipeline_arme') != 'on' %}
            {% set last_ts = this.attributes.get('arsenal_ts_last_reprise', none) %}
            {% if last_ts is none %}
              0
            {% else %}
              {{ (this.attributes.get('arsenal_periods_count', 0) | int(0)) + 1 }}
            {% endif %}

          {% else %}
            {{ this.attributes.get('arsenal_periods_count', 0) | int(0) }}
          {% endif %}


        arsenal_cumulated_duration: >
          {% set reprise_valide = (state_attr('sensor.temperature_reprise_presence_chambres', 'reprise_valide') | string | lower) == 'true' %}
          {% set arret_valide   = (state_attr('sensor.temperature_arret_presence_chambres',   'arret_valide')   | string | lower) == 'true' %}

          {% if trigger.platform == 'time' %}
            0

          {% elif trigger.platform == 'state'
                and reprise_valide
                and arret_valide
                and states('input_boolean.aeration_pipeline_arme') != 'on'
                and trigger.to_state is not none %}
            {% set now_ts = as_timestamp(trigger.to_state.last_changed) %}
            {% set last_ts = this.attributes.get('arsenal_ts_last_reprise', none) %}

            {% if last_ts is none %}
              0
            {% else %}
              {% set period = now_ts - last_ts %}
              {% if period > 0 %}
                {{ (this.attributes.get('arsenal_cumulated_duration', 0) | float(0)) + period }}
              {% else %}
                {{ this.attributes.get('arsenal_cumulated_duration', 0) | float(0) }}
              {% endif %}
            {% endif %}

          {% else %}
            {{ this.attributes.get('arsenal_cumulated_duration', 0) | float(0) }}
          {% endif %}