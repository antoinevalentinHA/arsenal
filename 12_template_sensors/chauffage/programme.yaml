# ==========================================================
# 🧠 ARSENAL — TEMPLATE SENSOR
#     Chauffage — Programme chauffage
# ----------------------------------------------------------
# 🎯 ROLE
#   Exposer le programme chauffage metier a partir de la
#   consigne reellement lue sur le boiler bridge.
#
# ⚙️ LOGIQUE
#   - setpoint = consigne reduite  -> Eco
#   - setpoint = consigne confort  -> Confort
#   - autre / indetermine          -> Inconnu
#
# 🧠 SOURCE
#   sensor.boiler_heating_setpoint
#
# ⚠️ NOTE
#   Une tolerance est appliquee pour eviter les faux ecarts
#   de comparaison flottante.
# ==========================================================

- sensor:
    - name: "Programme"
      unique_id: programme_chauffage
      icon: >
        {% set setpoint = states('sensor.boiler_heating_setpoint') | float(none) %}
        {% set reduced = states('input_number.chauffage_consigne_reduite') | float(none) %}
        {% set comfort = states('input_number.chauffage_consigne_confort') | float(none) %}
        {% set eps = 0.05 %}

        {% if setpoint is not none and reduced is not none and (setpoint - reduced) | abs <= eps %}
          mdi:leaf
        {% elif setpoint is not none and comfort is not none and (setpoint - comfort) | abs <= eps %}
          mdi:fire
        {% else %}
          mdi:help-circle-outline
        {% endif %}
      state: >
        {% set setpoint = states('sensor.boiler_heating_setpoint') | float(none) %}
        {% set reduced = states('input_number.chauffage_consigne_reduite') | float(none) %}
        {% set comfort = states('input_number.chauffage_consigne_confort') | float(none) %}
        {% set eps = 0.05 %}

        {% if setpoint is not none and reduced is not none and (setpoint - reduced) | abs <= eps %}
          Eco
        {% elif setpoint is not none and comfort is not none and (setpoint - comfort) | abs <= eps %}
          Confort
        {% else %}
          Inconnu
        {% endif %}
      attributes:
        boiler_heating_setpoint: >
          {% set v = states('sensor.boiler_heating_setpoint') %}
          {{ v if v not in ['unknown', 'unavailable', ''] else 'Indisponible' }}
        consigne_reduite_locale: >
          {% set v = states('input_number.chauffage_consigne_reduite') %}
          {{ v if v not in ['unknown', 'unavailable', ''] else 'Indisponible' }}
        consigne_confort_locale: >
          {% set v = states('input_number.chauffage_consigne_confort') %}
          {{ v if v not in ['unknown', 'unavailable', ''] else 'Indisponible' }}
        mode_derive_depuis: "sensor.boiler_heating_setpoint"