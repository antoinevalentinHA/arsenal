# ==========================================================
# 🧠 ARSENAL — TEMPLATE SENSOR
#     Chauffage — Consigne appliquee locale
# ----------------------------------------------------------
# 🎯 ROLE
#   Exposer la consigne chauffage reellement lue sur le
#   boiler bridge, sans projection locale.
#
# 🧠 SOURCE
#   sensor.boiler_heating_setpoint
#
# 📏 UNITE
#   °C
# ==========================================================

- sensor:
    - name: "temperature_consigne_appliquee_locale"
      unique_id: temperature_consigne_appliquee_locale
      unit_of_measurement: "°C"
      availability: >
        {{ states('sensor.boiler_heating_setpoint') not in ['unknown', 'unavailable', ''] }}
      state: >
        {% set v = states('sensor.boiler_heating_setpoint') | float(none) %}
        {{ v if v is not none else 'unavailable' }}