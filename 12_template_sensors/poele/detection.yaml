# ==========================================================
# 🔥 ARSENAL — TEMPLATE BINARY SENSORS
#     Détection poêle à bois
# ----------------------------------------------------------
# Architecture causale :
#
#   1. signature_thermique_poele
#      Signature thermique candidate
#      (amorce 30 min + consolidation 60 min)
#
#   2. presence_humaine_sejour
#      Présence humaine probable via hausse CO2
#
#   3. poele_en_fonction
#      Capteur autoritaire
#      = thermique + présence + chaudière hors cause
#
# Remarque importante :
#   Cette version ne code PAS une monotonie stricte
#   des deltas successifs. Elle code une signature
#   thermique robuste à base de deltas 30 min / 60 min.
# ==========================================================

- binary_sensor:

    # ==========================================================
    # COUCHE 1 — Signature thermique candidate
    # ----------------------------------------------------------
    # Objectif :
    #   Détecter une montée thermique compatible avec le poêle.
    #
    # Lecture physique :
    #   - delta_30min = amorce
    #   - delta_60min = consolidation
    #
    # Cette couche n'est PAS autoritaire.
    # ==========================================================
    - name: "Signature thermique poele"
      unique_id: signature_thermique_poele
      default_entity_id: binary_sensor.signature_thermique_poele
      device_class: heat
      icon: "mdi:thermometer-chevron-up"

      delay_off: "00:05:00"

      state: >
        {% set d30s = states('sensor.sejour_delta_30min') %}
        {% set d60s = states('sensor.sejour_delta_60min') %}

        {% if d30s in ['unknown', 'unavailable', 'none', '']
           or d60s in ['unknown', 'unavailable', 'none', ''] %}
          false
        {% else %}
          {% set d30 = d30s | float(0) %}
          {% set d60 = d60s | float(0) %}

          {% if is_state(this.entity_id, 'on') %}
            {{ d30 >= 0.08 and d60 >= 0.15 }}
          {% else %}
            {{ d30 >= 0.20 and d60 >= 0.30 and d30 >= (d60 * 0.50) }}
          {% endif %}
        {% endif %}

    # ==========================================================
    # COUCHE 2 — Présence humaine probable
    # ----------------------------------------------------------
    # Objectif :
    #   Détecter une présence humaine via une hausse CO2
    #   significative dans le séjour.
    #
    # Seuils provisoires :
    #   - entrée   : 30 ppm / 30 min
    #   - maintien : 10 ppm / 30 min
    # ==========================================================
    - name: "Presence humaine sejour"
      unique_id: presence_humaine_sejour
      default_entity_id: binary_sensor.presence_humaine_sejour
      device_class: presence
      icon: "mdi:account-check"

      delay_off: "00:10:00"

      state: >
        {% set co2s = states('sensor.sejour_co2_delta_30min') %}

        {% if co2s in ['unknown', 'unavailable', 'none', ''] %}
          false
        {% else %}
          {% set co2d = co2s | float(0) %}

          {% if is_state(this.entity_id, 'on') %}
            {{ co2d >= 10 }}
          {% else %}
            {{ co2d >= 30 }}
          {% endif %}
        {% endif %}

    # ==========================================================
    # COUCHE 3 — Poele en fonction
    # ----------------------------------------------------------
    # Objectif :
    #   Capteur autoritaire pilotant les effets métier.
    #
    # Conditions :
    #   - signature thermique candidate
    #   - présence humaine probable
    #   - chaudière hors cause
    #
    # Invalidation chaudière :
    #   Utilise directement binary_sensor.bruleur_mode_chauffage,
    #   déjà durci et sécurisé localement.
    # ==========================================================
    - name: "Poele en fonction"
      unique_id: poele_en_fonction
      default_entity_id: binary_sensor.poele_en_fonction
      device_class: heat

      delay_on: "00:03:00"
      delay_off: "00:05:00"

      state: >
        {% set sig_thermo = is_state('binary_sensor.signature_thermique_poele', 'on') %}
        {% set presence = is_state('binary_sensor.presence_humaine_sejour', 'on') %}
        {% set chaudiere_hors_cause = is_state('binary_sensor.bruleur_mode_chauffage', 'off') %}

        {{ sig_thermo and presence and chaudiere_hors_cause }}

      icon: >
        {% if is_state(this.entity_id, 'on') %}
          mdi:fire
        {% else %}
          mdi:fire-off
        {% endif %}