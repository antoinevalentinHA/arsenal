# ==========================================================
# 🧠 ARSENAL — BINARY_SENSOR
#     Arrosage — Intention d'arroser (décision V1)
# ----------------------------------------------------------
# 🎯 RÔLE
#   Décision V1 (contrat 17 §3) : « Arsenal doit-il arroser
#   maintenant ? ». `off` par défaut, honnête. Consommée par
#   l'automation de déclenchement, qui appelle le script Run
#   supervisé. NE pilote rien elle-même.
#
# 🧮 RÈGLE — on SEULEMENT si TOUTES réunies
#   1. interrupteur maître actif ;
#   2. besoin sol actif (médiane < seuil, hystérésis) ;
#   3. instant dans la fenêtre Arsenal (disjointe du secours) ;
#   4. hors suspension pluie ;
#   5. cooldown respecté (depuis le dernier arrosage prouvé) ;
#   6. préconditions runtime `on` ET données pont disponibles ;
#   7. état du canal réservoir sol exploitable (complet/degrade).
#
# 🔗 ENTRÉES
#   - binary_sensor.arrosage_besoin_sol
#   - input_boolean.arrosage_automatique_actif
#   - input_datetime.arrosage_fenetre_debut / _fin
#   - binary_sensor.arrosage_suspension_pluie
#   - sensor.arrosage_dernier_effectif (preuve, cooldown)
#   - input_number.arrosage_intervalle_minimal_heures
#   - binary_sensor.arrosage_rain_bird_preconditions_runtime
#   - binary_sensor.rain_bird_pont_donnees_disponibles
#   - sensor.jardin_reservoir_sol_etat
#
# 🚫 NE FAIT PAS
#   - aucune commande native, aucun pilotage : pure décision.
#   - santé pont `degrade` n'est PAS bloquante (exploitable tant
#     que préconditions `on`) — on ne gate que sur préconditions
#     + données disponibles, comme le Run supervisé.
#   - fenêtre supposée NE PAS franchir minuit (réglage par défaut
#     aube ; comparaison horaire simple).
#
# 🏷️ STATUT
#   Runtime V1 (contrat 17) — Arsenal v14.x
# ==========================================================

- binary_sensor:
    - name: "Arrosage intention"
      unique_id: arrosage_intention
      icon: >
        {{ 'mdi:sprinkler' if is_state('binary_sensor.arrosage_intention', 'on') else 'mdi:sprinkler-off' }}
      state: >
        {% set maitre = is_state('input_boolean.arrosage_automatique_actif', 'on') %}
        {% set besoin = is_state('binary_sensor.arrosage_besoin_sol', 'on') %}
        {% set susp = is_state('binary_sensor.arrosage_suspension_pluie', 'on') %}
        {% set precond = is_state('binary_sensor.arrosage_rain_bird_preconditions_runtime', 'on') %}
        {% set dispo = is_state('binary_sensor.rain_bird_pont_donnees_disponibles', 'on') %}
        {% set etat = states('sensor.jardin_reservoir_sol_etat') %}
        {% set etat_ok = etat in ['complet', 'degrade'] %}
        {% set t = now().strftime('%H:%M:%S') %}
        {% set deb = states('input_datetime.arrosage_fenetre_debut') %}
        {% set fin = states('input_datetime.arrosage_fenetre_fin') %}
        {% set fenetre_ok = deb not in ['unknown', 'unavailable'] and fin not in ['unknown', 'unavailable'] and deb <= t <= fin %}
        {% set last = states('sensor.arrosage_dernier_effectif') %}
        {% set cd = states('input_number.arrosage_intervalle_minimal_heures') | float(24) %}
        {% if last in ['unknown', 'unavailable', 'none', 'None', ''] %}
          {% set cooldown_ok = true %}
        {% else %}
          {% set cooldown_ok = (now() - as_datetime(last)).total_seconds() / 3600 >= cd %}
        {% endif %}
        {{ 'on' if (maitre and besoin and fenetre_ok and not susp and precond and dispo and etat_ok and cooldown_ok) else 'off' }}
