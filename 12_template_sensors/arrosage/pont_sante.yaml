# ==========================================================
# 🧠 ARSENAL — TEMPLATE SENSOR
#     Arrosage / Rain Bird — Santé synthétique du pont
# ----------------------------------------------------------
# 🎯 RÔLE
#   Produire un état synthétique unique de santé du pont
#   rainbird-esp32 pour supervision et UI.
#
# 🧩 PÉRIMÈTRE
#   - Calcul ou dérivation uniquement
#   - Aucune action
#   - Aucun pilotage d'équipement
#
# 🔖 NATURE
#   synthese
#
# 🆔 UNIQUE_ID
#   rain_bird_pont_sante
#
# 🔗 DÉPENDANCES
#   Lit EN ÉTAT (signaux dérivés Arsenal — santé = disponibilité + fraîcheur) :
#     binary_sensor.rain_bird_pont_donnees_disponibles
#     binary_sensor.rain_bird_pont_donnees_fraiches
#   Expose EN ATTRIBUTS (diagnostic d'affichage seulement — PAS en état) :
#     sensor.rain_bird_bat_bt_2_e9a3_bridge_wifi_rssi
#     sensor.rain_bird_bat_bt_2_e9a3_ble_rssi
#     sensor.rain_bird_bat_bt_2_e9a3_battery_level
#     sensor.rain_bird_bat_bt_2_e9a3_bridge_heartbeat
#
# 🧱 PRINCIPE (priorité descendante — contrat 03 §6.2, chantier C18)
#   1. inconnu      : disponibilité non évaluée (signal amont unknown/…)
#   2. indisponible : pont_donnees_disponibles = off (cœur indisponible)
#   3. degrade      : disponible MAIS pont_donnees_fraiches = off (périmé)
#   4. ok           : disponible ET frais
#   La SANTÉ = capacité opérationnelle (disponibilité + fraîcheur). Elle NE
#   dépend d'AUCUNE valeur RSSI : la qualité radio (-75) et l'exploitabilité
#   (-90) sont des couches distinctes (03 §6.1) — un signal moyen mais stable
#   au-dessus du plancher ne dégrade PAS la santé. Une panne radio réelle est
#   déjà captée par disponibilité/fraîcheur (le pont cesse d'émettre des
#   télémétries exploitables). Disponibilité != fraîcheur : données anciennes
#   mais pont disponible = DÉGRADÉ, jamais indisponible.
#   Verrou anti-régression (bloc state sans RSSI) : R6-like dans
#   scripts/arsenal_contracts/check_resilience_integrations_contracts.py.
#
# 🚫 INTERDITS
#   - Piloter directement un équipement
#   - Déclencher une action
#   - Transformer une donnée inconnue en certitude
#   - Réintroduire une valeur RSSI dans le calcul d'ÉTAT (03 §6.1/§6.2)
#
# 🏷️ STATUT
#   Synthèse — Arsenal v14.x (santé alignée contrat 03 §6, C18 Lot 3)
# ==========================================================

- sensor:
    - name: "Rain Bird pont sante"
      unique_id: rain_bird_pont_sante
      state: >
        {% set indispo = ['unknown', 'unavailable', 'none', 'None', ''] %}
        {% set dispo = states('binary_sensor.rain_bird_pont_donnees_disponibles') %}
        {% set frais = states('binary_sensor.rain_bird_pont_donnees_fraiches') %}

        {% if dispo in indispo %}
          inconnu
        {% elif dispo != 'on' %}
          indisponible
        {% elif frais != 'on' %}
          degrade
        {% else %}
          ok
        {% endif %}
      attributes:
        wifi_rssi: "{{ states('sensor.rain_bird_bat_bt_2_e9a3_bridge_wifi_rssi') }}"
        ble_rssi: "{{ states('sensor.rain_bird_bat_bt_2_e9a3_ble_rssi') }}"
        battery_level: "{{ states('sensor.rain_bird_bat_bt_2_e9a3_battery_level') }}"
        heartbeat_etat: "{{ states('sensor.rain_bird_bat_bt_2_e9a3_bridge_heartbeat') }}"
