# ==========================================================
# 🧠 ARSENAL — TEMPLATE BINARY_SENSOR
#     Arrosage / Rain Bird — Données du pont fraîches
# ----------------------------------------------------------
# 🎯 RÔLE
#   Indiquer si les données EXPLOITABLES du Rain Bird sont à la
#   fois présentes et récemment rafraîchies — pas seulement si
#   le pont a un heartbeat récent.
#
# 🧩 PÉRIMÈTRE
#   - Évaluation booléenne uniquement
#   - Aucune action
#   - Aucun pilotage d'équipement
#
# 🔖 NATURE
#   diagnostic
#
# 🔗 DÉPENDANCES
#   Lit (exploitabilité — données issues du BLE) :
#     sensor.rain_bird_bat_bt_2_e9a3_active_station
#     sensor.rain_bird_bat_bt_2_e9a3_battery_level
#     sensor.rain_bird_bat_bt_2_e9a3_ble_rssi
#   Lit (récence) :
#     sensor.rain_bird_bat_bt_2_e9a3_bridge_heartbeat (état + last_reported)
#
# 🕒 RÉFÉRENCE TEMPORELLE — last_reported (et NON last_updated)
#   La récence du heartbeat mesure la LIVENESS du pont (rapporte-t-il
#   encore ?), pas la stabilité de la valeur. `last_reported` se rafraîchit
#   à chaque écriture du coordinateur même valeur identique ; `last_updated`
#   ne bouge qu'au changement d'état et ferait passer un pont sain mais
#   « calme » pour gelé. Aligné sur la doctrine repo-wide (contrat
#   resilience_integrations §5, invariant 1).
#
# 🆔 UNIQUE_ID
#   rain_bird_pont_donnees_fraiches
#
# 🧱 PRINCIPE (off par défaut, jamais faux positif)
#   FRAÎCHEUR MÉTIER = tolérance LONGUE. Le bridge Rain Bird poll
#   lentement hors commande (de l'ordre de 4 h) ; un seuil court (ex.
#   15 min) rendrait ce capteur faux la majorité du temps. Seuil retenu :
#   18000 s (5 h) — marge opérationnelle autour d'un poll lent ~4 h.
#   on  = données exploitables présentes (active_station, batterie,
#         BLE non unknown/unavailable)
#         ET heartbeat exploitable mis à jour il y a < 18000 s (5 h).
#   off = au moins une donnée cœur indisponible (ex. BLE down)
#         OU heartbeat absent / périmé (>= 5 h).
#   Un heartbeat frais alors que les données BLE sont unknown ne
#   suffit PAS : la fraîcheur du pont ≠ fraîcheur des données utiles.
#   Disponibilité du pont != fraîcheur métier (voir pont_sante).
#
# 🚫 INTERDITS
#   - Piloter directement un équipement
#   - Déclencher une action
#   - Présenter une donnée périmée ou inexploitable comme fraîche
#
# 🏷️ STATUT
#   Diagnostic — Arsenal v14.x
# ==========================================================

- binary_sensor:
    - name: "Rain Bird pont donnees fraiches"
      unique_id: rain_bird_pont_donnees_fraiches
      icon: >
        {% set indispo = ['unknown', 'unavailable', 'none', 'None', ''] %}
        {% set core = [
          'sensor.rain_bird_bat_bt_2_e9a3_active_station',
          'sensor.rain_bird_bat_bt_2_e9a3_battery_level',
          'sensor.rain_bird_bat_bt_2_e9a3_ble_rssi'
        ] %}
        {% set exploitable = (core | map('states') | select('in', indispo) | list | length) == 0 %}
        {% set hb = 'sensor.rain_bird_bat_bt_2_e9a3_bridge_heartbeat' %}
        {% set hb_st = states(hb) %}
        {% set recent = hb_st is not none and hb_st not in indispo
              and (now() - states[hb].last_reported).total_seconds() < 18000 %}
        {{ 'mdi:timer-check-outline' if (exploitable and recent) else 'mdi:timer-alert-outline' }}
      state: >
        {% set indispo = ['unknown', 'unavailable', 'none', 'None', ''] %}
        {% set core = [
          'sensor.rain_bird_bat_bt_2_e9a3_active_station',
          'sensor.rain_bird_bat_bt_2_e9a3_battery_level',
          'sensor.rain_bird_bat_bt_2_e9a3_ble_rssi'
        ] %}
        {% set exploitable = (core | map('states') | select('in', indispo) | list | length) == 0 %}
        {% set hb = 'sensor.rain_bird_bat_bt_2_e9a3_bridge_heartbeat' %}
        {% set hb_st = states(hb) %}
        {% set recent = hb_st is not none and hb_st not in indispo
              and (now() - states[hb].last_reported).total_seconds() < 18000 %}
        {{ 'on' if (exploitable and recent) else 'off' }}
      attributes:
        donnees_exploitables: >
          {% set indispo = ['unknown', 'unavailable', 'none', 'None', ''] %}
          {% set core = [
            'sensor.rain_bird_bat_bt_2_e9a3_active_station',
            'sensor.rain_bird_bat_bt_2_e9a3_battery_level',
            'sensor.rain_bird_bat_bt_2_e9a3_ble_rssi'
          ] %}
          {{ (core | map('states') | select('in', indispo) | list | length) == 0 }}
        heartbeat_age_secondes: >
          {% set indispo = ['unknown', 'unavailable', 'none', 'None', ''] %}
          {% set hb = 'sensor.rain_bird_bat_bt_2_e9a3_bridge_heartbeat' %}
          {% set hb_st = states(hb) %}
          {% if hb_st is none or hb_st in indispo %}
            inconnu
          {% else %}
            {{ (now() - states[hb].last_reported).total_seconds() | int }}
          {% endif %}
        seuil_secondes: "18000"
