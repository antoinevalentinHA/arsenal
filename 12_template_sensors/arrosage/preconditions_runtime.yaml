# ==========================================================
# 🧠 ARSENAL — TEMPLATE BINARY_SENSOR
#     Arrosage / Rain Bird — Préconditions runtime
# ----------------------------------------------------------
# 🎯 RÔLE
#   Exposer une GARDE radio / opérationnelle DURABLE attestant
#   que le pont Rain Bird est EXPLOITABLE avant d'envisager une
#   commande d'arrosage : BLE exploitable, batterie connue,
#   Wi-Fi exploitable. Garde lue par le script Run supervisé.
#
# 🧩 PÉRIMÈTRE
#   - Évaluation booléenne uniquement
#   - Aucune action
#   - Aucun pilotage d'équipement
#   - AUCUN drapeau de recette / validation terrain
#
# 🔖 NATURE
#   autorisation_logique (garde radio durable)
#
# 🆔 UNIQUE_ID
#   arrosage_rainbird_preconditions_runtime
#
# 🔗 DÉPENDANCES
#   Lit (sources brutes — observables durables du pont) :
#     sensor.rain_bird_bat_bt_2_e9a3_ble_rssi
#     sensor.rain_bird_bat_bt_2_e9a3_battery_level
#     sensor.rain_bird_bat_bt_2_e9a3_bridge_wifi_rssi
#
# 🧱 PRINCIPE (off par défaut, jamais unknown)
#   La barrière exige une radio EXPLOITABLE (présence), PAS une
#   qualité IDÉALE. La qualité radio honnête (faible/acceptable/bon)
#   reste portée par pont_qualite_ble / pont_qualite_wifi / pont_sante.
#
#   BLE/Wi-Fi exploitable     = valeur connue, numérique, négative ET >= -90 dBm.
#   BLE/Wi-Fi non exploitable  = unknown / unavailable / none,
#                                non numérique, valeur >= 0, ou valeur < -90 dBm.
#
#   on  = BLE exploitable ET batterie connue ET Wi-Fi exploitable
#   off = au moins une condition manquante / unknown / unavailable.
#   Sortie explicite 'on'/'off' + défauts positionnels : une donnée
#   indisponible ou non numérique vaut 'off', jamais unknown.
#
#   NB : les validations TERRAIN (station courte, Stop All, emplacement
#   physique, Wi-Fi qualifié) sont des FAITS de Phase 0 / mode manuel
#   supervisé (contrats 07, 10, 11 §9). Ce ne sont PAS des entrées
#   runtime de cette garde : aucun drapeau de recette n'est lu ici.
#   Référence : contrats/arrosage/10_prerequis_runtime.md
#
# ⚠️ NON-ACTIONNEL
#   Cette garde NE déclenche rien. Elle atteste seulement que le
#   pont est radio-exploitable. Le script Run supervisé la LIT
#   comme précondition ; il décide, pas elle.
#
# 🚫 INTERDITS
#   - Piloter directement un équipement
#   - Déclencher une action
#   - Confondre autorisation logique et exécution
#   - Transformer une donnée inconnue en feu vert
#   - Réintroduire un drapeau de recette / validation terrain
#
# 🏷️ STATUT
#   Autorisation — Arsenal v14.x
# ==========================================================

- binary_sensor:
    - name: "Arrosage Rain Bird preconditions runtime"
      unique_id: arrosage_rainbird_preconditions_runtime
      icon: >
        {% set indispo = ['unknown', 'unavailable', 'none', 'None', ''] %}
        {% set ble = states('sensor.rain_bird_bat_bt_2_e9a3_ble_rssi') %}
        {% set bat = states('sensor.rain_bird_bat_bt_2_e9a3_battery_level') %}
        {% set wifi = states('sensor.rain_bird_bat_bt_2_e9a3_bridge_wifi_rssi') %}
        {% set ble_ok = ble not in indispo and ble | int(99) < 0 and ble | int(99) >= -90 %}
        {% set bat_ok = bat not in indispo %}
        {% set wifi_ok = wifi not in indispo and wifi | int(99) < 0 and wifi | int(99) >= -90 %}
        {{ 'mdi:lock-open-check' if (ble_ok and bat_ok and wifi_ok) else 'mdi:lock' }}
      state: >
        {% set indispo = ['unknown', 'unavailable', 'none', 'None', ''] %}
        {% set ble = states('sensor.rain_bird_bat_bt_2_e9a3_ble_rssi') %}
        {% set bat = states('sensor.rain_bird_bat_bt_2_e9a3_battery_level') %}
        {% set wifi = states('sensor.rain_bird_bat_bt_2_e9a3_bridge_wifi_rssi') %}
        {% set ble_ok = ble not in indispo and ble | int(99) < 0 and ble | int(99) >= -90 %}
        {% set bat_ok = bat not in indispo %}
        {% set wifi_ok = wifi not in indispo and wifi | int(99) < 0 and wifi | int(99) >= -90 %}
        {{ 'on' if (ble_ok and bat_ok and wifi_ok) else 'off' }}
      attributes:
        ble_ok: >
          {% set indispo = ['unknown', 'unavailable', 'none', 'None', ''] %}
          {% set r = states('sensor.rain_bird_bat_bt_2_e9a3_ble_rssi') %}
          {{ r not in indispo and r | int(99) < 0 and r | int(99) >= -90 }}
        batterie_ok: >
          {{ states('sensor.rain_bird_bat_bt_2_e9a3_battery_level') not in ['unknown', 'unavailable', 'none', 'None', ''] }}
        wifi_ok: >
          {% set indispo = ['unknown', 'unavailable', 'none', 'None', ''] %}
          {% set r = states('sensor.rain_bird_bat_bt_2_e9a3_bridge_wifi_rssi') %}
          {{ r not in indispo and r | int(99) < 0 and r | int(99) >= -90 }}
