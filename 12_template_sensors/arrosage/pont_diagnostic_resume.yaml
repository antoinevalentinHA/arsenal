# ==========================================================
# 🧠 ARSENAL — TEMPLATE SENSOR
#     Arrosage / Rain Bird — Résumé de diagnostic
# ----------------------------------------------------------
# 🎯 RÔLE
#   Produire un résumé textuel court et honnête de l'état du
#   pont rainbird-esp32, pour lecture humaine / UI.
#
# 🧩 PÉRIMÈTRE
#   - Calcul ou dérivation uniquement
#   - Aucune action
#   - Aucun pilotage d'équipement
#
# 🔖 NATURE
#   projection_ui
#
# 🆔 UNIQUE_ID
#   rain_bird_pont_diagnostic_resume
#
# 🔗 DÉPENDANCES
#   Lit (sources brutes du pont) :
#     sensor.rain_bird_bat_bt_2_e9a3_bridge_wifi_rssi
#     sensor.rain_bird_bat_bt_2_e9a3_ble_rssi
#     sensor.rain_bird_bat_bt_2_e9a3_battery_level
#
# 🧱 PRINCIPE (toujours un texte exploitable, jamais unknown)
#   Énonce ce qui est connu et ce qui ne l'est pas. Les trois
#   libellés ont une valeur par défaut ('inconnu' / 'non validé')
#   via namespace : même si BLE/batterie/Wi-Fi sont unknown, le
#   capteur rend toujours une phrase complète, sans maquiller une
#   donnée inconnue en valeur rassurante.
#
# 🚫 INTERDITS
#   - Piloter directement un équipement
#   - Déclencher une action
#   - Présenter une présomption comme un fait
#
# 🏷️ STATUT
#   Diagnostic — Arsenal v14.x
# ==========================================================

- sensor:
    - name: "Rain Bird pont diagnostic"
      unique_id: rain_bird_pont_diagnostic_resume
      icon: mdi:clipboard-text-outline
      state: >
        {% set indispo = ['unknown', 'unavailable', 'none', 'None', ''] %}
        {% set ns = namespace(wifi='Wi-Fi inconnu', ble='BLE non validé', bat='batterie inconnue') %}

        {% set wifi = states('sensor.rain_bird_bat_bt_2_e9a3_bridge_wifi_rssi') %}
        {% if wifi not in indispo and wifi | int(99) < 0 %}
          {% set w = wifi | int(99) %}
          {% if w >= -67 %}
            {% set ns.wifi = 'Wi-Fi bon (' ~ wifi ~ ' dBm)' %}
          {% elif w >= -74 %}
            {% set ns.wifi = 'Wi-Fi acceptable (' ~ wifi ~ ' dBm)' %}
          {% else %}
            {% set ns.wifi = 'Wi-Fi faible (' ~ wifi ~ ' dBm)' %}
          {% endif %}
        {% endif %}

        {% set ble = states('sensor.rain_bird_bat_bt_2_e9a3_ble_rssi') %}
        {% if ble not in indispo and ble | int(99) < 0 %}
          {% set b = ble | int(99) %}
          {% if b >= -67 %}
            {% set ns.ble = 'BLE bon (' ~ ble ~ ' dBm)' %}
          {% elif b >= -74 %}
            {% set ns.ble = 'BLE acceptable (' ~ ble ~ ' dBm)' %}
          {% else %}
            {% set ns.ble = 'BLE faible (' ~ ble ~ ' dBm)' %}
          {% endif %}
        {% endif %}

        {% set bat = states('sensor.rain_bird_bat_bt_2_e9a3_battery_level') %}
        {% if bat is not none and bat not in indispo %}
          {% set ns.bat = 'batterie ' ~ bat ~ ' %' %}
        {% endif %}

        {{ ns.wifi ~ ' — ' ~ ns.ble ~ ' — ' ~ ns.bat }}
