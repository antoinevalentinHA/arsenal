# ==========================================================
# 🧠 ARSENAL — TEMPLATE SENSORS
#     Arrosage — Session station 1 (observabilité Lot B)
# ----------------------------------------------------------
# 🎯 RÔLE
#   Exposer la lecture DÉRIVÉE de l'état de session d'arrosage
#   supervisée station 1 (audit « exécutions longues Rain Bird »,
#   Lot B) à partir des helpers de session persistés :
#     - binary_sensor.arrosage_session_en_cours : une session
#       Arsenal est-elle ouverte (non close) ?
#     - sensor.arrosage_session_etat : lecture qualitative de la
#       session (aucune / ouverte / depassement / close_nominale /
#       close_incomplete / close_anomalie).
#   OBSERVATION / DIAGNOSTIC UNIQUEMENT — remplace le « verrou
#   implicite par instance » par un état OBSERVABLE, sans le
#   remplacer fonctionnellement (le flux V1 est inchangé).
#
# 🔗 ENTRÉES
#   - input_text.arrosage_session_verdict (discriminant)
#   - input_datetime.arrosage_session_fin_prevue (échéance théorique)
#
# 🧮 RÈGLE — sensor.arrosage_session_etat
#   - `aucune`           : verdict vide / unknown (aucune session tracée) ;
#   - `ouverte`          : verdict `ouverte`, échéance non dépassée ;
#   - `depassement`      : verdict `ouverte`, échéance théorique + marge
#                          dépassée → clôture INCONNUE (instance perdue :
#                          reboot / reload pendant la session — audit §6) ;
#   - `close_nominale`   : séquence Run terminée (verdict `close_nominale`) ;
#   - `close_incomplete` : fin observée (switch off) SANS clôture nominale
#                          du Run — état transitoire de quelques secondes
#                          en fin de cycle nominal, durable si l'instance
#                          a été perdue après la fin d'eau ;
#   - `close_anomalie`   : démarrage non confirmé (verdict
#                          `demarrage_non_confirme`).
#
# ⏱️ MARGE DE DÉPASSEMENT — 300 s (5 min) — PARAMÈTRE RUNTIME D'OBSERVATION
#   L'échéance théorique = début + durée demandée ; le flux réel ajoute
#   la confirmation de démarrage (≤ 15 s) et le stop supervisé (≤ ~25 s).
#   5 min absorbent ces étapes et le jitter sans faux `depassement`,
#   tout en signalant une session réellement orpheline en ≤ 5 min après
#   l'échéance. Constante volontairement codée ici (pas un réglage
#   opérateur) — même idiome que les fenêtres de fraîcheur (3 h / 6 h).
#
# 🧭 HONNÊTETÉ (contrat 06)
#   `close_nominale` atteste une SÉQUENCE terminée (délai écoulé, stop
#   demandé) — PAS une sortie d'eau physique, PAS un stop prouvé, PAS un
#   effet humidité (preuve graduée — audit §5). `depassement` est un
#   constat d'absence d'information, pas une preuve d'arrosage long.
#
# 🚫 INTERDITS
#   - Piloter directement un équipement
#   - Déclencher une action
#   - Être lu par la décision V1 ou par le flux du Run (observabilité pure)
#
# 🏷️ STATUT
#   Observabilité session (audit exécutions longues, Lot B) — Arsenal v16.x
# ==========================================================

- binary_sensor:
    - name: "Arrosage session en cours"
      unique_id: arrosage_session_en_cours
      icon: >
        {{ 'mdi:sprinkler' if is_state('binary_sensor.arrosage_session_en_cours', 'on') else 'mdi:sprinkler-off' }}
      # on = session ouverte non close (verdict runtime `ouverte`).
      # off par défaut : verdict unknown / vide / terminal ⇒ off, jamais unknown.
      state: >
        {{ 'on' if is_state('input_text.arrosage_session_verdict', 'ouverte') else 'off' }}

- sensor:
    - name: "Arrosage session etat"
      unique_id: arrosage_session_etat
      icon: >
        {% set v = states('sensor.arrosage_session_etat') %}
        {{ 'mdi:progress-clock' if v in ['ouverte'] else
           'mdi:progress-alert' if v in ['depassement', 'close_incomplete', 'close_anomalie'] else
           'mdi:progress-check' if v == 'close_nominale' else
           'mdi:progress-question' }}
      state: >
        {% set verdict = states('input_text.arrosage_session_verdict') %}
        {% set marge_s = 300 %}
        {% if verdict in ['unknown', 'unavailable', 'none', 'None', ''] %}
          aucune
        {% elif verdict == 'ouverte' %}
          {% set fin_ts = state_attr('input_datetime.arrosage_session_fin_prevue', 'timestamp') %}
          {% if fin_ts is not none and now().timestamp() > (fin_ts | float(0)) + marge_s %}
            depassement
          {% else %}
            ouverte
          {% endif %}
        {% elif verdict == 'close_nominale' %}
          close_nominale
        {% elif verdict == 'fin_observee' %}
          close_incomplete
        {% elif verdict == 'demarrage_non_confirme' %}
          close_anomalie
        {% else %}
          aucune
        {% endif %}
