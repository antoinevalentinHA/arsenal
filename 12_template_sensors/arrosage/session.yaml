# ==========================================================
# 🧠 ARSENAL — TEMPLATE SENSORS
#     Arrosage — Session station 1 (observabilité Lots B/D)
# ----------------------------------------------------------
# 🎯 RÔLE
#   Exposer la lecture DÉRIVÉE de l'état de session d'arrosage
#   supervisée station 1 (audit « exécutions longues Rain Bird »,
#   Lots B puis D) à partir des helpers de session persistés :
#     - binary_sensor.arrosage_session_en_cours : une session
#       Arsenal est-elle ouverte (non close) ?
#     - sensor.arrosage_session_etat : lecture qualitative de la
#       session (aucune / ouverte / depassement / fin_observee /
#       close_nominale / close_reprise / close_watchdog /
#       stop_incertain / close_anomalie).
#   OBSERVATION / DIAGNOSTIC UNIQUEMENT — l'orchestration de fin vit
#   dans l'automation `10270000000006`, pas ici.
#
# 🔗 ENTRÉES
#   - input_text.arrosage_session_verdict (discriminant)
#   - input_datetime.arrosage_session_fin_prevue (échéance)
#
# 🧮 RÈGLE — sensor.arrosage_session_etat
#   - `aucune`           : verdict vide / unknown (aucune session tracée) ;
#   - `ouverte`          : verdict `ouverte`, échéance non dépassée
#                          (fin nominale attendue de l'automation
#                          `10270000000006` à l'échéance) ;
#   - `depassement`      : verdict `ouverte`, échéance + marge dépassée —
#                          NE devrait plus durer depuis le Lot D (la fin
#                          indépendante / la reprise / le watchdog solde
#                          la session) : un `depassement` persistant
#                          signale une défaillance de l'orchestration
#                          elle-même ;
#   - `fin_observee`     : switch natif retombé `off` (automation
#                          `10270000000005`) AVANT clôture — état d'attente
#                          normal jusqu'à l'échéance ;
#   - `close_nominale`   : clôturée à l'échéance, arrêt prouvé (switch off) ;
#   - `close_reprise`    : soldée à la reprise post-redémarrage HA ;
#   - `close_watchdog`   : soldée par le watchdog (dépassement rattrapé) ;
#   - `stop_incertain`   : stop demandé mais switch natif non `off` —
#                          ANOMALIE ACTIVE (retry watchdog en cours) ;
#   - `close_anomalie`   : démarrage non confirmé (`demarrage_non_confirme`).
#
# ⏱️ MARGE DE DÉPASSEMENT — 300 s (5 min) — PARAMÈTRE RUNTIME D'OBSERVATION
#   L'échéance théorique = début + durée demandée ; la fin orchestrée
#   intervient à l'échéance, le watchdog au plus tard ~5 min après.
#   5 min absorbent confirmation (≤ 15 s), stop supervisé (≤ ~25 s) et
#   jitter sans faux `depassement`. Constante volontairement codée ici
#   (pas un réglage opérateur) — même idiome que les fenêtres de
#   fraîcheur (3 h / 6 h).
#
# 🧭 HONNÊTETÉ (contrat 06 — preuve graduée)
#   - démarrage confirmé (switch `on`) ≠ eau physiquement sortie ;
#   - fin observée / arrêt prouvé (switch `off`) ≠ stop hydraulique
#     mesuré (aucun débitmètre) ;
#   - `close_nominale` ≠ effet humidité constaté (canal sol séparé) ;
#   - `depassement` / `stop_incertain` sont des constats d'absence de
#     preuve, pas des preuves d'arrosage long.
#   ⚠️ Le dead-man NATIF reste NON QUALIFIÉ (protocole Lot C non
#   exécuté — décision propriétaire 2026-07-05) : aucun état ici ne
#   présume de l'arrêt autonome du contrôleur.
#
# 🚫 INTERDITS
#   - Piloter directement un équipement
#   - Déclencher une action
#   - Être lu par la décision V1 ou par le flux du Run (observabilité pure)
#
# 🏷️ STATUT
#   Observabilité session (audit exécutions longues, Lots B/D) — Arsenal v16.x
# ==========================================================

- binary_sensor:
    - name: "Arrosage session en cours"
      unique_id: arrosage_session_en_cours
      icon: >
        {{ 'mdi:sprinkler' if is_state('binary_sensor.arrosage_session_en_cours', 'on') else 'mdi:sprinkler-off' }}
      # on = session ouverte non close (verdict runtime `ouverte`).
      # off par défaut : verdict unknown / vide / terminal ⇒ off, jamais unknown.
      state: >
        {{ 'on' if is_state('input_text.arrosage_session_verdict', 'ouverte') else 'off' }}

- sensor:
    - name: "Arrosage session etat"
      unique_id: arrosage_session_etat
      icon: >
        {% set v = states('sensor.arrosage_session_etat') %}
        {{ 'mdi:progress-clock' if v in ['ouverte', 'fin_observee'] else
           'mdi:progress-alert' if v in ['depassement', 'stop_incertain', 'close_watchdog', 'close_anomalie'] else
           'mdi:progress-check' if v in ['close_nominale', 'close_reprise'] else
           'mdi:progress-question' }}
      state: >
        {% set verdict = states('input_text.arrosage_session_verdict') %}
        {% set marge_s = 300 %}
        {% if verdict in ['unknown', 'unavailable', 'none', 'None', ''] %}
          aucune
        {% elif verdict == 'ouverte' %}
          {% set fin_ts = state_attr('input_datetime.arrosage_session_fin_prevue', 'timestamp') %}
          {% if fin_ts is not none and now().timestamp() > (fin_ts | float(0)) + marge_s %}
            depassement
          {% else %}
            ouverte
          {% endif %}
        {% elif verdict == 'fin_observee' %}
          fin_observee
        {% elif verdict == 'close_nominale' %}
          close_nominale
        {% elif verdict == 'close_reprise' %}
          close_reprise
        {% elif verdict == 'close_watchdog' %}
          close_watchdog
        {% elif verdict == 'stop_incertain' %}
          stop_incertain
        {% elif verdict == 'demarrage_non_confirme' %}
          close_anomalie
        {% else %}
          aucune
        {% endif %}
