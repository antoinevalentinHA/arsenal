# ==========================================================
# 🧠 ARSENAL — TEMPLATE BINARY SENSOR (BOILER / BRIDGE)
# ----------------------------------------------------------
# 📌 ROLE
#   Exposer un etat degrade de la passerelle chaudiere
#   base sur l'age du heartbeat applicatif.
#
# 🧱 PRINCIPE
#   - online   = connectivite MQTT
#   - degraded = absence de heartbeat valide depuis plus
#     de 60 s
#   - Source : sensor.boiler_bridge_heartbeat_timestamp
#
# ⚠️ IMPORTANT
#   - Couche technique de sante passerelle
#   - Aucun pilotage metier
# ==========================================================

- binary_sensor:
    - name: "Boiler bridge degraded"
      unique_id: boiler_bridge_degraded
      state: >
        {% set ts = states('sensor.boiler_bridge_heartbeat_timestamp') %}
        {% if ts in ['unknown', 'unavailable', ''] %}
          true
        {% else %}
          {{ (as_timestamp(now()) - as_timestamp(ts, default=0)) > 60 }}
        {% endif %}
      device_class: problem
      icon: mdi:heart-broken