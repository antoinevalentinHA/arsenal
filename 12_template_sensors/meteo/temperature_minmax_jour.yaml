# ==========================================================
# 🧠 ARSENAL — TEMPLATE SENSORS
#     Meteo — Temperature min / max jour (restitution UI)
# ----------------------------------------------------------
# 📌 Fichier
#   /homeassistant/12_template_sensors/meteo/temperature_minmax_jour.yaml
#
# 🎯 ROLE
#   Fournir un capteur de restitution UI compact affichant
#   la plage thermique journaliere d'une zone :
#
#       "<min> / <max> °C"
#
#   Ce capteur est destine aux dashboards utilisant
#   `socle_kpi`.
#
# 🧩 PRINCIPE
#   - Lecture de :
#       sensor.temperature_min_jour_<suffixe>
#       sensor.temperature_max_jour_<suffixe>
#
#   - Sortie compacte :
#       "18,8 / 20,2 °C"
#
#   - Les couleurs restent portees par :
#       sensor.couleur_temperature_minmax_jour_<suffixe>
#
# 🛡️ ROBUSTESSE
#   - Gestion unknown / unavailable
#   - Format numerique robuste
#
# 🚫 INTERDIT
#   - Aucun calcul thermique
#   - Aucune logique couleur
# ==========================================================

- trigger:
    - platform: state
      entity_id:
        - sensor.temperature_min_jour_cave
        - sensor.temperature_max_jour_cave
        - sensor.temperature_min_jour_chambre_arnaud
        - sensor.temperature_max_jour_chambre_arnaud
        - sensor.temperature_min_jour_chambre_matthieu
        - sensor.temperature_max_jour_chambre_matthieu
        - sensor.temperature_min_jour_chambre_parents
        - sensor.temperature_max_jour_chambre_parents
        - sensor.temperature_min_jour_entree
        - sensor.temperature_max_jour_entree
        - sensor.temperature_min_jour_garage
        - sensor.temperature_max_jour_garage
        - sensor.temperature_min_jour_jardin
        - sensor.temperature_max_jour_jardin
        - sensor.temperature_min_jour_palier
        - sensor.temperature_max_jour_palier
        - sensor.temperature_min_jour_petite_maison
        - sensor.temperature_max_jour_petite_maison
        - sensor.temperature_min_jour_sdb_enfants
        - sensor.temperature_max_jour_sdb_enfants
        - sensor.temperature_min_jour_sdb_parents
        - sensor.temperature_max_jour_sdb_parents
        - sensor.temperature_min_jour_sejour
        - sensor.temperature_max_jour_sejour

    - platform: homeassistant
      event: start

  sensor:

    - name: "Temperature MinMax Jour Cave"
      unique_id: temperature_minmax_jour_cave
      state: &temperature_minmax_logic >
        {% set suffixe = this.entity_id | replace('sensor.temperature_minmax_jour_', '') %}
        {% set min_src = 'sensor.temperature_min_jour_' ~ suffixe %}
        {% set max_src = 'sensor.temperature_max_jour_' ~ suffixe %}

        {% set min_raw = states(min_src) %}
        {% set max_raw = states(max_src) %}

        {% if min_raw in ['unknown','unavailable',None]
           or max_raw in ['unknown','unavailable',None] %}
          unknown
        {% else %}
          {% set min = min_raw | replace(',', '.') | float(999) %}
          {% set max = max_raw | replace(',', '.') | float(999) %}

          {% if min == 999 or max == 999 %}
            unknown
          {% else %}
            {{ "%.1f"|format(min)|replace('.',',') }}° · {{ "%.1f"|format(max)|replace('.',',') }}°
          {% endif %}
        {% endif %}

    - name: "Temperature MinMax Jour Chambre Arnaud"
      unique_id: temperature_minmax_jour_chambre_arnaud
      state: *temperature_minmax_logic

    - name: "Temperature MinMax Jour Chambre Matthieu"
      unique_id: temperature_minmax_jour_chambre_matthieu
      state: *temperature_minmax_logic

    - name: "Temperature MinMax Jour Chambre Parents"
      unique_id: temperature_minmax_jour_chambre_parents
      state: *temperature_minmax_logic

    - name: "Temperature MinMax Jour Entree"
      unique_id: temperature_minmax_jour_entree
      state: *temperature_minmax_logic

    - name: "Temperature MinMax Jour Garage"
      unique_id: temperature_minmax_jour_garage
      state: *temperature_minmax_logic

    - name: "Temperature MinMax Jour Jardin"
      unique_id: temperature_minmax_jour_jardin
      state: *temperature_minmax_logic

    - name: "Temperature MinMax Jour Palier"
      unique_id: temperature_minmax_jour_palier
      state: *temperature_minmax_logic

    - name: "Temperature MinMax Jour Petite Maison"
      unique_id: temperature_minmax_jour_petite_maison
      state: *temperature_minmax_logic

    - name: "Temperature MinMax Jour SDB Enfants"
      unique_id: temperature_minmax_jour_sdb_enfants
      state: *temperature_minmax_logic

    - name: "Temperature MinMax Jour SDB Parents"
      unique_id: temperature_minmax_jour_sdb_parents
      state: *temperature_minmax_logic

    - name: "Temperature MinMax Jour Sejour"
      unique_id: temperature_minmax_jour_sejour
      state: *temperature_minmax_logic