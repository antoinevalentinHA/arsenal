# 💤 Chambre Enfants
# ==========================================================

- trigger:
    - platform: state
      entity_id:
        - sensor.temperature_chambre_enfants
        - sensor.humidite_relative_chambre_enfants
    - platform: homeassistant
      event: start

  sensor:
    - name: "Point de rosée chambre Enfants"
      unique_id: point_de_rosee_chambre_enfants
      unit_of_measurement: "°C"
      icon: mdi:thermometer-water

      # 🔗 Réutilisation
      state: *dewpoint_logic

      attributes:
        temperature_source: sensor.temperature_chambre_enfants
        humidite_source: sensor.humidite_relative_chambre_enfants


