      unique_id: point_de_rosee_chambre_arnaud
      unit_of_measurement: "°C"
      icon: mdi:thermometer-water

      # 🔗 Réutilisation
      state: *dewpoint_logic

      attributes:
        temperature_source: sensor.temperature_chambre_arnaud
        humidite_source: sensor.humidite_relative_chambre_arnaud


