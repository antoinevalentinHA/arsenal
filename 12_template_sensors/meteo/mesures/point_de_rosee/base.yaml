# ==========================================================
# 💧 TEMPLATE TRIGGERED SENSORS — Points de rosée (fixes)
# ----------------------------------------------------------
# 🎯 Objectif :
#   Calculer le **point de rosée (°C)** pour différentes zones
#   ne dépendant pas de la logique Netatmo/Zigbee, à partir :
#     • de la température ambiante (°C)
#     • du taux d’humidité relative (%)
#
# ⚙️ Fonctionnement :
#   - Déclenchement à chaque variation de température ou d’humidité
#     dans la zone concernée, ainsi qu’au démarrage de Home Assistant.
#   - Ignore les valeurs non valides (`unknown`, `unavailable`, `none`, etc.)
#     et les taux d’humidité hors plage (≤0 / >100 %).
#   - Si aucune donnée exploitable, conserve la dernière valeur connue.
#
# 🧮 Formule utilisée (Magnus-Tetens) :
#   ```
#   Td = (b * γ(T, RH)) / (a - γ(T, RH))
#   avec γ = (a*T)/(b+T) + ln(RH/100)
#   ```
#   où a = 17.62 et b = 243.12
#
# 📦 Capteurs créés :
#   • sensor.point_de_rosee_jardin  
#   • sensor.point_de_rosee_cave  
#   • sensor.point_de_rosee_entree  
#   • (... et autres capteurs similaires non listés ici)
#
# 🧠 Détails techniques :
#   - Chaque capteur indique dans ses attributs les entités sources :
#       `temperature_source` et `humidite_source`
#   - Les valeurs sont arrondies à 0.1°C
#
# 📊 Type : Trigger Template Sensors  
# 🌡️ Unité : °C  
# 💧 Icône : mdi:thermometer-water  
# ==========================================================

- trigger:
    - platform: state
      entity_id:
        - sensor.temperature_jardin
        - sensor.humidite_relative_jardin
    - platform: homeassistant
      event: start

  sensor:
    - name: "Point de rosée jardin"
      unique_id: point_de_rosee_jardin
      unit_of_measurement: "°C"
      icon: mdi:thermometer-water
      state: &dewpoint_logic >
        {% set T = states(this.attributes.temperature_source) | float(none) %}
        {% set RH_temp = states(this.attributes.humidite_source) | float(none) %}
        {% if T is not none and RH_temp is not none and 0 < RH_temp <= 100 %}
          {% set a, b = 17.62, 243.12 %}
          {% set gamma = (a * T / (b + T)) + log(RH_temp / 100) %}
          {{ ((b * gamma) / (a - gamma)) | round(1) }}
        {% else %}
          {{ states(this.entity_id) }}
        {% endif %}
      attributes:
        temperature_source: sensor.temperature_jardin
        humidite_source: sensor.humidite_relative_jardin

