# ==========================================================
# 💧 ARSENAL — TEMPLATE TRIGGERED SENSOR
#     Point de rosee interieur (wc) - Etage
# ==========================================================
#
# 🎯 ROLE
#   Calculer le point de rosee interieur de l'etage a partir de :
#   - sensor.temperature_max_chambres
#   - sensor.humidite_relative_max_chambres
#
# 🧩 PRINCIPE
#   - Recalcul sur variation de la temperature max des chambres
#   - Recalcul sur variation de l'humidite relative max des chambres
#   - Recalcul au demarrage de Home Assistant
#   - Application de la formule de Magnus-Tetens
#   - Conservation de la derniere valeur connue si les donnees
#     d'entree sont invalides
#
# ⚙️ GARANTIES
#   - Source d'humidite numerique et semantiquement coherente
#   - Aucune dependance a un pseudo-capteur ambigu de type "chambre"
#   - Rejet des valeurs invalides
#   - Stabilite du capteur en cas d'entrees temporairement
#     indisponibles
#
# 🛑 NON RESPONSABLE
#   - Ne determine pas quelle chambre est la plus humide
#   - Ne produit pas de diagnostic de representativite metier
#
# ==========================================================

- trigger:
    - platform: state
      entity_id:
        - sensor.temperature_max_chambres
        - sensor.humidite_relative_max_chambres
    - platform: homeassistant
      event: start

  sensor:
    - name: "Point de rosee interieur (wc) - Etage"
      unique_id: point_de_rosee_interieur_wc
      unit_of_measurement: "°C"
      icon: mdi:thermometer-water
      state: >
        {% set t_raw = states('sensor.temperature_max_chambres') %}
        {% set h_raw = states('sensor.humidite_relative_max_chambres') %}
        {% set t = t_raw | float(none) %}
        {% set h = h_raw | float(none) %}
        {% if t is not none and h is not none and 0 < h <= 100 %}
          {% set a = 17.62 %}
          {% set b = 243.12 %}
          {% set gamma = (a * t) / (b + t) + log(h / 100) %}
          {{ ((b * gamma) / (a - gamma)) | round(1) }}
        {% else %}
          {{ states(this.entity_id) }}
        {% endif %}