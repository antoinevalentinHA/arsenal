# ==========================================================
# 🛏️ TEMPLATE TRIGGERED SENSOR — Humidité relative max Chambres
# ----------------------------------------------------------
# 🎯 Objectif :
#   Identifier **la chambre la plus humide** en s’appuyant sur
#   les capteurs consolidés (HomeKit + Zigbee fallback) :
#     • sensor.humidite_relative_chambre_enfants
#     • sensor.humidite_relative_chambre_parents
#
# ⚙️ Fonctionnement :
#   - Compare les valeurs numériques valides ∈ ]0 ; 100].
#   - Retourne l’humidité maximale.
#   - En cas de données invalides → conserve la dernière valeur connue.
#
# 🧮 Sélection des valides — chaîne de filtres, jamais d’accumulateur
#   La sélection se fait par chaîne `rejectattr | selectattr | sort`,
#   **pas** par `{% set acc = acc + [...] %}` dans une boucle `{% for %}` :
#   en Jinja, une affectation faite dans le corps d’une boucle ne survit
#   pas à la sortie de cette boucle. L’accumulateur restait donc vide et
#   l’agrégat tombait en permanence sur la branche mémoire (état figé,
#   attribut « Mémoire »).
#   Les valeurs sont converties en `float` **avant** le tri : trier des
#   chaînes classerait « 9.5 » après « 10.2 » (ordre lexicographique).
#
# 🧠 Déclencheurs :
#   - Variation d’un capteur consolidé.
#   - Démarrage de Home Assistant.
#
# 📊 Type : Trigger Template Sensor
# 📏 Unité : %
# 💨 Device class : humidity
# 📍 Entité : sensor.humidite_relative_max_chambres
# ==========================================================

- trigger:
    - platform: state
      entity_id:
        - sensor.humidite_relative_chambre_enfants
        - sensor.humidite_relative_chambre_parents
    - platform: homeassistant
      event: start

  sensor:
    - name: "Humidité relative max Chambres"
      unique_id: humidite_relative_max_chambres
      unit_of_measurement: "%"
      device_class: humidity

      state: >
        {% set brut = {
          'Chambre Enfants': states('sensor.humidite_relative_chambre_enfants') | float(none),
          'Chambre Parents': states('sensor.humidite_relative_chambre_parents') | float(none)
        } %}

        {% set valides = brut.items()
          | rejectattr('1', 'none')
          | selectattr('1', 'gt', 0)
          | selectattr('1', 'le', 100)
          | sort(attribute=1) | list %}

        {% if valides %}
          {{ valides[-1][1] | round(0) }}
        {% else %}
          {{ states(this.entity_id) }}
        {% endif %}

      attributes:
        chambre_la_plus_humide: >
          {% set brut = {
            'Chambre Enfants': states('sensor.humidite_relative_chambre_enfants') | float(none),
            'Chambre Parents': states('sensor.humidite_relative_chambre_parents') | float(none)
          } %}

          {% set valides = brut.items()
            | rejectattr('1', 'none')
            | selectattr('1', 'gt', 0)
            | selectattr('1', 'le', 100)
            | sort(attribute=1) | list %}

          {% if valides %}
            {{ valides[-1][0] }}
          {% else %}
            {{ state_attr(this.entity_id, 'chambre_la_plus_humide') or 'Mémoire' }}
          {% endif %}

        sources: >
          - sensor.humidite_relative_chambre_enfants
          - sensor.humidite_relative_chambre_parents
