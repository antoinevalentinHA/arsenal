          {% if m_raw in ['unknown', 'unavailable'] or v_raw in ['unknown', 'unavailable'] %}
            false
          {% else %}
            {{ (v_raw | float - m_raw | float) | abs > 6 }}
          {% endif %}
        {% endif %}

    - name: "Humidite relative jardin 3 suspect"
      unique_id: humidite_relative_jardin_3_suspect
      state: >
        {% if not is_state('binary_sensor.humidite_relative_jardin_3_valide', 'on') %}
          false
        {% else %}
          {% set m_raw = states('sensor.humidite_relative_jardin_mediane_sources_valides') %}
