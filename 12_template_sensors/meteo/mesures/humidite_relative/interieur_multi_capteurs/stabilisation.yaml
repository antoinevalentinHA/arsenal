# ==========================================================
# 🧠 ARSENAL — TEMPLATE SENSORS
#     Humidite relative stabilisee — v1.1
# ----------------------------------------------------------
# 🎯 ROLE
#   Lissage EWMA + limitation de delta.
#   Fraîcheur mémoire via input_datetime dédié par zone.
#   Double TTL : nominal 1800 s / post-boot 7200 s.
#   Aucun effet de bord. Lecture seule.
#
# 🧱 CONTRAT
#   sensor.humidite_relative_stabilisee_<zone> v1.1
# ==========================================================

- trigger:
    - platform: state
      entity_id: sensor.humidite_relative_brute_consolidee_chambre_arnaud
    - platform: time_pattern
      minutes: "/5"
    - platform: homeassistant
      event: start

  sensor:
    - name: "Humidite relative stabilisee chambre arnaud"
      unique_id: humidite_relative_stabilisee_chambre_arnaud
      unit_of_measurement: "%"
      device_class: humidity

      state: &humidite_stabilisee_state >
        {% set suffixe = this.entity_id | replace('sensor.humidite_relative_stabilisee_', '') %}
        {% set src = 'sensor.humidite_relative_brute_consolidee_' ~ suffixe %}
        {% set lv_entity = 'input_datetime.humidite_relative_last_valid_ts_' ~ suffixe %}

        {% set brute_raw = states(src) %}
        {% set brute = brute_raw | float(none) %}
        {% set brute_valide =
          brute_raw not in ['unknown','unavailable','none']
          and brute is not none
          and 10 <= brute <= 100
        %}

        {% set last_raw = this.state %}
        {% set last_val = last_raw | float(none) %}
        {% set this_numerique =
          last_raw not in ['unknown','unavailable','none']
          and last_val is not none
        %}

        {% set lv_ts = as_timestamp(states(lv_entity), none) %}
        {% set now_ts = as_timestamp(now()) %}

        {% set ttl = 7200 if trigger.platform == 'homeassistant' else 1800 %}

        {% set lv_age_ok =
          lv_ts is not none
          and (now_ts - lv_ts) <= ttl
        %}

        {% set memoire_exploitable = this_numerique and lv_age_ok %}

        {% if brute_valide and memoire_exploitable %}
          {% set ewma = 0.25 * brute + 0.75 * last_val %}
          {% set delta = ewma - last_val %}
          {% if (delta | abs) <= 4 %}
            {{ ewma | round(1) }}
          {% else %}
            {% if delta > 0 %}
              {{ (last_val + 4) | round(1) }}
            {% else %}
              {{ (last_val - 4) | round(1) }}
            {% endif %}
          {% endif %}

        {% elif brute_valide and not memoire_exploitable %}
          {{ brute | round(1) }}

        {% elif not brute_valide and memoire_exploitable %}
          {{ last_val | round(1) }}

        {% else %}
          {{ none }}
        {% endif %}

      attributes:
        source_brute: &humidite_stabilisee_source >
          {% set suffixe = this.entity_id | replace('sensor.humidite_relative_stabilisee_', '') %}
          {% set src = 'sensor.humidite_relative_brute_consolidee_' ~ suffixe %}
          {% set brute_raw = states(src) %}
          {% set brute = brute_raw | float(none) %}
          {% set brute_valide =
            brute_raw not in ['unknown','unavailable','none']
            and brute is not none
            and 10 <= brute <= 100
          %}
          {% if brute_valide %}
            {{ brute }}
          {% else %}
            {{ none }}
          {% endif %}

        mode_stabilisation: &humidite_stabilisee_mode >
          {% set suffixe = this.entity_id | replace('sensor.humidite_relative_stabilisee_', '') %}
          {% set src = 'sensor.humidite_relative_brute_consolidee_' ~ suffixe %}
          {% set lv_entity = 'input_datetime.humidite_relative_last_valid_ts_' ~ suffixe %}

          {% set brute_raw = states(src) %}
          {% set brute = brute_raw | float(none) %}
          {% set brute_valide =
            brute_raw not in ['unknown','unavailable','none']
            and brute is not none
            and 10 <= brute <= 100
          %}

          {% set last_raw = this.state %}
          {% set last_val = last_raw | float(none) %}
          {% set this_numerique =
            last_raw not in ['unknown','unavailable','none']
            and last_val is not none
          %}

          {% set lv_ts = as_timestamp(states(lv_entity), none) %}
          {% set now_ts = as_timestamp(now()) %}

          {% set ttl = 7200 if trigger.platform == 'homeassistant' else 1800 %}

          {% set lv_age_ok =
            lv_ts is not none
            and (now_ts - lv_ts) <= ttl
          %}

          {% set memoire_exploitable = this_numerique and lv_age_ok %}

          {% if brute_valide and memoire_exploitable %}
            {% set ewma = 0.25 * brute + 0.75 * last_val %}
            {% set delta = ewma - last_val %}
            {% if (delta | abs) <= 4 %}
              ewma
            {% else %}
              limitation_delta
            {% endif %}
          {% elif brute_valide and not memoire_exploitable %}
            initialisation
          {% elif not brute_valide and memoire_exploitable %}
            memoire
          {% else %}
            abstention
          {% endif %}

        delta_brute: &humidite_stabilisee_delta_brute >
          {% set suffixe = this.entity_id | replace('sensor.humidite_relative_stabilisee_', '') %}
          {% set src = 'sensor.humidite_relative_brute_consolidee_' ~ suffixe %}
          {% set brute_raw = states(src) %}
          {% set brute = brute_raw | float(none) %}
          {% set brute_valide =
            brute_raw not in ['unknown','unavailable','none']
            and brute is not none
            and 10 <= brute <= 100
          %}
          {% set last_raw = this.state %}
          {% set last_val = last_raw | float(none) %}
          {% set last_numerique =
            last_raw not in ['unknown','unavailable','none']
            and last_val is not none
          %}
          {% if brute_valide and last_numerique %}
            {{ (brute - last_val) | round(2) }}
          {% else %}
            {{ none }}
          {% endif %}

        delta_applique: &humidite_stabilisee_delta_applique >
          {% set suffixe = this.entity_id | replace('sensor.humidite_relative_stabilisee_', '') %}
          {% set src = 'sensor.humidite_relative_brute_consolidee_' ~ suffixe %}
          {% set lv_entity = 'input_datetime.humidite_relative_last_valid_ts_' ~ suffixe %}

          {% set brute_raw = states(src) %}
          {% set brute = brute_raw | float(none) %}
          {% set brute_valide =
            brute_raw not in ['unknown','unavailable','none']
            and brute is not none
            and 10 <= brute <= 100
          %}

          {% set last_raw = this.state %}
          {% set last_val = last_raw | float(none) %}
          {% set last_numerique =
            last_raw not in ['unknown','unavailable','none']
            and last_val is not none
          %}

          {% set lv_ts = as_timestamp(states(lv_entity), none) %}
          {% set now_ts = as_timestamp(now()) %}

          {% set ttl = 7200 if trigger.platform == 'homeassistant' else 1800 %}

          {% set lv_age_ok =
            lv_ts is not none
            and (now_ts - lv_ts) <= ttl
          %}

          {% if brute_valide and last_numerique and lv_age_ok %}
            {% set ewma = 0.25 * brute + 0.75 * last_val %}
            {% set delta = ewma - last_val %}
            {% if (delta | abs) <= 4 %}
              {{ delta | round(2) }}
            {% else %}
              {% if delta > 0 %}
                4
              {% else %}
                -4
              {% endif %}
            {% endif %}
          {% else %}
            {{ none }}
          {% endif %}

        last_valid_ts_age: &humidite_stabilisee_lv_age >
          {% set suffixe = this.entity_id | replace('sensor.humidite_relative_stabilisee_', '') %}
          {% set lv_entity = 'input_datetime.humidite_relative_last_valid_ts_' ~ suffixe %}
          {% set lv_ts = as_timestamp(states(lv_entity), none) %}
          {% if lv_ts is not none %}
            {{ (as_timestamp(now()) - lv_ts) | round(0) }}
          {% else %}
            {{ none }}
          {% endif %}

        alpha: &humidite_stabilisee_alpha 0.25
        delta_max: &humidite_stabilisee_delta_max 4

