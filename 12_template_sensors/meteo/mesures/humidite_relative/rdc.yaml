# ==========================================================
# 🏠 TEMPLATE TRIGGERED SENSOR — Humidité relative max RDC
# ----------------------------------------------------------
# 🎯 Objectif :
#   Identifier la **pièce la plus humide du rez-de-chaussée (RDC)**,
#   en s’appuyant sur les capteurs consolidés HomeKit + Zigbee :
#     • sensor.humidite_relative_sejour
#     • sensor.humidite_relative_entree
#
# ⚙️ Fonctionnement :
#   - Compare les valeurs numériques valides ∈ ]0 ; 100].
#   - Retourne l’humidité maximale.
#   - Fallback : conserve la dernière valeur connue si aucune donnée n’est valide.
#
# 🧮 Sélection des valides — chaîne de filtres, jamais d’accumulateur
#   La sélection se fait par chaîne `rejectattr | selectattr | sort`,
#   **pas** par `{% set acc = acc + [...] %}` dans une boucle `{% for %}` :
#   en Jinja, une affectation faite dans le corps d’une boucle ne survit
#   pas à la sortie de cette boucle. L’accumulateur restait donc vide et
#   l’agrégat tombait en permanence sur la branche mémoire (état figé,
#   attribut « Mémoire »).
#   Les valeurs sont converties en `float` **avant** le tri : trier des
#   chaînes classerait « 9.5 » après « 10.2 » (ordre lexicographique).
#
# 🧠 Déclencheurs :
#   - Variation de l’humidité dans Séjour ou Entrée.
#   - Démarrage de Home Assistant.
#
# 📊 Type : Trigger Template Sensor
# 📏 Unité : %
# 💨 Device class : humidity
# 📍 Entité : sensor.humidite_relative_max_rdc
# ==========================================================

- trigger:
    - platform: state
      entity_id:
        - sensor.humidite_relative_sejour
        - sensor.humidite_relative_entree
    - platform: homeassistant
      event: start

  sensor:
    - name: "Humidite relative max RDC"
      unique_id: humidite_relative_max_rdc
      unit_of_measurement: "%"
      device_class: humidity

      state: >
        {% set brut = {
          'Séjour': states('sensor.humidite_relative_sejour') | float(none),
          'Entrée': states('sensor.humidite_relative_entree') | float(none)
        } %}

        {% set valides = brut.items()
          | rejectattr('1', 'none')
          | selectattr('1', 'gt', 0)
          | selectattr('1', 'le', 100)
          | sort(attribute=1) | list %}

        {% if valides %}
          {{ valides[-1][1] | round(0) }}
        {% else %}
          {{ states(this.entity_id) }}
        {% endif %}

      attributes:
        piece_la_plus_humide: >
          {% set brut = {
            'Séjour': states('sensor.humidite_relative_sejour') | float(none),
            'Entrée': states('sensor.humidite_relative_entree') | float(none)
          } %}

          {% set valides = brut.items()
            | rejectattr('1', 'none')
            | selectattr('1', 'gt', 0)
            | selectattr('1', 'le', 100)
            | sort(attribute=1) | list %}

          {% if valides %}
            {{ valides[-1][0] }}
          {% else %}
            {{ state_attr(this.entity_id, 'piece_la_plus_humide') or 'Mémoire' }}
          {% endif %}

        sources: >
          - sensor.humidite_relative_sejour
          - sensor.humidite_relative_entree
