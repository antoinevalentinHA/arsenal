# ==========================================================
# 🧠 ARSENAL — TEMPLATE SENSORS
#     Temperature — Facade UI (LTS ready)
# ----------------------------------------------------------
# 🎯 ROLE
#   Projection pure des temperatures stabilisees vers des
#   entites UI exploitables (LTS compatibles).
#
# 🧱 PRINCIPE
#   - Aucune logique metier
#   - Aucune correction
#   - Aucune memoire
#   - Filtrage UNIQUEMENT via availability
#
# 🔒 GARANTIE
#   - state toujours numerique
#   - pas de pollution LTS
# ==========================================================

- sensor:

    - name: "Temperature chambre enfants"
      unique_id: temperature_chambre_enfants
      device_class: temperature
      state_class: measurement
      unit_of_measurement: "°C"

      availability: >
        {{ states('sensor.temperature_stabilisee_chambre_enfants') not in ['unknown','unavailable','none'] }}

      state: >
        {{ states('sensor.temperature_stabilisee_chambre_enfants') | float }}

