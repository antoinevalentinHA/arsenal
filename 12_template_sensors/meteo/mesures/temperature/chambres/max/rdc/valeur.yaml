# ==========================================================
# 🌡️ TEMPLATE TRIGGERED SENSOR — Température max RDC
# ----------------------------------------------------------
# 🎯 Objectif :
#   Identifier la **pièce du rez-de-chaussée la plus chaude**
#   entre l’Entrée et le Séjour, en utilisant les capteurs
#   consolidés (HomeKit + Zigbee).
#
# ⚙️ Fonctionnement :
#   - Utilise les capteurs consolidés :
#       • sensor.temperature_entree
#       • sensor.temperature_sejour
#   - Ignore les valeurs non numériques.
#   - Conserve la dernière valeur connue si tout est indisponible.
#
# 📦 Capteur créé :
#   • sensor.temperature_max_rdc
#
# 🧠 Déclencheurs :
#   - Variation des capteurs consolidés.
#   - Redémarrage de Home Assistant.
#
# 📊 Type : Trigger Template Sensor
# 🌡️ Unité : °C
# 🏠 Classe : temperature
# ==========================================================

- trigger:
    - platform: state
      entity_id:
        - sensor.temperature_entree
        - sensor.temperature_sejour
    - platform: homeassistant
      event: start

  sensor:
    - name: "Température max RDC"
      unique_id: temperature_max_rdc
      unit_of_measurement: "°C"
      state_class: measurement
      device_class: temperature

      state: >
        {% set brut = {
          'Entrée': states('sensor.temperature_entree') | float(none),
          'Séjour': states('sensor.temperature_sejour') | float(none)
        } %}

        {% set valides = brut.items() | rejectattr('1', 'none') | list %}
        {% set last = this.state %}

        {% if valides %}
          {{ (valides | sort(attribute=1))[-1][1] | round(1) }}
        {% else %}
          {{ last }}
        {% endif %}

      attributes:
        piece_rdc_la_plus_chaude: >
          {% set brut = {
            'Entrée': states('sensor.temperature_entree') | float(none),
            'Séjour': states('sensor.temperature_sejour') | float(none)
          } %}
          {% set valides = brut.items() | rejectattr('1', 'none') | list %}
          {% if valides %}
            {{ (valides | sort(attribute=1))[-1][0] }}
          {% else %}
            {{ state_attr(this.entity_id, 'piece_rdc_la_plus_chaude') or 'Mémoire' }}
          {% endif %}

        sources: >
          - sensor.temperature_entree
          - sensor.temperature_sejour
