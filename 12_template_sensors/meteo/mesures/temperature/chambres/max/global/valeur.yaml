# ==========================================================
# 🌡️ TEMPLATE TRIGGERED SENSOR — Température max Chambres
# ----------------------------------------------------------
# 🎯 Objectif :
#   Déterminer la **température la plus élevée** parmi les chambres,
#   en utilisant directement les capteurs consolidés :
#     • sensor.temperature_chambre_enfants
#     • sensor.temperature_chambre_parents
#
# ⚙️ Fonctionnement :
#   - Utilise les capteurs consolidés (HomeKit + fallback Zigbee).
#   - Ignore les valeurs non numériques.
#   - Si aucune valeur vivante ne subsiste, l’agrégat s’abstient (unavailable).
#
# 📦 Capteur créé :
#   • sensor.temperature_max_chambres
#
# 🧠 Déclencheurs :
#   - Variation d’un capteur consolidé.
#   - Redémarrage de Home Assistant.
#
# 📊 Type : Trigger Template Sensor
# 🌡️ Unité : °C
# 🏠 Classe : temperature
# ==========================================================

- trigger:
    - platform: state
      entity_id:
        - sensor.temperature_chambre_enfants
        - sensor.temperature_chambre_parents
    - platform: homeassistant
      event: start

  sensor:
    - name: "Température max Chambres"
      unique_id: temperature_max_chambres
      unit_of_measurement: "°C"
      state_class: measurement
      device_class: temperature

      availability: >
        {{ states('sensor.temperature_chambre_enfants') | float(none) is not none
           or states('sensor.temperature_chambre_parents') | float(none) is not none }}

      state: >
        {% set brut = {
          'Chambre Enfants': states('sensor.temperature_chambre_enfants') | float(none),
          'Chambre Parents': states('sensor.temperature_chambre_parents') | float(none)
        } %}

        {% set valides = brut.items() | rejectattr('1', 'none') | list %}

        {% if valides %}
          {{ (valides | sort(attribute=1))[-1][1] | round(1) }}
        {% endif %}

      attributes:
        chambre_la_plus_chaude: >
          {% set brut = {
            'Chambre Enfants': states('sensor.temperature_chambre_enfants') | float(none),
            'Chambre Parents': states('sensor.temperature_chambre_parents') | float(none)
          } %}
          {% set valides = brut.items() | rejectattr('1', 'none') | list %}
          {% if valides %}
            {{ (valides | sort(attribute=1))[-1][0] }}
          {% else %}
            {{ state_attr(this.entity_id, 'chambre_la_plus_chaude') or 'Mémoire' }}
          {% endif %}

        sources: >
          - sensor.temperature_chambre_enfants
          - sensor.temperature_chambre_parents
