# ==========================================================
# 🌡️ TEMPLATE TRIGGERED SENSORS — Calcul de l’Humidex
# ----------------------------------------------------------
# 🎯 Objectif :
#   Calculer l’indice **Humidex** pour différentes zones de la maison
#   et du bâtiment professionnel, à partir de la **température réelle**
#   et du **point de rosée**.
#
# 🧮 Formule utilisée :
#   e = 6.11 × e^(5417.7530 × ((1/273.16) - (1/(273.15 + Td))))
#   Humidex = T + 0.5555 × (e - 10)
#
# ⚙️ Fonctionnement :
#   - Déclenchement (triggers) :
#       • À chaque changement de température OU de point de rosée
#       • Au démarrage de Home Assistant (event: start)
#   - Si les deux valeurs sont valides :
#       → calcul complet et résultat arrondi à 0.1 point
#   - Sinon :
#       → conservation de la dernière valeur connue
#
# 🧠 Détails techniques :
#   - Un capteur par pièce ou zone : Chambre Enfants, Séjour, Jardin, etc.
#   - Chaque capteur inclut en attributs :
#       • `temperature_source` — l’entité de température utilisée
#       • `rosee_source` — l’entité du point de rosée associée
#   - Unité : aucune (indice sans dimension)
#   - Icône : mdi:thermometer
#
# 🏷️ Exemples d’entités :
#   - sensor.humidex_chambre_parents
#   - sensor.humidex_exterieur
#   - sensor.humidex_commercial
#
# 📊 Type : Trigger Template Sensors
# 📍 Regroupe plusieurs entités similaires (une par zone)
# ==========================================================

- trigger:
    - platform: state
      entity_id:
        - sensor.temperature_entree
        - sensor.point_de_rosee_entree
    - platform: homeassistant
      event: start
  sensor:
    - name: "Humidex Entrée"
      unique_id: humidex_entree
      state: &humidex_logic >
        {% set T_raw = states(this.attributes.temperature_source) %}
        {% set Td_raw = states(this.attributes.rosee_source) %}
        {% if T_raw not in ['unknown','unavailable','none',None]
              and Td_raw not in ['unknown','unavailable','none',None] %}
          {% set T = T_raw | float %}
          {% set Td = Td_raw | float %}
          {% set e = 6.11 * (2.718281828 ** (5417.7530 * ((1/273.16) - (1/(273.15 + Td))))) %}
          {{ (T + 0.5555 * (e - 10)) | round(1) }}
        {% else %}
          {{ states(this.entity_id) }}
        {% endif %}
      attributes:
        temperature_source: sensor.temperature_entree
        rosee_source: sensor.point_de_rosee_entree

