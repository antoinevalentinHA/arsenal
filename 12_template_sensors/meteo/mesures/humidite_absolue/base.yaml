# ==========================================================
# 💧 TEMPLATE TRIGGERED SENSORS — Humidité absolue (toutes zones)
# ----------------------------------------------------------
# 🎯 Objectif :
#   Calculer l’**humidité absolue (en g/m³)** pour chaque pièce intérieure
#   et zone extérieure, à partir de la température et de l’humidité relative.
#
# ⚙️ Fonctionnement :
#   - Chaque capteur est un **Trigger Template Sensor**.
#   - Il se met à jour :
#       • lorsque la température ou l’humidité relative de la pièce change  
#       • au démarrage de Home Assistant (`homeassistant start`)
#
# 🧮 Calcul :
#   Utilise la formule de la vapeur d’eau dans l’air :
#     ```
#     SVP = 6.112 * 10 ** ((7.5 * T) / (237.7 + T))
#     VP  = (RH / 100) * SVP
#     AH  = (2.1674 * VP / (273.15 + T)) * 100
#     ```
#     → où :
#        • T  = Température en °C  
#        • RH = Humidité relative en %  
#        • AH = Humidité absolue en g/m³
#
# 🧠 Détails techniques :
#   - Les valeurs aberrantes (RH < 0 ou RH > 100) sont corrigées automatiquement.  
#   - En cas de mesure invalide (`unknown`, `unavailable`, etc.) :
#       → conservation du dernier état connu.  
#   - Chaque entité conserve ses attributs `temperature_source` et `humidite_source`
#     pour la traçabilité des données.
#
# 📊 Type : Trigger Template Sensors (un par pièce)  
# 📏 Unité : g/m³  
# 🪶 Icône : mdi:water-percent  
# ==========================================================

- trigger:
    - platform: state
      entity_id:
        - sensor.temperature_entree
        - sensor.humidite_relative_entree
    - platform: homeassistant
      event: start
  sensor:
    - name: "Humidité absolue entrée"
      unique_id: humidite_absolue_entree
      unit_of_measurement: "g/m³"
      icon: mdi:water-percent
      state: &absolute_humidity_logic >
        {% set T = states(this.attributes.temperature_source) | float(none) %}
        {% set RH_raw = states(this.attributes.humidite_source) | float(none) %}
        {% if T is not none and RH_raw is not none %}
          {% set RH = 1 if RH_raw <= 0 else (100 if RH_raw > 100 else RH_raw) %}
          {% set svp = 6.112 * (10 ** ((7.5 * T) / (237.7 + T))) %}
          {% set vp = (RH / 100) * svp %}
          {{ (2.1674 * vp / (273.15 + T) * 100) | round(2) }}
        {% else %}
          {{ states(this.entity_id) }}
        {% endif %}
      attributes:
        temperature_source: >
          {{ 'sensor.temperature_entree' }}
        humidite_source: >
          {{ 'sensor.humidite_relative_entree' }}

