# ==========================================================
# 🧠 ARSENAL — TEMPLATE SENSOR
#     Meteo — Pluie (capteurs locaux robustes)
# ----------------------------------------------------------
# 🎯 ROLE
#     Fournir des capteurs locaux, robustes et persistants,
#     pour la pluie, afin de stabiliser les dependances
#     (utility_meter, dashboards, historiques).
#
# 🧩 PERIMETRE
#     - Stabilisation du cumul "aujourd'hui" avec fallback local
#     - Exposition d'un total cumulatif persistant (store)
#
# 🔗 DEPENDANCES
#     - Source brute :
#         sensor.pluviometre_precipitation_aujourd_hui
#     - Stores :
#         input_number.pluie_total_local_store
#         input_number.pluie_today_last
#
# 🚫 NE FAIT PAS
#     - Ne construit pas le total (c'est l'automation)
#     - Ne fait aucun reset temporel (semaine/mois)
#
# 🧠 STATUT ARCHITECTURAL
#     - Abstraction / robustification (couche "donnees locales")
# ==========================================================

- sensor:

    # ------------------------------------------------------------
    # Pluie – Aujourd'hui (local, fallback)
    # ------------------------------------------------------------
    - name: "pluie_aujourdhui_local"
      unique_id: pluie_aujourdhui_local
      unit_of_measurement: "mm"
      device_class: precipitation
      state_class: measurement
      icon: mdi:weather-rainy
      state: &pluie_mm_local_fallback >
        {% set map = {
          'sensor.pluie_aujourdhui_local': 'sensor.pluviometre_precipitation_aujourd_hui',
          'sensor.pluie_total_local': 'input_number.pluie_total_local_store'
        } %}
        {% set src = map.get(this.entity_id) %}
        {% set fallback = this.state | float(0) %}
        {% if not src %}
          {{ fallback }}
        {% else %}
          {% set v = states(src) %}
          {% if v in ['unknown','unavailable','none','None',''] %}
            {{ fallback }}
          {% else %}
            {{ v | float(fallback) }}
          {% endif %}
        {% endif %}

    # ------------------------------------------------------------
    # Pluie – Total cumulatif local (expose le store)
    # ------------------------------------------------------------
    - name: "pluie_total_local"
      unique_id: pluie_total_local
      unit_of_measurement: "mm"
      device_class: precipitation
      state_class: total
      icon: mdi:weather-pouring
      state: *pluie_mm_local_fallback