# ==========================================================
# 🧠 ARSENAL — TEMPLATE SENSOR
#     NAS Imprimerie — Uptime en jours
# ----------------------------------------------------------
# 🎯 ROLE
#
#     Exposer l'uptime du NAS Imprimerie dans un format lisible
#     pour l'interface utilisateur.
#
# 🧩 PERIMETRE
#
#     - Lecture du capteur technique en secondes
#     - Conversion en jours
#     - Arrondi a une decimale
#
# 🔗 DEPENDANCES
#
#     - sensor.nas_imprimerie_uptime
#
# 🚫 INTERDITS
#
#     - Aucun acces direct au JSON brut
#     - Aucun diagnostic de connectivite
#     - Aucune decision de sante systeme
#     - Aucun pilotage
#
# 📊 SORTIE
#
#     - sensor.nas_imprimerie_uptime_jours
#     - Unite : j
#
# 🧠 NOTE ARCHITECTURALE
#
#     Ce capteur est un derive UI.
#     Le capteur source conserve la duree technique en secondes.
# ==========================================================

- sensor:
    - name: NAS Imprimerie Uptime jours
      unique_id: nas_imprimerie_uptime_jours
      unit_of_measurement: "j"

      # Indisponibilite NATIVE alignee sur la source (nas_mesures.yaml) :
      # si la source n'est pas numerique, ce derive devient `unavailable`
      # plutot que d'emettre la chaine `unknown` en `state` d'un capteur
      # numerique (erreur validateur "expected a number"). Idiome
      # availability/this de la doctrine C27/C28.
      availability: >
        {{ is_number(states('sensor.nas_imprimerie_uptime')) }}
      state: >
        {{ (states('sensor.nas_imprimerie_uptime') | float / 86400) | round(1) }}
