# ==========================================================
# 🧠 ARSENAL — TEMPLATE SENSOR
#     Perception — Régime acoustique machines
# ----------------------------------------------------------
# 📜 Contrats  : CONTRAT_PERCEPTION_BRUIT_KOMORI.md v1.1
#                CONTRAT_PERCEPTION_BRUIT_BOBST.md  v1.0
#                CONTRAT_PERCEPTION_BRUIT_MEDIA.md  v1.0
# 🎯 Rôle      : Transformation bruit → régime acoustique
#                pour lecture humaine / UI.
# 🧱 Principe  : Lecture pure — aucun filtrage, hystérésis,
#                TTL ou logique métier.
#
# ⚠️ Auto-paramétrage par split(entity_id).
# Les entity_id DOIVENT se terminer par _komori|_bobst|_media.
# ==========================================================
- sensor:

    - name: "Régime acoustique Komori"
      unique_id: regime_acoustique_komori
      icon: mdi:waveform

      availability: &regime_acoustique_availability >
        {% set machine = this.entity_id.split('_')[-1] %}
        {% set machines = ['komori', 'bobst', 'media'] %}
        {% set v = states('sensor.bruit_' ~ machine) | float(none) %}
        {{ machine in machines and v is not none }}

      state: &regime_acoustique_state >
        {% set machine = this.entity_id.split('_')[-1] %}
        {% set seuils = {
          'komori': [50, 58, 65, 75],
          'bobst':  [42, 60, 70, 75],
          'media':  [47, 58, 70, 78]
        } %}
        {% set s = seuils.get(machine) %}
        {% set v = states('sensor.bruit_' ~ machine) | float(none) %}
        {% if s is none or v is none %}indisponible
        {% elif v < s[0] %}bas
        {% elif v < s[1] %}transition
        {% elif v < s[2] %}haut_modere
        {% elif v < s[3] %}haut_eleve
        {% else %}haut_extreme
        {% endif %}

      attributes: &regime_acoustique_attributes
        source: >
          {% set machine = this.entity_id.split('_')[-1] %}
          {{ 'sensor.bruit_' ~ machine }}
        couche: "perception"
        role: "regime_acoustique_lecture_pure"
        interpretation_metier: false
        hysteresis: false
        ttl: false

    - name: "Régime acoustique Bobst"
      unique_id: regime_acoustique_bobst
      icon: mdi:waveform
      availability: *regime_acoustique_availability
      state: *regime_acoustique_state
      attributes: *regime_acoustique_attributes

    - name: "Régime acoustique Media"
      unique_id: regime_acoustique_media
      icon: mdi:waveform
      availability: *regime_acoustique_availability
      state: *regime_acoustique_state
      attributes: *regime_acoustique_attributes