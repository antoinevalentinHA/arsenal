# ==========================================================
# 🧠 ARSENAL — TEMPLATE SENSOR
#     Perception — Régime acoustique numérique machines
# ----------------------------------------------------------
# 📜 Contrats  : CONTRAT_PERCEPTION_BRUIT_KOMORI.md v1.1
#                CONTRAT_PERCEPTION_BRUIT_BOBST.md  v1.0
#                CONTRAT_PERCEPTION_BRUIT_MEDIA.md  v1.0
# 🎯 Rôle      : Transformation régime acoustique → valeur
#                numérique pour statistiques.
# 🧱 Principe  : Lecture pure — aucun filtrage, hystérésis,
#                TTL ou logique métier.
#
# Mapping :
#   0 = bas
#   1 = transition
#   2 = haut_modere
#   3 = haut_eleve
#   4 = haut_extreme
#
# ⚠️ Auto-paramétrage par split(entity_id).
# Les entity_id DOIVENT se terminer par _komori|_bobst|_media.
# ==========================================================
- sensor:

    - name: "Régime acoustique numérique Komori"
      unique_id: regime_acoustique_numerique_komori
      icon: mdi:counter
      state_class: measurement

      availability: &regime_acoustique_numerique_availability >
        {% set machine = this.entity_id.split('_')[-1] %}
        {% set machines = ['komori', 'bobst', 'media'] %}
        {% set v = states('sensor.bruit_' ~ machine) | float(none) %}
        {{ machine in machines and v is not none }}

      state: &regime_acoustique_numerique_state >
        {% set machine = this.entity_id.split('_')[-1] %}
        {% set seuils = {
          'komori': [50, 58, 65, 75],
          'bobst':  [42, 60, 70, 75],
          'media':  [47, 58, 70, 78]
        } %}
        {% set s = seuils.get(machine) %}
        {% set v = states('sensor.bruit_' ~ machine) | float(none) %}
        {% if s is none or v is none %}0
        {% elif v < s[0] %}0
        {% elif v < s[1] %}1
        {% elif v < s[2] %}2
        {% elif v < s[3] %}3
        {% else %}4
        {% endif %}

      attributes: &regime_acoustique_numerique_attributes
        source: >
          {% set machine = this.entity_id.split('_')[-1] %}
          {{ 'sensor.bruit_' ~ machine }}
        couche: "perception"
        role: "regime_acoustique_numerique_statistiques"

    - name: "Régime acoustique numérique Bobst"
      unique_id: regime_acoustique_numerique_bobst
      icon: mdi:counter
      state_class: measurement
      availability: *regime_acoustique_numerique_availability
      state: *regime_acoustique_numerique_state
      attributes: *regime_acoustique_numerique_attributes

    - name: "Régime acoustique numérique Media"
      unique_id: regime_acoustique_numerique_media
      icon: mdi:counter
      state_class: measurement
      availability: *regime_acoustique_numerique_availability
      state: *regime_acoustique_numerique_state
      attributes: *regime_acoustique_numerique_attributes