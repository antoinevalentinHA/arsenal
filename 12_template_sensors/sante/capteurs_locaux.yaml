# ==========================================================
#  TEMPLATE SENSORS — Données Withings fiabilisées localement
#  ----------------------------------------------------------
#  🧠 Rôle :
#     Stabiliser les valeurs Withings pour éviter les coupures
#     en cas de token expiré, d’erreur d’API ou de données manquantes.
#
#  💡 Avantages :
#     - Maintient la dernière donnée valide
#     - Zéro "unknown" dans les dashboards
#     - Cohérence avec les statistiques locales
#     - Base future pour les analyses santé et sommeil
#
#  ✅ Compatibilité : Home Assistant 2024.8+
# ==========================================================

- sensor:
    ########################################################
    # 💤 SOMMEIL / RÉCUPÉRATION (FIABILISÉS)
    ########################################################
    - name: "withings_sleep_score_local"
      unique_id: "withings_sleep_score_local"
      icon: mdi:sleep
      unit_of_measurement: "pts"
      state: &withings_state_float_0 >
        {% set src_entity = this.entity_id %}
        {% if src_entity.endswith('_local') %}
          {% set src_entity = src_entity[:-6] %}
        {% endif %}
        {% set src = states(src_entity) %}
        {% set old = this.state | float(default=0) %}
        {% if src not in ['unknown','unavailable','',None] %}
          {{ src | float | round(0) }}
        {% else %}
          {{ old }}
        {% endif %}

    - name: "withings_sommeil_profond_local"
      unique_id: "withings_sommeil_profond_local"
      icon: mdi:power-sleep
      unit_of_measurement: "h"
      state: &withings_state_float_2 >
        {% set src_entity = this.entity_id %}
        {% if src_entity.endswith('_local') %}
          {% set src_entity = src_entity[:-6] %}
        {% endif %}
        {% set src = states(src_entity) %}
        {% set old = this.state | float(default=0) %}
        {% if src not in ['unknown','unavailable','',None] %}
          {{ src | float | round(2) }}
        {% else %}
          {{ old }}
        {% endif %}

    - name: "withings_sommeil_leger_local"
      unique_id: "withings_sommeil_leger_local"
      icon: mdi:weather-night
      unit_of_measurement: "h"
      state: *withings_state_float_2

    - name: "withings_rem_sleep_local"
      unique_id: "withings_rem_sleep_local"
      icon: mdi:brain
      unit_of_measurement: "h"
      state: *withings_state_float_2

    - name: "withings_wakeup_count_local"
      unique_id: "withings_wakeup_count_local"
      icon: mdi:sleep-off
      state: &withings_state_int >
        {% set src_entity = this.entity_id %}
        {% if src_entity.endswith('_local') %}
          {% set src_entity = src_entity[:-6] %}
        {% endif %}
        {% set src = states(src_entity) %}
        {% set old = this.state | int(default=0) %}
        {% if src not in ['unknown','unavailable','',None] %}
          {{ src | int }}
        {% else %}
          {{ old }}
        {% endif %}

    ########################################################
    # ❤️ FRÉQUENCE CARDIAQUE — MIN / MOYENNE / MAX (FIABILISÉS)
    ########################################################
    - name: "withings_frequence_cardiaque_minimale_local"
      unique_id: "withings_frequence_cardiaque_minimale_local"
      icon: mdi:heart-off
      unit_of_measurement: "bpm"
      state: *withings_state_int

    - name: "withings_average_heart_rate_local"
      unique_id: "withings_average_heart_rate_local"
      icon: mdi:heart-pulse
      unit_of_measurement: "bpm"
      state: *withings_state_int

    - name: "withings_frequence_cardiaque_maximale_local"
      unique_id: "withings_frequence_cardiaque_maximale_local"
      icon: mdi:heart-flash
      unit_of_measurement: "bpm"
      state: *withings_state_int

    ########################################################
    # ❤️ SANTÉ / FREQUENCE RESPIRATOIRE (FIABILISÉS)
    ########################################################
    - name: "withings_minimum_respiratory_rate_local"
      unique_id: "withings_minimum_respiratory_rate_local"
      icon: mdi:lungs
      unit_of_measurement: "rpm"
      state: &withings_state_float_1 >
        {% set src_entity = this.entity_id %}
        {% if src_entity.endswith('_local') %}
          {% set src_entity = src_entity[:-6] %}
        {% endif %}
        {% set src = states(src_entity) %}
        {% set old = this.state | float(default=0) %}
        {% if src not in ['unknown','unavailable','',None] %}
          {{ src | float | round(1) }}
        {% else %}
          {{ old }}
        {% endif %}

    - name: "withings_average_respiratory_rate_local"
      unique_id: "withings_average_respiratory_rate_local"
      icon: mdi:lungs
      unit_of_measurement: "rpm"
      state: *withings_state_float_1

    - name: "withings_maximum_respiratory_rate_local"
      unique_id: "withings_maximum_respiratory_rate_local"
      icon: mdi:lungs
      unit_of_measurement: "rpm"
      state: *withings_state_float_1

    ########################################################
    # 🏃 ACTIVITÉ PHYSIQUE / CALORIES (FIABILISÉS)
    ########################################################
    - name: "withings_steps_today_local"
      unique_id: "withings_steps_today_local"
      icon: mdi:walk
      unit_of_measurement: "pas"
      state: *withings_state_int

    - name: "withings_total_calories_burnt_today_local"
      unique_id: "withings_total_calories_burnt_today_local"
      icon: mdi:fire
      unit_of_measurement: "kcal"
      state: *withings_state_int

    - name: "withings_distance_travelled_today_local"
      unique_id: "withings_distance_travelled_today_local"
      icon: mdi:map-marker-distance
      unit_of_measurement: "m"
      state: *withings_state_int

    ########################################################
    # 🌙 SOMMEIL — INDICATEURS SECONDAIRES (FIABILISÉS)
    ########################################################
    - name: "withings_snoring_episode_count_local"
      unique_id: "withings_snoring_episode_count_local"
      icon: mdi:weather-windy
      state: *withings_state_int

    - name: "withings_ronflement_local"
      unique_id: "withings_ronflement_local"
      icon: mdi:volume-high
      unit_of_measurement: "min"
      state: *withings_state_int

    - name: "withings_breathing_disturbances_intensity_local"
      unique_id: "withings_breathing_disturbances_intensity_local"
      icon: mdi:lungs
      unit_of_measurement: "index"
      state: *withings_state_int
