# ==========================================================
# 🧠 ARSENAL — TEMPLATE BINARY SENSORS (MOUVEMENTS)
# ----------------------------------------------------------
# 🎯 ROLE
#   - Couche AGREGATION : binary_sensor.mouvement_<zone> (OR)
#
# 🧱 PRINCIPE
#   - N2 depend UNIQUEMENT des capteurs N1 (binary_sensor.mouvement_*_<index>)
#   - Aucun trigger-based ici : recalcul template pur
#   - Entites toujours evaluables
#   - L’indispo remonte via les attributs `unavailable` des N1
#
# 📌 NOTE
#   - Cette couche represente une verite de zone
#   - Elle ne remplace pas les N1 pour les besoins de diagnostic fin
# ==========================================================

- binary_sensor:

    # ------------------------------------------------------
    # ANCRE 1 — AGREGATION OR (liste -> zone)
    # ------------------------------------------------------
    - name: "Mouvement Entree"
      unique_id: mouvement_entree
      device_class: motion
      variables:
        members:
          - binary_sensor.mouvement_entree_1

      state: &mouvement_or_state >
        {% set ns = namespace(any_on=false) %}
        {% for e in members %}
          {% if states(e) == 'on' %}
            {% set ns.any_on = true %}
          {% endif %}
        {% endfor %}
        {{ 'on' if ns.any_on else 'off' }}

      attributes: &mouvement_or_attr
        members: "{{ members }}"
        active_members: >
          {% set ns = namespace(items=[]) %}
          {% for e in members %}
            {% if states(e) == 'on' %}
              {% set ns.items = ns.items + [e] %}
            {% endif %}
          {% endfor %}
          {{ ns.items }}
        unavailable_members: >
          {% set ns = namespace(items=[]) %}
          {% for e in members %}
            {% if state_attr(e, 'unavailable') == true %}
              {% set ns.items = ns.items + [e] %}
            {% endif %}
          {% endfor %}
          {{ ns.items }}
        any_unavailable: >
          {% set ns = namespace(any_unav=false) %}
          {% for e in members %}
            {% if state_attr(e, 'unavailable') == true %}
              {% set ns.any_unav = true %}
            {% endif %}
          {% endfor %}
          {{ ns.any_unav }}

      icon: &mouvement_or_icon >
        {% set ns = namespace(any_on=false, any_unav=false) %}
        {% for e in members %}
          {% if states(e) == 'on' %}
            {% set ns.any_on = true %}
          {% endif %}
          {% if state_attr(e, 'unavailable') == true %}
            {% set ns.any_unav = true %}
          {% endif %}
        {% endfor %}
        {{ 'mdi:alert-circle-outline'
           if ns.any_unav
           else ('mdi:motion-sensor' if ns.any_on else 'mdi:motion-sensor-off') }}

    - name: "Mouvement Garage"
      unique_id: mouvement_garage
      device_class: motion
      variables:
        members:
          - binary_sensor.mouvement_garage_1
          - binary_sensor.mouvement_garage_2
          - binary_sensor.mouvement_garage_3
      state: *mouvement_or_state
      attributes: *mouvement_or_attr
      icon: *mouvement_or_icon

    - name: "Mouvement Sejour"
      unique_id: mouvement_sejour
      device_class: motion
      variables:
        members:
          - binary_sensor.mouvement_sejour_1
          - binary_sensor.mouvement_sejour_2
      state: *mouvement_or_state
      attributes: *mouvement_or_attr
      icon: *mouvement_or_icon