# ==========================================================
# 🧭 TEMPLATE TRIGGERED SENSOR — Audi e-tron (Kilométrage)
# ----------------------------------------------------------
# 🎯 Objectif :
#   Stabiliser la donnée `sensor.audi_a3_sportback_e_tron_mileage`
#   afin d’éviter les interruptions ou erreurs de valeur,
#   et d’assurer un affichage fiable sur le dashboard.
#
# ⚙️ Fonctionnement :
#   - Déclenchement à chaque changement de valeur du capteur source.
#   - Réévaluation automatique au démarrage de Home Assistant.
#   - Si donnée numérique valide → reprise directe.
#   - Sinon → conservation de la dernière valeur connue.
#
# 🧮 Source : sensor.audi_a3_sportback_e_tron_mileage
# 📊 Type : Trigger Template Sensor
# 📏 Unité : km
# ==========================================================

- trigger:
    - platform: state
      entity_id: sensor.audi_a3_sportback_e_tron_mileage

  sensor:
    - name: "Audi e-tron – Kilométrage (Local)"
      unique_id: audi_a3_sportback_e_tron_mileage_local
      unit_of_measurement: "km"
      state_class: measurement
      state: >
        {% set v = states('sensor.audi_a3_sportback_e_tron_mileage') %}
        {% if v | is_number %}
          {{ v | float }}
        {% else %}
          {{ this.state | float(0) }}
        {% endif %}