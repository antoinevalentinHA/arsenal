# ==========================================================
# 🪟 TEMPLATE TRIGGERED BINARY SENSOR — Audi e-tron (Fenêtre arrière gauche)
# ----------------------------------------------------------
# 🎯 Objectif :
#   Stabiliser l’état du capteur `binary_sensor.audi_a3_sportback_e_tron_left_rear_window`
#   pour éviter les états “unknown” et conserver le dernier état valide.
#
# 🧮 Source : binary_sensor.audi_a3_sportback_e_tron_left_rear_window
# 📊 Type : Trigger Template Binary Sensor
# ==========================================================

- trigger:
    - platform: state
      entity_id: binary_sensor.audi_a3_sportback_e_tron_left_rear_window

  binary_sensor:
    - name: "Audi e-tron – Fenêtre arrière gauche (Local)"
      unique_id: audi_a3_sportback_e_tron_left_rear_window_local
      device_class: window
      state: >
        {% set s = states('binary_sensor.audi_a3_sportback_e_tron_left_rear_window') %}
        {% if s in ['on','off'] %}
          {{ s }}
        {% else %}
          {{ this.state | default('off') }}
        {% endif %}
