# ==========================================================
# 🪟 TEMPLATE TRIGGERED BINARY SENSOR — Audi e-tron (Fenêtre avant droite)
# ----------------------------------------------------------
# 🎯 Objectif :
#   Stabiliser l’état du capteur `binary_sensor.audi_a3_sportback_e_tron_right_front_window`
#   pour garantir un affichage constant sur le dashboard.
#
# 🧮 Source : binary_sensor.audi_a3_sportback_e_tron_right_front_window
# 📊 Type : Trigger Template Binary Sensor
# ==========================================================

- trigger:
    - platform: state
      entity_id: binary_sensor.audi_a3_sportback_e_tron_right_front_window

  binary_sensor:
    - name: "Audi e-tron – Fenêtre avant droite (Local)"
      unique_id: audi_a3_sportback_e_tron_right_front_window_local
      device_class: window
      state: >
        {% set s = states('binary_sensor.audi_a3_sportback_e_tron_right_front_window') %}
        {% if s in ['on','off'] %}
          {{ s }}
        {% else %}
          {{ this.state | default('off') }}
        {% endif %}
