# ==========================================================
# 🧠 ARSENAL — TEMPLATE SENSORS : AGE DES DONNEES (CANON)
# ----------------------------------------------------------
# 🎯 RÔLE
#   Normaliser le calcul "age des donnees" (minutes) pour
#   toutes les integrations basees sur un group.* de capteurs.
#
# ✅ SORTIE CANON
#   - Valeur : entier (minutes)
#   - Unité  : "min"
#   - Plafond: 300
#   - Fallback : conserve la derniere valeur numerique (999 si vide)
#
# ⚠️ NOTE UI
#   - Pas de device_class: duration
#     (sinon l'UI peut afficher 4:00 au lieu de 240 min)
# ==========================================================

- sensor:
    - &age_donnees_canon
      unit_of_measurement: "min"
      state_class: measurement

      state: >
        {% set UNAV = ['unknown','unavailable','', none] %}
        {% set MAX_MINUTES = 300 %}
        {% set grp = state_attr(this.entity_id, 'source_group') %}

        {% if grp in UNAV %}
          {{ this.state | float(999) }}
        {% else %}
          {% set items = expand(grp) %}
          {% if items | count > 0 %}
            {% set entites = items
                | rejectattr('state', 'in', ['unknown','unavailable'])
                | selectattr('last_updated', 'defined')
                | list %}
            {% if entites | count > 0 %}
              {% set last = entites | map(attribute='last_updated') | map('as_timestamp') | max %}
              {% set age = ((now().timestamp() - last) / 60) | int(0) %}
              {{ [age, MAX_MINUTES] | min }}
            {% else %}
              {{ this.state | float(999) }}
            {% endif %}
          {% else %}
            {{ this.state | float(999) }}
          {% endif %}
        {% endif %}

    - <<: *age_donnees_canon
      name: "Audi Age Donnees"
      unique_id: audi_age_donnees
      icon: mdi:car-clock
      attributes:
        source_group: "group.audi_capteurs"

    - <<: *age_donnees_canon
      name: "Petite Maison Cumulus Age Donnees"
      unique_id: petite_maison_cumulus_age_donnees
      icon: mdi:water-boiler
      attributes:
        source_group: "group.petite_maison_cumulus"

    - <<: *age_donnees_canon
      name: "Fujitsu Age donnees"
      unique_id: fujitsu_age_donnees
