# ==========================================================
# 📡 TEMPLATE SENSORS — BSSID téléphones (abstraction)
# ----------------------------------------------------------
# Rôle :
#   Exposer des entités stables pour permettre des triggers
#   sur des capteurs Wi-Fi dynamiques (définis via helpers).
# ==========================================================

- sensor:

    - name: "telephone_parent_1_bssid_dynamic"
      unique_id: telephone_parent_1_bssid_dynamic
      state: >
        {% set ent = states('input_text.telephone_parent_1_wifi_bssid') %}
        {{ states(ent) }}

    - name: "telephone_parent_2_bssid_dynamic"
      unique_id: telephone_parent_2_bssid_dynamic
      state: >
        {% set ent = states('input_text.telephone_parent_2_wifi_bssid') %}
        {{ states(ent) }}
