# ==========================================================
# 🧠 ARSENAL — BINARY SENSOR
#     Intégrité paramètres — VMC
# ----------------------------------------------------------
# 🎯 RÔLE
#
#     Détecter toute incohérence de configuration des seuils
#     d'humidité relative et de CO₂ pilotant la VMC.
#
# ----------------------------------------------------------
# 🧱 PRINCIPE
#
#     - Lecture pure
#     - Aucune action, aucune correction
#     - Toute source indisponible est considérée comme
#       rendant les invariants violés (pas d'optimisme silencieux).
#
# ----------------------------------------------------------
# 🚨 INVARIANTS SURVEILLÉS
#
#     1) vmc_seuil_on > vmc_seuil_off
#        (hystérésis HR : déclenchement au-dessus,
#        arrêt au-dessous)
#
#     2) vmc_co2_seuil_on > vmc_co2_seuil_off
#        (hystérésis CO₂ : idem)
#
#     Toute violation = paramètres INVALIDES
#
# ----------------------------------------------------------
# 🔗 DÉPENDANCES
#
#     - input_number.vmc_seuil_on
#     - input_number.vmc_seuil_off
#     - input_number.vmc_co2_seuil_on
#     - input_number.vmc_co2_seuil_off
#
# ----------------------------------------------------------
# 📊 ATTRIBUTS EXPOSÉS
#
#     - seuils_hr_invalides     : invariant 1 violé
#     - seuils_co2_invalides    : invariant 2 violé
#     - hr_on_indisponible      : helper vmc_seuil_on indispo
#     - hr_off_indisponible     : helper vmc_seuil_off indispo
#     - co2_on_indisponible     : helper vmc_co2_seuil_on indispo
#     - co2_off_indisponible    : helper vmc_co2_seuil_off indispo
#     - cause                   : énumération priorisée
#
# ----------------------------------------------------------
# 🚫 INTERDITS
#
#     - Aucun pilotage des relais VMC
#     - Aucune logique d'aération
#     - Aucune correction automatique
#
# ----------------------------------------------------------
# 📍 ENTITÉ
#
#     binary_sensor.parametres_invalides_vmc
#
# ----------------------------------------------------------
# 🧠 STATUT
#
#     Capteur de diagnostic — Intégrité paramètres VMC
# ==========================================================

- binary_sensor:
    - name: "VMC — Paramètres invalides"
      unique_id: parametres_invalides_vmc
      default_entity_id: binary_sensor.parametres_invalides_vmc
      icon: >
        mdi:alert-circle-outline
      state: >
        {% set hr_on = states('input_number.vmc_seuil_on') | float(none) %}
        {% set hr_off = states('input_number.vmc_seuil_off') | float(none) %}
        {% set co2_on = states('input_number.vmc_co2_seuil_on') | float(none) %}
        {% set co2_off = states('input_number.vmc_co2_seuil_off') | float(none) %}
        {% set indisponible =
             hr_on is none
          or hr_off is none
          or co2_on is none
          or co2_off is none %}
        {% set seuils_hr_invalides = indisponible or not (hr_on > hr_off) %}
        {% set seuils_co2_invalides = indisponible or not (co2_on > co2_off) %}
        {{ seuils_hr_invalides or seuils_co2_invalides }}
      attributes:
        seuils_hr_invalides: >
          {% set hr_on = states('input_number.vmc_seuil_on') | float(none) %}
          {% set hr_off = states('input_number.vmc_seuil_off') | float(none) %}
          {{ hr_on is none or hr_off is none or not (hr_on > hr_off) }}
        seuils_co2_invalides: >
          {% set co2_on = states('input_number.vmc_co2_seuil_on') | float(none) %}
          {% set co2_off = states('input_number.vmc_co2_seuil_off') | float(none) %}
          {{ co2_on is none or co2_off is none or not (co2_on > co2_off) }}
        hr_on_indisponible: >
          {{ states('input_number.vmc_seuil_on')
             in ['unknown', 'unavailable', 'none', ''] }}
        hr_off_indisponible: >
          {{ states('input_number.vmc_seuil_off')
             in ['unknown', 'unavailable', 'none', ''] }}
        co2_on_indisponible: >
          {{ states('input_number.vmc_co2_seuil_on')
             in ['unknown', 'unavailable', 'none', ''] }}
        co2_off_indisponible: >
          {{ states('input_number.vmc_co2_seuil_off')
             in ['unknown', 'unavailable', 'none', ''] }}
        cause: >
          {% set hr_on = states('input_number.vmc_seuil_on') | float(none) %}
          {% set hr_off = states('input_number.vmc_seuil_off') | float(none) %}
          {% set co2_on = states('input_number.vmc_co2_seuil_on') | float(none) %}
          {% set co2_off = states('input_number.vmc_co2_seuil_off') | float(none) %}
          {% if hr_on is none or hr_off is none or co2_on is none or co2_off is none %}
            helpers_indisponibles
          {% elif not (hr_on > hr_off) %}
            seuils_hr_invalides
          {% elif not (co2_on > co2_off) %}
            seuils_co2_invalides
          {% else %}
            none
          {% endif %}
