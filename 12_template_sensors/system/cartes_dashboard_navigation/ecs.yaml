# ==========================================================
#  TEMPLATE SENSOR : État Dashboard – ECS
# ----------------------------------------------------------
#  🧠 Rôle :
#     Fournir un indicateur visuel minimal pour la navigation
#     du dashboard ECS.
#
#  🎯 États (volontairement réduits) :
#     - alert → ECS active ou ballon encore chaud
#     - off   → rien à signaler
#
#  ⚠️ Simplification assumée :
#     - Aucun état intermédiaire
#     - Aucun bleu
#     - Les valeurs invalides retombent sur off
# ==========================================================

- sensor:

    - name: "etat_ecs_dashboard"
      unique_id: etat_ecs_dashboard
      state: >
        {% set consigne_raw = states('sensor.ecs_consigne_chaudiere_securisee') %}
        {% set temp_raw = states('sensor.ecs_temperature_ballon_securisee') %}

        {% set consigne = consigne_raw | float(none) %}
        {% set temp = temp_raw | float(none) %}

        {% if consigne is not none and consigne != 10 %}
          alert
        {% elif temp is not none and temp > 35 %}
          alert
        {% else %}
          off
        {% endif %}