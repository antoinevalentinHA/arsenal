# ==========================================================
#  TEMPLATE SENSOR : État Dashboard – VMC
# ----------------------------------------------------------
#  🧠 Rôle :
#     Fournir un indicateur visuel minimal pour la navigation.
#
#  🎯 États (volontairement réduits) :
#     - alert → VMC en haute vitesse
#     - off   → fonctionnement normal ou état non qualifié
#
#  ⚠️ Simplification assumée :
#     - La vitesse normale n’est pas valorisée (gris neutre)
#     - Aucun diagnostic fin (unknown / unavailable absorbés)
# ==========================================================

- sensor:

    - name: "etat_vmc_dashboard"
      unique_id: etat_vmc_dashboard
      state: >
        {% set hv = states('input_boolean.vmc_haute_vitesse') %}

        {% if hv == 'on' %}
          alert
        {% else %}
          off
        {% endif %}