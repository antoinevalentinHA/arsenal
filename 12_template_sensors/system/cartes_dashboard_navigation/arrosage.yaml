# ==========================================================
#  TEMPLATE SENSOR : État Dashboard – Arrosage
# ----------------------------------------------------------
#  🧠 Rôle :
#     Fournir un état visuel synthétique destiné au bouton de
#     navigation Arrosage (lecture rapide uniquement, NAV/HUB).
#
#  🎯 États possibles (échelle de sévérité) :
#     - alert     → besoin hydrique NON couvert par la chaîne
#                   autonome → à l'utilisateur d'agir
#     - vigilance → besoin hydrique détecté ET pris en charge par
#                   la chaîne autonome (elle arrosera) → à savoir
#     - off       → sol suffisant, repos
#     - unknown   → donnée non exploitable (besoin/pont illisible)
#
#  🎨 Couleur (Exception 3 — NAV/HUB) :
#     alert→🔴  vigilance→🟡  off→⚪  unknown→⚪ (gris indispo prime)
#
#  🧭 Seuil de parole (doctrine cockpit) :
#     L'arrosage est silencieux par philosophie. Deux niveaux au
#     dessus du gris, jamais confondus :
#       🟡 « à savoir » — il y a un besoin, le système va s'en
#          charger (arrosage d'aube / en cours / pluie qui couvre) ;
#          l'utilisateur voit le besoin sans avoir à ouvrir le
#          dashboard, sans être alerté (vigilance, non bloquant).
#       🔴 « à toi » — il y a un besoin que la chaîne autonome ne
#          couvrira PAS : maître coupé, ou blocage infra (pont /
#          préconditions / canal sol). Niveau notification
#          persistante : une action humaine est requise.
#     Sol suffisant → gris : la norme, hors période sèche.
#
#  🕰️ Historique :
#     - Avant : `alert` marquait l'épisode d'action (arrose /
#       intention on) → tuile grise justement quand le sol avait
#       soif hors fenêtre (bug de lecture).
#     - #552 : `alert` recalibré sur le besoin NON couvert (un
#       besoin couvert restait gris → invisible).
#     - Ici : le besoin couvert devient 🟡 (formalisation du jaune
#       NAV, Exception 3) → le besoin est enfin visible sans être
#       traité en alarme. Cf. cadrage_couleurs_icones_navigation.md
#       §2 octies.
#
#  🔗 Entrées :
#     - binary_sensor.arrosage_besoin_sol         (le besoin brut)
#     - binary_sensor.arrosage_session_en_cours   (pris en charge)
#     - binary_sensor.arrosage_suspension_pluie   (pris en charge)
#     - input_boolean.arrosage_automatique_actif  (chaîne autonome)
#     - binary_sensor.arrosage_rain_bird_preconditions_runtime
#     - binary_sensor.rain_bird_pont_donnees_disponibles
#     - sensor.jardin_reservoir_sol_etat
# ==========================================================

- sensor:

    - name: "etat_arrosage_dashboard"
      unique_id: etat_arrosage_dashboard
      state: >
        {% set UNAV = ['unknown', 'unavailable', 'none', 'None', ''] %}
        {% set besoin_raw = states('binary_sensor.arrosage_besoin_sol') %}
        {% set dispo = states('binary_sensor.rain_bird_pont_donnees_disponibles') %}

        {% set besoin = besoin_raw == 'on' %}
        {% set session = is_state('binary_sensor.arrosage_session_en_cours', 'on') %}
        {% set pluie = is_state('binary_sensor.arrosage_suspension_pluie', 'on') %}
        {% set maitre = is_state('input_boolean.arrosage_automatique_actif', 'on') %}
        {% set precond = is_state('binary_sensor.arrosage_rain_bird_preconditions_runtime', 'on') %}
        {% set canal_ok = states('sensor.jardin_reservoir_sol_etat') in ['complet', 'degrade'] %}

        {# Le besoin est « couvert » si la chaîne autonome s'en
           chargera (maître ON + infra OK → arrosage d'aube),
           s'il est arrosé maintenant, ou si la pluie le couvre.
           Volontairement SANS fenêtre ni cooldown : un besoin hors
           fenêtre reste couvert (l'aube viendra). #}
        {% set couvert = (maitre and dispo == 'on' and precond and canal_ok) or session or pluie %}

        {% if besoin_raw in UNAV or dispo == 'unavailable' %}
          unknown
        {% elif besoin and not couvert %}
          alert
        {% elif besoin %}
          vigilance
        {% else %}
          off
        {% endif %}
