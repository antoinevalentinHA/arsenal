# ==========================================================
#  TEMPLATE SENSOR : État Dashboard – Éclairage
# ----------------------------------------------------------
#  🧠 Rôle :
#     Déterminer si une source lumineuse (intérieure ou
#     extérieure) contrôlée par HA est active.
#
#  🎯 États :
#     - alert → au moins une lumière allumée
#     - off   → tout est éteint
#
#  📐 Périmètre :
#     Chaque source comptée ici correspond à une carte
#     visible du dashboard Éclairage — la couleur de la
#     tuile NAV doit toujours être explicable à l'écran.
#
#     Garage : l'état logique input_boolean.garage_light_state
#     fait foi (contrat garage.md — switch.lumiere_garage
#     reflète la dernière commande, pas l'état réel de la
#     lampe ; c'est le booléen que le dashboard affiche et
#     que le recalage nocturne corrige).
# ==========================================================

- sensor:

    - name: "etat_eclairage_dashboard"
      unique_id: etat_eclairage_dashboard
      state: >
        {% set sources = [
          states('input_boolean.garage_light_state'),
          states('switch.prise_lampe_parents'),
          states('switch.prise_lampe_sejour'),
          states('switch.lumiere_entree'),
          states('switch.prise_jardin')
        ] %}

        {# Vérif si au moins une source est ON #}
        {% if 'on' in sources %}
          alert
        {% else %}
          off
        {% endif %}
