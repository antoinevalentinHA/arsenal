# ==========================================================
#  TEMPLATE SENSOR : État Dashboard – Mouvements
# ----------------------------------------------------------
#  🧠 Rôle :
#     Indiquer si un mouvement est detecte dans la maison.
#
#  🎯 États :
#     - alert → au moins un mouvement detecte
#     - off   → aucun mouvement
# ==========================================================

- sensor:

    - name: "etat_mouvements_dashboard"
      unique_id: etat_mouvements_dashboard
      state: >
        {% if is_state('binary_sensor.mouvement_maison', 'on') %}
          alert
        {% else %}
          off
        {% endif %}