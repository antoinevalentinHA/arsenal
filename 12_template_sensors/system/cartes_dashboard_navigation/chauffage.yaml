# ==========================================================
#  TEMPLATE SENSOR : État Dashboard – Chauffage
# ----------------------------------------------------------
#  🧠 Rôle :
#     Fournir un état visuel synthétique destiné aux dashboards
#     de navigation (lecture rapide uniquement).
#
#  🎯 États possibles (volontairement réduits) :
#     - alert    → brûleur actif (chauffe réelle)
#     - confort  → programme Confort (demande active)
#     - off      → tout autre état (Eco, Off, inconnu, indisponible)
#
#  ⚠️ Simplification assumée :
#     - Le mode Eco n’est pas distingué (absorbé dans off)
#     - Les états unknown / unavailable sont absorbés dans off
#     - Aucun diagnostic fin : usage purement visuel NAV/HUB
# ==========================================================

- sensor:

    - name: "etat_chauffage_dashboard"
      unique_id: etat_chauffage_dashboard
      state: >
        {% set bruleur = states('binary_sensor.bruleur_chauffage_actif') %}
        {% set prog = states('sensor.programme_chauffage') %}

        {% if bruleur == 'on' %}
          alert
        {% elif prog == 'Confort' %}
          confort
        {% else %}
          off
        {% endif %}