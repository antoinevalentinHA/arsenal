# ==========================================================
# 🧠 ARSENAL — TEMPLATE SENSOR (CLIM)
# ----------------------------------------------------------
# 📛 Nom :
#   Clim — Mode de ventilation recommandé (diagnostic)
#
# 🎯 Rôle (contrat 14_recommandation_ventilation.md) :
#   Produire une RECOMMANDATION diagnostique de vitesse de
#   ventilation à partir de l'intensité du besoin de froid,
#   plancher selon la demande franche et plafonnée par le silencieux,
#   le frein chambre froide restant une garde absolue finale.
#   Observationnel : sert à OBSERVER ce que ferait une logique
#   automatique future. NE PILOTE RIEN.
#
# 🧱 Principe Arsenal :
#   - Lecture pure (aucune action, aucune écriture, aucun service) ;
#   - Distinct de l'intention (input_select) ET du réel (fan_mode) ;
#   - Modèle B intact, single-writer préservé.
#
# 🚫 Interdits (contrat 14 §2) :
#   - N'écrit JAMAIS input_select.clim_fan_mode_cible ;
#   - Ne commande JAMAIS climate.clim ni switch.clim_quiet_fan ;
#   - Ne double PAS le chemin unique de résolution (10030000000120).
#
# 🧮 Calcul — 5 étages (frein froid en DERNIER, garde absolue) :
#   Vitesses indexées : Silencieux=0 · Faible=1 · Moyen=2 · Fort=3.
#   1. brute = mapping(niveau besoin) — INCHANGÉ :
#      satisfait/faible→0 · moyen→1 · eleve→2 · extreme→3.
#   2. Plancher demande franche :
#      si clim_seuil_allumage_cool_atteint == on → idx = max(idx, 1).
#   3. Plancher demande franche NETTE :
#      nette = temperature_max_chambres >= seuil_allumage_clim_applique + 0.5 ;
#      si nette ET plage silencieuse INACTIVE → idx = max(idx, 2).
#      « +0.5 » codé en dur ; le plancher Moyen est neutralisé en silence.
#   4. Plafond silencieux :
#      si clim_silencieux_autorise == on ET idx > 2 → idx = 2 (plafond, jamais Fort).
#   5. Frein chambre froide (ABSOLU, prime sur tout) :
#      si clim_seuil_extinction_cool_atteint == on → idx = 0.
#   state = libellé FR de idx.
#
#   Conséquences : en plage silencieuse, le plancher Moyen est neutralisé
#   (plancher Faible et plafond restent actifs) ; le frein froid ramène à
#   Silencieux quelles que soient les autres étapes.
#
# 🟢 Disponibilité (contrat 14 §4) :
#   - niveau besoin unknown/unavailable → unavailable (jamais de vitesse défaut) ;
#   - allumage indéterminé → calcul SANS plancher Faible, cause flaggée ;
#   - silencieux indéterminé → calcul SANS plafond, cause flaggée ;
#   - frein min indéterminé → calcul SANS frein, cause flaggée.
#
# 🔤 Sortie : state FR (Silencieux/Faible/Moyen/Fort)
#             + attribut mode_technique (quiet/low/medium/high).
# 📍 Entité : sensor.clim_fan_mode_recommande
# ==========================================================

- sensor:
    - name: "Clim mode de ventilation recommandé"
      unique_id: clim_fan_mode_recommande
      default_entity_id: sensor.clim_fan_mode_recommande
      icon: mdi:fan-chevron-up

      availability: >
        {{ states('sensor.clim_intensite_besoin_froid_niveau')
           in ['satisfait', 'faible', 'moyen', 'eleve', 'extreme'] }}

      state: >
        {% set niveau = states('sensor.clim_intensite_besoin_froid_niveau') %}
        {% set fr = ['Silencieux', 'Faible', 'Moyen', 'Fort'] %}
        {% set brute = {'satisfait': 0, 'faible': 0, 'moyen': 1,
                        'eleve': 2, 'extreme': 3}.get(niveau) %}
        {% if brute is none %}
          unavailable
        {% else %}
          {% set ns = namespace(idx=brute) %}
          {# 2. Plancher demande franche #}
          {% if is_state('binary_sensor.clim_seuil_allumage_cool_atteint', 'on') %}
            {% set ns.idx = [ns.idx, 1] | max %}
          {% endif %}
          {# 3. Plancher demande franche NETTE (hors plage silencieuse) #}
          {% set tmax = states('sensor.temperature_max_chambres') | float(none) %}
          {% set seuil = states('sensor.seuil_allumage_clim_applique') | float(none) %}
          {% set nette = tmax is not none and seuil is not none and tmax >= seuil + 0.5 %}
          {% if nette and not is_state('binary_sensor.clim_silencieux_autorise', 'on') %}
            {% set ns.idx = [ns.idx, 2] | max %}
          {% endif %}
          {# 4. Plafond silencieux #}
          {% if is_state('binary_sensor.clim_silencieux_autorise', 'on') and ns.idx > 2 %}
            {% set ns.idx = 2 %}
          {% endif %}
          {# 5. Frein chambre froide (ABSOLU) #}
          {% if is_state('binary_sensor.clim_seuil_extinction_cool_atteint', 'on') %}
            {% set ns.idx = 0 %}
          {% endif %}
          {{ fr[ns.idx] }}
        {% endif %}

      attributes:
        niveau_besoin_lu: >
          {{ states('sensor.clim_intensite_besoin_froid_niveau') }}
        intensite_num: >
          {{ states('sensor.clim_intensite_besoin_froid') }}
        reco_brute: >
          {% set niveau = states('sensor.clim_intensite_besoin_froid_niveau') %}
          {% set fr = ['Silencieux', 'Faible', 'Moyen', 'Fort'] %}
          {% set brute = {'satisfait': 0, 'faible': 0, 'moyen': 1,
                          'eleve': 2, 'extreme': 3}.get(niveau) %}
          {{ fr[brute] if brute is not none else 'indisponible' }}
        reco_apres_plancher: >
          {# Observabilité pure : sortie après étapes 2 et 3 (avant plafond/frein). #}
          {% set niveau = states('sensor.clim_intensite_besoin_froid_niveau') %}
          {% set fr = ['Silencieux', 'Faible', 'Moyen', 'Fort'] %}
          {% set brute = {'satisfait': 0, 'faible': 0, 'moyen': 1,
                          'eleve': 2, 'extreme': 3}.get(niveau) %}
          {% if brute is none %}
            indisponible
          {% else %}
            {% set ns = namespace(idx=brute) %}
            {% if is_state('binary_sensor.clim_seuil_allumage_cool_atteint', 'on') %}
              {% set ns.idx = [ns.idx, 1] | max %}
            {% endif %}
            {% set tmax = states('sensor.temperature_max_chambres') | float(none) %}
            {% set seuil = states('sensor.seuil_allumage_clim_applique') | float(none) %}
            {% set nette = tmax is not none and seuil is not none and tmax >= seuil + 0.5 %}
            {% if nette and not is_state('binary_sensor.clim_silencieux_autorise', 'on') %}
              {% set ns.idx = [ns.idx, 2] | max %}
            {% endif %}
            {{ fr[ns.idx] }}
          {% endif %}
        reco_apres_frein_min: >
          {% set niveau = states('sensor.clim_intensite_besoin_froid_niveau') %}
          {% set fr = ['Silencieux', 'Faible', 'Moyen', 'Fort'] %}
          {% set brute = {'satisfait': 0, 'faible': 0, 'moyen': 1,
                          'eleve': 2, 'extreme': 3}.get(niveau) %}
          {% if brute is none %}
            indisponible
          {% elif is_state('binary_sensor.clim_seuil_extinction_cool_atteint', 'on') %}
            Silencieux
          {% else %}
            {{ fr[brute] }}
          {% endif %}
        reco_finale: >
          {{ states('sensor.clim_fan_mode_recommande') }}
        mode_technique: >
          {% set tech = {'Silencieux': 'quiet', 'Faible': 'low',
                         'Moyen': 'medium', 'Fort': 'high'} %}
          {{ tech.get(states('sensor.clim_fan_mode_recommande'), 'unavailable') }}
        cause_plafonnement: >
          {% set frein = states('binary_sensor.clim_seuil_extinction_cool_atteint') %}
          {% set sil = states('binary_sensor.clim_silencieux_autorise') %}
          {% set allum = states('binary_sensor.clim_seuil_allumage_cool_atteint') %}
          {% set niveau = states('sensor.clim_intensite_besoin_froid_niveau') %}
          {% set brute = {'satisfait': 0, 'faible': 0, 'moyen': 1,
                          'eleve': 2, 'extreme': 3}.get(niveau) %}
          {% set tmax = states('sensor.temperature_max_chambres') | float(none) %}
          {% set seuil = states('sensor.seuil_allumage_clim_applique') | float(none) %}
          {% set nette = tmax is not none and seuil is not none and tmax >= seuil + 0.5 %}
          {% if frein not in ['on', 'off'] %}
            frein_min_indisponible
          {% elif sil not in ['on', 'off'] %}
            silencieux_indisponible
          {% elif allum not in ['on', 'off'] %}
            allumage_indisponible
          {% elif frein == 'on' %}
            frein_min_actif
          {% elif sil == 'on' and brute is not none and brute > 2 %}
            plafond_silencieux
          {% elif sil == 'off' and nette and brute is not none and brute < 2 %}
            plancher_moyen_net
          {% elif allum == 'on' and brute is not none and brute < 1 %}
            plancher_demande_franche
          {% else %}
            none
          {% endif %}
        intention_actuelle: >
          {{ states('input_select.clim_fan_mode_cible') }}
        ventilation_reelle: >
          {{ states('sensor.clim_mode_de_ventilation_local') }}
        ecart_reco_intention: >
          {% set reco = states('sensor.clim_fan_mode_recommande') %}
          {% set intent = states('input_select.clim_fan_mode_cible') %}
          {% if intent in ['Auto Arsenal', 'Auto'] %}
            aligne
          {% elif intent in ['Silencieux', 'Faible', 'Moyen', 'Fort'] %}
            {{ 'aligne' if reco == intent else 'diverge' }}
          {% else %}
            non_comparable
          {% endif %}
        ecart_reco_reel: >
          {% set tech = {'Silencieux': 'quiet', 'Faible': 'low',
                         'Moyen': 'medium', 'Fort': 'high'} %}
          {% set reco_tech = tech.get(states('sensor.clim_fan_mode_recommande')) %}
          {% set reel = states('sensor.clim_mode_de_ventilation_local') %}
          {% if reco_tech is none %}
            non_comparable
          {% elif reel in ['quiet', 'low', 'medium', 'high'] %}
            {{ 'aligne' if reco_tech == reel else 'diverge' }}
          {% else %}
            non_comparable
          {% endif %}
