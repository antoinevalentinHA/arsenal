# ==========================================================
# 🧠 ARSENAL — TEMPLATE SENSOR (CLIM)
# ----------------------------------------------------------
# 📛 Nom :
#   Clim — Mode de ventilation recommandé (diagnostic)
#
# 🎯 Rôle (contrat 14_recommandation_ventilation.md) :
#   Produire une RECOMMANDATION diagnostique de vitesse de ventilation à
#   partir d'un référentiel UNIQUE : l'intensité du besoin de froid
#   x = temperature_max_chambres − seuil_extinction_clim_applique
#   (= sensor.clim_intensite_besoin_froid). Perception thermique pure,
#   PRÉSENCE-AGNOSTIQUE. NE PILOTE RIEN.
#
# 🧱 Principe Arsenal :
#   - Lecture pure (aucune action, aucune écriture, aucun service) ;
#   - Distinct de l'intention (input_select) ET du réel (fan_mode) ;
#   - Modèle B intact, single-writer préservé.
#
# 🚫 Interdits (contrat 14 §2) :
#   - N'écrit JAMAIS input_select.clim_fan_mode_cible ;
#   - Ne commande JAMAIS climate.clim ni switch.clim_quiet_fan ;
#   - Ne double PAS le chemin unique de résolution (10030000000120) ;
#   - N'émet JAMAIS « Silencieux » hors silence (quiet = domaine silence) ;
#   - N'émet JAMAIS « auto » (Fujitsu) — mapping technique low/medium/high.
#
# 🧮 Calcul — grille x à deux latches + caps (ordre EXACT) :
#   Vitesses indexées : Silencieux=0 · Faible=1 · Moyen=2 · Fort=3.
#   Référentiel unique : x = sensor.clim_intensite_besoin_froid (°C au-dessus
#   du seuil d'arrêt). Plus aucun plancher fondé sur seuil_allumage (ON) :
#   le double référentiel ON/OFF est abandonné.
#
#   1. Grille de vitesse (présence-agnostique), plancher Faible :
#      - latch Moyen : engage x ≥ 1.0, relâche x < 0.6 (dead-band 0.4) ;
#      - latch Fort  : engage x ≥ 2.0, relâche x < 1.5 (dead-band 0.5) ;
#      idx = 3 si latch Fort · 2 si latch Moyen · sinon 1 (Faible). Jamais 0.
#      (seuils codés en dur ; latches persistés en attributs latch_moyen /
#       latch_fort ; hold de l'état précédent si x manquant.)
#   2. Plafond silencieux : si clim_silencieux_autorise == on ET idx > 2
#      → idx = 2 (cap Moyen — diagnostic ; l'application s'abstient en plage).
#   3. Frein chambre froide : si clim_seuil_extinction_cool_atteint == on
#      (temperature_min_chambres ≤ seuil_extinction) → cap idx = 1 (Faible).
#      Presence-agnostique : en présence il plafonne à Faible ; l'ignorance
#      du frein en ABSENCE (→ Fort) est un arbitrage EFFECTIF porté par
#      l'application 10030000000120, hors de ce capteur.
#   state = libellé FR de idx (Faible / Moyen / Fort).
#
#   Précédence des caps : frein (1) prime sur plafond silence (2). En plage
#   silencieuse la sortie est plafonnée à Moyen ; le frein peut la ramener à
#   Faible. Le « vrai » quiet reste exclusivement appliqué par le domaine
#   silence (switch.clim_quiet_fan), jamais par cette reco.
#
# 🟢 Disponibilité (contrat 14 §4) :
#   - x (clim_intensite_besoin_froid) non numérique → unavailable
#     (jamais de vitesse par défaut) ;
#   - silencieux indéterminé → calcul SANS plafond, cause flaggée ;
#   - frein min indéterminé → calcul SANS frein, cause flaggée.
#
# 🔤 Sortie : state FR (Faible/Moyen/Fort)
#             + attribut mode_technique (low/medium/high).
# 📍 Entité : sensor.clim_fan_mode_recommande
# ==========================================================

- sensor:
    - name: "Clim mode de ventilation recommandé"
      unique_id: clim_fan_mode_recommande
      default_entity_id: sensor.clim_fan_mode_recommande
      icon: mdi:fan-chevron-up

      availability: >
        {{ states('sensor.clim_intensite_besoin_froid') | float(none) is not none }}

      state: >
        {% set x = states('sensor.clim_intensite_besoin_froid') | float(none) %}
        {% set fr = ['Silencieux', 'Faible', 'Moyen', 'Fort'] %}
        {% if x is none %}
          unavailable
        {% else %}
          {% set pm = state_attr(this.entity_id, 'latch_moyen') %}
          {% set pm = pm in [true, 'True', 'true', 'on'] %}
          {% set pf = state_attr(this.entity_id, 'latch_fort') %}
          {% set pf = pf in [true, 'True', 'true', 'on'] %}
          {% set lm = x >= (0.6 if pm else 1.0) %}
          {% set lf = x >= (1.5 if pf else 2.0) %}
          {% set silence = is_state('binary_sensor.clim_silencieux_autorise', 'on') %}
          {% set frein = is_state('binary_sensor.clim_seuil_extinction_cool_atteint', 'on') %}
          {% set ns = namespace(idx = 3 if lf else (2 if lm else 1)) %}
          {# 2. Plafond silencieux — cap Moyen #}
          {% if silence and ns.idx > 2 %}
            {% set ns.idx = 2 %}
          {% endif %}
          {# 3. Frein chambre froide — cap Faible (prime sur le plafond) #}
          {% if frein and ns.idx > 1 %}
            {% set ns.idx = 1 %}
          {% endif %}
          {{ fr[ns.idx] }}
        {% endif %}

      attributes:
        niveau_besoin_lu: >
          {{ states('sensor.clim_intensite_besoin_froid_niveau') }}
        intensite_num: >
          {{ states('sensor.clim_intensite_besoin_froid') }}
        # Latch d'hystérésis Moyen (engage 1.0 / relâche 0.6 ; hold si x absent).
        # Relu (stringifié) par le state au cycle suivant.
        latch_moyen: >
          {% set x = states('sensor.clim_intensite_besoin_froid') | float(none) %}
          {% set prev = state_attr(this.entity_id, 'latch_moyen') %}
          {% set prev = prev in [true, 'True', 'true', 'on'] %}
          {{ prev if x is none else (x >= (0.6 if prev else 1.0)) }}
        # Latch d'hystérésis Fort (engage 2.0 / relâche 1.5 ; hold si x absent).
        latch_fort: >
          {% set x = states('sensor.clim_intensite_besoin_froid') | float(none) %}
          {% set prev = state_attr(this.entity_id, 'latch_fort') %}
          {% set prev = prev in [true, 'True', 'true', 'on'] %}
          {{ prev if x is none else (x >= (1.5 if prev else 2.0)) }}
        # Vitesse issue de la seule grille x, AVANT plafond silence et frein.
        vitesse_grille: >
          {% set x = states('sensor.clim_intensite_besoin_froid') | float(none) %}
          {% set fr = ['Silencieux', 'Faible', 'Moyen', 'Fort'] %}
          {% if x is none %}
            indisponible
          {% else %}
            {% set pm = state_attr(this.entity_id, 'latch_moyen') %}
            {% set pm = pm in [true, 'True', 'true', 'on'] %}
            {% set pf = state_attr(this.entity_id, 'latch_fort') %}
            {% set pf = pf in [true, 'True', 'true', 'on'] %}
            {% set lm = x >= (0.6 if pm else 1.0) %}
            {% set lf = x >= (1.5 if pf else 2.0) %}
            {{ fr[3 if lf else (2 if lm else 1)] }}
          {% endif %}
        # Cap effectivement appliqué (frein prime sur silence).
        cap_actif: >
          {% set silence = is_state('binary_sensor.clim_silencieux_autorise', 'on') %}
          {% set frein = is_state('binary_sensor.clim_seuil_extinction_cool_atteint', 'on') %}
          {{ 'frein' if frein else ('silence' if silence else 'none') }}
        reco_finale: >
          {{ states('sensor.clim_fan_mode_recommande') }}
        mode_technique: >
          {% set tech = {'Silencieux': 'quiet', 'Faible': 'low',
                         'Moyen': 'medium', 'Fort': 'high'} %}
          {{ tech.get(states('sensor.clim_fan_mode_recommande'), 'unavailable') }}
        cause_plafonnement: >
          {% set frein = states('binary_sensor.clim_seuil_extinction_cool_atteint') %}
          {% set sil = states('binary_sensor.clim_silencieux_autorise') %}
          {% set x = states('sensor.clim_intensite_besoin_froid') | float(none) %}
          {% set pf = state_attr(this.entity_id, 'latch_fort') %}
          {% set pf = pf in [true, 'True', 'true', 'on'] %}
          {% set lf = false if x is none else (x >= (1.5 if pf else 2.0)) %}
          {% if frein not in ['on', 'off'] %}
            frein_min_indisponible
          {% elif sil not in ['on', 'off'] %}
            silencieux_indisponible
          {% elif frein == 'on' %}
            frein_min_actif
          {% elif sil == 'on' and lf %}
            plafond_silencieux
          {% else %}
            none
          {% endif %}
        intention_actuelle: >
          {{ states('input_select.clim_fan_mode_cible') }}
        ventilation_reelle: >
          {{ states('sensor.clim_mode_de_ventilation_local') }}
        ecart_reco_intention: >
          {% set reco = states('sensor.clim_fan_mode_recommande') %}
          {% set intent = states('input_select.clim_fan_mode_cible') %}
          {% if intent in ['Auto Arsenal', 'Auto'] %}
            aligne
          {% elif intent in ['Silencieux', 'Faible', 'Moyen', 'Fort'] %}
            {{ 'aligne' if reco == intent else 'diverge' }}
          {% else %}
            non_comparable
          {% endif %}
        ecart_reco_reel: >
          {% set tech = {'Silencieux': 'quiet', 'Faible': 'low',
                         'Moyen': 'medium', 'Fort': 'high'} %}
          {% set reco_tech = tech.get(states('sensor.clim_fan_mode_recommande')) %}
          {% set reel = states('sensor.clim_mode_de_ventilation_local') %}
          {% if reco_tech is none %}
            non_comparable
          {% elif reel in ['quiet', 'low', 'medium', 'high'] %}
            {{ 'aligne' if reco_tech == reel else 'diverge' }}
          {% else %}
            non_comparable
          {% endif %}
