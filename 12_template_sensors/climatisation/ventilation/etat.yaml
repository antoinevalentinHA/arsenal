# ==========================================================
# 🌀 TRIGGERED TEMPLATE SENSOR — Clim mode de ventilation (local)
# ----------------------------------------------------------
# 💡 Objectif :
#   Exposer l'état réel du mode de ventilation (fan_mode) de la
#   climatisation, lu directement sur l'attribut de climate.clim.
#
# ⚙️ Fonctionnement :
#   - Source : state_attr('climate.clim', 'fan_mode')
#   - Normalise la casse de l'intégration (ex. « Quiet » → quiet)
#   - Valeurs canoniques : quiet / low / medium / high / auto
#   - Sinon (indisponible / inconnu) → unavailable (jamais masqué)
#
# 🧱 Principe :
#   - Lecture pure (aucune action, aucune décision)
#   - Aucune traduction du state (les libellés FR relèvent de la carte)
#
# 📊 Type : Triggered Template Sensor
# 📍 Entité : sensor.clim_mode_de_ventilation_local
# ==========================================================

- trigger:
    - platform: state
      entity_id: climate.clim

    # 🚀 Stabilisation Home Assistant
    - platform: state
      entity_id: input_boolean.systeme_stable
      to: "on"
      id: systeme_stable

  sensor:
    - name: "Clim mode de ventilation (local)"
      unique_id: clim_fan_mode_local
      icon: mdi:fan
      state: >
        {% set m = state_attr('climate.clim', 'fan_mode') | string | lower %}
        {% if m in ['quiet', 'low', 'medium', 'high', 'auto'] %}
          {{ m }}
        {% else %}
          unavailable
        {% endif %}
