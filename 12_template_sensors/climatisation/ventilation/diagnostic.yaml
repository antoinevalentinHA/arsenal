# ==========================================================
# 🧠 ARSENAL — TEMPLATE SENSOR (CLIM)
# ----------------------------------------------------------
# 📛 Nom :
#   Clim — Diagnostic ventilation (synthèse observabilité)
#
# 🎯 Rôle :
#   Couche d'interprétation métier de l'observabilité ventilation.
#   Synthétise UNE FOIS, côté backend, la conformité entre la
#   recommandation Arsenal et la ventilation réelle Fujitsu, et
#   classe la cause d'un éventuel écart. Le dashboard ne fait
#   qu'AFFICHER cet état (aucune logique métier dans Lovelace).
#
# 🧱 Principe Arsenal :
#   - Perception pure (aucune action, aucune écriture, aucun service)
#   - Diagnostic ≠ action ; le capteur ne pilote rien
#   - Backend décide (verdict + cause + clé couleur) ; UI observe
#
# 🧭 État (verdict, fini) :
#   - conforme     : réel exploitable == cible effective
#   - ecart        : réel exploitable ≠ cible effective
#   - repos        : climatisation à l'arrêt (clim_actif == false) — le
#                    fan_mode réel est FIGÉ sur la dernière résolution et
#                    l'autorité d'application (1003000000120) s'abstient tant
#                    que la clim ne tourne pas (contrat 12 §7). Aucune cible
#                    n'est appliquée → comparer réel/cible n'a pas de sens :
#                    pas de pilotage possible ⇒ pas d'écart possible.
#   - indisponible : entrées de décision ou réel non exploitables
#
#   Priorité du verdict : indisponible (R6) > repos > conforme/ecart.
#
#   Cible effective = recommandation après les arbitrages EFFECTIFS du runtime
#   (application_mode.yaml, 10030000000120), dans l'ordre EXACT :
#     1. plage silencieuse (binary_sensor.clim_silencieux_autorise == on)
#        → quiet (domaine silence, automation 1003000000020) ;
#     2. ABSENCE (Auto Arsenal + clim active + maison absente) → high (Fort).
#        « Absence » = projection présence STABILISÉE du clim (R1-b) + visiteur :
#        presence_confort_thermique_stabilisee == off ET presence_visiteur == off ;
#     3. sinon → recommandation technique (low/medium/high ;
#        quiet → low résiduel — la reco grille x n'émet plus quiet).
#   La conformité compare le réel brut à cette cible effective. Ce diagnostic
#   est ALIGNÉ avec l'application absence → Fort (livrés dans le même lot).
#
# 🔢 cause_ecart (fini) :
#   none / clim_au_repos / entrees_indisponibles /
#   recommandation_indisponible / fujitsu_non_exploitable / auto_fujitsu /
#   silencieux_auto / recommandation_non_appliquee / mode_manuel /
#   incoherence_mapping / non_couvert
#
#   - clim_au_repos : clim à l'arrêt → fan_mode figé, aucune cible appliquée.
#     N'est PAS un écart d'application : l'autorité s'abstient légitimement
#     (contrat 12 §7). Sert de cause au verdict « repos ».
#
#   - En « Auto Arsenal », un écart réel ≠ cible effective est un écart
#     d'APPLICATION (recommandation_non_appliquee), pas un override.
#   - En niveau manuel, un écart face à la reco est un override utilisateur
#     informatif (mode_manuel).
#   - auto_fujitsu ne subsiste que comme cas résiduel/legacy (réel == auto).
#
# 🧭 raison_arbitrage (fini) :
#   silence_quiet / absence_fort / quiet_reserve_silence /
#   frein_chambre_froide / none
#
# 🎨 couleur (clé sémantique, décidée backend, R6 gris prime) :
#   - conforme                            -> vert
#   - repos (clim à l'arrêt)              -> repos (gris-bleu, non alarmant)
#   - ecart mode_manuel / silencieux      -> bleu  (info, non alarmant ;
#                                            respecte contrat 12 §11)
#   - ecart recommandation_non_appliquee  -> orange (écart d'application)
#   - ecart auto_fujitsu / non_couvert    -> orange (attention non bloquante)
#   - ecart incoherence_mapping           -> rouge
#   - indisponible                        -> indisponible (gris indispo)
#
# 🔌 Entrées (lecture seule) :
#   - sensor.clim_intensite_besoin_froid_niveau (moteur — besoin)
#   - sensor.clim_intensite_besoin_froid (contexte numérique)
#   - sensor.clim_fan_mode_recommande (+ attributs mode_technique,
#       cause_plafonnement)
#   - sensor.clim_mode_de_ventilation_local (réel Fujitsu)
#   - input_select.clim_fan_mode_cible (intention — diagnostic)
#   - sensor.clim_origine_ventilation (origine — diagnostic)
#   - binary_sensor.clim_silencieux_autorise (plage silencieuse)
#   - binary_sensor.presence_confort_thermique_stabilisee + input_boolean.presence_visiteur
#       (présence stabilisée clim R1-b + visiteur — absence → Fort)
#   - binary_sensor.clim_seuil_extinction_cool_atteint (frein — INFO)
#   - climate.clim (état actif + attribut fan_modes — compatibilité)
#
# 🚫 Interdits :
#   - Écrire input_select.clim_fan_mode_cible
#   - Commander climate.clim / switch.clim_quiet_fan
#   - Toute action, tout service, toute automatisation
#
# 📍 Entité : sensor.clim_ventilation_diagnostic
# ==========================================================

- sensor:
    - name: "Clim ventilation diagnostic"
      unique_id: clim_ventilation_diagnostic
      default_entity_id: sensor.clim_ventilation_diagnostic

      state: >
        {% set unav = ['unknown', 'unavailable', 'none', ''] %}
        {% set niveau = states('sensor.clim_intensite_besoin_froid_niveau') %}
        {% set reco_tech = state_attr('sensor.clim_fan_mode_recommande', 'mode_technique') %}
        {% set reel = states('sensor.clim_mode_de_ventilation_local') %}
        {% set override = is_state('binary_sensor.clim_silencieux_autorise', 'on') %}
        {% set en_auto = states('input_select.clim_fan_mode_cible') in ['Auto Arsenal', 'Auto'] %}
        {% set absence = is_state('binary_sensor.presence_confort_thermique_stabilisee', 'off')
                         and is_state('input_boolean.presence_visiteur', 'off') %}
        {% set clim_actif = states('climate.clim') not in ['off', 'unknown', 'unavailable'] %}
        {% set cible_effective = 'quiet' if override
                                 else ('high' if (en_auto and absence and clim_actif)
                                       else ('low' if reco_tech == 'quiet' else reco_tech)) %}
        {% set niveau_ok = niveau in ['satisfait', 'faible', 'moyen', 'eleve', 'extreme'] %}
        {% set reco_ok = reco_tech in ['quiet', 'low', 'medium', 'high'] %}
        {% if not niveau_ok or not reco_ok or reel in unav %}
          indisponible
        {% elif not clim_actif %}
          repos
        {% elif reel == cible_effective %}
          conforme
        {% else %}
          ecart
        {% endif %}

      attributes:
        niveau_besoin: >
          {{ states('sensor.clim_intensite_besoin_froid_niveau') }}
        intensite: >
          {{ states('sensor.clim_intensite_besoin_froid') }}
        recommande: >
          {{ states('sensor.clim_fan_mode_recommande') }}
        recommande_technique: >
          {{ state_attr('sensor.clim_fan_mode_recommande', 'mode_technique') }}
        cible_effective: >
          {# Cible réellement applicable par le runtime (ordre) :
             1. silence → quiet ; 2. absence (Auto Arsenal + clim active) → high ;
             3. sinon reco technique (quiet → low résiduel). Aligné application. #}
          {% set reco_tech = state_attr('sensor.clim_fan_mode_recommande', 'mode_technique') %}
          {% set override = is_state('binary_sensor.clim_silencieux_autorise', 'on') %}
          {% set en_auto = states('input_select.clim_fan_mode_cible') in ['Auto Arsenal', 'Auto'] %}
          {% set absence = is_state('binary_sensor.presence_confort_thermique_stabilisee', 'off')
                           and is_state('input_boolean.presence_visiteur', 'off') %}
          {% set clim_actif = states('climate.clim') not in ['off', 'unknown', 'unavailable'] %}
          {{ 'quiet' if override
             else ('high' if (en_auto and absence and clim_actif)
                   else ('low' if reco_tech == 'quiet' else reco_tech)) }}
        raison_arbitrage: >
          {% set reco_tech = state_attr('sensor.clim_fan_mode_recommande', 'mode_technique') %}
          {% set override = is_state('binary_sensor.clim_silencieux_autorise', 'on') %}
          {% set en_auto = states('input_select.clim_fan_mode_cible') in ['Auto Arsenal', 'Auto'] %}
          {% set absence = is_state('binary_sensor.presence_confort_thermique_stabilisee', 'off')
                           and is_state('input_boolean.presence_visiteur', 'off') %}
          {% set clim_actif = states('climate.clim') not in ['off', 'unknown', 'unavailable'] %}
          {% set cause_plaf = state_attr('sensor.clim_fan_mode_recommande', 'cause_plafonnement') %}
          {% if override %}
            silence_quiet
          {% elif en_auto and absence and clim_actif %}
            absence_fort
          {% elif reco_tech == 'quiet' %}
            quiet_reserve_silence
          {% elif cause_plaf == 'frein_min_actif' %}
            frein_chambre_froide
          {% else %}
            none
          {% endif %}
        reel: >
          {{ states('sensor.clim_mode_de_ventilation_local') }}
        intention: >
          {{ states('input_select.clim_fan_mode_cible') }}
        origine_ventilation: >
          {{ states('sensor.clim_origine_ventilation') }}
        cause_plafonnement: >
          {{ state_attr('sensor.clim_fan_mode_recommande', 'cause_plafonnement') }}
        # --- Observabilité présence / absence (projection stabilisée + visiteur) ---
        presence_confort_stabilisee: >
          {{ states('binary_sensor.presence_confort_thermique_stabilisee') }}
        presence_visiteur: >
          {{ states('input_boolean.presence_visiteur') }}
        absence_composite: >
          {{ is_state('binary_sensor.presence_confort_thermique_stabilisee', 'off')
             and is_state('input_boolean.presence_visiteur', 'off') }}
        clim_active: >
          {{ states('climate.clim') not in ['off', 'unknown', 'unavailable'] }}
        frein_chambre_froide_actif: >
          {{ is_state('binary_sensor.clim_seuil_extinction_cool_atteint', 'on') }}
        auto_fujitsu_evite: >
          {{ states('sensor.clim_mode_de_ventilation_local') != 'auto' }}
        entrees_disponibles: >
          {{ states('sensor.clim_intensite_besoin_froid_niveau')
             in ['satisfait', 'faible', 'moyen', 'eleve', 'extreme'] }}
        conforme: >
          {{ is_state('sensor.clim_ventilation_diagnostic', 'conforme') }}
        cause_ecart: >
          {% set unav = ['unknown', 'unavailable', 'none', ''] %}
          {% set niveau = states('sensor.clim_intensite_besoin_froid_niveau') %}
          {% set reco_tech = state_attr('sensor.clim_fan_mode_recommande', 'mode_technique') %}
          {% set reel = states('sensor.clim_mode_de_ventilation_local') %}
          {% set intention = states('input_select.clim_fan_mode_cible') %}
          {% set origine = states('sensor.clim_origine_ventilation') %}
          {% set fan_modes = (state_attr('climate.clim', 'fan_modes') or []) | map('lower') | list %}
          {% set override = is_state('binary_sensor.clim_silencieux_autorise', 'on') %}
          {% set en_auto = intention in ['Auto Arsenal', 'Auto'] %}
          {% set absence = is_state('binary_sensor.presence_confort_thermique_stabilisee', 'off')
                           and is_state('input_boolean.presence_visiteur', 'off') %}
          {% set clim_actif = states('climate.clim') not in ['off', 'unknown', 'unavailable'] %}
          {% set itech = {'Silencieux': 'quiet', 'Faible': 'low', 'Moyen': 'medium',
                          'Fort': 'high'}.get(intention) %}
          {% set niveau_ok = niveau in ['satisfait', 'faible', 'moyen', 'eleve', 'extreme'] %}
          {% set reco_ok = reco_tech in ['quiet', 'low', 'medium', 'high'] %}
          {% set cible_effective = 'quiet' if override
                                   else ('high' if (en_auto and absence and clim_actif)
                                         else ('low' if reco_tech == 'quiet' else reco_tech)) %}
          {% if not niveau_ok %}
            entrees_indisponibles
          {% elif not reco_ok %}
            recommandation_indisponible
          {% elif reel in unav %}
            fujitsu_non_exploitable
          {% elif not clim_actif %}
            clim_au_repos
          {% elif reel == cible_effective %}
            none
          {% elif reel == 'auto' %}
            auto_fujitsu
          {% elif origine == 'silencieux_auto' %}
            silencieux_auto
          {% elif en_auto %}
            recommandation_non_appliquee
          {% elif itech is not none and reel == itech %}
            mode_manuel
          {% elif reco_tech not in fan_modes %}
            incoherence_mapping
          {% else %}
            non_couvert
          {% endif %}
        couleur: >
          {% set unav = ['unknown', 'unavailable', 'none', ''] %}
          {% set niveau = states('sensor.clim_intensite_besoin_froid_niveau') %}
          {% set reco_tech = state_attr('sensor.clim_fan_mode_recommande', 'mode_technique') %}
          {% set reel = states('sensor.clim_mode_de_ventilation_local') %}
          {% set intention = states('input_select.clim_fan_mode_cible') %}
          {% set origine = states('sensor.clim_origine_ventilation') %}
          {% set fan_modes = (state_attr('climate.clim', 'fan_modes') or []) | map('lower') | list %}
          {% set override = is_state('binary_sensor.clim_silencieux_autorise', 'on') %}
          {% set en_auto = intention in ['Auto Arsenal', 'Auto'] %}
          {% set absence = is_state('binary_sensor.presence_confort_thermique_stabilisee', 'off')
                           and is_state('input_boolean.presence_visiteur', 'off') %}
          {% set clim_actif = states('climate.clim') not in ['off', 'unknown', 'unavailable'] %}
          {% set itech = {'Silencieux': 'quiet', 'Faible': 'low', 'Moyen': 'medium',
                          'Fort': 'high'}.get(intention) %}
          {% set niveau_ok = niveau in ['satisfait', 'faible', 'moyen', 'eleve', 'extreme'] %}
          {% set reco_ok = reco_tech in ['quiet', 'low', 'medium', 'high'] %}
          {% set cible_effective = 'quiet' if override
                                   else ('high' if (en_auto and absence and clim_actif)
                                         else ('low' if reco_tech == 'quiet' else reco_tech)) %}
          {% if not niveau_ok or not reco_ok or reel in unav %}
            indisponible
          {% elif not clim_actif %}
            repos
          {% elif reel == cible_effective %}
            vert
          {% elif reel == 'auto' %}
            orange
          {% elif origine == 'silencieux_auto' %}
            bleu
          {% elif en_auto %}
            orange
          {% elif itech is not none and reel == itech %}
            bleu
          {% elif reco_tech not in fan_modes %}
            rouge
          {% else %}
            orange
          {% endif %}
