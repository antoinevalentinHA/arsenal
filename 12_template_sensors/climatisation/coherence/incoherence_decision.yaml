# ==========================================================
# 🧠 ARSENAL — BINARY SENSOR (CLIM)
# ----------------------------------------------------------
# 📛 Nom :
#   Clim — Incohérence décision / réel
#
# 🎯 Rôle :
#   Détecter une divergence persistante entre
#   la décision centrale (sensor.clim_target_mode)
#   et l’état réel observé de la climatisation.
#
# 🧱 Principe Arsenal :
#   - Diagnostic PUR
#   - Aucune décision
#   - Aucune action
#
# ⏱️ Anti-bruit :
#   - Divergence persistante ≥ 60 s
# ==========================================================

- trigger:
    - platform: state
      entity_id:
        - sensor.clim_target_mode
        - switch.clim_power
        - sensor.clim_mode_local
      for: "00:01:00"

  binary_sensor:
    - name: "Clim incoherence decision reel"
      unique_id: clim_incoherence_decision_reel
      device_class: problem

      # Abstention native (contrat capteurs/coherence/10_coherence.md — C30 A6a) :
      # le verdict exige ses TROIS opérandes exploitables. Si l'un est unknown,
      # unavailable ou absent, le capteur s'abstient : l'indétermination n'est
      # convertie ni en cohérence (off), ni en problème (on).
      # Listes blanches strictes pour la puissance et le mode rapporté ; la
      # cible conserve la sémantique contractuelle mergée (CAS 3 : une autre
      # valeur exploitable de target donne un verdict false, pas une abstention).
      availability: >
        {{ states('sensor.clim_target_mode') not in ['unknown', 'unavailable', 'none', '']
           and states('switch.clim_power') in ['on', 'off']
           and states('sensor.clim_mode_local') in ['off', 'cool', 'dry', 'heat', 'auto', 'fan_only'] }}

      state: >
        {% set target = states('sensor.clim_target_mode') %}
        {% set power = states('switch.clim_power') %}
        {% set mode  = states('sensor.clim_mode_local') %}

        {% if target == 'off' %}
          {{ power == 'on' or mode != 'off' }}
        {% elif target in ['cool', 'dry', 'heat'] %}
          {{ power != 'on' or mode != target }}
        {% else %}
          false
        {% endif %}
