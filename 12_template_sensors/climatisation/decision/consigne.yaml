# ==========================================================
# 🌬️ TEMPLATE SENSOR — Consigne clim appliquée
# ----------------------------------------------------------
# 💡 Objectif :
#   Déterminer automatiquement la température de consigne
#   utilisée par la climatisation selon la présence ou l’absence
#   de la famille.
#
# ⚙️ Fonctionnement :
#   - Si la présence familiale est détectée :
#       → utilise input_number.clim_consigne_presence
#   - Sinon :
#       → utilise input_number.clim_consigne_absence
#   - En cas de valeur inconnue/unavailable :
#       → conserve la dernière valeur connue de ce capteur.
#
# 🧠 Détails techniques :
#   - Unité        : °C
#   - Attributs :
#       • presence → état du binary_sensor.presence_confort_thermique_stabilisee
#       • source   → input_number utilisé (présence / absence)
#
# 📊 Type : Template Sensor
# 📍 Entité : sensor.consigne_clim_appliquee
# ==========================================================

- sensor:
    - name: "Consigne clim appliquée"
      unique_id: sensor_consigne_clim_appliquee
      unit_of_measurement: "°C"

      # Sélection de la consigne selon la présence familiale
      state: >
        {% set presence = is_state('binary_sensor.presence_confort_thermique_stabilisee', 'on') %}
        {% set nuit = is_state('binary_sensor.clim_mode_nuit_effectif', 'on') %}
        {% if presence and not nuit %}
          {% set val = states('input_number.clim_consigne_presence') %}
        {% else %}
          {% set val = states('input_number.clim_consigne_absence') %}
        {% endif %}
        {% if val not in ['unknown','unavailable',None] %}
          {{ val | float }}
        {% else %}
          {{ states(this.entity_id) }}
        {% endif %}

      # Attributs complémentaires : suivi du contexte
      attributes:
        presence: "{{ states('binary_sensor.presence_confort_thermique_stabilisee') }}"
        mode_nuit: "{{ states('binary_sensor.clim_mode_nuit_effectif') }}"
        source: >
          {% if is_state('binary_sensor.presence_confort_thermique_stabilisee', 'on')
                and not is_state('binary_sensor.clim_mode_nuit_effectif', 'on') %}
            input_number.clim_consigne_presence
          {% else %}
            input_number.clim_consigne_absence
          {% endif %}