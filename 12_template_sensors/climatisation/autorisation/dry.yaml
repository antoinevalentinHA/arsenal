# ==========================================================
# 🧠 ARSENAL — BINARY SENSOR (CLIM)
# ----------------------------------------------------------
# 📛 Nom :
#   Autorisation déshumidification climatisation
#
# 🎯 Rôle :
#   Indiquer si le mode DRY est AUTORISÉ
#   indépendamment du besoin hygrométrique.
#
# 🧱 Principe Arsenal :
#   - Lecture PURE
#   - Aucune décision
#   - Aucune action
#
# 🔌 Dérivé STRICTEMENT de :
#   - présence réelle ou babysitting
#   - fenêtres (version temporisée — délais métier)
#   - aération préférable étage
#   - blocage horaire
# ==========================================================

- binary_sensor:
    - name: "Autorisation déshumidification climatisation"
      unique_id: autorisation_clim_dry
      default_entity_id: binary_sensor.autorisation_clim_dry
      state: >
        {% set presence    = is_state('binary_sensor.presence_famille_unifiee', 'on') %}
        {% set babysitting = is_state('input_boolean.mode_babysitting', 'on') %}
        {% set fenetres    = is_state('binary_sensor.fenetre_ouverte_maison_avec_delai', 'on') %}
        {% set aeration    = is_state('binary_sensor.aeration_preferable_etage', 'on') %}
        {% set blocage     = is_state('binary_sensor.clim_blocage_horaire_reel', 'on') %}
        {% set ok =
          (presence or babysitting)
          and not fenetres
          and not aeration
          and not blocage
        %}
        {{ 'on' if ok else 'off' }}
