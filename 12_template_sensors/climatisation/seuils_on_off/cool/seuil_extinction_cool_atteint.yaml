# ==========================================================
# 🧠 ARSENAL — BINARY SENSOR (CLIM)
# ----------------------------------------------------------
# 📛 Nom :
#   Clim – Seuil extinction COOL atteint
#
# 🎯 Rôle :
#   Indiquer si la température minimale intérieure
#   a atteint ou est descendue sous le seuil d’extinction COOL
#   appliqué par le système.
#
# 🧱 Principe Arsenal :
#   - Lecture PURE
#   - Aucune temporisation
#   - Aucune action
#   - Seuil déjà calculé ailleurs
#
# 🔌 Consommateurs typiques :
#   - Automation "Clim – Analyse complète et décision"
#   - UI diagnostic clim
#
# ⚠️ IMPORTANT :
#   - Strictement équivalent à la condition :
#       temperature_min_chambres <= seuil_extinction_clim_applique
# ==========================================================

- binary_sensor:
    - name: "Clim – Seuil extinction COOL atteint"
      unique_id: clim_seuil_extinction_cool_atteint
      availability: >
        {{ states('sensor.temperature_min_chambres') | float(none) is not none
           and states('sensor.seuil_extinction_clim_applique') | float(none) is not none }}
      state: >
        {% set temp_min = states('sensor.temperature_min_chambres') %}
        {% set seuil_off = states('sensor.seuil_extinction_clim_applique') %}
        {{ temp_min | float <= seuil_off | float }}