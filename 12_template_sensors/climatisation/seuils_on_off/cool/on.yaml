# ==========================================================
# 🌡️ TRIGGERED TEMPLATE SENSOR — Seuil d’allumage clim appliqué
# ----------------------------------------------------------
# 💡 Objectif :
#   Déterminer dynamiquement le seuil de température à partir duquel
#   la climatisation (mode COOL) doit s’allumer, selon la présence ou
#   l’absence de la famille.
#
# ⚙️ Fonctionnement :
#   - Si présence détectée → seuil = input_number.clim_seuil_declenchement_presence
#   - Si absence détectée  → seuil = input_number.clim_seuil_declenchement_absence
#   - Actualisation automatique à chaque changement de présence ou helper
#
# 🧠 Détails techniques :
#   - Unité        : °C
#   - Icône        : mdi:thermometer-chevron-up
#   - Attributs    :
#       • mode_actif → "Présence" ou "Absence"
#
# 📊 Type : Triggered Template Sensor
# 📍 Entité : sensor.seuil_allumage_clim_applique
# ==========================================================

- trigger:
    - platform: state
      entity_id:
        - binary_sensor.presence_confort_thermique_stabilisee
        - binary_sensor.clim_mode_nuit_effectif
        - input_number.clim_seuil_declenchement_presence
        - input_number.clim_seuil_declenchement_absence
    - platform: homeassistant
      event: start

  sensor:
    - name: "Seuil allumage clim appliqué"
      unique_id: seuil_allumage_clim_applique
      unit_of_measurement: "°C"
      icon: mdi:thermometer-chevron-up
      availability: >
        {% set p = states('binary_sensor.presence_confort_thermique_stabilisee') %}
        {% set n = states('binary_sensor.clim_mode_nuit_effectif') %}
        {% if p in ['unknown', 'unavailable'] or n in ['unknown', 'unavailable'] %}
          false
        {% else %}
          {% set sel = 'input_number.clim_seuil_declenchement_presence'
                       if (p == 'on' and n != 'on')
                       else 'input_number.clim_seuil_declenchement_absence' %}
          {{ states(sel) | float(none) is not none }}
        {% endif %}
      state: >
        {% set presence = is_state('binary_sensor.presence_confort_thermique_stabilisee', 'on') %}
        {% set nuit = is_state('binary_sensor.clim_mode_nuit_effectif', 'on') %}
        {% if presence and not nuit %}
          {{ states('input_number.clim_seuil_declenchement_presence') | float }}
        {% else %}
          {{ states('input_number.clim_seuil_declenchement_absence') | float }}
        {% endif %}
      attributes:
        mode_actif: >
          {% set presence = is_state('binary_sensor.presence_confort_thermique_stabilisee', 'on') %}
          {% set nuit = is_state('binary_sensor.clim_mode_nuit_effectif', 'on') %}
          {% if presence and not nuit %}
            Présence
          {% elif nuit %}
            Absence (mode nuit)
          {% else %}
            Absence
          {% endif %}
