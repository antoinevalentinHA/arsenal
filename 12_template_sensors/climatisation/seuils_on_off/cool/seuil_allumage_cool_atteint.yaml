# ==========================================================
# 🧠 ARSENAL — BINARY SENSOR (CLIM)
# ----------------------------------------------------------
# 📛 Nom :
#   Clim – Seuil allumage COOL atteint
#
# 🎯 Rôle :
#   Indiquer si la température maximale intérieure
#   a atteint ou dépassé le seuil d'allumage COOL
#   appliqué par le système.
#
# 🧱 Principe Arsenal :
#   - Lecture PURE
#   - Aucune temporisation
#   - Aucune action
#   - Seuil déjà calculé ailleurs
#
# 🔌 Consommé par :
#   - binary_sensor.besoin_clim_cool
#
# ⚠️ IMPORTANT :
#   - Strictement équivalent à la condition :
#       temperature_max_chambres >= seuil_allumage_clim_applique
# ==========================================================

- binary_sensor:
    - name: "Clim – Seuil allumage COOL atteint"
      unique_id: clim_seuil_allumage_cool_atteint
      state: >
        {% set temp_max = states('sensor.temperature_max_chambres') %}
        {% set seuil_on = states('sensor.seuil_allumage_clim_applique') %}
        {% if temp_max in ['unknown', 'unavailable', ''] or
              seuil_on in ['unknown', 'unavailable', ''] %}
          false
        {% else %}
          {{ temp_max | float >= seuil_on | float }}
        {% endif %}