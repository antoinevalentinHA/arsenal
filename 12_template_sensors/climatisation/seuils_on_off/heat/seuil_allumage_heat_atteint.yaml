# ==========================================================
# 🧠 ARSENAL — BINARY SENSOR (CLIM)
# ----------------------------------------------------------
# 📛 Nom :
#   Clim – Seuil allumage HEAT atteint
#
# 🎯 Rôle :
#   Indiquer si la température minimale intérieure
#   est passée sous le seuil d'allumage HEAT
#   appliqué par le système.
#
# 🧱 Principe Arsenal :
#   - Lecture PURE
#   - Aucune temporisation
#   - Aucune action
#   - Seuil déjà calculé ailleurs
#
# 🔌 Consommé par :
#   - binary_sensor.besoin_clim_heat
#
# ⚠️ IMPORTANT :
#   - Strictement équivalent à la condition :
#       temperature_min_chambres < seuil_allumage_chauffage_clim
# ==========================================================

- binary_sensor:
    - name: "Clim – Seuil allumage HEAT atteint"
      unique_id: clim_seuil_allumage_heat_atteint
      availability: >
        {{ states('sensor.temperature_min_chambres') | float(none) is not none
           and states('sensor.seuil_allumage_chauffage_clim') | float(none) is not none }}
      state: >
        {% set temp_min = states('sensor.temperature_min_chambres') %}
        {% set seuil_on = states('sensor.seuil_allumage_chauffage_clim') %}
        {{ temp_min | float < seuil_on | float }}