# ==========================================================
# 🧠 ARSENAL — BINARY SENSOR :
#     Présence — Famille unifiee (canonique)
# ----------------------------------------------------------
# 🎯 RÔLE
#   Produire la vérité canonique de présence familiale
#   consommable par le reste du système Arsenal.
#
# 🧱 PRINCIPE
#   Ce capteur agrège des vérités de présence amont
#   déjà calculées par des capteurs spécialisés.
#
#   Sources consolidées :
#     - `binary_sensor.presence_famille`
#     - `binary_sensor.presence_famille_securite`
#
# 🧠 DÉFINITION DE VÉRITÉ
#   ON  si au moins une source consolidée est active
#   OFF si aucune source consolidée n'est active,
#       après temporisation de stabilisation
#
# ⏱️ TEMPORISATION
#   - `delay_on`  : absorbe les activations fugitives
#   - `delay_off` : absorbe les pertes temporaires de détection
#
# ⚖️ CONTRAT
#   - Capteur canonique de consommation
#   - N'introduit aucune logique métier propre
#   - Ne redéfinit pas les critères de présence amont
#   - Se contente d'unifier et de stabiliser
#
# 🛑 NON RESPONSABLE
#   - Ne décide pas des zones reconnues comme présence
#   - Ne pilote pas le High Accuracy mobile
#   - Ne gère pas les politiques sécurité
#   - Ne corrige pas une vérité amont mal définie
#
# 📌 NOTE D'ARCHITECTURE
#   Toute évolution du modèle spatial ou des vérités
#   de présence amont impose la révision explicite
#   de ce capteur et de ses sources.
# ==========================================================

- binary_sensor:

    - name: "Présence (Famille - Corrigée)"
      unique_id: presence_famille_unifiee
      default_entity_id: binary_sensor.presence_famille_unifiee
      device_class: presence

      delay_on: "00:00:03"
      delay_off: "00:00:30"

      state: >
        {% set sources = [
          'binary_sensor.presence_famille',
          'binary_sensor.presence_famille_securite'
        ] %}

        {{ sources | select('is_state', 'on') | list | length > 0 }}
