# ==========================================================
# 👨‍👩‍👧‍👦 TEMPLATE BINARY SENSOR — Présence famille (zone sécurité)
# ----------------------------------------------------------
# 💡 Objectif :
#   Déterminer si au moins un membre de la famille est présent
#   dans la zone de sécurité du domicile.
#
# ⚙️ Fonctionnement :
#   - Combine plusieurs sources :
#       • Position GPS (via device_tracker)
#       • Connexion Wi-Fi locale
#       • Modes spéciaux (enfants ou babysitting)
#   - ON  → au moins une présence détectée
#   - OFF → aucune présence détectée dans la zone de sécurité
#
# 📊 Type : Template Binary Sensor
# 📍 Entité générée : binary_sensor.presence_famille_securite
# ==========================================================

- binary_sensor:

    - name: "Présence"
      unique_id: presence_famille_securite
      default_entity_id: binary_sensor.presence_famille_securite
      device_class: presence

      state: >
        {# --- Paramètres zone de sécurité (lecture brute, sans fabrication) --- #}
        {% set lat_zone_raw = state_attr('zone.maison_securite', 'latitude') %}
        {% set lon_zone_raw = state_attr('zone.maison_securite', 'longitude') %}
        {% set radius_raw   = states('input_number.zone_securite_radius') %}

        {# --- Validité des données géométriques (aucun repli numérique) --- #}
        {% set zone_valide   = is_number(lat_zone_raw) and is_number(lon_zone_raw) %}
        {% set radius_valide = is_number(radius_raw) and (radius_raw | float) > 0 %}

        {# --- Entités trackers via helpers --- #}
        {% set trackers = [
          states('input_text.telephone_parent_1_tracker'),
          states('input_text.telephone_parent_2_tracker')
        ] %}

        {# --- Détection zone par distance (branche GPS gardée) --- #}
        {% set inside = namespace(flag=false) %}
        {% if zone_valide and radius_valide %}
          {% set lat_zone = lat_zone_raw | float %}
          {% set lon_zone = lon_zone_raw | float %}
          {% set radius   = radius_raw | float %}
          {% for t in trackers %}
            {% set lat_t = state_attr(t, 'latitude') %}
            {% set lon_t = state_attr(t, 'longitude') %}
            {% if t not in ['', 'unknown', 'unavailable']
                  and is_number(lat_t) and is_number(lon_t) %}
              {% set d = distance(lat_t | float, lon_t | float, lat_zone, lon_zone) * 1000 %}
              {% if d < radius %}
                {% set inside.flag = true %}
              {% endif %}
            {% endif %}
          {% endfor %}
        {% endif %}

        {{
          inside.flag
          or is_state('person.parent_1', 'Maison securite')
          or is_state('person.parent_2', 'Maison securite')
          or is_state('binary_sensor.presence_wifi_maison', 'on')
          or is_state('binary_sensor.presence_enfants', 'on')
          or is_state('input_boolean.presence_visiteur', 'on')
        }}
