# ==========================================================
# 🧠 ARSENAL — BINARY SENSOR :
#     Présence — Famille (vérité unifiée)
# ----------------------------------------------------------
# 🎯 RÔLE
#   Produire une vérité binaire FIABLE et CENTRALISÉE
#   de la présence humaine familiale dans le périmètre
#   domestique étendu (maison + approche sécurité).
#
# 🧱 PÉRIMÈTRE
#   Sources prises en compte :
#     - Entités `person.*` (géolocalisation HA)
#     - `binary_sensor.presence_enfants`
#     - `input_boolean.presence_visiteur`
#
#   Zones reconnues comme présence :
#     - home
#     - Maison securite
#     - Approche securite
#
# 🧠 DÉFINITION DE VÉRITÉ
#   ON  si au moins UNE des conditions est vraie :
#     - Une entité `person.*` est dans une zone reconnue
#     - `binary_sensor.presence_enfants` = on
#     - `input_boolean.presence_visiteur` = on
#
#   OFF sinon
#
# ⚖️ CONTRAT
#   - Capteur de VÉRITÉ uniquement (aucune logique métier)
#   - Aucun effet de bord
#   - Aucune dépendance temporelle
#   - Tolérance aux états `unknown` / `unavailable`
#
# 🛑 NON RESPONSABLE
#   - Ne décide pas des modes (chauffage, alarme, etc.)
#   - Ne gère pas la précision GPS (High Accuracy)
#   - Ne corrige pas les incohérences de sources
#
# 📌 REMARQUE STRUCTURELLE
#   La hiérarchie spatiale des zones n’est PAS interprétée
#   par Home Assistant : chaque état de `person` est évalué
#   littéralement → les zones doivent être listées explicitement.
#
# ==========================================================

- binary_sensor:

    - name: "Présence (Famille)"
      unique_id: presence_famille
      default_entity_id: binary_sensor.presence_famille
      device_class: presence

      state: >
        {% set entites_presence = [
          'person.valentin',
          'person.constance',
          'binary_sensor.presence_enfants',
          'input_boolean.presence_visiteur'
        ] %}

        {% set etats_presence_personnes = [
          'home',
          'Maison securite',
          'Approche securite'
        ] %}

        {{
          entites_presence
            | select('is_state', 'on')
            | list
            | length > 0
          or
          expand(entites_presence)
            | selectattr('domain', 'eq', 'person')
            | selectattr('state', 'in', etats_presence_personnes)
            | list
            | length > 0
        }}