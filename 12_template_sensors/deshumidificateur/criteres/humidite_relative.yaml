# ==========================================================
# 💧 TEMPLATE BINARY SENSOR — Critère de déshumidification Cave (humidite relative, avec hystérésis)
# ----------------------------------------------------------
# 💡 Objectif :
#   Indiquer si le taux d’humidité relative (RH) dans la cave
#   justifie l’activation du déshumidificateur.
#   Ce capteur applique une logique à hystérésis :
#     • Activation : RH ≥ seuil ON
#     • Désactivation : RH ≤ seuil OFF
#
# ⚙️ Fonctionnement :
#   - Mesure : sensor.humidite_relative_cave
#   - Seuils :
#       • input_number.cave_rh_cible_on
#       • input_number.cave_rh_cible_off
#   - L’état actuel du capteur est pris en compte pour
#     stabiliser le comportement (évite les basculements rapides).
#   - En cas d’indisponibilité d’une entrée, l’état courant
#     est conservé
#
# 📊 Type : Template Binary Sensor
# 📍 Entité générée : binary_sensor.critere_deshumidification_cave
# ==========================================================

- binary_sensor:

    # ------------------------------------------------------
    # 💨 Critère d’activation du déshumidificateur (RH Cave)
    # ------------------------------------------------------
    - name: "Critère déshumidification cave"
      unique_id: critere_deshumidification_cave
      device_class: moisture

      # --------------------------------------------------
      # 🧮 Hystérésis basée sur l’humidité relative (RH)
      # --------------------------------------------------
      state: >
        {% set rh_raw = states('sensor.humidite_relative_cave') %}
        {% set seuil_on_raw = states('input_number.cave_rh_cible_on') %}
        {% set seuil_off_raw = states('input_number.cave_rh_cible_off') %}

        {% set invalides = ['unknown', 'unavailable', 'none', ''] %}

        {% if rh_raw in invalides or seuil_on_raw in invalides or seuil_off_raw in invalides %}
          {{ is_state(this.entity_id, 'on') }}
        {% else %}
          {% set rh = rh_raw | float %}
          {% set seuil_on = seuil_on_raw | float %}
          {% set seuil_off = seuil_off_raw | float %}
          {% set current_on = is_state(this.entity_id, 'on') %}

          {% if current_on %}
            {{ rh > seuil_off }}
          {% else %}
            {{ rh >= seuil_on }}
          {% endif %}
        {% endif %}