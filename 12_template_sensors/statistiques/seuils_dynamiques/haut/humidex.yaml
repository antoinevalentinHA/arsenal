# ==========================================================
# 🌡️ TEMPLATE SENSORS — Humidex “Seuil Haut”
# ----------------------------------------------------------
# 🎯 Objectif :
#   Déterminer pour chaque zone la **limite supérieure de confort thermique (Humidex)**,
#   permettant d’évaluer le risque de **chaleur excessive perçue** ou d’inconfort thermique.
#
# ⚙️ Fonctionnement :
#   - Source principale :
#       → `sensor.humidex_filtre_<periode>_moyenne_<zone>`
#   - Période météo active :
#       → `sensor.periode_meteo` (aube, matin, jour, crépuscule, nuit)
#   - Offset saisonnier :
#       • Été (Juin, Juil, Août)              → +1.5  
#       • Inter-saisons (Mars, Avr, Sept, Oct) → +1.2  
#       • Hiver (Nov, Déc, Jan, Fév)           → +1.0  
#     (tolérance plus large en été car la sensation de chaleur est plus marquée)
#
#   ➜ Formule :
#        seuil_haut = moyenne + offset
#
# 🧮 Logique :
#   1️⃣ Identifier la période météo active via `sensor.periode_meteo`.  
#   2️⃣ Récupérer la moyenne filtrée d’Humidex correspondante à la zone.  
#   3️⃣ Déterminer l’offset en fonction du mois (ajustement saisonnier).  
#   4️⃣ Calculer dynamiquement le seuil haut de confort thermique.  
#   5️⃣ Arrondir à 0,1 pour une précision cohérente avec l’échelle de l’Humidex.
#
# 🧩 Capteurs / Zones concernées :
#   ▪️ Résidentiel :
#      - Chambre Arnaud  
#      - Chambre Matthieu  
#      - Chambre Parents  
#      - Entrée  
#      - Séjour  
#      - Cave  
#      - Garage  
#      - Palier  
#      - Petite Maison  
#      - SDB Enfants  
#      - SDB Parents  
#      - Jardin  
#      - Extérieur  
#
#   ▪️ Professionnel / Technique :
#      - Direction  
#      - Compta  
#      - Qualité  
#      - Devis  
#      - Commercial  
#      - Stock Carton  
#      - Stock PF  
#      - Komori  
#      - Bobst  
#      - Media
#
# 💡 Interprétation :
#   - Si Humidex > Seuil Haut :
#       → Risque de chaleur excessive ou d’inconfort thermique.  
#   - Si Humidex ≈ Seuil Haut :
#       → Zone de confort limite, surveillance conseillée.  
#   - Si Humidex < Seuil Haut :
#       → Confort thermique acceptable.
#
# ⚠️ Remarques :
#   - L’Humidex combine température et humidité pour refléter la **chaleur ressentie**.  
#   - Les offsets saisonniers ajustent la tolérance selon la période de l’année.  
#   - Associé au “Seuil Bas”, il permet de définir une **plage de confort thermique dynamique**.  
#   - Ces valeurs peuvent être exploitées pour :
#       • piloter la climatisation ou le chauffage,  
#       • adapter la ventilation,  
#       • ou déclencher des alertes de confort thermique.
#
# 📊 Type : Template Sensor  
# 🌡️ Domaine : Confort thermique / Gestion climatique / Bien-être intérieur  
# ==========================================================

- sensor:
    - name: "Humidex Seuil Haut Chambre Arnaud"
      unique_id: humidex_seuil_haut_chambre_arnaud
      state: &humidex_seuil_haut_logic >
        {% set periode = states('sensor.periode_meteo') %}
        {% set suffixe = this.entity_id | replace('sensor.humidex_seuil_haut_', '') %}
        {% set moyenne = states('sensor.humidex_filtre_' ~ periode ~ '_moyenne_' ~ suffixe) | float(0) %}
        {% set mois = now().month %}

        {# Offset saisonnier : plus large en été #}
        {% set offset =
          1.5 if mois in [6, 7, 8] else
          1.2 if mois in [3, 4, 9, 10] else
          1.0 %}
        {{ (moyenne + offset) | round(1) }}

- sensor:
    - name: "Humidex Seuil Haut Entrée"
      unique_id: humidex_seuil_haut_entree
      state: *humidex_seuil_haut_logic

