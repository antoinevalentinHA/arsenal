# ==========================================================
# 💧 TEMPLATE SENSORS — Humidité Relative “Seuil Haut”
# ----------------------------------------------------------
# 🎯 Objectif :
#   Calculer pour chaque zone le **seuil supérieur de confort hygrométrique (%)**, 
#   afin de détecter un excès d’humidité et anticiper les risques de condensation,
#   moisissures ou inconfort.
#
# ⚙️ Fonctionnement :
#   - Source principale :
#       → `sensor.humidite_relative_filtre_<periode>_moyenne_<zone>`
#   - Période météo active :
#       → issue de `sensor.periode_meteo` (aube, matin, jour, crépuscule, nuit)
#   - Offset saisonnier :
#       • Hiver  (Déc, Jan, Fév)     → +8 %  
#       • Inter-saisons (Mar, Avr, Oct, Nov) → +7 %  
#       • Été   (Mai à Sep)          → +6 %  
#     (tolérance plus large en hiver pour compenser la stagnation d’humidité)
#
#   ➜ Formule :
#        seuil_haut = moyenne + offset
#
# 🧮 Logique :
#   1️⃣ Identifier la période météo active (`sensor.periode_meteo`).  
#   2️⃣ Récupérer la moyenne filtrée d’humidité relative correspondante.  
#   3️⃣ Calculer l’offset selon la saison.  
#   4️⃣ Déterminer le seuil haut dynamique.  
#   5️⃣ Arrondir à 0,1 % pour homogénéité d’affichage.
#
# 🧩 Capteurs / Zones concernées :
#   ▪️ Résidentiel :
#      - Chambre Arnaud  
#      - Chambre Matthieu  
#      - Chambre Parents  
#      - Entrée  
#      - Séjour  
#      - Cave  
#      - Garage  
#      - Palier  
#      - Petite Maison  
#      - SDB Enfants  
#      - SDB Parents  
#      - Jardin  
#      - Extérieur  
#
#   ▪️ Professionnel / Technique :
#      - Direction  
#      - Compta  
#      - Qualité  
#      - Devis  
#      - Commercial  
#      - Stock Carton  
#      - Stock PF  
#      - Komori  
#      - Bobst  
#      - Media
#
# 💡 Interprétation :
#   - Si humidité relative > Seuil Haut :
#       → Risque d’humidité excessive (condensation, moisissure, inconfort).  
#   - Si humidité relative ≈ Seuil Haut :
#       → Zone de confort limite, attention à la ventilation.  
#   - Si humidité relative < Seuil Haut :
#       → Confort hygrométrique normal.
#
# ⚠️ Remarques :
#   - Le seuil haut s’ajuste automatiquement avec la saison :  
#       → plus tolérant en hiver (air intérieur naturellement humide),  
#       → plus strict en été (pour éviter les surchauffes humides).  
#   - Ces capteurs sont essentiels pour :
#       → piloter la VMC / déshumidification,  
#       → déclencher des alertes préventives,  
#       → et maintenir la qualité de l’air intérieur.  
#   - Associés aux “Humidité Relative Seuil Bas”, ils définissent une 
#     **zone de confort hygrométrique complète et dynamique**.
#
# 📊 Type : Template Sensor  
# 💧 Domaine : Hygrométrie / Confort / Qualité de l’air  
# ==========================================================

- sensor:
    - name: "Humidité Relative Seuil Haut Chambre Arnaud"
      unique_id: humidite_relative_seuil_haut_chambre_arnaud
      state: &humidite_relative_seuil_haut_logic >
        {% set periode = states('sensor.periode_meteo') %}
        {% set suffixe = this.entity_id | replace('sensor.humidite_relative_seuil_haut_', '') %}
        {% set moyenne = states('sensor.humidite_relative_filtre_' ~ periode ~ '_moyenne_' ~ suffixe) | float(0) %}
        {% set mois = now().month %}

        {# Offset saisonnier : plus humide en été #}
        {% set offset =
          6 if mois in [6, 7, 8] else
          5 if mois in [3, 4, 9, 10] else
          4 %}
        {{ (moyenne + offset) | round(1) }}

- sensor:
    - name: "Humidité Relative Seuil Haut Cave"
      unique_id: humidite_relative_seuil_haut_cave
      state: *humidite_relative_seuil_haut_logic

