# ==========================================================
#  TEMPLATE SENSORS — Humidex “Filtre Période” (multipériode)
# ----------------------------------------------------------
# 🎯 Objectif :
#   Capturer et mémoriser la valeur de l’**humidex** par période météo
#   (aube / matin / jour / crepuscule / nuit), afin de conserver des
#   références climatiques comparables sur une même journée.
#
# ⚙️ Fonctionnement :
#   - Chaque entité `sensor.humidex_filtre_<periode>_<zone>` surveille :
#       • son capteur d’humidex associé (ex : `sensor.humidex_chambre_arnaud`)
#       • l’état du capteur `sensor.periode_meteo`
#   - Lorsque `sensor.periode_meteo` = `<periode>` (période portée par le nom
#     de l’entité), la valeur courante de l’humidex source est enregistrée.
#   - En dehors de cette période, le capteur conserve la dernière valeur capturée
#     (mémoire via `states(this.entity_id)`).
#
# 🧩 Capteurs couverts :
#   - Généré pour plusieurs zones (chambres, cave, séjour, entrée, extérieur, etc.)
#   - Chaque zone existe pour plusieurs périodes, selon un schéma strictement identique.
#
# 🧮 Logique :
#   1️⃣ Déduire la période cible depuis le nom de l’entité (`...filtre_<periode>_...`).
#   2️⃣ Si `sensor.periode_meteo` = période cible → copie la valeur de l’humidex source.
#   3️⃣ Sinon → conserve la dernière valeur (`states(this.entity_id)`).
#
# ⚠️ Cas particuliers :
#   - Aucun. Tous les capteurs du fichier utilisent strictement la même logique
#     via `state: *humidex_filtre_logic`.
#
# 🧾 Exemple de rendu :
#   **État :** `22.4`
#   **Attributs :**
#   - humidex_source: `sensor.humidex_entree`
#
# 📊 Type : Template Sensor
# 🌡️ Domaine : Confort / Climat / Humidex par période
# ==========================================================


####################################################
# 🌅 AUBE
####################################################

- trigger:
    - platform: state
      entity_id:
        - sensor.humidex_chambre_arnaud
        - sensor.periode_meteo
  sensor:
    - name: "Humidex Filtre Aube Chambre Arnaud"
      unique_id: humidex_filtre_aube_chambre_arnaud
      state: &humidex_filtre_logic >
        {%- set eid = this.entity_id -%}
        {%- set prefix = 'sensor.humidex_filtre_' -%}
        {%- set periode = eid.split(prefix)[1].split('_')[0] -%}
        {%- set src = eid | replace(prefix ~ periode ~ '_', 'sensor.humidex_') -%}
        {%- if is_state('sensor.periode_meteo', periode) -%}
          {{ states(src) }}
        {%- else -%}
          {{ states(eid) }}
        {%- endif -%}
      attributes:
        humidex_source: sensor.humidex_chambre_arnaud

- trigger:
    - platform: state
      entity_id:
        - sensor.humidex_entree
        - sensor.periode_meteo
  sensor:
