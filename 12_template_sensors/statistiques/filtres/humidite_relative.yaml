# ==========================================================
#  TEMPLATE SENSORS — Humidité Relative “Filtre Période” (multipériode)
# ----------------------------------------------------------
# 🎯 Objectif :
#   Capturer et mémoriser l’**humidité relative** par période météo
#   (aube / matin / jour / crepuscule / nuit), afin de conserver des
#   références climatiques comparables sur une même journée.
#
# ⚙️ Fonctionnement :
#   - Chaque entité `sensor.humidite_relative_filtre_<periode>_<zone>` surveille :
#       • son capteur source (ex : `sensor.humidite_relative_chambre_enfants`)
#       • l’état du capteur `sensor.periode_meteo`
#   - Lorsque `sensor.periode_meteo` = `<periode>` (période portée par le nom
#     de l’entité), la valeur courante du capteur source est copiée.
#   - En dehors de cette période, le capteur conserve la dernière valeur capturée
#     (mémoire via `states(this.entity_id)`).
#
# 🧩 Capteurs couverts :
#   - Généré pour plusieurs zones (chambres, cave, séjour, entrée, extérieur, etc.)
#   - Chaque zone existe pour plusieurs périodes, selon un schéma strictement identique.
#
# 🧮 Logique :
#   1️⃣ Déduire la période cible depuis le nom de l’entité (`...filtre_<periode>_...`).
#   2️⃣ Construire la source attendue (`sensor.humidite_relative_<zone>`) par transformation
#      déterministe de `this.entity_id`.
#   3️⃣ Si `sensor.periode_meteo` = période cible → copie la valeur de la source.
#   4️⃣ Sinon → conserve la dernière valeur (`states(this.entity_id)`).
#
# ⚠️ Cas particuliers :
#   - Aucun. Tous les capteurs du fichier utilisent strictement la même logique
#     via `state: *humidite_relative_filtre_logic`.
#
# 🧾 Exemple de rendu :
#   **État :** `52`
#
# 📊 Type : Trigger-based Template Sensor
# 🌡️ Domaine : Confort / Climat / Humidité relative par période
# ==========================================================


####################################################
# 🌅 AUBE
####################################################

- trigger:
    - platform: state
      entity_id:
        - sensor.humidite_relative_chambre_enfants
        - sensor.periode_meteo
  sensor:
    - name: "Humidité Relative Filtre Aube Chambre Enfants"
      unique_id: humidite_relative_filtre_aube_chambre_enfants
      state: &humidite_relative_filtre_logic >
        {%- set eid = this.entity_id -%}
        {%- set prefix = 'sensor.humidite_relative_filtre_' -%}
        {%- set periode = eid.split(prefix)[1].split('_')[0] -%}
        {%- set src = eid | replace(prefix ~ periode ~ '_', 'sensor.humidite_relative_') -%}
        {%- if is_state('sensor.periode_meteo', periode) -%}
          {{ states(src) }}
        {%- else -%}
          {{ states(eid) }}
        {%- endif -%}

