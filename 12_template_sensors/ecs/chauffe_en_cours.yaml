# ==========================================================
# 🔥 TEMPLATE BINARY SENSOR — ECS Chauffe en cours (local)
# ----------------------------------------------------------
# 🎯 Objectif :
#   Exposer un état ECS **déterministe et local** basé sur
#   la consigne chaudière, sans aucune inférence thermique.
#
# ⚙️ Fonctionnement :
#   - Source : sensor.boiler_dhw_setpoint
#   - ON  → si consigne ECS ≠ 10
#   - OFF → si consigne ECS = 10
#   - Ignore les états `unavailable`, `unknown` ou invalides
#
# 🧠 Principe :
#   - 10 correspond à l’état de repos (pas de chauffe ECS)
#   - Toute autre valeur correspond à une demande de chauffe
#   - Le capteur reflète donc une **commande effective**,
#     et non une estimation basée sur la température
#
# 💡 Avantages :
#   - 100 % déterministe (aucun seuil, aucun delta)
#   - Aucun bruit ni faux positif
#   - Réaction immédiate aux changements de consigne
#   - Totalement indépendant de l’inertie thermique
#
# 📊 Type : Template Binary Sensor
# 📍 Entité : binary_sensor.ecs_chauffe_en_cours_local
# ✅ Compatibilité : Home Assistant 2024.8+
# ==========================================================

- binary_sensor:
    - name: "ECS Chauffe en cours (local)"
      unique_id: ecs_chauffe_en_cours_local
      device_class: heat
      state: >
        {% set v = states('sensor.boiler_dhw_setpoint') %}
        {% if v in ['unknown', 'unavailable', 'none', ''] %}
          false
        {% else %}
          {{ (v | float(10)) != 10 }}
        {% endif %}