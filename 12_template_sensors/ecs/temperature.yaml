# ==========================================================
# 🛣️ TEMPLATE TRIGGERED SENSOR — ECS (Température ballon sécurisée)
# ----------------------------------------------------------
# 🎯 Objectif :
#   Fournir aux consommateurs ECS une lecture fiable de la
#   température ballon, robuste aux invalidités transitoires de
#   la source chaudière — SANS jamais fabriquer de valeur.
#
# 📜 Contrat propriétaire :
#   00_documentation_arsenal/contrats/ecs/sensor_ecs_temperature_ballon_securisee.md
#   (invariants I-SEC-1..5) — subordonné à parametres_invalides.md.
#
# ⚙️ Comportement (table contractuelle §5 du contrat) :
#   - source valide                       → valeur source     · provenance = mesure
#   - source invalide + restauration
#     contractualisée (état numérique ET
#     provenance restaurée ∈ {mesure,
#     retenue})                           → état restauré      · provenance = retenue
#   - source invalide + aucune
#     restauration contractualisée        → unknown            · provenance = indisponible
#
# 🚫 Interdits (I-SEC-1/I-SEC-2) :
#   - aucune sentinelle numérique (0 / 0.0 / -1) ni fallback
#     numérique fabriqué (`float(0)` / `int(0)` / défaut chiffré) ;
#   - aucune garde `availability` transformant `unknown` en
#     `unavailable` (l'absence de donnée = `state: unknown`
#     + `provenance: indisponible`, pas une indispo du porteur).
#
# 🧠 Rejet du 0.0 historique : une valeur restaurée n'est retenue
#   que si elle porte une provenance `mesure`/`retenue` — que seul
#   ce capteur conforme produit, et jamais avec un 0.0 fabriqué.
#   Une ancienne valeur (dont un 0.0 historique) dépourvue de
#   provenance est rejetée → `unknown`. Aucune migration d'état.
#
# 🧮 Source : sensor.boiler_dhw_temperature (domaine Boiler)
# 📊 Type : Trigger Template Sensor
# 📏 Unité : °C
# ✅ Compatibilité : Home Assistant 2024.8+
# ==========================================================

- trigger:
    - platform: state
      entity_id: sensor.boiler_dhw_temperature
    - platform: state
      entity_id: input_boolean.systeme_stable
      to: "on"
      id: systeme_stable
    - platform: homeassistant
      event: start
      id: ha_start

  sensor:
    - name: "ECS - Temperature ballon (securisee)"
      unique_id: ecs_temperature_ballon_securisee
      device_class: temperature
      unit_of_measurement: "°C"
      state_class: measurement

      state: >
        {% set v = states('sensor.boiler_dhw_temperature') %}
        {% if v | is_number %}
          {{ v | float | round(1) }}
        {% else %}
          {% set prev = this.state %}
          {% set prov = this.attributes.get('provenance', none) %}
          {% if (prev | is_number) and prov in ['mesure', 'retenue'] %}
            {{ prev | float | round(1) }}
          {% else %}
            unknown
          {% endif %}
        {% endif %}

      attributes:
        provenance: >
          {% set v = states('sensor.boiler_dhw_temperature') %}
          {% if v | is_number %}
            mesure
          {% else %}
            {% set prev = this.state %}
            {% set prov = this.attributes.get('provenance', none) %}
            {% if (prev | is_number) and prov in ['mesure', 'retenue'] %}
              retenue
            {% else %}
              indisponible
            {% endif %}
          {% endif %}

      icon: >
        {% set s = states('sensor.ecs_temperature_ballon_securisee') %}
        {% if not (s | is_number) %}
          mdi:thermometer-off
        {% elif (s | float) < 35 %}
          mdi:coolant-temperature
        {% elif (s | float) < 45 %}
          mdi:water-thermometer
        {% else %}
          mdi:water-boiler
        {% endif %}
