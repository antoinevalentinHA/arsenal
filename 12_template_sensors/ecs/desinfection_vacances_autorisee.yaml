# ==========================================================
# 🧠 ARSENAL — BINARY SENSOR :
#     ECS – Désinfection autorisée au retour de vacances
# ----------------------------------------------------------
# 🎯 RÔLE
#
#   Exposer, en lecture seule, une vérité métier UNIQUE :
#
#     → Une désinfection ECS au retour de vacances est-elle
#       DUE (légitimité établie) ?
#
# ----------------------------------------------------------
# 🧩 PÉRIMÈTRE
#
#   Projection d'observabilité (1:1) de l'état souverain :
#
#     - input_boolean.ecs_desinfection_retour_due
#
#   ON  → une désinfection-retour est due
#   OFF → aucune désinfection-retour due
#
# ----------------------------------------------------------
# 🧩 NATURE
#
#   - Projection d'observabilité (AUCUN rôle décisionnel)
#   - Stateless (aucune mémoire propre)
#   - Ne lit NI `remaining` NI `finishes_at` d'aucun timer
#
# ----------------------------------------------------------
# 🚫 NE FAIT PAS
#
#   - Ne déclenche aucune action
#   - Ne pilote aucun équipement
#   - N'est pas consommé comme autorisation décisionnelle
#     (la décision lit directement l'état souverain)
#
# ----------------------------------------------------------
# 🔗 SOURCE
#
#   - input_boolean.ecs_desinfection_retour_due
#
# ----------------------------------------------------------
# 🏷️ STATUT
#
#   Diagnostic / observabilité — Arsenal v14.x
#   Compatibilité : Home Assistant 2024.8+
# ==========================================================

- binary_sensor:
    - name: "ECS – Désinfection autorisée au retour de vacances"
      unique_id: ecs_desinfection_retour_vacances_autorisee
      default_entity_id: binary_sensor.ecs_desinfection_retour_vacances_autorisee
      state: >
        {{ is_state('input_boolean.ecs_desinfection_retour_due', 'on') }}
