# ==========================================================
# 🧠 ARSENAL — TEMPLATE SENSOR
#     ECS — Temperature max reelle cycle
# ----------------------------------------------------------
# 🎯 ROLE
#   Capturer le maximum thermique reel du ballon sur :
#     - le cycle actif
#     - la fenetre d'inertie post-cycle
#
#   Fournit :
#     tmax_reference = max(tmax_cycle, tmax_post_cycle)
#
# ----------------------------------------------------------
# 🧱 PRINCIPE
#
#   - Reset uniquement sur front off -> on du cycle :
#       state = temperature courante
#
#   - En cycle ou pendant inertie :
#       state = max(state precedent, temperature courante)
#       (si temperature valide)
#
#   - Hors cycle et hors inertie :
#       state conserve (aucune mise a jour)
#
#   - Valeurs invalides (unknown/unavailable/none) :
#       jamais prises en compte
#
# ----------------------------------------------------------
# 🔗 DEPENDANCES
#
#   - sensor.ecs_temperature_ballon_securisee
#   - input_boolean.ecs_cycle_en_cours
#   - timer.fenetre_inertie_chauffe_ecs
#
# ----------------------------------------------------------
# 📊 INVARIANTS
#
#   - Monotone croissant en cycle + inertie
#   - Stable hors cycle / inertie
#   - Reset uniquement sur transition off -> on
#   - Aucun fallback numerique (pas de 0.0)
#   - state >= ecs_temperature_max_cycle
#
# ----------------------------------------------------------
# ⚠️ LIMITES
#
#   - Bootstrap :
#       unknown tant qu'aucune valeur valide
#       (sauf etat restaure)
#
#   - max_timestamp :
#       instant du dernier maximum retenu
#       (pas forcement le premier pic physique)
#
#   - Cycle interrompu :
#       reset ecrase l'ancien maximum
#
# ----------------------------------------------------------
# ✅ COMPATIBILITE
#
#   - moteur template moderne
#   - Home Assistant 2024.8+
# ==========================================================

- trigger:
    - platform: state
      entity_id:
        - sensor.ecs_temperature_ballon_securisee
        - input_boolean.ecs_cycle_en_cours
        - timer.fenetre_inertie_chauffe_ecs

    - platform: event
      event_type: homeassistant_started

  sensor:
    - name: "ECS - Temperature max reelle cycle"
      unique_id: ecs_temperature_max_reelle_cycle
      device_class: temperature
      unit_of_measurement: "°C"

      state: >
        {% set t_raw = states('sensor.ecs_temperature_ballon_securisee') %}
        {% set t_valid = t_raw not in ['unknown', 'unavailable', 'none', ''] %}
        {% set current = t_raw | float if t_valid else none %}

        {% set prev_raw = this.state %}
        {% set prev_valid = prev_raw not in ['unknown', 'unavailable', 'none', ''] %}
        {% set prev = prev_raw | float if prev_valid else none %}

        {% set in_cycle = is_state('input_boolean.ecs_cycle_en_cours', 'on') %}
        {% set inertia_active = is_state('timer.fenetre_inertie_chauffe_ecs', 'active') %}

        {% set cycle_start_trigger =
             trigger.platform == 'state'
             and trigger.entity_id == 'input_boolean.ecs_cycle_en_cours'
             and trigger.from_state is not none
             and trigger.to_state is not none
             and trigger.from_state.state == 'off'
             and trigger.to_state.state == 'on' %}

        {% if not t_valid %}
          {{ prev if prev_valid else this.state }}

        {% elif cycle_start_trigger %}
          {{ current }}

        {% elif in_cycle or inertia_active %}
          {% if prev_valid %}
            {{ [prev, current] | max }}
          {% else %}
            {{ current }}
          {% endif %}

        {% else %}
          {{ prev if prev_valid else this.state }}
        {% endif %}

      attributes:
        max_timestamp: >
          {% set t_raw = states('sensor.ecs_temperature_ballon_securisee') %}
          {% set t_valid = t_raw not in ['unknown', 'unavailable', 'none', ''] %}
          {% set current = t_raw | float if t_valid else none %}

          {% set prev_raw = this.state %}
          {% set prev_valid = prev_raw not in ['unknown', 'unavailable', 'none', ''] %}
          {% set prev = prev_raw | float if prev_valid else none %}

          {% set prev_ts = this.attributes.get('max_timestamp', none) %}

          {% set in_cycle = is_state('input_boolean.ecs_cycle_en_cours', 'on') %}
          {% set inertia_active = is_state('timer.fenetre_inertie_chauffe_ecs', 'active') %}

          {% set cycle_start_trigger =
               trigger.platform == 'state'
               and trigger.entity_id == 'input_boolean.ecs_cycle_en_cours'
               and trigger.from_state is not none
               and trigger.to_state is not none
               and trigger.from_state.state == 'off'
               and trigger.to_state.state == 'on' %}

          {% if not t_valid %}
            {{ prev_ts }}

          {% elif cycle_start_trigger %}
            {{ now().isoformat() }}

          {% elif in_cycle or inertia_active %}
            {% if not prev_valid or current >= prev %}
              {{ now().isoformat() }}
            {% else %}
              {{ prev_ts }}
            {% endif %}

          {% else %}
            {{ prev_ts }}
          {% endif %}

      icon: >
        {% set v = this.state %}
        {% if v in ['unknown', 'unavailable', 'none', ''] %}
          mdi:thermometer-off
        {% elif v | float < 35 %}
          mdi:coolant-temperature
        {% elif v | float < 45 %}
          mdi:water-thermometer
        {% else %}
          mdi:water-boiler
        {% endif %}