# ==========================================================
# 🧊 TEMPLATE TRIGGERED SENSOR — ECS (Consigne chaudière sécurisée)
# ----------------------------------------------------------
# 🎯 Objectif :
#   Fournir la consigne ECS actuelle de la chaudière
#   avec conservation locale en cas d’indisponibilité.
#
# ⚙️ Fonctionnement :
#   - Déclenchement sur tout changement de la consigne exposée par la chaudière
#     ou au démarrage de Home Assistant.
#   - Si la valeur est numérique → mise à jour directe.
#   - Sinon → conservation de la dernière valeur valide.
#
# 🧮 Source : sensor.boiler_dhw_setpoint
# 📊 Type : Trigger Template Sensor
# 📏 Unité : °C
# ==========================================================

- trigger:
    - platform: state
      entity_id: sensor.boiler_dhw_setpoint
    - platform: state
      entity_id: input_boolean.systeme_stable
      to: "on"
      id: systeme_stable

  sensor:
    - name: "ECS - Consigne chaudiere (securisee)"
      unique_id: ecs_consigne_chaudiere_securisee
      unit_of_measurement: "°C"
      state_class: measurement
      state: >
        {% set v = states('sensor.boiler_dhw_setpoint') %}
        {% if v | is_number %}
          {{ v | float }}
        {% else %}
          {{ this.state | float(0) }}
        {% endif %}
