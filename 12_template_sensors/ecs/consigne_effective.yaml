# ==========================================================
# 🧊 TEMPLATE TRIGGERED SENSOR — ECS (Consigne chaudière sécurisée)
# ----------------------------------------------------------
# 🎯 Objectif :
#   Fournir aux consommateurs ECS une lecture fiable de la consigne
#   ECS chaudière, robuste aux invalidités transitoires de la source
#   — SANS jamais fabriquer de valeur.
#
# 📜 Contrat propriétaire :
#   00_documentation_arsenal/contrats/ecs/sensor_ecs_consigne_chaudiere_securisee.md
#   (invariants I-SEC-CONS-1..5) — subordonné à parametres_invalides.md.
#
# ⚙️ Comportement (table contractuelle §4/§5 du contrat) :
#   - source valide                       → valeur source · provenance = source
#   - source invalide + restauration
#     contractualisée (état numérique ET
#     provenance restaurée ∈ {source,
#     retenue})                           → état restauré  · provenance = retenue
#   - source invalide + aucune
#     restauration contractualisée        → unknown         · provenance = indisponible
#
# 🚫 Interdits (I-SEC-CONS-1/2) :
#   - aucune sentinelle numérique (0 / 0.0 / -1) ni fallback chiffré ;
#   - aucune garde `availability` (l'absence = state unknown +
#     provenance indisponible, pas une indispo du porteur).
#   - provenance = ensemble FERMÉ {source, retenue, indisponible} :
#     jamais `mesure` (vocabulaire de mesure, pas de setpoint), ni
#     chaîne vide, ni None, ni quatrième valeur.
#
# 🧠 Rejet des états historiques : une valeur restaurée n'est retenue
#   que si elle porte une provenance source/retenue — que seul ce
#   capteur conforme produit. Une ancienne valeur (dont un 0 fabriqué)
#   dépourvue de provenance est rejetée → unknown. Aucune migration.
#
# 🧮 Source : sensor.boiler_dhw_setpoint (domaine Boiler)
# 📊 Type : Trigger Template Sensor
# 📏 Unité : °C
# ==========================================================

- trigger:
    - platform: state
      entity_id: sensor.boiler_dhw_setpoint
    - platform: state
      entity_id: input_boolean.systeme_stable
      to: "on"
      id: systeme_stable
    - platform: homeassistant
      event: start
      id: ha_start

  sensor:
    - name: "ECS - Consigne chaudiere (securisee)"
      unique_id: ecs_consigne_chaudiere_securisee
      unit_of_measurement: "°C"
      state_class: measurement

      state: >
        {% set v = states('sensor.boiler_dhw_setpoint') %}
        {% if v | is_number %}
          {{ v | float }}
        {% else %}
          {% set prev = this.state %}
          {% set prov = this.attributes.get('provenance', none) %}
          {% if (prev | is_number) and prov in ['source', 'retenue'] %}
            {{ prev | float }}
          {% else %}
            unknown
          {% endif %}
        {% endif %}

      attributes:
        provenance: >
          {% set v = states('sensor.boiler_dhw_setpoint') %}
          {% if v | is_number %}
            source
          {% else %}
            {% set prev = this.state %}
            {% set prov = this.attributes.get('provenance', none) %}
            {% if (prev | is_number) and prov in ['source', 'retenue'] %}
              retenue
            {% else %}
              indisponible
            {% endif %}
          {% endif %}
