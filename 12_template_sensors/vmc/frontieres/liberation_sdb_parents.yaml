# ==========================================================
# 🧠 ARSENAL — TEMPLATE SENSOR
#     VMC — Frontière de libération modulée, SdB parents
# ----------------------------------------------------------
# 🎯 ROLE
#   Calculer et exposer la frontiere de liberation du besoin
#   humidite de la salle de bain parents, modulee par la
#   temperature exterieure instantanee, ainsi que le plancher
#   de la voie d'evolution qui la suit.
#
# 📐 MODELE — §7.4 bis
#     OFF = borne( A - B x T_ext )   borne dans [basse, haute]
#     P   = OFF + H
#
#   La liberation porte EXCLUSIVEMENT sur la mesure de la
#   piece (§6.4) ; seule la VALEUR de la frontiere est modulee.
#   La grandeur modulante n'est pas comparee : elle parametre
#   le point de comparaison.
#
# 🔒 PROPRIETE DES CONSTANTES — engagement L7.0, §2 bis
#   `A`, `B` et `H` sont des CONSTANTES VERSIONNEES :
#     1. modifiables uniquement par commit, sous revue ;
#     2. differenciees par piece ;
#     3. DEFINIES UNE SEULE FOIS — ici, et nulle part ailleurs ;
#     4. exposees PAR CETTE ENTITE, qui est celle qui calcule ;
#     5. jamais dupliquees dans un helper, jamais remplacees
#        par un repli silencieux.
#
#   L'automatisation de la machine hysteretique LIT cette
#   entite ; elle ne redefinit aucune de ces valeurs.
#
#   Valeurs issues de la passe 5 de C35 L2b. PROVISOIRES et
#   REVISABLES : les modifier ici ne vaut pas recalibration.
#
# ⚠️ FRONTIERE NON CALCULABLE — §7.4 bis condition 4
#   Si la grandeur modulante est inexploitable, l'etat vaut
#   `unknown` et la cause est exposee. AUCUNE bascule vers une
#   frontiere fixe : ce serait substituer silencieusement un
#   mecanisme dont l'inoperance estivale est demontree (8/42
#   episodes) et qui echoue le controle du §7.4.
#
#   Un besoin actif est alors MAINTENU : `unknown` ne vaut
#   jamais liberation.
#
# 🧱 PRINCIPE
#   - Calcul PUR
#   - Aucun etat, aucune memoire
#   - Aucune action
#   - Ne lit AUCUNE mesure de piece
# ==========================================================

- sensor:
    - name: "VMC frontière libération SdB parents"
      unique_id: vmc_frontiere_liberation_sdb_parents
      default_entity_id: sensor.vmc_frontiere_liberation_sdb_parents
      unit_of_measurement: "%"
      icon: mdi:arrow-collapse-horizontal

      state: >
        {% set a = 78.0 %}
        {% set b = 0.8 %}
        {% set text = states('sensor.temperature_jardin') | float(none) %}
        {% set lo = states('input_number.vmc_borne_basse_sdb_parents') | float(none) %}
        {% set hi = states('input_number.vmc_borne_haute_sdb_parents') | float(none) %}
        {% if text is none or lo is none or hi is none %}
          {# On rend le None de Python, PAS le texte `unknown` : ce capteur
             a une unite ("%") donc HA en attend un nombre et valide l'etat
             (`template.validators.number`). Un `unknown` litteral echoue
             `float()` et journalise a chaque rechargement :
               Received invalid sensor state: unknown ... expected a number
             Le None est reconnu (`check_result_for_none`), court-circuite la
             validation SANS erreur, et l'etat devient bien `unknown` — meme
             idiome que l'attribut `plancher_evolution` ci-dessous. #}
          {{ none }}
        {% else %}
          {{ [lo, [hi, a - b * text] | min] | max | round(2) }}
        {% endif %}

      attributes:

        # §10.2 exigence 20 — grandeur modulante employee.
        grandeur_modulante: "sensor.temperature_jardin"

        # §10.2 exigence 21 — sa valeur courante.
        valeur_modulante: >
          {{ states('sensor.temperature_jardin') }}

        # §10.2 exigence 23 — bornes entre lesquelles la frontiere demeure.
        borne_basse: >
          {{ states('input_number.vmc_borne_basse_sdb_parents') }}

        borne_haute: >
          {{ states('input_number.vmc_borne_haute_sdb_parents') }}

        # Constantes de calibration — definition autoritative UNIQUE.
        constante_a: 78.0
        constante_b: 0.8
        bande_morte_h: 4.0

        # Plancher de la voie d'evolution : P = OFF + H.
        # Il SUIT la frontiere ; un plancher fixe perdrait tous les
        # episodes d'ete, dont les pics sont bas.
        plancher_evolution: >
          {% set a = 78.0 %}
          {% set b = 0.8 %}
          {% set h = 4.0 %}
          {% set text = states('sensor.temperature_jardin') | float(none) %}
          {% set lo = states('input_number.vmc_borne_basse_sdb_parents') | float(none) %}
          {% set hi = states('input_number.vmc_borne_haute_sdb_parents') | float(none) %}
          {% if text is none or lo is none or hi is none %}
            {{ none }}
          {% else %}
            {{ ([lo, [hi, a - b * text] | min] | max + h) | round(2) }}
          {% endif %}

        # §10.2 exigence 24 — statut calculable / non calculable.
        calculable: >
          {% set text = states('sensor.temperature_jardin') | float(none) %}
          {% set lo = states('input_number.vmc_borne_basse_sdb_parents') | float(none) %}
          {% set hi = states('input_number.vmc_borne_haute_sdb_parents') | float(none) %}
          {{ text is not none and lo is not none and hi is not none }}

        # §10.2 exigence 24 — et sa raison.
        cause_non_calculable: >
          {% set text = states('sensor.temperature_jardin') | float(none) %}
          {% set lo = states('input_number.vmc_borne_basse_sdb_parents') | float(none) %}
          {% set hi = states('input_number.vmc_borne_haute_sdb_parents') | float(none) %}
          {% if text is none %}
            grandeur_modulante_inexploitable
          {% elif lo is none or hi is none %}
            bornes_inexploitables
          {% else %}
            none
          {% endif %}

        # Statut publie de l'axe modulant, pour que la cause d'une
        # indisponibilite reste remontable sans quitter cette entite.
        statut_grandeur_modulante: >
          {{ states('sensor.temperature_jardin_statut') }}
