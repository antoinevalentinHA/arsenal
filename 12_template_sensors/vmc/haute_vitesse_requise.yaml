# ==========================================================
# 🧠 ARSENAL — BINARY SENSOR : VMC haute vitesse requise
# ----------------------------------------------------------
# 🎯 ROLE
#   AGREGER les besoins d'extraction en une demande unique.
#
# 🧱 PRINCIPE — AGREGATION PURE (§2.4)
#   Ce capteur ne detient AUCUN etat, n'applique AUCUNE
#   frontiere qui lui soit propre, et ne lit AUCUNE mesure de
#   piece. Il compose des besoins deja formes ailleurs.
#
#   - Aucun timer
#   - Aucune action
#   - Aucune memoire d'etat
#   - Aucun maintien d'hysteresis
#   - AUCUNE frontiere locale
#
# 📌 CHANGEMENT C35 L7.1
#   Ce capteur etait un COMPARATEUR : il lisait les trois
#   mesures de piece et leur appliquait une frontiere globale.
#   Il devient une AGREGATION.
#
#   La voie humidite est desormais portee PAR PIECE :
#     binary_sensor.vmc_besoin_humidite_sdb_parents
#     binary_sensor.vmc_besoin_humidite_sdb_enfants
#
#   Le SEJOUR ne contribue plus a la voie humidite. Arbitrage
#   de la passe 1 : le corpus ne justifie pas de lui conferer
#   un besoin humidite local autonome. Son rattachement
#   definitif a un objectif du contrat n'est PAS prononce.
#
# 📌 VOIE CO2 — DEVENUE UN BESOIN A PART ENTIERE (L7.6)
#   La voie CO2 etait le DERNIER COMPARATEUR loge ici : une
#   frontiere unique, aucun etat, aucune liberation, et un
#   repli `| float(1000)`.
#
#   Le §5.3 definit pourtant la voie CO2 comme UN BESOIN
#   UNIQUE dote d'un ETAT BOOLEEN PROPRE, et le §5.1 exige de
#   tout besoin une frontiere de LIBERATION propre.
#
#   Elle est desormais portee par
#   `binary_sensor.vmc_besoin_co2_sejour`, au meme titre que
#   les besoins de piece. Ce fichier ne lit donc PLUS AUCUNE
#   mesure ni AUCUNE frontiere : il compose trois besoins
#   homogenes, et rien d'autre.
#
# ⚠️ ETATS DEGRADES
#   Un besoin de piece indisponible n'est pas compte comme
#   actif. Le traitement contractuel de l'indisponibilite
#   — §4.4, maintien du besoin actif — releve de L7.5 ; il
#   n'est PAS acquis a ce stade, et c'est l'ecart n° 5.
#
# ⚠️ VERROU D'AERATION
#   Il ne figure plus ici : il a ete DEPLACE dans les besoins
#   locaux, ou L7.2 le supprimera. Le retrait de ce fichier de
#   la liste des consommateurs legitimes releve du meme lot.
# ==========================================================

- binary_sensor:
    - name: "VMC haute vitesse requise"
      unique_id: vmc_haute_vitesse_requise
      default_entity_id: binary_sensor.vmc_haute_vitesse_requise

      state: >
        {{ is_state('binary_sensor.vmc_besoin_humidite_sdb_parents', 'on')
           or is_state('binary_sensor.vmc_besoin_humidite_sdb_enfants', 'on')
           or is_state('binary_sensor.vmc_besoin_co2_sejour', 'on') }}

      icon: >
        {% if is_state(this.entity_id, 'on') %}
          mdi:fan-alert
        {% else %}
          mdi:fan
        {% endif %}

      attributes:

        # §10.2 exigence 9 — composition globale lorsque plusieurs
        # besoins sont actifs. Enonce comme un ETAT, jamais comme un
        # recit (§10.3).
        composition: >
          {% set ns = namespace(actifs=[]) %}
          {% for e, nom in [
               ('binary_sensor.vmc_besoin_humidite_sdb_parents', 'SdB parents'),
               ('binary_sensor.vmc_besoin_humidite_sdb_enfants', 'SdB enfants'),
               ('binary_sensor.vmc_besoin_co2_sejour', 'CO₂ séjour')] %}
            {% if is_state(e, 'on') %}
              {% set ns.actifs = ns.actifs + [nom] %}
            {% endif %}
          {% endfor %}
          {{ ns.actifs | join(' + ') if ns.actifs else 'Aucun besoin actif' }}

        besoin_sdb_parents: >
          {{ states('binary_sensor.vmc_besoin_humidite_sdb_parents') }}

        besoin_sdb_enfants: >
          {{ states('binary_sensor.vmc_besoin_humidite_sdb_enfants') }}

        besoin_co2_sejour: >
          {{ states('binary_sensor.vmc_besoin_co2_sejour') }}

        # §10.2 exigence 8 — l'abstention doit rester distincte de
        # l'etat metier. Un besoin non calculable n'est PAS un besoin
        # absent, et cette distinction doit rester lisible meme si le
        # §4.4 n'est pas encore applique (L7.5).
        besoins_non_calculables: >
          {% set ns = namespace(liste=[]) %}
          {% for e in ['binary_sensor.vmc_besoin_humidite_sdb_parents',
                       'binary_sensor.vmc_besoin_humidite_sdb_enfants',
                       'binary_sensor.vmc_besoin_co2_sejour'] %}
            {% if states(e) in ['unknown', 'unavailable'] %}
              {% set ns.liste = ns.liste + [e] %}
            {% endif %}
          {% endfor %}
          {{ ns.liste | join(', ') if ns.liste else 'none' }}
