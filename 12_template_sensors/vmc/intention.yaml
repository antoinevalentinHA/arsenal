# ==========================================================
# 🧠 ARSENAL — TEMPLATE SENSOR : VMC intention
# ----------------------------------------------------------
# 🎯 Rôle :
#   Exposer l'intention métier de la VMC et sa cause, de
#   manière lisible et localisée.
#
# 🧱 Principe :
#   - Traduction sémantique PURE
#   - Aucun état partagé entre templates
#   - Compatible reload / redémarrage
#
# 🔒 INVARIANT DE NON-DIVERGENCE — §11.2
#   La cause est DÉRIVÉE de l'attribut autoritatif
#   `composition` de binary_sensor.vmc_haute_vitesse_requise.
#
#   Ce capteur ne recalcule RIEN :
#     - il ne lit aucune mesure de pièce ;
#     - il ne lit aucune frontière ;
#     - il n'applique aucune comparaison.
#
#   Le §11.2 l'exige : « toute cause exposée doit être calculée
#   à partir des mêmes grandeurs, des mêmes frontières et des
#   mêmes états que la décision. Une approximation retenue pour
#   la lisibilité, susceptible de diverger de la décision
#   réelle, est interdite. »
#
# 📌 CORRECTION C35 L7.1
#   Ce capteur calculait auparavant sa cause sur les TROIS
#   mesures de pièce et sur le helper GLOBAL de seuil, avec une
#   approximation d'aération assumée comme pouvant diverger.
#
#   Depuis que le séjour a quitté la voie humidité et que les
#   frontières sont devenues locales, cette divergence n'était
#   plus seulement possible : elle était CERTAINE. Elle est
#   supprimée à la source, et non reportée.
#
#   Conséquence : les attributs `humidite_max`,
#   `piece_dominante`, `co2_sejour` et `delta_humidite_absolue`
#   sont RETIRÉS — chacun constituait un recalcul indépendant
#   de la décision. Aucun n'était consommé par l'UI, qui ne lit
#   que `cause`.
#
# 🚫 AUCUN REPLI SILENCIEUX
#   Décision indisponible ou composition non exposée : la
#   situation est NOMMÉE, jamais remplacée par une cause
#   plausible.
#
# ❗ Ce capteur ne décide rien, n'influence rien, et ne
#   constitue pas une source de vérité (§11.1).
# ==========================================================

- sensor:
    - name: "VMC intention"
      unique_id: vmc_intention
      icon: mdi:brain

      state: >
        {% set decision = states('binary_sensor.vmc_haute_vitesse_requise') %}
        {% if decision == 'on' %}
          Extraction utile demandée
        {% elif decision == 'off' %}
          Fonctionnement nominal demandé
        {% else %}
          Intention indisponible
        {% endif %}

      attributes:

        # §10.2 exigence 2 — la cause, DÉRIVÉE et jamais recalculée.
        # §10.3 — un motif décrit une condition d'état actuellement
        # satisfaite, jamais un événement passé.
        cause: >
          {% set decision = states('binary_sensor.vmc_haute_vitesse_requise') %}
          {% set composition = state_attr(
               'binary_sensor.vmc_haute_vitesse_requise', 'composition') %}
          {% if decision not in ['on', 'off'] %}
            Décision indisponible
          {% elif composition is none or composition | trim == '' %}
            Composition non exposée par la décision
          {% elif decision == 'off' %}
            Aucun besoin identifié
          {% else %}
            Besoin actif – {{ composition | trim }}
          {% endif %}

        # Source autoritative recopiée telle quelle, pour que la
        # dérivation soit vérifiable sans quitter ce capteur.
        composition_autoritative: >
          {% set composition = state_attr(
               'binary_sensor.vmc_haute_vitesse_requise', 'composition') %}
          {{ composition if composition is not none else 'non exposée' }}

        # §10.2 exigence 8 — l'abstention reste distincte de l'état
        # métier. Une intention indisponible n'est pas une absence de
        # besoin.
        source_disponible: >
          {% set decision = states('binary_sensor.vmc_haute_vitesse_requise') %}
          {% set composition = state_attr(
               'binary_sensor.vmc_haute_vitesse_requise', 'composition') %}
          {{ decision in ['on', 'off'] and composition is not none }}

        cause_indisponibilite: >
          {% set decision = states('binary_sensor.vmc_haute_vitesse_requise') %}
          {% set composition = state_attr(
               'binary_sensor.vmc_haute_vitesse_requise', 'composition') %}
          {% if decision not in ['on', 'off'] %}
            decision_indisponible
          {% elif composition is none %}
            composition_non_exposee
          {% else %}
            none
          {% endif %}
