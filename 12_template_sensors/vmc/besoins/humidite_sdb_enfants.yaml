# ==========================================================
# 🧠 ARSENAL — BINARY SENSOR : VMC besoin humidité SdB enfants
# ----------------------------------------------------------
# 🎯 ROLE
#   Exprimer le BESOIN D'EXTRACTION LOCAL de la salle de
#   douche enfants, a partir de la seule mesure de cette piece.
#
# ⚠️ PIECE A USAGE LEGER, MACHINE OBLIGATOIRE
#   La faible volumetrie observee ne vaut PAS absence de
#   besoin : le systeme doit etre pret avant l'usage. Arbitrage
#   de la passe 1, confirme par la mesure du solde de L5 —
#   2 episodes servis sur 27 en sept mois.
#
# ⚠️ MESURE RESTITUEE AU POINT ENTIER
#   Le capteur de cette piece ne descend pas sous le point
#   entier. Toute frontiere et toute bande morte devront
#   rester representables a cette granularite (L7.4).
#
# 🧱 PRINCIPE
#   - Besoin LOCAL : la mesure d'aucune autre piece n'entre ici
#   - Aucune agregation
#   - Aucune action
#   - Aucune temporisation
#   - Aucune memoire
#
# 📌 ETAT TRANSITOIRE — C35 L7.1
#   Ce capteur est NON HYSTERETIQUE a ce stade : entree et
#   liberation partagent la meme frontiere de niveau. Il
#   reproduit donc la semantique en vigueur, mais PAR PIECE.
#
#   L'hysteresis, la voie d'evolution et la frontiere de
#   liberation modulee relevent de L7.3 et L7.4. Tant qu'il
#   n'existe AUCUNE bande morte, le §9.1 n'a pas d'objet :
#   les cas 1 et 2 couvrent tout l'espace, et un etat restaure
#   serait immediatement ecrase par la mesure courante.
#
# ✅ VERROU D'AERATION — RETIRE (C35 L7.2)
#   Le verdict d'opportunite d'ouverture des fenetres ne
#   conditionne PLUS cette voie. C'etait l'ECART CONTRACTUEL
#   n° 1 du chantier C35 ; le §4.3 le proscrivait deja.
#
#   Ce verdict evalue l'opportunite d'aerer, a l'echelle d'un
#   VOLUME et sur une echelle de temps LONGUE : il releve de
#   l'objectif O3. Le §1.2 interdit qu'un critere servant O3
#   conditionne une extraction locale.
#
#   L'identifiant de ce capteur n'est volontairement PAS cite
#   ici : sa seule mention suffirait a faire de ce fichier un
#   consommateur au regard du controle T10 du contrat
#   d'aeration.
#
#   Ce capteur ne lit desormais AUCUNE grandeur exterieure a sa
#   propre piece.
#
# 📌 CE CAPTEUR EXPOSE, IL NE DECIDE PLUS (C35 L7.4)
#   L'etat du besoin est desormais PORTE par
#   `input_boolean.vmc_etat_besoin_sdb_enfants`, ecrit par la
#   machine hysteretique. Ce capteur en est la FACADE METIER :
#   il reflete l'etat et porte l'explicabilite.
#
#   Motif : un capteur `template` ne peut pas porter
#   d'hysteresis PERSISTANTE. L'idiome `is_state(this.entity_id,
#   …)` tient l'etat en session mais ne survit pas au
#   redemarrage, ce que le §9.1 exige.
#
# 📐 MACHINE — §6.2, §6.3, §6.4, §7.4 bis
#   entree     : niveau >= S
#                OU ( evolution >= D sur W  ET  niveau >= P )
#   liberation : niveau <= OFF
#   avec OFF = borne( A - B x T_ext ) et P = OFF + H, lus sur
#   `sensor.vmc_frontiere_liberation_sdb_enfants`, seule
#   definition autoritative des constantes A, B et H.
#
# 📐 VOIE D'EVOLUTION — DESORMAIS DECISIONNELLE
#   Les attributs `evolution_*` exposent l'observation
#   glissante bornee du §2.2 bis (§10.2, exigences 11 a 19).
#   Elle est CONDITION D'ENTREE UNIQUEMENT : elle ne participe
#   ni au maintien ni a la liberation.
#
#   Elle n'a pu etre rendue decisionnelle qu'ici, la frontiere
#   modulee lui donnant enfin une liberation DISTINCTE de son
#   entree.
#
# 🚫 AUCUN REPLI SILENCIEUX
#   Mesure ou frontiere inexploitable => le capteur devient
#   INDISPONIBLE, et l'attribut `cause_indisponibilite` en
#   donne la raison. Aucune valeur de repli n'est fabriquee.
#
#   Le traitement contractuel de cette indisponibilite — §4.4,
#   maintien du besoin actif — releve de L7.5.
#
# 🔗 PARAMETRE CONSOMME
#   input_number.vmc_seuil_on_sdb_enfants     (L7.0)
#   input_number.vmc_fenetre_sdb_enfants      (L7.0, expose)
#   input_number.vmc_evolution_sdb_enfants    (L7.0, expose)
#   sensor.vmc_minimum_glissant_sdb_enfants   (L7.3)
# ==========================================================

- binary_sensor:
    - name: "VMC besoin humidité SdB enfants"
      unique_id: vmc_besoin_humidite_sdb_enfants
      default_entity_id: binary_sensor.vmc_besoin_humidite_sdb_enfants

      availability: >
        {{ states('input_boolean.vmc_etat_besoin_sdb_enfants')
             not in ['unknown', 'unavailable'] }}

      state: >
        {{ is_state('input_boolean.vmc_etat_besoin_sdb_enfants', 'on') }}

      icon: >
        {% if is_state(this.entity_id, 'on') %}
          mdi:shower-head
        {% else %}
          mdi:water-off-outline
        {% endif %}

      attributes:

        piece: "Salle de douche enfants"

        mesure_locale: >
          {{ states('sensor.humidite_relative_sdb_enfants') }}

        frontiere_entree: >
          {{ states('input_number.vmc_seuil_on_sdb_enfants') }}

        # §10.2 exigence 2 — condition actuelle justifiant l'entree.
        # Formulee comme une CONDITION D'ETAT, jamais comme un recit
        # d'evenement passe (§10.3).
        # §10.2 exigence 2 — condition actuelle justifiant l'entree.
        # Formulee comme une CONDITION D'ETAT, jamais comme un recit
        # d'evenement passe (§10.3).
        condition_entree: >
          {% set v = states('sensor.humidite_relative_sdb_enfants') | float(none) %}
          {% set s = states('input_number.vmc_seuil_on_sdb_enfants') | float(none) %}
          {% set mn = states('sensor.vmc_minimum_glissant_sdb_enfants') | float(none) %}
          {% set d = states('input_number.vmc_evolution_sdb_enfants') | float(none) %}
          {% set p = state_attr('sensor.vmc_frontiere_liberation_sdb_enfants',
                                'plancher_evolution') | float(none) %}
          {% if v is none %}
            Mesure locale inexploitable
          {% elif s is not none and v >= s %}
            Frontière de niveau atteinte
          {% elif mn is none or d is none or p is none %}
            Voie d'évolution non calculable
          {% elif (v - mn) >= d and v >= p %}
            Évolution locale au-dessus du plancher
          {% elif (v - mn) >= d %}
            Évolution atteinte, mais mesure sous le plancher
          {% else %}
            Aucune condition d'entrée satisfaite
          {% endif %}

        # §10.2 exigence 3 — condition actuelle justifiant le MAINTIEN.
        condition_maintien: >
          {% set v = states('sensor.humidite_relative_sdb_enfants') | float(none) %}
          {% set off = states('sensor.vmc_frontiere_liberation_sdb_enfants') | float(none) %}
          {% if not is_state('input_boolean.vmc_etat_besoin_sdb_enfants', 'on') %}
            Sans objet — besoin inactif
          {% elif off is none %}
            Frontière non calculable — le besoin est maintenu (§7.4 bis)
          {% elif v is none %}
            Mesure inexploitable — le besoin est maintenu
          {% elif v > off %}
            Mesure au-dessus de la frontière de libération
          {% else %}
            Libération satisfaite
          {% endif %}

        # §10.2 exigence 4 — condition actuelle justifiant la LIBERATION.
        condition_liberation: >
          {% set v = states('sensor.humidite_relative_sdb_enfants') | float(none) %}
          {% set off = states('sensor.vmc_frontiere_liberation_sdb_enfants') | float(none) %}
          {% if off is none %}
            Non calculable — aucune libération possible
          {% elif v is none %}
            Non calculable — mesure inexploitable
          {% else %}
            {{ 'Mesure sous la frontière' if v <= off else 'Mesure au-dessus de la frontière' }}
          {% endif %}

        # §10.2 exigence 6 — frontieres REELLEMENT utilisees (§10.4).
        frontiere_liberation: >
          {{ states('sensor.vmc_frontiere_liberation_sdb_enfants') }}

        plancher_evolution: >
          {{ state_attr('sensor.vmc_frontiere_liberation_sdb_enfants',
                        'plancher_evolution') }}

        frontiere_calculable: >
          {{ state_attr('sensor.vmc_frontiere_liberation_sdb_enfants',
                        'calculable') }}

        # §10.2 exigence 8 — un besoin MAINTENU faute de frontiere
        # calculable doit etre distinguable d'un besoin dont la
        # condition est calculee et non satisfaite (§12.3).
        maintenu_faute_de_frontiere: >
          {{ is_state('input_boolean.vmc_etat_besoin_sdb_enfants', 'on')
             and state_attr('sensor.vmc_frontiere_liberation_sdb_enfants',
                            'calculable') != true }}

        calculable: >
          {% set mesure = states('sensor.humidite_relative_sdb_enfants') | float(none) %}
          {% set seuil = states('input_number.vmc_seuil_on_sdb_enfants') | float(none) %}
          {{ mesure is not none and seuil is not none }}

        cause_indisponibilite: >
          {% set mesure = states('sensor.humidite_relative_sdb_enfants') | float(none) %}
          {% set seuil = states('input_number.vmc_seuil_on_sdb_enfants') | float(none) %}
          {% if mesure is none and seuil is none %}
            mesure_et_frontiere_inexploitables
          {% elif mesure is none %}
            mesure_locale_inexploitable
          {% elif seuil is none %}
            frontiere_inexploitable
          {% else %}
            none
          {% endif %}

        # ==============================================
        # §10.2 exigences 11 a 19 — observation glissante
        # ==============================================
        # Exposees, JAMAIS consommees par `state` a ce stade.

        evolution_fenetre_nominale: >
          {{ states('input_number.vmc_fenetre_sdb_enfants') }}

        evolution_profondeur_disponible: >
          {{ state_attr('sensor.vmc_minimum_glissant_sdb_enfants',
                        'age_coverage_ratio') }}

        evolution_valeur_courante: >
          {{ states('sensor.humidite_relative_sdb_enfants') }}

        evolution_valeur_reference: >
          {{ states('sensor.vmc_minimum_glissant_sdb_enfants') }}

        evolution_calculee: >
          {% set v = states('sensor.humidite_relative_sdb_enfants') | float(none) %}
          {% set mn = states('sensor.vmc_minimum_glissant_sdb_enfants') | float(none) %}
          {{ (v - mn) | round(2) if (v is not none and mn is not none) else none }}

        evolution_frontiere: >
          {{ states('input_number.vmc_evolution_sdb_enfants') }}

        # §9.1 bis / §4.4 bis — une profondeur insuffisante n'est ni une
        # mesure indisponible, ni un critere non satisfait. Elle empeche la
        # voie dynamique de creer un besoin, sans en revoquer aucun.
        evolution_profondeur_suffisante: >
          {% set c = state_attr('sensor.vmc_minimum_glissant_sdb_enfants',
                               'age_coverage_ratio') | float(none) %}
          {{ c is not none and c >= 0.5 }}

        evolution_calculable: >
          {% set v = states('sensor.humidite_relative_sdb_enfants') | float(none) %}
          {% set mn = states('sensor.vmc_minimum_glissant_sdb_enfants') | float(none) %}
          {% set d = states('input_number.vmc_evolution_sdb_enfants') | float(none) %}
          {{ v is not none and mn is not none and d is not none }}

        evolution_satisfaite: >
          {% set v = states('sensor.humidite_relative_sdb_enfants') | float(none) %}
          {% set mn = states('sensor.vmc_minimum_glissant_sdb_enfants') | float(none) %}
          {% set d = states('input_number.vmc_evolution_sdb_enfants') | float(none) %}
          {% if v is none or mn is none or d is none %}
            non calculable
          {% else %}
            {{ (v - mn) >= d }}
          {% endif %}

        evolution_cause_non_calculable: >
          {% set v = states('sensor.humidite_relative_sdb_enfants') | float(none) %}
          {% set mn = states('sensor.vmc_minimum_glissant_sdb_enfants') | float(none) %}
          {% set d = states('input_number.vmc_evolution_sdb_enfants') | float(none) %}
          {% if mn is none %}
            reference_glissante_indisponible
          {% elif v is none %}
            mesure_locale_inexploitable
          {% elif d is none %}
            frontiere_evolution_inexploitable
          {% else %}
            none
          {% endif %}

        # §4.4 bis — une profondeur insuffisante n'est ni une mesure
        # indisponible, ni un critere non satisfait.
        evolution_role: >
          DÉCISIONNELLE depuis L7.4 : elle ouvre le besoin lorsque l'évolution
          atteint sa frontière ET que la mesure se situe au-dessus du plancher
          qui suit la frontière de libération. Condition d'ENTRÉE uniquement —
          elle ne participe ni au maintien ni à la libération (§2.2 bis).

        # §10.2 exigence 3 et 4 — maintien et liberation.
        # Enonce exact de l'etat transitoire, sans le masquer.
        hysteresis: >
          Active. Entrée et libération sont distinctes : entrée par niveau ou
          par évolution au-dessus du plancher, libération sous la frontière
          modulée par la température extérieure. L'état est porté par
          input_boolean.vmc_etat_besoin_sdb_enfants et restauré au redémarrage.
