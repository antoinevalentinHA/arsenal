# ==========================================================
# 🌡️ TEMPLATE TRIGGERED SENSORS — Couleur Humidex (toutes zones)
# ----------------------------------------------------------
# 💡 Objectif :
#   Fournir une indication visuelle du niveau de confort
#   thermique perçu (Humidex) pour chaque zone, en comparant
#   la valeur mesurée à des seuils bas et haut définis
#   localement.
#
# ⚙️ Fonctionnement :
#   - Source principale :
#       • sensor.humidex_<zone>
#   - Seuils métier associés :
#       • sensor.humidex_seuil_bas_<zone>
#       • sensor.humidex_seuil_haut_<zone>
#   - Calcul d’une marge dynamique :
#       • marge = (seuil_haut - seuil_bas) / 5
#
# 🎨 Interprétation des couleurs :
#   - blue        → Humidex très bas (froid sec)
#   - light_blue  → Bas
#   - light_green → Légèrement sous la zone de confort
#   - green       → Zone de confort optimale
#   - yellow      → Légèrement inconfortable (chaleur/humidité)
#   - red         → Inconfort marqué
#   - grey        → Valeurs invalides ou seuils incohérents
#
# 🔁 Rafraîchissement :
#   - À chaque changement de valeur ou de seuil
#   - Au démarrage de Home Assistant
#
# 🧠 Détails techniques :
#   - Capteurs indépendants par zone
#   - Les seuils ne sont jamais modifiés
#   - Sortie sous forme de texte (nom de couleur)
#
# 📊 Type :
#   Trigger Template Sensors
# ==========================================================

- trigger:
    - platform: state
      entity_id:
        - sensor.humidex_chambre_arnaud
        - sensor.humidex_seuil_bas_chambre_arnaud
        - sensor.humidex_seuil_haut_chambre_arnaud
    - platform: homeassistant
      event: start
  sensor:
    - name: "Couleur Humidex Chambre Arnaud"
      unique_id: couleur_humidex_chambre_arnaud
      state: &couleur_humidex_logic >
        {% set suffixe = this.entity_id | replace('sensor.couleur_humidex_', '') %}
        {% set src = 'sensor.humidex_' ~ suffixe %}

        {% set raw = states(src) %}
        {% set h = raw | replace(',', '.') | float(999) %}

        {% if raw in ['unknown', 'unavailable', None] or h == 999 %}
          grey
        {% elif h < 30 %}
          green
        {% elif h < 40 %}
          yellow
        {% elif h < 45 %}
          orange
        {% elif h < 55 %}
          red
        {% else %}
          dark_red
        {% endif %}
      attributes:
        reason: >
          {% set suffixe = this.entity_id | replace('sensor.couleur_humidex_', '') %}
          {% set src = 'sensor.humidex_' ~ suffixe %}

          {% set raw = states(src) %}
          {% set h = raw | replace(',', '.') | float(999) %}

          {% if raw in ['unknown', 'unavailable', None] or h == 999 %}
            unavailable
          {% else %}
            ok
          {% endif %}

