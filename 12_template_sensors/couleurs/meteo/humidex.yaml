# ==========================================================
# 🌡️ TEMPLATE TRIGGERED SENSORS — Couleur Humidex (toutes zones)
# ----------------------------------------------------------
# 💡 Objectif :
#   Fournir une indication visuelle du niveau de confort/risque
#   humidex pour chaque zone, sur une **échelle absolue** (paliers
#   fixes Environnement Canada), indépendante de toute normale locale.
#
# ⚙️ Fonctionnement :
#   - Source unique :
#       • sensor.humidex_<zone>
#   - Bornes fixes (cf. ui/couleurs/03_exceptions.md — Exception 8)
#
# 🎨 Interprétation des couleurs :
#   - green    → humidex < 30        (aucun inconfort)
#   - yellow   → 30 ≤ humidex < 40   (un certain inconfort)
#   - orange   → 40 ≤ humidex < 45   (beaucoup d'inconfort)
#   - red      → 45 ≤ humidex < 55   (danger)
#   - dark_red → humidex ≥ 55        (coup de chaleur imminent)
#   - grey     → valeur invalide / non numérique
#
# 🔁 Rafraîchissement :
#   - À chaque changement de la valeur humidex de la zone
#   - Au démarrage de Home Assistant
#
# 🧠 Détails techniques :
#   - Capteurs indépendants par zone
#   - Échelle absolue : aucune dépendance aux seuils dynamiques
#   - Sortie sous forme de texte (nom de couleur)
#
# 📊 Type :
#   Trigger Template Sensors
# ==========================================================

- trigger:
    - platform: state
      entity_id:
        - sensor.humidex_chambre_enfants
    - platform: homeassistant
      event: start
  sensor:
    - name: "Couleur Humidex Chambre Enfants"
      unique_id: couleur_humidex_chambre_enfants
      state: &couleur_humidex_logic >
        {% set suffixe = this.entity_id | replace('sensor.couleur_humidex_', '') %}
        {% set src = 'sensor.humidex_' ~ suffixe %}

        {% set raw = states(src) %}
        {% set h = raw | replace(',', '.') | float(999) %}

        {% if raw in ['unknown', 'unavailable', None] or h == 999 %}
          grey
        {% elif h < 30 %}
          green
        {% elif h < 40 %}
          yellow
        {% elif h < 45 %}
          orange
        {% elif h < 55 %}
          red
        {% else %}
          dark_red
        {% endif %}
      attributes:
        reason: >
          {% set suffixe = this.entity_id | replace('sensor.couleur_humidex_', '') %}
          {% set src = 'sensor.humidex_' ~ suffixe %}

          {% set raw = states(src) %}
          {% set h = raw | replace(',', '.') | float(999) %}

          {% if raw in ['unknown', 'unavailable', None] or h == 999 %}
            unavailable
          {% else %}
            ok
          {% endif %}

