# ==========================================================
# 🧠 ARSENAL — TEMPLATE SENSORS (COULEURS / METEO)
#     Temperature Min/Max — Couleurs MINMAX_JOUR
# ----------------------------------------------------------
# 📌 Fichier
#   /homeassistant/12_template_sensors/couleurs/meteo/temperature_min_max/minmax_jour.yaml
#
# 🎯 ROLE
#   Produire une couleur de synthèse pour les cartes UI
#   Min/Max à partir des capteurs :
#
#       couleur_temperature_min_jour_<suffixe>
#       couleur_temperature_max_jour_<suffixe>
#
# 🧩 PRINCIPE
#   - Synthèse par gravité thermique
#   - Auto-paramétrage via this.entity_id
#   - Aucun calcul thermique dans ce capteur
#
# 🛡️ PRIORITE COULEUR (Option A)
#
#   grey
#   red
#   yellow
#   blue
#   light_blue
#   green
#
# ==========================================================

- trigger:
    - platform: state
      entity_id:
        - sensor.couleur_temperature_min_jour_cave
        - sensor.couleur_temperature_min_jour_chambre_arnaud
        - sensor.couleur_temperature_min_jour_chambre_matthieu
        - sensor.couleur_temperature_min_jour_chambre_parents
        - sensor.couleur_temperature_min_jour_entree
        - sensor.couleur_temperature_min_jour_garage
        - sensor.couleur_temperature_min_jour_jardin
        - sensor.couleur_temperature_min_jour_palier
        - sensor.couleur_temperature_min_jour_petite_maison
        - sensor.couleur_temperature_min_jour_sdb_enfants
        - sensor.couleur_temperature_min_jour_sdb_parents
        - sensor.couleur_temperature_min_jour_sejour
        - sensor.couleur_temperature_max_jour_cave
        - sensor.couleur_temperature_max_jour_chambre_arnaud
        - sensor.couleur_temperature_max_jour_chambre_matthieu
        - sensor.couleur_temperature_max_jour_chambre_parents
        - sensor.couleur_temperature_max_jour_entree
        - sensor.couleur_temperature_max_jour_garage
        - sensor.couleur_temperature_max_jour_jardin
        - sensor.couleur_temperature_max_jour_palier
        - sensor.couleur_temperature_max_jour_petite_maison
        - sensor.couleur_temperature_max_jour_sdb_enfants
        - sensor.couleur_temperature_max_jour_sdb_parents
        - sensor.couleur_temperature_max_jour_sejour

    - platform: state
      entity_id: input_boolean.systeme_stable
      to: "on"

  sensor:

    # ------------------------------------------------------
    # LOGIQUE SYNTHESE COULEUR (ANCRE)
    # ------------------------------------------------------

    - name: "Couleur Temperature MinMax Jour Cave"
      unique_id: couleur_temperature_minmax_jour_cave

      state: &logic_couleur_minmax >
        {% set prefixe = 'sensor.couleur_temperature_minmax_jour_' %}
        {% set suffixe = this.entity_id | replace(prefixe, '') %}

        {% set c_min = states('sensor.couleur_temperature_min_jour_' ~ suffixe) %}
        {% set c_max = states('sensor.couleur_temperature_max_jour_' ~ suffixe) %}

        {% if c_min == 'grey' or c_max == 'grey' %}
          grey
        {% elif c_min == 'red' or c_max == 'red' %}
          red
        {% elif c_min == 'yellow' or c_max == 'yellow' %}
          yellow
        {% elif c_min == 'blue' or c_max == 'blue' %}
          blue
        {% elif c_min == 'light_blue' or c_max == 'light_blue' %}
          light_blue
        {% else %}
          green
        {% endif %}

      attributes: &attrs_couleur_minmax
        couleur_min: >
          {% set prefixe = 'sensor.couleur_temperature_minmax_jour_' %}
          {% set suffixe = this.entity_id | replace(prefixe, '') %}
          {{ states('sensor.couleur_temperature_min_jour_' ~ suffixe) }}

        couleur_max: >
          {% set prefixe = 'sensor.couleur_temperature_minmax_jour_' %}
          {% set suffixe = this.entity_id | replace(prefixe, '') %}
          {{ states('sensor.couleur_temperature_max_jour_' ~ suffixe) }}

    # ------------------------------------------------------
    # INSTANCES
    # ------------------------------------------------------

    - name: "Couleur Temperature MinMax Jour Chambre Arnaud"
      unique_id: couleur_temperature_minmax_jour_chambre_arnaud
      state: *logic_couleur_minmax
      attributes: *attrs_couleur_minmax

    - name: "Couleur Temperature MinMax Jour Chambre Matthieu"
      unique_id: couleur_temperature_minmax_jour_chambre_matthieu
      state: *logic_couleur_minmax
      attributes: *attrs_couleur_minmax

    - name: "Couleur Temperature MinMax Jour Chambre Parents"
      unique_id: couleur_temperature_minmax_jour_chambre_parents
      state: *logic_couleur_minmax
      attributes: *attrs_couleur_minmax

    - name: "Couleur Temperature MinMax Jour Entree"
      unique_id: couleur_temperature_minmax_jour_entree
      state: *logic_couleur_minmax
      attributes: *attrs_couleur_minmax

    - name: "Couleur Temperature MinMax Jour Garage"
      unique_id: couleur_temperature_minmax_jour_garage
      state: *logic_couleur_minmax
      attributes: *attrs_couleur_minmax

    - name: "Couleur Temperature MinMax Jour Jardin"
      unique_id: couleur_temperature_minmax_jour_jardin
      state: *logic_couleur_minmax
      attributes: *attrs_couleur_minmax

    - name: "Couleur Temperature MinMax Jour Palier"
      unique_id: couleur_temperature_minmax_jour_palier
      state: *logic_couleur_minmax
      attributes: *attrs_couleur_minmax

    - name: "Couleur Temperature MinMax Jour Petite Maison"
      unique_id: couleur_temperature_minmax_jour_petite_maison
      state: *logic_couleur_minmax
      attributes: *attrs_couleur_minmax

    - name: "Couleur Temperature MinMax Jour SDB Enfants"
      unique_id: couleur_temperature_minmax_jour_sdb_enfants
      state: *logic_couleur_minmax
      attributes: *attrs_couleur_minmax

    - name: "Couleur Temperature MinMax Jour SDB Parents"
      unique_id: couleur_temperature_minmax_jour_sdb_parents
      state: *logic_couleur_minmax
      attributes: *attrs_couleur_minmax

    - name: "Couleur Temperature MinMax Jour Sejour"
      unique_id: couleur_temperature_minmax_jour_sejour
      state: *logic_couleur_minmax
      attributes: *attrs_couleur_minmax