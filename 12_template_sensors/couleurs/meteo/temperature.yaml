# ==========================================================
# 🌡️ TEMPLATE TRIGGERED SENSORS — Couleurs de température
# ----------------------------------------------------------
# 🧠 Principe général
#   Chaque capteur "couleur_temperature_<zone>" fournit une
#   couleur représentative du niveau de température réel
#   par rapport à une plage de confort propre à la zone.
#
#   Le modèle est volontairement CENTRÉ sur le confort,
#   et non basé sur une simple progression bas → haut.
#
# ----------------------------------------------------------
# 📥 Données utilisées (par zone)
#   - sensor.temperature_<zone>
#       Température mesurée
#
#   - sensor.temperature_seuil_bas_<zone>
#       Limite basse acceptable
#
#   - sensor.temperature_seuil_haut_<zone>
#       Limite haute acceptable
#
# ----------------------------------------------------------
# ⚙️ Helper global
#   - input_number.temperature_couleur_zone_verte
#
#     Définit la DEMI-LARGEUR de la zone de confort autour
#     du centre de la plage (en °C).
#
#     Exemple :
#       bas = 18.0
#       haut = 20.0
#       centre = 19.0
#       zone_verte = 0.5
#
#       → zone verte = [18.5 ; 19.5]
#
# ----------------------------------------------------------
# 🎯 Calculs internes
#   - centre = (seuil_bas + seuil_haut) / 2
#
# ----------------------------------------------------------
# 🎨 Logique de couleur
#
#   t < seuil_bas                  → blue
#   seuil_bas ≤ t < centre - zone  → light_blue
#   centre - zone ≤ t ≤ centre + zone → green
#   centre + zone < t ≤ seuil_haut → yellow
#   t > seuil_haut                 → red
#
#   Valeurs invalides, absentes ou incohérentes :
#     → grey
#
# ----------------------------------------------------------
# ✅ Avantages du modèle
#   - Une zone verte réellement signifiante (confort réel)
#   - Lecture visuelle discriminante (fini le "tout vert")
#   - Un seul helper global pour ajuster finement
#   - Seuils bas/haut toujours spécifiques à chaque pièce
#
# ----------------------------------------------------------
# 🔁 Déclenchement
#   - À chaque variation de température
#   - À chaque modification des seuils
#   - À chaque modification du helper global
#   - Au démarrage de Home Assistant
#
# ==========================================================

- trigger:
    - platform: state
      entity_id:
        - sensor.temperature_chambre_enfants
        - sensor.temperature_seuil_bas_chambre_enfants
        - sensor.temperature_seuil_haut_chambre_enfants
        - input_number.temperature_couleur_zone_verte
    - platform: homeassistant
      event: start
  sensor:
    - name: "Couleur Température Chambre Enfants"
      unique_id: couleur_temperature_chambre_enfants
      state: &couleur_temperature_logic >
        {% set suffixe = this.entity_id | replace('sensor.couleur_temperature_', '') %}
        {% set src = 'sensor.temperature_' ~ suffixe %}
        {% set src_bas = 'sensor.temperature_seuil_bas_' ~ suffixe %}
        {% set src_haut = 'sensor.temperature_seuil_haut_' ~ suffixe %}

        {% set t_raw = states(src) %}
        {% set t = t_raw | replace(',', '.') | float(999) %}
        {% set bas = states(src_bas) | replace(',', '.') | float(0) %}
        {% set haut = states(src_haut) | replace(',', '.') | float(0) %}
        {% set zone = states('input_number.temperature_couleur_zone_verte') | float(0.5) %}
        {% set centre = (bas + haut) / 2 %}

        {% if t_raw in ['unknown', 'unavailable', None] or t == 999 %}
          grey
        {% elif bas == 0 or haut == 0 or bas >= haut %}
          grey
        {% elif t < bas %}
          blue
        {% elif t < centre - zone %}
          light_blue
        {% elif t <= centre + zone %}
          green
        {% elif t <= haut %}
          yellow
        {% else %}
          red
        {% endif %}
      attributes:
        reason: >
          {% set suffixe = this.entity_id | replace('sensor.couleur_temperature_', '') %}
          {% set src = 'sensor.temperature_' ~ suffixe %}
          {% set src_bas = 'sensor.temperature_seuil_bas_' ~ suffixe %}
          {% set src_haut = 'sensor.temperature_seuil_haut_' ~ suffixe %}
          {% set t_raw = states(src) %}
          {% set t = t_raw | replace(',', '.') | float(999) %}
          {% set bas = states(src_bas) | replace(',', '.') | float(0) %}
          {% set haut = states(src_haut) | replace(',', '.') | float(0) %}

          {% if t_raw in ['unknown', 'unavailable', None] or t == 999 %}
            unavailable
          {% elif bas == 0 or haut == 0 or bas >= haut %}
            invalid_thresholds
          {% else %}
            ok
          {% endif %}

