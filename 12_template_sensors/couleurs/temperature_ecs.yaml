# ==========================================================
# 🚿 TEMPLATE TRIGGERED SENSOR — Couleur Temperature ECS
# ----------------------------------------------------------
# 💡 Objectif :
#   Representer visuellement la temperature du ballon ECS
#   selon les seuils reels du bouclage automatique.
#
# ⚙️ Fonctionnement :
#   - Source temperature : sensor.ecs_temperature_ballon_securisee
#   - Seuil bas : input_number.bouclage_ecs_seuil_off
#   - Seuil haut : input_number.bouclage_ecs_seuil_on
#
#   Interpretation :
#       • < seuil_off  → blue   → eau insuffisante
#       • < seuil_on   → orange → zone intermediaire
#       • ≥ seuil_on   → red    → temperature correcte
#
# 🔁 Rafraichissement :
#   - A chaque changement de temperature ECS
#   - A chaque changement des seuils bouclage
#
# 📊 Type : Trigger Template Sensor
# 📍 Nom de l’entite : temperature_ecs_couleur
# ==========================================================

- trigger:
    - platform: state
      entity_id: sensor.ecs_temperature_ballon_securisee

    - platform: state
      entity_id: input_number.bouclage_ecs_seuil_on

    - platform: state
      entity_id: input_number.bouclage_ecs_seuil_off

  sensor:
    - name: "Température ECS - couleur"
      unique_id: temperature_ecs_couleur
      state: >
        {% set t = states('sensor.ecs_temperature_ballon_securisee') | float(none) %}
        {% set seuil_on = states('input_number.bouclage_ecs_seuil_on') | float(none) %}
        {% set seuil_off = states('input_number.bouclage_ecs_seuil_off') | float(none) %}

        {% if t is none
              or seuil_on is none
              or seuil_off is none
              or seuil_off >= seuil_on %}
          grey
        {% elif t < seuil_off %}
          blue
        {% elif t < seuil_on %}
          orange
        {% else %}
          red
        {% endif %}