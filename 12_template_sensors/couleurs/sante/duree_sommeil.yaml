# ==========================================================
# 🧠 ARSENAL — TEMPLATE SENSOR (TRIGGERED)
#     Santé — Couleur durée sommeil
# ----------------------------------------------------------
# 🎯 Rôle
#     Déterminer la couleur qualitative de la durée de sommeil
#     à partir du snapshot consolidé de la dernière nuit.
#
# 🧩 Périmètre
#     - Lecture de la durée sommeil consolidée
#     - Application de seuils qualitatifs
#     - Gestion indisponibilité si snapshot invalide
#
# 🔗 Dépendances
#     - input_number.sommeil_derniere_nuit_total
#     - binary_sensor.sommeil_derniere_nuit_valide
#
# 🚫 Interdits
#     - Ne lit aucune entité Withings (_local ou autre)
#     - Ne parse aucune donnée texte
#     - Ne calcule aucune durée
#     - Ne prend aucune décision métier
#     - Ne pilote aucun équipement
#
# 🧠 Statut
#     Présentation — dérivation qualitative UI
# ==========================================================

- trigger:
    - platform: state
      entity_id:
        - input_number.sommeil_derniere_nuit_total
        - binary_sensor.sommeil_derniere_nuit_valide
    - platform: homeassistant
      event: start

  sensor:
    - name: "Couleur Santé — Durée sommeil"
      unique_id: couleur_sante_duree_sommeil
      state: >
        {% if not is_state('binary_sensor.sommeil_derniere_nuit_valide', 'on') %}
          unavailable
        {% else %}
          {% set v = states('input_number.sommeil_derniere_nuit_total') | float(999) %}

          {% if v == 999 %}
            unavailable
          {% elif v < 6.0 %}
            red
          {% elif v < 6.75 %}
            orange
          {% elif v < 7.25 %}
            yellow
          {% elif v < 8.0 %}
            green
          {% else %}
            blue
          {% endif %}
        {% endif %}