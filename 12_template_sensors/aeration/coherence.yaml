# ==========================================================
# 🧠 ARSENAL — TEMPLATE BINARY SENSOR :
#     Chauffage – Aération – Cohérence (KO)
# ----------------------------------------------------------
# ✅ Incohérences couvertes (KO si au moins une vraie)
#   A) Blocage chauffage ON mais timer.aeration_blocage non actif
#   B) Pipeline armé ON alors qu’aucun épisode, aucun blocage,
#      aucune ouverture n’est actif (pipeline zombie)
#   C) Blocage ON mais trace input_datetime.fin_blocage neutralisée (00:00:00)
#   D) aeration_confirmee ON alors qu’aucun épisode / blocage / ouverture n’est actif
#   E) Blocage ON + enveloppe ouverte + suspension_active OFF (suspension manquante)
# ==========================================================

- binary_sensor:

    - name: "Chauffage – Aération – Cohérence KO"
      unique_id: chauffage_aeration_coherence_ko
      default_entity_id: binary_sensor.chauffage_aeration_coherence_ko
      device_class: problem

      state: >
        {% set blocage = is_state('input_boolean.chauffage_blocage_aeration','on') %}
        {% set t_blocage_active = is_state('timer.aeration_blocage','active') %}
        {% set pipeline = is_state('input_boolean.aeration_pipeline_arme','on') %}
        {% set episode = is_state('input_boolean.aeration_episode_en_cours','on') %}
        {% set fenetres_q = is_state('binary_sensor.fenetre_ouverte_maison_avec_delai','on') %}
        {% set fenetres_b = is_state('binary_sensor.fenetre_ouverte_maison','on') %}
        {% set confirmee = is_state('input_boolean.aeration_confirmee','on') %}

        {% set fin = states('input_datetime.chauffage_fin_blocage_aeration') | as_datetime %}
        {% set fin_valide = fin is not none and not (fin.hour == 0 and fin.minute == 0 and fin.second == 0) %}

        {% set enveloppe_ouverte = is_state('binary_sensor.contact_fenetres_maison','on') %}
        {% set suspension = is_state('input_boolean.aeration_suspension_active','on') %}

        {% set ko_blocage_orphelin = blocage and not t_blocage_active and not suspension %}
        {% set ko_pipeline_zombie = pipeline and (not episode) and (not blocage) and (not fenetres_q) %}
        {% set ko_trace = blocage and (not fin_valide) %}
        {% set ko_suspension_manquante = blocage and enveloppe_ouverte and (not suspension) %}

        {% set ko_confirmee_orpheline =
          confirmee
          and (not episode)
          and (not blocage)
          and (not pipeline)
          and (not fenetres_q)
          and (not fenetres_b)
        %}

        {{ ko_blocage_orphelin or ko_pipeline_zombie or ko_trace or ko_confirmee_orpheline or ko_suspension_manquante }}