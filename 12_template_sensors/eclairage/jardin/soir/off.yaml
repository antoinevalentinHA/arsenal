# ==========================================================
# 🧠 ARSENAL — TEMPLATE BINARY_SENSOR
#     Éclairage jardin — Extinction soir autorisée
# ----------------------------------------------------------
# 🎯 RÔLE
#   Exposer une lecture métier observable indiquant si,
#   à l'instant courant, les conditions d'extinction du
#   jardin le soir sont réunies : durée du cycle dépassée
#   et inactivité séjour confirmée.
#
# 🧩 PÉRIMÈTRE
#   - Évaluation booléenne déclarative uniquement
#   - Aucune action
#   - Aucun pilotage d'équipement
#   - Aucun rôle causal dans la chaîne d'extinction
#
# 🔖 NATURE
#   autorisation_logique
#
# 🆔 UNIQUE_ID
#   lumiere_jardin_soir_extinction_autorisee
#
# 🔗 DÉPENDANCES
#   Lit : input_datetime.jardin_soir_extinction_deadline
#         input_datetime.jardin_sejour_inactivite_deadline
#         input_boolean.auto_lumiere_jardin_soir
#
# 🧠 STATUT ARCHITECTURAL
#   Ce sensor est une PROJECTION DÉCLARATIVE.
#   Il reflète un état calculable depuis des helpers persistants.
#   Il est consommé par :
#     - l'UI (dashboard, cartes d'état)
#     - les sensors d'intention
#     - les attributs de diagnostic
#     - la cohérence documentaire
#   Il n'est PAS consommé par les automations d'extinction.
#   L'autorité causale appartient à l'automation 1007000000004
#   qui lit les helpers directement.
#
# ⚠️ RÉÉVALUATION TEMPORELLE IMPLICITE
#   Ce sensor est déclaratif à réévaluation temporelle implicite
#   via now(). HA le réévalue périodiquement de façon autonome
#   en raison de la présence de now() dans le template — il ne
#   se limite pas aux seuls changements d'état des entités
#   référencées. Son affichage est donc approximativement à jour
#   sans trigger explicite ni time_pattern.
#   Cette caractéristique est ACCEPTABLE ici car ce sensor n'a
#   aucun rôle causal. L'extinction est garantie par 1007000000004,
#   indépendamment de l'état affiché. La réévaluation périodique
#   implicite ne doit pas être confondue avec une autorité système.
#
# 🚫 INTERDITS
#   - Déclencher ou conditionner une action d'extinction
#   - Être consommé comme autorité dans une automation
#   - Introduire un time_pattern pour compenser la limite de fraîcheur
#   - Utiliser for: ou last_changed
#
# 🏷️ STATUT
#   Observabilité — Arsenal v14.x
# ==========================================================

- binary_sensor:
    - name: "Lumiere jardin soir - Extinction autorisee"
      unique_id: lumiere_jardin_soir_extinction_autorisee
      default_entity_id: binary_sensor.lumiere_jardin_soir_extinction_autorisee

      icon: >
        {% if is_state(this.entity_id, 'on') %}
          mdi:lightbulb-off-outline
        {% else %}
          mdi:lightbulb-on-outline
        {% endif %}

      state: >
        {% if not is_state('input_boolean.auto_lumiere_jardin_soir', 'on') %}
          false
        {% else %}
          {% set d_soir = states('input_datetime.jardin_soir_extinction_deadline') %}
          {% set d_inac = states('input_datetime.jardin_sejour_inactivite_deadline') %}
          {% if d_soir in ('unknown', 'unavailable', '')
             or d_inac in ('unknown', 'unavailable', '') %}
            false
          {% else %}
            {{ now() >= as_local(as_datetime(d_soir))
               and now() >= as_local(as_datetime(d_inac)) }}
          {% endif %}
        {% endif %}
