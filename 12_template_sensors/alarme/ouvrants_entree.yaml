# ==========================================================
# 🧠 ARSENAL — BINARY SENSOR
# Alarme — Ouvrants d'entree
# ==========================================================
#
# 📌 Fichier
#   binary_sensors/alarme/alarme_ouvrants_entree.yaml
#
# 🎯 Role
#   Exposer des signaux d'ouverture permissifs dedies
#   au delai d'entree alarme.
#
# 🧱 Principe
#   - 1 source a on suffit a poser le signal a on
#   - retour a off uniquement si les 2 sources sont a off
#   - unknown / unavailable ne valent jamais ouverture
#   - aucune priorite entre sources
#
# 📥 Entrees
#   - binary_sensor.contact_entree_porte_1
#   - binary_sensor.contact_entree_porte_2
#   - binary_sensor.contact_garage_1
#   - binary_sensor.contact_garage_2
#
# 📤 Sorties
#   - binary_sensor.alarme_ouverture_entree
#   - binary_sensor.alarme_ouverture_garage
#
# ⚠️ Important
#   - Ces entites exposent un SIGNAL ETATFUL
#   - Elles ne sont pas des evenements
#   - Elles ne doivent pas servir de preuve d'intrusion
#   - Les automatisations consommatrices doivent declencher
#     le delai d'entree sur front montant off -> on
#   - Un etat restaure a on au redemarrage ne vaut pas
#     nouvelle ouverture
#
# 📎 Contrat
#   - 00_documentation_arsenal/contrats/alarme/
#     51_ouvrants_entree_alarme.md
# ==========================================================

- trigger:
    - platform: state
      entity_id:
        - binary_sensor.contact_entree_porte_1
        - binary_sensor.contact_entree_porte_2

  binary_sensor:
    # ----------------------------------------------------------
    # ARSENAL — SIGNAL OUVERTURE ALARME
    # Porte d'entree
    # ----------------------------------------------------------
    - name: "Alarme ouverture entree"
      unique_id: alarme_ouverture_entree
      device_class: door

      state: >
        {{ is_state('binary_sensor.contact_entree_porte_1', 'on')
           or is_state('binary_sensor.contact_entree_porte_2', 'on') }}

      attributes:
        source_a: >
          {{ states('binary_sensor.contact_entree_porte_1') }}

        source_b: >
          {{ states('binary_sensor.contact_entree_porte_2') }}

        divergence: >
          {% set a = states('binary_sensor.contact_entree_porte_1') %}
          {% set b = states('binary_sensor.contact_entree_porte_2') %}
          {{ a in ['on', 'off'] and b in ['on', 'off'] and a != b }}

- trigger:
    - platform: state
      entity_id:
        - binary_sensor.contact_garage_1
        - binary_sensor.contact_garage_2

  binary_sensor:
    # ----------------------------------------------------------
    # ARSENAL — SIGNAL OUVERTURE ALARME
    # Porte de garage
    # ----------------------------------------------------------
    - name: "Alarme ouverture garage"
      unique_id: alarme_ouverture_garage
      device_class: garage_door

      state: >
        {{ is_state('binary_sensor.contact_garage_1', 'on')
           or is_state('binary_sensor.contact_garage_2', 'on') }}

      attributes:
        source_a: >
          {{ states('binary_sensor.contact_garage_1') }}

        source_b: >
          {{ states('binary_sensor.contact_garage_2') }}

        divergence: >
          {% set a = states('binary_sensor.contact_garage_1') %}
          {% set b = states('binary_sensor.contact_garage_2') %}
          {{ a in ['on', 'off'] and b in ['on', 'off'] and a != b }}
