# ==========================================================
# 🧠 ARSENAL — TEMPLATE SENSOR (moteur moderne)
#     Résumé fenêtres concernées ouvertes (pluie)
# ----------------------------------------------------------
# 🎯 RÔLE
#   Exposer un résumé lisible (texte) des fenêtres concernées
#   actuellement ouvertes.
#
# 🧱 ARCHITECTURE
#   - Décision uniquement (stateless, recalculable)
#   - Aucune action, aucune notification
#
# 🚫 NE FAIT PAS
#   - aucun service
#   - aucune temporisation active
#
# 🧮 Construction de la liste — chaîne de filtres, jamais d'accumulateur
#   Les noms sont sélectionnés par `selectattr | map`, **pas** par
#   `{% set acc = acc + [...] %}` dans un `{% for %}` : en Jinja, une
#   affectation faite dans le corps d'une boucle ne survit pas à la sortie
#   de cette boucle. Le capteur restituait donc « Aucune » même lorsque des
#   fenêtres étaient ouvertes — vérifié : avec deux capteurs à `on`, la
#   boucle rendait une chaîne vide.
# ==========================================================

- sensor:
    - name: "Résumé fenêtres concernées ouvertes (pluie)"
      unique_id: resume_fenetres_concernees_ouvertes_pluie
      default_entity_id: sensor.resume_fenetres_concernees_ouvertes_pluie
      icon: mdi:message-text
      state: >
        {% set mapping = {
          'binary_sensor.contact_chambre_enfants':'Chambre Enfants',
          'binary_sensor.contact_salle_de_jeux':'Salle de Jeux',
          'binary_sensor.contact_sejour_1':'Séjour 1',
          'binary_sensor.contact_sejour_2':'Séjour 2',
          'binary_sensor.contact_sejour_3':'Séjour 3',
          'binary_sensor.contact_sejour_4':'Séjour 4'
        } %}
        {% set noms = mapping.items()
          | selectattr('0', 'is_state', 'on')
          | map(attribute='1') | list %}
        {{ noms | join(', ') if noms else 'Aucune' }}
      attributes:
        ouvertes_entity_ids: >
          {% set fenetres = [
            'binary_sensor.contact_chambre_enfants',
            'binary_sensor.contact_salle_de_jeux',
            'binary_sensor.contact_sejour_1',
            'binary_sensor.contact_sejour_2',
            'binary_sensor.contact_sejour_3',
            'binary_sensor.contact_sejour_4'
          ] %}
          {{ fenetres | select('is_state','on') | list }}