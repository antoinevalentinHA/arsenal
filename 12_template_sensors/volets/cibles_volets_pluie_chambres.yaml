# ==========================================================
# 🧠 ARSENAL — TEMPLATE SENSOR (moteur moderne)
#     Cibles volets pluie Chambres
# ----------------------------------------------------------
# 🎯 RÔLE
#   Exposer la liste des covers chambres à fermer :
#   fenêtre ouverte + absence + verrou global ON.
#
# 🧱 ARCHITECTURE
#   - Décision uniquement (stateless, recalculable)
#   - Aucune action, aucune notification
#
# 🚫 NE FAIT PAS
#   - aucun service
#   - aucune temporisation active
#   - aucune notification
#
# 📐 CONTRAT
#   CONTRAT_PLUIE_VOLETS.md v2.2.1 — sections 4.1, 5.3
#   Conditions : fenêtre ouverte + présence OFF + fermeture_volets_pluie ON
# ==========================================================
- sensor:
    - name: "Cibles volets pluie Chambres"
      unique_id: cibles_volets_pluie_chambres
      icon: mdi:window-shutter
      state: >
        {% set absence = is_state('binary_sensor.presence_famille_securite','off') %}
        {% set verrou = is_state('input_boolean.fermeture_volets_pluie','on') %}
        {% if absence and verrou %}
          {% set ns = namespace(n=0) %}
          {% if is_state('binary_sensor.contact_chambre_enfants','on') %}
            {% set ns.n = ns.n + 1 %}
          {% endif %}
          {% if is_state('binary_sensor.contact_salle_de_jeux','on') %}
            {% set ns.n = ns.n + 1 %}
          {% endif %}
          {{ ns.n }}
        {% else %}
          0
        {% endif %}
      attributes:
        entity_ids: >
          {% set absence = is_state('binary_sensor.presence_famille_securite','off') %}
          {% set verrou = is_state('input_boolean.fermeture_volets_pluie','on') %}
          {% if absence and verrou %}
            {% set ns = namespace(lst=[]) %}
            {% if is_state('binary_sensor.contact_chambre_enfants','on') %}
              {% set ns.lst = ns.lst + ['cover.chambre_enfants'] %}
            {% endif %}
            {% if is_state('binary_sensor.contact_salle_de_jeux','on') %}
              {% set ns.lst = ns.lst + ['cover.salle_de_jeux'] %}
            {% endif %}
            {{ ns.lst }}
          {% else %}
            {{ [] }}
          {% endif %}
        presence: "{{ states('binary_sensor.presence_famille_securite') }}"
        verrou: "{{ states('input_boolean.fermeture_volets_pluie') }}"
