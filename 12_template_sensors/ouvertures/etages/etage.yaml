# ==========================================================
# 🪟 TEMPLATE BINARY SENSOR — Fenêtres étage (direct)
# ----------------------------------------------------------
# 💡 Objectif :
#   Indiquer si une ou plusieurs fenêtres de l’étage sont ouvertes,
#   sans tenir compte d’un éventuel délai de grâce.
#
# ⚙️ Fonctionnement :
#   - Regroupe les capteurs suivants :
#       • Chambre Enfants
#       • Chambre Matthieu
#       • Chambre Parents (3 ouvrants)
#   - Statut :
#       • ON  → au moins une fenêtre ouverte
#       • OFF → toutes les fenêtres fermées
#
# 📊 Type : Template Binary Sensor
# 📍 Entité générée : binary_sensor.fenetre_ouverte_etage
# ==========================================================

- binary_sensor:
    - name: "Fenêtres étage"
      unique_id: fenetre_ouverte_etage
      default_entity_id: binary_sensor.fenetre_ouverte_etage
      device_class: opening

      icon: >
        {% if is_state(this.entity_id, 'on') %}
          mdi:window-open-variant
        {% else %}
          mdi:window-closed-variant
        {% endif %}

      state: >
        {% set fenetres_etage = [
          'binary_sensor.contact_chambre_enfants',
          'binary_sensor.contact_chambre_matthieu',
          'binary_sensor.contact_chambre_parents'
        ] %}
        {{ fenetres_etage | select('is_state', 'on') | list | length > 0 }}