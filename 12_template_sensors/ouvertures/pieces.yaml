# ==========================================================
#  TEMPLATE BINARY SENSORS : Fenetres – Unification par piece
#  ----------------------------------------------------------
#  🧠 Role :
#     Offrir une base uniforme pour le systeme d’aeration V2 :
#     chaque piece expose un capteur unique, indicateur de
#     l’ouverture de ses fenetres.
#
#  🎯 Objectifs :
#     - Normaliser la nomenclature : fenetres_ouvertes_<piece>
#     - Simplifier l’evaluation piece-par-piece (PHASE 4)
#     - Supprimer toute manipulation de capteurs bruts
#
#  💡 Note :
#     - Aucune logique thermique ici
#     - Pure unification, strictement structurelle
# ==========================================================

- binary_sensor:

    # ------------------------------------------------------
    #  🪟 Séjour
    # ------------------------------------------------------
    - name: "Fenetres ouvertes - Sejour"
      unique_id: fenetres_ouvertes_sejour
      default_entity_id: binary_sensor.fenetres_ouvertes_sejour
      device_class: opening
      state: >
        {{ is_state('binary_sensor.contact_sejour', 'on') }}
        }}

    # ------------------------------------------------------
    #  🪟 Chambre parents
    # ------------------------------------------------------
    - name: "Fenetres ouvertes - Chambre parents"
      unique_id: fenetres_ouvertes_parents
      default_entity_id: binary_sensor.fenetres_ouvertes_parents
      device_class: opening
      state: >
        {{ is_state('binary_sensor.contact_chambre_parents', 'on') }}

    # ------------------------------------------------------
    #  🪟 Entree
    # ------------------------------------------------------
    - name: "Fenetres ouvertes - Entree"
      unique_id: fenetres_ouvertes_entree
      default_entity_id: binary_sensor.fenetres_ouvertes_entree
      device_class: opening
      state: >
        {{ is_state('binary_sensor.contact_entree_fenetre', 'on') }}

    # ------------------------------------------------------
    #  🪟 Chambre Arnaud
    # ------------------------------------------------------
    - name: "Fenetres ouvertes - Chambre Arnaud"
      unique_id: fenetres_ouvertes_arnaud
      default_entity_id: binary_sensor.fenetres_ouvertes_arnaud
      device_class: opening
      state: >
        {{ is_state('binary_sensor.contact_chambre_arnaud', 'on') }}

    # ------------------------------------------------------
    #  🪟 Chambre Matthieu
    # ------------------------------------------------------
    - name: "Fenetres ouvertes - Chambre Matthieu"
      unique_id: fenetres_ouvertes_matthieu
      default_entity_id: binary_sensor.fenetres_ouvertes_matthieu
      device_class: opening
      state: >
        {{ is_state('binary_sensor.contact_chambre_matthieu', 'on') }}
