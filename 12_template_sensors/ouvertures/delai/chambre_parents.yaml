# ==========================================================
# 🪟 TEMPLATE BINARY SENSOR — Chambre parents (grâce)
# ----------------------------------------------------------
# 💡 Logique Arsenal (ROBUSTE) :
#   ON SEULEMENT si :
#     1) une fenêtre parents est ouverte (N1 : contact_*)
#     2) ET la FIN DE GRÂCE a été atteinte explicitement
#        (input_boolean.chambre_parents_grace_echue = on)
#
# ✅ Objectif :
#   Éliminer l’ambiguïté "timer = idle" (idle peut provenir de timer.finished
#   OU de timer.cancel), afin d’empêcher tout flash de confirmation.
#
#   Pendant la grâce :
#     - timer devient active
#     - le capteur reste OFF
#   Après fin naturelle (timer.finished) :
#     - chambre_parents_grace_echue devient ON (writer unique)
#     - le capteur devient ON tant qu’au moins une fenêtre reste ouverte
# ==========================================================

- binary_sensor:

    - name: "Fenêtre chambre parents (grâce)"
      unique_id: fenetre_chambre_parents_ouverte_avec_delai
      default_entity_id: binary_sensor.fenetre_chambre_parents_ouverte_avec_delai
      device_class: opening

      icon: >
        {% set fenetres = [
          'binary_sensor.contact_chambre_parents_droite',
          'binary_sensor.contact_chambre_parents_gauche',
          'binary_sensor.contact_chambre_parents_milieu'
        ] %}

        {% set open_entities = fenetres | select('is_state','on') | list %}
        {% set any_open = (open_entities | length > 0) %}

        {% set t = 'timer.fenetre_chambre_parents_grace' %}
        {% set t_state = states(t) %}

        {% set grace_echue = is_state('input_boolean.chambre_parents_grace_echue', 'on') %}
        {% set grace_pending = any_open and not grace_echue and t_state == 'active' %}

        {% if is_state(this.entity_id, 'on') %}
          mdi:window-open-variant
        {% elif grace_pending %}
          mdi:timer-sand
        {% elif any_open %}
          mdi:window-open-variant
        {% else %}
          mdi:window-closed-variant
        {% endif %}

      state: >
        {% set fenetres = [
          'binary_sensor.contact_chambre_parents_droite',
          'binary_sensor.contact_chambre_parents_gauche',
          'binary_sensor.contact_chambre_parents_milieu'
        ] %}

        {% set any_open = (fenetres | select('is_state','on') | list | length > 0) %}
        {% set grace_echue = is_state('input_boolean.chambre_parents_grace_echue', 'on') %}

        {% set ok = any_open and grace_echue %}
        {{ 'on' if ok else 'off' }}