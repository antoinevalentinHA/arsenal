# ==========================================================
# 🧠 ARSENAL — TEMPLATE BINARY SENSORS (CONTACTS)
# ----------------------------------------------------------
# 🎯 ROLE
#   - Couche NORMALISATION : binary_sensor.contact_* (miroir stable)
#
# 🧱 PRINCIPE
#   - Les capteurs materiels bruts sont les sources amont.
#   - Les entites Arsenal restent toujours evaluables (pas de unknown/unavailable).
#   - L’indispo est exposee en attribut pour les decisions (alarme, etc.).
#
# 📌 NOTE
#   - Les ouvrants disposant d’une redondance (Aqara + Sonoff) sont definis
#     dans : homeassistant/12_template_sensors/ouvertures/capteurs_contact_redondants.yaml
# ==========================================================

- trigger:
    - platform: state
      entity_id:
        - binary_sensor.contact_brut_entree_fenetre
        - binary_sensor.contact_brut_sejour_1
        - binary_sensor.contact_brut_sejour_2
        - binary_sensor.contact_brut_sejour_4
    - platform: homeassistant
      event: start

  binary_sensor:

    # ------------------------------------------------------
    # ANCRE 1 — NORMALISATION (source -> contact stable)
    # ------------------------------------------------------
    - name: "Contact Entrée Fenêtre"
      unique_id: contact_entree_fenetre
      device_class: opening
      variables:
        src: binary_sensor.contact_brut_entree_fenetre
        kind: window
      state: &contact_norm_state >
        {% set s = states(src) %}
        {% if s in ['on','off'] %}
          {{ s }}
        {% else %}
          off
        {% endif %}
      icon: &contact_norm_icon >
        {% set s = states(this.entity_id) %}
        {% if kind == 'door' %}
          {{ 'mdi:door-open' if s == 'on' else 'mdi:door-closed' }}
        {% else %}
          {{ 'mdi:window-open-variant' if s == 'on' else 'mdi:window-closed-variant' }}
        {% endif %}
      attributes: &contact_norm_attr
        source_entity: "{{ src }}"
        source_state: "{{ states(src) }}"
        unavailable: "{{ states(src) in ['unknown','unavailable', None] }}"

    # ------------------------------------------------------
    # CONTACTS SIMPLES — SEJOUR (1 / 2 / 4)
    # ------------------------------------------------------
    - name: "Contact Sejour 1"
      unique_id: contact_sejour_1
      device_class: opening
      variables:
        src: binary_sensor.contact_brut_sejour_1
        kind: window
      state: *contact_norm_state
      icon: *contact_norm_icon
      attributes: *contact_norm_attr

    - name: "Contact Sejour 2"
      unique_id: contact_sejour_2
      device_class: opening
      variables:
        src: binary_sensor.contact_brut_sejour_2
        kind: window
      state: *contact_norm_state
      icon: *contact_norm_icon
      attributes: *contact_norm_attr

    - name: "Contact Sejour 4"
      unique_id: contact_sejour_4
      device_class: opening
      variables:
        src: binary_sensor.contact_brut_sejour_4
        kind: window
      state: *contact_norm_state
      icon: *contact_norm_icon
      attributes: *contact_norm_attr