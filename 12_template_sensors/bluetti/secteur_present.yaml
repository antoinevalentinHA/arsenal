# ============================================================
# ARSENAL — ENERGIE CHAUDIERE — BLUETTI SECTEUR PRESENT
#
# Domaine : energie_chaudiere
# Contrat : energie_chaudiere v1.3
# Role :
# Detecter la presence secteur en entree du Bluetti AC180.
#
# Invariant :
# Ce capteur decrit l'etat secteur local en entree du Bluetti AC180.
# Il peut participer, via la couche de detection, a la consolidation du
# signal canonique binary_sensor.coupure_secteur (cf. 10_socle.md,
# section Unicite du signal canonique). Il n'est jamais lu directement
# par un consommateur : seul binary_sensor.coupure_secteur fait interface.
# Ref P0 : audits/01_rapports/pannes/audit_panne_detection_coupure_secteur.md
# ============================================================

- binary_sensor:
    - name: "Bluetti secteur present"
      unique_id: bluetti_secteur_present
      state: >
        {{ states('sensor.bluetti_ac_input_voltage') | float(0) > 200 }}
      availability: >
        {{ states('sensor.bluetti_ac_input_voltage') | is_number }}