# ==========================================================
# 🧠 ARSENAL — INPUT NUMBERS : VMC — Seuils CO₂ métier
# ----------------------------------------------------------
# 🎯 Rôle :
#   Définir les SEUILS DE DÉCISION CO₂ utilisés pour
#   déterminer si une ventilation haute vitesse est requise.
#
# 🧱 Principe :
#   - Ces input_number ne contiennent aucune logique
#   - Ils fournissent uniquement :
#       • un seuil d’entrée (ON)
#       • un seuil de sortie (OFF)
#
#   → L’hystérésis est appliquée ailleurs.
#
# ❌ Ne sont PAS :
#   - des capteurs CO₂
#   - des déclencheurs
#   - des commandes VMC
#   - des automatismes
#
# 🔗 Utilisation :
#   - Consommés par :
#       • binary_sensor.vmc_haute_vitesse_requise
#   - Affichage / réglage :
#       • dashboards VMC
#       • button-card templates
#
# 🧠 Principe Arsenal :
#   - Mesure ≠ Décision ≠ Action
#   - Les seuils sont explicites, réglables et indépendants
#
# 📐 Unité :
#   - ppm (parties par million)
# ==========================================================

vmc_co2_seuil_on:
  name: Seuil déclenchement CO₂ (ppm)
  min: 400
  max: 2000
  step: 50
  mode: box
  unit_of_measurement: "ppm"

vmc_co2_seuil_off:
  name: Seuil arrêt CO₂ (ppm)
  min: 400
  max: 2000
  step: 50
  mode: box
  unit_of_measurement: "ppm"