# ==========================================================
# 🧠 ARSENAL — INPUT_NUMBER
#     VMC — Seuils CO₂ métier
# ----------------------------------------------------------
# 🎯 RÔLE
#   Stocker les seuils CO₂ utilisés pour qualifier
#   l'autorisation de ventilation haute vitesse.
#
# 🧩 PÉRIMÈTRE
#   - Stockage persistant uniquement
#   - Seuils CO₂ ON / OFF uniquement
#   - Valeurs exprimées en ppm
#   - Paramètres consommés par :
#       binary_sensor.vmc_haute_vitesse_requise
#   - Hystérèse appliquée hors helpers
#   - Aucun calcul
#   - Aucune logique métier locale
#   - Aucun comportement autonome
#
# 🏷️ NATURE
#   Paramètre utilisateur | Seuil métier
#
# 🚫 INTERDITS
#   - Confondre stockage et décision
#   - Interpréter implicitement la valeur stockée
#   - Utiliser ces helpers comme capteurs CO₂
#   - Déclencher directement une action
#   - Commander directement la VMC
#   - Implémenter l'hystérèse dans ces helpers
#   - Modifier automatiquement ces valeurs
#   - Écrire sans traçabilité vers l'auteur de l'écriture
#
# 🏷️ STATUT
#   Socle — Arsenal v14.x
# ==========================================================

vmc_co2_seuil_on:
  name: Seuil déclenchement CO₂ (ppm)
  min: 400
  max: 2000
  step: 50
  mode: box
  unit_of_measurement: "ppm"

vmc_co2_seuil_off:
  name: Seuil arrêt CO₂ (ppm)
  min: 400
  max: 2000
  step: 50
  mode: box
  unit_of_measurement: "ppm"