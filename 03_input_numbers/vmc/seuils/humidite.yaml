# ==========================================================
# 🧠 ARSENAL — INPUT_NUMBER
#     VMC — Seuils humidité relative
# ----------------------------------------------------------
# 🎯 RÔLE
#   Stocker les seuils d'humidité relative utilisés pour
#   qualifier l'autorisation de ventilation haute vitesse.
#
# 🧩 PÉRIMÈTRE
#   - Stockage persistant uniquement
#   - Seuils HR ON / OFF uniquement
#   - Valeurs exprimées en pourcentage d'humidité relative
#   - Paramètres consommés par :
#       binary_sensor.vmc_haute_vitesse_requise
#   - Hystérèse appliquée hors helpers
#   - Aucun calcul
#   - Aucune logique métier locale
#   - Aucun comportement autonome
#
# 🏷️ NATURE
#   Paramètre utilisateur | Seuil métier
#
# 🚫 INTERDITS
#   - Confondre stockage et décision
#   - Interpréter implicitement la valeur stockée
#   - Utiliser ces helpers comme capteurs d'humidité
#   - Déclencher directement une action
#   - Commander directement la VMC
#   - Implémenter l'hystérèse dans ces helpers
#   - Modifier automatiquement ces valeurs
#   - Écrire sans traçabilité vers l'auteur de l'écriture
#
# 🏷️ STATUT
#   Socle — Arsenal v14.x
# ==========================================================

vmc_seuil_on:
  name: "VMC - Seuil déclenchement"
  min: 50
  max: 90
  step: 1
  unit_of_measurement: "%"
  icon: mdi:water-percent
  mode: slider
  #initial: 70

vmc_seuil_off:
  name: "VMC - Seuil arrêt"
  min: 40
  max: 85
  step: 1
  unit_of_measurement: "%"
  icon: mdi:water-percent-off
  mode: slider
  #initial: 65