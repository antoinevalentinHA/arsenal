# ==========================================================
# 🧠 ARSENAL — INPUT NUMBER : VMC — Durée minimale haute vitesse
# ----------------------------------------------------------
# 🎯 Rôle :
#   Définir la durée MINIMALE pendant laquelle la VMC
#   doit rester en haute vitesse une fois activée.
#
# 🧱 Principe :
#   - Ce helper ne déclenche rien
#   - Il ne commande pas la VMC
