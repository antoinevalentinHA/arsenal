# ==========================================================
# 🧠 ARSENAL — INPUT_NUMBER
#     Meteo — Pluie — Stores cumulatif & delta journalier
# ----------------------------------------------------------
# 🎯 ROLE
#     Fournir les helpers persistants necessaires a la
#     construction d'un totalisateur cumulatif de pluie (mm).
#
# 🧩 PERIMETRE
#     - Stockage persistant du total cumulatif (mm)
#     - Memorisation de la derniere valeur "aujourd'hui" traitee
#
# 🔗 DEPENDANCES
#     - Consomme par : automation "Pluie – Totalisateur cumulatif"
#     - Expose par : sensor.pluie_total_local
#
# 🚫 NE FAIT PAS
#     - Ne calcule aucune pluie
#     - Ne derive aucun indicateur temporel (semaine/mois)
#
# 🧠 STATUT ARCHITECTURAL
#     - Stockage (memoire persistante), sans logique metier
# ==========================================================

pluie_total_local_store:
  name: pluie_total_local_store
  min: 0
  max: 1000000
  step: 0.001
  unit_of_measurement: "mm"
  mode: box
  icon: mdi:weather-pouring

pluie_today_last:
  name: pluie_today_last
  min: 0
  max: 10000
  step: 0.001
  unit_of_measurement: "mm"
  mode: box
  icon: mdi:weather-rainy