# ==========================================================
# 🧠 ARSENAL — INPUT_NUMBER
#     Météo — Température jardin — Stabilisation
# ----------------------------------------------------------
# 🎯 RÔLE
#   Stocker les paramètres et états persistants nécessaires
#   au pipeline de stabilisation de température jardin.
#
# 🧩 PÉRIMÈTRE
#   - Stockage persistant uniquement
#   - Paramètres EWMA et mémoire filtre uniquement
#   - Valeurs exprimées en °C ou coefficients normalisés
#   - Paramètres consommés par la chaîne de stabilisation
#   - États persistants de continuité filtre
#   - Aucun calcul local
#   - Aucune logique métier locale
#   - Aucun comportement autonome
#
# 🏷️ NATURE
#   Paramètres techniques | Mémoire filtre | Registres persistants
#
# 🚫 INTERDITS
#   - Confondre stockage et calcul
#   - Implémenter localement une logique EWMA
#   - Modifier manuellement les états persistants filtre
#   - Utiliser ces helpers comme mesures météo réelles
#   - Déclencher directement une automatisation
#   - Ajouter localement une logique de qualification
#   - Écrire sans traçabilité vers l'auteur de l'écriture
#
# ⚠️ ENTITÉ CRITIQUE
#   temperature_jardin_etat_publie :
#   - mémoire S(t-1)
#   - continuité filtre EWMA
#   - vérité façade aval
#
# 🏷️ STATUT
#   Couche stabilisation météo — Arsenal v14.x
# ==========================================================


# ==========================================================
# A. PARAMETRES
# ==========================================================

temperature_jardin_alpha_ewma:
  name: "Temperature Jardin - Alpha EWMA"
  min: 0
  max: 1
  step: 0.01
  mode: box
  icon: mdi:tune-variant
  # ⚠️ PAS de clé `initial` : elle désactive la restauration HA et reforcerait
  #    ce paramètre EWMA à sa valeur d'usine à chaque redémarrage, écrasant un
  #    réglage opérateur. Sans `initial`, HA restaure la dernière valeur réglée
  #    (l'automation garde un repli `float(0.3)` en lecture). Défaut : 0.3.
  #    NB : distinct des sentinels -20 ci-dessous (cold-start filtre, voulus).

temperature_jardin_delta_max:
  name: "Temperature Jardin - Delta Max"
  min: 0
  max: 5
  step: 0.1
  unit_of_measurement: "°C"
  mode: box
  icon: mdi:arrow-expand-vertical
  # ⚠️ PAS de clé `initial` : voir temperature_jardin_alpha_ewma.
  #    Paramètre EWMA — repli lecture `float(0.5)` dans l'automation. Défaut : 0.5.


# ==========================================================
# B. MEMOIRE FILTRE
# ==========================================================

# ⚠️ ENTITE CRITIQUE
temperature_jardin_etat_publie:
  name: "Temperature Jardin - Etat Publie"
  min: -50
  max: 60
  step: 0.1
  unit_of_measurement: "°C"
  mode: box
  icon: mdi:thermometer
  initial: -20

temperature_jardin_cible_brute_derniere:
  name: "Temperature Jardin - Cible Brute Derniere"
  min: -50
  max: 60
  step: 0.1
  unit_of_measurement: "°C"
  mode: box
  icon: mdi:thermometer-lines
  initial: -20