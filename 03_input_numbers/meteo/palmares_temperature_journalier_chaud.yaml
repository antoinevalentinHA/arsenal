# ==========================================================
# 🧠 ARSENAL — INPUT_NUMBER
#     Météo — Palmarès historique journées les plus chaudes
# ----------------------------------------------------------
# 🎯 RÔLE
#   Stocker les valeurs numériques persistantes du palmarès
#   historique des journées les plus chaudes : 10 valeurs de
#   rangs (top 10) + 1 snapshot pré-minuit.
#
# 🧩 PÉRIMÈTRE
#   - Stockage persistant uniquement
#   - Aucun calcul
#   - Aucune logique métier locale
#   - Aucun comportement autonome
#
# 🏷️ NATURE
#   Registre de pipeline
#
# 🔗 RÉFÉRENCE
#   CONTRAT_JOURNEES_PLUS_CHAUDES.md V1.0
#   Instance : temperature_journalier_chaud
#   Paramètres : min=-10°C, max=50°C, step=0.1
#
# 📋 CONVENTIONS
#   - Valeur de rang vide : 0
#   - Couplage strict avec input_text de date correspondant
#   - Écriture exclusivement par :
#       automation.palmares_temperature_journalier_chaud_snapshot
#       automation.palmares_temperature_journalier_chaud_evaluation
#
# 🚫 INTERDITS
#   - Confondre stockage et décision
#   - Interpréter implicitement la valeur stockée
#   - Écrire sans traçabilité vers l'auteur de l'écriture
#   - Saisie manuelle hors procédure de réinitialisation
#
# 🏷️ STATUT
#   Socle — Arsenal v14.x
# ==========================================================

