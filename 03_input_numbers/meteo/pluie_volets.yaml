# ==========================================================
# 🌧️ ARSENAL — HELPER MÉTIER : Seuil pluie fermeture volets
# ----------------------------------------------------------
# 🎯 Rôle :
#   Définir la quantité de pluie (en mm)
#   à partir de laquelle les volets sont
#   automatiquement fermés pour protection.
#
# 🧠 Principe :
#   - La pluviométrie instantanée ou cumulée
#     est fournie par les capteurs météo.
#   - Ce helper fixe le seuil de déclenchement.
#   - Si pluie ≥ seuil → action de fermeture autorisée.
#
# ⚠️ Important :
#   - Ce helper est un PARAMÈTRE MÉTIER.
#   - Il influence directement le comportement
#     des volets.
#   - Il ne sert à aucun affichage graphique.
#
# 🔗 Utilisé par :
#   - Scripts :
#       • 10_scripts/meteo/pluie.yaml
#   - Dashboards :
#       • lovelace/dashboards/reglages/volets.yaml
#
# 📐 Unité :
#   - Millimètres de pluie (mm)
#
# 🧠 Principe Arsenal :
#   - Les capteurs MESURENT la pluie.
#   - Le helper FIXE le seuil de décision.
#   - Le script DÉCIDE.
#   - Les volets EXÉCUTENT.
#
# ==========================================================

seuil_pluie_fermeture_volets:
  name: Seuil pluie (fermeture volets)
  icon: mdi:weather-pouring
  min: 0
  max: 5
  step: 0.25
  unit_of_measurement: mm
  mode: slider
