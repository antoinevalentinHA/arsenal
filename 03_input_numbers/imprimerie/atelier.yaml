# ==========================================================
# 🧠 ARSENAL — INPUT_NUMBER — Imprimerie : historique Ateliers
# ----------------------------------------------------------
# 🎯 Rôle :
#   Stocker l’HISTORIQUE min / max de TEMPÉRATURE
#   réellement OBSERVÉE dans les ateliers de l’imprimerie :
#     - Atelier Komori
#     - Atelier Bobst
#     - Atelier Media
#
# ✅ Important :
#   - Ces helpers ne sont PAS des seuils.
#   - Ils ne pilotent aucun équipement.
#   - Ils représentent des VALEURS RÉELLES enregistrées (min / max).
#
# ⚙️ Fonctionnement :
#   - Les capteurs fournissent la température instantanée.
#   - Les automatisations comparent la mesure courante
#     aux valeurs stockées :
#       → si plus basse : mise à jour du “min”
#       → si plus haute : mise à jour du “max”
#   - Une automatisation d’archivage peut figer ces valeurs
#     à intervalle défini (journalier, mensuel, etc.).
#   - Un script permet la réinitialisation de l’historique.
#
# 🔗 Utilisés par :
#   - Dashboards :
#       • lovelace/dashboards/imprimerie/imprimerie_atelier.yaml
#   - Automatisations :
#       • 10_automations/imprimerie/atelier/min_max.yaml
#       • 10_automations/imprimerie/atelier/archivage.yaml
#   - Scripts :
#       • 09_scripts/imprimerie/reset_atelier_historique.yaml
#
# 🧠 Principe Arsenal :
#   - Les capteurs MESURENT.
#   - Les automatisations ENREGISTRENT (min / max).
#   - Les helpers STOCKENT.
#   - Les dashboards EXPOSENT.
#   - Les scripts RÉINITIALISENT.
#
# ==========================================================


atelier_komori_temperature_min:
  name: "Atelier Komori – Température min nuit"
  min: -20
