# ==========================================================
# 🧠 ARSENAL — INPUT_NUMBER
#     Imprimerie — Historique thermique ateliers
# ----------------------------------------------------------
# 🎯 RÔLE
#   Stocker les valeurs minimales et maximales de température
#   réellement observées dans les ateliers de l'imprimerie.
#
# 🧩 PÉRIMÈTRE
#   - Stockage persistant uniquement
#   - Historique thermique ateliers uniquement
#   - Valeurs min / max réellement observées uniquement
#   - Ateliers Komori, Bobst et Media uniquement
#   - Paramètres alimentés par automatisations d'archivage
#   - Valeurs exprimées en degrés Celsius
#   - Aucun calcul
#   - Aucune logique métier locale
#   - Aucun comportement autonome
#
# 🏷️ NATURE
#   Mémoire persistante | Registre de pipeline
#
# 🚫 INTERDITS
#   - Confondre stockage et décision
#   - Interpréter implicitement la valeur stockée
#   - Utiliser ces helpers comme seuils thermiques
#   - Piloter un équipement depuis ces helpers
#   - Modifier manuellement hors correction volontaire
#   - Réaliser un calcul statistique dans ces helpers
#   - Déclencher directement une automatisation
#   - Écrire sans traçabilité vers l'auteur de l'écriture
#
# 🏷️ STATUT
#   Socle — Arsenal v14.x
# ==========================================================

