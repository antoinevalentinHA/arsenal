# ==========================================================
# 🧠 ARSENAL — INPUT_NUMBER
#     ECS — Offsets de pilotage chaudière
# ----------------------------------------------------------
# 🎯 RÔLE
#   Stocker les offsets thermiques utilisés pour ajuster
#   la consigne envoyée à la chaudière lors des cycles ECS.
#
# 🧩 PÉRIMÈTRE
#   - Stockage persistant uniquement
#   - Offsets de pilotage chaudière ECS uniquement
#   - Ajustement de consigne transmis à la chaudière uniquement
#   - Profils tiny, medium, normal et désinfection uniquement
#   - Paramètres consommés par le script de cycle ECS
#   - Valeurs exprimées en degrés Celsius
#   - Aucun calcul
#   - Aucune logique métier locale
#   - Aucun comportement autonome
#
# 🏷️ NATURE
#   Paramètre utilisateur | Seuil métier
#
# 🚫 INTERDITS
#   - Confondre stockage et décision
#   - Interpréter implicitement la valeur stockée
#   - Utiliser ces helpers comme verdict thermique
#   - Modifier directement la condition de fin de cycle ECS
#   - Déclencher directement une action chaudière
#   - Implémenter localement une logique de pilotage ECS
#   - Modifier automatiquement ces valeurs
#   - Écrire sans traçabilité vers l'auteur de l'écriture
#
# 🏷️ STATUT
#   Socle — Arsenal v14.x
# ==========================================================

