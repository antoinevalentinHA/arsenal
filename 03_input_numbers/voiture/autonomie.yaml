# ==========================================================
# 🧠 ARSENAL — INPUT NUMBER : Audi A3 e-tron — Snapshots pleine charge
# ----------------------------------------------------------
# 🎯 Rôle :
#   Mémoriser les valeurs de référence observées
#   au moment d’une charge complète (≈ 100 %).
#
# 🧱 Principe :
#   - Valeurs FIGÉES par cycle de charge
#   - Mise à jour UNIQUEMENT lors d’un événement pleine charge
#   - Snapshot atomique de plusieurs grandeurs cohérentes :
#       • autonomie électrique réelle
#       • température extérieure
#       • autonomie corrigée (20°C)
#
# ❌ Ne fait PAS :
#   - mesure instantanée
#   - estimation dynamique
#   - recalcul a posteriori
#
# 🔗 Utilisation :
#   - Alimenté par :
#       • automation : voiture/autonomie.yaml
#   - Consommé par :
#       • capteurs statistiques Audi
#       • dashboards véhicule
#
# 🧠 Principe Arsenal :
#   - Le véhicule mesure
#   - L’automatisation sélectionne le moment valide
#   - Les helpers mémorisent
#   - Les dashboards comparent
#
# 📐 Unités :
#   - autonomie : km
#   - température : °C
#
# ⚠️ Invariant critique :
#   - Tous les helpers de ce fichier doivent être écrits
#     dans la MÊME automation et au MÊME instant logique
#     (snapshot pleine charge).
# ==========================================================

autonomie_audi_etron_full:
  name: "Autonomie A3 e-tron (pleine charge)"
  min: 0
  max: 100
  step: 1
  unit_of_measurement: "km"
  mode: box

audi_temperature_charge:
  name: "Audi température charge"
  min: -20
  max: 50
  step: 0.1
  unit_of_measurement: "°C"
  mode: box
  icon: mdi:thermometer

audi_autonomie_corrigee_temperature:
  name: "Audi autonomie corrigée température"
  min: 0
  max: 100
  step: 0.1
  unit_of_measurement: "km"
  mode: box
  icon: mdi:car-electric