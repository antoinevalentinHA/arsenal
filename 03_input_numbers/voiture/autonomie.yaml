# ==========================================================
# 🧠 ARSENAL — INPUT_NUMBER
#     Audi A3 e-tron — Snapshots pleine charge
# ----------------------------------------------------------
# 🎯 RÔLE
#   Stocker les valeurs de référence figées observées lors
#   d'un événement valide de pleine charge véhicule.
#
# 🧩 PÉRIMÈTRE
#   - Stockage persistant uniquement
#   - Snapshots atomiques de pleine charge uniquement
#   - Valeurs cohérentes capturées au même instant logique
#   - Autonomie réelle, température et autonomie corrigée
#   - Paramètres consommés par statistiques et dashboards
#   - Aucun calcul
#   - Aucune logique métier locale
#   - Aucun comportement autonome
#
# 🏷️ NATURE
#   Mémoire persistante | Registre de pipeline
#
# 🚫 INTERDITS
#   - Confondre stockage et décision
#   - Interpréter implicitement la valeur stockée
#   - Utiliser ces helpers comme mesures temps réel
#   - Modifier manuellement hors recalage exceptionnel
#   - Réaliser un recalcul a posteriori dans ces helpers
#   - Écrire ces helpers à des instants différents
#   - Déclencher directement une automatisation
#   - Écrire sans traçabilité vers l'auteur de l'écriture
#
# 🏷️ STATUT
#   Socle — Arsenal v14.x
# ==========================================================

autonomie_audi_etron_full:
  name: "Autonomie A3 e-tron (pleine charge)"
