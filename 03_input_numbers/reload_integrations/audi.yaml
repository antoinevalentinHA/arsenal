# ==========================================================
# 🧠 ARSENAL — HELPER SYSTÈME : Compteur tentatives reload Audi
# ----------------------------------------------------------
# 🎯 Rôle :
#   Comptabiliser le nombre de tentatives de rechargement
#   de l’intégration Audi afin d’éviter les boucles infinies
#   et les comportements instables.
#
# 🧠 Nature :
#   - Compteur de SÉCURITÉ SYSTÈME
#   - État interne de protection
#   - Non destiné à l’utilisateur final
#
# ⚙️ Fonctionnement :
#   - Incrémenté à chaque tentative de reload
#   - Consulté par l’automatisation de contrôle
#   - Comparé à un seuil max autorisé
#   - Peut être remis à zéro explicitement
#     (succès, reset manuel, ou condition maîtrisée)
#
# ⚠️ Important :
#   - Ce helper NE représente PAS un état de l’intégration
#   - Il NE mesure PAS une performance
#   - Il sert UNIQUEMENT de garde-fou logique
#
# 🔗 Utilisé par :
#   - Automatisations :
#       • 10_automations/system/reload_integrations/audi.yaml
#
# 📐 Unité :
#   - Tentatives (compteur entier)
#
# 🧠 Principe Arsenal :
#   - Les intégrations ÉCHOUENT parfois.
#   - Le système PROTÈGE.
#   - Les boucles sont INTERDITES.
#
# ==========================================================

audi_reload_tentatives:
  name: "Audi – Tentatives reload"
  min: 0
  max: 50
  step: 1
  mode: box
