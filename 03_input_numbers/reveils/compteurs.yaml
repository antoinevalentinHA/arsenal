#       • 10_automations/reveils/compteurs/*.yaml
#       • 10_automations/reveils/reset/*.yaml
#
# 📐 Unité :
#   - Nombre de réveils (compteur entier)
#
# 🧠 Principe Arsenal :
#   - On n’interprète pas → on OBSERVE
#   - Le système aide à comprendre, pas à diagnostiquer
#   - Toute action reste humaine
#
# ==========================================================

