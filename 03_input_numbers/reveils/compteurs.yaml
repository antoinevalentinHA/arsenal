# ==========================================================
# 🧠 ARSENAL — HELPERS : Compteurs de réveils nocturnes enfants
# ----------------------------------------------------------
# 🎯 Rôle :
#   Comptabiliser le nombre de réveils nocturnes
#   détectés pour chaque enfant au cours de la nuit :
#     - Arnaud
#     - Matthieu
#
# 🧠 Nature :
#   - Compteurs MANUELS / LOGIQUES
#   - États de diagnostic et d’observation familiale
#   - NON médicaux, NON biométriques
#
# ⚙️ Fonctionnement :
#   - Incrémentés par automatisations dédiées
#     lors d’un événement qualifié comme "réveil"
