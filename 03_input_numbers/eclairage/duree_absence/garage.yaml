# ==========================================================
# 🧠 ARSENAL — INPUT_NUMBER : Durée absence garage
# ----------------------------------------------------------
# 🎯 Rôle :
#    Définir le temps d’inactivité requis dans le garage
#    avant extinction automatique de l’éclairage.
#
# 🧩 Principe :
#    - Le compteur démarre après la DERNIÈRE détection
#      de mouvement ou de présence dans le garage.
#    - L’extinction n’est autorisée qu’après écoulement
#      complet de cette durée.
#
# ⚙️ Fonctionnement :
#    - Valeur exprimée en minutes
#    - Convertie en secondes dans l’automatisation
#    - Sert uniquement de paramètre de temporisation
#
# 🔍 Utilisation :
#    - Automatisation :
#        • eclairage/garage/extinction_automatique.yaml
#    - Dashboard :
#        • réglages éclairage
#
# 🚫 Ne pas confondre avec :
#    - Délais d’entrée / sortie (alarme)
#    - Timers Home Assistant
#    - Durées de présence globale
#
# 📐 Unité :
#    - minutes
#
# 🏷️ Statut :
#    - Arsenal v6.x
#    - Paramètre éclairage garage
# ==========================================================


duree_absence_garage:
  name: Durée absence garage (min)
  icon: mdi:timer-outline
  min: 1
  max: 20
  step: 5
  unit_of_measurement: min
  mode: slider