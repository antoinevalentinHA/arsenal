# ==========================================================
# 🧠 ARSENAL — INPUT_NUMBER
#     Arrosage / Rain Bird — Durée station 1 (manuel)
# ----------------------------------------------------------
# 🎯 RÔLE
#   Stocker la durée (minutes) de l'arrosage manuel supervisé
#   de la station 1, réglable par l'opérateur. Lue et bornée
#   par le script `arrosage_rain_bird_station_1_courte_supervisee`
#   avant d'être appliquée à la durée native Rain Bird.
#
# 🧩 PÉRIMÈTRE
#   - Stockage persistant uniquement
#   - Aucun calcul
#   - Aucune logique métier locale
#   - Aucun comportement autonome
#
# 🏷️ NATURE
#   Paramètre utilisateur
#
# 🚫 INTERDITS
#   - Confondre stockage et décision
#   - Piloter directement un équipement
#   - Exposer le `number.…` natif Rain Bird à l'UI
#
# 🏷️ STATUT
#   Socle — Arsenal v14.x
# ==========================================================

arrosage_rainbird_station_1_duree_minutes:
  name: "Arrosage Rain Bird — Durée station 1"
  min: 1
  max: 60
  step: 1
  # ⚠️ PAS de clé `initial` : elle DÉSACTIVE la restauration HA et reforcerait
  #    la durée à une valeur fixe à CHAQUE redémarrage, écrasant le réglage
  #    opérateur. Sans `initial`, HA restaure la dernière valeur réglée.
  #    Au tout premier démarrage (entité inexistante) → `unknown`, sans danger :
  #    le script Run clampe avec repli 2 (`| int(2)` puis borne [1,60]).
  unit_of_measurement: "min"
  mode: box
  icon: mdi:timer-sand
