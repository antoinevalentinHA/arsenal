# ==========================================================
#  INPUT NUMBER : Délai stabilisation capteurs (post-fermeture)
# ----------------------------------------------------------
#  🧠 Rôle :
#     Temps (en minutes) laissé aux capteurs de température
#     pour se stabiliser après la fermeture complète de la
#     maison. L’analyse de la chute thermique n’est exécutée
#     qu’après ce délai.
#
#  🎯 Objectif :
#     - Éviter les ΔT fausses juste après la fermeture
#     - Garantir une mesure fiable de la chute thermique
#     - Séparer clairement "blocage initial" et "blocage long"
#
#  ⚙️ Utilisation :
#     - Démarre à la fin d’aération
#     - Pendant ce délai : chauffage bloqué (temporaire)
#     - À expiration : analyse ΔT → décision blocage long ou non
#
#  🚫 Interdits :
#     - Utiliser ce délai comme temporisation générique
#     - Déclencher une action directe sans analyse ΔT
#     - Le confondre avec une durée de blocage chauffage
#
#  ✅ Compatibilité : Système Arsenal V3 (aération / blocage / reprise)
# ==========================================================

delai_stabilisation_capteurs:
  name: "delai_stabilisation_capteurs"
  min: 1
  max: 30
  step: 5
  unit_of_measurement: "min"
  mode: slider
