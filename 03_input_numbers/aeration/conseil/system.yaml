# ==========================================================

aeration_stabilisation_minutes:
  name: "Stabilisation avant recommandation"
  min: 0
  max: 10
  step: 1
  unit_of_measurement: "min"
  mode: slider
  icon: mdi:timer-outline

aeration_intervalle_min_heures:
  name: "Intervalle minimal entre aérations"
  min: 0
  max: 6
  step: 0.5
  unit_of_measurement: "h"
  mode: slider
  icon: mdi:hours-24