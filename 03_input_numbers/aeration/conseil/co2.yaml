# ==========================================================
# 🧠 ARSENAL — INPUT_NUMBERS : Seuils CO₂ d’aération
# ----------------------------------------------------------
# 🎯 Rôle :
#    Définir les seuils de concentration en CO₂ utilisés
#    par le moteur d’aération pour qualifier la priorité
#    d’ouverture (normale ou forte).
#
# 🧠 Lecture métier :
#    Ces seuils sont LUS EN TEMPS RÉEL par les capteurs
#    binaires d’aération (RDC et étage).
#    Toute modification impacte immédiatement la logique
#    de décision et la priorité accordée à l’aération.
#
# 📐 Niveaux définis :
#    - Seuil CO₂ :
#        → aération nécessaire / prioritaire
#    - Seuil CO₂ fort :
#        → aération urgente (qualité de l’air dégradée)
#
# 🔗 Dépendances :
#    - Binary sensors aération (RDC / étage)
#    - Dashboards réglages aération
#
# 🚫 Interdits :
#    - Les utiliser comme simples indicateurs visuels
#    - Les confondre avec des valeurs de référence internes
#    - Les modifier sans compréhension de l’impact global
#
# 🏷️ Statut :
#    - Arsenal v6.x
#    - seuils décisionnels actifs (qualité de l’air)
# ==========================================================


aeration_co2_seuil:
  name: "Seuil CO₂ (priorité aération)"
  min: 400
  max: 2000
  step: 50
  unit_of_measurement: "ppm"
  mode: box
  icon: mdi:molecule-co2

aeration_co2_seuil_fort:
  name: "Seuil CO₂ fort"
  min: 600
  max: 3000
  step: 50
  unit_of_measurement: "ppm"
  mode: box
  icon: mdi:molecule-co2
