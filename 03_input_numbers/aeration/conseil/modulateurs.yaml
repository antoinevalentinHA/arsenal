# ==========================================================
# 🧠 ARSENAL — INPUT_NUMBER
#     Aération — Modulateurs contextuels
# ----------------------------------------------------------
# 🎯 RÔLE
#   Stocker les modulations contextuelles appliquées aux
#   seuils d'aération selon les conditions environnementales.
#
# 🧩 PÉRIMÈTRE
#   - Stockage persistant uniquement
#   - Modulateurs décisionnels contextuels uniquement
#   - Contextes nuit, pluie, brouillard, grand froid et canicule
#   - Paramètres lus en temps réel par les capteurs d'aération
#   - Aucun calcul
#   - Aucune logique métier locale
#   - Aucun comportement autonome
#
# 🏷️ NATURE
#   Paramètre utilisateur | Seuil métier
#
# 🚫 INTERDITS
#   - Confondre stockage et décision
#   - Interpréter implicitement la valeur stockée
#   - Utiliser ces valeurs comme seuils absolus
#   - Modifier ces valeurs sans compréhension du contexte associé
#   - Considérer ces valeurs comme des réglages esthétiques
#   - Écrire sans traçabilité vers l'auteur de l'écriture
#
# 🏷️ STATUT
#   Socle — Arsenal v14.x
# ==========================================================

aeration_mod_nuit_delta_ha:
  name: "Mod. nuit ΔHA (−)"
  min: 0
  max: 2
  step: 0.1
  unit_of_measurement: "g/m³"
  mode: box
  icon: mdi:weather-night

aeration_mod_nuit_delta_t:
  name: "Mod. nuit ΔT (−)"
  min: 0
  max: 3
  step: 0.1
  unit_of_measurement: "°C"
  mode: box
  icon: mdi:weather-night

aeration_rain_max_mm:
  name: Aeration pluie max (1h)
  min: 0
  max: 5
  step: 0.1
  unit_of_measurement: "mm"
  mode: box
  icon: mdi:weather-pouring

aeration_pluie_rh_ext_seuil:
  name: "Seuil pluie/brouillard (RH ext ≥)"
  min: 70
  max: 100
  step: 1
  unit_of_measurement: "%"
  mode: slider
  icon: mdi:water-percent

aeration_mod_pluie_delta_ha:
  name: "Mod. pluie ΔHA (+)"
  min: 0
  max: 2
  step: 0.1
  unit_of_measurement: "g/m³"
  mode: box
  icon: mdi:water-percent-alert

aeration_grand_froid_seuil_ext:
  name: "Seuil grand froid (T ext <)"
  min: -20
  max: 10
  step: 0.5
  unit_of_measurement: "°C"
  mode: box
  icon: mdi:snowflake

aeration_mod_grand_froid_add_delta_t:
  name: "Mod. grand froid ΔT (+)"
  min: 0
  max: 3
  step: 0.1
  unit_of_measurement: "°C"
  mode: box
  icon: mdi:snowflake

aeration_canicule_seuil_ext:
  name: "Seuil canicule (T ext ≥)"
  min: 20
  max: 45
  step: 0.5
  unit_of_measurement: "°C"
  mode: box
  icon: mdi:weather-sunny-alert