# ==========================================================
# 🧠 ARSENAL — INPUT_NUMBER
#     Aération — Seuils thermiques décisionnels
# ----------------------------------------------------------
# 🎯 RÔLE
#   Stocker les seuils thermiques utilisés pour autoriser
#   une aération selon les conditions saisonnières.
#
# 🧩 PÉRIMÈTRE
#   - Stockage persistant uniquement
#   - Seuils décisionnels thermiques
#   - Paramètres lus en temps réel par les capteurs d'aération
#   - Garde-fous thermiques et différentiels saisonniers
#   - Aucun calcul
#   - Aucune logique métier locale
#   - Aucun comportement autonome
#
# 🏷️ NATURE
#   Paramètre utilisateur | Seuil métier
#
# 🚫 INTERDITS
#   - Confondre stockage et décision
#   - Interpréter implicitement la valeur stockée
#   - Utiliser ces valeurs comme indicateurs visuels simples
#   - Confondre ces valeurs avec des références internes
#   - Modifier ces seuils sans compréhension de l'impact global
#   - Écrire sans traçabilité vers l'auteur de l'écriture
#
# 🏷️ STATUT
#   Socle — Arsenal v14.x
# ==========================================================

aeration_seuil_ecart_temperature_min:
  name: Écart T° min extérieur < intérieur
  min: 0.1
  max: 5
  step: 0.1
  unit_of_measurement: "°C"
  mode: box

aeration_delta_t_min_hiver:
  name: Aeration ΔT min (hiver)
  min: 0
  max: 10
  step: 0.1
  unit_of_measurement: "°C"
  mode: box
  icon: mdi:thermometer-chevron-up

aeration_delta_t_min_inter:
  name: Aeration ΔT min (inter-saison)
  min: 0
  max: 10
  step: 0.1
  unit_of_measurement: "°C"
  mode: box
  icon: mdi:thermometer-chevron-up