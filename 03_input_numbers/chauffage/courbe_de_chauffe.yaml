# ==========================================================
# 🧠 ARSENAL — INPUT_NUMBER : Courbe de chauffe (consignes)
# ----------------------------------------------------------
# 🎯 Rôle :
#   Définir les VALEURS DE CONSIGNE de la courbe de chauffe
#   utilisées par le système chauffage :
#     - Pente de la courbe
#     - Parallèle (décalage vertical)
#
# 🧱 Nature :
#   - Paramètres structurels de la courbe
#   - Aucune action directe sur le chauffage
#   - Aucune logique décisionnelle
#
# 🧠 Principe Arsenal :
#   - Les capteurs analysent
#   - Les capteurs suggèrent
#   - Les input_number figent la consigne retenue
#   - Les automatisations décident de l'application
#   - Les scripts exécutifs appliquent via le bridge
#
# ⚙️ Contraintes physiques chaudière (Viessmann) :
#   - Pente :
#       min  = 0.2
#       max  = 3.5
#       step = 0.1
#   - Parallèle :
#       min  = -13
#       max  = 40
#       step = 1
#
# ⚠️ Règles fondamentales :
#   - Modifier une consigne ≠ appliquer
#   - Toute application passe par une couche d'exécution
#   - Les valeurs doivent respecter bornes et granularité
#
# 📐 Unités :
#   - Pente       : sans unité
#   - Parallèle   : °C
# ==========================================================

chauffage_pente_consigne:
  name: Pente (consigne)
  min: 0.2
  max: 3.5
  step: 0.1
  unit_of_measurement: ""

chauffage_parallele_consigne:
  name: Parallèle (consigne)
  min: -13
  max: 40
  step: 1
  unit_of_measurement: "°C"