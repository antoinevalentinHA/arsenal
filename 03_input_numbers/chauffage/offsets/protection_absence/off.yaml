# ==========================================================
# 🧠 ARSENAL — INPUT_NUMBER
#     Inhibition géofencing — Offset OFF
# ----------------------------------------------------------
# 🎯 Rôle :
#   Seuil haut de levée de l’inhibition geofencing.
#   Levée si ecart_consigne_confort > -offset_off
#   (écart = température - consigne_confort).
#
# 📌 Interprétation :
#   offset_off = 0.3 → OFF si température > consigne - 0.3
#
# 🔒 Invariant :
#   offset_on STRICTEMENT > offset_off
# ==========================================================

inhibition_geofencing_offset_off:
  name: Chauffage – Inhibition geofencing (seuil haut)
  icon: mdi:thermometer-alert
  min: 0.0
  max: 0.9
  step: 0.1
  unit_of_measurement: "°C"
  mode: box