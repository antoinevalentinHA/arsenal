# ==========================================================
# 🧠 ARSENAL — INPUT_NUMBER
#     Chauffage — Offsets thermiques ON / OFF
# ----------------------------------------------------------
# 🎯 RÔLE
#   Stocker les offsets thermiques utilisés pour encadrer
#   l'hystérèse ON / OFF autour de la consigne chauffage.
#
# 🧩 PÉRIMÈTRE
#   - Stockage persistant uniquement
#   - Paramètres seuils consommés par le pipeline chauffage
#   - Offsets thermiques ON / OFF uniquement
#   - Aucun calcul
#   - Aucune logique métier locale
#   - Aucun comportement autonome
#
# 🏷️ NATURE
#   Paramètre utilisateur | Seuil métier
#
# 🚫 INTERDITS
#   - Confondre stockage et décision
#   - Interpréter implicitement la valeur stockée
#   - Déclencher ou arrêter directement le chauffage
#   - Implémenter l'hystérèse dans ces helpers
#   - Utiliser ces valeurs comme températures absolues
#   - Écrire sans traçabilité vers l'auteur de l'écriture
#
# 🏷️ STATUT
#   Socle — Arsenal v14.x
# ==========================================================

chauffage_offset_on:
  name: "Offset seuil ON (chauffage)"
  min: 0.0
  max: 3.0
  step: 0.1
  unit_of_measurement: "°C"
  mode: box
  icon: mdi:thermometer-chevron-down

chauffage_offset_off:
  name: "Offset seuil OFF (chauffage)"
  min: 0.0
  max: 3.0
  step: 0.1
  unit_of_measurement: "°C"
  mode: box
  icon: mdi:thermometer-chevron-up