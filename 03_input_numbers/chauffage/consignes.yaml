# ==========================================================
# 🧠 ARSENAL — INPUT_NUMBER : Consignes thermiques chauffage
# ----------------------------------------------------------
# 🎯 RÔLE :
#   Définir les consignes de température de référence
#   utilisées par le domaine Chauffage selon les
#   contextes prévus par l’architecture Arsenal :
#     - consigne confort
#     - consigne réduite
#     - consigne vacances
#
# 🧱 NATURE :
#   - Helpers de configuration thermique
#   - Paramètres de consigne, non décisionnels
#   - Aucune action directe sur le chauffage
#
# 🧠 PRINCIPE ARSENAL :
#   - Les capteurs mesurent.
#   - Les consignes expriment une cible thermique.
#   - Les moteurs décisionnels arbitrent.
#   - Les scripts et pipelines d’exécution appliquent.
#
# 🔗 UTILISATION :
#   - Qualification thermique des situations
#   - Calculs d’écarts à la consigne
#   - Décision centrale chauffage
#   - Application des programmes chauffage
#   - Affichage et réglages UI
#
# ⚠️ RÈGLE FONDAMENTALE :
#   - Une consigne n’est jamais un ordre.
#   - Aucun déclenchement chauffage ne doit dépendre
#     uniquement de la valeur brute de ces helpers.
#
# 📐 UNITÉ :
#   - Degrés Celsius (°C)
# ==========================================================

chauffage_consigne_confort:
  name: Consigne confort
  min: 17
  max: 25
  step: 1
  unit_of_measurement: "°C"
  mode: box

chauffage_consigne_reduite:
  name: Consigne réduite
  min: 12
  max: 20
  step: 1
  unit_of_measurement: "°C"
  mode: box

chauffage_consigne_vacances:
  name: Consigne vacances
  min: 12
  max: 20
  step: 1
  unit_of_measurement: "°C"
  mode: box

chauffage_consigne_reduite_sauvegarde:
  name: Sauvegarde consigne reduite
  min: 0
  max: 20
  step: 1
  unit_of_measurement: "°C"
  mode: box