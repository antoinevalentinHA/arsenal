clim_offset_on:
  name: "Offset seuil ON (clim chauffage)"
  min: 0.1
  max: 3.0
  step: 0.1
  unit_of_measurement: "°C"
  mode: box
  icon: mdi:thermometer-chevron-down

clim_offset_off:
  name: "Offset seuil OFF (clim chauffage)"
  min: -3.0
  max: 3.0
  step: 0.1
  unit_of_measurement: "°C"
  mode: box
  icon: mdi:thermometer-chevron-up