# ==========================================================
# 🧠 ARSENAL — INPUT_NUMBERS : Offsets seuils ON / OFF (clim HEAT)
# ----------------------------------------------------------
# 🎯 Rôle :
#    Ajuster dynamiquement les seuils de déclenchement
#    (ON) et d’extinction (OFF) du mode chauffage
#    de la climatisation, afin d’introduire une
#    hystérésis thermique contrôlée.
#
# 🧩 Principe :
#    Les offsets sont appliqués AUX SEUILS,
#    jamais aux températures mesurées.
#
# ⚙️ Fonctionnement :
#    - clim_offset_on :
#        → SOUSTRAIT au seuil ON
#        → rend le déclenchement plus exigeant
#
#    - clim_offset_off :
#        → AJOUTÉ au seuil OFF
#        → évite les extinctions trop précoces
#
# 🔁 Effet recherché :
#    - Réduction du pompage thermique
#    - Cycles plus longs et plus stables
#    - Comportement lisible et maîtrisé
#
# 🔍 Utilisation :
#    - Template sensors :
#        • climatisation/seuils_on_off/heat/on.yaml
#        • climatisation/seuils_on_off/heat/off.yaml
#    - Dashboards :
#        • réglages utilisateur
#        • visualisation des seuils corrigés
#
# 🚫 Interdits :
#    - Ne PAS utiliser comme seuil brut
#    - Ne PAS confondre avec une consigne
#    - Ne PAS modifier automatiquement
#
# 📐 Unité :
#    - °C (écart appliqué aux seuils)
#
# 🏷️ Statut :
#    - Arsenal v6.x
#    - Correcteurs d’hystérésis clim chauffage
# ==========================================================

clim_offset_on:
  name: "Offset seuil ON (clim chauffage)"
  min: 0.1
  max: 3.0
  step: 0.1
  unit_of_measurement: "°C"
  mode: box
  icon: mdi:thermometer-chevron-down

clim_offset_off:
  name: "Offset seuil OFF (clim chauffage)"
  min: -3.0
  max: 3.0
  step: 0.1
  unit_of_measurement: "°C"
  mode: box
  icon: mdi:thermometer-chevron-up