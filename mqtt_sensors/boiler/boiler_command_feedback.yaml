# ==========================================================
# 🧠 ARSENAL — MQTT SENSORS (BOILER / COMMAND FEEDBACK)
# ----------------------------------------------------------
# 📌 Fichier
#   mqtt_sensors/boiler/boiler_command_feedback.yaml
#
# 🎯 ROLE
#   Exposer les retours bruts du bus de commande chaudiere :
#   acquittements d'execution et derniere erreur publiee
#   par la passerelle.
#
# 🧱 PRINCIPE
#   - Mapping direct des topics MQTT ack/error vers des
#     sensors Home Assistant
#   - Payloads JSON conserves bruts comme etat du sensor
#   - Aucun value_template ni extraction de champs a ce stade
#   - Aucune logique metier
#
# 📥 SOURCE
#   Namespace contrat :
#     - boiler/ack/...
#     - boiler/error/...
#   References :
#     - 03_namespace_canonique.md §3.4 et §3.5
#     - 13_politique_payload.md
#     - 14_semantique_ack.md
#
# ⚠️ IMPORTANT
#   - Couche strictement observation
#   - accepted n'est PAS un succes metier
#   - L'interpretation des champs JSON est deleguee aux
#     couches template / diagnostic
# ==========================================================

