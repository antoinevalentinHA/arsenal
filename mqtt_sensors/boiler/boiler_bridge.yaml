- name: "Boiler bridge version"
  unique_id: boiler_bridge_version
  default_entity_id: boiler_bridge_version
  state_topic: "boiler/bridge/version"
  icon: mdi:tag-outline

- name: "Boiler vcontrold status"
  unique_id: boiler_vcontrold_status
  default_entity_id: boiler_vcontrold_status
  state_topic: "boiler/bridge/vcontrold_status"
  icon: mdi:cog-outline
  # Valeurs attendues : running | stopped | error

- name: "Boiler optolink status"
  unique_id: boiler_optolink_status
  default_entity_id: boiler_optolink_status
  state_topic: "boiler/bridge/optolink_status"
  icon: mdi:serial-port
  # Valeurs attendues : connected | disconnected | error