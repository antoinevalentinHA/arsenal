# ==========================================================
# 🧠 ARSENAL — MQTT SENSORS (BOILER / TELEMETRY)
# ----------------------------------------------------------
# 📌 Fichier
#   mqtt_sensors/boiler/boiler_telemetry.yaml
#
# 🎯 ROLE
#   Exposer la télémétrie chaudière publiée sur MQTT
#   après simplification Arsenal Vision A :
#     - une seule consigne chauffage active
#     - une référence réduite secondaire de diagnostic
#
# 🧱 PRINCIPE
#   - Mapping direct des topics MQTT vers des sensors HA
#   - Payloads scalaires publiés par le boiler bridge
#   - Aucune transformation ni logique métier
#
# 📥 SOURCE
#   Namespace contrat :
#     - boiler/telemetry/...
#
# ⚠️ IMPORTANT
#   - Couche strictement observation
#   - Aucun calcul ni interprétation métier
#   - Le bridge N’expose PAS de programme chauffage métier
#   - La sémantique Confort / Eco appartient à Arsenal
# ==========================================================

- name: "Boiler supply temperature"
  unique_id: boiler_supply_temperature
  default_entity_id: boiler_supply_temperature
  state_topic: "boiler/telemetry/temperatures/supply"
  device_class: temperature
  unit_of_measurement: "°C"
  state_class: measurement
  icon: mdi:thermometer

- name: "Boiler DHW temperature"
  unique_id: boiler_dhw_temperature
  default_entity_id: boiler_dhw_temperature
  state_topic: "boiler/telemetry/temperatures/dhw"
  device_class: temperature
  unit_of_measurement: "°C"
  state_class: measurement
  icon: mdi:water-thermometer

- name: "Boiler heating setpoint"
  unique_id: boiler_heating_setpoint
  default_entity_id: boiler_heating_setpoint
  state_topic: "boiler/telemetry/heating/setpoint"
  device_class: temperature
  unit_of_measurement: "°C"
  state_class: measurement
  icon: mdi:thermometer-high

- name: "Boiler heating curve slope"
  unique_id: boiler_heating_curve_slope
  default_entity_id: boiler_heating_curve_slope
  state_topic: "boiler/telemetry/heating/curve/slope"
  state_class: measurement
  icon: mdi:chart-line

- name: "Boiler heating curve shift"
  unique_id: boiler_heating_curve_shift
  default_entity_id: boiler_heating_curve_shift
  state_topic: "boiler/telemetry/heating/curve/shift"
  state_class: measurement
  icon: mdi:chart-line-variant

- name: "Boiler DHW setpoint"
  unique_id: boiler_dhw_setpoint
  default_entity_id: boiler_dhw_setpoint
