# ==========================================================
# 🧠 ARSENAL — MQTT SENSORS (BOILER / TELEMETRY)
# ----------------------------------------------------------
# 📌 Fichier
#   mqtt_sensors/boiler_telemetry.yaml
#
# 🎯 ROLE
#   Exposer la télémétrie chaudière publiée sur MQTT
#   (températures, programmes et consignes).
#
# 🧱 PRINCIPE
#   - Mapping direct des topics MQTT vers des sensors HA
#   - Payloads scalaires publiés par le bridge Optolink
#   - Aucune transformation ni logique métier
#
# 📥 SOURCE
#   Namespace contrat : boiler/telemetry/...
#   Référence : 03_namespace_canonique.md §3.2
#
# ⚠️ IMPORTANT
#   - Couche strictement observation
#   - Aucun calcul ni interprétation métier
#   - Toute logique doit être implémentée dans les
#     couches automation / template
# ==========================================================

- name: "Boiler supply temperature"
  unique_id: boiler_supply_temperature
  default_entity_id: boiler_supply_temperature
  state_topic: "boiler/telemetry/temperatures/supply"
  device_class: temperature
  unit_of_measurement: "°C"
  state_class: measurement
  icon: mdi:thermometer

