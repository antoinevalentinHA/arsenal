# ==========================================================
# 🧠 ARSENAL — MQTT SENSOR
#     Boiler / Guard — Dernier cycle (timestamp)
# ----------------------------------------------------------
# 🎯 RÔLE
#   Exposer en transport passif le timestamp du dernier
#   cycle du guard chaudière, référence pour le calcul
#   de fraîcheur (stale) dans les couches supérieures.
#
# 🧩 PÉRIMÈTRE
#   - Transport passif de données MQTT uniquement
#   - Transformation locale minimale uniquement
#   - Aucune logique métier
#   - Aucune qualification d'état système
#
# 🔖 NATURE
#   heartbeat_technique
#
# 🆔 UNIQUE_ID
#   boiler_guard_last_run
#
# 📋 TRANSPORT
#   state_topic          : boiler/guard/last_run
#   namespace            : boiler/guard/...
#   qos                  : 1
#   json_attributes      : non
#   structure JSON       : sans objet
#   format               : ISO8601 UTC
#                          (ex. 2026-04-08T10:39:20Z)
#   device_class         : timestamp
#
# 🔗 DÉPENDANCES
#   Lit : guard chaudière via broker MQTT
#
# 🚫 INTERDITS
#   - Introduire une logique métier
#   - Qualifier un état système (la qualification stale
#     appartient à la couche template)
#   - Constituer une autorité décisionnelle
#   - Remplacer une couche template dédiée
#   - Laisser une structure JSON non documentée
#
# 🏷️ STATUT
#   Transport — Arsenal v14.x
# ==========================================================

- name: "boiler_guard_last_run"
  unique_id: boiler_guard_last_run

  state_topic: "boiler/guard/last_run"

  device_class: timestamp
  qos: 1
