# ==========================================================
# 🧠 ARSENAL — MQTT SENSOR
#     Boiler / Bridge — Santé passerelle Optolink / vcontrold
# ----------------------------------------------------------
# 🎯 RÔLE
#   Exposer en transport passif les états de santé et
#   informations publiés par la passerelle chaudière
#   (bridge Optolink / vcontrold).
#
# 🧩 PÉRIMÈTRE
#   - Transport passif de données MQTT uniquement
#   - Transformation locale minimale uniquement
#   - Aucune logique métier
#   - Aucune qualification d'état système
#
# 🔖 NATURE
#   etat_brut_externe | heartbeat_technique
#
# 🆔 UNIQUE_ID
#   boiler_bridge_version
#   boiler_vcontrold_status
#   boiler_optolink_status
#   boiler_bridge_heartbeat_raw
#
# 📋 TRANSPORT
#   state_topic          :
#     - boiler/bridge/version
#     - boiler/bridge/vcontrold_status
#     - boiler/bridge/optolink_status
#     - boiler/bridge/heartbeat
#   namespace            : boiler/bridge/...
#   json_attributes      : non
#   structure JSON       : sans objet (états textuels scalaires)
#   valeurs attendues    :
#     - vcontrold_status : running | stopped | error
#     - optolink_status  : connected | disconnected | error
#
# 🔗 DÉPENDANCES
#   Lit : passerelle Optolink / vcontrold via broker MQTT
#   Réf : 03_namespace_canonique.md §3.1, 15_sante_passerelle.md
#
# 🚫 INTERDITS
#   - Introduire une logique métier
#   - Qualifier un état système
#   - Constituer une autorité décisionnelle
#   - Remplacer une couche template dédiée
#   - Laisser une structure JSON non documentée
#
# 🏷️ STATUT
#   Transport — Arsenal v14.x
# ==========================================================

- name: "Boiler bridge version"
  unique_id: boiler_bridge_version
  default_entity_id: boiler_bridge_version
  state_topic: "boiler/bridge/version"
  icon: mdi:tag-outline

- name: "Boiler vcontrold status"
  unique_id: boiler_vcontrold_status
  default_entity_id: boiler_vcontrold_status
  state_topic: "boiler/bridge/vcontrold_status"
  icon: mdi:cog-outline
  # Valeurs attendues : running | stopped | error

- name: "Boiler optolink status"
  unique_id: boiler_optolink_status
  default_entity_id: boiler_optolink_status
  state_topic: "boiler/bridge/optolink_status"
  icon: mdi:serial-port
  # Valeurs attendues : connected | disconnected | error

- name: "Boiler bridge heartbeat raw"
  unique_id: boiler_bridge_heartbeat_raw
  state_topic: "boiler/bridge/heartbeat"
  icon: mdi:code-json
