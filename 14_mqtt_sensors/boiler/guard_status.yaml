#
# 🔖 NATURE
#   etat_brut_externe
#
# 🆔 UNIQUE_ID
#   boiler_guard_status
#
# 📋 TRANSPORT
#   state_topic          : boiler/guard/status
#   namespace            : boiler/guard/...
#   qos                  : 1
#   json_attributes      : non
#   structure JSON       : sans objet (état textuel scalaire)
#   valeurs attendues    : nominal | recovery | degraded
#
# 🔗 DÉPENDANCES
#   Lit : guard chaudière via broker MQTT
#
# 🚫 INTERDITS
#   - Introduire une logique métier
#   - Qualifier un état système (aucune validation côté HA)
#   - Constituer une autorité décisionnelle
#   - Remplacer une couche template dédiée
#   - Laisser une structure JSON non documentée
#
# 🏷️ STATUT
#   Transport — Arsenal v14.x
# ==========================================================

- name: "boiler_guard_status"
  unique_id: boiler_guard_status
  state_topic: "boiler/guard/status"
  qos: 1
