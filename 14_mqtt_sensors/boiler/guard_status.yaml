# ==========================================================
# 🧠 ARSENAL — MQTT SENSOR
#     Boiler / Guard — Statut
# ----------------------------------------------------------
# 🎯 RÔLE
#   Exposer en transport passif l'état du guard chaudière
#   tel que publié par le Pi.
#
# 🧩 PÉRIMÈTRE
#   - Transport passif de données MQTT uniquement
#   - Transformation locale minimale uniquement
