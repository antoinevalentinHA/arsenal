# ==========================================================
# 🧠 ARSENAL — MQTT SENSOR
#     Boiler / Command Feedback — Retours bus de commande
# ----------------------------------------------------------
# 🎯 RÔLE
#   Exposer en transport passif les payloads bruts du bus
#   de commande chaudière : acquittements d'exécution et
#   dernière erreur publiée par la passerelle.
#
# 🧩 PÉRIMÈTRE
#   - Transport passif de données MQTT uniquement
#   - Transformation locale minimale uniquement
#   - Aucune logique métier
#   - Aucune qualification d'état système
#
# 🔖 NATURE
#   transport_json
#
# 🆔 UNIQUE_ID
#   boiler_ack_heating_set_temperature_raw
#   boiler_ack_heating_set_curve_slope_raw
#   boiler_ack_heating_set_curve_shift_raw
#   boiler_ack_dhw_set_setpoint_raw
#   boiler_error_last_raw
#
# 📋 TRANSPORT
#   state_topic          :
#     - boiler/ack/heating/set_temperature
#     - boiler/ack/heating/set_curve_slope
#     - boiler/ack/heating/set_curve_shift
#     - boiler/ack/dhw/set_setpoint
#     - boiler/error/last
#   namespace            : boiler/ack/... | boiler/error/...
#   qos                  : 1
#   json_attributes      : non (payload JSON conservé brut comme état)
#   structure JSON       : non extraite ici — interprétation
#                          déléguée aux couches template / diagnostic
#
# 🔗 DÉPENDANCES
#   Lit : bus de commande chaudière via broker MQTT
#   Réf : 03_namespace_canonique.md §3.4 §3.5,
#         13_politique_payload.md,
#         14_semantique_ack.md
#
# 🚫 INTERDITS
#   - Introduire une logique métier
#   - Qualifier un état système (accepted ≠ succès métier)
#   - Constituer une autorité décisionnelle
#   - Remplacer une couche template dédiée
#   - Laisser une structure JSON non documentée
#
# 🏷️ STATUT
#   Transport — Arsenal v14.x
# ==========================================================

