# ==========================================================
# 🧠 ARSENAL — MQTT SENSOR
#     Boiler / Guard — Version
# ----------------------------------------------------------
# 🎯 RÔLE
#   Exposer en transport passif la version du guard
#   chaudière publiée par le Pi (audit de déploiement).
#
# 🧩 PÉRIMÈTRE
#   - Transport passif de données MQTT uniquement
#   - Transformation locale minimale uniquement
#   - Aucune logique métier
#   - Aucune qualification d'état système
#
# 🔖 NATURE
#   etat_brut_externe
#
# 🆔 UNIQUE_ID
#   boiler_guard_version
#
# 📋 TRANSPORT
#   state_topic          : boiler/guard/version
#   namespace            : boiler/guard/...
#   qos                  : 1
#   json_attributes      : non
#   structure JSON       : sans objet (chaîne scalaire)
#   format               : v{MAJOR}.{MINOR}
#
# 🔗 DÉPENDANCES
#   Lit : guard chaudière via broker MQTT
#
# 🚫 INTERDITS
#   - Introduire une logique métier
#   - Qualifier un état système
#   - Constituer une autorité décisionnelle
#   - Remplacer une couche template dédiée
#   - Laisser une structure JSON non documentée
#
# 🏷️ STATUT
#   Transport — Arsenal v14.x
# ==========================================================

- name: "boiler_guard_version"
  unique_id: boiler_guard_version
  state_topic: "boiler/guard/version"
  qos: 1
