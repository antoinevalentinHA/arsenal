# ==========================================================
# 🧠 ARSENAL — MQTT SENSOR
#     Boiler / Telemetry — Télémétrie chaudière
# ----------------------------------------------------------
# 🎯 RÔLE
#   Exposer en transport passif la télémétrie chaudière
#   publiée par le bridge sur MQTT (températures, consignes,
#   courbe de chauffe, modulation brûleur), conformément
#   à la simplification Arsenal Vision A.
#
# 🧩 PÉRIMÈTRE
#   - Transport passif de données MQTT uniquement
#   - Transformation locale minimale uniquement
#   - Aucune logique métier
#   - Aucune qualification d'état système
#
# 🔖 NATURE
#   telemetrie_brute | mesure_externe
#
# 🆔 UNIQUE_ID
#   boiler_supply_temperature
#   boiler_dhw_temperature
#   boiler_heating_setpoint
#   boiler_heating_curve_slope
#   boiler_heating_curve_shift
#   boiler_dhw_setpoint
#   boiler_burner_modulation
#
# 📋 TRANSPORT
#   state_topic          :
#     - boiler/telemetry/temperatures/supply
#     - boiler/telemetry/temperatures/dhw
#     - boiler/telemetry/heating/setpoint
#     - boiler/telemetry/heating/curve/slope
#     - boiler/telemetry/heating/curve/shift
#     - boiler/telemetry/dhw/setpoint
#     - boiler/telemetry/burner/modulation
#   namespace            : boiler/telemetry/...
#   json_attributes      : non
#   structure JSON       : sans objet (payloads scalaires)
#   transformations      : value_template float(0) sur
#                          burner/modulation uniquement
#
# 🔗 DÉPENDANCES
#   Lit : boiler bridge via broker MQTT
#
# 🚫 INTERDITS
#   - Introduire une logique métier
#   - Qualifier un état système
#   - Constituer une autorité décisionnelle
#   - Remplacer une couche template dédiée
#   - Laisser une structure JSON non documentée
#   - Réintroduire une sémantique Confort / Eco
#     (appartient à Arsenal, pas au bridge)
#
# 🏷️ STATUT
#   Transport — Arsenal v14.x
# ==========================================================

- name: "Boiler supply temperature"
  unique_id: boiler_supply_temperature
  default_entity_id: boiler_supply_temperature
  state_topic: "boiler/telemetry/temperatures/supply"
  device_class: temperature
  unit_of_measurement: "°C"
  state_class: measurement
  icon: mdi:thermometer

- name: "Boiler DHW temperature"
  unique_id: boiler_dhw_temperature
  default_entity_id: boiler_dhw_temperature
  state_topic: "boiler/telemetry/temperatures/dhw"
  device_class: temperature
  unit_of_measurement: "°C"
  state_class: measurement
  icon: mdi:water-thermometer

- name: "Boiler heating setpoint"
  unique_id: boiler_heating_setpoint
  default_entity_id: boiler_heating_setpoint
  state_topic: "boiler/telemetry/heating/setpoint"
  device_class: temperature
  unit_of_measurement: "°C"
  state_class: measurement
  icon: mdi:thermometer-high

- name: "Boiler heating curve slope"
  unique_id: boiler_heating_curve_slope
  default_entity_id: boiler_heating_curve_slope
  state_topic: "boiler/telemetry/heating/curve/slope"
  state_class: measurement
  icon: mdi:chart-line

- name: "Boiler heating curve shift"
  unique_id: boiler_heating_curve_shift
  default_entity_id: boiler_heating_curve_shift
  state_topic: "boiler/telemetry/heating/curve/shift"
  state_class: measurement
  icon: mdi:chart-line-variant

- name: "Boiler DHW setpoint"
  unique_id: boiler_dhw_setpoint
  default_entity_id: boiler_dhw_setpoint
  state_topic: "boiler/telemetry/dhw/setpoint"
  device_class: temperature
  unit_of_measurement: "°C"
  state_class: measurement
  icon: mdi:water-boiler

- name: "Boiler burner modulation"
  unique_id: boiler_burner_modulation
  default_entity_id: sensor.boiler_burner_modulation
  state_topic: "boiler/telemetry/burner/modulation"
  value_template: "{{ value | float(0) }}"
  unit_of_measurement: "%"
  state_class: measurement
  icon: mdi:fire
