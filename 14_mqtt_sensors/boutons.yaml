- name: "bouton_garage_1_action"
  unique_id: bouton_garage_1_action
  state_topic: "zigbee2mqtt/bouton_garage_1"
  value_template: "{{ (value_json | default({}, true)).get('action', '') }}"
  icon: mdi:gesture-tap-button

- name: "bouton_garage_2_action"
  unique_id: bouton_garage_2_action
  state_topic: "zigbee2mqtt/bouton_garage_2"
  value_template: "{{ (value_json | default({}, true)).get('action', '') }}"
  icon: mdi:gesture-tap-button

- name: "bouton_entree_action"
  unique_id: bouton_entree_action
  state_topic: "zigbee2mqtt/bouton_entree"
  value_template: "{{ (value_json | default({}, true)).get('action', '') }}"
  icon: mdi:gesture-tap-button
