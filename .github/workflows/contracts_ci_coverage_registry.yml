name: Arsenal Contracts — Registre Couverture CI

on:
  push:
    paths:
      - '00_documentation_arsenal/audits/REGISTRE_COUVERTURE_VERIFICATION.md'
      - 'scripts/arsenal_contracts/check_ci_coverage_registry.py'
      - 'scripts/arsenal_contracts/check_*.py'
      - '.github/workflows/**'
      # Le checker recompte AUSSI les contrats et les doctrines : sans ces deux
      # filtres, ajouter un contrat faisait deriver `contrats_md` SANS declencher
      # ce workflow — la derive n'etait vue que plus tard, sur une PR sans rapport,
      # qu'elle faisait echouer a tort. Toute source d'un compteur garde doit
      # declencher la garde.
      - '00_documentation_arsenal/contrats/**'
      - '00_documentation_arsenal/architecture/03_doctrines/**'
  pull_request:
    paths:
      - '00_documentation_arsenal/audits/REGISTRE_COUVERTURE_VERIFICATION.md'
      - 'scripts/arsenal_contracts/check_ci_coverage_registry.py'
      - 'scripts/arsenal_contracts/check_*.py'
      - '.github/workflows/**'
      # Le checker recompte AUSSI les contrats et les doctrines : sans ces deux
      # filtres, ajouter un contrat faisait deriver `contrats_md` SANS declencher
      # ce workflow — la derive n'etait vue que plus tard, sur une PR sans rapport,
      # qu'elle faisait echouer a tort. Toute source d'un compteur garde doit
      # declencher la garde.
      - '00_documentation_arsenal/contrats/**'
      - '00_documentation_arsenal/architecture/03_doctrines/**'

jobs:
  validate-ci-coverage-registry:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # On ne juge pas avec un juge defectueux (contrainte de methode C14 §6) :
      # le --selftest existait mais n'etait execute nulle part. Il tourne AVANT
      # le controle reel — si le juge est casse, le verdict ne vaut rien.
      - name: Selftest du checker (le juge se verifie avant de juger)
        run: |
          python3 scripts/arsenal_contracts/check_ci_coverage_registry.py --selftest

      - name: Run CI coverage registry anti-drift contract
        run: |
          python3 scripts/arsenal_contracts/check_ci_coverage_registry.py
