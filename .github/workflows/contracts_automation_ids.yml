name: Arsenal Contracts — IDs Automatisations

on:
  push:
  pull_request:

jobs:
  validate-automation-ids-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Validate automation IDs contracts
        run: python scripts/arsenal_contracts/check_automation_ids_contracts.py
