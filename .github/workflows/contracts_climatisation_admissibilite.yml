name: Arsenal — Vérification contractuelle climatisation admissibilité

on:
  push:
    paths:
      - '11_automations/climatisation/**'
      - '12_template_sensors/climatisation/**'
      - '05_input_booleans/climatisation/**'
      - '19_button_card_templates/40_dashboards/climatisation/**'
      - '18_lovelace/dashboards/clim.yaml'
      - '00_documentation_arsenal/contrats/climatisation/**'
      - 'scripts/arsenal_contracts/check_climatisation_admissibilite_contracts.py'
      - '.github/workflows/check_climatisation_admissibilite_contracts.yml'
  pull_request:
    paths:
      - '11_automations/climatisation/**'
      - '12_template_sensors/climatisation/**'
      - '05_input_booleans/climatisation/**'
      - '19_button_card_templates/40_dashboards/climatisation/**'
      - '18_lovelace/dashboards/clim.yaml'
      - '00_documentation_arsenal/contrats/climatisation/**'
      - 'scripts/arsenal_contracts/check_climatisation_admissibilite_contracts.py'
  workflow_dispatch:

jobs:
  verify:
    name: Vérifier contrat admissibilité v2
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run contract check
        run: python scripts/arsenal_contracts/check_climatisation_admissibilite_contracts.py
