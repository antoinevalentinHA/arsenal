name: Arsenal Docs

on:
  push:
  pull_request:

jobs:
  docs-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Documentation lint (read-only, blocking)
        run: |
          python scripts/docs_lint/docs_lint.py \
            --exceptions scripts/docs_lint/docs_lint_exceptions.txt

      - name: Changelog index gate (DOC-CI-1, pull_request only)
        if: github.event_name == 'pull_request'
        run: |
          python scripts/docs_lint/docs_ci_changelog_index.py \
            --base "${{ github.event.pull_request.base.sha }}"

      - name: Orphan report gate (DOC-CI-3, stock)
        run: |
          python scripts/docs_lint/docs_ci_orphan_report.py

      - name: Contract index count gate (DOC-CI-2)
        run: |
          python scripts/docs_lint/docs_ci_contract_counts.py
