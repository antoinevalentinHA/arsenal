name: Arsenal — 19 button-card templates

on:
  push:
    paths:
      - "19_button_card_templates/**/*.yaml"
      - "configuration.yaml"
      - "scripts/arsenal_contracts/check_19_button_card_templates_contracts.py"
      - ".github/workflows/contracts_19_button_card_templates.yml"

  pull_request:
    paths:
      - "19_button_card_templates/**/*.yaml"
      - "configuration.yaml"
      - "scripts/arsenal_contracts/check_19_button_card_templates_contracts.py"
      - ".github/workflows/contracts_19_button_card_templates.yml"

  workflow_dispatch:

jobs:
  check-19-button-card-templates:
    name: Check 19_button_card_templates contract
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Run Arsenal contract check
        run: |
          python scripts/arsenal_contracts/check_19_button_card_templates_contracts.py