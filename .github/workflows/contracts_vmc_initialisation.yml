name: Arsenal Contracts — VMC Initialisation

on:
  push:
  pull_request:

jobs:
  vmc-initialisation-contracts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: python3 -m pip install --quiet pyyaml jinja2

      - name: Run VMC initialisation contract checks
        run: |
          python3 scripts/arsenal_contracts/check_vmc_initialisation_contracts.py
          python3 scripts/arsenal_contracts/check_vmc_initialisation_contracts.py --selftest
