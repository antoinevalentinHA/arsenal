name: Arsenal Contracts — Séparation des périmètres (sources extérieures)

on:
  push:
  pull_request:

jobs:
  validate-source-isolation-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate séparation des périmètres (sources extérieures hors domicile)
        run: python scripts/arsenal_contracts/check_source_isolation_contracts.py
