name: Arsenal Contracts — ECS Cycle

on:
  push:
  pull_request:

jobs:
  contract-ecs-cycle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate contract — ECS Cycle & Inertie
        run: python3 scripts/arsenal_contracts/check_ecs_cycle.py
