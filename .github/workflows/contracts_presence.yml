name: Arsenal Contracts — Présence

on:
  push:
  pull_request:

jobs:
  contract-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auto-tests internes du checker présence
        run: python3 scripts/arsenal_contracts/check_presence_contracts.py --selftest

      - name: Vérification contractuelle — Présence (séparation & confinement)
        run: python3 scripts/arsenal_contracts/check_presence_contracts.py
