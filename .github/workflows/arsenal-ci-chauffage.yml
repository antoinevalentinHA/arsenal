name: "Arsenal CI — Chauffage (etages 1, 2 & 3 : lint, decision, execution)"

# Validateur CI structurel Arsenal, domaine Chauffage.
# Quatre jobs aux roles non interchangeables :
#   - self-test : le validateur est-il sain ? (pytest)
#   - lint      : etage 1 — la config (liste CONFIGS) enfreint-elle la doctrine ? (arsenal_ci.cli)
#   - decision  : etage 2 — cascade de decision (R-COV-1 / R-MIRROR-1 runtime ; n'utilise PAS CONFIGS)
#   - execution : etage 3 — topologie d'appel R-CALL-1 (CH-4 ; n'utilise PAS CONFIGS)
# Les trois analyseurs ne tournent que si le self-test est vert (on ne juge pas
# avec un juge defectueux). CONFIGS ne borne que l'etage 1.

on:
  push:
    paths:
      # Code de l'outil : tout changement re-declenche le self-test + lint.
      - "tools/arsenal_ci/**"
      # Registre souverain : sa modification change le verdict.
      - "00_documentation_arsenal/contrats/chauffage/ci/registres_entites.yaml"
      # Config chauffage lintee a l'etage 1 (chemin reel verifie ; cf. liste CONFIGS du job lint).
      - "12_template_sensors/chauffage/**.yaml"
      # Cerveau de decision : sa modification change le verdict etage-2.
      - "10_scripts/chauffage/decision_centrale.yaml"
      # CH-4 : topologie d'appel (frontiere d'execution, R-CALL-1).
      - "10_scripts/chauffage/**"
      - "11_automations/chauffage/**"
      - "00_documentation_arsenal/contrats/chauffage/10_souverainete_execution__amendement.md"
      - ".github/workflows/arsenal-ci-chauffage.yml"
  pull_request:
    paths:
      - "tools/arsenal_ci/**"
      - "00_documentation_arsenal/contrats/chauffage/ci/registres_entites.yaml"
      - "12_template_sensors/chauffage/**.yaml"
      - "10_scripts/chauffage/decision_centrale.yaml"
      - "10_scripts/chauffage/**"
      - "11_automations/chauffage/**"
      - "00_documentation_arsenal/contrats/chauffage/10_souverainete_execution__amendement.md"
      - ".github/workflows/arsenal-ci-chauffage.yml"

# -----------------------------------------------------------------------------
# Bascule doctrinale de la transition warn-only -> bloquant.
#   "false" : phase A (warn-only). Une violation (exit 1) N'ECHOUE PAS le job.
#   "true"  : phase B (bloquant). Une violation (exit 1) echoue le job.
# Dans les DEUX phases : une erreur d'execution (exit 2) echoue le job —
# un outil ou un registre casse doit etre vu immediatement.
# La bascule est un diff unique, traçable en PR (decision doctrinale explicite).
# -----------------------------------------------------------------------------
env:
  ARSENAL_CI_ENFORCE: "false"

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------- self-test
  self-test:
    name: Self-test du validateur
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dependances
        run: pip install pyyaml pytest

      - name: Executer la suite de tests (1.1 / 1.2 / 1.3)
        run: PYTHONPATH=tools python -m pytest tools/arsenal_ci/tests/ -q

  # ----------------------------------------------------------------- lint
  lint:
    name: Lint structurel Chauffage
    runs-on: ubuntu-latest
    needs: self-test            # ne juge pas la config avec un juge defectueux
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dependances
        run: pip install pyyaml

      - name: Lint structurel (warn-only / enforce selon ARSENAL_CI_ENFORCE)
        id: lint
        shell: bash
        run: |
          set -uo pipefail
          set +e   # GitHub lance 'shell: bash' avec -e ; on gere les exit codes a la main.

          REGISTRY="00_documentation_arsenal/contrats/chauffage/ci/registres_entites.yaml"

          # Liste explicite des fichiers a valider (cadrage lot 1.4).
          # A etendre fichier par fichier, jamais par glob implicite.
          CONFIGS=(
            "12_template_sensors/chauffage/autorisation.yaml"
          )

          mkdir -p ci_reports
          overall_exit=0
          had_violation=0
          had_exec_error=0

          for cfg in "${CONFIGS[@]}"; do
            base="$(basename "$cfg" .yaml)"
            json="ci_reports/${base}.json"

            echo "::group::Lint ${cfg}"
            PYTHONPATH=tools python -m arsenal_ci.cli \
              --registry "$REGISTRY" \
              --config "$cfg" \
              --json "$json"
            code=$?
            echo "exit=${code} (${cfg})"
            echo "::endgroup::"

            case "$code" in
              0) ;;
              1) had_violation=1 ;;
              2) had_exec_error=1 ;;
              *) had_exec_error=1 ;;  # tout code inattendu = anomalie d'integration
            esac
          done

          # --- Resolution de l'echec du job -----------------------------------
          # Erreur d'execution (2) : bloquant dans TOUTES les phases.
          if [ "$had_exec_error" -eq 1 ]; then
            echo "::error::Erreur d'execution du validateur (exit 2) — outil ou registre casse, ce n'est PAS une violation de config."
            exit 2
          fi

          # Violation doctrinale (1) : bloquant uniquement en phase enforce.
          if [ "$had_violation" -eq 1 ]; then
            if [ "${ARSENAL_CI_ENFORCE}" = "true" ]; then
              echo "::error::Violation doctrinale detectee (exit 1) — phase bloquante (ARSENAL_CI_ENFORCE=true)."
              exit 1
            else
              echo "::warning::Violation doctrinale detectee (exit 1) — phase warn-only, le job ne bloque pas. Voir l'artifact JSON."
              exit 0
            fi
          fi

          echo "Conforme : aucune violation, aucune erreur d'execution."
          exit 0

      - name: Publier le rapport JSON (artifact)
        if: always()           # publie meme en cas d'echec (preuve post-mortem)
        uses: actions/upload-artifact@v4
        with:
          name: arsenal-ci-chauffage-report
          path: ci_reports/
          retention-days: 14
          if-no-files-found: warn

  # ----------------------------------------------------------------- decision
  decision:
    name: Verdict decision Chauffage (etage 2)
    runs-on: ubuntu-latest
    needs: self-test            # meme garde : on ne juge pas avec un juge defectueux
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dependances
        run: pip install pyyaml

      - name: Verdict decision (warn-only / enforce selon ARSENAL_CI_ENFORCE)
        id: decision
        shell: bash
        run: |
          set -uo pipefail
          set +e   # GitHub lance 'shell: bash' avec -e ; on gere les exit codes a la main.

          mkdir -p ci_reports

          echo "::group::Decision (R-COV-1 runtime + R-MIRROR-1 runtime)"
          PYTHONPATH=tools python -m arsenal_ci.decision.cli_decision \
            --json ci_reports/decision.json
          code=$?
          echo "exit=${code}"
          echo "::endgroup::"

          # --- Resolution de l'echec du job (identique au lint) ---------------
          # Erreur d'execution (2) : bloquant dans TOUTES les phases.
          if [ "$code" -eq 2 ]; then
            echo "::error::Erreur d'execution du validateur etage-2 (exit 2) — outil ou cascade illisible, ce n'est PAS une violation de config."
            exit 2
          fi

          # Violation doctrinale (1) : bloquant uniquement en phase enforce.
          if [ "$code" -eq 1 ]; then
            if [ "${ARSENAL_CI_ENFORCE}" = "true" ]; then
              echo "::error::Violation doctrinale etage-2 detectee (exit 1) — phase bloquante (ARSENAL_CI_ENFORCE=true)."
              exit 1
            else
              echo "::warning::Violation doctrinale etage-2 detectee (exit 1) — phase warn-only, le job ne bloque pas. Voir l'artifact JSON."
              exit 0
            fi
          fi

          if [ "$code" -ne 0 ]; then
            echo "::error::Code de sortie inattendu (${code}) — anomalie d'integration."
            exit 2
          fi

          echo "Conforme : aucune violation, aucune erreur d'execution (etage 2)."
          exit 0

      - name: Publier le rapport JSON decision (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arsenal-ci-chauffage-decision-report
          path: ci_reports/
          retention-days: 14
          if-no-files-found: warn

  # ---------------------------------------------------------------- execution
  # CH-4 : topologie d'appel de la couche d'Application (R-CALL-1).
  # Troisieme analyseur, parallele a l'etage-1 (lint) et l'etage-2 (decision).
  execution:
    name: Verdict topologie d'appel Chauffage (frontiere d'execution)
    runs-on: ubuntu-latest
    needs: self-test            # meme garde : on ne juge pas avec un juge defectueux
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dependances
        run: pip install pyyaml

      - name: Verdict topologie (warn-only / enforce selon ARSENAL_CI_ENFORCE)
        id: execution
        shell: bash
        run: |
          set -uo pipefail
          set +e   # GitHub lance 'shell: bash' avec -e ; on gere les exit codes a la main.

          mkdir -p ci_reports

          echo "::group::Execution (R-CALL-1 : appelants de chauffage_appliquer_consigne)"
          PYTHONPATH=tools python -m arsenal_ci.execution.cli_execution \
            --json ci_reports/execution.json
          code=$?
          echo "exit=${code}"
          echo "::endgroup::"

          # --- Resolution de l'echec du job (identique aux autres jobs) -------
          # Erreur d'execution (2) : bloquant dans TOUTES les phases.
          if [ "$code" -eq 2 ]; then
            echo "::error::Erreur d'execution du validateur R-CALL-1 (exit 2) — entree illisible, ce n'est PAS une violation de config."
            exit 2
          fi

          # Violation doctrinale (1) : bloquant uniquement en phase enforce.
          if [ "$code" -eq 1 ]; then
            if [ "${ARSENAL_CI_ENFORCE}" = "true" ]; then
              echo "::error::Appelant non contractualise detecte (exit 1) — phase bloquante (ARSENAL_CI_ENFORCE=true)."
              exit 1
            else
              echo "::warning::Appelant non contractualise detecte (exit 1) — phase warn-only, le job ne bloque pas. Voir l'artifact JSON."
              exit 0
            fi
          fi

          if [ "$code" -ne 0 ]; then
            echo "::error::Code de sortie inattendu (${code}) — anomalie d'integration."
            exit 2
          fi

          echo "Conforme : topologie d'appel intacte (R-CALL-1)."
          exit 0

      - name: Publier le rapport JSON execution (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arsenal-ci-chauffage-execution-report
          path: ci_reports/
          retention-days: 14
          if-no-files-found: warn