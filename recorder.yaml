    #              est tronquée sans signal visible)
    # Entité source de : sensor.temperature_max_journaliere_jardin
    - sensor.temperature_max_journaliere_jardin

    # RECORDER — Population B
    # Rôle      : Registre persistant des rangs du palmarès journées chaudes
    # Utilité   : Relire et auditer l'historique des insertions et corrections
    # Logbook   : acceptable — écriture quotidienne, faible fréquence
    # Cardinalité : continue bornée [-10–50°C] — variation lente, quotidienne
    # Fréquence : ≤ 1/jour par rang
    - input_number.palmares_temperature_journalier_chaud_rang_01_valeur
    - input_number.palmares_temperature_journalier_chaud_rang_02_valeur
    - input_number.palmares_temperature_journalier_chaud_rang_03_valeur
    - input_number.palmares_temperature_journalier_chaud_rang_04_valeur
