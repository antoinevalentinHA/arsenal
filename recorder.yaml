    # Rôle      : Registre persistant des dates des rangs du palmarès
    # Utilité   : Relire et auditer la chronologie des records
    # Logbook   : acceptable — écriture quotidienne, faible fréquence
    # Cardinalité : finie — dates ISO 8601 YYYY-MM-DD ou chaîne vide
    # Fréquence : ≤ 1/jour par rang
