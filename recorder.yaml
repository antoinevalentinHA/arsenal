    - sensor.rain_bird_bat_bt_2_e9a3_battery_level
    - sensor.rain_bird_bat_bt_2_e9a3_battery_voltage
    - sensor.rain_bird_bat_bt_2_e9a3_ble_rssi
    - sensor.rain_bird_bat_bt_2_e9a3_bridge_wifi_rssi

    # =====================================================
    # ==== 💧 ARROSAGE — CANAL RÉSERVOIR SOL (OBSERVATION v0) ====
    # =====================================================
    # Observabilité lecture seule. Historise les grandeurs du canal
    # réservoir sol pour permettre l'observation v0 (courbes de tarissement,
    # fenêtres de fraîcheur, comportement du Point 2) — cf. contrats/arrosage
    # 13/14/15 et audits/02_conception/arrosage/plan_observation_hydrique_v0.
    # Observation / diagnostic uniquement — aucune recommandation, aucune action.
    # ⏳ GOUVERNANCE TEMPORELLE — instrumentation de chantier (microscope)
    # Chantier   : Arrosage — plan d'observation hydrique v0, canal réservoir sol (contrats/arrosage 13/14/15)
    # Ajouté     : à confirmer
    # Réévaluer  : à la clôture du chantier — rejouer la procédure de classification
    #              (rester en observabilité permanente OU retirer le microscope).
    # Ne pas retirer tant que le chantier est actif (valeur diagnostique prioritaire).
    - sensor.jardin_humidite_sol_mediane
    - sensor.jardin_humidite_sol_minimum
    - sensor.jardin_humidite_sol_heterogeneite
    - sensor.jardin_humidite_sol_points_frais
    - sensor.jardin_reservoir_sol_etat
    # Seuil de déclenchement V1 : historisé pour tracer la ligne de référence
    # sur le graphe humidité sol (dashboard arrosage). Réglage durable, pas une action.
    - input_number.arrosage_seuil_humidite_declenchement

    # =====================================================
    # ==== 🌤️ ARROSAGE — CANAL DEMANDE CLIMATIQUE (OBSERVATION v0) ====
    # =====================================================
    # Observabilité lecture seule. Historise ET₀ journalière, VPD courant et
    # état du canal pour l'observation v0 : corrélation demande climatique ↔
    # tarissement sol, comportement « après pluie puis chaleur » — cf.
    # contrats/arrosage/16_canal_demande_climatique.md et
    # audits/02_conception/arrosage/plan_observation_hydrique_v0.
    # Observation / diagnostic uniquement — aucune recommandation, aucune
    # action ; aucune logique métier ne lit cet historique (§Indépendance).
    # ⏳ GOUVERNANCE TEMPORELLE — instrumentation de chantier (microscope)
    # Chantier   : Arrosage — plan d'observation hydrique v0, canal demande climatique (contrat arrosage 16)
    # Ajouté     : VPD #215, 2026-07-01 (ET₀ / état : même chantier)
    # Réévaluer  : à la clôture du chantier — rejouer la procédure de classification
    #              (rester en observabilité permanente OU retirer le microscope).
    # Ne pas retirer tant que le chantier est actif (valeur diagnostique prioritaire).
    #
    # RECORDER — Population B
    # Rôle      : ET₀ de référence journalière (Hargreaves-Samani, contrat 16 §2)
    #             + état qualitatif du canal (contrat 16 §6)
    # Utilité   : courbe de la demande évaporative + fenêtres de disponibilité
    # Logbook   : acceptable — ET₀ journalière (lente), état à bascule rare
    # Cardinalité : ET₀ continue bornée (mm·jour⁻¹) ; état fini (complet /
    #               degrade / indisponible)
    # Fréquence : ≤ 5/h — ET₀ recalculée sur Tmin/Tmax/Tmean journaliers ;
    #             état ne bascule qu'à la perte/retour d'une entrée
    - sensor.arrosage_demande_climatique_et0
    - sensor.arrosage_demande_climatique_etat

    # -----------------------------------------------------
    # RECORDER — Population B — DÉROGATION FRÉQUENCE
    # Rôle      : VPD courant — moteur instantané de la demande (contrat 16 §3)
    # Utilité   : croiser la demande instantanée avec le tarissement sol
    # Logbook   : acceptable — grandeur physique interprétable (kPa)
    # Cardinalité : continue bornée (physique, kPa)
    # Fréquence : > 5/h — grandeur « courante », recalcul à chaque MAJ T/HR
    # Fréquence observée : instantanée par conception — recalcul à chaque
    #   rafraîchissement de sensor.temperature_exterieur /
    #   sensor.humidite_relative_exterieur (dépasse le seuil de 5/h)
    # Justification métier : l'observation v0 vise le croisement demande
    #   instantanée ↔ réponse sol ; la grandeur courante n'a de valeur
    #   d'analyse qu'historisée. Portée bornée par la purge 90 j.
    # Critère d'acceptabilité logbook confirmé : oui
    # Validé le : 2026-07-01
    - sensor.arrosage_demande_climatique_vpd

    # =====================================================
    # ==== 💧 ARROSAGE — OBSERVABILITÉ CHAÎNE DÉCISIONNELLE V1 ====
    # =====================================================
    # Permet aux audits de LIRE la décision V1 (besoin → intention → effectif)
    # et l'état du maître d'automatisme, au lieu de les reconstruire — sur le
    # modèle des blocs clim / chauffage. Indispensable pour corréler les
    # décisions et arrosages réels avec le graphe humidité sol déjà historisé.
    # Entités existantes, lecture seule, faible volume. Aucun seuil ni logique
    # modifié. Les helpers de réglage (hystérésis / intervalle / fenêtre) sont
    # volontairement EXCLUS (variation rare, faible valeur d'historisation).
    # ⏳ GOUVERNANCE TEMPORELLE — instrumentation de chantier (microscope)
    # Chantier   : Arrosage — observabilité chaîne décisionnelle V1 (besoin → intention → effectif)
    # Ajouté     : à confirmer
    # Réévaluer  : à la clôture du chantier — rejouer la procédure de classification
    #              (rester en observabilité permanente OU retirer le microscope).
    # Ne pas retirer tant que le chantier est actif (valeur diagnostique prioritaire).
    - binary_sensor.arrosage_besoin_sol
    - binary_sensor.arrosage_intention
    - sensor.arrosage_dernier_effectif
    - input_boolean.arrosage_automatique_actif

    # =====================================================
    # ==== 💧 ARROSAGE — DURÉE DE BASE APPLIQUÉE (OBSERVATION) ====
    # =====================================================
    # RECORDER — Population B
    # Rôle      : durée de base opérateur (minutes) appliquée au cycle station 1
    #             (helper borné, contrats/arrosage 11 & 17 §5).
    # Utilité   : observer la durée réellement RÉGLÉE au fil du temps, à corréler
    #             avec la réponse sol / le tarissement — instrumentation du futur
    #             chantier « durée variable » (C11, prérequis P1 : comportement
    #             sur la durée). Complète sensor.arrosage_dernier_effectif, qui
    #             marque l'événement d'arrosage mais PAS la durée réglée.
    # Logbook   : acceptable — réglage opérateur durable, variation rare.
    # Cardinalité : continue bornée — minutes, plage [1, 60], pas 1.
    # Fréquence : ≤ 5/h — réglage manuel, change rarement.
    # NB : contrairement aux helpers de réglage de la DÉCISION (hystérésis /
    #      intervalle / fenêtre, exclus ci-dessus), la durée est la grandeur de
    #      BASE que la future modulation bornée fera varier — son historisation
    #      est donc directement utile à l'observation. Lecture seule ; aucune
    #      logique métier ne lit cet historique (invariant d'indépendance).
    # ⏳ GOUVERNANCE TEMPORELLE — instrumentation de chantier (microscope)
    # Chantier   : Arrosage — durée de base appliquée, prérequis futur chantier « durée variable » (C11, prérequis P1)
    # Ajouté     : #218, 2026-07-01
    # Réévaluer  : à la clôture du chantier — rejouer la procédure de classification
