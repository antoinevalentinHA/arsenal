    # =====================================================
    # ==== 🛰️ RAIN BIRD — PONT / QUALIFICATION P2 & P6 ====
    # =====================================================
    # Observabilité lecture seule. Historise la santé du pont et les
    # mesures du contrôleur pour qualifier dans la durée les pre-requis
    # P2 (batterie / RSSI) et P6 (Wi-Fi) — cf. contrats/arrosage 08 et 10.
    # Aucune commande, aucun pilotage Rain Bird.
    - binary_sensor.arrosage_rain_bird_preconditions_runtime
    - sensor.rain_bird_pont_sante
    - sensor.rain_bird_pont_qualite_wifi
    - sensor.rain_bird_pont_qualite_ble
