# ==========================================================
# 🧠 ARSENAL — HISTORY_STATS SENSOR
#     Aération — Durée cumulée d'ouverture RDC
# ----------------------------------------------------------
# 🎯 RÔLE
#   Calculer la durée cumulée pendant laquelle les fenêtres
#   du rez-de-chaussée sont restées ouvertes depuis minuit,
#   à destination des consommateurs UI et des couches de
#   diagnostic aération.
#
# 🧩 PÉRIMÈTRE
#   - Métrique historique via recorder uniquement
#   - Aucune logique métier
#   - Aucun pilotage d'équipement
#
# 🔖 NATURE
#   duree_cumulee
#
# 📋 PARAMÈTRES
#   entity_id : binary_sensor.fenetre_ouverte_rdc
#   state     : on
#   type      : time
#   fenêtre   : start = now().replace(hour=0, minute=0, second=0)
#               end   = now()
#               justification : agrégat journalier glissant
#               aligné sur l'horloge civile locale
#
# 🔗 DÉPENDANCES
#   Lit      : binary_sensor.fenetre_ouverte_rdc
#   Recorder : requis — rétention minimale 24 h
#
# 🚫 INTERDITS
#   - Introduire une logique métier
#   - Utiliser un historique incomplet sans justification
#   - Confondre mesure historique et état temps réel
#   - Constituer à lui seul une autorité décisionnelle
#   - Laisser la fenêtre temporelle sans justification
#
# 🏷️ STATUT
#   Durée — Arsenal v14.x
# ==========================================================

- platform: history_stats
  name: "Durée aération RDC"
  entity_id: binary_sensor.fenetre_ouverte_rdc
  state: "on"
  type: time
  start: "{{ now().replace(hour=0, minute=0, second=0) }}"
  end: "{{ now() }}"
