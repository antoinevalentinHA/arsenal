# ==========================================================
# 🧠 ARSENAL — STATISTICS SENSOR
#     Thermique — Stabilité 12h chambre Arnaud
# ----------------------------------------------------------
# 🎯 RÔLE
#   Exposer la moyenne et la variance glissantes sur 12 h
#   de la température de la chambre Arnaud, à destination
#   des couches de diagnostic et d'analyse de stabilité
#   thermique.
#
# 🧩 PÉRIMÈTRE
#   - Statistique dérivée sur série temporelle uniquement
#   - Aucune logique métier
#   - Aucun pilotage d'équipement
#
# 🔖 NATURE
#   moyenne_glissante | agregat_quantitatif
#
# 📋 PARAMÈTRES
#   state_characteristic :
#     - mean     (temperature_stats_12h_mean_chambre_arnaud)
#     - variance (temperature_stats_12h_variance_chambre_arnaud)
#   sampling_size        : omis (par défaut HA)
#   max_age              : 12 h
#                          justification : fenêtre représentative
#                          d'un demi-cycle jour/nuit pour
#                          caractériser la stabilité thermique
#                          sans lissage excessif
#   precision            : omis (par défaut HA)
#
# 🔗 DÉPENDANCES
#   Lit : sensor.temperature_chambre_arnaud
#
# 🚫 INTERDITS
#   - Introduire une logique métier
#   - Piloter directement un équipement
#   - Constituer à lui seul une autorité décisionnelle
#   - Laisser une fenêtre temporelle sans justification
#
# 🏷️ STATUT
#   Statistique — Arsenal v14.x
# ==========================================================

- platform: statistics
  name: temperature_stats_12h_mean_chambre_arnaud
  entity_id: sensor.temperature_chambre_arnaud
  state_characteristic: mean
  max_age:
    hours: 12

- platform: statistics
  name: temperature_stats_12h_variance_chambre_arnaud
  entity_id: sensor.temperature_chambre_arnaud
  state_characteristic: variance
  max_age:
    hours: 12
