# ==========================================================
# 🧠 ARSENAL — STATISTICS SENSOR
#     Chauffage — Moyennes glissantes 24h écarts consigne
# ----------------------------------------------------------
# 🎯 RÔLE
#   Exposer les moyennes glissantes sur 24 h des écarts
#   de consigne instantanés (global, régime froid, régime
#   doux), à destination des couches de diagnostic et
#   d'analyse de la performance thermique.
#
# 🧩 PÉRIMÈTRE
#   - Statistique dérivée sur série temporelle uniquement
#   - Aucune logique métier
#   - Aucun pilotage d'équipement
#
# 🔖 NATURE
#   moyenne_glissante | agregat_quantitatif
#
# 📋 PARAMÈTRES
#   state_characteristic : mean (les trois sensors)
#   sampling_size        : 300
#                          justification : borne haute évitant
#                          la dérive mémoire tout en couvrant
#                          la fenêtre de 24 h à fréquence
#                          d'échantillonnage usuelle
#   max_age              : 24 h
#                          justification : cycle journalier
#                          complet, lisse les transitions
#                          jour/nuit et les épisodes ponctuels
#   precision            : omis (par défaut HA)
#
# 🔗 DÉPENDANCES
#   Lit :
#     - sensor.ecart_consigne_instantane
#     - sensor.ecart_consigne_instantane_froid
#     - sensor.ecart_consigne_instantane_doux
#
# 🚫 INTERDITS
#   - Introduire une logique métier
#   - Piloter directement un équipement
#   - Constituer à lui seul une autorité décisionnelle
#   - Laisser une fenêtre temporelle sans justification
#
# 🏷️ STATUT
#   Statistique — Arsenal v14.x
# ==========================================================

- platform: statistics
  name: "Ecart consigne stats 24h"
  entity_id: sensor.ecart_consigne_instantane
  state_characteristic: mean
  max_age:
    hours: 24
  sampling_size: 300

- platform: statistics
  name: "Ecart consigne stats froid"
  entity_id: sensor.ecart_consigne_instantane_froid
  state_characteristic: mean
  max_age:
    hours: 24
  sampling_size: 300

- platform: statistics
  name: "Ecart consigne stats doux"
  entity_id: sensor.ecart_consigne_instantane_doux
  state_characteristic: mean
  max_age:
    hours: 24
  sampling_size: 300
