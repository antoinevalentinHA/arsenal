# ==========================================================
# 🧠 ARSENAL — STATISTICS SENSOR
#     Système — Référence uptime médiane 7 j
# ----------------------------------------------------------
# 🎯 RÔLE
#   Exposer la référence statistique utilisée par la météo
#   uptime Arsenal.
#
# 🧩 PÉRIMÈTRE
#   - Statistique dérivée sur série temporelle uniquement
#   - Aucune logique métier
#   - Aucun pilotage d'équipement
#
# 🔖 NATURE
#   mediane_glissante | reference_statistique
#
# 📋 PARAMÈTRES
#   state_characteristic : median
#   sampling_size        : 10000
#   max_age              : 7 j — référence glissante destinée
#                          à lisser les variations de durée
#                          de fonctionnement
#   precision            : omis
#
# 🔗 DÉPENDANCES
#   Lit : sensor.uptime_jours
#
# 🚫 INTERDITS
#   - Introduire une logique métier
#   - Piloter directement un équipement
#   - Constituer à lui seul une autorité décisionnelle
#   - Laisser une fenêtre temporelle sans justification
#
# 🏷️ STATUT
#   Référence — Arsenal v14.x
# ==========================================================

- platform: statistics
  name: "Uptime mediane 7 j"
  entity_id: sensor.uptime_jours
  state_characteristic: median
  max_age:
    days: 7
  sampling_size: 10000