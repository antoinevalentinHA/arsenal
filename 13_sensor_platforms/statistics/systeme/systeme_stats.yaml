# ==========================================================
# 🧠 ARSENAL — STATISTICS SENSOR
#     Système — Références CPU et mémoire Home Assistant
# ----------------------------------------------------------
# 🎯 RÔLE
#   Exposer les références statistiques CPU et mémoire servant
#   de base à l'analyse de la météo système.
#
# 🧩 PÉRIMÈTRE
#   - Statistique dérivée sur série temporelle uniquement
#   - Aucune logique métier
#   - Aucun pilotage d'équipement
#
# 🔖 NATURE
#   mediane_glissante | moyenne_glissante | reference_statistique | lissage
#
# 📋 PARAMÈTRES
#   state_characteristic : median / mean
#   sampling_size        : 10000
#   max_age              : 7 j / 10 min — référence médiane
#                          hebdomadaire et lissage court terme
#                          des variations système
#   precision            : omis
#
# 🔗 DÉPENDANCES
#   Lit : sensor.home_assistant_supervisor_memory_percent
#         sensor.home_assistant_supervisor_cpu_percent
#         sensor.home_assistant_core_memory_percent
#         sensor.home_assistant_core_cpu_percent
#
# 🚫 INTERDITS
#   - Introduire une logique métier
#   - Piloter directement un équipement
#   - Constituer à lui seul une autorité décisionnelle
#   - Laisser une fenêtre temporelle sans justification
#
# 🏷️ STATUT
#   Référence — Arsenal v14.x
# ==========================================================

# -----------------------------
# Mémoire — Supervisor
# -----------------------------
- platform: statistics
  name: "Mémoire médiane 7 j Supervisor"
  entity_id: sensor.home_assistant_supervisor_memory_percent
  state_characteristic: median
  max_age:
    days: 7
  sampling_size: 10000

- platform: statistics
  name: "Mémoire moyenne 10 min Supervisor"
  entity_id: sensor.home_assistant_supervisor_memory_percent
  state_characteristic: mean
  max_age:
    minutes: 10
  sampling_size: 10000

# -----------------------------
# CPU — Supervisor
