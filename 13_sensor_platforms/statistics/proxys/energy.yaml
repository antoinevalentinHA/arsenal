# ==========================================================
# 🧠 ARSENAL — STATISTICS SENSOR
#     Énergie — Proxy statistiques Recorder climatisation
# ----------------------------------------------------------
# 🎯 RÔLE
#   Exposer un proxy statistique compatible Recorder pour
#   la consommation estimée de la climatisation.
#
# 🧩 PÉRIMÈTRE
#   - Statistique dérivée sur série temporelle uniquement
#   - Compatibilité Recorder / statistiques long terme uniquement
#   - Aucune logique métier
#   - Aucun pilotage d'équipement
#
# 🔖 NATURE
#   reference_statistique
#
# 📋 PARAMÈTRES
#   state_characteristic : mean
#   sampling_size        : 1
#   max_age              : omis
#   precision            : omis
#
# 🔗 DÉPENDANCES
#   Lit : sensor.clim_consommation_estimee_energie
#
# 🚫 INTERDITS
#   - Introduire une logique métier
#   - Piloter directement un équipement
#   - Constituer à lui seul une autorité décisionnelle
#   - Utiliser ce proxy comme source métier primaire
#
# 🏷️ STATUT
#   Statistique — Arsenal v14.x
# ==========================================================

- platform: statistics
  name: "clim_consommation_estimee_energy_proxy"
  entity_id: sensor.clim_consommation_estimee_energie
  state_characteristic: mean
  sampling_size: 1