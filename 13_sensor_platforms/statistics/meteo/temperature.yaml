# ==========================================================
# 🧠 ARSENAL — STATISTICS SENSOR
#     Thermique — Moyenne 30j Température brute
# ----------------------------------------------------------
# 🎯 RÔLE
#   Exposer la moyenne glissante sur 30 jours de la
#   température brute par zone.
#
# 🧩 PÉRIMÈTRE
#   - Statistique dérivée sur série temporelle uniquement
#   - Aucune logique métier
#   - Aucun pilotage d'équipement
#
# 🔖 NATURE
#   moyenne_glissante | reference_statistique | agregat_quantitatif
#
# 📋 PARAMÈTRES
#   state_characteristic : mean
#   sampling_size        : 10000
#   max_age              : 30 j — fenêtre mensuelle glissante
#                          destinée à lisser les variations
#                          thermiques
#   precision            : omis
#
# 🔗 DÉPENDANCES
#   Lit : sensor.temperature_*
#
# 🚫 INTERDITS
#   - Introduire une logique métier
#   - Piloter directement un équipement
#   - Constituer à lui seul une autorité décisionnelle
#   - Laisser une fenêtre temporelle sans justification
#
# 🏷️ STATUT
#   Référence — Arsenal v14.x
# ==========================================================

# ----------------------------------------------------------
# 🏠 Chambres
# ----------------------------------------------------------
- platform: statistics
  name: "Température Chambre Moyenne Chambre Enfants"
  entity_id: sensor.temperature_chambre_enfants
  state_characteristic: mean
  max_age: &max_age_30d
    days: 30
  sampling_size: &sampling_size_10000 10000

- platform: statistics
  name: "Température Chambre Moyenne Salle de Jeux"
  entity_id: sensor.temperature_salle_de_jeux
  state_characteristic: mean
  max_age: *max_age_30d
  sampling_size: *sampling_size_10000

- platform: statistics
  name: "Température Chambre Moyenne Chambre Parents"
  entity_id: sensor.temperature_chambre_parents
  state_characteristic: mean
  max_age: *max_age_30d
  sampling_size: *sampling_size_10000


