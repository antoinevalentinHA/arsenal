# ==========================================================
#  STATISTICS SENSORS — Moyennes mensuelles de l’Humidex (filtré sur la période du matin)
# ----------------------------------------------------------
#  🧠 Objectif :
#     Calculer la **moyenne glissante sur 30 jours**
#     de l’**Humidex mesuré le matin** (🌤️ période “filtre matin”),
#     indicateur combinant **température** et **humidité relative**
#     pour évaluer le **confort thermique perçu** au moment le plus frais de la journée.
#
#  ⚙️ Composant : `platform: statistics`
#     - Source : capteurs `sensor.humidex_filtre_matin_*`
#     - Métrique : `mean` (moyenne)
#
#  📅 Fenêtre d’analyse :
#     - Période glissante : 30 jours
#     - Taille d’échantillon : 5 000 valeurs
#
#  📊 Sortie :
#     - Moyenne mensuelle de l’Humidex **du matin**
#       (valeur indicative du confort thermique en début de journée)
#
#  🏡 Zones couvertes :
#     - Chambres, espaces de vie, bureaux, zones industrielles et extérieurs.
# ==========================================================

# ----------------------------------------------------------
# 🏠 Chambres
# ----------------------------------------------------------
- platform: statistics
  name: "Humidex filtre matin Moyenne Chambre Arnaud"
  entity_id: sensor.humidex_filtre_matin_chambre_arnaud
  state_characteristic: mean
  max_age: &max_age_30d
    days: 30
  sampling_size: &sampling_size_5000 5000

- platform: statistics
  name: "Humidex filtre matin Moyenne Chambre Matthieu"
  entity_id: sensor.humidex_filtre_matin_chambre_matthieu
  state_characteristic: mean
  max_age: *max_age_30d
  sampling_size: *sampling_size_5000

