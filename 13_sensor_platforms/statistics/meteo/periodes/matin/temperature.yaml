# ==========================================================
#  STATISTICS SENSORS — Moyennes mensuelles de la Température (filtrée sur la période du matin)
# ----------------------------------------------------------
#  🌡️ Objectif :
#     Calculer la **moyenne glissante sur 30 jours**
#     de la **température mesurée le matin** (🌅 période “filtre matin”),
#     afin de suivre la fraîcheur ambiante avant la montée thermique diurne.
#
#  ⚙️ Composant : `platform: statistics`
#     - Source : capteurs `sensor.temperature_filtre_matin_*`
#     - Métrique : `mean` (moyenne)
#
#  📅 Fenêtre d’analyse :
#     - Période glissante : 30 jours
#     - Taille d’échantillon : 5 000 valeurs
#
#  📊 Sortie :
#     - Moyenne mensuelle de la température **du matin** (°C)
#       — utile pour le suivi des cycles thermiques et du confort matinal
#
#  🏡 Zones couvertes :
#     - Chambres, pièces de vie, zones industrielles, bureaux et extérieurs.
# ==========================================================

# ----------------------------------------------------------
# 🏠 Chambres
# ----------------------------------------------------------
- platform: statistics
  name: "Température filtre matin Moyenne Chambre Arnaud"
  entity_id: sensor.temperature_filtre_matin_chambre_arnaud
  state_characteristic: mean
  max_age: &max_age_30d
    days: 30
  sampling_size: &sampling_size_5000 5000

- platform: statistics
  name: "Température filtre matin Moyenne Chambre Matthieu"
  entity_id: sensor.temperature_filtre_matin_chambre_matthieu
  state_characteristic: mean
  max_age: *max_age_30d
  sampling_size: *sampling_size_5000

- platform: statistics
