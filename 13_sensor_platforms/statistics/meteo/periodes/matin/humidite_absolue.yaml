# ==========================================================
# 🧠 ARSENAL — STATISTICS SENSOR
#     Hygrométrie — Moyenne 30j Humidité absolue filtrée le matin
# ----------------------------------------------------------
# 🎯 RÔLE
#   Exposer la moyenne glissante sur 30 jours de l'humidité
#   absolue filtrée le matin par zone.
#
# 🧩 PÉRIMÈTRE
#   - Statistique dérivée sur série temporelle uniquement
#   - Aucune logique métier
#   - Aucun pilotage d'équipement
#
# 🔖 NATURE
#   moyenne_glissante | reference_statistique | agregat_quantitatif
#
# 📋 PARAMÈTRES
#   state_characteristic : mean
#   sampling_size        : 5000
#   max_age              : 30 j — fenêtre mensuelle glissante
#                          destinée à lisser les variations
#                          hygrométriques journalières
#   precision            : omis
#
# 🔗 DÉPENDANCES
#   Lit : sensor.humidite_absolue_filtre_matin_*
#
# 🚫 INTERDITS
#   - Introduire une logique métier
#   - Piloter directement un équipement
#   - Constituer à lui seul une autorité décisionnelle
#   - Laisser une fenêtre temporelle sans justification
#
# 🏷️ STATUT
#   Référence — Arsenal v14.x
# ==========================================================

# ----------------------------------------------------------
# 🏠 Chambres
# ----------------------------------------------------------
- platform: statistics
  name: "Humidité absolue filtre matin Moyenne Chambre Arnaud"
  entity_id: sensor.humidite_absolue_filtre_matin_chambre_arnaud
  state_characteristic: mean
  max_age: &max_age_30d
    days: 30
  sampling_size: &sampling_size_5000 5000

- platform: statistics
  name: "Humidité absolue filtre matin Moyenne Chambre Matthieu"
  entity_id: sensor.humidite_absolue_filtre_matin_chambre_matthieu
