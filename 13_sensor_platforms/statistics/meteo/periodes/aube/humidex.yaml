# ==========================================================
# 🧠 ARSENAL — STATISTICS SENSOR
#     Confort thermique — Moyenne 30j Humidex filtré à l'aube
# ----------------------------------------------------------
# 🎯 RÔLE
#   Exposer la moyenne glissante sur 30 jours de l'humidex
#   filtré à l'aube par zone (chambres, espaces de vie,
#   extérieur, zones administratives et industrielles), à
#   destination des couches de diagnostic et d'analyse de
#   tendance hygrothermique.
#
# 🧩 PÉRIMÈTRE
#   - Statistique dérivée sur série temporelle uniquement
#   - Aucune logique métier
#   - Aucun pilotage d'équipement
#
# 🔖 NATURE
#   moyenne_glissante | reference_statistique | agregat_quantitatif
#
# 📋 PARAMÈTRES
#   state_characteristic : mean (toutes zones)
#   sampling_size        : 5000
#                          justification : borne haute couvrant
#                          la fenêtre de 30 j à fréquence
#                          d'échantillonnage usuelle, avec
#                          marge pour pics de publication
#   max_age              : 30 j
#                          justification : fenêtre mensuelle
#                          permettant l'établissement d'une
#                          référence saisonnière stable, lissant
#                          les épisodes ponctuels et les cycles
#                          hebdomadaires d'occupation
#   precision            : omis (par défaut HA)
#
# 🔗 DÉPENDANCES
#   Lit : sensor.humidex_filtre_aube_*
#         (chambre_arnaud, chambre_matthieu, chambre_parents,
#          entree, petite_maison, sejour,
#          jardin, exterieur,
#          direction, compta, qualite, devis, commercial,
#          komori, bobst, media)
#
# 🚫 INTERDITS
#   - Introduire une logique métier
#   - Piloter directement un équipement
#   - Constituer à lui seul une autorité décisionnelle
#   - Laisser une fenêtre temporelle sans justification
#
# 🏷️ STATUT
#   Référence — Arsenal v14.x
# ==========================================================

# ----------------------------------------------------------
# 🏠 Chambres
# ----------------------------------------------------------
- platform: statistics
  name: "Humidex filtre aube Moyenne Chambre Arnaud"
  entity_id: sensor.humidex_filtre_aube_chambre_arnaud
  state_characteristic: mean
  max_age: &max_age_30d
    days: 30
  sampling_size: &sampling_size_5000 5000

- platform: statistics
  name: "Humidex filtre aube Moyenne Chambre Matthieu"
  entity_id: sensor.humidex_filtre_aube_chambre_matthieu
