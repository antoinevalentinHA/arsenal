# ==========================================================
#  STATISTICS SENSORS — Moyennes mensuelles Humidex (filtré à l’aube)
# ----------------------------------------------------------
#  🧠 Objectif :
#     Calculer la **moyenne glissante sur 30 jours**
#     de l’humidex « filtré à l’aube » pour chaque zone.
#     Ce type d’humidex est généralement calculé à partir
#     de mesures prises tôt le matin (moment de stabilité thermique).
#
#  ⚙️ Composant : `platform: statistics`
#     - Exploite les entités `sensor.humidex_filtre_aube_*`
#     - Produit des statistiques de tendance (ici : moyenne)
#
#  📅 Fenêtre d’analyse :
#     - Période d’analyse : 30 jours glissants
#     - Taille d’échantillon : 5 000 points max
#
#  📊 Sortie :
#     - Moyenne mensuelle de l’humidex filtré à l’aube
#
#  🏡 Zones couvertes :
#     - Pièces domestiques
#     - Espaces extérieurs
#     - Bureaux et zones de production
# ==========================================================

# ----------------------------------------------------------
# 🏠 Chambres
# ----------------------------------------------------------
- platform: statistics
  name: "Humidex filtre aube Moyenne Chambre Arnaud"
  entity_id: sensor.humidex_filtre_aube_chambre_arnaud
  state_characteristic: mean
  max_age: &max_age_30d
    days: 30
  sampling_size: &sampling_size_5000 5000

- platform: statistics
  name: "Humidex filtre aube Moyenne Chambre Matthieu"
  entity_id: sensor.humidex_filtre_aube_chambre_matthieu
  state_characteristic: mean
  max_age: *max_age_30d
  sampling_size: *sampling_size_5000

