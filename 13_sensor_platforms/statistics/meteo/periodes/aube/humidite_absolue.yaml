# ==========================================================
#  STATISTICS SENSORS — Moyennes mensuelles d’humidité absolue (filtrée à l’aube)
# ----------------------------------------------------------
#  🧠 Objectif :
#     Calculer la **moyenne glissante sur 30 jours**
#     de l’humidité absolue (en g/m³), dérivée des mesures
#     “filtrées à l’aube”, c’est-à-dire calculées sur la période
#     la plus stable thermiquement de la journée.
#
#  ⚙️ Composant : `platform: statistics`
#     - Agrège les valeurs des entités `sensor.humidite_absolue_filtre_aube_*`
#     - Produit une moyenne glissante (caractéristique `mean`)
#
#  📅 Fenêtre d’analyse :
#     - Période d’analyse : 30 jours glissants
#     - Taille d’échantillon : 5 000 points max
#
#  📊 Sortie :
#     - Moyenne de l’humidité absolue filtrée à l’aube (g/m³)
#
#  🏡 Zones couvertes :
#     - Chambres, pièces de vie, locaux techniques, bureaux, ateliers
# ==========================================================

# ----------------------------------------------------------
# 🏠 Chambres
# ----------------------------------------------------------
- platform: statistics
  name: "Humidité absolue filtre aube Moyenne Chambre Arnaud"
  entity_id: sensor.humidite_absolue_filtre_aube_chambre_arnaud
  state_characteristic: mean
  max_age: &max_age_30d
    days: 30
  sampling_size: &sampling_size_5000 5000

- platform: statistics
  name: "Humidité absolue filtre aube Moyenne Chambre Matthieu"
  entity_id: sensor.humidite_absolue_filtre_aube_chambre_matthieu
  state_characteristic: mean
  max_age: *max_age_30d
  sampling_size: *sampling_size_5000

