# ==========================================================
#  STATISTICS SENSORS — Moyennes mensuelles d’humidex (filtré au crépuscule)
# ----------------------------------------------------------
#  🧠 Objectif :
#     Calculer la **moyenne glissante sur 30 jours**
#     de l’indice Humidex (indice de confort thermique),
#     mesuré à la période du **crépuscule**, où les températures
#     extérieures commencent à décroître et la sensation
#     de chaleur ressentie se stabilise avant la nuit.
#
#  ⚙️ Composant : `platform: statistics`
#     - Source : capteurs `sensor.humidex_filtre_crepuscule_*`
#     - Caractéristique : moyenne (`mean`)
#
#  📅 Fenêtre d’analyse :
#     - Période : 30 jours glissants
#     - Taille d’échantillon : 5 000 valeurs maximum
#
#  📊 Sortie :
#     - Moyenne mensuelle de l’humidex mesuré au crépuscule
#
#  🏡 Zones couvertes :
#     - Chambres, pièces de vie, zones de travail, ateliers, extérieurs.
# ==========================================================

# ----------------------------------------------------------
# 🏠 Chambres
# ----------------------------------------------------------
- platform: statistics
  name: "Humidex filtre crepuscule Moyenne Chambre Arnaud"
  entity_id: sensor.humidex_filtre_crepuscule_chambre_arnaud
  state_characteristic: mean
  max_age: &max_age_30d
    days: 30
  sampling_size: &sampling_size_5000 5000

- platform: statistics
  name: "Humidex filtre crepuscule Moyenne Chambre Matthieu"
  entity_id: sensor.humidex_filtre_crepuscule_chambre_matthieu
  state_characteristic: mean
  max_age: *max_age_30d
  sampling_size: *sampling_size_5000

