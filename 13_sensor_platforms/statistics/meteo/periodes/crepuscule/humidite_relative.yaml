# ==========================================================
#  STATISTICS SENSORS — Moyennes mensuelles d’humidité relative (filtrée au crépuscule)
# ----------------------------------------------------------
#  🧠 Objectif :
#     Calculer la **moyenne glissante sur 30 jours**
#     de l’humidité relative (%) mesurée au **crépuscule**,
#     période clé où la température ambiante baisse et
#     l’humidité relative augmente naturellement.
#
#  ⚙️ Composant : `platform: statistics`
#     - Source : capteurs `sensor.humidite_relative_filtre_crepuscule_*`
#     - Caractéristique calculée : moyenne (`mean`)
#
#  📅 Fenêtre d’analyse :
#     - Période : 30 jours glissants
#     - Taille d’échantillon : 5 000 points maximum
#
#  📊 Sortie :
#     - Moyenne mensuelle de l’humidité relative mesurée au crépuscule
#
#  🏡 Zones couvertes :
#     - Chambres, pièces à vivre, locaux techniques,
#       bureaux, ateliers et zones extérieures.
# ==========================================================

# ----------------------------------------------------------
# 🏠 Chambres
# ----------------------------------------------------------
- platform: statistics
  name: "Humidité relative filtre crepuscule Moyenne Chambre Arnaud"
  entity_id: sensor.humidite_relative_filtre_crepuscule_chambre_arnaud
  state_characteristic: mean
  max_age: &max_age_30d
    days: 30
  sampling_size: &sampling_size_5000 5000

- platform: statistics
  name: "Humidité relative filtre crepuscule Moyenne Chambre Matthieu"
  entity_id: sensor.humidite_relative_filtre_crepuscule_chambre_matthieu
