# ==========================================================
#  STATISTICS SENSORS — Moyennes mensuelles de l’Humidex (filtré sur la période nocturne)
# ----------------------------------------------------------
#  🌙 Objectif :
#     Calculer la **moyenne glissante sur 30 jours**
#     de l’**Humidex mesuré la nuit** (période “filtre nuit”),
#     indicateur combinant température et humidité relative
#     pour évaluer le **confort thermique perçu pendant le sommeil**.
#
#  ⚙️ Composant : `platform: statistics`
#     - Source : capteurs `sensor.humidex_filtre_nuit_*`
#     - Métrique : `mean` (moyenne)
#
#  📅 Fenêtre d’analyse :
#     - Période glissante : 30 jours
#     - Taille d’échantillon : 5 000 valeurs
#
#  📊 Sortie :
#     - Moyenne mensuelle de l’humidex **nocturne** (sans influence solaire)
#       — idéale pour l’évaluation du confort thermique nocturne
#
#  🏡 Zones couvertes :
#     - Chambres, pièces de vie, bureaux, extérieurs, ateliers.
# ==========================================================

# ----------------------------------------------------------
# 🏠 Chambres
# ----------------------------------------------------------
- platform: statistics
  name: "Humidex filtre nuit Moyenne Chambre Arnaud"
  entity_id: sensor.humidex_filtre_nuit_chambre_arnaud
  state_characteristic: mean
  max_age: &max_age_30d
    days: 30
  sampling_size: &sampling_size_5000 5000

- platform: statistics
  name: "Humidex filtre nuit Moyenne Chambre Matthieu"
  entity_id: sensor.humidex_filtre_nuit_chambre_matthieu
  state_characteristic: mean
  max_age: *max_age_30d
  sampling_size: *sampling_size_5000

