# ==========================================================
# 🧠 ARSENAL — STATISTICS SENSOR
#     Hygrométrie — Moyenne 30j Humidité absolue filtrée la nuit
# ----------------------------------------------------------
# 🎯 RÔLE
#   Exposer la moyenne glissante sur 30 jours de l'humidité
#   absolue filtrée la nuit par zone.
#
# 🧩 PÉRIMÈTRE
#   - Statistique dérivée sur série temporelle uniquement
#   - Aucune logique métier
#   - Aucun pilotage d'équipement
#
# 🔖 NATURE
#   moyenne_glissante | reference_statistique | agregat_quantitatif
#
# 📋 PARAMÈTRES
#   state_characteristic : mean
#   sampling_size        : 5000
#   max_age              : 30 j — fenêtre mensuelle glissante
#                          destinée à lisser les variations
#                          hygrométriques nocturnes
#   precision            : omis
#
# 🔗 DÉPENDANCES
#   Lit : sensor.humidite_absolue_filtre_nuit_*
#
# 🚫 INTERDITS
#   - Introduire une logique métier
#   - Piloter directement un équipement
#   - Constituer à lui seul une autorité décisionnelle
#   - Laisser une fenêtre temporelle sans justification
#
# 🏷️ STATUT
#   Référence — Arsenal v14.x
# ==========================================================

# ----------------------------------------------------------
# 🏠 Chambres
# ----------------------------------------------------------
- platform: statistics
  name: "Humidité absolue filtre nuit Moyenne Chambre Enfants"
  entity_id: sensor.humidite_absolue_filtre_nuit_chambre_enfants
  state_characteristic: mean
  max_age: &max_age_30d
    days: 30
  sampling_size: &sampling_size_5000 5000

- platform: statistics
  name: "Humidité absolue filtre nuit Moyenne Salle de Jeux"
  entity_id: sensor.humidite_absolue_filtre_nuit_salle_de_jeux
