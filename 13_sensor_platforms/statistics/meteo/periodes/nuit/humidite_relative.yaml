# ==========================================================
#  STATISTICS SENSORS — Moyennes mensuelles de l’Humidité relative (filtrée sur la période nocturne)
# ----------------------------------------------------------
#  💦 Objectif :
#     Calculer la **moyenne glissante sur 30 jours**
#     de l’**humidité relative mesurée la nuit** (période “filtre nuit”),
#     afin de suivre le **niveau de saturation en vapeur d’eau**
#     et d’évaluer le **confort hygrothermique nocturne**.
#
#  ⚙️ Composant : `platform: statistics`
#     - Source : capteurs `sensor.humidite_relative_filtre_nuit_*`
#     - Métrique : `mean` (moyenne)
#
#  📅 Fenêtre d’analyse :
#     - Période glissante : 30 jours
#     - Taille d’échantillon : 5 000 valeurs
#
#  📊 Sortie :
#     - Moyenne mensuelle de l’humidité relative **nocturne (%)**
#       — indicateur du confort et du risque de condensation
#
#  🏡 Zones couvertes :
#     - Chambres, pièces de vie, locaux techniques et zones pro.
# ==========================================================

# ----------------------------------------------------------
# 🏠 Chambres
# ----------------------------------------------------------
- platform: statistics
  name: "Humidité relative filtre nuit Moyenne Chambre Arnaud"
  entity_id: sensor.humidite_relative_filtre_nuit_chambre_arnaud
  state_characteristic: mean
  max_age: &max_age_30d
    days: 30
  sampling_size: &sampling_size_5000 5000

- platform: statistics
  name: "Humidité relative filtre nuit Moyenne Chambre Matthieu"
  entity_id: sensor.humidite_relative_filtre_nuit_chambre_matthieu
  state_characteristic: mean
  max_age: *max_age_30d
  sampling_size: *sampling_size_5000

- platform: statistics
