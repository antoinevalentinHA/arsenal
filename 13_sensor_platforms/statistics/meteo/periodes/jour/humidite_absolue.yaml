# ==========================================================
#  STATISTICS SENSORS — Moyennes mensuelles d’humidité absolue (filtrée après-midi)
# ----------------------------------------------------------
#  🧠 Objectif :
#     Calculer la **moyenne glissante sur 30 jours**
#     de l’humidité absolue mesurée durant l’**après-midi** ☀️,
#     période la plus chaude où l’air contient le maximum
#     de vapeur d’eau à saturation possible.
#
#  ⚙️ Composant : `platform: statistics`
#     - Source : capteurs `sensor.humidite_absolue_filtre_jour_*`
#     - Métrique : moyenne (`mean`)
#
#  📅 Fenêtre d’analyse :
#     - Période glissante : 30 jours
#     - Taille d’échantillon : 5 000 valeurs
#
#  📊 Sortie :
#     - Moyenne mensuelle de l’humidité absolue (g/kg) durant l’après-midi
#
#  🏡 Zones couvertes :
#     - Chambres, pièces à vivre, locaux professionnels,
#       ateliers, entrepôts et extérieurs.
# ==========================================================

# ----------------------------------------------------------
# 🏠 Chambres
# ----------------------------------------------------------
- platform: statistics
  name: "Humidité absolue filtre jour Moyenne Chambre Arnaud"
  entity_id: sensor.humidite_absolue_filtre_jour_chambre_arnaud
  state_characteristic: mean
  max_age: &max_age_30d
    days: 30
  sampling_size: &sampling_size_5000 5000

- platform: statistics
  name: "Humidité absolue filtre jour Moyenne Chambre Matthieu"
  entity_id: sensor.humidite_absolue_filtre_jour_chambre_matthieu
  state_characteristic: mean
  max_age: *max_age_30d
  sampling_size: *sampling_size_5000

