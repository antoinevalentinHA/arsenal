# ==========================================================
#  STATISTICS SENSORS — Moyennes mensuelles de l’Humidex (filtré sur la période de l’après-midi)
# ----------------------------------------------------------
#  🧠 Objectif :
#     Calculer la **moyenne glissante sur 30 jours**
#     de l’**Humidex mesuré durant l’après-midi** (☀️ période “filtre jour”),
#     indicateur combinant **température** et **humidité relative**
#     pour évaluer le **confort thermique perçu** au moment le plus chaud de la journée.
#
#  ⚙️ Composant : `platform: statistics`
#     - Source : capteurs `sensor.humidex_filtre_jour_*`
#     - Métrique : `mean` (moyenne)
#
#  📅 Fenêtre d’analyse :
#     - Période glissante : 30 jours
#     - Taille d’échantillon : 5 000 valeurs
#
#  📊 Sortie :
#     - Moyenne mensuelle de l’Humidex **de l’après-midi**
#       (valeur indicative du confort ou de la contrainte thermique)
#
#  🏡 Zones couvertes :
#     - Chambres, espaces de vie, bureaux, zones industrielles et extérieurs.
# ==========================================================

# ----------------------------------------------------------
# 🏠 Chambres
# ----------------------------------------------------------
- platform: statistics
  name: "Humidex filtre jour Moyenne Chambre Arnaud"
  entity_id: sensor.humidex_filtre_jour_chambre_arnaud
  state_characteristic: mean
  max_age: &max_age_30d
    days: 30
  sampling_size: &sampling_size_5000 5000

- platform: statistics
  name: "Humidex filtre jour Moyenne Chambre Matthieu"
  entity_id: sensor.humidex_filtre_jour_chambre_matthieu
  state_characteristic: mean
  max_age: *max_age_30d
  sampling_size: *sampling_size_5000

