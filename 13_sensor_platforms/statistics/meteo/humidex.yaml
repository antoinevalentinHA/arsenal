# ==========================================================
#  STATISTICS SENSORS — Moyennes mensuelles d’humidex
# ----------------------------------------------------------
#  🧠 Rôle :
#     Ces capteurs calculent la **moyenne glissante sur 30 jours**
#     de l’humidex dans chaque pièce ou zone surveillée.
#
#  ⚙️ Composant : `platform: statistics`
#     - Calcule des statistiques à partir des historiques de Home Assistant
#     - Ici, on retient uniquement la **moyenne** (`state_characteristic: mean`)
#
#  📅 Fenêtre temporelle :
#     - Période d’analyse : 30 jours glissants
#     - Nombre max. d’échantillons : 10 000
#
#  📊 Sortie :
#     - Moyenne d’humidex sur les 30 derniers jours pour chaque entité
#
#  🏡 Zones domestiques : chambres, séjour, entrée, jardin, etc.
#  🏢 Zones professionnelles : bureaux, ateliers, presses, etc.
# ==========================================================

# ----------------------------------------------------------
# 🏠 Chambres
# ----------------------------------------------------------
- platform: statistics
  name: "Humidex Moyenne Chambre Arnaud"
  entity_id: sensor.humidex_chambre_arnaud
  state_characteristic: mean
  max_age: &max_age_30d
    days: 30
  sampling_size: &sampling_size_10000 10000

- platform: statistics
  name: "Humidex Moyenne Chambre Matthieu"
  entity_id: sensor.humidex_chambre_matthieu
  state_characteristic: mean
  max_age: *max_age_30d
  sampling_size: *sampling_size_10000

- platform: statistics
  name: "Humidex Moyenne Chambre Parents"
