# ==========================================================
# 🧠 ARSENAL — STATISTICS SENSOR (MOTEUR BRUT INTERNE)
#     Météo — Pluie — Cumul glissant 24 h — brut
# ----------------------------------------------------------
# 🎯 RÔLE
#   Moteur de calcul BRUT du cumul glissant 24 h (mm), par
#   différence du total cumulatif monotone. Produit interne :
#   NE PAS consommer directement en UI ni en décision.
#
# 🧭 COUCHE MÉTIER
#   La sémantique métier (fenêtre vide saine → 0.0 ; source
#   invalide → unavailable ; clamp anti-négatif) est portée par
#   sensor.pluie_cumul_24h dans
#   12_template_sensors/meteo/pluie/cumul_glissant.yaml.
#   Ce capteur-ci n'expose QUE le résultat statistique brut :
#   fenêtre sans échantillon récent → `unknown` (assumé).
#
# 🧩 PÉRIMÈTRE
#   - Statistique dérivée sur série temporelle uniquement
#   - Aucune logique métier
#   - Aucun pilotage d'équipement
#
# 🔖 NATURE
#   cumul_glissant | reference_statistique | brut_interne
#
# 📋 PARAMÈTRES
#   state_characteristic : change  (newest - oldest dans la fenêtre)
#   max_age              : 24 h
#   sampling_size        : 2000 — large, la pluie n'émet que par
#                          impulsions ; évite de tronquer la fenêtre
#   precision            : 2
#
# 🔗 DÉPENDANCES
#   Lit : sensor.pluie_total_local  (mm, total monotone persistant)
#
# ⚠️ HYPOTHÈSE
#   Suppose la source monotone (jamais décroissante). Un reset
#   de maintenance du store peut produire une fenêtre négative
#   transitoire — non corrigé ici ; le clamp max(0, brut) est
#   appliqué par la couche métier (contrat arrosage 06 §7).
#
# 🚫 INTERDITS
#   - Introduire une logique métier
#   - Piloter directement un équipement
#   - Constituer à lui seul une autorité décisionnelle
#   - Être consommé directement (UI/décision) : passer par le métier
#
# 🏷️ STATUT
#   Cumul glissant (brut interne) — Arsenal v16.x
# ==========================================================

- platform: statistics
  name: "Pluie cumul 24h brut"
  entity_id: sensor.pluie_total_local
  state_characteristic: change
  max_age:
    hours: 24
  sampling_size: 2000
  precision: 2
