# ==========================================================
# 🧠 ARSENAL — STATISTICS SENSOR
#     Tendance thermique — moyennes glissantes courte (15 min) et
#     longue (60 min) des agrégats intérieurs
# ----------------------------------------------------------
# 🎯 RÔLE
#   Exposer, pour les trois agrégats thermiques intérieurs déjà
#   affichés en conduite, DEUX moyennes glissantes :
#     • longue  (60 min) — référence de fond ;
#     • courte  (15 min) — référence récente.
#   La couche d'interprétation « tendance » décide sur l'écart
#   moyenne_courte − moyenne_longue (contrat v1.1 §3.2, §5, §8).
#
# 🧩 PÉRIMÈTRE
#   - Statistique dérivée sur série temporelle uniquement
#   - Aucune logique métier, aucun seuil, aucune décision
#   - Lecture seule des agrégats sources (jamais modifiés)
#
# 📦 Capteurs créés (entity_id = slug du name) :
#   • sensor.temperature_min_chambres_moyenne_60_min
#   • sensor.temperature_moyenne_maison_moyenne_60_min
#   • sensor.temperature_max_chambres_moyenne_60_min
#   • sensor.temperature_min_chambres_moyenne_15_min
#   • sensor.temperature_moyenne_maison_moyenne_15_min
#   • sensor.temperature_max_chambres_moyenne_15_min
#
# 📋 PARAMÈTRES
#   state_characteristic : mean
#   max_age              : 60 min (longue) / 15 min (courte) — contrat §8
#   sampling_size        : généreux, borné par l'âge (cf. temperature.yaml)
#
# 🔗 DÉPENDANCES (lecture)
#   - sensor.temperature_min_chambres
#   - sensor.temperature_moyenne_maison
#   - sensor.temperature_max_chambres
#
# 🚫 INTERDITS
#   - Introduire une logique métier ou un seuil
#   - Piloter un équipement
#   - Réécrire ou renommer un agrégat source
#
# 🏷️ Contrat : contrats/meteo/tendance_temperature.md (couche perception)
# ==========================================================

- platform: statistics
  name: "Température min Chambres moyenne 60 min"
  unique_id: temperature_min_chambres_moyenne_60_min
  entity_id: sensor.temperature_min_chambres
  state_characteristic: mean
  max_age: &max_age_60min
    minutes: 60
  sampling_size: &sampling_size_tendance 10000

- platform: statistics
  name: "Température moyenne Maison moyenne 60 min"
  unique_id: temperature_moyenne_maison_moyenne_60_min
  entity_id: sensor.temperature_moyenne_maison
  state_characteristic: mean
  max_age: *max_age_60min
  sampling_size: *sampling_size_tendance

- platform: statistics
  name: "Température max Chambres moyenne 60 min"
  unique_id: temperature_max_chambres_moyenne_60_min
  entity_id: sensor.temperature_max_chambres
  state_characteristic: mean
  max_age: *max_age_60min
  sampling_size: *sampling_size_tendance

# ----------------------------------------------------------
# ⏱️ Moyenne courte (15 min) — référence récente (contrat v1.1 §8)
#    Même gabarit que la moyenne longue ; seul max_age change.
# ----------------------------------------------------------

- platform: statistics
  name: "Température min Chambres moyenne 15 min"
  unique_id: temperature_min_chambres_moyenne_15_min
  entity_id: sensor.temperature_min_chambres
  state_characteristic: mean
  max_age: &max_age_15min
    minutes: 15
  sampling_size: *sampling_size_tendance

- platform: statistics
  name: "Température moyenne Maison moyenne 15 min"
  unique_id: temperature_moyenne_maison_moyenne_15_min
  entity_id: sensor.temperature_moyenne_maison
  state_characteristic: mean
  max_age: *max_age_15min
  sampling_size: *sampling_size_tendance

- platform: statistics
  name: "Température max Chambres moyenne 15 min"
  unique_id: temperature_max_chambres_moyenne_15_min
  entity_id: sensor.temperature_max_chambres
  state_characteristic: mean
  max_age: *max_age_15min
  sampling_size: *sampling_size_tendance
