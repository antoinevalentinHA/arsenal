# ==========================================================
# 🧠 ARSENAL — STATISTICS SENSOR
#     Thermique — Minima et maxima glissants 24 h
# ----------------------------------------------------------
# 🎯 RÔLE
#   Exposer les températures minimales et maximales glissantes
#   sur 24 heures par zone.
#
# 🧩 PÉRIMÈTRE
#   - Statistique dérivée sur série temporelle uniquement
#   - Aucune logique métier
#   - Aucun pilotage d'équipement
#
# 🔖 NATURE
#   tendance | reference_statistique | agregat_quantitatif
#
# 📋 PARAMÈTRES
#   state_characteristic : value_min / value_max
#   sampling_size        : 5000
#   max_age              : 24 h — conservation des extrêmes
#                          thermiques journaliers
#   precision            : omis
#
# 🔗 DÉPENDANCES
#   Lit : sensor.temperature_*
#
# 🚫 INTERDITS
#   - Introduire une logique métier
#   - Piloter directement un équipement
#   - Constituer à lui seul une autorité décisionnelle
#   - Laisser une fenêtre temporelle sans justification
#
# 🏷️ STATUT
#   Tendance — Arsenal v14.x
# ==========================================================

# ==========================================================
#  🌳 Jardin
# ==========================================================
- platform: statistics
  name: temperature_min_jour_jardin
  unique_id: temperature_min_jour_jardin
  entity_id: sensor.temperature_jardin
  state_characteristic: value_min
  max_age: &max_age_24h
    hours: 24
  sampling_size: &sampling_size_5000 5000

- platform: statistics
  name: temperature_max_jour_jardin
  unique_id: temperature_max_jour_jardin
  entity_id: sensor.temperature_jardin
  state_characteristic: value_max
  max_age: *max_age_24h
  sampling_size: *sampling_size_5000

