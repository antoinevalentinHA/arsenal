# ==========================================================
#  STATISTICS SENSORS — Moyennes mensuelles d’humidité absolue
# ----------------------------------------------------------
#  🧠 Objectif :
#     Calculer la **moyenne glissante sur 30 jours**
#     de l’humidité absolue (g/m³) dans chaque zone
#     domestique et professionnelle.
#
#  ⚙️ Composant : `platform: statistics`
#     - Exploite l’historique de chaque capteur pour établir des statistiques.
#     - Ici, on retient uniquement la **moyenne** via :
#           state_characteristic: mean
#
#  📅 Fenêtre d’analyse :
#     - Période : 30 jours glissants
#     - Échantillons max : 10 000
#
#  📊 Sortie :
#     - Moyenne mensuelle de l’humidité absolue (g/m³)
#
#  🏡 Zones couvertes :
#     - Pièces de la maison
#     - Espaces extérieurs
#     - Locaux professionnels / ateliers
# ==========================================================


# ----------------------------------------------------------
# 🏠 Chambres et pièces domestiques
# ----------------------------------------------------------
- platform: statistics
  name: "Humidité absolue Moyenne Chambre Arnaud"
  entity_id: sensor.humidite_absolue_chambre_arnaud
  state_characteristic: mean
  max_age: &max_age_30d
    days: 30
  sampling_size: &sampling_size_10000 10000

- platform: statistics
  name: "Humidité absolue Moyenne Chambre Matthieu"
  entity_id: sensor.humidite_absolue_chambre_matthieu
