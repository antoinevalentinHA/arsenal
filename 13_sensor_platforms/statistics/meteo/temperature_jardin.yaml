# ==========================================================
# 🧠 ARSENAL — STATISTICS SENSOR
#     Thermique — Moyenne glissante 24 h Température extérieure
# ----------------------------------------------------------
# 🎯 RÔLE
#   Exposer la moyenne glissante sur 24 heures de la
#   température extérieure pour analyse thermique et
#   corrélation énergétique.
#
# 🧩 PÉRIMÈTRE
#   - Statistique dérivée sur série temporelle uniquement
#   - Aucune logique métier
#   - Aucun pilotage d'équipement
#
# 🔖 NATURE
#   moyenne_glissante | lissage | reference_statistique
#
# 📋 PARAMÈTRES
#   state_characteristic : mean
#   sampling_size        : 300
#   max_age              : 24 h — lissage des variations
#                          thermiques journalières
#   precision            : omis
#
# 🔗 DÉPENDANCES
#   Lit : sensor.temperature_jardin
#
# 🚫 INTERDITS
#   - Introduire une logique métier
#   - Piloter directement un équipement
#   - Constituer à lui seul une autorité décisionnelle
#   - Laisser une fenêtre temporelle sans justification
#
# 🏷️ STATUT
#   Tendance — Arsenal v14.x
# ==========================================================

- platform: statistics
  name: "Temperature exterieure moyenne jour"
  entity_id: sensor.temperature_jardin
  state_characteristic: mean
  max_age:
    hours: 24
  sampling_size: 300