# ==========================================================
# 🧠 ARSENAL — STATISTICS SENSOR
#     Hygrométrie — Moyenne 30j Humidité relative brute
# ----------------------------------------------------------
# 🎯 RÔLE
#   Exposer la moyenne glissante sur 30 jours de l'humidité
#   relative brute par zone.
#
# 🧩 PÉRIMÈTRE
#   - Statistique dérivée sur série temporelle uniquement
#   - Aucune logique métier
#   - Aucun pilotage d'équipement
#
# 🔖 NATURE
#   moyenne_glissante | reference_statistique | agregat_quantitatif
#
# 📋 PARAMÈTRES
#   state_characteristic : mean
#   sampling_size        : 10000
#   max_age              : 30 j — fenêtre mensuelle glissante
#                          destinée à lisser les variations
#                          hygrométriques
#   precision            : omis
#
# 🔗 DÉPENDANCES
#   Lit : sensor.humidite_relative_*
#
# 🚫 INTERDITS
#   - Introduire une logique métier
#   - Piloter directement un équipement
#   - Constituer à lui seul une autorité décisionnelle
#   - Laisser une fenêtre temporelle sans justification
#
# 🏷️ STATUT
#   Référence — Arsenal v14.x
# ==========================================================

# ----------------------------------------------------------
# 🏠 Chambres et pièces domestiques
# ----------------------------------------------------------
- platform: statistics
  name: "Humidité relative Moyenne Chambre Enfants"
  entity_id: sensor.humidite_relative_chambre_enfants
  state_characteristic: mean
  max_age: &max_age_30d
    days: 30
  sampling_size: &sampling_size_10000 10000

- platform: statistics
  name: "Humidité relative Moyenne Chambre Matthieu"
  entity_id: sensor.humidite_relative_chambre_matthieu
