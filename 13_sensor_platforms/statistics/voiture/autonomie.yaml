# ==========================================================
# 🧠 ARSENAL — STATISTICS SENSOR
#     Automobile — Moyenne glissante autonomie Audi e-tron
# ----------------------------------------------------------
# 🎯 RÔLE
#   Exposer la moyenne glissante sur 31 jours de l'autonomie
#   observée de l'Audi e-tron.
#
# 🧩 PÉRIMÈTRE
#   - Statistique dérivée sur série temporelle uniquement
#   - Aucune logique métier
#   - Aucun pilotage d'équipement
#
# 🔖 NATURE
#   moyenne_glissante | reference_statistique | agregat_quantitatif
#
# 📋 PARAMÈTRES
#   state_characteristic : mean
#   sampling_size        : 1000
#   max_age              : 31 j — fenêtre glissante mensuelle
#                          destinée à lisser les variations
#                          d'autonomie observée
#   precision            : omis
#
# 🔗 DÉPENDANCES
#   Lit : input_number.autonomie_audi_etron_full
#
# 🚫 INTERDITS
#   - Introduire une logique métier
#   - Piloter directement un équipement
#   - Constituer à lui seul une autorité décisionnelle
#   - Laisser une fenêtre temporelle sans justification
#
# 🏷️ STATUT
#   Référence — Arsenal v14.x
# ==========================================================

- platform: statistics
  name: "Autonomie Audi etron Mensuelle"
  unique_id: autonomie_audi_etron_mensuelle
  entity_id: input_number.autonomie_audi_etron_full
  state_characteristic: mean        # Moyenne des valeurs enregistrées
  max_age:
    days: 31                        # Fenêtre de 31 jours
  sampling_size: 1000               # Limite d’échantillons conservés