# ==========================================================
# 🧠 ARSENAL — STATISTICS SENSOR
#     Automobile — Moyenne glissante température charge Audi
# ----------------------------------------------------------
# 🎯 RÔLE
#   Exposer la moyenne glissante sur 31 jours de la température
#   extérieure observée lors des pleines charges Audi.
#
# 🧩 PÉRIMÈTRE
#   - Statistique dérivée sur série temporelle uniquement
#   - Aucune logique métier
#   - Aucun pilotage d'équipement
#
# 🔖 NATURE
#   moyenne_glissante | reference_statistique | agregat_quantitatif
#
# 📋 PARAMÈTRES
#   state_characteristic : mean
#   sampling_size        : omis
#   max_age              : 31 j — fenêtre glissante mensuelle
#                          destinée à lisser les températures
#                          observées lors des charges
#   precision            : omis
#
# 🔗 DÉPENDANCES
#   Lit : input_number.audi_temperature_charge
#
# 🚫 INTERDITS
#   - Introduire une logique métier
#   - Produire une correction thermique automatique
#   - Constituer à lui seul une autorité décisionnelle
#   - Laisser une fenêtre temporelle sans justification
#
# 🏷️ STATUT
#   Référence — Arsenal v14.x
# ==========================================================

- platform: statistics
  name: Audi temperature charge mensuelle
  entity_id: input_number.audi_temperature_charge
  state_characteristic: mean
  max_age:
    days: 31