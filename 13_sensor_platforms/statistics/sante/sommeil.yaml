# ==========================================================
# 🧠 ARSENAL — STATISTICS SENSOR
#     Sommeil — Moyennes glissantes sommeil consolidé
# ----------------------------------------------------------
# 🎯 RÔLE
#   Exposer des moyennes glissantes sur 7, 14 et 30 jours
#   des données de sommeil consolidées par Arsenal.
#
# 🧩 PÉRIMÈTRE
#   - Statistique dérivée sur série temporelle uniquement
#   - Consommation exclusive des snapshots consolidés
#   - Aucune logique métier
#   - Aucun pilotage d'équipement
#
# 🔖 NATURE
#   moyenne_glissante | tendance | reference_statistique
#
# 📋 PARAMÈTRES
#   state_characteristic : mean
#   sampling_size        : 20 / 30 / 60
#   max_age              : 7 j / 14 j / 30 j — fenêtres
#                          glissantes destinées à suivre les
#                          tendances de sommeil consolidé
#   precision            : omis
#
# 🔗 DÉPENDANCES
#   Lit : input_number.sommeil_derniere_nuit_total
#         input_number.sommeil_derniere_nuit_score
#
# 🚫 INTERDITS
#   - Introduire une logique métier
#   - Piloter directement un équipement
#   - Constituer à lui seul une autorité décisionnelle
#   - Consommer des données non consolidées
#
# 🏷️ STATUT
#   Tendance — Arsenal v14.x
# ==========================================================

- platform: statistics
  name: Sommeil Total Moyenne 7j
  unique_id: sommeil_total_moyenne_7j
  entity_id: input_number.sommeil_derniere_nuit_total
  state_characteristic: mean
  max_age:
    days: 7
  sampling_size: 20

