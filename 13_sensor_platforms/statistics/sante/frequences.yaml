# ==========================================================
# 🧠 ARSENAL — STATISTICS SENSOR
#     Santé — Moyennes glissantes fréquences physiologiques Withings
# ----------------------------------------------------------
# 🎯 RÔLE
#   Exposer des moyennes glissantes sur 7, 14 et 30 jours
#   des fréquences cardiaque et respiratoire Withings
#   fiabilisées localement.
#
# 🧩 PÉRIMÈTRE
#   - Statistique dérivée sur série temporelle uniquement
#   - Aucune logique métier
#   - Aucun pilotage d'équipement
#
# 🔖 NATURE
#   moyenne_glissante | tendance | reference_statistique
#
# 📋 PARAMÈTRES
#   state_characteristic : mean
#   sampling_size        : 1000 / 2000 / 4000
#   max_age              : 7 j / 14 j / 30 j — fenêtres
#                          glissantes destinées à suivre les
#                          tendances physiologiques
#   precision            : omis
#
# 🔗 DÉPENDANCES
#   Lit : sensor.withings_average_heart_rate_local
#         sensor.withings_average_respiratory_rate_local
#
# 🚫 INTERDITS
#   - Introduire une logique métier
#   - Piloter directement un équipement
#   - Constituer à lui seul une autorité décisionnelle
#   - Laisser une fenêtre temporelle sans justification
#
# 🏷️ STATUT
#   Tendance — Arsenal v14.x
# ==========================================================

# ----------------------------------------------------------
# 🫀 FRÉQUENCE CARDIAQUE MOYENNE — Moyennes glissantes
# ----------------------------------------------------------
- platform: statistics
  name: "Withings Frequence Cardiaque Moyenne 7j"
  unique_id: withings_frequence_cardiaque_moyenne_7j
  entity_id: sensor.withings_average_heart_rate_local
  state_characteristic: mean
  max_age:
    days: 7
  sampling_size: 1000

- platform: statistics
  name: "Withings Frequence Cardiaque Moyenne 14j"
  unique_id: withings_frequence_cardiaque_moyenne_14j
