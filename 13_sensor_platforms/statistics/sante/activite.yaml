# ==========================================================
# 🧠 ARSENAL — STATISTICS SENSOR
#     Santé — Moyennes glissantes activité physique Withings
# ----------------------------------------------------------
# 🎯 RÔLE
#   Exposer des moyennes glissantes sur 7, 14 et 30 jours
#   des indicateurs d'activité physique Withings fiabilisés.
#
# 🧩 PÉRIMÈTRE
#   - Statistique dérivée sur série temporelle uniquement
#   - Aucune logique métier
#   - Aucun pilotage d'équipement
#
# 🔖 NATURE
#   moyenne_glissante | tendance | reference_statistique
#
# 📋 PARAMÈTRES
#   state_characteristic : mean
#   sampling_size        : 1000 / 2000 / 4000
#   max_age              : 7 j / 14 j / 30 j — fenêtres
#                          glissantes destinées à suivre les
#                          tendances d'activité physique
#   precision            : omis
#
# 🔗 DÉPENDANCES
#   Lit : sensor.withings_steps_today_local
#         sensor.withings_distance_travelled_today_local
#         sensor.withings_total_calories_burnt_today_local
#
# 🚫 INTERDITS
#   - Introduire une logique métier
#   - Piloter directement un équipement
#   - Constituer à lui seul une autorité décisionnelle
#   - Laisser une fenêtre temporelle sans justification
#
# 🏷️ STATUT
#   Tendance — Arsenal v14.x
# ==========================================================

# ----------------------------------------------------------
# 🚶‍♂️ NOMBRE DE PAS — Moyennes glissantes
# ----------------------------------------------------------
- platform: statistics
  name: "Withings Pas Moyenne 7j"
  unique_id: withings_pas_moyenne_7j
  entity_id: sensor.withings_steps_today_local
  state_characteristic: mean
  max_age:
    days: 7
  sampling_size: 1000

- platform: statistics
  name: "Withings Pas Moyenne 14j"
  unique_id: withings_pas_moyenne_14j
  entity_id: sensor.withings_steps_today_local
  state_characteristic: mean
  max_age:
    days: 14
  sampling_size: 2000

- platform: statistics
  name: "Withings Pas Moyenne 30j"
  unique_id: withings_pas_moyenne_30j
  entity_id: sensor.withings_steps_today_local
  state_characteristic: mean
  max_age:
    days: 30
  sampling_size: 4000

