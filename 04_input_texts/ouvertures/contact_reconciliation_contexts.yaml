# ==========================================================
# 🧠 ARSENAL — HELPERS
#     Contacts critiques — Contexte de réconciliation
# ----------------------------------------------------------
# 📌 Fichier
#   homeassistant/04_input_texts/contact_reconciliation_contexts.yaml
#
# 🎯 ROLE
#   Stocker le contexte moteur de réconciliation pour les
#   capteurs de contact critiques (contrat v2.2).
#
# 🧱 CONTENU
#   Chaque helper stocke un contexte compact contenant :
#
#   reconciliation_status | business_state | pending_source | suspect_event
#
#   Exemple :
#     stable|off||
#     quarantine|off|contact_garage_1|
#     divergent|off|contact_garage_1|on_non_corroborated
#     inhibited|off||
#
# ⚙️ CONTRAINTES
#   - Un helper par capteur critique
#   - Format compact sérialisé (pas de JSON)
#   - Lecture/écriture contrôlée uniquement par le moteur
#     de réconciliation
# ==========================================================

