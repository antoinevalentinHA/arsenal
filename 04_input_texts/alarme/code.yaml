# ==========================================================
# 🧠 ARSENAL — INPUT_TEXT
#     Alarme — Code alarme
# ----------------------------------------------------------
# 🎯 RÔLE
#   Stocker le code de désarmement de l’alarme utilisé
#   comme référence par le clavier virtuel Arsenal.
#
# 🧩 PÉRIMÈTRE
#   - Stockage persistant uniquement
#   - Aucune validation de saisie
#   - Aucune logique de sécurité locale
#   - Aucun changement d’état d’alarme
#   - Aucun mécanisme d’authentification autonome
#
# 🔖 NATURE
#   Paramètre métier sensible
#   Mémoire persistante sécurisée
#
# 📋 FORMAT
#   Code numérique ou textuel court
#   consommé par les scripts de validation Arsenal.
#
# 🚫 INTERDITS
#   - Interpréter le contenu dans le helper lui-même
#   - Confondre stockage et validation d’authentification
#   - Exposer la valeur dans des logs ou notifications
#   - Écrire sans source décisionnelle identifiable
#   - Considérer le masquage UI comme un chiffrement
#
# 🔗 CONSOMMATEUR
#   10_scripts/alarme/clavier.yaml
#
# 🔐 SÉCURITÉ
#   - Valeur initiale chargée depuis secrets.yaml
#   - Le mode password masque l’affichage uniquement
#
# 🏷️ STATUT
#   Socle — Arsenal v14.x
# ==========================================================

alarm_code:
  name: Code Alarme
  initial: !secret code_alarme
  mode: password
  min: 4
  max: 10