#
# 🔗 Utilisation :
#   - Dashboards stock / diagnostics
#   - Analyse qualité matière (carton, hygrométrie)
#
# 🧠 Principe ARSENAL :
#   - Séparation stricte :
#       mesure temps réel ≠ mémoire figée ≠ décision
#
# ⚠️ Sémantique :
#   - Valeur descriptive, non active
#   - Représente un état passé
# ==========================================================


