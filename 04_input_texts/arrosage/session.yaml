# ==========================================================
# 🧠 ARSENAL — INPUT_TEXT
#     Arrosage — Session station 1 : verdict (observabilité Lot B)
# ----------------------------------------------------------
# 🎯 RÔLE
#   Stocker le DERNIER VERDICT connu de la session d'arrosage
#   supervisée station 1 (audit « exécutions longues Rain Bird »,
#   Lot B). Code interne machine (traduction laissée à l'UI),
#   restauré au redémarrage : c'est le discriminant qui rend la
#   session reconstruisible après perte de l'instance de script.
#
# 🧮 VALEURS ÉCRITES PAR LE RUNTIME (codes internes)
#   Par le script Run (start court) :
#   - `ouverte`                : session ouverte (gardes passées,
#                                commande imminente) ;
#   - `demarrage_non_confirme` : switch natif jamais passé `on` dans le
#                                délai — session close en anomalie.
#   Par l'automation d'observation `10270000000005` :
#   - `fin_observee`           : switch natif repassé `off` pendant une
#                                session ouverte — fin OBSERVÉE, la
#                                clôture reste à poser.
#   Par l'automation de fin `10270000000006` (Lot D) :
#   - `close_nominale`         : clôture à l'échéance prévue, arrêt
#                                prouvé (switch natif `off`) ;
#   - `close_reprise`          : session orpheline soldée au démarrage HA ;
#   - `close_watchdog`         : session soldée par le watchdog
#                                (dépassement rattrapé) ;
#   - `stop_incertain`         : stop demandé mais switch natif non `off`
#                                — anomalie VISIBLE, retry watchdog.
#   La lecture qualitative (dont le `depassement` d'échéance) vit dans
#   `sensor.arrosage_session_etat` (template dédié).
#
# 🧭 HONNÊTETÉ (contrat 06)
#   Aucun de ces verdicts ne prouve une sortie d'eau physique ni un
#   effet humidité : ils datent des COMMANDES et des OBSERVATIONS
#   d'états natifs (preuve graduée — audit §5).
#
# 🚫 INTERDITS
#   - Confondre stockage et décision
#   - Lire ce helper dans la décision V1 (observabilité pure)
#   - Déclencher une action à partir de ce helper
#
# 🏷️ STATUT
#   Observabilité session (audit exécutions longues, Lot B) — Arsenal v16.x
# ==========================================================

arrosage_session_verdict:
  name: "Arrosage — Session verdict"
  # PAS de clé `initial` (doctrine restauration_etat_helpers) : premier
  # boot = unknown, traité comme « aucune session tracée » par les templates.
  icon: mdi:clipboard-text-clock
