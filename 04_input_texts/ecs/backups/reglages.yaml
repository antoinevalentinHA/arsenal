# ==========================================================
# 🧠 ARSENAL — INPUT_TEXT : ECS (sauvegarde des réglages)
# ----------------------------------------------------------
# 🎯 Rôle :
#   Conserver une SAUVEGARDE COMPACTE des réglages ECS
#   (input_number), afin de permettre une restauration
#   contrôlée et réversible.
#
# 🧱 Nature :
#   - Snapshot de configuration ECS
#   - Donnée sérialisée (JSON compact ≤255 caractères)
#
# 🚫 Ne fait PAS :
#   - Ne définit pas les réglages ECS actifs
#   - Ne déclenche aucun cycle ECS
#   - Ne pilote pas la chaudière
#   - Ne prend aucune décision
#
# 🔗 Sauvegarde :
#   - Service : ecs_sauvegarde_reglages
#     → capture ciblée des input_number ECS
#
# 🔗 Restauration :
#   - Service : ecs_restore_reglages
#     → application différentielle des valeurs sauvegardées
#
# 🧠 Principe ARSENAL :
#   - Toute modification critique doit être réversible
#   - La sauvegarde est passive, l’action est explicite
#
# ⚠️ Technique :
#   - Format JSON compact
#   - Inerte sans désérialisation et application explicite
# ==========================================================

ecs_reglages_backup:
  name: ECS - Reglages backup
  max: 255
  icon: mdi:content-save

ecs_reglages_last_restore:
  name: ECS - Reglages derniere restauration
  max: 255
  icon: mdi:backup-restore
