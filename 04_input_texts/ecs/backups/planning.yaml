# ==========================================================
# 🧠 ARSENAL — INPUT_TEXT : ECS (sauvegarde planning)
# ----------------------------------------------------------
# 🎯 Rôle :
#   Conserver une SAUVEGARDE COMPLÈTE du planning ECS
#   (jours actifs + heures) afin de permettre une
#   restauration fidèle après une modification temporaire.
#
# 🧱 Nature :
#   - Snapshot de configuration ECS
#   - Mémoire de sauvegarde sérialisée (JSON)
#
# 🚫 Ne fait PAS :
#   - Ne définit pas le planning ECS actif
#   - Ne déclenche aucun cycle ECS
#   - Ne pilote pas la chaudière
#   - Ne prend aucune décision horaire
#
# 🔗 Alimentation :
#   - Service : ecs_sauvegarde_planning
#     → capture des input_boolean / input_datetime ECS
#
# 🔗 Restauration :
#   - Service : ecs_restore_planning
#     → réinitialisation complète puis restauration ciblée
#
# 🧠 Principe ARSENAL :
#   - Toute modification temporaire doit être réversible
#   - La sauvegarde est séparée de l’application
#
# ⚠️ Technique :
#   - Données stockées au format JSON
#   - Valeur inexploitable sans désérialisation
# ==========================================================

ecs_planning_sauvegarde_matin:
  name: ECS planning sauvegarde matin
  icon: mdi:weather-sunset-up
  max: 255

ecs_planning_sauvegarde_soir:
  name: ECS planning sauvegarde soir
  icon: mdi:weather-sunset-down
  max: 255