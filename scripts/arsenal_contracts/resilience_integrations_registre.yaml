  # ========================================================

  - nom: Zigbee2MQTT
    mode: disponibilite_native
    classe_reseau: local_lan
    statut_attendu: modele_reference
    groupe_source:           { statut: non_applicable, entity_id: null }
    capteur_age:             { statut: non_applicable, entity_id: null }
    binaire_gel:             { statut: non_applicable, entity_id: null }
    binaire_indisponibilite: { statut: present, entity_id: binary_sensor.zigbee2mqtt_bridge_connection_state, fourni_par: integration_native }
    binaire_retour_ok:       { statut: non_applicable, entity_id: null, note: "retour OK = transition to:'on' for 2min du bridge, pas un binaire dédié" }
    binaire_recovery:        { statut: non_applicable, entity_id: null, note: "recovery porté par le timer de backoff, pas un binaire dédié" }
