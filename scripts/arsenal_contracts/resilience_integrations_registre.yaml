    compteur_tentatives:     { statut: present, entity_id: input_number.zigbee_reload_tentatives }
    action_recovery:         { statut: present, type: addon_restart, via: inline, cible: a0d7b954_zigbee2mqtt }
    seuil_gel_attendu: null
    exception_documentee:
      motif: "Disponibilité native via bridge MQTT ; action addon_restart inline ; ne suit pas le canon d'âge."
      reload_direct_autorise: true
      invariants_applicables: [backoff, plafond, anti_boucle, garde_systeme_stable, observabilite]
    exceptions_temporaires: []

