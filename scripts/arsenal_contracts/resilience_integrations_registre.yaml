# ==========================================================
#  ARSENAL — REGISTRE CI : Résilience des intégrations
#  Source d'autorité du checker check_resilience_integrations_contracts.py
#  Contrat : 00_documentation_arsenal/contrats/resilience_integrations.md (v1.1)
#
#  NATURE : données de référence CI. PAS du YAML runtime Home Assistant.
#  Aucune entité définie ici. Toutes les valeurs sont extraites du dépôt.
#
#  TYPAGE DES MAILLONS (champ 'statut', vocabulaire fermé) :
#    present                          -> existe ; entity_id renseigné
#    absent_non_conforme_temporaire   -> exigé mais absent = DETTE (cf. exceptions)
#    non_applicable                   -> hors périmètre pour ce mode (PAS une dette)
#
#  Un maillon a TOUJOURS la forme : { statut: <…>, entity_id: <id|null> }
# ==========================================================

meta:
  contrat: resilience_integrations.md
  version: "1.1"
  mode: report-only
  vocabulaire_statut: [present, absent_non_conforme_temporaire, non_applicable]
  delay_on_gel_reference: "00:05:00"   # ancre *age_gel_delay_5
  delay_on_ok_reference: "00:02:00"    # ancre *age_ok_delay
  action_canon: script.resilience_integration_recover
  garde_decision: input_boolean.systeme_stable
  inhibition: binary_sensor.panne_secteur_en_cours
  inhibition_wan: binary_sensor.contexte_wan_indisponible

