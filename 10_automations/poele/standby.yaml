# ==========================================================
# 🧠 ARSENAL — AUTOMATION :
#     Chauffage – Standby par poêle (mémoire)
# ----------------------------------------------------------
# 🎯 RÔLE
#
#     Reifier explicitement la cause "poêle" d’un état
#     de veille chauffage, à partir de la mémoire
#     temporelle associée au poêle (24 h).
#
#     Cette automation n’exprime PAS une décision thermique,
#     elle rend un contexte lisible et explicite.
#
# 🎯 OBJECTIF
#
#     - Rendre la décision chauffage compréhensible
#       et rassurante pour l’utilisateur
#     - Exposer une cause métier claire et traçable
#
# 🧱 PRINCIPE
#
#     - Observation directe de l’état du timer
#       de mémoire poêle
#     - Projection de cet état dans un booléen
#       explicatif dédié
#
# 📥 ENTRÉE
#
#     - État du timer.poele_memoire_24h
#
# 📤 SORTIE
#
#     - input_boolean.chauffage_standby_par_poele
#
# 🚫 CE QUE CETTE AUTOMATION NE FAIT PAS
#
#     - Ne met pas le chauffage en veille
#     - Ne pilote aucune consigne
#     - Ne prend aucune décision thermique
#
# ✅ ARCHITECTURE
#
#     Arsenal V5+
# ==========================================================


- id: "10100000000004"
  alias: "Chauffage – Standby par poêle (mémoire)"
  mode: restart

  trigger:
    - platform: state
      entity_id: timer.poele_memoire_24h

  action:
    - choose:
        - conditions:
            - condition: state
              entity_id: timer.poele_memoire_24h
              state: "active"
          sequence:
            - service: input_boolean.turn_on
              target:
                entity_id: input_boolean.chauffage_standby_par_poele
      default:
        - service: input_boolean.turn_off
          target:
            entity_id: input_boolean.chauffage_standby_par_poele