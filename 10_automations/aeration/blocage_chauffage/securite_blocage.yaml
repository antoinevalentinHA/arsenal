# ==========================================================
#  🧠 ARSENAL — AUTOMATION :
#     Chauffage – Sécurité blocage au démarrage (V3)
#
#  ID : 10010000000022
# ----------------------------------------------------------
#  🎯 RÔLE
#
#     Garde-fou de démarrage garantissant qu’un blocage
#     chauffage lié à une aération n’est jamais conservé
#     à tort après un redémarrage Home Assistant.
#
#  🧩 PRINCIPE
#
#     - S’exécute uniquement au retour à un système stable
#     - Vérifie si l’horodatage de fin de blocage est dépassé
#     - Coupe immédiatement le blocage si nécessaire
#
#  🚫 CE QUE CETTE AUTOMATION NE FAIT PAS
#
#     - N’initie aucune aération
#     - Ne décide pas d’une reprise thermique
#     - Ne modifie aucun datetime
#     - N’interfère pas avec les pipelines actifs
#
#  🛡️ ROBUSTESSE
#
#     - Protège contre reboot, crash et restore
#     - Évite tout blocage "zombie" persistant
#     - Complémentaire des pipelines d’aération
#
#  🔗 POSITION ARCHITECTURALE
#
#     Cette automation est un garde-fou de démarrage.
#     Toute reprise thermique reste déléguée aux
#     scripts de décision centrale.
#
#  ✅ Compatibilité : Home Assistant 2024.8+
# ==========================================================


- id: "10010000000022"
  alias: "Chauffage - Blocage aération - Sécurite démarrage"
  mode: single

  trigger:
    # Exécution après chaque démarrage Home Assistant
    - platform: state
      entity_id: input_boolean.systeme_stable
      to: "on"

  condition:
    # Le blocage doit être actif
    - condition: state
      entity_id: input_boolean.chauffage_blocage_aeration
      state: "on"

    # La date/heure de fin doit être dépassée
    - condition: template
      value_template: >
        {{ now().timestamp() >
           (state_attr('input_datetime.chauffage_fin_blocage_aeration', 'timestamp') | float(0)) }}

  action:
    # Coupure immédiate du blocage
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.chauffage_blocage_aeration
