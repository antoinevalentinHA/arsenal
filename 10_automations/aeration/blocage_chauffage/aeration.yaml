# ==========================================================
# 🧠 ARSENAL — AUTOMATION :
#     Chauffage – Aération – Pipeline Maître (V3 PRO)
#
# ID : 10010000000023
# ----------------------------------------------------------
# 🎯 RÔLE FONDAMENTAL
#
#   Pipeline maître de gestion d’un ÉPISODE D’AÉRATION
#   impactant le chauffage.
#
#   Il orchestre de manière atomique et séquencée :
#     - le début d’aération
#     - la fin d’aération
#     - le blocage thermique du chauffage
#     - l’analyse différée de la chute de température (ΔT)
#     - la levée ou la prolongation du blocage
#
#   ➜ Ce pipeline ne redémarre JAMAIS le chauffage.
#   ➜ Il ne fait que bloquer, temporiser, ou libérer.
#
# ----------------------------------------------------------
# 🧱 CONCEPT CLÉ : ÉPISODE D’AÉRATION
#
#   Une aération est traitée comme un épisode unique :
#     - snapshots de températures figés au départ
#     - références thermiques stables
#     - décisions différées basées sur cet état initial
#
#   Aucun mélange entre épisodes successifs.
#
# ----------------------------------------------------------
# 🧩 ARCHITECTURE INTERNE (AUTOMATE À ÉTATS)
#
#   M1 — Début aération
#        - Détection ouverture
#        - Snapshots T_REF
#        - Armement du pipeline
#
#   M2 — Fin aération
#        - Clôture épisode
#        - Blocage chauffage initial
#        - Programmation analyse ΔT
#
#   M3 — Analyse ΔT
#        - Calcul chute thermique réelle
#        - Décision de prolongation du blocage
#        - Désarmement final si ΔT faible
#
#   M4 — Fin blocage horaire
#        - Filet de sécurité temporel
#        - Synchronisé avec M3
#
#   M5 — Réouverture pendant blocage
#        - Information pure
#        - Protection contre analyse prématurée
#
# ----------------------------------------------------------
# 🔁 PHILOSOPHIE THERMIQUE
#
#   - Le ΔT n’est PAS un seuil de redémarrage
#   - Il sert uniquement à estimer la sévérité
#     de l’impact thermique de l’aération
#
#   ➜ Plus la chute est forte,
#     plus le blocage est prolongé.
#
# ----------------------------------------------------------
# 🛑 CONTRAINTES ASSUMÉES
#
#   - mode: queued (aucun restart destructeur)
#   - Aucun polling
#   - Aucun time_pattern agressif
#   - Déclenchements exclusivement événementiels
#     ou horodatés
#
# ----------------------------------------------------------
# 🧱 GARANTIES
#
#   - Pipeline lisible et déterministe
#   - Aucun état intermédiaire ambigu
#   - Aucun redémarrage intempestif
#   - Séparation stricte décision / exécution
#
# ----------------------------------------------------------
# 🔗 DÉPENDANCE ARCHITECTURALE
#
#   La reprise éventuelle du chauffage est
#   intégralement déléguée au
#   script "Chauffage – Décision Centrale".
#
# ----------------------------------------------------------
# ✅ Compatibilité : Home Assistant 2024.8+
# ==========================================================


- id: "10010000000023"
  alias: "Chauffage - Aération - Pipeline maître"
  mode: queued

  ##################################################################
  #  TRIGGERS
  ##################################################################

  trigger:

    # --------------------------------------------------------------
    #  M1 - Debut aeration : ouverture fenetres "immediates"
    # --------------------------------------------------------------
    - id: ouverture_immediate
      platform: state
      entity_id:
        - binary_sensor.capteur_fenetre_entree
        - binary_sensor.capteur_chambre_arnaud
        - binary_sensor.capteur_chambre_matthieu
      to: "on"

    # --------------------------------------------------------------
    #  M1 - Debut aeration : ouverture fenetres "avec delai"
    #    (ces binary_sensors encapsulent deja les timers de grace)
    # --------------------------------------------------------------
    - id: ouverture_differee
      platform: state
      entity_id:
        - binary_sensor.fenetre_sejour_ouverte_avec_delai
        - binary_sensor.fenetre_chambre_parents_ouverte_avec_delai
      to: "on"

    # --------------------------------------------------------------
    #  M2 - Fin aeration : fermeture globale
    # --------------------------------------------------------------
    - id: fermeture
      platform: state
      entity_id: binary_sensor.fenetre_ouverte_maison_avec_delai
      to: "off"

    # --------------------------------------------------------------
    #  M5 - Reouverture pendant blocage
    # --------------------------------------------------------------
    - id: reouverture_pendant_blocage
      platform: state
      entity_id: binary_sensor.fenetre_ouverte_maison
      to: "on"

    # --------------------------------------------------------------
    #  M3 - Analyse DeltaT : horodatage atteint
    #    input_datetime.analyse_deltat_disponible doit exister
    # --------------------------------------------------------------
    - id: analyse_deltat
      platform: template
      value_template: >
        {% set dt = states('input_datetime.analyse_deltat_disponible') | as_datetime %}
        {{ dt is not none and now().replace(tzinfo=None) >= dt }}

    # --------------------------------------------------------------
    #  M4 - Fin blocage horaire : horodatage atteint
    #    input_datetime.chauffage_fin_blocage_aeration doit exister
    # --------------------------------------------------------------
    - id: fin_blocage_horaire
      platform: template
      value_template: >
        {% set dt_raw = states('input_datetime.chauffage_fin_blocage_aeration') %}
        {% set dt = dt_raw | as_datetime %}

        {# 1) Invalide → NE PAS déclencher #}
        {% if dt is none %}
          false
        {% else %}
          {# 2) Ne jamais déclencher si dt == minuit (horodatage neutralisé) #}
          {% if dt.hour == 0 and dt.minute == 0 and dt.second == 0 %}
            false
          {% else %}
            {# 3) Sinon comparaison normale #}
            {{ now().replace(tzinfo=None) >= dt }}
          {% endif %}
        {% endif %}

  ##################################################################
  #  CONDITIONS GLOBALES
  ##################################################################

  condition:

    # Systeme de blocage active ?
    - condition: state
      entity_id: input_boolean.blocage_chauffage_aeration_active
      state: "on"

  ##################################################################
  #  ACTIONS - MACHINE A ETATS INTERNE
  ##################################################################

  action:

    - choose:

        ##################################################################
        #  M1 — DEBUT AERATION
        ##################################################################
        - conditions:

            - condition: state
              entity_id: input_boolean.systeme_stable
              state: "on"

            - condition: state
              entity_id: input_boolean.aeration_episode_en_cours
              state: "off"

            - condition: template
              value_template: >
                {{ trigger.id in ['ouverture_immediate','ouverture_differee'] }}

          sequence:

            # Activation episode d'aeration
            - action: input_boolean.turn_on
              target:
                entity_id: input_boolean.aeration_episode_en_cours

            # Horodatage debut d'aeration
            - action: input_datetime.set_datetime
              target:
                entity_id: input_datetime.aeration_debut
              data:
                datetime: "{{ now().replace(tzinfo=None).isoformat() }}"

            # Snapshots T_REF individuels (version factorisée)
            - repeat:
                for_each:
                  - sensor: sensor.temperature_entree
                    input: input_number.ref_temp_entree
                  - sensor: sensor.temperature_sejour
                    input: input_number.ref_temp_sejour
                  - sensor: sensor.temperature_chambre_arnaud
                    input: input_number.ref_temp_chambre_arnaud
                  - sensor: sensor.temperature_chambre_matthieu
                    input: input_number.ref_temp_chambre_matthieu
                  - sensor: sensor.temperature_chambre_parents
                    input: input_number.ref_temp_chambre_parents
                  - sensor: sensor.temperature_palier
                    input: input_number.ref_temp_palier
            
                sequence:
                  - action: input_number.set_value
                    target:
                      entity_id: "{{ repeat.item.input }}"
                    data:
                      value: >
                        {% set t = states(repeat.item.sensor) %}
                        {% if t in ['unknown','unavailable','none','None',''] %}
                          {{ states(repeat.item.input) | float(0) }}
                        {% else %}
                          {{ t | float(0) }}
                        {% endif %}

            # Temperature de reference globale pour DeltaT mini chambres
            - action: input_number.set_value
              target:
                entity_id: input_number.chute_temp_reference
              data:
                value: "{{ states('sensor.temperature_min_chambres') | float(0) }}"

            # Armement explicite du pipeline post-boot
            - action: input_boolean.turn_on
              target:
                entity_id: input_boolean.aeration_pipeline_arme

        ##################################################################
        #  M2 — FIN AERATION (VERSION SYNCRO DELTA T)
        ##################################################################
        - conditions:

            - condition: state
              entity_id: input_boolean.systeme_stable
              state: "on"

            - condition: state
              entity_id: input_boolean.aeration_confirmee
              state: "on"

            - condition: template
              value_template: >
                {{
                  states('input_datetime.aeration_debut') not in
                  ['unknown','unavailable','none','None','']
                }}

            - condition: template
              value_template: "{{ trigger.id == 'fermeture' }}"

            - condition: state
              entity_id: input_boolean.aeration_episode_en_cours
              state: "on"

            - condition: state
              entity_id: input_boolean.aeration_pipeline_arme
              state: "on"

            - condition: state
              entity_id: binary_sensor.fenetre_ouverte_maison_avec_delai
              state: "off"

            - condition: template
              value_template: >
                {{ trigger.from_state.state == 'on'
                   and trigger.to_state.state == 'off' }}

          sequence:

            # Fin episode aeration
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.aeration_episode_en_cours

            # Activation blocage chauffage
            - action: input_boolean.turn_on
              target:
                entity_id: input_boolean.chauffage_blocage_aeration

            # --- Synchronisation des délais ---
            - variables:
                delai_analyse: "{{ states('input_number.delai_stabilisation_capteurs') | int }}"
                blocage_initial: "{{ delai_analyse + 1 }}"

            # Programmation fin blocage initial
            - action: input_datetime.set_datetime
              target:
                entity_id: input_datetime.chauffage_fin_blocage_aeration
              data:
                datetime: >
                  {{
                    (now() + timedelta(minutes = blocage_initial))
                    .replace(tzinfo=None)
                    .isoformat()
                  }}

            # Programmation analyse DeltaT
            - action: input_datetime.set_datetime
              target:
                entity_id: input_datetime.analyse_deltat_disponible
              data:
                datetime: >
                  {{
                    (now() + timedelta(minutes = delai_analyse))
                    .replace(tzinfo=None)
                    .isoformat()
                  }}

            # Écriture dans le booléen aeration_confirmee
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.aeration_confirmee

            # Journalisation
            - action: logbook.log
              data:
                name: "Chauffage - Fin aeration"
                message: >
                  Aération terminée -> blocage chauffage activé.
                  Blocage initial calculé : {{ blocage_initial }} min.
                  Analyse DeltaT dans : {{ delai_analyse }} min.
                entity_id: input_boolean.chauffage_blocage_aeration

        ##################################################################
        #  M3 — ANALYSE DELTAT
        ##################################################################
        - conditions:
            - condition: template
              value_template: "{{ trigger.id == 'analyse_deltat' }}"

            - condition: state
              entity_id: input_boolean.chauffage_blocage_aeration
              state: "on"

            - condition: state
              entity_id: input_boolean.aeration_pipeline_arme
              state: "on"

            # Garde-fou M5 : ne pas analyser trop tôt après une réouverture
            - condition: template
              value_template: >
                {% set last = states('input_datetime.aeration_reouverture_last') | as_datetime %}
                {% if last is none %}
                  true
                {% else %}
                  {{
                    (now().replace(tzinfo=None) - last).total_seconds()
                    >= (states('input_number.delai_stabilisation_capteurs') | int * 60)
                  }}
                {% endif %}

          sequence:

            # DeltaT max global
            - variables:
                delta_max: >
                  {{
                    [
                      states('sensor.deltaT_entree') | float(0),
                      states('sensor.deltaT_sejour') | float(0),
                      states('sensor.deltaT_chambre_arnaud') | float(0),
                      states('sensor.deltaT_chambre_matthieu') | float(0),
                      states('sensor.deltaT_chambre_parents') | float(0),
                      states('sensor.deltaT_palier') | float(0)
                    ] | max
                  }}
                prolongation_heures: >
                  {% if delta_max < 0.4 %} 0
                  {% elif delta_max < 0.8 %} 1
                  {% elif delta_max < 1.2 %} 2
                  {% else %} 3
                  {% endif %}

            #  Stockage ΔT dans input_number.delta_t_max_decisionnel_aeration
            - action: input_number.set_value
              target:
                entity_id: input_number.delta_t_max_decisionnel_aeration
              data:
                value: "{{ delta_max | round(2) }}"

            # Choix prolongation vs fin blocage
            - choose:

                # Prolongation
                - conditions:
                    - condition: template
                      value_template: "{{ prolongation_heures > 0 }}"
                  sequence:

                    - action: input_datetime.set_datetime
                      target:
                        entity_id: input_datetime.chauffage_fin_blocage_aeration
                      data:
                        datetime: >
                          {{
                            (now() + timedelta(hours = prolongation_heures))
                            .replace(tzinfo=None)
                            .isoformat()
                          }}

                    - action: logbook.log
                      data:
                        name: "Chauffage - Blocage prolonge"
                        message: >
                          DeltaT = {{ delta_max | round(2) }} degC
                          -> prolongation {{ prolongation_heures }} h.
                        entity_id: input_boolean.chauffage_blocage_aeration

              # Pas de prolongation -> fin blocage + reprise eventuelle avortee
              default:
              
                # Fin blocage
                - action: input_boolean.turn_off
                  target:
                    entity_id: input_boolean.chauffage_blocage_aeration
              
                # Neutraliser datetime fin blocage (évite triggers résiduels)
                - action: input_datetime.set_datetime
                  target:
                    entity_id: input_datetime.chauffage_fin_blocage_aeration
                  data:
                    datetime: "{{ now().date().isoformat() ~ ' 00:00:00' }}"
              
                # Neutraliser datetime analyse ΔT
                - action: input_datetime.set_datetime
                  target:
                    entity_id: input_datetime.analyse_deltat_disponible
                  data:
                    datetime: "{{ now().date().isoformat() ~ ' 00:00:00' }}"

                # Si reprise thermique en cours -> cloture propre
                - if:
                    - condition: state
                      entity_id: input_boolean.reprise_thermique_en_cours
                      state: "on"
                  then:

                    - action: input_boolean.turn_off
                      target:
                        entity_id: input_boolean.reprise_thermique_en_cours

                    - action: input_datetime.set_datetime
                      target:
                        entity_id: input_datetime.reprise_thermique_fin
                      data:
                        datetime: "{{ now().replace(tzinfo=None).isoformat() }}"

                    - action: input_number.set_value
                      target:
                        entity_id: input_number.reprise_thermique_duree_last_temp
                      data:
                        value: >
                          {{
                            (now().timestamp()
                             - (state_attr('input_datetime.reprise_thermique_debut','timestamp') | float(0)))
                            / 60
                          }}

                # Desarmement du pipeline (fin totale episode)
                - action: input_boolean.turn_off
                  target:
                    entity_id: input_boolean.aeration_pipeline_arme

                # Log final
                - action: logbook.log
                  data:
                    name: "Chauffage - Analyse DeltaT"
                    message: >
                      DeltaT faible ({{ delta_max | round(2) }} degC).
                      Blocage levé.
                    entity_id: input_boolean.chauffage_blocage_aeration

        ##################################################################
        #  M4 — FIN BLOCAGE HORAIRE (VERSION SYNCHRO DELTAT)
        ##################################################################
        - conditions:
            # Déclencheur correct ?
            - condition: template
              value_template: "{{ trigger.id == 'fin_blocage_horaire' }}"

            # Blocage encore actif ?
            - condition: state
              entity_id: input_boolean.chauffage_blocage_aeration
              state: "on"

            - condition: state
              entity_id: input_boolean.aeration_pipeline_arme
              state: "on"

            # Vérifier que l'analyse DeltaT est aussi échue
            - condition: template
              value_template: >
                {% set analyse = states('input_datetime.analyse_deltat_disponible') | as_datetime %}
                {{ analyse is not none and now().replace(tzinfo=None) >= analyse }}
          sequence:

            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.chauffage_blocage_aeration
            
            # Neutraliser datetime fin blocage
            - action: input_datetime.set_datetime
              target:
                entity_id: input_datetime.chauffage_fin_blocage_aeration
              data:
                datetime: "{{ now().date().isoformat() ~ ' 00:00:00' }}"
            
            # Neutraliser datetime analyse ΔT
            - action: input_datetime.set_datetime
              target:
                entity_id: input_datetime.analyse_deltat_disponible
              data:
                datetime: "{{ now().date().isoformat() ~ ' 00:00:00' }}"

            # Desarmement du pipeline (fin totale episode)
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.aeration_pipeline_arme
    
            - action: logbook.log
              data:
                name: "Chauffage - Fin blocage horaire"
                message: "Blocage chauffage levé (fin blocage horaire)."
                entity_id: input_boolean.chauffage_blocage_aeration

        ##################################################################
        #  M5 — REOUVERTURE PENDANT BLOCAGE (INFORMATIF)
        ##################################################################
        - conditions:

            - condition: template
              value_template: "{{ trigger.id == 'reouverture_pendant_blocage' }}"

            - condition: state
              entity_id: input_boolean.chauffage_blocage_aeration
              state: "on"

            - condition: state
              entity_id: input_boolean.aeration_pipeline_arme
              state: "on"

            - condition: state
              entity_id: binary_sensor.fenetre_ouverte_maison_avec_delai
              state: "on"

          sequence:

            # Enregistrement horodatage de la réouverture
            - action: input_datetime.set_datetime
              target:
                entity_id: input_datetime.aeration_reouverture_last
              data:
                datetime: "{{ now().replace(tzinfo=None).isoformat() }}"
