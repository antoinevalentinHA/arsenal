# ==========================================================
# 🧠 ARSENAL — AUTOMATION
#     Vicare — ECS — Bouclage automatique programmé
#
#  ID : 10260000000001
# ----------------------------------------------------------
# 🎯 RÔLE
#
#     Piloter automatiquement le bouclage ECS
#     lorsque la fenêtre temporelle est autorisée
#     et que l’utilisateur a activé le système.
#
#     Matérialiser l’état actif par une notification persistante
#     strictement corrélée à l’état réel du bouclage.
#
# 🧩 PÉRIMÈTRE
#
#     - Lundi à vendredi
#     - Helpers début / fin
#     - Autorisation utilisateur via input_boolean
#     - Pilotage unique du switch de bouclage
#     - Notification persistante d’état uniquement
#     - Re-synchronisation après stabilisation système
#
# 🔗 DÉPENDANCES
#
#     - input_boolean.bouclage_plage_active
#     - binary_sensor.bouclage_autorise
#     - input_boolean.systeme_stable
#     - switch.prise_bouclage
#
# 🚫 INTERDITS
#
#     - Aucune décision thermique
#     - Aucun polling temporel
#     - Aucun forçage hors plage
#     - Aucune notification événementielle
#
# 🧠 STATUT
#
#     Automation d’application conditionnée
#     Reload-safe
# ==========================================================

- id: "10260000000001"
  alias: "Bouclage automatique programmé"
  description: "Pilotage automatique du bouclage ECS sur plage horaire autorisée (lundi à vendredi)."
  mode: restart

  trigger:
    - platform: state
      entity_id: binary_sensor.bouclage_autorise

    - platform: state
      entity_id: input_boolean.bouclage_plage_active

    # --------------------------------------------------
    # 🚀 Stabilisation Home Assistant
    # --------------------------------------------------
    - platform: state
      entity_id: input_boolean.systeme_stable
      to: "on"
      id: systeme_stable

  # --------------------------------------------------
  # 🛡️ GARDE-FOU GLOBAL — Entités valides uniquement
  # --------------------------------------------------
  condition:
    - condition: template
      value_template: >
        {{
          states('binary_sensor.bouclage_autorise') not in ['unknown', 'unavailable']
          and states('input_boolean.bouclage_plage_active') not in ['unknown', 'unavailable']
        }}

  action:
    - choose:

        # --------------------------------------------------
        # 🟢 Bouclage autorisé et activé → ON + notification
        # --------------------------------------------------
        - conditions:
            - condition: state
              entity_id: input_boolean.bouclage_plage_active
              state: "on"

            - condition: state
              entity_id: binary_sensor.bouclage_autorise
              state: "on"

          sequence:
            - service: switch.turn_on
              target:
                entity_id: switch.prise_bouclage

            - service: persistent_notification.create
              data:
                notification_id: bouclage_ecs_actif
                title: "🔁 Bouclage ECS actif"
                message: "Le bouclage ECS est actuellement actif (plage horaire autorisée)."

      # --------------------------------------------------
      # 🔴 Tous les autres cas → OFF + suppression notif
      # --------------------------------------------------
      default:
        - service: switch.turn_off
          target:
            entity_id: switch.prise_bouclage

        - service: persistent_notification.dismiss
          data:
            notification_id: bouclage_ecs_actif