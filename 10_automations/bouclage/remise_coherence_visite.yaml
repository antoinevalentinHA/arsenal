# ==========================================================
# 🧠 ARSENAL — AUTOMATION :
#     Visiteur — Watchdog bouclage ECS (cohérence)
#
#  ID : 10260000000003
# ----------------------------------------------------------
# 🎯 RÔLE
#   Garantir que, pendant une visite, si le bouclage est
#   demandé (bouclage_visiteur=on), la prise de bouclage
#   reste ON (remise en conformité).
#
# 🧩 PRINCIPE
#   - Si incohérence détectée -> switch.turn_on
#   - Idempotent : rejouer ne casse rien
# ==========================================================

- id: '10260000000003'
  alias: ECS - Bouclage - Sécurité mode visite
  mode: restart

  trigger:
    - platform: state
      entity_id:
        - binary_sensor.bouclage_visiteur_coherent
        - input_boolean.visite_en_cours
        - input_boolean.bouclage_visiteur
        - switch.prise_bouclage
    - platform: homeassistant
      event: start

  condition:
    - condition: state
      entity_id: input_boolean.visite_en_cours
      state: "on"
    - condition: state
      entity_id: input_boolean.bouclage_visiteur
      state: "on"
    - condition: state
      entity_id: switch.prise_bouclage
      state: "off"

  action:
    - alias: Remise en conformité — activer la prise de bouclage
      action: switch.turn_on
      target:
        entity_id: switch.prise_bouclage