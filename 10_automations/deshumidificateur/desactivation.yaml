# ==========================================================
#  🧠 ARSENAL — AUTOMATION :
#     Déshumidificateur – Extinction différée hors recommandation
#
#  ID : 10060000000007
# ----------------------------------------------------------
#  🎯 RÔLE
#
#     Automation de discipline opérationnelle.
#
#     Elle éteint le déshumidificateur lorsque celui-ci
#     fonctionne sans recommandation logique depuis
#     une durée significative, afin d’éviter tout
#     fonctionnement inutile ou prolongé.
#
#     Cette automation n’est PAS un garde-fou invariant.
#
#  🧩 PRINCIPE
#
#     - Détection d’une absence de recommandation persistante
#     - Vérification que l’appareil est réellement actif
#     - Vérification que la fenêtre minimale de cycle est échue
#     - Extinction contrôlée et assumée
#
#     Une tolérance temporelle est volontairement appliquée
#     pour éviter des coupures trop agressives.
#
#  🕒 TEMPORISATIONS APPLIQUÉES
#
#     - Recommandation absente ≥ 5 minutes
#     - Fenêtre minimale de cycle échue
#
#     Ces durées constituent une politique d’usage,
#     pas une règle logique absolue.
#
#  🧠 DÉCLENCHEURS UTILISÉS
#
#     - Stabilisation de l’absence de recommandation
#
#     Cette automation est strictement événementielle.
#
#     En cas de redémarrage de Home Assistant alors que la
#     recommandation est déjà OFF, aucune extinction n’est
#     rejouée automatiquement. Ce comportement est intentionnel.
#
#  🧠 AUTORITÉ D’EXÉCUTION
#
#     script.set_deshumidificateur_state
#
#     → script unique responsable de l’état réel
#       du déshumidificateur.
#
#  🚫 CE QUE CETTE AUTOMATION NE FAIT PAS
#
#     - Ne calcule PAS l’humidité
#     - Ne décide PAS quand déshumidifier
#     - Ne remplace PAS un invariant instantané
#     - Ne corrige PAS immédiatement un écart transitoire
#
#  🧠 GOUVERNANCE TEMPORELLE
#
#     La durée minimale de fonctionnement n’est plus
#     inférée via l’historique d’état Home Assistant.
#
#     Elle est portée explicitement par :
#       - input_number.deshumidificateur_duree_mini_cycle
#       - timer.deshumidificateur_cycle
#
#     Le timer représente la fenêtre minimale d’un cycle réel.
#     L’extinction n’est autorisée qu’après son expiration.
#
#  🧠 ARCHITECTURE ARSENAL
#
#     Automation de gestion temporelle :
#     tolérance ≠ invariant.
#
#     Elle apporte une extinction propre,
#     robuste et traçable dans le temps.
# ==========================================================

- id: "10060000000007"
  alias: "Déshumidificateur - Désactivation auto"
  description: >
    Met le déshumidificateur hors tension si la recommandation
    est absente depuis 5 min et que l'appareil est actif depuis ≥ 20 min.
  mode: restart

  trigger:
    - platform: state
      entity_id: binary_sensor.deshumidificateur_cave_demarrage_recommande
      to: 'off'
      for: '00:05:00'

  condition:
    - condition: template
      value_template: >
        {{ is_state('binary_sensor.deshumidificateur_cave_demarrage_recommande', 'off')
           and is_state('binary_sensor.deshumidificateur_actif', 'on')
           and is_state('timer.deshumidificateur_cycle', 'idle') }}

  action:
    - action: script.set_deshumidificateur_state
      data:
        target_state: "off"
        request_source: "automation.deshumidificateur_desactivation_auto"
        request_id: >
          desactivation_auto_{{ now().strftime('%Y%m%dT%H%M%S') }}