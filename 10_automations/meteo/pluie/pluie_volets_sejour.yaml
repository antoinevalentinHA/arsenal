# ==========================================================
#  🧠 ARSENAL — AUTOMATION :
#     Pluie forte – Fermeture volets Séjour
#
#  ID : 10160000000010
# ----------------------------------------------------------
#  🎯 RÔLE
#
#     Orchestration événementielle.
#     Ferme les volets du séjour sur détection de pluie forte,
#     si l'autorisation séjour est active.
#
#  🧱 NATURE
#
#     - Orchestration événementielle
#     - Décision déléguée à sensor.cibles_volets_pluie_sejour
#     - Exécution déléguée à script.volets_fermeture_execute
#
#  ⚙️ PRINCIPE
#
#     - Déclenchement principal : intention_pluie_forte → ON
#     - Déclenchement de reprise : systeme_stable → ON si pluie forte déjà active
#
#  🚫 NE FAIT PAS
#
#     - Ne détecte pas la pluie
#     - Ne recalcule pas l'autorisation (déléguée au sensor)
#     - Ne filtre pas la présence (portée par autorisation_fermeture_volets_pluie_sejour)
#     - Ne ferme aucun autre volet que le séjour
#
#  📐 CONTRAT
#     CONTRAT_PLUIE_VOLETS.md v2.2.1 — sections 4.2, 5.7
# ==========================================================

- id: "10160000000010"
  alias: "Météo - Pluie - Fermeture volets séjour"
  description: >
    Ferme les volets du séjour lors du passage à "pluie forte",
    si l'autorisation séjour est active (politique présence déléguée au sensor).
  mode: single
  max_exceeded: silent

  trigger:
    - platform: state
      id: pluie_forte
      entity_id: binary_sensor.intention_pluie_forte
      to: "on"
    - platform: state
      id: demarrage
      entity_id: input_boolean.systeme_stable
      to: "on"

  condition:
    - condition: template
      alias: "Garde-fou : pluie forte active"
      value_template: "{{ is_state('binary_sensor.intention_pluie_forte','on') }}"
    - condition: template
      alias: "Optimisation : cibles séjour non vides"
      value_template: >
        {{ (state_attr('sensor.cibles_volets_pluie_sejour','entity_ids') or []) | length > 0 }}
    - condition: or
      conditions:
        - condition: trigger
          id: pluie_forte
        - condition: and
          conditions:
            - condition: trigger
              id: demarrage
            - condition: template
              alias: "Reprise : pluie forte déjà active"
              value_template: "{{ is_state('binary_sensor.intention_pluie_forte','on') }}"

  action:
    - variables:
        cibles_sejour: "{{ state_attr('sensor.cibles_volets_pluie_sejour','entity_ids') or [] }}"
    - service: script.volets_fermeture_execute
      data:
        covers: "{{ cibles_sejour }}"
    - service: script.notification_envoyer_avance
      data:
        cible: input_text.telephone_antoine_notify
        titre: "🌧️ Pluie forte – Volets séjour fermés"
        message: >
          Pluie forte détectée.
          Fermeture automatique des volets du séjour à {{ now().strftime('%H:%M') }}.
          Cibles : {{ cibles_sejour | join(', ') }}.
        extra:
          group: "volets"
          tag: "fermeture_volets_pluie_forte_sejour"
