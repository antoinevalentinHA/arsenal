# ==========================================================
#  🧠 ARSENAL — AUTOMATION :
#     Pluie – Orchestration des actions associées
#
#  ID : 1016000000004
# ----------------------------------------------------------
#  🎯 RÔLE
#
#     Automation d’ORCHESTRATION MÉTIER.
#
#     Elle déclenche l’exécution des actions
#     associées à un épisode de pluie, dès que
#     l’état global `pluie_en_cours` est activé.
#
#     Elle garantit également la reprise correcte
#     des actions après un redémarrage de
#     Home Assistant.
#
#  🧱 NATURE
#
#     - Orchestration événementielle
#     - Délégation totale au script dédié
#     - Aucune logique métier interne
#
#  ⚙️ PRINCIPE
#
#     - Déclenchement principal :
#         • passage de `pluie_en_cours` à ON
#     - Déclenchement de reprise :
#         • démarrage HA
#         • pluie déjà en cours
#     - Exécution du script centralisé
#       `script.pluie_detectee`
#
#  🚫 CE QUE CETTE AUTOMATION NE FAIT PAS
#
#     - Ne détecte pas la pluie
#     - Ne décide pas de l’état météo
#     - Ne contient aucune action métier directe
#     - Ne gère pas la fin de l’épisode pluie
#
#  🔗 UTILISATION
#
#     - Point d’entrée unique des réactions à la pluie
#     - Garantit un comportement cohérent
#       même après redémarrage du système
#
#  🧩 ARCHITECTURE
#
#     Toute la logique métier liée à la pluie
#     est volontairement encapsulée dans
#     le script `pluie_detectee`.
#
#  ✅ COMPATIBILITÉ
#
#     Home Assistant 2024.8+
# ==========================================================


- id: "1016000000004"
  alias: "Pluie – Actions associées à l’épisode"
  description: >
    Exécute le script `pluie_detectee` lorsqu’un épisode de pluie
    est détecté (activation de `pluie_en_cours`), et relance
    automatiquement le script au démarrage si pluie déjà active.

  mode: single
  max_exceeded: silent

  # ======================================================
  # 🔔 Déclencheurs — Activation pluie + démarrage HA
  # ======================================================
  trigger:
    # 🌧️ Activation pluie
    - platform: state
      id: pluie
      entity_id: input_boolean.pluie_en_cours
      to: "on"

    # 🔁 Redémarrage Home Assistant
    - platform: state
      entity_id: input_boolean.systeme_stable
      to: "on"
      id: demarrage

  # ======================================================
  # ✅ Conditions — Vérifie état valide et cohérent
  # ======================================================
  condition:
    - condition: template
      alias: "Capteur pluie_en_cours valide"
      value_template: >
        {{ states('input_boolean.pluie_en_cours') not in ['unknown','unavailable','none'] }}

    - condition: or
      conditions:
        # Déclenchement normal
        - condition: trigger
          id: pluie
        # Démarrage HA avec pluie déjà en cours
        - condition: and
          conditions:
            - condition: trigger
              id: demarrage
            - condition: state
              entity_id: input_boolean.pluie_en_cours
              state: "on"

  # ======================================================
  # 🔄 Action — Lancement du script associé
  # ======================================================
  action:
    - service: script.pluie_detectee