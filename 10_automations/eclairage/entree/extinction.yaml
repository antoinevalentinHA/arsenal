# ==========================================================
# 🧠 ARSENAL — AUTOMATISATION
#     Éclairage – Entrée – Extinction après absence
# ----------------------------------------------------------
# 🎯 RÔLE
#   Éteindre la lumière de l’entrée après une durée
#   configurée d’absence de mouvement.
#
# ----------------------------------------------------------
# 🧱 LOGIQUE
#
#   Déclencheur :
#     - Absence continue de mouvement pendant la durée
#       définie par `input_number.duree_absence_entree`
#
#   Action :
#     - Extinction lumière entrée
#
# ----------------------------------------------------------
# 🛡️ GARANTIES
#
#   - Extinction uniquement après absence réelle
#   - Durée d’attente pilotée par helper
#   - Pas de dépendance aux conditions de luminosité
#   - Comportement déterministe et lisible
#
# ==========================================================

- id: '10070000000027'
  alias: "Éclairage – Entrée – Extinction"
  mode: restart

  trigger:
    - platform: state
      entity_id: binary_sensor.capteur_mouvements_entree_occupancy
      to: 'off'
      for:
        seconds: "{{ states('input_number.duree_absence_entree') | int }}"

  condition:
    - condition: state
      entity_id: input_boolean.entree_auto_light
      state: 'on'

  action:
    - action: switch.turn_off
      target:
        entity_id: switch.lumiere_entree