# ==========================================================
#  🧠 ARSENAL — AUTOMATION :
#     SDB Enfants – Recalage stateless charge veilleuse Arnaud
#
#  ID : 1007000000009
# ----------------------------------------------------------
#  🎯 RÔLE
#
#     Automation de recalage temporel stateless.
#
#     Elle aligne l’état de la prise de la salle de bain enfants
#     avec une plage horaire fixe de charge quotidienne,
#     sans jamais s’appuyer sur un état précédent.
#
#     L’objectif est de garantir la mise sous tension
#     de la veilleuse sur une fenêtre donnée,
#     y compris en cas de redémarrage Home Assistant.
#
#  🧩 PRINCIPE
#
#     - AUCUNE mémoire
#     - AUCUN timer
#     - AUCUN wait / delay
#
#     À chaque événement structurant,
#     l’automation évalue la situation courante
#     et applique directement l’état correct :
#
#       • Dans la plage horaire autorisée → prise ON
#       • En dehors de la plage → prise OFF
#
#  🧠 ÉVÉNEMENTS DÉCLENCHEMENT
#
#     - Entrée dans la plage horaire (10:00)
#     - Sortie de la plage horaire (11:30)
#     - Redémarrage Home Assistant (systeme_stable)
#     - Changement du mode maison
#
#  🧠 CONTEXTE D’AUTORISATION
#
#     La charge est autorisée UNIQUEMENT si :
#       • le mode maison n’est PAS "Vacances"
#
#     En mode "Vacances", la prise est
#     systématiquement maintenue hors tension.
#
#  🧠 ÉLÉMENT PILOTÉ
#
#     switch.prise_sdb_enfants
#
#     → alimentation électrique de la veilleuse
#
#     Cette automation ne gère PAS :
#       • l’état de charge réel
#       • la batterie
#       • une logique adaptative
#
#  🚫 CE QUE CETTE AUTOMATION NE FAIT PAS
#
#     - Ne calcule PAS de durée de charge
#     - Ne surveille PAS le niveau de batterie
#     - Ne mémorise PAS un état intermédiaire
#     - Ne dépend PAS d’un déclenchement unique
#
#  🧠 ARCHITECTURE ARSENAL
#
#     Modèle stateless robuste :
#     état = fonction(heure courante, contexte maison).
#
#     Aucune dérive possible,
#     aucun état bloqué,
#     aucune dépendance au passé.
# ==========================================================


- id: '1007000000009'
  alias: "SDB Enfants - Charge veilleuse Arnaud"
  description: >
    Aligne l’état de la prise de la salle de bain enfants
    selon la plage horaire 10h–11h30, hors mode Vacances,
    avec recalcul automatique après redémarrage.

  mode: single

  trigger:
    # ⏱️ Vérification aux bornes horaires
    - platform: time
      at: "10:00:00"
    - platform: time
      at: "11:30:00"

    # 🔁 Recalcul après stabilisation système
    - platform: state
      entity_id: input_boolean.systeme_stable
      to: "on"

    # 🔄 Si le mode maison change
    - platform: state
      entity_id: input_select.mode_maison

  action:
    - choose:
        - conditions:
            - condition: template
              value_template: >
                {{ states('input_select.mode_maison') != 'Vacances' }}
            - condition: time
              after: "10:00:00"
              before: "11:30:00"
          sequence:
            - action: switch.turn_on
              target:
                entity_id: switch.prise_sdb_enfants
      default:
        - action: switch.turn_off
          target:
            entity_id: switch.prise_sdb_enfants
