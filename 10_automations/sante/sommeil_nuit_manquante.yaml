# ==========================================================
# 🧠 ARSENAL — AUTOMATION
#     Sommeil — Nuit manquante
#
# ID : 10200000000004
# ----------------------------------------------------------
# 🎯 Rôle
#     Détecter l'absence de consolidation sommeil dans la
#     fenêtre autorisée et marquer la nuit comme manquante.
#
# 🧩 Déclencheur
#     - Heure fixe 11:00
#
# 🧩 Conditions
#     - Aucune consolidation effectuée aujourd'hui
#
# 🏷️ Label
#     signal:guard
#
# 🚫 Interdits
#     - Ne tente aucune consolidation
#     - Ne corrige aucune donnée
#     - Ne produit aucun fallback
#
# 🧠 Statut
#     Surveillance défensive — anomalie pipeline sommeil
# ==========================================================

- id: "10200000000004"
  alias: Sommeil — Nuit manquante
  description: Détection absence de consolidation sommeil
  mode: single

  trigger:
    - platform: time
      at: "11:00:00"

  condition:
    - condition: template
      value_template: >
        {{ states('input_datetime.sommeil_derniere_nuit_date') != now().strftime('%Y-%m-%d') }}

  action:
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.sommeil_nuit_manquante