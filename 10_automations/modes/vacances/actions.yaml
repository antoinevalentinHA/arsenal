# ==========================================================
#  🧠 ARSENAL — AUTOMATION :
#     Vacances – Application du contexte global
#
#  ID : 1009000000006
# ----------------------------------------------------------
#  🎯 RÔLE
#
#     Automation d’APPLICATION DU CONTEXTE GLOBAL.
#
#     Elle applique les mesures de contexte associées
#     au mode *Vacances* dès que celui-ci devient actif
#     ou lors d’une réconciliation au démarrage.
#
#     Elle met la maison dans un état sobre et cohérent,
#     sans jamais piloter les décisions dynamiques.
#
#  🧱 NATURE
#
#     - Orchestration de contexte global
#     - Application de règles transverses
#     - Aucune logique décisionnelle autonome
#
#  ⚙️ PRINCIPE
#
#     - Déclenchement sur passage de `mode_maison` à *Vacances*
#       ou au démarrage si ce mode est déjà actif
#     - Application séquentielle des mesures de contexte :
#         • blocage des planifications ECS
#         • désactivation des booléens généraux non pertinents
#     - Notification utilisateur de synthèse
#
#  🚫 CE QUE CETTE AUTOMATION NE FAIT PAS
#
#     - Ne décide pas des consignes de chauffage
#     - Ne pilote pas la décision thermique centrale
#     - Ne gère pas la sortie du mode Vacances
#     - Ne remplace aucun moteur métier spécialisé
#
#  ✅ COMPATIBILITÉ
#
#     Home Assistant 2024.8+
# ==========================================================

- id: '1009000000006'
  alias: "Modes - Vacances - Application"
  description: >
    Applique les actions de contexte global liées au mode *Vacances* :
    blocages ECS et désactivations générales.

  mode: single

  trigger:
    - platform: state
      entity_id: input_select.mode_maison
      to: 'Vacances'

    - platform: homeassistant
      event: start

  condition:
    - condition: state
      entity_id: input_select.mode_maison
      state: 'Vacances'

  action:

    - action: input_boolean.turn_on
      target:
        entity_id:
          - input_boolean.ecs_blocage_planifiee

    - action: input_boolean.turn_off
      target:
        entity_id:
          - input_boolean.mode_vaisselle
          - input_boolean.ecs_desinfection_active
          - input_boolean.bouclage_visiteur

    - action: persistent_notification.create
      data:
        notification_id: contexte_vacances
        title: "✈️ Mode Vacances activé"
        message: >
          Le mode *Vacances* est actif à {{ now().strftime('%H:%M') }}.

          **Actions appliquées :**
          • Planification ECS désactivée
          • Bouclage visiteur désactivé
          • Mode vaisselle désactivé