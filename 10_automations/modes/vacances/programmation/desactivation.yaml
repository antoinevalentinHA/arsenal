# ==========================================================
#  🧠 ARSENAL — AUTOMATION :
#     Vacances – Fin de projection auto
#
#  ID : 1009000000005
# ==========================================================

- id: "1009000000005"
  alias: "Modes - Vacances - Fin projection auto"
  description: >
    Repasse en mode *Normal* lorsque la demande consolidée
    Vacances devient fausse alors que la maison est encore
    projetée en mode *Vacances*.

  mode: restart

  trigger:
    - platform: state
      entity_id: binary_sensor.vacances_demandees
      to: "off"

    - platform: homeassistant
      event: start

  condition:
    - condition: state
      entity_id: binary_sensor.vacances_demandees
      state: "off"

    - condition: state
      entity_id: input_select.mode_maison
      state: "Vacances"

  action:
    - action: input_select.select_option
      target:
        entity_id: input_select.mode_maison
      data:
        option: "Normal"

    - action: persistent_notification.dismiss
      data:
        notification_id: projection_vacances