# ==========================================================
#  🧠 ARSENAL — AUTOMATION :
#     Vacances – Activation automatique du mode (etat metier)
#
#  ID : 1009000000004
# ----------------------------------------------------------
#  🎯 RÔLE
#
#     Automation d’ENTRÉE EN MODE MÉTIER.
#
#     Elle applique le passage en mode *Vacances*
#     lorsque l’état métier "Vacances actives" devient VRAI.
#
#     L’état de vérité est porté par :
#       binary_sensor.vacances_actives
#
#  🧱 NATURE
#
#     - Déclenchement événementiel (template)
#     - Zéro polling
#     - Basée sur état métier consolidé
#
#  ⚙️ PRINCIPE
#
#     - Déclenchement sur apparition de l’état VRAI
#     - Vérification optionnelle d’autorisation utilisateur
#     - Bascule idempotente vers "Vacances"
#     - Notification utilisateur (persistante + mobile)
#
#  🚫 CE QUE CETTE AUTOMATION NE FAIT PAS
#
#     - Ne surveille pas l’horloge
#     - Ne gère pas la programmation de date/heure
#     - Ne décide pas de l’état "Vacances actives"
#
#  ✅ COMPATIBILITÉ
#
#     Home Assistant 2024.8+
# ==========================================================

- id: "1009000000004"
  alias: "Vacances – Activation automatique du mode"
  description: >
    Passe en mode *Vacances* lorsque l’état métier
    "Vacances actives" devient vrai, si autorisé.

  mode: single

  trigger:
    - platform: template
      value_template: >
        {{ is_state('binary_sensor.vacances_actives', 'on') }}

  condition:
    - condition: state
      entity_id: input_boolean.mode_vacances_auto
      state: "on"

    - condition: template
      value_template: >
        {{ states('input_select.mode_maison') != 'Vacances' }}

  action:

    # 🏠 Bascule en mode Vacances
    - action: input_select.select_option
      target:
        entity_id: input_select.mode_maison
      data:
        option: "Vacances"

    # 🔔 Notification persistante
    - action: persistent_notification.create
      data:
        title: "✈️ Vacances actives"
        message: >
          Le mode *Maison* est passé automatiquement en *Vacances*
          à {{ now().strftime('%d/%m à %H:%M') }}
          car l’état métier "Vacances actives" est devenu vrai.

    # 📱 Notification mobile
    - action: script.notification_envoyer
      data:
        cible: input_text.telephone_antoine_notify
        titre: "✈️ Mode Vacances activé"
        message: >
          Mode *Vacances* activé automatiquement à {{ now().strftime('%H:%M') }}
          (Vacances actives = ON).
