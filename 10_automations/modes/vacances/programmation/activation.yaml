# ==========================================================
#  🧠 ARSENAL — AUTOMATION :
#     Vacances – Projection auto du mode global
#
#  ID : 1009000000004
# ==========================================================

- id: "1009000000004"
  alias: "Modes - Vacances - Projection auto"
  description: >
    Projette le contexte global en mode *Vacances* lorsque
    la demande consolidée Vacances devient vraie.

  mode: restart

  trigger:
    - platform: state
      entity_id: binary_sensor.vacances_demandees
      to: "on"

    - platform: homeassistant
      event: start

  condition:
    - condition: state
      entity_id: binary_sensor.vacances_demandees
      state: "on"

    - condition: template
      value_template: >
        {{ states('input_select.mode_maison') != 'Vacances' }}

  action:
    - action: input_select.select_option
      target:
        entity_id: input_select.mode_maison
      data:
        option: "Vacances"

    - action: persistent_notification.create
      data:
        notification_id: projection_vacances
        title: "✈️ Maison – Mode Vacances"
        message: >
          Le contexte global Vacances est actif.