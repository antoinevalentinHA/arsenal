# ==========================================================
#  🧠 ARSENAL — AUTOMATION :
#     Alarme – Intrusion (mouvements)
#
#  ID : 1002000000009
# ----------------------------------------------------------
#  🎯 RÔLE
#
#     Déclencher l’alarme en cas de mouvement détecté
#     dans une zone sensible lorsque l’alarme est armée,
#     hors mode test et hors délai d’entrée actif.
#
#  🧩 PRINCIPE
#
#     - Réagit à une détection de mouvement agrégée par zone
#     - Ignore tout déclenchement pendant le délai d’entrée
#     - Ignore les nettoyages du robot
#     - Déclenche réellement l’alarme ou envoie une notification
#       selon le mode test
#
#  🚫 CE QUE CETTE AUTOMATION NE FAIT PAS
#
#     - Ne gère pas le délai d’entrée
#     - Ne désarme jamais l’alarme
#     - Ne contient pas la logique métier complète de sécurité
#
#  🛡️ ROBUSTESSE
#
#     - Déclenchement sur capteurs N2 de zone
#     - Réduction des doublons liés aux capteurs physiques multiples
#     - Lecture métier claire par zone
# ==========================================================

- id: '1002000000009'
  alias: "Alarme - Intrusion mouvements"
  description: >
    Déclenche l’alarme en cas de mouvement détecté dans des zones sensibles
    lorsque l’alarme est armée, sauf si le mode test ou un délai d’entrée est en cours.

  mode: single

  trigger:
    - platform: state
      entity_id:
        - binary_sensor.mouvement_sejour
        - binary_sensor.mouvement_entree
        - binary_sensor.mouvement_garage
      from: 'off'
      to: 'on'

  condition:
    - condition: state
      entity_id: alarm_control_panel.alarme_maison
      state: armed_away

    - condition: not
      conditions:
        - condition: state
          entity_id: timer.delai_entree
          state: active

    - condition: state
      entity_id: binary_sensor.roborock_q7_max_nettoyage
      state: 'off'

  action:
    - choose:

        - conditions:
            - condition: state
              entity_id: input_boolean.mode_test_alarme
              state: 'off'
          sequence:
            - action: alarm_control_panel.alarm_trigger
              target:
                entity_id: alarm_control_panel.alarme_maison

            - action: script.notification_envoyer_avance
              data:
                cible: input_text.telephone_antoine_notify
                titre: "🚨 Mouvement detecte"
                message: >
                  {% set zones = {
                    'binary_sensor.mouvement_sejour': 'sejour',
                    'binary_sensor.mouvement_entree': 'entree',
                    'binary_sensor.mouvement_garage': 'garage'
                  } %}
                  Mouvement detecte a {{ now().strftime('%H:%M') }}
                  dans la zone **{{ zones.get(trigger.entity_id, 'inconnue') }}**.

                  L’alarme a ete declenchee.
                extra:
                  ttl: 0
                  priority: high
                  importance: high

        - conditions:
            - condition: state
              entity_id: input_boolean.mode_test_alarme
              state: 'on'
          sequence:
            - action: script.notification_envoyer_avance
              data:
                cible: input_text.telephone_antoine_notify
                titre: "🔕 Mouvement simule (mode test)"
                message: >
                  {% set zones = {
                    'binary_sensor.mouvement_sejour': 'sejour',
                    'binary_sensor.mouvement_entree': 'entree',
                    'binary_sensor.mouvement_garage': 'garage'
                  } %}
                  Mouvement detecte a {{ now().strftime('%H:%M') }}
                  dans la zone **{{ zones.get(trigger.entity_id, 'inconnue') }}**.

                  Aucun declenchement reel : le systeme est en **mode test**.
                extra:
                  ttl: 0
                  priority: high
                  importance: high