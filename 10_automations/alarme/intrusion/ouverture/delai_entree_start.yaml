# ==========================================================
# 🧠 ARSENAL — AUTOMATION
# Alarme — Delai entree (start)
# ==========================================================
#
# 📌 Fichier
#   automations/alarme/delai_entree_start.yaml
#
# 🎯 Role
#   Lancer le delai d'entree lorsqu'un ouvrant d'entree
#   alarme passe de off a on alors que l'alarme est armee.
#
# 🧱 Principe
#   - Consomme les signaux metier permissifs du domaine alarme
#   - Ne consomme plus la reconciliation stricte ouvrants
#   - Ne decide rien
#   - Pose uniquement un etat temporel :
#       timer.delai_entree
#
# 📥 Entrees
#   - binary_sensor.alarme_ouverture_entree
#   - binary_sensor.alarme_ouverture_garage
#   - alarm_control_panel.alarme_maison
#   - timer.delai_entree
#   - input_number.alarme_delai_entree
#   - input_boolean.mode_test_alarme
#
# 📤 Sorties
#   - timer.delai_entree
#   - script.sirene_bip
#
# ⚠️ Important
#   - Declenchement strict sur front montant off -> on
#   - Cette automation ne confirme aucune intrusion
#   - Le cerveau alarme V2 gere la suite
#
# 🆔 ID
#   - 10020000000031
# ==========================================================

- id: "10020000000031"
  alias: "Alarme - Délai entrée début"
  mode: single

  trigger:
    - platform: state
      entity_id:
        - binary_sensor.alarme_ouverture_entree
        - binary_sensor.alarme_ouverture_garage
      from: "off"
      to: "on"

  condition:
    - condition: state
      entity_id: alarm_control_panel.alarme_maison
      state: "armed_away"

    - condition: state
      entity_id: timer.delai_entree
      state: "idle"

  action:
    - action: timer.start
      target:
        entity_id: timer.delai_entree
      data:
        duration:
          seconds: "{{ states('input_number.alarme_delai_entree') | int(30) }}"

    - choose:
        - conditions:
            - condition: state
              entity_id: input_boolean.mode_test_alarme
              state: "off"
          sequence:
            - action: script.sirene_bip