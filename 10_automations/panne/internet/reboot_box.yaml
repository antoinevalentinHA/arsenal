# ==========================================================
#  🧠 ARSENAL — AUTOMATION :
#     Réseau – Remédiation automatique coupure Internet
#
#  ID : 1012000000003
# ----------------------------------------------------------
#  🎯 RÔLE
#
#     Automation de REMÉDIATION ACTIVE RÉSEAU.
#
#     Elle redémarre automatiquement la box Internet
#     lorsque la connexion est indisponible depuis
#     plus de 5 minutes, puis répète l’action tant
#     que l’accès Internet n’est pas rétabli.
#
#     Elle garantit une tentative de récupération
#     autonome, sans intervention humaine.
#
# ----------------------------------------------------------
#  🧱 NATURE
#
#     - Action corrective physique (cycle alimentation)
#     - Boucle de remédiation conditionnelle
#     - Notifications utilisateur
#
# ----------------------------------------------------------
#  ⚙️ PRINCIPE
#
#     - Déclenchement après coupure Internet > 5 min
#     - Publication d’un état système explicite "panne en cours"
#     - Redémarrage immédiat de la box
#     - Boucle tant que l’accès reste indisponible
#     - Délais progressifs entre tentatives :
#         • 1h → 2h → 4h → 4h (plafonné)
#     - Arrêt immédiat dès retour Internet
#
# ----------------------------------------------------------
#  🚫 CE QUE CETTE AUTOMATION NE FAIT PAS
#
#     - Ne journalise PAS les tentatives en notification persistante
#     - Ne publie PAS de notification persistante de succès
#     - Ne trace PAS d’événements passés
#
# ----------------------------------------------------------
#  🔗 DÉPENDANCES
#
#     - Capteur d’accès Internet :
#         binary_sensor.acces_externe
#     - Script de coupure électrique :
#         script.cycle_alimentation_box
#
# ----------------------------------------------------------
#  🧠 PRINCIPE ARSENAL
#
#     Une panne critique publie un état système unique.
#     Les tentatives sont notifiées uniquement en mobile.
#     L’état est disqualifié explicitement à la sortie.
#
# ----------------------------------------------------------
#  🛡️ ROBUSTESSE
#
#     - Tolérant aux redémarrages HA
#     - Zéro faux positif
#     - État persistant unique tant que la panne persiste
#
# ----------------------------------------------------------
#  ✅ COMPATIBILITÉ
#
#     Home Assistant 2024.8+
# ==========================================================


- id: "1012000000003"
  alias: "Réseau – Redémarrage box (auto)"
  description: >
    Si Internet est coupé depuis plus de 5 minutes, redémarre la box immédiatement,
    puis réessaye après 1h, 2h, 4h, puis toutes les 4h tant que la coupure persiste.
    Publie un état persistant unique tant que la panne est active.

  mode: restart

  # ======================================================
  # ⏱ Déclencheur — Coupure Internet de > 5 min
  # ======================================================
  trigger:
    - platform: state
      entity_id: binary_sensor.acces_externe
      to: "off"
      for: "00:05:00"

  # ======================================================
  # 🔁 Action — Entrée en mode panne + remédiation
  # ======================================================
  action:

    ########################################################
    # ⚠️ Publication état système — panne Internet en cours
    ########################################################
    - service: persistent_notification.create
      data:
        notification_id: panne_internet
        title: "🌐 Coupure Internet en cours"
        message: >
          Accès Internet indisponible depuis {{ now().strftime('%H:%M') }}.

          Remédiation automatique active :
          redémarrage périodique de la box tant que la panne persiste.

    ########################################################
    # 🔁 Boucle de remédiation conditionnelle
    ########################################################
    - variables:
        tentative: 0
        delays:
          - "01:00:00"
          - "02:00:00"
          - "04:00:00"
          - "04:00:00"

    - repeat:
        while:
          - condition: state
            entity_id: binary_sensor.acces_externe
            state: "off"

        sequence:

          # 🔄 1. Cycle d’alimentation physique de la box
          - action: script.cycle_alimentation_box

          # 🔢 2. Incrément de tentative
          - variables:
              tentative: "{{ (tentative | int) + 1 }}"

          # 📲 3. Notification mobile uniquement
          - action: script.notification_envoyer
            data:
              cible: input_text.telephone_antoine_notify
              titre: "🌐 Tentative de redémarrage #{{ tentative }}"
              message: "Redémarrage de la box effectué. Vérification dans 2 minutes."

          # ⏳ 4. Attente remontée de la box
          - delay: "00:02:00"

          # ⏲️ 5. Calcul du délai avant prochaine tentative
          - variables:
              next_idx: >
                {% set idx = (tentative - 1) | int %}
                {% set max = (delays | length) - 1 %}
                {{ [idx, max] | min }}
              wait_delay: "{{ delays[next_idx] }}"

          # ⏲️ 6. Attente avant tentative suivante
          - delay: "{{ wait_delay }}"