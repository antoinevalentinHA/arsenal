# ==========================================================
#  🧠 ARSENAL — AUTOMATION :
#     Sécurité – Bascule en mode panne (coupure secteur)
#
#  ID : 1004000000001
# ----------------------------------------------------------
#  🎯 RÔLE
#
#     Automation d’ENTRÉE EN MODE PANNE SECTEUR.
#
#     Elle active un état système explicite lors d’une
#     coupure d’alimentation électrique afin de garantir
#     une réaction thermique immédiate et cohérente,
#     même en cas de dégradation réseau.
#
# ----------------------------------------------------------
#  🧱 NATURE
#
#     - Réaction à événement critique externe
#     - Sécurité énergétique
#     - Publication d’intentions système
#
# ----------------------------------------------------------
#  ⚙️ PRINCIPE
#
#     - Déclenchement dans deux cas :
#         • coupure secteur confirmée
#         • redémarrage de Home Assistant alors que
#           la coupure est toujours active
#
#     - Actions effectuées :
#         • activation d’un override chauffage explicite
#           (`input_boolean.mode_confort_chauffage`)
#         • délégation de la gestion ECS et des notifications
#           à un script de résilience dédié
#
# ----------------------------------------------------------
#  🚫 CE QUE CETTE AUTOMATION NE FAIT PAS
#
#     - Ne détecte pas la panne elle-même
#     - Ne décide d’aucune stratégie thermique
#     - Ne pilote pas directement le chauffage
#     - Ne sort pas du mode panne
#
# ----------------------------------------------------------
#  🔗 UTILISATION
#
#     - Point d’entrée unique du mode panne secteur
#     - Garantit une réaction immédiate du chauffage
#       via la décision centrale
#     - Assure la continuité de protection après reboot
#
# ----------------------------------------------------------
#  🧠 PRINCIPE ARSENAL
#
#     Les événements critiques publient un état système.
#     Les moteurs décisionnels restent souverains.
#
# ----------------------------------------------------------
#  🛡️ ROBUSTESSE
#
#     La condition post-redémarrage garantit que le
#     mode panne reste actif tant que la coupure
#     secteur persiste.
#
# ----------------------------------------------------------
#  ✅ COMPATIBILITÉ
#
#     Home Assistant 2024.8+
# ==========================================================


- id: '1004000000001'
  alias: "Mode panne – Coupure secteur"
  description: >
    Active le chauffage (consigne présence via script) et lance
    l’ECS ponctuelle si une coupure secteur est détectée.

  mode: single

  # ======================================================
  # 🔔 Déclencheurs — Coupure secteur ou redémarrage HA
  # ======================================================
  trigger:
    # 1) Coupure secteur détectée
    - id: power_cut
      platform: state
      entity_id: binary_sensor.coupure_secteur
      from: 'off'
      to: 'on'
      for: "00:00:02"

    # 2) Redémarrage de HA
    - id: ha_start
      platform: state
      entity_id: input_boolean.systeme_stable
      to: "on"

  # ======================================================
  # ✅ Conditions — Valide uniquement si coupure confirmée
  # ======================================================
  condition:
    - condition: or
      conditions:
        - condition: template
          value_template: "{{ trigger.id == 'power_cut' }}"
        - condition: template
          value_template: >
            {{ trigger.id == 'ha_start' and is_state('binary_sensor.coupure_secteur', 'on') }}

  # ======================================================
  # 🔁 Action — Entrée en mode panne secteur
  # ======================================================
  action:

    # 1) Forcer le chauffage en mode confort
    #    (override système — décision centrale réveillée)
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.mode_confort_chauffage

    # 2) Gestion ECS + notifications (résilience partielle)
    - service: script.mode_panne_coupure_secteur