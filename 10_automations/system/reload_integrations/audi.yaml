# ==========================================================
#  🧠 ARSENAL — AUTOMATION :
#     Audi – Relance automatique intégration sur gel prolongé
#
#  ID : 1012000000009
# ----------------------------------------------------------
#  🎯 RÔLE
#     Surveiller la fraîcheur des données Audi et
#     relancer automatiquement l’intégration si celles-ci
#     restent figées au-delà d’un seuil temporel.
#
#     Cette automation vise exclusivement à restaurer
#     un flux de données bloqué, sans interaction utilisateur.
#
#  🚫 NE FAIT PAS
#     - Ne pilote aucun véhicule
#     - Ne déclenche aucune action métier Audi
#     - Ne force pas la mise à jour des données
#
#  🧩 UTILISATION
#     - Condition principale :
#         • âge des données Audi ≥ 60 minutes
#     - Action :
#         • reload de la config_entry Audi
#     - Suivi :
#         • compteur de tentatives avec plafond
#         • backoff progressif
#         • reset automatique en cas de succès
#         • notification persistante d’état
#
#  ✅ CONTRAINTES
#     - Aucune logique métier déportée ici
#     - Aucune dépendance temporelle externe
#     - Fonctionne même après redémarrage HA
# ==========================================================

- id: '1012000000009'
  alias: "Audi – Relance intégration (auto)"

  description: >
    Relance automatiquement l’intégration Audi lorsque les données
    restent figées au-delà de 60 minutes. Intègre un mécanisme
    de backoff progressif, un compteur plafonné et une notification
    explicite selon le résultat.

  mode: single
  max_exceeded: silent

  # ======================================================
  # Trigger fictif
  # ======================================================
  trigger:
    - platform: template
      value_template: "{{ false }}"

  # ======================================================
  # ✅ Condition — données figées ≥ 60 min
  # ======================================================
  condition:
    - condition: template
      alias: "Donnees Audi figees"
      value_template: >
        {{ states('sensor.audi_age_donnees') | float(0) >= 60 }}

  # ======================================================
  # 🔄 Action — reload + suivi + notifications
  # ======================================================
  action:
    - variables:
        tentative: "{{ states('input_number.audi_reload_tentatives') | int(0) }}"
        prochain_delai: >
          {% set base = [ (tentative + 1) * 10, 60 ] | min %}
          {{ base }}

    # 📈 Incrément tentative avec plafond sécurisant
    - service: input_number.set_value
      target:
        entity_id: input_number.audi_reload_tentatives
      data:
        value: >
          {% set val = tentative + 1 %}
          {{ [val, 50] | min }}

    # 🔧 Reload intégration Audi
    - service: homeassistant.reload_config_entry
      data:
        entry_id: !secret audi_entry_id

    # 🕦 Délai avant contrôle
    - delay: "00:02:00"

    - choose:

        # ✅ Succès : compteur reset + notification
        - conditions: >
            {{ states('sensor.audi_age_donnees') | float(999) < 10 }}
          sequence:
            - service: input_number.set_value
              target:
                entity_id: input_number.audi_reload_tentatives
              data:
                value: 0

            - service: persistent_notification.create
              data:
                title: "✅ Audi relancée"
                message: >
                  {{ now().strftime('%d/%m %H:%M') }}  
                  L’intégration Audi a été rechargée automatiquement  
                  et les données sont à nouveau fraîches.

      # ❌ Échec maintenu : notification informative
      default:
        - service: persistent_notification.create
          data:
            title: "🚨 Relance Audi échouée"
            message: >
              {{ now().strftime('%d/%m %H:%M') }}  
              Tentative n°{{ tentative + 1 }} échouée.  
              Nouvelle tentative dans ~{{ prochain_delai }} min.
