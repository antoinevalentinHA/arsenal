# ==========================================================
#  🧠 ARSENAL — AUTOMATION :
#     Netatmo – Relance automatique de l’intégration sur gel
#
#  ID : 1012000000008
# ----------------------------------------------------------
#  🎯 RÔLE
#     Surveiller la fraîcheur des données issues de l’intégration
#     Netatmo et relancer automatiquement celle-ci lorsque les
#     données restent figées au-delà d’un seuil temporel.
#
#     Cette automation constitue un mécanisme de résilience
#     autonome visant à restaurer un flux de données bloqué.
#
#  🚫 NE FAIT PAS
#     - Ne pilote aucun équipement Netatmo
#     - Ne force pas la mise à jour des données
#     - Ne déclenche aucune action métier dépendante des mesures
#
#  🧩 UTILISATION
#     - Surveillance périodique (time_pattern)
#     - Condition principale :
#         • âge des données Netatmo ≥ 60 minutes
#     - Garde-fous intégrés :
#         • anti-boucle temporelle (1 reload / 90 min)
#         • blocage après 5 tentatives consécutives
#     - Réinitialisation automatique du compteur dès retour
#       de données fraîches
#     - Notifications explicites selon succès, échec ou blocage
#
#  ✅ CONTRAINTES
#     - Aucune logique métier déportée ici
#     - Aucune dépendance à la présence ou au contexte utilisateur
#     - Comportement déterministe, stable après redémarrage HA
# ==========================================================


- id: "1012000000008"
  alias: "Netatmo – Relance intégration (auto)"
  description: >
    Recharge automatiquement l’intégration Netatmo si aucune donnée
    n’a été mise à jour depuis plus de 60 minutes. Évite les boucles
    en limitant la fréquence des reloads et le nombre de tentatives.
  mode: single
  max_exceeded: silent

  trigger:
    - platform: time_pattern
      minutes: "/10"

  variables:
    tentative: "{{ states('input_number.netatmo_reload_tentatives') | int(0) }}"

    dernier_reload: >
      {{ state_attr('automation.netatmo_relance_integration_auto', 'last_triggered')
         | default(0)
         | as_timestamp }}

    temps_ecoule: >
      {{ (as_timestamp(now()) - dernier_reload) / 60 | float(9999) }}

    blocage: "{{ tentative >= 5 }}"
    anti_spam: "{{ temps_ecoule < 90 }}"

  condition:
    - condition: template
      alias: "Données Netatmo figées"
      value_template: >
        {{ states('sensor.netatmo_age_donnees') | float(0) >= 60 }}

    # ⛔ Stop si on est en backoff ou blocage
    - condition: template
      value_template: >
        {{ not blocage and not anti_spam }}

  action:
    - variables:
        prochain_delai: >
          {% set base = [ (tentative + 1) * 10, 60 ] | min %}
          {{ base }}

    # 📈 Incrément tentative
    - service: input_number.set_value
      target:
        entity_id: input_number.netatmo_reload_tentatives
      data:
        value: "{{ tentative + 1 }}"

    # 🔧 Rechargement de l’intégration
    - service: homeassistant.reload_config_entry
      data:
        entry_id: !secret netatmo_entry_id

    # 🕦 Attente puis contrôle
    - delay: "00:02:00"

    - choose:

        # ✅ Succès : remise à zéro
        - conditions: >
            {{ states('sensor.netatmo_age_donnees') | float(999) < 10 }}
          sequence:
            - service: input_number.set_value
              target:
                entity_id: input_number.netatmo_reload_tentatives
              data:
                value: 0

            - service: script.notification_envoyer
              data:
                cible: input_text.telephone_antoine_notify
                titre: "✅ Netatmo relancé"
                message: >
                  {{ now().strftime('%d/%m %H:%M') }}  
                  Données à nouveau fraîches après reload automatique.

        # 🚨 Échec mais pas encore bloqué
        - conditions: >
            {{ tentative + 1 < 5 }}
          sequence:
            - service: script.notification_envoyer
              data:
                cible: input_text.telephone_antoine_notify
                titre: "🚨 Relance Netatmo échouée"
                message: >
                  {{ now().strftime('%d/%m %H:%M') }}  
                  Tentative n°{{ tentative + 1 }} échouée.  
                  Nouvelle tentative prévue dans ~{{ prochain_delai }} min.

        # 🧱 Blocage après 5 tentatives
        - conditions: >
            {{ tentative + 1 >= 5 }}
          sequence:
            - service: script.notification_envoyer
              data:
                cible: input_text.telephone_antoine_notify
                titre: "⛔ Blocage sécurité Netatmo"
                message: >
                  {{ now().strftime('%d/%m %H:%M') }}  
                  5 tentatives de relance infructueuses.  
                  Arrêt automatique du script jusqu’à retour des données Netatmo.