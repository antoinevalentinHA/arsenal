# ==========================================================
#  AUTOMATION : Voiture – Enregistrement autonomie pleine charge (local)
#  ----------------------------------------------------------
#  🧠 Rôle :
#     Enregistrer automatiquement l’autonomie maximale
#     lors d’une charge complète du véhicule Audi e-tron.
#
#  💡 Avantages :
#     - Fonctionne même sans connexion Audi Cloud
#     - Mise à jour uniquement en charge complète
#     - Évite les doublons de mesures
#     - Notification immédiate sur le smartphone
#
#  ⚙️ Comportement :
#     - Si batterie ≥ 99 % →
#       mise à jour + notification mobile.
#
#  ✅ Compatibilité : Home Assistant 2024.8+
# ==========================================================

- id: '1015000000001'
  alias: Voiture - Enregistrement autonomie
  description: >
    Met à jour input_number.autonomie_audi_etron_full uniquement si la batterie est ≥ 99 %
    et que l’autonomie locale a changé depuis le dernier enregistrement.
    Envoie aussi une notification sur le téléphone.
  mode: single

  # ======================================================
  # 🔔 Déclencheur — Variation du niveau de batterie (local)
  # ======================================================
  trigger:
    - platform: state
      entity_id: sensor.audi_e_tron_pourcentage_moteur_principal_local

  # ======================================================
  # ✅ Condition — Batterie pleine
  # ======================================================
  condition:
    - condition: template
      value_template: >
        {{ states('sensor.audi_e_tron_pourcentage_moteur_principal_local') | float(0) >= 99 }}

  # ======================================================
  # 🔄 Actions — Mise à jour + Notification
  # ======================================================
  action:
    - service: input_number.set_value
      target:
        entity_id: input_number.autonomie_audi_etron_full
      data:
        value: "{{ states('sensor.audi_e_tron_autonomie_local') | float(0) }}"

    - service: script.notification_envoyer
      data:
        cible: input_text.telephone_antoine_notify
        titre: "🔋 Charge terminée (local)"
        message: >
          Batterie à {{ states('sensor.audi_e_tron_pourcentage_moteur_principal_local') }} %.
          Autonomie estimée : {{ states('sensor.audi_e_tron_autonomie_local') }} km.
