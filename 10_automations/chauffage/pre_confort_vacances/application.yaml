# ==========================================================
# 🔥 AUTOMATION — Chauffage — Pré-confort Vacances
# ----------------------------------------------------------
# 🧠 Rôle :
#   Appliquer strictement le mode Confort chauffage
#   en fonction de l’état du capteur "Pré-confort actif"
#   lors d’un retour de vacances programmé.
#
# 🧩 Périmètre :
#   - Active le Confort lorsque pré_confort_actif = on
#   - Désactive le Confort lorsque pré_confort_actif = off
#   - Uniquement en mode maison = Vacances
#
# 🔗 Dépendances :
#   - binary_sensor.pre_confort_actif
#   - input_select.mode_maison
#   - input_boolean.mode_confort_chauffage
#
# 🚫 Interdits / Ne fait pas :
#   - N’interagit pas avec la Décision Centrale Chauffage
#   - N’implique aucune logique thermique
#   - Ne simule aucune présence
#   - N’impacte ni alarme ni ECS
#
# 🧠 Statut architectural :
#   Application directe — Autorité locale temporaire
#
# 🏷️ Statut :
#   Arsenal — Socle
# ==========================================================

- id: "10240000000016"
  alias: "Chauffage — Pré-confort Vacances"
  description: "Application stricte du mode Confort chauffage lors du préchauffage de retour de vacances"
  mode: single

  trigger:
    - platform: state
      entity_id: binary_sensor.pre_confort_actif

  action:
    - choose:

        # --------------------------------------------------
        # 🔥 Activation Confort (pré-confort actif)
        # --------------------------------------------------
        - conditions:
            - condition: template
              value_template: >
                {{ is_state('input_select.mode_maison', 'Vacances')
                   and is_state('binary_sensor.pre_confort_actif', 'on') }}
          sequence:
            - service: input_boolean.turn_on
              target:
                entity_id: input_boolean.mode_confort_chauffage

        # --------------------------------------------------
        # ❄️ Désactivation Confort (fin pré-confort)
        # --------------------------------------------------
        - conditions:
            - condition: template
              value_template: >
                {{ is_state('input_select.mode_maison', 'Vacances')
                   and is_state('binary_sensor.pre_confort_actif', 'off') }}
          sequence:
            - service: input_boolean.turn_off
              target:
                entity_id: input_boolean.mode_confort_chauffage
