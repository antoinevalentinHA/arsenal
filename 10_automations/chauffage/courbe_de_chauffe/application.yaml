# ==========================================================
#  🧠 ARSENAL — AUTOMATION :
#     Chauffage – Application des ajustements manuels de courbe
#
#  ID : 10240000000008
# ----------------------------------------------------------
#  🎯 RÔLE
#     Appliquer sur la chaudière Viessmann les ajustements
#     manuels de la courbe de chauffe (pente ou parallèle)
#     réalisés par l’utilisateur via les sliders de l’UI.
#
#     Cette automation agit comme un pont fiable entre
#     l’intention utilisateur et l’exécution ViCare.
#
#  🚫 NE FAIT PAS
#     - Ne calcule aucune valeur de pente ou de parallèle
#     - Ne décide pas d’un ajustement automatique
#     - Ne modifie pas la logique thermique du système
#
#  🧩 UTILISATION
#     - Déclenchement :
#         • modification d’un input_number de consigne
#           (pente ou parallèle)
#     - Condition :
#         • API ViCare disponible
#     - Action :
#         • appel du script dédié correspondant à
#           l’input modifié
#     - Délégation complète de la robustesse aux scripts
#
#  ✅ CONTRAINTES
#     - Aucune dépendance aux entités number.* cloud ViCare
#     - Aucune temporisation ou logique de retry ici
#     - Automation strictement réactive à l’action utilisateur
# ==========================================================


- id: "10240000000008"
  alias: "Chauffage – Appliquer pente ou parallèle"
  description: >
    Déclenche la mise à jour de la pente ou du parallèle de la courbe
    de chauffe via les scripts dédiés, uniquement si l'API ViCare est disponible.
  mode: single

  # ======================================================
  # 🔔 Déclencheur — slider modifié dans l’UI
  # ======================================================
  trigger:
    - platform: state
      entity_id:
        - input_number.chauffage_pente_consigne
        - input_number.chauffage_parallele_consigne

  # ======================================================
  # 🧿 Condition — API ViCare disponible (reload-safe)
  # ======================================================
  condition:
    - condition: template
      value_template: >
        {{ is_state('binary_sensor.vicare_api_disponible', 'on') }}

  # ======================================================
  # 🎯 Action — Appel du bon script selon l’input modifié
  # ======================================================
  action:
    - choose:

        # 🟩 Si modification pente
        - conditions:
            - condition: template
              value_template: >
                {{ trigger.entity_id == 'input_number.chauffage_pente_consigne' }}
          sequence:
            - service: script.chauffage_appliquer_pente

        # 🟦 Si modification parallèle
        - conditions:
            - condition: template
              value_template: >
                {{ trigger.entity_id == 'input_number.chauffage_parallele_consigne' }}
          sequence:
            - service: script.chauffage_appliquer_parallele
