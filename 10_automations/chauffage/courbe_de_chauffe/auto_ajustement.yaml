# ==========================================================
#  🧠 ARSENAL — AUTOMATION :
#     Chauffage – Décision d’auto-ajustement de la courbe
#
#  ID : 10240000000009
# ----------------------------------------------------------
#  🎯 RÔLE
#     Décider, tracer et figer les ajustements de la courbe
#     de chauffe (pente et parallèle) à partir des suggestions
#     issues des capteurs Arsenal.
#
#     Cette automation matérialise la décision (réelle ou
#     simulée), puis délègue l’exécution aux scripts dédiés.
#
#  🧱 PRINCIPE ARSENAL
#     - Les capteurs suggèrent (calculs en amont)
#     - Les input_number figent la décision
#     - La journalisation est immédiate et non bloquante
#     - Les scripts exécutent sans décider
#
#  🚫 NE FAIT PAS
#     - Ne calcule pas les suggestions (déjà produites ailleurs)
#     - Ne pilote pas directement la chaudière
#     - Ne décide pas en dehors du cadre auto-ajustement autorisé
#
#  🧩 UTILISATION
#     - Déclenchement :
#         • exécution planifiée quotidienne
#     - Pré-requis :
#         • auto-ajustement activé
#         • API ViCare disponible
#         • maison en mode Normal
#         • au moins une correction suggérée
#     - Modes :
#         • simulation : traçage et notification sans écriture
#         • réel : figer → tracer → exécuter via scripts blindés
#
#  ✅ CONTRAINTES
#     - Décision centralisée, exécution découplée
#     - Respect des garde-fous thermiques existants
#     - Comportement déterministe et traçable
# ==========================================================

- id: "10240000000009"
  alias: "Chauffage – Décision auto-ajustement courbe"
  description: >
    Ajuste (ou simule) la pente et le parallèle de la courbe de chauffe
    selon les valeurs suggérées, avec traçabilité immédiate et
    exécution découplée.
  mode: single

  trigger:
    - platform: time
      at: "10:00:00"

  condition:

    - condition: template
      value_template: >
        {{ is_state('input_boolean.chauffage_reglages_auto', 'on') }}

    - condition: template
      value_template: >
        {{ is_state('binary_sensor.vicare_api_disponible', 'on') }}

    - condition: template
      value_template: >
        {{ is_state('input_select.mode_maison', 'Normal') }}

    # Garde-fou : suggestions disponibles et numériques
    - condition: template
      value_template: >
        {% set ps = states('sensor.chauffage_pente_suggeree') %}
        {% set pas = states('sensor.chauffage_parallele_suggeree') %}
        {{ ps not in ['unknown','unavailable','none',''] and pas not in ['unknown','unavailable','none',''] }}

    # Au moins une correction suggérée (comparaison float)
    - condition: template
      value_template: >
        {{ states('sensor.chauffage_pente_suggeree') | float
           != states('input_number.chauffage_pente_consigne') | float
           or states('sensor.chauffage_parallele_suggeree') | float
           != states('input_number.chauffage_parallele_consigne') | float }}

  action:

    - variables:
        pente_actuelle: "{{ states('input_number.chauffage_pente_consigne') | float }}"
        pente_suggeree: "{{ states('sensor.chauffage_pente_suggeree') | float }}"
        parallele_actuel: "{{ states('input_number.chauffage_parallele_consigne') | float }}"
        parallele_suggeree: "{{ states('sensor.chauffage_parallele_suggeree') | float }}"
        simulation: "{{ is_state('input_boolean.courbe_auto_simulation', 'on') }}"

        apply_pente: >
          {{ pente_suggeree != pente_actuelle
             and (pente_suggeree > pente_actuelle
                  or (pente_suggeree < pente_actuelle
                      and is_state('binary_sensor.poele_en_fonction_stable', 'off'))) }}

        apply_parallele: >
          {{ parallele_suggeree != parallele_actuel
             and (parallele_suggeree > parallele_actuel
                  or (parallele_suggeree < parallele_actuel
                      and is_state('binary_sensor.poele_en_fonction_stable', 'off'))) }}

    - choose:

        - conditions:
            - condition: template
              value_template: "{{ simulation }}"
          sequence:

            - service: logbook.log
              data:
                name: "Chauffage"
                message: >
                  🧪 Simulation auto-ajustement :
                  pente {{ pente_actuelle }} → {{ pente_suggeree }},
                  parallèle {{ parallele_actuel }} → {{ parallele_suggeree }}

            - event: chauffage_adjustment
              event_data:
                mode: "simulation"
                pente_before: "{{ pente_actuelle }}"
                pente_after: "{{ pente_suggeree }}"
                para_before: "{{ parallele_actuel }}"
                para_after: "{{ parallele_suggeree }}"
                timestamp: "{{ now().strftime('%d/%m %H:%M') }}"

            - service: persistent_notification.create
              data:
                title: "🤖 Simulation auto-ajustement chauffage"
                message: >
                  Mode auto actif (simulation).

                  Ajustements proposés :
                  • Pente : {{ pente_actuelle }} → {{ pente_suggeree }}
                  • Parallèle : {{ parallele_actuel }} → {{ parallele_suggeree }}

                  Aucun changement n'a été appliqué.

        - conditions:
            - condition: template
              value_template: "{{ not simulation }}"
          sequence:

            - choose:
                - conditions: >
                    {{ apply_pente }}
                  sequence:
                    - service: input_number.set_value
                      target:
                        entity_id: input_number.chauffage_pente_consigne
                      data:
                        value: "{{ pente_suggeree }}"

            - choose:
                - conditions: >
                    {{ apply_parallele }}
                  sequence:
                    - service: input_number.set_value
                      target:
                        entity_id: input_number.chauffage_parallele_consigne
                      data:
                        value: "{{ parallele_suggeree }}"

            - service: logbook.log
              data:
                name: "Chauffage"
                message: >
                  🔧 Auto-ajustement décidé :
                  pente {{ pente_actuelle }} → {{ pente_suggeree }} ({{ 'appliqué' if apply_pente else 'refusé' }}),
                  parallèle {{ parallele_actuel }} → {{ parallele_suggeree }} ({{ 'appliqué' if apply_parallele else 'refusé' }})

            - event: chauffage_adjustment
              event_data:
                mode: "real"
                pente_before: "{{ pente_actuelle }}"
                pente_after: "{{ pente_suggeree }}"
                para_before: "{{ parallele_actuel }}"
                para_after: "{{ parallele_suggeree }}"
                pente_applied: "{{ apply_pente }}"
                para_applied: "{{ apply_parallele }}"
                timestamp: "{{ now().strftime('%d/%m %H:%M') }}"