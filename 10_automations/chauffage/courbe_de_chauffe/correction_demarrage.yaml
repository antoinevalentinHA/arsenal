# ==========================================================
#  🧠 ARSENAL — AUTOMATION :
#     Chauffage – Reappliquer courbe au demarrage
#
#  ID : 10240000000010
# ----------------------------------------------------------
#  🎯 ROLE
#     Reappliquer au demarrage les consignes locales Arsenal
#     de pente et de parallele de la courbe de chauffe.
#
#     Cette automation ne verifie aucune divergence externe.
#     Elle reafﬁrme simplement les references locales
#     apres stabilisation du systeme.
#
#  🚫 NE FAIT PAS
#     - Ne decide aucun ajustement de courbe
#     - Ne calcule aucune valeur thermique
#     - Ne lit aucune valeur cloud
#     - Ne compare aucune valeur locale/externe
#
#  🧩 UTILISATION
#     - Declenchement :
#         • passage du systeme a l'etat stable post-demarrage
#     - Traitement :
#         • validation minimale des consignes locales
#         • appel des scripts executifs locaux dedies
#     - Objectif :
#         • reaffirmer la configuration Arsenal
#           apres redemarrage de Home Assistant
#
#  ✅ CONTRAINTES
#     - Reapplication unidirectionnelle locale
#     - Delegation complete de l'execution aux scripts boiler bridge
#     - Aucune dependance a ViCare
#     - Aucune logique de synchronisation
# ==========================================================

- id: "10240000000010"
  alias: "Chauffage – Reappliquer courbe au demarrage"
  description: >
    Reapplique au demarrage les consignes locales de pente
    et de parallele de la courbe de chauffe apres stabilisation
    du systeme, via boiler bridge.
  mode: single

  trigger:
    - platform: state
      entity_id: input_boolean.systeme_stable
      to: "on"

  action:
    - variables:
        pente_cible_raw: "{{ states('input_number.chauffage_pente_consigne') }}"
        parallele_cible_raw: "{{ states('input_number.chauffage_parallele_consigne') }}"

        pente_disponible: >
          {{ pente_cible_raw not in ['unknown', 'unavailable', 'none', ''] }}

        parallele_disponible: >
          {{ parallele_cible_raw not in ['unknown', 'unavailable', 'none', ''] }}

    - choose:
        - conditions:
            - condition: template
              value_template: >
                {{ pente_disponible or parallele_disponible }}
          sequence:
            - service: logbook.log
              data:
                name: "Chauffage"
                message: >
                  🔄 Reapplication courbe au demarrage :
                  pente={{ pente_cible_raw }},
                  parallele={{ parallele_cible_raw }}

    - choose:
        - conditions:
            - condition: template
              value_template: "{{ pente_disponible }}"
          sequence:
            - service: script.chauffage_appliquer_pente

    - choose:
        - conditions:
            - condition: template
              value_template: "{{ parallele_disponible }}"
          sequence:
            - service: script.chauffage_appliquer_parallele