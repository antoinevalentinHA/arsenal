# ==========================================================
#  🧠 ARSENAL — AUTOMATION :
#     Chauffage – Réappliquer courbe au démarrage
#
#  ID : 10240000000010
# ----------------------------------------------------------
#  🎯 ROLE
#     Réappliquer au démarrage les consignes locales Arsenal
#     de pente et de parallèle de la courbe de chauffe.
#
#     Cette automation ne vérifie aucune divergence externe.
#     Elle réafﬁrme simplement les references locales
#     après stabilisation du système.
#
#  🚫 NE FAIT PAS
#     - Ne décide aucun ajustement de courbe
#     - Ne calcule aucune valeur thermique
#     - Ne lit aucune valeur cloud
#     - Ne compare aucune valeur locale/externe
#
#  🧩 UTILISATION
#     - Déclenchement :
#         • passage du système à l'état stable post-démarrage
#     - Traitement :
#         • validation minimale des consignes locales
#         • appel des scripts exécutifs locaux dédiés
#     - Objectif :
#         • réaffirmer la configuration Arsenal
#           apres redémarrage de Home Assistant
#
#  ✅ CONTRAINTES
#     - Réapplication unidirectionnelle locale
#     - Délégation complète de l'exécution aux scripts boiler bridge
#     - Aucune logique de synchronisation
# ==========================================================

- id: "10240000000010"
  alias: "Chauffage – Réappliquer courbe au demarrage"
  description: >
    Réapplique au démarrage les consignes locales de pente
    et de parallèle de la courbe de chauffe après stabilisation
    du système, via boiler bridge.
  mode: single

  trigger:
    - platform: state
      entity_id: input_boolean.systeme_stable
      to: "on"

  action:
    - variables:
        pente_cible_raw: "{{ states('input_number.chauffage_pente_consigne') }}"
        parallele_cible_raw: "{{ states('input_number.chauffage_parallele_consigne') }}"

        pente_disponible: >
          {{ pente_cible_raw not in ['unknown', 'unavailable', 'none', ''] }}

        parallele_disponible: >
          {{ parallele_cible_raw not in ['unknown', 'unavailable', 'none', ''] }}

    - choose:
        - conditions:
            - condition: template
              value_template: >
                {{ pente_disponible or parallele_disponible }}
          sequence:
            - service: logbook.log
              data:
                name: "Chauffage"
                message: >
                  🔄 Réapplication courbe au demarrage :
                  pente={{ pente_cible_raw }},
                  parallele={{ parallele_cible_raw }}

    - choose:
        - conditions:
            - condition: template
              value_template: "{{ pente_disponible }}"
          sequence:
            - service: script.chauffage_appliquer_pente

    - choose:
        - conditions:
            - condition: template
              value_template: "{{ parallele_disponible }}"
          sequence:
            - service: script.chauffage_appliquer_parallele