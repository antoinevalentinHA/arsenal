# ==========================================================
#  🧠 ARSENAL — AUTOMATION :
#     Chauffage – Resynchronisation courbe au redémarrage
#
#  ID : 10240000000010
# ----------------------------------------------------------
#  🎯 RÔLE
#     Restaurer la cohérence entre les consignes locales
#     (pente et parallèle de la courbe de chauffe) et
#     l’état cloud ViCare après un redémarrage de
#     Home Assistant.
#
#     Cette automation garantit que la chaudière applique
#     bien les valeurs de référence décidées par ARSENAL.
#
#  🚫 NE FAIT PAS
#     - Ne décide aucun ajustement de courbe
#     - Ne calcule aucune valeur thermique
#     - Ne s’exécute pas si l’API ViCare est indisponible
#
#  🧩 UTILISATION
#     - Déclenchement :
#         • passage du système à l’état stable post-démarrage
#     - Pré-requis :
#         • API ViCare disponible
#     - Traitement :
#         • comparaison consignes locales ↔ valeurs cloud
#         • appel des scripts dédiés uniquement en cas d’écart
#     - Objectif :
#         • restitution fidèle de la configuration ARSENAL
#
#  ✅ CONTRAINTES
#     - Synchronisation unidirectionnelle (local → cloud)
#     - Délégation complète de l’exécution aux scripts ViCare
#     - Aucune dépendance aux entités climate ou états transitoires
# ==========================================================

- id: "10240000000010"
  alias: "Chauffage – Sync courbe démarrage"
  description: >
    Remet les valeurs de pente et de décalage de la courbe de chauffe
    au démarrage de Home Assistant, si l’API Viessmann est disponible
    et si le cloud diverge de la consigne locale.
  mode: single

  trigger:
    - platform: state
      entity_id: input_boolean.systeme_stable
      to: "on"

  action:

    - condition: state
      entity_id: binary_sensor.vicare_api_disponible
      state: "on"

    - variables:
        pente_cible_raw: "{{ states('input_number.chauffage_pente_consigne') }}"
        parallele_cible_raw: "{{ states('input_number.chauffage_parallele_consigne') }}"
        pente_cloud_raw: "{{ states('number.vscotho1_200_11_heating_curve_slope') }}"
        parallele_cloud_raw: "{{ states('number.vscotho1_200_11_decalage_de_la_courbe_de_chauffe') }}"
        tolerance: 0.01

        valeurs_disponibles: >
          {{ pente_cible_raw not in ['unknown','unavailable','none','']
             and parallele_cible_raw not in ['unknown','unavailable','none','']
             and pente_cloud_raw not in ['unknown','unavailable','none','']
             and parallele_cloud_raw not in ['unknown','unavailable','none',''] }}

    - condition: template
      value_template: "{{ valeurs_disponibles }}"

    - variables:
        pente_cible: "{{ pente_cible_raw | float }}"
        parallele_cible: "{{ parallele_cible_raw | float }}"
        pente_cloud: "{{ pente_cloud_raw | float }}"
        parallele_cloud: "{{ parallele_cloud_raw | float }}"

        pente_a_modifier: "{{ (pente_cible - pente_cloud) | abs > tolerance }}"
        parallele_a_modifier: "{{ (parallele_cible - parallele_cloud) | abs > tolerance }}"

    - choose:
        - conditions:
            - condition: template
              value_template: "{{ pente_a_modifier or parallele_a_modifier }}"
          sequence:
            - service: logbook.log
              data:
                name: "Chauffage"
                message: >
                  🔄 Sync courbe démarrage :
                  pente {{ pente_cloud }} → {{ pente_cible }},
                  parallèle {{ parallele_cloud }} → {{ parallele_cible }}

    - choose:
        - conditions:
            - condition: template
              value_template: "{{ pente_a_modifier }}"
          sequence:
            - service: script.chauffage_appliquer_pente

    - choose:
        - conditions:
            - condition: template
              value_template: "{{ parallele_a_modifier }}"
          sequence:
            - service: script.chauffage_appliquer_parallele