# ==========================================================
#  🧠 ARSENAL — AUTOMATION :
#     Chauffage – Journalisation des auto-ajustements
#
#  ID : 10240000000011
# ----------------------------------------------------------
#  🎯 RÔLE
#     Capturer chaque événement `chauffage_adjustment`
#     (simulation ou décision réelle) et le transformer
#     en une ligne lisible, stockée dans un helper texte
#     dédié.
#
#     Cette automation assure une traçabilité immédiate
#     et synthétique des décisions d’auto-ajustement.
#
#  🚫 NE FAIT PAS
#     - Ne décide aucun ajustement
#     - Ne modifie aucune consigne de chauffage
#     - Ne pilote pas la chaudière
#
#  🧩 UTILISATION
#     - Déclenchement :
#         • réception d’un événement `chauffage_adjustment`
#     - Traitement :
#         • extraction sécurisée des données événementielles
#         • construction d’une ligne compacte et lisible
#         • écriture dans un helper de mémoire
#     - Format :
#         • horodatage • mode (simulation/réel)
#           • pente avant→après • parallèle avant→après
#
#  ✅ CONTRAINTES
#     - Automation purement documentaire
#     - Tolérance aux champs manquants (fallback propre)
#     - Stockage volontairement limité au dernier événement
# ==========================================================

- id: "10240000000011"
  alias: "Chauffage - Logger auto-ajustement"
  description: >
    Transforme l'événement chauffage_adjustment en une ligne
    lisible et la stocke dans un helper dédié.
  mode: single

  trigger:
    - platform: event
      event_type: chauffage_adjustment

  action:

    - variables:
        mode_evt: >
          {% set v = trigger.event.data.mode if trigger.event.data.mode is defined else none %}
          {{ v if v|string not in ['','none','null'] else 'inconnu' }}

        timestamp: >
          {% set t = trigger.event.data.timestamp if trigger.event.data.timestamp is defined else none %}
          {% if t is not none and t|string not in ['','none','null'] %}
            {{ t }}
          {% else %}
            {{ now().strftime("%d/%m %H:%M") }}
          {% endif %}

        pente_before_raw: "{{ trigger.event.data.pente_before if trigger.event.data.pente_before is defined else none }}"
        pente_after_raw: "{{ trigger.event.data.pente_after if trigger.event.data.pente_after is defined else none }}"
        para_before_raw: "{{ trigger.event.data.para_before if trigger.event.data.para_before is defined else none }}"
        para_after_raw: "{{ trigger.event.data.para_after if trigger.event.data.para_after is defined else none }}"

        pente_before: >
          {% set v = pente_before_raw %}
          {{ (v | float | round(2)) if v is not none and v|string not in ['','none','null','unknown','unavailable','?'] else '?' }}

        pente_after: >
          {% set v = pente_after_raw %}
          {{ (v | float | round(2)) if v is not none and v|string not in ['','none','null','unknown','unavailable','?'] else '?' }}

        para_before: >
          {% set v = para_before_raw %}
          {{ (v | float | round(2)) if v is not none and v|string not in ['','none','null','unknown','unavailable','?'] else '?' }}

        para_after: >
          {% set v = para_after_raw %}
          {{ (v | float | round(2)) if v is not none and v|string not in ['','none','null','unknown','unavailable','?'] else '?' }}

    - variables:
        ligne: >
          {{ timestamp }} • {{ mode_evt }} •
          pente {{ pente_before }}→{{ pente_after }} •
          para {{ para_before }}→{{ para_after }}

    - service: input_text.set_value
      target:
        entity_id: input_text.chauffage_last_adjustment
      data:
        value: "{{ ligne }}"