# ==========================================================
# 🧠 ARSENAL — AUTOMATION :
#     Chauffage — Armement retry transactionnel
#
#  ID : 10240000000022
# ----------------------------------------------------------
#  🎯 ROLE
#     Armer un retry chauffage apres une premiere tentative
#     terminee en timeout, corrélé bridge ou local HA.
#
#  🧱 PRINCIPE
#     - uniquement si timeout (ACK corrélé ou local HA)
#     - uniquement si aucun retry deja en cours
#     - jamais sur rejected / applied / aborted
#     - jamais sur abort local (aucun ACK emis)
#
#  🔐 LOGIQUE timeout_kind
#     Cas 1 — timeout corrélé :
#       ack_request_id == attempt1_id ET ack_status == 'timeout'
#     Cas 2 — timeout local HA :
#       aucun ACK terminal corrélé reçu (ack_request_id != attempt1_id
#       ou ack_status non terminal) ET ack_status != 'applied'
#     Cas none (pas de retry) :
#       ack_request_id == attempt1_id ET ack_status in
#       ['applied', 'rejected', 'aborted'] — conclusion propre, pas de retry
#
#  🔒 GARANTIES
#     - request_id de tentative 1 conserve pour traçabilité
#     - timer direct si bridge online
#     - attente du retour bridge sinon
#     - durée timer portee par la definition de l'entite (30s)
#     - compteur retry_count NON incrementé ici — incrementé dans 24
#       au moment de l'invocation effective de la tentative 2
#
#  📦 DEPENDANCES
#     - input_text.boiler_req_heating_set_temperature
#     - input_number.chauffage_retry_count
#     - input_boolean.chauffage_retry_pending
#     - input_text.chauffage_retry_attempt1_id
#     - input_select.chauffage_mode_session
#     - sensor.boiler_ack_heating_set_temperature_request_id
#     - sensor.boiler_ack_heating_set_temperature_status
#     - binary_sensor.boiler_bridge_online
#     - timer.chauffage_retry (duration: 30s en config)
# ==========================================================

- id: "10240000000022"
  alias: "Chauffage — Armement retry transactionnel"
  description: >
    Arme un retry chauffage apres timeout de la tentative 1.
    Distingue timeout corrélé et timeout local HA.
  mode: single

  trigger:
    - platform: state
      entity_id: input_text.boiler_req_heating_set_temperature
      to: ""

  condition:
    # Le helper avait bien une valeur non vide — transaction réelle
    - condition: template
      value_template: >
        {{
          trigger.from_state is not none
          and trigger.from_state.state not in ['', 'unknown', 'unavailable']
        }}

    # Pas encore de retry en cours
    - condition: numeric_state
      entity_id: input_number.chauffage_retry_count
      below: 1

    - condition: state
      entity_id: input_boolean.chauffage_retry_pending
      state: "off"

    # Intention sessionnelle valide
    - condition: template
      value_template: >
        {{ states('input_select.chauffage_mode_session') in ['confort', 'reduite'] }}

  action:
    - variables:
        attempt1_id: "{{ trigger.from_state.state }}"
        ack_request_id: "{{ states('sensor.boiler_ack_heating_set_temperature_request_id') }}"
        ack_status: "{{ states('sensor.boiler_ack_heating_set_temperature_status') }}"

        # Qualification du type de timeout
        # none = conclusion propre (applied/rejected/aborted sur la bonne transaction)
        #        → pas de retry
        # timeout_correle = ACK timeout corrélé reçu du bridge
        # timeout_local_HA = aucun ACK terminal corrélé reçu dans le délai HA
        #
        # IMPORTANT : aborted est explicitement exclu (même branche que
        # applied/rejected) — un aborted ne justifie jamais un retry automatique.
        # IMPORTANT : ack_request_id != attempt1_id + ack_status == 'applied'
        # → pas de retry car une autre transaction a réussi entretemps.
        timeout_kind: >
          {% if ack_request_id == attempt1_id and ack_status == 'timeout' %}
            timeout_correle
          {% elif ack_request_id == attempt1_id and ack_status in ['applied', 'rejected', 'aborted'] %}
            none
          {% elif ack_request_id != attempt1_id and ack_status == 'applied' %}
            none
          {% else %}
            timeout_local_HA
          {% endif %}

    - choose:
        - conditions:
            - condition: template
              value_template: "{{ timeout_kind != 'none' }}"
          sequence:
            # NB : retry_count n'est PAS incrémenté ici.
            # Il sera incrémenté dans 10240000000024 (declenchement.yaml)
            # juste avant l'invocation effective du script exécutif.
            # Sémantique : retry_count == nombre de tentatives 2 réellement exécutées.

            - service: input_boolean.turn_on
              target:
                entity_id: input_boolean.chauffage_retry_pending

            - service: input_text.set_value
              target:
                entity_id: input_text.chauffage_retry_attempt1_id
              data:
                value: "{{ attempt1_id }}"

            - service: system_log.write
              data:
                level: warning
                message: >
                  Chauffage retry arme — type={{ timeout_kind }},
                  attempt1_id={{ attempt1_id }},
                  bridge={{ states('binary_sensor.boiler_bridge_online') }}

            - choose:
                - conditions:
                    - condition: state
                      entity_id: binary_sensor.boiler_bridge_online
                      state: "on"
                  sequence:
                    - service: timer.start
                      target:
                        entity_id: timer.chauffage_retry
              # Si bridge offline : pas de timer — reprise_online.yaml prend le relais
