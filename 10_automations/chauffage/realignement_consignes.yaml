# ==========================================================
# 🧠 ARSENAL — AUTOMATION
#     Réalignement consignes ViCare HA (Confort / Réduite)
#
#  ID : 10240000000016
# ----------------------------------------------------------
#  🎯 RÔLE
#
#     Automation de garde de souveraineté post-synchronisation ViCare.
#
#     Cette automation garantit que les consignes matérielles réelles
#     côté ViCare restent strictement alignées sur les références
#     souveraines Home Assistant (HA maître), portées par :
#
#       - input_number.chauffage_consigne_confort
#       - input_number.chauffage_consigne_reduite
#
#     Elle ne prend AUCUNE décision thermique.
#     Elle ne fait que corriger une divergence passive injectée par ViCare.
#
#  🧩 PÉRIMÈTRE
#
#     - Déclenchée exclusivement sur :
#         • binary_sensor.chauffage_incoherence_consigne_confort_vicare_ha
#         • binary_sensor.chauffage_incoherence_consigne_reduite_vicare_ha
#         • input_boolean.systeme_stable (démarrage HA)
#
#     - Entités lues :
#         • sensor.chauffage_consigne_confort_local
#         • sensor.chauffage_consigne_reduced_local
#         • input_number.chauffage_consigne_confort
#         • input_number.chauffage_consigne_reduite
#         • binary_sensor.vicare_api_disponible
#         • input_boolean.chauffage_application_en_cours
#
#     - Scripts appelés :
#         • script.chauffage_appliquer_consigne_confort
#         • script.chauffage_appliquer_consigne_reduite
#
#  🚫 INTERDITS
#
#     - Aucune décision locale
#     - Aucun appel direct à climate.*
#     - Aucune modification des input_number souverains
#     - Aucun autre trigger que ceux listés ci-dessus
#     - Aucune logique métier (présence, blocage, seuil, hystérésis)
#
#  🧠 NATURE ARCHITECTURALE
#
#     - Type : Garde de cohérence (consignes)
#     - Statut : Invariant défensif
#     - Autorité : Subordonnée à la Décision Centrale Chauffage
#
# ==========================================================

- id: "10240000000018"
  alias: "Réalignement consignes ViCare HA"
  mode: single

  trigger:

    # 🔴 Détection d’incohérence consigne Confort (ViCare / HA)
    - platform: state
      entity_id: binary_sensor.chauffage_incoherence_consigne_confort_vicare_ha
      to: "on"

    # 🔴 Détection d’incohérence consigne Réduite (ViCare / HA)
    - platform: state
      entity_id: binary_sensor.chauffage_incoherence_consigne_reduite_vicare_ha
      to: "on"

    # 🚀 Stabilisation Home Assistant
    - platform: state
      entity_id: input_boolean.systeme_stable
      to: "on"

  action:

    # ======================================================
    # ⏱️ ETAPE 1 : DELAI DE STABILISATION POST-SYNCHRONISATION
    # ------------------------------------------------------
    # Laisser ViCare terminer la rafale de resynchronisation
    # avant toute action défensive.
    # ======================================================
    - delay: "00:00:10"

    # ======================================================
    # 🛑 ETAPE 2 : GARDE GLOBALE — VERROU APPLICATION EN COURS
    # ------------------------------------------------------
    # Si une application de consigne est en cours,
    # cette automation est strictement interdite d’agir.
    # ======================================================
    - condition: template
      value_template: >
        {{ states('input_boolean.chauffage_application_en_cours') != 'on' }}

    # ======================================================
    # 🧠 ETAPE 3 : DETECTION ET CORRECTION DE DIVERGENCE
    # ------------------------------------------------------
    # Aucune décision, uniquement restauration de cohérence.
    # ======================================================
    - choose:

        # --------------------------------------------------
        # 🔴 CAS 1 — Divergence consigne Confort persistante
        # --------------------------------------------------
        - conditions:
            - condition: template
              value_template: >
                {{ states('binary_sensor.vicare_api_disponible') == 'on' }}
            - condition: template
              value_template: >
                {{ states('binary_sensor.chauffage_incoherence_consigne_confort_vicare_ha') == 'on' }}
          sequence:
            - service: script.chauffage_appliquer_consigne_confort


        # --------------------------------------------------
        # 🔴 CAS 2 — Divergence consigne Réduite persistante
        # --------------------------------------------------
        - conditions:
            - condition: template
              value_template: >
                {{ states('binary_sensor.vicare_api_disponible') == 'on' }}
            - condition: template
              value_template: >
                {{ states('binary_sensor.chauffage_incoherence_consigne_reduite_vicare_ha') == 'on' }}
          sequence:
            - service: script.chauffage_appliquer_consigne_reduite

      default: []
