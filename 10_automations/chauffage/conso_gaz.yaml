# ==========================================================
#  🧠 ARSENAL — AUTOMATION :
#     Gaz chauffage – Construction du totalisateur cumulatif
#
#  ID : 10240000000005
# ----------------------------------------------------------
#  🎯 RÔLE
#     Construire et maintenir un total cumulatif fiable
#     de la consommation de gaz dédiée au chauffage,
#     indépendant des resets journaliers ou des
#     redémarrages de Home Assistant.
#
#     Cette automation transforme une valeur journalière
#     volatile en un compteur cumulatif robuste.
#
#  🧱 PRINCIPE ARSENAL
#     - Les capteurs peuvent se réinitialiser
#     - Le total ne doit jamais régresser
#     - Les écritures doivent être causales et sûres
#
#  🚫 NE FAIT PAS
#     - Ne mesure pas directement la consommation de gaz
#     - Ne corrige pas les données source ViCare
#     - Ne retranche jamais de consommation cumulée
#
#  🧩 UTILISATION
#     - Déclenchement :
#         • mise à jour du capteur journalier gaz chauffage
#     - Logique :
#         • ignore les valeurs non numériques
#         • calcule un delta uniquement si la valeur progresse
#         • neutralise les resets journaliers ou glitches
#         • incrémente un total stocké de manière persistante
#         • mémorise la dernière valeur journalière traitée
#
#  ✅ CONTRAINTES
#     - Total cumulatif strictement monotone
#     - Résistant aux reboot HA et aux resets ViCare
#     - Aucun effet de bord sur les capteurs source
# ==========================================================


- id: "10240000000005"
  alias: "Gaz chauffage – Totalisateur cumulatif"
  mode: single

  trigger:
    - platform: state
      entity_id: sensor.gaz_chauffage_aujourdhui_local

  condition: []

  action:

    - alias: "Gaz chauffage – Totalisateur cumulatif"
      service: input_number.set_value
      target:
        entity_id: input_number.gaz_chauffage_total_local_store
      data:
        value: >
          {% set raw = states('sensor.gaz_chauffage_aujourdhui_local') %}
          {% if raw in ['unknown','unavailable','none','None',''] %}
            {{ states('input_number.gaz_chauffage_total_local_store') | float(0) }}
          {% else %}
            {% set today = raw | float(0) %}
            {% set last_today = states('input_number.gaz_chauffage_today_last') | float(0) %}
            {% set total = states('input_number.gaz_chauffage_total_local_store') | float(0) %}

            {% if today >= last_today %}
              {{ (total + (today - last_today)) | round(3) }}
            {% else %}
              {# reset du jour ou glitch -> on ne retranche jamais #}
              {{ total | round(3) }}
            {% endif %}
          {% endif %}

    - alias: "Gaz chauffage - mise a jour today_last"
      service: input_number.set_value
      target:
        entity_id: input_number.gaz_chauffage_today_last
      data:
        value: >
          {% set raw = states('sensor.gaz_chauffage_aujourdhui_local') %}
          {% if raw in ['unknown','unavailable','none','None',''] %}
            {{ states('input_number.gaz_chauffage_today_last') | float(0) }}
          {% else %}
            {{ raw | float(0) }}
          {% endif %}
