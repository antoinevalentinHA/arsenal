# ==========================================================
#  🧠 ARSENAL — AUTOMATION :
#     Chauffage – Déclenchement de la décision centrale
#
#  ID : 10240000000001
# ----------------------------------------------------------
#  🎯 RÔLE
#
#     Point d’entrée unique de rappel de la Décision Centrale
#     du chauffage sur toute transition structurelle,
#     hiérarchique, contextuelle ou technique reconnue
#     par les contrats Chauffage Arsenal.
#
# ----------------------------------------------------------
#  🧱 PÉRIMÈTRE
#
#     Cette automation :
#       - observe les changements de contexte pertinents
#       - déclenche le script de décision centrale
#       - ne prend aucune décision métier elle-même
#       - ne pilote aucun équipement
#
#     Elle couvre notamment :
#       - overrides et autorisations système
#       - blocages hiérarchiques
#       - régime présence / absence
#       - thermostat logique
#       - pré-confort retour Vacances
#       - convergence technique boiler bridge
#       - reprise système stabilisée
#
# ----------------------------------------------------------
#  ⚙️ PRINCIPES
#
#     - Override opérateur prioritaire :
#         aucun délai de stabilisation
#     - Autres causes :
#         délai court de 2 s pour absorption du bruit de contexte
#     - Anti-rebond géoloc :
#         contournable uniquement par override opérateur
#     - Bridge online :
#         rappel explicite à son retour pour rejouer un espace
#         décisionnel éventuellement resté bloqué avant tentative
#
# ----------------------------------------------------------
#  🛡️ GARANTIES
#
#     - Déclencheur exhaustif mais non décisionnel
#     - Aucun garde-fou métier dupliqué ici
#     - Aucune action thermique directe
#     - Conforme à la gouvernance Chauffage Arsenal V3
# ==========================================================

- id: "10240000000001"
  alias: "Chauffage - Décision centrale"
  description: >
    Declenche le script de decision centrale du chauffage
    sur toute transition hierarchique, thermique, contextuelle
    ou technique conforme au contrat Chauffage Arsenal V3 PRO.

  mode: restart
  max_exceeded: silent

  trigger:

    # ======================================================
    # 📍 PRIORITE ZERO — OVERRIDE OPERATEUR / AUTORISATION SYSTEME
    # ======================================================

    - platform: state
      entity_id: binary_sensor.chauffage_autorise_systeme
      id: "chauffage_autorise_systeme"

    - platform: state
      entity_id: input_boolean.mode_confort_chauffage
      id: "mode_confort_chauffage"

    # ======================================================
    # 🧠 AUTORISATIONS CONTEXTUELLES AUTOMATIQUES
    # ======================================================

    - platform: state
      entity_id: input_boolean.pre_confort_actif_calcule
      id: "pre_confort_actif_calcule"

    - platform: state
      entity_id: input_select.mode_maison
      id: "mode_maison"

    # ======================================================
    # 🛑 NIVEAU 1 — BLOCAGES HIERARCHIQUES
    # ======================================================

    - platform: state
      entity_id: input_boolean.aeration_episode_en_cours
      id: "aeration_episode_en_cours"

    - platform: state
      entity_id: input_boolean.aeration_confirmee
      id: "aeration_confirmee"

    - platform: state
      entity_id: input_boolean.chauffage_blocage_aeration
      id: "chauffage_blocage_aeration"

    - platform: state
      entity_id: binary_sensor.fenetre_ouverte_maison_avec_delai
      from: "off"
      to: "on"
      id: "fenetre_ouverte_maison_avec_delai_on"

    - platform: state
      entity_id: binary_sensor.fenetre_ouverte_maison_avec_delai
      from: "on"
      to: "off"
      id: "fenetre_ouverte_maison_avec_delai_off"

    - platform: state
      entity_id: input_boolean.blocage_chauffage_poele
      id: "blocage_chauffage_poele"

    # ======================================================
    # 🧠 NIVEAU 2 — REGIME (PRESENCE / ABSENCE)
    # ======================================================

    - platform: state
      entity_id: binary_sensor.presence_famille_unifiee
      id: "presence_famille_unifiee"

    # ======================================================
    # 🔁 ABSENCE — PROTECTION THERMIQUE
    # ======================================================

    - platform: state
      entity_id: input_boolean.chauffage_inhibition_geofencing
      id: "chauffage_inhibition_geofencing"

    # ======================================================
    # 🌡️ PRESENCE — THERMOSTAT LOGIQUE
    # ======================================================

    - platform: state
      entity_id: sensor.chauffage_autorisation_cible
      id: "chauffage_autorisation_cible"

    # ======================================================
    # 🔒 CONVERGENCE TECHNIQUE — BOILER BRIDGE
    # ======================================================

    - platform: state
      entity_id: binary_sensor.boiler_bridge_online
      from: "off"
      to: "on"
      id: "boiler_bridge_online"

    # ======================================================
    # 🔁 FIN ANTI-REBOND GEOLOCALISATION
    # ======================================================

    - platform: event
      event_type: timer.finished
      event_data:
        entity_id: timer.chauffage_geoloc_antirebond
      id: "chauffage_geoloc_antirebond_finished"

    # ======================================================
    # ⏱️ ORDONNANCEMENT — FIN DE TRANSACTION EXECUTIVE
    # ======================================================

    - platform: state
      entity_id: input_boolean.chauffage_application_en_cours
      to: "off"
      id: "chauffage_application_en_cours_off"

    # ======================================================
    # 🚀 REPRISE SYSTEME — STABILISATION HOME ASSISTANT
    # ======================================================

    - platform: state
      entity_id: input_boolean.systeme_stable
      to: "on"
      id: "systeme_stable"

  condition:

    # ==================================================
    # 🔒 ANTI-REBOND GEOLOC
    #     Contournable uniquement par override operateur
    # ==================================================
    - condition: template
      value_template: >
        {{
          is_state('input_boolean.mode_confort_chauffage', 'on')
          or is_state('timer.chauffage_geoloc_antirebond', 'idle')
        }}

  action:

    # ==================================================
    # 🕒 STABILISATION CONDITIONNELLE
    # ==================================================
    - alias: "Stabilisation conditionnelle"
      choose:
        - conditions:
            - condition: template
              value_template: "{{ trigger.id == 'mode_confort_chauffage' }}"
          sequence: []
      default:
        - delay: "00:00:02"

    # ==================================================
    # 🧠 APPEL DU CERVEAU CENTRAL DU CHAUFFAGE
    # ==================================================
    - alias: "Appel du cerveau central du chauffage"
      service: script.turn_on
      target:
        entity_id: script.chauffage_decision_centrale