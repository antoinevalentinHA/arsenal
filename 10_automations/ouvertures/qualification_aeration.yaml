# ==========================================================
#  🧠 ARSENAL — AUTOMATION :
#     Ouvertures – Qualification d’aération confirmée
#
#  ID : 10170000000009
# ----------------------------------------------------------
#  🎯 RÔLE
#
#     Automation de QUALIFICATION DE FAIT MÉTIER.
#
#     Elle marque une aération comme confirmée
#     dès qu’une ouverture éligible atteint le niveau
#     de persistance requis :
#
#       - Zones AVEC délai : confirmation à l’échéance
#         du timer de grâce associé.
#
#       - Zones SANS délai : confirmation immédiate
#         à l’ouverture.
#
#     Elle transforme un état transitoire
#     (ouverture récente) en fait métier stable
#     (aération effective).
#
#  🧱 NATURE
#
#     - Qualification binaire d’un événement physique
#     - Déclenchement sur :
#         • fin de temporisation (zones avec délai)
#         • ouverture directe (zones sans délai)
#     - Aucun pilotage ni décision autonome
#
#  ⚙️ PRINCIPE
#
#     - Déclenchement sur :
#
#       A) Fin de l’un des timers (zones AVEC délai) :
#         • timer.fenetre_sejour_ouverte_grace
#         • timer.fenetre_chambre_parents_grace
#
#       B) Ouverture d’une zone SANS délai (immédiat) :
#         • binary_sensor.contact_fenetre_entree
#         • binary_sensor.contact_chambre_arnaud
#         • binary_sensor.contact_chambre_matthieu
#
#     - Conditions de validité :
#         • système stable (anti faux-positifs boot)
#         • au moins une ouverture qualifiée réellement présente
#
#     - Effet :
#         • activation du booléen `input_boolean.aeration_confirmee`
#
#  🚫 CE QUE CETTE AUTOMATION NE FAIT PAS
#
#     - Ne décide pas d’une action (chauffage, aération)
#     - Ne bloque ni n’autorise aucun moteur
#     - Ne déclenche aucun script métier
#     - Ne tient compte d’aucun contexte thermique
#
#  🔗 UTILISATION
#
#     - Sert de source de vérité métier
#       pour les moteurs décisionnels
#     - Permet de distinguer :
#         • ouverture brève (non confirmée)
#         • aération réelle et persistante (confirmée)
#
#  🧠 PRINCIPE ARSENAL
#
#     Un fait métier doit être posé explicitement,
#     sans interprétation ni effet de bord.
#
#     Le booléen `aeration_confirmee` n’est écrit
#     que par ce point d’entrée de qualification
#     (writer unique).
#
#  🛡️ SÉCURITÉ
#
#     L’inhibition durant le boot garantit
#     l’absence de faux positifs au démarrage.
#
#     Le garde-fou "ouverture qualifiée présente"
#     évite une confirmation tardive après fermeture.
#
#  ✅ COMPATIBILITÉ
#
#     Home Assistant 2024.8+
# ==========================================================

- id: "10170000000009"
  alias: "Ouvertures – Qualification aération confirmée"
  mode: single

  trigger:

    # ==============================
    # Zones AVEC délai
    # ==============================

    - platform: event
      event_type: timer.finished
      event_data:
        entity_id: timer.fenetre_sejour_ouverte_grace
      id: timer_sejour

    - platform: event
      event_type: timer.finished
      event_data:
        entity_id: timer.fenetre_chambre_parents_grace
      id: timer_chambre_parents

    # ==============================
    # Zones SANS délai (immédiat)
    # ==============================

    - platform: state
      entity_id: binary_sensor.contact_fenetre_entree
      to: "on"
      id: entree

    - platform: state
      entity_id: binary_sensor.contact_chambre_arnaud
      to: "on"
      id: arnaud

    - platform: state
      entity_id: binary_sensor.contact_chambre_matthieu
      to: "on"
      id: matthieu

  condition:

    # Ne pas confirmer pendant le boot
    - condition: state
      entity_id: input_boolean.systeme_stable
      state: "on"

  action:

    - choose:

        # ======================================================
        # A) Zones SANS délai
        #    -> attendre que l'agrégat filtré reflète l'ouverture
        # ======================================================
        - conditions:
            - condition: trigger
              id:
                - entree
                - arnaud
                - matthieu

          sequence:

            # Laisser le temps à l'ouverture qualifiee de remonter
            - wait_template: "{{ is_state('binary_sensor.ouverture_qualifiee_maison', 'on') }}"
              timeout: "00:00:03"
              continue_on_timeout: true

            # Garde-fou après micro-délai : ouverture qualifiee réellement présente
            - condition: state
              entity_id: binary_sensor.ouverture_qualifiee_maison
              state: "on"

            - action: input_boolean.turn_on
              target:
                entity_id: input_boolean.aeration_confirmee

        # ======================================================
        # B) Zones AVEC délai
        #    -> garde-fou immédiat (évite confirmation tardive)
        # ======================================================
        - conditions:
            - condition: trigger
              id:
                - timer_sejour
                - timer_chambre_parents

          sequence:

            - condition: state
              entity_id: binary_sensor.ouverture_qualifiee_maison
              state: "on"

            - action: input_boolean.turn_on
              target:
                entity_id: input_boolean.aeration_confirmee
