# ==========================================================
#  🧠 ARSENAL — AUTOMATION :
#     Alerte – Rétablissement de l’API ViCare
#
#  ID : 1013000000002
# ----------------------------------------------------------
#  🎯 RÔLE
#     Informer l’utilisateur du rétablissement de l’API
#     Viessmann ViCare, uniquement lorsqu’une alerte
#     d’indisponibilité avait été précédemment émise.
#
#     Cette automation complète le cycle d’alerte lié à
#     la disponibilité de l’API ViCare.
#
#  🚫 NE FAIT PAS
#     - Ne notifie pas un retour à la normale sans alerte préalable
#     - Ne tente aucune action de récupération ou de relance
#     - Ne pilote pas le chauffage ni l’ECS
#
#  🧩 UTILISATION
#     - Déclenchement :
#         • passage de l’API ViCare à l’état disponible
#     - Condition :
#         • existence d’une notification d’indisponibilité active
#     - Actions :
#         • suppression de l’alerte persistante
#         • notification explicite de retour à la normale
#
#  ✅ CONTRAINTES
#     - Automation purement informative
#     - Cohérente avec l’alerte d’indisponibilité associée
#     - Aucune dépendance au contexte utilisateur
# ==========================================================


- id: '1013000000002'
  alias: "Alerte - API Viessmann rétablie"
  description: >
    Alerte uniquement si une notification d'indisponibilité existe.
    Déclenchée sur un vrai passage de off → on.
  mode: single

  # ======================================================
  # 🔔 Déclencheur — API de nouveau disponible
  # ======================================================
  trigger:
    - platform: state
      entity_id: binary_sensor.vicare_api_disponible
      from: "off"
      to: "on"

  # ======================================================
  # ✅ Condition — Alerte d’indispo existante
  # ======================================================
  condition:
    - condition: template
      alias: "Notification d'indispo existante"
      value_template: >
        {{ state_attr('persistent_notification.vicare_api_indispo', 'message') is not none }}

  # ======================================================
  # 🔄 Actions — Nettoyage + information utilisateur
  # ======================================================
  action:
    # 🔕 Retirer la notification d’indisponibilité
    - service: persistent_notification.dismiss
      data:
        notification_id: vicare_api_indispo

    # 📱 Notification positive
    - service: script.notification_envoyer
      data:
        cible: input_text.telephone_antoine_notify
        titre: "✅ API ViCare de nouveau disponible"
        message: >
          À {{ now().strftime('%H:%M') }}, l’API Viessmann est de nouveau accessible.  
          Les fonctions de chauffage et d’eau chaude sanitaire sont opérationnelles.
