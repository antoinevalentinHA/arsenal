# ==========================================================
# 🧠 ARSENAL — AUTOMATION :
#     ViCare — Notification gateway offline / retour OK
#
#  ID : 10130000000003
# ----------------------------------------------------------
#  🎯 RÔLE
#     Notifier uniquement si le système est stable :
#       - KO : gateway offline confirmé
#       - OK : pilotage rétabli confirmé
#
#  🔒 INVARIANTS
#     - Pas de notify.mobile_app_* (abstraction obligatoire)
#     - Anti-spam : stabilisation supplémentaire au niveau métier
# ==========================================================

- id: "10130000000003"
  alias: "ViCare — Alerte gateway offline"
  mode: single

  trigger:
    - platform: state
      entity_id: binary_sensor.vicare_gateway_offline
      to: "on"
      for: "00:05:00"

    - platform: state
      entity_id: binary_sensor.vicare_gateway_offline
      to: "off"
      for: "00:05:00"

  condition:
    - condition: state
      entity_id: input_boolean.systeme_stable
      state: "on"

  action:
    - choose:
        - conditions:
            - condition: state
              entity_id: binary_sensor.vicare_gateway_offline
              state: "on"
          sequence:
            - service: script.notification_envoyer
              data:
                cible: input_text.telephone_antoine_notify
                titre: "ViCare KO — Gateway offline"
                message: >
                  Vitoconnect probablement hors ligne (persistant).
                  Risque : pas de pilotage ECS / programme chauffage.
                  Action : ViCare → redémarrer Vitoconnect.
                  Si échec : redémarrer Deco principal.

        - conditions:
            - condition: state
              entity_id: binary_sensor.vicare_gateway_offline
              state: "off"
          sequence:
            - service: script.notification_envoyer
              data:
                cible: input_text.telephone_antoine_notify
                titre: "ViCare OK — Rétabli"
                message: >
                  Pilotage ViCare rétabli (stable).