# ==========================================================
# 🧠 ARSENAL — AUTOMATION :
#     ECS – Émission du signal de fin de cycle (consolidation)
#
# ID : 10250000000023
# ----------------------------------------------------------
# 🎯 RÔLE
#     Émettre le signal canonique de fin de cycle ECS
#     lorsque la consolidation documentaire est terminée,
#     matérialisée par l’écriture de la durée figée
#     du dernier cycle ECS.
#
# 🧱 PRINCIPE ARSENAL
#     - Le signal est basé sur une donnée figée et stable
#     - Une seule donnée fait foi : la durée consolidée
#     - Un cycle ECS produit un seul signal
#
# 🚫 NE FAIT PAS
#     - Ne détecte pas la fin thermique du cycle
#     - Ne fige aucune donnée
#     - Ne déclenche aucun calcul
#     - Ne réinitialise jamais le signal
#
# 🧩 CONDITIONS DE VALIDITÉ
#     - La durée figée vient de CHANGER réellement
#     - La valeur est strictement positive
#     - Le signal n’a pas déjà été émis
#
# ⚠️ IMPORTANT
#     - Cette automation est purement décisionnelle
#     - Le booléen est acquitté ailleurs (ACK explicite)
# ==========================================================

- id: "10250000000023"
  alias: "ECS – Signal fin de cycle"
  description: "Émet le signal canonique de fin de cycle ECS lorsque la durée consolidée est figée."
  mode: single

  trigger:
    - platform: state
      entity_id: input_number.ecs_duree_dernier_cycle_figee

  condition:
    # 🔢 1️⃣ Changement réel de valeur (anti redémarrage / reload)
    - condition: template
      value_template: >
        {{ trigger.from_state is not none
           and trigger.to_state is not none
           and trigger.from_state.state != trigger.to_state.state
           and trigger.to_state.state | float(0) > 0 }}

    # 🚫 2️⃣ Signal non déjà émis
    - condition: state
      entity_id: input_boolean.ecs_fin_cycle_signal
      state: "off"

  action:
    # 📣 Émission explicite du signal canonique
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.ecs_fin_cycle_signal
