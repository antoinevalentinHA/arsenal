# ==========================================================
# 🧠 ARSENAL — AUTOMATION :
#     ECS – Auto-ajustement offsets (fin de cycle)
#
# ID : 10250000000019
# ----------------------------------------------------------
# 🎯 RÔLE
#     Consommer le signal canonique de fin de cycle ECS,
#     déclencher le script natif d’auto-ajustement des offsets,
#     puis acquitter explicitement le signal.
#
# 🧱 PRINCIPE ARSENAL
#     - Automation strictement CONSOMMATRICE
#     - Aucun calcul métier
#     - Acquittement = accusé de réception métier
#
# ⚠️ IMPORTANT
#     - En cas d’échec, le signal reste ON
#     - Relance manuelle possible
# ==========================================================

- id: "10250000000019"
  alias: "ECS – Auto-ajustement offsets (fin de cycle)"
  description: "Consomme le signal de fin de cycle ECS, ajuste les offsets via script, puis acquitte le signal."
  mode: single

  trigger:
    - platform: state
      entity_id: input_boolean.ecs_fin_cycle_signal
      to: "on"

  condition:
    - condition: state
      entity_id: input_boolean.ecs_autocorrect_active
      state: "on"

  action:
    # 🔧 1) Appel du script
    - service: script.ecs_autocorrect_offsets

    # 🧾 2) Acquittement explicite du signal
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.ecs_fin_cycle_signal