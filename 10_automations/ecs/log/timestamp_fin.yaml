# ==========================================================
#  🧠 ARSENAL — AUTOMATION :
#     ECS – Capture du pic thermique de cycle
#
#  ID : 10250000000011
# ----------------------------------------------------------
#  🎯 RÔLE
#     Enregistrer l’horodatage exact auquel le ballon ECS
#     atteint une nouvelle température maximale pendant
#     un cycle en cours.
#
#  ✅ ÉVOLUTIONS (correction)
#     - Ajout d’un garde-fou : ne capture QUE si un cycle ECS
#       est déclaré en cours (`input_boolean.ecs_cycle_en_cours` = on).
#     - Durcissement de la condition : ignore les transitions
#       invalides (unknown/unavailable/none/absence de from_state).
#
#  🛡️ GARANTIES
#     - Zéro dépendance au cloud
#     - Monotonicité conservée (strictement supérieur)
#     - Pas de capture hors cycle (évite pollution inter-cycles)
# ==========================================================

- id: "10250000000011"
  alias: "ECS - Capture pic thermique"
  description: "Stocke l'heure du pic thermique ECS (nouvelle T° max)"
  mode: restart

  trigger:
    - platform: state
      entity_id: sensor.ecs_temperature_max_cycle

  condition:
    # ------------------------------------------------------
    # Garde-fou : capture uniquement pendant un cycle ECS
    # ------------------------------------------------------
    - condition: state
      entity_id: input_boolean.ecs_cycle_en_cours
      state: "on"

    # ------------------------------------------------------
    # Monotonicité stricte + robustesse aux états invalides
    # ------------------------------------------------------
    - condition: template
      value_template: >
        {% set to = trigger.to_state.state if trigger.to_state is not none else none %}
        {% set fr = trigger.from_state.state if trigger.from_state is not none else none %}
        {{ to not in ['unknown','unavailable','none','', none] and
           fr not in ['unknown','unavailable','none','', none] and
           (to | float) > (fr | float) }}

  action:
    - service: input_datetime.set_datetime
      target:
        entity_id: input_datetime.ecs_tmax_timestamp
      data:
        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"