# ==========================================================
#  🧠 ARSENAL — AUTOMATION :
#     ECS – Gardien de reapplication de la consigne apres prelevement
#
#  ID : 10250000000005
# ----------------------------------------------------------
#  🎯 ROLE
#     Reappliquer automatiquement la consigne ECS
#     de securite (10 °C) a l'issue d'un cycle ECS,
#     afin d'eviter tout rebond thermique non souhaite.
#
#     Cette automation agit comme un gardien post-evenement,
#     garantissant le retour effectif a l'etat nominal.
#
#  🧱 PRINCIPE ARSENAL
#     - La decision ECS est prise ailleurs
#     - Le gardien verifie et corrige a posteriori
#     - La securite prime sur l'optimisation
#
#  🚫 NE FAIT PAS
#     - Ne declenche aucun cycle ECS
#     - Ne modifie pas la strategie ECS globale
#     - Ne s'execute pas si un cycle ECS est en cours
#
#  🧩 UTILISATION
#     - Declenchement :
#         • fin du timer post-prelevement ECS
#     - Pre-requis :
#         • aucun cycle ECS actif
#     - Sequence :
#         • temporisation de stabilisation
#         • deux tentatives transactionnelles espacees
#         • verification par ACK correle
#         • notification critique si echec persistant
#
#  ⚠️ IMPORTANT
#     - Cette automation applique une consigne de securite
#     - Toute modification de la valeur cible ou de la strategie
#       doit etre reflechie au niveau systeme ECS
#
#  ✅ CONTRAINTES
#     - Securite prioritaire sur toute autre consideration
#     - Verification basee sur ACK correle
#     - Aucune sortie silencieuse en cas d'echec
# ==========================================================

- id: "10250000000005"
  alias: "ECS – Gardien post-prelevement"
  description: >
    Applique et verifie la consigne 10 °C apres un cycle ECS.
    Double tentative transactionnelle via boiler bridge.
    Ne s'execute pas si un cycle ECS est en cours.
  mode: single

  trigger:
    - platform: event
      event_type: timer.finished
      event_data:
        entity_id: timer.ecs_gardien_post_prelevement

  condition:
    - condition: state
      entity_id: input_boolean.ecs_cycle_en_cours
      state: "off"

  action:
    - variables:
        retour_temp: 10

    # ======================================================
    # 🕐 Stabilisation initiale
    # ======================================================
    - delay: "00:00:05"

    # ======================================================
    # 🔁 Tentatives 1 et 2
    # ======================================================
    - repeat:
        count: 2
        sequence:
          - delay: "00:00:05"

          - variables:
              boiler_request_id: >
                {% set h = '0123456789abcdef' %}
                {% set v = '89ab' %}
                {{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}-{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}-4{{ h|random }}{{ h|random }}{{ h|random }}-{{ v|random }}{{ h|random }}{{ h|random }}{{ h|random }}-{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}
              boiler_ts: >
                {{ as_timestamp(utcnow()) | timestamp_custom('%Y-%m-%dT%H:%M:%SZ', false) }}
              boiler_expires_at: >
                {{ (as_timestamp(utcnow()) + 30) | timestamp_custom('%Y-%m-%dT%H:%M:%SZ', false) }}

          - service: input_text.set_value
            target:
              entity_id: input_text.boiler_req_dhw_set_setpoint
            data:
              value: "{{ boiler_request_id }}"

          - service: mqtt.publish
            data:
              topic: "boiler/command/dhw/set_setpoint"
              qos: 1
              retain: false
              payload: >-
                {
                  "request_id": "{{ boiler_request_id }}",
                  "ts": "{{ boiler_ts }}",
                  "expires_at": "{{ boiler_expires_at }}",
                  "source": "arsenal",
                  "value": {{ retour_temp }}
                }

          - wait_template: >
              {{ states('sensor.boiler_ack_dhw_set_setpoint_result') in ['applied', 'rejected', 'timeout'] }}
            timeout: "00:00:20"
            continue_on_timeout: true

          - choose:
              - conditions:
                  - condition: template
                    value_template: >
                      {{ states('sensor.boiler_ack_dhw_set_setpoint_result') == 'applied' }}
                sequence:
                  - service: input_text.set_value
                    target:
                      entity_id: input_text.boiler_req_dhw_set_setpoint
                    data:
                      value: ""
                  - stop: "Consigne ECS de securite confirmee par ACK"

    # ======================================================
    # 🚨 Echec persistant apres deux tentatives
    # ======================================================
    - service: script.notification_envoyer
      data:
        cible: input_text.telephone_antoine_notify
        titre: "🚨 ECS – Consigne non appliquee"
        message: >
          A {{ now().strftime('%H:%M') }}, apres deux tentatives transactionnelles boiler bridge,
          la consigne ECS de securite n'a pas ete confirmee a {{ retour_temp }} °C.
          Resultat ACK : {{ states('sensor.boiler_ack_dhw_set_setpoint_result') }}.

    - service: input_text.set_value
      target:
        entity_id: input_text.boiler_req_dhw_set_setpoint
      data:
        value: ""