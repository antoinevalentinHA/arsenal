# ==========================================================
#  🧠 ARSENAL — AUTOMATION :
#     ECS – Watchdog de fin de cycle
#
#  ID : 10250000000008
# ----------------------------------------------------------
#  🎯 RÔLE
#     Garantir la remise en sécurité complète du ballon
#     d’eau chaude sanitaire lorsque le cycle ECS arrive
#     à son terme sans retour normal de la logique métier.
#
#     Cette automation agit comme un watchdog terminal,
#     chargé de forcer la sortie de cycle et le retour
#     à la consigne basse de sécurité.
#
#  🧱 PRINCIPE ARSENAL
#     - Un cycle ECS ne doit jamais rester ouvert
#     - La consigne haute ne doit pas persister
#     - Le verrou logique doit toujours être libéré
#
#  🚫 NE FAIT PAS
#     - Ne déclenche aucun cycle ECS
#     - Ne décide pas de la durée ou du timing des cycles
#     - Ne modifie aucune planification ECS
#
#  🧩 UTILISATION
#     - Déclenchement :
#         • expiration du timer watchdog de cycle ECS
#     - Séquence :
#         • temporisation courte post-expiration
#         • rabaissement forcé de la consigne à 10 °C
#         • vérification réelle via capteur local
#         • libération forcée du verrou de cycle ECS
#
#  ⚠️ IMPORTANT
#     - Cette automation est un garde-fou de sécurité
#     - Elle s’exécute même si la logique amont a failli
#     - Le déverrouillage est volontairement unilatéral
#
#  ✅ CONTRAINTES
#     - Priorité absolue à la sécurité thermique
#     - Vérification basée sur l’état réel chaudière
#     - Aucune dépendance à un retour cloud parfait
# ==========================================================

- id: "10250000000008"
  alias: "ECS - Watchdog fin de cycle"
  description: >
    Si le timer de cycle arrive à son terme, rabaisse la consigne à 10 °C,
    vérifie la mise à jour réelle et libère le verrou input_boolean.ecs_cycle_en_cours.
  mode: single

  trigger:
    - platform: event
      event_type: timer.finished
      event_data:
        entity_id: timer.ecs_cycle_watchdog

  action:
    # 🕐 Laisse 3 s pour stabiliser les états après expiration du timer
    - delay:
        seconds: 3

    - variables:
        retour_temp: 10
        number_setpoint: number.vscotho1_200_11_dhw_temperature
        sensor_consigne: sensor.ecs_consigne_chaudiere_securisee

    # 🔁 Rabaisse la consigne
    - service: number.set_value
      target:
        entity_id: "{{ number_setpoint }}"
      data:
        value: "{{ retour_temp }}"

    # ⏳ Vérifie que la consigne est bien appliquée
    - wait_for_trigger:
        - platform: template
          value_template: >
            {{ (states(sensor_consigne) | float(0)) == retour_temp }}
      timeout:
        seconds: 60
      continue_on_timeout: true

    # 🔓 Fin du cycle forcée
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.ecs_cycle_en_cours
