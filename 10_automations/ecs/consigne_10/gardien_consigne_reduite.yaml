# ==========================================================
#  🧠 ARSENAL — AUTOMATION :
#     ECS – Gardien consigne hors cycle
#
#  ID : 10250000000006
# ----------------------------------------------------------
#  🎯 ROLE
#     Corriger la consigne ECS vers 10 °C uniquement
#     lorsqu'une incohérence réelle est détectée hors cycle.
#
#  🧱 PRINCIPE
#     - Le déclenchement repose sur un capteur métier simple
#     - Aucune action si aucune incohérence n'est présente
#     - Vérification finale sur l'état réel, pas sur l'ACK
#
#  🚫 NE FAIT PAS
#     - Ne déclenche aucun cycle ECS
#     - Ne dépend pas d'un timer périodique
#     - N'émet aucune commande MQTT directe
# ==========================================================

- id: "10250000000006"
  alias: "ECS – Gardien consigne hors cycle"
  description: >
    Corrige la consigne ECS vers 10 °C uniquement lorsqu'une
    incohérence hors cycle est détectée.
  mode: single

  trigger:
    - platform: state
      entity_id: binary_sensor.ecs_consigne_hors_cycle_incoherente
      to: "on"
      for: "00:00:20"

    - platform: state
      entity_id: input_boolean.systeme_stable
      to: "on"

  condition:
    - condition: state
      entity_id: binary_sensor.ecs_consigne_hors_cycle_incoherente
      state: "on"

  action:
    - variables:
        retour_temp: 10

    # ======================================================
    # 🧾 Tentative 1
    # ======================================================
    - service: script.ecs_appliquer_consigne_bridge
      data:
        target_temp: "{{ retour_temp }}"

    # ======================================================
    # 🕐 Laisser le temps à la consigne de converger
    # ======================================================
    - delay:
        seconds: 10

    # ======================================================
    # 🔁 Tentative 2 uniquement si l'incohérence persiste
    # ======================================================
    - choose:
        - conditions:
            - condition: state
              entity_id: binary_sensor.ecs_consigne_hors_cycle_incoherente
              state: "on"
          sequence:
            - service: script.ecs_appliquer_consigne_bridge
              data:
                target_temp: "{{ retour_temp }}"
      default: []