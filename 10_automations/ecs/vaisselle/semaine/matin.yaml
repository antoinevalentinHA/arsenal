# ==========================================================
#  AUTOMATION : vaisselle_semaine_matin
#  ----------------------------------------------------------
#  🧠 Rôle :
#     Automatiser l’ECS mode “vaisselle” le matin en semaine,
#     si le mode est activé par l’utilisateur.
#
#  💡 Avantages :
#     - Gestion automatisée des besoins matinaux
#     - Pas d’action manuelle
#     - Logique centralisée dans le script wrapper
#
#  ⚙️ Comportement :
#     - À 07:00, 07:30 et 08:00
#     - Du lundi au vendredi
#     - Si mode vaisselle = ON → contrôle via script dédié
#
#  ✅ Compatibilité : Home Assistant 2024.8+
# ==========================================================

- id: '10250000000012'
  alias: "ECS — Vaisselle — Semaine — Matin"
  description: >
    Déclenche à 7h, 7h30 et 8h si mode vaisselle actif (le wrapper fait les vérifs).
  mode: single

  # ======================================================
  # 🔔 Déclencheurs — Créneaux matinaux en semaine
  # ======================================================
  trigger:
    - platform: time
      at: "07:00:00"
    - platform: time
      at: "07:30:00"
    - platform: time
      at: "08:00:00"

  # ======================================================
  # ✅ Conditions — Mode activé + jours ouvrés
  # ======================================================
  condition:
    - condition: state
      entity_id: input_boolean.mode_vaisselle
      state: "on"
    - condition: time
      weekday: [mon, tue, wed, thu, fri]

  # ======================================================
  # 🔄 Action — Appel au script wrapper pour validation
  # ======================================================
  action:
    - service: script.ecs_vaisselle_lancer_si_ok
