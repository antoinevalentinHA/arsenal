# ==========================================================
#  🧠 ARSENAL — AUTOMATION :
#     ECS – Gel et validation des données de fin de cycle
#
#  ID : 10250000000026
# ----------------------------------------------------------
#  🎯 ROLE
#     Capturer, valider et figer l'ensemble des données
#     diagnostiques d'un cycle ECS a l'echeance de la
#     fenetre d'inertie post-cycle.
#
#     Emet ensuite le signal canonique de fin de cycle
#     pour les consommateurs aval.
#
#  🧱 PRINCIPE
#     - Declenchement sur fin de timer d'inertie ECS
#     - Lecture des capteurs dynamiques
#     - Validation du resume
#     - Ecriture des valeurs figees
#     - Emission du signal ecs_fin_cycle_signal
#
#  ⚠️ NOTE
#     - input_number impose une valeur numerique
#     - fallback a 0 uniquement au moment du gel
# ==========================================================

- id: "10250000000026"
  alias: "ECS – Gel données fin de cycle"
  description: >
    À l’échéance de la fenêtre d’inertie post-cycle ECS, capture
    les données essentielles pour une lecture persistante dans les
    dashboards, puis émet le signal canonique de fin de cycle.
  mode: single

  trigger:
    - platform: event
      event_type: timer.finished
      event_data:
        entity_id: timer.fenetre_inertie_chauffe_ecs

  action:
    # ♻️ 1️⃣ Mise à jour conservatoire
    - action: homeassistant.update_entity
      target:
        entity_id:
          - sensor.ecs_temperature_max_cycle
          - sensor.ecs_dernier_cycle_resume

    # ⏳ 2️⃣ Stabilisation minimale
    - delay: "00:00:01"

    # 🧮 3️⃣ Variables + validation
    - variables:
        duree: >
          {% set start_raw = states('input_datetime.ecs_cycle_debut_timestamp') %}
          {% set end_raw = states('input_datetime.ecs_tmax_timestamp') %}
          {% set start = as_timestamp(start_raw, none) %}
          {% set end = as_timestamp(end_raw, none) %}
          {% if start is not none and end is not none and end >= start %}
            {{ ((end - start) / 60) | round(1) }}
          {% else %}
            0
          {% endif %}

        temp_max: >
          {% set v = states('sensor.ecs_temperature_max_cycle') %}
          {{ v | float if v not in ['unknown','unavailable','none',''] else 0 }}

        temp_max_reelle: >
          {% set v = states('sensor.ecs_temperature_max_reelle_cycle') %}
          {{ v | float if v not in ['unknown','unavailable','none',''] else 0 }}

        resume_brut: >
          {{ states('input_text.ecs_dernier_cycle_resume') }}

        consigne_reelle: >
          {% set v = states('sensor.ecs_consigne_chaudiere_securisee') %}
          {{ v | float if v not in ['unknown','unavailable','none',''] else 0 }}

        resume_valide: >
          {% set parts = (resume_brut | string).split('|') %}
          {% set t0 = (parts[3] | float(0)) if (parts | length >= 4) else none %}
          {% set delta_min = 0.5 %}
          {% set ok =
               duree > 0
               and temp_max_reelle > 0
               and (t0 is not none)
               and (temp_max_reelle - (t0 | float(0))) >= delta_min
          %}
          {{ resume_brut.replace('|pending', '|oui') if ok
             else resume_brut.replace('|pending', '|non') }}

    # 💾 4️⃣ Écriture figée
    - action: input_number.set_value
      target:
        entity_id: input_number.ecs_duree_dernier_cycle_figee
      data:
        value: "{{ duree }}"

    - action: input_number.set_value
      target:
        entity_id: input_number.ecs_duree_chauffe_reel_backup
      data:
        value: "{{ duree }}"

    - action: input_number.set_value
      target:
        entity_id: input_number.ecs_temperature_max_figee
      data:
        value: "{{ temp_max }}"

    - action: input_number.set_value
      target:
        entity_id: input_number.ecs_temperature_max_reelle_figee
      data:
        value: "{{ temp_max_reelle }}"

    - action: input_text.set_value
      target:
        entity_id: input_text.ecs_resume_dernier_cycle_fige
      data:
        value: "{{ resume_valide }}"

    # 🧩 5️⃣ Miroir du résumé
    - action: input_text.set_value
      target:
        entity_id: input_text.ecs_dernier_cycle_resume
      data:
        value: "{{ resume_valide }}"

    # 📣 6️⃣ Signal canonique fin de cycle
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.ecs_fin_cycle_signal