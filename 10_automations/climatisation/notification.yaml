# ==========================================================
#  🧠 ARSENAL — AUTOMATION :
#     Clim – Notification de changement d’état (observabilité)
#
#  ID : 10030000000102
# ----------------------------------------------------------
#  🎯 RÔLE
#
#     Automation d’observabilité utilisateur.
#
#     Elle notifie chaque changement réel de mode
#     de la climatisation (cool / dry / heat / off),
#     à des fins de compréhension et de traçabilité.
#
#     Cette automation n’a AUCUN rôle fonctionnel.
#
#  🧩 PRINCIPE
#
#     - Déclenchement sur changement du mode HVAC local
#     - Filtrage strict :
#         • changement effectif d’état
#         • alimentation réellement active
#     - Notification persistante contextualisée
#
#  🧠 SOURCES D’INFORMATION
#
#     - sensor.clim_mode_local
#     - switch.clim_power
#     - input_text.climatisation_raison
#
#     → la raison affichée est calculée ailleurs
#       par les scripts décisionnels.
#
#  🚫 CE QUE CETTE AUTOMATION NE FAIT PAS
#
#     - Ne déclenche AUCUNE action
#     - Ne modifie AUCUN état
#     - Ne participe PAS à la décision climatique
#     - Ne sert PAS d’alerte critique
#     - Ne pilote PAS la climatisation
#
#  🧠 ARCHITECTURE ARSENAL
#
#     Automation d’observabilité pure :
#     observer ≠ décider ≠ piloter.
#
#     Elle rend le système lisible pour l’humain,
#     sans jamais influencer son comportement.
# ==========================================================


- id: "10030000000102"
  alias: "Clim - Notification changement de mode"
  mode: single

  trigger:
    - platform: state
      entity_id: sensor.clim_mode_local

  condition:
    # 🔒 Condition 1 : changement réel de mode
    - condition: template
      value_template: >
        {{ trigger.from_state is not none
           and trigger.from_state.state != trigger.to_state.state }}

    # 🔒 Condition 2 : clim réellement allumée
    - condition: state
      entity_id: switch.clim_power
      state: "on"

  action:
    - choose:

        - conditions: "{{ trigger.to_state.state == 'cool' }}"
          sequence:
            - service: persistent_notification.create
              data:
                title: "Climatisation – Refroidissement"
                message: >
                  La climatisation vient de passer en mode REFROIDISSEMENT.
                  Raison : {{ states('input_text.climatisation_raison') }}

        - conditions: "{{ trigger.to_state.state == 'dry' }}"
          sequence:
            - service: persistent_notification.create
              data:
                title: "Climatisation – Déshumidification"
                message: >
                  La climatisation vient de passer en mode DÉSHUMIDIFICATION.
                  Raison : {{ states('input_text.climatisation_raison') }}

        - conditions: "{{ trigger.to_state.state == 'heat' }}"
          sequence:
            - service: persistent_notification.create
              data:
                title: "Climatisation – Chauffage"
                message: >
                  La climatisation vient de passer en mode CHAUFFAGE.
                  Raison : {{ states('input_text.climatisation_raison') }}

        - conditions: "{{ trigger.to_state.state == 'off' }}"
          sequence:
            - service: persistent_notification.create
              data:
                title: "Climatisation – Arrêt"
                message: >
                  La climatisation vient de s’arrêter.
