# ==========================================================
# 🧠 ARSENAL — AUTOMATION :
#     Clim – Gestion du timer d’absence prolongée
#
#  ID : 10030000000104
# ----------------------------------------------------------
# 🎯 RÔLE
#
#   Gérer le cycle de vie du timer mesurant l’absence
#   prolongée de la famille, utilisé pour autoriser
#   l’extinction automatique de la climatisation.
#
# ----------------------------------------------------------
# 🧱 PRINCIPE
#
#   - Absence détectée → démarrage du timer
#   - Présence détectée → annulation immédiate du timer
#
# ----------------------------------------------------------
# 🧩 NATURE
#
#   - Automation de support temporel
#   - Aucun calcul de durée
#   - Aucun pilotage climatique direct
#
# ==========================================================

- id: "10030000000104"
  alias: "Clim – Gestion du timer absence prolongée"
  description: >
    Démarre ou annule le timer d’absence prolongée
    utilisé pour autoriser l’extinction de la climatisation.

  mode: restart

  trigger:
    - platform: state
      entity_id: binary_sensor.presence_famille_unifiee
    - platform: homeassistant
      event: start

  action:
    - delay: "00:00:05"
    - choose:

        # ▶️ Absence → démarrage du timer
        - conditions:
            - condition: template
              value_template: >
                {{ states('binary_sensor.presence_famille_unifiee') == 'off' }}
          sequence:
            - action: timer.start
              target:
                entity_id: timer.absence_longue_clim

        # ⏹️ Présence → annulation du timer
        - conditions:
            - condition: template
              value_template: >
                {{ states('binary_sensor.presence_famille_unifiee') == 'on' }}
          sequence:
            - action: timer.cancel
              target:
                entity_id: timer.absence_longue_clim