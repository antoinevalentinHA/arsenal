# ==========================================================
#  🧠 ARSENAL — AUTOMATION :
#     Présence sécurité – Durée d’absence (5 min)
#
#  ID : 10210000000002
# ----------------------------------------------------------
#  🎯 RÔLE
#
#     Automation technique chargée de gérer un délai
#     d’absence stabilisée (5 minutes) à partir du
#     capteur principal de présence sécurité.
#
#     Elle expose uniquement un état temporel consommé
#     par la logique d’armement automatique.
#
#  🧩 PRINCIPE
#
#     - Réagit à tout changement du capteur
#       binary_sensor.presence_famille_securite
#     - Démarre un timer lorsque l’absence est détectée
#     - Annule immédiatement le timer si la présence revient
#
#  🚫 CE QUE CETTE AUTOMATION NE FAIT PAS
#
#     - Ne décide pas d’armer ou non l’alarme
#     - Ne modifie aucun état d’alarme
#     - Ne calcule aucune présence
#
#  🧠 PRINCIPES ARSENAL
#
#     - Anti-rebond temporel
#     - Séparation stricte présence / décision / armement
#     - Utilisation de timers persistants
#
#  ✅ Compatibilité : Home Assistant 2024.8+
# ==========================================================


- id: "10210000000002"
  alias: Présence sécurite - Durée absence 5 min
  description: >
    Lance ou annule le timer presence_famille_securite_absence selon l'etat du binaire
    presence_famille_securite. Sert d'antirebond pour armer l'alarme apres 5 min d'absence stable.

  mode: restart

  trigger:
    - platform: state
      entity_id: binary_sensor.presence_famille_securite

  condition:
    - condition: template
      value_template: >-
        {{ states('binary_sensor.presence_famille_securite') in ['on','off'] }}

  action:
    - choose:

        # Absence détectée → lancer le timer
        - conditions:
            - condition: state
              entity_id: binary_sensor.presence_famille_securite
              state: "off"
          sequence:
            - action: timer.start
              target:
                entity_id: timer.presence_famille_securite_absence

        # Présence retrouvée → annuler le timer
        - conditions:
            - condition: state
              entity_id: binary_sensor.presence_famille_securite
              state: "on"
          sequence:
            - action: timer.cancel
              target:
                entity_id: timer.presence_famille_securite_absence
