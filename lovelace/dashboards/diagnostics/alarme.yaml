button_card_templates: !include_dir_merge_named /config/button_card_templates

title: Diagnostics Alarme
icon: mdi:shield-home

views:
  ####################################
  # 🛡️ DIAGNOSTICS ALARME
  ####################################
  - title: Alarme
    path: alarme
    icon: mdi:shield-home

    # ==========================================================
    # 🧭 BADGES — Navigation & retour contextuel
    # ==========================================================
    badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

      - type: custom:button-card
        template: bouton_retour_badge_carre
        tap_action:
          action: navigate
          navigation_path: /alarme-dashboard/alarme

    # ==========================================================
    # 🧩 CONTENU PRINCIPAL
    # ==========================================================
    cards:
      - type: vertical-stack
        cards:

          # ======================================================
          # 🔐 SECTION : Alarme – Données internes
          # ------------------------------------------------------
          #  Architecture :
          #   - Cerveau central (decision / etat_cible / raison)
          #   - Application idempotente
          #   - États purement déclaratifs
          #
          #  Objectif :
          #   - Lisibilité immédiate
          #   - Debug post-reboot
          #   - Zéro héritage V1
          # ======================================================

          - type: custom:button-card
            template: section_header
            name: 🔐 Alarme – Diagnostics

          # ======================================================
          # 🧠 DÉCISION CENTRALE
          # ======================================================

          - type: custom:button-card
            template: sub_section_header
            name: ⚖️ Décision du système

          - type: markdown
            content: |
              {% set decision = states('input_text.alarme_decision') %}
              {% set cible = states('input_text.alarme_etat_cible') %}
              {% set raison = states('input_text.alarme_raison') %}
              {% set reel = states('alarm_control_panel.alarme_maison') %}

              {% set indispo = (decision in ['unknown','unavailable','', none])
                               or (cible in ['unknown','unavailable','', none])
                               or (raison in ['unknown','unavailable','', none])
                               or (reel in ['unknown','unavailable','', none]) %}

              {% set attendu = 'none' %}
              {% if cible == 'ARMED_AWAY' %}
                {% set attendu = 'armed_away' %}
              {% elif cible == 'DISARMED' %}
                {% set attendu = 'disarmed' %}
              {% elif cible == 'NOOP' %}
                {% set attendu = 'noop' %}
              {% else %}
                {% set attendu = 'invalide' %}
              {% endif %}

              {# =======================================================
                 ⚪ DONNEES INDISPONIBLES
                 ======================================================= #}
              {% if indispo %}

              ⚪ **Alarme — Diagnostic indisponible**

              Certaines données centrales sont **unknown/unavailable**.

              - **Décision :** {{ decision }}
              - **Cible :** {{ cible }}
              - **Raison :** {{ raison }}
              - **État réel :** {{ reel }}

              {# =======================================================
                 🔴 CIBLE INVALIDE
                 ======================================================= #}
              {% elif attendu == 'invalide' %}

              🚨 **Alarme — Cible invalide**

              La cible demandée n’est pas reconnue.

              - **Décision :** `{{ decision }}`
              - **Cible brute :** `{{ cible }}`
              - **Raison :** {{ raison }}
              - **État réel :** {{ reel }}

              {# =======================================================
                 🟢 NOOP
                 ======================================================= #}
              {% elif attendu == 'noop' %}

              🟢 **Alarme — Aucune action demandée (NOOP)**

              Le système ne demande **aucun changement** d’état.

              - **Décision :** `{{ decision }}`
              - **Cible :** NOOP
              - **Raison :** {{ raison }}
              - **État réel :** {{ reel }}

              {# =======================================================
                 🟢 ALIGNEMENT CONFORME
                 ======================================================= #}
              {% elif reel == attendu %}

              🟢 **Alarme — Application conforme**

              La décision centrale est **correctement appliquée**.

              - **Décision :** `{{ decision }}`
              - **Cible :** {{ cible }} → attendu `{{ attendu }}`
              - **Raison :** {{ raison }}
              - **État réel :** `{{ reel }}`

              {# =======================================================
                 🚨 DIVERGENCE
                 ======================================================= #}
              {% else %}

              🚨 **Alarme — Divergence détectée**

              La décision centrale n’est **pas appliquée**.

              - **Décision :** `{{ decision }}`
              - **Cible :** {{ cible }} → attendu `{{ attendu }}`
              - **Raison :** {{ raison }}
              - **État réel :** `{{ reel }}`

              {% endif %}

          # ======================================================
          # 🧪 MODE TEST
          # ======================================================

          - type: custom:button-card
            template: sub_section_header
            name: 🧪 Mode test

          - type: markdown
            content: |
              {% if is_state('input_boolean.mode_test_alarme','on') %}
              🧪 Activé
              {% else %}
              ✅ Désactivé
              {% endif %}
