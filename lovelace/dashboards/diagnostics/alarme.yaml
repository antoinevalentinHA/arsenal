button_card_templates: !include_dir_merge_named /config/button_card_templates

title: Diagnostics Alarme
icon: mdi:shield-home

views:
  ####################################
  # 🛡️ DIAGNOSTICS ALARME
  ####################################
  - title: Alarme
    path: alarme
    icon: mdi:shield-home

    # ==========================================================
    # 🧭 BADGES — Navigation & retour contextuel
    # ==========================================================
    badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

      - type: custom:button-card
        template: bouton_retour_badge_carre
        tap_action:
          action: navigate
          navigation_path: /alarme-dashboard/alarme

    # ==========================================================
    # 🧩 CONTENU PRINCIPAL
    # ==========================================================
    cards:
      - type: vertical-stack
        cards:

          # ==========================================================
          # 🧠 COHÉRENCE SYSTÈME
          # ==========================================================
          - type: custom:button-card
            template: section_header
            name: 🧠 Cohérence système
    
          - type: custom:button-card
            entity: binary_sensor.alarme_systeme_coherent
            template: alarme_diagnostic_coherence
    
          - type: custom:button-card
            entity: binary_sensor.alarme_systeme_coherent
            template: alarme_diagnostic_coherence_raison
    
    
          # ==========================================================
          # ⏳ ÉTATS TEMPORELS
          # ==========================================================
          - type: custom:button-card
            template: section_header
            name: ⏳ États temporels

          - type: grid
            square: false
            columns: 3
            cards:
        
              - type: custom:button-card
                entity: binary_sensor.delai_desarmement_en_cours
                template: status_72_info_transitoire
                name: Délai désarmement
        
              - type: custom:button-card
                entity: timer.delai_entree
                template: status_72_info_transitoire
                name: Délai entrée
        
              - type: custom:button-card
                entity: binary_sensor.alarme_armee_auto_recentement
                template: status_72_info_transitoire
                name: Armement récent
    
    
          # ==========================================================
          # 🚨 DIVERGENCE PERSISTANTE
          # ==========================================================
          - type: custom:button-card
            template: section_header
            name: 🚨 Divergence persistante
    
          - type: custom:button-card
            entity: automation.alarme_alerte_divergence_etat_reel_cible
            template: alarme_diagnostic_divergence_persistante
    
    
          # ==========================================================
          # 🔒 SANTÉ DES AUTORITÉS
          # ==========================================================
          - type: custom:button-card
            template: section_header
            name: 🔒 Santé autorités

          - type: custom:button-card
            entity: alarm_control_panel.alarme_maison
            template: alarme_diagnostic_autorite_compact
            name: Panneau alarme

          - type: grid
            columns: 2
            square: false
            cards:

              - type: custom:button-card
                entity: script.alarme_decision_centrale
                template: alarme_diagnostic_autorite_compact
                name: Cerveau décision

              - type: custom:button-card
                entity: automation.alarme_application_decision_centrale
                template: alarme_diagnostic_autorite_application_compact
                name: Application décision

              - type: custom:button-card
                entity: script.alarme_armer
                template: alarme_diagnostic_autorite_compact
                name: Script armer
    
              - type: custom:button-card
                entity: script.alarme_desarmer
                template: alarme_diagnostic_autorite_compact
                name: Script désarmer
