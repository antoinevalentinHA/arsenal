button_card_templates: !include_dir_merge_named /config/button_card_templates
title: Diagnostics Éclairage
icon: mdi:lightbulb

views:
  ####################################
  # 💡 ÉCLAIRAGE
  ####################################
  - title: Diagnostics Éclairage
    path: eclairage
    icon: mdi:lightbulb

    badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

      - type: custom:button-card
        template: bouton_retour_badge_carre
        tap_action:
          action: navigate
          navigation_path: /eclairage-dashboard/home

    ########################################################
    # 🌟 VERTICAL STACK PRINCIPAL
    ########################################################
    cards:
      - type: vertical-stack
        cards:

          # 🔍 Informations internes

          - type: custom:button-card
            template: section_header
            name: 🎭 Simulation de présence

          # 🛠️ Paramètres globaux
          - type: custom:button-card
            template: sub_section_header
            name: 🛠️ Paramètres globaux

          - type: grid
            columns: 2
            square: false
            cards:

              - type: custom:button-card
                template: socle_info_72
                entity: input_select.mode_maison
                name: Mode maison
                icon: mdi:home-switch

              - type: custom:button-card
                template: status_72_on_off
                entity: input_boolean.test_simulation_presence
                name: Test simulation présence
                icon: mdi:test-tube

          # 🛏️ Zone : Parents
          - type: custom:button-card
            template: sub_section_header
            name: 🛏️ Simulation parents

          - type: grid
            columns: 3
            square: false
            cards:

              - type: custom:button-card
                template: status_72_on_off
                entity: switch.prise_lampe_parents
                name: Lampes
                icon: mdi:lightbulb

              - type: custom:button-card
                template: socle_info_72
                entity: input_text.horaires_simulation_presence_matin
                name: Horaires matin
                icon: mdi:weather-sunset-up

              - type: custom:button-card
                template: socle_info_72
                entity: input_text.horaires_simulation_presence_soir
                name: Horaires soir
                icon: mdi:weather-sunset-down

          # 🏠 Zone : Garage
          - type: custom:button-card
            template: sub_section_header
            name: 🏠 Simulation garage

          - type: grid
            columns: 3
            square: false
            cards:

              - type: custom:button-card
                template: status_72_on_off
                entity: input_boolean.garage_light_state
                name: Lampes
                icon: mdi:lightbulb

              - type: custom:button-card
                template: socle_info_72
                entity: input_text.horaires_simulation_presence_garage_matin
                name: Horaires matin
                icon: mdi:weather-sunset-up

              - type: custom:button-card
                template: socle_info_72
                entity: input_text.horaires_simulation_presence_garage_soir
                name: Horaires soir
                icon: mdi:weather-sunset-down
