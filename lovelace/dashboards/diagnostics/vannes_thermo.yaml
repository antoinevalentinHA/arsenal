button_card_templates: !include_dir_merge_named /config/button_card_templates

title: Vannes thermostatiques
icon: mdi:radiator

views:
  - title: Vannes thermostatiques
    path: diagnostics-vannes
    icon: mdi:radiator

    badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

      - type: custom:button-card
        template: bouton_retour_badge_carre
        tap_action:
          action: navigate
          navigation_path: /diagnostics-chauffage-dashboard/diagnostics-chauffage

    ########################################################
    # ♨️ VERTICAL STACK PRINCIPAL
    ########################################################

    cards:
      - type: vertical-stack
        cards:

          - type: custom:button-card
            template: section_header
            name: 🧰 Diagnostic vannes thermostatiques

          - type: entities
            entities:
              - entity: input_select.adjustment_piece
                name: Pièce sélectionnée

          - type: markdown
            content: |
              {% set piece = states('input_select.adjustment_piece') %}
              {% set plateau_strict = states('sensor.plateau_thermostatique_' ~ piece) %}
              {% set plateau_affichage = states('sensor.plateau_thermostatique_piece_affichage') %}
              {% set mean = states('sensor.temperature_stats_12h_mean_' ~ piece) %}
              {% set variance = states('sensor.temperature_stats_12h_variance_' ~ piece) %}

              **🌡️ Plateau thermostatique :**  
              • Détection stricte : `{{ plateau_strict }}`  
              • Valeur affichée : **{{ plateau_affichage }} °C**

              **📊 Moyenne 12h :**  
              • {{ mean }} °C

              **📈 Variance 12h :**  
              • {{ variance }}

              {% set v = variance | float(99) %}
              {% if v < 0.02 %}
                🟩 **Pièce très stable — plateau parfaitement détecté**
              {% elif v < 0.05 %}
                🟧 **Pièce modérément stable — presque un plateau**
              {% else %}
                🟥 **Pièce instable — variations importantes**
              {% endif %}

          - type: custom:button-card
            template: badge_action_confirmee
            icon: mdi:restart
            variables: 
              action_service: script.reset_plateau_piece
              confirm: >
                🔄 Réinitialiser le plateau thermostatique
                pour la pièce sélectionnée ?
              bg_color: rgba(255, 152, 0, 0.2)
              icon_color: '#EF6C00'