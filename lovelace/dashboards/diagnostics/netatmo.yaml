button_card_templates: !include_dir_merge_named /config/button_card_templates

title: Diagnostics Netatmo
icon: mdi:weather-partly-rainy

views:
  ####################################
  # 📡 DIAGNOSTICS NETATMO
  ####################################
  - title: Netatmo
    path: netatmo
    icon: mdi:weather-partly-rainy

    # ==========================================================
    # 🧭 BADGES — Navigation
    # ==========================================================
    badges: !include ../../includes/badges/diagnostics_systeme.yaml

    # ==========================================================
    # 🧩 CONTENU PRINCIPAL
    # ==========================================================
    cards:
      - type: vertical-stack
        cards:

          ########################################################
          # 📡 SECTION : Qualite radio WiFi Netatmo
          ########################################################
          - type: custom:button-card
            template: section_header
            name: 📡 Qualité radio WiFi

          - !include ../../includes/cartes/barres_netatmo_wifi.yaml

          ########################################################
          # 📡 SECTION : Qualite radio RF Netatmo
          ########################################################
          - type: custom:button-card
            template: section_header
            name: 📡 Qualité radio RF

          - !include ../../includes/cartes/barres_netatmo_rf.yaml

          ########################################################
          # 📡 SECTION : Reachability Netatmo
          ########################################################
          - !include ../../includes/cartes/netatmo_reachability.yaml