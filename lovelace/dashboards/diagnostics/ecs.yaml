button_card_templates: !include_dir_merge_named /config/button_card_templates

title: Diagnostics ECS
icon: mdi:water-pump

views:
  ####################################
  # 🚿 ECS
  ####################################
  - title: Diagnostics ECS
    path: diagnostics-ecs
    icon: mdi:water-pump

    badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

      - type: custom:button-card
        template: bouton_retour_badge_carre
        tap_action:
          action: navigate
          navigation_path: /ecs-dashboard/home

    ########################################################
    # 🔧 VERTICAL STACK PRINCIPAL
    ########################################################
    cards:
      - type: vertical-stack
        cards:

          ########################################################
          # 🚿 SECTION : ECS – Données internes
          ########################################################
          - type: custom:button-card
            template: section_header
            name: 🚿 ECS – Données internes

          - !include ../../includes/cartes/ecs_etat_programmation.yaml

          - type: grid
            columns: 3
            square: false
            cards:

              - type: custom:button-card
                template: ecs_synthese_status_72
                name: ECS
                icon: mdi:water-boiler
                variables:
                  kind: bool
                  entity: binary_sensor.vscotho1_200_11_chargement_de_l_ecs
                  label_on: En chauffe
                  label_off: Au repos

              - type: custom:button-card
                template: ecs_synthese_status_72
                name: ViCare
                icon: mdi:cloud-check
                variables:
                  kind: bool
                  entity: binary_sensor.vicare_api_disponible
                  label_on: Disponible
                  label_off: Indispo

              - type: custom:button-card
                template: ecs_synthese_status_72
                name: Consigne
                icon: mdi:thermometer
                variables:
                  kind: dhw_setpoint_10
                  entity: number.vscotho1_200_11_dhw_temperature

          - !include ../../includes/cartes/ecs_dernier_cycle.yaml

          ########################################################
          # 🏠 SECTION : ECS – Petite Maison
          ########################################################

          - !include ../../includes/section_headers/ecs_petite_maison.yaml

          - !include ../../includes/cartes/ecs_petite_maison.yaml
