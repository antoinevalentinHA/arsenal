button_card_templates: !include_dir_merge_named /config/button_card_templates

title: Diagnostics Bluetooth
icon: mdi:signal

views:
  ####################################
  # 🔋 DIAGNOSTICS BATTERIES
  ####################################
  - title: Bluetooth
    path: bluetooth
    icon: mdi:bluetooth

    # ==========================================================
    # 🧭 BADGES — Navigation
    # ==========================================================
    badges: !include ../../includes/badges/diagnostics_systeme.yaml

    # ==========================================================
    # 🧩 CONTENU PRINCIPAL
    # ==========================================================
    cards:
      - type: vertical-stack
        cards:

          ########################################################
          # 📡 SECTION : Qualite radio Bluetooth (RSSI)
          ########################################################
          - !include ../../includes/section_headers/details.yaml

          - !include ../../includes/cartes/barres_bluetooth.yaml

          ########################################################
          # 🧪 TEST TEMPORAIRE — Comparaison BLE bots cave
          ########################################################

          - type: custom:button-card
            template: section_header
            name: 🧪 Comparaison BLE bots cave

          - type: custom:auto-entities
            filter:
              include:
                - entity_id: sensor.bot_deshumidificateur_signal_moyenne_24h
                - entity_id: sensor.bot_candidat_1_signal_moyenne_24h
                - entity_id: sensor.bot_candidat_2_signal_moyenne_24h
                - entity_id: sensor.bot_candidat_3_signal_moyenne_24h
            sort:
              method: state
              numeric: true
              reverse: true
            card:
              type: custom:bar-card
              title: Moyenne 24 h
              unit_of_measurement: ""
              show_header_toggle: false
              entity_row: true
              min: -100
              max: -30
              severity:
                - from: -100
                  to: -91
                  color: "rgba(244, 67, 54, 0.2)"
                - from: -90
                  to: -81
                  color: "rgba(255, 152, 0, 0.25)"
                - from: -80
                  to: -71
                  color: "rgba(255, 193, 7, 0.25)"
                - from: -70
                  to: -30
                  color: "rgba(76, 175, 80, 0.2)"
              style: |
                ha-card {
                  border-radius: 12px;
                  box-shadow: var(--ha-card-box-shadow);
                  padding: 8px;
                }

          - type: custom:auto-entities
            filter:
              include:
                - entity_id: sensor.bot_deshumidificateur_signal_min_24h
                - entity_id: sensor.bot_candidat_1_signal_min_24h
                - entity_id: sensor.bot_candidat_2_signal_min_24h
                - entity_id: sensor.bot_candidat_3_signal_min_24h
            sort:
              method: state
              numeric: true
              reverse: true
            card:
              type: custom:bar-card
              title: Minimum 24 h
              unit_of_measurement: ""
              show_header_toggle: false
              entity_row: true
              min: -110
              max: -30
              severity:
                - from: -110
                  to: -91
                  color: "rgba(244, 67, 54, 0.2)"
                - from: -90
                  to: -81
                  color: "rgba(255, 152, 0, 0.25)"
                - from: -80
                  to: -71
                  color: "rgba(255, 193, 7, 0.25)"
                - from: -70
                  to: -30
                  color: "rgba(76, 175, 80, 0.2)"
              style: |
                ha-card {
                  border-radius: 12px;
                  box-shadow: var(--ha-card-box-shadow);
                  padding: 8px;
                }