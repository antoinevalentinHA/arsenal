button_card_templates: !include_dir_merge_named /config/button_card_templates

title: Diagnostics Zigbee
icon: mdi:signal

views:
  ####################################
  # 🔋 DIAGNOSTICS BATTERIES
  ####################################
  - title: Zigbee
    path: zigbee
    icon: mdi:zigbee

    # ==========================================================
    # 🧭 BADGES — Navigation
    # ==========================================================
    badges: !include ../../includes/badges/diagnostics_systeme.yaml

    # ==========================================================
    # 🧩 CONTENU PRINCIPAL
    # ==========================================================
    cards:
      - type: vertical-stack
        cards:

          ########################################################
          # 📡 SECTION : Qualité réseau Zigbee (LQI)
          ########################################################
          - !include ../../includes/section_headers/details.yaml
          
          - type: custom:auto-entities
            filter:
              include:
                - entity_id: "sensor.*_linkquality"
                  state: "> 0"
            sort:
              method: state
              numeric: true
              reverse: false
            card:
              type: custom:bar-card
              unit_of_measurement: ""
              show_header_toggle: false
              entity_row: true
              min: 0
              max: 255
              severity:
                - from: 0
                  to: 39
                  color: "rgba(244, 67, 54, 0.9)"      # 🔴 lien faible
                - from: 40
                  to: 79
                  color: "rgba(255, 152, 0, 0.85)"     # 🟠 médiocre
                - from: 80
                  to: 139
                  color: "rgba(255, 235, 59, 0.85)"    # 🟡 correct
                - from: 140
                  to: 255
                  color: "rgba(76, 175, 80, 0.9)"      # 🟢 bon / excellent
              style: |
                ha-card {
                  border-radius: 12px;
                  box-shadow: var(--ha-card-box-shadow);
                  padding: 8px;
                }