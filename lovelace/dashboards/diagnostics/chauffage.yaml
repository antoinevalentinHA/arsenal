button_card_templates: !include_dir_merge_named /config/button_card_templates

title: Diagnostics Chauffage
icon: mdi:fire

views:
  - title: Diagnostics Chauffage
    path: diagnostics-chauffage
    icon: mdi:fire

    badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

      - type: custom:button-card
        template: bouton_retour_badge_carre
        tap_action:
          action: navigate
          navigation_path: /chauffage-dashboard/chauffage

      - type: custom:button-card
        template: bouton_navigation_badge_carre
        name: Vannes thermostatiques
        icon: mdi:radiator
        tap_action:
          action: navigate
          navigation_path: /diagnostics-vannes-dashboard/diagnostics-vannes

      - type: custom:button-card
        template: bouton_navigation_badge_carre
        name: Diagnostics thermiques
        icon: mdi:magnify
        tap_action:
          action: navigate
          navigation_path: /diagnostics-thermiques-dashboard/diagnostics-thermiques

    ########################################################
    # ♨️ VERTICAL STACK PRINCIPAL
    ########################################################

    cards:
      - type: vertical-stack
        cards:

          ########################################################
          # 📊 1) Performances chauffage
          ########################################################

          - type: custom:button-card
            template: section_header
            name: 🍃 Utilisation mode éco

          - type: custom:bar-card
            columns: 1
            entities:
              - entity: sensor.pourcentage_consigne_eco_24h_proxy
                name: "24h"
                icon: mdi:leaf
              - entity: sensor.pourcentage_consigne_eco_7j_proxy
                name: "7j"
                icon: mdi:leaf
            unit_of_measurement: "%"
            max: 100
            direction: right
            height: 36px
            positions:
              icon: inside
              name: inside
              value: inside
            animation:
              state: 'off'
              speed: 2
            card_mod:
              style: |
                ha-card {
                  border-radius: 16px;
                  box-shadow: var(--ha-card-box-shadow);
                  padding: 8px 10px;
                }

                /* 🔵 Barre remplie = BLEU info canon */
                bar-card-currentbar {
                  background-color: rgba(33, 150, 243, 0.2) !important;
                }

                /* ⚪ Fond de barre = GRIS neutre canon */
                bar-card-backgroundbar {
                  background-color: rgba(158, 158, 158, 0.2) !important;
                }

                /* Compact : espace entre les 2 barres */
                bar-card-card { margin-top: 6px; }
                bar-card-card:first-child { margin-top: 0px; }

                /* Typo */
                bar-card-value { font-weight: 700; }
                bar-card-name  { font-weight: 600; }

                /* ✅ Lisibilité sans trahir Arsenal :
                   "chips" NAV/HUB derrière le texte (structure UI) */
                bar-card-name,
                bar-card-value {
                  background: rgba(90, 110, 130, 0.08);
                  padding: 2px 8px;
                  border-radius: 999px;
                }

                /* Icône : reste sur la couleur texte (noir chez toi) */
                ha-icon { color: var(--primary-text-color); }

          ########################################################
          # 🧩 2) Diagnostic local
          ########################################################

          - type: custom:button-card
            template: section_header
            name: 🔥 État global

          - type: custom:button-card
            template: chauffage_diagnostic_global_compact

          ########################################################
          # 🔒 2bis) Verrou aération / post-aération (diagnostic)
          ########################################################

          - type: custom:button-card
            template: section_header
            name: 🔒 Verrou post-aération

          - type: custom:button-card
            template: chauffage_synthese_blocage_aeration_xl

          ########################################################
          # 🎯 3) Consignes & Écarts
          ########################################################

          - type: custom:button-card
            template: section_header
            name: 📐 Réglage thermique

          - type: custom:button-card
            template: chauffage_reglage_courbe_diag_72
            name: Réglages
            variables:
              kind: global

          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:button-card
                template: chauffage_reglage_courbe_diag_72
                name: Tendance 24h
                variables:
                  kind: tendance_24h

              - type: custom:button-card
                template: chauffage_reglage_courbe_diag_72
                name: Froid
                variables:
                  kind: froid

          - type: custom:button-card
            template: section_header
            name: 🔁 Auto-ajustement courbe de chauffe

          - type: custom:button-card
            template: chauffage_auto_courbe_status_72
            name: Auto-ajustement
            variables:
              kind: auto

          - type: custom:button-card
            template: chauffage_auto_courbe_status_72
            name: Dernier ajustement
            variables:
              kind: last
