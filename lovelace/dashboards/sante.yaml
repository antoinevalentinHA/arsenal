button_card_templates: !include_dir_merge_named /config/button_card_templates

views:
  - badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre
        icon: mdi:sleep
        tap_action:
          action: navigate
          navigation_path: /sommeil-dashboard/0

    # ==========================================================
    # 🧩 CONTENEUR PRINCIPAL
    # ----------------------------------------------------------
    cards:
      - type: vertical-stack
        cards:
          ########################################################
          # 💤 SOMMEIL & RÉCUPÉRATION
          ########################################################
          - type: custom:button-card
            template: section_header
            name: 💤 Sommeil

          # Durée totale (texte)
          - type: custom:button-card
            template: carte_duree_qualitative
            entity: input_text.sommeil_derniere_nuit_texte
            name: Sommeil total
            icon: mdi:bed-clock
            tap_action:
              action: more-info
              entity: input_number.sommeil_derniere_nuit_total

          ########################################################
          # ❤️ SANTÉ / ACTIVITÉ PHYSIOLOGIQUE
          ########################################################
          - type: custom:button-card
            template: section_header
            name: 🫀 Fréquence cardiaque

          - type: grid
            columns: 3
            square: false
            cards:
              # Fréquence cardiaque min
              - type: custom:button-card
                template: carte_frequence_cardiaque_qualitative
                entity: sensor.withings_frequence_cardiaque_minimale_local
                name: Mini
                icon: mdi:heart-pulse

              # Fréquence cardiaque moyenne
              - type: custom:button-card
                template: carte_frequence_cardiaque_qualitative
                entity: sensor.withings_average_heart_rate_local
                name: Moyenne
                icon: mdi:heart-pulse

              # Fréquence cardiaque max
              - type: custom:button-card
                template: carte_frequence_cardiaque_qualitative
                entity: sensor.withings_frequence_cardiaque_maximale_local
                name: Maxi
                icon: mdi:heart-pulse

          - type: custom:button-card
            template: section_header
            name: 🫁 Fréquence respiratoire

          - type: grid
            columns: 3
            square: false
            cards:
              # Fréquence respiratoire min
              - type: custom:button-card
                template: carte_frequence_respiratoire_qualitative
                entity: sensor.withings_minimum_respiratory_rate_local
                name: Mini
                icon: mdi:lungs

              # Fréquence respiratoire moyenne
              - type: custom:button-card
                template: carte_frequence_respiratoire_qualitative
                entity: sensor.withings_average_respiratory_rate_local
                name: Moyenne
                icon: mdi:lungs

              # Fréquence respiratoire max
              - type: custom:button-card
                template: carte_frequence_respiratoire_qualitative
                entity: sensor.withings_maximum_respiratory_rate_local
                name: Maxi
                icon: mdi:lungs

          ########################################################
          # 🏃 ACTIVITÉ PHYSIQUE
          ########################################################
          - type: custom:button-card
            template: section_header
            name: 🏃 Activité

          - type: grid
            columns: 3
            square: false
            cards:
              # Nombre de pas
              - type: custom:button-card
                template: carte_activite_pas_quotidiens
                entity: sensor.withings_steps_today_local
                name: Pas du jour
                icon: mdi:walk

              # Distance parcourue
              - type: custom:button-card
                template: carte_activite_distance_quotidienne
                entity: sensor.withings_distance_travelled_today_local
                name: Distance parcourue
                icon: mdi:map-marker-distance

              # Calories brûlées
              - type: custom:button-card
                template: carte_activite_calories_quotidiennes
                entity: sensor.withings_total_calories_burnt_today_local
                name: Calories totales
                icon: mdi:fire
