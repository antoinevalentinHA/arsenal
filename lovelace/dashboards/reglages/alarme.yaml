button_card_templates: !include_dir_merge_named /config/button_card_templates

title: Réglages Alarme
icon: mdi:shield-home

views:
  - title: Alarme
    path: alarme
    icon: mdi:shield-home
    badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

      - type: custom:button-card
        entity: input_boolean.navigation_menu
        template: bouton_retour_badge_carre
        tap_action:
          action: navigate
          navigation_path: /alarme-dashboard/alarme

    cards:
      - type: vertical-stack
        cards:

          - type: custom:button-card
            template: section_header
            name: 🧪 Mode test

          - type: entities
            show_header_toggle: false
            entities:
              - entity: input_boolean.mode_test_alarme
                name: Mode test

          - type: custom:button-card
            template: section_header
            name: 🔐 Mode d'armement

          - type: entities
            show_header_toggle: false
            entities:
              - entity: input_select.mode_alarme
                name: Mode d’armement

          - type: custom:button-card
            template: section_header
            name: 🧑‍🤝‍🧑 Mode visiteur

          - type: entities
            show_header_toggle: false
            entities:
              - entity: input_boolean.mode_visiteur
                name: Programmation du mode visiteur
              - entity: input_boolean.bouclage_visiteur
                name: Bouclage ECS pendant visite
              - entity: input_select.jour_visiteur
                name: Jour planifié
              - entity: input_datetime.visiteur_start
                name: Heure de début
              - entity: input_datetime.visiteur_end
                name: Heure de fin

          - type: custom:button-card
            template: section_header
            name: 🌍 Zone sécurité

          - type: entities
            show_header_toggle: false
            entities:
              - entity: input_number.zone_securite_radius
                name: Rayon de la zone sécurité (m)

          - type: custom:button-card
            template: section_header
            name: 🚨 Sirène

          - type: entities
            show_header_toggle: false
            entities:
              - entity: number.sirene_max_duration
                name: Durée (sirène)
                icon: mdi:timer-alert
              - entity: input_number.alarme_delai_entree
                name: Délai d’entrée (secondes)
                icon: mdi:timer-outline

          - type: custom:button-card
            template: carte_action_critique
            entity: script.sirene_brutale
            name: Tester la sirène
            icon: mdi:bullhorn
            variables:
              confirmation: "⚠️ Faire sonner la sirène ?"
