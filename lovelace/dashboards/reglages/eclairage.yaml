button_card_templates: !include_dir_merge_named /config/button_card_templates

title: Réglages Éclairage
icon: mdi:lightbulb

views:
  - title: Éclairage
    path: eclairage
    icon: mdi:lightbulb
    badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

      - type: custom:button-card
        template: bouton_retour_badge_carre
        tap_action:
          action: navigate
          navigation_path: /eclairage-dashboard/home

    cards:
      - type: vertical-stack
        cards:

          - type: custom:button-card
            template: section_header
            name: 💡 Éclairage auto

          - type: grid
            square: false
            columns: 2
            cards:

              - type: tile
                entity: input_boolean.garage_auto_light
                name: Garage 🚘

              - type: tile
                entity: input_number.duree_absence_garage
                name: Délai extinction garage (min)
                features_position: inline
                features:
                  - type: numeric-input
                    style: buttons

              - type: tile
                entity: input_boolean.sejour_auto_light
                name: Séjour 🛋️

              - type: tile
                entity: input_number.duree_absence_sejour
                name: Délai extinction séjour (min)
                features_position: inline
                features:
                  - type: numeric-input
                    style: buttons

              - type: tile
                entity: input_boolean.prise_baies_vitrees_auto
                name: Allumage auto Sapin 🎄

              - type: tile
                entity: input_number.duree_absence_guirlande
                name: Délai extinction sapin (min)
                features_position: inline
                features:
                  - type: numeric-input
                    style: buttons

          - type: custom:button-card
            template: section_header
            name: 💡 Jardin

          - type: custom:button-card
            template: sub_section_header
            name: 🔘 Activation des automatismes

          - type: grid
            square: false
            columns: 2
            cards:

              - type: tile
                entity: input_boolean.auto_lumiere_jardin_matin
                name: Matin

              - type: tile
                entity: input_boolean.auto_lumiere_jardin_soir
                name: Soir

          - type: custom:button-card
            template: sub_section_header
            name: 🌅 Réglages du matin

          - type: tile
            entity: input_datetime.heure_allumage_jardin_matin
            name: Heure d’allumage

          - type: tile
            entity: input_number.delai_extinction_jardin_matin
            name: Délai après lever du jour (min)
            features_position: inline
            features:
              - type: numeric-input
                style: buttons

          - type: tile
            entity: input_datetime.heure_extinction_jardin_matin_fixe
            name: Heure d’extinction fixe

          - type: custom:button-card
            template: sub_section_header
            name: 🌇 Réglages du soir

          - type: tile
            entity: input_number.delai_allumage_jardin_soir
            name: Délai après coucher du soleil (min)
            features_position: inline
            features:
              - type: numeric-input
                style: buttons

          - type: tile
            entity: input_number.duree_lumiere_jardin_soir
            name: Durée de l’éclairage
            features_position: inline
            features:
              - type: numeric-input
                style: buttons

          - type: custom:button-card
            template: section_header
            name: 🛏️ Simulation de présence (Vacances)

          # ⏱️ Durée
          - type: custom:button-card
            template: sub_section_header
            name: ⏱️ Durée (min)

          - type: grid
            square: false
            columns: 2
            cards:

              - type: tile
                entity: input_number.duree_min_cycle_simulation_presence
                name: min
                features_position: inline
                features:
                  - type: numeric-input
                    style: buttons

              - type: tile
                entity: input_number.duree_max_cycle_simulation_presence
                name: max
                features_position: inline
                features:
                  - type: numeric-input
                    style: buttons

          - type: tile
            entity: input_boolean.test_simulation_presence
            name: Activer le mode test

          # 🌅 Réglages matin - Parents
          - type: custom:button-card
            template: sub_section_header
            name: 🌅 Réglages du matin (Parents)

          - type: grid
            square: false
            columns: 2
            cards:

              - type: tile
                entity: input_datetime.debut_cycle_simulation_presence_matin
                name: "de"

              - type: tile
                entity: input_datetime.fin_cycle_simulation_presence_matin
                name: "à"

          - type: tile
            entity: input_number.nb_cycles_simulation_presence_matin
            name: Cycles
            features_position: inline
            features:
              - type: numeric-input
                style: buttons

          # 🌇 Réglages soir - Parents
          - type: custom:button-card
            template: sub_section_header
            name: 🌇 Réglages du soir (Parents)

          - type: grid
            square: false
            columns: 2
            cards:

              - type: tile
                entity: input_datetime.debut_cycle_simulation_presence_soir
                name: "de"

              - type: tile
                entity: input_datetime.fin_cycle_simulation_presence_soir
                name: "à"

          - type: tile
            entity: input_number.nb_cycles_simulation_presence_soir
            name: Cycles
            features_position: inline
            features:
              - type: numeric-input
                style: buttons

          # 🏠 Garage
          - type: custom:button-card
            template: section_header
            name: 🏠 Simulation de présence – Garage

          # 🌅 Réglages matin - Garage
          - type: custom:button-card
            template: sub_section_header
            name: 🌅 Réglages du matin (Garage)

          - type: grid
            square: false
            columns: 2
            cards:

              - type: tile
                entity: input_datetime.debut_cycle_simulation_presence_garage_matin
                name: "de"

              - type: tile
                entity: input_datetime.fin_cycle_simulation_presence_garage_matin
                name: "à"

          - type: tile
            entity: input_number.nb_cycles_simulation_presence_garage_matin
            name: Cycles
            features_position: inline
            features:
              - type: numeric-input
                style: buttons

          # 🌇 Réglages soir - Garage
          - type: custom:button-card
            template: sub_section_header
            name: 🌇 Réglages du soir (Garage)

          - type: grid
            square: false
            columns: 2
            cards:

              - type: tile
                entity: input_datetime.debut_cycle_simulation_presence_garage_soir
                name: "de"

              - type: tile
                entity: input_datetime.fin_cycle_simulation_presence_garage_soir
                name: "à"

          - type: tile
            entity: input_number.nb_cycles_simulation_presence_garage_soir
            name: Cycles
            features_position: inline
            features:
              - type: numeric-input
                style: buttons
