button_card_templates: !include_dir_merge_named /config/button_card_templates

title: Réglages Maison
icon: mdi:home-variant

views:
  - title: Réglages Modes
    path: maison
    icon: mdi:home-variant
    badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

      - type: custom:button-card
        template: bouton_retour_badge_carre
        tap_action:
          action: navigate
          navigation_path: /modes-dashboard/home

    cards:
      - type: vertical-stack
        cards:

          # === Mode maison ===
          - type: custom:button-card
            template: section_header
            name: 🏠 Modes maison

          - type: tile
            entity: input_select.mode_maison
            name: Mode actuel
            features_position: bottom
            features:
              - type: select-options

          # === Babysitting ===
          - type: custom:button-card
            template: section_header
            name: 👶 Babysitting

          - type: custom:button-card
            template: carte_mode_toggle
            entity: input_boolean.mode_babysitting
            name: Activer Babysitting
            icon: mdi:account-child

          - type: tile
            entity: input_boolean.reset_mode_babysitting_auto
            name: Réinit auto à 5h
            icon: mdi:clock-check

          # === Vacances ===
          - type: custom:button-card
            template: section_header
            name: 🧳 Vacances

          - type: tile
            entity: input_boolean.mode_vacances_auto
            name: Activer la programmation

          - type: grid
            columns: 2
            square: false
            cards:

              - type: tile
                entity: input_datetime.debut_vacances
                name: Début des vacances
    
              - type: tile
                entity: input_datetime.fin_vacances
                name: Fin des vacances
