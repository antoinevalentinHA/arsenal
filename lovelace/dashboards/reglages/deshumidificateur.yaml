button_card_templates: !include_dir_merge_named /config/button_card_templates

title: Réglages Déshumidificateur
icon: mdi:air-filter

views:
  - title: Déshumidificateur
    path: deshumidificateur
    icon: mdi:air-filter
    badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

      - type: custom:button-card
        template: bouton_retour_badge_carre
        tap_action:
          action: navigate
          navigation_path: /deshumidificateur-dashboard/cave

    cards:
      - type: vertical-stack
        cards:

          - type: custom:button-card
            template: section_header
            name: 💧 Humidité relative

          - type: tile
            entity: input_number.cave_rh_cible_on
            name: Cible ON
            features_position: inline
            features:
              - type: numeric-input
                style: buttons

          - type: tile
            entity: input_number.cave_rh_cible_off
            name: Cible OFF
            features_position: inline
            features:
              - type: numeric-input
                style: buttons
