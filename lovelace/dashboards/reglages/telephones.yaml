button_card_templates: !include_dir_merge_named /config/button_card_templates

title: Téléphones
icon: mdi:cellphone-cog

views:
  - title: Réglages Téléphones
    path: reglages-telephones
    icon: mdi:cellphone

    badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

      - type: custom:button-card
        template: bouton_retour_badge_carre
        tap_action:
          action: navigate
          navigation_path: /system-dashboard/systeme

    ########################################################
    # ♨️ VERTICAL STACK PRINCIPAL
    ########################################################
    cards:
      - type: vertical-stack
        cards:

          ####################################################
          # 📱 TELEPHONES
          ####################################################
          - type: custom:button-card
            template: section_header
            name: 📱 Téléphones

          - type: entities
            entities:
              - entity: input_text.telephone_antoine
                name: Téléphone Antoine

              - entity: input_text.telephone_constance
                name: Téléphone Constance
