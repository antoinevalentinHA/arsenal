button_card_templates: !include_dir_merge_named /config/button_card_templates

title: Planning ECS
icon: mdi:calendar-week

views:
  - title: Planning ECS
    path: ecs_planning
    icon: mdi:calendar-week
    badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

      - type: custom:button-card
        template: bouton_retour_badge_carre
        tap_action:
          action: navigate
          navigation_path: /reglages-ecs-dashboard/ecs

    cards:

      - type: vertical-stack
        cards:

          # ======================================================
          # 🟦 BARRE D’ACTIONS
          # ======================================================
          - type: horizontal-stack
            cards:

              # marge gauche
              - type: custom:button-card
                template: bouton_spacer
                color_type: blank-card
              - type: custom:button-card
                template: bouton_spacer
                color_type: blank-card
              - type: custom:button-card
                template: bouton_spacer
                color_type: blank-card

              # sauvegarde
              - type: custom:button-card
                template: bouton_navigation_badge_carre
                icon: mdi:content-save
                tap_action:
                  action: call-service
                  service: pyscript.ecs_sauvegarde_planning
                styles:
                  icon:
                    - color: '#2E7D32'

              # restauration
              - type: custom:button-card
                template: bouton_navigation_badge_carre
                icon: mdi:backup-restore
                tap_action:
                  action: call-service
                  service: pyscript.ecs_restore_planning
                styles:
                  icon:
                    - color: '#B71C1C'

              # marge droite
              - type: custom:button-card
                template: bouton_spacer
                color_type: blank-card
              - type: custom:button-card
                template: bouton_spacer
                color_type: blank-card
              - type: custom:button-card
                template: bouton_spacer
                color_type: blank-card
              - type: custom:button-card
                template: bouton_spacer
                color_type: blank-card


          # ======================================================
          # 📅 LUNDI
          # ======================================================
          - type: custom:button-card
            template: section_header
            name: 📅 Lundi

          - type: horizontal-stack
            cards:

              - type: entities
                title: "🛁 Matin"
                show_header_toggle: false
                card_mod:
                  style: |
                    .card-header {
                      font-size: 15px !important;
                      font-weight: 500 !important;
                      color: #444;
                    }
                entities:
                  - entity: input_boolean.ecs_monday_matin_active
                    name: Actif
                  - entity: input_datetime.ecs_monday_matin_heure
                    name: " "
                    card_mod:
                      style: |
                        hui-generic-entity-row .name { display: none; }

              - type: entities
                title: "🛀 Soir"
                show_header_toggle: false
                card_mod:
                  style: |
                    .card-header {
                      font-size: 15px !important;
                      font-weight: 500 !important;
