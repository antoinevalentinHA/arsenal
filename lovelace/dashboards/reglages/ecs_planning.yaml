button_card_templates: !include_dir_merge_named /config/button_card_templates

title: Planning ECS
icon: mdi:calendar-week

views:
  - title: Planning ECS
    path: ecs_planning
    icon: mdi:calendar-week
    badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

      - type: custom:button-card
        template: bouton_retour_badge_carre
        tap_action:
          action: navigate
          navigation_path: /reglages-ecs-dashboard/ecs

    cards:

      - type: vertical-stack
        cards:

          # ======================================================
          # 🟦 BARRE D’ACTIONS
          # ======================================================
          - type: horizontal-stack
            cards:

              # marge gauche
              - type: custom:button-card
                template: bouton_spacer
                color_type: blank-card
              - type: custom:button-card
                template: bouton_spacer
                color_type: blank-card
              - type: custom:button-card
                template: bouton_spacer
                color_type: blank-card

              # sauvegarde
              - type: custom:button-card
                template: bouton_navigation_badge_carre
                icon: mdi:content-save
                tap_action:
                  action: call-service
                  service: script.ecs_sauvegarde_planning
                  confirmation:
                    text: "Confirmer la sauvegarde du planning ECS ?"
                styles:
                  icon:
                    - color: '#2E7D32'

              # restauration
              - type: custom:button-card
                template: bouton_navigation_badge_carre
                icon: mdi:backup-restore
                tap_action:
                  action: call-service
                  service: script.ecs_restore_planning
                  confirmation:
                    text: "⚠️ Confirmer la RESTAURATION du planning ECS ?"
                styles:
                  icon:
                    - color: '#B71C1C'

              # marge droite
              - type: custom:button-card
                template: bouton_spacer
                color_type: blank-card
              - type: custom:button-card
                template: bouton_spacer
                color_type: blank-card
              - type: custom:button-card
                template: bouton_spacer
                color_type: blank-card
              - type: custom:button-card
                template: bouton_spacer
                color_type: blank-card

          # ======================================================
          # 📅 LUNDI
          # ======================================================
          - type: custom:button-card
            template: section_header
            name: 📅 Lundi

          - type: grid
            square: false
            columns: 2
            cards:

              - type: custom:button-card
                template: sub_section_header
                name: "🛁 Matin"

              - type: custom:button-card
                template: sub_section_header
                name: "🛀 Soir"

              - type: horizontal-stack
                cards:

                  - type: tile
                    entity: input_boolean.ecs_monday_matin_active
                    name: Actif

                  - type: tile
                    entity: input_datetime.ecs_monday_matin_heure
                    name: "⏰"

              - type: horizontal-stack
                cards:

                  - type: tile
                    entity: input_boolean.ecs_monday_soir_active
                    name: Actif

                  - type: tile
                    entity: input_datetime.ecs_monday_soir_heure
                    name: "⏰"

          # ======================================================
          # 📅 MARDI
          # ======================================================
