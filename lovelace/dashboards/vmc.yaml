button_card_templates: !include_dir_merge_named /config/button_card_templates

views:
  - badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

      - type: custom:button-card
        template: bouton_parametres_badge_carre
        tap_action:
          action: navigate
          navigation_path: /reglages-vmc-dashboard/vmc

    ########################################################
    # 🧩 VERTICAL STACK PRINCIPAL
    ########################################################
    cards:
      - type: vertical-stack
        cards:

          ####################################################
          # 💨 ÉTAT GÉNÉRAL
          ####################################################
          - type: vertical-stack
            cards:
              - type: custom:button-card
                template: section_header
                name: 💨 État général

              # 🧠 INTENTION VMC (lecture métier)
              - type: custom:button-card
                template: carte_vmc_intention
                entity: sensor.vmc_intention

              - type: custom:button-card
                template: carte_mode_binaire_interprete
                entity: input_boolean.vmc_haute_vitesse
                name: VMC
                icon: mdi:fan
                tap_action: none
                variables:
                  label_on: High
                  label_off: Normal
                  color_on: rgba(244, 67, 54, 0.2)
                  color_off: rgba(76, 175, 80, 0.2)

          ####################################################
          # ⚙️ CONDITIONS ACTUELLES
          ####################################################
          - type: vertical-stack
            cards:
              - !include ../includes/section_headers/conditions_actuelles.yaml

              - type: grid
                columns: 3
                square: false
                cards:
                  - type: custom:button-card
                    template: vmc_capteur
                    entity: sensor.humidite_relative_sdb_parents
                    name: SDB Parents

                  - type: custom:button-card
                    template: vmc_capteur
                    entity: sensor.humidite_relative_sdb_enfants
                    name: SDB Enfants

                  - type: custom:button-card
                    template: vmc_capteur
                    entity: sensor.humidite_relative_sejour
                    name: Séjour

              - type: grid
                columns: 2
                square: false
                cards:

                  - type: custom:button-card
                    template: vmc_capteur
                    entity: sensor.co2_sejour
                    name: CO₂ Séjour

                  - type: custom:button-card
                    template: carte_etat_binaire_interprete_inverse
                    entity: binary_sensor.delta_ha_favorable_etage
                    name: Extraction
                    icon: mdi:weather-windy
                    tap_action: none
                    variables:
                      label_on: Extraction inutile
                      label_off: Extraction utile

          ####################################################
          # 📝 HISTORIQUE
          ####################################################
          - type: vertical-stack
            cards:
              - !include ../includes/section_headers/historique.yaml

              - type: history-graph
                entities:
                  - entity: input_boolean.vmc_haute_vitesse
