button_card_templates: !include_dir_merge_named /config/button_card_templates

title: Volets
icon: mdi:window-shutter

views:
  ####################################
  # 🪟 VOLETS – COMMANDES GÉNÉRALES
  ####################################
  - title: Volets
    path: volets
    icon: mdi:window-shutter

    badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

      - type: custom:button-card
        template: bouton_parametres_badge_carre
        tap_action:
          action: navigate
          navigation_path: /reglages-volets-dashboard/volets

      - type: custom:button-card
        template: bouton_diagnostics_badge_carre
        tap_action:
          action: navigate
          navigation_path: /diagnostics-volets-dashboard/volets

    ########################################################
    # 🧩 VERTICAL STACK PRINCIPAL
    ########################################################
    cards:
      - type: vertical-stack
        cards:

          ##################################################
          # 🏠 TOUS
          ##################################################
          - type: custom:button-card
            template: section_header
            name: 🏠 Tous

          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:button-card
                template: shutter_action_base
                variables:
                  name: Ouvrir
                  icon: mdi:window-shutter-open
                  service: script.ouvrir_tous_les_volets
                  confirm: Confirmez-vous l’ouverture de tous les volets ?

              - type: custom:button-card
                template: shutter_action_base
                variables:
                  name: Fermer
                  icon: mdi:window-shutter
                  service: script.fermer_tous_les_volets

          ##################################################
          # 🛋️ SÉJOUR
          ##################################################
          - type: custom:button-card
            template: section_header
            name: 🛋️ Séjour

          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:button-card
                template: sub_section_header
                name: ⬅️ Gauche

              - type: custom:button-card
                template: sub_section_header
                name: ➡️ Droit

          - type: grid
            columns: 4
            square: false
            cards:
              - type: custom:button-card
                template: shutter_action_base
                variables:
                  name: Ouvrir
                  icon: mdi:window-shutter-open
                  service: script.ouvrir_volet_sejour_gauche
                  confirm: Confirmez-vous l’ouverture des volets du séjour ?

              - type: custom:button-card
                template: shutter_action_base
                variables:
                  name: Fermer
                  icon: mdi:window-shutter
                  service: script.fermer_volet_sejour_gauche
                  confirm: Confirmez-vous la fermeture des volets du séjour ?

              - type: custom:button-card
                template: shutter_action_base
                variables:
                  name: Ouvrir
                  icon: mdi:window-shutter-open
                  service: script.ouvrir_volet_sejour_droit
                  confirm: Confirmez-vous l’ouverture des volets du séjour ?

              - type: custom:button-card
                template: shutter_action_base
                variables:
                  name: Fermer
                  icon: mdi:window-shutter
                  service: script.fermer_volet_sejour_droit
                  confirm: Confirmez-vous la fermeture des volets du séjour ?

          - type: custom:button-card
            template: sub_section_header
            name: 🛋️ Global

          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:button-card
                template: shutter_action_base
                variables:
                  name: Ouvrir
                  icon: mdi:window-shutter-open
                  service: script.ouvrir_volets_sejour
                  confirm: Confirmez-vous l’ouverture des volets du séjour ?

              - type: custom:button-card
                template: shutter_action_base
                variables:
                  name: Fermer
                  icon: mdi:window-shutter
                  service: script.fermer_volets_sejour
                  confirm: Confirmez-vous la fermeture des volets du séjour ?

          ######################################################
          # 🛏️ CHAMBRES
          ######################################################
          - type: custom:button-card
            template: section_header
            name: 🛏️ Chambres

          - type: grid
            columns: 2
            square: false
            cards:

              - type: custom:button-card
                template: sub_section_header
                name: 🛏️ Arnaud
    
              - type: custom:button-card
                template: sub_section_header
                name: 🛏️ Matthieu

          - type: grid
            columns: 4
            square: false
            cards:
              - type: custom:button-card
                template: shutter_action_base
                variables:
                  name: Ouvrir
                  icon: mdi:window-shutter-open
                  service: script.ouvrir_volet_arnaud
                  confirm: Confirmez-vous l’ouverture du volet de la chambre d’Arnaud ?

              - type: custom:button-card
                template: shutter_action_base
                variables:
                  name: Fermer
                  icon: mdi:window-shutter
                  service: script.fermer_volet_arnaud
                  confirm: Confirmez-vous la fermeture du volet de la chambre d’Arnaud ?

              - type: custom:button-card
                template: shutter_action_base
                variables:
                  name: Ouvrir
                  icon: mdi:window-shutter-open
                  service: script.ouvrir_volet_matthieu
                  confirm: Confirmez-vous l’ouverture du volet de la chambre de Matthieu ?

              - type: custom:button-card
                template: shutter_action_base
                variables:
                  name: Fermer
                  icon: mdi:window-shutter
                  service: script.fermer_volet_matthieu
                  confirm: Confirmez-vous la fermeture du volet de la chambre de Matthieu ?

          - type: custom:button-card
            template: sub_section_header
            name: 🛏 Global

          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:button-card
                template: shutter_action_base
                variables:
                  name: Ouvrir
                  icon: mdi:window-shutter-open
                  service: script.ouvrir_volets_enfants
                  confirm: Confirmez-vous l’ouverture des volets des chambres ?

              - type: custom:button-card
                template: shutter_action_base
                variables:
                  name: Fermer
                  icon: mdi:window-shutter
                  service: script.fermer_volets_enfants
                  confirm: Confirmez-vous la fermeture des volets des chambres ?
