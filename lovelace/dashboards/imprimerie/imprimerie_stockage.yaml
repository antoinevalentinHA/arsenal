button_card_templates: !include_dir_merge_named /config/button_card_templates
title: Stockage
icon: mdi:server

views:
  ####################################
  # 📦 STOCKAGE
  ####################################
  - title: Stockage
    path: stockage
    icon: mdi:server

    badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

    ########################################################
    # 🧩 VERTICAL STACK PRINCIPAL
    ########################################################
    cards:
      - type: vertical-stack
        cards:

          - !include ../../includes/navigation/imprimerie.yaml

          - !include ../../includes/section_headers/conditions_actuelles.yaml

          - type: markdown
            content: >
              **Carton :**

              🌡️ Température : **{{ states('sensor.temperature_stock_carton') }} °C**  

              💧 Humidité : **{{ states('sensor.humidite_relative_stock_carton') }} %**


              **Produits finis :**

              🌡️ Température : **{{ states('sensor.temperature_stock_pf') }} °C**  

              💧 Humidité : **{{ states('sensor.humidite_relative_stock_pf') }} %**

          - !include ../../includes/section_headers/min_max_semaine.yaml

          - type: markdown
            content: >
              **Carton :**

              • 🌡️ Température min : **{{ states('input_number.stock_carton_temperature_min') }} °C**  

              • 🌡️ Température max : **{{ states('input_number.stock_carton_temperature_max') }} °C**  

              • 💧 HR min : **{{ states('input_number.stock_carton_humidite_min') }} %**  

              • 💧 HR max : **{{ states('input_number.stock_carton_humidite_max') }} %**


              **Produits finis :**

              • 🌡️ Température min : **{{ states('input_number.stock_pf_temperature_min') }} °C**  

              • 🌡️ Température max : **{{ states('input_number.stock_pf_temperature_max') }} °C**  

              • 💧 HR min : **{{ states('input_number.stock_pf_humidite_min') }} %**  

              • 💧 HR max : **{{ states('input_number.stock_pf_humidite_max') }} %**
            card_mod:
              style: |
                ha-card {
                  padding: 8px 12px;
                  font-size: 14px;
                }

          - !include ../../includes/section_headers/historique_4_semaines.yaml

          - type: markdown
            content: |
              **Carton :**
              1️⃣ {{ states('input_text.conditions_carton_semaine_1') }}

              2️⃣ {{ states('input_text.conditions_carton_semaine_2') }}

              3️⃣ {{ states('input_text.conditions_carton_semaine_3') }}

              4️⃣ {{ states('input_text.conditions_carton_semaine_4') }}

              **Produits finis :**
              1️⃣ {{ states('input_text.conditions_pf_semaine_1') }}

              2️⃣ {{ states('input_text.conditions_pf_semaine_2') }}

              3️⃣ {{ states('input_text.conditions_pf_semaine_3') }}

              4️⃣ {{ states('input_text.conditions_pf_semaine_4') }}
            card_mod:
              style: |
                ha-card {
                  padding: 8px 12px;
                  font-size: 14px;
                }

          - type: horizontal-stack
            cards:
              - type: custom:button-card
                template: badge_action_confirmee
                icon: mdi:delete-outline
                variables:
                  action_service: script.reset_stock_historique
                  confirm: 🗑️ Réinitialiser l’historique hebdo des stocks ?
                  bg_color: rgba(244, 67, 54, 0.2)
                  icon_color: '#B71C1C'

              - type: custom:button-card
                template: badge_action_confirmee
                icon: mdi:playlist-edit
                variables:
                  action_service: automation.trigger
                  action_data:
                    entity_id: automation.stock_archive_hebdo_reset_min_max
                  confirm: 📋 Forcer l’archivage hebdo des conditions de stock ?
                  bg_color: rgba(33, 150, 243, 0.2)
                  icon_color: '#1565C0'
