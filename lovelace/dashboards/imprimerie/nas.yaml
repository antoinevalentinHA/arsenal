button_card_templates: !include_dir_merge_named /config/button_card_templates

views:
  - title: NAS Imprimerie
    path: nas-imprimerie
    icon: mdi:nas
    badges: !include ../../includes/badges/base.yaml

    cards:
      - type: vertical-stack
        cards:

          # ==================================================
          # 🔗 RACCOURCIS
          # ==================================================
          - !include ../../includes/navigation/imprimerie.yaml

          # ==================================================
          # 🧭 SYNTHÈSE
          # ==================================================
          - type: custom:button-card
            template: section_header
            name: 🧭 Synthèse

          - !include ../../includes/cartes/imprimerie_synthese_nas.yaml

          # ==================================================
          # 🧩 AXES DE SANTÉ
          # ==================================================
          - type: custom:button-card
            template: section_header
            name: 🧩 Axes de santé

          - type: grid
            square: false
            columns: 4
            cards:

              - type: custom:button-card
                template: nas_imprimerie_axe_sante
                entity: sensor.nas_imprimerie_sante_synthese
                name: Chaîne
                icon: mdi:lan-connect
                variables:
                  axe: axe_connectivite

              - type: custom:button-card
                template: nas_imprimerie_axe_sante
                entity: sensor.nas_imprimerie_sante_synthese
                name: VPN
                icon: mdi:vpn
                variables:
                  axe: axe_vpn

              - type: custom:button-card
                template: nas_imprimerie_axe_sante
                entity: sensor.nas_imprimerie_sante_synthese
                name: UPS
                icon: mdi:power-plug-battery
                variables:
                  axe: axe_ups

              - type: custom:button-card
                template: nas_imprimerie_axe_sante
                entity: sensor.nas_imprimerie_sante_synthese
                name: Stockage
                icon: mdi:database
                variables:
                  axe: axe_stockage

          # ==================================================
          # 🛰️ CHAÎNE DISTANTE
          # ==================================================
          - type: custom:button-card
            template: section_header
            name: 🛰️ Chaîne distante

          - type: grid
            square: false
            columns: 4
            cards:

              - type: custom:button-card
                template: nas_imprimerie_statut_connectivite
                entity: binary_sensor.nas_imprimerie_connectivite
                name: Connectivité
                icon: mdi:server-network

              - type: custom:button-card
                template: nas_imprimerie_info
                entity: sensor.nas_imprimerie_sonde_age
                name: Âge sonde
                icon: mdi:satellite-uplink

              - type: custom:button-card
                template: nas_imprimerie_info
                entity: sensor.nas_imprimerie_transport_age
                name: Âge fichier
                icon: mdi:swap-horizontal

              - type: custom:button-card
                template: nas_imprimerie_info
                entity: sensor.nas_imprimerie_republisher_age
                name: Âge MQTT
                icon: mdi:timer-refresh-outline

          # ==================================================
          # 💾 STOCKAGE
          # ==================================================
          - type: custom:button-card
            template: section_header
            name: 💾 Stockage

          - type: grid
            square: false
            columns: 3
            cards:

              - type: custom:button-card
                template: nas_imprimerie_axe_sante
                entity: sensor.nas_imprimerie_sante_synthese
                name: État
                icon: mdi:database-check
                variables:
                  axe: axe_stockage

              - type: custom:button-card
                template: nas_imprimerie_info
                entity: sensor.nas_imprimerie_free_space
                name: Libre
                icon: mdi:harddisk

              - type: custom:button-card
                template: nas_imprimerie_info
                entity: sensor.nas_imprimerie_free_space_percent
                name: Libre %
                icon: mdi:chart-pie

          # ==================================================
          # 🔋 ALIMENTATION
          # ==================================================
          - type: custom:button-card
            template: section_header
            name: 🔋 Alimentation

          - type: grid
            square: false
            columns: 2
            cards:

              - type: custom:button-card
                template: nas_imprimerie_axe_sante
                entity: sensor.nas_imprimerie_sante_synthese
                name: UPS
                icon: mdi:power-plug-battery
                variables:
                  axe: axe_ups

              - type: custom:button-card
                template: nas_imprimerie_sur_batterie
                entity: binary_sensor.nas_imprimerie_ups_sur_batterie
                name: Sur batterie
                icon: mdi:battery-alert

          # ==================================================
          # 🖥️ SYSTÈME
          # ==================================================
          - type: custom:button-card
            template: section_header
            name: 🖥️ Système

          - type: grid
            square: false
            columns: 2
            cards:

              - type: custom:button-card
                template: nas_imprimerie_info
                entity: sensor.nas_imprimerie_dernier_demarrage
                name: Dernier démarrage
                icon: mdi:clock-start

              - type: custom:button-card
                template: nas_imprimerie_info
                entity: sensor.nas_imprimerie_uptime_jours
                name: Uptime
                icon: mdi:timer-check-outline

          # ==================================================
          # 🧪 DIAGNOSTIC
          # ==================================================
          - type: custom:button-card
            template: section_header
            name: 🧪 Diagnostic

          - type: grid
            square: false
            columns: 2
            cards:

              - type: custom:button-card
                template: nas_imprimerie_diagnostic
                entity: sensor.nas_imprimerie_raw
                name: Timestamp brut
                icon: mdi:clock-digital

              - type: custom:button-card
                template: nas_imprimerie_diagnostic
                entity: sensor.nas_imprimerie_republisher_heartbeat_raw
                name: Heartbeat brut
                icon: mdi:pulse