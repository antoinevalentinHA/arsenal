button_card_templates: !include_dir_merge_named /config/button_card_templates
title: Météo
icon: mdi:server

views:
  ####################################
  # 🌤️ METEO IMPRIMERIE
  ####################################
  - title: Météo
    path: meteo
    icon: mdi:server

    badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

    ########################################################
    # 🧩 VERTICAL STACK PRINCIPAL
    ########################################################
    cards:
      - type: vertical-stack
        cards:

          ########################################################
          # 🔗 RACCOURCIS
          ########################################################
          - !include ../../includes/navigation/imprimerie.yaml

          ########################################################
          # 🌳 EXTÉRIEUR
          ########################################################
          - type: vertical-stack
            cards:
              - type: custom:button-card
                template: section_header
                name: 🌳 Extérieur

              - type: grid
                columns: 3
                square: false
                cards:
                  - type: custom:button-card
                    template: socle_kpi
                    entity: sensor.temperature_exterieur
                    name: Température
                    icon: mdi:thermometer
                    tap_action: { action: more-info }
                    variables: { couleur: sensor.couleur_temperature_exterieur }
                    triggers_update:
                      - sensor.temperature_exterieur
                      - sensor.couleur_temperature_exterieur
                  - type: custom:button-card
                    template: socle_kpi
                    entity: sensor.humidite_relative_exterieur
                    name: Humidité relative
                    icon: mdi:water-percent
                    triggers_update:
                      - sensor.humidite_relative_exterieur
                      - sensor.couleur_humidite_relative_exterieur
                  - type: custom:button-card
                    template: socle_kpi
                    entity: sensor.humidite_absolue_exterieur
                    name: Humidité absolue
                    icon: mdi:water
                    triggers_update:
                      - sensor.humidite_absolue_exterieur
                      - sensor.couleur_humidite_absolue_exterieur

          ########################################################
          # 🖥️ DIRECTION
          ########################################################
          - type: vertical-stack
            cards:
              - type: custom:button-card
                template: section_header
                name: 🖥️ Direction

              - type: grid
                columns: 3
                square: false
                cards:
                  - type: custom:button-card
                    template: socle_kpi
                    entity: sensor.temperature_direction
                    name: Température
                    icon: mdi:thermometer
                    tap_action: { action: more-info }
                    variables: { couleur: sensor.couleur_temperature_direction }
                    triggers_update:
                      - sensor.temperature_direction
                      - sensor.couleur_temperature_direction
                  - type: custom:button-card
                    template: socle_kpi
                    entity: sensor.humidite_relative_direction
                    name: Humidité relative
                    icon: mdi:water-percent
                    triggers_update:
                      - sensor.humidite_relative_direction
                      - sensor.couleur_humidite_relative_direction
                  - type: custom:button-card
                    template: socle_kpi
                    entity: sensor.humidite_absolue_direction
                    name: Humidité absolue
                    icon: mdi:water
                    triggers_update:
                      - sensor.humidite_absolue_direction
                      - sensor.couleur_humidite_absolue_direction

              - type: custom:button-card
                template: socle_kpi
                entity: sensor.humidex_direction
                name: Humidex Bureau
                triggers_update:
                  - sensor.humidex_direction
                  - sensor.couleur_humidex_direction

          ########################################################
          # 🖥️ BUREAUX
          ########################################################
          - type: vertical-stack
            cards:
              - type: custom:button-card
                template: section_header
                name: 🖥️ Bureaux

              - type: grid
                columns: 4
                square: false
                cards:
                  - type: custom:button-card
                    template: socle_kpi
                    entity: sensor.temperature_compta
                    name: Compta
                    icon: mdi:thermometer
                    variables: { couleur: sensor.couleur_temperature_compta }
                    triggers_update:
                      - sensor.temperature_compta
                      - sensor.couleur_temperature_compta
                  - type: custom:button-card
                    template: socle_kpi
                    entity: sensor.temperature_qualite
                    name: Qualité
                    icon: mdi:thermometer
                    variables: { couleur: sensor.couleur_temperature_qualite }
                    triggers_update:
                      - sensor.temperature_qualite
                      - sensor.couleur_temperature_qualite
                  - type: custom:button-card
                    template: socle_kpi
                    entity: sensor.temperature_devis
                    name: Devis
                    icon: mdi:thermometer
                    variables: { couleur: sensor.couleur_temperature_devis }
                    triggers_update:
                      - sensor.temperature_devis
                      - sensor.couleur_temperature_devis
                  - type: custom:button-card
                    template: socle_kpi
                    entity: sensor.temperature_commercial
                    name: Commercial
                    icon: mdi:thermometer
                    variables: { couleur: sensor.couleur_temperature_commercial }
                    triggers_update:
                      - sensor.temperature_commercial
                      - sensor.couleur_temperature_commercial

          ########################################################
          # 📦 STOCKAGE
          ########################################################
          - type: vertical-stack
            cards:
              - !include ../../includes/section_headers/stockage.yaml

              - type: grid
                columns: 2
                square: false
                cards:

                  - type: custom:button-card
                    template: socle_kpi
                    entity: sensor.temperature_stock_carton
                    name: Stock Carton
                    icon: mdi:thermometer
                    variables: { couleur: sensor.couleur_temperature_stock_carton }
                    triggers_update:
                      - sensor.temperature_stock_carton
                      - sensor.couleur_temperature_stock_carton

                  - type: custom:button-card
                    template: socle_kpi
                    entity: sensor.temperature_stock_pf
                    name: Stock PF
                    icon: mdi:thermometer
                    variables: { couleur: sensor.couleur_temperature_stock_pf }
                    triggers_update:
                      - sensor.temperature_stock_pf
                      - sensor.couleur_temperature_stock_pf

                  - type: custom:button-card
                    template: socle_kpi
                    entity: sensor.humidite_relative_stock_carton
                    name: Stock Carton
                    icon: mdi:water-percent
                    triggers_update:
                      - sensor.humidite_relative_stock_carton
                      - sensor.couleur_humidite_relative_stock_carton

                  - type: custom:button-card
                    template: socle_kpi
                    entity: sensor.humidite_relative_stock_pf
                    name: Stock PF
                    icon: mdi:water-percent
                    triggers_update:
                      - sensor.humidite_relative_stock_pf
                      - sensor.couleur_humidite_relative_stock_pf

          ########################################################
          # 🏢 ATELIER
          ########################################################
          - type: vertical-stack
            cards:
              - !include ../../includes/section_headers/atelier.yaml

              - type: grid
                columns: 3
                square: false
                cards:

                  - type: custom:button-card
                    template: socle_kpi
                    entity: sensor.temperature_komori
                    name: Komori
                    icon: mdi:thermometer
                    variables: { couleur: sensor.couleur_temperature_komori }
                    triggers_update:
                      - sensor.temperature_komori
                      - sensor.couleur_temperature_komori

                  - type: custom:button-card
                    template: socle_kpi
                    entity: sensor.temperature_bobst
                    name: Bobst
                    icon: mdi:thermometer
                    variables: { couleur: sensor.couleur_temperature_bobst }
                    triggers_update:
                      - sensor.temperature_bobst
                      - sensor.couleur_temperature_bobst

                  - type: custom:button-card
                    template: socle_kpi
                    entity: sensor.temperature_media
                    name: Media
                    icon: mdi:thermometer
                    variables: { couleur: sensor.couleur_temperature_media }
                    triggers_update:
                      - sensor.temperature_media
                      - sensor.couleur_temperature_media

                  - type: custom:button-card
                    template: socle_kpi
                    entity: sensor.humidite_relative_komori
                    name: Komori
                    icon: mdi:water-percent
                    triggers_update:
                      - sensor.humidite_relative_komori
                      - sensor.couleur_humidite_relative_komori

                  - type: custom:button-card
                    template: socle_kpi
                    entity: sensor.humidite_relative_bobst
                    name: Bobst
                    icon: mdi:water-percent
                    triggers_update:
                      - sensor.humidite_relative_bobst
                      - sensor.couleur_humidite_relative_bobst

                  - type: custom:button-card
                    template: socle_kpi
                    entity: sensor.humidite_relative_media
                    name: Media
                    icon: mdi:water-percent
                    triggers_update:
                      - sensor.humidite_relative_media
                      - sensor.couleur_humidite_relative_media
