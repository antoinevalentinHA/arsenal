button_card_templates: !include_dir_merge_named /config/button_card_templates
views:
  - badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

    cards:

      - type: vertical-stack
        cards:

          - !include ../../../includes/navigation/imprimerie.yaml

          # ======================================================
          # 🌳 EXTÉRIEUR
          # ======================================================
          - type: custom:button-card
            template: section_header
            name: 🌳 Extérieur

          - square: false
            type: grid
            columns: 1
            cards:

              - type: custom:button-card
                template: socle_kpi
                entity: sensor.humidite_relative_exterieur
                name: Humidité
                icon: mdi:water-percent
                triggers_update:
                  - sensor.couleur_humidite_relative_exterieur

          # ======================================================
          # 🖥️ BUREAUX
          # ======================================================
          - type: custom:button-card
            template: section_header
            name: 🖥️ Bureaux

          - type: custom:button-card
            template: socle_kpi
            entity: sensor.humidite_relative_direction
            name: Direction
            icon: mdi:water-percent
            triggers_update:
              - sensor.couleur_humidite_relative_direction

          - square: false
            type: grid
            columns: 2
            cards:

              - type: custom:button-card
                template: socle_kpi
                entity: sensor.humidite_relative_compta
                name: Compta
                icon: mdi:water-percent
                triggers_update:
                  - sensor.couleur_humidite_relative_compta

              - type: custom:button-card
                template: socle_kpi
                entity: sensor.humidite_relative_qualite
                name: Qualité
                icon: mdi:water-percent
                triggers_update:
                  - sensor.couleur_humidite_relative_qualite

              - type: custom:button-card
                template: socle_kpi
                entity: sensor.humidite_relative_devis
                name: Devis
                icon: mdi:water-percent
                triggers_update:
                  - sensor.couleur_humidite_relative_devis

              - type: custom:button-card
                template: socle_kpi
                entity: sensor.humidite_relative_commercial
                name: Commercial
                icon: mdi:water-percent
                triggers_update:
                  - sensor.couleur_humidite_relative_commercial

          # ======================================================
          # 📦 STOCKAGE
          # ======================================================
          - !include ../../../includes/section_headers/stockage.yaml

          - square: false
            type: grid
            columns: 2
            cards:

              - type: custom:button-card
                template: socle_kpi
                entity: sensor.humidite_relative_stock_carton
                name: Stock Carton
                icon: mdi:water-percent
                triggers_update:
                  - sensor.couleur_humidite_relative_stock_carton

              - type: custom:button-card
                template: socle_kpi
                entity: sensor.humidite_relative_stock_pf
                name: Stock PF
                icon: mdi:water-percent
                triggers_update:
                  - sensor.couleur_humidite_relative_stock_pf

          # ======================================================
          # 🏢 ATELIER
          # ======================================================
          - !include ../../../includes/section_headers/atelier.yaml

          - square: false
            type: grid
            columns: 3
            cards:

              - type: custom:button-card
                template: socle_kpi
                entity: sensor.humidite_relative_komori
                name: Komori
                icon: mdi:water-percent
                triggers_update:
                  - sensor.couleur_humidite_relative_komori

              - type: custom:button-card
                template: socle_kpi
                entity: sensor.humidite_relative_bobst
                name: Bobst
                icon: mdi:water-percent
                triggers_update:
                  - sensor.couleur_humidite_relative_bobst

              - type: custom:button-card
                template: socle_kpi
                entity: sensor.humidite_relative_media
                name: Media
                icon: mdi:water-percent
                triggers_update:
                  - sensor.couleur_humidite_relative_media