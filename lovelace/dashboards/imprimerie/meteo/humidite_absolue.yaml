button_card_templates: !include_dir_merge_named /config/button_card_templates
views:
  - badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

    cards:

      - type: vertical-stack
        cards:

          - !include ../../../includes/navigation/imprimerie.yaml

          # ======================================================
          # 🌳 EXTÉRIEUR
          # ======================================================
          - type: custom:button-card
            template: section_header
            name: 🌳 Extérieur

          - square: false
            type: grid
            columns: 1
            cards:

              - type: custom:button-card
                template: socle_kpi
                entity: sensor.humidite_absolue_exterieur
                name: Extérieur
                icon: mdi:water
                triggers_update:
                  - sensor.couleur_humidite_absolue_exterieur

          # ======================================================
          # 🖥️ BUREAUX
          # ======================================================
          - type: custom:button-card
            template: section_header
            name: 🖥️ Bureaux

          - type: custom:button-card
            template: socle_kpi
            entity: sensor.humidite_absolue_direction
            name: Direction
            icon: mdi:water
            triggers_update:
              - sensor.couleur_humidite_absolue_direction
              

          - square: false
            type: grid
            columns: 2
            cards:

              - type: custom:button-card
                template: socle_kpi
                entity: sensor.humidite_absolue_compta
                name: Compta
                icon: mdi:water
                triggers_update:
                  - sensor.couleur_humidite_absolue_compta

              - type: custom:button-card
                template: socle_kpi
                entity: sensor.humidite_absolue_qualite
                name: Qualité
                icon: mdi:water
                triggers_update:
                  - sensor.couleur_humidite_absolue_qualite

              - type: custom:button-card
                template: socle_kpi
                entity: sensor.humidite_absolue_devis
                name: Devis
                icon: mdi:water
                triggers_update:
                  - sensor.couleur_humidite_absolue_devis

              - type: custom:button-card
                template: socle_kpi
                entity: sensor.humidite_absolue_commercial
                name: Commercial
                icon: mdi:water
                triggers_update:
                  - sensor.couleur_humidite_absolue_commercial

          # ======================================================
          # 📦 STOCKAGE
          # ======================================================
          - !include ../../../includes/section_headers/stockage.yaml

          - square: false
            type: grid
            columns: 2
            cards:

              - type: custom:button-card
                template: socle_kpi
                entity: sensor.humidite_absolue_stock_carton
                name: Stock Carton
                icon: mdi:water
                triggers_update:
                  - sensor.couleur_humidite_absolue_stock_carton

              - type: custom:button-card
                template: socle_kpi
                entity: sensor.humidite_absolue_stock_pf
                name: Stock PF
                icon: mdi:water
                triggers_update:
                  - sensor.couleur_humidite_absolue_stock_pf

          # ======================================================
          # 🏢 ATELIER
          # ======================================================
          - !include ../../../includes/section_headers/atelier.yaml

          - square: false
            type: grid
            columns: 3
            cards:

              - type: custom:button-card
                template: socle_kpi
                entity: sensor.humidite_absolue_komori
                name: Komori
                icon: mdi:water
                triggers_update:
                  - sensor.couleur_humidite_absolue_komori

              - type: custom:button-card
                template: socle_kpi
                entity: sensor.humidite_absolue_bobst
                name: Bobst
                icon: mdi:water
                triggers_update:
                  - sensor.couleur_humidite_absolue_bobst

              - type: custom:button-card
                template: socle_kpi
                entity: sensor.humidite_absolue_media
                name: Media
                icon: mdi:water
                triggers_update:
                  - sensor.couleur_humidite_absolue_media