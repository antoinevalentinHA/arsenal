button_card_templates: !include_dir_merge_named /config/button_card_templates

views:
  - badges: !include ../../includes/badges/base.yaml

    ########################################################
    # 🔧 VERTICAL STACK PRINCIPAL
    ########################################################
    cards:
      - type: vertical-stack
        cards:

          ########################################################
          # 🔗 RACCOURCIS
          ########################################################
          - !include ../../includes/navigation/imprimerie.yaml

          ########################################################
          # 🖥️ NAS
          ########################################################
          - type: custom:button-card
            template: section_header
            name: 🖥️ NAS

          - !include ../../includes/cartes/imprimerie_synthese_nas.yaml

          ########################################################
          # 🌡️💦 HUMIDEX
          ########################################################
          - type: custom:button-card
            template: section_header
            name: 🌡️ Humidex

          - type: grid
            columns: 2
            square: false
            cards:

              - type: custom:button-card
                template: carte_climat_zone
                entity: sensor.humidex_imprimerie_administratif
                name: Administratif
                icon: mdi:office-building

              - type: custom:button-card
                template: carte_climat_zone
                entity: sensor.humidex_imprimerie_atelier
                name: Atelier
                icon: mdi:factory

          ########################################################
          # 🔊 BRUIT
          ########################################################
          - type: custom:button-card
            template: section_header
            name: 🔊 Bruit

          - type: grid
            columns: 1
            square: false
            cards:

              - type: custom:button-card
                template: carte_regime_acoustique_imprimerie
                entity: sensor.regime_acoustique_imprimerie
                name: Régime acoustique
                icon: mdi:volume-high