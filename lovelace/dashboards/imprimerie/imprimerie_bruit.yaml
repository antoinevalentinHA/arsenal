button_card_templates: !include_dir_merge_named /config/button_card_templates
title: Bruit
icon: mdi:server

views:
  ####################################
  # 🔊 BRUIT
  ####################################
  - title: Bruit
    path: bruit
    icon: mdi:server

    badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

    ########################################################
    # 🧩 VERTICAL STACK PRINCIPAL
    ########################################################
    cards:

      - !include ../../includes/navigation/imprimerie.yaml

      - type: vertical-stack
        cards:

          # 🔊 Section — Bruit
          - type: custom:button-card
            template: section_header
            name: 🔊 Bruit

          - type: custom:mini-graph-card
            name: Komori (24h)
            entities:
              - entity: sensor.bruit_komori
            hours_to_show: 24
            points_per_hour: 4
            line_width: 3
            height: 150
            show:
              fill: true
              extrema: true
              average: true
              name: true
              icon: true
              state: true
            color_thresholds:
              - value: 80
                color: '#E53935'
              - value: 65
                color: '#FFB300'
              - value: 40
                color: '#43A047'

          - type: custom:mini-graph-card
            name: Bobst (24h)
            entities:
              - entity: sensor.bruit_bobst
            hours_to_show: 24
            points_per_hour: 4
            line_width: 3
            height: 150
            show:
              fill: true
              extrema: true
              average: true
              name: true
              icon: true
              state: true
            color_thresholds:
              - value: 80
                color: '#E53935'
              - value: 65
                color: '#FFB300'
              - value: 40
                color: '#43A047'

          - type: custom:mini-graph-card
            name: Media (24h)
            entities:
              - entity: sensor.bruit_media
            hours_to_show: 24
            points_per_hour: 4
            line_width: 3
            height: 150
            show:
              fill: true
              extrema: true
              average: true
              name: true
              icon: true
              state: true
            color_thresholds:
              - value: 80
                color: '#E53935'
              - value: 65
                color: '#FFB300'
              - value: 40
                color: '#43A047'
