button_card_templates: !include_dir_merge_named /config/button_card_templates

views:
  - badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

    ########################################################
    # 🧩 VERTICAL STACK PRINCIPAL
    ########################################################
    cards:

      - !include ../../includes/navigation/imprimerie.yaml

      - type: vertical-stack
        cards:

          # 🔊 Section — Régime acoustique machines
          - type: custom:button-card
            template: section_header
            name: 🔊 Régime acoustique

          - type: grid
            columns: 3
            square: false
            cards:
          
              - type: custom:button-card
                template: carte_regime_acoustique_machine
                entity: sensor.regime_acoustique_komori
                name: Komori
                variables:
                  source_db: sensor.bruit_komori
          
              - type: custom:button-card
                template: carte_regime_acoustique_machine
                entity: sensor.regime_acoustique_bobst
                name: Bobst
                variables:
                  source_db: sensor.bruit_bobst
          
              - type: custom:button-card
                template: carte_regime_acoustique_machine
                entity: sensor.regime_acoustique_media
                name: Media
                variables:
                  source_db: sensor.bruit_media

          # 🔊 Section — Historique
          - !include ../../includes/section_headers/historique.yaml
          - !include ../../includes/cartes/graph_bruit_komori.yaml
          - !include ../../includes/cartes/graph_bruit_bobst.yaml
          - !include ../../includes/cartes/graph_bruit_media.yaml

