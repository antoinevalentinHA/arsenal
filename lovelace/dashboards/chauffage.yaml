button_card_templates: !include_dir_merge_named /config/button_card_templates

views:
  - badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

      - type: custom:button-card
        template: bouton_parametres_badge_carre
        tap_action:
          action: navigate
          navigation_path: /reglages-chauffage-dashboard/chauffage

      - type: custom:button-card
        template: bouton_diagnostics_badge_carre
        tap_action:
          action: navigate
          navigation_path: /diagnostics-chauffage-dashboard/diagnostics-chauffage

    cards:
      - type: vertical-stack
        cards:

          # ==================================================
          # 🔥 CHAUDIÈRE — SYNTHÈSE
          # ==================================================
          - type: grid
            square: false
            columns: 1
            cards:

              - type: custom:button-card
                template: section_header
                name: 🔥 Chaudière

              - type: custom:button-card
                template: carte_chauffage_synthese


          # ==================================================
          # 🧠 DÉCISION
          # ==================================================
          - type: grid
            square: false
            columns: 1
            cards:

              - !include ../includes/section_headers/decision.yaml

          # ==================================================
          # 🎯 INTENTION / DÉCISION
          # ==================================================
          - type: grid
            square: false
            columns: 1
            cards:

              - type: custom:button-card
                entity: sensor.chauffage_mode_calcule
                template: carte_chauffage_intention

              - type: custom:button-card
                entity: sensor.programme_chauffage
                template: carte_chauffage_decision


          # ==================================================
          # 📜 HISTORIQUE
          # ==================================================
          - type: grid
            square: false
            columns: 1
            cards:

              - !include ../includes/section_headers/historique.yaml

              - type: history-graph
                entities:
                  - entity: sensor.programme_chauffage
                logarithmic_scale: true
