button_card_templates: !include_dir_merge_named /config/button_card_templates

title: Home
views:
  - title: Home
    path: home
    icon: mdi:server

    badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

      - type: custom:button-card
        template: bouton_parametres_badge_carre
        tap_action:
          action: navigate
          navigation_path: /reglages-maison-dashboard/maison

    cards:
      - type: vertical-stack
        cards:

          # ==================================================
          # ⚙️ MODES MAISON & BABYSITTING
          # ==================================================
          - type: grid
            square: false
            columns: 1
            cards:

              - type: custom:button-card
                template: section_header
                name: ⚙️ Modes

              - type: custom:button-card
                template: carte_mode_maison_synthese
                entity: input_select.mode_maison
                name: Mode
                icon: mdi:home-switch

              - type: custom:button-card
                template: carte_mode_babysitting_synthese
                entity: input_boolean.mode_babysitting
                name: Babysitting
                icon: mdi:account-child


          # ==================================================
          # 🏖️ DÉCISION VACANCES
          # ==================================================
          - type: grid
            square: false
            columns: 1
            cards:

              - type: custom:button-card
                template: section_header
                name: 🏖️ Décision Vacances

              - type: custom:button-card
                entity: binary_sensor.vacances_actives
                template: carte_vacances_decision
                name: Vacances

              - type: custom:button-card
                entity: sensor.vacances_raison
                template: carte_vacances_justification
                name: Justification


          # ==================================================
          # 📜 HISTORIQUE MODES
          # ==================================================
          - type: grid
            square: false
            columns: 1
            cards:

              - !include ../includes/section_headers/historique.yaml

              - type: history-graph
                entities:
                  - entity: input_select.mode_maison
                  - entity: input_boolean.mode_babysitting
                logarithmic_scale: true
