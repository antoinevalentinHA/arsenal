button_card_templates: !include_dir_merge_named /config/button_card_templates
title: Bruit
views:
  - title: Bruit
    path: bruit
    icon: mdi:server

    badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

      - type: custom:button-card
        template: bouton_parametres_badge_carre
        tap_action:
          action: navigate
          navigation_path: /reglages-sommeil-dashboard/sommeil

    # ======================================================
    # 🔊 CONTENU PRINCIPAL — FLUX VERTICAL CANON ARSENAL
    # ------------------------------------------------------
    # badges
    #   ↓
    # vertical-stack racine
    # ======================================================
    cards:

      - type: vertical-stack
        cards:

          # ------------------------------------------------------
          # 🧭 Navigation météo / sommeil
          # ------------------------------------------------------
          - !include ../../includes/navigation/meteo.yaml

          # ======================================================
          # 🔊 SECTION : Bruit chambres
          # ======================================================
          - type: custom:button-card
            template: section_header
            name: 🔊 Bruit Chambres

          - type: horizontal-stack
            cards:

              - type: custom:button-card
                template: socle_kpi
                entity: sensor.bruit_chambre_arnaud
                name: Arnaud
                icon: mdi:volume-high
                variables:
                  ui_profile: arsenal
                triggers_update:
                  - sensor.couleur_bruit_chambre_arnaud

              - type: custom:button-card
                template: socle_kpi
                entity: sensor.bruit_chambre_matthieu
                name: Matthieu
                icon: mdi:volume-high
                variables:
                  ui_profile: arsenal
                triggers_update:
                  - sensor.couleur_bruit_chambre_matthieu

          # ======================================================
          # 📈 GRAPHIQUES BRUIT
          # ======================================================
          - type: custom:mini-graph-card
            name: Arnaud (12h)
            icon: mdi:volume-high
            entities:
              - entity: sensor.bruit_chambre_arnaud
            hours_to_show: 12
            points_per_hour: 6
            line_width: 3
            height: 75
            show:
              fill: true
              extrema: false
              average: false
              name: true
              icon: false
              state: true
            color_thresholds:
              - value: 0
                color: '#4CAF50'
              - value: 34
                color: '#8BC34A'
              - value: 40
                color: '#FFEB3B'
              - value: 45
                color: '#FF9800'
              - value: 50
                color: '#F44336'

          - type: custom:mini-graph-card
            name: Matthieu (12h)
            icon: mdi:volume-high
            entities:
              - entity: sensor.bruit_chambre_matthieu
            hours_to_show: 12
            points_per_hour: 6
            line_width: 3
            height: 75
            show:
              fill: true
              extrema: false
              average: false
              name: true
              icon: false
              state: true
            color_thresholds:
              - value: 0
                color: '#4CAF50'
              - value: 34
                color: '#8BC34A'
              - value: 40
                color: '#FFEB3B'
              - value: 45
                color: '#FF9800'
              - value: 50
                color: '#F44336'

          # ======================================================
          # ⏰ SECTION : Réveils nocturnes
          # ======================================================
          - type: custom:button-card
            template: section_header
            name: ⏰ Réveils nocturnes
            tap_action:
              action: navigate
              navigation_path: /reglages-dashboard/sommeil

          - type: horizontal-stack
            cards:

              - type: custom:button-card
                template: carte_compteur_seuils_variables
                entity: input_number.reveils_nocturnes_arnaud
                name: Arnaud
                icon: mdi:bed
                variables:
                  seuil_1: 0
                  seuil_2: 1
                  seuil_3: 2
                  seuil_4: 3

              - type: custom:button-card
                template: carte_compteur_seuils_variables
                entity: input_number.reveils_nocturnes_matthieu
                name: Matthieu
                icon: mdi:bed
                variables:
                  seuil_1: 0
                  seuil_2: 1
                  seuil_3: 2
                  seuil_4: 3

          # ======================================================
          # 📝 DÉTAIL HEURES DE RÉVEILS
          # ======================================================
          - type: markdown
            content: >
              **Heures des réveils – Arnaud :**  

              {{ states('input_text.reveils_arnaud_heures') or 'Aucun réveil détecté' }}
            visibility:
              - condition: numeric_state
                entity: input_number.reveils_nocturnes_arnaud
                above: 0
            text_only: true

          - type: markdown
            content: >
              **Heures des réveils – Matthieu :**  

              {{ states('input_text.reveils_matthieu_heures') or 'Aucun réveil détecté' }}
            visibility:
              - condition: numeric_state
                entity: input_number.reveils_nocturnes_matthieu
                above: 0
            text_only: true
