button_card_templates: !include_dir_merge_named /config/button_card_templates

views:
  - badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

    # ======================================================
    # 🔊 CONTENU PRINCIPAL — FLUX VERTICAL CANON ARSENAL
    # ------------------------------------------------------
    # badges
    #   ↓
    # vertical-stack racine
    # ======================================================
    cards:

      - type: vertical-stack
        cards:

          # ------------------------------------------------------
          # 🧭 Navigation météo / sommeil
          # ------------------------------------------------------
          - !include ../../includes/navigation/meteo.yaml

          # ======================================================
          # 🔊 SECTION : Bruit chambres
          # ======================================================
          - type: custom:button-card
            template: section_header
            name: 🔊 Bruit Chambres

          - type: horizontal-stack
            cards:

              - type: custom:button-card
                template: socle_kpi
                entity: sensor.bruit_chambre_arnaud
                name: Arnaud
                icon: mdi:volume-high
                variables:
                  ui_profile: arsenal
                triggers_update:
                  - sensor.couleur_bruit_chambre_arnaud

              - type: custom:button-card
                template: socle_kpi
                entity: sensor.bruit_chambre_matthieu
                name: Matthieu
                icon: mdi:volume-high
                variables:
                  ui_profile: arsenal
                triggers_update:
                  - sensor.couleur_bruit_chambre_matthieu

          # ======================================================
          # 📈 GRAPHIQUES BRUIT
          # ======================================================

          - !include ../../includes/cartes/graph_bruit_arnaud.yaml

          - !include ../../includes/cartes/graph_bruit_matthieu.yaml