button_card_templates: !include_dir_merge_named /config/button_card_templates
title: Humidité Absolue
views:
  - title: Humidité Absolue
    path: humidite_absolue
    icon: mdi:server

    badges: !include ../../includes/badges/meteo.yaml

    # ======================================================
    # 💧 CONTENU PRINCIPAL — FLUX VERTICAL CANON ARSENAL
    # ------------------------------------------------------
    # badges
    #   ↓
    # vertical-stack racine
    # ======================================================
    cards:

      - type: vertical-stack
        cards:

          # ------------------------------------------------------
          # 🧭 Navigation météo
          # ------------------------------------------------------
          - !include ../../includes/navigation/meteo.yaml

          # ======================================================
          # 🌿 JARDIN
          # ======================================================
          - !include ../../includes/section_headers/jardin.yaml

          - square: false
            type: grid
            columns: 1
            cards:

              - type: custom:button-card
                template: carte_humidite_absolue
                entity: sensor.humidite_absolue_jardin
                name: Extérieur
                icon: mdi:water
                triggers_update:
                  - sensor.humidite_absolue_jardin
                  - sensor.couleur_humidite_absolue_jardin

          # ======================================================
          # 🏠 RDC
          # ======================================================
          - !include ../../includes/section_headers/rdc.yaml

          - square: false
            type: grid
            columns: 2
            cards:

              - type: custom:button-card
                template: carte_humidite_absolue
                entity: sensor.humidite_absolue_entree
                name: Entrée
                icon: mdi:water
                triggers_update:
                  - sensor.humidite_absolue_entree
                  - sensor.couleur_humidite_absolue_entree

              - type: custom:button-card
                template: carte_humidite_absolue
                entity: sensor.humidite_absolue_sejour
                name: Séjour
                icon: mdi:water
                triggers_update:
                  - sensor.humidite_absolue_sejour
                  - sensor.couleur_humidite_absolue_sejour

          # ======================================================
          # 🛏️ CHAMBRES
          # ======================================================
          - !include ../../includes/section_headers/chambres.yaml

          - square: false
            type: grid
            columns: 2
            cards:

              - type: custom:button-card
                template: carte_humidite_absolue
                entity: sensor.humidite_absolue_chambre_arnaud
                name: Arnaud
                icon: mdi:water
                triggers_update:
                  - sensor.humidite_absolue_chambre_arnaud
                  - sensor.couleur_humidite_absolue_chambre_arnaud

              - type: custom:button-card
                template: carte_humidite_absolue
                entity: sensor.humidite_absolue_chambre_matthieu
                name: Matthieu
                icon: mdi:water
                triggers_update:
                  - sensor.humidite_absolue_chambre_matthieu
                  - sensor.couleur_humidite_absolue_chambre_matthieu

              - type: custom:button-card
                template: carte_humidite_absolue
                entity: sensor.humidite_absolue_chambre_parents
                name: Parents
                icon: mdi:water
                triggers_update:
                  - sensor.humidite_absolue_chambre_parents
                  - sensor.couleur_humidite_absolue_chambre_parents

              - type: custom:button-card
                template: carte_humidite_absolue
                entity: sensor.humidite_absolue_petite_maison
                name: Petite Maison
                icon: mdi:water
                triggers_update:
                  - sensor.humidite_absolue_petite_maison
                  - sensor.couleur_humidite_absolue_petite_maison

          # ======================================================
          # 🚿 SALLES DE BAIN
          # ======================================================
          - !include ../../includes/section_headers/salles_de_bain.yaml

          - square: false
            type: grid
            columns: 2
            cards:

              - type: custom:button-card
                template: carte_humidite_absolue
                entity: sensor.humidite_absolue_sdb_parents
                name: Parents
                icon: mdi:water
                triggers_update:
                  - sensor.humidite_absolue_sdb_parents
                  - sensor.couleur_humidite_absolue_sdb_parents

              - type: custom:button-card
                template: carte_humidite_absolue
                entity: sensor.humidite_absolue_sdb_enfants
                name: SDB Enfants
                icon: mdi:water
                triggers_update:
                  - sensor.humidite_absolue_sdb_enfants
                  - sensor.couleur_humidite_absolue_sdb_enfants

          # ======================================================
          # 🧱 CAVE & GARAGE
          # ======================================================
          - !include ../../includes/section_headers/cave_et_garage.yaml

          - square: false
            type: grid
            columns: 2
            cards:

              - type: custom:button-card
                template: carte_humidite_absolue
                entity: sensor.humidite_absolue_garage
                name: Garage
                icon: mdi:water
                triggers_update:
                  - sensor.humidite_absolue_garage
                  - sensor.couleur_humidite_absolue_garage

              - type: custom:button-card
                template: carte_humidite_absolue
                entity: sensor.humidite_absolue_cave
                name: Cave
                icon: mdi:water
                triggers_update:
                  - sensor.humidite_absolue_cave
                  - sensor.couleur_humidite_absolue_cave
