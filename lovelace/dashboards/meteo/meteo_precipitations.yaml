button_card_templates: !include_dir_merge_named /config/button_card_templates
title: Précipitations
views:
  - title: Précipitations
    path: precipitations
    icon: mdi:server

    badges: !include ../../includes/badges/base.yaml

    # ======================================================
    # 🌧️ CONTENU PRINCIPAL — FLUX VERTICAL CANON ARSENAL
    # ------------------------------------------------------
    # badges
    #   ↓
    # vertical-stack racine
    # ======================================================
    cards:

      - type: vertical-stack
        cards:

          # ------------------------------------------------------
          # 🧭 Navigation météo
          # ------------------------------------------------------
          - !include ../../includes/navigation/meteo.yaml

          # ======================================================
          # 🌦️ SECTION : Précipitations
          # ======================================================
          - type: custom:button-card
            template: section_header
            name: 🌦️ Précipitations

          # ------------------------------------------------------
          # 🧮 Indicateurs instantanés
          # ------------------------------------------------------
          - square: false
            type: grid
            columns: 3
            cards:

              - type: custom:button-card
                template: carte_precipitations_seuils_variables
                entity: sensor.pluviometre_precipitation_last_hour
                name: Préc. 1h
                variables:
                  seuil_faible: 0.2
                  seuil_modere: 1.0
                  seuil_forte: 5.0

              - type: custom:button-card
                template: carte_precipitations_seuils_variables
                entity: sensor.pluviometre_precipitation_aujourd_hui
                name: Aujourd’hui
                variables:
                  seuil_faible: 1
                  seuil_modere: 5
                  seuil_forte: 20

              - type: custom:button-card
                template: carte_precipitations_seuils_variables
                entity: sensor.pluviometre_precipitation
                name: Intensité
                variables:
                  seuil_faible: 0.1
                  seuil_modere: 0.5
                  seuil_forte: 2.0

          # ------------------------------------------------------
          # 📈 Historique 7 jours
          # ------------------------------------------------------
          - type: custom:apexcharts-card
            graph_span: 7d
            header:
              show: true
              title: Précipitations — 7 jours
              show_states: false
              floating: false
            apex_config:
              chart:
                height: 220
                animations:
                  enabled: true
              grid:
                borderColor: rgba(0,0,0,0.08)
              tooltip:
                shared: false
                x:
                  show: true
              xaxis:
                labels:
                  datetimeUTC: false
              yaxis:
                min: 0
                decimalsInFloat: 1
              legend:
                show: false
            series:
              - entity: sensor.pluviometre_precipitation
                name: Pluie (mm/h)
                type: column
                curve: smooth
                stroke_width: 0
                group_by:
                  duration: 1h
                  func: max
            show:
              loading: false

          # ------------------------------------------------------
          # 🚨 Détection pluie Zigbee (24h)
          # ------------------------------------------------------
          - type: history-graph
            entities:
              - entity: binary_sensor.zigbee_pluie_water_leak
            logarithmic_scale: true
            hours_to_show: 24
