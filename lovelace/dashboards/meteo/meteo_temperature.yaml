button_card_templates: !include_dir_merge_named /config/button_card_templates
title: Température
views:

  - title: Température
    path: temperature
    icon: mdi:server

    badges:

      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre
        icon: mdi:alert
        tap_action:
          action: navigate
          navigation_path: /meteo-min-max-temperature-dashboard/temperature_min_max
        styles:
          icon:
            - color: '#B71C1C'

      - type: custom:button-card
        template: bouton_parametres_badge_carre
        tap_action:
          action: navigate
          navigation_path: /reglages-meteo-dashboard/reglages-meteo

      - type: custom:button-card
        template: bouton_diagnostics_badge_carre
        tap_action:
          action: navigate
          navigation_path: /meteo-backups-dashboard/backup_meteo

    # ======================================================
    # 🌡️ CONTENU PRINCIPAL — FLUX VERTICAL CANON ARSENAL
    # ------------------------------------------------------
    # badges
    #   ↓
    # vertical-stack racine
    # ======================================================
    cards:

      - type: vertical-stack
        cards:

          # ------------------------------------------------------
          # 🧭 Navigation météo
          # ------------------------------------------------------
          - !include ../../includes/navigation/meteo.yaml

          # ======================================================
          # 🌿 JARDIN
          # ======================================================
          - !include ../../includes/section_headers/jardin.yaml

          - square: false
            type: grid
            columns: 1
            cards:

              - type: custom:button-card
                template: carte_temperature
                entity: sensor.temperature_jardin
                name: Température
                icon: mdi:thermometer
                tap_action:
                  action: more-info
                variables:
                  couleur: sensor.couleur_temperature_jardin
                triggers_update:
                  - sensor.temperature_jardin
                  - sensor.couleur_temperature_jardin
                  - input_select.saison

          # ======================================================
          # 🏠 RDC / PALIER
          # ======================================================
          - !include ../../includes/section_headers/rdc_palier.yaml

          - square: false
            type: grid
            columns: 3
            cards:

              - type: custom:button-card
                template: carte_temperature
                entity: sensor.temperature_entree
                name: Entrée
                icon: mdi:thermometer
                variables:
                  couleur: sensor.couleur_temperature_entree
                triggers_update:
                  - sensor.temperature_entree
                  - sensor.couleur_temperature_entree
                  - input_select.saison

              - type: custom:button-card
                template: carte_temperature
                entity: sensor.temperature_sejour
                name: Séjour
                icon: mdi:thermometer
                variables:
                  couleur: sensor.couleur_temperature_sejour
                triggers_update:
                  - sensor.temperature_sejour
                  - sensor.couleur_temperature_sejour
                  - input_select.saison

              - type: custom:button-card
                template: carte_temperature
                entity: sensor.temperature_palier
                name: Palier
                icon: mdi:thermometer
                variables:
                  couleur: sensor.couleur_temperature_palier
                triggers_update:
                  - sensor.temperature_palier
                  - sensor.couleur_temperature_palier
                  - input_select.saison

          # ======================================================
          # 🛏️ CHAMBRES
          # ======================================================
          - !include ../../includes/section_headers/chambres.yaml

          - square: false
            type: grid
            columns: 2
            cards:

              - type: custom:button-card
                template: carte_temperature
                entity: sensor.temperature_chambre_arnaud
                name: Arnaud
                icon: mdi:thermometer
                variables:
                  couleur: sensor.couleur_temperature_chambre_arnaud
                triggers_update:
                  - sensor.temperature_chambre_arnaud
                  - sensor.couleur_temperature_chambre_arnaud
                  - input_select.saison

              - type: custom:button-card
                template: carte_temperature
                entity: sensor.temperature_chambre_matthieu
                name: Matthieu
                icon: mdi:thermometer
                variables:
                  couleur: sensor.couleur_temperature_chambre_matthieu
                triggers_update:
                  - sensor.temperature_chambre_matthieu
                  - sensor.couleur_temperature_chambre_matthieu
                  - input_select.saison

              - type: custom:button-card
                template: carte_temperature
                entity: sensor.temperature_chambre_parents
                name: Parents
                icon: mdi:thermometer
                variables:
                  couleur: sensor.couleur_temperature_chambre_parents
                triggers_update:
                  - sensor.temperature_chambre_parents
                  - sensor.couleur_temperature_chambre_parents
                  - input_select.saison

              - type: custom:button-card
                template: carte_temperature
                name: Petite Maison
                icon: mdi:thermometer
                entity: sensor.temperature_petite_maison
                variables:
                  couleur: sensor.couleur_temperature_petite_maison
                triggers_update:
                  - sensor.temperature_petite_maison
                  - sensor.couleur_temperature_petite_maison
                  - input_select.saison

          # ======================================================
          # 🚿 SALLES DE BAIN
          # ======================================================
          - !include ../../includes/section_headers/salles_de_bain.yaml

          - square: false
            type: grid
            columns: 2
            cards:

              - type: custom:button-card
                template: carte_temperature
                entity: sensor.temperature_sdb_parents
                name: Parents
                icon: mdi:thermometer
                variables:
                  couleur: sensor.couleur_temperature_sdb_parents
                triggers_update:
                  - sensor.temperature_sdb_parents
                  - sensor.couleur_temperature_sdb_parents
                  - input_select.saison

              - type: custom:button-card
                template: carte_temperature
                entity: sensor.temperature_sdb_enfants
                name: Enfants
                icon: mdi:thermometer
                variables:
                  couleur: sensor.couleur_temperature_sdb_enfants
                triggers_update:
                  - sensor.temperature_sdb_enfants
                  - sensor.couleur_temperature_sdb_enfants
                  - input_select.saison

          # ======================================================
          # 🧱 CAVE & GARAGE
          # ======================================================
          - !include ../../includes/section_headers/cave_et_garage.yaml

          - square: false
            type: grid
            columns: 2
            cards:

              - type: custom:button-card
                template: carte_temperature
                entity: sensor.temperature_garage
                name: Garage
                icon: mdi:thermometer
                variables:
                  couleur: sensor.couleur_temperature_garage
                triggers_update:
                  - sensor.temperature_garage
                  - sensor.couleur_temperature_garage
                  - input_select.saison

              - type: custom:button-card
                template: carte_temperature
                entity: sensor.temperature_cave
                name: Cave
                icon: mdi:thermometer
                variables:
                  couleur: sensor.couleur_temperature_cave
                triggers_update:
                  - sensor.temperature_cave
                  - sensor.couleur_temperature_cave
                  - input_select.saison
