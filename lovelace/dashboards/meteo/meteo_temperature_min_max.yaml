button_card_templates: !include_dir_merge_named /config/button_card_templates
title: Températures Min/Max
views:
  - title: Températures Min/Max
    path: temperature_minmax
    icon: mdi:chart-line

    badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

    # ======================================================
    # 🌡️ CONTENU PRINCIPAL — FLUX VERTICAL CANON ARSENAL
    # ------------------------------------------------------
    # badges
    #   ↓
    # vertical-stack racine
    # ======================================================
    cards:

      - type: vertical-stack
        cards:

          # ------------------------------------------------------
          # 🧭 Navigation météo
          # ------------------------------------------------------
          - !include ../../includes/navigation/meteo.yaml

          # ======================================================
          # 🌿 JARDIN
          # ======================================================
          - !include ../../includes/section_headers/jardin.yaml

          - square: false
            type: grid
            columns: 1
            cards:

              - type: custom:button-card
                template: socle_kpi
                entity: sensor.temperature_minmax_jour_jardin
                name: Température
                icon: mdi:thermometer

          # ======================================================
          # 🏠 RDC / PALIER
          # ======================================================
          - !include ../../includes/section_headers/rdc_palier.yaml

          - square: false
            type: grid
            columns: 3
            cards:

              - type: custom:button-card
                template: socle_kpi
                entity: sensor.temperature_minmax_jour_entree
                name: Entrée
                icon: mdi:thermometer

              - type: custom:button-card
                template: socle_kpi
                entity: sensor.temperature_minmax_jour_sejour
                name: Séjour
                icon: mdi:thermometer

              - type: custom:button-card
                template: socle_kpi
                entity: sensor.temperature_minmax_jour_palier
                name: Palier
                icon: mdi:thermometer

          # ======================================================
          # 🛏️ CHAMBRES
          # ======================================================
          - !include ../../includes/section_headers/chambres.yaml

          - square: false
            type: grid
            columns: 2
            cards:

              - type: custom:button-card
                template: socle_kpi
                entity: sensor.temperature_minmax_jour_chambre_arnaud
                name: Arnaud
                icon: mdi:thermometer

              - type: custom:button-card
                template: socle_kpi
                entity: sensor.temperature_minmax_jour_chambre_matthieu
                name: Matthieu
                icon: mdi:thermometer

              - type: custom:button-card
                template: socle_kpi
                entity: sensor.temperature_minmax_jour_chambre_parents
                name: Parents
                icon: mdi:thermometer

              - type: custom:button-card
                template: socle_kpi
                name: Petite Maison
                icon: mdi:thermometer
                entity: sensor.temperature_minmax_jour_petite_maison

          # ======================================================
          # 🚿 SALLES DE BAIN
          # ======================================================
          - !include ../../includes/section_headers/salles_de_bain.yaml

          - square: false
            type: grid
            columns: 2
            cards:

              - type: custom:button-card
                template: socle_kpi
                entity: sensor.temperature_minmax_jour_sdb_parents
                name: Parents
                icon: mdi:thermometer

              - type: custom:button-card
                template: socle_kpi
                entity: sensor.temperature_minmax_jour_sdb_enfants
                name: Enfants
                icon: mdi:thermometer

          # ======================================================
          # 🧱 CAVE & GARAGE
          # ======================================================
          - !include ../../includes/section_headers/cave_et_garage.yaml

          - square: false
            type: grid
            columns: 2
            cards:

              - type: custom:button-card
                template: socle_kpi
                entity: sensor.temperature_minmax_jour_garage
                name: Garage
                icon: mdi:thermometer

              - type: custom:button-card
                template: socle_kpi
                entity: sensor.temperature_minmax_jour_cave
                name: Cave
                icon: mdi:thermometer
