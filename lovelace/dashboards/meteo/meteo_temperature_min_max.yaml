button_card_templates: !include_dir_merge_named /config/button_card_templates
title: Températures Min/Max
views:
  - title: Températures Min/Max
    path: temperature_minmax
    icon: mdi:chart-line

    badges:
      - type: custom:button-card
        template: bouton_accueil_badge_carre

      - type: custom:button-card
        template: bouton_navigation_badge_carre

    cards:
      - type: vertical-stack
        cards:

          - !include ../../includes/navigation/meteo.yaml

          # ======================================================
          # 🌿 JARDIN
          # ======================================================
          - !include ../../includes/section_headers/jardin.yaml

          - square: false
            type: grid
            columns: 2
            cards:

              - !include ../../includes/sub_section_headers/min.yaml

              - !include ../../includes/sub_section_headers/max.yaml

              - !include ../../includes/cartes/meteo_jardin_min.yaml

              - !include ../../includes/cartes/meteo_jardin_max.yaml

          # ======================================================
          # 🏠 RDC / PALIER
          # ======================================================
          - !include ../../includes/section_headers/rdc_palier.yaml

          - square: false
            type: grid
            columns: 2
            cards:

              - !include ../../includes/sub_section_headers/min.yaml

              - !include ../../includes/sub_section_headers/max.yaml

              - !include ../../includes/cartes/meteo_rdc_palier_min.yaml

              - !include ../../includes/cartes/meteo_rdc_palier_max.yaml

          # ======================================================
          # 🛏️ CHAMBRES
          # ======================================================
          - !include ../../includes/section_headers/chambres.yaml

          - square: false
            type: grid
            columns: 2
            cards:

              - !include ../../includes/sub_section_headers/min.yaml

              - !include ../../includes/sub_section_headers/max.yaml

              - !include ../../includes/cartes/meteo_chambres_min.yaml

              - !include ../../includes/cartes/meteo_chambres_max.yaml

          # ======================================================
          # 🚿 SALLES DE BAIN
          # ======================================================
          - !include ../../includes/section_headers/salles_de_bain.yaml

          - square: false
            type: grid
            columns: 2
            cards:

              - !include ../../includes/sub_section_headers/min.yaml

              - !include ../../includes/sub_section_headers/max.yaml

              - !include ../../includes/cartes/meteo_sdb_min.yaml

              - !include ../../includes/cartes/meteo_sdb_max.yaml

          # ======================================================
          # 🧱 CAVE & GARAGE
          # ======================================================
          - !include ../../includes/section_headers/cave_et_garage.yaml

          - square: false
            type: grid
            columns: 2
            cards:

              - !include ../../includes/sub_section_headers/min.yaml

              - !include ../../includes/sub_section_headers/max.yaml

              - !include ../../includes/cartes/meteo_cave_garage_min.yaml

              - !include ../../includes/cartes/meteo_cave_garage_max.yaml

          # ======================================================
          # 🏡 PETITE MAISON
          # ======================================================
          - type: custom:button-card
            template: section_header
            name: 🏡 Petite Maison

          - square: false
            type: grid
            columns: 2
            cards:

              - !include ../../includes/sub_section_headers/min.yaml

              - !include ../../includes/sub_section_headers/max.yaml

              - !include ../../includes/cartes/meteo_petite_maison_min.yaml

              - !include ../../includes/cartes/meteo_petite_maison_max.yaml
