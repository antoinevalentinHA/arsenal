button_card_templates: !include_dir_merge_named /config/button_card_templates

views:
  - badges: !include ../includes/badges/diagnostics_systeme.yaml

    cards:
      - type: vertical-stack
        cards:

          # ==========================================================
          # SECTION — Etat Bluetti
          # ==========================================================
          - type: custom:button-card
            template: section_header
            name: 🔋 Etat

          - type: grid
            columns: 3
            square: false
            cards:

              - type: custom:button-card
                template: carte_bluetti_energie_chaudiere
                tap_action:
                  action: none

              - type: custom:button-card
                template: carte_mode_binaire_interprete
                entity: binary_sensor.bluetti_batterie_faible
                name: Batterie faible
                icon: mdi:battery-alert
                variables:
                  label_on: "Faible"
                  label_off: "OK"
                  color_on: "rgba(255, 152, 0, 0.2)"
                  color_off: "rgba(76, 175, 80, 0.2)"


              - type: custom:button-card
                template: carte_alerte_binaire_critique
                entity: binary_sensor.bluetti_alerte_active
                name: Alerte
                icon: mdi:alert-circle

          # ==========================================================
          # SECTION — Alimentation locale
          # ==========================================================
          - type: custom:button-card
            template: section_header
            name: ⚡ Alimentation locale

          - type: grid
            columns: 3
            square: false
            cards:

              - type: custom:button-card
                template: carte_mode_binaire_interprete
                entity: binary_sensor.bluetti_secteur_present
                name: Secteur
                icon: mdi:power-plug
                variables:
                  label_on: "OK"
                  label_off: "Défaut"
                  color_on: "rgba(76, 175, 80, 0.2)"
                  color_off: "rgba(244, 67, 54, 0.2)"

              - type: custom:button-card
                template: carte_mode_binaire_interprete
                entity: binary_sensor.bluetti_sortie_ac_active
                name: Sortie AC
                icon: mdi:power-socket-fr
                variables:
                  label_on: "OK"
                  label_off: "Défaut"
                  color_on: "rgba(76, 175, 80, 0.2)"
                  color_off: "rgba(244, 67, 54, 0.2)"

              - type: custom:button-card
                template: carte_mode_binaire_interprete
                entity: binary_sensor.bluetti_sur_batterie
                name: Batterie
                icon: mdi:battery-clock
                variables:
                  label_on: "Dégradé"
                  label_off: "OK"
                  color_on: "rgba(255, 152, 0, 0.2)"
                  color_off: "rgba(76, 175, 80, 0.2)"

          # ==========================================================
          # SECTION — Valeurs Bluetti
          # ==========================================================
          - type: custom:button-card
            template: section_header
            name: 🔋 Valeurs

          - type: grid
            columns: 3
            square: false
            cards:

              - type: custom:button-card
                template: socle_info_72
                entity: sensor.bluetti_battery_soc
                name: Batterie
                icon: mdi:battery
                unit: "%"

              - type: custom:button-card
                template: socle_info_72
                entity: sensor.bluetti_ac_output_power
                name: Sortie
                icon: mdi:flash
                unit: "W"

              - type: custom:button-card
                template: socle_info_72
                entity: sensor.bluetti_ac_input_power
                name: Entrée
                icon: mdi:transmission-tower
                unit: "W"

          # ==========================================================
          # SECTION — Diagnostic électrique
          # ==========================================================
          - type: custom:button-card
            template: section_header
            name: ⚡ Diagnostic électrique

          - type: grid
            columns: 2
            square: false
            cards:

              - type: custom:button-card
                template: socle_info_72
                entity: sensor.bluetti_ac_input_voltage
                name: Entrée
                icon: mdi:power-plug

              - type: custom:button-card
                template: socle_info_72
                entity: sensor.bluetti_ac_output_voltage
                name: Sortie
                icon: mdi:flash