type: markdown
content: |
  {% set piece = states('input_select.adjustment_piece') %}
  {% set plateau_strict = states('sensor.plateau_thermostatique_' ~ piece) %}
  {% set plateau_affichage = states('sensor.plateau_thermostatique_piece_affichage') %}
  {% set mean = states('sensor.temperature_stats_12h_mean_' ~ piece) %}
  {% set variance = states('sensor.temperature_stats_12h_variance_' ~ piece) %}

  **🌡️ Plateau thermostatique :**  
  • Détection stricte : `{{ plateau_strict }}`  
  • Valeur affichée : **{{ plateau_affichage }} °C**

  **📊 Moyenne 12h :**  
  • {{ mean }} °C

  **📈 Variance 12h :**  
  • {{ variance }}

  {% set v = variance | float(99) %}
  {% if v < 0.02 %}
    🟩 **Pièce très stable — plateau parfaitement détecté**
  {% elif v < 0.05 %}
    🟧 **Pièce modérément stable — presque un plateau**
  {% else %}
    🟥 **Pièce instable — variations importantes**
  {% endif %}