type: custom:auto-entities
card:
  type: custom:bar-card
  unit_of_measurement: "°C"
  animation: off
  height: 32px
  positions:
    name: inside
    value: inside
  severity:
    - from: -50
      to: 8
      color: "rgba(144, 202, 249, 0.9)"
    - from: 8
      to: 14
      color: "rgba(3, 169, 244, 0.85)"
    - from: 14
      to: 18
      color: "rgba(76, 175, 80, 0.85)"
    - from: 18
      to: 22
      color: "rgba(255, 235, 59, 0.85)"
    - from: 22
      to: 35
      color: "rgba(255, 152, 0, 0.85)"
  style: |
    ha-card {
      border-radius: 12px !important;
      background: none !important;
      box-shadow: none !important;
      padding: 4px !important;
    }

filter:
  include:
    - entity_id: sensor.temperature_min_jour_petite_maison

card_param: entities
transform: |
  {
    {
      "entity": entity.entity_id,
      "name": "Petite Maison",
      "value": parseFloat(states[entity.entity_id])
    }
  }