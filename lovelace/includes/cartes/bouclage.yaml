# ==========================================================
# 🧠 ARSENAL — CARTE METIER (INCLUDE)
#     ECS — Bouclage : Action ↔ Timer
# ----------------------------------------------------------
# 🎯 RÔLE
#   Afficher une seule carte selon l’état du timer :
#   - timer inactive → action de lancement du bouclage
#   - timer active   → affichage transitoire du timer en cours
# ==========================================================

type: vertical-stack
cards:

  # ------------------------------
  # ACTION (timer non actif)
  # ------------------------------
  - type: conditional
    conditions:
      - entity: timer.bouclage_ecs_5_minutes
        state_not: active
    card:
      type: custom:button-card
      template: carte_action_ecs_bouclage
      name: Bouclage ECS
      icon: mdi:play-circle

  # ------------------------------
  # TRANSITOIRE (timer actif)
  # ------------------------------
  - type: conditional
    conditions:
      - entity: timer.bouclage_ecs_5_minutes
        state: active
    card:
      type: custom:button-card
      template: carte_timer_status
      entity: timer.bouclage_ecs_5_minutes
      name: Bouclage ECS
      icon: mdi:play-circle
      variables:
        active_semantic: ok