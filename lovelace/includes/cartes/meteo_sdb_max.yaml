type: custom:auto-entities
card:
  type: custom:bar-card
  unit_of_measurement: "°C"
  animation: off
  height: 32px
  positions:
    name: inside
    value: inside
  severity:
    - from: -50
      to: 15
      color: "rgba(144, 202, 249, 0.9)"
    - from: 15
      to: 20
      color: "rgba(76, 175, 80, 0.85)"
    - from: 20
      to: 24
      color: "rgba(255, 235, 59, 0.85)"
    - from: 24
      to: 28
      color: "rgba(255, 152, 0, 0.85)"
    - from: 28
      to: 40
      color: "rgba(244, 67, 54, 0.85)"
  style: |
    ha-card {
      border-radius: 12px !important;
      background: none !important;
      box-shadow: none !important;
      padding: 4px !important;
    }

filter:
  include:
    - entity_id: sensor.temperature_max_jour_sdb_enfants
    - entity_id: sensor.temperature_max_jour_sdb_parents

sort:
  method: state
  numeric: true
  reverse: true

card_param: entities
transform: |
  {
    {
      "entity": entity.entity_id,
      "name": entity.attributes.friendly_name
        .replace("Température Max Jour ", ""),
      "value": parseFloat(states[entity.entity_id])
    }
  }