type: markdown
content: |
  {% set blocage_auto = is_state('input_boolean.clim_blocage_horaire_actif', 'on') %}
  {% set now_h = now().strftime('%H:%M') %}
  {% set h_on = states('input_datetime.clim_heure_blocage_autom_on')[:5] %}
  {% set h_off = states('input_datetime.clim_heure_blocage_autom_off')[:5] %}
  {% set blocage_horaire = (
    blocage_auto and
    (h_on <= now_h < h_off if h_on < h_off else (now_h >= h_on or now_h < h_off))
  ) %}

  {% set post_aeration = is_state('input_boolean.chauffage_blocage_aeration', 'on') %}

  {% set fin_blocage = states('input_datetime.chauffage_fin_blocage_aeration') %}
  {% if fin_blocage not in ['unknown','unavailable','none',''] %}
    {% set fin_blocage_fmt = as_timestamp(as_datetime(fin_blocage) | as_local)
          | timestamp_custom('%d/%m %H:%M') %}
  {% else %}
    {% set fin_blocage_fmt = '—' %}
  {% endif %}

  {% set reo = states('input_datetime.aeration_reouverture_last') %}
  {% if reo not in ['unknown','unavailable','none',''] %}
    {% set reo_fmt = as_timestamp(as_datetime(reo) | as_local)
          | timestamp_custom('%d/%m %H:%M') %}
  {% else %}
    {% set reo_fmt = '—' %}
  {% endif %}

  {# -----------------------------------------------------------
     Synthèse des blocages actifs
     ----------------------------------------------------------- #}

  {% if not blocage_horaire and not post_aeration %}

  🟢 **Aucun blocage en cours**  
  Le système est pleinement autorisé à agir.

  {% else %}

  🟥 **Blocage(s) actif(s)**

  {% if blocage_horaire %}
  - ⏰ **Blocage horaire actif**  
    Plage : {{ h_on }} → {{ h_off }}
  {% endif %}

  {% if post_aeration %}
  - **Blocage post-aération actif**  
    Fin prévue : {{ fin_blocage_fmt }}  
    Dernière réouverture : {{ reo_fmt }}
  {% endif %}

  {% endif %}