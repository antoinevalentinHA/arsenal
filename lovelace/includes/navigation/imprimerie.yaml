type: custom:layout-card
layout_type: custom:grid-layout
layout:
  grid-template-columns: 1fr repeat(9, 46px) 1fr
  justify-items: center
  align-items: center
cards:

  # === Menu Imprimerie ===
  - type: custom:button-card
    view_layout:
      grid-column: 2
    template: bouton_navigation_badge_carre
    icon: mdi:magnify
    tap_action:
      action: navigate
      navigation_path: /imprimerie-dashboard/menu
    styles:
      icon:
        - color: '#424242'

  # === Température ===
  - type: custom:button-card
    view_layout:
      grid-column: 3
    template: bouton_navigation_badge_carre
    icon: mdi:thermometer
    tap_action:
      action: navigate
      navigation_path: /imprimerie-meteo-temperature-dashboard/temperature
    styles:
      icon:
        - color: '#B71C1C'

  # === Humidité relative ===
  - type: custom:button-card
    view_layout:
      grid-column: 4
    template: bouton_navigation_badge_carre
    icon: mdi:water-percent
    tap_action:
      action: navigate
      navigation_path: /imprimerie-meteo-humidite-relative-dashboard/humidite_relative
    styles:
      icon:
        - color: '#1565C0'

  # === Humidité absolue ===
  - type: custom:button-card
    view_layout:
      grid-column: 5
    template: bouton_navigation_badge_carre
    icon: mdi:water
    tap_action:
      action: navigate
      navigation_path: /imprimerie-meteo-humidite-absolue-dashboard/humidite_absolue
    styles:
      icon:
        - color: '#1B5E20'

  # === Humidex ===
  - type: custom:button-card
    view_layout:
      grid-column: 6
    template: bouton_navigation_badge_carre
    icon: mdi:thermometer-water
    tap_action:
      action: navigate
      navigation_path: /imprimerie-meteo-humidex-dashboard/humidex
    styles:
      icon:
        - color: '#E65100'

  # === Bruit ===
  - type: custom:button-card
    view_layout:
      grid-column: 7
    template: bouton_navigation_badge_carre
    icon: mdi:volume-high
    tap_action:
      action: navigate
      navigation_path: /imprimerie-bruit-dashboard/bruit
    styles:
      icon:
        - color: '#1565C0'

  # === Stockage ===
  - type: custom:button-card
    view_layout:
      grid-column: 8
    template: bouton_navigation_badge_carre
    icon: mdi:warehouse
    tap_action:
      action: navigate
      navigation_path: /imprimerie-stockage-dashboard/stockage
    styles:
      icon:
        - color: '#1B5E20'

  # === Atelier ===
  - type: custom:button-card
    view_layout:
      grid-column: 9
    template: bouton_navigation_badge_carre
    icon: mdi:factory
    tap_action:
      action: navigate
      navigation_path: /imprimerie-atelier-dashboard/atelier
    styles:
      icon:
        - color: '#2E7D32'

  # === NAS ===
  - type: custom:button-card
    view_layout:
      grid-column: 10
    template: bouton_navigation_badge_carre
    icon: mdi:nas
    tap_action:
      action: navigate
      navigation_path: /imprimerie-nas-dashboard/nas-imprimerie
    styles:
      icon:
        - color: '#424242'