type: custom:layout-card
layout_type: custom:grid-layout
layout:
  grid-template-columns: 1fr repeat(6, 42px) 1fr
  grid-gap: 8px
  align-items: center
cards:

  # === Imprimerie menu ===
  - type: custom:button-card
    view_layout:
      grid-column: 2
    template: bouton_navigation_badge_carre
    icon: mdi:magnify
    tap_action:
      action: navigate
      navigation_path: /imprimerie-dashboard/menu
    styles:
      icon:
        - color: '#424242'

  # === Météo ===
  - type: custom:button-card
    view_layout:
      grid-column: 3
    template: bouton_navigation_badge_carre
    icon: mdi:thermometer
    tap_action:
      action: navigate
      navigation_path: /imprimerie-meteo-dashboard/meteo
    styles:
      icon:
        - color: '#B71C1C'

  # === Bruit ===
  - type: custom:button-card
    view_layout:
      grid-column: 4
    template: bouton_navigation_badge_carre
    icon: mdi:volume-high
    tap_action:
      action: navigate
      navigation_path: /imprimerie-bruit-dashboard/bruit
    styles:
      icon:
        - color: '#1565C0'

  # === Stockage ===
  - type: custom:button-card
    view_layout:
      grid-column: 5
    template: bouton_navigation_badge_carre
    icon: mdi:warehouse
    tap_action:
      action: navigate
      navigation_path: /imprimerie-stockage-dashboard/stockage
    styles:
      icon:
        - color: '#1B5E20'

  # === Atelier ===
  - type: custom:button-card
    view_layout:
      grid-column: 6
    template: bouton_navigation_badge_carre
    icon: mdi:factory
    tap_action:
      action: navigate
      navigation_path: /imprimerie-atelier-dashboard/atelier
    styles:
      icon:
        - color: '#1B5E20'

  # === NAS ===
  - type: custom:button-card
    view_layout:
      grid-column: 7
    template: bouton_navigation_badge_carre
    icon: mdi:nas
    tap_action:
      action: navigate
      navigation_path: /imprimerie-nas-dashboard/nas-imprimerie
    styles:
      icon:
        - color: '#424242'