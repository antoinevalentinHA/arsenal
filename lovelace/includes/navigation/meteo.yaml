type: custom:layout-card
layout_type: custom:grid-layout
layout:
  grid-template-columns: 1fr repeat(9, 46px) 1fr
  justify-items: center
  align-items: center
cards:

  - type: custom:button-card
    view_layout:
      grid-column: 2
    template: bouton_navigation_badge_carre
    icon: mdi:thermometer
    tap_action:
      action: navigate
      navigation_path: /meteo-temperature-dashboard/temperature
    styles:
      icon:
        - color: '#B71C1C'

  - type: custom:button-card
    view_layout:
      grid-column: 3
    template: bouton_navigation_badge_carre
    icon: mdi:water-percent
    tap_action:
      action: navigate
      navigation_path: /meteo-humidite-relative-dashboard/humidite_relative
    styles:
      icon:
        - color: '#1565C0'

  - type: custom:button-card
    view_layout:
      grid-column: 4
    template: bouton_navigation_badge_carre
    icon: mdi:water
    tap_action:
      action: navigate
      navigation_path: /meteo-humidite_absolue-dashboard/humidite_absolue
    styles:
      icon:
        - color: '#1B5E20'

  - type: custom:button-card
    view_layout:
      grid-column: 5
    template: bouton_navigation_badge_carre
    icon: mdi:thermometer-water
    tap_action:
      action: navigate
      navigation_path: /meteo-humidex-dashboard/humidex
