# ==========================================================
# 🧠 ARSENAL — SCRIPT : Volets / Fermeture (exécution)
# ----------------------------------------------------------
# 🎯 RÔLE
#   Fermer une liste de covers de manière idempotente.
#   Reçoit la liste en paramètre — ne décide rien.
#
# ✅ GARDE-FOUS
#   - ignore unknown / unavailable
#   - n'appelle close_cover que si l'état n'est pas déjà "closed"
#
# 🚫 NE FAIT PAS
#   - aucune lecture de sensor de décision
#   - aucune évaluation de politique (pluie, présence, autorisation)
#   - aucune notification
#
# 📐 CONTRAT
#   CONTRAT_PLUIE_VOLETS.md v2.2.1 — section 5.6
# ==========================================================

volets_fermeture_execute:
  alias: "Volets – Fermeture"
  mode: queued
  max: 10

  fields:
    covers:
      description: "Liste des covers à fermer"
      required: true
      selector:
        entity:
          multiple: true
          domain: cover

  sequence:
    - repeat:
        for_each: "{{ covers }}"
        sequence:
          - condition: template
            alias: "Garde-fou : cover dans un état actionnable"
            value_template: >
              {{ states(repeat.item) not in ['unknown', 'unavailable'] }}
          - condition: template
            alias: "Idempotence : ne ferme que si pas déjà closed"
            value_template: >
              {{ states(repeat.item) != 'closed' }}
          - service: cover.close_cover
            target:
              entity_id: "{{ repeat.item }}"
