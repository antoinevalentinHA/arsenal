cycle_alimentation_box:
  alias: Cycle alimentation box Internet
  mode: single
  sequence:
    - action: switch.turn_off
      target:
        entity_id: switch.prise_box

    - delay: "00:00:10"

    - action: switch.turn_on
      target:
        entity_id: switch.prise_box
