# ==========================================================
# 🧠 ARSENAL — SCRIPT
#     Déshumidificateur - Appliquer état
# ----------------------------------------------------------
# 🎯 ROLE
#   Appliquer une intention d'état (ON / OFF) sur le
#   déshumidificateur via son actionneur physique,
#   puis déléguer la qualification de l'effet au guard.
#
# 🧩 PERIMETRE
#   - reçoit une intention (on / off)
#   - vérifie les préconditions immédiates :
#       * validité de l'entrée
#       * disponibilité de la source de vérité
#       * disponibilité de l'entité de commande
#   - émet au plus une commande matérielle
#   - délègue la qualification post-commande à :
#       script.guard_deshumidificateur
#   - attend explicitement la mise à jour du diagnostic guard
#   - retourne un verdict structuré
#
# 🔗 DEPENDANCES
#   - binary_sensor.deshumidificateur_actif
#   - switch.deshumidificateur
#   - script.guard_deshumidificateur
#   - input_text.deshum_guard_last_verdict
#   - input_text.deshum_guard_last_reason
#   - input_text.deshum_guard_last_observed_state
#   - input_text.deshum_guard_last_ts
#
# 🚫 NE FAIT PAS
#   - ne valide pas l'effet dans le temps
#   - ne contient aucune logique métier
#   - ne réémet jamais de commande
#   - ne corrige pas un état incohérent
#
# 🧠 STATUT ARCHITECTURAL
#   Script d'application.
#   Autorité d'exécution unique du domaine.
#   La qualification est déléguée au guard.
#
# ⚠️ LIMITES ASSUMEES
#   - La disponibilité de switch.deshumidificateur est vérifiée
#     à l'ouverture uniquement (T0). Une indisponibilité survenant
#     entre la vérification et l'émission n'est pas détectée.
#   - Toute validation repose exclusivement sur le guard.
#   - La synchronisation avec le guard repose sur l'écriture de
#     input_text.deshum_guard_last_ts.
# ==========================================================

set_deshumidificateur_state:
  alias: "Déshumidificateur - Appliquer état"
  mode: single

  fields:
    target_state:
      description: "Etat cible demande : on ou off"
    request_source:
      description: "Appelant pour diagnostic"
    request_id:
      description: "Identifiant de correlation"

  sequence:
    - variables:
        target_state_normalized: "{{ target_state | default('', true) | lower }}"
        current_real_state: "{{ states('binary_sensor.deshumidificateur_actif') }}"
        command_entity_state: "{{ states('switch.deshumidificateur') }}"
        guard_last_ts_before: "{{ states('input_text.deshum_guard_last_ts') }}"

    - choose:
        - conditions:
            - condition: template
              value_template: >
                {{ target_state_normalized not in ['on', 'off'] }}
          sequence:
            - stop: "target_state invalide"

        - conditions:
            - condition: template
              value_template: >
                {{ current_real_state in ['unknown', 'unavailable'] }}
          sequence:
            - stop: "Source de verite indisponible"

        - conditions:
            - condition: template
              value_template: >
                {{ command_entity_state in ['unknown', 'unavailable'] }}
          sequence:
            - stop: "Entite de commande indisponible"

        - conditions:
            - condition: template
              value_template: >
                {{ current_real_state == target_state_normalized }}
          sequence:
            - action: script.guard_deshumidificateur
              data:
                expected_state: "{{ target_state_normalized }}"
                request_source: >
                  {{ request_source | default('script.set_deshumidificateur_state', true) }}
                request_id: "{{ request_id | default('', true) }}"

            - wait_template: >
                {{ states('input_text.deshum_guard_last_ts') != guard_last_ts_before }}
              timeout:
                seconds: 35
              continue_on_timeout: true

            - variables:
                result:
                  verdict: "{{ states('input_text.deshum_guard_last_verdict') }}"
                  reason: "{{ states('input_text.deshum_guard_last_reason') }}"
                  observed_state: "{{ states('input_text.deshum_guard_last_observed_state') }}"

            - stop: "Etat deja conforme"

      default:
        - choose:
            - conditions:
                - condition: template
                  value_template: >
                    {{ target_state_normalized == 'on' }}
              sequence:
                - action: switch.turn_on
                  target:
                    entity_id: switch.deshumidificateur

          default:
            - action: switch.turn_off
              target:
                entity_id: switch.deshumidificateur

        - action: script.guard_deshumidificateur
          data:
            expected_state: "{{ target_state_normalized }}"
            request_source: >
              {{ request_source | default('script.set_deshumidificateur_state', true) }}
            request_id: "{{ request_id | default('', true) }}"

        - wait_template: >
            {{ states('input_text.deshum_guard_last_ts') != guard_last_ts_before }}
          timeout:
            seconds: 35
          continue_on_timeout: true

        - variables:
            result:
              verdict: "{{ states('input_text.deshum_guard_last_verdict') }}"
              reason: "{{ states('input_text.deshum_guard_last_reason') }}"
              observed_state: "{{ states('input_text.deshum_guard_last_observed_state') }}"

        - stop: "Commande executee et qualifiee"