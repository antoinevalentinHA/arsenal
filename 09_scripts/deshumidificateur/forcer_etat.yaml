# ==========================================================
# 🧠 ARSENAL — SCRIPT : Déshumidificateur — Synchronisation d’état forcée
# ----------------------------------------------------------
# 🎯 ROLE
#   Orchestrateur UNIQUE de synchronisation entre :
#     - l’état réel du déshumidificateur
#     - l’état cible demandé
#
# 🧱 PRINCIPE DE VERITE
#   La seule source de verite est :
#     - binary_sensor.deshumidificateur_actif
#
# 🧩 PRINCIPE D'ACTION
#   L'action est portee par :
#     - switch.deshumidificateur
#
#   Le switch sert a commander.
#   Le binary_sensor sert a verifier.
#
# 🛡️ GARDE DE SECURITE
#   Aucune action n'est emise si :
#     - la source de verite est indisponible
#     - ou la commande n'est pas disponible
# ==========================================================

set_deshumidificateur_state:
  alias: "Déshumidificateur - Appliquer état"
  description: "Commande via switch.deshumidificateur, validation via binary_sensor.deshumidificateur_actif."
  mode: single

  fields:
    target_state:
      description: "État souhaité : 'on' ou 'off'"
      example: "on"

  sequence:

    # ======================================================
    # 1️⃣ Variables de contexte
    # ======================================================
    - variables:
        target_state_normalized: "{{ target_state | default('on') | lower }}"
        want_on: "{{ target_state_normalized == 'on' }}"
        actif_state: "{{ states('binary_sensor.deshumidificateur_actif') }}"
        switch_state: "{{ states('switch.deshumidificateur') }}"
        is_on: "{{ is_state('binary_sensor.deshumidificateur_actif','on') }}"

    # ======================================================
    # 2️⃣ Validation minimale
    # ======================================================
    - if:
        - condition: template
          value_template: "{{ target_state_normalized not in ['on', 'off'] }}"
      then:
        - stop: "target_state invalide : utiliser 'on' ou 'off'"

    # ======================================================
    # 3️⃣ Validation des prerequis de securite
    # ======================================================
    - if:
        - condition: template
          value_template: >
            {{ actif_state in ['unknown', 'unavailable', 'none', ''] }}
      then:
        - stop: "Source de verite indisponible : binary_sensor.deshumidificateur_actif"

    - if:
        - condition: template
          value_template: >
            {{ switch_state in ['unknown', 'unavailable', 'none', ''] }}
      then:
        - stop: "Commande indisponible : switch.deshumidificateur"

    # ======================================================
    # 4️⃣ Verification prealable : si deja conforme, on sort
    # ======================================================
    - choose:
        - conditions: "{{ want_on and is_on }}"
          sequence:
            - stop: "Déjà ON - pas d'action nécessaire"
        - conditions: "{{ (not want_on) and (not is_on) }}"
          sequence:
            - stop: "Déjà OFF - pas d'action nécessaire"

    # ======================================================
    # 5️⃣ Premiere tentative de commande
    # ======================================================
    - choose:
        - conditions: "{{ want_on }}"
          sequence:
            - action: switch.turn_on
              target:
                entity_id: switch.deshumidificateur
      default:
        - action: switch.turn_off
          target:
            entity_id: switch.deshumidificateur

    - delay: "00:00:05"

    - wait_template: >
        {{ (want_on and is_state('binary_sensor.deshumidificateur_actif','on')) or
           ((not want_on) and is_state('binary_sensor.deshumidificateur_actif','off')) }}
      timeout: "00:01:00"
      continue_on_timeout: true

    # ======================================================
    # 6️⃣ Seconde tentative si l'etat reel n'a pas change
    # ======================================================
    - if:
        - condition: template
          value_template: >
            {{ (want_on and not is_state('binary_sensor.deshumidificateur_actif','on')) or
               ((not want_on) and not is_state('binary_sensor.deshumidificateur_actif','off')) }}
      then:
        - choose:
            - conditions: "{{ want_on }}"
              sequence:
                - action: switch.turn_on
                  target:
                    entity_id: switch.deshumidificateur
          default:
            - action: switch.turn_off
              target:
                entity_id: switch.deshumidificateur

        - delay: "00:00:10"

        - wait_template: >
            {{ (want_on and is_state('binary_sensor.deshumidificateur_actif','on')) or
               ((not want_on) and is_state('binary_sensor.deshumidificateur_actif','off')) }}
          timeout: "00:01:00"
          continue_on_timeout: true

    # ======================================================
    # 7️⃣ Echec final si l'etat reel reste non conforme
    # ======================================================
    - if:
        - condition: template
          value_template: >
            {{ (want_on and not is_state('binary_sensor.deshumidificateur_actif','on')) or
               ((not want_on) and not is_state('binary_sensor.deshumidificateur_actif','off')) }}
      then:
        - stop: "Échec de synchronisation : état réel non conforme après deux tentatives"