# ==========================================================
# 🧠 ARSENAL — SCRIPT : VMC – Bascule manuelle (toggle brut)
# ----------------------------------------------------------
# 🎯 RÔLE FONDAMENTAL
#   Script de bascule MANUELLE et volontaire de la VMC.
#
#   Ce script applique un toggle physique direct
#   sans aucune vérification ni synchronisation d’état.
#
# ----------------------------------------------------------
# 🧱 RESPONSABILITÉ UNIQUE
#
#   - Envoyer une commande `toggle` brute au SwitchBot
#   - Ne PAS interpréter l’état courant
#   - Ne PAS mémoriser ou corriger l’état interne
#
# ----------------------------------------------------------
# ⚠️ NATURE VOLONTAIREMENT NON SÉCURISÉE
#
#   - Aucune idempotence
#   - Aucune garantie de cohérence logique
#   - Aucune protection contre les désynchronisations
#
#   ➜ Ce comportement est ASSUMÉ.
#
# ----------------------------------------------------------
# 🧠 CAS D’USAGE LÉGITIMES
#
#   - Commande manuelle utilisateur
#   - Bouton de secours / override
#   - Dépannage ou test matériel
#
# ----------------------------------------------------------
# ❌ CE SCRIPT NE FAIT PAS
#
#   - Ne met PAS à jour `input_boolean.vmc_haute_vitesse`
#   - Ne remplace PAS les scripts exécutifs Arsenal
#   - Ne doit PAS être utilisé par des automatisations
#
# ----------------------------------------------------------
# 🧠 PHILOSOPHIE ARSENAL
#
#   - Script volontairement “dangereux”
#   - Réservé à l’humain
#   - Les automatismes utilisent les scripts sécurisés
#
# ----------------------------------------------------------
# 🔗 DÉPENDANCES
#
#   - switch.vmc
#
# ----------------------------------------------------------
# ✅ Compatibilité : Home Assistant 2024.8+
# ==========================================================

vmc_toggle:
  alias: "VMC - Bascule"
  mode: single

  sequence:
    # 🔁 Bascule directe de la VMC (ON ⇄ OFF)
    - action: switch.toggle
      target:
        entity_id: switch.vmc