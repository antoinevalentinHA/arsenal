# ==========================================================
# 🧠 ARSENAL — SCRIPT : Chauffage – Décision Centrale V3
# ----------------------------------------------------------
# 🎯 RÔLE FONDAMENTAL
#
#   Cerveau UNIQUE de décision du chauffage.
#   Point d'entrée canonique du domaine chauffage consigne.
#
#   Ce script est la SEULE autorité habilitée à décider
#   un changement de régime chauffage Arsenal :
#     → Confort
#     → Réduit
#
#   Il délègue toute exécution à :
#     → script.chauffage_appliquer_consigne
#
#   Il ne fait PAS :
#     - Aucune exécution directe de consigne
#     - Aucune hypothèse thermique
#     - Aucune décision implicite
#
# ----------------------------------------------------------
# 🧱 HIÉRARCHIE DES PRIORITÉS (ORDRE STRICT)
#
#   👤 NIVEAU 0 — OVERRIDE OPÉRATEUR (SOUVERAIN)
#     (commande humaine explicite, prioritaire sur toute logique Arsenal)
#     - mode_confort_chauffage = ON
#
#     Effet :
#       - impose immédiatement le programme Confort
#       - contourne les blocages hiérarchiques et les abstentions
#       - reste subordonné aux sécurités matérielles hors périmètre Arsenal
#
#   🛑 NIVEAU 1 — INTERDICTIONS SYSTÈME (RÉGIME AUTOMATIQUE)
#     (souveraines hors override opérateur)
#     - Chauffage non autorisé système
#
#   🧠 NIVEAU 2 — CONTEXTES MAJEURS (RÉGIME AUTOMATIQUE)
#     (imposent Réduit hors override opérateur, ordre d'évaluation strict)
#     1. Aération en cours et confirmée
#     2. Blocage aération
#     3. Fenêtres ouvertes (avec délai)
#     4. Mode maison = Vacances
#     5. Poêle actif
#
#   🌡️ NIVEAU 3 — CONFORT D'OPPORTUNITÉ (RÉGIME AUTOMATIQUE)
#     (sous réserve des niveaux supérieurs)
#     1. Présence réelle → délégué à sensor.chauffage_autorisation_cible
#     2. Inhibition géofencing → confort (protection thermique en absence)
#     3. Défaut → réduit
#
# ----------------------------------------------------------
# 🔁 HYSTÉRÉSIS DÉCISIONNELLE & ÉTAT D'ATTENTE
#
#   Hors override opérateur, ce script ne force JAMAIS
#   une reprise automatique à la levée d'un blocage ou d'un délai.
#
#   ➜ Fin de blocage ≠ reprise chauffage
#   ➜ Passage en Confort uniquement si le BESOIN THERMIQUE
#     est confirmé par les capteurs métier.
#
#   Objectifs :
#     - Zéro effet yo-yo
#     - Respect de l'inertie thermique
#     - Aucune action "par principe"
#
# ----------------------------------------------------------
# 🚦 GARDES D'EXÉCUTION (SÉQUENCE STRICTE)
#
#   G1 — Anti-rebond géoloc
#         Timer actif ET pas d'override → STOP
#         (contournable par override opérateur)
#
#   G2 — Bridge online [CONTRAT SOCLE BOILER]
#         binary_sensor.boiler_bridge_online != on → STOP
#         Point d'entrée canonique : c'est ICI que bridge_online
#         est évalué pour le domaine chauffage consigne.
#         (non contournable)
#
#   G3 — Programme inconnu
#         prog_actuel == unknown ET pas d'override → STOP
#         (contournable par override opérateur)
#
#   G4 — Mode neutre
#         desired_mode == neutre → STOP propre sans appel descendant
#         (autorisation sans action — non contournable)
#
#   G5 — Idempotence
#         desired_mode == prog_actuel → STOP
#         Zéro appel inutile.
#         (non contournable)
#
# ----------------------------------------------------------
# 🔒 ANTI-REBOND GÉOLOCALISATION
#
#   Toute décision validée déclenche timer.chauffage_geoloc_antirebond.
#   Ce timer bloque toute décision concurrente immédiate.
#
#   ➜ Stabilisation logique
#   ➜ Protection thermique et anti-rafale transactionnelle
#
# ----------------------------------------------------------
# 🧾 OBSERVABILITÉ & TRAÇABILITÉ
#
#   Toute décision explicite produit :
#     - Une application de régime observable (via chauffage_appliquer_consigne)
#     - Un logbook lisible
#     - Une raison métier traçable (voir table ci-dessous)
#
#   Raisons émises :
#     confort_force              — override opérateur
#     chauffage_non_autorise     — système non autorisé
#     aeration_en_cours          — aération en cours et confirmée
#     blocage_aeration_en_cours  — blocage aération actif
#     fenetre_ouverte_maison     — fenêtre ouverte (avec délai)
#     mode_maison_vacances       — mode vacances actif
#     poele_actif                — poêle en fonctionnement
#     besoin_thermique           — présence + cible = comfort
#     presence_on                — présence + cible = neutre
#     confort_suffisant          — présence + cible = reduced
#     absence_protection_thermique — inhibition géofencing
#     absence                    — défaut (absence non inhibée)
#
# ----------------------------------------------------------
# 🧱 GARANTIES SYSTÈME
#
#   - Une seule décision à la fois (mode: restart)
#   - Zéro appel inutile (G5 idempotence)
#   - Zéro oscillation en régime automatique (anti-rebond)
#   - Zéro ambiguïté d'état (prog_actuel normalisé)
#   - Override toujours lisible (raison confort_force prioritaire)
#
# ----------------------------------------------------------
# 📎 RÉFÉRENCES
#
#   Contrat socle boiler :
#     contrats/boiler/CONTRAT_BOILER_SOCLE_TRANSACTIONNEL.md
#   Fiche de référence complète :
#     contrats/chauffage/30_decision_centrale.md
#   Audit pattern transactionnel boiler :
#     outils_externes/boiler_pi/AUDIT_CHAINE_MQTT_ACK_ECS.md
#
# ----------------------------------------------------------
# ✅ Compatibilité : Home Assistant 2024.8+
# ==========================================================

chauffage_decision_centrale:
  alias: "Chauffage - Décision centrale"
  description: >
    Decision automatique unique Comfort/Reduced selon le contexte
    global, avec évitement total des actions inutiles.

  mode: restart

  sequence:

    # ------------------------------------------------------
    # Protection initiale : anti-rebond geoloc
    # ------------------------------------------------------

    - alias: "Guard anti-rebond (hors override)"
      condition: template
      value_template: >
        {{
          is_state('input_boolean.mode_confort_chauffage', 'on')
          or is_state('timer.chauffage_geoloc_antirebond', 'idle')
        }}

    # ------------------------------------------------------
    # Garde capacité d'exécution boiler
    # ------------------------------------------------------
    - alias: "Guard boiler bridge online"
      condition: state
      entity_id: binary_sensor.boiler_bridge_online
      state: "on"

    # ------------------------------------------------------
    # Variables principales (programme actuel et évaluation)
    # ------------------------------------------------------
    - alias: "Set variables"
      variables:

        # Programme chauffage actuel (lecture locale sécurisée)
        prog_actuel: >
          {% set v = states('sensor.programme_chauffage') | lower %}
          {% if 'eco' in v %}
            reduced
          {% elif 'comfort' in v or 'confort' in v %}
            comfort
          {% else %}
            unknown
          {% endif %}

        # Mode désiré calculé selon le contexte global
        desired_mode: >
          {% if is_state('input_boolean.mode_confort_chauffage', 'on') %}
            comfort

          {% elif not is_state('binary_sensor.chauffage_autorise_systeme', 'on') %}
            reduced

          {% elif is_state('input_boolean.aeration_episode_en_cours', 'on')
                 and is_state('input_boolean.aeration_confirmee', 'on') %}
            reduced

          {% elif is_state('input_boolean.chauffage_blocage_aeration', 'on') %}
            reduced

          {% elif is_state('binary_sensor.fenetre_ouverte_maison_avec_delai', 'on') %}
            reduced

          {% elif is_state('input_select.mode_maison', 'Vacances') %}
            reduced

          {% elif is_state('input_boolean.blocage_chauffage_poele', 'on') %}
            reduced

          {% elif is_state('binary_sensor.presence_famille_unifiee', 'on') %}
            {% set cible = states('sensor.chauffage_autorisation_cible') %}
            {% if cible in ['comfort','neutre','reduced'] %}
              {{ cible }}
            {% else %}
              neutre
            {% endif %}

          {% elif is_state('input_boolean.chauffage_inhibition_geofencing', 'on') %}
            comfort

          {% else %}
            reduced
          {% endif %}

        reason: >
          {% if is_state('input_boolean.mode_confort_chauffage', 'on') %}
            confort_force

          {% elif not is_state('binary_sensor.chauffage_autorise_systeme', 'on') %}
            chauffage_non_autorise

          {% elif is_state('input_boolean.aeration_episode_en_cours', 'on')
                 and is_state('input_boolean.aeration_confirmee', 'on') %}
            aeration_en_cours

          {% elif is_state('input_boolean.chauffage_blocage_aeration', 'on') %}
            blocage_aeration_en_cours

          {% elif is_state('binary_sensor.fenetre_ouverte_maison_avec_delai', 'on') %}
            fenetre_ouverte_maison

          {% elif is_state('input_select.mode_maison', 'Vacances') %}
            mode_maison_vacances

          {% elif is_state('input_boolean.blocage_chauffage_poele', 'on') %}
            poele_actif

          {% elif is_state('binary_sensor.presence_famille_unifiee', 'on') %}
            {% set cible = states('sensor.chauffage_autorisation_cible') %}
            {% if cible == 'comfort' %}
              besoin_thermique
            {% elif cible == 'neutre' %}
              presence_on
            {% elif cible == 'reduced' %}
              confort_suffisant
            {% else %}
              presence_on
            {% endif %}

          {% elif is_state('input_boolean.chauffage_inhibition_geofencing', 'on') %}
            absence_protection_thermique

          {% else %}
            absence
          {% endif %}

    # ------------------------------------------------------
    # Cas particulier : programme inconnu -> on stoppe tout
    # ------------------------------------------------------
    - alias: "Guard programme inconnu (hors override)"
      condition: template
      value_template: >
        {{
          is_state('input_boolean.mode_confort_chauffage', 'on')
          or prog_actuel != 'unknown'
        }}

    # ------------------------------------------------------
    # Garde-fou neutre : autorisation sans action
    # ------------------------------------------------------
    - alias: "Stop si mode neutre"
      choose:
        - conditions:
            - condition: template
              value_template: "{{ desired_mode == 'neutre' }}"
          sequence:
            - stop: "Mode neutre — autorisation sans action"

    # ------------------------------------------------------
    # Garde-fou principal : si pas de changement → stop total
    # ------------------------------------------------------
    - alias: "Guard aucun changement"
      condition: template
      value_template: "{{ desired_mode != prog_actuel }}"

    # ------------------------------------------------------
    # Decision centrale (un seul choose, seulement si changement)
    # ------------------------------------------------------
    - alias: "Decision centrale"
      choose:

        # ---------- Passage en Comfort ----------
        - conditions:
            - condition: template
              value_template: "{{ desired_mode == 'comfort' }}"
            - condition: template
              value_template: "{{ not is_state('sensor.programme_chauffage', 'Confort') }}"
          sequence:

            # ------------------------------------------------------
            # Memoire d'intention sessionnelle chauffage
            # ------------------------------------------------------
            - service: input_select.select_option
              target:
                entity_id: input_select.chauffage_mode_session
              data:
                option: "confort"

            # ------------------------------------------------------
            # Annulation retry chauffage en attente
            # ------------------------------------------------------
            - service: input_boolean.turn_off
              target:
                entity_id: input_boolean.chauffage_retry_pending

            - service: timer.cancel
              target:
                entity_id: timer.chauffage_retry_timer

            # ------------------------------------------------------
            # Execution chauffage
            # ------------------------------------------------------
            - alias: "Activer chauffage confort"
              service: script.chauffage_appliquer_consigne
              data:
                consigne: "{{ states('input_select.chauffage_mode_session') }}"
                raison: "{{ reason }}"

            - alias: "Start anti-rebond"
              service: timer.start
              target:
                entity_id: timer.chauffage_geoloc_antirebond

      default:

        # ---------- Passage en Reduced ----------
        - alias: "Activer chauffage reduit"
          choose:
            - conditions:
                - condition: template
                  value_template: "{{ not is_state('sensor.programme_chauffage', 'Eco') }}"
              sequence:

                # ------------------------------------------------------
                # Memoire d'intention sessionnelle chauffage
                # ------------------------------------------------------
                - service: input_select.select_option
                  target:
                    entity_id: input_select.chauffage_mode_session
                  data:
                    option: "reduite"

                # ------------------------------------------------------
                # Annulation retry chauffage en attente
                # ------------------------------------------------------
                - service: input_boolean.turn_off
                  target:
                    entity_id: input_boolean.chauffage_retry_pending

                - service: timer.cancel
                  target:
                    entity_id: timer.chauffage_retry_timer

                # ------------------------------------------------------
                # Execution chauffage
                # ------------------------------------------------------
                - service: script.chauffage_appliquer_consigne
                  data:
                    consigne: "{{ states('input_select.chauffage_mode_session') }}"
                    raison: "{{ reason }}"

        - alias: "Start anti-rebond"
          service: timer.start
          target:
            entity_id: timer.chauffage_geoloc_antirebond