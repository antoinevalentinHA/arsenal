# ==========================================================
# 🔥 SCRIPT ARSENAL — Chauffage : Passage en programme Confort
# ----------------------------------------------------------
# 🎯 Rôle :
#   Forcer le passage du chauffage Viessmann en programme
#   "Confort" (preset ViCare = comfort), afin d’appliquer
#   la consigne de présence.
#
# 🧠 Nature du script :
#   - Script STRICTEMENT exécutif
#   - Aucune logique décisionnelle intégrée
#   - Aucun déclenchement direct par l’interface utilisateur
#
# ⚙️ Comportement :
#   - Vérifie l’état logique actuel du programme chauffage
#   - Envoie la consigne "comfort" côté ViCare si nécessaire
#   - Répète l’envoi jusqu’à confirmation cloud observable
#   - Réveille l’API ViCare en cas de sommeil
#   - Journalise uniquement sur succès confirmé
#
# 🔒 Garanties :
#   - Idempotence fonctionnelle
#   - Aucun faux succès déclaré
#   - Tolérance aux états locaux incohérents
#
# ⚠️ Limites connues :
#   - Absence d’ACK transactionnel ViCare
#   - Valeur pouvant être écrasée ultérieurement
#
# 📌 Usage :
#   - Appelé exclusivement par les scripts ou automatisations
#     de décision thermique centrale
#
# 🗓️ Compatibilité : Home Assistant 2024.8+
# ==========================================================

chauffage_consigne_confort:
  alias: "Chauffage – Passer en programme Confort"
  mode: restart
  sequence:

    # ======================================================
    # 🛑 ETAPE 0 : VERROU APPLICATION EN COURS (ANTI-YOYO)
    # ------------------------------------------------------
    # Empêche toute automation de réalignement d’intervenir
    # pendant l’exécution légitime d’une décision centrale.
    # ======================================================
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.chauffage_application_en_cours

    # ======================================================
    # 🚫 ETAPE 1 : VERIFICATION — EVITER DOUBLONS
    # ------------------------------------------------------
    # Ne rien faire si le programme est déjà en Confort.
    # ======================================================
    - condition: template
      value_template: >
        {{ 'confort' not in states('sensor.programme_chauffage') | lower }}

    # ======================================================
    # 🔁 ETAPE 2 : ENVOI ET VERIFICATION REPETEE
    # ------------------------------------------------------
    # Boucle jusqu’à confirmation effective côté cloud.
    # Cette boucle réalise automatiquement un double-envoi,
    # ce qui réveille ViCare en cas de sommeil prolongé.
    # ======================================================
    - repeat:
        sequence:
          - service: climate.set_preset_mode
            target:
              entity_id: climate.vscotho1_200_11_chauffage
            data:
              preset_mode: "comfort"

          - delay: "00:00:15"
          - service: homeassistant.update_entity
            target:
              entity_id: climate.vscotho1_200_11_chauffage
          - delay: "00:00:45"

        until:
          - condition: template
            value_template: >
              {{ 'confort' in states('sensor.programme_chauffage') | lower }}

    # ======================================================
    # ✅ ETAPE 3 : CONFIRMATION SUCCES REEL
    # ======================================================
    - condition: template
      value_template: >
        {{ 'confort' in states('sensor.programme_chauffage') | lower }}

    # ======================================================
    # 🧠 ETAPE 4 : MEMORISATION DECISION SOUVERAINE
    # ------------------------------------------------------
    # Ecriture uniquement après confirmation réelle cloud.
    # ======================================================
    - service: input_select.select_option
      target:
        entity_id: input_select.chauffage_dernier_mode_decide
      data:
        option: "comfort"

    # ======================================================
    # 📝 ETAPE 5 : ENREGISTREMENT RAISON (OPTIONNEL)
    # ------------------------------------------------------
    # La raison n’est écrite que si elle est fournie
    # par la décision centrale appelante.
    # ======================================================
    - choose:
        - conditions:
            - condition: template
              value_template: >
                {{ raison is defined }}
          sequence:
            - service: input_text.set_value
              target:
                entity_id: input_text.chauffage_raison
              data:
                value: "{{ raison }}"
      default: []

    # ======================================================
    # 🔓 ETAPE 6 : LIBERATION VERROU APPLICATION
    # ------------------------------------------------------
    # Autorise à nouveau les mécanismes de réalignement.
    # ======================================================
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.chauffage_application_en_cours
