# ==========================================================
# 🧠 ARSENAL — SCRIPT :
#     Chauffage – Application consigne Confort (HA → ViCare)
# ----------------------------------------------------------
# 🎯 RÔLE
#   Appliquer la consigne Confort souveraine définie dans
#   Home Assistant vers l’intégration ViCare.
#
#   Ce script constitue :
#     - L’UNIQUE POINT D’ÉCRITURE de la consigne Confort
#       vers la couche matérielle.
#
# 🧩 CHAÎNE
#   input_number.chauffage_consigne_confort
#        ↓
#   script.chauffage_appliquer_consigne_confort
#        ↓
#   number.vscotho1_200_11_temperature_de_confort
#
# 🔒 GARANTIES
#   - Validation stricte des valeurs
#   - Comparaison sur lecture locale fiable
#   - Tolérance epsilon anti-bruit
#   - Journalisation explicite
#
# 🚫 NE FAIT PAS
#   - Ne décide pas de la consigne
#   - Ne modifie aucun mode / planning
#   - Ne lit aucun contexte métier
# ==========================================================

chauffage_appliquer_consigne_confort:
  alias: "Chauffage – Appliquer consigne Confort"
  mode: single

  sequence:

    # ------------------------------------------------------
    # 🔍 Lecture des valeurs
    # ------------------------------------------------------
    - variables:
        target_value: "{{ states('input_number.chauffage_consigne_confort') | float(0) }}"
        local_value: "{{ states('sensor.chauffage_consigne_confort_local') | float(0) }}"
        eps: 0.05
        stable: "{{ is_state('input_boolean.systeme_stable', 'on') }}"

    # ------------------------------------------------------
    # 🚫 Validation stricte
    # ------------------------------------------------------
    - condition: template
      value_template: >
        {{
          stable
          and target_value > 0
          and (target_value - local_value) | abs > eps
        }}

    # ------------------------------------------------------
    # ⏱️ Anti-rafales / latence ViCare
    # ------------------------------------------------------
    - delay: "00:00:02"

    # ------------------------------------------------------
    # 🔄 Écriture ViCare
    # ------------------------------------------------------
    - service: number.set_value
      target:
        entity_id: number.vscotho1_200_11_temperature_de_confort
      data:
        value: "{{ target_value }}"

    # ------------------------------------------------------
    # 📝 Journalisation
    # ------------------------------------------------------
    - service: logbook.log
      data:
        name: "Chauffage"
        message: >
          🔧 Consigne Confort appliquée vers ViCare :
          {{ local_value }} °C → {{ target_value }} °C (HA maître)
        entity_id: number.vscotho1_200_11_temperature_de_confort
