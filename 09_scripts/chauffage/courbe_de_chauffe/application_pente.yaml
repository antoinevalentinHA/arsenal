# ==========================================================
# 🔥 SCRIPT ARSENAL — Chauffage : Application pente de chauffe
# ----------------------------------------------------------
# 🎯 Rôle :
#   Appliquer la pente de la courbe de chauffe Viessmann
#   (ViCare) de manière robuste, bornée et vérifiable.
#
# 🧠 Nature du script :
#   - Script STRICTEMENT exécutif
#   - Aucune logique décisionnelle intégrée
#   - Aucun déclenchement direct par l’utilisateur
#
# ⚙️ Comportement :
#   - Lit la consigne cible depuis un helper
#   - Compare à la valeur cloud actuelle
#   - Applique la consigne uniquement si nécessaire
#   - Effectue des tentatives limitées et temporisées
#   - Valide le résultat par observation côté cloud
#
# 🔒 Garanties :
#   - Idempotence stricte
#   - Nombre d’appels API ViCare maîtrisé
#   - Aucune hypothèse sur le succès d’un service
#
# ⚠️ Limites connues :
#   - Absence d’ACK fiable côté ViCare
#   - Valeur potentiellement réécrasée par la chaudière
#
# 📌 Usage :
#   - Appelé exclusivement par des automatisations
#     de décision ou de correction thermique
#
# 🗓️ Compatibilité : Home Assistant 2024.8+
# ==========================================================

chauffage_appliquer_pente:
  alias: "Chauffage – Appliquer pente de chauffe"
  mode: restart
  sequence:

    - variables:
        pente_cible_raw: "{{ states('input_number.chauffage_pente_consigne') }}"
        pente_cloud_raw: "{{ states('number.vscotho1_200_11_heating_curve_slope') }}"
        tolerance: 0.01

    - condition: template
      value_template: >
        {{ pente_cible_raw not in ['unknown','unavailable','none','']
           and pente_cloud_raw not in ['unknown','unavailable','none',''] }}

    - variables:
        pente_cible: "{{ pente_cible_raw | float }}"
        pente_initiale: "{{ pente_cloud_raw | float }}"

    - condition: template
      value_template: >
        {{ (pente_cible - pente_initiale) | abs > tolerance }}

    - repeat:
        while:
          - condition: template
            value_template: >
              {{ repeat.index <= 3
                 and is_state('binary_sensor.vicare_api_disponible', 'on')
                 and ((states('number.vscotho1_200_11_heating_curve_slope') | float - pente_cible) | abs) > tolerance }}
        sequence:

          - service: number.set_value
            target:
              entity_id: number.vscotho1_200_11_heating_curve_slope
            data:
              value: "{{ pente_cible }}"

          - delay: "00:00:20"

          - service: homeassistant.update_entity
            target:
              entity_id: number.vscotho1_200_11_heating_curve_slope

          - delay: "00:00:30"

    - variables:
        pente_finale_raw: "{{ states('number.vscotho1_200_11_heating_curve_slope') }}"
        pente_finale: "{{ pente_finale_raw | float(9999) }}"

    - choose:

        - conditions:
            - condition: template
              value_template: >
                {{ pente_finale_raw not in ['unknown','unavailable','none','']
                   and (pente_finale - pente_cible) | abs < tolerance }}
          sequence:
            - service: logbook.log
              data:
                name: "ViCare"
                message: >
                  📈 Pente CONFIRMEE cote cloud :
                  {{ pente_initiale }} → {{ pente_finale }}
                entity_id: number.vscotho1_200_11_heating_curve_slope

        - conditions:
            - condition: template
              value_template: >
                {{ pente_finale_raw in ['unknown','unavailable','none','']
                   or (pente_finale - pente_cible) | abs >= tolerance }}
          sequence:
            - service: logbook.log
              data:
                name: "ViCare"
                message: >
                  ⚠️ Pente NON confirmee cote cloud :
                  cible={{ pente_cible }},
                  lu={{ pente_finale_raw }}
                entity_id: number.vscotho1_200_11_heating_curve_slope