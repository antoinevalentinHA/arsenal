# ==========================================================
# 🔥 SCRIPT ARSENAL — Chauffage : Application décalage parallèle
# ----------------------------------------------------------
# 🎯 Rôle :
#   Appliquer le décalage parallèle de la courbe de chauffe
#   Viessmann (ViCare) de manière robuste et contrôlée.
#
# 🧠 Nature du script :
#   - Script STRICTEMENT exécutif
#   - Ne contient AUCUNE logique décisionnelle
#   - N’est JAMAIS déclenché directement par l’utilisateur
#
# ⚙️ Comportement :
#   - Lit la consigne cible depuis un helper
#   - Compare à la valeur cloud actuelle
#   - Applique la consigne uniquement si nécessaire
#   - Répète l’envoi de façon bornée et temporisée
#   - Valide le résultat par observation côté cloud
#
# 🔒 Garanties :
#   - Idempotence totale
#   - Limitation stricte des appels API ViCare
#   - Aucune hypothèse sur le succès d’un service
#
# ⚠️ Limites connues :
#   - ViCare ne fournit pas d’ACK fiable
#   - La chaudière peut écraser la valeur ultérieurement
#
# 📌 Usage :
#   - Appelé exclusivement par des automatisations
#     de décision ou de correction thermique
#
# 🗓️ Compatibilité : Home Assistant 2024.8+
# ==========================================================

chauffage_appliquer_parallele:
  alias: "Chauffage – Appliquer décalage parallèle"
  mode: restart
  sequence:

    - variables:
        parallele_cible_raw: "{{ states('input_number.chauffage_parallele_consigne') }}"
        parallele_cloud_raw: "{{ states('number.vscotho1_200_11_decalage_de_la_courbe_de_chauffe') }}"
        tolerance: 0.01

    - condition: template
      value_template: >
        {{ parallele_cible_raw not in ['unknown','unavailable','none','']
           and parallele_cloud_raw not in ['unknown','unavailable','none',''] }}

    - variables:
        parallele_cible: "{{ parallele_cible_raw | float }}"
        parallele_initial: "{{ parallele_cloud_raw | float }}"

    - condition: template
      value_template: >
        {{ (parallele_cible - parallele_initial) | abs > tolerance }}

    - repeat:
        while:
          - condition: template
            value_template: >
              {{ repeat.index <= 3
                 and is_state('binary_sensor.vicare_api_disponible', 'on')
                 and ((states('number.vscotho1_200_11_decalage_de_la_courbe_de_chauffe') | float - parallele_cible) | abs) > tolerance }}
        sequence:

          - service: number.set_value
            target:
              entity_id: number.vscotho1_200_11_decalage_de_la_courbe_de_chauffe
            data:
              value: "{{ parallele_cible }}"

          - delay: "00:00:20"

          - service: homeassistant.update_entity
            target:
              entity_id: number.vscotho1_200_11_decalage_de_la_courbe_de_chauffe

          - delay: "00:00:30"

    - variables:
        parallele_final_raw: "{{ states('number.vscotho1_200_11_decalage_de_la_courbe_de_chauffe') }}"
        parallele_final: "{{ parallele_final_raw | float(9999) }}"

    - choose:

        - conditions:
            - condition: template
              value_template: >
                {{ parallele_final_raw not in ['unknown','unavailable','none','']
                   and (parallele_final - parallele_cible) | abs < tolerance }}
          sequence:
            - service: logbook.log
              data:
                name: "ViCare"
                message: >
                  📊 Parallele CONFIRME cote cloud :
                  {{ parallele_initial }} → {{ parallele_final }}
                entity_id: number.vscotho1_200_11_decalage_de_la_courbe_de_chauffe

        - conditions:
            - condition: template
              value_template: >
                {{ parallele_final_raw in ['unknown','unavailable','none','']
                   or (parallele_final - parallele_cible) | abs >= tolerance }}
          sequence:
            - service: logbook.log
              data:
                name: "ViCare"
                message: >
                  ⚠️ Parallele NON confirme cote cloud :
                  cible={{ parallele_cible }},
                  lu={{ parallele_final_raw }}
                entity_id: number.vscotho1_200_11_decalage_de_la_courbe_de_chauffe