# ==========================================================
# 🔥 SCRIPT ARSENAL — Chauffage : Appliquer parallele
# ----------------------------------------------------------
# 🎯 Rôle :
#   Appliquer le décalage parallele de la courbe de chauffe
#   correspondant a la consigne Arsenal locale.
#
# 🧠 Nature du script :
#   - Script STRICTEMENT executif
#   - Aucune logique decisionnelle integree
#   - Aucun declenchement direct par l’interface utilisateur
#
# ⚙️ Comportement :
#   - Lit la consigne cible depuis input_number.chauffage_parallele_consigne
#   - Genere un request_id UUID v4
#   - Publie UNE commande MQTT vers boiler bridge
#   - Attend une conclusion ACK corrélée :
#       applied / rejected / timeout
#   - Ne declare jamais de succes sans ACK corrélé = applied
#
# 🔒 Garanties :
#   - Script executif pur
#   - Aucune boucle de retry
#
# ⚠️ Important :
#   - accepted n’est PAS un succes metier
#   - seul un ACK corrélé = applied vaut succes d’execution
#   - la conclusion transactionnelle est portee par
#     sensor.boiler_ack_heating_set_curve_shift_result
#   - le script n’ecrit aucune conclusion metier locale
#
# 📌 Dependances :
#   - input_number.chauffage_parallele_consigne
#   - input_text.boiler_req_heating_set_curve_shift
#   - sensor.boiler_ack_heating_set_curve_shift_status
#
# 🗓️ Compatibilite : Home Assistant 2024.8+
# ==========================================================

chauffage_appliquer_parallele:
  alias: "Chauffage – Appliquer parallele"
  mode: single

  sequence:
    # ======================================================
    # 🧾 ETAPE 0 : VARIABLES TRANSACTIONNELLES
    # ======================================================
    - variables:
        boiler_request_id: >
          {% set h = '0123456789abcdef' %}
          {% set v = '89ab' %}
          {{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}-{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}-4{{ h|random }}{{ h|random }}{{ h|random }}-{{ v|random }}{{ h|random }}{{ h|random }}{{ h|random }}-{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}

        boiler_ts: >
          {{ as_timestamp(utcnow()) | timestamp_custom('%Y-%m-%dT%H:%M:%SZ', false) }}

        boiler_expires_at: >
          {{ (as_timestamp(utcnow()) + 30) | timestamp_custom('%Y-%m-%dT%H:%M:%SZ', false) }}

        boiler_parallele_cible_raw: >
          {{ states('input_number.chauffage_parallele_consigne') }}

        boiler_parallele_cible: >
          {{ states('input_number.chauffage_parallele_consigne') | float(9999) }}

    # ======================================================
    # 🚫 ETAPE 1 : VALIDATION ENTREE
    # ======================================================
    - choose:
        - conditions:
            - condition: template
              value_template: >
                {{ boiler_parallele_cible_raw in ['unknown', 'unavailable', 'none', ''] }}
          sequence:
            - stop: "Parallele cible indisponible — aucun envoi boiler bridge"

        - conditions:
            - condition: template
              value_template: >
                {{ boiler_parallele_cible == 9999 }}
          sequence:
            - stop: "Parallele cible invalide — aucun envoi boiler bridge"

    # ======================================================
    # 🧷 ETAPE 2 : ANCRAGE TRANSACTIONNEL
    # ======================================================
    - service: input_text.set_value
      target:
        entity_id: input_text.boiler_req_heating_set_curve_shift
      data:
        value: "{{ boiler_request_id }}"

    # ======================================================
    # 📤 ETAPE 3 : ENVOI COMMANDE MQTT
    # ======================================================
    - service: mqtt.publish
      data:
        topic: "boiler/command/heating/set_curve_shift"
        qos: 1
        retain: false
        payload: >-
          {
            "request_id": "{{ boiler_request_id }}",
            "ts": "{{ boiler_ts }}",
            "expires_at": "{{ boiler_expires_at }}",
            "source": "arsenal",
            "value": {{ boiler_parallele_cible }}
          }

    # ======================================================
    # ⏳ ETAPE 4 : ATTENTE CONCLUSION ACK CORRELEE
    # ======================================================
    - wait_template: >
        {{
          states('sensor.boiler_ack_heating_set_curve_shift_status') in ['applied', 'rejected', 'timeout']
          and states('sensor.boiler_ack_heating_set_curve_shift_request_id') == boiler_request_id
        }}
      timeout: "00:00:20"
      continue_on_timeout: true

    # ======================================================
    # 🧹 ETAPE 5 : LIBERATION TRANSACTIONNELLE
    # ======================================================
    - service: input_text.set_value
      target:
        entity_id: input_text.boiler_req_heating_set_curve_shift
      data:
        value: ""