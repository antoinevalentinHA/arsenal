# ==========================================================
# 🧠 ARSENAL — SCRIPT : Météo / Pluie
#              Actions centralisées post-détection
# ----------------------------------------------------------
# 🎯 RÔLE FONDAMENTAL
#   Appliquer l’ensemble des actions métier consécutives
#   à une DÉTECTION de pluie déjà validée par le système.
#
#   Ce script NE DÉTECTE PAS la pluie.
#   Il RÉAGIT à une décision météo amont.
#
# ----------------------------------------------------------
# 🧱 POSITION DANS L’ARCHITECTURE
#
#   - Script d’ACTION métier
#   - Appelé exclusivement par des automatisations météo
#   - Jamais déclenché directement par un capteur
#
#   ➜ Toute logique de détection, d’hystérésis ou d’anti-rebond
#     est volontairement EXCLUE de ce script.
#
# ----------------------------------------------------------
# 🧠 RESPONSABILITÉS
#
#   1️⃣ Identifier les fenêtres actuellement ouvertes
#   2️⃣ Informer l’utilisateur si une exposition existe
#   3️⃣ Appliquer une POLITIQUE de fermeture des volets,
#      jamais une fermeture aveugle
#
# ----------------------------------------------------------
# 🧩 POLITIQUE DE FERMETURE DES VOLETS
#
#   La fermeture automatique dépend strictement de :
#
#     - input_boolean.fermeture_volets_pluie
#     - input_select.activation_volets_pluie :
#         • Toujours
#         • En présence uniquement
#         • En absence uniquement
#     - Présence réelle du foyer
#     - Intensité de la pluie (pluie faible / forte)
#     - État réel des fenêtres concernées
#
#   ➜ Aucune fermeture n’est exécutée
#     si les conditions métier ne sont pas réunies.
#
# ----------------------------------------------------------
# 🌧️ GESTION DE L’INTENSITÉ
#
#   - Pluie détectée :
#       → Fermetures ciblées (chambres, baies ouvertes)
#
#   - Pluie forte :
#       → Fermetures élargies (séjour)
#
# ----------------------------------------------------------
# 🔔 NOTIFICATIONS
#
#   - Notification immédiate si fenêtres ouvertes
#   - Notification distincte si des volets sont fermés
#   - Message explicite : pluie détectée / pluie forte
#
# ----------------------------------------------------------
# 🚫 NE FAIT PAS
#
#   - Aucune détection météo
#   - Aucun calcul de cumul ou d’hystérésis
#   - Aucun déclenchement direct par capteur
#   - Aucune fermeture forcée hors politique définie
#
# ----------------------------------------------------------
# 📊 Type :
#   Script métier — météo / protection du logement
#
# 📍 Entité :
#   script.pluie_detectee
#
# 🔁 Mode :
#   single (pas de parallélisme volontaire)
#
# ✅ Compatibilité :
#   Home Assistant 2024.8+
#   Arsenal v6+
# ==========================================================


pluie_detectee:
  alias: Pluie détectée – Actions centralisées
  mode: single
  max_exceeded: silent
  sequence:
    - variables:
        fenetres:
          Chambre Arnaud: binary_sensor.contact_chambre_arnaud
          Chambre Matthieu: binary_sensor.contact_chambre_matthieu
          Séjour 1: binary_sensor.contact_sejour_1
          Séjour 2: binary_sensor.contact_sejour_2
          Séjour 3: binary_sensor.contact_sejour_3
          Séjour 4: binary_sensor.contact_sejour_4
          Entrée: binary_sensor.contact_entree_fenetre
          Chambre parents - gauche: binary_sensor.contact_chambre_parents_gauche
          Chambre parents - milieu: binary_sensor.contact_chambre_parents_milieu
          Chambre parents - droite: binary_sensor.contact_chambre_parents_droite

    - variables:
        fenetres_ouvertes: >
          {{ fenetres
            | dictsort
            | selectattr('1', 'in', states.binary_sensor
              | selectattr('state', 'equalto', 'on')
              | map(attribute='entity_id')
              | list)
            | map(attribute='0')
            | list }}
        fermeture_autorisee: >
          {% set mode = states('input_select.activation_volets_pluie') %}
          {% set presence = is_state('binary_sensor.presence_famille_securite','on') %}
          {{ is_state('input_boolean.fermeture_volets_pluie','on') and (
               mode == 'Toujours'
               or (mode == 'En présence uniquement' and presence)
               or (mode == 'En absence uniquement' and not presence)) }}
        pluie_forte: >
          {{ states('sensor.pluviometre_precipitation') | float(0) >
             states('input_number.seuil_pluie_fermeture_volets') | float(2.5) }}

    # 🌧️ Notification – Pluie et fenêtres ouvertes
    - choose:
        - conditions: "{{ fenetres_ouvertes | length > 0 }}"
          sequence:
            - action: script.notification_envoyer
              data:
                cible: input_text.telephone_antoine_notify
                titre: "🌧️ Pluie détectée"
                message: >
                  Il commence à pleuvoir et certaines fenêtres sont encore ouvertes :
                  {{ fenetres_ouvertes | join(', ') }}.

    # 2) Fermeture volets si autorisée
    - choose:
        - conditions: "{{ fermeture_autorisee }}"
          sequence:
            - variables:
                volets_fermes: []

            # Chambres → seulement si fenêtres ouvertes
            - choose:
                - conditions: "{{ is_state('binary_sensor.contact_chambre_arnaud','on') }}"
                  sequence:
                    - action: script.fermer_volet_arnaud
                    - variables:
                        volets_fermes: "{{ volets_fermes + ['chambre Arnaud'] }}"

                - conditions: "{{ is_state('binary_sensor.contact_chambre_matthieu','on') }}"
                  sequence:
                    - action: script.fermer_volet_matthieu
                    - variables:
                        volets_fermes: "{{ volets_fermes + ['chambre Matthieu'] }}"

            # Séjour → pluie forte OU baies ouvertes
            - choose:
                - conditions: >
                    {{ pluie_forte or
                       is_state('binary_sensor.contact_sejour_1','on') or
                       is_state('binary_sensor.contact_sejour_2','on') }}
                  sequence:
                    - action: script.fermer_volet_sejour_gauche
                    - variables:
                        volets_fermes: "{{ volets_fermes + ['séjour gauche'] }}"

                - conditions: >
                    {{ pluie_forte or
                       is_state('binary_sensor.contact_sejour_3','on') or
                       is_state('binary_sensor.contact_sejour_4','on') }}
                  sequence:
                    - action: script.fermer_volet_sejour_droit
                    - variables:
                        volets_fermes: "{{ volets_fermes + ['séjour droit'] }}"

            # 🌧️ Notification – Fermeture automatique des volets
            - condition: template
              value_template: "{{ volets_fermes | length > 0 }}"
            - action: script.notification_envoyer_avance
              data:
                cible: input_text.telephone_antoine_notify
                titre: "🌧️ Volets fermés automatiquement"
                message: >
                  Fermeture automatique des volets à {{ now().strftime('%H:%M') }}
                  en raison de {{ 'pluie forte' if pluie_forte else 'pluie détectée' }}.

                  Volets concernés : {{ volets_fermes | join(', ') }}.
                extra:
                  group: "volets"
                  tag: "fermeture_volets_pluie"
