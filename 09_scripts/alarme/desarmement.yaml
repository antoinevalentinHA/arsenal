# ==========================================================
# 🔓 SCRIPT — Alarme : Désarmement unifié
# ----------------------------------------------------------
# 🎯 RÔLE :
#   Appliquer un désarmement COMPLET, SÛR et CENTRALISÉ
#   de l’alarme à la suite d’une décision validée
#   (clavier, badge, présence, automatisme).
#
# 🧱 RESPONSABILITÉ :
#   Ce script est un APPLICATEUR D’ACTION.
#   Il exécute physiquement le désarmement réel
#   et ses effets immédiats de sécurité.
#
# 🛑 ACTIONS GARANTIES :
#   - Arrêt IMMÉDIAT de toute sirène, sans condition
#   - Désarmement réel uniquement si l’alarme est armée
#   - Confirmation sonore (si hors mode test)
#   - Notification utilisateur contextualisée
#
# 🚫 CE SCRIPT NE FAIT PAS :
#   - Ne calcule AUCUNE décision
#   - Ne détermine PAS s’il FAUT désarmer
#   - Ne lit AUCUNE logique métier complexe
#   - Ne remplace PAS le cerveau décisionnel
#   - N’active PAS directement le blocage d’armement automatique
#   - Ne gère AUCUNE temporalité de blocage
#
# 🧠 SÉPARATION ARSENAL STRICTE :
#   - Décision     → `script.alarme_decision_centrale`
#   - Application  → CE SCRIPT
#   - Blocage auto → automatisations dédiées de blocage
#   - Action sonore → scripts sirène dédiés
#
# 🔐 SÉCURITÉ INTÉGRÉE :
#   - Le désarmement réel reste prioritaire sur toute logique annexe
#   - Le blocage d’armement automatique, s’il est requis,
#     est géré hors de ce script par le mécanisme contractuel dédié
#
# 🧪 PROPRIÉTÉS ARSENAL :
#   - Idempotent (désarmé ≠ redésarmé)
#   - Sans effet de bord hors alarme
#   - Tolérant à l’état réel (sirène stoppée quoi qu’il arrive)
#
# 📊 TYPE :
#   Script applicatif critique (désarmement sécurisé)
#
# 📍 ENTITÉ :
#   script.alarme_desarmer
#
# 🧠 SÉMANTIQUE ARSENAL :
#   - Désarmer = action physique irréversible immédiate
#   - Le silence de la sirène est prioritaire sur toute logique
#
# ✅ ARCHITECTURE :
#   Arsenal v6+
#   Home Assistant 2024.8+
# ==========================================================

alarme_desarmer:
  alias: Alarme - Désarmement unifié
  description: >
    Désarme l’alarme proprement : coupe la sirène si active,
    applique le désarmement réel si nécessaire,
    puis envoie une notification/log.
  mode: single
  fields:
    origine:
      description: Origine du désarmement (optionnel)
      example: "Clavier, Présence auto, App mobile"

  sequence:
    # 1) Stop immédiat de la sirène (peu importe l’état de l’alarme)
    - action: script.arret_sirene

    # 2) Désarmer uniquement si l'alarme est armée (armed_away ou pending ou triggered)
    - condition: template
      value_template: >
        {{ states('alarm_control_panel.alarme_maison') in ['armed_away', 'pending', 'triggered'] }}

    - action: alarm_control_panel.alarm_disarm
      target:
        entity_id: alarm_control_panel.alarme_maison

    # 2bis) Mémoire — raison de désarmement (après succès réel)
    - action: input_text.set_value
      target:
        entity_id: input_text.alarme_raison
      data:
        value: "Désarmement — présence détectée"

    # 3) Bip si pas en mode test (double-bip court de confirmation)
    - choose:
        - conditions:
            - condition: state
              entity_id: input_boolean.mode_test_alarme
              state: 'off'
          sequence:
            - action: script.sirene_bip_bip

    # 5) Notification
    - action: script.notification_envoyer
      data:
        cible: input_text.telephone_antoine_notify
        titre: "🔓 Alarme désactivée"
        message: >
          L'alarme a été désactivée {{ 'automatiquement' if origine|default('Automatisme') == 'Automatisme' else 'manuellement' }}
          à {{ now().strftime('%H:%M') }}.