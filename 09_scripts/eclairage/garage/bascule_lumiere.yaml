# ==========================================================
# 🧠 ARSENAL — SCRIPT :
#     Garage — Action physique autoritaire
#
#  🎯 RÔLE
#     Point d’exécution physique unique du sous-système
#     d’éclairage garage.
#
#  ⚠️ CONTRAINTE STRUCTURELLE
#     Système non observable — aucune vérité matérielle.
#
#  📍 Entité :
#     script.garage_toggle
# ==========================================================

garage_toggle:
  alias: "Garage - Action physique"
  mode: single

  fields:
    action:
      name: Action
      description: "Action logique demandée : on, off ou toggle"
      example: "toggle"
      default: "toggle"
      selector:
        select:
          options:
            - "on"
            - "off"
            - "toggle"

  variables:
    requested_action: "{{ action | default('toggle') }}"
    current_state: "{{ states('input_boolean.garage_light_state') }}"
    effective_action: >-
      {% if requested_action in ['on', 'off', 'toggle'] %}
        {{ requested_action }}
      {% else %}
        toggle
      {% endif %}
    should_run: >-
      {{ effective_action == 'toggle'
         or (effective_action == 'on' and current_state == 'off')
         or (effective_action == 'off' and current_state == 'on') }}
    target_state: >-
      {% if effective_action == 'toggle' %}
        {% if current_state == 'off' %}
          on
        {% else %}
          off
        {% endif %}
      {% else %}
        {{ effective_action }}
      {% endif %}
    selected_switch: >-
      {% if target_state == 'on' %}
        switch.garage_1
      {% else %}
        switch.garage_2
      {% endif %}

  sequence:
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ should_run }}"
          sequence:
            - service: switch.turn_on
              target:
                entity_id: "{{ selected_switch }}"

            - service: "input_boolean.turn_{{ target_state }}"
              target:
                entity_id: input_boolean.garage_light_state