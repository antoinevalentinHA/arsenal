                  {% if ns.result | length == nb %}
                    {% break %}
                  {% endif %}
                {% endif %}
              {% endfor %}
            {% endif %}
            {% if ns.result | length > 0 %}
              {{ ns.result | sort | join(', ') }}
            {% else %}
              Aucun
            {% endif %}
          {% else %}
            Aucun
          {% endif %}

