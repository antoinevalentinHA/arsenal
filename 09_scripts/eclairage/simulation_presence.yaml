# ==========================================================
# 🧠 ARSENAL — SCRIPT : Simulation de présence
#              Générateur d’horaires journaliers
# ----------------------------------------------------------
# 🎯 ROLE
#   Générer des horaires pseudo-aléatoires réalistes
#   pour la simulation de présence, par couple canonique
#   periode / zone.
#
# ----------------------------------------------------------
# 🧱 NATURE
#
#   Ce script est un GENERATEUR DE DONNEES.
#
#   Il :
#     - calcule les bornes solaires utiles
#     - parcourt les couples periode / zone configurés
#     - lit les fenêtres et nombres de cycles via
#       une nomenclature canonique
#     - tire des horaires pseudo-aléatoires distincts
#     - fige les résultats dans les input_text cibles
#
# ----------------------------------------------------------
# 🧭 REGLE CANONIQUE
#
#   - periode = matin : ne retenir que les horaires
#     strictement avant le lever du soleil
#
#   - periode = soir : ne retenir que les horaires
#     strictement après le coucher du soleil
#
#   Cette règle est universelle pour toutes les zones.
#
# ----------------------------------------------------------
# 📤 SORTIES
#
#   - input_text.horaires_simulation_presence_matin_chambre_parents
#   - input_text.horaires_simulation_presence_soir_chambre_parents
#   - input_text.horaires_simulation_presence_matin_garage
#   - input_text.horaires_simulation_presence_soir_garage
#   - input_text.horaires_simulation_presence_matin_entree
#   - input_text.horaires_simulation_presence_soir_entree
#
# ----------------------------------------------------------
# ⚠️ GARANTIES / LIMITES
#
#   - aucun allumage / extinction
#   - aucune decision temps reel
#   - non déterminisme volontaire
#   - déduplication sur l’horaire formaté HH:MM
#   - borne haute garantie par break
#   - résultat partiel possible si la fenêtre est trop étroite
#     au regard du nombre de cycles demandé
#
# ----------------------------------------------------------
# 📍 ENTITE
#   script.generer_horaires_simulation_presence
# ==========================================================

generer_horaires_simulation_presence:
  alias: "Éclairage - Simulation présence - Génération horaires"
  mode: single

  sequence:
    - variables:
        fmt: "%H:%M"
        today: "{{ now().date() }}"
        now_ts: "{{ as_timestamp(now()) }}"
        next_rising: "{{ as_timestamp(as_local(as_datetime(state_attr('sun.sun','next_rising')))) }}"
        last_rising: >
          {% set v = state_attr('sun.sun','last_rising') %}
          {{ as_timestamp(as_local(as_datetime(v))) if v is not none else none }}
        lever: >
          {% if last_rising is not none %}
            {{ next_rising if now_ts < next_rising else last_rising }}
          {% else %}
            {{ next_rising }}
          {% endif %}
        next_setting: "{{ as_timestamp(as_local(as_datetime(state_attr('sun.sun','next_setting')))) }}"
        last_setting: >
          {% set v = state_attr('sun.sun','last_setting') %}
          {{ as_timestamp(as_local(as_datetime(v))) if v is not none else none }}
        coucher: >
          {% if last_setting is not none %}
            {{ next_setting if now_ts < next_setting else last_setting }}
          {% else %}
            {{ next_setting }}
          {% endif %}

    - repeat:
        for_each:
          - periode: matin
            zone: chambre_parents
          - periode: matin
            zone: garage
          - periode: matin
            zone: entree
          - periode: soir
            zone: chambre_parents
          - periode: soir
            zone: garage
          - periode: soir
            zone: entree

        sequence:
          - variables:
              periode: "{{ repeat.item.periode }}"
              zone: "{{ repeat.item.zone }}"
              debut_entity_id: "{{ 'input_datetime.debut_cycle_simulation_presence_' ~ repeat.item.periode ~ '_' ~ repeat.item.zone }}"
              fin_entity_id: "{{ 'input_datetime.fin_cycle_simulation_presence_' ~ repeat.item.periode ~ '_' ~ repeat.item.zone }}"
              nb_entity_id: "{{ 'input_number.nb_cycles_simulation_presence_' ~ repeat.item.periode ~ '_' ~ repeat.item.zone }}"
              output_entity_id: "{{ 'input_text.horaires_simulation_presence_' ~ repeat.item.periode ~ '_' ~ repeat.item.zone }}"

          - action: input_text.set_value
            data:
              entity_id: "{{ output_entity_id }}"
              value: >
                {% set debut_raw = states(debut_entity_id) %}
                {% set fin_raw = states(fin_entity_id) %}
                {% set nb = states(nb_entity_id) | int(0) %}

                {% if debut_raw not in ['unknown','unavailable','None','none',''] and
                      fin_raw not in ['unknown','unavailable','None','none',''] %}

                  {% set d_parts = debut_raw.split(':') %}
                  {% set f_parts = fin_raw.split(':') %}

                  {% set debut = as_timestamp(today|string ~ ' ' ~ d_parts[0] ~ ':' ~ d_parts[1] ~ ':' ~ d_parts[2]) | int %}
                  {% set fin = as_timestamp(today|string ~ ' ' ~ f_parts[0] ~ ':' ~ f_parts[1] ~ ':' ~ f_parts[2]) | int %}
                  {% set plage = (fin - debut) | int %}
                  {% set ns = namespace(result=[]) %}

                  {% if plage > 0 and nb > 0 %}
                    {% for i in range(nb * 5) %}
                      {% set t = debut + (range(0, plage) | random) %}

                      {% set solaire_ok = false %}

                      {% if periode == 'matin' %}
                        {% set solaire_ok = (t >= debut and t < fin and t < lever) %}
                      {% elif periode == 'soir' %}
                        {% set solaire_ok = (t >= debut and t < fin and t > coucher) %}
                      {% endif %}

                      {% if solaire_ok %}
                        {% set h = t | timestamp_custom(fmt, true) %}
                        {% if h not in ns.result %}
                          {% set ns.result = ns.result + [h] %}
                          {% if ns.result | length == nb %}
                            {% break %}
                          {% endif %}
                        {% endif %}
                      {% endif %}
                    {% endfor %}
                  {% endif %}

                  {% if ns.result | length > 0 %}
                    {{ ns.result | sort | join(', ') }}
                  {% else %}
                    Aucun
                  {% endif %}

                {% else %}
                  Aucun
                {% endif %}