# ==========================================================
# 🧠 ARSENAL — SCRIPT : ECS – Cycle thermique unifie
# ----------------------------------------------------------
# 🎯 ROLE FONDAMENTAL
#   Orchestrateur UNIQUE d’un cycle ECS complet.
#
#   Ce script est l’autorite d’execution du cycle thermique
#   ECS, de l’armement a la liberation du verrou.
#
#   Il ne planifie pas.
#   Il n’anticipe pas.
#   Il execute un cycle demande.
#
# ----------------------------------------------------------
# 🧱 RESPONSABILITES COUVERTES
#
#   - Verrouillage exclusif du cycle ECS
#   - Calcul et application d’une consigne EFFECTIVE
#   - Delegation des ecritures ECS au script
#       script.ecs_appliquer_consigne_bridge
#   - Verification du resultat via capteur ACK
#   - Surveillance de l’atteinte thermique reelle
#   - Gestion des timeouts et boosts de securite
#   - Rabaissement garanti de la consigne en fin de cycle
#   - Liberation controlee du verrou
#
# ----------------------------------------------------------
# 🧠 MODES SUPPORTES
#
#   Le comportement thermique est ajuste selon le mode :
#
#     - ponctuel       → confort immediat
#     - vaisselle      → cycle court optimise
#     - desinfection   → montee haute securisee
#
#   Le choix du mode est un PARAMETRE d’entree,
#   jamais une decision interne.
#
# ----------------------------------------------------------
# 🔁 GARANTIES D’EXECUTION
#
#   - Un seul cycle ECS a la fois
#   - Anti-rebond par verrou + watchdog
#   - Aucun faux succes declare
#   - Aucun succes suppose
#   - Verification systematique via ACK
#   - Decisions basees uniquement sur mesures reelles
#
# ----------------------------------------------------------
# ❌ CE SCRIPT NE FAIT PAS
#
#   - Aucune publication MQTT directe
#   - Aucune gestion du protocole transactionnel boiler
#   - Aucun declenchement horaire
#   - Aucun arbitrage planning / presence
#   - Aucune decision metier ECS globale
#   - Aucune logique de bouclage sanitaire
#
# ----------------------------------------------------------
# 🧾 OBSERVABILITE
#
#   - Cible thermique de session memorisee
#   - Resultat ACK lisible via capteur dedie
#   - Timers visibles et tracables
#
# ----------------------------------------------------------
# 🔗 DEPENDANCES CLES
#
#   - script.ecs_appliquer_consigne_bridge
#   - input_boolean.ecs_cycle_en_cours
#   - timer.ecs_cycle_watchdog
#   - timer.ecs_gardien_post_prelevement
#   - input_text.ecs_target_temp_session
#   - sensor.ecs_temperature_ballon_securisee
#   - sensor.boiler_ack_dhw_set_setpoint_status
#
# ----------------------------------------------------------
# ✅ Compatibilite : Home Assistant 2024.8+
# ==========================================================

chauffage_ecs_cycle:
  alias: "Chauffage ECS - Cycle unifié"
  description: >
    Cycle ECS fiable : chauffe jusqu'à consigne effective,
    rabaissement confirme a 10 °C via boiler bridge,
    verrouillage via boolean, protection anti-rebond,
    verification par ACK correle et mesure reelle.
  mode: single
  max_exceeded: silent

  fields:
    mode:
      name: Mode
      description: "Type de cycle : 'ponctuel', 'vaisselle' ou 'desinfection'"
      required: true

  sequence:

    # ======================================================
    # 🟢 ETAPE -1 : Marquage pipeline ECS en cours
    # ======================================================
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.ecs_pipeline_en_cours

    # ======================================================
    # 🧩 ETAPE 0 : Vérification de cycle en cours
    # ======================================================
    - choose:
        - conditions:
            - condition: state
              entity_id: input_boolean.ecs_cycle_en_cours
              state: "on"
          sequence:
            - variables:
                last_change: "{{ as_timestamp(states.input_boolean.ecs_cycle_en_cours.last_changed) | default(0) }}"
                age_min: "{{ ((now().timestamp() - last_change) / 60) | round(1) }}"

            - choose:
                - conditions:
                    - condition: template
                      value_template: "{{ age_min > 5 }}"
                  sequence:
                    - action: persistent_notification.create
                      data:
                        title: "⚠️ Déblocage ECS forcé"
                        message: >
                          {{ now().strftime('%d/%m %H:%M') }} — verrou ECS actif depuis {{ age_min }} min → reset automatique.

                    - action: timer.cancel
                      target:
                        entity_id: timer.ecs_cycle_watchdog

                    - action: input_text.set_value
                      target:
                        entity_id: input_text.ecs_target_temp_session
                      data:
                        value: ""

                    - action: input_text.set_value
                      target:
                        entity_id: input_text.boiler_req_dhw_set_setpoint
                      data:
                        value: ""

                    - action: input_boolean.turn_off
                      target:
                        entity_id: input_boolean.ecs_cycle_en_cours

                - conditions:
                    - condition: template
                      value_template: "{{ age_min <= 5 }}"
                  sequence:
                    - action: logbook.log
                      data:
                        name: "ECS"
                        message: "Cycle ECS déjà en cours (moins de 5 min) → arrêt du script"
                    - action: input_boolean.turn_off
                      target:
                        entity_id: input_boolean.ecs_pipeline_en_cours
                    - stop: "Cycle ECS déjà en cours"

    # ======================================================
    # 🟢 ETAPE 1 : Activation du verrou et démarrage watchdog
    # ======================================================
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.ecs_cycle_en_cours

    - action: timer.start
      target:
        entity_id: timer.ecs_cycle_watchdog

    # ======================================================
    # 📊 ETAPE 2 : Définition des variables dynamiques
    # ======================================================
    - variables:
        target_temp: >
          {% if mode == 'desinfection' %}
            {{ states('input_number.ecs_temperature_desinfection') | float }}
          {% elif mode == 'vaisselle' %}
            {{ states('input_number.ecs_consigne_vaisselle') | float }}
          {% else %}
            {{ states('input_number.ecs_consigne_temperature') | float }}
          {% endif %}

        retour_temp: 10
        sensor_temp: sensor.ecs_temperature_ballon_securisee

        start_temp: >
          {% set v = states('sensor.ecs_temperature_ballon_securisee') %}
          {% if v not in ['unknown', 'unavailable', '', none] and (v | float(0)) > 0 %}
            {{ v | float(0) }}
          {% else %}
            0
          {% endif %}

        delta_t: "{{ (target_temp | float) - (start_temp | float) }}"

        off_tiny: "{{ states('input_number.ecs_off_tiny') | float(2.2) }}"
        off_medium: "{{ states('input_number.ecs_off_medium') | float(2.6) }}"
        off_normal: "{{ states('input_number.ecs_off_normal') | float(3.2) }}"
        off_desinf: "{{ states('input_number.ecs_off_desinfection') | float(1.0) }}"

        eps_ponctuel: "{{ states('input_number.ecs_eps_ponctuel') | float(1.6) }}"
        eps_desinf: "{{ states('input_number.ecs_eps_desinfection') | float(0.7) }}"
        trig_ceiling_tm: "{{ states('input_number.ecs_trigger_ceiling_tiny_medium') | float(1.1) }}"

        raw_effective_target: >
          {% set dt = delta_t | float %}
          {% if mode == 'desinfection' %}
            {{ (target_temp | float) - (off_desinf | float) }}
          {% else %}
            {% if dt < 2.5 %}
              {{ (target_temp | float) - (off_tiny | float) }}
            {% elif dt < 7.0 %}
              {{ (target_temp | float) - (off_medium | float) }}
            {% else %}
              {{ (target_temp | float) - (off_normal | float) }}
            {% endif %}
          {% endif %}

        min_target: "{{ (start_temp | float) + (trig_ceiling_tm | float) }}"

        effective_target: >
          {% set candidate = raw_effective_target | float %}
          {% set floor = min_target | float %}
          {{ candidate if candidate > floor else floor }}

        effective_target_int: "{{ (effective_target | float) | round(0, 'floor') | int }}"
        epsilon: "{{ eps_desinf if mode == 'desinfection' else eps_ponctuel }}"

    # ======================================================
    # 🚫 ETAPE 3 : Validation d’entrée
    # ======================================================
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ mode not in ['ponctuel', 'vaisselle', 'desinfection'] }}"
          sequence:
            - action: timer.cancel
              target:
                entity_id: timer.ecs_cycle_watchdog
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.ecs_cycle_en_cours
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.ecs_pipeline_en_cours
            - stop: >
                Mode ECS invalide (mode={{ mode }})

        - conditions:
            - condition: template
              value_template: >
                {{
                  not is_number(target_temp)
                  or not is_number(start_temp)
                  or (target_temp | float) <= 0
                  or (start_temp | float) < 0
                  or (effective_target_int | int) < 15
                }}
          sequence:
            - action: timer.cancel
              target:
                entity_id: timer.ecs_cycle_watchdog
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.ecs_cycle_en_cours
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.ecs_pipeline_en_cours
            - stop: >
                Consigne ECS cible invalide
                (mode={{ mode }}, target={{ target_temp }}, start={{ start_temp }}, effective={{ effective_target_int }})

    # ======================================================
    # 💾 ETAPE 4 : Sauvegarde de la cible de session
    # ======================================================
    - action: input_text.set_value
      target:
        entity_id: input_text.ecs_target_temp_session
      data:
        value: "{{ effective_target_int }}"

    # ======================================================
    # 📤 ETAPE 5 : Application consigne ECS haute
    # ======================================================
    - action: script.ecs_appliquer_consigne_bridge
      data:
        target_temp: "{{ effective_target_int }}"

    - choose:
        - conditions:
            - condition: template
              value_template: "{{ states('sensor.boiler_ack_dhw_set_setpoint_status') != 'applied' }}"
          sequence:
            - action: input_text.set_value
              target:
                entity_id: input_text.ecs_target_temp_session
              data:
                value: ""

            - action: input_text.set_value
              target:
                entity_id: input_text.boiler_req_dhw_set_setpoint
              data:
                value: ""

            - action: timer.cancel
              target:
                entity_id: timer.ecs_cycle_watchdog

            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.ecs_cycle_en_cours

            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.ecs_pipeline_en_cours

            - stop: >
                Echec application consigne ECS haute
                (ack_result={{ states('sensor.boiler_ack_dhw_set_setpoint_result') }},
                ack_status={{ states('sensor.boiler_ack_dhw_set_setpoint_status') }},
                ack_reason={{ states('sensor.boiler_ack_dhw_set_setpoint_reason') }},
                target={{ effective_target_int }})

    # ======================================================
    # ♻️ ETAPE 6 : Attente d’atteinte thermique réelle
    # ======================================================
    - wait_template: >
        {{ states(sensor_temp) | float(0) >= (target_temp | float) - (epsilon | float) }}
      timeout: >
        {% if mode == 'desinfection' %}
          00:40:00
        {% else %}
          00:20:00
        {% endif %}
      continue_on_timeout: true

    # ======================================================
    # 🚑 ETAPE 7 : Boost de sécurité si cible non atteinte
    # ======================================================
    - choose:
        - conditions:
            - condition: template
              value_template: >
                {{ states(sensor_temp) | float(0) < (target_temp | float) - (epsilon | float) }}
          sequence:
            - variables:
                boost2: "{{ [ (effective_target_int | int) + 1, 60 ] | min }}"

            - action: script.ecs_appliquer_consigne_bridge
              data:
                target_temp: "{{ boost2 }}"

            - choose:
                - conditions:
                    - condition: template
                      value_template: "{{ states('sensor.boiler_ack_dhw_set_setpoint_status') != 'applied' }}"
                  sequence:
                    - action: logbook.log
                      data:
                        name: "ECS"
                        message: >
                          Boost ECS non confirmé par ACK
                          (status={{ states('sensor.boiler_ack_dhw_set_setpoint_status') }},
                          reason={{ states('sensor.boiler_ack_dhw_set_setpoint_reason') }},
                          boost={{ boost2 }})

            - wait_template: >
                {{ states(sensor_temp) | float(0) >= (target_temp | float) - (epsilon | float) }}
              timeout: >
                {% if mode == 'desinfection' %}
                  00:20:00
                {% else %}
                  00:10:00
                {% endif %}
              continue_on_timeout: true

    # ======================================================
    # 🔽 ETAPE 8 : Application consigne ECS basse
    # ======================================================
    - action: script.ecs_appliquer_consigne_bridge
      data:
        target_temp: "{{ retour_temp }}"

    # ======================================================
    # ✅ ETAPE 8B : Verification retour consigne ECS basse
    # ======================================================
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ states('sensor.boiler_ack_dhw_set_setpoint_status') != 'applied' }}"
          sequence:
            - action: input_text.set_value
              target:
                entity_id: input_text.ecs_target_temp_session
              data:
                value: ""

            - action: input_text.set_value
              target:
                entity_id: input_text.boiler_req_dhw_set_setpoint
              data:
                value: ""

            - action: timer.cancel
              target:
                entity_id: timer.ecs_cycle_watchdog

            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.ecs_cycle_en_cours

            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.ecs_pipeline_en_cours

            - stop: >
                Echec application consigne ECS basse
                (ack={{ states('sensor.boiler_ack_dhw_set_setpoint_status') }})

    - wait_template: >
        {{
          is_number(states('sensor.boiler_dhw_setpoint'))
          and (states('sensor.boiler_dhw_setpoint') | float) == (retour_temp | float)
        }}
      timeout: "00:01:30"
      continue_on_timeout: true

    - choose:
        - conditions:
            - condition: template
              value_template: >
                {{
                  not is_number(states('sensor.boiler_dhw_setpoint'))
                  or (states('sensor.boiler_dhw_setpoint') | float) != (retour_temp | float)
                }}
          sequence:
            - action: logbook.log
              data:
                name: "ECS"
                message: >
                  Retour consigne ECS basse non observé
                  (attendu={{ retour_temp }}, lu={{ states('sensor.boiler_dhw_setpoint') }})

            - stop: >
                Retour consigne ECS basse non observé

    # ======================================================
    # ⏱️ ETAPE 9 : Démarrage gardien post-prélèvement
    # ======================================================
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ mode == 'ponctuel' }}"
          sequence:
            - action: timer.start
              target:
                entity_id: timer.ecs_gardien_post_prelevement
              data:
                duration: "00:25:00"

        - conditions:
            - condition: template
              value_template: "{{ mode == 'desinfection' }}"
          sequence:
            - action: timer.start
              target:
                entity_id: timer.ecs_gardien_post_prelevement
              data:
                duration: "00:45:00"

        - conditions:
            - condition: template
              value_template: "{{ mode == 'vaisselle' }}"
          sequence:
            - action: timer.start
              target:
                entity_id: timer.ecs_gardien_post_prelevement
              data:
                duration: "00:12:00"

    # ======================================================
    # 🧹 ETAPE 10 : Nettoyage et libération transactionnelle
    # ======================================================
    - action: input_text.set_value
      target:
        entity_id: input_text.ecs_target_temp_session
      data:
        value: ""

    - action: input_text.set_value
      target:
        entity_id: input_text.boiler_req_dhw_set_setpoint
      data:
        value: ""

    - action: timer.cancel
      target:
        entity_id: timer.ecs_cycle_watchdog

    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.ecs_cycle_en_cours

    #-------------------------------------------------------
    # 🔴 Sortie pipeline ECS
    # ------------------------------------------------------
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.ecs_pipeline_en_cours