# ==========================================================
# 🧠 ARSENAL — SCRIPT : ECS – Cycle thermique unifié
# ----------------------------------------------------------
# 🎯 RÔLE FONDAMENTAL
#   Orchestrateur UNIQUE d'un cycle ECS complet.
#
#   Ce script est l'autorité d'exécution du cycle thermique
#   ECS, de l'armement à la libération du verrou.
#
#   Il ne planifie pas.
#   Il n'anticipe pas.
#   Il exécute un cycle demandé.
#
# ----------------------------------------------------------
# 🧱 RESPONSABILITÉS COUVERTES
#
#   - Séquencement du cycle ECS de bout en bout
#   - Calcul de la consigne effective et de l'epsilon
#   - Validation des entrées métier
#   - Mémorisation de la cible de session
#   - Délégation de l'ouverture de session
#       script.ecs_cycle_session_open
#   - Délégation des applications de consigne confirmées
#       script.ecs_appliquer_consigne_confirmee
#   - Surveillance de l'atteinte thermique réelle
#   - Délégation du boost de sécurité si non-atteinte
#       script.ecs_cycle_boost_si_necessaire
#   - Délégation de l'armement du gardien
#       script.ecs_armer_gardien_post_prelevement
#   - Délégation de la fermeture de session
#       script.ecs_cycle_session_close
#
# ----------------------------------------------------------
# 🧠 MODES SUPPORTÉS
#
#   Le comportement thermique est ajusté selon le mode :
#
#     - ponctuel       → confort immédiat
#     - vaisselle      → cycle court optimisé
#     - desinfection   → montée haute sécurisée
#
#   Le choix du mode est un PARAMÈTRE d'entrée,
#   jamais une décision interne.
#
# ----------------------------------------------------------
# 🔁 GARANTIES D'EXÉCUTION
#
#   - Un seul cycle ECS à la fois
#   - Anti-rebond par verrou + watchdog
#   - Aucun faux succès déclaré
#   - Aucun succès supposé
#   - Vérification systématique via ACK corrélé
#   - Décisions basées uniquement sur mesures réelles
#
# ----------------------------------------------------------
# ❌ CE SCRIPT NE FAIT PAS
#
#   - Aucune publication MQTT directe
#   - Aucune gestion du protocole transactionnel boiler
#   - Aucune gestion du verrou ou du watchdog (délégué)
#   - Aucun déclenchement horaire
#   - Aucun arbitrage planning / présence
#   - Aucune décision métier ECS globale
#   - Aucune logique de bouclage sanitaire
#
# ----------------------------------------------------------
# 🧾 OBSERVABILITÉ
#
#   - Cible thermique de session mémorisée
#       input_text.ecs_target_temp_session
#   - Statut du dernier appel confirmé
#       input_text.ecs_cycle_last_action_status
#   - Timers visibles et traçables
#
# ----------------------------------------------------------
# 🔗 DÉPENDANCES CLÉS
#
#   Scripts délégués :
#   - script.ecs_cycle_session_open
#   - script.ecs_appliquer_consigne_confirmee
#   - script.ecs_cycle_boost_si_necessaire
#   - script.ecs_armer_gardien_post_prelevement
#   - script.ecs_cycle_session_close
#
#   Bridge (via ecs_appliquer_consigne_confirmee) :
#   - script.ecs_appliquer_consigne_bridge        [indirect]
#
#   Helpers lus :
#   - input_text.ecs_cycle_last_action_status
#   - input_text.ecs_target_temp_session
#   - sensor.ecs_temperature_ballon_securisee
#   - sensor.boiler_dhw_setpoint
#
# ----------------------------------------------------------
# ✅ Compatibilité : Home Assistant 2024.8+
# ==========================================================

chauffage_ecs_cycle:
  alias: "ECS - Cycle unifié"
  description: >
    Cycle ECS fiable : chauffe jusqu'à consigne effective,
    rabaissement confirme a 10 °C via boiler bridge,
    verrouillage via boolean, protection anti-rebond,
    verification par ACK correle et mesure reelle.
  mode: single
  max_exceeded: silent

  fields:
    mode:
      name: Mode
      description: "Type de cycle : 'ponctuel', 'vaisselle' ou 'desinfection'"
      required: true

  sequence:

    # ======================================================
    # 🟢 ETAPE 1 : Ouverture session ECS (externalisee)
    # ======================================================
    - action: script.ecs_cycle_session_open

    # ======================================================
    # 🛑 GARDE : poursuivre uniquement si la session est ouverte
    # Si le sous-script a refuse l'ouverture, la sequence
    # s'arrete ici sans executer le reste du cycle.
    # ======================================================
    - condition: state
      entity_id: input_boolean.ecs_cycle_en_cours
      state: "on"

    # ======================================================
    # 📊 ETAPE 2 : Définition des variables dynamiques
    # ======================================================
    - variables:
        target_temp: >
          {% if mode == 'desinfection' %}
            {{ states('input_number.ecs_temperature_desinfection') | float }}
          {% elif mode == 'vaisselle' %}
            {{ states('input_number.ecs_consigne_vaisselle') | float }}
          {% else %}
            {{ states('input_number.ecs_consigne_temperature') | float }}
          {% endif %}

        retour_temp: 10
        sensor_temp: sensor.ecs_temperature_ballon_securisee

        start_temp: >
          {% set v = states('sensor.ecs_temperature_ballon_securisee') %}
          {% if v not in ['unknown', 'unavailable', '', none] and (v | float(0)) > 0 %}
            {{ v | float(0) }}
          {% else %}
            0
          {% endif %}

        delta_t: "{{ (target_temp | float) - (start_temp | float) }}"

        off_tiny: "{{ states('input_number.ecs_off_tiny') | float(2.2) }}"
        off_medium: "{{ states('input_number.ecs_off_medium') | float(2.6) }}"
        off_normal: "{{ states('input_number.ecs_off_normal') | float(3.2) }}"
        off_desinf: "{{ states('input_number.ecs_off_desinfection') | float(1.0) }}"

        eps_ponctuel: "{{ states('input_number.ecs_eps_ponctuel') | float(1.6) }}"
        eps_desinf: "{{ states('input_number.ecs_eps_desinfection') | float(0.7) }}"
        trig_ceiling_tm: "{{ states('input_number.ecs_trigger_ceiling_tiny_medium') | float(1.1) }}"

        raw_effective_target: >
          {% set dt = delta_t | float %}
          {% if mode == 'desinfection' %}
            {{ (target_temp | float) - (off_desinf | float) }}
          {% else %}
            {% if dt < 2.5 %}
              {{ (target_temp | float) - (off_tiny | float) }}
            {% elif dt < 7.0 %}
              {{ (target_temp | float) - (off_medium | float) }}
            {% else %}
              {{ (target_temp | float) - (off_normal | float) }}
            {% endif %}
          {% endif %}

        min_target: "{{ (start_temp | float) + (trig_ceiling_tm | float) }}"

        effective_target: >
          {% set candidate = raw_effective_target | float %}
          {% set floor = min_target | float %}
          {{ candidate if candidate > floor else floor }}

        effective_target_int: "{{ (effective_target | float) | round(0, 'floor') | int }}"
        epsilon: "{{ eps_desinf if mode == 'desinfection' else eps_ponctuel }}"

    # ======================================================
    # 🚫 ETAPE 3 : Validation d’entrée
    # ======================================================
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ mode not in ['ponctuel', 'vaisselle', 'desinfection'] }}"
          sequence:
            - action: script.ecs_cycle_session_close
            - stop: "Mode ECS invalide (mode={{ mode }})"

        - conditions:
            - condition: template
              value_template: >
                {{
                  not is_number(target_temp)
                  or not is_number(start_temp)
                  or (target_temp | float) <= 0
                  or (start_temp | float) < 0
                  or not is_number(effective_target_int)
                  or (effective_target_int | float) < 15
                }}
          sequence:
            - action: script.ecs_cycle_session_close
            - stop: >
                Consigne ECS cible invalide
                (mode={{ mode }}, target={{ target_temp }}, start={{ start_temp }}, effective={{ effective_target_int }})

    # ======================================================
    # 💾 ETAPE 4 : Sauvegarde de la cible de session
    # ======================================================
    - action: input_text.set_value
      target:
        entity_id: input_text.ecs_target_temp_session
      data:
        value: "{{ effective_target_int }}"

    # ======================================================
    # 📤 ETAPE 5 : Application consigne ECS haute
    # ======================================================
    - action: script.ecs_appliquer_consigne_confirmee
      data:
        target_temp: "{{ effective_target_int }}"
        contexte: "consigne_haute"

    - choose:
        - conditions:
            - condition: template
              value_template: >
                {{ states('input_text.ecs_cycle_last_action_status') != 'applied' }}
          sequence:
            - action: script.ecs_cycle_session_close
            - stop: >
                Echec application consigne ECS haute
                (status={{ states('input_text.ecs_cycle_last_action_status') }},
                target={{ effective_target_int }})

    # ======================================================
    # 🚀 ETAPE 5B : Qualification du démarrage thermique ECS
    # ------------------------------------------------------
    # Objectif :
    #   Remplacer le boost prématuré sur simple delta 90 s
    #   par une lecture physique plus robuste de la chauffe.
    #
    # Principe :
    #   - Attendre que `sensor.ecs_signature_thermique_chauffe`
    #     sorte de l’état `indeterminee`
    #   - Ne jamais booster sur signature `indeterminee`
    #   - Autoriser boost 1 uniquement si :
    #       * signature = insuffisante
    #       * distance résiduelle à la cible >= 1.0 °C
    #
    # Note :
    #   - La signature est une couche d’observation
    #   - L’orchestrateur reste seul décideur du boost
    #   - Un second boost reste possible à l’étape 7
    # ======================================================
    - wait_template: >
        {{ states('sensor.ecs_signature_thermique_chauffe') != 'indeterminee' }}
      timeout: "00:04:30"
      continue_on_timeout: true

    - choose:
        - conditions:
            - condition: template
              value_template: >
                {{
                  states('sensor.ecs_signature_thermique_chauffe') == 'insuffisante'
                  and (
                    (target_temp | float(0))
                    - (states(sensor_temp) | float(0))
                  ) >= 1.0
                }}
          sequence:
            - action: script.ecs_cycle_boost_si_necessaire
              data:
                mode: "{{ mode }}"
                sensor_temp: "{{ sensor_temp }}"
                target_temp: "{{ target_temp }}"
                epsilon: "{{ epsilon }}"
                effective_target_int: "{{ effective_target_int }}"

    # ======================================================
    # ♻️ ETAPE 6 : Attente d’atteinte thermique réelle
    # ======================================================
    - wait_template: >
        {{ states(sensor_temp) | float(0) >= (target_temp | float) - (epsilon | float) }}
      timeout: >
        {% if mode == 'desinfection' %}
          00:40:00
        {% else %}
          00:20:00
        {% endif %}
      continue_on_timeout: true

    # ======================================================
    # 🚑 ETAPE 7 : Boost de sécurité si cible non atteinte
    # L'orchestrateur établit l'éligibilité.
    # Le sous-script boost exécute sans re-juger l'appel.
    # ======================================================
    - choose:
        - conditions:
            - condition: template
              value_template: >
                {{ states(sensor_temp) | float(0) < (target_temp | float) - (epsilon | float) }}
          sequence:
            - action: script.ecs_cycle_boost_si_necessaire
              data:
                mode: "{{ mode }}"
                sensor_temp: "{{ sensor_temp }}"
                target_temp: "{{ target_temp }}"
                epsilon: "{{ epsilon }}"
                effective_target_int: "{{ effective_target_int }}"

    # ======================================================
    # 🔽 ETAPE 8 : Application consigne ECS basse
    # ======================================================
    - action: script.ecs_appliquer_consigne_confirmee
      data:
        target_temp: "{{ retour_temp }}"
        contexte: "retour_basse"

    # ======================================================
    # ✅ ETAPE 8B : Verification retour consigne ECS basse
    # ======================================================
    - choose:
        - conditions:
            - condition: template
              value_template: >
                {{ states('input_text.ecs_cycle_last_action_status') != 'applied' }}
          sequence:
            - action: script.ecs_cycle_session_close
            - stop: >
                Echec application consigne ECS basse
                (status={{ states('input_text.ecs_cycle_last_action_status') }})

    - wait_template: >
        {{
          is_number(states('sensor.boiler_dhw_setpoint'))
          and (states('sensor.boiler_dhw_setpoint') | float) == (retour_temp | float)
        }}
      timeout: "00:01:30"
      continue_on_timeout: true

    - choose:
        - conditions:
            - condition: template
              value_template: >
                {{
                  not is_number(states('sensor.boiler_dhw_setpoint'))
                  or (states('sensor.boiler_dhw_setpoint') | float) != (retour_temp | float)
                }}
          sequence:
            - action: logbook.log
              data:
                name: "ECS"
                message: >
                  Retour consigne ECS basse non observé
                  (attendu={{ retour_temp }}, lu={{ states('sensor.boiler_dhw_setpoint') }})

            - action: script.ecs_cycle_session_close
            - stop: "Retour consigne ECS basse non observé"

    # ======================================================
    # ⏱️ ETAPE 9 : Armement gardien post-prélèvement
    # ======================================================
    - action: script.ecs_armer_gardien_post_prelevement
      data:
        mode: "{{ mode }}"

    # ======================================================
    # 🧹 ETAPE 10 : Nettoyage et libération transactionnelle
    # ======================================================
    - action: script.ecs_cycle_session_close