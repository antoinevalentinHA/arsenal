# ==========================================================
# 🧠 ARSENAL — SCRIPT : ECS – Cycle thermique unifié
# ----------------------------------------------------------
# 🎯 RÔLE FONDAMENTAL
#   Orchestrateur UNIQUE d’un cycle ECS complet.
#
#   Ce script est l’autorité d’exécution du cycle thermique
#   ECS, de l’armement à la libération du verrou.
#
#   Il ne planifie pas.
#   Il n’anticipe pas.
#   Il exécute un cycle demandé.
#
# ----------------------------------------------------------
# 🧱 RESPONSABILITÉS COUVERTES
#
#   - Verrouillage exclusif du cycle ECS
#   - Calcul et application d’une consigne EFFECTIVE
#   - Publication transactionnelle via boiler bridge
#   - Attente d’ACK corrélé pour chaque écriture ECS
#   - Surveillance de l’atteinte thermique
#   - Gestion des timeouts et boosts de sécurité
#   - Rabaissement garanti de la consigne en fin de cycle
#   - Libération contrôlée du verrou
#
# ----------------------------------------------------------
# 🧠 MODES SUPPORTÉS
#
#   Le comportement thermique est ajusté selon le mode :
#
#     - ponctuel       → confort immédiat
#     - vaisselle      → cycle court optimisé
#     - desinfection   → montée haute sécurisée
#
#   Le choix du mode est un PARAMÈTRE d’entrée,
#   jamais une décision interne.
#
# ----------------------------------------------------------
# 🔁 GARANTIES D’EXÉCUTION
#
#   - Un seul cycle ECS à la fois
#   - Anti-rebond par verrou + watchdog
#   - Aucun faux succès déclaré
#   - Aucun succès supposé
#   - Décisions basées uniquement sur mesures réelles
#
# ----------------------------------------------------------
# ❌ CE SCRIPT NE FAIT PAS
#
#   - Aucun déclenchement horaire
#   - Aucun arbitrage planning / présence
#   - Aucune décision métier ECS globale
#   - Aucune logique de bouclage sanitaire
#
# ----------------------------------------------------------
# 🧾 OBSERVABILITÉ
#
#   - Cible thermique de session mémorisée
#   - Request_id transactionnel ancré
#   - Timers visibles et traçables
#
# ----------------------------------------------------------
# 🔗 DÉPENDANCES CLÉS
#
#   - input_boolean.ecs_cycle_en_cours
#   - timer.ecs_cycle_watchdog
#   - timer.ecs_gardien_post_prelevement
#   - input_text.ecs_target_temp_session
#   - input_text.boiler_req_dhw_set_setpoint
#   - sensor.ecs_temperature_ballon_securisee
#   - sensor.boiler_ack_dhw_set_setpoint_result
#
# ----------------------------------------------------------
# ✅ Compatibilité : Home Assistant 2024.8+
# ==========================================================

chauffage_ecs_cycle:
  alias: "Chauffage ECS - Cycle unifié"
  description: >
    Cycle ECS fiable : chauffe jusqu'à consigne effective,
    rabaissement confirme a 10 °C via boiler bridge,
    verrouillage via boolean, protection anti-rebond,
    verification par ACK correle et mesure reelle.
  mode: single
  max_exceeded: silent

  fields:
    mode:
      name: Mode
      description: "Type de cycle : 'ponctuel', 'vaisselle' ou 'desinfection'"
      required: true

  sequence:
    # ======================================================
    # 🧩 ETAPE 0 : Vérification de cycle en cours
    # ======================================================
    - choose:
        - conditions:
            - condition: state
              entity_id: input_boolean.ecs_cycle_en_cours
              state: "on"
          sequence:
            - variables:
                last_change: "{{ as_timestamp(states.input_boolean.ecs_cycle_en_cours.last_changed) | default(0) }}"
                age_min: "{{ ((now().timestamp() - last_change) / 60) | round(1) }}"

            - choose:
                - conditions:
                    - condition: template
                      value_template: "{{ age_min > 5 }}"
                  sequence:
                    - action: persistent_notification.create
                      data:
                        title: "⚠️ Déblocage ECS forcé"
                        message: >
                          {{ now().strftime('%d/%m %H:%M') }} — verrou ECS actif depuis {{ age_min }} min → reset automatique.
                    - action: input_boolean.turn_off
                      target:
                        entity_id: input_boolean.ecs_cycle_en_cours

                - conditions:
                    - condition: template
                      value_template: "{{ age_min <= 5 }}"
                  sequence:
                    - action: logbook.log
                      data:
                        name: "ECS"
                        message: "Cycle ECS déjà en cours (moins de 5 min) → arrêt du script"
                    - stop: "Cycle ECS déjà en cours"

    # ======================================================
    # 🟢 ETAPE 1 : Activation du verrou et démarrage watchdog
    # ======================================================
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.ecs_cycle_en_cours

    - action: timer.start
      target:
        entity_id: timer.ecs_cycle_watchdog

    # ======================================================
    # 📊 ETAPE 2 : Définition des variables dynamiques
    # ======================================================
    - variables:
        target_temp: >
          {% if mode == 'desinfection' %}
            {{ states('input_number.ecs_temperature_desinfection') | float }}
          {% elif mode == 'vaisselle' %}
            {{ states('input_number.ecs_consigne_vaisselle') | float }}
          {% else %}
            {{ states('input_number.ecs_consigne_temperature') | float }}
          {% endif %}
        retour_temp: 10
        sensor_temp: sensor.ecs_temperature_ballon_securisee
        start_temp: >
          {% set v = states(sensor_temp) %}
          {% if v not in ['unknown', 'unavailable', '', none] and (v | float(0)) > 0 %}
            {{ v | float(0) }}
          {% else %}
            0
          {% endif %}
        delta_t: "{{ (target_temp | float) - (start_temp | float) }}"
        tiny_delta: "{{ (delta_t | float) < 2.5 }}"
        medium_delta: "{{ (delta_t | float) >= 2.5 and (delta_t | float) < 7.0 }}"
        off_tiny: "{{ states('input_number.ecs_off_tiny') | float(2.2) }}"
        off_medium: "{{ states('input_number.ecs_off_medium') | float(2.6) }}"
        off_normal: "{{ states('input_number.ecs_off_normal') | float(3.2) }}"
        off_desinf: "{{ states('input_number.ecs_off_desinfection') | float(1.0) }}"
        eps_ponctuel: "{{ states('input_number.ecs_eps_ponctuel') | float(1.6) }}"
        eps_desinf: "{{ states('input_number.ecs_eps_desinfection') | float(0.7) }}"
        trig_ceiling_tm: "{{ states('input_number.ecs_trigger_ceiling_tiny_medium') | float(1.1) }}"
        raw_effective_target: >
          {% if mode == 'desinfection' %}
            {{ (target_temp | float) - (off_desinf | float) }}
          {% else %}
            {% if tiny_delta | bool %}
              {{ (target_temp | float) - (off_tiny | float) }}
            {% elif medium_delta | bool %}
              {{ (target_temp | float) - (off_medium | float) }}
            {% else %}
              {{ (target_temp | float) - (off_normal | float) }}
            {% endif %}
          {% endif %}
        min_target: "{{ (start_temp | float) + (trig_ceiling_tm | float) }}"
        effective_target: >
          {% set candidate = raw_effective_target | float %}
          {% set floor = min_target | float %}
          {{ candidate if candidate > floor else floor }}
        effective_target_int: "{{ (effective_target | float) | round(0, 'floor') | int }}"
        epsilon: "{{ eps_desinf if mode == 'desinfection' else eps_ponctuel }}"

    # ======================================================
    # 🚫 ETAPE 3 : Validation d’entrée
    # ======================================================
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ mode not in ['ponctuel', 'vaisselle', 'desinfection'] }}"
          sequence:
            - action: timer.cancel
              target:
                entity_id: timer.ecs_cycle_watchdog
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.ecs_cycle_en_cours
            - stop: "Mode ECS invalide"

        - conditions:
            - condition: template
              value_template: "{{ effective_target_int <= 0 }}"
          sequence:
            - action: timer.cancel
              target:
                entity_id: timer.ecs_cycle_watchdog
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.ecs_cycle_en_cours
            - stop: "Consigne ECS cible invalide"

    # ======================================================
    # 💾 ETAPE 4 : Sauvegarde de la cible de session
    # ======================================================
    - action: input_text.set_value
      target:
        entity_id: input_text.ecs_target_temp_session
      data:
        value: "{{ effective_target_int }}"

    # ======================================================
    # 🧾 ETAPE 5 : Préparation transaction montée de consigne
    # ======================================================
    - variables:
        boiler_request_id_up: >
          {% set h = '0123456789abcdef' %}
          {% set v = '89ab' %}
          {{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}-{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}-4{{ h|random }}{{ h|random }}{{ h|random }}-{{ v|random }}{{ h|random }}{{ h|random }}{{ h|random }}-{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}
        boiler_ts_up: >
          {{ as_timestamp(utcnow()) | timestamp_custom('%Y-%m-%dT%H:%M:%SZ', false) }}
        boiler_expires_at_up: >
          {{ (as_timestamp(utcnow()) + 30) | timestamp_custom('%Y-%m-%dT%H:%M:%SZ', false) }}

    - action: input_text.set_value
      target:
        entity_id: input_text.boiler_req_dhw_set_setpoint
      data:
        value: "{{ boiler_request_id_up }}"

    # ======================================================
    # 📤 ETAPE 6 : Envoi consigne ECS haute
    # ======================================================
    - action: mqtt.publish
      data:
        topic: "boiler/command/dhw/set_setpoint"
        qos: 1
        retain: false
        payload: >-
          {
            "request_id": "{{ boiler_request_id_up }}",
            "ts": "{{ boiler_ts_up }}",
            "expires_at": "{{ boiler_expires_at_up }}",
            "source": "arsenal",
            "value": {{ effective_target_int }}
          }

    # ======================================================
    # ⏳ ETAPE 7 : Attente ACK corrélé montée
    # ======================================================
    - wait_template: >
        {{ states('sensor.boiler_ack_dhw_set_setpoint_result') in ['applied', 'rejected', 'timeout'] }}
      timeout: "00:00:20"
      continue_on_timeout: true

    - choose:
        - conditions:
            - condition: template
              value_template: "{{ states('sensor.boiler_ack_dhw_set_setpoint_result') != 'applied' }}"
          sequence:
            - action: input_text.set_value
              target:
                entity_id: input_text.ecs_target_temp_session
              data:
                value: ""
            - action: input_text.set_value
              target:
                entity_id: input_text.boiler_req_dhw_set_setpoint
              data:
                value: ""
            - action: timer.cancel
              target:
                entity_id: timer.ecs_cycle_watchdog
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.ecs_cycle_en_cours
            - stop: "Echec application consigne ECS haute"

    # ======================================================
    # ♻️ ETAPE 8 : Attente d’atteinte thermique réelle
    # ======================================================
    - wait_template: >
        {{ states(sensor_temp) | float(0) >= (target_temp | float) - (epsilon | float) }}
      timeout: >
        {% if mode == 'desinfection' %}
          00:40:00
        {% else %}
          00:20:00
        {% endif %}
      continue_on_timeout: true

    # ======================================================
    # 🚑 ETAPE 9 : Boost de sécurité si cible non atteinte
    # ======================================================
    - choose:
        - conditions:
            - condition: template
              value_template: >
                {{ states(sensor_temp) | float(0) < (target_temp | float) - (epsilon | float) }}
          sequence:
            - variables:
                boost2: "{{ [ (effective_target | float) + 1.2, 60.0 ] | min | round(1) }}"
                boiler_request_id_boost: >
                  {% set h = '0123456789abcdef' %}
                  {% set v = '89ab' %}
                  {{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}-{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}-4{{ h|random }}{{ h|random }}{{ h|random }}-{{ v|random }}{{ h|random }}{{ h|random }}{{ h|random }}-{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}
                boiler_ts_boost: >
                  {{ as_timestamp(utcnow()) | timestamp_custom('%Y-%m-%dT%H:%M:%SZ', false) }}
                boiler_expires_at_boost: >
                  {{ (as_timestamp(utcnow()) + 30) | timestamp_custom('%Y-%m-%dT%H:%M:%SZ', false) }}

            - action: input_text.set_value
              target:
                entity_id: input_text.boiler_req_dhw_set_setpoint
              data:
                value: "{{ boiler_request_id_boost }}"

            - action: mqtt.publish
              data:
                topic: "boiler/command/dhw/set_setpoint"
                qos: 1
                retain: false
                payload: >-
                  {
                    "request_id": "{{ boiler_request_id_boost }}",
                    "ts": "{{ boiler_ts_boost }}",
                    "expires_at": "{{ boiler_expires_at_boost }}",
                    "source": "arsenal",
                    "value": {{ boost2 }}
                  }

            - wait_template: >
                {{ states('sensor.boiler_ack_dhw_set_setpoint_result') in ['applied', 'rejected', 'timeout'] }}
              timeout: "00:00:20"
              continue_on_timeout: true

            - wait_template: >
                {{ states(sensor_temp) | float(0) >= (target_temp | float) - (epsilon | float) }}
              timeout: >
                {% if mode == 'desinfection' %}
                  00:20:00
                {% else %}
                  00:10:00
                {% endif %}
              continue_on_timeout: true

    # ======================================================
    # 🔽 ETAPE 10 : Préparation transaction rabaissement
    # ======================================================
    - variables:
        boiler_request_id_down: >
          {% set h = '0123456789abcdef' %}
          {% set v = '89ab' %}
          {{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}-{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}-4{{ h|random }}{{ h|random }}{{ h|random }}-{{ v|random }}{{ h|random }}{{ h|random }}{{ h|random }}-{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}{{ h|random }}
        boiler_ts_down: >
          {{ as_timestamp(utcnow()) | timestamp_custom('%Y-%m-%dT%H:%M:%SZ', false) }}
        boiler_expires_at_down: >
          {{ (as_timestamp(utcnow()) + 30) | timestamp_custom('%Y-%m-%dT%H:%M:%SZ', false) }}

    - action: input_text.set_value
      target:
        entity_id: input_text.boiler_req_dhw_set_setpoint
      data:
        value: "{{ boiler_request_id_down }}"

    # ======================================================
    # 📤 ETAPE 11 : Envoi consigne ECS basse
    # ======================================================
    - action: mqtt.publish
      data:
        topic: "boiler/command/dhw/set_setpoint"
        qos: 1
        retain: false
        payload: >-
          {
            "request_id": "{{ boiler_request_id_down }}",
            "ts": "{{ boiler_ts_down }}",
            "expires_at": "{{ boiler_expires_at_down }}",
            "source": "arsenal",
            "value": {{ retour_temp }}
          }

    # ======================================================
    # ⏳ ETAPE 12 : Attente ACK corrélé rabaissement
    # ======================================================
    - wait_template: >
        {{ states('sensor.boiler_ack_dhw_set_setpoint_result') in ['applied', 'rejected', 'timeout'] }}
      timeout: "00:00:20"
      continue_on_timeout: true

    # ======================================================
    # ⏱️ ETAPE 13 : Démarrage gardien post-prélèvement
    # ======================================================
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ mode == 'ponctuel' }}"
          sequence:
            - action: timer.start
              target:
                entity_id: timer.ecs_gardien_post_prelevement
              data:
                duration: "00:25:00"

        - conditions:
            - condition: template
              value_template: "{{ mode == 'desinfection' }}"
          sequence:
            - action: timer.start
              target:
                entity_id: timer.ecs_gardien_post_prelevement
              data:
                duration: "00:45:00"

        - conditions:
            - condition: template
              value_template: "{{ mode == 'vaisselle' }}"
          sequence:
            - action: timer.start
              target:
                entity_id: timer.ecs_gardien_post_prelevement
              data:
                duration: "00:12:00"

    # ======================================================
    # 🧹 ETAPE 14 : Nettoyage et libération transactionnelle
    # ======================================================
    - action: input_text.set_value
      target:
        entity_id: input_text.ecs_target_temp_session
      data:
        value: ""

    - action: input_text.set_value
      target:
        entity_id: input_text.boiler_req_dhw_set_setpoint
      data:
        value: ""

    - action: timer.cancel
      target:
        entity_id: timer.ecs_cycle_watchdog

    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.ecs_cycle_en_cours