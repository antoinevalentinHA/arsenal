# ==========================================================
# 🧠 ARSENAL — SCRIPT :
#     Aération — M3 — Orchestrateur analyse DeltaT
# ==========================================================

aeration_m3_analyse_deltat:
  alias: "Aération — M3 — Analyse DeltaT (orchestrateur)"
  mode: single

  sequence:

    - variables:
        delta_max: >
          {{
            [
              states('sensor.deltaT_entree') | float(0),
              states('sensor.deltaT_sejour') | float(0),
              states('sensor.deltaT_chambre_arnaud') | float(0),
              states('sensor.deltaT_chambre_matthieu') | float(0),
              states('sensor.deltaT_chambre_parents') | float(0),
              states('sensor.deltaT_palier') | float(0)
            ] | max
          }}
        prolongation_heures: >
          {% if delta_max < 0.4 %} 0
          {% elif delta_max < 0.8 %} 1
          {% elif delta_max < 1.2 %} 2
          {% else %} 3
          {% endif %}

    - action: input_number.set_value
      target:
        entity_id: input_number.delta_t_max_decisionnel_aeration
      data:
        value: "{{ delta_max | round(2) }}"

    - choose:

        - conditions:
            - condition: template
              value_template: "{{ prolongation_heures | int(0) > 0 }}"
          sequence:

            - action: script.aeration_m3_prolonger_blocage
              data:
                delta_max: "{{ delta_max }}"
                prolongation_heures: "{{ prolongation_heures }}"

      default:

        - action: script.aeration_m3_maintenir_blocage
          data:
            delta_max: "{{ delta_max }}"