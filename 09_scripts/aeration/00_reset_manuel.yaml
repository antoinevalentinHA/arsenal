# ==========================================================
# 🧠 ARSENAL — SCRIPT :
#     Aération — Reset HARD (anti-zombies)
# ----------------------------------------------------------
# 🎯 RÔLE
#   Remise à zéro brutale et systématique du domaine aération
#   après crash / reboot / incohérence :
#     - annule les timers aération
#     - purge les booléens d’état aération
#     - lève systématiquement le blocage chauffage aération
#
# 🧩 PRINCIPE
#   - Idempotent : exécutable N fois
#   - Zéro condition / zéro paramètre
#   - Objectif : revenir à un socle cohérent immédiatement
# ==========================================================

aeration_reset_hard:
  alias: "Aération — Reset HARD (anti-zombies)"
  mode: single

  sequence:

    ##################################################################
    #  1) TIMERS — arrêt immédiat
    ##################################################################
    - action: timer.cancel
      target:
        entity_id:
          - timer.aeration_analyse_delta_t
          - timer.aeration_blocage

    ##################################################################
    #  2) ÉTATS AÉRATION — purge zombies
    ##################################################################
    - action: input_boolean.turn_off
      target:
        entity_id:
          - input_boolean.aeration_episode_en_cours
          - input_boolean.aeration_confirmee
          - input_boolean.aeration_suspension_active
          - input_boolean.aeration_recover_requested
          - input_boolean.aeration_pipeline_arme

    ##################################################################
    #  3) CHAUFFAGE — levée du blocage aération (HARD)
    ##################################################################
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.chauffage_blocage_aeration

    ##################################################################
    #  4) TRACE
    ##################################################################
    - action: logbook.log
      data:
        name: "Aération — Reset HARD"
        message: >
          Reset HARD effectué : timers annulés, états aération purgés,
          blocage chauffage aération levé.
        entity_id: input_boolean.chauffage_blocage_aeration