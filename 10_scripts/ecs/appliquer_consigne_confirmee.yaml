# ==========================================================
# 🧠 ARSENAL — SCRIPT : ECS – Appliquer consigne confirmée
# ----------------------------------------------------------
# 🎯 ROLE
#   Appliquer une consigne ECS via le bridge puis écrire
#   un résultat normalisé dans le helper de statut.
#   Aucune politique de continuité embarquée.
#
# ----------------------------------------------------------
# 🧱 PERIMETRE
#
#   - reset du helper de statut en entrée d'appel
#   - appel du bridge ECS avec target_temp uniquement
#   - lecture du résultat ACK
#   - écriture du statut normalisé
#   - log diagnostique si statut non applied
#
# ----------------------------------------------------------
# 🚫 NE FAIT PAS
#
#   - ne ferme pas la session
#   - ne stoppe pas le cycle
#   - ne lit pas le mode
#   - ne fait aucun wait_template
#   - ne décide pas si l'échec est bloquant
#   - ne passe pas contexte au bridge
#
# ----------------------------------------------------------
# 🔗 DEPENDANCES
#
#   - input_text.ecs_cycle_last_action_status
#   - script.ecs_appliquer_consigne_bridge
#   - sensor.boiler_ack_dhw_set_setpoint_status
#   - sensor.boiler_ack_dhw_set_setpoint_reason
#
# ----------------------------------------------------------
# 📥 ENTREES
#
#   - target_temp  : température à appliquer
#   - contexte     : libellé technique de l'appelant
#                    (consigne_haute / boost / retour_basse)
#                    utilisé uniquement pour le logbook
#
# ----------------------------------------------------------
# 📤 SORTIES
#
#   - input_text.ecs_cycle_last_action_status
#     valeurs : applied | rejected | timeout
#
# ----------------------------------------------------------
# ✅ Compatibilité : Home Assistant 2024.8+
# ==========================================================

ecs_appliquer_consigne_confirmee:
  alias: "ECS - Appliquer consigne confirmée"
  mode: single

  fields:
    target_temp:
      name: Température cible
      required: true
    contexte:
      name: Contexte
      description: "Libellé diagnostique de l'appelant : consigne_haute, boost, retour_basse"
      required: true

  sequence:

    # ======================================================
    # 🔄 ETAPE 1 : Reset statut d'action
    # Chaque appel nettoie son propre canal résultat
    # avant d'écrire le nouveau statut.
    # ======================================================
    - action: input_text.set_value
      target:
        entity_id: input_text.ecs_cycle_last_action_status
      data:
        value: ""

    # ======================================================
    # 📤 ETAPE 2 : Appel bridge ECS
    # Seul target_temp est transmis au bridge.
    # Le contexte est interne à cet exécuteur.
    # ======================================================
    - action: script.ecs_appliquer_consigne_bridge
      data:
        target_temp: "{{ target_temp | int }}"

    # ======================================================
    # 📥 ETAPE 3 : Lire le résultat ACK
    # ======================================================
    - variables:
        ack_status: "{{ states('sensor.boiler_ack_dhw_set_setpoint_status') }}"
        ack_reason: "{{ states('sensor.boiler_ack_dhw_set_setpoint_reason') }}"

    # ======================================================
    # ✅ ETAPE 4 : Ecrire le statut final normalisé
    # Valeurs contractuelles : applied | rejected | timeout
    # Toute valeur inattendue est tracée puis rabattue
    # sur timeout pour rester dans le contrat.
    # ======================================================
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ ack_status == 'applied' }}"
          sequence:
            - action: input_text.set_value
              target:
                entity_id: input_text.ecs_cycle_last_action_status
              data:
                value: "applied"

        - conditions:
            - condition: template
              value_template: "{{ ack_status == 'rejected' }}"
          sequence:
            - action: input_text.set_value
              target:
                entity_id: input_text.ecs_cycle_last_action_status
              data:
                value: "rejected"

            - action: logbook.log
              data:
                name: "ECS"
                message: >
                  Consigne ECS rejetée
                  (contexte={{ contexte }}, target={{ target_temp }},
                  status={{ ack_status }}, reason={{ ack_reason }})

        - conditions:
            - condition: template
              value_template: "{{ ack_status == 'timeout' }}"
          sequence:
            - action: input_text.set_value
              target:
                entity_id: input_text.ecs_cycle_last_action_status
              data:
                value: "timeout"

            - action: logbook.log
              data:
                name: "ECS"
                message: >
                  Consigne ECS non confirmée — timeout
                  (contexte={{ contexte }}, target={{ target_temp }},
                  status={{ ack_status }}, reason={{ ack_reason }})

      default:
        - action: input_text.set_value
          target:
            entity_id: input_text.ecs_cycle_last_action_status
          data:
            value: "timeout"

        - action: logbook.log
          data:
            name: "ECS"
            message: >
              Consigne ECS non confirmée — statut inattendu rabattu sur timeout
              (contexte={{ contexte }}, target={{ target_temp }},
              ack_status={{ ack_status }}, reason={{ ack_reason }})