# ==========================================================
#  🧠 ARSENAL — SCRIPT (CANON)
#     resilience_integration_recover
# ----------------------------------------------------------
#  🎯 RÔLE
#     Procédure unique de résilience pour intégrations critiques :
#     - attempt : tentative de récupération (reload/restart)
#     - reset   : remise à zéro (retour OK)
#     - block   : blocage plafond (sécurité)
#
#  🧱 PRINCIPE
#     - Aucun trigger ici (piloté par automations)
#     - Paramétré via fields (entités, seuils, action)
#     - Notifications mobiles via script.notification_envoyer
# ==========================================================

resilience_integration_recover:
  alias: "Système - Résilience intégration"
  mode: single

  fields:
    op:
      description: "attempt | reset | block"
    kind:
      description: "reload_entry | restart_addon"
    notify_title_prefix:
      description: "Ex: ViCare, Netatmo, Zigbee2MQTT"
    age_entity:
      description: "Ex: sensor.vicare_age_donnees"
    unavail_entity:
      description: "Optionnel. Binaire d'indisponibilité franche (ex: binary_sensor.indisponibilite_franche_netatmo). Si 'on', l'incident est confirmé même si l'âge est figé bas."
    wan_entity:
      description: "Optionnel. Binaire de contexte WAN (ex: binary_sensor.contexte_wan_indisponible). Transmis UNIQUEMENT par les intégrations cloud_wan. Si défini et 'on', la tentative (op=attempt) est inhibée : le support WAN est indisponible, un reload serait futile. Ne jamais transmettre pour une intégration local_lan."
    seuil_minutes:
      description: "Gel si age >= seuil"
    ok_minutes:
      description: "Succes si age < ok"
    attempts_entity:
      description: "Ex: input_number.vicare_reload_tentatives"
    backoff_timer:
      description: "Ex: timer.vicare_reload_backoff"
    entry_id:
      description: "Config entry_id (si kind=reload_entry)"
    addon_slug:
      description: "Addon slug (si kind=restart_addon)"
    backoff_minutes_cap:
      description: "Cap backoff minutes (ex: 60)"
    wait_timeout:
      description: "Timeout wait_template (ex: 00:03:00)"

  sequence:

    # =========================
    # 🛡️ GARDE PANNE SECTEUR
    # =========================
    # Pendant une coupure secteur (coupure_secteur=on) ou tant que l'épisode
    # est latché (panne_secteur_active=on), le gel d'une intégration traduit la
    # perte d'alimentation du périphérique — un KO ATTENDU, pas un blocage
    # logiciel. Un reload de config_entry serait futile (le device est éteint)
    # et générerait spam de tentatives + backoff + notifications.
    # On n'inhibe QUE la tentative (op=attempt) ; le reset (retour OK) reste
    # autorisé. À la sortie de panne, le device se ré-alimente et l'intégration
    # récupère naturellement, sans reload.
    - choose:
        - conditions:
            - condition: template
              value_template: >
                {{ (op | default('attempt')) == 'attempt'
                   and is_state('binary_sensor.panne_secteur_en_cours', 'on') }}
          sequence:
            - stop: "Inhibé : panne secteur active (reload d'intégration futile)"

    # =========================
    # 🛡️ GARDE CONTEXTE WAN
    # =========================
    # Pour les intégrations cloud_wan UNIQUEMENT (qui transmettent wan_entity) :
    # pendant une indisponibilité WAN ou une campagne de remédiation réseau
    # (binary_sensor.contexte_wan_indisponible=on), un reload de config_entry est
    # FUTILE — le support distant est inatteignable. KO ATTENDU, pas un blocage.
    # Garde PARAMÉTRÉE (jamais codée en dur) : inerte si wan_entity non transmis,
    # donc les intégrations local_lan ne sont jamais inhibées par effet de bord.
    # On n'inhibe QUE la tentative (op=attempt) ; reset et block restent autorisés.
    - choose:
        - conditions:
            - condition: template
              value_template: >
                {{ (op | default('attempt')) == 'attempt'
                   and (wan_entity | default('')) | length > 0
                   and is_state(wan_entity, 'on') }}
          sequence:
            - stop: "Inhibé : contexte WAN indisponible (reload d'intégration cloud futile)"

    # =========================
    # 🧱 GARDE PARAMETRES
    # =========================
    - variables:
        age_entity_safe: "{{ age_entity | default('') }}"
        prefix: "{{ notify_title_prefix | default('Integration') }}"

    - choose:
        - conditions: "{{ age_entity_safe | length > 0 }}"
          sequence: []
      default:
        - stop: "age_entity manquant"

    - variables:
        UNAV: ['unknown','unavailable',None,'none','']
        unavail_entity_safe: "{{ unavail_entity | default('') }}"
        unavail: >
          {{ unavail_entity_safe | length > 0
             and is_state(unavail_entity_safe, 'on') }}
        age_state: "{{ states(age_entity_safe) }}"
        age: "{{ states(age_entity_safe) | float(default=none) }}"
        seuil: "{{ seuil_minutes | float(default=45) }}"
        ok: "{{ ok_minutes | float(default=10) }}"
        tentative: "{{ states(attempts_entity) | int(0) }}"
        cap: "{{ backoff_minutes_cap | int(60) }}"
        timeout: "{{ wait_timeout | default('00:03:00') }}"
        plafond: "{{ tentative >= 5 }}"
        delai_min: >
          {% set d = (tentative + 1) * 10 %}
          {{ [d, cap] | min }}

    - choose:

        # =========================
        # ✅ RESET (retour OK)
        # =========================
        - conditions: "{{ op == 'reset' }}"
          sequence:
            - service: timer.cancel
              target:
                entity_id: "{{ backoff_timer }}"
            - service: input_number.set_value
              target:
                entity_id: "{{ attempts_entity }}"
              data:
                value: 0
            - stop: "reset"

        # =========================
        # ⛔ BLOCK (plafond)
        # =========================
        - conditions: "{{ op == 'block' }}"
          sequence:
            - service: timer.cancel
              target:
                entity_id: "{{ backoff_timer }}"
            - service: script.notification_envoyer
              data:
                cible: input_text.telephone_antoine_notify
                titre: "⛔ {{ prefix }} — blocage sécurité"
                message: >
                  {{ now().strftime('%d/%m %H:%M') }}
                  5 tentatives consécutives échouées.
                  Arrêt des relances automatiques.
            - stop: "block"

    # =========================
    # ATTEMPT (tentative)
    # =========================
    - choose:
        - conditions: "{{ plafond }}"
          sequence:
            - service: script.resilience_integration_recover
              data:
                op: block
                notify_title_prefix: "{{ prefix }}"
                attempts_entity: "{{ attempts_entity }}"
                backoff_timer: "{{ backoff_timer }}"
            - stop: "plafond"

    # Si gel non confirmé / valeur non numérique : on ne fait rien
    # Incident confirmé si l'âge dépasse le seuil (gel silencieux)
    # OU si l'indisponibilité franche est avérée (unavail = on, âge figé bas).
    - condition: template
      value_template: >
        {{ (age is not none and age >= seuil) or unavail }}

    # Annule un backoff pendu (si on relance à cause d’un nouveau gel)
    - service: timer.cancel
      target:
        entity_id: "{{ backoff_timer }}"

    # Incrément tentative
    - service: input_number.set_value
      target:
        entity_id: "{{ attempts_entity }}"
      data:
        value: "{{ tentative + 1 }}"

    # Action : reload_entry ou restart_addon
    - choose:
        - conditions: "{{ kind == 'reload_entry' }}"
          sequence:
            - service: homeassistant.reload_config_entry
              data:
                entry_id: "{{ entry_id }}"
        - conditions: "{{ kind == 'restart_addon' }}"
          sequence:
            - service: hassio.addon_restart
              data:
                addon: "{{ addon_slug }}"

    # Attente “retour réel”
    # Succès = données fraîches (âge < ok) ET indisponibilité franche levée.
    # Tant qu'un binaire unavail est fourni et reste 'on', on n'a pas récupéré.
    - wait_template: >
        {% set v = states(age_entity_safe) | float(default=none) %}
        {% set still_unavail = unavail_entity_safe | length > 0
           and is_state(unavail_entity_safe, 'on') %}
        {{ v is not none and v < ok and not still_unavail }}
      timeout: "{{ timeout }}"
      continue_on_timeout: true

    # Succès ?
    - choose:
        - conditions: >
            {% set v = states(age_entity_safe) | float(default=none) %}
            {% set still_unavail = unavail_entity_safe | length > 0
               and is_state(unavail_entity_safe, 'on') %}
            {{ v is not none and v < ok and not still_unavail }}
          sequence:
            - service: timer.cancel
              target:
                entity_id: "{{ backoff_timer }}"
            - service: input_number.set_value
              target:
                entity_id: "{{ attempts_entity }}"
              data:
                value: 0
            - service: script.notification_envoyer
              data:
                cible: input_text.telephone_antoine_notify
                titre: "✅ {{ prefix }} — relance OK"
                message: >
                  {{ now().strftime('%d/%m %H:%M') }}
                  Données à nouveau fraîches ({{ states(age_entity_safe) }} min).

      default:
        - service: timer.start
          target:
            entity_id: "{{ backoff_timer }}"
          data:
            duration: >
              {% set m = delai_min | int(10) %}
              {{ '%02d:%02d:%02d' | format((m // 60), (m % 60), 0) }}

        - service: script.notification_envoyer
          data:
            cible: input_text.telephone_antoine_notify
            titre: "🚨 {{ prefix }} — relance en échec"
            message: >
              {{ now().strftime('%d/%m %H:%M') }}
              Tentative n°{{ tentative + 1 }} échouée (timeout).
              Prochaine tentative après backoff (~{{ delai_min }} min).