# ==========================================================
# 🧠 ARSENAL — SCRIPT
#     Réseau — Cycle alimentation box Internet
# ----------------------------------------------------------
# 🎯 RÔLE
#
#     Exécuter l'action corrective physique unique
#     de cycle d'alimentation de la box Internet.
#
#     Ce script :
#     - coupe l'alimentation de la box
#     - attend un délai fixe
#     - rétablit l'alimentation
#
# 🧱 CONTRAT
#
#     - actuateur pur
#     - aucune lecture de l'état réseau
#     - aucune décision
#     - aucune notification
#     - aucune modification de contexte métier
#
# 🔎 NOTES D'IMPLEMENTATION
#
#     - toute action physique de redémarrage box
#       doit passer exclusivement par ce script
#     - la durée OFF est fixe et déterministe
# ==========================================================

cycle_alimentation_box:
  alias: "Système - Cycle redémarrage box"
  mode: single
  sequence:
    - action: switch.turn_off
      target:
        entity_id: switch.prise_box

    - delay: "00:00:10"

    - action: switch.turn_on
      target:
        entity_id: switch.prise_box