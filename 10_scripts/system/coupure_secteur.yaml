# ==========================================================
# 🧠 ARSENAL — SCRIPT : Mode panne – Coupure secteur
# ----------------------------------------------------------
# 🎯 RÔLE FONDAMENTAL
#   Script de résilience exécuté lors de l’entrée valide
#   en mode panne secteur.
#
#   Il applique la mise en régime ECS de secours par le
#   chemin canonique Arsenal et matérialise l’état de panne
#   auprès de l’utilisateur.
#
# ----------------------------------------------------------
# 🧱 POSITION DANS L’ARCHITECTURE
#
#   - Script de résilience système
#   - Niveau : sécurité / continuité de service
#
#   ➜ Il est déclenché UNIQUEMENT par l’automation
#     d’entrée en mode panne secteur.
#
# ----------------------------------------------------------
# ⚙️ COMPORTEMENT
#
#   Lors de l’exécution :
#
#   - Eau chaude sanitaire :
#       • Application d’une consigne ECS de secours
#         via `script.ecs_appliquer_consigne_confirmee`
#       • Contexte retenu : `consigne_haute`
#
#   - Information utilisateur :
#       • Notification persistante d’état système
#       • Notification mobile prioritaire
#
# ----------------------------------------------------------
# 🔒 GARANTIES
#
#   - Aucune décision métier
#   - Aucune temporisation interne
#   - Aucune sortie automatique du mode panne
#   - Aucun pilotage direct du chauffage
#
#   ➜ Ce script exécute la mise en régime ECS de secours
#     et la signalisation associée.
#
# ----------------------------------------------------------
# 🚫 NE FAIT PAS
#
#   - Ne détecte pas la coupure secteur
#   - Ne surveille pas le retour du courant
#   - Ne restaure aucun état précédent
#   - Ne pilote pas directement la chaudière chauffage
#   - Ne boucle pas
#
# ----------------------------------------------------------
# 📊 Type :
#   Script de résilience — mode panne secteur
#
# 📍 Entité :
#   script.mode_panne_coupure_secteur
#
# 🔗 Dépendances :
#   - script.ecs_appliquer_consigne_confirmee
#   - input_text.ecs_cycle_last_action_status
#   - persistent_notification
#   - script.notification_envoyer_avance
#
# 🧩 Pipeline :
#   Système / Panne / Résilience électrique
#
# ✅ Compatibilité :
#   Home Assistant 2024.8+
#   Arsenal v6+
# ==========================================================

mode_panne_coupure_secteur:
  alias: "Système - Mode panne – Coupure secteur"
  mode: single
  sequence:

    - variables:
        # Bluetti thermique DISPONIBLE (sortie AC active) et NON CRITIQUE (SOC >=15 %)
        # → on gonfle le ballon au maximum via le cycle désinfection canonique.
        # (sortie indisponible / SOC critique / non mesurable → pas de cycle).
        budget_ecs_ok: >
          {{ is_state('binary_sensor.bluetti_sortie_ac_active', 'on')
             and is_state('binary_sensor.bluetti_batterie_critique', 'off') }}
        # Le confort a déjà été décidé à l'entrée (gate besoin/présence/SOC faible).
        confort_engage: "{{ is_state('input_boolean.mode_confort_chauffage', 'on') }}"

    # 1) ECS de secours = STOCKAGE THERMIQUE MAXIMAL via le cycle désinfection canonique
    #    (script.chauffage_ecs_cycle mode desinfection — montée haute sécurisée,
    #    cible input_number.ecs_temperature_desinfection ; verrou interne au cycle).
    #    Uniquement si le Bluetti thermique est disponible et non critique.
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ budget_ecs_ok }}"
          sequence:
            - action: script.chauffage_ecs_cycle
              data:
                mode: "desinfection"
    # sinon : pas de cycle ECS — autonomie restante de la chaîne préservée
    #
    # 2) Notification persistante d'état : DÉLÉGUÉE.
    #    La projection persistante `mode_panne_secteur` est désormais portée
    #    par une automation dédiée, `11_automations/panne/secteur/notification_persistante.yaml`
    #    (projection de `input_boolean.panne_secteur_active` + systeme_stable → on).
    #    Ce découplage garantit la re-création au démarrage même si HA reboote
    #    EN PLEINE COUPURE — cas où la garde d'idempotence de l'entrée
    #    empêchait toute re-création (audit Notifications, NOTIF-02).
    #    Ce script conserve UNIQUEMENT le push mobile (événement d'entrée).
    #
    # 3) Notification mobile prioritaire – état réel
    - service: script.notification_envoyer_avance
      data:
        cible: input_text.telephone_parent_1_notify
        titre: "⚠️ Coupure secteur détectée"
        message: >
          Mode panne actif.
          Confort chauffage : {{ 'activé' if confort_engage else 'neutralisé (régime réduit)' }}.
          ECS secours : {{ ('cycle désinfection déclenché — statut ' ~ states('input_text.ecs_cycle_last_action_status')) if budget_ecs_ok else 'non déclenché (Bluetti indispo / SOC critique)' }}.
        extra:
          ttl: 0
          priority: high
          importance: high