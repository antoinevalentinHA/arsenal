# ==========================================================
# 🧠 ARSENAL — SCRIPT : VMC – Retour en basse vitesse
# ----------------------------------------------------------
# 🎯 ROLE
#   Appliquer l'etat physique nominal de la VMC :
#   - switch.vmc_l1 = off
#   - switch.vmc_l2 = on
#
# 🧱 CONTRAT
#   Etat cible LOW :
#   - vmc_l1 off
#   - vmc_l2 on
#
#   Etat deja conforme :
#   - aucune action
#
# 🛡️ SECURITE
#   - aucune dependance a un reflet legacy
#   - aucune dependance a switch.vmc
#   - ordre d'action compatible Bloc 10
#   - sequence non interrompue par un nouvel appel
#   - delai inter-commandes defensif de 200 ms
# ==========================================================

vmc_basse_vitesse:
  alias: "VMC - Basse vitesse"
  mode: single
  max_exceeded: silent

  sequence:
    - choose:

        # --------------------------------------------------
        # Etat deja conforme : LOW
        # --------------------------------------------------
        - conditions:
            - condition: state
              entity_id: switch.vmc_l1
              state: "off"
            - condition: state
              entity_id: switch.vmc_l2
              state: "on"
          sequence: []

      default:
        # --------------------------------------------------
        # Repli / convergence vers LOW
        # --------------------------------------------------
        - action: switch.turn_off
          target:
            entity_id: switch.vmc_l1

        - delay:
            milliseconds: 200

        - action: switch.turn_on
          target:
            entity_id: switch.vmc_l2