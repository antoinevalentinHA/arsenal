# ==========================================================
# 🧠 ARSENAL — SCRIPT : VMC – Passage en haute vitesse
# ----------------------------------------------------------
# 🎯 ROLE
#   Appliquer l'etat physique renforce de la VMC :
#   - switch.vmc_l1 = on
#   - switch.vmc_l2 = off
#
# 🧱 CONTRAT
#   Etat cible HIGH :
#   - vmc_l1 on
#   - vmc_l2 off
#
#   Etat deja conforme :
#   - aucune action
#
# 🛡️ SECURITE
#   - aucune dependance a un reflet legacy
#   - aucune dependance a switch.vmc
#   - ordre d'action compatible Bloc 10
#   - sequence non interrompue par un nouvel appel
#   - delai inter-commandes defensif de 200 ms
# ==========================================================

vmc_haute_vitesse:
  alias: "VMC - Haute vitesse"
  mode: single
  max_exceeded: silent

  sequence:
    - choose:

        # --------------------------------------------------
        # Etat deja conforme : HIGH
        # --------------------------------------------------
        - conditions:
            - condition: state
              entity_id: switch.vmc_l1
              state: "on"
            - condition: state
              entity_id: switch.vmc_l2
              state: "off"
          sequence: []

      default:
        # --------------------------------------------------
        # Convergence vers HIGH
        # --------------------------------------------------
        - action: switch.turn_off
          target:
            entity_id: switch.vmc_l2

        - delay:
            milliseconds: 200

        - action: switch.turn_on
          target:
            entity_id: switch.vmc_l1