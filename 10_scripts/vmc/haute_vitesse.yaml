# ==========================================================
# 🧠 ARSENAL — SCRIPT : VMC – Passage en haute vitesse
# ----------------------------------------------------------
# 🎯 ROLE
#   Appliquer l'etat physique renforce de la VMC :
#   - switch.vmc_l1 = on
#   - switch.vmc_l2 = off
#
# 🧱 CONTRAT
#   Etat cible HIGH :
#   - vmc_l1 on
#   - vmc_l2 off
#
#   Etat deja conforme :
#   - aucune action
#
# 🛡️ SECURITE
#   - aucune dependance a un reflet legacy
#   - aucune dependance a switch.vmc
#   - ordre d'action compatible Bloc 10
#   - sequence non interrompue par un nouvel appel
#   - delai inter-commandes defensif de 200 ms
#   - garde de disponibilite des relais avant tout pilotage
#     (aucun switch.turn_* vers un relais unavailable / unknown)
# ==========================================================

vmc_haute_vitesse:
  alias: "VMC - Haute vitesse"
  mode: single
  max_exceeded: silent

  sequence:
    - choose:

        # --------------------------------------------------
        # Relais indisponibles : AUCUNE action physique.
        # Cas typiques : demarrage HA (integration relais non
        # encore chargee), panne materielle, indisponibilite
        # transitoire. On ne pilote jamais un relais absent :
        # l'appel echouerait (helpers/target.py) sans effet.
        # L'etat reel reste observe par
        # binary_sensor.vmc_coherence_physique et le capteur de
        # conformite ; la convergence sera retentee au prochain
        # declenchement une fois les relais disponibles.
        # --------------------------------------------------
        - conditions:
            - condition: template
              value_template: >
                {{ states('switch.vmc_l1') in ['unavailable', 'unknown']
                   or states('switch.vmc_l2') in ['unavailable', 'unknown'] }}
          sequence: []

        # --------------------------------------------------
        # Etat deja conforme : HIGH
        # --------------------------------------------------
        - conditions:
            - condition: state
              entity_id: switch.vmc_l1
              state: "on"
            - condition: state
              entity_id: switch.vmc_l2
              state: "off"
          sequence: []

      default:
        # --------------------------------------------------
        # Convergence vers HIGH
        # --------------------------------------------------
        - action: switch.turn_off
          target:
            entity_id: switch.vmc_l2

        - delay:
            milliseconds: 200

        - action: switch.turn_on
          target:
            entity_id: switch.vmc_l1