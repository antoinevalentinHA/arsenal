# ==========================================================
# ⌨️ SCRIPT — Alarme : Traitement du code clavier
# ----------------------------------------------------------
# 🎯 ROLE
#   Interpreter un code saisi sur un clavier Zigbee
#   et router l'action correspondante (armement ou desarmement)
#   vers les scripts unifies de l'alarme.
#
# 🧱 RESPONSABILITE
#   Ce script interprete l'intention exprimee par un clavier
#   physique et delegue l'execution aux scripts canoniques
#   d'armement / desarmement.
#
# ✅ GARANTIES
#   - Filtrage des entrees invalides
#   - Exclusion des badges NFC
#   - Verification stricte du code saisi
#   - Delegation exclusive a `script.alarme_armer`
#     ou `script.alarme_desarmer`
#   - Aucune action directe sur `alarm_control_panel`
#
# 🚫 CE SCRIPT NE FAIT PAS
#   - Ne contient aucune logique materielle clavier
#   - Ne decide pas du moment ou l'alarme doit etre armee
#   - Ne manipule pas directement `alarm_control_panel`
#   - Ne gere pas les badges NFC ou identites avancees
#   - N'execute pas lui-meme l'armement ou le desarmement
#
# 🧱 DEPENDANCES
#   - script.alarme_armer
#   - script.alarme_desarmer
#   - script.notification_envoyer
#   - alarm_control_panel.alarme_maison
#   - input_text.alarm_code
#   - input_boolean.blocage_armement_auto
#
# 📊 TYPE
#   Script de routage securitaire
#
# 📍 ENTITE
#   script.traitement_code_clavier
#
# 🔁 SEMANTIQUE ARSENAL
#   - Tous les claviers physiques doivent passer par ce script
#   - Aucune automatisation clavier ne doit armer / desarmer directement
#   - Le clavier exprime une intention, ce script la traduit
# ==========================================================

traitement_code_clavier:
  alias: Alarme - Traitement code clavier
  description: >
    Gere armement / desarmement selon contexte et delegue
    exclusivement aux scripts unifies de l'alarme.
  mode: queued

  sequence:
    - variables:
        code_saisi: "{{ (code_in | default('', true) | string).strip() }}"
        code_attendu: >-
          {{ (states('input_text.alarm_code') | default('', true) | string).strip() }}
        alarme: alarm_control_panel.alarme_maison
        blocage_auto: "{{ is_state('input_boolean.blocage_armement_auto', 'on') }}"
        nom_clavier: >-
          {% set e = source_in | default('') | string %}
          {% if e.endswith('_1_action_code') %}Clavier Entree
          {% elif e.endswith('_2_action_code') %}Clavier Garage
          {% else %}Clavier inconnu{% endif %}

    # 1) Si code vide / inconnu, on sort sans rien faire
    - condition: template
      value_template: "{{ code_saisi not in ['', 'unknown', 'unavailable', None] }}"

    # 1b) Filtrer les badges NFC
    - condition: template
      value_template: >
        {{ code_saisi | regex_match('^[0-9]+$', ignorecase=False) }}

    # 2) Verification du code
    - condition: template
      value_template: "{{ code_saisi == code_attendu }}"

    - choose:
        # 🔓 Cas 1 : Desarmement via clavier
        - conditions:
            - condition: template
              value_template: >
                {{ states(alarme) in ['armed_away', 'arming', 'pending', 'triggered'] }}
          sequence:
            - action: script.alarme_desarmer
              data:
                origine: clavier

        # ℹ️ Cas 2 : Code ignore car desarmement automatique recent
        - conditions:
            - condition: template
              value_template: "{{ states(alarme) == 'disarmed' and blocage_auto }}"
          sequence:
            - action: script.notification_envoyer
              data:
                cible: input_text.telephone_parent_1_notify
                titre: "ℹ️ Code ignoré"
                message: "Code saisi via {{ nom_clavier }} ignore — alarme deja desarmee automatiquement."

        # 🔐 Cas 3 : Armement si desarmee et pas de blocage actif
        - conditions:
            - condition: template
              value_template: "{{ states(alarme) == 'disarmed' and not blocage_auto }}"
          sequence:
            - action: script.alarme_armer
              data:
                origine: clavier