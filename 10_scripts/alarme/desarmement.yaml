# ==========================================================
# 🔓 SCRIPT — Alarme : Desarmement unifie
# ----------------------------------------------------------
# 🎯 ROLE
#   Point d'entree unique pour le desarmement de l'alarme.
#
# 🧱 RESPONSABILITE
#   Ce script applique le desarmement de facon centralisee
#   et priorise l'arret immediat de la sirene avant toute
#   autre action.
#
# ✅ GARANTIES
#   - Validation / normalisation de `origine`
#   - Arret immediat de la sirene, sans condition
#   - Desarmement reel uniquement si l'alarme est dans
#     un etat armed_away / arming / pending / triggered
#   - Si le guard de desarmement passe :
#       - bip de confirmation hors mode test
#       - notification utilisateur avec origine reelle
#
# 🚫 CE SCRIPT NE FAIT PAS
#   - Ne decide pas s'il faut desarmer
#   - Ne deduit pas "automatique" / "manuel"
#   - Ne gere pas les blocages d'armement automatique
#   - Ne remplace pas le moteur decisionnel
#   - Ne fige aucun format structure de persistance
#   - Ne confirme pas un succes materiel post-action
#
# 🧠 CONTRAT `origine`
#   - `origine` represente une provenance technique
#   - Valeurs admises :
#       - dashboard
#       - clavier
#       - badge
#       - automatisme
#       - inconnu
#   - Valeur absente ou invalide -> `inconnu`
#
# 🧱 DEPENDANCES
#   - alarm_control_panel.alarme_maison
#   - script.arret_sirene
#   - script.sirene_bip_bip
#   - script.notification_envoyer
#   - input_boolean.mode_test_alarme
#
# 📊 TYPE
#   Script d'application centralisee
#
# 📍 ENTITE
#   script.alarme_desarmer
#
# 🔁 SEMANTIQUE ARSENAL
#   - Toute demande de desarmement doit passer par ce script
#   - Le silence de la sirene est prioritaire
#   - La decision est externe, l'execution est ici
# ==========================================================

alarme_desarmer:
  alias: "Alarme - Désarmer"
  description: >
    Arrete immediatement la sirene, desarme l'alarme si
    necessaire, normalise l'origine, ecrit un marqueur
    minimal, joue un bip hors mode test et envoie une
    notification.
  mode: single

  fields:
    origine:
      description: >
        Provenance technique de la demande.
        Valeurs admises : dashboard, clavier, badge,
        automatisme, inconnu.
      example: "clavier"

  sequence:
    # ------------------------------------------------------
    # 0) Normalisation de l'origine
    # ------------------------------------------------------
    - variables:
        origine_norm: >-
          {% set o = origine | default('inconnu') | trim | lower %}
          {{ o if o in ['dashboard', 'clavier', 'badge', 'automatisme'] else 'inconnu' }}

    # ------------------------------------------------------
    # 1) Arret immediat de la sirene
    # ------------------------------------------------------
    - action: script.arret_sirene

    # ------------------------------------------------------
    # 2) Desarmement reel si l'alarme est dans un etat
    #    compatible avec un desarmement explicite
    # ------------------------------------------------------
    - condition: template
      value_template: >
        {{ states('alarm_control_panel.alarme_maison') in
           ['armed_away', 'arming', 'pending', 'triggered'] }}

    - action: alarm_control_panel.alarm_disarm
      target:
        entity_id: alarm_control_panel.alarme_maison

    # ------------------------------------------------------
    # 3) Bip de confirmation hors mode test
    # ------------------------------------------------------
    - choose:
        - conditions:
            - condition: state
              entity_id: input_boolean.mode_test_alarme
              state: "off"
          sequence:
            - action: script.sirene_bip_bip

    # ------------------------------------------------------
    # 4) Notification utilisateur
    # ------------------------------------------------------
    - action: script.notification_envoyer
      data:
        cible: input_text.telephone_antoine_notify
        titre: "🔓 Alarme désactivée"
        message: >-
          Alarme désactivée à {{ now().strftime('%H:%M') }}.
          Origine : {{ origine_norm }}.