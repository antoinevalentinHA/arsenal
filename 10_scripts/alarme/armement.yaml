# ==========================================================
# 🔒 SCRIPT — Alarme : Armement unifie
# ----------------------------------------------------------
# 🎯 ROLE
#   Point d'entree unique pour l'armement de l'alarme
#   en mode ABSENT.
#
# 🧱 RESPONSABILITE
#   Ce script applique la demande d'armement si l'alarme
#   est reellement desarmee, puis produit les effets
#   immediats standardises associes a cette execution.
#
# ✅ GARANTIES
#   - Validation / normalisation de `origine`
#   - Armement reel uniquement si l'alarme est desarmee
#   - Bip de confirmation hors mode test
#   - Notification utilisateur avec origine reelle
#
# 🚫 CE SCRIPT NE FAIT PAS
#   - Ne decide pas s'il faut armer
#   - Ne deduit pas "automatique" / "manuel"
#   - Ne gere pas la logique de presence / absence
#   - Ne force pas un armement si l'alarme est deja armee
#   - Ne fige aucun format structure de persistance
#   - Ne confirme pas un succes materiel post-action
#
# 🧠 CONTRAT `origine`
#   - `origine` represente une provenance technique
#   - Valeurs admises :
#       - dashboard
#       - clavier
#       - badge
#       - automatisme
#       - inconnu
#   - Valeur absente ou invalide -> `inconnu`
#
# 🧱 DEPENDANCES
#   - alarm_control_panel.alarme_maison
#   - script.sirene_bip
#   - script.notification_envoyer
#   - input_boolean.mode_test_alarme
#
# 📊 TYPE
#   Script d'application centralisee
#
# 📍 ENTITE
#   script.alarme_armer
#
# 🔁 SEMANTIQUE ARSENAL
#   - Toute demande d'armement doit passer par ce script
#   - Aucun appelant ne doit armer l'alarme directement
#   - La decision est externe, l'execution est ici
# ==========================================================

alarme_armer:
  alias: "Alarme - Armer"
  description: >
    Arme l'alarme en mode Absent si elle est desarmee,
    normalise l'origine, ecrit un marqueur minimal,
    joue un bip hors mode test et envoie une notification.
  mode: single

  fields:
    origine:
      description: >
        Provenance technique de la demande.
        Valeurs admises : dashboard, clavier, badge,
        automatisme, inconnu.
      example: "dashboard"

  sequence:
    # ------------------------------------------------------
    # 0) Normalisation de l'origine
    # ------------------------------------------------------
    - variables:
        origine_norm: >-
          {% set o = origine | default('inconnu') | trim | lower %}
          {{ o if o in ['dashboard', 'clavier', 'badge', 'automatisme'] else 'inconnu' }}

    # ------------------------------------------------------
    # 1) Armement reel uniquement si l'alarme est desarmee
    # ------------------------------------------------------
    - condition: state
      entity_id: alarm_control_panel.alarme_maison
      state: disarmed

    - action: alarm_control_panel.alarm_arm_away
      target:
        entity_id: alarm_control_panel.alarme_maison

    # ------------------------------------------------------
    # 2) Bip de confirmation hors mode test
    # ------------------------------------------------------
    - choose:
        - conditions:
            - condition: state
              entity_id: input_boolean.mode_test_alarme
              state: "off"
          sequence:
            - action: script.sirene_bip

    # ------------------------------------------------------
    # 3) Notification utilisateur
    # ------------------------------------------------------
    - action: script.notification_envoyer
      data:
        cible: input_text.telephone_parent_1_notify
        titre: "🔒 Alarme activée"
        message: >-
          Alarme activée à {{ now().strftime('%H:%M') }}.
          Origine : {{ origine_norm }}.