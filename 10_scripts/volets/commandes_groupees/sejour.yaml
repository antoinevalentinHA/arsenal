# ==========================================================
# 🧠 ARSENAL — SCRIPTS : Volets séjour (commandes groupées)
# ----------------------------------------------------------
# 🎯 RÔLE FONDAMENTAL
#   Fournir des commandes GROUPÉES, strictement exécutives,
#   pour l’ouverture et la fermeture complètes des volets
#   du séjour (gauche et droit).
#
# ----------------------------------------------------------
# 🧱 RESPONSABILITÉ
#
#   - Orchestrer les scripts unitaires du séjour
#   - Garantir une exécution séquentielle fiable
#   - Appliquer une temporisation minimale compatible HomeKit
#
# ----------------------------------------------------------
# ⚙️ MODE DE FONCTIONNEMENT
#
#   - Appel exclusif des scripts unitaires :
#       • ouvrir_volet_sejour_gauche
#       • ouvrir_volet_sejour_droit
#       • fermer_volet_sejour_gauche
#       • fermer_volet_sejour_droit
#
#   - Délai volontaire entre chaque commande
#     afin d’éviter collisions radio / HomeKit.
#
# ----------------------------------------------------------
# 🧠 PHILOSOPHIE ARSENAL
#
#   - Aucune logique métier
#   - Aucune condition
#   - Aucune décision
#
#   ➜ Ces scripts exécutent.
#   ➜ Ils ne décident jamais.
#
# ----------------------------------------------------------
# 🔗 DÉPENDANCES
#
#   - Scripts unitaires volets séjour
#   - Chaîne HomeKit / radio fonctionnelle
#
# ----------------------------------------------------------
# ❌ CE QUE CES SCRIPTS NE FONT PAS
#
#   - Ne vérifient pas l’état réel des volets
#   - Ne compensent pas les défauts matériels
#   - Ne gèrent aucun contexte (pluie, présence, horaires)
#
# ----------------------------------------------------------
# 🧩 CAS D’USAGE
#
#   - Boutons Lovelace
#   - Scénarios globaux (extinction, départ, nuit)
#   - Appels depuis scripts ou automations de niveau supérieur
#
# ----------------------------------------------------------
# ✅ Compatibilité : Home Assistant 2024.8+
# ==========================================================

ouvrir_volets_sejour:
  alias: "Volets - Ouvrir séjour"
  mode: single
  sequence:
    - service: script.ouvrir_volet_sejour_gauche
    - delay: "00:00:01"
    - service: script.ouvrir_volet_sejour_droit

fermer_volets_sejour:
  alias: "Volets - Fermer séjour"
  mode: single
  sequence:
    - service: script.fermer_volet_sejour_gauche
    - delay: "00:00:01"
    - service: script.fermer_volet_sejour_droit

stop_volets_sejour:
  alias: "Volets - Stop séjour"
  mode: single
  sequence:
    - service: script.stop_volet_sejour_gauche
    - delay: "00:00:01"
    - service: script.stop_volet_sejour_droit
