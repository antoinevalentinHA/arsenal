# ==========================================================
# 🧠 ARSENAL — SCRIPT
#     Arrosage / Rain Bird — Station 1 courte supervisée (Run)
# ----------------------------------------------------------
# 🎯 RÔLE
#   DÉMARRER une irrigation supervisée de la station 1 — START COURT :
#   gardes complètes, durée paramétrable bornée, commande native
#   encapsulée, vérification de démarrage, ouverture de la session
#   persistée (Lot B), notification d'échec. Le script se termine dès
#   le démarrage prouvé (~ < 30 s). LA FIN N'EST PLUS PORTÉE ICI
#   (Lot D — audit « exécutions longues ») : la durée de session vit
#   dans les helpers de session (`arrosage_session_fin_prevue`) et la
#   fin nominale / reprise / watchdog sont portées par l'automation
#   indépendante `10270000000006`, qui appelle le même Stop supervisé.
#   Conforme au contrat 11 (mode manuel supervisé) :
#   00_documentation_arsenal/contrats/arrosage/11_mode_manuel_supervise.md
#
# 🧱 DOCTRINE (contrat 11 §2, §6, §7)
#   - Run = action exécutive : gardes COMPLÈTES (préconditions runtime
#     + pont disponible + aucune station déjà active). Plus strict que Stop.
#   - La commande native n'est JAMAIS exposée à l'UI : seule frontière =
#     ce script. La durée native n'est réglée QUE dans ce wrapper.
#   - Lot D (audit « exécutions longues ») : plus de `delay` long ni de
#     stop de fin de cycle dans ce script — l'état de session (Lot B)
#     porte l'échéance, l'automation `10270000000006` porte la fin
#     (stop supervisé + clôture + reprise + watchdog). Le Stop supervisé
#     vérifie et notifie son propre échec : on ne duplique pas sa
#     notification (anti-bruit).
#   - ⚠️ DEAD-MAN NATIF NON QUALIFIÉ : l'arrêt autonome du contrôleur à
#     l'échéance de la durée native n'a PAS été qualifié terrain
#     (protocole Lot C non exécuté — décision propriétaire 2026-07-05
#     d'avancer sans attendre). L'orchestration de fin HA ci-dessus est
#     donc la ceinture PRINCIPALE, le natif un filet présumé.
#   - Observation (06) : la preuve PRIMAIRE de démarrage est l'état 'on' du
#     SWITCH natif ; active_station n'est PAS probante (peut rester 'Idle'
#     pendant un arrosage réellement actif).
#   - ble_status / ble_last_error ne sont PAS une base de décision.
#
# 🔗 ENTITÉS
#   Gardes        : binary_sensor.rain_bird_pont_donnees_disponibles
#                   binary_sensor.arrosage_rain_bird_preconditions_runtime
#                   sensor.rain_bird_bat_bt_2_e9a3_active_station (repos avant lancement)
#   Durée         : input_number.arrosage_rainbird_station_1_duree_minutes (helper opérateur, borné [1,60])
#                   number.rain_bird_bat_bt_2_e9a3_station_1_duration (réglée depuis le helper, clampée)
#   Commande      : switch.rain_bird_bat_bt_2_e9a3_station_1
#   Confirmation  : switch.rain_bird_bat_bt_2_e9a3_station_1 == on (PREUVE PRIMAIRE)
#   Diag (notif)  : sensor.rain_bird_pont_sante,
#                   sensor.rain_bird_bat_bt_2_e9a3_bridge_wifi_rssi,
#                   sensor.rain_bird_bat_bt_2_e9a3_ble_rssi
#   Arrêt         : script.arrosage_rain_bird_stop_supervise
#   Notif         : script.notification_envoyer
#   Session (obs.): input_datetime.arrosage_session_debut / _fin_prevue,
#                   input_number.arrosage_session_duree_minutes,
#                   input_text.arrosage_session_verdict
#                   (écritures Lot B ; la fin observée est portée par
#                    l'automation 10270000000005 et la fin/clôture de
#                    session par l'automation 10270000000006 — PAS par
#                    ce script)
#
# 🧮 RÈGLE DE DÉMARRAGE (PREUVE PRIMAIRE = SWITCH NATIF)
#   Terrain (PR #96) : pendant un arrosage RÉELLEMENT actif de la station 1,
#   switch.…_station_1 = on alors que active_station peut rester 'Idle'.
#   La preuve PRIMAIRE du démarrage est donc l'état 'on' du SWITCH NATIF
#   station 1 — PAS active_station, qui reste une observation utile mais
#   N'EST PAS probante ici (cf. contrat 06 : ACK / état ≠ preuve).
#   Démarrage confirmé  ⇔  switch.…_station_1 == on dans le délai (15 s).
#   active_station reste lu pour la GARDE (station au repos avant lancement)
#   et comme INDICATIF dans la notification d'échec.
#
# 🚫 NE FAIT PAS
#   - Aucune station 2, aucun run_program, advance_station,
#     controller_mode, rain_delay, water_budget, OTA, firmware.
#   - Ne porte PLUS la durée de session : aucun `delay` long, aucune
#     attente de fin d'arrosage, aucun stop de fin de cycle (portés par
#     l'état de session + l'automation 10270000000006 — Lot D).
#   - Conserve le stop DE SÉCURITÉ sur démarrage non confirmé (inchangé).
#
# 🏷️ STATUT
#   Runtime supervisé — Arsenal v14.x
# ==========================================================

arrosage_rain_bird_station_1_courte_supervisee:
  alias: "Arrosage - Station 1 courte supervisée"
  mode: single

  sequence:

    - variables:
        station_switch: switch.rain_bird_bat_bt_2_e9a3_station_1
        station_duration: number.rain_bird_bat_bt_2_e9a3_station_1_duration
        active_sensor: sensor.rain_bird_bat_bt_2_e9a3_active_station
        # Durée opérateur lue depuis le helper borné, clampée défensivement à [1,60]
        # (repli 2 si indisponible). Le number.… natif n'est jamais exposé à l'UI.
        duree_minutes: "{{ [[states('input_number.arrosage_rainbird_station_1_duree_minutes') | int(2), 1] | max, 60] | min }}"
        idle_states: ['idle', 'none', 'off', '']
        dispo_ok: "{{ is_state('binary_sensor.rain_bird_pont_donnees_disponibles', 'on') }}"
        precond_ok: "{{ is_state('binary_sensor.arrosage_rain_bird_preconditions_runtime', 'on') }}"

    # =========================================================
    # 🛡️ GARDES COMPLÈTES — refus propre, aucune commande native
    # =========================================================
    # Refus si : pont indisponible, OU préconditions Run non satisfaites,
    # OU une station n'est pas au repos. Le repos exige DÉSORMAIS AUSSI le
    # switch natif `off` (preuve primaire, symétrie #96/#97 — durcissement
    # additif Lot D : active_station peut afficher 'Idle' pendant un
    # arrosage réel, le switch fait foi ; `unavailable` ⇒ refus honnête).
    # On NE déclenche PAS de Stop automatique : on ne masque pas un état
    # actif inattendu, on le signale (contrat 11 — refus explicite).
    - choose:
        - conditions:
            - condition: template
              value_template: >
                {{ not (dispo_ok and precond_ok
                        and (states(active_sensor) | lower in idle_states)
                        and is_state(station_switch, 'off')) }}
          sequence:
            - service: script.notification_envoyer
              data:
                cible: input_text.telephone_parent_1_notify
                titre: "💧 Arrosage – Station 1 refusée"
                message: >-
                  Lancement station 1 refusé : aucune commande native envoyée.
                  Pont disponible : {{ dispo_ok }}.
                  Préconditions runtime : {{ precond_ok }}.
                  Switch station 1 : {{ states(station_switch) }}.
                  active_station (indicatif) : {{ states(active_sensor) }}.
            - stop: "Refus : gardes Run non satisfaites"

    # =========================================================
    # 🧾 OBSERVABILITÉ SESSION — OUVERTURE (Lot B, additif)
    # =========================================================
    # Persiste l'état de session AVANT la commande native : début, durée
    # demandée (clampée), échéance THÉORIQUE de fin, verdict 'ouverte'.
    # L'échéance est LA base de la fin orchestrée (Lot D) : l'automation
    # `10270000000006` déclenche le stop dessus. Sémantique conservée
    # (début + durée) : le stop à échéance peut précéder la fin native de
    # ~15-20 s (confirmation) — direction sûre, biais assumé et documenté.
    # Un refus de gardes (ci-dessus) n'ouvre AUCUNE session : seule une
    # commande imminente en ouvre une.
    - service: input_datetime.set_datetime
      target:
        entity_id: input_datetime.arrosage_session_debut
      data:
        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
    - service: input_number.set_value
      target:
        entity_id: input_number.arrosage_session_duree_minutes
      data:
        value: "{{ duree_minutes }}"
    - service: input_datetime.set_datetime
      target:
        entity_id: input_datetime.arrosage_session_fin_prevue
      data:
        datetime: "{{ (now() + timedelta(minutes=duree_minutes | int(2))).strftime('%Y-%m-%d %H:%M:%S') }}"
    - service: input_text.set_value
      target:
        entity_id: input_text.arrosage_session_verdict
      data:
        value: "ouverte"

    # =========================================================
    # ▶️ COMMANDE ENCADRÉE — durée paramétrée (helper, clamp [1,60]) puis ouverture station 1
    # =========================================================
    - service: number.set_value
      target:
        entity_id: "{{ station_duration }}"
      data:
        value: "{{ duree_minutes }}"

    - service: switch.turn_on
      target:
        entity_id: "{{ station_switch }}"

    # =========================================================
    # ✅ CONFIRMATION DE DÉMARRAGE (15 s) — PREUVE = SWITCH NATIF
    # =========================================================
    # Preuve PRIMAIRE = switch.…_station_1 == on. active_station n'est PLUS
    # exigé non-idle : le terrain (PR #96) montre qu'il peut rester 'Idle'
    # pendant un arrosage réellement actif (cf. en-tête 🧮 et contrat 06).
    - wait_template: >
        {{ is_state(station_switch, 'on') }}
      timeout: "00:00:15"
      continue_on_timeout: true

    - choose:
        - conditions:
            - condition: template
              value_template: >
                {{ not is_state(station_switch, 'on') }}
          sequence:
            # Switch non confirmé 'on' : démarrage NON prouvé →
            # arrêt supervisé par sécurité + notif diagnostique.
            - service: script.arrosage_rain_bird_stop_supervise
            - service: script.notification_envoyer
              data:
                cible: input_text.telephone_parent_1_notify
                titre: "💧 Arrosage – Station 1 démarrage non confirmé"
                message: >-
                  Démarrage station 1 NON confirmé : le switch natif n'est pas
                  passé 'on' dans le délai (15 s). Arrêt supervisé déclenché par
                  sécurité.
                  switch station 1 : {{ states(station_switch) }}.
                  active_station (indicatif, non probant) : {{ states(active_sensor) }}.
                  Santé pont : {{ states('sensor.rain_bird_pont_sante') }}.
                  Préconditions runtime : {{ precond_ok }}.
                  Wi-Fi RSSI : {{ states('sensor.rain_bird_bat_bt_2_e9a3_bridge_wifi_rssi') }} dBm.
                  BLE RSSI : {{ states('sensor.rain_bird_bat_bt_2_e9a3_ble_rssi') }} dBm.
            # 🧾 Observabilité session (Lot B, additif) : session close en
            # anomalie — démarrage jamais prouvé. Écriture d'état pure.
            - service: input_text.set_value
              target:
                entity_id: input_text.arrosage_session_verdict
              data:
                value: "demarrage_non_confirme"
            - stop: "Démarrage station 1 non confirmé (switch non 'on')"

# ==========================================================
# 🏁 FIN DU START — la suite est portée par l'ÉTAT (Lot D)
# ----------------------------------------------------------
# Démarrage prouvé, session ouverte (verdict `ouverte`) : le script se
# termine ICI, sans `delay` ni stop de fin de cycle. La fin nominale
# (à `arrosage_session_fin_prevue`), la reprise post-redémarrage et le
# watchdog de dépassement sont portés par l'automation indépendante
# `10270000000006`, qui appelle le Stop supervisé et pose le verdict
# terminal. La fin OBSERVÉE (switch on → off) reste horodatée par
# l'automation `10270000000005`. Aucune instance vivante ne porte plus
# la durée d'arrosage : l'état de session est la seule vérité.
# ==========================================================
