# ==========================================================
# 🧠 ARSENAL — SCRIPT : Garage — Bascule eclairage synchronisee
# ----------------------------------------------------------
# 🎯 ROLE FONDAMENTAL
#   Orchestrateur UNIQUE de bascule de l'eclairage du garage,
#   base sur un etat logique memorise.
#
#   Ce script ne lit pas l'etat reel de la lampe.
#   Il applique une bascule coherente entre :
#     - un etat logique de reference
#     - une commande de relais
#
# ----------------------------------------------------------
# 🧱 CONTRAINTE MATERIELLE
#
#   L'eclairage du garage est commande via :
#     - un relais Zigbee
#     - sans capteur de verite physique independant
#
#   Le relais n'est pas considere comme preuve suffisante
#   de l'etat reel de la lampe au sens du contrat.
#
# ----------------------------------------------------------
# 🧠 PRINCIPE DE VERITE
#
#   La source de verite logique du sous-systeme est :
#     - input_boolean.garage_light_state
#
# ----------------------------------------------------------
# 🧠 LOGIQUE DE BASCULE
#
#   - OFF → ON  : demande allumage
#   - ON  → OFF : demande extinction
#
# ----------------------------------------------------------
# 📍 Entite :
#   script.garage_toggle
# ==========================================================

garage_toggle:
  alias: "Éclairage - Garage - Toggle"
  mode: single

  sequence:
    - choose:

        # 🟢 Passage OFF → ON
        - conditions:
            - condition: state
              entity_id: input_boolean.garage_light_state
              state: "off"
          sequence:
            - service: switch.turn_on
              target:
                entity_id: switch.lumiere_garage

            - delay: "00:00:00.200"

            - service: input_boolean.turn_on
              target:
                entity_id: input_boolean.garage_light_state

        # 🔴 Passage ON → OFF
        - conditions:
            - condition: state
              entity_id: input_boolean.garage_light_state
              state: "on"
          sequence:
            - service: switch.turn_off
              target:
                entity_id: switch.lumiere_garage

            - delay: "00:00:00.200"

            - service: input_boolean.turn_off
              target:
                entity_id: input_boolean.garage_light_state