# ==========================================================
# FICHIER : utility_meter.yaml
# ----------------------------------------------------------
# Rôle :
# Définition des compteurs Utility Meter pour le suivi
# des consommations (électricité, gaz, durées, estimations).
#
# Principes retenus :
# - AUCUNE modification des entity_id existants
# - Classement par grandes familles fonctionnelles
# - Ordre logique : journalier → hebdomadaire → mensuel → annuel
# - Commentaires explicites pour maintenance et audit
#
# Compatibilité : Home Assistant 2024.8+
# ==========================================================

############################################################
# 🔌 ÉLECTRICITÉ — APPAREILS DOMESTIQUES
############################################################

# ----------------------------------------------------------
# Déshumidificateur (cave)
# ----------------------------------------------------------

deshumidificateur_daily_energy:
  source: sensor.deshumidificateur_energy_proxy
  cycle: daily

deshumidificateur_weekly_energy:
  source: sensor.deshumidificateur_energy_proxy
  cycle: weekly

deshumidificateur_monthly_energy:
  source: sensor.deshumidificateur_energy_proxy
  cycle: monthly

deshumidificateur_yearly_energy:
  source: sensor.deshumidificateur_energy_proxy
  cycle: yearly

