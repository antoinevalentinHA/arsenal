# ==========================================================
# 🧠 ARSENAL — COUNTER
#     Climatisation — Retries d'exécution
# ----------------------------------------------------------
# 🎯 RÔLE
#   Comptabiliser les échecs consécutifs d'exécution de la
#   climatisation afin de piloter la stratégie de reprise.
#
# 🧩 PÉRIMÈTRE
#   - Accumulateur de comptage persistant uniquement
#   - Comptage des retries techniques d'exécution
#   - Aucune logique métier locale
#   - Aucun comportement autonome
#   - Aucune interprétation causale implicite
#
# 🔖 NATURE
#   Compteur de retries | Accumulateur de diagnostic
#
# 📋 PARAMÈTRES
#   initial : 0
#   step    : 1
#   restore : true — persistance explicite au redémarrage ; le défaut HA de counter.restore est déjà true ; mécanisme conçu résilient au reboot.
#
# 🚫 INTERDITS
#   - Confondre comptage et décision
#   - Constituer à lui seul une autorité décisionnelle
#   - Incrémenter sans traçabilité vers l'auteur
#   - Remettre à zéro sans justification explicite
#   - Déduire une causalité sans analyse externe
#
# 🏷️ STATUT
#   Socle — Arsenal v14.x
# ==========================================================

clim_execution_retry_count:
  name: "Clim – Compteur de retry"
  # initial VOULU — compteur
  # Raison : valeur de reset du compteur ; persistance au reboot gouvernée par restore: true.
  # Restauration HA volontairement conservée : oui
  initial: 0
  restore: true
  minimum: 0
  maximum: 3
  step: 1
  icon: mdi:repeat