# ==========================================================
# 🧠 ARSENAL — INPUT_DATETIME : Analyse deltaT disponible
# ----------------------------------------------------------
# 🎯 Rôle :
#   Mémorisation de la DATE ET HEURE
#   à partir desquelles une analyse de deltaT
#   est considérée comme DISPONIBLE et exploitable.
#
#   Ce helper sert de REPÈRE TEMPOREL
#   dans le pipeline d’aération / reprise thermique.
#
# 🧩 Nature :
#   Mémoire PERSISTANTE — horodatage de référence.
#
# ❌ Ne fait PAS :
#   - Ne calcule PAS le deltaT
#   - Ne décide PAS d’aérer ou de chauffer
#   - Ne déclenche AUCUNE action
