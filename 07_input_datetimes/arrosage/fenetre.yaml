#                     avant que le soleil ne chauffe ; à régler disjoint
#                     du secours)
#
# 🚫 INTERDITS
#   - Confondre stockage et décision
#   - Déclencher directement un arrosage
#
# 🏷️ STATUT
#   Socle arrosage — Arsenal v14.x
# ==========================================================

