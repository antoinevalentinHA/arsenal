# ==========================================================
# 🧠 ARSENAL — INPUT_DATETIME : ECS (planning hebdomadaire)
# ----------------------------------------------------------
# 🎯 Rôle :
#   Définition des HEURES DE RÉFÉRENCE utilisées
#   pour le planning hebdomadaire de production ECS.
#
#   Ces helpers définissent QUAND la chauffe ECS
#   est AUTORISÉE selon :
#     • le jour de la semaine
#     • le créneau (matin / soir)
#
# 🧩 Nature :
#   Paramètres MÉTIER — planification horaire hebdomadaire.
#
# ❌ Ne fait PAS :
#   - Ne déclenche PAS directement la chauffe ECS
#   - Ne pilote PAS la chaudière
#   - Ne garantit PAS l’exécution d’un cycle
#   - Ne remplace PAS la décision centrale ECS
#
# 🔍 Spécificité technique :
#   - Heure uniquement (pas de date)
#   - Planning réutilisé chaque semaine
#   - Accès dynamique par jour :
#       ecs_<day>_matin_heure
#       ecs_<day>_soir_heure
#
# 🔄 Fonctionnement :
#   - Les heures sont définies manuellement
#     via les dashboards de réglage ECS.
#   - Les capteurs et automatisations :
#       • comparent le jour courant
#       • comparent l’heure courante
#       • déterminent une fenêtre ECS autorisée
#
# 🔗 Utilisation :
#   - Capteurs binaires ECS :
#       • Fenêtre de chauffe ponctuelle active
#   - Automatisations ECS :
#       • Gardien consigne
#       • Autorisations conditionnelles
#   - Dashboards :
#       • Paramétrage hebdomadaire
#       • Lecture du planning
#
# 🧠 Principe Arsenal associé :
#   - Séparation stricte entre :
#       • Planification (input_datetime)
#       • Autorisation (capteurs)
#       • Décision (logique ECS)
#       • Action réelle (pipeline ECS)
#
# ⚠️ Remarque :
#   Modifier ces valeurs change le PLANNING
#   autorisé, jamais l’état immédiat
#   de la production ECS.
# ==========================================================

