# ==========================================================
# 🧠 ARSENAL — CARTE UI
#     Navigation — Dynamique
#
# 🗂️ COUCHE : 20_transverses/navigation
# 🧱 TYPE UI : action
# 🔍 NIVEAU DE CONFIANCE : indicatif
# ==========================================================
#
# 🎯 RÔLE
#   Permet la navigation vers un dashboard tout en
#   exposant un état synthétique via la couleur de l’icône.
#
# 📡 SOURCE
#   - navigation_path (hérité de bouton_navigation)
#   - variables.etat_dashboard (entité externe)
#
# ⚙️ LOGIQUE UI
#   - basé sur bouton_navigation
#   - tap_action : navigate
#   - couleur icône déterminée par l’état de variables.etat_dashboard :
#       alert   → rouge
#       normal  → bleu
#       confort → vert
#       eco     → bleu clair
#       standby/off → gris
#       indisponible → gris
#
# 📐 USAGE
#   - utilisé pour accéder à un dashboard tout en exposant
#     un état global synthétique
#   - la couleur est une interprétation locale (non contractuelle)
#   - ne doit pas être utilisée comme source de décision
# ==========================================================

bouton_navigation_dynamique:
  template: bouton_navigation

  styles:
    icon:
      - color: |
          [[[
            const sensor = variables?.etat_dashboard;
            if (!sensor || !states[sensor]) {
              return "rgb(158, 158, 158)";
            }

            const st = states[sensor].state;

            const map = {
              alert:   "rgb(244, 67, 54)",
              normal:  "rgb(33, 150, 243)",
              confort: "rgb(76, 175, 80)",
              eco:     "rgb(33, 150, 243)",
              standby: "rgb(158, 158, 158)",
              off:     "rgb(158, 158, 158)"
            };

            return map[st] ?? "rgb(158, 158, 158)";
          ]]]