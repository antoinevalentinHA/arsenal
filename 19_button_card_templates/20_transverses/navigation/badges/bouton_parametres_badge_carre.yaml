# ==========================================================
# 🧠 ARSENAL — CARTE UI
#     Navigation — Paramètres (badge carré)
#
# 🗂️ COUCHE : 20_transverses/navigation
# 🧱 TYPE UI : action
# 🔍 NIVEAU DE CONFIANCE : fort
# ==========================================================
#
# 🎯 RÔLE
#   Permet l'accès rapide à la vue Paramètres
#   du dashboard Arsenal.
#
# 📡 SOURCE
#   - navigation_path : /dashboard-reglages/0
#
# ⚙️ LOGIQUE UI
#   - basé sur bouton_navigation_base
#   - icône : mdi:cog
#   - label : "Paramètres"
#   - tap_action : navigate vers la vue paramètres
#   - aucune autre interaction
#
# 📐 USAGE
#   - utilisé comme point d'entrée vers la vue paramètres
#   - carte transverse réutilisable sur plusieurs dashboards
#   - ne déclenche aucune action backend
# ==========================================================

bouton_parametres_badge_carre:
  template: bouton_navigation_base
  name: Paramètres
  icon: mdi:cog
  tap_action:
    action: navigate
    navigation_path: /dashboard-reglages/0