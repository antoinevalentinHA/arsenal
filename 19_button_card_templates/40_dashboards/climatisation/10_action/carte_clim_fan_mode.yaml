# ==========================================================
# 🧠 ARSENAL — CARTE UI
#     Climatisation — Mode de ventilation (bouton par mode)
#
# 🔖 NATURE  : carte_action
# 🖼️ TYPE UI : action
# 🎚️ CONFIANCE : total
# ==========================================================
# 🎯 RÔLE
#   Bouton de mode de ventilation : affiche si un fan_mode donné
#   est actif (état réel) et permet de l'appliquer, avec confirmation.
#
# 🧩 PÉRIMÈTRE
#   - Affichage de l'état réel (couleur charte) + action confirmée
#   - Une instance par mode (variables.mode), instanciée en rangée
#   - Aucune décision métier, aucun pilotage direct d'équipement
#
# 🎛️ PARAMÈTRES (instance)
#   - variables.mode : quiet | low | medium | high | auto
#
# 🔗 DÉPENDANCES
#   Lit      : sensor.clim_mode_de_ventilation_local (fan_mode réel)
#   Appelle  : script.clim_set_fan_mode (data.mode = variables.mode)
#   Template : socle_action_script_confirme (confirmation + call-service)
#
# 🎨 COULEURS (charte ui/couleurs/02_palette.md)
#   - 🔵 bleu  rgba(33,150,243,0.2)  : mode actif (ventilation/technique)
#   - ⚪ gris  rgba(158,158,158,0.2) : mode inactif
#   - ⚪ gris faible rgba(158,158,158,0.1) : indisponible / inconnu
#
# 🚫 INTERDITS
#   - Prendre une décision métier
#   - Piloter l'équipement sans passer par le script
#   - Devenir une source de vérité système
#
# 🏷️ STATUT
#   Carte UI — Arsenal (chantier ventilation clim, Lot V3)
# ==========================================================

carte_clim_fan_mode:
  template: socle_action_script_confirme

  entity: sensor.clim_mode_de_ventilation_local
  show_state: false
  show_name: true
  show_icon: true
  icon: mdi:fan

  name: >
    [[[
      const m = {quiet: 'Silencieux', low: 'Faible', medium: 'Moyen', high: 'Fort', auto: 'Auto Fujitsu'};
      return m[variables.mode] || variables.mode;
    ]]]

  tap_action:
    action: call-service
    service: script.clim_set_fan_mode
    service_data:
      mode: "[[[ return variables.mode; ]]]"
    confirmation:
      text: "⚠️ Changer le mode de ventilation de la climatisation ?"

  styles:
    card:
      - background-color: >
          [[[
            if (!entity || entity.state === 'unavailable' || entity.state === 'unknown')
              return 'rgba(158, 158, 158, 0.1)';
            return entity.state === variables.mode
              ? 'rgba(33, 150, 243, 0.2)'
              : 'rgba(158, 158, 158, 0.2)';
          ]]]
