# ==========================================================
# 🧠 ARSENAL — TEMPLATE UI METIER
#     Climatisation — Décision et cohérence état réel / raison
# ==========================================================
#
# 📌 STATUT
#     TEMPLATE UI METIER
#
# 🎯 ROLE
#     Affiche l'état réel de la climatisation et reflète la cohérence
#     décision/exécution lue depuis le backend
#     (binary_sensor.clim_incoherence_decision_reel).
#     Colore selon cette cohérence ; l'orange nuance un état cohérent
#     mais explicitement bloqué.
#     Carte GLOBALE : elle restitue l'état réel physique et la décision
#     globale de la climatisation. Elle est indépendante de
#     input_select.clim_conditions_mode (helper d'affichage par mode) et
#     ne doit jamais être pilotée par lui. La raison affichée est la
#     raison globale (sensor.clim_raison_decision), distincte du verdict
#     par mode (sensor.clim_verdict_cool | _dry | _heat).
#
# 🧱 NATURE
#     - Template button-card
#     - Spécialisation de socle_decision_72
#     - UI uniquement (aucune décision)
#
# 🎨 SEMANTIQUE
#     - clim_incoherence_decision_reel == on            -> 🔴 rouge  (incohérence, prioritaire)
#     - == off + clim_bloquee on + action arrêt/bloquée -> 🟠 orange (blocage explicite, état cohérent)
#     - == off sans blocage explicite                   -> 🟢 vert   (cohérent nominal)
#     - == unknown / unavailable                        -> ⚪ gris   (indisponibilité)
#
# 🔗 DEPENDANCES
#     - entity                                       : sensor état réel clim
#       (cool_actif | dry_actif | heat_actif | arret | bloquee)
#     - binary_sensor.clim_incoherence_decision_reel : verdict de cohérence (autorité)
#     - binary_sensor.clim_bloquee                   : nuance orange (blocage explicite)
#     - sensor.clim_raison_decision                  : affiché en label uniquement
#
# ⚠️ CONTRAINTES
#     - La frontière cohérent/incohérent est tranchée UNIQUEMENT par
#       binary_sensor.clim_incoherence_decision_reel
#     - L'orange est une nuance interne à l'état cohérent ; il ne masque
#       jamais un rouge (rouge évalué en premier)
#     - Aucun recalcul de cohérence raison/action côté UI
#     - Symétrique de carte_chauffage_decision — même pattern, domaine clim
#
# 🧩 USAGE
#     type: custom:button-card
#     template: carte_clim_decision
#     entity: sensor.clim_etat_reel
#
# ==========================================================

carte_clim_decision:
  template: socle_decision_72

  name: Clim – État réel & décision globale

  state_display: |
    [[[
      // Abstention native du capteur (source HVAC rapportée indisponible) :
      // rendu explicite, jamais le code brut ni un repli sur un état nominal.
      const UNAV = ['unknown','unavailable','none','',undefined,null];
      if (UNAV.includes(entity.state)) return 'Indisponible';

      const map = {
        'cool_actif': 'Refroidissement actif',
        'dry_actif': 'Déshumidification active',
        'heat_actif': 'Chauffage actif',
        'arret': 'À l’arrêt',
        'bloquee': 'Bloquée'
      };
      return map[entity.state] || entity.state;
    ]]]

  label: |
    [[[
      const raison = states['sensor.clim_raison_decision']?.state || '—';
      return `Raison globale : ${raison}`;
    ]]]

  state:
    # Backend indisponible → gris indisponibilité
    - operator: template
      value: |
        [[[
          const inc = states['binary_sensor.clim_incoherence_decision_reel']?.state;
          return inc !== 'on' && inc !== 'off';
        ]]]
      styles:
        card:
          - background-color: rgba(158, 158, 158, 0.1)

    # Incohérence backend → rouge (prioritaire, jamais masqué)
    - operator: template
      value: |
        [[[
          return states['binary_sensor.clim_incoherence_decision_reel']?.state === 'on';
        ]]]
      styles:
        card:
          - background-color: rgba(244,67,54,0.2)

    # Cohérent + blocage explicite → orange (nuance dans un état déjà cohérent)
    - operator: template
      value: |
        [[[
          const inc = states['binary_sensor.clim_incoherence_decision_reel']?.state;
          const action = entity.state;
          const bloquee = states['binary_sensor.clim_bloquee']?.state === 'on';
          return inc === 'off' && bloquee && (action === 'bloquee' || action === 'arret');
        ]]]
      styles:
        card:
          - background-color: rgba(255, 152, 0, 0.2)

    # Cohérent sans blocage → vert
    - operator: default
      styles:
        card:
          - background-color: rgba(76,175,80,0.2)