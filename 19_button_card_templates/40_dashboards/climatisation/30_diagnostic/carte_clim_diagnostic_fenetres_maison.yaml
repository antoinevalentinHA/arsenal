# ==========================================================
# 🧠 ARSENAL — TEMPLATE UI METIER
#     Climatisation — Diagnostic fenêtres maison
# ==========================================================
#
# 📌 STATUT
#     TEMPLATE UI METIER
#
# 🎯 ROLE
#     Indique si au moins une ouverture maison est considérée
#     bloquante pour l'autorisation climatisation.
#     Diagnostic pur, aucune interaction.
#
# 🧱 NATURE
#     - Template button-card
#     - Spécialisation de socle_status_label_72
#     - UI uniquement (aucune décision)
#
# 🎨 SEMANTIQUE
#     - state = off -> 🟢 vert "Aucune ouverture bloquante" (clim autorisée)
#     - state = on  -> ⚪ gris "Ouverture bloquante"       (blocage clim possible)
#
# 🔗 DEPENDANCES
#     - entity : binary_sensor.fenetre_ouverte_maison_avec_delai
#
# ⚠️ CONTRAINTES
#     - Sémantique inversée : ON = état dégradé (gris), OFF = nominal (vert)
#     - La carte consomme la primitive métier temporisée utilisée par les
#       autorisations climatisation, et non l'ouverture physique instantanée.
#     - Pas de rouge — une ouverture bloquante est une contrainte de confort,
#       pas une alerte critique.
#     - Aucune action définie
#
# 🧩 USAGE
#     type: custom:button-card
#     template: carte_clim_diagnostic_fenetres_maison
#     entity: binary_sensor.fenetre_ouverte_maison_avec_delai
#
# ==========================================================

carte_clim_diagnostic_fenetres_maison:
  template: socle_status_label_72

  entity: binary_sensor.fenetre_ouverte_maison_avec_delai

  show_state: false
  show_name: true
  show_label: true
  color_type: card

  label: |
    [[[
      return entity.state === "off"
        ? "Aucune ouverture bloquante"
        : "Ouverture bloquante";
    ]]]

  styles:
    card:
      - background-color: |
          [[[
            return entity.state === "off"
              ? "rgba(76, 175, 80, 0.2)"
              : "rgba(158, 158, 158, 0.2)";
          ]]]