# ==========================================================
# 🧠 ARSENAL — TEMPLATE UI METIER
#     Climatisation — Diagnostic blocage aération étage
# ==========================================================
#
# 📌 STATUT
#     TEMPLATE UI METIER
#
# 🎯 ROLE
#     Indique si le blocage climatisation lié à l'aération
#     préférable de l'étage est réellement actif.
#     Diagnostic pur — aucune interaction.
#
# 🧱 NATURE
#     - Template button-card
#     - Spécialisation de socle_status_label_72
#     - UI uniquement (aucune décision)
#
# 🎨 SEMANTIQUE
#     - state = on  -> 🔴 rouge "Blocage actif"
#     - state = off -> 🟢 vert  "Aucun blocage"
#
# 🔗 DEPENDANCES
#     - entity : binary_sensor.clim_blocage_aeration_etage_reel
#
# ⚠️ CONTRAINTES
#     - Lit le blocage réel, pas la recommandation brute d'aération
#     - Le blocage n'est actif que si la garde opérateur est armée
#       ET si l'aération étage est préférable
#     - Impacte COOL et DRY
#     - Aucune action définie
#
# 🧩 USAGE
#     type: custom:button-card
#     template: carte_clim_diagnostic_aeration_etage
#     entity: binary_sensor.clim_blocage_aeration_etage_reel
#
# ==========================================================

carte_clim_diagnostic_aeration_etage:
  template: socle_status_label_72

  entity: binary_sensor.clim_blocage_aeration_etage_reel

  show_state: false
  show_name: true
  show_label: true
  show_icon: true
  color_type: card

  icon: mdi:window-open-variant

  label: |
    [[[
      return entity.state === "on"
        ? "Blocage actif"
        : "Aucun blocage";
    ]]]

  styles:
    card:
      - background-color: |
          [[[
            return entity.state === "on"
              ? "rgba(244, 67, 54, 0.2)"
              : "rgba(76, 175, 80, 0.2)";
          ]]]