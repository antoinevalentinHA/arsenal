# ==========================================================
# 🧠 ARSENAL — TEMPLATE UI METIER
#     Climatisation — Synthèse d'état
# ==========================================================
#
# 📌 STATUT
#     TEMPLATE UI METIER
#
# 🎯 ROLE
#     Afficher une synthese lisible de l'etat local de la
#     climatisation, du mode actif et de la consigne appliquee.
#
# 🧱 NATURE
#     - Template button-card
#     - Specialisation de socle_status_label_xl_interactif
#     - UI uniquement (aucune decision)
#
# 🎨 SEMANTIQUE
#     - mode = cool -> bleu
#     - mode = dry -> vert
#     - mode = heat -> rouge
#     - mode = off -> gris neutre
#     - autre / defaut -> gris neutre
#
# 🔗 DEPENDANCES
#     - entity: sensor.clim_mode_local
#     - attributes: aucune
#     - helpers externes:
#         - sensor.consigne_clim_appliquee
#
# ⚠️ CONTRAINTES
#     - Ce template ne calcule pas le mode cible
#     - Il restitue uniquement l'etat local expose par le backend
#     - Navigation vers le dashboard climatisation sur tap_action
#
# 🧩 USAGE
#     Exemple minimal :
#       type: custom:button-card
#       template: carte_clim_synthese
#       entity: sensor.clim_mode_local
#
# ==========================================================

carte_clim_synthese:
  template: socle_status_label_xl

  entity: sensor.clim_mode_local

  icon: |
    [[[
      const mode = (entity.state || '').toLowerCase();
      if (mode === 'dry')  return 'mdi:water-percent';
      if (mode === 'heat') return 'mdi:fire';
      if (mode === 'off')  return 'mdi:power-standby';
      return 'mdi:snowflake';
    ]]]

  state_display: |
    [[[
      const mode = (entity.state || '').toLowerCase();
      if (mode === 'cool') return 'Actif';
      if (mode === 'dry')  return 'Déshumid.';
      if (mode === 'heat') return 'Chauffage';
      if (mode === 'off')  return 'Veille';
      return mode || 'Inconnu';
    ]]]

  label: |
    [[[
      const consigne = states['sensor.consigne_clim_appliquee']?.state;
      const mode = (entity.state || '').toLowerCase();

      if (mode === 'off') return '';
      if (mode === 'cool')
        return 'Consigne : ' +
          ((!consigne || ['unavailable','unknown'].includes(consigne)) ? '-' : consigne) + '°C';
      if (mode === 'dry')  return 'Déshumidification';
      if (mode === 'heat') return 'Chauffage léger';
      return 'État : ' + (mode || '-');
    ]]]

  state:
    # 🧊 COOL
    - operator: template
      value: |
        [[[
          return (entity.state || '').toLowerCase() === 'cool';
        ]]]
      styles:
        card:
          - background-color: rgba(33, 150, 243, 0.2)

    # ✅ DRY
    - operator: template
      value: |
        [[[
          return (entity.state || '').toLowerCase() === 'dry';
        ]]]
      styles:
        card:
          - background-color: rgba(76,175,80,0.2)

    # 🔥 HEAT
    - operator: template
      value: |
        [[[
          return (entity.state || '').toLowerCase() === 'heat';
        ]]]
      styles:
        card:
          - background-color: rgba(244,67,54,0.2)

    # ⚪ OFF
    - operator: template
      value: |
        [[[
          return (entity.state || '').toLowerCase() === 'off';
        ]]]
      styles:
        card:
          - background-color: rgba(158,158,158,0.2)

    # 💤 Défaut
    - operator: default
      styles:
        card:
          - background-color: rgba(158,158,158,0.2)
