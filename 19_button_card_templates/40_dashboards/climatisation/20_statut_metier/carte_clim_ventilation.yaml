# ==========================================================
# 🧠 ARSENAL — TEMPLATE UI METIER
#     Climatisation — Mode de ventilation appliqué (statut passif)
# ==========================================================
#
# 📌 STATUT
#     TEMPLATE UI METIER
#
# 🎯 ROLE
#     Afficher, en lecture seule, le mode de ventilation réellement
#     appliqué par la climatisation (fan_mode), accompagné du contexte
#     utile (souhait utilisateur ou reprise du silencieux automatique).
#     Carte de supervision — sœur visuelle de carte_clim_synthese.
#
# 🧱 NATURE
#     - Template button-card
#     - Spécialisation de socle_status_label_xl
#     - UI uniquement (aucune décision, aucune action)
#     - Lecture directe de l'état réel exposé par le backend
#
# 🎨 SEMANTIQUE (palette Arsenal — 02_palette.md)
#     La ventilation pilotée par Arsenal est une information TECHNIQUE de
#     supervision : une vitesse réelle exploitable (quiet/low/medium/high)
#     relève du bleu canonique (02_palette.md : « Ventilation / extraction /
#     supervision »). Le fan_mode `auto` constructeur n'est PAS un mode
#     fonctionnel Arsenal (non piloté, hors usage maison) : il est signalé en
#     orange (avertissement non bloquant). Le verdict détaillé et la doctrine
#     de conformité relèvent du dashboard diagnostic, pas de cette carte.
#     - vitesses Arsenal (quiet/low/medium/high) -> 🔵 bleu (technique/supervision)
#     - auto constructeur                         -> 🟠 orange (hors doctrine, attention)
#     - unknown / unavailable                     -> ⚪ gris indisponibilité (prime sur tout, R6)
#
# 🔗 DEPENDANCES
#     - entity : sensor.clim_mode_de_ventilation_local (fan_mode réel)
#     - helpers externes :
#         - sensor.clim_origine_ventilation (origine de pilotage — label)
#         - input_select.clim_fan_mode_cible (mode souhaité, libellés FR)
#
# ⚠️ CONTRAINTES
#     - Aucune logique métier locale : restitution d'un état déjà calculé
#     - Toutes les actions désactivées (carte passive)
#     - Ne pilote rien et ne décide rien
#
# 🧩 USAGE
#     type: custom:button-card
#     template: carte_clim_ventilation
#
# ==========================================================

carte_clim_ventilation:
  template: socle_status_label_xl

  entity: sensor.clim_mode_de_ventilation_local

  icon: |
    [[[
      const m = (entity.state || '').toLowerCase();
      if (['unavailable', 'unknown', 'none', ''].includes(m)) return 'mdi:fan-off';
      if (m === 'quiet') return 'mdi:volume-off';
      return 'mdi:fan';
    ]]]

  state_display: |
    [[[
      const m = (entity.state || '').toLowerCase();
      const map = {
        quiet:  'Silencieux',
        low:    'Faible',
        medium: 'Moyen',
        high:   'Fort',
        auto:   'Auto constructeur'
      };
      return map[m] || 'Indisponible';
    ]]]

  label: |
    [[[
      // Le label n'affiche que l'information NON tautologique, portée par
      // l'origine de pilotage (contrat 12_ventilation_intention §10/§12).
      const origine = states['sensor.clim_origine_ventilation']?.state;

      if (origine === 'silencieux_auto') {
        const intent = states['input_select.clim_fan_mode_cible']?.state;
        const UNAV = ['unavailable', 'unknown', 'none', undefined, null, ''];
        return 'Silencieux auto · retour ' + (UNAV.includes(intent) ? '-' : intent);
      }
      if (origine === 'incompatible') return 'Mode souhaité non disponible';
      // intention (nominal) / indisponible : aucun libellé redondant
      return '';
    ]]]

  state:
    # ⚪ Indisponibilité — gris indispo canon (prime sur tout, R6)
    - operator: template
      value: |
        [[[
          const m = (entity.state || '').toLowerCase();
          return ['unavailable', 'unknown', 'none', ''].includes(m);
        ]]]
      styles:
        card:
          - background-color: rgba(158,158,158,0.1)

    # 🟠 auto constructeur — état non piloté par Arsenal (hors doctrine) :
    #    avertissement non bloquant, jamais présenté comme mode normal
    - operator: template
      value: |
        [[[
          return (entity.state || '').toLowerCase() === 'auto';
        ]]]
      styles:
        card:
          - background-color: rgba(255,152,0,0.2)

    # 🔵 Défaut — vitesse Arsenal exploitable : bleu technique (ventilation/supervision)
    - operator: default
      styles:
        card:
          - background-color: rgba(33,150,243,0.2)
