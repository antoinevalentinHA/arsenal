# ==========================================================
# 🧠 ARSENAL — TEMPLATE UI METIER
#     Climatisation — Synthèse statut COOL / HEAT / DRY
# ==========================================================
#
# 📌 STATUT
#     TEMPLATE UI METIER
#
# 🎯 ROLE
#     Tuile générique de LECTURE des seuils / besoins par mode
#     (cool, heat, dry). Restitue fidèlement l'état des capteurs de
#     seuil réellement lus (allumage / extinction / humidex), SANS
#     vocabulaire d'action réelle ni d'autorisation, et sans arbitrage
#     global. UI pure, aucune décision. Paramétrable via variables —
#     un seul template couvre les trois modes.
#
# 🧱 NATURE
#     - Template button-card
#     - Spécialisation de socle_status_label_72
#     - UI uniquement (aucune décision)
#
# 🎨 SEMANTIQUE (palette sémantique Arsenal — 02_palette.md)
#     Lecture de seuil/besoin : un seuil franchi est une INFORMATION
#     technique (🔵 bleu), pas un état favorable, pas une alerte, pas une
#     action. L'absence de besoin est neutre (⚪ gris neutre).
#
#     Mode dry (kind = 'dry') :
#     - entity_on = on   -> 🔵 bleu  "Humidex au-dessus du seuil"
#     - entity_on = off  -> ⚪ gris  "Humidex sous le seuil"
#
#     Mode cool / heat (kind = 'cool' | 'heat') :
#     - entity_on (seuil allumage) = on    -> 🔵 bleu "Seuil d'allumage atteint"
#     - sinon entity_off (extinction) = on -> ⚪ gris "Seuil d'extinction atteint"
#     - sinon (dans l'hystérésis)          -> ⚪ gris "Entre seuils"
#
#     Toute valeur unavailable             -> ⚪ gris indispo "Indisponible"
#
# 🔗 DEPENDANCES
#     - variables.kind       : "cool" | "heat" | "dry"
#     - variables.entity_on  : binary_sensor d'allumage / autorisation
#     - variables.entity_off : binary_sensor de maintien (optionnel, ignoré en mode dry)
#
# ⚠️ CONTRAINTES
#     - entity_off est optionnel pour dry ; pour cool/heat il porte le
#       seuil d'extinction (son absence masque l'état "Seuil d'extinction
#       atteint", la tuile retombant sur "Entre seuils")
#     - Lecture pure : aucune action, aucune autorisation, aucun arbitrage
#       global ne sont déduits ; la tuile nomme uniquement le seuil franchi
#     - La logique label et couleur est dupliquée dans deux blocs JS distincts —
#       dette technique à factoriser si le template évolue
#
# 🧩 USAGE
#     type: custom:button-card
#     template: clim_synthese_status_72
#     variables:
#       kind: cool
#       entity_on:  binary_sensor.clim_seuil_allumage_cool_atteint
#       entity_off: binary_sensor.clim_seuil_extinction_cool_atteint
#
# ==========================================================

clim_synthese_status_72:
  template: socle_status_label_72

  show_state: false
  show_name: true
  show_label: true
  show_icon: true
  color_type: card

  label: |
    [[[
      const st = (id) => states[id]?.state;
      const UNAV = ['unknown','unavailable',undefined,null,'none',''];

      const kind   = variables.kind;
      const id_on  = variables.entity_on;
      const id_off = variables.entity_off;

      const s_on  = st(id_on);
      const s_off = id_off ? st(id_off) : undefined;

      if (UNAV.includes(s_on) || (id_off && UNAV.includes(s_off))) return "Indisponible";

      // dry : un seul seuil (humidex au-dessus / sous la cible)
      if (kind === 'dry') {
        return (s_on === 'on') ? "Humidex au-dessus du seuil" : "Humidex sous le seuil";
      }

      // cool / heat : lecture des seuils d'allumage / extinction (couche besoin)
      if (s_on === 'on')  return "Seuil d'allumage atteint";
      if (s_off === 'on') return "Seuil d'extinction atteint";
      return "Entre seuils";
    ]]]

  styles:
    card:
      - background-color: |
          [[[
            // Palette SEMANTIQUE Arsenal (02_palette.md) : lecture de seuil/besoin.
            // Seuil/besoin franchi = information (bleu) ; sinon neutre (gris).
            const st = (id) => states[id]?.state;
            const UNAV = ['unknown','unavailable',undefined,null,'none',''];

            const kind   = variables.kind;
            const id_on  = variables.entity_on;
            const id_off = variables.entity_off;

            const s_on  = st(id_on);
            const s_off = id_off ? st(id_off) : undefined;

            // Gris indisponibilité — prime sur tout (05_regles, R6)
            if (UNAV.includes(s_on) || (id_off && UNAV.includes(s_off)))
              return "rgba(158,158,158,0.1)";

            // dry : besoin présent (humidex au-dessus de la cible) = information
            if (kind === 'dry') {
              return (s_on === 'on')
                ? "rgba(33,150,243,0.2)"
                : "rgba(158,158,158,0.2)";
            }

            // cool / heat : seuil d'allumage franchi = information de besoin
            if (s_on === 'on') return "rgba(33,150,243,0.2)";
            return "rgba(158,158,158,0.2)";
          ]]]
