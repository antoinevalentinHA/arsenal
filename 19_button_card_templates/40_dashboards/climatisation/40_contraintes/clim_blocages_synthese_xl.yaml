# ==========================================================
# 🧠 ARSENAL — TEMPLATE UI METIER
#     Climatisation — Blocages synthese XL
# ==========================================================
#
# 📌 STATUT
#     TEMPLATE UI METIER
#
# 🎯 ROLE
#     Afficher une synthese XL des blocages actifs de la
#     climatisation : blocage horaire, blocage aeration etage et
#     blocage post-aeration.
#
# 🧱 NATURE
#     - Template button-card
#     - Specialisation de socle_status_label_xl
#     - UI uniquement (aucune decision)
#
# 🎨 SEMANTIQUE
#     - donnees indisponibles -> gris indispo
#     - aucun blocage actif -> vert
#     - un ou plusieurs blocages actifs -> rouge
#
# 🔗 DEPENDANCES
#     - entity: aucune entite principale portee par la carte
#     - attributes: aucune
#     - capteurs backend (etat actif):
#         - binary_sensor.clim_blocage_horaire_reel
#         - binary_sensor.clim_blocage_aeration_etage_reel
#         - input_boolean.chauffage_blocage_aeration
#     - input_datetime (informatif uniquement, ne decide rien):
#         - input_datetime.clim_heure_blocage_autom_on
#         - input_datetime.clim_heure_blocage_autom_off
#         - input_datetime.chauffage_fin_blocage_aeration
#
# ⚠️ CONTRAINTES
#     - Ce template ne calcule pas la politique de blocage
#     - L'etat actif de chaque blocage est lu depuis les capteurs
#       backend ; aucun recalcul horaire cote navigateur
#     - La plage horaire n'est affichee qu'a titre informatif
#
# 🧩 USAGE
#     Exemple minimal :
#       type: custom:button-card
#       template: clim_blocages_synthese_xl
#
# ==========================================================

clim_blocages_synthese_xl:
  template: socle_status_label_xl

  show_name: false
  show_state: false
  show_label: true
  show_icon: false

  tap_action:
    action: none
  hold_action:
    action: none
  double_tap_action:
    action: none

  label: |
    [[[
      const st = (id) => states[id]?.state;
      const UNAV = ['unknown','unavailable',undefined,null,'none',''];

      const horaire = st('binary_sensor.clim_blocage_horaire_reel');
      const aeration = st('binary_sensor.clim_blocage_aeration_etage_reel');
      const postAeration = st('input_boolean.chauffage_blocage_aeration');

      const hOnRaw = st('input_datetime.clim_heure_blocage_autom_on');
      const hOffRaw = st('input_datetime.clim_heure_blocage_autom_off');
      const finBlocage = st('input_datetime.chauffage_fin_blocage_aeration');

      const fmt = (v) => {
        if (UNAV.includes(v)) return '—';
        const s = String(v).replace(' ', 'T');
        const dt = new Date(s);
        if (isNaN(dt.getTime())) return '—';
        return dt.toLocaleString('fr-FR', {
          day: '2-digit',
          month: '2-digit',
          hour: '2-digit',
          minute: '2-digit'
        }).replace(',', '');
      };

      if ([horaire, aeration, postAeration].some(v => UNAV.includes(v))) {
        return "<b>Blocages indéterminés</b><br>" +
               "Données manquantes (unknown/unavailable)";
      }

      const blocageHoraire = (horaire === 'on');
      const blocageAeration = (aeration === 'on');
      const post = (postAeration === 'on');

      if (!blocageHoraire && !blocageAeration && !post) {
        return "<b>Aucun blocage en cours</b><br>" +
               "Le système est pleinement autorisé à agir.";
      }

      let out = "<b>Blocage(s) actif(s)</b><br>";

      if (blocageHoraire) {
        out += "⏰ Blocage horaire actif<br>";
        if (!UNAV.includes(hOnRaw) && !UNAV.includes(hOffRaw)) {
          out += "Plage : " + String(hOnRaw).slice(0,5) + " → " + String(hOffRaw).slice(0,5) + "<br>";
        }
      }

      if (blocageAeration) {
        out += "🪟 Blocage aération étage actif<br>";
      }

      if (post) {
        out += "Blocage post-aération actif<br>";
        out += "Fin prévue : " + fmt(finBlocage);
      }

      return out;
    ]]]

  styles:
    card:
      - background-color: |
          [[[
            const st = (id) => states[id]?.state;
            const UNAV = ['unknown','unavailable',undefined,null,'none',''];

            const horaire = st('binary_sensor.clim_blocage_horaire_reel');
            const aeration = st('binary_sensor.clim_blocage_aeration_etage_reel');
            const postAeration = st('input_boolean.chauffage_blocage_aeration');

            if ([horaire, aeration, postAeration].some(v => UNAV.includes(v)))
              return 'rgba(158, 158, 158, 0.1)';

            const actif = (horaire === 'on') || (aeration === 'on') || (postAeration === 'on');
            return actif ? 'rgba(244, 67, 54, 0.2)' : 'rgba(76, 175, 80, 0.2)';
          ]]]

    label:
      - white-space: normal
      - line-height: 17px
      - padding-top: 6px