# ==========================================================
# 🧠 ARSENAL — CARTE UI
#     Aération — Delta humidité absolue (ΔHA)
#
# 🗂️ COUCHE : mesures
# 🧱 TYPE UI : valeur + seuil dynamique
# 🔍 NIVEAU DE CONFIANCE : eleve
# ==========================================================
#
# 🎯 RÔLE
#   Afficher la valeur du delta d'humidité absolue (ΔHA)
#   et son évaluation par rapport au seuil dynamique
#   appliqué.
#
# 📡 SOURCE
#   - entity.attributes.delta_humidite_absolue
#   - entity.attributes.seuils_utilises.ha_min_applique
#
# ⚙️ LOGIQUE UI
#   - Affiche la valeur ΔHA en g/m³ (2 décimales)
#   - Label : seuil appliqué (1 décimale)
#   - Seuil lu en LECTURE SEULE depuis seuils_utilises.ha_min_applique ;
#     si absent / non numérique → affichage neutre (—), aucun recalcul UI
#   - Coloration :
#       - valeur inconnue → gris indispo
#       - valeur >= seuil → fond vert
#       - valeur < seuil  → fond gris neutre
#   - Logique UI dérivée, non autoritaire
#   - Aucune action utilisateur
#
# ----------------------------------------------------------
# 🔒 STRUCTURE
#   SATELLITE et PIVOT sont mutuellement exclusifs
# ----------------------------------------------------------
#
# 🔗 SATELLITE DE : socle_status_label
#
# ==========================================================

carte_delta_ha:
  template: socle_status_label

  show_icon: false

  tap_action:
    action: none
  hold_action:
    action: none
  double_tap_action:
    action: none

  state_display: |
    [[[
      const toNumber = (v) => {
        if (v === null || v === undefined) return NaN;
        return parseFloat(String(v).replace(',', '.').replace(/[^\d.-]/g, ''));
      };
      const v = toNumber(entity.attributes?.delta_humidite_absolue);
      if (isNaN(v)) return "—";
      return v.toFixed(2) + " g/m³";
    ]]]

  label: |
    [[[
      const toObj = (v) => {
        if (!v) return {};
        if (typeof v === 'object') return v;
        try { return JSON.parse(v); } catch { return {}; }
      };
      const attrs  = entity.attributes || {};
      const seuils = toObj(attrs.seuils_utilises);
      const seuil = parseFloat(seuils.ha_min_applique);

      if (!Number.isFinite(seuil)) return "Seuil : —";

      return "Seuil : " + seuil.toFixed(1) + " g/m³";
    ]]]

  styles:
    card:
      - background-color: |
          [[[
            const toNumber = (v) => {
              if (v === null || v === undefined) return NaN;
              return parseFloat(String(v).replace(',', '.').replace(/[^\d.-]/g, ''));
            };
            const toObj = (v) => {
              if (!v) return {};
              if (typeof v === 'object') return v;
              try { return JSON.parse(v); } catch { return {}; }
            };
            const v = toNumber(entity.attributes?.delta_humidite_absolue);
            const attrs = entity.attributes || {};
            const seuils = toObj(attrs.seuils_utilises);
            const seuil = parseFloat(seuils.ha_min_applique);

            if (isNaN(v) || !Number.isFinite(seuil)) return "rgba(158, 158, 158, 0.1)";
            return v >= seuil
              ? "rgba(76, 175, 80, 0.2)"
              : "rgba(158, 158, 158, 0.2)";
          ]]]
