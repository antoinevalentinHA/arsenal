# ==========================================================
# 🧠 ARSENAL — CARTE UI
#     Aération — Durée cumulée
#
# 🗂️ COUCHE : mesures
# 🧱 TYPE UI : valeur + seuil dynamique
# 🔍 NIVEAU DE CONFIANCE : eleve
# ==========================================================
#
# 🎯 RÔLE
#   Afficher la durée cumulée d'aération et son
#   évaluation par rapport à une durée cible.
#
# 📡 SOURCE
#   - entity.state (durée en minutes)
#   - input_number.aeration_duree_cible_minutes
#
# ⚙️ LOGIQUE UI
#   - Affiche la durée en minutes (entier)
#   - Label : seuil cible (fallback 10 min si non défini)
#   - Coloration :
#       - valeur inconnue → gris neutre
#       - durée > seuil   → fond vert
#       - durée <= seuil  → fond gris neutre
#   - Aucune action utilisateur
#
# ----------------------------------------------------------
# 🔒 STRUCTURE
#   SATELLITE et PIVOT sont mutuellement exclusifs
# ----------------------------------------------------------
#
# 🔗 SATELLITE DE : socle_status_label
#
# ==========================================================

carte_duree_aeration:
  template: socle_status_label

  show_icon: false

  label: |
    [[[
      const seuil = parseFloat(states['input_number.aeration_duree_cible_minutes']?.state);
      if (Number.isFinite(seuil)) {
        return `Temps > ${seuil.toFixed(0)} min`;
      }
      return 'Temps > 10 min';
    ]]]

  state_display: |
    [[[
      const minutes = parseFloat(entity.state);
      if (!Number.isFinite(minutes)) return '–';
      return `${minutes.toFixed(0)} min`;
    ]]]

  state:
    - operator: template
      value: |
        [[[
          const minutes = parseFloat(entity.state);
          const seuil = parseFloat(states['input_number.aeration_duree_cible_minutes']?.state);
          const seuilMin = Number.isFinite(seuil) ? seuil : 10;
          return Number.isFinite(minutes) && minutes > seuilMin;
        ]]]
      styles:
        card:
          - background-color: rgba(76, 175, 80, 0.2)

    - operator: default
      styles:
        card:
          - background-color: rgba(158, 158, 158, 0.2)

  tap_action:
    action: none
  hold_action:
    action: none
  double_tap_action:
    action: none
