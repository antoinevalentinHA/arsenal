# ==========================================================
# 🧠 ARSENAL — CARTE UI
#     Aération — Delta température (ΔT)
#
# 🗂️ COUCHE : mesures
# 🧱 TYPE UI : valeur + seuil dynamique
# 🔍 NIVEAU DE CONFIANCE : eleve
# ==========================================================
#
# 🎯 RÔLE
#   Afficher la valeur du delta de température (ΔT)
#   et son évaluation par rapport au seuil dynamique
#   appliqué.
#
# 📡 SOURCE
#   - entity.attributes.delta_temperature
#   - entity.attributes.seuils_utilises.dt_min_applique
#   - input_select.saison (fallback seuil)
#   - input_number.aeration_delta_t_min_hiver
#   - input_number.aeration_seuil_ecart_temperature_min
#   - input_number.aeration_delta_t_min_inter
#
# ⚙️ LOGIQUE UI
#   - Affiche la valeur ΔT en °C (2 décimales)
#   - Label : seuil appliqué (1 décimale)
#   - Seuil résolu depuis seuils_utilises.dt_min_applique
#     ou fallback saison si absent
#   - Coloration :
#       - valeur inconnue → gris indispo
#       - valeur >= seuil → fond vert
#       - valeur < seuil  → fond gris neutre
#   - Logique UI dérivée, non autoritaire
#   - Aucune action utilisateur
#
# ----------------------------------------------------------
# 🔒 STRUCTURE
#   SATELLITE et PIVOT sont mutuellement exclusifs
# ----------------------------------------------------------
#
# 🔗 SATELLITE DE : socle_status_label
#
# ==========================================================

carte_delta_t:
  template: socle_status_label

  show_icon: false

  tap_action:
    action: none
  hold_action:
    action: none
  double_tap_action:
    action: none

  state_display: |
    [[[
      const toNumber = (v) => {
        if (v === null || v === undefined) return NaN;
        return parseFloat(String(v).replace(',', '.').replace(/[^\d.-]/g, ''));
      };
      const v = toNumber(entity.attributes?.delta_temperature);
      if (isNaN(v)) return "—";
      return v.toFixed(2) + " °C";
    ]]]

  label: |
    [[[
      const toObj = (v) => {
        if (!v) return {};
        if (typeof v === 'object') return v;
        try { return JSON.parse(v); } catch { return {}; }
      };
      const attrs  = entity.attributes || {};
      const seuils = toObj(attrs.seuils_utilises);
      let seuil = parseFloat(seuils.dt_min_applique);

      if (!Number.isFinite(seuil)) {
        const saison = states['input_select.saison']?.state || '';
        if (saison === 'Hiver')
          seuil = parseFloat(states['input_number.aeration_delta_t_min_hiver']?.state) || 3.0;
        else if (saison === 'Été')
          seuil = parseFloat(states['input_number.aeration_seuil_ecart_temperature_min']?.state) || 2.0;
        else if (['Printemps','Automne'].includes(saison))
          seuil = parseFloat(states['input_number.aeration_delta_t_min_inter']?.state) || 2.5;
        else
          seuil = 2.0;
      }

      return "Seuil : " + seuil.toFixed(1) + " °C";
    ]]]

  styles:
    card:
      - background-color: |
          [[[
            const toNumber = (v) => {
              if (v === null || v === undefined) return NaN;
              return parseFloat(String(v).replace(',', '.').replace(/[^\d.-]/g, ''));
            };
            const toObj = (v) => {
              if (!v) return {};
              if (typeof v === 'object') return v;
              try { return JSON.parse(v); } catch { return {}; }
            };
            const v = toNumber(entity.attributes?.delta_temperature);
            const attrs  = entity.attributes || {};
            const seuils = toObj(attrs.seuils_utilises);
            let seuil = parseFloat(seuils.dt_min_applique);

            if (!Number.isFinite(seuil)) {
              const saison = states['input_select.saison']?.state || '';
              if (saison === 'Hiver')
                seuil = parseFloat(states['input_number.aeration_delta_t_min_hiver']?.state) || 3.0;
              else if (saison === 'Été')
                seuil = parseFloat(states['input_number.aeration_seuil_ecart_temperature_min']?.state) || 2.0;
              else if (['Printemps','Automne'].includes(saison))
                seuil = parseFloat(states['input_number.aeration_delta_t_min_inter']?.state) || 2.5;
              else
                seuil = 2.0;
            }

            if (isNaN(v)) return "rgba(158, 158, 158, 0.1)";
            return v >= seuil
              ? "rgba(76, 175, 80, 0.2)"
              : "rgba(158, 158, 158, 0.2)";
          ]]]
