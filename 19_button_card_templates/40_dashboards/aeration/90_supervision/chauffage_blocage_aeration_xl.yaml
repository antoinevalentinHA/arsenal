# ==========================================================
# 🧠 ARSENAL — CARTE UI
#     Aération — Blocage chauffage (supervision)
#
# 🗂️ COUCHE : supervision
# 🧱 TYPE UI : synthèse XL multi-état
# 🔍 NIVEAU DE CONFIANCE : eleve
# ==========================================================
#
# 🎯 RÔLE
#   Afficher une synthèse XL du verrou chauffage lié
#   à l'aération, avec statut principal et détail
#   contextuel des timers associés.
#
# 📡 SOURCE
#   - input_boolean.chauffage_blocage_aeration
#   - input_boolean.aeration_episode_en_cours
#   - input_boolean.mode_confort_chauffage
#   - timer.aeration_blocage
#   - timer.aeration_analyse_delta_t
#   - sensor.time (rafraîchissement)
#
# ⚙️ LOGIQUE UI
#   - Priorité stricte :
#       indisponible          → "Chauffage" / "Indisponible" → gris indispo
#       blocage + épisode     → "Suspendu"                   → fond rouge
#       blocage seul          → "Stabilisation"              → fond orange
#       override actif        → "Override"                   → fond bleu
#       nominal               → "Aucun verrou"               → fond vert
#   - Label contextuel :
#       blocage + épisode     → durée restante blocage + ΔT
#       blocage seul          → durée restante blocage + ΔT
#       override              → "Confort forcé opérateur"
#       nominal               → "Système nominal"
#   - Attribut remaining affiché à titre informatif
#   - Aucune action utilisateur
#
# ----------------------------------------------------------
# 🔒 STRUCTURE
#   SATELLITE et PIVOT sont mutuellement exclusifs
# ----------------------------------------------------------
#
# ⚠️ CARTE PIVOT
#   Traverse :
#     - intention (override opérateur)
#     - état réel (blocage, épisode, timers)
#     - diagnostic (stabilisation, suspension, nominal)
#
# ==========================================================

chauffage_blocage_aeration_xl:
  template: socle_status_label_xl

  icon: mdi:lock-alert

  triggers_update:
    - sensor.time
    - input_boolean.chauffage_blocage_aeration
    - input_boolean.aeration_episode_en_cours
    - input_boolean.mode_confort_chauffage
    - timer.aeration_blocage
    - timer.aeration_analyse_delta_t

  state_display: |
    [[[
      const st = (id) => states[id]?.state;
      const UNAV = ['unknown','unavailable',undefined,null,'none',''];

      const blocage = st('input_boolean.chauffage_blocage_aeration');
      const episode = st('input_boolean.aeration_episode_en_cours');
      const override = st('input_boolean.mode_confort_chauffage');

      if ([blocage, episode, override].some(v => UNAV.includes(v)))
        return "Chauffage";

      if (blocage === 'on' && episode === 'on') return "Suspendu";
      if (blocage === 'on') return "Stabilisation";
      if (override === 'on') return "Override";
      return "Aucun verrou";
    ]]]

  label: |
    [[[
      const st = (id) => states[id]?.state;
      const attr = (id, a) => states[id]?.attributes?.[a];

      const UNAV = ['unknown','unavailable',undefined,null,'none',''];

      const blocage = st('input_boolean.chauffage_blocage_aeration');
      const episode = st('input_boolean.aeration_episode_en_cours');
      const override = st('input_boolean.mode_confort_chauffage');

      const t_bloc_state = st('timer.aeration_blocage');
      const t_ana_state  = st('timer.aeration_analyse_delta_t');

      const rem_bloc = attr('timer.aeration_blocage', 'remaining');
      const rem_ana  = attr('timer.aeration_analyse_delta_t', 'remaining');

      const fmt_rem = (timer_state, remaining) => {
        if (UNAV.includes(timer_state)) return "—";
        if (timer_state !== 'active') return "—";
        if (UNAV.includes(remaining)) return "—";
        return String(remaining);
      };

      const bloc_txt = fmt_rem(t_bloc_state, rem_bloc);
      const ana_txt  = fmt_rem(t_ana_state,  rem_ana);

      if ([blocage, episode, override].some(v => UNAV.includes(v)))
        return "Indisponible";

      if (blocage === 'on' && episode === 'on') {
        return `Aération en cours\nReste: ${bloc_txt}  •  ΔT: ${ana_txt}`;
      }

      if (blocage === 'on') {
        return `Post-aération\nReste: ${bloc_txt}  •  ΔT: ${ana_txt}`;
      }

      if (override === 'on') {
        return "Confort forcé opérateur";
      }

      return "Système nominal";
    ]]]

  styles:
    card:
      - background-color: |
          [[[
            const st = (id) => states[id]?.state;
            const UNAV = ['unknown','unavailable',undefined,null,'none',''];

            const blocage = st('input_boolean.chauffage_blocage_aeration');
            const episode = st('input_boolean.aeration_episode_en_cours');
            const override = st('input_boolean.mode_confort_chauffage');

            if ([blocage, episode, override].some(v => UNAV.includes(v)))
              return "rgba(158, 158, 158, 0.1)";

            if (blocage === 'on' && episode === 'on')
              return "rgba(244, 67, 54, 0.2)";

            if (blocage === 'on')
              return "rgba(255, 152, 0, 0.2)";

            if (override === 'on')
              return "rgba(33, 150, 243, 0.2)";

            return "rgba(76, 175, 80, 0.2)";
          ]]]