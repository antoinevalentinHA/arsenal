# ==========================================================
# 🧠 ARSENAL — CARTE UI
#     Audi — État info
#
# 🗂️ COUCHE : etat
# 🧱 TYPE UI : info brute non binaire
# 🔍 NIVEAU DE CONFIANCE : eleve
# ==========================================================
#
# 🎯 RÔLE
#   Afficher une information non binaire issue d'une
#   entité Audi avec une mise en forme informative.
#
# 📡 SOURCE
#   - entity.state (capteur ou entité Audi informative)
#
# ⚙️ LOGIQUE UI
#   - valeur disponible    → fond bleu informatif
#   - valeur indisponible  → fond gris indispo
#   - Aucune logique métier — affichage brut uniquement
#   - Réservé aux entités non binaires
#   - Aucune action utilisateur
#
# ----------------------------------------------------------
# 🔒 STRUCTURE
#   SATELLITE et PIVOT sont mutuellement exclusifs
# ----------------------------------------------------------
#
# 🔗 SATELLITE DE : socle_status
#
# ==========================================================

audi_etat_info:
  template: socle_status

  show_icon: true

  styles:
    card:
      - background-color: |
          [[[
            const s = entity?.state;

            if (s === undefined || s === null || s === "unknown" || s === "unavailable") {
              return "rgba(158, 158, 158, 0.1)";  // ⚪ indispo
            }

            return "rgba(33, 150, 243, 0.2)";     // 🔵 info
          ]]]

