# ==========================================================
# 🧠 ARSENAL — CARTE UI
#     Véhicule — État de charge électrique
#
# 🗂️ COUCHE : etat
# 🧱 TYPE UI : statut binaire sémantique
# 🔍 NIVEAU DE CONFIANCE : eleve
# ==========================================================
#
# 🎯 RÔLE
#   Indiquer si le véhicule électrique est en cours de
#   charge. Lecture immédiate, aucune interaction.
#
# 📡 SOURCE
#   - entity.state (valeur attendue : 'charging' | autre)
#
# ⚙️ LOGIQUE UI
#   - 'charging' (insensible casse) → fond vert (charge en cours)
#   - tout autre état connu         → fond gris neutre (non en charge)
#   - unknown / unavailable / null  → fond gris indispo
#   - Sémantique binaire : idle, complete, disconnected
#     tous traités comme "non en charge"
#   - state brut non affiché
#   - Aucune action utilisateur
#
# ----------------------------------------------------------
# 🔒 STRUCTURE
#   SATELLITE et PIVOT sont mutuellement exclusifs
# ----------------------------------------------------------
#
# 🔗 SATELLITE DE : socle_status
#
# ==========================================================

carte_etat_charge_vehicule:
  template: socle_status

  show_state: false
  show_icon: true

  tap_action:
    action: none
  hold_action:
    action: none
  double_tap_action:
    action: none

  styles:
    card:
      - background-color: |
          [[[
            const s = (entity?.state || '').toLowerCase();

            if (["unknown","unavailable",null].includes(s)) {
              return "rgba(158, 158, 158, 0.1)";   // ⚪ indispo
            }

            return s === "charging"
              ? "rgba(76, 175, 80, 0.2)"          // 🟢 en charge
              : "rgba(158, 158, 158, 0.2)";       // ⚪ arrêt
          ]]]
          