# ==========================================================
# 🧠 ARSENAL — CARTE UI
#     Audi — État capteur binaire véhicule
#
# 🗂️ COUCHE : etat
# 🧱 TYPE UI : statut binaire générique
# 🔍 NIVEAU DE CONFIANCE : eleve
# ==========================================================
#
# 🎯 RÔLE
#   Afficher l'état ON/OFF d'un capteur binaire du véhicule
#   Audi avec coloration sémantique. Template générique
#   couvrant tous les binaires du domaine véhicule.
#
# 📡 SOURCE
#   - entity.state (binary_sensor.* domaine Audi)
#
# ⚙️ LOGIQUE UI
#   - off                        → fond vert  (nominal)
#   - on                         → fond rouge (alerte)
#   - unknown / unavailable / null → fond gris indispo
#   - Sémantique OFF = nominal — ne pas utiliser sur un
#     capteur où ON est l'état souhaité
#   - Aucun label ni state_display surchargés
#   - Aucune action utilisateur
#
# ----------------------------------------------------------
# 🔒 STRUCTURE
#   SATELLITE et PIVOT sont mutuellement exclusifs
# ----------------------------------------------------------
#
# 🔗 SATELLITE DE : socle_status
#
# ==========================================================

audi_etat_capteur:
  template: socle_status

  show_icon: true

  styles:
    card:
      - background-color: |
          [[[
            const s = entity?.state;
            if (["unknown","unavailable",null].includes(s)) return "rgba(158, 158, 158, 0.1)";
            if (s === "off") return "rgba(76, 175, 80, 0.2)";
            return "rgba(244, 67, 54, 0.2)";
          ]]]

