# ==========================================================
# 🧠 ARSENAL — TEMPLATE UI METIER
#     Volets — Décision pluie (72px)
# ==========================================================
#
# 📌 STATUT
#     TEMPLATE UI METIER
#
# 🎯 ROLE
#     Tuile décisionnelle 72px pour les binary_sensors pluie.
#     Distingue pluie forte (rouge) et pluie récente (orange)
#     par convention de nommage de l'entity_id.
#
# 🧱 NATURE
#     - Template button-card
#     - Spécialisation de socle_decision_72
#     - UI uniquement (aucune décision)
#
# 🎨 SEMANTIQUE
#     - state = on + entity_id contient 'pluie_forte' -> 🔴 rouge   (pluie forte active)
#     - state = on + autre entity_id                  -> 🟠 orange  (pluie récente)
#     - state = off                                   -> ⚪ gris    (pas de pluie)
#     - unknown / unavailable                         -> ⚪ gris clair
#
# 🔗 DEPENDANCES
#     - entity : binary_sensor pluie (state = on | off)
#       La sévérité est déduite de l'entity_id (convention 'pluie_forte')
#
# ⚠️ CONTRAINTES
#     - Routage rouge/orange basé sur inclusion de 'pluie_forte' dans l'entity_id —
#       convention de nommage Arsenal requise
#     - Distinct de decision_pluie_recente_72 : ce template couvre les deux
#       niveaux de sévérité sur un seul template, l'autre est mono-état
#     - Aucune icône ni action définie — héritées du socle
#
# 🧩 USAGE
#     type: custom:button-card
#     template: pluie_decision_72
#     entity: binary_sensor.pluie_forte        # → rouge si on
#     # ou
#     entity: binary_sensor.pluie_recente      # → orange si on
#
# ==========================================================

pluie_decision_72:
  template: socle_decision_72
  styles:
    card:
      - background-color: >
          [[[
            const s = entity?.state;

            if (s === "unknown" || s === "unavailable") return "rgba(158, 158, 158, 0.1)";

            if (s === "on") {
              const id = entity?.entity_id || "";
              if (id.includes("pluie_forte")) return "rgba(244, 67, 54, 0.2)";
              return "rgba(255, 152, 0, 0.25)";
            }

            return "rgba(158, 158, 158, 0.2)";
          ]]]