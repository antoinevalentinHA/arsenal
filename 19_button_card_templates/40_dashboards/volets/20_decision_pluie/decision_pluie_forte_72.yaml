# ==========================================================
# 🧠 ARSENAL — TEMPLATE UI MÉTIER
#     Volets / Pluie — Décision pluie forte 72
# ==========================================================
#
# 📌 STATUT
#     TEMPLATE UI MÉTIER
#
# 🎯 RÔLE
#     Afficher l’état décisionnel "pluie forte" sous forme
#     de tuile 72 avec sémantique visuelle métier.
#
# 🧱 NATURE
#     - Template button-card
#     - Spécialisation de socle_decision_72
#     - UI uniquement (aucune décision)
#
# 🎨 SÉMANTIQUE
#     - state = on -> pluie forte active + rouge
#     - state = off -> pas de pluie forte + gris neutre
#     - state inconnu / indisponible -> gris indispo
#
# 🔗 DÉPENDANCES
#     - entity: binary_sensor ou capteur équivalent de décision pluie forte
#     - attributes: aucune
#     - helpers externes: aucun
#
# ⚠️ CONTRAINTES
#     - Ce template ne calcule pas la décision pluie forte
#     - Il restitue uniquement l’état exposé par le backend
#     - Réservé au domaine Volets / Pluie
#
# 🧩 USAGE
#     Exemple minimal :
#       type: custom:button-card
#       template: decision_pluie_forte_72
#       entity: binary_sensor.decision_pluie_forte
#
# ==========================================================

decision_pluie_forte_72:
  template: socle_decision_72
  show_icon: true
  icon: >
    [[[
      const s = entity?.state;
      if (s === "on") return "mdi:weather-pouring";
      if (s === "off") return "mdi:weather-pouring-off";
      return "mdi:help-circle-outline";
    ]]]
  styles:
    card:
      - background-color: >
          [[[
            const s = entity?.state;

            if (s === undefined || s === null) return "rgba(158, 158, 158, 0.1)";
            if (s === "unknown" || s === "unavailable") return "rgba(158, 158, 158, 0.1)";

            if (s === "on") return "rgba(244, 67, 54, 0.2)";
            return "rgba(158, 158, 158, 0.2)";
          ]]]