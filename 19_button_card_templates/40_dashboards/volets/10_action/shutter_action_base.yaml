# ==========================================================
# 🧠 ARSENAL — TEMPLATE UI METIER
#     Volets — Base fonctionnelle action 72px
# ==========================================================
#
# 📌 STATUT
#     TEMPLATE UI METIER
#
# 🎯 ROLE
#     Socle fonctionnel paramétrable pour les tuiles d'action
#     volets 72px. Expose le service, les données, la cible et
#     la confirmation via variables. Base pour les spécialisations
#     volets (montée, descente). Pas de stop : non exposé en HAP
#     (supported_features = 7 — HoldPosition absente).
#
# 🧱 NATURE
#     - Template button-card
#     - Spécialisation de socle_kpi_72
#     - UI uniquement (aucune décision)
#
# 🎨 SEMANTIQUE
#     - Couleur fixe ⚪ gris (action neutre sans état)
#     - Aucune sémantique d'état — tuile d'action pure
#
# 🔗 DEPENDANCES
#     - variables.service  : service HA à appeler (ex. cover.open_cover)
#     - variables.data     : données additionnelles du service (optionnel)
#     - variables.target   : cible du service (entity_id ou area_id)
#     - variables.confirm  : texte de confirmation modale (optionnel)
#     - variables.name     : libellé affiché (optionnel)
#     - variables.icon     : icône (défaut mdi:window-shutter)
#
# ⚠️ CONTRAINTES
#     - Traitement spécial cover.stop_cover* : entity_id injecté dans data
#       directement (pas dans target) — convention HA cover stop
#     - show_state et show_label désactivés — tuile d'action pure
#     - hold et double_tap désactivés
#     - Ne pas utiliser directement — créer une spécialisation par action
#
# 🧩 USAGE
#     # Via spécialisation (recommandé) :
#     type: custom:button-card
#     template: shutter_action_base
#     variables:
#       service: cover.open_cover
#       target:
#         entity_id: cover.volet_salon
#       name: Ouvrir
#       icon: mdi:arrow-up-box
#       confirm: Ouvrir le volet salon ?
#
# ==========================================================

shutter_action_base:
  template: socle_kpi_72

  show_state: false
  show_label: false

  tap_action:
    action: call-service
    service: |
      [[[ return variables.service || null; ]]]
    service_data: |
      [[[
        const data = {};
        if (variables.data) Object.assign(data, variables.data);

        if (variables.target) {
          if (variables.service?.startsWith("cover.stop_cover")) {
            if (variables.target.entity_id) data.entity_id = variables.target.entity_id;
          } else {
            data.target = variables.target;
          }
        }

        return data;
      ]]]
    confirmation:
      text: |
        [[[ return variables.confirm || null; ]]]

  hold_action:
    action: none
  double_tap_action:
    action: none

  name: |
    [[[ return variables.name || ''; ]]]
  icon: |
    [[[ return variables.icon || 'mdi:window-shutter'; ]]]

  styles:
    card:
      - background-color: "rgba(158, 158, 158, 0.2)"
    # Icône d'action agrandie pour une lecture immédiate du geste
    # (ouvrir / stop / fermer). Taille uniquement — la couleur #111
    # typographique canonique héritée du socle reste inchangée.
    icon:
      - width: 34px
      - height: 34px