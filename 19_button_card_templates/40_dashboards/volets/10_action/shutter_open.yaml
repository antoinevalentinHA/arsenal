# ==========================================================
# 🧠 ARSENAL — TEMPLATE UI MÉTIER
#     Volets — Action « Ouvrir » (montée) 72px
# ==========================================================
#
# 📌 STATUT
#     TEMPLATE UI MÉTIER
#
# 🎯 RÔLE
#     Spécialisation « montée / ouverture » de shutter_action_base.
#     Tuile d'action pure : émet une commande d'ouverture.
#     N'affiche aucun état (volets Budendorf sans retour d'état).
#
# 🧱 NATURE
#     - Template button-card
#     - Spécialisation de shutter_action_base
#     - UI uniquement (aucune décision, aucune lecture d'état)
#
# 🎨 SÉMANTIQUE
#     - Fond 🟢 vert rgba(76,175,80,0.2) = sens de commande « montée »
#     - Couleur CATÉGORIELLE, non décisionnelle
#       (cf. charte couleurs — Exception 9 : sens de commande volets)
#     - Le vert n'exprime PAS « OK / autorisé » ici
#
# 🔗 DÉPENDANCES
#     - variables.service  : service HA à appeler (ex. script.ouvrir_volet_x)
#     - variables.target   : cible (optionnel)
#     - variables.confirm  : texte de confirmation modale (optionnel)
#     - variables.name     : libellé (défaut « Ouvrir »)
#     - variables.icon     : icône (défaut mdi:arrow-up-bold — grosse flèche montée)
#
# 🧩 USAGE
#     type: custom:button-card
#     template: shutter_open
#     variables:
#       service: script.ouvrir_volet_sejour_gauche
#       confirm: Ouvrir le volet séjour gauche ?
#
# ==========================================================

shutter_open:
  template: shutter_action_base

  variables:
    name: Ouvrir
    icon: mdi:arrow-up-bold

  styles:
    card:
      # Exception 9 — sens de commande « montée » (catégoriel, non décisionnel)
      - background-color: "rgba(76, 175, 80, 0.2)"
