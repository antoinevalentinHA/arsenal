# ==========================================================
# 🧠 ARSENAL — TEMPLATE UI MÉTIER
#     Volets — Action « Position cible » 72px
# ==========================================================
#
# 📌 STATUT
#     TEMPLATE UI MÉTIER
#
# 🎯 ROLE
#     Spécialisation unique de shutter_action_base pilotant un
#     volet (ou un groupe) vers une POSITION cible via
#     cover.set_cover_position. Remplace les anciennes tuiles
#     ouvrir / stop / fermer : les volets Bubendorff n'exposent
#     que ouvrir / fermer / position (supported_features = 7,
#     pas de STOP), mais gèrent nativement les positions
#     intermédiaires (0 / 25 / 75 / 100).
#
# 🧱 NATURE
#     - Template button-card
#     - Spécialisation de shutter_action_base
#     - UI uniquement (aucune décision, aucune lecture d'état)
#
# 🎨 SÉMANTIQUE
#     - Couleur CATÉGORIELLE de position cible, non décisionnelle
#       (cf. charte couleurs — Exception 9 : position de commande volets)
#         • 100 % (ouvert, position haute) → 🟢 vert
#         •   0 % (fermé, position basse)  → 🔵 bleu
#         • 25 / 75 % (intermédiaire)      → ⚪ gris neutre
#     - Ces couleurs n'expriment AUCUN état réel (aucun retour capteur) ;
#       elles qualifient la position VISÉE par la commande.
#
# 🔗 DÉPENDANCES
#     - variables.cible    : entity_id cible — chaîne ou liste
#                            (ex. [cover.sejour_gauche] ou groupe)
#     - variables.position : position cible 0..100 (nombre)
#     - variables.confirm  : texte de confirmation modale (optionnel ;
#                            réservé aux extrêmes ouvrir/fermer)
#
# ⚠️ CONTRAINTES
#     - Aucun STOP possible sur ces volets (matériel) — ne pas réintroduire.
#     - Position injectée dans data ; entity_id passé directement
#       (le service accepte une liste pour les commandes groupées).
#
# 🧩 USAGE
#     type: custom:button-card
#     template: shutter_position
#     variables:
#       cible: [cover.sejour_gauche]
#       position: 75
#
# ==========================================================

shutter_position:
  template: shutter_action_base

  tap_action:
    action: call-service
    service: cover.set_cover_position
    # service_data construit en un seul template (pattern éprouvé du socle) :
    # entity_id accepte une chaîne OU une liste (commandes groupées).
    service_data: |
      [[[
        return {
          entity_id: variables.cible,
          position: Number(variables.position),
        };
      ]]]
    confirmation:
      text: |
        [[[ return variables.confirm || null; ]]]

  name: |
    [[[
      const p = Number(variables.position);
      if (p >= 100) return 'Ouvrir';
      if (p <= 0) return 'Fermer';
      return p + ' %';
    ]]]

  icon: |
    [[[
      const p = Number(variables.position);
      if (p >= 100) return 'mdi:arrow-up-bold';
      if (p <= 0) return 'mdi:arrow-down-bold';
      return p >= 50 ? 'mdi:chevron-up' : 'mdi:chevron-down';
    ]]]

  styles:
    card:
      # Exception 9 — position de commande (catégoriel, non décisionnel)
      - background-color: |
          [[[
            const p = Number(variables.position);
            if (p >= 100) return 'rgba(76, 175, 80, 0.2)';   /* 🟢 ouvert  */
            if (p <= 0)   return 'rgba(33, 150, 243, 0.2)';  /* 🔵 fermé   */
            return 'rgba(158, 158, 158, 0.2)';               /* ⚪ interm. */
          ]]]
