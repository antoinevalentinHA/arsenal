# ==========================================================
# 🧠 ARSENAL — TEMPLATE UI METIER
#     Santé — Score qualitatif
# ==========================================================
#
# 📌 STATUT
#     TEMPLATE UI METIER
#
# 🎯 ROLE
#     Afficher un score qualitatif (ex : sommeil) sous forme
#     de KPI avec une interpretation visuelle portee par la couleur.
#
# 🧱 NATURE
#     - Template button-card
#     - Specialisation de socle_kpi
#     - UI uniquement (aucune decision)
#
# 🎨 SEMANTIQUE
#     - valeur disponible -> score / 100
#     - valeur indisponible -> "—"
#     - couleur fournie par le backend (etat qualitatif)
#
# 🔗 DEPENDANCES
#     - entity: capteur de score (0-100)
#     - attributes: aucune
#     - helpers externes:
#         - sensor.couleur_sante_score_sommeil
#     - variables:
#         - ui_profile
#         - couleur
#
# ⚠️ CONTRAINTES
#     - Ce template ne calcule pas le score
#     - Il consomme une couleur deja determinee en backend
#     - Aucune logique metier embarquee
#
# 🧩 USAGE
#     Exemple minimal :
#       type: custom:button-card
#       template: carte_score_qualitatif
#       entity: sensor.score_sommeil
#
# ==========================================================

carte_score_qualitatif:
  template: socle_kpi

  show_state: true
  show_icon: true

  variables:
    ui_profile: arsenal
    couleur: sensor.couleur_sante_score_sommeil

  triggers_update:
    - sensor.couleur_sante_score_sommeil

  state_display: |
    [[[
      const v = parseFloat(entity?.state);
      if (isNaN(v)) return "—";
      return `${Math.round(v)} / 100`;
    ]]]

