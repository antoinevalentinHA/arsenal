# ==========================================================
# 🧠 ARSENAL — TEMPLATE UI METIER
#     Supervision — Diagnostic Netatmo HomeKit
# ==========================================================
#
# 📌 STATUT
#     TEMPLATE UI METIER
#
# 🎯 ROLE
#     Affiche l'état observable d'une station Netatmo avec
#     icône et couleur sémantiques par état. Lecture seule.
#     Désignation strictement observationnelle (contrat v1.1 §10) :
#     les états ne nomment ni HomeKit ni réseau comme cause.
#
# 🧱 NATURE
#     - Template button-card
#     - Spécialisation de socle_status_72
#     - UI uniquement (aucune décision)
#
# 🎨 SEMANTIQUE
#     - ok            -> 🟢 vert      mdi:check-circle    (nominal)
#     - muet_ping_ok  -> 🟠 orange    mdi:volume-off      (sans mesures, ping répond — abstention)
#     - muet_ping_ko  -> 🔴 rouge     mdi:lan-disconnect  (sans mesures, ping muet — actionnable)
#     - unknown       -> ⚪ gris      mdi:help-circle     (état inconnu)
#     - unavailable   -> ⚪ gris      mdi:help-circle     (indisponible)
#
# 🔗 DEPENDANCES
#     - entity : sensor diagnostic Netatmo synthétique
#       (state attendu : ok | muet_ping_ok | muet_ping_ko)
#
# ⚠️ CONTRAINTES
#     - Icône par défaut mdi:weather-cloudy si état hors mapping
#     - unavailable et unknown partagent la même couleur grise —
#       distinction uniquement via l'icône et le state affiché
#     - Lecture seule — aucune action définie
#     - Distinct de carte_integration_critique : états textuels normalisés
#       Arsenal (ok/muet_ping_*) vs binaire/numérique générique
#
# 🧩 USAGE
#     type: custom:button-card
#     template: netatmo_diagnostic
#     entity: sensor.netatmo_diagnostic_etat
#
# ==========================================================

netatmo_diagnostic:
  template: socle_status_72

  show_icon: true
  show_name: true
  show_state: true
  show_label: false

  icon: mdi:weather-cloudy

  styles:
    icon:
      - color: "#111"

  state:
    - value: "ok"
      icon: mdi:check-circle
      styles:
        card:
          - background-color: "rgba(76, 175, 80, 0.2)"

    - value: "muet_ping_ok"
      icon: mdi:volume-off
      styles:
        card:
          - background-color: "rgba(255, 152, 0, 0.2)"

    - value: "muet_ping_ko"
      icon: mdi:lan-disconnect
      styles:
        card:
          - background-color: "rgba(244, 67, 54, 0.2)"

    - value: "unknown"
      icon: mdi:help-circle
      styles:
        card:
          - background-color: "rgba(158, 158, 158, 0.1)"

    - value: "unavailable"
      icon: mdi:help-circle
      styles:
        card:
          - background-color: "rgba(158, 158, 158, 0.1)"