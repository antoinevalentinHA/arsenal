#
# 📌 STATUT
#     TEMPLATE UI METIER — spécialisation des prises secteur
#
# 🎯 ROLE
#     Point de spécialisation des prises secteur mains-dépendantes.
#     À ce stade (étape 1 du typage UI), n'ajoute AUCUN comportement :
#     hérite intégralement le comportement générique de
#     socle_toggle_confirme_indispo (toggle confirmé + neutralisation
#     d'indisponibilité). Réservé à l'accueil d'une future logique de
#     commandabilité secteur, appliquée au seul sous-ensemble
#     mains-dépendant — NON présente dans cette passe.
#
# 🧱 NATURE
#     - Template button-card
#     - Spécialisation (actuellement mince) de socle_toggle_confirme_indispo
#     - UI uniquement (aucune décision)
#
# 🎨 SEMANTIQUE
#     Identique à socle_toggle_confirme_indispo (aucune surcharge) :
#     on -> 🟢 vert, off -> ⚪ gris, unknown/unavailable/none -> ⚪ gris clair.
#
# 🔗 DEPENDANCES
#     - entity : switch.* de prise connectée (prises secteur)
#
# ⚠️ CONTRAINTES
#     - Ne PAS y placer de logique générique : elle vit dans
#       socle_toggle_confirme_indispo (réutilisable hors prises).
#     - Ne PAS introduire de gate de commandabilité dans cette passe.
#     - Les consommateurs non-prises (relais VMC, etc.) doivent
#       consommer socle_toggle_confirme_indispo, PAS ce template.
#
# 🧩 USAGE
#     type: custom:button-card
#     template: prise_template
#     entity: switch.prise_salon
#     name: Prise salon
#
# 📎 NOTE DE RESTRUCTURATION
#     Le comportement générique historiquement porté ici a été extrait
#     verbatim vers socle_toggle_confirme_indispo (étape 1 du typage UI).
#     Ce fichier conserve l'identité « prise secteur » pour accueillir la
#     spécialisation de commandabilité d'une passe ultérieure. Aucun
#     changement visuel ni fonctionnel pour les cartes prises (elles
#     héritent le même comportement via le socle générique).
# ==========================================================


prise_template:
  template: socle_toggle_confirme_indispo
