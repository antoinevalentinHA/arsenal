# ==========================================================
# 🧠 ARSENAL — TEMPLATE UI METIER
#     Chauffage — Diagnostic global compact
# ==========================================================
#
# 📌 STATUT
#     TEMPLATE UI METIER
#
# 🎯 ROLE
#     Tuile de synthèse diagnostic du chauffage : agrège programme,
#     intention calculée et raison active pour produire un état
#     global classifié avec icône, label et couleur adaptés.
#
# 🧱 NATURE
#     - Template button-card
#     - Spécialisation de socle_diagnostic_compact
#     - Consomme le socle de données chauffage_registres_raison (CH-6)
#     - UI uniquement (aucune décision)
#
# 🎨 SEMANTIQUE
#     Icône, libellé et couleur de chaque raison proviennent de la
#     table canonique unique : chauffage_registres_raison
#     (00_donnees/chauffage_registres_raison.yaml). Cette brique ne
#     reclasse rien : elle lit la table et applique les surcouches
#     qui lui sont propres.
#
#     INVARIANT COULEUR (cf. socle de données) :
#       La couleur traduit la nature métier observable du chauffage
#       pour l'utilisateur. Elle ne traduit ni le registre, ni le
#       contexte, ni le desired_mode.
#
#     Surcouches portées PAR CETTE BRIQUE (priorité, cf. 05_regles.md) :
#       - indisponibilité (une source unknown/unavailable)
#         -> ⚪ gris indispo rgba(158,158,158,0.1) — prioritaire
#
# 🔗 DEPENDANCES
#     - sensor.programme_chauffage
#     - sensor.chauffage_mode_calcule
#     - sensor.chauffage_raison_calculee
#     - variables.registre_chauffage (héritée du socle de données)
#
# ⚠️ CONTRAINTES
#     - Les 3 sensors principaux sont requis — un seul unavailable
#       bascule en gris indisponibilité (prioritaire)
#     - triggers_update déclaré explicitement sur les 3 entités sources
#     - Aucune action (tap, hold désactivés)
#     - La table de correspondance n'est définie qu'une fois (socle) :
#       cette brique ne contient aucune map de libellés/couleurs inline
#
# 🧩 USAGE
#     type: custom:button-card
#     template: chauffage_diagnostic_global_compact
#     # aucune entity requise — toutes les sources lues via states[]
#
# ==========================================================

chauffage_diagnostic_global_compact:
  template:
    - socle_diagnostic_compact
    - chauffage_registres_raison

  show_icon: true
  show_name: false
  show_state: true
  show_label: true
  color_type: card

  tap_action:
    action: none
  hold_action:
    action: none

  triggers_update:
    - sensor.programme_chauffage
    - sensor.chauffage_mode_calcule
    - sensor.chauffage_raison_calculee

  variables:
    diagnostic: |
      [[[
        const st = (id) => states[id]?.state;
        const UNAV = ['unknown','unavailable',undefined,null,'none',''];

        const programme = st('sensor.programme_chauffage');
        const intention = st('sensor.chauffage_mode_calcule');
        const raison = st('sensor.chauffage_raison_calculee');

        // Indisponibilité : surcouche prioritaire (cf. 05_regles.md).
        if ([programme, intention, raison].some(v => UNAV.includes(v))) {
          return { indisponible: true };
        }

        // ── Code mort préexistant conservé hors périmètre CH-6 ──────
        // `coherent` n'est lu par aucun champ. Dette UI distincte,
        // signalée et NON traitée dans CH-6 (cf. arbitrage). Conservé
        // verbatim pour ne pas étendre le périmètre du chantier.
        const prog_l = (programme || '').toLowerCase();
        const intention_l = (intention || '').toLowerCase();
        const coherent = (() => {
          if (intention === 'Neutre' && (programme === 'Eco' || programme === 'Confort')) return true;
          if (intention_l === 'confort' && prog_l.includes('comfort')) return true;
          if (intention_l === 'eco' && prog_l.includes('eco')) return true;
          return false;
        })();
        // ───────────────────────────────────────────────────────────

        return { indisponible: false, raison: raison };
      ]]]

  icon: |
    [[[
      const d = variables.diagnostic;
      if (d.indisponible) return 'mdi:shield-off';
      const reg = variables.registre_chauffage || {};
      const m = reg[d.raison];
      return m ? m.icone : 'mdi:check-circle-outline';
    ]]]

  state_display: |
    [[[
      const d = variables.diagnostic;
      if (d.indisponible) return 'Chauffage';
      const reg = variables.registre_chauffage || {};
      const m = reg[d.raison];
      return m ? m.libelle_court : d.raison;
    ]]]

  label: |
    [[[
      const d = variables.diagnostic;
      if (d.indisponible) return 'Données indisponibles';
      const reg = variables.registre_chauffage || {};
      const m = reg[d.raison];
      return m ? m.libelle_long : d.raison;
    ]]]

  styles:
    card:
      - background-color: |
          [[[
            const d = variables.diagnostic;
            if (d.indisponible) return 'rgba(158, 158, 158, 0.1)';
            const reg = variables.registre_chauffage || {};
            const m = reg[d.raison];
            return m ? m.couleur : 'rgba(158, 158, 158, 0.2)';
          ]]]
