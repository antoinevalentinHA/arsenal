# ==========================================================
# 🧠 ARSENAL — TEMPLATE UI METIER
#     Chauffage — Décision et cohérence état réel / intention
# ==========================================================
#
# 📌 STATUT
#     TEMPLATE UI METIER
#
# 🎯 ROLE
#     Affiche l'état réel du chauffage et le confronte à
#     l'intention calculée. Colore la carte selon la cohérence
#     de la décision et la nature de la raison active.
#     Expose l'intention et la raison traduite en label.
#
# 🧱 NATURE
#     - Template button-card
#     - Spécialisation de socle_decision_72
#     - Consomme le socle de données chauffage_registres_raison (CH-6)
#     - UI uniquement (aucune décision)
#
# 🎨 SEMANTIQUE
#     Le libellé et la couleur de la raison proviennent de la table
#     canonique unique : chauffage_registres_raison
#     (00_donnees/chauffage_registres_raison.yaml). Cette brique ne
#     reclasse rien : elle lit la table et applique sa surcouche propre.
#
#     INVARIANT COULEUR (cf. socle de données) :
#       La couleur traduit la nature métier observable du chauffage
#       pour l'utilisateur. Elle ne traduit ni le registre, ni le
#       contexte, ni le desired_mode.
#
#     Surcouche portée PAR CETTE BRIQUE (priorité, cf. 05_regles.md) :
#       - incohérence intention ≠ réel -> 🔴 rouge — prioritaire
#         (prime sur la couleur de la table)
#
# 🔗 DEPENDANCES
#     - entity                            : sensor état réel chauffage (Confort | Eco | Inconnu)
#     - sensor.chauffage_mode_calcule     : intention du moteur de décision
#     - sensor.chauffage_raison_calculee  : raison active (clé normalisée Arsenal)
#     - variables.registre_chauffage      : table canonique (héritée du socle de données)
#
# ⚠️ CONTRAINTES
#     - La cohérence admet 'Neutre' comme intention valide pour Eco ou Confort
#     - Toute clé de raison inconnue est affichée brute (repli)
#     - La variable `diag` lit la table canonique ; aucune map de
#       libellés/couleurs n'est définie inline ici
#     - Aucune action définie — héritée de socle_decision_72
#
# 🧩 USAGE
#     type: custom:button-card
#     template: carte_chauffage_decision
#     entity: sensor.chauffage_etat_reel
#
# ==========================================================

carte_chauffage_decision:
  template:
    - socle_decision_72
    - chauffage_registres_raison

  name: Chauffage – État réel

  variables:
    diag: |
      [[[
        const reel = entity?.state;
        const intention = states['sensor.chauffage_mode_calcule']?.state;
        const raison = states['sensor.chauffage_raison_calculee']?.state || '';

        // Correspondance unique (socle de données CH-6) — aucune map inline.
        const reg = variables.registre_chauffage || {};
        const m = reg[raison];

        // Cohérence intention/réel : surcouche propre à la brique decision.
        const is_inconnu = (reel === 'Inconnu');
        const coherent = (() => {
          if (is_inconnu) return false;
          if (intention === reel) return true;
          if (intention === 'Neutre' && (reel === 'Eco' || reel === 'Confort')) return true;
          return false;
        })();

        const reason_txt = raison ? (m ? m.libelle_court : raison) : '';

        // Couleur : incohérence -> rouge (surcouche prioritaire, cf. 05_regles.md) ;
        // sinon couleur de la table canonique (repli gris neutre).
        const bg = (!coherent)
          ? "rgba(244, 67, 54, 0.2)"
          : (m ? m.couleur : "rgba(158, 158, 158, 0.2)");

        return {
          reel: reel,
          intention: intention || '—',
          raison: raison,
          reason_txt: reason_txt,
          bg: bg
        };
      ]]]

  state_display: |
    [[[
      const map = {
        'Confort': 'Confort actif',
        'Eco': 'Réduit actif',
        'Inconnu': 'État inconnu'
      };
      return map[entity.state] || entity.state;
    ]]]

  label: |
    [[[
      const d = variables.diag;
      return `Intention : ${d.intention}${d.reason_txt ? ' — ' + d.reason_txt : ''}`;
    ]]]

  styles:
    card:
      - background-color: |
          [[[
            return variables.diag.bg;
          ]]]
