# ==========================================================
# 🧠 ARSENAL — TEMPLATE UI METIER
#     Chauffage — Décision et cohérence état réel / intention
# ==========================================================
#
# 📌 STATUT
#     TEMPLATE UI METIER
#
# 🎯 ROLE
#     Affiche l'état réel du chauffage et le confronte à
#     l'intention calculée. Colore la carte selon la cohérence
#     de la décision et la nature de la raison active.
#     Expose l'intention et la raison traduite en label.
#
# 🧱 NATURE
#     - Template button-card
#     - Spécialisation de socle_decision_72
#     - UI uniquement (aucune décision)
#
# 🎨 SEMANTIQUE
#     - Cohérent + pas de blocage            -> 🟢 vert    (nominal)
#     - Blocage actif / protection thermique -> 🟠 orange  (warn — contrainte externe)
#     - Pré-confort                          -> 🔵 bleu    (info — état transitoire)
#     - Incohérence état réel ≠ intention    -> 🔴 rouge   (ko — divergence à investiguer)
#
# 🔗 DEPENDANCES
#     - entity                            : sensor état réel chauffage (Confort | Eco | Inconnu)
#     - sensor.chauffage_mode_calcule     : intention du moteur de décision
#     - sensor.chauffage_raison_calculee  : raison active (clé normalisée Arsenal)
#
# ⚠️ CONTRAINTES
#     - La cohérence admet 'Neutre' comme intention valide pour Eco ou Confort
#     - Les clés de raison sont normalisées — toute clé inconnue est affichée brute
#     - La variable `diag` est un objet calculé inline — ne pas la surcharger à l'instance
#     - Aucune action définie — héritée de socle_decision_72
#
# 🧩 USAGE
#     type: custom:button-card
#     template: carte_chauffage_decision
#     entity: sensor.chauffage_etat_reel
#
# ==========================================================

carte_chauffage_decision:
  template: socle_decision_72

  name: Chauffage – État réel

  variables:
    diag: |
      [[[
        const reel = entity?.state;
        const intention = states['sensor.chauffage_mode_calcule']?.state;
        const raison = states['sensor.chauffage_raison_calculee']?.state || '';

        const labels = {
          confort_force: 'override opérateur',
          chauffage_non_autorise: 'chauffage non autorisé',
          aeration_en_cours: 'aération en cours',
          blocage_aeration_en_cours: 'post-aération',
          fenetre_ouverte_maison: 'fenêtre ouverte',
          pre_confort_vacances: 'pré-confort',
          mode_maison_vacances: 'mode vacances',
          poele_actif: 'poêle actif',
          besoin_thermique: 'besoin thermique',
          presence_on: 'présence',
          confort_suffisant: 'confort suffisant',
          absence_protection_thermique: 'protection thermique',
          absence: 'absence'
        };

        const blocages = [
          'chauffage_non_autorise',
          'aeration_en_cours',
          'blocage_aeration_en_cours',
          'fenetre_ouverte_maison',
          'mode_maison_vacances',
          'poele_actif'
        ];

        const r = raison;
        const is_inconnu = (reel === 'Inconnu');
        const is_blocage = blocages.includes(r);
        const is_absence_protection = (r === 'absence_protection_thermique');
        const is_info = (r === 'pre_confort_vacances');

        const coherent = (() => {
          if (is_inconnu) return false;
          if (intention === reel) return true;
          if (intention === 'Neutre' && (reel === 'Eco' || reel === 'Confort')) return true;
          return false;
        })();

        const category = (() => {
          if (!coherent) return 'ko';
          if (is_blocage || is_absence_protection) return 'warn';
          if (is_info) return 'info';
          return 'ok';
        })();

        const bg = (() => {
          if (category === 'warn') return "rgba(255, 152, 0, 0.2)";
          if (category === 'info') return "rgba(33, 150, 243, 0.2)";
          if (category === 'ok')   return "rgba(76, 175, 80, 0.2)";
          return "rgba(244, 67, 54, 0.2)";
        })();

        const reason_txt = r ? (labels[r] || r) : '';

        return {
          reel,
          intention: intention || '—',
          raison: r,
          reason_txt,
          category,
          bg
        };
      ]]]

  state_display: |
    [[[
      const map = {
        'Confort': 'Confort actif',
        'Eco': 'Réduit actif',
        'Inconnu': 'État inconnu'
      };
      return map[entity.state] || entity.state;
    ]]]

  label: |
    [[[
      const d = variables.diag;
      return `Intention : ${d.intention}${d.reason_txt ? ' — ' + d.reason_txt : ''}`;
    ]]]

  styles:
    card:
      - background-color: |
          [[[
            return variables.diag.bg;
          ]]]