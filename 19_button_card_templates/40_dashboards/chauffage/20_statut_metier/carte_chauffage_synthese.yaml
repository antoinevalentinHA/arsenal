# ==========================================================
# 🧠 ARSENAL — TEMPLATE UI METIER
#     Chauffage — Synthèse d'état consolidée
# ==========================================================
#
# 📌 STATUT
#     TEMPLATE UI METIER
#
# 🎯 ROLE
#     Carte de lecture consolidée du chauffage : traduit en langage
#     humain l'état réel (brûleur), le programme et la raison calculée.
#     Distingue activité réelle, blocages, attentes thermiques,
#     pré-confort et repos nominal. Aucune interaction.
#
# 🧱 NATURE
#     - Template button-card
#     - Spécialisation de socle_status_label_xl
#     - UI uniquement (aucune décision)
#
# 🎨 SEMANTIQUE (palette contractuelle Arsenal — cf. 02_palette.md)
#     - Brûleur ON                              -> 🔵 bleu    (information thermique, Q3.b)
#     - raison = confort_force                  -> 🔵 bleu    (override opérateur)
#     - raison = chauffage_non_autorise         -> 🔴 rouge   (sécurité système)
#     - raison = aeration / blocage_aeration /
#       fenetre_ouverte                         -> 🟠 orange  (sécurité situation limite)
#     - raison = mode_vacances / pre_confort    -> 🔵 bleu    (contexte majeur)
#     - raison = poele_actif /
#       stabilisation_absence                   -> 🔵 bleu    (stabilisation)
#     - raison = besoin_thermique /
#       confort_suffisant                       -> 🟢 vert    (autorisation nominale)
#     - prog = confort + brûleur OFF            -> 🟢 vert    (confort satisfait)
#     - défaut (présence_on, absence)           -> ⚪ gris    (neutre)
#
# 🔗 DEPENDANCES
#     - entity                                        : sensor.programme_chauffage
#     - binary_sensor.bruleur_mode_chauffage          : activité réelle brûleur
#     - sensor.chauffage_raison_calculee              : raison active normalisée Arsenal
#     - sensor.temperature_consigne_appliquee_locale  : consigne affichée en label
#
# ⚠️ CONTRAINTES
#     - Priorité stricte : brûleur > override > sécurité > contexte > stabilisation > nominal > défaut
#     - Les variantes "éco" avec accent sont gérées (prog === 'eco' || 'éco')
#     - La consigne est omise du label si unavailable / unknown / '0'
#     - Aucune action définie — carte de lecture pure
#     - Distinct de carte_chauffage_decision : ici le brûleur prime, pas la cohérence
#       intention/réel
#
# 🧩 USAGE
#     type: custom:button-card
#     template: carte_chauffage_synthese
#     entity: sensor.programme_chauffage
#
# ==========================================================

carte_chauffage_synthese:
  template: socle_status_label_xl
  entity: sensor.programme_chauffage

  #################################################################
  # 🔥 ICÔNE — PRIORITÉ À L’ACTIVITÉ RÉELLE
  #################################################################
  icon: |
    [[[
      const bruleur = states['binary_sensor.bruleur_mode_chauffage']?.state === 'on';
      const prog = (entity.state || '').toLowerCase();

      if (bruleur) return 'mdi:fire';
      if (prog === 'confort') return 'mdi:radiator';
      if (prog === 'eco' || prog === 'éco') return 'mdi:leaf';
      return 'mdi:fire-off';
    ]]]

  #################################################################
  # 🧠 ÉTAT PRINCIPAL
  #################################################################
state_display: |
    [[[
      const prog = (entity.state || '').toLowerCase();
      const raison = states['sensor.chauffage_raison_calculee']?.state;
      const bruleur = states['binary_sensor.bruleur_mode_chauffage']?.state === 'on';

      if (bruleur) {
        return 'Actif';
      }

      if (raison === 'confort_force') {
        return 'Override • confort';
      }

      // Registre sécurité système
      if (raison === 'chauffage_non_autorise') {
        return 'Interdit (sécurité)';
      }

      // Registre sécurité (situation limite)
      if ([
        'aeration_en_cours',
        'blocage_aeration_en_cours',
        'fenetre_ouverte_maison'
      ].includes(raison)) {
        return 'Bloqué';
      }

      // Registre contexte majeur
      if (raison === 'mode_maison_vacances') {
        return 'Mode Vacances';
      }
      if (raison === 'pre_confort_vacances') {
        return 'Pré-confort';
      }

      // Registre stabilisation
      if (raison === 'poele_actif') {
        return 'Poêle actif';
      }
      if (raison === 'stabilisation_absence') {
        return 'Stabilisation absence';
      }

      // Registre autorisation
      if (raison === 'confort_suffisant') {
        return 'Confort suffisant';
      }
      if (raison === 'besoin_thermique') {
        return 'Besoin thermique';
      }

      if (prog === 'confort') {
        return 'Confort';
      }

      if (raison === 'presence_on' && prog !== 'confort') {
        return 'Attente • confort';
      }

      if ((prog === 'eco' || prog === 'éco') && raison === 'absence') {
        return 'Attente • absence';
      }

      if (prog === 'eco' || prog === 'éco') return 'Réduit';
      if (prog === 'off' || prog === 'veille' || prog === 'standby') return 'Veille';

      return 'Inconnu';
    ]]]

  #################################################################
  # 🧾 LIBELLÉ EXPLICATIF
  #################################################################
label: |
    [[[
      const prog = (entity.state || '').toLowerCase();
      const raison = states['sensor.chauffage_raison_calculee']?.state;
      const c = states['sensor.temperature_consigne_appliquee_locale']?.state;
      const bruleur = states['binary_sensor.bruleur_mode_chauffage']?.state === 'on';

      const fmt_consigne = (v) => {
        if (v && !['unknown','unavailable','0'].includes(v)) {
          return ` • consigne ${parseFloat(v).toFixed(1)} °C`;
        }
        return '';
      };

      if (bruleur) {
        return `Chauffage actif${fmt_consigne(c)}`;
      }

      if (raison === 'confort_force') {
        return `Override opérateur${fmt_consigne(c)}`;
      }

      // Sécurité système
      if (raison === 'chauffage_non_autorise') {
        return 'Interdit — sécurité système';
      }

      // Sécurité (situation limite)
      const securite_labels = {
        aeration_en_cours: 'aération en cours',
        blocage_aeration_en_cours: 'post-aération',
        fenetre_ouverte_maison: 'fenêtre ouverte'
      };
      if (securite_labels[raison]) {
        return `Chauffage bloqué • ${securite_labels[raison]}`;
      }

      // Contexte majeur
      if (raison === 'mode_maison_vacances') {
        return 'Mode Vacances • consigne réduite';
      }
      if (raison === 'pre_confort_vacances') {
        return 'Pré-confort Vacances • autorisation transitoire';
      }

      // Stabilisation
      if (raison === 'poele_actif') {
        return 'Poêle actif • chauffage en retrait';
      }
      if (raison === 'stabilisation_absence') {
        return 'Stabilisation thermique d\\'absence';
      }

      // Autorisation
      if (raison === 'confort_suffisant') {
        return 'Confort suffisant • sobriété nominale';
      }
      if (raison === 'besoin_thermique') {
        return 'Besoin thermique • appel en cours';
      }

      if (prog === 'confort') {
        return 'Confort atteint • chauffage au repos';
      }

      if (raison === 'presence_on' && prog !== 'confort') {
        return 'Confort autorisé • seuil non atteint';
      }

      if ((prog === 'eco' || prog === 'éco') && raison === 'absence') {
        return 'Sobriété • absence';
      }

      return `Régime ${entity.state}`;
    ]]]

  #################################################################
  # 🎨 COULEURS — CHARTE ARSENAL STRICTE
  #################################################################
state:
    # 🔵 Brûleur actif (Q3.b — information thermique, non décisionnel)
    - operator: template
      value: |
        [[[
          return states['binary_sensor.bruleur_mode_chauffage']?.state === 'on';
        ]]]
      styles:
        card:
          - background-color: rgba(33, 150, 243, 0.2)

    # 🔵 Override opérateur
    - operator: template
      value: |
        [[[
          return states['sensor.chauffage_raison_calculee']?.state === 'confort_force';
        ]]]
      styles:
        card:
          - background-color: rgba(33, 150, 243, 0.2)

    # 🔴 Sécurité système (interdiction réelle)
    - operator: template
      value: |
        [[[
          return states['sensor.chauffage_raison_calculee']?.state === 'chauffage_non_autorise';
        ]]]
      styles:
        card:
          - background-color: rgba(244, 67, 54, 0.2)

    # 🟠 Sécurité (situation limite)
    - operator: template
      value: |
        [[[
          return [
            'aeration_en_cours',
            'blocage_aeration_en_cours',
            'fenetre_ouverte_maison'
          ].includes(states['sensor.chauffage_raison_calculee']?.state);
        ]]]
      styles:
        card:
          - background-color: rgba(255, 152, 0, 0.2)

    # 🔵 Contexte majeur (Vacances)
    - operator: template
      value: |
        [[[
          const r = states['sensor.chauffage_raison_calculee']?.state;
          return r === 'mode_maison_vacances' || r === 'pre_confort_vacances';
        ]]]
      styles:
        card:
          - background-color: rgba(33, 150, 243, 0.2)

    # 🔵 Stabilisation (poêle + stabilisation_absence — Q1 et Q2)
    - operator: template
      value: |
        [[[
          const r = states['sensor.chauffage_raison_calculee']?.state;
          return r === 'poele_actif' || r === 'stabilisation_absence';
        ]]]
      styles:
        card:
          - background-color: rgba(33, 150, 243, 0.2)

    # 🟢 Autorisation nominale (besoin thermique / confort suffisant)
    - operator: template
      value: |
        [[[
          const r = states['sensor.chauffage_raison_calculee']?.state;
          return r === 'besoin_thermique' || r === 'confort_suffisant';
        ]]]
      styles:
        card:
          - background-color: rgba(76, 175, 80, 0.2)

    # 🟢 Confort satisfait (programme confort + bruleur off)
    - operator: template
      value: |
        [[[
          const prog = (entity.state || '').toLowerCase();
          const bruleur = states['binary_sensor.bruleur_mode_chauffage']?.state === 'on';
          return prog === 'confort' && !bruleur;
        ]]]
      styles:
        card:
          - background-color: rgba(76, 175, 80, 0.2)

    # ⚪ Présence neutre / absence (autorisation par défaut)
    - operator: default
      styles:
        card:
          - background-color: rgba(158, 158, 158, 0.2)