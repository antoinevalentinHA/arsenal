# ==========================================================
# 🧠 ARSENAL — CARTE UI
#     Alarme — Diagnostic coherence
#
# 🗂️ COUCHE : diagnostic
# 🧱 TYPE UI : diagnostic explicatif
# 🔍 NIVEAU DE CONFIANCE : eleve
# ==========================================================
#
# 🎯 RÔLE
#   Afficher l'etat de coherence global du systeme
#   d'alarme ainsi que la raison associee.
#
# 📡 SOURCE
#   - entity.state
#   - entity.attributes.raison
#
# ⚙️ LOGIQUE UI
#   - Affiche un diagnostic backend deja calcule
#   - Traduit l'etat en message lisible :
#       - on  -> Systeme coherent
#       - off -> Incoherence detectee
#       - unknown/unavailable -> Indisponible
#   - Affiche la raison associee via l'attribut `raison`
#   - Code visuel :
#       - coherent -> vert
#       - incoherent -> rouge
#       - indisponible -> gris indispo
#   - Carte strictement informative
#   - Aucun calcul de coherence
#
# ----------------------------------------------------------
# 🔒 STRUCTURE
#   SATELLITE et PIVOT sont mutuellement exclusifs
# ----------------------------------------------------------
#
# 🔗 SATELLITE DE : socle_diagnostic
#
# ==========================================================

alarme_diagnostic_coherence:
  template: socle_diagnostic

  icon: mdi:shield-check

  show_state: true
  show_label: true

  state_display: >
    [[[ 
      if (entity.state === "on") return "Système cohérent";
      if (entity.state === "off") return "Incohérence détectée";
      return "Indisponible";
    ]]]

  label: >
    [[[ 
      return entity.attributes?.raison || "—";
    ]]]

  state:
    - value: "on"
      styles:
        card:
          - background-color: rgba(76, 175, 80, 0.2)

    - value: "off"
      styles:
        card:
          - background-color: rgba(244, 67, 54, 0.2)

    - operator: template
      value: >
        [[[ return entity.state === "unknown" || entity.state === "unavailable"; ]]]
      styles:
        card:
          - background-color: rgba(158, 158, 158, 0.1)
