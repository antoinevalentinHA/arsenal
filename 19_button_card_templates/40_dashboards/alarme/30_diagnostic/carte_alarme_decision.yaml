# ==========================================================
# 🧠 ARSENAL — CARTE UI
#     Alarme — Décision
#
# 🗂️ COUCHE : diagnostic
# 🧱 TYPE UI : synthèse décision / état réel / raison
# 🔍 NIVEAU DE CONFIANCE : élevé
# ==========================================================
#
# 🎯 RÔLE
#   Afficher l’état réel du panneau d’alarme, la décision
#   cible issue du backend et la cohérence entre les deux,
#   avec la raison associée.
#
# 📡 SOURCE
#   - entity.state (alarm_control_panel.alarme_maison)
#   - input_text.alarme_etat_cible
#   - input_text.alarme_raison
#
# ⚙️ LOGIQUE UI
#   - Affiche l’état réel de l’alarme :
#       - armed_away → "Armée (Absent)"
#       - disarmed   → "Désarmée"
#   - Affiche la décision cible :
#       - ARMED_AWAY → "Décision : Armer"
#       - DISARMED   → "Décision : Désarmer"
#       - NOOP       → "Décision : Aucune action"
#   - Ajoute la raison si disponible
#   - Compare décision cible et état réel
#   - Code visuel :
#       - cohérent → vert
#       - divergence → rouge
#       - NOOP → considéré cohérent (neutre logique)
#   - Carte strictement informative
#   - Aucun calcul de décision
#   - Aucun pilotage du système
#
# ----------------------------------------------------------
# 🔒 STRUCTURE
#   SATELLITE et PIVOT sont mutuellement exclusifs
# ----------------------------------------------------------
#
# ⚠️ CARTE PIVOT
#   Traverse :
#     - intention
#     - état réel
#     - diagnostic
# ==========================================================

carte_alarme_decision:
  template: socle_diagnostic

  icon: mdi:shield-home

  state_display: |
    [[[
      const map = {
        'armed_away': 'Armée (Absent)',
        'disarmed': 'Désarmée'
      };
      return map[entity.state] || entity.state;
    ]]]

  label: |
    [[[
      const cible = states['input_text.alarme_etat_cible']?.state || '—';
      const raison = states['input_text.alarme_raison']?.state || '';
      const map = {
        'ARMED_AWAY': 'Décision : Armer',
        'DISARMED': 'Décision : Désarmer',
        'NOOP': 'Décision : Aucune action'
      };
      return `${map[cible] || cible}${raison ? ' — ' + raison : ''}`;
    ]]]

  state:
    # 🟢 Cohérent
    - operator: template
      value: >
        [[[
          const cible = states['input_text.alarme_etat_cible']?.state;
          return (cible === 'ARMED_AWAY' && entity.state === 'armed_away') ||
                 (cible === 'DISARMED'  && entity.state === 'disarmed') ||
                 (cible === 'NOOP');
        ]]]
      styles:
        card:
          - background-color: rgba(76,175,80,0.2)

    # 🔴 Divergence
    - operator: template
      value: >
        [[[
          const cible = states['input_text.alarme_etat_cible']?.state;
          return (cible === 'ARMED_AWAY' && entity.state !== 'armed_away') ||
                 (cible === 'DISARMED'  && entity.state !== 'disarmed');
        ]]]
      styles:
        card:
          - background-color: rgba(244,67,54,0.2)
