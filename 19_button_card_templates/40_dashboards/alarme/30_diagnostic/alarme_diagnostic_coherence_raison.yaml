# ==========================================================
# 🧠 ARSENAL — CARTE UI
#     Alarme — Diagnostic cohérence raison
#
# 🗂️ COUCHE : diagnostic
# 🧱 TYPE UI : information contextuelle
# 🔍 NIVEAU DE CONFIANCE : élevé
# ==========================================================
#
# 🎯 RÔLE
#   Afficher la raison textuelle associée au diagnostic
#   de cohérence du système d'alarme.
#
# 📡 SOURCE
#   - entity.attributes.raison
#
# ⚙️ LOGIQUE UI
#   - Lit l'attribut `raison`
#   - Traduit les codes backend en libellés lisibles
#   - Cas nominal :
#       - code connu → libellé explicite
#   - Cas dégradé :
#       - absent / unknown / unavailable → "Indisponible"
#   - Carte purement informative
#   - Aucun affichage d'état
#   - Aucun calcul de diagnostic
#
# ----------------------------------------------------------
# 🔒 STRUCTURE
#   SATELLITE et PIVOT sont mutuellement exclusifs
# ----------------------------------------------------------
#
# 🔗 SATELLITE DE : socle_info_72
#
# ==========================================================

alarme_diagnostic_coherence_raison:
  template: socle_info_72

  show_state: false
  show_label: true
  name: Raison

  label: >
    [[[
      const r = entity.attributes?.raison;

      if (!r || r === "unknown" || r === "unavailable")
        return "Indisponible";

      const map = {
        "coherent": "Fonctionnement nominal",
        "force_on_test": "Mode test actif",
        "force_on_babysitting": "Mode babysitting actif",
        "force_on_mixte": "Modes test + babysitting actifs",
        "force_on": "Mode test / babysitting actif",
        "blocage_actif": "Blocage armement automatique actif",
        "armed_away_avec_presence": "Alarme armée avec présence détectée",
        "desarme_maison_vide": "Alarme désarmée alors que maison vide"
      };

      return map[r] || r;
    ]]]
