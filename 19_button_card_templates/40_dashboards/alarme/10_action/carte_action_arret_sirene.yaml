# ==========================================================
# 🧠 ARSENAL — CARTE UI
#     Alarme — Arret sirene
#
# 🗂️ COUCHE : action
# 🧱 TYPE UI : action critique
# 🔍 NIVEAU DE CONFIANCE : total
# ==========================================================
#
# 🎯 RÔLE
#   Permettre l'arret immediat de la sirene via une
#   action utilisateur critique avec confirmation.
#
# 📡 SOURCE
#   - script.arret_sirene
#
# ⚙️ LOGIQUE UI
#   - Bouton d'action sans lecture d'etat
#   - Confirmation obligatoire avant execution
#   - Execution directe du script d'arret
#   - Semantique visuelle critique (rouge)
#
# ----------------------------------------------------------
# 🔒 STRUCTURE
#   SATELLITE et PIVOT sont mutuellement exclusifs
# ----------------------------------------------------------
#
# 🔗 SATELLITE DE : socle_action_critical
#
# ==========================================================

carte_action_arret_sirene:
  template: socle_action_critical

  name: Arrêt sirène
  icon: mdi:alarm-off

  tap_action:
    action: call-service
    service: script.arret_sirene
    confirmation:
      text: Arrêter immédiatement la sirène ?

  styles:
    card:
      - background-color: rgba(244, 67, 54, 0.2)
