# ==========================================================
# 🧠 ARSENAL — CARTE UI
#     Alarme — Intention systeme
#
# 🗂️ COUCHE : intention
# 🧱 TYPE UI : comparaison intention / etat reel
# 🔍 NIVEAU DE CONFIANCE : eleve
# ==========================================================
#
# 🎯 RÔLE
#   Afficher l'intention du systeme d'alarme et sa
#   coherence avec l'etat reel du panneau.
#
# 📡 SOURCE
#   - entity.state
#   - alarm_control_panel.alarme_maison
#
# ⚙️ LOGIQUE UI
#   - Affiche l'intention backend sous forme lisible :
#       - ARMED_AWAY -> Armer (Absent)
#       - DISARMED  -> Desarmer
#       - NOOP      -> Aucune action
#   - Compare l'intention cible a l'etat reel de
#     `alarm_control_panel.alarme_maison`
#   - Code visuel :
#       - intention coherente -> vert
#       - divergence -> rouge
#       - NOOP -> gris neutre
#   - Carte strictement informative
#   - Aucun calcul de decision
#
# ----------------------------------------------------------
# 🔒 STRUCTURE
#   SATELLITE et PIVOT sont mutuellement exclusifs
# ----------------------------------------------------------
#
# ⚠️ CARTE PIVOT
#   Traverse :
#     - intention
#     - etat reel
#     - diagnostic
# ==========================================================

carte_alarme_intention:
  template: socle_status

  icon: mdi:brain
  name: Intention système

  show_icon: true
  show_label: false

  tap_action:
    action: none
  hold_action:
    action: none
  double_tap_action:
    action: none

  state_display: |
    [[[ 
      const map = {
        'ARMED_AWAY': 'Armer (Absent)',
        'DISARMED': 'Désarmer',
        'NOOP': 'Aucune action'
      };
      return map[entity.state] || entity.state;
    ]]]

  state:
    # 🟢 COHÉRENT
    - operator: template
      value: >
        [[[
          const cible = entity.state;
          const reel  = states['alarm_control_panel.alarme_maison']?.state;

          return (cible === 'ARMED_AWAY' && reel === 'armed_away') ||
                 (cible === 'DISARMED'  && reel === 'disarmed');
        ]]]
      styles:
        card:
          - background-color: rgba(76,175,80,0.2)

    # 🔴 DIVERGENCE
    - operator: template
      value: >
        [[[
          const cible = entity.state;
          const reel  = states['alarm_control_panel.alarme_maison']?.state;

          return (cible === 'ARMED_AWAY' && reel !== 'armed_away') ||
                 (cible === 'DISARMED'  && reel !== 'disarmed');
        ]]]
      styles:
        card:
          - background-color: rgba(244,67,54,0.2)

    # ⚪ NOOP
    - value: 'NOOP'
      styles:
        card:
          - background-color: rgba(158,158,158,0.2)
