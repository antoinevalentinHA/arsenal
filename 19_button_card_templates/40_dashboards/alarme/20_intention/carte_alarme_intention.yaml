# ==========================================================
# 🧠 ARSENAL — CARTE UI
#     Alarme — Intention systeme
#
# 🗂️ COUCHE : intention
# 🧱 TYPE UI : comparaison intention / etat reel
# 🔍 NIVEAU DE CONFIANCE : eleve
# ==========================================================
#
# 🎯 RÔLE
#   Afficher l'intention du systeme d'alarme et sa
#   coherence avec l'etat reel du panneau.
#
# 📡 SOURCE
#   - entity.state
#   - alarm_control_panel.alarme_maison
#
# ⚙️ LOGIQUE UI
#   - Affiche l'intention backend sous forme lisible :
#       - ARMED_AWAY -> Armer (Absent)
#       - DISARMED  -> Desarmer
#       - NOOP      -> Aucune action
#       - unknown/unavailable -> Indisponible
#   - Compare l'intention cible a l'etat reel de
#     `alarm_control_panel.alarme_maison`
#   - Priorite de restitution (chantier C23, invariant partage
#     avec carte_alarme_decision) :
#       INDISPONIBILITE > TRIGGERED > NOOP > COHERENCE > DIVERGENCE
#   - Code visuel (fond) :
#       - indisponibilite (cible OU reel) -> gris indispo rgba(158,158,158,0.1)
#       - reel triggered                  -> rouge rgba(244,67,54,0.2)
#       - NOOP                            -> gris neutre rgba(158,158,158,0.2)
#       - intention coherente             -> vert rgba(76,175,80,0.2)
#       - divergence                      -> rouge rgba(244,67,54,0.2)
#   - Branches mutuellement exclusives (une seule s'applique)
#   - Carte strictement informative
#   - Aucun calcul de decision
#
# ----------------------------------------------------------
# 🔒 STRUCTURE
#   SATELLITE et PIVOT sont mutuellement exclusifs
# ----------------------------------------------------------
#
# ⚠️ CARTE PIVOT
#   Traverse :
#     - intention
#     - etat reel
#     - diagnostic
# ==========================================================

carte_alarme_intention:
  template: socle_status

  icon: mdi:brain
  name: Intention système

  show_icon: true
  show_label: false

  tap_action:
    action: none
  hold_action:
    action: none
  double_tap_action:
    action: none

  state_display: |
    [[[
      const IN = ['unknown', 'unavailable'];
      if (IN.includes(entity.state)) return 'Indisponible';
      const map = {
        'ARMED_AWAY': 'Armer (Absent)',
        'DISARMED': 'Désarmer',
        'NOOP': 'Aucune action'
      };
      return map[entity.state] || entity.state;
    ]]]

  state:
    # ⚪ L1 — Indisponibilité (priorité absolue, R6) — cible OU réel indisponible
    - operator: template
      value: >
        [[[
          const IN = ['unknown', 'unavailable'];
          const cible = entity.state;
          const reel  = states['alarm_control_panel.alarme_maison']?.state;
          return IN.includes(cible) || IN.includes(reel);
        ]]]
      styles:
        card:
          - background-color: rgba(158,158,158,0.1)

    # 🔴 L2 — Alarme déclenchée (panneau réel triggered)
    - operator: template
      value: >
        [[[
          const IN = ['unknown', 'unavailable'];
          const cible = entity.state;
          const reel  = states['alarm_control_panel.alarme_maison']?.state;
          return reel === 'triggered' && !IN.includes(cible);
        ]]]
      styles:
        card:
          - background-color: rgba(244,67,54,0.2)

    # ⚪ L3 — NOOP (abstention valide, gris neutre)
    - operator: template
      value: >
        [[[
          const IN = ['unknown', 'unavailable'];
          const reel = states['alarm_control_panel.alarme_maison']?.state;
          return entity.state === 'NOOP' && !IN.includes(reel) && reel !== 'triggered';
        ]]]
      styles:
        card:
          - background-color: rgba(158,158,158,0.2)

    # 🟢 L4 — Cohérent (opérandes disponibles, intention == réel)
    - operator: template
      value: >
        [[[
          const cible = entity.state;
          const reel  = states['alarm_control_panel.alarme_maison']?.state;
          return (cible === 'ARMED_AWAY' && reel === 'armed_away') ||
                 (cible === 'DISARMED'  && reel === 'disarmed');
        ]]]
      styles:
        card:
          - background-color: rgba(76,175,80,0.2)

    # 🔴 L5 — Divergence (opérandes disponibles, réel ≠ triggered, cible ≠ NOOP, intention ≠ réel)
    - operator: template
      value: >
        [[[
          const IN = ['unknown', 'unavailable'];
          const cible = entity.state;
          const reel  = states['alarm_control_panel.alarme_maison']?.state;
          if (IN.includes(cible) || IN.includes(reel)) return false;
          if (reel === 'triggered' || cible === 'NOOP') return false;
          const coherent = (cible === 'ARMED_AWAY' && reel === 'armed_away') ||
                           (cible === 'DISARMED'  && reel === 'disarmed');
          return !coherent;
        ]]]
      styles:
        card:
          - background-color: rgba(244,67,54,0.2)
