# ==========================================================
# 🧠 ARSENAL — CARTE UI
#     Arrosage — Verdict d'intention interprété (raison)
#
# 🗂️ COUCHE : diagnostic
# 🧱 TYPE UI : état + contexte interprété
# 🔍 NIVEAU DE CONFIANCE : élevé
# ==========================================================
#
# 🎯 RÔLE
#   Rendre lisible, en UNE carte, le verdict d'arrosage déjà
#   décidé par le runtime :
#     - state  → catégorie lisible (Arrosage / Suspendu / Abstention / Repos)
#     - label  → raison dominante en clair (pourquoi ce verdict)
#     - couleur → dérivée de la catégorie (palette arrosage existante)
#   Complète le verdict binaire (carte_mode_binaire_interprete) en
#   répondant à « pourquoi ça arrose / ça n'arrose pas ? ».
#
# 📡 SOURCE
#   - binary_sensor.arrosage_intention
#       attributes.categorie → arrose | suspendu | abstention | repos
#       attributes.motif     → maitre_off | pont_indisponible |
#                              preconditions_non_remplies |
#                              canal_sol_indisponible | suspension_pluie |
#                              hors_fenetre | cooldown_actif |
#                              sol_suffisant | arrosage_requis
#
# ⚙️ LOGIQUE UI (traduction portée par le template, PAS le runtime)
#   - Traduit la catégorie et le motif DOMINANT (déjà calculés par le
#     runtime) en libellés français. Lecture seule.
#   - LIGNE SECONDAIRE contextuelle : quand la catégorie est `abstention`
#     (motif infrastructure — le sol n'est PAS consulté par le motif
#     dominant, ordre infrastructure-d'abord du contrat 17 R7) et que
#     `binary_sensor.arrosage_besoin_sol` est `off`, le label devient
#     DEUX lignes (idiome <br> des cartes diagnostic XL) :
#       « sol suffisamment humide »   ← contexte métier, en premier
#       « <motif dominant traduit> »  ← cause infrastructure, inchangée
#     AUCUN recalcul : simple LECTURE de l'état déjà décidé par le
#     runtime (le motif dominant et son ordre restent inchangés).
#     `besoin_sol` unknown/unavailable ⇒ rien d'ajouté (on ne masque
#     pas une indisponibilité par un libellé).
#     `triggers_update` force le re-rendu quand besoin_sol change.
#   - LISIBILITÉ MOBILE : le label passe en `white-space: normal`
#     (le nowrap/ellipse par défaut TRONQUAIT le contexte sur mobile)
#     et la carte surcharge localement la hauteur fixe 72px du socle
#     (`height: auto` + `min-height: 72px`) pour que les deux lignes
#     soient toujours visibles, jamais coupées (surcharge locale
#     prévue par carte_base_v2).
#   - NE recalcule NI le besoin sol, NI la fenêtre, NI le cooldown, NI la
#     disponibilité du pont, NI la suspension pluie, NI l'intention :
#     le runtime décide, l'UI explique.
#   - Cas dégradé (attribut absent / unknown / unavailable) → "—".
#
# 🧱 INSPIRATION
#   Pattern carte_arrosage_pluie_raison (traduction code → libellé
#   portée par la carte UI).
#
# 🔗 SATELLITE DE : socle_status_label
#
# 🏷️ STATUT
#   Diagnostic UI — Arsenal v14.x
# ==========================================================

carte_arrosage_intention_raison:
  template: socle_status_label

  show_icon: false
  show_name: true
  show_state: true
  show_label: true

  # Re-rendu quand le contexte sol change (la ligne secondaire le lit).
  triggers_update:
    - binary_sensor.arrosage_besoin_sol

  name: Raison du verdict

  state_display: >
    [[[
      const c = (entity.attributes?.categorie || "").toString().trim();
      const map = {
        "arrose": "Arrosage",
        "suspendu": "Suspendu",
        "abstention": "Abstention",
        "repos": "Repos"
      };
      return map[c] || "—";
    ]]]

  label: >
    [[[
      const m = (entity.attributes?.motif || "").toString().trim();
      const map = {
        "maitre_off": "automatisme désactivé (maître off)",
        "pont_indisponible": "pont Rain Bird indisponible",
        "preconditions_non_remplies": "préconditions runtime non remplies",
        "canal_sol_indisponible": "canal sol non exploitable (1 point frais au plus)",
        "suspension_pluie": "suspension pluie active",
        "hors_fenetre": "hors fenêtre d'arrosage",
        "cooldown_actif": "délai minimal non écoulé (cooldown)",
        "sol_suffisant": "sol suffisamment humide",
        "arrosage_requis": "arrosage requis"
      };
      const base = map[m] || "—";

      // Ligne secondaire contextuelle : un motif d'abstention est
      // infrastructure-d'abord (contrat 17 R7) — préciser que le sol
      // est par ailleurs suffisant évite de croire qu'il est ignoré.
      // Deux lignes distinctes (<br>, idiome des cartes diagnostic XL) :
      // contexte métier d'abord, cause infrastructure ensuite — jamais
      // concaténées sur une ligne tronquable sur mobile.
      // Lecture seule de l'état déjà calculé ; unknown/unavailable ⇒
      // rien d'ajouté (pas de masquage d'indisponibilité).
      const c = (entity.attributes?.categorie || "").toString().trim();
      const sol = states?.["binary_sensor.arrosage_besoin_sol"]?.state;
      if (base !== "—" && c === "abstention" && sol === "off") {
        return "sol suffisamment humide<br>" + base;
      }
      return base;
    ]]]

  styles:
    card:
      # Surcharge locale de la hauteur fixe 72px du socle (prévue par
      # carte_base_v2) : la carte grandit pour le label à deux lignes,
      # jamais de texte coupé sur mobile.
      - height: auto
      - min-height: 72px
      - background-color: >
          [[[
            const c = (entity.attributes?.categorie || "").toString().trim();
            if (c === "arrose") return "rgba(33, 150, 243, 0.2)";
            if (c === "suspendu") return "rgba(158, 158, 158, 0.2)";
            if (c === "abstention") return "rgba(255, 152, 0, 0.2)";
            if (c === "repos") return "rgba(76, 175, 80, 0.2)";
            return "rgba(158, 158, 158, 0.2)";
          ]]]

    label:
      # Le nowrap/ellipse par défaut tronquait l'information utile sur
      # mobile : retour à la ligne autorisé (idiome des cartes XL).
      - white-space: normal
      - line-height: 1.3
