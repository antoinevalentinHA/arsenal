# ==========================================================
# 🧠 ARSENAL — CARTE UI
#     Alarme — Carte alarme
#
# 🗂️ COUCHE : action
# 🧱 TYPE UI : commande explicite contextualisée
# 🔍 NIVEAU DE CONFIANCE : élevé
# ==========================================================
#
# 🎯 RÔLE
#   Afficher l’état lisible de l’alarme maison et
#   permettre un armement ou désarmement explicite
#   selon l’état courant.
#
# 📡 SOURCE
#   - entity.state (alarm_control_panel.alarme_maison)
#
# ⚙️ LOGIQUE UI
#   - Affiche l’état réel de l’alarme :
#       - armed_away → « Armée »
#       - disarmed   → « Désarmée »
#       - autre état → affichage brut
#   - Détermine l’action utilisateur proposée selon
#     l’état courant :
#       - si désarmée → armement explicite
#       - sinon → désarmement explicite
#   - Confirmation obligatoire avant exécution
#   - Aucun appel direct à alarm_control_panel
#   - Délégation systématique aux scripts canoniques
#   - Navigation vers le dashboard alarme sur maintien
#   - Code visuel :
#       - disarmed → vert
#       - armed_away → rouge
#
# ----------------------------------------------------------
# 🔒 STRUCTURE
#   SATELLITE et PIVOT sont mutuellement exclusifs
# ----------------------------------------------------------
#
# 🔗 SATELLITE DE : socle_toggle
#
# ==========================================================

carte_alarme:
  template: socle_toggle

  show_state: true

  state_display: |
    [[[
      if (!entity) return '—';
      return entity.state === 'armed_away' ? 'Armée'
           : entity.state === 'disarmed'  ? 'Désarmée'
           : entity.state;
    ]]]

  tap_action:
    action: call-service
    confirmation:
      text: |
        [[[
          return entity?.state === 'armed_away'
            ? "⚠️ Désarmer l’alarme ?"
            : "⚠️ Armer l’alarme ?";
        ]]]
    service: |
      [[[
        return entity?.state === 'disarmed'
          ? 'script.alarme_armer'
          : 'script.alarme_desarmer';
      ]]]
    service_data:
      origine: dashboard

  hold_action:
    action: navigate
    navigation_path: /alarme-dashboard

  double_tap_action:
    action: none

  state:
    - value: disarmed
      styles:
        card:
          - background-color: rgba(76, 175, 80, 0.2)

    - value: armed_away
      styles:
        card:
          - background-color: rgba(244, 67, 54, 0.2)