# ==========================================================
# 🧠 ARSENAL — CARTE UI
#     Maison — Mode babysitting
#
# 🗂️ COUCHE : action
# 🧱 TYPE UI : commande d'état contextualisée
# 🔍 NIVEAU DE CONFIANCE : élevé
# ==========================================================
#
# 🎯 RÔLE
#   Permettre l’activation et la désactivation du mode
#   babysitting avec confirmation explicite et accès
#   aux réglages associés.
#
# 📡 SOURCE
#   - entity.state (input_boolean.mode_babysitting)
#
# ⚙️ LOGIQUE UI
#   - Affiche l’état du mode :
#       - on  → actif
#       - off → inactif
#   - Permet le changement d’état via action utilisateur
#   - Confirmation obligatoire avant bascule
#   - Action contextualisée :
#       - si actif → proposition de désactivation
#       - si inactif → proposition d’activation
#   - Navigation vers les réglages via maintien
#   - Code visuel :
#       - actif → vert
#       - inactif → gris neutre
#   - Aucune logique métier dans la carte
#
# ----------------------------------------------------------
# 🔒 STRUCTURE
#   SATELLITE et PIVOT sont mutuellement exclusifs
# ----------------------------------------------------------
#
# 🔗 SATELLITE DE : socle_toggle
#
# ==========================================================

carte_mode_babysitting:
  template: socle_toggle

  tap_action:
    action: toggle
    confirmation:
      text: |
        [[[
          return entity?.state === 'on'
            ? "Désactiver le mode Babysitting ?"
            : "Activer le mode Babysitting ?";
        ]]]

  hold_action:
    action: navigate
    navigation_path: /reglages-maison-dashboard

  double_tap_action:
    action: none

  state:
    - value: 'on'
      styles:
        card:
          - background-color: rgba(76, 175, 80, 0.2)

    - value: 'off'
      styles:
        card:
          - background-color: rgba(158, 158, 158, 0.2)
