# ==========================================================
# 🧠 ARSENAL — CARTE UI
#     ECS — État ballon eau chaude sanitaire
#
# 🗂️ COUCHE : état
# 🧱 TYPE UI : synthèse d'état avec action secondaire
# 🔍 NIVEAU DE CONFIANCE : élevé
# ==========================================================
#
# 🎯 RÔLE
#   Afficher la température courante du ballon ECS et
#   signaler visuellement si le brûleur ECS est actif
#   ou si la température se situe dans une zone
#   thermique qualifiée.
#
# 📡 SOURCE
#   - entity.state
#   - binary_sensor.bruleur_mode_ecs
#   - sensor.temperature_ecs_couleur
#
# ⚙️ LOGIQUE UI
#   - Affiche la température ECS sous forme lisible
#   - Cas dégradés :
#       - unavailable / unknown / none → « Indisponible »
#       - valeur non numérique → « — »
#   - Donne une priorité visuelle au brûleur ECS actif
#   - Sinon, applique la sémantique couleur calculée
#     par le backend :
#       - blue   → température basse
#       - orange → température tiède
#       - red    → température critique
#   - Ordre de priorité :
#       - brûleur ECS actif
#       - couleur thermique calculée
#   - Navigation vers le dashboard ECS sur appui
#   - Action secondaire explicite sur maintien :
#       - lancement d'un cycle ECS ponctuel
#       - confirmation obligatoire
#   - Aucun calcul de décision ECS
#
# ----------------------------------------------------------
# 🔒 STRUCTURE
#   SATELLITE et PIVOT sont mutuellement exclusifs
# ----------------------------------------------------------
#
# ⚠️ CARTE PIVOT
#   Traverse :
#     - état réel
#     - diagnostic
# ==========================================================

carte_ecs_action:
  template: socle_etat_action_secondaire

  show_state: true

  state_display: |
    [[[
      const st = entity.state;
      if (st === 'unavailable' || st === 'unknown' || st === 'none') return 'Indisponible';
      const t = parseFloat(st);
      if (isNaN(t)) return '—';
      return `${t.toFixed(1)} °C`;
    ]]]

  tap_action:
    action: navigate
    navigation_path: /ecs-dashboard

  hold_action:
    action: call-service
    service: script.chauffage_ecs_cycle
    data:
      mode: ponctuel
    confirmation:
      text: Lancer un cycle de chauffage ECS ponctuel ?

  state:
    - operator: template
      value: |
        [[[
          return states['binary_sensor.bruleur_mode_ecs']?.state === 'on';
        ]]]
      styles:
        card:
          - background-color: rgba(255, 152, 0, 0.2)

    - operator: template
      value: |
        [[[
          return states['sensor.temperature_ecs_couleur']?.state === 'blue';
        ]]]
      styles:
        card:
          - background-color: rgba(33, 150, 243, 0.2)

    - operator: template
      value: |
        [[[
          return states['sensor.temperature_ecs_couleur']?.state === 'orange';
        ]]]
      styles:
        card:
          - background-color: rgba(255, 152, 0, 0.2)

    - operator: template
      value: |
        [[[
          return states['sensor.temperature_ecs_couleur']?.state === 'red';
        ]]]
      styles:
        card:
          - background-color: rgba(244, 67, 54, 0.2)