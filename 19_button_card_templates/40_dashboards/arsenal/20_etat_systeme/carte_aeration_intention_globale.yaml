# ==========================================================
# 🧠 ARSENAL — CARTE UI
#     Aération — Intention globale
#
# 🗂️ COUCHE : intention
# 🧱 TYPE UI : statut intentionnel explicatif
# 🔍 NIVEAU DE CONFIANCE : élevé
# ==========================================================
#
# 🎯 RÔLE
#   Afficher l’intention globale d’aération naturelle
#   à l’échelle de la maison ainsi que le motif
#   principal associé.
#
# 📡 SOURCE
#   - binary_sensor.aeration_conseillee
#   - entity.attributes.decision_globale
#
# ⚙️ LOGIQUE UI
#   - Affiche une intention globale déjà calculée par
#     le backend
#   - Traduit `decision_globale` en icône et libellé
#     explicatifs
#   - Code visuel :
#       - state = on  → aération conseillée → vert
#       - state = off → aération non pertinente → gris neutre
#   - Navigation vers le dashboard Aération sur appui
#   - Accès au more-info sur maintien
#   - Aucun calcul d’intention dans la carte
#   - Aucune logique métier décisionnelle locale
#
# ----------------------------------------------------------
# 🔒 STRUCTURE
#   SATELLITE et PIVOT sont mutuellement exclusifs
# ----------------------------------------------------------
#
# 🔗 SATELLITE DE : socle_status_label
#
# ==========================================================

carte_aeration_intention_globale:
  template: socle_status_label

  entity: binary_sensor.aeration_conseillee

  show_icon: true
  show_state: false
  show_name: true
  show_label: true

  icon: |
    [[[
      const d = entity.attributes.decision_globale;
      if (d === 'co2_priorite') return 'mdi:molecule-co2';
      if (d === 'canicule') return 'mdi:weather-sunny-alert';
      if (d === 'pluie_recente') return 'mdi:weather-rainy';
      if (d === 'aeration_ok') return 'mdi:weather-windy';
      return 'mdi:window-closed-variant';
    ]]]

  label: |
    [[[
      const map = {
        'co2_priorite': 'CO₂ prioritaire',
        'canicule': 'Canicule',
        'pluie_recente': 'Pluie récente',
        'aeration_ok': 'Conditions favorables',
        'seuil_ha_non_atteint': 'Humidité stable',
        'seuil_dt_non_atteint': 'Écart thermique insuffisant'
      };
      return map[entity.attributes.decision_globale] || '';
    ]]]

  triggers_update:
    - binary_sensor.aeration_conseillee

  tap_action:
    action: navigate
    navigation_path: /aeration-dashboard/aeration

  hold_action:
    action: more-info
  double_tap_action:
    action: none

  styles:
    card:
      - background-color: |
          [[[
            return entity.state === 'on'
              ? 'rgba(76, 175, 80, 0.2)'    // 🟢 conseillée
              : 'rgba(158, 158, 158, 0.2)'; // ⚪ non pertinente
          ]]]
