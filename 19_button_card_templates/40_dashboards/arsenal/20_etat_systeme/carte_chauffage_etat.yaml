# ==========================================================
# 🧠 ARSENAL — CARTE UI
#     Chauffage — État réel du chauffage
#
# 🗂️ COUCHE : état
# 🧱 TYPE UI : synthèse état programmé / état réel
# 🔍 NIVEAU DE CONFIANCE : élevé
# ==========================================================
#
# 🎯 RÔLE
#   Afficher le mode de programmation du chauffage
#   (Confort / Eco) et distinguer visuellement si le
#   brûleur est actif ou en repos.
#
# 📡 SOURCE
#   - entity.state
#   - binary_sensor.bruleur_chauffage_actif
#
# ⚙️ LOGIQUE UI
#   - Lit le mode de programmation chauffage porté par
#     l'entité
#   - Lit l'état réel du brûleur via
#     `binary_sensor.bruleur_chauffage_actif`
#   - Produit un affichage synthétique :
#       - Confort + brûleur ON  → « Actif »
#       - Confort + brûleur OFF → « Repos »
#       - Eco                   → « Repos »
#       - autre / inconnu       → état brut
#   - Code visuel :
#       - chauffe réelle en Confort → rouge
#       - Confort sans chauffe      → vert
#       - Eco / fallback            → gris neutre
#   - Navigation vers le dashboard Chauffage sur appui
#   - More-info sur maintien
#
# ----------------------------------------------------------
# 🔒 STRUCTURE
#   SATELLITE et PIVOT sont mutuellement exclusifs
# ----------------------------------------------------------
#
# ⚠️ CARTE PIVOT
#   Traverse :
#     - intention
#     - état réel
#     - diagnostic
# ==========================================================

carte_chauffage_etat:
  template: socle_etat_action_secondaire

  show_state: true

  state_display: |
    [[[
      const burner = states['binary_sensor.bruleur_chauffage_actif']?.state;
      const prog = entity?.state;

      if (burner === 'on' && prog === 'Confort') return 'Actif';
      if (prog === 'Confort') return 'Repos';
      if (prog === 'Eco') return 'Repos';

      return prog || '—';
    ]]]

  tap_action:
    action: navigate
    navigation_path: /chauffage-dashboard

  hold_action:
    action: more-info

  state:
    # 🔴 Confort + brûleur actif
    - operator: template
      value: |
        [[[
          const burner = states['binary_sensor.bruleur_chauffage_actif']?.state;
          const prog = entity?.state;
          return burner === 'on' && prog === 'Confort';
        ]]]
      styles:
        card:
          - background-color: rgba(244, 67, 54, 0.2)

    # 🟢 Confort
    - operator: template
      value: |
        [[[
          const prog = entity?.state;
          return prog === 'Confort';
        ]]]
      styles:
        card:
          - background-color: rgba(76, 175, 80, 0.2)

    # ⚪ Eco
    - operator: template
      value: |
        [[[
          const prog = entity?.state;
          return prog === 'Eco';
        ]]]
      styles:
        card:
          - background-color: rgba(158, 158, 158, 0.2)

    # ⚪ fallback
    - operator: default
      styles:
        card:
          - background-color: rgba(158, 158, 158, 0.2)