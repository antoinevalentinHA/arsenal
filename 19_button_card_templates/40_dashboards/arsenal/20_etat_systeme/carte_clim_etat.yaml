# ==========================================================
# 🧠 ARSENAL — CARTE UI
#     Climatisation — État réel
#
# 🗂️ COUCHE : état
# 🧱 TYPE UI : synthèse état réel / consigne appliquée
# 🔍 NIVEAU DE CONFIANCE : élevé
# ==========================================================
#
# 🎯 RÔLE
#   Afficher l’état métier réel de la climatisation sur l’accueil,
#   aligné sur la carte Chauffage : « qu’est-ce que la clim fait ».
#   Aucune consigne affichée ici (gérée sur le dashboard climatisation).
#
# 📡 SOURCE
#   - sensor.clim_action_en_cours (lecture principale : libellé + couleur)
#       valeurs : cool_actif / dry_actif / heat_actif / bloquee / arret
#   Note : la carte reste bindée à sensor.clim_mode_local (entity) pour
#   le more-info uniquement ; elle ne lit PAS climate.clim directement.
#
# ⚙️ LOGIQUE UI
#   - Lit l’action réelle exposée par le backend (lecture pure)
#   - Produit un libellé d’état métier :
#       - cool_actif → « Refroidissement »
#       - dry_actif  → « Déshumidification »
#       - heat_actif → « Soutien chauffage »
#       - bloquee    → « Bloquée »
#       - arret      → « Repos »
#       - indispo    → « Indisponible »
#   - Code visuel = MODE HVAC (Exception 1 — ui/couleurs/03_exceptions.md),
#     dérivé de l’action réelle, sans jugement de statut :
#       - cool_actif → bleu · dry_actif → vert · heat_actif → rouge
#       - bloquee / arret → gris neutre (off / absence de mode)
#       - indispo → gris indisponibilité (prime sur tout)
#   - Navigation vers le dashboard Climatisation sur appui
#   - More-info sur maintien
#   - Aucun calcul de décision, aucun mode cible, aucun pilotage
#
# ----------------------------------------------------------
# 🔒 STRUCTURE
#   SATELLITE et PIVOT sont mutuellement exclusifs
# ----------------------------------------------------------
#
# ⚠️ CARTE PIVOT
#   Traverse :
#     - intention
#     - état réel
#     - diagnostic
# ==========================================================

carte_clim_etat:
  template: socle_action_label_compact

  show_label: true
  show_state: false

  label: |
    [[[
      // Lecture pure de l'action réelle (aucune décision recalculée ici).
      const action = states['sensor.clim_action_en_cours']?.state;
      const UNAV = ['unknown','unavailable','none','',undefined,null];

      if (UNAV.includes(action)) return 'Indisponible';

      if (action === 'cool_actif') return 'Refroidissement';
      if (action === 'dry_actif')  return 'Déshumidification';
      if (action === 'heat_actif') return 'Soutien chauffage';
      if (action === 'bloquee')    return 'Bloquée';
      if (action === 'arret')      return 'Repos';

      return 'Repos';
    ]]]

  tap_action:
    action: navigate
    navigation_path: /clim-dashboard

  hold_action:
    action: more-info

  styles:
    card:
      - background-color: |
          [[[
            // 🎨 Couleur = MODE HVAC (Exception 1 — ui/couleurs/03_exceptions.md),
            // dérivée de l'action réelle. Encode le mode, jamais un statut OK/KO.
            const action = states['sensor.clim_action_en_cours']?.state;
            const UNAV = ['unknown','unavailable','none','',undefined,null];

            // Indisponibilité — prime sur toute couleur de mode (02_palette.md).
            if (UNAV.includes(action)) return 'rgba(158, 158, 158, 0.1)';

            if (action === 'cool_actif') return 'rgba(33, 150, 243, 0.2)'; // cool → bleu
            if (action === 'dry_actif')  return 'rgba(76, 175, 80, 0.2)';  // dry  → vert
            if (action === 'heat_actif') return 'rgba(244, 67, 54, 0.2)';  // heat → rouge

            // bloquee / arret → off / absence de mode → gris neutre
            return 'rgba(158, 158, 158, 0.2)';
          ]]]