# ==========================================================
# 🧠 ARSENAL — CARTE UI
#     Climatisation — État réel
#
# 🗂️ COUCHE : état
# 🧱 TYPE UI : synthèse état réel / consigne appliquée
# 🔍 NIVEAU DE CONFIANCE : élevé
# ==========================================================
#
# 🎯 RÔLE
#   Afficher l’état réel de la climatisation ainsi que
#   la consigne appliquée lorsque disponible.
#
# 📡 SOURCE
#   - entity.state (climate.clim)
#   - sensor.consigne_clim_appliquee
#
# ⚙️ LOGIQUE UI
#   - Lit l’état réel de la climatisation
#   - Lit la consigne appliquée locale lorsque disponible
#   - Produit un libellé contextuel selon le mode réel :
#       - cool → affichage de la consigne appliquée
#       - dry  → « Mode Dry actif »
#       - heat → « Mode Chauffage actif »
#       - off  → « Veille »
#       - autre → affichage brut de l’état
#   - Code visuel :
#       - cool → bleu
#       - dry  → vert
#       - heat → rouge
#       - off / autre → gris neutre
#   - Navigation vers le dashboard Climatisation sur appui
#   - More-info sur maintien
#   - Aucun calcul du mode cible
#   - Aucun pilotage de l’équipement
#
# ----------------------------------------------------------
# 🔒 STRUCTURE
#   SATELLITE et PIVOT sont mutuellement exclusifs
# ----------------------------------------------------------
#
# ⚠️ CARTE PIVOT
#   Traverse :
#     - intention
#     - état réel
#     - diagnostic
# ==========================================================

carte_clim_etat:
  template: socle_action_label_compact

  show_label: true
  show_state: false

  label: |
    [[[
      const mode = (entity.state || '').toLowerCase();
      const consigne = states['sensor.consigne_clim_appliquee']?.state;

      if (mode === 'cool')
        return 'Consigne : ' +
          ((!consigne || ['unavailable','unknown'].includes(consigne)) ? '-' : consigne) + '°C';

      if (mode === 'dry')  return 'Mode Dry actif';
      if (mode === 'heat') return 'Mode Chauffage actif';
      if (mode === 'off')  return 'Veille';

      return 'État : ' + (mode || '-');
    ]]]

  tap_action:
    action: navigate
    navigation_path: /clim-dashboard

  hold_action:
    action: more-info

  styles:
    card:
      - background-color: |
          [[[
            const mode = (entity.state || '').toLowerCase();
            if (mode === 'cool') return 'rgba(33, 150, 243, 0.2)';
            if (mode === 'dry')  return 'rgba(76, 175, 80, 0.2)';
            if (mode === 'heat') return 'rgba(244, 67, 54, 0.2)';
            return 'rgba(158, 158, 158, 0.2)';
          ]]]