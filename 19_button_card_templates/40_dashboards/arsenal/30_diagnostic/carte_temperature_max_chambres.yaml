# ==========================================================
# 🧠 ARSENAL — TEMPLATE UI METIER
#     Climatisation / Chauffage — Température maximum chambres
# ==========================================================
#
# 📌 STATUT
#     TEMPLATE UI METIER
#
# 🎯 ROLE
#     Affiche la température maximale parmi les chambres et
#     positionne cette valeur dans une lecture thermique globale :
#
#       - Surchauffe → basée sur la vérité contractuelle clim COOL
#       - Froid      → basé sur un seuil chauffage avec offset
#
#     Indique aussi la chambre la plus chaude en label.
#
# 🧱 NATURE
#     - Template button-card
#     - Spécialisation de carte_temperature_confort
#     - UI uniquement (aucune décision)
#
# 🎨 SEMANTIQUE
#     - clim seuil allumage atteint              -> 🔴 rouge
#     - temp_max < seuil chauffage ON            -> 🔵 bleu
#     - entre les deux                           -> 🟢 vert
#     - valeur manquante / état invalide         -> ⚪ gris
#
# 🔗 DEPENDANCES
#     - sensor.temperature_max_chambres
#     - binary_sensor.clim_seuil_allumage_cool_atteint
#     - input_number.chauffage_consigne_confort
#     - input_number.chauffage_offset_on
#
# ⚠️ CONTRAINTES
#     - La surchauffe est pilotée UNIQUEMENT par la vérité clim
#     - Le froid est évalué localement via seuil chauffage
#     - Aucune reconstruction de logique clim
#     - Aucune dépendance à clim_consigne_presence
#
# 🧩 USAGE
#     type: custom:button-card
#     template: carte_temperature_max_chambres
#     entity: sensor.temperature_max_chambres
#
# ==========================================================

carte_temperature_max_chambres:
  template: carte_temperature_confort

  styles:
    card:
      - background-color: |
          [[[
            const get = (id) => {
              const s = states[id];
              const v = parseFloat(s?.state);
              return Number.isFinite(v) ? v : null;
            };

            const temp_max        = get('sensor.temperature_max_chambres');
            const cons_chauff     = get('input_number.chauffage_consigne_confort');
            const off_chauff      = get('input_number.chauffage_offset_on');
            const cool_on_atteint = states['binary_sensor.clim_seuil_allumage_cool_atteint']?.state;

            const RED   = 'rgba(244, 67, 54, 0.2)';
            const GREEN = 'rgba(76, 175, 80, 0.2)';
            const BLUE  = 'rgba(33, 150, 243, 0.2)';
            const GREY  = 'rgba(158, 158, 158, 0.2)';

            if (
              temp_max === null ||
              cons_chauff === null ||
              off_chauff === null ||
              !['on', 'off'].includes(cool_on_atteint)
            ) {
              return GREY;
            }

            const seuil_chauff_on = cons_chauff - off_chauff;

            if (cool_on_atteint === 'on')     return RED;
            if (temp_max < seuil_chauff_on)   return BLUE;
            return GREEN;
          ]]]

  label: |
    [[[
      return states['sensor.temperature_max_chambres']
        ?.attributes
        ?.chambre_la_plus_chaude
        || 'Inconnue';
    ]]]