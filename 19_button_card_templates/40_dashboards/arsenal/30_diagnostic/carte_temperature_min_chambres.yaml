# ==========================================================
# 🧠 ARSENAL — TEMPLATE UI METIER
#     Chauffage / Climatisation — Température minimum chambres
# ==========================================================
#
# 📌 STATUT
#     TEMPLATE UI METIER
#
# 🎯 ROLE
#     Affiche la température minimale parmi les chambres, la chambre
#     la plus froide en label, et restitue la catégorie thermique
#     produite par le backend (contrat C27 Lot 2B).
#
# 🧱 NATURE
#     - Template button-card
#     - Spécialisation de carte_temperature_confort
#     - UI uniquement — MAPPING trivial catégorie → couleur (§11)
#     - Aucune décision, aucun recalcul, aucune comparaison de seuil
#
# 🎨 SEMANTIQUE (Exception 2 thermique étendue — mapping trivial)
#     - catégorie backend `froid`       -> 🔵 bleu thermique rgba(144,202,249,0.25)
#     - catégorie backend `dans_plage`  -> 🟢 vert          rgba(76,175,80,0.2)
#     - indisponibilité (native)        -> ⚪ gris indispo   rgba(158,158,158,0.1) — PRIORITAIRE
#
# 🔗 DEPENDANCES (§9/§10 — aucun helper thermique, aucun franchissement, aucun cross-entity)
#     - sensor.temperature_min_chambres            (valeur + chambre)
#     - sensor.categorie_thermique_min_chambres    (catégorie backend)
#
# 🧩 USAGE
#     type: custom:button-card
#     template: carte_temperature_min_chambres
#     entity: sensor.temperature_min_chambres
#
# ==========================================================

carte_temperature_min_chambres:
  template: carte_temperature_confort

  styles:
    card:
      - background-color: |
          [[[
            const cat = states['sensor.categorie_thermique_min_chambres']?.state;

            const GRIS_INDISPO = 'rgba(158, 158, 158, 0.1)';
            const FROID        = 'rgba(144, 202, 249, 0.25)';
            const DANS_PLAGE   = 'rgba(76, 175, 80, 0.2)';

            // Priorité : indisponibilité native (unavailable/unknown/toute
            // autre valeur) -> gris indispo prioritaire ; sinon mapping trivial.
            if (cat === 'froid')      return FROID;
            if (cat === 'dans_plage') return DANS_PLAGE;
            return GRIS_INDISPO;
          ]]]

  label: |
    [[[
      return states['sensor.temperature_min_chambres']
        ?.attributes
        ?.chambre_la_plus_froide
        || 'Inconnue';
    ]]]
