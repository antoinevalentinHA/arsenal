# ==========================================================
# 🧠 ARSENAL — SOCLE UI
#     KPI — Indicateur visuel
#
# 🧩 NATURE : socle
# 🧱 TYPE UI : interprétative
# ==========================================================
#
# 🎯 RÔLE
#   Fournit un socle de type KPI avec mise en avant de la valeur
#   et interprétation visuelle via une couleur de fond.
#
# ⚙️ COMPORTEMENT
#   - affiche : icon + name + state
#   - state dominant (18px, font-weight 700)
#   - couleur de fond déterminée dynamiquement
#   - aucune interaction définie
#
# 📡 SOURCE
#   - entity principale (valeur KPI)
#   - entity couleur (sensor.couleur_* ou variable explicite)
#
# ⚙️ LOGIQUE UI
#   - récupération de la clé couleur via :
#       • variables.couleur (prioritaire)
#       • ou sensor.couleur_<suffixe>
#   - mapping vers palette (arsenal ou ecs)
#   - fallback :
#       • unknown/unavailable → couleur indisponible
#       • clé inconnue → gris
#
# 📐 USAGE
#   - destiné aux indicateurs synthétiques (KPI)
#   - utilisé lorsque la valeur doit être interprétée visuellement
#   - ne doit pas être utilisé comme source de décision
# ==========================================================

socle_kpi:
  template: carte_base_v2

  show_icon: true
  show_state: true
  show_name: true

  styles:
    state:
      - font-size: 18px
      - font-weight: 700

    card:
      - background-color: |
          [[[
            const profile = variables?.ui_profile || "arsenal";

            const palettes = {

              // ----------------------------------------------------------
              // Palette "arsenal" : charte contractuelle Arsenal
              // ----------------------------------------------------------
              arsenal: {
                green: "rgba(76, 175, 80, 0.2)",
                red: "rgba(244, 67, 54, 0.2)",
                orange: "rgba(255, 152, 0, 0.2)",
                blue: "rgba(33, 150, 243, 0.2)",
                grey: "rgba(158, 158, 158, 0.2)",
                yellow: "rgba(255, 235, 59, 0.2)",

                // Compat éventuelle avec des clés météo existantes
                light_green: "rgba(76, 175, 80, 0.2)",
                light_blue: "rgba(33, 150, 243, 0.2)",

                unavailable: "rgba(158, 158, 158, 0.1)"
              },

              // ----------------------------------------------------------
              // Palette "ecs" : pour capteurs couleur ECS
              // (clés attendues : blue / orange / red)
              // ----------------------------------------------------------
              ecs: {
                blue: "rgba(33, 150, 243, 0.2)",
                orange: "rgba(255, 152, 0, 0.2)",
                red: "rgba(244, 67, 54, 0.2)",

                // Fallbacks génériques si une clé inattendue arrive
                green: "rgba(76, 175, 80, 0.2)",
                grey: "rgba(158, 158, 158, 0.2)",

                unavailable: "rgba(158, 158, 158, 0.1)"
              }
            };

            const p = palettes[profile] || palettes.arsenal;

            // ----------------------------------------------------------
            // 1) Robustesse : indispo / entity absente
            // ----------------------------------------------------------
            if (!entity || !entity.entity_id) return p.unavailable;

            // ----------------------------------------------------------
            // 2) Détermination de l’entité "couleur_*"
            //    - priorité : variables.couleur (explicite)
            //    - sinon : dérivation sensor.couleur_<suffixe>
            // ----------------------------------------------------------
            const explicitColorEntity = variables?.couleur;
            const derivedColorEntity = entity.entity_id.replace(
              /^sensor\.(.*)/,
              "sensor.couleur_$1"
            );
            const colorEntity = explicitColorEntity || derivedColorEntity;

            const rawKey = states[colorEntity]?.state;

            // ----------------------------------------------------------
            // 3) Gestion indispo (unknown/unavailable/absent)
            // ----------------------------------------------------------
            if (rawKey === undefined || rawKey === null) return p.unavailable;

            const key = String(rawKey).trim();

            if (key === "unknown" || key === "unavailable" || key === "")
              return p.unavailable;

            // ----------------------------------------------------------
            // 4) Retour palette
            // ----------------------------------------------------------
            return p[key] || p.grey;
          ]]]