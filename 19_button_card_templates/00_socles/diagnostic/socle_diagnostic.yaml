# ==========================================================
# 🧠 ARSENAL — SOCLE UI
#     Diagnostic — Standard (88px)
#
# 🧩 NATURE : socle
# 🧱 TYPE UI : diagnostic
# ==========================================================
#
# 🎯 RÔLE
#   Fournit un socle de lecture complet pour cartes de diagnostic,
#   avec affichage simultané de l’état et d’un contexte complémentaire.
#
# ⚙️ COMPORTEMENT
#   - affiche : icon + name + state + label
#   - aucune interaction (tap/hold/double_tap désactivées)
#   - hauteur fixe 88px
#   - typographie lisible pour état (14px) et label (12px atténué)
#
# 📐 USAGE
#   - destiné aux cartes de diagnostic et de cohérence système
#   - utilisé lorsque plusieurs niveaux d’information doivent être visibles
#   - ne doit pas être utilisé pour des cartes d’action
# ==========================================================

socle_diagnostic:
  template: carte_base_v2

  show_icon: true
  show_name: true
  show_state: true
  show_label: true
  color_type: card

  tap_action:
    action: none
  hold_action:
    action: none
  double_tap_action:
    action: none

  styles:
    card:
      - height: 88px

    state:
      - font-size: 14px
      - font-weight: 400
      - color: '#111'

    label:
      - font-size: 12px
      - font-weight: 400
      - color: '#111'
      - opacity: 0.85
