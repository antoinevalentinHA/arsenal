# ==========================================================
# 🧠 ARSENAL — CARTE UI
#     Alerte — Binaire critique
#
# 🗂️ COUCHE : 10_generiques
# 🧱 TYPE UI : interprétative
# 🔍 NIVEAU DE CONFIANCE : fort
# ==========================================================
#
# 🎯 RÔLE
#   Signale visuellement l’état d’une entité binaire critique
#   par codage coloriel du fond de carte.
#
# 📡 SOURCE
#   - entity.state
#
# ⚙️ LOGIQUE UI
#   - state = on   → fond rouge
#   - state = off  → fond vert
#   - autre état   → fond gris
#   - tap_action = more-info
#
# 📐 USAGE
#   - destinée aux alertes binaires à signalement critique
#   - le codage coloriel est local à l’UI
#   - ne doit pas embarquer de logique métier locale
# ==========================================================

carte_alerte_binaire_critique:
  template: carte_base_v2

  show_state: true

  tap_action:
    action: more-info

  styles:
    card:
      - background-color: |
          [[[
            if (entity.state === 'on')
              return 'rgba(244, 67, 54, 0.2)';

            if (entity.state === 'off')
              return 'rgba(76, 175, 80, 0.2)';

            return 'rgba(158, 158, 158, 0.1)';
          ]]]