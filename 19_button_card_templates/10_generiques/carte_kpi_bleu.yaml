# ==========================================================
# 🧠 ARSENAL — CARTE UI
#     Générique — KPI informatif bleu
#
# 🗂️ COUCHE : UI / Information
# 🧱 TYPE UI : KPI informatif générique
# 🔍 NIVEAU DE CONFIANCE : Élevé
# ==========================================================
#
# 🎯 RÔLE
#   Afficher une valeur informative sous forme de KPI.
#
# 📡 SOURCE
#   entity fournie à l'instance.
#
# ⚙️ LOGIQUE UI
#   disponible → bleu information
#   unknown / unavailable → gris indisponibilité
#
# ----------------------------------------------------------
# 🔒 STRUCTURE
#   SATELLITE et PIVOT sont mutuellement exclusifs
# ----------------------------------------------------------
#
# 🔗 SATELLITE DE : socle_kpi_72
# ==========================================================

carte_kpi_bleu:
  template:
    - socle_kpi_72
  styles:
    card:
      - background-color: >
          [[[
            if (!entity || entity.state === 'unknown' || entity.state === 'unavailable')
              return 'rgba(158, 158, 158, 0.1)';

            return 'rgba(33, 150, 243, 0.2)';
          ]]]