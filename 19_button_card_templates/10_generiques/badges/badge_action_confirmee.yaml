# ==========================================================
# 🧠 ARSENAL — CARTE UI
#     Badge — Action confirmee
#
# 🗂️ COUCHE : 10_action
# 🧱 TYPE UI : action
# 🔍 NIVEAU DE CONFIANCE : fort
# ==========================================================
#
# 🎯 RÔLE
#   Déclenche une action backend explicite depuis un badge,
#   après confirmation utilisateur.
#
# 📡 SOURCE
#   - variables.action_service
#   - variables.action_data
#
# ⚙️ LOGIQUE UI
#   - format badge basé sur socle_badge_42
#   - service appelé via variables.action_service
#   - données via variables.action_data
#   - confirmation obligatoire avant exécution
#   - aucune action si aucun service n’est fourni
#
# 📐 USAGE
#   - carte générique paramétrable (dossier 10_generiques)
#   - destinée aux actions compactes exposées en badge
#   - utilisée lorsque le service et les données sont fournis
#     dynamiquement
#   - ne doit pas embarquer de logique conditionnelle métier locale
# ==========================================================

badge_action_confirmee:
  template: socle_badge_42

  variables:
    bg_color: "rgba(158, 158, 158, 0.2)"
    icon_color: "#111"
    border_radius: "50%"

  tap_action:
    action: |
      [[[
        return variables?.action_service ? "call-service" : "none";
      ]]]
    service: |
      [[[
        return variables?.action_service || "";
      ]]]
    service_data: |
      [[[
        return variables?.action_data || {};
      ]]]
    confirmation:
      text: |
        [[[
          return variables?.confirm || "Confirmer l’action ?";
        ]]]

  hold_action:
    action: none

  double_tap_action:
    action: none