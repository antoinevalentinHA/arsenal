# ==========================================================
# 🧠 ARSENAL — CARTE UI
#     Compteur — Seuils variables
#
# 🗂️ COUCHE : 10_generiques
# 🧱 TYPE UI : interprétative
# 🔍 NIVEAU DE CONFIANCE : indicatif
# ==========================================================
#
# 🎯 RÔLE
#   Affiche un compteur avec interprétation visuelle locale
#   selon des seuils fournis par variables.
#
# 📡 SOURCE
#   - entity.state
#   - variables.seuil_1
#   - variables.seuil_2
#   - variables.seuil_3
#   - variables.seuil_4
#
# ⚙️ LOGIQUE UI
#   - state_display : valeur entière, ou "—" si état non numérique
#   - valeur non numérique → fond gris indisponible
#   - seuil_4 atteint      → fond rouge
#   - seuil_3 atteint      → fond orange
#   - seuil_2 atteint      → fond jaune
#   - sinon                → fond vert
#   - aucune interaction (tap/hold/double_tap désactivées)
#
# 📐 USAGE
#   - destinée aux compteurs interprétés par seuils locaux
#   - utilisée lorsque les seuils dépendent du contexte d’usage
#   - ne doit pas être utilisée comme source de décision
# ==========================================================

carte_compteur_seuils_variables:
  template: socle_diagnostic_compact

  show_state: true

  tap_action:
    action: none
  hold_action:
    action: none
  double_tap_action:
    action: none

  state_display: |
    [[[
      const v = parseInt(entity.state);
      return isNaN(v) ? '—' : v;
    ]]]

  styles:
    card:
      - background-color: |
          [[[
            const v = parseInt(entity.state);

            const s1 = variables?.seuil_1;
            const s2 = variables?.seuil_2;
            const s3 = variables?.seuil_3;
            const s4 = variables?.seuil_4;

            // ⚪ Indisponible (charte)
            if (isNaN(v)) return 'rgba(158, 158, 158, 0.1)';

            // 🔴 Critique
            if (s4 !== undefined && v >= s4) return 'rgba(244, 67, 54, 0.2)';

            // 🟠 Alerte
            if (s3 !== undefined && v >= s3) return 'rgba(255, 152, 0, 0.2)';

            // 🟡 Vigilance (conservé volontairement)
            if (s2 !== undefined && v >= s2) return 'rgba(255, 235, 59, 0.2)';

            // 🟢 Normal
            return 'rgba(76, 175, 80, 0.2)';
          ]]]