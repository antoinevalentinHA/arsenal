# ==========================================================
# 🧠 ARSENAL — CARTE UI
#     Navigation — Badge base
#
# 🗂️ COUCHE : 10_generiques/navigation
# 🧱 TYPE UI : action
# 🔍 NIVEAU DE CONFIANCE : fort
# ==========================================================
#
# 🎯 RÔLE
#   Fournit une base visuelle pour les boutons de navigation
#   au format badge.
#
# 📡 SOURCE
#   - aucune (carte structurelle)
#
# ⚙️ LOGIQUE UI
#   - basé sur socle_badge_42
#   - fond transparent
#   - icône active
#   - coins arrondis (12px)
#   - aucune action définie (à surcharger)
#
# 📐 USAGE
#   - utilisé comme base pour les boutons de navigation
#   - doit être spécialisé par une carte définissant
#     un tap_action (navigate)
#   - ne doit pas être utilisé seul en production
# ==========================================================

bouton_navigation_base:
  template: socle_badge_42

  variables:
    bg_color: "rgba(0, 0, 0, 0)"
    icon_color: "#111"
    border_radius: "12px"