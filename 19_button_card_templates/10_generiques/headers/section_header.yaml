# ==========================================================
# 🧠 ARSENAL — CARTE UI
#     Section — Header
#
# 🗂️ COUCHE : 10_generiques/headers
# 🧱 TYPE UI : info
# 🔍 NIVEAU DE CONFIANCE : fort
# ==========================================================
#
# 🎯 RÔLE
#   Structure visuellement un ensemble de cartes en
#   introduisant un titre de section.
#
# 📡 SOURCE
#   - name fourni par la carte
#
# ⚙️ LOGIQUE UI
#   - hérite de socle_header_base
#   - aucune lecture d’entité
#   - aucun comportement interactif
#   - rendu typographique uniquement
#
# 📐 USAGE
#   - utilisé pour séparer et titrer des groupes de cartes
#   - ne doit porter aucune information métier
#   - ne doit pas être utilisé comme support d’état
# ==========================================================

section_header:
  template: socle_header_base

  styles:
    card:
      - padding: 6px 0 4px 0
      - margin: 10px 0 2px 0
    name:
      - font-size: 19px
      - font-weight: 700
      - line-height: 1.35